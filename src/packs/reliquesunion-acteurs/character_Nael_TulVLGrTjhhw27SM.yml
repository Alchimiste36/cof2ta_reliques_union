  details:
    biography:
      private: "<p>Nael est un jeune efle sylvain, fils d'une famille de chasseur venant d'une ville de la forêt d'Eluwan. Sa famille a été rejetée de la communauté à la suit d'un conflit politique et son père a mis fin à ses jours pour \"l'honneur\".\_</p><p>Révolté par la décision de son père, Nael a préféré quitter sa famille et a été recruté par une Maille de la Toile Vivante enquétant sur le conflit politique.</p>"
      public: ''
    appearance:
      private: ''
      public: >-
        <p>Ce jeune efle sylvain semble à peine adulte. Il porte un arc beaucoup
        trop beau pour un archer de son calibre et tout porte à penser qu'il l'a
        gagné ou que c'est un héritage familiale.</p><p>Sa tenue matelassée est
        recouverte de tissu noir et vert sombre afin d'augmenter sa discrétion
        dans la nature et en forêt.</p>
    notes:
      private: ''
      public: ''
    size: medium
    languages:
      - ''
