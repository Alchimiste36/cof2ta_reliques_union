    system:
      description: "<p>Le PJ augmente sa valeur de <strong>CON de +2</strong> et ses blessures guérissent plus vite.</p><p>Lorsqu’il dépense\_1 PR, il regagne <strong>[2 x DV + niv + Mod. CON]</strong>.</p>"
