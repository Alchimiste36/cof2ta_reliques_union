        <p>Proche de la nature / Nature nourricière / <u>Attaque éclair (L)</u>
        / <u>Ennemis jurés</u> / <u>Perception héroïque</u></p>

        <p><u><strong>Voie du bohème (Aventurier)</strong></u></p>

        <p><u>Rumeurs et légendes</u> / <u>Argumenter</u> / <u>Débrouillard</u>
