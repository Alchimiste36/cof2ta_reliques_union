        </div>
    appearance:
      private: ''
      public: >-
        <p>Mâle - 59 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Kai
        est un centaure assez d&eacute;bonnaire. Il est d'une grande
        bont&eacute; et tout le temps favorable aux envies et &eacute;xigences
        des villageois. Son plus grand plaisir avec sa fille, {Maamaa}, est de
        pr&eacute;parer des repas dans la cuisine collective, de trouver de
        nouvelles recettes, de nouveaux go&ucirc;t et associations de saveurs.
        Il aime beaucoup l'union de sa fille avec le talentueux {Ka'Kata} et Kai
        passe beaucoup de temps avec le couple de forgeron du village, {Kaipara}
        et {Whakarewa}. En plus de ses talents en cuisine, Kai est un archer
        d'&eacute;lite mais il ne souhaite pas participer aux chasses &agrave;
        l'ext&eacute;rieur du village. Il chasse seulement les animaux qui
        volent au dessus du village ou les mammif&egrave;res qui s'aventurent
        sur les parois et les hauteurs des montagnes visibles depuis des
        habitations.</p>
