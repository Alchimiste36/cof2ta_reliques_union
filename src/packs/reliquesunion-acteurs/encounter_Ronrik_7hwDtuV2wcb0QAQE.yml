  - folder: fWmjCA560DEw5LaH
    name: Voie de l'expert
    type: path
    img: icons/commodities/treasure/medal-ribbon-striped-gold-red.webp
    _id: 4MaimoWDhDqVn5y0
    system:
      description: "<p>Artisan, marchand, artiste… <strong>L’expert est un\_professionnel accompli</strong>. Quand il choisit cette\_voie, <strong>il détermine un domaine précis</strong>, en fonction\_de son métier : boulanger, forgeron, sculpteur,\_peintre, marchand, caravanier…</p><p><strong>Toutes les capacités de cette voie s’appliquent alors à ce métier.</strong></p><hr /><p>Une voie professionnelle correspond généralement à l’éducation du PJ avant qu’il ne\_parte à l’aventure. Un\_PJ peut choisir une voie\_professionnelle au niveau 1 et plus rarement au\_cours de sa carrière de héros.</p><p>Si vous utilisez la règle optionnelle de l’âge\_de départ variable, le MJ pourrait rendre obligatoire d’investir dans une voie professionnelle\_les points de capacité acquis par ce biais.\_</p><p>Une voie professionnelle peut aussi être\_acquise à la suite d’une pause dans une vie\_d’aventures (par exemple, les héros repartent\_à l’aventure après s’être posé pendant dix ans.\_Le\_MJ accorde à chacun quelques rangs dans la\_voie professionnelle de leur choix).\_</p><p><strong>Bonus communautaire.</strong> Tous les personnages qui possèdent une voie professionnelle\_obtiennent un bonus de +3 aux tests d’interaction sociale (généralement CHA) avec un autre\_membre de leur communauté.</p>"
      source: ''
      origin: Atlas d'Osgild et Règles Optionnelles p177
      slug: ''
      subtype: encounter
      capacities:
        - Actor.7hwDtuV2wcb0QAQE.Item.UNG9erMytWpuGXjL
