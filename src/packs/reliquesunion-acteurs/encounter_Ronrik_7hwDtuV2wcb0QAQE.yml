      description: "<p>L’expert est reconnu par ses pairs comme un\_maître en son domaine et il acquiert une influence\_sociale hors du commun. Grâce à son réseau de\_connaissances ou par l’intermédiaire de ses pairs, le\_personnage peut obtenir de nombreux avantages. </p><p>La\_réussite à un <strong>test de CHA difficulté 10</strong> lui suffit\_pour <strong>obtenir une entrevue avec n’importe quel\_personnage puissant</strong> à tout moment. </p><p>Un\_<strong>test de\_difficulté 15</strong> peut lui permettre d’<strong>obtenir un service</strong>, par exemple une lettre de recommandation,\_un renseignement réservé à l’élite, des billets pour\_un bal privé, ou même une escorte armée pour\_l’aider à se rendre dans un endroit dangereux.</p>"
