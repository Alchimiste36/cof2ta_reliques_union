  - folder: r7vQCSttib8wG8VR
    name: Talent spécial
    type: capacity
    img: icons/tools/smithing/furnace-fire-metal-orange.webp
    _id: o5r9mzBE0512ULrF
    system:
      description: "<p>Le joueur et le MJ se mettent d’accord pour\_trouver une capacité spéciale en rapport avec\_la profession de l’expert. Inspirez-vous des\_quelques exemples ci-après.</p><ul><li><p><strong>Boulanger :</strong> le\_personnage peut fabriquer un\_pain de voyage par rang pour chaque aventure. Chaque jour, un PJ peut consommer un\_pain qui lui rend 1\_DR.</p></li><li><p><strong>Forgeron :</strong> le\_personnage peut affûter une\_arme pendant chaque récupération rapide.\_Elle augmente sa plage de critique de 1\_point jusqu’à la fin du prochain combat.</p></li><li><p><strong>Peintre :</strong> une\_ fois par jour, le personnage\_peut peindre une illusion sur une surface\_solide. Il\_lui faut une action limitée par mètre\_carré d’illusion. Celle-ci peut être immobile\_(une fosse, une porte, un couloir) ou animée\_à partir du rang 5 (des gardes, une créature),\_mais elle est toujours silencieuse. Toucher la\_surface dissipe l’illusion.</p></li><li><p><strong>Sculpteur :</strong> le\_ personnage peut lancer un\_ciseau à bois ou un marteau sur un adversaire\_à une portée de 10 m en action gratuite, une\_fois par combat. Si\_le test d’attaque à distance est réussi, il inflige [1d4°\_+\_AGI]\_DM.</p></li><li><p><strong>Marchand :</strong> le\_personnage peut obtenir un\_objet exotique ou peu courant de son choix\_pour chaque aventure. Il\_ peut choisir la\_nature de cet objet à tout moment, lorsqu’il\_en a besoin (par exemple, un pnoulpe pour\_respirer sous l’eau).</p></li><li><p><strong>Caravanier :</strong> le\_personnage peut faire une\_période de marche forcée (à pied ou sur une\_monture) sans pénalité chaque jour.</p></li></ul>"
      source: ''
      origin: Atlas d'Osgild et Règles Optionnelles p177
      slug: ''
      inGame: >-
