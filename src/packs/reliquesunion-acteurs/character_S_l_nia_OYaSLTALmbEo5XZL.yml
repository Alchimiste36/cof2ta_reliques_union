    type: capacity
    img: icons/magic/nature/root-vine-entangle-foot-green.webp
    system:
      description: "<p>Le PJ peut commander à la végétation de pousser\_et bloquer ses ennemis (mais pas ses alliés) dans\_<strong>une zone de 10 m de diamètre</strong> (portée: 20 m)\_<strong>pendant [5 + Mod. de SAG] tours</strong>.</p><p> Entravées,\_les cibles subissent un malus de <strong>-2 en attaque et\_en DEF et ne peuvent pas se déplacer</strong>. </p><p>Chaque\_tour, une créature peut se libérer avec un test\_de FOR difficulté [10 + Mod. d’INT].</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> les cibles entravées subissent\_un malus de -3 en attaque et en DEF.</p></blockquote>"
