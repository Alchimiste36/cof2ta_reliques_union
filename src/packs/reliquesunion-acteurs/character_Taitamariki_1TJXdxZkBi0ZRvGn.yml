  - folder: 70oSGsBlWvf0HQ7g
    name: Saignements
    type: capacity
    img: >-
      icons/skills/wounds/blood-drip-droplet-red.webp
    system:
      description: "<p>Le PJ doit réussir <strong>un test d’attaque magique</strong>\_(portée: 10 m). </p><p>Du sang s’écoule de la bouche,\_du nez, des oreilles et même des yeux de la\_victime, qui subit <strong>1d6 DM par tour pendant\_[rang atteint dans la voie] tours</strong>. </p><p>Ce sort <strong>ignore\_la RD</strong> d’une cible mais les créatures qui ne\_saignent pas y sont immunisées (telles que les\_créatures non vivantes, les goules ou encore\_les dryades). </p><p>Les DM passent à <strong>1d8 au rang 4\_atteint</strong> dans cette voie.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> la durée du sort devient\_[rang atteint dans la voie + Mod. SAG] tours.</p></blockquote>"
