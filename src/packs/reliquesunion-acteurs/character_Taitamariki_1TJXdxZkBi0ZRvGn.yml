  details:
    biography:
      private: "<p>Ce jeune centaure de 13 ans est presque muet et garde en permanence la tête baissée.</p><p>Il est sensible à la détresse de sa mère, @UUID[Actor.x2OiiqdCZOlxz94v]{Kaimoe} et il est souvent témoin des colère de son père, @UUID[Actor.A0N0QlLLdB170Ccf]{Te'Tipu}, sur elle.</p><p>Sans pour autant en avoir la capacité, il pense de plus en plus à empoisonner mortellement son père\_et il souhaite, qu'un jour, il ne rentre pas de sa partie de chasse.</p><p>Ce jeune, un soir après un cauchemar, c'est confié à son grand-père @UUID[Actor.AUMVOCux3piDen0C]{Kaha} sur les agissements de Te'Tipu. Kaha a fortement insisté sur la nécessité de son silence pour le bien de leur famille et des mauvaises conséquences pour sa mère et lui s'il racontait ses mensonges à qui voulait l'entendre.</p><p>Un des PJs se fera-t-il voler une dose de poison par cet adolescent perturbé ?</p>"
      public: <p>Mâle - 13 ans</p>
