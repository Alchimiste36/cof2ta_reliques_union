    appearance:
      private: ''
      public: >-
        <p>Femelle - 58 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Ses
        sourires cachent une grande violence et un stresse de chaque instant
        pour Ka'Huri. Elle traine beaucoup avec {Kaha} et ses deux fils et elle
        partage de plus en plus leur envie de prendre le contr&ocirc;le de la
        r&eacute;gion et de la montagne. Les attaques des Ombres Blanches sont
        des plaies pour ce groupe et ils revendiquent leur place dans cette
        r&eacute;gion. Il faut &eacute;radiquer les Ombres Blanches, il faut
        &eacute;tendre le village et occuper les terres environnantes. Les
        centaures sont plus forts que tous les autres peuples. Au del&agrave; de
        ses id&eacute;es, Ka'Huri est une bonne artisane et surtout &agrave; la
        poterie et &agrave; la fabrication des bougies (c'est d'ailleurs une des
        seule qui arrive &agrave; supporter {Kite'Tihe}). Elle sait combattre et
        elle est assez dou&eacute;e &agrave; la chasse donc cela lui arrive de
        suivre les fr&egrave;res hors du village.</p>
