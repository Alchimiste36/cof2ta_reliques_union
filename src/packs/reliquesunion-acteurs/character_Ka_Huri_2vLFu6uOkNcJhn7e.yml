    _id: ngxefapKgJMwWiw2
    system:
      description: >-
        <p>Ses sourires cachent une grande violence et un stresse de chaque
        instant pour Ka'Huri.</p><p>Elle traine beaucoup avec
        @UUID[Actor.AUMVOCux3piDen0C]{Kaha} et ses deux fils et elle partage de
        plus en plus leur envie de prendre le contrôle de la région et de la
        montagne.</p><p>Les attaques des Ombres Blanches sont des plaies pour ce
        groupe et ils revendiquent leur place dans cette région. Il faut
        éradiquer les Ombres Blanches, il faut étendre le village et occuper les
        terres environnantes. Les centaures sont plus forts que tous les autres
        peuples.</p><p>Au delà de ses idées, Ka'Huri est une bonne artisane et
        surtout à la poterie et à la fabrication des bougies (c'est d'ailleurs
        une des seule qui arrive à supporter
        @UUID[Actor.RThMzXURSyG4AjsL]{Kite'Tihe}).</p><p>Elle sait combattre et
        elle est assez douée à la chasse donc cela lui arrive de suivre les
        frères hors du village.</p>
