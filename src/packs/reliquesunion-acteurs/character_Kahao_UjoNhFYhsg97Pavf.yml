  details:
    biography:
      private: >-
        <p><strong>Kahao est une femelle qui s'occupe beaucoup des préparations
        sortantes du potager, du verger ou des champs</strong>. Saumures,
        séchage, conserves, triage et stockage, elle peut passer ses journées
        enfermée dans ce grand bâtiment du village.</p><p>La plupart des gens la
        trouve dure dans ces relations et elle-même préfère rester seule avec
        les fruits et légumes à préparer. <strong>Elle peut se montrer très
        agressive lorsque l'on critique son travail ou ses méthodes</strong> et
        <strong>elle pourra même devenir violente avec les PJs</strong> qui ne
        la comprennent pas. Elle ne supporte simplement pas d'être critiquer ou
        qu'on l'a regarde de travers.</p><p>Elle ne se sent pas soutenue par son
        conjoint, @UUID[Actor.vU8X9FHu74kiJtcM]{Kai} mais c'est une illusion.
        <strong>Elle est assez paranoïaque</strong>.</p><p>Elle n'en a jamais
        parlé à personne, pas même Kara mais <strong>elle a toujours été
        amoureuse de @UUID[Actor.elGCQN2rjOxAynF3]{Kiliko},</strong> le chef du
        village et elle enrage de sa position dégradée. Elle ressent beaucoup de
        rancoeur envers @UUID[Actor.EhKag5p5a4F31dar]{Tumuaki} sans qu'elle n'y
        soit pour rien dans les illusions de Kahao.</p>
      public: <p>Féminin - 60 ans</p>
