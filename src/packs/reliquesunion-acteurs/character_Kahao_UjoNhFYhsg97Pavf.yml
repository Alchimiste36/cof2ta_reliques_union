    appearance:
      private: ''
      public: >-
        <p>Féminin - 60</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Kahao
        est une femelle qui s'occupe beaucoup des pr&eacute;parations sortantes
        du potager, du verger ou des champs. Saumures, s&eacute;chage,
        conserves, triage et stockage, elle peut passer ses journ&eacute;es
        enferm&eacute;e dans ce grand b&acirc;timent du village. La plupart des
        gens la trouve dure dans ces relations et elle-m&ecirc;me
        pr&eacute;f&egrave;re rester seule avec les fruits et l&eacute;gumes
        &agrave; pr&eacute;parer. Elle peut se montrer tr&egrave;s agressive
        lorsque l'on critique son travail ou ses m&eacute;thodes et elle pourra
        m&ecirc;me devenir violente avec les PJs qui ne la comprennent pas. Elle
        ne supporte simplement pas d'&ecirc;tre critiquer ou qu'on l'a regarde
        de travers. Elle ne se sent pas soutenue par son conjoint, {Kai} mais
        c'est une illusion. Elle est assez parano&iuml;aque. Elle n'en a jamais
        parl&eacute; &agrave; personne, pas m&ecirc;me Kara mais elle a toujours
        &eacute;t&eacute; amoureuse de {Kiliko}, le chef du village et elle
        enrage de sa position d&eacute;grad&eacute;e. Elle ressent beaucoup de
        rancoeur envers {Tumuaki} sans qu'elle n'y soit pour rien dans les
        illusions de Kahao.</p>
