    appearance:
      private: ''
      public: >-
        <p>Féminin - 41</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Cette
        femelle centaure rigoureuse, exigeante et dot&eacute; d'un charisme fort
        est persuad&eacute;e que son avenir est de prendre la place du chef.
        Elle d&eacute;cide de se mettre en couple avec {Iti}, le premier
        n&eacute; d'une famille influente du village. Elle a de nombreuses
        qualit&eacute;s et s'occupe en particulier des besoin en artisanat et du
        suivi des fabrications. Bonne sculptrice, menuisi&egrave;re, forgeronne,
        elle aime le travail bien fait. M&ecirc;me si elle se montrera dure avec
        les PJs ceux qui travailleront consciencieusement auront son attention.
        Son r&ocirc;le et son travail lui prenant toutes ces journ&eacute;es
        elle n'a pas beaucoup de temps &agrave; consacrer &agrave; son conjoint
        et malgr&eacute; de nombreuses ann&eacute;es de couple et leur
        quarantaine pass&eacute;e, ils n'ont pas encore d'enfant.</p>
