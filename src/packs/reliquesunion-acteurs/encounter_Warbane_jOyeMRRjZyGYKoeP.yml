  - folder: fWmjCA560DEw5LaH
    name: Voie du nanti
    type: path
    img: icons/equipment/finger/ring-cabochon-squared-gold.webp
    _id: wBBiBOlCHUaCnGS5
    system:
      description: "<p>«<em>Les pauvres, c’est fait pour être très pauvres\_et les riches très riches !</em>» (Don Salluste, un riche\_noble estranger).</p><hr /><p>Une voie professionnelle correspond généralement à l’éducation du PJ avant qu’il ne\_parte à l’aventure. Un\_PJ peut choisir une voie\_professionnelle au niveau 1 et plus rarement au\_cours de sa carrière de héros.</p><p>Si vous utilisez la règle optionnelle de l’âge\_de départ variable, le MJ pourrait rendre obligatoire d’investir dans une voie professionnelle\_les points de capacité acquis par ce biais.\_</p><p>Une voie professionnelle peut aussi être\_acquise à la suite d’une pause dans une vie\_d’aventures (par exemple, les héros repartent\_à l’aventure après s’être posé pendant dix ans.\_Le\_MJ accorde à chacun quelques rangs dans la\_voie professionnelle de leur choix).\_</p><p><strong>Bonus communautaire.</strong> Tous les personnages qui possèdent une voie professionnelle\_obtiennent un bonus de +3 aux tests d’interaction sociale (généralement CHA) avec un autre\_membre de leur communauté.</p>"
      source: ''
      origin: Atlas d'Osgild et Règles Optionnelles p179
      slug: ''
      subtype: encounter
      capacities:
        - Actor.jOyeMRRjZyGYKoeP.Item.9S7ZN29lro8294hh
