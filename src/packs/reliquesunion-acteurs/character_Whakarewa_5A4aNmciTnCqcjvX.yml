  details:
    biography:
      private: >-
        <p>Cette femelle centaure à la musculature discrète est capable de tenir
        un marteau de forge durant plusieurs jours sans avoir une seule
        courbature.</p><p>Contrairement à son conjoint
        @UUID[Actor.ZFFGsUvkAO1nS9PD]{Kaipara} elle est très exigeante et elle
        peut se montrer hautaine voir méprisante face à un travail bâclé ou un
        épuisement physique. Elle n'est pas là pour faire de la dentelle, des
        runes ou des fioritures, sa forge est efficace, maîtrisée et
        fonctionnelle.</p><p>On lui confie souvent la restauration des pièces
        mécaniques des différentes machines du Village. Elle a entre autre
        remplacé l'engrenage principal de la machine reliée à la roue de la
        cascade. Sans aucune contradiction, Whakarewa est la cheffe de la forge
        et il faudra son aval pour l'utiliser.</p><p>Leur différence de
        caractère n'empêche par Kaipara et Whakarewa de s'aimer comme au premier
        jour même si cette dernière est souvent atterrée par l'humour vaseux de
        son conjoint.</p>
      public: <p>Femelle - 61 ans</p>
