    properties: >-
      <div class="cof1-capacity-import">
              <p><u><strong>Immortel</strong></u> :</p>
              <p>lorsqu'il tombe &agrave; 0 PV, seul le corps du n&eacute;cromant est d&eacute;truit. Le d&eacute;mon qui l'habite pourra en investir un autre dans les 24 heures et disposer de nouveau de tous ses pouvoirs et facult&eacute;s.</p>
      <p>Il faut un rituel sp&eacute;cial et rare pour venir &agrave; bout du
      d&eacute;mon.&nbsp;</p>

      <p>Retrouver le d&eacute;positaire de ce savoir perdu ou le manuscrit
      d&eacute;crivant les modalit&eacute;s du rituel doit &ecirc;tre le fruit
      d'une qu&ecirc;te &agrave; part enti&egrave;re.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Fauchage</strong></u> :</p>
              <p>sur un r&eacute;sultat de 15 &agrave; 20 au test d'attaque, si l'attaque est r&eacute;ussie, la victime doit r&eacute;ussir au choix un test de FOR ou de DEX difficult&eacute; [10+Mod. de FOR de la cr&eacute;ature] ou &ecirc;tre renvers&eacute;e.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Dévorer</strong></u> :</p>
              <p>&nbsp;lorsque la cr&eacute;ature r&eacute;ussit une attaque avec un r&eacute;sultat de 15 &agrave; 20 sur un jet de d20, il saisit sa proie entre ses membres et lui inflige imm&eacute;diatement une attaque gratuite suppl&eacute;mentaire.</p>
      <p>Si la FOR de la cible est inf&eacute;rieure ou &eacute;gale au
      pr&eacute;dateur, elle est de plus renvers&eacute;e et immobilis&eacute;e.
      Pour se lib&eacute;rer, la victime doit r&eacute;ussir un test de FOR
      oppos&eacute; lors de son tour et cela lui demande une action de mouvement
      (et une autre pour se relever si elle a r&eacute;ussi).</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Démon</strong></u> :</p>
              <p>&nbsp;<br>&nbsp;<br>les d&eacute;mons ne sont pas consid&eacute;r&eacute;s comme des cr&eacute;atures non vivantes. Toutefois, ils partagent avec celles-ci de nombreux traits.</p>
      <p>Ils ne respirent pas, ne dorment jamais, ne connaissent pas la fatigue
      et sont immunis&eacute;es au poison et aux maladies non magiques.</p>

      <p>Ils n'ont pas besoin de se sustenter, du moins pas avec des nourritures
      terrestres les ombres et y dispara&icirc;tre. Il peut en ressortir quand
      bon lui semble, &agrave; une distance maximale de 20 m de son point de
      disparition &ndash; toujours au prix d'une action de mouvement. Tant qu'il
      est dans les ombres, le d&eacute;mon mineur est insensible &agrave; tout
      type de DM &ndash; hormis les DM de zone.</p>

      <p>Il peut cependant &ecirc;tre r&eacute;v&eacute;l&eacute; &agrave;
      l'aide d'une source&nbsp;</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Lent</strong></u> :</p>
              <p>la cr&eacute;ature&nbsp;ne se d&eacute;place que de 15 m&egrave;tres par action de mouvement.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Vitalité Surnaturelle</strong></u> :</p>
              <p>La Cr&eacute;ature r&eacute;cup&egrave;re 5 PV par tour, sauf si les DM subis sont de feu ou d'acide.&nbsp;</p>
      <p>M&ecirc;me &agrave; 0 PV, il continue &agrave;
      r&eacute;g&eacute;n&eacute;rer les tissus morts &agrave; moins qu'on ne
      br&ucirc;le son corps.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Tueur fantasmagorique*</strong></u> :</p>
              <p style="text-align: justify;">Ce sort invoque les pires terreurs d&rsquo;une cr&eacute;ature vivante et lui fait croire &agrave; sa propre mort. Le <strong>PJ</strong> doit r&eacute;ussir un test d&rsquo;attaque magique (port&eacute;e : 20 m) en opposition &agrave; un test d&rsquo;attaque magique de la cible (si la cr&eacute;ature n&rsquo;a pas d&rsquo;attaque magique, on utilise alors son attaque au contact en appliquant un malus de -3).</p>
      <p style="text-align: justify;">La victime fait un test de
      <strong>SAG</strong> difficult&eacute; [10 + Mod.
      d&rsquo;<strong>INT</strong>] pour r&eacute;sister. En cas
      d&rsquo;&eacute;chec, elle tombe &agrave; 0 <strong>PV</strong>. En cas de
      succ&egrave;s, elle perd l&rsquo;&eacute;quilibre et tombe par terre. Une
      cr&eacute;ature ne peut &ecirc;tre la cible de ce sort qu&rsquo;une fois
      par jour, et le <strong>PJ</strong> ne peut pas affecter un personnage ou
      une cr&eacute;ature de niveau sup&eacute;rieur au sien.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Ombre mortelle*</strong></u> :</p>
              <p style="text-align: justify;">Le <strong>PJ </strong>choisit une cible. L&rsquo;<strong>ombre</strong> de celle-ci attaque son propri&eacute;taire pendant [3 + Mod. de <strong>SAG</strong>] tours (port&eacute;e 20 m) en cas de r&eacute;ussite d&rsquo;un test d&rsquo;attaque magique. L&rsquo;<strong>ombre</strong> poursuit sa cible partout o&ugrave; elle se r&eacute;fugie.</p>
      <p style="text-align: justify;"><strong style="color: #626776;">Ombre
      </strong>:</p>

      <ul>

      <li style="text-align: justify;">1 attaque par tour,</li>

      <li style="text-align: justify;">att = att de la cible,</li>

      <li style="text-align: justify;"><strong>DM</strong> = <strong>DM
      </strong>de la cible divis&eacute;s par deux.</li>

      </ul>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Vents des âmes*</strong></u> :</p>
              <p style="text-align: justify;">Le <strong>PJ </strong>invoque des esprits tortur&eacute;s qui hurlent et tourmentent un ennemi pendant un nombre de tours &eacute;gal &agrave; son Mod. de <strong>SAG</strong>. Pendant la dur&eacute;e du sort, la cible peine &agrave; se concentrer et ne peut r&eacute;aliser aucune action limit&eacute;e &agrave; moins de r&eacute;ussir un test de <strong>SAG </strong>difficult&eacute; 15 &agrave; chaque tour. De plus, cette temp&ecirc;te n&eacute;crotique inflige automatiquement 1d6 <strong>DM</strong> &agrave; chaque tour.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Désintégration*</strong></u> :</p>
              <p style="text-align: justify;">Le <strong>PJ </strong>projette un rayon mortel dont la port&eacute;e est de 20 m&egrave;tres et qui annule la coh&eacute;sion de la mati&egrave;re, ne laissant derri&egrave;re lui qu&rsquo;un amas de poussi&egrave;re. Un test d&rsquo;attaque magique r&eacute;ussi permet de toucher une cr&eacute;ature et d&rsquo;infliger [6d6 + Mod. d&rsquo;<strong>INT</strong>] <strong>DM</strong>.</p>
      <p style="text-align: justify;">Si le <strong>PJ </strong>vise un objet
      port&eacute; par une cr&eacute;ature, le jet d&rsquo;attaque subit un
      malus de -5. Les objets de tradition et l&eacute;gendaires sont
      insensibles &agrave; ce sort et les objets normaux r&eacute;duits en
      poussi&egrave;re. Aucun objet de plus de 50 kg ne peut &ecirc;tre
      affect&eacute; par ce sort : inutile de tenter de creuser un tunnel par ce
      biais. En revanche, vous pourrez ainsi d&eacute;sint&eacute;grer une porte
      (ou m&ecirc;me une pierre dans un mur).</p>
            </div>
