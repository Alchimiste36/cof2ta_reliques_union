  - folder: d9NqfxN66ml5JbEw
    name: Rune de tradition
    type: capacity
    img: icons/commodities/treasure/token-engraved-purple-glowing.webp
    system:
      description: "<p><strong>Le PJ peut enchanter des objets</strong>. Il peut <strong>créer\_une arme ou une armure dont le niveau de\_magie est égal au maximum de son [niveau / 3]</strong>\_arrondi au supérieur. Il peut enchanter l’objet\_à partir des <strong>enchantements traditionnels de son\_peuple</strong> (exception : les Humains doivent choisir\_une tradition parmi celles des Elfes, Nains,\_Ogres, Orcs et Gobelins). </p><p><strong><span style=\"text-decoration:underline\">À partir du niveau 8</span></strong>,\_le PJ peut également <strong>utiliser les\_ enchantements\_légendaires</strong>. Tout doit se faire en accord avec\_le MJ. Plus d'informations au chapitre \"<em>Les\_objets de traditions et légendaires\" du Livre\_du meneur</em>.</p><p><strong>Il faut un mois de travail et la dépense de 100\_po par niveau de magie pour créer l’objet</strong>. Le\_PJ doit insuffler un peu d’énergie vitale dans\_l’objet : il <strong><span style=\"text-decoration:underline\">sacrifie 1 PV</span></strong> qu’il perd définitivement\_sur son score de PV maximal.</p>"
