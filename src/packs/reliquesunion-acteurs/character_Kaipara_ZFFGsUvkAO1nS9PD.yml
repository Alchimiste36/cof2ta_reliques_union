  details:
    biography:
      private: >-
        <hr>
            <h3>Équipement (import COF1)</h3>
            <p><strong>Ruer/Botter</strong> <span style="opacity:.75">(melee · Lana&#039;Sir)</span></p>
        <p><strong>Marteau à 2 mains de Tonnerre +3</strong> <span
        style="opacity:.75">(melee · Terres d&#039;arran)</span></p>

        <p><strong>Mains nues</strong> <span style="opacity:.75">(melee · Livre
        du joueur p. 157)</span></p>
      public: >-
        <div class="cof1-import-block">

        <p><u><strong>Profil</strong></u> : MYSTIQUE</p>

        <p><u><strong>Peuple</strong></u> : Centaures d&#039;Arkanov</p>

        <p>Lumière des étoiles / Attaques Naturelles</p>

        <p><u><strong>Voie du Peuple Centaure</strong></u></p>

        <p><u>Athlétique</u> / <u>Métabolisme Rustique</u> / Coup de Pattes /
        Maîtrise des Armes Longues / Corps Puissant</p>

        <p><u><strong>Voie des Centaures d&#039;Arkanov</strong></u></p>

        <p><u>Danse de Combat (L)</u> / <u>Science du Combat</u> / Valeurs
        Ancestrales / Tatouage Rituel / Symbole d&#039;Arkanov</p>

        <p><u><strong>Voie de la magie runique (Mystique)</strong></u></p>

        <p>Forgeron* / Rune d’énergie* / <u>Rune de puissance*</u> / <u>Rune de
        garde*</u> / Rune de tradition</p>

        <p><u><strong>Voie de la magie  élémentaliste
        (Mystique)</strong></u></p>

        <p><u>Brumes*</u> / <u>Sous tension*</u> / <u>Armure de terre*</u> /
        <u>Boule de feu*</u> / Intelligence héroïque</p>

        <p><u><strong>Voie de la guerre (Combattant)</strong></u></p>

        <p><u>Posture de combat</u> / <u>Désarmer (L)</u> / <u>Double attaque
        (L)</u> / Attaque circulaire (L) / Attaque puissante</p>

        </div>
    appearance:
      private: ''
      public: >-
        <p>Mâle - 68 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Kaipara
        et sa conjointe {Whakarewa} sont les deux experts en forge du village.
        Tous les villageois savent forger un clou ou tordre une barre de fer
        mais mettez un marteau dans les mains puissante de Kaipara et la forge
        devient un art subtil, respectueux, presque mystique. Il semble
        ressentir la mati&egrave;re pour l'amener &agrave; se plier mieux que sa
        propre volont&eacute;. Ce centaure ne parle pas beaucoup et il ne vaut
        mieux pas le d&eacute;ranger quand il affute une lame ou r&eacute;alise
        un trempe sinon il vous sortira de la forge &agrave; coup de sabot dans
        le joufflu. Il a appris l'art des runes aux c&ocirc;t&eacute;s de sa
        m&egrave;re depuis son plus jeune &acirc;ge et transmets patiemment son
        savoir &agrave; deux de ses enfants, {Ka'Kata} et {Titiro}. Depuis
        quelques temps, il accueille le jeune {Mataro} dans la forge et il
        semble fortement appr&eacute;cier ce jeune sous tensions. Les blagues de
        Kaipara sont catastrophiques mais il pense que &ccedil;a va aider le
        jeune gar&ccedil;on.</p>
