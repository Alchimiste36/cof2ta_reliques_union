  details:
    biography:
      private: >-
        <p>Kaipara et sa conjointe @UUID[Actor.5A4aNmciTnCqcjvX]{Whakarewa} sont
        les deux experts en forge du village. Tous les villageois savent forger
        un clou ou tordre une barre de fer mais mettez un marteau dans les mains
        puissante de Kaipara et la forge devient un art subtil, respectueux,
        presque mystique. Il semble ressentir la matière pour l'amener à se
        plier mieux que sa propre volonté.</p><p>Ce centaure ne parle pas
        beaucoup et il ne vaut mieux pas le déranger quand il affute une lame ou
        réalise un trempe sinon il vous sortira de la forge à coup de sabot dans
        le joufflu. Il a appris l'art des runes aux côtés de sa mère depuis son
        plus jeune âge et transmets patiemment son savoir à deux de ses enfants,
        @UUID[Actor.0zLeG9iYDxAcg6Sk]{Ka'Kata} et
        @UUID[Actor.3FZtGR85wvyjSJ4b]{Titiro}.</p><p>Depuis quelques temps, il
        accueille le jeune @UUID[Actor.vtQwznCk8jlT2WXW]{Mataro} dans la forge
        et il semble fortement apprécier ce jeune sous tensions. Les blagues de
        Kaipara sont catastrophiques mais il pense que ça va aider le jeune
        garçon.</p>
      public: <p>Mâle - 68 ans</p>
