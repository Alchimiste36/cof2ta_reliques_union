  details:
    biography:
      private: >-
        <p>La conjointe de @UUID[Actor.hf1UN77UaRB6Yuqb]{Kaihoko} est une
        Centaure très maigre qui peut passer d'un moment de calme et de
        concentration à une grande colère contre le premier venu.</p><p>Dans la
        plupart des situation, elle est assez gentille et malicieuse, jouant
        avec ces deux adolescents en toute tranquillité mais en quelques
        secondes, un regard désapprobateurs, une trop grande excitation, un
        dégât ou un mot de travers et la colère influe dans les veine de
        Te'Riri. Elle est rarement violente mais elle pourra s'acharner
        verbalement sur un villageois pendant plusieurs heures s'il le
        faut.</p><p>Ses crises de colère n'épargnent pas son conjoint Kaihoko ni
        même son beau-père, @UUID[Actor.AUMVOCux3piDen0C]{Kaha} malgré son fort
        caractère.</p><p>Les deux enfants de Te'Riri, de 14 et 13 ans, partagent
        les valeurs de cette famille plus par peur des représailles que par
        réelle conviction.</p><p>Ayant besoin de concentration, de calme et
        d'éviter tout stresse, Te'Riri est devenue experte du tissage, de la
        corderie et passe aussi beaucoup de temps dans l'atelier de poterie sur
        le banc à bâton.</p>
      public: <p>Féminin - 34 ans</p>
