  details:
    biography:
      private: >-
        <hr>
            <h3>Équipement (import COF1)</h3>
            <p><strong>Ruer/Botter</strong> <span style="opacity:.75">(melee · Lana&#039;Sir)</span></p>
        <p><strong>Gants de Force +3 (Mains nues)</strong> <span
        style="opacity:.75">(melee · Livre du joueur p. 157)</span></p>

        <p><strong>Armure de cuir renforcé</strong> <span
        style="opacity:.75">(armor · Livre du joueur p. 158)</span></p>
      public: >-
        <div class="cof1-import-block">

        <p><u><strong>Profil</strong></u> : COMBATTANT</p>

        <p><u><strong>Peuple</strong></u> : Centaures d&#039;Arkanov</p>

        <p>Lumière des étoiles / Attaques Naturelles</p>

        <p><u><strong>Voie du Peuple Centaure</strong></u></p>

        <p>Athlétique / Métabolisme Rustique / <u>Coup de Pattes</u> / Maîtrise
        des Armes Longues / Corps Puissant</p>

        <p><u><strong>Voie des Centaures d&#039;Arkanov</strong></u></p>

        <p><u>Danse de Combat (L)</u> / <u>Science du Combat</u> / Valeurs
        Ancestrales / Tatouage Rituel / Symbole d&#039;Arkanov</p>

        <p><u><strong>Voie du pugilat (Combattant)</strong></u></p>

        <p><u>Poings de fer</u> / <u>Peau de pierre</u> / <u>Peau d’acier</u> /
        <u>Déluge de coups (L)</u> / Force héroïque</p>

        <p><u><strong>Voie de la maîtrise  des armes
        (Combattant)</strong></u></p>

        <p><u>Arme de prédilection</u> / <u>Science du critique</u> /
        <u>Spécialisation</u> / Attaque parfaite (L) / Riposte</p>

        <p><u><strong>Voie de l’acrobatie (Aventurier)</strong></u></p>

        <p>Acrobate / Grâce féline / Lanceur de couteau / Esquive acrobatique /
        Dextérité héroïque</p>

        </div>
    appearance:
      private: ''
      public: >-
        <p>Féminin - 34</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">La
        conjointe de {Kaihoko} est une Centaure tr&egrave;s maigre qui peut
        passer d'un moment de calme et de concentration &agrave; une grande
        col&egrave;re contre le premier venu. Dans la plupart des situation elle
        est assez gentille et malicieuse, jouant avec ces deux adolescents en
        toute tranquillit&eacute; mais en quelques secondes, un regard
        d&eacute;sapprobateurs, une trop grande excitation, un
        d&eacute;g&acirc;t ou un mot de travers et la col&egrave;re influe dans
        les veine de Te'Riri. Elle est rarement violente mais elle pourra
        s'acharner verbalement sur un villageois pendant plusieurs heures s'il
        le faut. Ses crises de col&egrave;re n'&eacute;pargnent pas son conjoint
        Kaihoko ni m&ecirc;me son beau-p&egrave;re, {Kaha} malgr&eacute; son
        fort caract&egrave;re. Les deux enfants de Te'Riri, de 14 et 13 ans,
        partagent les valeurs de cette famille plus par peur des
        repr&eacute;sailles que par r&eacute;elle conviction. Ayant besoin de
        concentration, de calme et d'&eacute;viter tout stresse, Te'Riri est
        devenue experte du tissage, de la corderie et passe aussi beaucoup de
        temps dans l'atelier de poterie sur le banc &agrave; b&acirc;ton.</p>
