  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: Y4sb9AqFmtgH7shk
    system:
      description: "<p>la flamme de la jeunesse incarnée dans cette jeune centaure femelle à la curiosité maladive et à l'espièglerie dans chaque fibre de son corps. Toujours souriante, ses yeux trahissent souvent son manque d'attention.</p><p>Après avoir trépigner sur les bancs de l'école en début de journée, elle passe son temps à aider qui le souhaite mais surtout pas trop longtemps.\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">Douée dans beaucoup de tâches du Village, elle ne sera peut-être jamais assez assidue pour devenir experte d'un sujet ou d'un artisanat.</span></p><p><span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">En fin de journée, elle est souvent avec @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.EeHmNrec4W6ZBwu5]{Peepi} et @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.9HdmSAxScK9Twvch]{Taiohi}, un frère et une soeur de 7 et 6 ans, a les faire marrer, faire des pirouettes ou leur raconter des histoires d'aventures, de voyages et de dragons.</span></p><p><span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">Elle passe aussi beaucoup de temps avec @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.gWWGE6tcGj7MOU2j]{Miihini} a se raconter des ragots et pur l'aider dans l'entretien des machines du Village.</span></p><p><span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">Les seuls moments où elle peut être triste, c'est lorsqu'elle constate la distance qui commence à les séparer avec son petit frère, @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.vtQwznCk8jlT2WXW]{Mataro}. Elle n'arrive pas a comprendre cette colère bloquée de son frère et son sérieux depuis quelques temps.</span></p><p><span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">L'arrivée des Aventuriers étrangers sera une bénédiction pour Vaiata : de la nouveauté, des histoires, des découvertes et la perspective d'en apprendre plus sur le vaste monde extérieur. Elle bravera tous les interdits pour leur parler et les aider.</span></p>"
