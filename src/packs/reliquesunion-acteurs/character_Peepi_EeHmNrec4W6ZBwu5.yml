  details:
    biography:
      private: >-
        <p>Les deux jeunes enfants de @UUID[Actor.hf1UN77UaRB6Yuqb]{Kaihoko} et
        @UUID[Actor.RD6SRAYZuC4Wypgi]{Haputanga} sont de vrais bouilles d'amour,
        toujours un sourire et un mot gentils à la bouche.</p><p>Ils sont
        souvent entrainés dans des bêtises par
        @UUID[Actor.Nuzfpv18FiNwewCJ]{Vaiata}. Cette dernière aime passer du
        temps avec eux surtout depuis que leur mère est affaiblie par sa
        grossesse.</p><p>Les parents de @UUID[Actor.9HdmSAxScK9Twvch]{Taiohi} et
        Peepi leur laissent beaucoup de liberté mais sont très attentif à leurs
        études et à leurs apprentissages. Très bons élèves, ils sont quand même
        inquiets par la fatigue et les douleurs de leur mère.</p><p>Ils se
        battent presque tous les jours sur le sexe du futur petit frère ou de la
        future petite soeur. Aucun des deux n'est d'accord sur ce qui serait le
        mieux pour eux.</p>
      public: <p>Mâle - 6 ans</p>
