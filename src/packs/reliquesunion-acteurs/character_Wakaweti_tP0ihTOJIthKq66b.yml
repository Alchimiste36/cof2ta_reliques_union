  details:
    biography:
      private: "<p>Le premier né de @UUID[Actor.elGCQN2rjOxAynF3]{Kiliko} a le caractère pour prendre la succession de son père à la tête du village, dur, tranchant lors des conflits et obtus. Cette avenir est bousculé par son amour pour @UUID[Actor.btvS9qEFveBlGv7J]{Aroha}, sa cousine directe. La loi leur interdisant de se reproduire, Wakaweti choisi de protéger le village par sa grande maitrise des armes et des danses de combat.</p><p>C'est un combattant impressionnant avec un mental serré autour des traditions, rites et dogmes de la communauté.\_</p><p>Il prend la défense de son père à chaque fois que la famille de @UUID[Actor.AUMVOCux3piDen0C]{Kaha} l'attaque sur les décisions qui sont prises ou sur sa vision sur le village.</p><p>Il est le responsable de l'armurerie et s'occupe en priorité de frapper la cloche du village pour créer la bulle de silence.</p><p>Il aime de tout son coeur ses parents mais est de plus en plus en conflit avec les pensées de sa mère.</p>"
      public: <p>Mâle - 43 ans</p>
