    appearance:
      private: ''
      public: >-
        <p>Mâle - 43 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">le
        premier n&eacute; de Kiliko a le caract&egrave;re pour prendre la
        succession de son p&egrave;re &agrave; la t&ecirc;te du village, dur,
        tranchant lors des conflits et obtus. Cette avenir est bouscul&eacute;
        par son amour pour {Karekau}, sa cousine directe. La loi leur
        interdisant de se reproduire, {Wakaweti} choisi de prot&eacute;ger le
        village par sa grande maitrise des armes et des danses de combat. C'est
        un combattant impressionnant avec un mental serr&eacute; autour des
        traditions, rites et dogmes de la communaut&eacute;.&nbsp;</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Il
        prend la d&eacute;fense de son p&egrave;re &agrave; chaque fois que la
        famille de {Kaha} l'attaque sur les d&eacute;cisions qui sont prises ou
        sur sa vision sur le village. Il est le responsable de l'armurerie et
        s'occupe en priorit&eacute; de frapper la cloche du village pour
        cr&eacute;er la bulle de silence. Il aime de tout son coeur ses parents
        mais est de plus en plus en conflit avec les pens&eacute;es de sa
        m&egrave;re.</p>
