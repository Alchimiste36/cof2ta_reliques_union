    name: Rune d’énergie
    type: capacity
    img: icons/commodities/treasure/token-engraved-blue-glowing.webp
    system:
      description: "<p>En réalisant <strong>un rituel de cinq minutes</strong>, le PJ\_<strong>enchante un bijou pour 24 h</strong>. </p><p>Celui-ci <strong>permet\_de relancer un d20 une fois par combat</strong> sur un\_test d’attaque, de FOR, DEX ou CON. </p><p>Un seul\_bijou de ce type peut être porté.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> chaque jour, la première rune\_d’énergie créée par le PJ ne lui coûte aucun PM.</p></blockquote>"
      source: ''
      origin: Livre du Joueur p.137
