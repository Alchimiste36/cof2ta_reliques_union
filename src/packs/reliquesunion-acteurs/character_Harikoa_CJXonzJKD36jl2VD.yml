  - folder: Xju3wioBS7IbVYJY
    name: Fortifiant
    type: capacity
    img: icons/consumables/potions/potion-jar-corked-glowing-blue.webp
    _id: mESr1UMgYiSArnaq
    system:
      description: "<p>Un breuvage étrange qui <strong>guérit [1d4 + rang] PV</strong>\_et permet de gagner un bonus de <strong>+3 aux [rang\_+ 1] prochains tests effectués</strong> (dans une limite\_de temps de 12 heures).</p><p>Boire un fortifiant\_nécessite une action de mouvement.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée\_:</span></strong></span> le PJ dispose de deux fortifiants en plus des élixirs qu’il peut normalement\_préparer chaque jour.</p></blockquote>"
      source: ''
      origin: Livre du Joueur p.132
      slug: ''
      inGame: "<p>La première action permet de réaliser le Soin sur une cible unique.</p><p>La deuxième action activable permet d'obtenir le bonus de +3 à tous les tests. Le nombre de tests effectué est à gérer manuellement.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">ATTENTION :</span></strong></span> Les Elixirs dépendent des statistiques de d'Alchimiste. Si le PJ décide de confier ses élixirs à une autre personne, c'est tout de même l'Alchimiste qui devra faire l'action.\_Vous pouvez aussi utiliser l'Équipement :\_cof2ta_reliques_union.reliquesunion-objets.Item.PEDCC9tvuGudKqoD]{Fiole de Fortifiant}</p></blockquote>"
      subtype: ''
      actionType: none
