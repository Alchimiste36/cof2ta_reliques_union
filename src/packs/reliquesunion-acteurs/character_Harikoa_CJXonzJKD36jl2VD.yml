    name: Voie de la Magie runique
    type: path
    img: icons/skills/trades/smithing-anvil-silver-red.webp
    system:
      description: "<h5>Aucun des sorts de la voie de la magie runique\_ne peut bénéficier des effets d’une concentration.</h5><p>Comme expliqué dans le Livre du joueur, au rang 5, le PJ a le choix entre trois capacités. Le rang 5 est donc configuré pour recevoir une capacité liée permettant de glisser-déposer la capacité choisie. Les trois capacités sont présentes dans le dossier Capacités &gt; Capacités de Mystiques &gt; Magie runique.</p><ul><li><p>Pour créer des armes et des armures traditionnelles ou légendaires, choisissez :\_cof2ta_reliques_union.reliquesunion-objets.Item.jnfcjuZVWcG0wPV1]{Rune de tradition}</p></li><li><p>Alternativement, si le joueur préfère créer des objets\_magiques plutôt que des armes et armures de tradition,\_vous pouvez remplacer le rang 5 de la voie par la capacité\_suivante :\_cof2ta_reliques_union.reliquesunion-objets.Item.p2M2C94LB5hk0OGW]{Rune de pouvoir}</p></li><li><p>Si vous ne souhaitez pas rendre accessible la création\_d’objets magiques par vos joueurs, vous pouvez remplacer\_le rang 5 de la voie par la capacité suivante :\_cof2ta_reliques_union.reliquesunion-objets.Item.ProcYMp0MSwZ1zBa]{Endurer}</p></li></ul>"
