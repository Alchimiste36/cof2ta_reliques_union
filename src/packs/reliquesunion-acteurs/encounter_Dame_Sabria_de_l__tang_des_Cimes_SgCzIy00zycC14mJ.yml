    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: >-
        <p>Noble du Ravin de Novrak - dirigeante de la deuxi&egrave;me famille
        la plus influente de la ville</p>

        <p>Caract&egrave;re : Politicienne - ambitieuse - Manipulatrice -
        Populiste</p>

        <p>Propos :</p>

        <ul>

        <li>Je suis d'accord avec vous, au del&agrave; d'accueillir les
        centaures, nous devons nous montrer fort face &agrave; eux. Je suis
        pr&ecirc;te &agrave; leur faire confiance et j'entend les craintes de
        certains Novraks et Novrakis. Les centaures devront faire leur
        preuves</li>

        <li>Moi Sabria de l'&Eacute;tang des Cimes a toujours milit&eacute; pour
        aller sauver nos villageois kidnapp&eacute;s. On ne m'a pas suivi mais
        je suis heureuse de saoir cette menace enfin r&eacute;gl&eacute;e.
        Toutes les familles qui n'ont pas retrouv&eacute;e leur proches
        kidnapp&eacute;s seront largement d&eacute;dommag&eacute;s par la maison
        de l'&Eacute;tang des Cimes.</li>

        <li>Ne nous voilons pas la face, les races inertes sont indispensables
        pour l'&eacute;conomie de notre belle cit&eacute;. On devons les
        accueillir mais nous n'avons pas &agrave; supporter leur
        sup&eacute;riorit&eacute; non plus !</li>

        <li>Nous sommes fort ensemble et ma famille s'engage &agrave;
        prot&eacute;ger le Ravin de Novrak contre toutes les menaces</li>

        </ul>
