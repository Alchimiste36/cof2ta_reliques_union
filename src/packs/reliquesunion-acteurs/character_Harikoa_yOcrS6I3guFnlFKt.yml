        <p><u><strong>Voie du Peuple Centaure</strong></u></p>

        <p>Athlétique / Métabolisme Rustique / Coup de Pattes / Maîtrise des
        Armes Longues / Corps Puissant</p>

        </div>
    appearance:
      private: ''
      public: >-
        <p>Femelle - 24 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Cette
        jeune femelle Centaure est, &agrave; l'image de sa famille, optimiste et
        plut&ocirc;t joyeuse au quotidien. Elle n'a jamais vraiment eu beaucoup
        d'amie et quand elle &eacute;tait petite elle essayait de trainer avec
        sa grande soeur. A 18 ans, elle passa une journ&eacute;e avec {Hei Tunu}
        pour l'aider &agrave; g&eacute;rer les pr&eacute;parations de l'Alambic.
        La jeune Harikoa est tomb&eacute;e amoureuse de cette machine et de la
        transformation qu'elle permet. L'&eacute;tude des plantes et de leurs
        extraits, la distillation des huiles, la fermentation des
        c&eacute;r&eacute;ales, le dosage pour rendre d&eacute;licieux une
        bi&egrave;re r&acirc;peuse&hellip; autant de chose qu'elle
        &eacute;tudie, exp&eacute;rimente et teste presque tous les jours aux
        c&ocirc;t&eacute;s de Hei Tunu. Elle doit faire d'autres t&acirc;ches
        pour la communaut&eacute; mais &agrave; chaque instant ses
        pens&eacute;es sont tourner vers la prochaine recette qu'elle va
        modifier ou inventer. L'une des huiles essentielles porte son nom
        {l'Harikoa}. Elle a d&eacute;couvert, avec l'aide et le soutien de
        {Kara} une huile qui permet de d&eacute;tendre tous les muscles du corps
        apr&egrave;s inhalation pendant plusieurs minutes et accentue
        l'agilit&eacute; et la pr&eacute;cision de consommateur. Tr&egrave;s
        appr&eacute;ci&eacute;e des travailleurs et des combattants, cette
        huile, extraite d'une racine et m&eacute;lang&eacute;e &agrave; des
        spores de champignons, est assez rare.</p>
