    appearance:
      private: ''
      public: >-
        <p>Femelle - 18 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">la
        flamme de la jeunesse incarn&eacute;e dans cette jeune centaure femelle
        &agrave; la curiosit&eacute; maladive et &agrave; l'espi&egrave;glerie
        dans chaque fibre de son corps. Toujours souriante, ses yeux trahissent
        souvent son manque d'attention. Apr&egrave;s avoir tr&eacute;pigner sur
        les bancs de l'&eacute;cole en d&eacute;but de journ&eacute;e, elle
        passe son temps &agrave; aider qui le souhaite mais surtout pas trop
        longtemps. Dou&eacute;e dans beaucoup de t&acirc;ches du Village, elle
        ne sera peut-&ecirc;tre jamais assez assidue pour devenir experte d'un
        sujet ou d'un artisanat. En fin de journ&eacute;e, elle est souvent avec
        {Peepi} et {Taiohi}, un fr&egrave;re et une soeur de 7 et 6 ans a les
        faire marrer, faire des pirouettes ou leur raconter des histoires
        d'aventures, de voyages et de dragons. Elle passe aussi beaucoup de
        temps avec {Miihini} a se raconter des ragots et pur l'aider dans
        l'entretien des machines du Village. Les seuls moments o&ugrave; elle
        peut &ecirc;tre triste, c'est lorsqu'elle constate la distance qui
        commence &agrave; les s&eacute;parer avec son petit fr&egrave;re,
        {Mataro}. Elle n'arrive pas a comprendre cette col&egrave;re
        bloqu&eacute;e de son fr&egrave;re et son s&eacute;rieux depuis quelques
        temps. L'arriv&eacute;e des Aventuriers &eacute;trangers sera une
        b&eacute;n&eacute;diction pour {Vaiata Viata} : de la nouveaut&eacute;,
        des histoires, des d&eacute;couvertes et la perspective d'en apprendre
        plus sur le vaste monde ext&eacute;rieur. Elle bravera tous les
        interdits pour leur parler et les aider.</p>
