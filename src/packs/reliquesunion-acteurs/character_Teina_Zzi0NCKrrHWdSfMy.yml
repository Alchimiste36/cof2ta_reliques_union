  details:
    biography:
      private: >-
        <p>Bien qu'elle soit certainement la meilleure amie de
        @UUID[Actor.Nuzfpv18FiNwewCJ]{Vaiata}, Teina ne partage pas vraiment sa
        fougue. Beaucoup plus raisonnable, on peut dire qu'elle porte sur ses
        épaules le rôle de grande soeur pour la naïve
        @UUID[Actor.CJXonzJKD36jl2VD]{Harikoa} et son renfermé petit frère
        @UUID[Actor.j3OVVzmkWhACNokh]{Te'Whakama}.</p><p>Sa mère est un vrai
        modèle pour elle et Teina voudrait pouvoir être aussi forte et stratège
        qu'elle. Ces derniers temps, elle ressent la même peur et colère que Toa
        face aux Ombres Blanches. Elle comprend bien que sa force ne viendra
        jamais de sa maitrise des danses de combat comme sa mère mais avec les
        années qui passent elle se rend compte que ses yeux, son caractère et
        une bonne touche de manipulation permettaient d'atteindre un objectif
        plus facilement qu'un conflit physique. Elle en use beaucoup sur ses
        deux oncles, leur donnant un discours qu'ils veulent entendre tout en
        leur instillant quelques
        idées.</p><p>@UUID[Actor.A0N0QlLLdB170Ccf]{Te'Tipu} et
        @UUID[Actor.hf1UN77UaRB6Yuqb]{Kaihoko} l'amènent depuis un an à la
        chasse avec eux, lui confient des secrets et semblent l'apprécier au
        delà de leur détestation pour ses parents.</p><p>C'est peut-être la
        seule villageoise qui peut faire entendre raison à Vaiata Viata
        lorsqu'elle se met en tête une nouvelle folie. Elle pousse discrètement
        son frère à, enfin, déclarer officiellement sa flamme pour son amie.</p>
      public: <p>Femelle - 27 ans</p>
