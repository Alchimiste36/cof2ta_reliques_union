  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: UQgyWKcOrBjnRE87
    system:
      description: >-
        <p>Te'Whikitoria a longtemps été poussée a devenir une grande guerrière
        ou une talentueuse chasseresse par sa mère,
        @UUID[Actor.2vLFu6uOkNcJhn7e]{Ka'Huri}, mais l'influence passive de son
        père, @UUID[Actor.2t5SemjHrF5ukWua]{Kaiputu}, et sa joie devant toutes
        les merveilles de la nature a séduit Te'Whikitoria.</p><p>Elle se
        passionne rapidement pour l'étude de la faune et de la flore et la
        découverte des particularités de chaque espèces.
        @UUID[Actor.T99bZAdCe7gkYs3V]{Kara}, la soigneuse, la prend sous son
        aile et s'accorde sur ses compétences et son goût pour la préparation de
        baumes, potions et autres remèdes. Grâce au soutien de sa petite soeur,
        @UUID[Actor.HhfWAaUYHXKxHMFj]{Hei Tunu} et de sa connaissance dans de
        l'alambic, elle apprend vite et prend plaisir à aider Kara avec les
        blessés ou les malades.</p><p>Kara lui raconte même les secrets et
        émotions des villageois pour que Te'Whikitoria puisse l'aider lors de
        ses séances de psychologie.</p>
