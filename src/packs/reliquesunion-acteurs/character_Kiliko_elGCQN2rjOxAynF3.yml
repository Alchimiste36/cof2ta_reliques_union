  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: VMLlC469fqgflXLE
    system:
      description: >-
        <p>Chef du village et époux de @UUID[Actor.EhKag5p5a4F31dar]{Tumuaki},
        il prend sa responsabilité très au sérieux.</p><p>Toujours balancé entre
        l'envie de faire plaisir et le risque prit par la communauté face aux
        PJs. Il est dure mais juste. Il ne pardonne rien en cas d'erreur mais
        porte une grande attention aux efforts qui sont fait. Son couple avec
        @UUID[Actor.EhKag5p5a4F31dar]{Tumuaki} est un vrai soutien pour lui. Il
        sait qu'elle partage ses valeurs et ses responsabilités.</p><p>Kiliko
        aime profondément tous ses enfants même s'il ne veut pas les privilégier
        face aux autres habitants. A première vue, on pourrait le penser froid
        et distant à cause de cela.</p><p>Son rôle de chef est important pour
        lui et combien même il ne peut plus passer ses journées à s'entrainer,
        il reste un très talentueux combattant bien qu'un petit peu
        rouillé.</p><p>Depuis les premières attaques des Ombres Blanches, Kiliko
        est tiraillé entre poursuivre ces assassins kidnappeurs et les faire
        payer pour leurs crimes et continuer de protéger le village en
        conservant la bulle de secret autour d'Arkanov.</p>
      source: ''
      origin: ''
      slug: ''
      inGame: ''
      subtype: ''
      actionType: none
      learned: true
      rank: 0
      frequency: none
      charges: {}
