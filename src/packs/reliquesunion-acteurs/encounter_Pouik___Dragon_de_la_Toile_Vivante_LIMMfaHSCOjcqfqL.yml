    notes:
      private: "<p>Cette appellation générique regroupe en vérité\_de nombreuses variétés de grandes créatures\_reptiliennes ailées qu'on peut cependant\_regrouper en deux catégories principales: les\_dragons communs et les dragons originels.</p>"
      public: "<p>Également appelée dragon d'Akrähyng ou\_« volant», en référence à la ville orientale qui\_renferme les secrets de leur domestication et\_du commerce juteux qui en découle, cette\_créature est la monture ailée la plus courante\_des Terres d'Arran. </p><p>Longue de presque 10 m\_en comptant leur queue, elles arborent des\_couleurs variées dont les dominantes sont le\_rouge, le vert ou le bleu turquoise.\_</p><p>Une fois adultes, les dragons sont capables\_de cracher du feu.</p>"
