  - name: zBiographie
    type: capacity
    img: >-
      icons/sundries/books/book-open-purple.webp
    _id: ceEoZky0jQc9Ma96
    system:
      description: >-
        <p>Quand on doit déplacer une charge lourde, tirer un tronc énorme ou
        soulever un rocher, on peut compter sur ce Centaure à la musculature
        impressionnante.</p><p>Il ne possède que les base du combat et préfère
        échapper aux entrainements mais rien qu'une claque et on ne relève pas
        rapidement. Il est costaux mais garde un sourire constant sur son
        visage.</p><p>Toujours heureux et serviable, rien ne semble le toucher
        même les noms d'oiseaux qu'il entend de la part de la famille de sa
        conjointe. </p><p>Il est très attentionné avec ses enfants et ne cache
        pas son empathie face aux douleurs de la grossesse de
        @UUID[Actor.RD6SRAYZuC4Wypgi]{Haputanga}. Au village, il s'occupe
        beaucoup du compost et il aime nettoyer les rues, les bâtiments et les
        outils. </p><p>Un vrai maniaque qui apprécie que chaque chose soit à sa
        place et bien propre. Lorsqu'il jardine au potager,
        @UUID[Actor.nqHJEcBPmuo9cAKT]{Peka} ne cesse de la réprimander car pour
        elle rien n'est aussi propre et ranger dans la nature.</p>
