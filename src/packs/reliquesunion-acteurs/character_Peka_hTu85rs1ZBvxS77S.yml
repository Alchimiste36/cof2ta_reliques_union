        </div>
    appearance:
      private: ''
      public: >-
        <p>Femelle - 33 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Cette
        centaure est tout le temps fourr&eacute;e avec sa m&egrave;re ou
        enferm&eacute;e dans le jardin potager. Elle est plut&ocirc;t peureuse
        et stress&eacute;e et, malgr&eacute; quelques remarques de {Kaha} sur sa
        faiblesse apparente, elle partage les id&eacute;es de ce groupe. Elle en
        a marre d'avoir peur et de vivre dans cette "prison" alors que la race
        des centaures est puissante. Elle se sent en s&eacute;curit&eacute; au
        milieu des plantes et elle parle tr&egrave;s peu aux villageois qui se
        bercent dans les valeurs du respect des traditions ou de l'ouverture du
        village sur le monde avec bienveillance et partage. Lorsqu'elle est aux
        c&ocirc;t&eacute;s de {Te'Tipu} ou de {Kaihoko}, elle se sent en
        s&eacute;curit&eacute; mais lorsque {Kaha} est l&agrave;, Peka est
        &eacute;cras&eacute;e par son autorit&eacute; et ses paroles
        guerri&egrave;res. Son conjoint a &eacute;t&eacute; kidnapp&eacute; lors
        de la derni&egrave;re attaque des Ombres Blanches et au-del&agrave; de
        la tristesse, elle ressent une profonde injustice pour sa situation et
        l'inaction de {Kiliko}, le chef du village.</p>
