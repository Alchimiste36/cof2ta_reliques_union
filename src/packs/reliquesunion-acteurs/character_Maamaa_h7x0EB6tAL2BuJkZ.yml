  details:
    biography:
      private: >-
        <p>Elle adore préparer les repas dans la cuisine collective aux côtés de
        son père,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.vU8X9FHu74kiJtcM]{Kai}.
        Ils partagent se plaisir d'adapter les recettes en fonction des goûts
        des villageois et de varier en fonction des fruits ou légumes de saison.
        </p><p>Elle, comme son père, est une combattante très douée et elle a
        remporté beaucoup de combat lors des cérémonies du village. Elle se lève
        tous les jours très tôt pour récolter quelques légumes, s'occuper de la
        cuisine puis, avant de préparer les repas du soir, on peut la trouver
        dans les murailles à faire du sport et des entrainements pour développer
        sa souplesse et ses techniques peu conventionnelles. </p><p>Très peu
        musclée, Maamaa est d'une rare souplesse. Elle peut bondir, glisser ou
        manoeuvrer autour d'un adversaire en évitant tous ses coups. </p><p>Elle
        est extrêmement douée un arc à la main, également.</p>
      public: <p>Femelle - 39 ans</p>
