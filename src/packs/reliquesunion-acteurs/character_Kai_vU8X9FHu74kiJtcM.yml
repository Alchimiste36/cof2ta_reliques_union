  details:
    biography:
      private: >-
        <p>Kai est un centaure assez débonnaire. Il est d'une grande bonté et
        tout le temps favorable aux envies et éxigences des
        villageois.</p><p>Son plus grand plaisir avec sa fille,
        @UUID[Actor.h7x0EB6tAL2BuJkZ]{Maamaa}, est de préparer des repas dans la
        cuisine collective, de trouver de nouvelles recettes, de nouveaux goût
        et associations de saveurs. Il aime beaucoup l'union de sa fille avec le
        talentueux @UUID[Actor.0zLeG9iYDxAcg6Sk]{Ka'Kata} et Kai passe beaucoup
        de temps avec le couple de forgeron du village,
        @UUID[Actor.ZFFGsUvkAO1nS9PD]{Kaipara} et
        @UUID[Actor.5A4aNmciTnCqcjvX]{Whakarewa}.</p><p>En plus de ses talents
        en cuisine, Kai est un archer d'élite mais il ne souhaite pas participer
        aux chasses à l'extérieur du village. Il chasse seulement les animaux
        qui volent au dessus du village ou les mammifères qui s'aventurent sur
        les parois et les hauteurs des montagnes visibles depuis des
        habitations.</p>
      public: <p>Mâle - 59 ans</p>
