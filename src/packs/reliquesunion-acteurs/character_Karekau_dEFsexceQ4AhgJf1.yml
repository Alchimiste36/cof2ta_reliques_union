        avec le même effet).</p><hr /><p><strong>Arme magique de Centaure -
        Karekau</strong></p><ul><li><p>Le porteur de ce bâton ferré peut, par
        une action limitée, faire dormir une cible qu'elle touche pendant 2d4
        rounds. Après cette durée, une cible non volontaire peut réaliser un
        test de CON difficulté 15 ou tomber dans l'inconscience pendant 4d6
        heures. Karekau utilise cette faculté pour s'endormir malgré ses
        douleurs et courbatures.</p></li></ul>
