      public: >-
        <p>Mâle - 98 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">le
        doyen du village et p&egrave;re de {Tumuaki}, malgr&eacute; son grand
        &acirc;ge c'est un centaure respect&eacute; et il le sait. Il joue de sa
        position pour braver les interdit avec une certaine malice. Au premiers
        abords on dirait qu'il est tr&egrave;s conservateur mais pourra prendre
        le parti des PJs si &ccedil;a lui permet d'emb&ecirc;ter le chef du
        village.</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Il
        a tendance &agrave; passer du temps &agrave; observer les membres de sa
        famille et en particulier {Kaha} pour lui r&eacute;p&eacute;ter &agrave;
        longueur de journ&eacute;e qu'il aurait du &ecirc;tre le chef pour que
        le village soit mieux g&eacute;r&eacute; et sa fille, {Kite'Tihe} pour
        grogner avec elle sur l'avenir du village et sur sa maladie.</p>
