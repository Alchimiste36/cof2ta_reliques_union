      description: >-
        <p>Le doyen du village et père de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.EhKag5p5a4F31dar]{Tumuaki}, malgré son grand âge c'est un
        centaure respecté et il le sait. Il joue de sa position pour braver les
        interdit avec une certaine malice. Au premiers abords on dirait qu'il
        est très conservateur mais pourra prendre le parti des PJs si ça lui
        permet d'embêter le chef du village.</p><p>Il a tendance à passer du
        temps à observer les membres de sa famille et en particulier
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.AUMVOCux3piDen0C]{Kaha} pour lui répéter à longueur de
        journée qu'il aurait du être le chef pour que le village soit mieux géré
        et sa fille, @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.RThMzXURSyG4AjsL]{Kite'Tihe} pour grogner avec
        elle sur l'avenir du village et sur sa maladie.</p>
