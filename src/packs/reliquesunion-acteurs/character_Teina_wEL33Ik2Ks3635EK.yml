    appearance:
      private: ''
      public: >-
        <p>Femelle - 27 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Bien
        qu'elle soit certainement la meilleure amie de {Vaiata Viata}, Teina ne
        partage pas vraiment sa fougue. Beaucoup plus raisonnable, on peut dire
        qu'elle porte sur ses &eacute;paules le r&ocirc;le de grande soeur pour
        la na&iuml;ve {Harikoa} et son renferm&eacute; petit fr&egrave;re
        {Te'Whakama}. Sa m&egrave;re est un vrai mod&egrave;le pour elle et
        Teina voudrait pouvoir &ecirc;tre aussi forte et strat&egrave;ge
        qu'elle. Ces derniers temps, elle ressent la m&ecirc;me peur et
        col&egrave;re que Toa face aux Ombres Blanches. Elle comprend bien que
        sa force ne viendra jamais de sa maitrise des danses de combat comme sa
        m&egrave;re mais avec les ann&eacute;es qui passent elle se rend compte
        que ses yeux, son caract&egrave;re et une bonne touche de manipulation
        permettaient d'atteindre un objectif plus facilement qu'un conflit
        physique. Elle en use beaucoup sur ses deux oncles, leur donnant un
        discours qu'ils veulent entendre tout en leur instillant quelques
        id&eacute;es. {Te'Tipu} et {Kaihoko} l'am&egrave;nent depuis un an
        &agrave; la chasse avec eux, lui confient des secrets et semblent
        l'appr&eacute;cier au del&agrave; de leur d&eacute;testation pour ses
        parents. C'est peut-&ecirc;tre la seule villageoise qui peut faire
        entendre raison &agrave; Vaiata Viata lorsqu'elle se met en t&ecirc;te
        une nouvelle folie. Elle pousse discr&egrave;tement son fr&egrave;re
        &agrave;, enfin, d&eacute;clarer officiellement sa flamme pour son
        amie.</p>
