      description: "<p>Le personnage subit <strong>un dé malus aux tests\_d’interaction sociale avec les gens de la bonne\_société</strong>. </p><p>Il\_gagne un bonus de <strong>+3 à tous les tests\_effectués pour résister aux privations</strong> (soif, faim)\_et <strong>pour passer inaperçu</strong>. Tous les misérables se\_ressemblent, non ? </p><p>En\_ville, il <strong>récupère automatiquement 1\_DR par nuit</strong>, même s’il dort dans la\_rue où n’achète rien à manger</p>"
