    appearance:
      private: ''
      public: >-
        <p>Mâle - 47 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">les
        deux derniers fils de {Kaha} sont tr&egrave;s similaires autant par leur
        physique que par leur &eacute;tat d'esprit. Combatifs, revendicateurs,
        s&eacute;v&egrave;res et col&eacute;riques, les deux font la paire. Dans
        la lign&eacute;e de leur p&egrave;re et sous l'influence de leur tante
        {Kite'Tihe}, ils voient chaque conflits ou probl&egrave;mes comme une
        offense contre leur famille. Ils per&ccedil;oivent les regards et les
        sourires autour d'eux comme des moqueries orchestr&eacute;es par le chef
        {Kiliko}. La chose qui irrite le plus {Te'Tipu} c'est de voir ses deux
        petits enfants, {Taiohi} et {Peepi}, jouer avec la d&eacute;sinvolte et
        irresponsable {Vaiata Viata}. Que son gendre {Kaihoroi} soit un faible
        passe encore mais que sa propre fille, {Haputanga}, partage cette joie,
        le rend fou de col&egrave;re. Les deux fr&egrave;res passe la plupart de
        leur temps au bucheronnage &agrave; l'int&eacute;rieur ou &agrave;
        l'ext&eacute;rieur du Village pouvant concentrer leur col&egrave;re et
        leur rage sur les troncs. Il leur arrive fr&eacute;quemment de partir
        chasser dans les montagnes environnantes malgr&eacute; l'interdiction du
        chef du village.</p>
