  details:
    biography:
      private: "<p>Grooguen est un ancien combattant pour le Clan des Walkers. Face à la barbarie de ses chefs et à leurs agressions lors des pillages, il a réussi à fuir. C'est la\_@UUID[Actor.ygBtxpDi9QGPhlbP]{Capitaine Dracki} qui l'a trouvé ivre mort après une baguarre de taverne entouré d'une dizaine de corps inconscients.</p><p>Dracki a offert un but pour Grooguen et il est fidèle depuis à la Toile Vivante.</p><p>D'aucune manière, il ne fera partie d'une Maille qui prendrait la direction de l'ile du Clan des Walkers et pour rien au monde il ne retournera là-bas.</p>"
      public: ""
    appearance:
      private: ""
      public: >-
        <p>Cet homme au physique de guerrier possède des tatouages sur une bonne
        partie du son corps. Son physique ne fait aucun doute, il doit être
        originaire de l'Yrlanie ou du Clan des Walkers.</p><p>Ses poings sont
        recouvert de tissu et à première vue, il ne faut pas l'asticoter au
        risque de se prendre un bourre-pif solide.</p>
    notes:
      private: ""
      public: ""
