  - name: zBiographie
    type: capacity
    img: >-
      https://assets.forge-vtt.com/bazaar/core/icons/sundries/books/book-open-purple.webp
    _id: 518s9URYL46TGbTf
    system:
      description: "<p>La fille aînée de\_Te'Tipu est une magnifique femelle Centaure radieuse et épanouie aux côtés de son conjoint, Kaihoroi.</p><p>Elle ne partage rien des idées de son père ou de son oncle mais elle préfère se taire, les laisser parler et faire sa vie en famille. Elle garde un fort contact avec sa mère,\_Kaimoe et elle essaye de la convaincre de quitter son conjoint depuis des années pour s'émanciper de l'influence de Kaha. Son père l'a déjà frappé pour son insolence mais cette épisode l'a rendu encore plus déterminée.</p><p>Elle est maman de la petite Taiohi de 7ans et du petit Peepi de 6 ans. Des enfants très agréables et rieurs.</p><p>Elle est enceinte d'un troisième enfant qui devrait voir le jour d'ici un mois (grossesse de 11 mois sur 12). Sa grossesse la met en joie même si ces dernières semaines à a de plus en plus de douleurs et de mal à faire des activités.</p><p><strong>Elle passe beaucoup de temps dans la salle commune ou auprès de Kara, la soigneuse.</strong> Elle ressent souvent une crainte que son père, son oncle ou son grand-père ne s'en prennent un jour à son conjoint.</p>"
