  details:
    biography:
      private: "<p>La fille aînée de\_@UUID[Compendium.world.reliquesunion-acteurs.Actor.A0N0QlLLdB170Ccf]{Te'Tipu} est une magnifique femelle Centaure radieuse et épanouie aux côtés de son conjoint, @UUID[Compendium.world.reliquesunion-acteurs.Actor.V9ITbgWBBsUeixHA]{Kaihoroi}.</p><p>Elle ne partage rien des idées de son père ou de son oncle mais elle préfère se taire, les laisser parler et faire sa vie en famille. Elle garde un fort contact avec sa mère,\_@UUID[Compendium.world.reliquesunion-acteurs.Actor.x2OiiqdCZOlxz94v]{Kaimoe} et elle essaye de la convaincre de quitter son conjoint depuis des années pour s'émanciper de l'influence de @UUID[Compendium.world.reliquesunion-acteurs.Actor.AUMVOCux3piDen0C]{Kaha}. Son père l'a déjà frappé pour son insolence mais cette épisode l'a rendu encore plus déterminée.</p><p>Elle est maman de la petite @UUID[Compendium.world.reliquesunion-acteurs.Actor.9HdmSAxScK9Twvch]{Taiohi} de 7ans et du petit @UUID[Compendium.world.reliquesunion-acteurs.Actor.EeHmNrec4W6ZBwu5]{Peepi} de 6 ans. Des enfants très agréables et rieurs.</p><p>Elle est enceinte d'un troisième enfant qui devrait voir le jour d'ici un mois (grossesse de 11 mois sur 12). Sa grossesse la met en joie même si ces dernières semaines à a de plus en plus de douleurs et de mal à faire des activités.</p><p><strong>Elle passe beaucoup de temps dans la salle commune ou auprès de @UUID[Compendium.world.reliquesunion-acteurs.Actor.T99bZAdCe7gkYs3V]{Kara}, la soigneuse.</strong> Elle ressent souvent une crainte que son père, son oncle ou son grand-père ne s'en prennent un jour à son conjoint.</p>"
      public: <div class="cof1-import-block"><p>Femelle - 29 ans - Enceinte</p></div>
