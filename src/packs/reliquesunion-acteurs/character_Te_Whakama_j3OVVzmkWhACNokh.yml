  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: aUVuDnfIVjnnUdkR
    system:
      description: >-
        <p>Cet adolescent assez timide a pour passion les rites et rituels des
        centaures. A chaque cérémonie, danse, union ou décès, il participer aux
        préparations, aux discours et au respect des traditions sacrées de son
        peuple. Il y voit de la beauté et une certaine harmonie. </p><p>Plongé
        dans les livre de la bibliothèque, il a remis en place une ancienne
        tradition pour célébrer la perfection de leur village : la Danse de
        l'Union. Une fois tous les deux ans, les meilleurs danseurs de combat
        prépare une cérémonie sur la place du village mélangeant une grande
        chorégraphie guerrière et synchronisée. </p><p>Grâce à ses recherches il
        a pu refaire vivre ce rituel pour la première fois l'année dernière.
        </p><p>Il est amoureux de @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.Nuzfpv18FiNwewCJ]{Vaiata} depuis
        aussi longtemps qu'il s'en souvient et même s'il a un peu de mal à
        suivre son rythme, à chaque fois qu'elle est là, le jeune Te'Whakama
        s'illumine.</p>
