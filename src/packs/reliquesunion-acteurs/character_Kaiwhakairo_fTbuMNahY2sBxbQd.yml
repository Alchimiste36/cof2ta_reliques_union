  details:
    biography:
      private: >-
        <p>Ce centaure mâle aime particulièrement sa famille, s'entrainer avec
        son grand frère @UUID[Actor.tP0ihTOJIthKq66b]{Wakaweti} malgré leurs
        caractères diamétralement opposés et rendre service à la communauté.
        </p><p>Il n'a aucune envie de devenir chef du village et il est un
        soutien discret de sa soeur @UUID[Actor.4N3OVVj0dI5LPfNR]{Kamura}.
        </p><p>En couple avec @UUID[Actor.T99bZAdCe7gkYs3V]{Kara}, ils partagent
        leur optimisme et leur envie de rendre leur prochain heureux. Père de
        @UUID[Actor.Nuzfpv18FiNwewCJ]{Vaiata} et de
        @UUID[Actor.vtQwznCk8jlT2WXW]{Mataro}, il vit une existence calme dans
        le travail du bois et surtout dans l'atelier de sculpture où il peut
        passer des nuits entières, rejoint par sa conjointe ou ses enfants pour
        de longues discussions ou l'invention d'histoire sur le monde extérieur.
        </p><p>Il a beaucoup d'intérêt pour les PJs mais garde ses distances
        pour ne pas embarrasser son père,
        @UUID[Actor.elGCQN2rjOxAynF3]{Kiliko}.</p>
      public: <p>Mâle - 38 ans</p>
