    appearance:
      private: ''
      public: >-
        <p>Mâle - 38 ans</p>

        <p>Ce centaure m&acirc;le aime particuli&egrave;rement sa famille,
        s'entrainer avec son grand fr&egrave;re {Wakaweti} malgr&eacute; leurs
        caract&egrave;res diam&eacute;tralement oppos&eacute;s et rendre service
        &agrave; la communaut&eacute;. Il n'a aucune envie de devenir chef du
        village et il est un soutien discret de sa soeur {Kamura}. En couple
        avec {Kara}, ils partagent leur optimisme et leur envie de rendre leur
        prochain heureux. P&egrave;re de {Vaiata Viata} et de {Mataro}, il vit
        une existence calme dans le travail du bois et surtout dans l'atelier de
        sculpture o&ugrave; il peut passer des nuits enti&egrave;res, rejoint
        par sa conjointe ou ses enfants pour de longues discussions ou
        l'invention d'histoire sur le monde ext&eacute;rieur. Il a beaucoup
        d'int&eacute;r&ecirc;t pour les PJs mais garde ses distances pour ne pas
        embarrasser son p&egrave;re.</p>
