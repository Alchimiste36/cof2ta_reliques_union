      public: >-
        <p>Femelle - 47 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">la
        conjointe de {Kaiako} est la maitre d'arme du village. Elle connait la
        rigueur et la pr&eacute;cision de chaque danse de combat des centaures.
        Elle poss&egrave;de une technique parfaite m&ecirc;me si sa puissance ne
        pourrait rivaliser avec {Karekau} ou {Wakaweti}. Elle profite de son
        r&ocirc;le pour mettre quelques branl&eacute;es &agrave; ses
        beaux-fr&egrave;res quand ils d&eacute;passent les bornes. Elle passe
        beaucoup de temps avec ses enfants et partage l'amour que porte son
        fils, {Te'Whakama} pour {Vaiata Viata}. Depuis les attaques des Ombres
        Blanches, elle cherche un moyen de les stopper et on se rend vite compte
        que son impuissance face &agrave; cette menace la ronge de plus en
        plus.</p>
