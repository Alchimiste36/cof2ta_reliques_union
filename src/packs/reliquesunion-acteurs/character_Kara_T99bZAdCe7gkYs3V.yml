    appearance:
      private: ''
      public: >-
        <p>Femelle - 41 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">La
        m&egrave;re de {Vaiata Viata} est une femelle centaure tr&egrave;s
        respect&eacute;e au village d'Arkanov. Sa connaissance des plantes,
        breuvages, potions et baumes en font une femme pr&eacute;cieuse. Sa
        m&egrave;re lui a apprit les recettes et les secrets de fabrication et
        d'utilisation de l'immense alambic du village. Soigneuse et psychologue
        &agrave; son insu, elle connait tr&egrave;s bien tous les petits tracas
        et les grands secrets des habitants. Elle sait trouver les mots pour
        r&eacute;conforter les peines de coeur et elle saura amputer un bras
        sans broncher. Elle tient son conjoint {Kaiwhakairo} et ses enfants d'un
        main de maitre et elle peut &eacute;lever la voix de fa&ccedil;on ferme
        lors des r&eacute;unions de village. Les PJ CONF apprendront que sa
        m&egrave;re &agrave; &eacute;t&eacute; tu&eacute;e par les Ombres
        Blanches alors que son p&egrave;re a &eacute;t&eacute; kidnapp&eacute;
        lors de la m&ecirc;me attaque, il y a environ 6 mois. V&eacute;ritable
        mod&egrave;le pour {Vaiata Viata}, {Kara} a plus de mal avec son fils
        {Mataro}. En pleine adolescence, il ne comprend pas pourquoi son
        p&egrave;re ne pourrait pas &ecirc;tre le prochain chef du village.</p>
