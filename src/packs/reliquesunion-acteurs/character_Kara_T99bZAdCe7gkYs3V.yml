  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: kGqMgc3UD2p6sHZB
    system:
      description: "<p>La mère de @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.Nuzfpv18FiNwewCJ]{Vaiata} est une femelle centaure très respectée au village d'Arkanov.</p><p>Sa connaissance des plantes, breuvages, potions et baumes en font une femme précieuse. Sa mère lui a apprit les recettes et les secrets de fabrication et d'utilisation de l'immense alambic du village.</p><p>Soigneuse et psychologue à son insu, elle connait très bien tous les petits tracas et les grands secrets des habitants. Elle sait trouver les mots pour réconforter les peines de coeur et elle saura amputer un bras sans broncher.</p><p>Elle tient son conjoint @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.fTbuMNahY2sBxbQd]{Kaiwhakairo} et ses enfants d'une main de maître et elle peut élever la voix de façon ferme lors des réunions de village.\_Véritable modèle pour @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.Nuzfpv18FiNwewCJ]{Vaiata}, Kara a plus de mal avec son fils @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.vtQwznCk8jlT2WXW]{Mataro}. En pleine adolescence, il ne comprend pas pourquoi son père ne pourrait pas être le prochain chef du village.</p><p>Les PJ CONF apprendront que sa mère à été tuée par les Ombres Blanches alors que son père a été kidnappé lors de la même attaque, il y a environ 6 mois.</p>"
