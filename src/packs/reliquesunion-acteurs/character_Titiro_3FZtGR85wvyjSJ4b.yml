  details:
    biography:
      private: >-
        <p>La seule fille de @UUID[Actor.ZFFGsUvkAO1nS9PD]{Kaipara} et
        @UUID[Actor.5A4aNmciTnCqcjvX]{Whakarewa} est une pure beauté.</p><p>Même
        si elle a beaucoup de talent pour la forge et qu'elle aime bien partager
        des moments avec ses parents et son grand frère,
        @UUID[Actor.0zLeG9iYDxAcg6Sk]{Ka'Kata} autour du foyer et des enclumes,
        son plus grand plaisir se trouve dans l'atelier de couture où elle peut
        y passer des heures à confectionner des vêtements, toiles, sacs, pièces
        de cuir ou jouets pour les enfants.</p><p>Lorsque son conjoint,
        @UUID[Actor.zv16OZoKKSY6bTpN]{Kupu}, lui décrit un projet de costume
        pour un spectacle ou une pièce de théâtre, elle le dessine et le
        confectionne avec beaucoup de patience et de plaisir.</p><p>Enceinte
        depuis peu, elle est transportée par cette nouvelle. Plus radieuse que
        jamais, elle est illuminée par la joie. Son conjoint est un peu trop
        protecteur à son goût mais elle apprécie son imagination et sa façon de
        raconter les histoires.</p>
      public: <p>Femelle - 30 ans</p>
