      description: "<p>Les élixirs alchimiques sont des décoctions\_instables.</p><p>Chaque jour, le PJ <strong>peut créer jusqu’à\_deux élixirs par rang</strong> atteint dans cette voie.\_</p><p>Produire un lot d’élixirs <strong>prend une heure</strong>, quel\_qu’en soit le nombre.</p><p>Ce sont des mélanges\_instables qui <strong>deviennent inopérants après 24 h</strong>.\_</p><p><strong>Si le PJ ne dispose pas du local ou du matériel\_adéquat</strong>, il peut quand même tenter de préparer\_des élixirs – avec l’accord du MJ – mais produit,\_au choix : soit la moitié des élixirs prévus soit des\_élixirs de qualité médiocre (toutes les variables\_sont divisées par deux, arrondies à l’inférieur\_avec une valeur minimale de 1).</p><p>Vous pouvez donner les droits \"Propriétaire\" au PJ pour les équipements suivant qui reprennent les capacités de la Voie de l'Alchimie. Par contre il faudra modifier les Équipements en fonction des statistiques du PJ qui a fabriqué l'élixir :</p><ul><li><p>@UUID[Item.PEDCC9tvuGudKqoD]{Élixir de Fortifiant}</p></li><li><p>@UUID[Item.Z5ripGxrEvBaKRVG]{Élixir de Feu Grégeois}</p></li><li><p>@UUID[Item.ZbaBqumFJ466SYip]{Élixir d'Huile instable}</p></li><li><p>@UUID[Item.1Mtx1sSWxBB8IczU]{Élixir de guérison}</p></li><li><p>@UUID[Item.74J4EwrAf1XCvo8l]{Élixir de Peau d'écorce}</p></li><li><p>@UUID[Item.jjXcF9liAz6aEZeS]{Élixir d'Image décalée}</p></li><li><p>@UUID[Item.dxAnIDy480hJ3cCE]{Élixir d'Armure de terre}</p></li></ul>"
