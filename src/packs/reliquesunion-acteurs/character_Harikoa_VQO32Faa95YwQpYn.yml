  - name: zBiographie
    type: capacity
    img: >-
      https://assets.forge-vtt.com/bazaar/core/icons/sundries/books/book-open-purple.webp
    _id: 4XZOJfYK4CqW5l5p
    system:
      description: "<p>Cette jeune femelle Centaure est, à l'image de sa famille, <strong>optimiste et plutôt joyeuse au quotidien. Elle n'a jamais vraiment eu beaucoup d'amie et quand elle était petite elle essayait de trainer avec sa grande soeur.</strong></p><p>A 18 ans, elle passa une journée avec\_Hei Tunu pour l'aider à gérer les préparations de l'Alambic. La jeune Harikoa est tombée amoureuse de cette machine et de la transformation qu'elle permet. <strong>L'étude des plantes et de leurs extraits, la distillation des huiles, la fermentation des céréales, le dosage pour rendre délicieux une bière râpeuse…</strong> autant de chose qu'elle étudie, expérimente et teste presque tous les jours aux côtés de Hei Tunu. Elle doit faire d'autres tâches pour la communauté mais à chaque instant ses pensées sont tourner vers la prochaine recette qu'elle va modifier ou inventer.</p><p><strong>L'une des huiles essentielles porte son nom l'Harikoa.</strong> Elle a découvert, avec l'aide et le soutien de\_Kara une huile qui permet de détendre tous les muscles du corps après inhalation pendant plusieurs minutes et accentue l'agilité et la précision de consommateur. Très appréciée des travailleurs et des combattants, cette huile, extraite d'une racine et mélangée à des spores de champignons, est assez rare.</p>"
