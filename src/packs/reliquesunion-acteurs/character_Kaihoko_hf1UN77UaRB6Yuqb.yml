  details:
    biography:
      private: "<p>Il est rare de voir Kaihoko sans son grand frère @UUID[Actor.A0N0QlLLdB170Ccf]{Te’Tipu}. Il est comme son ombre et il partage\_une grande partie de ses idées. </p><p>Il est en couple avec @UUID[Actor.LKvlCv4BVu6hBg0p]{Te’Riri}, une centaure lunatique et qui ne\_lui pardonne aucune erreur. Te’Riri est particulièrement acerbe depuis que leur deux enfants,\_@UUID[Actor.GSigRIwLnNvZKmc9]{Anake} et @UUID[Actor.qUDaYhzwTBz4pzXM]{Tumanako} ont été kidnappés par les Atarangi Kino. Elle reproche sans cesse à Kaihoko\_sa faiblesse et sa soumission à son frère @UUID[Actor.A0N0QlLLdB170Ccf]{Te’Tipu}. </p><p>Kaihoko, intérieurement, n’est pas aussi intransigeant que son frère et son père, @UUID[Actor.AUMVOCux3piDen0C]{Kaha}, mais le moindre signe de faiblesse lui revient au visage avec\_moult réprimandes et moqueries. </p><p>Au fil des années, depuis qu’il a découvert le comportement\_de Te’Tipu avec @UUID[Actor.x2OiiqdCZOlxz94v]{Kaimoe}, il essaye de se détacher de ce côté de sa famille. Il discute régulièrement\_avec @UUID[Actor.RfNtemPbHymoV2zK]{Kaiako} et @UUID[Actor.G9TJ6YEFAnSIbNAM]{Toa}, partage des moments avec @UUID[Actor.4N3OVVj0dI5LPfNR]{Kamura} et montre des marques d’affection pour\_@UUID[Actor.RD6SRAYZuC4Wypgi]{Haputanga} pour apaiser sa colère face à son père. </p><p>Si les PJs révèlent au village les agressions de Te’Tipu sur Kaimoe, Kaihoko en profitera pour\_témoigner et chercher le pardon auprès des habitants.</p>"
      public: <div class="cof1-import-block"><p>Mâle - 42 ans</p></div>
