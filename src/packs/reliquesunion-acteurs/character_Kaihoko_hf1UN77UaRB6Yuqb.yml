        jets de CHA pendant 1 round. Cet effet fonctionne uniquement en Mode
        Combat.</p><p>Si le PJ obtient la capacité avancée, quand il atteint le
        rang 4, remplacez la valeur du Modificateur augmentant les PV par
        "@for*2". Vous pouvez aussi ajoutez un Modificateur sur la rang 4 de
        cette voie afin de ne pas oublier ce bonus.</p>
