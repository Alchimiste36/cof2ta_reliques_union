  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: ZqseJYnQPSMxqnmo
    system:
      description: "<p>Cette centaure est tout le temps fourrée avec sa mère ou enfermée dans le jardin potager. Elle est plutôt peureuse et stressée et, malgré quelques remarques de @UUID[Actor.AUMVOCux3piDen0C]{Kaha} sur sa faiblesse apparente, elle partage les idées de ce groupe.</p><p>Elle en a marre d'avoir peur et de vivre dans cette \"prison\" alors que la race des centaures est puissante. Elle se sent en sécurité au milieu des plantes et elle parle très peu aux villageois qui se bercent dans les valeurs du respect des traditions ou de l'ouverture du village sur le monde avec bienveillance et partage.</p><p>Lorsqu'elle est aux côtés de @UUID[Actor.A0N0QlLLdB170Ccf]{Te'Tipu} ou de @UUID[Actor.hf1UN77UaRB6Yuqb]{Kaihoko}, elle se sent en sécurité mais lorsque @UUID[Actor.AUMVOCux3piDen0C]{Kaha} est là, Peka est écrasée par son autorité et ses paroles guerrières.</p><p>Son conjoint,\_@UUID[Actor.vBvNOpfMi7VKeRd3]{Kahaki}, a été kidnappé lors de la dernière attaque des Ombres Blanches et au-delà de la tristesse, elle ressent une profonde injustice pour sa situation et l'inaction de @UUID[Actor.elGCQN2rjOxAynF3]{Kiliko}, le chef du village.</p>"
