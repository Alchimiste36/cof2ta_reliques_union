    appearance:
      private: ''
      public: >-
        <p>Femelle - 29 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">La
        fille a&icirc;n&eacute;e de {Te'Tipu} est une magnifique femelle
        Centaure radieuse et &eacute;panouie aux c&ocirc;t&eacute;s de son
        conjoint, {Kaihoroi}. Elle ne partage rien des id&eacute;es de son
        p&egrave;re ou de son oncle mais elle pr&eacute;f&egrave;re se taire,
        les laisser parler et faire sa vie en famille. Elle garde un fort
        contact avec sa m&egrave;re, {Kaimoe} et elle essaye de la convaincre de
        quitter son conjoint depuis des ann&eacute;es pour s'&eacute;manciper de
        l'influence de Kaha. Son p&egrave;re l'a d&eacute;j&agrave;
        frapp&eacute; pour son insolence mais cette &eacute;pisode l'a rendu
        encore plus d&eacute;termin&eacute;e. Elle est maman de la petite
        {Taiohi} de 7ans et du petit {Peepi} de 6 ans. Des enfants tr&egrave;s
        agr&eacute;ables et rieurs. Elle est enceinte d'un troisi&egrave;me
        enfant qui devrait voir le jour d'ici un mois (grossesse de 11 mois sur
        12). Sa grossesse la met en joie m&ecirc;me si ces derni&egrave;res
        semaines &agrave; a de plus en plus de douleurs et de mal &agrave; faire
        des activit&eacute;s. Elle passe beaucoup de temps dans la salle commune
        ou aupr&egrave;s de Kara, la soigneuse. Elle ressent souvent une crainte
        que son p&egrave;re, son oncle ou son grand-p&egrave;re ne s'en prennent
        un jour &agrave; son conjoint.</p>
