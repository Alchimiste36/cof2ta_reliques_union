    appearance:
      private: ''
      public: >-
        <p>Mâle - 16 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Autrefois
        un jeune gar&ccedil;on heureux et souriant, Mataro a chang&eacute; ses
        sourires pour une froide col&egrave;re, depuis quelques mois. Il est
        renferm&eacute; et introverti malgr&eacute; sa passion pour la forge. Il
        passe beaucoup de son temps &agrave; jouer du marteau et fa&ccedil;onner
        le m&eacute;tal rougeoyant. Il a un certain talent mais ne semble pas
        prendre de plaisir malgr&eacute; les encouragements. Ses explications
        &agrave; sa m&egrave;re ou son p&egrave;re tournent autour de la place
        du chef qui devrait &ecirc;tre confi&eacute;e &agrave; son p&egrave;re
        selon la tradition. {Kara} sait qu'une souffrance plus profonde est
        cach&eacute;e mais elle n'arrive pas &agrave; la d&eacute;celer et ce
        genre de discussions apportent plus de col&egrave;re, de cris et de
        disputes. Si un PJ partage la forge avec {Mataro} et commence &agrave;
        se lier d'amiti&eacute; avec lui, il pourra apprendre qu'il &eacute;tait
        pr&eacute;sent quand sa grand-p&egrave;re maternelle s'est faite
        massacr&eacute;e devant ses yeux et qu'en plus du traumatisme, il est en
        col&egrave;re contre son inaction et la peur qui l'a paralys&eacute;e.
        Il s'en veut, il est triste, il dort mal et surtout il est en
        col&egrave;re car personne ne veut faire payer &agrave; ces Ombres
        Blanches.</p>
