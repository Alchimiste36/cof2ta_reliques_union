    appearance:
      private: ''
      public: >-
        <p>Mâle - 13 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Ce
        jeune centaure de 13 ans est presque muet et garde en permanence la
        t&ecirc;te baiss&eacute;e. Il est sensible &agrave; la d&eacute;tresse
        de sa m&egrave;re, {Kaimoe} et il est souvent t&eacute;moin des
        col&egrave;re de son p&egrave;re, {Te'Tipu}, sur elle. Sans pour autant
        en avoir la capacit&eacute;, il pense de plus en plus &agrave;
        empoisonner mortellement son p&egrave;re&nbsp;et il souhaite, qu'un
        jour, il ne rentre pas de sa partie de chasse. Ce jeune, un soir
        apr&egrave;s un cauchemar, c'est confi&eacute; &agrave; son
        grand-p&egrave;re {Kaha}sur les agissements de Te'Tipu. Kaha a fortement
        insist&eacute; sur la n&eacute;cessit&eacute; de son silence pour le
        bien de leur famille et des mauvaises cons&eacute;quences pour sa
        m&egrave;re et lui s'il racontait ses mensonges &agrave; qui voulait
        l'entendre. Un des PJs se fera-t-il voler une dose de poison par cet
        adolescent perturb&eacute;.</p>
