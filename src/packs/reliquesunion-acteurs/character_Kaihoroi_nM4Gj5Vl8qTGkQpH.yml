    appearance:
      private: ''
      public: >-
        <p>Mâle - 31 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Quand
        on doit d&eacute;placer une charge lourde, tirer un tronc &eacute;norme
        ou soulever un rocher, on peut compter sur ce Centaure &agrave; la
        musculature impressionnante. Il ne poss&egrave;de que les base du combat
        et pr&eacute;f&egrave;re &eacute;chapper aux entrainements mais rien
        qu'une claque et on ne rel&egrave;ve pas rapidement. Il est costaux mais
        garde un sourire constant sur son visage. Toujours heureux et serviable,
        rien ne semble le toucher m&ecirc;me les nom d'oiseaux qu'il entend de
        la part de la famille de sa conjointe. Il est tr&egrave;s
        attentionn&eacute; avec ses enfants et ne cache pas son empathie face
        aux douleurs de la grossesse de {Fe29 Haputanga (enceinte)}. Au village,
        il s'occupe beaucoup du compost et il aime nettoyer les rues, les
        b&acirc;timents et les outils. Un vrai maniaque qui appr&eacute;cie que
        chaque chose soit &agrave; sa place et bien propre. Lorsqu'il jardine au
        potager, {Peka} ne cesse de la r&eacute;primander car pour elle rien
        n'est aussi propre et ranger dans la nature.</p>
