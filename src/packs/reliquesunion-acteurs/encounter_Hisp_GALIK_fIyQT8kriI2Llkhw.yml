    properties: |-
      <div class="cof1-capacity-import">
              <p><u><strong>Vampirisation</strong></u> :</p>
              <h1>Description</h1><p>La créature doit réussir une attaque magique sur une cible vivante à une distance maximum de 30 mètres. En cas de réussite, la cible subit [1d6 x NC/2] <strong>DM</strong> et la créature régénère autant de PV que de <strong>DM</strong> infligés. De plus à chaque fois qu’une créature meurt à moins de 20 mètres d’elle, la créature siphonne son énergie et gagne [1d6 + NC] PV.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Armure magique</strong></u> :</p>
              <h1>Description</h1><p>La créature possède un pouvoir magique (peau de pierre, intangible, forme ténébreuse, etc.) qui lui permet de diviser tous les <strong>DM</strong> physiques subits par 2 pour le reste du combat. Ce pouvoir n’affecte pas les <strong>DM</strong> des attaques magiques élémentaires (feu, froid, acide, électricité).</p>
            </div>
