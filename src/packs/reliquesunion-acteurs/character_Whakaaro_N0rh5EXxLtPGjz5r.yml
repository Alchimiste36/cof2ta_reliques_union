      description: "<p>Whakaaro est un centaure qui peut tout faire dans le village. Il travaille pour tout le monde et avec tout le monde sans distinction des conflits ou des tensions entre les familles et les habitants. Toutes ces gesticulations lui passe bien au-delà de la tête.</p><p>Pour lui seul le \"bien faire\" est important et il met toute son énergie à aider, fabriquer, soutenir et anticiper.</p><p>Il a peur de sa capacité à être un bon père et la grossesse de sa conjointe,\_ @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.HhfWAaUYHXKxHMFj]{Hei Tunu} le divise entre la joie et le stresse.</p><p>On ne peut pas vraiment dire que Whakaaro divertissant. Il a un caractère sobre et assez austère et il ne comprend pas le second degré ou la plupart des blagues ou plaisanteries.\_</p><p>Il voit les PJs arrivés au village comme une menace pour son futur enfant et il se méfiera d'eux mais à aucun moment il ne sera désobligeant ou agressif envers eux.</p><p>\_</p>"
