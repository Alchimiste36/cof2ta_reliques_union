      description: >-
        <p>Ce superbe brassard composé de tissus et de métal travaillé en forme
        de feuilles d'arbre enroulées les unes sur les autres dégage une légère
        aura magique. Des dizaines de petites runes sont gravées sur la face
        intérieure des feuilles.</p><p>Avec une dominante d'argenté, le bracelet
        se porte avec une grande diversité de vêtements sans que ça ne paraisse
        bizarre. Il ne ressemble pas à des pièces d'armure mais plutôt à des
        ornementations.</p><p>Auprès d'un marchand connaisseur, d'un historien,
        d'un collectionneur ou d'un noble, ce brassard pourrait valoir minimum
        1300 pa.</p>
