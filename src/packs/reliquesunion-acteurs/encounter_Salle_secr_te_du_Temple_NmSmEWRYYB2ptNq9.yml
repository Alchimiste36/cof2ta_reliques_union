  - folder: 5d7tVcp9sM4JEah5
    name: Machine du Val Rouge
    type: equipment
    img: >-
      modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/machine_du_val_rouge.webp
    _id: z1E0LDE0htfrDcqL
    system:
      description: "<p>Un coffre mesurant 120cm de long par 80 cm de large et 80 cm de haut, contient une machinerie étrange avec beaucoup de petits objets.</p><p>\_Le coffre est rempli d'une machinerie complexe gravée de runes magiques étranges. Il y a des casiers de tailles différentes, des trous ronds ou carrés et de nombreuses pièces mobiles qui peuvent s'insérer.\_</p><hr /><section id=\"secret-IPqxuMy2GHy3kF8w\" class=\"secret\"><p>PER 20 ou INT 15 (30min de recherche) : permet de trouver le compartiment avec la notice :</p><p>Un livret est glissé sur le côté remplit d'images explicites expliquant la marche à suivre pour utiliser la machine.</p><ul><li>Déshydrater des aliments</li><li>griller des insectes</li><li>conserver des graines</li><li>produire des feuilles de papier à partir de fibre de plantes</li><li>produire de l'encre à partir d'insectes</li><li>stériliser un outil</li><li>stériliser un tissu</li><li>faire fondre du métal</li><li>étanchéifier un tissu ou du cuir</li><li>façonner une corde ou cordelette à partir de fibre de plantes ou de tissu</li></ul><p>La machine fonctionne grâce à une succession de runes gravées sur les différentes pièces de la machine. Elles sont très complexe de réalisation mais l'utilisation a été pensée pour être simple.</p></section>"
