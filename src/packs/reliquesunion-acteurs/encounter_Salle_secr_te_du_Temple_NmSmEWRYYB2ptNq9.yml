    _id: o022MFAHXqWV5edI
    system:
      description: "<p>Bien que le bouclier semble fait de métal strié de rainures verdâtres, il s’agit\_bien d’écorce.</p><p>C’est un bout de l’Arbre-Mère de la forêt du Val Rouge qui\_a été façonné en bouclier d’environ 80cm de diamètre.\_Lorsqu’on le porte\_son poids est étrangement faible et les sangles de cuir dessous sont très\_agréables à tenir en main.</p><p>Après 24h en sa possession, la personne ressent\_l’énergie magique du bouclier qui lui donne une sensation spéciale, une\_vibration étrange.</p><p>A l’utilisation, <strong>le bouclier confère un bonus de défense magique de +2 en plus de son bonus de +1 en DEF physique, contre les attaques magique la DEF est augmentée de +1 et une RD de +1.</strong></p><p>Après 24 en sa possession, <strong>le bouclier confère un bonus de +1 PC.</strong></p><p></p>"
