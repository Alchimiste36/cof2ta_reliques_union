    notes:
      private: ''
      public: >-
        <p>Marchand malhonn&egrave;te du Ravin de Novrak</p>

        <p>Caract&egrave;re : tr&egrave;s raciste - fasciste - partisan de
        l'extermination des "races inertes"</p>

        <p>Propos :</p>

        <ul>

        <li>Arr&ecirc;tons de laisser les races inertes envahir nos villes et
        villages. Les humains sont les seuls l&eacute;gitimes &agrave;
        r&eacute;gl&eacute;s sur Arran.</li>

        <li>Avec les centaures faut faire comme avec les chevaux, leur mettre
        des coup de trique sinon ils n'ob&eacute;hiront jamais.&nbsp;</li>

        <li>Des ann&eacute;es &agrave; accepter de se faire ran&ccedil;onner par
        les nains qui vous font les poches et maintenant les elfes nous tuent et
        kidnappent nos enfants et des centaures viennent voler votre travail et
        envahir vos maisons.</li>

        <li>Le premier sabot qui rentre dans ma boutique, je le vends ou j'en
        fais du pat&eacute; de cheval. Nous devrions installer des panneaux
        devant nos magasins pour interdir les races inertes d'y rentrer. On
        acceptent pas les chiens, pourquoi accepter un elfe ou un centaure
        ?</li>

        <li>J'entend d&eacute;j&agrave; des habitants voulant offrir &agrave;
        manger aux centaures mais que se passera-t-il quand les r&eacute;coltes
        manqueront ?&nbsp;</li>

        </ul>
