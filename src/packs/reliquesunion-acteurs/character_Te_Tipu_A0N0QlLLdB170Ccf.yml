  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: 7JB5vxTgMdJ6tzLL
    system:
      description: "<p>Le premier fils de @UUID[Actor.AUMVOCux3piDen0C]{Kaha} est très similaire à son père autant par leur physique que par leur état\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">d’esprit. Combatifs, revendicateurs, sévères et colériques, les deux font la paire.</span></p><p><span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">Dans la lignée de\_</span>son père et sous l’influence de sa tante @UUID[Actor.RThMzXURSyG4AjsL]{Kite’Tihe}, il voit chaque conflit ou problème comme une\_offense contre sa famille. Il perçoit les regards et les sourires autour de lui comme des moqueries\_orchestrées par le chef @UUID[Actor.elGCQN2rjOxAynF3]{Kiliko}.</p><p>La chose qui irrite le plus Te’Tipu c’est de voir ses deux petits\_enfants, @UUID[Actor.9HdmSAxScK9Twvch]{Taiohi} et @UUID[Actor.EeHmNrec4W6ZBwu5]{Peepi}, jouer avec la désinvolte et irresponsable @UUID[Actor.Nuzfpv18FiNwewCJ]{Vaiata}. Que son gendre @UUID[Actor.V9ITbgWBBsUeixHA]{Kaihoroi}\_soit un faible passe encore mais que sa propre fille, @UUID[Actor.RD6SRAYZuC4Wypgi]{Haputanga}, partage cette joie, le rend fou de\_colère.</p><p>Te’Tipu et son frère @UUID[Actor.hf1UN77UaRB6Yuqb]{Kaihoko} passent la plupart de leur temps au bûcheronnage à l’intérieur ou à l’extérieur du Village pouvant concentrer leur colère et leur rage sur les troncs. Il leur\_arrive fréquemment de partir chasser dans les montagnes environnantes malgré l’interdiction de\_Kiliko.</p><p>Te’Tipu est certainement le centaure le plus désagréable et agressif du village envers les\_intrus. Il est aussi violent et méprisant avec sa conjointe @UUID[Actor.x2OiiqdCZOlxz94v]{Kaimoe}. Pour Te’Tipu, il faut un chef\_fort et intransigeant suivi par un village qui obéi sans discuter. Il n’acceptera jamais que son père,\_Kaha, ne soit pas le chef d’Arkanov.</p>"
