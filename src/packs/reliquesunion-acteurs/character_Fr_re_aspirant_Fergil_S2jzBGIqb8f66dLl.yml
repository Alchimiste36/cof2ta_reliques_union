    system:
      description: "<h2>Humains\_des ruines nordiques</h2><p>Les peuples nordiques se trouvent de la Borduria\_jusqu’au royaume d’Yrlanie et, à l’est, sur la\_majeure partie de l’Ourann. Fiers, marins,\_guerriers, souvent considérés comme sauvages,\_ces hommes et femmes ont payé un lourd tribut\_lors de la malédiction des goules. De tous les\_peuples, il a probablement été le plus éprouvé.\_</p><p>Proches de la nature, habitués à des conditions\_de vie hostiles, ces Humains décorent souvent\_leurs vêtements et armures de peaux, de fourrures ou phanères de bêtes. Les cheveux longs,\_le visage anguleux et la peau tannée par les vents\_glacés, ils sont mus par une volonté farouche.</p>"
