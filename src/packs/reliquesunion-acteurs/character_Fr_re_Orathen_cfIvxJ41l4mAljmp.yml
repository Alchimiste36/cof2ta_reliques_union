  details:
    biography:
      private: ''
      public: "<p>Frère Orathen, est un autre sang-mêlé, union d'un nain et d'un humain, de\_28 ans. Il est beaucoup moins agréable\_que Zathaen et il observe tout le temps\_la place au lieu d’écouter les PJs. Il\_<span style=\"color: var(--color-text-primary); font-size: var(--font-size-14); font-family: var(--font-body)\">répondra essentiellement par oui ou\_</span>par non en faisant comprendre que\_discutailler avec des riches n’est pas sa\_mission.</p>"
