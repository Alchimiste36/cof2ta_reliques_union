  - folder: xsJFndR7inLiaMJ7
    name: Maîtrise des armes runiques
    type: capacity
    img: icons/weapons/axes/axe-broad-energy-pink.webp
    system:
      description: "<p>Le PJ a appris à tirer parti de la puissance des\_runes gravées par les artisans de l’ordre de la\_Forge. Il peut porter et utiliser les armes et\_armures de la tradition naine pour lesquelles il\_possède la formation martiale.\_</p><blockquote><h4><em><strong>Armes et armures\_traditionnelles</strong></em></h4><p><em>Les objets issus du savoirfaire d’une tradition\_ethnique constituent un\_ensemble de techniques\_de tissage, de confection\_et de forge transmis de\_génération en génération\_entre les artisans des\_différents peuples d’Arran.\_</em></p><p><em>Au final, ces objets\_dépassent le strict cadre\_de l’artisanat. Les objets\_créés en respectant ces\_processus renferment\_des pouvoirs étranges et\_puissants. Ils nécessitent\_un apprentissage long\_pour les maîtriser.\_ Les voies de peuple\_ouvrent toutes au rang\_3 à la maîtrise\_d’une tradition.\_En tant que joueur,\_le moment venu et\_en accord avec votre\_MJ, vous aurez accès\_à certaines de ces\_informations, décrites\_au chapitre «Objets de\_traditions et de légendes»\_du Livre du meneur.</em></p></blockquote>"
