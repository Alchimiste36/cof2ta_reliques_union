    img: modules/cof2ta_reliques_union/assets/cof2ta_icones/cof2ta_nain2.webp
    system:
      description: "<h6><strong>Voie utilisée uniquement dans le cas des Semi-Elfes et des Sang-Mêlés</strong></h6><h2>Les Nains</h2><p>Les Nains sont petits mais musclés et\_dotés d’une constitution à toute épreuve.\_Peuple guerrier par excellence, ce sont\_également des artisans, architectes, médecins\_et savants d’exception. Leur empire éclaté,\_majoritairement situé au nord et au sud de\_l'Ourann, est organisé en ordres rigoureusement\_cloisonnés et chargés de maintenir la cohésion\_de forteresses-États. Le plus grand malheur\_d’un Nain est d’être déchu de son ordre et de\_devenir un Errant.</p><p>Une fois atteint l’âge de raison, la plupart\_des individus masculins arborent une barbe\_dense, soigneusement coiffée ou tressée et\_parfois agrémentée d’anneaux en métal. Seules\_exceptions, notables, les savants et ingénieurs\_arborent souvent un visage glabre ‒ tantôt par\_volonté de se démarquer des valeurs guerrières\_de leurs semblables, tantôt simplement pour\_des questions pratiques, la pilosité développée\_pouvant interférer avec l’exercice de leur métier.</p><p>Les individus féminins sont tout aussi robustes\_et vifs d’esprit que leurs homologues masculins\_mais doivent généralement se faire une place en\_faisant preuve de caractère dans ces communautés dominées par des traditions patriarcales. La\_nouvelle génération est en train de bousculer\_cette construction sociale et, désormais, aucun\_parcours n’est impossible à une Naine qui\_voudrait vraiment s’y engager.</p><p>En dehors des forteresses-États, les Nains sont\_rares mais on les retrouve ponctuellement auprès\_de ceux capables de se payer leurs services en\_tant que guerrier, architecte ou ingénieur</p><h4>Modificateurs des Nains</h4><ul><li><p>Atout: <strong>+2 CON</strong></p></li><li><p>Faiblesse: <strong>-2 DEX</strong></p></li><li><p>Âge de départ à l’aventure: <strong>40 ans et plus</strong></p><p>Espérance de vie: <strong>250 ans</strong></p><p>Taille: <strong>entre 1,25 m et 1,45 m</strong></p><p>Poids : <strong>entre 50 kg et 100 kg</strong></p><p>Trait des Nains : <strong>Instinct de survie</strong></p><p></p></li></ul><p><strong>Noms féminins:</strong> <em>Allya, Aravug, Axeel, Damanel, Dey, Dhoki, Dhran, Druseel, Elka, Hazura,\_Hilde, Hulda, Juvaan, Kimeen, Luzy, Lynn, Lyv,\_Makrell, Marrea, Meel, Mudd, Oolra, Sapphir,\_Skodae, Sweel, Thaniss, Tyreen, Uminn, Uriss,\_Yvren, Zae.</em></p><p><strong>Noms masculins:</strong> <em>Alfoldrul, Barikk, Bokhil,\_Brann, Brarberlug, Damoth, Delver, Caven,\_Granroc, Flintmaul, Folonor, Grim, Grorroun,\_Grurrig, Horngut, Komn, Krosseac, Loddoic,\_Mumdoc, Nalmod, Saggad, Sivras, Thabral,\_Thunfrak, Warbane</em></p>"
