items:
  - folder: QZKWGWu8512Lhphc
    name: Sang-Mêlé
    type: feature
    img: >-
      modules/cof2ta_reliques_union/assets/cof2ta_icones/cof2ta_sang_meles_token.webp
    system:
      description: "<h3>ATTENTION</h3><p>Lorsque vous crez un personnage Sang-Mêlé, <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">il faut d'abord dupliquer ce trait !</span></strong></span></p><p>Sur le nouveau trait, <strong>Supprimer deux des voies de Peuple</strong> présente sur le trait pour conserver uniquement les Peuples choisis. Ensuite,\_<strong>ajouter la voie culturelle choisie</strong>.</p><p>Uniquement après cela, <strong>glissez-déposez le trait</strong> sur la feuille de personnage.</p><h2>Les Sang-Mêlés</h2><p>La plupart des peuples d’Arran sont féconds\_entre eux et les limites à ces unions sont\_ strictement culturelles, les tensions et préjugés\_rendant improbable le métissage. Malgré tout,\_il est possible d’imaginer des accouplements et\_progénitures entre Humains et Nains, Humains\_et Orcs ou encore Elfes et Orcs par exemple.\_</p><p>Pour créer un métis, respectez les mêmes règles\_que pour les Semi-Elfes.</p><h4>Voies de peuple</h4><p>Les deux voies de peuple des parents, limitées\_au rang 3 maximum dans chacune des voies.</p><h4>Voie culturelle</h4><p>Une voie culturelle au choix entre les peuples\_des parents en fonction des conditions dans\_lesquelles le personnage a grandi.</p><h4>Modificateurs des Sang-Mêlés :</h4><ul><li><p>Atout: <strong>Aucun</strong></p></li><li><p>Faiblesse: <strong>Aucun</strong></p></li><li><p>Trait des Sang-Mêlés : <strong>Aucun</strong></p></li></ul><p></p><p><em>Turuk est le fruit du mélange surprenant entre\_le sang elfe blanc et orc. Plus intelligent et moins\_disgracieux qu’un Orc, il possède également une\_musculature moins développée. Il a grandi au sein\_du clan de son ascendance.\_Ce Semi-Orc possède les voies des Peaux vertes et\_des Elfes. Cependant, il ne peut aller au-delà du\_rang 3 dans ces voies. Étant donné les conditions\_dans lesquelles il a grandi, sa voie culturelle est\_celle des Orcs avec lesquels il été élevé.</em></p><h4>Métis</h4><p>Il arrive parfois que deux Elfes issus de cultures différentes s’accouplent et donnent\_naissance à un métis. Bien que cette pratique ne soit pas particulièrement encouragée, elle\_n’est pas formellement désapprouvée – contrairement aux unions avec les autres peuples.\_</p><p>Le métis exprime assez rapidement des critères morphologiques en faveur d’un des parents.\_Un tel personnage commence avec la voie culturelle du parent dont il est\_ physiquement\_le plus proche.\_</p><p><em>Astaran est un métis. Son père était sylvain mais sa mère était une Bleue.\_Lui-même a la peau céruléenne. Sa voie culturelle est donc la voie culturelle des Elfes bleus.</em></p><ul><li><p></p></li></ul>"
