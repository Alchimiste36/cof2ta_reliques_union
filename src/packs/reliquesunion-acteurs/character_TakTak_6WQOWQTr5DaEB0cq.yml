    appearance:
      private: ''
      public: >-
        <p>Masculin - 17 ans - 1m04 - 20kg - Verts sans pupilles - Aucuns</p>

        <p>Tak Tak fait un peu plus d'un m&egrave;tre, ce qui fait de lui un
        petit gobelin, m&ecirc;me pour sa race d&eacute;j&agrave; pas bien
        grande. Il a de longues oreilles constell&eacute;es d'anneaux en cuivre,
        &eacute;tain ou fer rouill&eacute;s. Tak Tak a de grandes et longues
        dents pointues et des yeux verts sans pupilles qui percent les
        t&eacute;n&egrave;bres sans difficult&eacute;. Les petites mains de Tak
        Tak sont griffues elles aussi faisant de lui une cr&eacute;ature assez
        peu agr&eacute;able &agrave; regarder. Craintif, il adopte une attitude
        amiable voire veule, t&ecirc;te toujours baiss&eacute;e comme s'il
        s'attendait &agrave; recevoir un coup. Presque toujours accroupi, il
        sursaute au moindre bruit et n'a de cesse de regarder &agrave; droite et
        &agrave; gauche comme s'il craignait &agrave; chaque moment que
        quelqu'un ne vienne lui faire du mal.</p>

        <p>Tak Tak s'exprime dans un langage commun approximatif, presque
        enfantin: "pas taper Tak Tak" "Tak Tak gentil gob" "Tak Tak aider le
        ma&icirc;tre".</p>

        <p>Il est v&ecirc;tu de vieux v&ecirc;tements de serviteurs trop grands
        pour lui, un peu sales et d&eacute;chir&eacute;s par endroit. Il
        tra&icirc;ne toujours un grand sac &agrave; dos rapi&eacute;c&eacute; de
        partout, presque plus grand que lui, rempli de toutes les cochonneries
        qu'il trouve et ramasse, collectionnant boites de ferraille sans valeur,
        cailloux mystiques plein de mousse, morceaux de cuir
        d&eacute;chir&eacute;s ou autres coquilles d'escargot magiques.</p>
