  details:
    biography:
      private: >-
        <p><strong>Malgré ses 11 ans, Hunga est restée un bébé
        précieux.</strong> </p><p>Elle souffle à chaque effort, à peur de se
        casser un ongle, préfère se balader dans le verger et passe une bonne
        partie de sa journée à nager dans le lac ou à se coiffer les cheveux.
        Elle est très moyenne à l'école et son esprit papillonne en moins de 10
        minutes. </p><p>La psychologue Kara ne comprend pas cette jeune femelle
        que l'on retrouve de temps en temps seule posée sur la margelle du
        bassin de la place principale, les yeux de la vague, pendant des
        heures.</p>
      public: <p>Femelle - 11 ans</p>
