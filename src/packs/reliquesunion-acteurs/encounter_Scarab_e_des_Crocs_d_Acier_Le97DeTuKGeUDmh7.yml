    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: "<p>On parle d'insecte géant dès qu'une créature\_est de taille petite : en dessous de cette taille,\_référez-vous aux «Nuées». </p><p>Les caractéristiques\_des insectes géants dépendent principalement\_de leur taille. Un profil générique est donné\_pour chaque taille ci-dessous. </p>"
    languages: []
    properties: "<p>Dans l'onglet Capacités, supprimez les capacités qui ne sont pas conservées pour l'insecte génat que vous créez. N'oubliez pas d'adapter le NC de la créature en fonction des capacités conservées.</p><ul><li><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Rapide :</span></strong></span> un insecte géant est capable\_de se déplacer de 30 mètres par action de\_mouvement.</p></li><li><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Résistant :</span></strong></span> les insectes sont capables de\_survivre aux pires blessures: le MJ lance deux\_d20 pour leurs tests de CON et garde le meilleur\_résultat. Lorsque la créature atteint 0 PV, elle\_peut encore agir un tour complet.</p></li><li><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Vermine :</span></strong></span> lorsque vous créez un insecte géant,\_il obtient des bonus par rapport à un archétype\_normal. Si vous utilisez un profil d'insecte décrit\_ci-dessous, ignorez cette capacité car elle n'est\_destinée qu'aux MJ souhaitant concevoir ce\_type de créature. Dans ce cas, augmentez les\_PV de +10 et le Mod. de FOR et de CON de\_+3 par rapport à une créature de cette taille</p></li></ul>"
