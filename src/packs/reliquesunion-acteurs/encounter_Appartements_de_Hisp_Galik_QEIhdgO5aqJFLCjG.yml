  - folder: bQc95AGTzSTIAi88
    name: Carnet de Hispo Galik
    type: equipment
    img: icons/sundries/books/book-black-grey.webp
    _id: ZzRa8M5Bf7u86hWF
    system:
      description: "<div class=\"arran-mod\"><h5>Carnet de cuir renforcé par des plaques métalliques.\_Il était bien dissimulé derrière une pierre en bas d'un mur dans le laboratoire de nécromancie du mage.</h5><p><strong>Le carnet contient une bonne centaines de pages écrites avec une belle écritures serrée.</strong></p><p><strong>Après une lecture approfondit, ce carnet décrit les ambitions de Hisp Galik depuis quelques années.</strong></p><hr /><p><em>Cela commence en <strong>698 Athée (il y a 11 ans)</strong>. Il explique avoir rencontré une humaine charismatique et ambitieuse voulant mettre à son service des tribus de peaux vertes pour développer son pouvoir. <strong>Son ambition était de se venger de son mari et des souffrances qu'il lui a fait subir.</strong></em></p><p><em>Hisp aida cette humaine a <strong>récupérer un objet magique puissant dans les montagne de la Ogrie</strong> près du littoral. Grâce à <strong>ce plastron, elle pouvait mettre sous son contrôle des tribue entières de Peaux Vertes</strong> (Gobelins, Orcs, Ogres) et les faire travailler pour elle. Elle devient une reine au milieu de serviteurs et <strong>après 3 années de recherches du Plastron et une année entière pour réunir et contrôler les Peaux Vertes, elle marche sur son ancien village et le réduit en cendre.</strong></em></p><p><em>Hisp décrit toutes les connaissances qu'il a apprise sur la nécromancie pendant les multiples séances de tortures de l'ancien mari capturé.</em></p><p><em>Après quelques mois passé à étudier en vivant au milieu de cet espace protégé par des centaines de \"serviteurs\" repoussant toutes les attaques sans se poser de questions, <strong>Hisp apprend l'existence d'une autre relique nommée \"Les armes de la Séduction\".</strong> Il documente ses voyages jusqu'à la bibliothèque d'Aliden à Od'Essa, celle de Majinorr dans l'Empire de Dumn et sa visite au monastère du Désespoir pour trouver des informations sur d'autres reliques.</em></p><p><em>Il raconte <strong>sa découverte de la création de l'Ordre de l'Union pour faire oublier les Armes de la Séduction et réussi à mettre la main sur le récit ancien d'un elfe ayant aidé à la création d'un Temple secret</strong> <strong>protégé par un Arbre géant dans la forêt du Val Rouge.</strong></em></p><p><em>Il décide de <strong>mettre en place un plan pour rallier Blanche Paix puis se mettre au service du Seigneur de la Cité d'Ispier</strong> afin de se rapprocher de son but.</em></p><p><em>La suite est assez claire.</em></p><p><em><strong>Il engage des mercenaires pour attaquer des caravanes de marchands et des camps de bucherons près de la foret du Val Rouge, incite le Seigneur Jaspar de prendre partie contre les sylvains.</strong> Face à ce premier échec, <strong>il en vient à assassiner des nobles de la ville</strong> en faisant incriminer les elfes et <strong>manipule une poignées de personnes pour arriver à un conflit direct</strong> avec les elfes et <strong>enfin assassiner la Shaman du village du Val Rouge.</strong></em></p><p><em>En laissant la situation s'envenimer d'elle même, <strong>la guerre est déclarée et le village elfique est détruit, lui donnant libre accès à l'Arbre géant.</strong></em></p><p><strong>Les notes s'arrêtent ici.</strong></p></div>"
