        former une perche de 3 mètres de long. Lorsqu'elle est repliée, elle ne
        mesure que 1 mètre de long. Il faut une action Limité pour assembler ou
        replier cette perche. À cause des gonds et des broches, elle n'est pas
        aussi solide qu'une perche d'une seule pièce, il vaut mieux l'utiliser
        pour comme pour sonder le terrain que pour sauter ou escalader quelque
        chose.</p>
