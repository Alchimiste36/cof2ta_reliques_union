    appearance:
      private: ''
      public: >-
        <p>Femelle - 39 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Elle
        adore pr&eacute;parer les repas dans la cuisine collective aux
        c&ocirc;t&eacute;s de son p&egrave;re, {Kai}. Ils partagent se plaisir
        d'adapter les recettes en fonction des go&ucirc;ts des villageois et de
        varier en fonction des fruits ou l&eacute;gumes de saison. Elle, comme
        son p&egrave;re, est une combattante tr&egrave;s dou&eacute;e et elle a
        remport&eacute; beaucoup de combat lors des c&eacute;r&eacute;monies du
        village. Elle se l&egrave;ve tous les jours tr&egrave;s t&ocirc;t pour
        r&eacute;colter quelques l&eacute;gumes, s'occuper de la cuisine puis,
        avant de pr&eacute;parer les repas du soir, on peut la trouver dans les
        murailles &agrave; faire du sport et des entrainements pour
        d&eacute;velopper sa souplesse et ses techniques peu conventionnelles.
        Tr&egrave;s peu muscl&eacute;e, Maamaa est d'une rare souplesse. Elle
        peut bondir, glisser ou manoeuvrer autour d'un adversaire en
        &eacute;vitant tous ses coups. Elle est extr&ecirc;mement dou&eacute;e
        un arc &agrave; la main, &eacute;galement.</p>
