    system:
      description: "<h2>Humains\_des Terres Orientales</h2><p>L’Orient est une des rares régions où les Humains\_ne se sont pas imposés. Les forteresses-États\_naines, la forêt des Céliandes et le royaume\_Nécromant représentent des obstacles difficiles\_à surmonter. Cependant, le continent abrite\_plusieurs villes sauvages et dangereuses dont la\_population est hétéroclite, où règnent le nondroit et la loi du plus fort, telles que la cité des\_Sang-mêlés ou la cité des dragons, Akrähyng.</p><p>Les capacités uniques d’adaptation des Humains\_leur ont permis de s’implanter dans ces cités où,\_pour se construire un avenir entre les rixes et les\_coupe-gorges, il faut être capable de contourner\_les règles.</p>"
