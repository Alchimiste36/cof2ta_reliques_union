    system:
      description: "<p>Le PJ est féru des courses de montures volantes. </p><p>Il fait l’acquisition d’un <strong>dragon d’Akrähyng</strong>\_dont les Caracs. sont les suivantes :</p><p>Init 15, DEF 16, PV [5 × niveau du PJ], </p><p>Att +8,\_DM 1d6+4 (trait de feu, portée 20 m).</p><p>S’il possède, ou venait à acquérir par la suite, la\_capacité Monture fantastique (voie du combat\_monté, rang 5) ou Ordre de chevalerie (voie de\_prestige de l'ordre ailé, rang 1), sa monture\_gagnerait <strong>un bonus de +2 en DEF, attaque et\_DM</strong> pour chacune de ces capacités.</p><p>Sa monture lui est parfaitement fidèle et il gagne\_un bonus de <strong>+5 aux tests de DEX pour toutes\_les manœuvres aériennes</strong> réalisées avec elle.</p>"
