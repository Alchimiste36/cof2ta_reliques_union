  details:
    biography:
      private: ""
      public: "<p>Zagrenn est un frère du Désespoir qui aime\_particulièrement l’étude de l’histoire des Terres\_d’Arran et, surtout, des légendes autour des conflits\_entre les différents peuples, les discriminations et le\_racisme.</p><p>Depuis 10 ans, il essaye, par tous les moyen, de\_comprendre pourquoi les peuples ou les individus\_cherchent à dominer ou opprimer leur prochain. Il\_n’arrive pas à comprendre les raisons de cette haine\_et ça l’énerve.\_Il a récemment entendu parlé des Sauveur de la\_Dame d’Honneur grâce à l’équipe de frères qui ont\_participé à la fête d’Ispier et suite au discours de\_Lana’Sir. Il a déjà entendu parlé de l’Ordre de l’Union\_et de la légende autour d’Esdavia. Il a, donc, demandé\_une autorisation à ses supérieurs pour venir en aide\_aux elfes sylvains de la forêt du Val Rouge avec l’espoir\_de pouvoir rencontrer le groupe de PJs.</p><p> Zagrenn est un vrai moine du Monastère des\_Frères du Désespoir. Il est droit, juste et intraitable\_avec les injustices ou les persécutions des faibles. Il a\_de grandes valeurs chevillées au corps et il a tendance\_à concevoir le monde avec vision binaire entre le bien\_et le mal. Il n’a strictement aucune notion du second\_degré ni du sarcasme. Il consacre sa vie à la création\_d’un monde meilleur et Zagrenn ne comprendra pas\_les personnages qui auront besoin de motivations\_supplémentaires pour s’impliquer dans cette mission.</p>"
    appearance:
      private: ""
      public: ""
    notes:
      private: ""
      public: ""
    size: medium
    languages:
      - ""
