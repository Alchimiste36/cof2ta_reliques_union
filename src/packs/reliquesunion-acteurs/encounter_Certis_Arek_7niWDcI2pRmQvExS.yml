    notes:
      private: ""
      public: >-
        <p>Le plus jeune frère Arek est moins raciste et idiot que les deux
        grands. C'est une force de la nature très appréciée sur les chantiers de
        bucheronnage et de confection des pièces de charpente. Il est très
        attristé par la blessure du père et la consommation d'alcool transforme
        cette tristesse en colère froide.</p><p>Le père Arek a eu la jambe
        coupée lors des combats contre les elfes sylvains de la forêt du Val
        Rouge ce qui n'a pas apaisé les idées de cette famille.Cette famille est
        bien connue des gardes et de la milice pour les larcins, les agressions
        et les bagarres de fin de soirée.</p>
