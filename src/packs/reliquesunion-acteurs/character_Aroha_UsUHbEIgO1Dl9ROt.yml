        <p>La première action permet de réaliser le test de PER difficulté 10.
        Les DM de l'action correspondent à 1d6 par rang atteint dans la voie. Le
        MJ pourra répartir les soins en fonction du résultat de chaque
        dé.</p><p>Si le PJ obtient la capacité avancée, ajoutez simplement la
        Condition "est appris" sur la deuxième action qui fonctionne de la même
        manière que la première. Le PJ pourra inscire le domaine choisi dans le
        Label de l'action.</p>
