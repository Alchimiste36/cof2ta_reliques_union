  details:
    biography:
      private: >-
        <p><strong>Conjointe de
        @UUID[Compendium.world.reliquesunion-acteurs.Actor.tP0ihTOJIthKq66b]{Wakaweti},
        son cousin,</strong> il leur ai interdit de se reproduire. Ca ne les
        empêche pas de vivre un vrai amour depuis aussi longtemps qu'elle s'en
        souvient.</p><p>Elle soutient son conjoint et elle est aussi compétente
        que lui avec une lance, un épieu ou un arc entre les mains. Tous les
        matin dans la grotte de prière, ils se retrouvent tous les deux pour une
        séance de prière puis d'un entrainement intensif aux danse de combat et
        à la maitrise des armes.</p><p><strong>Calme et introvertie, elle
        s'occupe des machineries complexes au niveau de la cascade ou dans les
        différents bâtiments du village.</strong></p>
      public: <p>Féminin - 43 ans</p>
