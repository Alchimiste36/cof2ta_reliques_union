    system:
      description: >-
        <p>Le prix des bijoux varie grandement en fonction de leur qualité.
        Beaucoup de cultures, notamment nomades, utilisent les bijoux comme
        signe extérieur de richesse, surtout les ceintures et les bracelets
        faits de pièces. Les bijoux d’un roturier valent généralement quelques
        pièces de cuivre, ceux d’un artisan quelques pièces d’argent et ceux
        d’un marchand quelques pièces d’or tandis que les nobles portent
        rarement des bijoux valant moins de 200 pa.</p>
