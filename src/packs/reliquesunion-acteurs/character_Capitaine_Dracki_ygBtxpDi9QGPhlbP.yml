  details:
    biography:
      private: >-
        <p>La Capitaine Dracki est la responsable de cette Maille de la Toile
        Vivante.</p><p>Elle est respectée et elle prendra des risques pour
        sauver les membres de sa Maille. Sa petite soeur est aussi membre de la
        Toile Vivante dans une autre Maille, ce qui rend extrêment fière
        Dracki.</p>
      public: ''
    appearance:
      private: ''
      public: >-
        <p>Cette naine puissante et compétente est réellement talentueuse au
        combat. Son regard démontre au premier coup d'oeil sa détermination et
        sa forte volonté.</p><p>Tenant un marteau de guerre et un grand
        bouclier, lorsqu'elle combat des étincelles orangées parcourt le métal
        de son équipement.</p>
