        <p><u>Rumeurs et légendes</u> / <u>Argumenter</u> / <u>Débrouillard</u>
        / Déguisement / Touche-à-tout</p>

        <p><u><strong>Voie de l’acrobatie (Aventurier)</strong></u></p>

        <p><u>Acrobate</u> / <u>Grâce féline</u> / <u>Lanceur de couteau</u> /
        Esquive acrobatique / Dextérité héroïque</p>

        </div>
    appearance:
      private: ''
      public: >-
        <p>Mâle - 38 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">c'est
        un travailleur touche-&agrave;-tout qui peut passer de la scierie,
        &agrave; la tissanderie ou &agrave; la mine sans aucun probl&egrave;me.
        Il fait un boulot correct partout et il aime, comme sa m&egrave;re
        {Whakarewa} le travail bien fait et efficace. Depuis qu'il est en couple
        avec {Kamura}, il s'occupe car elle n'est pas tr&egrave;s disponible. Il
        appr&eacute;cie travailler &agrave; ses c&ocirc;t&eacute;s dans la
        scierie ou au pressoir mais il est assez impuissant face &agrave; la
        distance qu'il y a entre eux. Il n'ont pas d'enfants et &ccedil;a ronge
        Iti depuis que son fr&egrave;re et sa soeur ont fond&eacute; une
        famille. Les trois enfants de {Kaipara} et {Whakarewa} se portent
        volontaire pour "s'occuper" des PJs lorsqu'ils seront dans les mines
        &agrave; leur arriv&eacute;e.</p>
