  details:
    biography:
      private: >-
        <p>Ce grand et maigre centaure à la barbe longue et hirsute aime les
        plantes, les arbres et la nature. Il passe son temps dans le verger, le
        potager et la forêt a récolter, chouchouter et entretenir les plantes.
        </p><p>C'est un des seul Centaure du village autorisé à quitter le
        village pour aller trouver et ramener des plantes non cultivables dans
        l'enceinte du village. </p><p>Il est très calme et discret et certains
        adolescents ou enfants le pensent un peu fou. Il est très tactile avec
        la nature mais aussi avec les autres personnes (la main dans les
        cheveux, des serrages dans ses bras…), ce qui peut agacer certains
        villageois. </p><p>Depuis une dizaine d'années, il entreprend de
        répertorier la faune et la flore locales dans plusieurs grands volumes
        en dessinant le plus précisément possible chaque caractéristiques et
        chaque propriété. Les 4 tomes de plusieurs dizaines de pages sont des
        ouvrages magnifiques et assez inestimable pour un botaniste. </p><p>Il
        ne supporte plus sa conjointe,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.2vLFu6uOkNcJhn7e]{Ka'Huri},
        depuis qu'elle traine avec
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.AUMVOCux3piDen0C]{Kaha},
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.A0N0QlLLdB170Ccf]{Te'Tipu}
        et
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.hf1UN77UaRB6Yuqb]{Kaihoko}.
        Il l'a trouve plus violente, plus stressée et surtout elle parle de plus
        en plus de son envie de "conquérir" la montagne et de prendre le
        contrôle de leur région. </p><p>De la même manière, il aime passer du
        temps avec deux de ses filles,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.HMpPEtlwshgIOybw]{Te'Wikitoria}
        et
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.HhfWAaUYHXKxHMFj]{Hei
        Tunu} mais a de plus en plus de mal à supporter la colère de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.LKvlCv4BVu6hBg0p]{Te'Riri}
        et les prises de positions de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.nqHJEcBPmuo9cAKT]{Peka}.</p>
      public: <p>Mâle - 58 ans</p>
