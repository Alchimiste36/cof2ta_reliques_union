    appearance:
      private: ''
      public: >-
        <p>Mâle - 58 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Ce
        grand et maigre centaure &agrave; la barbe longue et hirsute aime les
        plantes, les arbres et la nature. Il passe son temps dans le verger, le
        potager et la for&ecirc;t a r&eacute;colter, chouchouter et entretenir
        les plantes. C'est un des seul Centaure du village autoris&eacute;
        &agrave; quitter le village pour aller trouver et ramener des plantes
        non cultivables dans l'enceinte du village. Il est tr&egrave;s calme et
        discret et certains adolescents ou enfants le pensent un peu fou. Il est
        tr&egrave;s tactile avec la nature mais aussi avec les autres personnes
        (la main dans les cheveux, des serrages dans ses bras&hellip;), ce qui
        peut agacer certains villageois. Depuis une dizaine d'ann&eacute;es, il
        entreprend de r&eacute;pertorier la faune et la flore locales dans
        plusieurs grands volumes en dessinant le plus pr&eacute;cis&eacute;ment
        possible chaque caract&eacute;ristiques et chaque
        propri&eacute;t&eacute;. Les 4 tomes de plusieurs dizaines de pages sont
        des ouvrages magnifiques et assez inestimable pour un botaniste. Il ne
        supporte plus sa conjointe, {Ka'Huri}, depuis qu'elle traine avec
        {Kaha}, {Te'Tipu} et {Kaihoko}. Il l'a trouve plus violente, plus
        stress&eacute;e et surtout elle parle de plus en plus de son envie de
        "conqu&eacute;rir" la montagne et de prendre le contr&ocirc;le de leur
        r&eacute;gion. De la m&ecirc;me mani&egrave;re, il aime passer du temps
        avec deux de ses filles, {Te'Wikitoria} et {Hei Tunu} mais a de plus en
        plus de mal &agrave; supporter la col&egrave;re de {Te'Riri} et les
        prises de positions de {Peka}.</p>
