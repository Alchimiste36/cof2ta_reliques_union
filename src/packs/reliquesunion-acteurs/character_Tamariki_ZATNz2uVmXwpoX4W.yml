        <p>Très jeune femelle qui suit les traces de sa mère avec passion. Que
        se soit à la cuisine collective ou lors des séances d'entrainement,
        Tamariki est la copie conforme de
        @UUID[Actor.h7x0EB6tAL2BuJkZ]{Maamaa}.</p><p>Tamariki préfère le couteau
        de lancer à l'arc mais elle sait déjà réaliser des manoeuvres aussi
        impressionnantes que celle de sa mère. La routine de ses parents lui
        convient très bien et seule les soirées contes et légendes dans la salle
        de cérémonie lui fait retarder le moment où elle va dormir.</p><p>Elle
        participe à toutes les soirées communautaires et elle adore participer
        aux pièces de théâtre ou aux soirées ludiques.</p>
