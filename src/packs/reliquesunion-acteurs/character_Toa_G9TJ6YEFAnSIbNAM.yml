    system:
      description: >-
        <p>Les Centaures sont une vieille races des Terres d'Arran.
        Malheureusement, ils n'ont pas réussi à trouver leur place dans les
        cités elfiques, naines, humaines ou Peaux Vertes.</p><p>Partageant les
        forets avec des tibues d'elfes sylvains ou parcourant les grandes
        plaines, les Centaures ont autrefois été très
        nombreux.</p><p>Aujourd'hui, il n'en reste qu'une poignée dans certains
        zones restraintes.</p><p>Un village perdu dans les montagnes des Crocs
        d'Acier est peuplé de Centaures vivant en autarcie depuis des centaines
