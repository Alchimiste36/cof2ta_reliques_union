  details:
    biography:
      private: >-
        <p>la conjointe de @UUID[Actor.RfNtemPbHymoV2zK]{Kaiako} est la maitre
        d'arme du village. Elle connait la rigueur et la précision de chaque
        danse de combat des centaures. </p><p>Elle possède une technique
        parfaite même si sa puissance ne pourrait rivaliser avec
        @UUID[Actor.btvS9qEFveBlGv7J]{Aroha} et
        @UUID[Actor.tP0ihTOJIthKq66b]{Wakaweti} en même temps. Elle profite de
        son rôle pour mettre quelques branlées à ses beaux-frères quand ils
        dépassent les bornes. </p><p>Elle passe beaucoup de temps avec ses
        enfants et partage l'amour que porte son fils,
        @UUID[Actor.j3OVVzmkWhACNokh]{Te'Whakama} pour
        @UUID[Actor.Nuzfpv18FiNwewCJ]{Vaiata}. </p><p>Depuis les attaques des
        Ombres Blanches, elle cherche un moyen de les stopper et on se rend vite
        compte que son impuissance face à cette menace la ronge de plus en
        plus.</p>
      public: <p>Femelle - 47 ans</p>
