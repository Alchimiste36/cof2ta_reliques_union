  details:
    biography:
      private: >-
        <p>Professeur principal du village, Kaiako est un centaure mâle qui
        passe la plupart de son temps avec sa conjointe
        @UUID[Actor.G9TJ6YEFAnSIbNAM]{Toa} et les parents de
        @UUID[Actor.Nuzfpv18FiNwewCJ]{Vaiata}.</p><p>Il n'a presque plus aucun
        rapport avec son père @UUID[Actor.AUMVOCux3piDen0C]{Kaha} ni avec ses
        deux frères et leurs idées de conquêtes. Moqué par sa famille, sa
        conjointe Toa sait calmer ses beaux-frères à coup de grandes claques
        dans leurs tronches lors des entrainements aux armes ou aux danses de
        combats.</p><p>La plus grande fierté de Kaiako est ses enfants, deux
        jeunes femelles centaures à la passion aussi tranchante que leur mère et
        un jeune centaure mâle d'à peine 17 ans talentueux à la forge et
        passionné pour l'art du combat.</p>
      public: <p>Mâle - 49 ans</p>
