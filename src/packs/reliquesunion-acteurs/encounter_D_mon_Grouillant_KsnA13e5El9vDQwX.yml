    properties: >-
      <div class="cof1-capacity-import">
              <p><u><strong>Agripper</strong></u> :</p>
              <p>sur un r&eacute;sultat de 15 &agrave; 20 sur un jet de d20 en attaque, la cr&eacute;ature agrippe sa proie et ne la l&acirc;che plus.</p>
      <p>Il obtient un bonus de +5 en attaque et +1d6 aux DM contre la cible
      qu'il agrippe et celle-ci est immobilis&eacute;e si elle est de taille
      inf&eacute;rieure.</p>

      <p>La victime peut essayer de se lib&eacute;rer au prix d'une action de
      mouvement en r&eacute;ussissant un test de FOR oppos&eacute;.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Démon</strong></u> :</p>
              <p>&nbsp;<br>&nbsp;<br>les d&eacute;mons ne sont pas consid&eacute;r&eacute;s comme des cr&eacute;atures non vivantes. Toutefois, ils partagent avec celles-ci de nombreux traits.</p>
      <p>Ils ne respirent pas, ne dorment jamais, ne connaissent pas la fatigue
      et sont immunis&eacute;es au poison et aux maladies non magiques.</p>

      <p>Ils n'ont pas besoin de se sustenter, du moins pas avec des nourritures
      terrestres les ombres et y dispara&icirc;tre. Il peut en ressortir quand
      bon lui semble, &agrave; une distance maximale de 20 m de son point de
      disparition &ndash; toujours au prix d'une action de mouvement. Tant qu'il
      est dans les ombres, le d&eacute;mon mineur est insensible &agrave; tout
      type de DM &ndash; hormis les DM de zone.</p>

      <p>Il peut cependant &ecirc;tre r&eacute;v&eacute;l&eacute; &agrave;
      l'aide d'une source&nbsp;</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Poison Mortel</strong></u> :</p>
              <p>Le poison inflige [M.FOR d6] DM &agrave; la victime, la moiti&eacute; si elle r&eacute;ussit un test de CON DD10.</p>
      <p>&nbsp;R&eacute;partissez les DM au rythme de 1d6 par tour &agrave;
      partir du moment de l'empoisonnement.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Rapide</strong></u> :</p>
              <p>une cr&eacute;ature est capable de se d&eacute;placer de 30 m&egrave;tres par action de mouvement.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Se fondre dans les Ombres</strong></u> :</p>
              <h1>Description</h1>
      <p>Au prix d'une action de mouvement, le d&eacute;mon mineur peut gagner
      les ombres et y dispara&icirc;tre. Il peut en ressortir quand bon lui
      semble, &agrave; une distance maximale de 20 m de son point de disparition
      &ndash; toujours au prix d'une action de mouvement. Tant qu'il est dans
      les ombres, le d&eacute;mon mineur est insensible &agrave; tout type de DM
      &ndash; hormis les DM de zone. Il peut cependant &ecirc;tre
      r&eacute;v&eacute;l&eacute; &agrave; l'aide d'une source de lumi&egrave;re
      suffisamment puissante (tel qu'un sort de Lumi&egrave;res dansantes par
      exemple ou un feu plus important que celui d'une torche).</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Vision dans le Noir</strong></u> :</p>
              <p>&nbsp;La cr&eacute;ature voit dans le noir comme en plein jour jusqu'&agrave; une distance de 30 m&egrave;tres.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Vitalité Surnaturelle</strong></u> :</p>
              <p>La Cr&eacute;ature r&eacute;cup&egrave;re 5 PV par tour, sauf si les DM subis sont de feu ou d'acide.&nbsp;</p>
      <p>M&ecirc;me &agrave; 0 PV, il continue &agrave;
      r&eacute;g&eacute;n&eacute;rer les tissus morts &agrave; moins qu'on ne
      br&ucirc;le son corps.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Fauchage</strong></u> :</p>
              <p>sur un r&eacute;sultat de 15 &agrave; 20 au test d'attaque, si l'attaque est r&eacute;ussie, la victime doit r&eacute;ussir au choix un test de FOR ou de DEX difficult&eacute; [10+Mod. de FOR de la cr&eacute;ature] ou &ecirc;tre renvers&eacute;e.</p>
            </div>
