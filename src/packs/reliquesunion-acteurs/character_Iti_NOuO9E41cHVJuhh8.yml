  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: gIvkQXHJbkBTTa3U
    system:
      description: >-
        <p>c'est un travailleur touche-à-tout qui peut passer de la scierie, à
        la tissanderie ou à la mine sans aucun problème. Il fait un boulot
        correct partout et il aime, comme sa mère
        @UUID[Actor.5A4aNmciTnCqcjvX]{Whakarewa} le travail bien fait et
        efficace.</p><p>Depuis qu'il est en couple avec
        @UUID[Actor.4N3OVVj0dI5LPfNR]{Kamura}, il s'occupe car elle n'est pas
        très disponible. Il apprécie travailler à ses côtés dans la scierie ou
        au pressoir mais il est assez impuissant face à la distance qu'il y a
        entre eux. Il n'ont pas d'enfants et ça ronge Iti depuis que son frère
        et sa soeur ont fondé une famille.</p><p>Les trois enfants de
        @UUID[Actor.ZFFGsUvkAO1nS9PD]{Kaipara} et
        @UUID[Actor.5A4aNmciTnCqcjvX]{Whakarewa} se portent volontaire pour
        "s'occuper" des PJs lorsqu'ils seront dans les mines à leur arrivée.</p>
