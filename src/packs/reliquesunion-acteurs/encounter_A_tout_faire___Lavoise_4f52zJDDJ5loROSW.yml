        et servent juste à couvrir la tête. Certains groupes religieux ou
        sociaux imposent le port de couvre-chefs particuliers. Un couvre-chef
        ayant une véritable utilité pratique, comme un tricorne, coûte
        généralement 2 pa.<br /><br />Les pirates portent souvent des bandanas
