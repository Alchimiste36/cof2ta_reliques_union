    appearance:
      private: ''
      public: >-
        <p>Femelle - 61 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Cette
        femelle centaure &agrave; la musculature discr&egrave;te est capable de
        tenir un marteau de forge durant plusieurs jours sans avoir une seule
        courbature. Contrairement &agrave; son conjoint {Kaipara} elle est
        tr&egrave;s exigeante et elle peut se montrer hautaine voir
        m&eacute;prisante face &agrave; un travail b&acirc;cl&eacute; ou un
        &eacute;puisement physique. Elle n'est pas l&agrave; pour faire de la
        dentelle, des runes ou des fioritures, sa forge est efficace,
        ma&icirc;tris&eacute;e et fonctionnelle. On lui confie souvent la
        restauration des pi&egrave;ces m&eacute;caniques des diff&eacute;rentes
        machines du Village. Elle a entre autre remplac&eacute; l'engrenage
        principal de la machine reli&eacute;e &agrave; la roue de la cascade.
        Sans aucune contradiction, Whakarewa est la cheffe de la forge et il
        faudra son aval pour l'utiliser. Leur diff&eacute;rence de
        caract&egrave;re n'emp&ecirc;che par Kaipara et Whakarewa de s'aimer
        comme au premier jour m&ecirc;me si cette derni&egrave;re est souvent
        atterr&eacute;e par l'humour vaseux de son conjoint.</p>
