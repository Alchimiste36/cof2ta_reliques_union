    _id: hTfJJoh4m1nnktvV
    system:
      description: "<p>Cette femelle centaure très discrète ne partage pas la violence de son conjoint, @UUID[Actor.A0N0QlLLdB170Ccf]{Te'Tipu} mais elle ne pourra jamais lui dire ou s'opposer à lui. Craignant ces colères, elle reste soumise à son conjoint malgré des coups qu'elle peut recevoir de temps en temps. Elle passe beaucoup de temps seule dans le long couloir de la tisseranderie.\_</p><p>Elle ne parle presque à personne et préfère passer ses journées dans des endroits où on ne risque pas de la rencontrer. Devant le rouet de filage, avec le bruit et les vibrations de la machinerie, il lui est possible de laisser ses larmes couler. Elle souffre aussi de voir son fils,\_@UUID[Actor.1TJXdxZkBi0ZRvGn]{Taitamariki}, se renfermer devant les crises de colère de Te'Tipu.</p><p>@UUID[Actor.T99bZAdCe7gkYs3V]{Kara}, soigneuse et psychologue du village a deviné par ses blessures et derrière ses paroles la violence régulière de Te'Tipu mais malheureusement elle ne peut pas faire grand chose au risque d'envenimer la situation pour cette centaure perturbée.</p>"
