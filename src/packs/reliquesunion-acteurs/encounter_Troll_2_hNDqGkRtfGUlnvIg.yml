    notes:
      private: |-
        <hr>
            <h3>Équipement (import COF1)</h3>
            <p><strong>Gourdin de Troll</strong> <span style="opacity:.75">(melee · Livre du joueur p. 157)</span></p>
      public: >-
        <p>Les trolls sont de grands humano&iuml;des de 2,70 m &agrave; la peau
        caoutchouteuse verd&acirc;tre ou violac&eacute;e, couverte
        d'excroissances et de plaques suppurantes.</p>

        <p>Non seulement les armes rebondissent sur cette &eacute;paisse peau
        &eacute;lastique mais, de plus, les blessures inflig&eacute;es
        cicatrisent de fa&ccedil;on acc&eacute;l&eacute;r&eacute;e gr&acirc;ce
        &agrave; un m&eacute;tabolisme exceptionnel. Aussi, le troll est un
        monstre d&eacute;nu&eacute; de peur, confiant en sa capacit&eacute;
        &agrave; &eacute;chapper &agrave; la mort et qui se montre
        particuli&egrave;rement f&eacute;roce au combat.</p>
    languages: []
    properties: >-
      <div class="cof1-capacity-import">
              <p><u><strong>Vitalité Surnaturelle</strong></u> :</p>
              <p>La Cr&eacute;ature r&eacute;cup&egrave;re 5 PV par tour, sauf si les DM subis sont de feu ou d'acide.&nbsp;</p>
      <p>M&ecirc;me &agrave; 0 PV, il continue &agrave;
      r&eacute;g&eacute;n&eacute;rer les tissus morts &agrave; moins qu'on ne
      br&ucirc;le son corps.</p>
            </div>
