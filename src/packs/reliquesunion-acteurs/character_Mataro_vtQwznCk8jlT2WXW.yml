  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: DQGVd862g5Ms1JDE
    system:
      description: >-
        <p>Autrefois un jeune garçon heureux et souriant, Mataro a changé ses
        sourires pour une froide colère, depuis quelques mois. Il est renfermé
        et introverti malgré sa passion pour la forge.</p><p>Il passe beaucoup
        de son temps à jouer du marteau et façonner le métal rougeoyant. Il a un
        certain talent mais ne semble pas prendre de plaisir malgré les
        encouragements. Ses explications à sa mère ou son père tournent autour
        de la place du chef qui devrait être confiée à son père selon la
        tradition.
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.T99bZAdCe7gkYs3V]{Kara}
        sait qu'une souffrance plus profonde est cachée mais elle n'arrive pas à
        la déceler et ce genre de discussions apportent plus de colère, de cris
        et de disputes.</p><p>Si un PJ partage la forge avec Mataro et commence
        à se lier d'amitié avec lui, il pourra apprendre qu'il était présent
        quand sa grand-père maternelle s'est faite massacrée devant ses yeux et
        qu'en plus du traumatisme, il est en colère contre son inaction et la
        peur qui l'a paralysée. Il s'en veut, il est triste, il dort mal et
        surtout il est en colère car personne ne veut faire payer à ces Ombres
        Blanches.</p>
