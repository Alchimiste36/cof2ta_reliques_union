    system:
      description: "<p>Effet après 10 minutes. Virulence 7.</p><p>Test de CON signifiant <strong>la mort en\_cas d’échec</strong> ou <strong>infligeant 2d6 de DM en cas de\_réussite</strong>.</p><p><em>L’essence de hyokäne, inodore et incolore, est une\_arme fatale entre les mains d’un assassin.</em></p><h5>Poisons</h5><p>Il existe une grande variété de poisons à travers\_le monde, certains existant sous forme naturelle\_et d’autres étant issus d’un processus synthétique\_plus ou moins complexe.</p><p>En sus de leurs effets propres, ces toxiques sont\_catégorisés selon deux critères: la virulence\_ et\_le type.</p><p>La virulence définit l’efficacité avec laquelle il\_va agir. Elle s’échelonne de 0 à 10 bien qu’on\_retrouve la majorité des poisons sur une échelle\_comprise entre 0 et 5. Une virulence supérieure\_à 5 est très rare et caractérise les poisons les plus\_violents et mortels, uniquement manipulés\_par les maîtres alchimistes ou les plus grands\_assassins.</p><p>La plupart des poisons autorisent un test de\_CON pour résister à son effet, la difficulté du\_test étant égale à 10 + virulence.</p><p>Le type de poison permet de prévoir grossièrement la façon dont ses effets vont se manifester.</p><h5>Enduire une arme</h5><p>Il est possible d’enduire une arme de poison\_à l’aide d’un test d’INT difficulté 14 ; en cas\_d’échec la dose est gaspillée. Un échec critique\_sur ce test signifie que le personnage s’empoisonne lui-même. Seule la première attaque\_réussie avec une arme enduite de poison permet\_d’appliquer les effets du poison.</p><p>Pour plus de renseignement sur les poisons,\_référez-vous au chapitre «Équipement» (page\_156).</p>"
