    appearance:
      private: ''
      public: >-
        <p>Femelle - 35 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Te'Whikitoria
        a longtemps &eacute;t&eacute; pouss&eacute;e a devenir une grande
        guerri&egrave;re ou une talentueuse chasseresse par sa m&egrave;re,
        {Ka'Huri}, mais l'influence passive de son p&egrave;re, {Kaiputu}, et sa
        joie devant toutes les merveilles de la nature a s&eacute;duit
        Te'Whikitoria. Elle se passionne rapidement pour l'&eacute;tude de la
        faune et de la flore et la d&eacute;couverte des particularit&eacute;s
        de chaque esp&egrave;ces. {Kara}, la soigneuse, la prend sous son aile
        et s'accorde sur ses comp&eacute;tences et son go&ucirc;t pour la
        pr&eacute;paration de baumes, potions et autres rem&egrave;des.
        Gr&acirc;ce au soutien de sa petite soeur, {Hei Tunu} et de sa
        connaissance dans de l'alambic, elle apprend vite et prend plaisir
        &agrave; aider Kara avec les bless&eacute;s ou les malades. Kara lui
        raconte m&ecirc;me les secrets et &eacute;motions des villageois pour
        que Te'Whikitoria puisse l'aider lors de ses s&eacute;ances de
        psychologie.</p>
