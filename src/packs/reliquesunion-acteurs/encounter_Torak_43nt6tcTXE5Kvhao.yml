    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: >-
        <p>Ancien membre grad&eacute; d'un compagnie du Bouclier, Torak est
        aujourd'hui reclu dans la ville du Ravin de Novrak. Il passe ses
        journ&eacute;es &agrave; forger, boire et grogner dans sa barbe. Devenu
        Boitard lors d'une exp&eacute;dition dans les plaines du Sud de l'Ouran,
        il est compliqu&eacute; pour lui de ravaler sa frustration.</p>

        <p>Une de ses passion est de collectionner et r&eacute;cup&eacute;rer
        des Armes et Armures Traditionnelles de tous les peuples. Il a un vrai
        petit mus&eacute;e dans son atelier.</p>

        <p>Caract&egrave;re : bourru - sarcastique - piquant</p>

        <p>Propos :</p>

        <ul>

        <li>Ca fait bien longtemps que je vous cotoie et &agrave; chaque fois
        vous criez avant d'avoir mal</li>

        <li>Rien qu'en les regardant, je suis sur que ces Centaures sont plus
        accueillants que vous, les pleureuses</li>

        <li>Si y'en a un qui a un probl&egrave;me avec les anciennes races
        qu'ils viennent me le dire en face - j'ai soit une bonne bi&egrave;re et
        un excellent travail soit un gros marteau pour son pif !!</li>

        <li>D&eacute;merdez-vous, mes venez pas chialer si plus personne ne fout
        les pieds dans votre village glaciale si on apprend que vous &ecirc;tes
        tous de foutu Racistes</li>

        </ul>
