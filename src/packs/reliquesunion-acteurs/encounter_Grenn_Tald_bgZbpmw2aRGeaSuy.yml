  - name: Menottes
    type: equipment
    img: >-
      icons/sundries/survival/cuffs-shackles-steel.webp
    _id: S6h4qjFc9cjjjcVL
    system:
      description: >-
        <p>Ces menottes permettent d'attacher une créature de taille
        M.</p><p>Une créature menottée peut utiliser la compétence Évasion pour
        se dégager (DD 30 ou DD 35 pour les menottes de maître).Il faut réussir
        un test de Force pour briser les menottes (DD 26, ou DD 28 pour les
        menottes de maître). Les menottes ont une solidité de 10 et 10 points de
        vie.</p><p>La plupart des menottes ont une serrure. Rajoutez le coût de
        la serrure pour avoir le prix des menottes.</p><p>Pour le même prix, le
        personnage peut acheter des menottes adaptées à une créature de taille
        P. Pour une créature de taille G, les menottes coûtent 10 fois le prix
        indiqué et pour une créature de taille TG, elles coûtent 100 fois le
        prix indiqué. Les créatures de taille Gig, C, TP, Min ou I ne peuvent
        être attachées qu'avec des menottes fabriquées spécialement, ce qui
        coûte au moins 100 fois le prix indiqué.</p>
