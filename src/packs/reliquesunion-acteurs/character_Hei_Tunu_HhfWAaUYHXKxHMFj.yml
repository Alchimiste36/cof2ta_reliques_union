  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: RgmGyeM8v2WLAjFb
    system:
      description: >-
        <p>Hei Tunu est jeune mais un ancien du village, aujourd'hui décédé, lui
        a appris tout le savoir nécessaire pour s'occuper de l'Alambic, cette
        magnifique machine d'une complexité extrême. Elle connait toutes les
        vannes, cadrans, courbes et tuyaux de l'Alambic et elle prend son rôle
        très au sérieux.</p><p>Depuis quelques temps elle initie à son métier
        @UUID[Actor.CJXonzJKD36jl2VD]{Harikoa} et reconnait en elle un grand
        talent et une belle inventivité.</p><p><strong>Hei Tunu a un caractère
        très stable, elle est patiente et très réfléchie dans chacun de ses
        gestes.</strong> Elle sait que sa machine peut faire "péter" la moitié
        du village si elle fait une mauvaise manipulation.</p><p><strong>Elle
        est enceinte et la joie de @UUID[Actor.CJXonzJKD36jl2VD]{Harikoa} est
        une bénédiction pour ses journées.</strong></p><p><strong>Son conjoint
        est @UUID[Actor.N0rh5EXxLtPGjz5r]{Whakaaro}</strong> et elle passent
        beaucoup de temps avec la famille de
        @UUID[Actor.Nuzfpv18FiNwewCJ]{Vaiata} et celle de
        @UUID[Actor.RfNtemPbHymoV2zK]{Kaiako}.</p><p><strong>Elle n'a presque
        plus aucun rapport avec sa propre famille</strong>, à part son père,
        @UUID[Actor.2t5SemjHrF5ukWua]{Kaiputu} qui lui apprend beaucoup de
        choses sur la nature et avec sa soeur,
        @UUID[Actor.HMpPEtlwshgIOybw]{Te'Wikitoria} avec qui elle a beaucoup de
        rapport pour la confection de remèdes.</p>
