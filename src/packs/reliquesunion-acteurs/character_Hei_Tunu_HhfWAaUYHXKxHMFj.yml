    name: Téléportation
    type: capacity
    img: icons/magic/movement/trail-streak-pink.webp
    system:
      description: "<p>Le PJ <strong>disparaît et réapparaît à un autre endroit\_situé à moins de [INT x 10] mètres</strong>. Le lieu\_d’arrivée doit être <strong>soit en ligne de vue</strong>, soit\_<strong>parfaitement connu</strong> par le PJ.\_</p><p>Alternativement, <strong><span style=\"text-decoration:underline\">à l’issue d’un rituel d’une\_heure</span></strong>, le PJ peut se téléporter à <strong>une distance de\_[INT x 10] kilomètres</strong>. La destination doit être\_plane et dépeuplée pour éviter tout accident.</p>"
