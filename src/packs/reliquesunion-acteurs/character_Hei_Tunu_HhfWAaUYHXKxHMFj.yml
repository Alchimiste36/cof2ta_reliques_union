  details:
    biography:
      private: >-
        <hr>
            <h3>Équipement (import COF1)</h3>
            <p><strong>Ruer/Botter</strong> <span style="opacity:.75">(melee · Lana&#039;Sir)</span></p>
        <p><strong>Mains nues</strong> <span style="opacity:.75">(melee · Livre
        du joueur p. 157)</span></p>

        <p><strong>Bâton ferré</strong> <span style="opacity:.75">(melee · Livre
        du joueur p. 157)</span></p>
      public: >-
        <div class="cof1-import-block">

        <p><u><strong>Profil</strong></u> : MYSTIQUE</p>

        <p><u><strong>Peuple</strong></u> : Centaures d&#039;Arkanov</p>

        <p>Lumière des étoiles / Attaques Naturelles</p>

        <p><u><strong>Voie du Peuple Centaure</strong></u></p>

        <p>Athlétique / Métabolisme Rustique / Coup de Pattes / Maîtrise des
        Armes Longues / Corps Puissant</p>

        <p><u><strong>Voie des Centaures d&#039;Arkanov</strong></u></p>

        <p>Danse de Combat (L) / Science du Combat / Valeurs Ancestrales /
        Tatouage Rituel / Symbole d&#039;Arkanov</p>

        <p><u><strong>Voie de l’alchimie (Mystique)</strong></u></p>

        <p><u>Fortifiant</u> / <u>Feu grégeois</u> / Huile instable / Élixir de
        guérison / Élixirs de Protection</p>

        <p><u><strong>Voie de la magie runique (Mystique)</strong></u></p>

        <p><u>Forgeron*</u> / <u>Rune d’énergie*</u> / <u>Rune de puissance*</u>
        / Rune de garde* / Rune de tradition</p>

        <p><u><strong>Voie de la magie  élémentaliste
        (Mystique)</strong></u></p>

        <p><u>Brumes*</u> / <u>Sous tension*</u> / <u>Armure de terre*</u> /
        <u>Boule de feu*</u> / Intelligence héroïque</p>

        </div>
    appearance:
      private: ''
      public: >-
        <p>Femelle - 32 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Hei
        Tunu est jeune mais un ancien du village, aujourd'hui
        d&eacute;c&eacute;d&eacute;, lui a appris tout le savoir
        n&eacute;cessaire pour s'occuper de l'Alambic, cette magnifique machine
        d'une complexit&eacute; extr&ecirc;me. Elle connait toutes les vannes,
        cadrans, courbes et tuyaux de l'Alambic et elle prend son r&ocirc;le
        tr&egrave;s au s&eacute;rieux. Depuis quelques temps elle initie
        {Harikoa} &agrave; son m&eacute;tier et reconnait en elle un grand
        talent et une belle inventivit&eacute;. Hei Tunu a un caract&egrave;re
        tr&egrave;s stable, elle est patiente et tr&egrave;s
        r&eacute;fl&eacute;chie dans chacun de ses gestes. Elle sait que sa
        machine peut faire "p&eacute;ter" la moiti&eacute; du village si elle
        fait une mauvaise manipulation. Elle est enceinte et la joie de Harikoa
        est une b&eacute;n&eacute;diction pour ses journ&eacute;es. Son
        conjoint, {Whakaaro} et elle passent beaucoup de temps avec la famille
        de {Vaiata Viata} et celle de {Kaiako}. Elle n'a presque plus aucun
        rapport avec sa propre famille, &agrave; part son p&egrave;re, {Kaiputu}
        qui lui apprend beaucoup de choses sur la nature et avec sa soeur,
        {Te'Wikitoria} avec qui elle a beaucoup de rapport pour la confection de
        rem&egrave;des.</p>
    notes:
      private: ''
      public: ''
    size: medium
