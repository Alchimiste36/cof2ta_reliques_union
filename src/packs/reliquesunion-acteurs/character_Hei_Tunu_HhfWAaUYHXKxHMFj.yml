  - folder: zxPkkKcqCdrulUkV
    name: Désintégration
    type: capacity
    img: icons/magic/unholy/beam-impact-purple.webp
    system:
      description: "<p>Le PJ <strong>projette un rayon mortel dont la portée\_est de 20 mètres</strong> et qui annule la cohésion de\_la matière, ne laissant derrière lui qu’un amas\_de poussière.</p><p>Un test d’<strong>attaque magique réussi</strong>\_permet de toucher une créature et d’<strong>infliger\_[6d6 + Mod. d’INT] DM.</strong></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si le PJ vise un objet porté par une créature</span></strong></span>, le\_jet d’attaque subit un malus de -5. Les objets\_de tradition et légendaires sont insensibles à ce\_sort et les objets normaux réduits en poussière.</p><p>Aucun objet de plus de 50 kg ne peut être affecté\_par ce sort : inutile de tenter de creuser un\_tunnel par ce biais. En revanche, vous pourrez\_ainsi désintégrer une porte (ou même une pierre\_dans un mur).</p>"
      source: ''
      origin: Livre du Joueur p.149
      slug: ''
      inGame: "<p>La première action permet de réaliser l'attaque de Désintégration contre une créature.\_</p><p>La deuxième action permet de réaliser l'attaque de Désintégration contre un objet.</p><blockquote><h5>Sorts prestigieux\_et Magie économe</h5><p>Il n’est pas possible d’user\_de Magie économe sur les\_sorts issus de voies\_de prestige.</p></blockquote>"
