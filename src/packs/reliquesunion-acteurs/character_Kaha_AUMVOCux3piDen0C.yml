  - folder: lVzsmxyYnGl3mGnJ
    name: Tour de force
    type: capacity
    img: icons/skills/movement/arrow-upward-yellow.webp
    system:
      description: "<p>Le PJ peut temporairement décupler ses ressources physiques pour faire usage d’une force\_prodigieuse. Il peut ainsi soulever une charge\_incroyable, briser une épée, tordre des barreaux\_ou défoncer une porte d’un seul coup de poing.\_</p><p>Il obtient un bonus de <strong>+10 à son test de FOR,</strong>\_<strong>mais cela lui coûte 1d4 PV.</strong></p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> une fois par combat, le PJ\_peut asséner un coup d’une violence incroyable.\_Il gagne un bonus de 2d6 DM mais cela lui\_coûte 2d4 PV.</p></blockquote>"
