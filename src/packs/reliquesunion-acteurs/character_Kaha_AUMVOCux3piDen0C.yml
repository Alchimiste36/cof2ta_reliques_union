  details:
    biography:
      private: >-
        <p>Malgré son âge, Kaha est une force de la nature tant par son
        physique, son expertise du combat et son caractère intransigeant.
        </p><p>Veuf depuis plus de 40 ans, à la naissance de son dernier fils,
        il a une place importante à Arkanov et ne se prive pas de confronter le
        chef
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.elGCQN2rjOxAynF3]{Kiliko}
        lorsqu'il désapprouve une décision. </p><p>Pour lui le village doit se
        développer, s'agrandir et revendiquer les parcelles qui entourent
        l'entrée. Les centaures sont bien assez forts et déterminés pour
        s'émanciper de cette prison. Il enrage de la décision du chef de ne pas
        partir chercher les Ombres Blanches pour leur faire payer leurs attaques
        et même s'il se méfie énormément des étrangers, pour lui les montagnes
        et tout ce qu'elle contiennent appartiennent aux centaures et à eux
        seuls. </p><p>Ces deux fils les plus jeunes,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.A0N0QlLLdB170Ccf]{Te'Tipu}
        et
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.hf1UN77UaRB6Yuqb]{Kaihoko},
        ont les mêmes idées d'expansion alors que son aîné,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.RfNtemPbHymoV2zK]{Kaiako},
        partage plus la position du chef pour le plus grand désespoir de Kaha.
        </p><p>A 78 ans, Kaha est un guerrier expérimenté, peut-être le seul qui
        pourrait battre
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.tP0ihTOJIthKq66b]{Wakaweti}.</p>
      public: <p>Mâle - 78 ans</p>
