  - folder: d9NqfxN66ml5JbEw
    name: Rune de garde
    type: capacity
    img: >-
      icons/commodities/treasure/token-engraved-yellow-glowing.webp
    system:
      description: "<p>Le PJ inscrit une <strong>rune lumineuse dans les airs</strong>\_(visible pour la durée du sort) et piège une zone\_allant <strong>de 2 à 10 m de diamètre</strong>. Toute créature\_(de taille au moins très petite) qui entre dans\_la zone déclenche un effet choisi parmi trois au\_moment où le sort est lancé.</p><ul><li><p><strong><span style=\"text-decoration:underline\">Alarme :</span></strong> un puissant gong retentit.</p></li><li><p><strong><span style=\"text-decoration:underline\">Feu :</span></strong> [3d6+Mod. d’INT] DM de feu.</p></li><li><p><strong><span style=\"text-decoration:underline\">Peur :</span></strong> test de SAG difficulté [15+Mod. d’INT]\_ou fuir pendant 2d6 tours.</p></li></ul><p>À chaque fois qu’une créature entre à nouveau\_dans la zone, elle subit les effets. Le sort a <strong>une\_durée de 1d6 minutes</strong> mais peut être <strong>prolongé\_jusqu’à 12 heures par un rituel de 10 minutes. </strong></p><p><strong>Les créatures présentes dans la zone pendant\_le rituel sont immunisées aux effets</strong>. De plus,\_si ce sort est lancé alors qu’une autre rune est\_encore active quelque part, l’ancienne prend\_fin immédiatement.</p>"
      source: ""
      origin: Livre du Joueur p.137
      slug: ""
      inGame: >-
