        <p>La première action activable permet de jeter le jet de DM au moment
        où l'amélioration est activée et donne le bonus aux jets de FOR tant que
        l'action reste activée.</p><p>Si le PJ obtient la capacité avancée,
        ajoutez sur la deuxième action la Condition "est appris" et ajouter dans
        l'onglet "Détails" une fréquence Combat 1/1. Cette action activable
        permet de lancer le jet de DM et d'ajouter le Bonus au DM en cas de coup
        violent.</p>
