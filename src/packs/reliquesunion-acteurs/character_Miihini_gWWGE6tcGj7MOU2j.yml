  details:
    biography:
      private: >-
        <p>Soeur du chef, cette femelle centaure a toujours été célibataire et
        elle a un sacré caractère. Sa force de caractère lui permet de
        confronter son grand frère quand il est trop sévère ou qu'il manque à
        ses devoirs.</p><p>Elle est très ouverte d'esprit et un vrai modèle pour
        @UUID[Actor.Nuzfpv18FiNwewCJ]{Vaiata}. Elle est experte de toutes les
        machines du village et elle passe beaucoup de temps avec
        @UUID[Actor.dEFsexceQ4AhgJf1]{Karekau}.</p><p>Bonne cuisinière elle aime
        les personne qui ont un bon coup de fourchette. Lorsque l'on arrive à
        passer sa méfiance, elle est très rigolotte.</p>
      public: <p>Femelle - 63 ans</p>
