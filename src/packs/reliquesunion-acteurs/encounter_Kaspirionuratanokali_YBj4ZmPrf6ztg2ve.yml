  pasteData: ''
  details:
    category: humanoid
    size: medium
    description:
      private: ''
      public: ''
    notes:
      private: >-
        <p>En cas de trahison majeure, Kaspirionuratanokali aime se venger en
        kidnappant le coupable et en le torturant le plus longtemps possible. Il
        attache le coupable à l'arrière de son Sanpuroch, les mains au niveau de
        la selle et les jambes autour des cuisses de la monture. Pendant
        plusieurs jours il va "trimballer" la personne où qu'il aille. Les
        mouvements amples et agiles du Sanpuroch vont désarticuler
        progressivement les membres et lacérer la peau en de multiples
        endroits.</p>
      public: "<p>C'est le chef d'une tribu de @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sIVLqiWuHbLRvgXK]{Mangeurs des Plaines}.</p><p>Un homme fier et élégant drapé dans de larges vêtements chaud et confortable. Il a toujours un sourire aux lèvres mais peut se montrer extrèmement violent si on lui manque de respect ou qu'on le trahi.</p><p>Il est respecté par les membres de son clan.</p><p>Il parle la langue commune de façon correcte et il est pas trop compliqué de le comprendre. Cela lui permet d'avoir de bonnes relations avec certaines Forteresse-Etats du nord de l'Ourann.\_</p><p>Il possède un clan d'une 30e d'individus composé à parité de femmes et d'hommes. Chaque sexe peut être guerrier ou s'occuper de la famille ou des tâches quotidiennes comme le veut la tradition des mAngeurs de Plaines. Il a aussi une 50e de Sanpuroch, leur farouches montures. Le sens de l'orientation et l'esprit de famille des Sanpuroch lui permet de les \"confier\" à des personnes et les bêtes retrouveront toujours le clan.</p>"
    languages: []
    properties: ''
