    name: Voie Culturelle des Elfes Blancs
    type: path
    img: modules/cof2ta_reliques_union/assets/cof2ta_icones/cof2ta_elfe_blanc2.webp
    system:
      description: "<h2>Les Elfes Blancs</h2><p>Jusqu’à la malédiction des goules et l’implication\_de leurs armées contre les troupes de\_ Lah’saa,\_de nombreux peuples considéraient les Elfes\_blancs comme éteints, disparu de la surface des\_Terres d’Arran. Originaires de lointaines îles de\_l’Ouest, ils semblaient alors ne nourrir qu’un\_attrait sommaire pour le destin du monde.\_</p><p>Intéressés par son évolution certes, avides de\_préserver son héritage mais insensibles à ses\_maux. Cette perception a changé lors des\_événements dramatiques évoqués plus haut.\_</p><p>Ces Elfes à la peau très pâle cherchent à incarner\_la perfection en toute chose. Ils sont intransigeants envers les autres mais surtout envers\_eux-mêmes. Les Blancs sont rares en dehors de\_leurs îles. Souffrant d’un grave problème de fécondité aux origines inconnues, leur population\_ne fait que décroître depuis des siècles. En voir\_un constitue toujours un évènement.</p>"
