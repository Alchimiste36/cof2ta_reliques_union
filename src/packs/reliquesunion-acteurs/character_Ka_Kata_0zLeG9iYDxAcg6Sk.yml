  details:
    biography:
      private: >-
        <p>Ce Centaure est très proche de ses parents et de leur amour de la
        forge. Il a les même capacités que son père pour la minutie du travail
        de finition mais contrairement à lui, son humour est toujours percutant
        et juste.</p><p>Passionné par ses deux filles
        @UUID[Actor.ZATNz2uVmXwpoX4W]{Tamariki} et
        @UUID[Actor.6rsGepWy5twVXkbs]{Hunga}, il passe beaucoup de temps avec
        eux et les amène dans chaque bâtiment d'artisanat du village. Il est en
        couple avec @UUID[Actor.h7x0EB6tAL2BuJkZ]{Maamaa} qui s'occupe en
        particulier de la cuisine collective avec son père.</p>
