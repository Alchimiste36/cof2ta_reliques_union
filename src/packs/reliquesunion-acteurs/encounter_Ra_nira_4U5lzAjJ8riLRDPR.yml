    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: >-
        <p>Jeune fille du Ravin de Novrak, d'environ 16 ans.</p>

        <p>Caract&egrave;re : optimiste - progressiste - aventuri&egrave;re dans
        l'&acirc;me - anti-discrimination</p>

        <p>Propos :</p>

        <ul>

        <li>Je vous entend, tous les vieux du village et je suis triste. La
        plupart de mes amis peuvent rigoler avec tous les peuples qui passent
        par la ville. Nous ne sommes pas si diff&eacute;rents des Orcs, des
        Nains ou des centaures. Regardez-les, ces centaures, ils ont la classe
        et je suis sur qu'ils ne souhaitent que vivre heureux comme chacun de
        vous. Trouver leur place, manger, boire, rire et vivre heureux.</li>

        <li>J'en ai marre d'entendre certains hommes cracher sur notre amie
        Fa&euml; Gardam depuis qu'ils savent qu'elle est &agrave; moiti&eacute;
        elfe alors que la veille vous baviez sur ses yeux noisettes et vous vous
        battiez pour savoir qui l'a mettra dans son lit !!</li>

        <li>Vous voulez quoi au final : crever de peur et grogner &agrave;
        longueur de journ&eacute;e sur la m&eacute;chancet&eacute; des elfes ou
        des nains, partir en guerre contre tous les peuples d'Arran et crever
        sur des champs de bataille pour rester entre humains ou simplement vivre
        une belle vie dans notre village ?</li>

        <li>Avec mon p&egrave;re nous partagions la route avec des groupes
        d'orcs, des caravanes de nains et m&ecirc;me une fois un groupe d'elfes
        blancs traversant la montagne &agrave; la recherche d'un grand dragon
        blanc. Je n'ai jamais entendu de haine autre part dans dans les paroles
        de certains Novraks et Novrakis.</li>

        <li>Je pr&eacute;f&egrave;rerais pouvoir avoir des amis gobelins ou
        centaures que de devoir trainer une seconde avec les jeunes Novraks qui
        &eacute;coute tous les weekends, les conneries de pr&ecirc;tre Dertirn
        et les mensonges de Solima</li>

        </ul>
