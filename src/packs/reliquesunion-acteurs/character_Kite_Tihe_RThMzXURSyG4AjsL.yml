    biography:
      private: >-
        <p>Grande soeur de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.EhKag5p5a4F31dar]{Tumuaki},
        cette femme est d'une méchanceté profonde.</p><p>Veuve depuis plusieurs
        années, elle bougonne, rage et grogne tout le temps. Une maladie
        l'empêche de faire le moindre effort à cause de quintes de toux et elle
        passe ses journées à invectiver les habitants. Le fait que sa seule
        fille décide de choisir comme conjoint
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.tP0ihTOJIthKq66b]{Wakaweti},
        le premier né du chef, son propre cousin, est un vrai poison pour
        elle.</p><p>En plus de cette déception profonde, elle commence à perdre
        la mémoire et elle se répètera souvent et redécouvrira les PJs à chaque
        rencontre.</p>
