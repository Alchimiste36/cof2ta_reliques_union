        retrouvent tous les deux pour une s&eacute;ance de pri&egrave;re puis
        d'un entrainement intensif aux danse de combat et &agrave; la maitrise
        des armes. Calme et introvertie, elle s'occupe des machineries complexes
        au niveau de la cascade ou dans les diff&eacute;rents b&acirc;timents du
        village.</p>
