  details:
    category: humanoid
    size: large
    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: >-
        <p>Les ogres comptent parmi les humano&iuml;des les plus grands et
        puissants des Terres d&rsquo;Arran.</p>

        <p>Massifs, muscl&eacute;s, arborant de larges cornes sur leur
        cr&acirc;ne et souvent disgracieux, ils sont rarement aper&ccedil;us en
        dehors des r&eacute;gions du sud, de l&rsquo;Orient ou des
        fronti&egrave;res les plus orientales de l&rsquo;Ourann. Ils sont
        tellement craints que la plupart des communaut&eacute;s les chassent
        &agrave; vue.&nbsp;</p>

        <p>Cependant, il arrive que des soci&eacute;t&eacute;s commerciales
        fassent appel &agrave; ces &ecirc;tres d&rsquo;exception en tant que
        main-d&rsquo;&oelig;uvre ou mercenaire. Leur vie n&rsquo;est pas
        forc&eacute;ment facile au milieu de la civilisation, mais un simple
        regard ou grognement suffit &agrave; faire taire toute forme de
        vell&eacute;it&eacute; &agrave; leur encontre.</p>

        <p><br>Sur le champ de bataille, l&rsquo;ogre fait partie des
        adversaires les plus grands : bien que sa taille en&nbsp;fasse une cible
        facile, toute personne en ayant d&eacute;j&agrave; combattu un &ndash;
        et surv&eacute;cu pour en parler &ndash; livrera le t&eacute;moignage
        gla&ccedil;ant d&rsquo;une force de la nature capable de combattre et de
        tuer malgr&eacute; des blessures manifestement&nbsp; mortelles</p>
    languages: []
    properties: >-
      <div class="cof1-capacity-import">
              <p><u><strong>Charge (L)</strong></u> :</p>
              <p>la cr&eacute;ature parcourt une distance maximale de 30 m&egrave;tres et r&eacute;alise une attaque.</p>
      <p>Lancez deux d20 et gardez le meilleur r&eacute;sultat. Si l'attaque est
      r&eacute;ussie, en plus des DM normaux, une victime de taille
      inf&eacute;rieure ou &eacute;gale &agrave; la cr&eacute;ature doit faire
      un test oppos&eacute; de FOR ou &ecirc;tre renvers&eacute;e.</p>

      <p>Dans ce cas, la cr&eacute;ature pi&eacute;tine (ou embroche) sa victime
      et les DM sont doubl&eacute;s.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Enrager</strong></u> :</p>
              <p>lorsqu'elle re&ccedil;oit un coup critique&nbsp;ou si ses PV sont r&eacute;duits de moiti&eacute; ou plus, la cr&eacute;ature devient enrag&eacute;e.</p>
      <p>Elle ignore les p&eacute;nalit&eacute;s de douleur ou la peur, augmente
      de +5 son score d'attaque au contact et ses DM de +1d6. Elle peut encore
      agir un tour complet apr&egrave;s avoir atteint 0 PV</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Percuter</strong></u> :</p>
              <p>sur une &laquo; charge &raquo; r&eacute;ussie, si la victime est d'une taille inf&eacute;rieure ou &eacute;gale &agrave; la Cr&eacute;ature, elle est de plus projet&eacute;e &agrave; [1d6+1] m&egrave;tres de l&agrave;.</p>
      <p>Elle doit r&eacute;ussir un test de CON de difficult&eacute; 15 ou
      &ecirc;tre &eacute;tourdie.&nbsp;</p>

      <p>&Agrave; chaque tour, elle peut tenter un nouveau test de CON pour
      retrouver ses esprits.</p>
            </div>
