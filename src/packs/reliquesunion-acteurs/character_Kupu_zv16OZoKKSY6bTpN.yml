  - name: zBiographie
    type: capacity
    img: icons/sundries/books/book-open-purple.webp
    _id: NYn6155MmO5r2Eeg
    system:
      description: >-
        <p>Centaure très distingué et parlant avec de grandes tirades très
        longues, Kupu est l'une des figures les appréciées du village.</p><p>Il
        a prit le rôle de sa mère depuis 4 ans pour organiser les soirées
        théâtres et c'est souvent lui qui anime les veillées dans la salle
        commune. Il raconte les histoires avec de grandes envolées lyriques et
        beaucoup de mise en scènes ponctuées de "Bam" "Plouf" "Haaaa" ou encore
        "Hum Miam miam" très expressifs. Peu de jongleurs ou ménestrels des
        Terres d'Arran atteignent son talents pour captiver une assemblée de
        spectateurs.</p><p>Les enfants l'adorent et la plupart des adultes
        apprécient sa gentillesse et sa bonhommie.</p><p>Il aime tendrement sa
        conjointe
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.3FZtGR85wvyjSJ4b]{Titiro}
        et il n'hésite pas à lui demander de participer à ses histoires quand
        c'est nécessaire.</p><p>Grâce à son écoute assidue des PJs, il sera
        certainement le premier à comprendre la langue commune et à pouvoir
        communiquer avec eux par la parole.</p><p>Lorsqu'il n'organise pas les
        soirées, il s'occupe, avec Titiro, de l'atelier de couture, il aide
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.RfNtemPbHymoV2zK]{Kaiako}
        à l'école, il écrit les événements du village sous forme de contes et
        d'histoires romancées et il peut aider dans la plupart des postes pour
        assister un autre Centaure.</p><p>Depuis qu'il est au courant de la
        grossesse de sa conjointe, Kupu est euphorique et très protecteur avec
        elle.</p>
