    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: >-
        <p>Jongleuse demi-Elfe tr&egrave;s populaire au Ravin de Novrak
        malgr&eacute; quelques "agressions" qu'elle a subit &agrave; cause de
        son m&eacute;tissage</p>

        <p>Caract&egrave;re : baroudeuse - joyeuse - curieuse - tr&egrave;s
        intelligente - charmeuse</p>

        <p>Propos (elle appelle tous les villageois par leur pr&eacute;nom)
        :</p>

        <ul>

        <li>Je voyage beaucoup, j'en ai vu du pays, et je suis toujours heureuse
        de revenir ici vous conter mes histoires.&nbsp;</li>

        <li>Faites bien attention &agrave; la vague d'intol&eacute;rance qui
        vient des Marches du Venkor. L&agrave;-bas les pers&eacute;cutions, les
        conflits et les agressions ne viennent pas des anciennes races mais bien
        des humains.&nbsp;</li>

        <li>Vous me parler des vols et pillages commmis par les Peaux Vertes,
        des manipulations de nains ou de la pr&eacute;tention des Elfes mais
        regardez votre nombril mes amis. Les bandes de pillards qui ont
        d&eacute;vast&eacute; le grenier l'ann&eacute;e derni&egrave;re
        c'&eacute;tait des Orcs ? Non ! une bande de racailles humaines. Le
        marchand qui est parti avec la plupart de vos &eacute;conomies en vous
        vendant la fameuse cr&egrave;me de jeunesse, y a trois ans,
        c'&eacute;tait un opportuniste du Talion ? toujours pas ! Juste une
        belle gueule tout droit venu d'Yrlanie. Pour finir, la pr&eacute;tention
        des elfes ??? &Eacute;coutez-vous un peu "la montagne est &agrave; nous"
        que j'entend de plus en plus. "On est assez fort pour se d&eacute;fendre
        tout seul" blablabla. Ya pas plus pr&eacute;tentieux qu'un groupe de
        Novraks qui sortent d'une taverne pour aller d&eacute;florer une
        paysanne. Le racisme vous tuera si vous ne r&eacute;fl&eacute;chissez
        pas &agrave; vos paroles.</li>

        <li>Certains d'entre vous le savent mais je ne peux plus prendre le
        risque d'aller dans les Marches ou plus loin &agrave; l'Est. Les
        semi-Elfe ne sont plus les bienvenu dans les villages et dans les
        villes. J'esp&egrave;re que je serais toujours accept&eacute;e au Ravin
        de Novrak pour vous compter les nouvelles du monde dans quelques
        ann&eacute;es.&nbsp;</li>

        </ul>
