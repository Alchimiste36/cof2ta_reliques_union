  details:
    biography:
      private: >-
        <p>Hobrok n'a jamais été accepté dans sa tribu des Hauts Plateaux de
        l'Ourann. Moqué et malmené par les autres guerriers, à cette époque, il
        manquait cruellement de confiance en lui et ses capacités.</p><p>Après
        un énième harcellement du plus jeune fils d'un guerrier respecté de la
        tribu, Hobrok assène un puissant coup de poings dans sa gorge, lui
        brouillant la trachée. Il tomba raide mort et Hobrok prit ses jambes à
        son cou sans rien.</p><p>Il voyagea longtemps et se retrouva par pur
        hasard à se cacher dans un manoir en ruine dans la forêt au Nord de
        Kosland, directement dans le Quartier général de la Toile Vivante.</p>
      public: ""
    appearance:
      private: ""
      public: >-
        <p>Hobrok est un orc qui semble bien frêle à côté des masses de muscles
        que l'on croise habituellement. Il est plutôt sec mais lorsqu'il tient
        sa hache à deux mains devant lui, la plupart des adversaires se
        méfient.</p><p>Toujours confiant, il a continuellement un sourire aux
        lèvres.</p>
    notes:
      private: ""
      public: ""
    size: medium
    languages:
      - ""
