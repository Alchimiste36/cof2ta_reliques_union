              <p><u><strong>Instinct de survie (Creature)</strong></u> :</p>
              <h1>Description</h1><p>La créature est passée maître dans l’art de se faufiler et de se mettre à couvert. Une fois par tour, au moment de son choix, le PNJ peut utiliser une action de mouvement supplémentaire pour se déplacer. Si un effet ou une créature le paralyse, le ralenti ou restreint ses mouvements, il a droit à un test d’<strong>INT</strong> ou de <strong>DEX</strong> au choix difficulté 10 pour s’en débarrasser une fois par tour. Il gagne +5 en <strong>DEF</strong> lorsqu’il lui reste moins de [NCx5] PV.</p>
            </div>
