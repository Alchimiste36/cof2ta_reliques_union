    type: equipment
    img: icons/weapons/staves/staff-simple.webp
    _id: o8wxXrQEtyAz0S8I
    system:
      description: >-
        <p>Ce bâton en bois de 3 mètres de long sert à sonder les fosses, les
        dalles et les liquides troubles tout en restant à distance de
        sécurité.<br /><br /><em><strong>Perche
        pliante</strong></em><strong>.</strong> Cette perche articulée peut être
        dépliée et maintenue en place au moyen de broches coulissantes, pour
        former une perche de 3 mètres de long. Lorsqu'elle est repliée, elle ne
        mesure que 1 mètre de long. Il faut une action Limité pour assembler ou
        replier cette perche. À cause des gonds et des broches, elle n'est pas
        aussi solide qu'une perche d'une seule pièce, il vaut mieux l'utiliser
