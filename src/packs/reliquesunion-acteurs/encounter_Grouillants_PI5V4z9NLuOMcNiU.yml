    properties: >-
      <div class="cof1-capacity-import">
              <p><u><strong>Rapide</strong></u> :</p>
              <p>une cr&eacute;ature est capable de se d&eacute;placer de 30 m&egrave;tres par action de mouvement.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Se fondre dans les Ombres</strong></u> :</p>
              <h1>Description</h1>
      <p>Au prix d'une action de mouvement, le d&eacute;mon mineur peut gagner
      les ombres et y dispara&icirc;tre. Il peut en ressortir quand bon lui
      semble, &agrave; une distance maximale de 20 m de son point de disparition
      &ndash; toujours au prix d'une action de mouvement. Tant qu'il est dans
      les ombres, le d&eacute;mon mineur est insensible &agrave; tout type de DM
      &ndash; hormis les DM de zone. Il peut cependant &ecirc;tre
      r&eacute;v&eacute;l&eacute; &agrave; l'aide d'une source de lumi&egrave;re
      suffisamment puissante (tel qu'un sort de Lumi&egrave;res dansantes par
      exemple ou un feu plus important que celui d'une torche).</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Vision dans le Noir</strong></u> :</p>
              <p>&nbsp;La cr&eacute;ature voit dans le noir comme en plein jour jusqu'&agrave; une distance de 30 m&egrave;tres.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Régénération 2PV/round</strong></u> :</p>
              <p>La cr&eacute;ature r&eacute;g&eacute;n&egrave;re 2PV par round m&ecirc;me si elle tombe &agrave; 0PV.</p>
      <p>Pour tuer la cr&eacute;ature il faut la bruler ou lui briser le
      crane.</p>
            </div>
      <div class="cof1-capacity-import">
              <p><u><strong>Agripper</strong></u> :</p>
              <p>sur un r&eacute;sultat de 15 &agrave; 20 sur un jet de d20 en attaque, la cr&eacute;ature agrippe sa proie et ne la l&acirc;che plus.</p>
      <p>Il obtient un bonus de +5 en attaque et +1d6 aux DM contre la cible
      qu'il agrippe et celle-ci est immobilis&eacute;e si elle est de taille
      inf&eacute;rieure.</p>

      <p>La victime peut essayer de se lib&eacute;rer au prix d'une action de
      mouvement en r&eacute;ussissant un test de FOR oppos&eacute;.</p>
            </div>
