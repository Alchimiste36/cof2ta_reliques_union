  - name: zBiographie
    type: capacity
    img: >-
      icons/sundries/books/book-open-purple.webp
    _id: YHNOx0eq3Tr4NXXa
    system:
      description: >-
        <p>Elle partage avec son conjoint,
        @UUID[Actor.elGCQN2rjOxAynF3]{Kiliko}, la responsabilité du bien-être et
        de la sécurité du village.</p><p>C'est une centaure très sombre et
        colérique et elle peut se montrer manipulatrice lorsqu'elle se sent
        menacée. La plupart des villageois la perçoit sévère et intransigeante
        comme son grand frère @UUID[Actor.AUMVOCux3piDen0C]{Kaha}. Elle observe
        tout le monde et s'occupe de tout.</p><p>Elle aime fortement son
        conjoint et elle le soutiendra à chaque décision mais avant cela elle
        essayera de le convaincre et elle arrive souvent à lui faire durcir sa
        position.</p><p>Les traditions sont importantes ou le décorum du village
        mais Tumuaki sent que l'avenir doit changer et que les centaures vont
        devoir prendre leur place légitime dans la région.</p><p>Elle est
        particulièrement déçu du choix de son fils aîné,
        @UUID[Actor.tP0ihTOJIthKq66b]{Wakaweti}, de succomber à sa passion pour
        sa cousine, @UUID[Actor.btvS9qEFveBlGv7J]{Aroha}, lui qui avait un
        avenir tout tracé à la tête du village. Tumuaki continue de la pousser
        vers cette responsabilité mais elle a perdu foi en lui.</p><p>Elle s'est
        enfermée depuis quelques années dans son rôle et elle se rapproche de
        plus en plus des idées de @UUID[Actor.AUMVOCux3piDen0C]{Kaha} après
        chaque attaque des Ombres Blanches et après chaque tension entre les
        émancipateurs et les conservateurs du village.</p>
