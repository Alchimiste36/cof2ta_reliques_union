    appearance:
      private: ''
      public: >-
        <p>Femelle - 63 ans</p>

        <p data-pm-slice="1 1
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;bullet_list&quot;,{&quot;_preserve&quot;:{}},&quot;list_item&quot;,{&quot;_preserve&quot;:{}}]">Elle
        partage avec son conjoint, {Kiliko}, la responsabilit&eacute; du
        bien-&ecirc;tre et de la s&eacute;curit&eacute; du village. C'est une
        centaure tr&egrave;s sombre et col&eacute;rique et elle peut se montrer
        manipulatrice lorsqu'elle se sent menac&eacute;e. La plupart des
        villageois la per&ccedil;oit s&eacute;v&egrave;re et intransigeante
        comme son grand fr&egrave;re {Kaha}. Elle observe tout le monde et
        s'occupe de tout. Elle aime fortement son conjoint et elle le soutiendra
        &agrave; chaque d&eacute;cision mais avant cela elle essayera de le
        convaincre et elle arrive souvent &agrave; lui faire durcir sa position.
        Les traditions sont importantes ou le d&eacute;corum du village mais
        Tumuaki sent que l'avenir doit changer et que les centaures vont devoir
        prendre leur place l&eacute;gitime dans la r&eacute;gion. Elle est
        particuli&egrave;rement d&eacute;&ccedil;u du choix de son fils
        a&icirc;n&eacute;, {Wakaweti}, de succomber &agrave; sa passion pour sa
        cousine, {Karekau}, lui qui avait un avenir tout trac&eacute; &agrave;
        la t&ecirc;te du village. Tumuaki continue de la pousser vers cette
        responsabilit&eacute; mais elle a perdu foi en lui. Elle s'est
        enferm&eacute;e depuis quelques ann&eacute;es dans son r&ocirc;le et
        elle se rapproche de plus en plus des id&eacute;es de {Kaha}
        apr&egrave;s chaque attaque des Ombres Blanches et apr&egrave;s chaque
        tension entre les &eacute;mancipateurs et les conservateurs du
        village.</p>
