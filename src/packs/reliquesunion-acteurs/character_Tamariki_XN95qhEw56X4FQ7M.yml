        d&eacute;j&agrave; r&eacute;aliser des manoeuvres aussi impressionnantes
        que celle de sa m&egrave;re. La routine de ses parents lui convient
        tr&egrave;s bien et seule les soir&eacute;es contes et l&eacute;gendes
        dans la salle de c&eacute;r&eacute;monie lui fait retarder le moment
        o&ugrave; elle va dormir. Elle participe &agrave; toutes les
        soir&eacute;es communautaires et elle adore participer aux pi&egrave;ces
        de th&eacute;&acirc;tre ou aux soir&eacute;es ludiques.</p>
