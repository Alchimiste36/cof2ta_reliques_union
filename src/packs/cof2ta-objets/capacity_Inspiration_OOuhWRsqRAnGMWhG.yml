  description: "<p>Au prix d’une <strong>action d’attaque</strong>, le\_mystique désigne <strong>un allié à moins de 10 mètres</strong>\_et lui octroie un bonus de <strong>+1 à tous ses tests\_pendant [2 + Mod. SAG] tours.</strong> </p><p>Il peut lancer\_une inspiration à chaque tour mais <strong>ne peut\_maintenir plus de [1 + Mod. INT] inspirations</strong>\_à la fois (minimum 1).</p><blockquote><p>Chaque profil de la famille des mystiques\_possède un talent magique, une capacité supplémentaire, décrit(e) dans la liste ci-dessous.</p><p>Bien que les talents magiques soient des sorts\_‒ des capacités dont le nom est suivi d’un\_astérisque (*) ‒, ils ne requièrent pas la consommation de points de magie (PM) pour être\_lancés et ne peuvent pas bénéficier des effets\_d’une concentration (voir Système de jeu - La\_magie page 112).</p></blockquote>"
