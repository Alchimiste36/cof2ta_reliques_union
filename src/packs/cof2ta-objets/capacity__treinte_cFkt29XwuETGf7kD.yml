  description: "<p>A chaque fois que le serpent <strong>réussit\_une attaque</strong> il peut faire un <strong>test de FOR opposé</strong>\_contre sa victime (toutefois celle-ci peut choisir\_de résister par un test de DEX). </p><p>En cas de\_succès, il s'enroule autour d'elle et commence\_à l'étouffer, infligeant <strong>automatiquement 1d6\_DM supplémentaires par tour</strong>. La victime est\_<strong>immobilisée</strong>. Elle peut tenter de <strong>se libérer au\_prix d'une action de mouvement</strong> à chaque\_tour, en réussissant <strong>un test de FOR difficulté 15</strong>.\_</p>"
