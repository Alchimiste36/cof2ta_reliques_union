  description: "<p>Un breuvage étrange qui <strong>guérit [1d4 + rang] PV</strong>\_et permet de gagner un bonus de <strong>+3 aux [rang\_+ 1] prochains tests effectués</strong> (dans une limite\_de temps de 12 heures).</p><p>Boire un fortifiant\_nécessite une action de mouvement.</p><hr /><p>@UUID[Item.87eBcr3sJtocJcjN]{Voie de l'Alchimie} - Rang 1 :\_@UUID[Item.KQBxuHgUEMNEFqAG]{Fortifiant}</p><p>La première action permet de réaliser le Soin sur une cible unique.</p><p>La deuxième action activable permet d'obtenir le bonus de +3 à tous les tests. Le nombre de tests effectué est à gérer manuellement.</p><p><em>Il faut modifier l'action en fonction du Personnage qui a fabriquer l'élixir.</em></p>"
