system:
  description: "<p>Le bonus de capitaine passe\_à <strong>+3 en initiative, en attaque, aux DM et en DEF</strong>\_à toutes les créatures sous ses ordres à portée\_de vue. </p><p>Tant qu'au <strong>moins quatre créatures sous\_ses ordres</strong> sont à moins de 10 mètres de lui, le\_commandant <strong>ne subit que la moitié des DM qui\_lui sont infligés</strong>.</p>"
  source: ''
  origin: Livre du meneur p122
  slug: ''
  inGame: >-
    <p>L'action permet de sélectionner les alliés et d'activer l'action pour
    leur donner les bonus de la capacité. L'effet dure de façon illimité donc il
    faudra supprimer manuellement les Effets personnalisés sur les feuilles des
    alliés qui ne remplissent plus les conditions.</p>
