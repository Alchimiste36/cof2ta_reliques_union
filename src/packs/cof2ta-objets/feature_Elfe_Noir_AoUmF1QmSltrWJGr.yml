system:
  description: "<h2>Les Elfes Noirs</h2><p>Les Elfes noirs représentent le plus grand secret\_et la plus grande honte du peuple elfique. Au\_sein de toutes les communautés elfiques naissent\_des individus hébergeant en leur cœur une part\_sombre et maléfique qui finira inéluctablement\_par se révéler au cours de l’adolescence. Elle\_hante leurs pensées et fait progressivement naître\_une sorte de colère sourde, capable de prendre\_possession de leur esprit jusqu’à provoquer une\_explosion de violence incontrôlable.</p><p>Des rabatteurs elfes noirs parcourent le monde\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">pour repérer ces individus et les conduire à la sinistre citadelle de Slurce. Les parents de l’enfant\_</span>ne peuvent s’opposer à cet enlèvement en vertu\_d’une loi ancestrale connue et respectée par tous\_les Elfes ‒ malheur à ceux qui souhaiteraient\_s’y opposer.</p><p>Au sein de la citadelle, les recrues subissent un\_entraînement impitoyable qui a pour objectif\_de les aider à contrôler leurs démons et faire\_d’eux des assassins d’exception. Au cours de cet\_enseignement, la couleur de leur peau continue\_de s’assombrir pour prendre la teinte ténébreuse\_définitive. Rares sont les non-Elfes à connaître la\_véritable nature des Elfes noirs. Officiellement,\_ce sont des artistes, des comédiens ou des savants\_et Slurce est une prestigieuse académie. Il s’agit\_d’un des secrets les mieux gardés du peuple elfe.</p><p>Noms: en entrant à Slurce, un Elfe noir change\_également de nom. Ce symbolisme très fort\_signifie que tout ce qui appartient au passé ‒\_parents, amis, culture, histoire ‒ est révolu et\_appartient à une autre vie, qui a pris fin. Le\_nouveau nom de l’Elfe est dérivé de l’ancien: on\_ne garde que la première ou les deux premières\_syllabes et on y ajoute le suffixe « yn».</p><p><em>Par exemple, Vulm deviendrait Vul’yn et Laewen,\_Lae’yn.</em></p><h2>Les Elfes</h2><p>Selon les légendes, les Elfes sont des\_esprits immortels, seconds enfants\_d’Arran venus au monde après les\_dragons et avant les Hommes. Installés partout\_sur les Terres d’Arran, ils vivent en communautés\_relativement fermées. Leur immortalité est un\_don autant qu’une malédiction: elle leur confère\_une sagesse infinie et en même temps les détache\_lentement du sort du monde, les entraînant\_dans une sorte de torpeur.\_</p><p>En dépit de la nature immortelle des individus\_qui les composent, la plupart des grandes\_communautés comptent en leur sein des sages,\_prophètes ou vénérables à la peau flétrie et l’âge\_abyssal. Les rumeurs prétendent que le corps et\_l’âme d’un Elfe sont si\_ intimement liés qu’ils\_sont le reflet l’un de l’autre, ce qui expliquerait\_que certains Elfes fatigués ou las paraîtraient\_bien plus âgés que d’autres.</p><h4>Modificateurs des Elfes</h4><ul><li><p>Atout: <strong>+2 CHA</strong></p></li><li><p>Faiblesse: <strong>-2 FOR</strong></p></li><li><p>Âge de départ à l’aventure : <strong>80 ans et plus</strong></p></li><li><p>Espérance de vie: <strong>théoriquement immortel</strong></p></li><li><p>Taille: <strong>entre 1,65 m et 1,90 m</strong></p></li><li><p>Poids : <strong>entre 50 kg et 80 kg</strong></p></li><li><p>Trait des Elfes : <strong>Lumière des étoiles</strong></p></li><li><p></p></li></ul><p><strong>Noms féminins:</strong> <em>Adoraa, Amarie, Aril’em,\_Bi’leth, Dilya, Eelmyra, Faetris, Fin’nea, Ilimys,\_Ilsewël, Inaëra, Keydi, Li’erin, Mylaelä, Nälaea,\_Nue’leth, Phivaaris, Reywarin, Saëli’hn, Selussa,\_Shaë’len, Sihanien, Teriiani, Tisha, Yes’rieth,\_Yllagwyn, Yn’asel.</em></p><p><strong>Noms masculins:</strong> <em>Arel, Ayen, Carfell, Dae’kalyn, Daemys, Eldaeren, Eld’uin, Elluin, Erolwen,\_Faardan, Faeren, Ianjyr, Iewin, Ilthur, Kerr’yth,\_Khaa’ris, Lathaïen, Liagwyn, Mlartlar, Nael,\_Nar’wen, Nyll, Preswë, Qiro, Rilatar, Tanithil,\_Yelg’wyn, Ylyn, Waera, Wysalei.</em></p>"
