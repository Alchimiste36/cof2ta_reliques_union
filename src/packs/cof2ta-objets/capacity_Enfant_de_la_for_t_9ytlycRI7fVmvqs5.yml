  description: "<p>Le PJ choisit une caste, <strong>religieuse ou guerrière</strong>. </p><p>Traditionnellement, les individus féminins\_choisissent la première, les individus masculins\_la seconde mais la nouvelle génération fait fi de\_ces conventions. Le choix est donc totalement\_ouvert. </p><p>L’Elfe gagne alors <strong>une capacité de rang\_1 ou 2 de de la voie des arts druidiques</strong> ou\_<strong>voie des forêts</strong> pour la caste religieuse ou une\_capacité de rang 1 ou 2 de la <strong>voie de l’archerie</strong>\_et de la <strong>voie du compagnon animal</strong> pour la caste\_guerrière. </p><p>Au rang 4 de cette voie culturelle, il\_gagne <strong>une capacité supplémentaire de rang 1\_ou 2 de sa caste</strong> (voie des arts druidiques ou\_voie des forêts, voie de l’archerie ou de la voie\_du compagnon animal).</p>"
