folder: sbVgj2BGLR5Qk0hP
name: Forme élémentaire
type: capacity
img: icons/magic/fire/elemental-fire-humanoid.webp
system:
  description: "<p>Le PJ <strong>peut transformer son corps une fois par\_jour</strong> <strong>pour chaque élément maîtrisé pendant\_[5 +\_ Mod. de SAG] minutes</strong>. </p><p>Chaque forme\_élémentaire lui permet de <strong>retrancher [rang\_atteint dans cette voie] points à tous les DM\_subis (RD)</strong> et lui octroie les capacités suivantes :</p><ul><li><p><strong><span style=\"text-decoration:underline\">Feu :</span></strong> le personnage ajoute +2d6 DM de feu à\_toutes ses attaques au contact. Une créature qui\_s’attaque à lui avec des armes de contact subit\_1d6 DM pour chaque attaque réussie.</p></li><li><p><strong><span style=\"text-decoration:underline\">Eau :</span></strong> le personnage guérit toutes ses blessures\_au rythme de 3 PV par tour et peut déformer\_son corps pour passer dans le moindre interstice.\_</p></li><li><p><strong><span style=\"text-decoration:underline\">Terre :</span></strong> le personnage obtient un bonus de +6\_en FOR (+3 attaque, DM et tests de FOR) et\_en DEF.\_</p></li><li><p><strong><span style=\"text-decoration:underline\">Air :</span></strong> le personnage peut voler (à une vitesse\_de 30 mètres par action de mouvement) et tous\_les DM physiques qui lui sont infligés ou qu’il\_inflige sont divisés par deux (retranchez les\_points de RD ensuite).</p></li></ul>"
  source: ''
  origin: Livre du Joueur p.152
  slug: ''
  inGame: >-
    <p>L'action Forme de FEU permet d'obtenir la RD et le bonus aux DM de
    contact. Tant que l'action est active, une deuxième action apparait
    permettant d'infliger les DM si le PJ est touché au contact. La deuxième
    action ne consomme aucun PM.</p><p>L'action Forme d'EAU permet d'obtenir la
    RD et applique, au moment de l'activation de l'action, un effet
    supplémentaire sur le PJ lui donnant 3PV par round pendant 5 +PER
    rounds.</p><p>L'action Forme de TERRE permet d'obtenir la RD et un bonus de
    +3 en FOR et +6 en DEF.</p><p>L'action Forme d'AIR permet d'obtenir la RD et
    de rajouter 20m à la vitesse de déplacement.</p>
