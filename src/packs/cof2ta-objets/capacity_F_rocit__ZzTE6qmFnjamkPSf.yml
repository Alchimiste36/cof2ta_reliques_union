  description: "<p>Le PJ voit ses muscles se développer de façon\_spectaculaire <strong>pendant [1d6 + Mod. de SAG]\_tours</strong> tandis que d’énormes griffes poussent\_subitement au bout de ses doigts.</p><p><strong>Son score de\_FOR passe à 18</strong> (ou bénéficie d’un bonus de\_+2 s’il est déjà égal ou supérieur à cette valeur)\_et il obtient <strong>une attaque de contact de griffes\_infligeant [1d6 + Mod. FOR] DM</strong>.</p><blockquote><h4>Férocité et voie\_du pugilat</h4><p>Si le PJ dispose de la voie\_du pugilat, alors les DM\_de sa capacité Poings de\_fer sont augmentés d’une\_catégorie grâce à Férocité\_(jusqu’au maximum de\_1d12 au rang 5 de la voie\_du pugilat, ou 2d6 en cas\_de Poings de fer avancé).</p></blockquote>"
