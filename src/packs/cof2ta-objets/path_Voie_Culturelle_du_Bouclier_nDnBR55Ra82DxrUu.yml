system:
  description: "<h2>L’ordre du Bouclier</h2><p>Si chaque ordre possède ses propres guerriers,\_le Bouclier constitue l’armée du peuple nain.\_Assurant la sécurité aux frontières du royaume\_contre les invasions ogres, envoyé par-delà pour\_satisfaire les volontés expansionnistes de leur\_roi ou maintenant la cohésion et la loi au sein\_même des forteresses-États, l’ordre représente\_à la fois le glaive et le bouclier: sanguinaire\_et protecteur. En plus des soldats, le Bouclier\_compte dans ses rangs des éclaireurs, forestiers,\_guetteurs ou encore des prévôts.\_</p><p>Le Bouclier n’intervient normalement pas dans\_les conflits qui opposent entre eux les autres\_ ordres nains, à moins que l’unité de la société\_ne soit menacée. Il ne peut choisir le roi mais,\_grâce à la charge prestigieuse de Veilleur du\_roi, le Bouclier a la responsabilité de s’assurer\_que la couronne œuvre pour le bien de toute\_la communauté et non pour le seul bénéfice de\_l’ordre dont il est issu.</p><p>Enfin, l’individu qui porte le titre de Seigneur\_de guerre, le champion de la couronne, est\_traditionnellement issu de cet ordre.</p>"
