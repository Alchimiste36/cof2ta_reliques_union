  description: "<p>Le PJ n’a peut-être pas toujours été extérieur à\_un ordre, ou bien peut-être a-t-il reçu l’enseignement d’un Nain déchu? </p><p>Il peut choisir une\_capacité de <strong>rang 1 de la voie de l’alchimie</strong>, de la\_<strong>voie de la magie runique</strong>, de la <strong>voie du bohème</strong>,\_de la <strong>voie de la fourberie</strong>, de la <strong>voie de la maîtrise\_des armes</strong>, de la <strong>voie du mysticisme</strong>, de la <strong>voie\_du bastion</strong> ou de la <strong>voie du commandement</strong>. </p><p>Au\_rang 4 de cette voie il peut choisir <strong>une nouvelle\_capacité de rang 2</strong> de la voie de l’alchimie, de la\_voie de la magie runique, de la voie du bohème,\_de la voie de la fourberie, de la voie de la maîtrise\_des armes, de la voie du mysticisme, de la voie\_du bastion ou de la voie du commandement. </p><p><strong>Ces capacités ne peuvent devenir des capacités\_supérieures.</strong></p>"
