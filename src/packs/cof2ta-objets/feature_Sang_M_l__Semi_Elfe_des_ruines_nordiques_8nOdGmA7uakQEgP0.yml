name: Sang-Mêlé Semi-Elfe des ruines nordiques
type: feature
img: modules/cof2ta_reliques_union/assets/cof2ta_icones/cof2ta_semi_elfe_token.webp
system:
  description: "<h3>ATTENTION</h3><p>Lorsque vous créez un personnage Semi-Elfe, <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">il faut d'abord dupliquer ce trait !</span></strong></span></p><p>Sur le nouveau trait, <strong>ajouter la voie culturelle choisie</strong>.</p><p>Uniquement après cela, <strong>glissez-déposez le trait</strong> sur la feuille de personnage.</p><h2>Les Semi-Elfes</h2><p>La proximité entre les Elfes et les Humains\_devait conduire à des unions mixtes. De tous\_les enfants nés de parents issus de peuples\_différents, les Semi-Elfes sont de très loin les\_plus nombreux. Ce qui ne les empêche pas\_d’être brimés et méprisés partout sur les Terres\_d’Arran. Réduits à l’esclavage dans les mines\_du Mitan, confinés dans des ghettos ou à des\_tâches ingrates dans les villes du Nord, unis en\_peuplades nomades dans les Terres orientales,\_les Semi-Elfes sont en quête de reconnaissance.\_</p><p>Physiquement, ils sont à la fois très différents des\_Elfes et des Humains. En vérité, on retrouve en\_eux, de façon surprenante des caractéristiques\_appartenant à de nombreux peuples d’Arran.\_</p><p>Par exemple, leur dentition est souvent proéminente, surtout leurs canines inférieures, assez\_semblables à celles des Orcs. Ils empruntent\_aux Elfes leurs longues oreilles pointues et aux\_Humains leur pilosité faciale. Enfin, ils arborent\_fréquemment des taches écaillées sur le corps,\_communes à certaines tribus naines.</p><h4>Voie du peuple Semi-Elfe</h4><p>Le Semi-Elfe commence avec la voie du peuple\_elfe et la voie du peuple humain. Il peut évoluer\_dans les deux voies lors de sa progression en\_dépensant normalement ses points de capacité,\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">mais il est limité au rang 3 maximum dans\_</span>chacune des voies.</p><h4>Voie culturelle</h4><p>Lors de la création de personnage, en accord\_avec le MJ, le joueur choisit une voie culturelle\_parmi celles des Elfes et des Humains en\_fonction de l’historique de son personnage et de\_la communauté ou la région des Terres d’Arran\_dans laquelle il a grandi.</p><h4>Modificateurs des Semi-Elfes</h4><ul><li><p>Atout: <strong>Aucun</strong></p></li><li><p>Faiblesse: <strong>Aucun</strong></p></li><li><p>Âge de départ à l’aventure : <strong>20 ans et plus</strong></p></li><li><p>Espérance de vie: <strong>150 ans</strong></p></li><li><p>Taille: <strong>entre 1,50 m et 1,90m</strong></p></li><li><p>Poids : <strong>entre 40 kg et 80 kg</strong></p></li><li><p>Trait des Semi-Elfes : <strong>Aucun</strong></p></li></ul>"
