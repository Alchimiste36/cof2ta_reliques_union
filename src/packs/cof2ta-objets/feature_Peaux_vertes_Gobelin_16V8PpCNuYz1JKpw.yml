system:
  description: "<h2>Les\_Gobelins</h2><p>Petits, frêles mais rusés, les Gobelins ont pu\_survivre à la violence des Terres d’Arran et à\_de nombreux conflits armés, ainsi qu'à l'asservissement par les Orcs ou l'appétit vénal des\_esclavagistes grâce à deux capacités uniques : une\_faculté d’adaptation extraordinaire et une propension presque surnaturelle à tirer leur épingle\_d’un jeu dont ils nient les règles en permanence.</p><p>Organisés en tribus, ils sont capables de mener des\_guérillas mortelles à l’aide d’escadrons d’archers\_d’élite ou encore de s’associer avec des groupes\_d’Ogres ou d’Orcs pour mener des sièges usants et\_de nature à faire tomber les villes les plus fortifiées.</p><p>Au final, le Gobelin reste aventureux. Si la vie de\_groupe présente des atouts évidents, elle constitue\_également un frein à l’épanouissement personnel.\_De nombreux Gobelins ont quitté le mode de vie\_tribal pour rejoindre de grandes cités humaines\_et y mener des carrières de brigand et de voleur\_avec plus ou moins de réussite. Qu’importe, la vie\_est courte et elle mérite d’être vécue pleinement.</p><h4>Modificateurs des Gobelins</h4><p>Atouts : <strong>+2 DEX, +2 INT</strong></p><p>Faiblesses\_: <strong>-2 FOR, -2 CON</strong></p><p>Âge de départ à l’aventure\_: <strong>12 ans et plus</strong></p><p>Espérance de vie : <strong>30 ans</strong></p><p>Taille : <strong>entre 1,00 m et 1,20\_m</strong></p><p>Poids : <strong>entre 20 kg et 40 kg</strong></p><p>Trait des Gobelins : <strong>Vision dans le noir</strong></p><p><strong>Noms féminins :</strong> <em>Bhui, Elxia, Etolki, Fell, Clyrt,\_Kiria, Kle, Lluia, Mazzia, Og, Ovyf, Pra, Pyho,\_Ruir, Selsi, Shee, Sria, Strotha, Ufla, Uggi,\_Yzzia, Viee.</em></p><p><strong>Noms masculins :</strong> <em>Ald, Biek, Brom, Cla’as, Ciz,\_Dekz, Draam, Fra’asm, Gribs, Iebsic, Iolrirm,\_Iord, Kabkoic, Kliq, Rerr, Siarkin, Slobs, Vos,\_Vres, Zral, Zren.</em></p><h2>Les Peaux vertes</h2><p>Les Peaux vertes forment un grand peuple\_qui regroupe plusieurs ethnies très\_différentes les unes des autres, que ce\_soit morphologiquement ou culturellement.\_Cependant, à l’échelle des Terres d’Arran, toutes\_sont souvent considérées de la même façon par\_les autres peuples en raison de la couleur de leur\_peau et du danger que peuvent représenter les\_clans organisés aux frontières de la civilisation.\_Il est vrai que toutes les Peaux vertes ont des\_choses en commun.</p><p>Depuis les temps immémoriaux, les Orcs\_semblent être en guerre permanente contre\_la plupart des peuples des Terres d’Arran. Au\_nord-est, les Ogres menacent dangereusement\_les forteresses-États naines tandis que souvent\_les Gobelins prolifèrent dans les bas-fonds des\_plus grandes villes ou bien s’organisent en tribus\_de pillards dans les contrées sauvages.</p><p>S’il est vrai que les Peaux vertes sont craintes\_et méprisées, il n’est pas rare pour autant de les\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">croiser en nombre restreint dans certaines villes\_</span>cosmopolites, négociant leurs services en tant\_que mercenaires, voleurs ou gardes du corps,\_la nature les ayant pourvues de formidables\_capacités physiques prêtes à être monnayées.</p><p>Les Peaux vertes partagent une même voie de\_peuple, mais les multiples ethnies composant ce\_groupe disposent de leurs propres voies culturelles. En revanche, contrairement aux autres\_peuples présentés jusque-là, les modificateurs de\_caractéristique de peuple, les traits spécifiques\_ne sont pas communs à tout le peuple des Peaux\_vertes mais détaillés pour\_ chacune des cultures,\_ogre, orque ou gobeline.</p>"
