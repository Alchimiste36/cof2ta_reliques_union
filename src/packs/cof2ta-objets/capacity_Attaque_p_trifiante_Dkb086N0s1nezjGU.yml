  description: "<p>Sur <strong>un test réussi d’attaque au contact à mains\_nues</strong>, le PJ <strong>pétrifie sa cible</strong>. Elle doit réussir un\_<strong>test de CON difficulté [10 + rang dans la voie]</strong>\_ou être <strong>incapable d’agir pendant 1d6 minutes</strong>.\_</p><p>Tant qu’elle est pétrifiée son corps devient\_extrêmement dur et elle retranche 5 points à\_tous les DM subis. Si la victime perd plus de\_5 PV pendant qu’elle est pétrifiée, l’effet prend\_fin. </p><p>Une créature ne peut être la cible de cette\_capacité qu’une seule fois par combat.</p>"
