system:
  description: "<p>Le PJ <strong>donne à une cible un ordre simple</strong> (mais\_pas dangereux pour elle) que cette dernière\_doit pouvoir comprendre.</p><p>Il doit réussir <strong>un test\_d’attaque magique opposé</strong> contre la cible (si la\_créature n’a pas d’attaque magique, on utilise\_alors son attaque au contact en appliquant un\_malus de -3) à une portée de 20 mètres.</p><p>En cas\_d’échec, la cible exécutera l’ordre pendant son\_prochain tour.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> le PJ bénéficie d’un bonus\_de +2 à son test d’attaque magique.</p></blockquote>"
  source: ''
  origin: Livre du Joueur p.134
  slug: ''
  inGame: >-
    <p>L'action permet d'effectuer le test opposé d'attaque magique.</p><p>Si le
    PJ obtient la capacité avancée, ajoutez "+2" à la Formule de Compétence dans
    la Résolution de l'action.</p><blockquote><p><strong>Note : Pour utiliser la
    "concentration" faites SHIFT+CLIC sur
    l'action</strong></p></blockquote><p></p>
