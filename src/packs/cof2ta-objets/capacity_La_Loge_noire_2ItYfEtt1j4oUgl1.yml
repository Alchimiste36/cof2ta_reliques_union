system:
  description: "<p>Le PJ, en raison de sa richesse et de son importance au sein de l’ordre, est à présent protégé\_par un garde.</p><p>Ce dernier confère un bonus de\_<strong>+3 en DEF</strong> à son employeur lorsqu’il est à son\_contact.</p><p>Une fois par tour, il peut faire échouer\_une attaque qui vise le PJ en réussissant un test\_d’attaque avec un résultat au moins égal au jet\_d'attaque de l'assaillant.</p><p>Le garde est totalement loyal au PJ.\_S’il vient à mourir, il est possible d’en engager\_un nouveau en dépensant 500 pa ou lors du\_passage au niveau suivant.</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Le garde:</span></strong></span></p><p>DEF 16, PV [niveau du PJ x 6],</p><p>attaque\_[niveau du PJ], DM 1d8+2.</p><p>FOR +2, DEX +0, CON\_+2, INT +0, SAG +0, CHA +0.</p><p>Il agit à l’initiative\_du PJ.</p>"
  source: ''
  origin: Livre du Joueur p.81
  slug: ''
  inGame: "<p>Le MJ donne les droits \"Propriétaire\" à la feuille rencontre :\_@UUID[Actor.DGfkn8u8ncw32lok]{Garde du Talion}.</p><p>Le PJ modifie les caractéristiques du Garde en fonction de son personnage.</p><p>Cette capacité permet de lier une autre capacité pour le choix de la capacité de rang 2\_@UUID[Item.BVSWlGzjuz3T9dwK]{Le sens des affaires}</p>"
