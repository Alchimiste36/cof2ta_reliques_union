system:
  description: "<p>Si l'arcaniste réussit\_un <strong>test d'attaque magique opposé contre une\_cible à moins 20 mètres</strong>, il en <strong>prend le contrôle\_pendant [1d4] tours</strong>. L'arcaniste peut continuer\_à agir tout en maintenant le contrôle mental.\_</p><p>Pendant toute la durée du sort, <strong>l'arcaniste et sa\_cible subissent un malus de -2 à tous leurs tests.</strong>\_</p><p>Une victime d'un contrôle mental peut tenter de\_<strong>se libérer à chaque tour</strong> en réussissant un test\_de <strong>SAG difficulté [15 + bonus universel].</strong> Le sort\_ne peut affecter une cible qu'une fois par jour.</p>"
  source: ""
  origin: Livre du meneur p150
  slug: ""
  inGame: >-
    <p>La première action permet de réaliser le test d'attaque magique opposée
    et d'appliquer sur la cible le statut Asservi pendant 1d4 rounds.</p><p>La
    deuxième action permet de réaliser le test de sauvegarde pour se libérer du
    contrôle mental.</p><p>La troisième action permet d'appliquer le malus sur
    une cible et le jeteur de sort.</p>
