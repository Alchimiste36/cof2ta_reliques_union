  description: "<p>L'arcaniste crée <strong>[1d4+1]\_images illusoires de lui-même</strong>. Lorsque lui ou l'un\_de ses doubles est pris pour cible, <strong>lancez [1d6].</strong>\_</p><p><strong><span style=\"text-decoration:underline\">Sur un résultat de 1 à 4</span></strong>, c'est <strong>un double qui est\_pris pour cible</strong> et est immédiatement détruit. <strong><span style=\"text-decoration:underline\">Sur\_un résultat de 5 à 6</span></strong>, c'est <strong>l'arcaniste qui subit les\_DM normalement</strong>. </p><p>De plus, <strong>les attaques magiques\_de l'arcaniste provoquent +1d6 DM par double\_illusoire encore présent</strong>. Les DM de zone peuvent\_détruire plusieurs doubles en une seule attaque.</p>"
