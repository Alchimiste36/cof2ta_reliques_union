system:
  description: "<p>Le PJ ajoute son <strong>Mod. de FOR à son score de\_PV maximal</strong> ainsi qu’à ses <strong>tests de CHA</strong> et à\_ceux de <strong>ses alliés au contact</strong> pour les tests de\_négociation, de persuasion ou d’intimidation.\_</p><p>Allez savoir pourquoi, sa simple présence donne\_de la force aux arguments de ses alliés…</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> lorsque le rang 4 est atteint\_dans cette voie, le PJ ajoute une nouvelle fois\_son Mod. de FOR à son score de PV maximal.</p></blockquote>"
  source: ''
  origin: Livre du Joueur p.125
  slug: ''
  inGame: >-
    <p>Bonus permanent augmentant les PV maximaux du PJ et pour ses tests de
    CHA;</p><p>La première action permet de donner aux cibles le bonus aux jets
    de CHA pendant 1 round. Cet effet fonctionne uniquement en Mode
    Combat.</p><p>Si le PJ obtient la capacité avancée, quand il atteint le rang
    4, remplacez la valeur du Modificateur augmentant les PV par "@for*2". Vous
    pouvez aussi ajoutez un Modificateur sur la rang 4 de cette voie afin de ne
    pas oublier ce bonus.</p>
