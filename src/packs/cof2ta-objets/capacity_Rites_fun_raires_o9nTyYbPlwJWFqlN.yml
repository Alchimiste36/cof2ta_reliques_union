system:
  description: "<p>Le PJ est capable de sentir les âmes des défunts\_et de communiquer avec elles. Le rituel nécessite\_une concentration de cinq minutes. L’échange\_peut prendre des formes variables, qu’il s’agisse\_d’un dialogue direct, le recours à un support\_manuscrit ou encore une lecture des vibrations\_d’une mare d’eau stagnante par exemple. Les\_défunts s’expriment toujours de façon instinctive\_et confuse et il peut être délicat de démêler le\_vrai de l’allégorie ou du cauchemar.\_</p><p>De plus, le PJ peut tenter de <strong>chasser les esprits\_vengeurs ou agressifs\_</strong>: au prix d’une action\_limitée et en réussissant un <strong>test d’INT difficulté\_15</strong>, il inflige <strong>2d6 DM</strong> à tous les esprits dans\_la zone</p>"
