  description: "<p>Le PJ effectue une attaque fictive pour déséquilibrer son adversaire et réaliser ensuite une attaque\_mortelle. </p><p>Faites <strong>un test d’attaque normal lors\_de ce tour</strong> mais <strong>n’infligez aucun DM</strong>. </p><p>Au tour\_suivant, <strong><span style=\"text-decoration:underline\">si vous attaquez le même adversaire</span></strong>,\_vous profiterez d’un bonus de <strong>+5 en attaque</strong> et,\_si votre feinte était réussie, de <strong>+2d6 aux DM</strong>. </p><p><strong><span style=\"text-decoration:underline\">Au\_rang 5</span></strong> atteint dans cette voie, le bonus d’attaque\_de la feinte passe à <strong>+10</strong>.</p>"
