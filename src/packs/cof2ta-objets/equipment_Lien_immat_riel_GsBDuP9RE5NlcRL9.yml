system:
  description: "<p><strong>Niveau de magie : 8</strong></p><p>Cette simple corde dorée <strong>rend son porteur\_légèrement translucide\_</strong>: il n'appartient plus tout\_à fait au monde matériel et partage certaines\_propriétés physiques des fantômes. Il gagne\_un <strong>bonus à la DEF de +3</strong> et peut ressentir\_précisément la présence des esprits, même sans\_les voir.</p><p>De plus, <strong>trois fois par jour</strong>, il <strong>peut prendre une\_forme éthérée au prix d'une action d'attaque</strong>.\_</p><p><strong><span style=\"text-decoration:underline\">Forme éthérée :</span></strong> le personnage et tout son équipement deviennent translucides et intangibles\_pendant [5 + Mod. de SAG] tours. Sous cette\_forme, il peut passer à travers murs et obstacles et\_ne peut subir aucun DM physiques, en infliger\_ou lancer des sorts. Sous cette forme, il peut\_voir les créatures immatérielles telles que les\_ombres, les esprits ou les fantômes – même celles\_cherchant à se dissimuler – et communiquer\_avec elles.</p>"
