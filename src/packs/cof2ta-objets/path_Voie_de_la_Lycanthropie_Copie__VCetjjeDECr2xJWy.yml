system:
  description: "<h5>La lycanthropie est très rare dans les Terres\_d’Arran. Elle est généralement le fruit d’une\_communion avec un esprit totémique animal et pratiquée par les Sylvains et les Orcs. Mais\_il se murmure qu’il existerait également une\_maladie ou une malédiction du même nom...\_</h5><p>Au moment de l’acquisition du premier rang de\_cette voie, le joueur doit choisir par quelle forme\_de lycanthropie sera affectée son personnage :\_lupine ou féline. Ce choix est irréversible et\_conditionne le fonctionnement de plusieurs\_capacités.</p><blockquote><h4>Usage en Jeu :\_</h4><p>Lorsque vous choisissez cette Voie de prestige et que la voie est sur votre feuille de personnage, vous devez supprimer certaines actions des capacités de la voie en fonction de la forme choisie. Prenez votre temps pour ne pas supprimer une action involontairement.</p></blockquote>"
