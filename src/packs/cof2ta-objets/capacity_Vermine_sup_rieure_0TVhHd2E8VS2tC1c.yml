name: Vermine supérieure
type: capacity
img: icons/creatures/invertebrates/spider-web-red.webp
system:
  description: "<p><strong>Le compagnon vermine du PJ gagne l’une des\_capacités suivantes</strong>, qui dépend de sa nature.\_</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Étreinte (scorpion) :</span></strong></span> le scorpion peut désormais\_tenter d’attraper une créature entre ses pinces,\_si elle n’est pas d’une taille supérieure à la\_sienne. <strong>Lorsqu’il obtient un résultat de 15 à\_20 sur son dé d’attaque, le scorpion attrape\_son adversaire</strong>. Au début de son tour, la cible\_saisie doit faire <strong>un test de FOR en opposition</strong>\_avec le scorpion, en cas de succès, elle réussit à\_se libérer, sinon elle est <strong>étourdie</strong> (pas d’action\_et -5 en DEF) et le scorpion maintient l’étreinte.\_</p><p>Lorsqu’il maintient une étreinte, le scorpion ne\_peut rien faire pendant son tour, mais il <strong>inflige\_automatiquement [1d6+3] DM</strong> à la créature\_prisonnière. Le scorpion peut lâcher son étreinte\_quand il le veut.</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Toile (araignée) :</span></strong></span> l’araignée gagne la capacité\_de <strong>lancer (portée: 10 mètres) une toile gluante\_et collante sur un ennemi</strong>. Si elle réussit une\_<strong>attaque à distance</strong> [niveau du PJ + 3], la cible\_est <strong>immobilisée</strong> (pas de déplacement, utilisez\_le d12 : voir «États préjudiciables») <strong>pour 1d6\_tours.</strong> Au début de son tour, la créature engluée\_doit faire <strong>un test de FOR difficulté 13\_</strong>: en cas\_de succès, elle réussit à se libérer, sinon elle reste\_immobilisée.</p>"
  source: ''
  origin: Livre du Joueur p.155
  slug: ''
  inGame: "<p>Les deux capacités de rencontres @UUID[Item.nNhiyfz6KBedvkUk]{Étreinte (scorpion)} et\_@UUID[Item.iGKyBWqKAnyvOUGM]{Toile (araignée)} sont déjà présentes sur les Compagnons. Il suffit d'ajouter la Condition \"Est possédé\" dans les action pour quelles deviennnent disponibles pour le Compagnon.</p>"
