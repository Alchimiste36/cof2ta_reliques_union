  slug: ''
  inGame: >-
    <p>L'action permet de réaliser l'attaque magique contre la DEF d'une cible
    sélectionnée. En cas de réussite elle applique un effet de saignement
    pendant RANG round sur la cible. Fonctionne uniquement en mode
    Combat.</p><p>Si le PJ obtient la capacité avancée, remplacez le champs
    Durée de l'Effet supplémentaire de la Résolution de l'action par "@rang +
    @per".</p>
