  description: "<p>Lors de son tour, le PJ fait seulement une action\_d’attaque ou de déplacement. </p><p>Par la suite, à\_tout moment avant son prochain tour, le PJ\_peut effectuer <strong>un test d’attaque au contact en\_opposition à un test réussi d’attaque au contact\_ou à distance</strong> d’un adversaire. En cas de réussite,\_<strong>l’attaque adverse est bloquée</strong> par le bouclier.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée\_:</span></strong></span> le test pour bloquer l’attaque\_bénéficie d’un bonus de +2.</p></blockquote>"
  source: ''
  origin: Livre du Joueur p.120
  slug: ''
  inGame: >-
    <p>La première action permet d'effectuer le test en opposition contre une
    attaque de Contact et la deuxième action contre une attaque à
    Distance.</p><p><strong>Si le PJ obtient la capacité avancée</strong>,
    remplacer "@atc" dans le champs "Formule de compétence" par "@atc +2" dans
    la Résolution des deux actions.</p>
