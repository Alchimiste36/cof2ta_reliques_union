name: Joyau d'âme
type: equipment
img: icons/commodities/gems/gem-faceted-navette-red.webp
system:
  description: "<p><strong>Niveau de magie : 6</strong></p><p>Ce joyau est porté en pendentif et transmis aux\_Elfes noirs lors de leur apprentissage. Il <strong>collecte\_les âmes des défunts humanoïdes</strong> et permet\_d'utiliser ces esprits pour diverses tâches, après\_quoi elles disparaissent. Un même joyau ne\_peut héberger qu'un nombre limité d'âmes,\_dépendant de leur force (égale au NC de la\_créature à laquelle l'âme appartenait) ainsi que\_de la puissance de son porteur : <strong>le joyau ne peut\_plus collecter de nouvelle âme une fois que la\_somme des NC a atteint ou dépassé le niveau\_de son porteur</strong>.</p><p><strong><span style=\"text-decoration:underline\">Attaquer un ennemi :</span></strong> l'esprit attaque automatiquement la cible désignée par le porteur\_du cristal et ne s'arrête que lorsqu'il s'est\_épuisé ou que sa cible est morte. Invoquer ainsi\_l'esprit nécessite une action d'attaque. L'esprit\_commence à accomplir sa mission dès son\_tour d'invocation et <strong>inflige automatiquement\_1d8 DM</strong>. Il <strong>persiste un nombre de tour(s)\_supplémentaire(s) égal à son NC</strong>.</p><p><strong><span style=\"text-decoration:underline\">Crocheter une serrure :</span></strong> l'esprit peut s'introduire\_dans le mécanisme d'une serrure ou d'un piège\_pour l'activer, l'ouvrir ou le désamorcer. Plus le\_mécanisme est complexe, plus l'âme doit être\_puissante. Un esprit réussit sa mission contre des\_serrures dont la difficulté du test est inférieure\_ou égale à [5 x NC]. Les âmes de NC inférieur\_à 1 ne peuvent donc au mieux qu'ouvrir des\_portes non verrouillées.</p><p><strong><span style=\"text-decoration:underline\">Délivrer un message :</span></strong> l'esprit écoute le message\_transmis par le porteur du cristal avant de\_disparaître. Il parcourt instantanément une\_distance maximale égale à [100 x NC+1] km\_et apparaît face à la personne désignée par le\_porteur du cristal (ce dernier doit connaître le\_destinataire) pour lui répéter mot pour mot le\_message avant de s'évaporer.</p>"
