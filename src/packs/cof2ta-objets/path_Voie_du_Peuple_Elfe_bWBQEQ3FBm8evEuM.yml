system:
  description: "<h2>Les Elfes</h2><p>Selon les légendes, les Elfes sont des\_esprits immortels, seconds enfants\_d’Arran venus au monde après les\_dragons et avant les Hommes. Installés partout\_sur les Terres d’Arran, ils vivent en communautés\_relativement fermées. Leur immortalité est un\_don autant qu’une malédiction: elle leur confère\_une sagesse infinie et en même temps les détache\_lentement du sort du monde, les entraînant\_dans une sorte de torpeur.\_</p><p>En dépit de la nature immortelle des individus\_qui les composent, la plupart des grandes\_communautés comptent en leur sein des sages,\_prophètes ou vénérables à la peau flétrie et l’âge\_abyssal. Les rumeurs prétendent que le corps et\_l’âme d’un Elfe sont si\_ intimement liés qu’ils\_sont le reflet l’un de l’autre, ce qui expliquerait\_que certains Elfes fatigués ou las paraîtraient\_bien plus âgés que d’autres.</p><h4>Modificateurs des Elfes</h4><ul><li><p>Atout: <strong>+2 CHA</strong></p></li><li><p>Faiblesse: <strong>-2 FOR</strong></p></li><li><p>Âge de départ à l’aventure : <strong>80 ans et plus</strong></p></li><li><p>Espérance de vie: <strong>théoriquement immortel</strong></p></li><li><p>Taille: <strong>entre 1,65 m et 1,90 m</strong></p></li><li><p>Poids : <strong>entre 50 kg et 80 kg</strong></p></li><li><p>Trait des Elfes : <strong>Lumière des étoiles</strong></p></li><li><p></p></li></ul><p><strong>Noms féminins:</strong> <em>Adoraa, Amarie, Aril’em,\_Bi’leth, Dilya, Eelmyra, Faetris, Fin’nea, Ilimys,\_Ilsewël, Inaëra, Keydi, Li’erin, Mylaelä, Nälaea,\_Nue’leth, Phivaaris, Reywarin, Saëli’hn, Selussa,\_Shaë’len, Sihanien, Teriiani, Tisha, Yes’rieth,\_Yllagwyn, Yn’asel.</em></p><p><strong>Noms masculins:</strong> <em>Arel, Ayen, Carfell, Dae’kalyn, Daemys, Eldaeren, Eld’uin, Elluin, Erolwen,\_Faardan, Faeren, Ianjyr, Iewin, Ilthur, Kerr’yth,\_Khaa’ris, Lathaïen, Liagwyn, Mlartlar, Nael,\_Nar’wen, Nyll, Preswë, Qiro, Rilatar, Tanithil,\_Yelg’wyn, Ylyn, Waera, Wysalei.</em></p>"
