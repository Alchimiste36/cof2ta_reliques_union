name: Affinité au poison
type: capacity
img: icons/creatures/abilities/stinger-poison-scorpion-brown.webp
system:
  description: "<p>Après des années passées en compagnie d’êtres\_qui rampent et piquent, le PJ a développé une\_aptitude à maîtriser le poison de ces derniers.\_</p><p>S’il utilise <strong>une arme tranchante ou perforante</strong>,\_comme une dague ou un épieu, il <strong>peut\_ l’enduire\_de poison.</strong> </p><p>En cas d’<strong>attaque de contact réussie</strong>, le\_PJ <strong>inflige 1d6 DM supplémentaires au début de\_chaque tour de la créature affectée</strong>. </p><p>Après avoir\_subi les effets du poison, la victime peut faire\_un test de CON difficulté [10 + Mod d’INT\_du PJ] pour stopper les effets du poison. L’effet\_de poison n’est <strong>pas cumulable</strong> et la <strong>réussite d’un\_test de CON immunise au poison pour 24 h</strong>.\_</p><p>En plus des effets décrits ci-dessus, le PJ gagne\_désormais un bonus de <strong>+5 à tous les tests de\_CON destinés à résister au poison</strong>.</p>"
  source: ""
  origin: Livre du Joueur p.155
  slug: ""
  inGame: >-
    <p>Bonus permanent aux tests de CON.</p><p>L'action permet d'infliger 1d6 DM
    a une cible sélectionnée et d'appliquer un effet suppélementaire pour la
    durée du combat sur la cible. L'effet supplémentaire fonctionne uniquement
    en Mode Combat.</p>
