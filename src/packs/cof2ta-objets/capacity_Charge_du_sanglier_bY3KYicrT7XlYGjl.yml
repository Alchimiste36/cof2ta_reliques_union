system:
  description: "<p>La créature parcourt <strong>une distance\_maximale de 30 mètres</strong> et <strong>réalise une attaque</strong>.\_</p><p><strong>Lancez deux d20</strong> et gardez le meilleur résultat. Si\_l'attaque est réussie, en plus des DM normaux, une\_victime de taille inférieure ou égale à <strong>la créature\_doit faire un test opposé de FOR ou être renversée</strong>.\_</p><p>Dans ce cas, la créature piétine (ou embroche)\_sa victime et <strong>les DM sont doublés</strong>.</p><hr /><p><strong>Sur une charge réussie</strong>, si la victime est d'une\_taille inférieure au sanglier, elle est également\_<strong>projetée à [1d6+1] mètres de là</strong> et doit réussir\_un <strong>test de CON de difficulté 15 ou être étourdie</strong>. </p><p>À chaque tour, elle peut tenter un nouveau test\_de CON pour retrouver ses esprits.</p>"
