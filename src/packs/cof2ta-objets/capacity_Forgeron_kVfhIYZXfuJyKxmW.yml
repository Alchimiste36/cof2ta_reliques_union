system:
  description: "<p>Le PJ obtient un bonus de <strong>+5 aux tests d’orfèvrerie ou de forge</strong>. </p><p>Au prix d’une <strong>action de\_mouvement</strong>, il peut <strong>enflammer son arme pour\_une durée de [5 + Mod. de SAG] tours</strong> et gagne\_alors un bonus aux <strong>DM de +1 par rang</strong> atteint\_dans cette voie avec cette arme (DM de feu).</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> le bonus aux tests passe à\_+10 et enflammer son arme ne nécessite plus\_qu’une action gratuite au lieu d’une action de\_mouvement.</p></blockquote>"
  source: ''
  origin: Livre du Joueur p.137
  slug: ''
  inGame: >-
    <p>Bonus permanent aux tests de FOR, CON et AGI.</p><p>La deuxième action
    activable permet d'obtenir le bonus aux DM de contact et de
    distance.</p><p>Si le PJ obtient la capacité avancée, remplacer la Valeur de
    chaque Modificateur de la première action par "10" et modifiez le Temps
    d'action de la deuxième action par "Action gratuite".</p>
