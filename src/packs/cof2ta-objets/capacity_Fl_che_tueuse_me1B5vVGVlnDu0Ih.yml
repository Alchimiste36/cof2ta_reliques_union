system:
  description: "<p>Le PJ fabrique et enchante une flèche particulière <strong>pour un ennemi unique qu’il nomme</strong>.\_Il lui faut <strong>une journée complète pour créer</strong> la\_flèche et il ne peut en posséder plus d’une à\_un moment donné (ni pour la même cible, ni\_pour une autre). </p><p>Lorsqu’il utilise sa flèche contre\_l’ennemi pour lequel elle a été créée, il obtient un\_bonus de <strong>+3 à l’attaque et de +1d6 aux DM par\_rang</strong> atteint dans la voie. </p><p><strong>Si la flèche a été créée\_depuis plus d’un an, ces bonus sont doublés.</strong></p>"
