  description: "<p>Ce sort <strong>invoque les pires terreurs d’une créature\_vivante</strong> et lui fait croire à sa propre mort. </p><p>Le PJ doit\_réussir <strong>un test d’attaque magique</strong> (portée: 20 m)\_<strong>en opposition à un test d’attaque magique</strong> de la\_cible (si la créature n’a pas d’attaque magique, on\_utilise alors son attaque au contact en appliquant\_un malus de -3). </p><p>La victime fait <strong>un test de SAG\_difficulté [10 + Mod. d’INT] pour résister</strong>. </p><ul><li><p>En cas\_d’échec, <strong>elle tombe à 0 PV</strong>. </p></li><li><p>En cas de succès, <strong>elle\_perd l’équilibre et tombe par terre</strong>. </p></li></ul><p>Une créature\_ne peut être la cible de ce sort <strong>qu’une fois par jour</strong>,\_et le PJ <strong>ne peut pas affecter un personnage ou une\_créature de niveau supérieur au sien</strong>.</p>"
