  description: "<p>Le PJ a tissé un lien particulier avec un animal\_qui lutte à ses côtés. </p><p>Il gagne le rang 3 de la\_<em>voie du Compagnon animal\_</em>\_- @UUID[Item.P0a7O4Etd7YGwwJI]{Combat} (voir page 130).</p><p>S’il possède déjà cette capacité ‒ ou venait à\_l’acquérir par la suite ‒, son compagnon gagne\_un <strong>bonus de +2 en initiative</strong>, <strong>en DEF</strong>, <strong>en attaque\_et aux DM</strong>.</p>"
  source: ''
  origin: Livre du Joueur p.73
  slug: ''
  inGame: "<p>Si vous possédez déjà la capacité de la Voie du Compagnon Animale, modifiez les caractéristiques directement sur la feuille du Compagnon. Sinon, glissez-déposez la capacité sur votre feuille.</p><p>Cette capacité permet de lier une autre capacité pour le choix de la capacité de rang 2\_@UUID[Item.9ytlycRI7fVmvqs5]{Enfant de la forêt}.</p>"
