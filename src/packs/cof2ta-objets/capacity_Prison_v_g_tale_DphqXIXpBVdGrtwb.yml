system:
  description: "<p>Le PJ peut commander à la végétation de pousser\_et bloquer ses ennemis (mais pas ses alliés) dans\_<strong>une zone de 10 m de diamètre</strong> (portée: 20 m)\_<strong>pendant [5 + Mod. de SAG] tours</strong>.</p><p> Entravées,\_les cibles subissent un malus de <strong>-2 en attaque et\_en DEF et ne peuvent pas se déplacer</strong>. </p><p>Chaque\_tour, une créature peut se libérer avec un test\_de FOR difficulté [10 + Mod. d’INT].</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> les cibles entravées subissent\_un malus de -3 en attaque et en DEF.</p></blockquote>"
  source: ''
  origin: Livre du Joueur p.134
  slug: ''
  inGame: >-
    <p>La première action activable permet d'activer le sort (dépense des PM et
    apparition de la seconde action).</p><p>La deuxième action permet
    d'appliquer pendant 5 + PER round les malus aux cibles sélectionnées. Cette
    action ne consomme pas de PM car vous pourrez l'utiliser autant de fois que
    nécessaire en fonction des créatures qui entrent et qui sortent de la zone
    affectée.</p><p>Si le PJ obtient la capacité avancée, remplacez toutes la
    Valeur de chaque Modificateur de l'action par
    "-3".</p><blockquote><p><strong>Note : Pour utiliser la "concentration"
    faites SHIFT+CLIC sur l'action</strong></p></blockquote><p></p>
