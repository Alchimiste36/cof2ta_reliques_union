  description: "<p>Au prix d’une action limitée, le PJ entre en transe\_pour le reste du combat. </p><p>Pendant la Danse des\_lames, il gagne <strong>+2 en attaque et en DEF</strong> et peut\_réaliser <strong>une attaque gratuite supplémentaire</strong> en\_utilisant un d12 au lieu du d20 à chaque tour.\_</p><p>Le personnage peut mettre fin à la transe quand\_il le veut mais ne peut recommencer avant le\_prochain combat. Toutefois, s’il reçoit les DM\_d’une attaque critique, la transe est stoppée net.</p>"
