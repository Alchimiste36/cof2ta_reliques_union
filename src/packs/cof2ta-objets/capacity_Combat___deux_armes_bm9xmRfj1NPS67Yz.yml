system:
  description: "<p>Le PJ effectue une attaque de chaque main. Il\_utilise 1d20 pour le test d’attaque de sa main\_directrice et un d12 pour l’attaque portée avec\_son autre bras. Il doit manier une arme légère\_dans sa main faible (1d6 de DM maxi).</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> s’il utilise deux armes légères\_(1d6 de DM au maximum), le PJ gagne un\_bonus de +1 en attaque.</p></blockquote>"
  source: ""
  origin: Livre du Joueur p.121
  slug: ""
  inGame: >-
    <p>Pas d'effet automatique. Le PJ sélectionne "avec Dé Malus" sur la fenêtre
    de l'attaque avec la deuxième arme.</p><p>Si le PJ obtient la capacité
    avancée, ajoutez la Condition "est apprise" sur l'action. Cela fera
    apparaitre l'action activable pour obtenir le bonus à l'attaque.</p>
