system:
  description: "<p>Le PJ peut préparer <strong>une potion de Peau d’écorce</strong>\_(rang 1 de la voie des forêts), <strong>d’Image décalée</strong>\_(rang 1 de la voie des illusions) ou de <strong>Armure de terre</strong> (rang 3 de la voie de la magie\_élémentaliste).</p><p>Les effets de ces potions ne sont\_pas cumulables.</p>"
  source: ""
  origin: Livre du Joueur p.133
  slug: ""
  inGame: "<p>Action Peau d'écorce =&gt; DEF +4 (pendant 5 +PER round)</p><p>Image décalée =&gt; Pas d'effet automatique mais le PJ peut utiliser la table aléatoire :\_@UUID[RollTable.MYM2XPVOTQXdhNIp]{Image décalée}</p><p>Action Armure de terre =&gt; RD 10 (pendant 5 +PER round)</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">ATTENTION :</span></strong></span> Les Elixirs dépendent des statistiques de d'Alchimiste. Si le PJ décide de confier ses élixirs à une autre personne, c'est tout de même l'Alchimiste qui devra faire l'action. Vous pouvez aussi utiliser les Équipement :\_@UUID[Item.74J4EwrAf1XCvo8l]{Élixir de Peau d'écorce} /\_@UUID[Item.jjXcF9liAz6aEZeS]{Élixir d'Image décalée} /\_@UUID[Item.dxAnIDy480hJ3cCE]{Élixir d'Armure de terre}</p></blockquote>"
