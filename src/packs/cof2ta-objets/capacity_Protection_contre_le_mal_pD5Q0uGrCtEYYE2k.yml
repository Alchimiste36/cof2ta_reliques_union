  description: "<p>Le PJ <strong>peut lancer ce sort sur lui ou sur tout allié</strong>\_(portée: au contact) pour <strong>la durée d’un combat.</strong> </p><p>La cible obtient alors un bonus de <strong>+2 en DEF\_et pour tous les tests de résistance</strong> contre les\_attaques des morts-vivants, des démons, des\_élémentaires et des créatures conjurées (appelées\_d’un autre plan par magie).</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> le bonus de DEF passe à +4.</p></blockquote>"
