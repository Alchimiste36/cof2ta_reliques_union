  description: "<p><strong>Une fois à l’air libre</strong>, l’huile <strong>prend feu spontanément et brûle intensément</strong>.</p><p>Il est possible,\_au prix d’une <strong>action limitée</strong>, de <strong>l’appliquer\_sur une arme</strong> pour bénéficier d’un bonus de\_<strong>+1d6 DM de feu pendant [5 + Mod d’INT]\_minutes</strong>.</p><p>L’huile peut également être <strong>appliquée\_sur des carreaux d’arbalète ou des pointes de\_flèche</strong>, à raison d’une action d’attaque par lot\_de projectiles, une dose permettant d’enflammer\_<strong>environ cinq projectiles</strong>.</p><hr /><p>@UUID[Item.87eBcr3sJtocJcjN]{Voie de l'Alchimie} - Rang 3 :\_@UUID[Item.Yy40awBcrX0JfTTc]{Huile instable}</p><p>L'action activable permet d'obtenir le bonus aux DM des attaques de contact et à distance.</p><p><em>La durée devra être ajustée en fonction du Personnage qui a fabriquer l'élixir.</em></p>"
