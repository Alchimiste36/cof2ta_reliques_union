system:
  description: "<h2>Les Peaux vertes</h2><p>Les Peaux vertes forment un grand peuple\_qui regroupe plusieurs ethnies très\_différentes les unes des autres, que ce\_soit morphologiquement ou culturellement.\_Cependant, à l’échelle des Terres d’Arran, toutes\_sont souvent considérées de la même façon par\_les autres peuples en raison de la couleur de leur\_peau et du danger que peuvent représenter les\_clans organisés aux frontières de la civilisation.\_Il est vrai que toutes les Peaux vertes ont des\_choses en commun.</p><p>Depuis les temps immémoriaux, les Orcs\_semblent être en guerre permanente contre\_la plupart des peuples des Terres d’Arran. Au\_nord-est, les Ogres menacent dangereusement\_les forteresses-États naines tandis que souvent\_les Gobelins prolifèrent dans les bas-fonds des\_plus grandes villes ou bien s’organisent en tribus\_de pillards dans les contrées sauvages.</p><p>S’il est vrai que les Peaux vertes sont craintes\_et méprisées, il n’est pas rare pour autant de les\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">croiser en nombre restreint dans certaines villes\_</span>cosmopolites, négociant leurs services en tant\_que mercenaires, voleurs ou gardes du corps,\_la nature les ayant pourvues de formidables\_capacités physiques prêtes à être monnayées.</p><p>Les Peaux vertes partagent une même voie de\_peuple, mais les multiples ethnies composant ce\_groupe disposent de leurs propres voies culturelles. En revanche, contrairement aux autres\_peuples présentés jusque-là, les modificateurs de\_caractéristique de peuple, les traits spécifiques\_ne sont pas communs à tout le peuple des Peaux\_vertes mais détaillés pour\_ chacune des cultures,\_ogre, orque ou gobeline.</p>"
