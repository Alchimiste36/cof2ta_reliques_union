system:
  description: "<h2>Les Elfes Sylvains</h2><p>Vivant en osmose avec la nature, les Elfes sylvains habitent principalement dans d'immenses\_forêts - les forêts de Duhann, de Daëdenn et des\_Céliandes... La peau mate et le regard perçant, ils\_vivent relativement coupés du monde, occupés\_à protéger les arbres centenaires et les vestiges de\_leurs anciennes cités face à l’avancée inexorable\_des colonies humaines ou des incursions orques.</p><p>Au cours de leur vie, nombre de Sylvains tissent\_un lien imperceptible avec la faune qui les\_entoure, notamment avec un animal qui devient\_alors leur compagnon. Ce dernier évolue à leur\_contact, en développant son intelligence, et voit\_son espérance de vie allongée.\_</p><p>Les massacres de la malédiction des goules\_leur a permis de prendre conscience du monde\_qui existe au-delà des orées, du danger qu’il\_représente mais également des opportunités qu’il\_recèle. Depuis que les armées de Lah’saa ont été\_vaincues, de plus en plus d’Elfes quittent la forêt\_pour parcourir les Terres d’Arran.</p>"
