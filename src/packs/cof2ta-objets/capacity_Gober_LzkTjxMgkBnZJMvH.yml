  description: "<p><strong><span style=\"text-decoration:underline\">lorsqu'il utilise sa capacité Dévorer</span></strong>, la crétaure peut avaler entièrement une\_cible d'au moins une taille inférieure à la sienne.\_</p><p>La victime doit <strong>faire un test de FOR opposé</strong> :\_en cas d'échec elle passe directement dans\_l'estomac du monstre. </p><p>Un personnage avalé\_<strong>subit 3d6 DM</strong> d'asphyxie et d'acide chaque\_tour. Il peut attaquer avec une arme pas plus\_grande qu'une dague en <strong>réussissant un test\_de FOR difficulté 15</strong> à chaque tour. L'attaque\_se fait avec une pénalité de -5 en attaque et\_les DM sont divisés par deux.</p>"
