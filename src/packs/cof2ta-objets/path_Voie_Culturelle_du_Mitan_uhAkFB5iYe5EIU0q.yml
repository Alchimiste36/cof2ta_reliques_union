  description: "<h2>Humains\_du Mitan</h2><p>Les peuples du Mitan regroupent le royaume de\_Léhon, les cités-États du Tarascon, la\_ Lombardie\_ainsi que les peuples de l’Ourann septentrional.\_</p><p>Plus civilisés et raffinés que les Nordiques, ces\_communautés ont bâti de prestigieuses cités\_portuaires, des flottes marchandes prospères\_et ont élevé au rang d’art le commerce et la\_politique.</p><p>Marchands, diplomates, corsaires, espions ou\_occasionnellement chevaliers – pour les cités les\_plus ancrées dans les anciennes traditions –, les\_peuples du Mitan comptent sur les accords, les\_complots et la puissance de l’or.</p>"
