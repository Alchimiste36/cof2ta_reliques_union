system:
  description: >-
    <p>Une très longue lance de fantassin, destinée à recevoir les charges de
    cavalerie ou à attaquer depuis le second rang. La pique double ses DM contre
    une créature de grande taille qui vient de réaliser une charge ou une action
    de mouvement suivie d’une attaque contact. Elle permet aussi d’attaquer en
    se tenant derrière un allié de taille normale, avec une pénalité de ‑5. Son
    utilisateur subit un dé malus en attaque dans toutes les autres
    conditions.</p><p>Attention : 3 actions différentes en fonction de la
    situation.</p>
