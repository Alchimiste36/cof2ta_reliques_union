system:
  description: "<p><strong>Une fois par combat</strong>, un élémentaire peut se transformer en tourbillon de\_matière élémentaire. <strong>Pendant [1d4+1] tours</strong>,\_il peut se déplacer à travers les créatures et\_les objets à <strong>la vitesse de 30 mètres par tour</strong>.\_</p><p>Toute créature sur son passage doit faire au\_choix un <strong>test de DEX ou de FOR de difficulté\_[10 + Mod. de FOR] de l'élémentaire</strong>. En cas\_d'échec, la cible <strong>subit automatiquement\_les DM de base</strong> de l'élémentaire (selon la\_taille) et elle est <strong>renversée au sol</strong> (si sa taille\_ne dépasse pas celle de l'élémentaire). </p><p>En cas de succès, elle ne <strong>subit que la moitié\_des DM</strong> et peut rester debout. </p><p>Lorsqu'il est\_sous forme de cyclone, l'élémentaire gagne\_un <strong>bonus de +5 en DEF</strong>.</p>"
  source: ''
  origin: ''
  slug: ''
  inGame: "<p>La première action permet d'obtenir le bonus de DEF et de déplacement et d'afficher les deux autres actions tant que celle-ci est activée.</p><p>Les deux actions suivantes permettent de réaliser les tests de sauvegarde avec la FOR ou l'AGI.\_</p><p>La dernière action permet de jeter uniquement les DM de l'attaque et de les appliquer entièrement ou à moitié en fonction du résultat du test de sauvegarde.</p>"
