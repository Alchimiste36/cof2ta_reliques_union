name: Nuée d’insectes
type: capacity
img: icons/creatures/invertebrates/wasp-swarm-movement.webp
system:
  description: "<p>En réussissant un <strong>test d’attaque magique</strong>\_(portée 20 m), le PJ libère sur sa cible une <strong>nuée\_d’insectes volants qui la piquent, aveuglent et\_la suivent</strong> pendant <strong>[5 + Mod. de SAG] tours</strong>.</p><p>La victime subit <strong>1 point de DM par tour et un\_malus de -2 à toutes ses actions</strong>. Les DM de\_zone détruisent la nuée.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée\_:</span></strong></span> la victime subit 2 DM par\_tour et un malus de -3 à toutes ses actions.</p></blockquote>"
  source: ""
  origin: Livre du Joueur p.133
  slug: ""
  inGame: >-
    <p>L'action permet de réaliser l'attaque qui inflige 1 DM et applique les
    malus sur la cible pendant 5 + PER rounds. Fonctionne uniquement en Mode
    Combat.</p><p>Si le PJ obtient la capacité avancée, ajoutez la Condition
    "est appris" sur la deuxième action et supprimez la première action devenue
    obsolète.</p><blockquote><p><strong>Note : Pour utiliser la "concentration"
    faites SHIFT+CLIC sur l'action</strong></p></blockquote>
