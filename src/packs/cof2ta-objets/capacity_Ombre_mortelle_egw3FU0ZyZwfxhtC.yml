system:
  description: "<p>Le PJ <strong>choisit une cible</strong>. L’ombre de celle-ci\_<strong>attaque son propriétaire pendant [3 + Mod.\_de SAG] tours (portée 20 m) en cas de réussite\_d’un test d’attaque magique.</strong> </p><p>L’ombre poursuit\_sa cible partout où elle se réfugie. </p><p><strong><span style=\"text-decoration:underline\">Ombre :</span></strong> 1\_attaque par tour, att = att de la cible, DM =\_DM de la cible divisés par deux.</p>"
  source: ''
  origin: Livre du Joueur p.150
  slug: ''
  inGame: "<p>L'action permet de réaliser l'attaque magique et d'appliquer un effet supplémentaire sur la cible en cas de succès afin de décompter la durée du sort. L'application de l\"effet supplémentaire fonctionne uniquement en Mode Combat.</p><p>Les attaques de l'Ombre doivent être effectuées avec la feuille de la cible.</p><blockquote><h5>Sorts prestigieux\_et Magie économe</h5><p>Il n’est pas possible d’user\_de Magie économe sur les\_sorts issus de voies\_de prestige.</p></blockquote>"
