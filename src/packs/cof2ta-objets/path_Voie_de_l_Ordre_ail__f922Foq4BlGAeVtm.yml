system:
  description: "<h5>Les ordres ailés sont rares mais prestigieux. Ces\_combattantes et combattants d’élite dominent\_le ciel et ne font qu’un avec leur monture.</h5><p>Au moment de\_l’acquisition du premier\_rang de cette voie, le\_joueur doit choisir un\_ordre et une monture\_ailée. Ce choix est\_irréversible et indique le\_type d’élément concerné\_par les capacités de la voie.</p><ul><li><p>Dragon : feu</p></li><li><p>griffon :\_foudre</p></li><li><p>aspic : poison.</p></li></ul><h4>Puissance :</h4><p>Le cumul des montures\_est prévu dans la\_description de la capacité\_de rang 1 p. 141. Si le\_PJ a cette capacité et la\_capacité de rang 5 de la\_voie du combat monté,\_le rang 1 de la voie de\_prestige devient plus\_puissant (bonus aux tests\_d'intimidation).</p><h4>Nombre de monture :</h4><p>la voie du combat monté\_donne potentiellement 2\_montures (rang 1 et\_rang 5). La voie de\_prestige confère le rang\_5 de la voie du combat\_monté et/ou améliore\_son efficacité en cas\_de cumul, donc on est\_toujours à 2 montures.</p>"
