  inGame: >-
    <p>La première action activable permet d'obtenir une plage de critique
    améliorée lorsque le PJ attaque au contact.</p><p>La deuxième action permet
    d'appliquer, pendant 20 round, les Modificateurs sur des cibles
    sélectionnées. Cette action fonctionne uniquement en Mode Combat.</p>
