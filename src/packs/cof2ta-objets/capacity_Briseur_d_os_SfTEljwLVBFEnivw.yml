system:
  description: "<p>Les coups critiques du PJ sont terribles et\_provoquent des handicaps durables. </p><p>Le PJ\_obtient <strong>un critique sur 19 ou 20</strong> au résultat du\_d20 en attaque au contact. </p><p><strong><span style=\"text-decoration:underline\">Lorsqu’il obtient un\_critique</span></strong>, en plus des DM doublés, il inflige une\_pénalité de <strong>-2 à tous les tests d’attaque, de FOR\_et de DEX</strong> de sa victime. Cette pénalité affecte la\_cible jusqu’à ce qu’elle soit complètement guérie.</p>"
