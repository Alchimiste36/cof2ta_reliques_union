  inGame: >-
    <p>L'action permet de réaliser une attaque automatique contre plusieurs
    cibles sélectionnées, de jeter les DM et d'appliquer sur les cibles le
    Statut Ralenti pendant 1 round. L'effet supplémentaire fonctionne uniquement
    en Mode Combat.</p>
