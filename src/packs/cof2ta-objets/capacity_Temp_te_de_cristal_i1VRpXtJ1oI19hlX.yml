system:
  description: "<p>Le PJ <strong>choisit une cible située à moins de\_40 mètres</strong>.</p><p>Il fait un test d’<strong>attaque magique et\_le compare à la DEF de tous les personnages</strong> (y\_compris le PJ et ses compagnons) se trouvant\_<strong>dans un rayon de 10 mètres</strong> autour de la cible.\_</p><p>Chaque victime pour laquelle le test est un\_succès <strong>encaisse [5d6 + Mod. d’INT] de DM\_de froid et est ralentie pendant 1 tour</strong> à moins\_de réussir un test de CON difficulté 13.\_En cas\_de réussite, elles subissent seulement la moitié\_des DM et ne sont pas ralenties.</p>"
