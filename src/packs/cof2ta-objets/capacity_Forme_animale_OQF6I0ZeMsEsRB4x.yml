system:
  description: "<p>Le PJ <strong>peut prendre la forme d’un animal de\_taille petite</strong> (aigle géant, singe, chien, etc.) <strong>ou\_moyenne</strong> (loup, serpent constricteur, crocodile,\_requin, etc.). Il conserve ses PV, ses valeurs\_d’INT, de SAG et de CHA mais acquiert les\_Carac. suivantes :</p><h5>Forme animale petite :</h5><p>FOR -2 DEX +4 * CON -2v DEF 15 Init. 19. Attaque +4 DM 1d4-2</p><h5>Forme animale moyenne :</h5><p>FOR +1 DEX +1 CON\_+1, DEF 14 Init. 12. Attaque +2 DM 1d6+1</p><p>Il <strong>conserve son équipement</strong>, qui est transformé\_en fourrure, mais ce dernier n’influence pas\_les caractéristiques de la forme animale.</p><p>Le\_PJ <strong>acquiert une ou plusieurs capacités naturelles</strong> relatives à la forme revêtue : vol, odorat\_développé, respiration aquatique, protection\_contre le froid, etc.</p><p>À moins d’avoir recours à\_une capacité spéciale telle que la Détection de\_la magie, rien ne permet de distinguer la forme\_animale d’un autre animal normal.</p><p>Enfin, le PJ\_peut <strong>reprendre sa forme humanoïde</strong> <strong>lorsqu’il le\_désire</strong> <strong>pour une action limitée</strong>.</p>"
  source: ''
  origin: Livre du Joueur p.154
  slug: ''
  inGame: "<p>L'action permet uniquement de dépenser les PM.</p><p>Le MJ donne les droits \"Propriétaire\" des Compagnons :\_@UUID[Actor.yuMNMSRhy5OuuNil]{Forme Animale Petite} et\_@UUID[Actor.ptIeIb4fnqvIFnOy]{Forme Animale Moyenne} au PJ.</p><p>Modifiez les valeurs des Compagnons par les votres et ajoutez les capacités de rencontre sur les Compagnons en fonction de l'animal choisi.</p>"
