name: Attaque kamikaze
type: capacity
img: icons/skills/melee/strike-sword-dagger-runes-red.webp
system:
  description: "<p>Le PJ saute littéralement sur sa cible pour la\_rouer de coups au corps-à-corps. </p><p><strong>Plutôt qu’un\_test d’attaque</strong>, il réalise <strong>un test de DEX</strong> dont la\_<strong>difficulté est égale à la moitié de la DEF de la\_créature</strong>. </p><p><strong><span style=\"text-decoration:underline\">En cas de réussite</span></strong>, il <strong>inflige des DM\_normaux</strong> et <strong>reçoit un bonus qui dépend de la\_taille de la créature\_</strong>: </p><ul><li><p>moyenne +1d6 DM, </p></li><li><p>grande\_+2d6, </p></li><li><p>très grande +3d6, </p></li><li><p>gigantesque +4d6</p></li><li><p>colossale +5d6. </p></li></ul><p>Il ne reçoit aucun bonus aux\_DM pour les petites créatures. </p><p><strong><span style=\"text-decoration:underline\">À la suite de\_cette attaque</span></strong>, il <strong>perd 5 points en DEF pour\_une durée de 1 tour</strong>.</p>"
  source: ""
  origin: Livre du Joueur p.144
  slug: ""
  inGame: >-
    <p>L'action activable permet de réaliser une attaque avec AGI contre DEF/2.
    Les DM reprenne les DM de la première arme équipée + 1d6. Dans la fenêtre
    d'attaque modifiez le "1d6" par la bonne formule de DM en fonction de la
    taille de la cible.</p><p>L'action reste activée pour appliquer le malus de
    DEF. Il faudra penser à désactiver l'action au début du prochain tour du
    PJ.</p>
