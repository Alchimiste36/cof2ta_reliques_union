  description: "<p>Le PJ doit se trouver devant un buisson ou un\_arbre vivant.</p><p>Son incantation <strong>fait pousser [1d6\_+ Mod. d’INT] fruits</strong> qu’il peut cueillir. Chaque\_fruit offre l’équivalent d’<strong>un repas et rend [1d10\_+ niveau du PJ] PV</strong> à celui qui le consomme.\_</p><p>Les effets de ces fruits ne fonctionnent <strong>qu’une\_fois par jour et par personnage</strong>.</p>"
  source: ""
  origin: Livre du Joueur p.134
  slug: ""
  inGame: >-
    <p>L'action permet de réaliser un Soin comme-ci la cible mangeait une Baie
    Magique avec la formule correcte.</p><p>Sinon, vous pouvez donner l'accès à
    l'Équipement : @UUID[Item.WYiOpr5TiMpy2fLm]{Baie Magique}. Lorsqu'une
    personne utilise cet Équipement, il devra modifier la formule de soin avec
    le niveau du PJ qui a fabriquer la Baoie
    Magique.</p><blockquote><p><strong>Note : Pour utiliser la "concentration"
    faites SHIFT+CLIC sur l'action</strong></p></blockquote>
