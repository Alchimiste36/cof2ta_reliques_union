  description: "<p>Le PJ <strong>se charge d’énergie électrique pour [5 +\_Mod. de SAG] tours</strong>. </p><p><strong>Toute créature qui le blesse\_au contact ou le touche reçoit une décharge\_infligeant 1d6 DM.</strong></p><p> Il peut également <strong>délivrer une\_décharge électrique</strong> (attaque magique, portée:\_10 m) infligeant <strong>[1d6 + Mod. d’INT] DM</strong>. </p><p>Au\_rang 4 de cette voie, les DM passent à 2d6.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> en doublant le coût en PM,\_le PJ peut lancer le sort immédiatement au moment où il est attaqué. Il ne doit pas être surpris\_pour cela et ne peut user de concentration.</p></blockquote>"
  source: ''
  origin: Livre du Joueur p.136
  slug: ''
  inGame: >-
    <p>L'action "Activer le sort" permet de dépenser les PM et d'afficher les
    deux autres actions.</p><p>L'action "DM si touché" permet de jeter les DM si
    le PJ se fait toucher (sans dépenser le PM).</p><p>L'action "Décharge
    électrique" permet de réaliser l'attaque magique.</p>
