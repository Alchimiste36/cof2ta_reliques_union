system:
  description: "<p>Lorsqu'un personnage\_tombe à 0 PV suite à une morsure de goule, il\_doit réussir un <strong>test de CON difficulté 10</strong> sous\_peine de se transformer immédiatement en\_goule. </p><p>Il <strong>subit alors toutes les modifications\_de l'engoulement</strong>, <strong>se relève avec tous ses PV</strong>\_et <strong>commence à attaquer ses compagnons</strong>,\_sonnant le glas de son histoire sur les Terres\_d'Arran.</p><p> De plus, les goules sont plus puissantes,\_plus violentes et disposent d'armes naturelles\_létales : elles gagnent <strong>+2 en attaque et +1d6\_aux DM. [+1 NC]</strong></p>"
  source: ""
  origin: ""
  slug: ""
  inGame: "<p>L'action permet de réaliser le test de suavegarde pour résister à la transformation.</p><p>Losqu'un personnage est transformé en goule, glissez-déposez la capacité\_@UUID[Item.Orr0hYTlcKZkVbU2]{Transformation en goule} sur sa feuille de personnage afin de lui donner les bonus.</p>"
