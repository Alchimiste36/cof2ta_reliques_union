system:
  description: "<p><strong>Niveau de magie : 10</strong></p><p>Relique unique des Elfes rouges, cette robe rouge\_et or émet toujours une douce aura jaunâtre.\_Elle confère les avantages suivants :</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Vision dans le noir :</span></strong></span> dans le noir total, le\_personnage voit comme dans la pénombre\_jusqu'à 30 mètres.</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Résistance au feu et au froid :</span></strong></span> le personnage\_gagne une RD de 10 contre le feu et le froid.</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Explosion ardente :</span></strong></span> trois fois par jour, au prix\_d'une action d'attaque, le personnage émet une\_explosion de flammes centrée sur lui-même et\_de 6 mètres de rayon. Toutes les créatures prises\_dans la déflagration (sauf le personnage) doivent\_réussir un test de DEX difficulté 15 sous peine\_de subir 6d6 DM. La réussite du test permet\_de réduit les DM de moitié.</p>"
