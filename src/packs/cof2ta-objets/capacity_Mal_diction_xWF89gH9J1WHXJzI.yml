name: Malédiction
type: capacity
img: icons/magic/unholy/hands-circle-light-green.webp
system:
  description: "<p>Le PJ effectue <strong>un test d’attaque magique</strong> contre\_une cible située à moins de 20 mètres. </p><p>En cas\_de succès, <strong>la victime réalise tous ses tests avec\_deux d20 et garde le résultat le plus faible.</strong> </p><p>Le\_sort <strong>prend fin dès qu’elle aura raté trois tests</strong>\_(il n’y a aucune limite de temps pour effectuer\_ces tests). Si la cible possède une capacité lui\_permettant de lancer deux dés et de garder le\_meilleur, elle ne lance plus qu’un seul dé. </p><p>Une\_seule cible à la fois peut être affectée par une\_malédiction.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> le PJ peut affecter un total\_de [Mod INT] cibles (minimum 1). Le sort\_doit être lancé pour chaque cible.</p></blockquote>"
  source: ""
  origin: Livre du Joueur p.138
  slug: ""
  inGame: >-
    <p>L'action permet de réaliser l'attaque magique contre la DEF d'une cible
    sélectionnée. En cas de réussite elle applique un Dé Malus à tous les tests
    de la victime pendant tout le Combat. Il faudra gérer manuellement le nombre
    de tests réalisés avec l'affaiblissement. Fonctionne uniquement en Mode
    Combat.</p>
