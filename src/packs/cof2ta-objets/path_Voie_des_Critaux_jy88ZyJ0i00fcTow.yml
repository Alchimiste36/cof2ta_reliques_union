system:
  description: "<h5>L’enchantement de cristaux est un art délicat\_très prisés des alchimistes. Selon la légende,\_il serait à l’origine de la création des cristaux\_élémentaires.</h5><p>Le PJ <strong>sait tailler et s’harmoniser avec la puissance\_magique de petits cristaux</strong>. Il est le seul à pouvoir\_les utiliser. <strong>Il faut user d’une Rune de pouvoir</strong>\_(rang 5 de la voie de la magie runique) <strong>pour créer\_des cristaux capables de s’harmoniser avec autrui</strong>.\_</p><p>Pour fonctionner, un cristal doit être lancé près du personnage : il se met alors à tourner\_rapidement autour de celui-ci. </p><p><strong>Un cristal a une\_DEF de 20, 10 PV et une RD de 5</strong>. Le pouvoir\_de chaque pierre varie selon sa couleur et sa\_forme. Le tableau ci-dessous récapitule ceux\_que l’on rencontre le plus couramment.</p>"
