system:
  description: "<h2>L’ordre de la Forge</h2><p>L’ordre de la Forge regroupe de nombreux\_corps de métier. Bien entendu, on y trouve\_aussi des guerriers ‒ hormis l’ordre des Errants, tous les ordres entretiennent un corps\_armé ‒, mais également des forgerons, joailliers,\_médecins, apothicaires ou mineurs. Rien de\_tout cela n’est de notoriété publique mais on\_peut également rencontrer des alchimistes, dont\_certains cherchent à repousser toujours plus loin\_la frontière entre la vie et la mort.</p><p>Cet ordre est l’un des plus prestigieux et des\_plus craints. Il a la charge de la production des\_armes runiques dont dépend la puissance des\_armées naines. Le titre honorifique ultime de\_l’ordre est celui de Seigneur des runes, décerné\_à l’issue d’un tournoi sanglant.</p>"
