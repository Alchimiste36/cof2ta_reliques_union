  description: "<p>Si le PJ réussit <strong>un test d’attaque magique</strong>\_(portée: 10 m), la victime saigne à la moindre\_blessure. </p><p><strong>tous les DM des attaques sanglantes</strong>\_infligées à la cible (arme blanche, griffe, saignement, etc.) <strong>augmentent de 1d6 pendant [5\_+ Mod. de SAG] tours</strong>. </p><p>Ce sort ignore la RD\_d’une cible mais les créatures qui ne saignent\_pas y sont immunisées (telles que les créatures\_non vivantes, les goules ou encore les dryades).</p>"
