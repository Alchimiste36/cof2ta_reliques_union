system:
  description: "<h2>Les Elfes Noirs</h2><p>Les Elfes noirs représentent le plus grand secret\_et la plus grande honte du peuple elfique. Au\_sein de toutes les communautés elfiques naissent\_des individus hébergeant en leur cœur une part\_sombre et maléfique qui finira inéluctablement\_par se révéler au cours de l’adolescence. Elle\_hante leurs pensées et fait progressivement naître\_une sorte de colère sourde, capable de prendre\_possession de leur esprit jusqu’à provoquer une\_explosion de violence incontrôlable.</p><p>Des rabatteurs elfes noirs parcourent le monde\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">pour repérer ces individus et les conduire à la sinistre citadelle de Slurce. Les parents de l’enfant\_</span>ne peuvent s’opposer à cet enlèvement en vertu\_d’une loi ancestrale connue et respectée par tous\_les Elfes ‒ malheur à ceux qui souhaiteraient\_s’y opposer.</p><p>Au sein de la citadelle, les recrues subissent un\_entraînement impitoyable qui a pour objectif\_de les aider à contrôler leurs démons et faire\_d’eux des assassins d’exception. Au cours de cet\_enseignement, la couleur de leur peau continue\_de s’assombrir pour prendre la teinte ténébreuse\_définitive. Rares sont les non-Elfes à connaître la\_véritable nature des Elfes noirs. Officiellement,\_ce sont des artistes, des comédiens ou des savants\_et Slurce est une prestigieuse académie. Il s’agit\_d’un des secrets les mieux gardés du peuple elfe.</p><p>Noms: en entrant à Slurce, un Elfe noir change\_également de nom. Ce symbolisme très fort\_signifie que tout ce qui appartient au passé ‒\_parents, amis, culture, histoire ‒ est révolu et\_appartient à une autre vie, qui a pris fin. Le\_nouveau nom de l’Elfe est dérivé de l’ancien: on\_ne garde que la première ou les deux premières\_syllabes et on y ajoute le suffixe « yn».</p><p><em>Par exemple, Vulm deviendrait Vul’yn et Laewen,\_Lae’yn.</em></p>"
