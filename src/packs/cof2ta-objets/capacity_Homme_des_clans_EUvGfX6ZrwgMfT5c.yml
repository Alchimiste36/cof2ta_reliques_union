system:
  description: "<p>Le PJ a acquis un tel statut au sein de son clan\_qu’il <strong>dispose maintenant d’un homme de main\_à son service</strong> qui combat à ses côtés et assure ses\_arrières sur le champ de bataille. Ce dernier lui\_est totalement fidèle et peut être de plus affecté\_à quelques basses besognes, telles que l’entretien\_des armes ou encore l’intendance.</p><p>Grâce à lui,\_les armes du personnage sont parfaitement\_entretenues et <strong>infligent des critiques sur un\_résultat de 19 ou 20</strong>.</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Bras droit:</span></strong></span></p><p>DEF 16, PV [niveau du PJ x 6],</p><p>attaque\_[niveau du PJ], DM 1d8+2.</p><p>FOR +2, DEX +0, CON\_+2, INT +0, SAG +0, CHA +0.</p><p>Il agit à l’initiative\_du PJ.</p><p>S’il venait à mourir, le PJ pourrait prendre un\_autre bras droit à son service au niveau suivant.</p>"
  source: ""
  origin: Livre du Joueur p.88
  slug: ""
  inGame: "<p>Le MJ donne les droits \"Propriétaire\" au joueur pour le Compagnon :\_@UUID[Actor.fMUztxQLMAIgdwww]{Bras droit des Ruines Nordiques}. Le PJ modifie les statistiques du Compagnon en fonction de son personnage.</p><p>Cette capacité permet de lier une autre capacité pour le choix de la capacité de rang 2\_@UUID[Item.xnf94jpQ3KHIZvvt]{Barbare}</p>"
