system:
  description: "<p><strong>Une fois à l’air libre</strong>, l’huile <strong>prend feu spontanément et brûle intensément</strong>.</p><p>Il est possible,\_au prix d’une <strong>action limitée</strong>, de <strong>l’appliquer\_sur une arme</strong> pour bénéficier d’un bonus de\_<strong>+1d6 DM de feu pendant [5 + Mod d’INT]\_minutes</strong>.</p><p>L’huile peut également être <strong>appliquée\_sur des carreaux d’arbalète ou des pointes de\_flèche</strong>, à raison d’une action d’attaque par lot\_de projectiles, une dose permettant d’enflammer\_<strong>environ cinq projectiles</strong>.</p>"
  source: ''
  origin: Livre du Joueur p.132
  slug: ''
  inGame: "<p>L'action activable permet d'obtenir le bonus aux DM des attaques de contact et à distance.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">ATTENTION :</span></strong></span> Les Elixirs dépendent des statistiques de d'Alchimiste. Si le PJ décide de confier ses élixirs à une autre personne, c'est tout de même l'Alchimiste qui devra faire l'action. Vous pouvez aussi utiliser l'Équipement :\_@UUID[Item.ZbaBqumFJ466SYip]{Fiole d'Huile instable}</p></blockquote>"
