system:
  description: "<p><strong>Forme</strong> : Prisme</p><p><strong>Effet :</strong> Résistance au feu et au\_froid 10 points</p><p><strong>Usage en jeu :</strong>\_Action activable permettant d'obtenir une RD 10.\_Il faut équipé l'objet pour pouvoir activer l'effet dans la liste des actions.</p><blockquote><p>L’enchantement de cristaux est un art délicat\_très prisés des alchimistes. Selon la légende,\_il serait à l’origine de la création des cristaux\_élémentaires.</p><p>Le PJ sait tailler et s’harmoniser avec la puissance\_magique de petits cristaux. <strong>Il est le seul à pouvoir\_les utiliser.</strong> Il faut user d’une Rune de pouvoir\_(rang 5 de la voie de la magie runique) pour créer\_des cristaux capables de s’harmoniser avec autrui.\_</p><p>Pour fonctionner, <strong>un cristal doit être lancé\_près du personnage</strong> : il se met alors à tourner\_rapidement autour de celui-ci.</p><p><strong>Un cristal a une\_DEF de 20, 10 PV et une RD de 5.</strong></p><p>Le pouvoir\_de chaque pierre varie selon sa couleur et sa\_forme.</p></blockquote>"
