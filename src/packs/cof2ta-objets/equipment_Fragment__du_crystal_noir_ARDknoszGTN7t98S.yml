  description: "<p><strong>Niveau de magie : 5</strong></p><p>Ce cristal noir permet de contrer les effets de la\_magie.</p><p><strong>Une fois par jour</strong>, au prix d'une <strong>action\_limitée</strong>, il permet de créer <strong>une zone de 10 mètres\_de rayon</strong> centrée sur le cristal, lequel perdure\_pendant une journée et qui aspire toute forme\_de magie.</p><p><strong>Aucun sort ni effet magique ne peut\_persister ou pénétrer dans ces zones</strong>. Les sorts\_actifs prennent fin immédiatement.</p><p><strong>Les créatures de magie pure</strong> – telles que les\_élémentaires – <strong>subissent automatiquement\_2d6 DM</strong> tant qu'elles restent dans la zone\_d'anti-magie.</p>"
