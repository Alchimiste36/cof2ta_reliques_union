  description: "<p>En réussissant <strong>un test de DEX difficulté 10</strong>, le\_PJ peut se déplacer (sur une distance maximale\_de 20 m) jusqu’à une zone ténébreuse ou à l’abri\_des regards (derrière un mur, dans un buisson\_ou sous une calèche par exemple, du moment\_que personne ne peut voir précisément la zone)\_et disparaître à son tour. Il ne réapparaît qu’au\_tour suivant, au cours de sa phase d’initiative.</p><p>Aucun adversaire ne peut l’attaquer pendant\_qu’il a disparu dans les ombres, mais il peut\_subir des DM de zone. Le Gobelin <strong>réapparaît à\_une distance maximale de 10 m</strong> de sa position\_initiale.</p><p><strong><span style=\"text-decoration:underline\">S’il a l’initiative sur un adversaire</span></strong> qu’il\_prend pour cible au contact, il bénéficie d’un\_bonus de <strong>+2d6 DM à son attaque</strong>.</p>"
