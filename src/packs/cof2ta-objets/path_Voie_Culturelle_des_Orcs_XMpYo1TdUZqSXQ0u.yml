system:
  description: "<h2>Les\_Orcs</h2><p>Les Orcs sont de grandes créatures incroyablement musclées. Leur visage, généralement considéré comme disgracieux par les autres peuples,\_n’attire guère la sympathie. Il faut avouer que\_leurs canines inférieures proéminentes leur\_confèrent un air perpétuellement féroce.</p><p>Le clan ou le groupe est souvent au centre de\_la vie des Orcs, symbole de stabilité mais aussi\_synonyme de survie dans un monde qui leur\_est particulièrement hostile. C’est pourquoi,\_malgré les mésententes ou les conflits, rien n’est\_plus important que la loyauté envers le clan\_ou la famille. Dans ce type de communauté,\_le statut social de l’Orc est lié à sa force, sa\_capacité à prendre la place du dominant ou\_bien à ses exploits, qu’ils soient liés à la guerre ou à la chasse.</p><p>À l’extérieur des territoires de leurs clans, les\_Orcs sont craints pour leur puissance et leurs\_capacités de combat. Ils sont de ce fait bien\_souvent traqués comme des bêtes dangereuses.</p><h4>Modificateurs des Orcs</h4><p>Atouts : <strong>+2 FOR, +2 CON</strong></p><p>Faiblesses : <strong>-2 INT, -2 CHA</strong></p><p>Âge de départ à l’aventure : <strong>15 ans et plus</strong></p><p>Espérance de vie : <strong>50 ans</strong></p><p>Taille : <strong>entre 1,70 m et 2,20 m</strong></p><p>Poids : <strong>entre 70 kg et 170 kg</strong></p><p>Trait des Orcs : <strong>Instinct de survie</strong></p><p><strong>Noms féminins :</strong> <em>Bashuk, Batul, Boora, Deleeg, Dura, Durgat, Durz, Elisha, Gashnakh,\_Kharza, Lambee, Melash, Morn, Olaan, Rysha,\_Shag’dub, Shel, Shena, Thabel, Tuzel, Urzeel,\_Usha’an, Yshela, Zera’an.</em></p><p><strong>Noms masculins :</strong> <em>Atulg, Cuba, Gorgo, Horr,\_Igubat, Knah, Krug, Kul’gha, Naguk, Narod,\_Pomg, Rilug, Saba, Slogh, Ulag, Ur’am, Urlgan,\_Verr, Viggu, Vitgut, Yakha, Yam, Yogg.</em></p>"
