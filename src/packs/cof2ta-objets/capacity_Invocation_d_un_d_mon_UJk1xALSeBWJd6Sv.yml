name: Invocation d’un démon
type: capacity
img: icons/magic/unholy/silhouette-evil-horned-giant.webp
system:
  description: "<p><strong>Une fois par combat</strong>, <strong>en sacrifiant 1d6 PV</strong>, le PJ\_<strong>invoque un démon</strong> qui entre alors à son service\_<strong>pour [5 + Mod. de SAG] tours</strong>. </p><p>Le démon est\_une grande silhouette noire d’environ 2,30 m,\_aux contours brumeux et indéterminés et aux\_yeux larges et écarlates. </p><p>Le démon <strong>divise par\_deux tous les DM non magiques</strong> qu’il subit,\_les sorts et les armes magiques lui infligent des\_DM normaux. Il est <strong>capable de voler</strong> à une\_vitesse équivalente à un déplacement normal.</p><p><strong><span style=\"text-decoration:underline\">Lorsque le PJ atteint le niveau 10</span></strong>, le démon\_devient <strong>capable d’attaquer deux fois par tour</strong>\_au prix d’une <strong>action limitée</strong>.</p><p><strong><span style=\"text-decoration:underline\">Démon :</span></strong></p><p>FOR +5*, DEX +2, CON +4*, INT +2, SAG\_+2, CHA +0,</p><p>Init. 16, DEF 17, PV [niveau du PJ x 5],</p><p>attaque au contact = [niveau du PJ], DM 1d8+5</p>"
  source: ''
  origin: Livre du Joueur p.139
