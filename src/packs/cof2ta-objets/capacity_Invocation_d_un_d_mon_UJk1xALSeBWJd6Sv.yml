  inGame: "<p>L'action permet de dépenser les PM et de subir 1d6 DM.</p><p>Donnez les droits \"Propriétaire\" au PJ pour le Compagnon :\_@UUID[Actor.vxAzuG18og558g9u]{Démon invoqué}</p>"
