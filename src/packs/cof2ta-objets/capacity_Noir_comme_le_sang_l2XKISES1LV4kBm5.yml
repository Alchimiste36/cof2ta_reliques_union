system:
  description: "<p>La noirceur qui coule dans les veines\_de l’Elfe noir est un fardeau, mais peut\_aussi se révéler salvatrice dans les pires\_moments.</p><p><strong><span style=\"text-decoration:underline\">Une fois par combat</span></strong>, <strong>lorsqu’il\_tombe à 0 PV</strong>, le PJ peut continuer à agir\_normalement mais une nouvelle attaque\_réussie infligeant au moins 1 point de DM\_finira par l’achever.</p><p><strong>Tant qu’il reste à 0 PV</strong>, il\_bénéficie d’un bonus de <strong>+2 à tous ses tests</strong>.</p>"
