  inGame: >-
    <p>L'action activable permet d'ajouter le bonus de +2 à tous les jets de
    compétence et aux jets d'attaques. La capacité est utilisable une fois entre
    chaque récupération rapide.</p><p>Lors de l'apprentissage, cette capacité
    donne droit à une capacité liée pour l'effet de la capacité de rang 2
    @UUID[Item.anXZdiZNM2Ize63Q]{Apprenti de Slurce}. Glissez-déposez la
    capacité choisie sous cette capacité.</p>
