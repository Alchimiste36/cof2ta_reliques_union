name: Ordre de chevalerie
type: capacity
img: icons/commodities/treasure/medal-ribbon-blue.webp
system:
  description: "<p>Le PJ rejoint un prestigieux ordre ou groupe\_de chevalerie avec le grade d’apprenti.</p><p>Il <strong>reçoit\_une monture volante</strong>, <strong>des insignes</strong> ainsi qu’une\_<strong>arme à une main</strong> sertie des symboles de son\_ordre.</p><p>Il fait l’acquisition du <strong>rang 5 de la voie du\_combat monté</strong>. S’il possède déjà cette capacité,\_ou venait à l’acquérir par la suite, il devient\_un membre gradé de son ordre et obtient un\_bonus de +5 pour tous les tests de persuasion\_et d’intimidation. Ce bonus passe à +10 s’il\_chevauche sa monture volante.\_</p><blockquote><p>Au moment de\_l’acquisition du premier\_rang de cette voie, le\_joueur doit choisir un\_ordre et une monture\_ailée. Ce choix est\_irréversible et indique le\_type d’élément concerné\_par les capacités de la voie.\_</p><ul><li><p>Dragon : feu</p></li><li><p>griffon :\_foudre</p></li><li><p>aspic : poison</p></li></ul></blockquote>"
  source: ''
  origin: Livre du Joueur p.141
  slug: ''
  inGame: "<p>La capacité est copnfigurée avec la capacité liée :\_@UUID[Item.hXRnq5i3jciz49Aq]{Monture fantastique}.</p><p>Pas d'autres effets automatiques.</p><p>Si le PJ possède déjà\_@UUID[Item.hXRnq5i3jciz49Aq]{Monture fantastique}, ajoutez sur l'action la Condition \"Est apprise\". Elle permet d'obtenir les bonus au test de CHA.</p>"
