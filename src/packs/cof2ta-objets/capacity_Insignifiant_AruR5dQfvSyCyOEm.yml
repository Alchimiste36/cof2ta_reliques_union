  description: "<p>Le PJ bénéficie d’une étrange faculté à se faire\_oublier ou à détourner l’attention. </p><p><strong>Une fois par\_combat</strong>, alors qu’il était pris pour cible par un\_ennemi, il peut invoquer cette capacité pour\_<strong>reporter l’attention de son assaillant sur une\_autre cible ennemie</strong>. L’ennemi ne s’en prendra\_plus au Gobelin, à moins que ce dernier ne\_l’attaque de nouveau.</p><p>De plus, le Gobelin bénéficie d’un bonus de <strong>+5\_à tous les tests visant à se fondre dans la masse</strong>.</p>"
