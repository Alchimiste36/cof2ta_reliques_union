system:
  description: "<h2>Les Humains</h2><p>Les Humains constituent un peuple très\_hétéroclite et très commun sur les Terres\_d’Arran. Leur installation se fait souvent\_au détriment des autres peuples. Ils ont colonisé\_les steppes nordiques hostiles pour fonder la cité\_d’Aspen en Borduria et ont rendu habitables les\_terres arides aux marges de la Terre des Ogres\_pour bâtir l’immense empire Assanide. Les forêts\_de Duhann et de Daëdenn cèdent chaque année\_de plus en plus de terrain au développement\_des cités-États de Tarascon et il n’y a guère\_que les Nains cloîtrés dans leurs imprenables\_forteresses-États qui ne semblent pas menacés\_par cette expansion. Pas encore en tout cas.</p><p>Les Humains n’ont certes pas la longévité\_des Elfes ni la robustesse des Nains, mais\_ils compensent par leur incroyable capacité\_d’adaptation et une fécondité impressionnante.</p><p>Capables du meilleur comme du pire, les\_sociétés humaines sont variées et il est impossible\_de les réduire à une définition générale. Les\_peuples d’Arran victimes de leur xénophobie\_n’ont souvent connu que les mauvais côtés de\_certaines communautés humaines. Mais d’autres\_peuplades, quelques frontières plus loin, vivent\_en respectant des valeurs et des traditions tout\_à fait inverses.</p><h4>Modificateurs des Humains</h4><p>Atout: <strong>aucun</strong></p><p>Faiblesse: <strong>aucun</strong></p><p>Âge de départ à l’aventure: <strong>18 ans et plus</strong></p><p>Espérance de vie: <strong>70 ans</strong></p><p>Taille: <strong>entre 1,50 m et 2,00 m</strong></p><p>Poids : <strong>entre 40 kg et 120 kg</strong></p><p>Traits des Humains : <strong>aucun</strong></p><p><strong>Noms féminins:</strong> <em>Aethria, Aales, Ann, Aphra,\_Ashae, Ayfara, Bryde, Clymoni, Daeira, Dalleira, Dhesah, Elianora, Elise, Emelyne, Egelina,\_Gaynore, Helleori, Ianthe, Inle, Jehane, Jivete,\_Malie, Mareona, Mattie, Melisenda, Merily,\_Nota, Phaio, Ptelera, Rose, Ulshee, Ysabea.</em></p><p><strong>Noms masculins:</strong> <em>Alvan, Ancelm, Daue,\_Iohannes, Gallien, Geffery, Geoff, Gerald,\_Hamo, Herry, Herval, Joa, Joscell, Jun, Maina,\_Mauklom, Nicoll, Niel, Oenus, Raimn, Ran,\_Ranort, Robb, Roff, Rullo, Simm, Teebald,\_Tericio, Thomme, Vinlam, Yvoe.</em></p>"
