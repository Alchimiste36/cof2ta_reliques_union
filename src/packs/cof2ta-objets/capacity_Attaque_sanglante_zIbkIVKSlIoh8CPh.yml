  description: "<p>Le PJ réalise une <strong>attaque de contact</strong> violente\_qui provoque une hémorragie. </p><p>En plus des DM\_normaux, l’attaque <strong>produit un saignement qui\_inflige à la victime +1d6 DM à chaque tour</strong>\_suivant jusqu’à ce que la cible réussisse un test de\_CON difficulté [12 + Mod. de FOR] ou qu’elle\_soit soignée. </p><p>On ne peut cumuler plusieurs effets\_de saignement.</p>"
  source: ''
  origin: Livre du Joueur p.95
  slug: ''
  inGame: "<p>L'action permet de réaliser l'attaque en reprennant la première arme équipée. Elle ajoute l'effet supplémentaire de Saignement. L'effet fonctionne uniquement en mode Combat.</p><p>L'effet supplémentaire peut être supprimé depuis l'onglet \"Effet\" sur la feuille de la cible.</p><p>Cette capacité permet de lier une autre capacité pour le choix de la capacité de rang 2\_@UUID[Item.dU9Bz1QAOCCbOlO3]{Talent pour la violence}</p>"
