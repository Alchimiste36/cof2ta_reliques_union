  description: "<p>Pour une <strong>action d’attaque</strong>,\_le mystique choisit une cible visible <strong>à moins de\_50 mètres</strong> et projette une onde de choc qui la\_<strong>touche automatiquement</strong>, lui infligeant <strong>1d4\_DM</strong>. Le projectile de force est presque invisible\_et n’émet aucun son lorsqu’il file dans l’air.</p><blockquote><p>Chaque profil de la famille des mystiques\_possède un talent magique, une capacité supplémentaire, décrit(e) dans la liste ci-dessous.</p><p>Bien que les talents magiques soient des sorts\_‒ des capacités dont le nom est suivi d’un\_astérisque (*) ‒, ils ne requièrent pas la consommation de points de magie (PM)\_ pour être\_lancés et ne peuvent pas bénéficier des effets\_d’une concentration (voir Système de jeu - La\_magie page 112).</p></blockquote>"
