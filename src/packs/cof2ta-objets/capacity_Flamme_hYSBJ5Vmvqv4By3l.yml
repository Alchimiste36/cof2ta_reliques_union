  description: "<p>Pour une <strong>action gratuite</strong> et tant\_qu'il le souhaite, le mystique <strong>fait apparaître\_dans la paume de sa main une petite flamme</strong>, à\_peine assez intense pour éclairer une zone dans\_un rayon de 5 mètres. Il peut l’utiliser pour\_<strong>mettre le feu à des matières inflammables</strong> ou\_porter une <strong>attaque de contact</strong> ‒ pour une action\_d’attaque ‒ à un adversaire en utilisant son score\_<strong>d’attaque magique et lui infligeant 1d6 DM</strong>.</p><p></p><blockquote><p>Chaque profil de la famille des mystiques\_possède un talent magique, une capacité supplémentaire, décrit(e) dans la liste ci-dessous.</p><p>Bien que les talents magiques soient des sorts\_‒ des capacités dont le nom est suivi d’un\_astérisque (*) ‒, ils ne requièrent pas la consommation de points de magie (PM) pour être\_lancés et ne peuvent pas bénéficier des effets\_d’une concentration (voir Système de jeu - La\_magie page 112).</p></blockquote>"
