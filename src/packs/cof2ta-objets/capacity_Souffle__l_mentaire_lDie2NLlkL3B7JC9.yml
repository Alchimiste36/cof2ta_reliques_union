system:
  description: "<p>La monture du PJ est désormais <strong>capable d’utiliser un souffle élémentaire</strong> au prix de son <strong>action\_d’attaque</strong>.</p><p>Si elle réussit <strong>un test d’attaque</strong>, elle\_inflige <strong>4d6 DM élémentaires</strong> à sa cible, ainsi\_que <strong>2d6 DM élémentaires à toutes les cibles à\_moins de 3 mètres</strong> de sa cible initiale.</p><p>En cas\_d’échec, l’ensemble des cibles subit <strong>seulement\_1d6 DM</strong>.</p><p>Ce souffle a une <strong>portée de 40 m</strong>. La\_nature de l’élément dépend de la monture (feu\_pour les dragons, glace pour les guivres, etc.).</p>"
  source: ''
