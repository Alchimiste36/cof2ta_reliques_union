name: Étreinte mortelle
type: capacity
img: icons/magic/unholy/hand-claw-glow-orange.webp
system:
  description: "<p><strong>Une fois par combat</strong>, le personnage <strong>peut se saisir\_d’un adversaire d’une taille inférieure ou égale</strong> à\_la sienne et <strong>l’écraser entre ses bras</strong> puissants. </p><p>Sur\_<strong>un test d’attaque au contact</strong> réussi, le PJ <strong>inflige\_[2d6 + Mod. de FOR] DM</strong> à sa cible (+ son\_éventuel bonus de rage) <strong>et</strong> <strong>l’immobilise</strong> entre ses\_bras, causant pour son adversaire une pénalité\_de <strong>-5 en DEF</strong>. </p><p>À son tour, <strong>la victime peut tenter\_de se libérer avec un test de FOR en opposition</strong> ;\_en cas d’échec, elle ne peut faire aucune action. </p><p>À chacun des tours suivants, tant que l’étreinte\_est maintenue, le PJ inflige à nouveau des DM\_sans avoir à réaliser son test d’attaque.</p>"
  source: ''
  origin: Livre du Joueur p.142
  slug: ''
  inGame: "<p>La capacité possède la capacité liée :\_@UUID[Item.FrKhGqQ0ZJxxdvuq]{Rage du berserk}.</p><p>Si le PJ a ou obtient cette capacité d'une autre façon, ajoutez la Condition 'Est appris\" aux deux actions de cette capacité et supprimez la capacité liée.</p>"
