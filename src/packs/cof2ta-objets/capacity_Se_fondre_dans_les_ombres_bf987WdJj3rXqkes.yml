system:
  description: "<p>Au prix d'une\_action de mouvement, la créature peut\_gagner les ombres et y disparaître. Il peut en\_ressortir quand bon lui semble, à une distance\_maximale de 20 m de son point de disparition\_– toujours au prix d'une action de mouvement.\_</p><p>Tant qu'il est dans les ombres, la créature\_est insensible à tout type de DM – hormis les\_DM de zone. Il peut cependant être révélé à\_l'aide d'une source de lumière suffisamment\_puissante (tel qu'un sort de Lumières dansantes\_par exemple ou un feu plus important que\_celui d'une torche).</p>"
