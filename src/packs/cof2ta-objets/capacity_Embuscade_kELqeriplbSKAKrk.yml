  description: "<p>Au premier tour de combat,\_si l'environnement permet à l'aventurier de se\_dissimuler, la cible doit faire un <strong>test de SAG\_difficulté 19 ou être surprise</strong>. </p><p>Si elle attaque avec\_succès une cible surprise, la créature inflige <strong>+1d6\_aux DM</strong>. </p><p>La créature obtient un bonus de <strong>+5 à\_tous les tests de discrétion et en Init</strong>.</p>"
  source: ""
  origin: Livre du meneur p134
  slug: ""
  inGame: >-
    <p>La première action permanente donne le bonus à l'INIT et au jet de
    discrétion.</p><p>La deuxième action permet de réaliser le test de
    sauvegarde et d'appliquer le statut Surpris pendant 1 round sur la cible en
    cas d'échec.</p><p>La troisième action activable/désactivable permet
    d'obtenir les DM supplémentaires pour les attaques de contact et de
    distance.</p>
