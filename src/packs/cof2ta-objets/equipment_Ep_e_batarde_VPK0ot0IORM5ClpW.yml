  description: "<p>L'épée batarde est une arme bien équilibrée qui permet d'être maniée à une ou deux mains.</p><p>Elle mesure environ 105 cm au total pour un poids compris entre 1.5 et 1.7 kg.</p><p>L’épée bâtarde tient son nom de sa construction\_particulière : à mi-chemin entre une épée longue\_et une épée à deux mains. Même s’il ne s’agit\_pas de l’usage le plus répandu, il est possible de\_la manier à une seule main. Ses DM passent\_alors à 1d8.</p>"
