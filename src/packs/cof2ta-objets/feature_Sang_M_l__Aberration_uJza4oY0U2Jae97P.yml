system:
  description: "<h3>ATTENTION</h3><p>Lorsque vous crez un personnage Aberration, <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">il faut d'abord dupliquer ce trait !</span></strong></span></p><p>Sur le nouveau trait, <strong>supprimer les capacités</strong> pour conserver uniquement le Trait choisi. Ensuite, supprimer les voies culturelles sauf<strong> celle choisie</strong>. Pour finir, <strong>ajuster les Modificateurs</strong> pour définir la caractéristique Atout et celle Faiblesse.</p><p>Uniquement après cela, <strong>glissez-déposez le trait</strong> sur la feuille de personnage.</p><h2>Les\_Aberrration</h2><p>Exceptionnellement, il arrive que les Peaux\_vertes s’accouplent avec des individus d’autres\_peuples et donnent naissance à un Sang-mêlé.\_Plus rarement encore, on peut rencontrer le\_fruit d’une union entre deux Peaux vertes\_de cultures différentes. Cette progéniture est\_appelée «Aberration» et suit les règles suivantes\_lors de la création de personnage :</p><h4>Modificateurs des Aberrations</h4><p>Atout: <strong>+2 à une caractéristique au choix parmi\_les atouts des parents</strong></p><p>Faiblesse : <strong>-2 à une caractéristique au choix\_parmi les faiblesses des parents</strong></p><p>Trait des Aberrations : <strong>au choix parmi les traits\_des parents.</strong></p><p>Voie de peuple : <strong>voie du peuple des Peaux vertes</strong></p><p>Voie culturelle :\_<strong>Voie culturelle au choix parmi celles des parents.</strong></p><p></p><blockquote><p>Yasmine décide d’incarner la Poisse, un Orkelin\_– croisement étrange entre un Orc et un Gobelin.\_Moins musclé et plus fin qu’un Orc, il est cependant\_plus agile et rusé. Elle choisit l’atout suivant: +2\_DEX, tandis que la faiblesse retenue est: -2 CHA.\_</p><p>Pour la capacité de peuple, Yasmine décide que\_son PJ a hérité des capacités de survie de son\_ascendance orque et opte pour Instinct de survie.\_Pour la voie de peuple, il s’agit de celle des Peaux\_vertes. Enfin, pour la voie culturelle, elle choisit\_la voie des Orcs, davantage en accord avec l’idée\_qu’elle se fait de son personnage.</p></blockquote><h2>Les Peaux vertes</h2><p>Les Peaux vertes forment un grand peuple\_qui regroupe plusieurs ethnies très\_différentes les unes des autres, que ce\_soit morphologiquement ou culturellement.\_Cependant, à l’échelle des Terres d’Arran, toutes\_sont souvent considérées de la même façon par\_les autres peuples en raison de la couleur de leur\_peau et du danger que peuvent représenter les\_clans organisés aux frontières de la civilisation.\_Il est vrai que toutes les Peaux vertes ont des\_choses en commun.</p><p>Depuis les temps immémoriaux, les Orcs\_semblent être en guerre permanente contre\_la plupart des peuples des Terres d’Arran. Au\_nord-est, les Ogres menacent dangereusement\_les forteresses-États naines tandis que souvent\_les Gobelins prolifèrent dans les bas-fonds des\_plus grandes villes ou bien s’organisent en tribus\_de pillards dans les contrées sauvages.</p><p>S’il est vrai que les Peaux vertes sont craintes\_et méprisées, il n’est pas rare pour autant de les\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">croiser en nombre restreint dans certaines villes\_</span>cosmopolites, négociant leurs services en tant\_que mercenaires, voleurs ou gardes du corps,\_la nature les ayant pourvues de formidables\_capacités physiques prêtes à être monnayées.</p><p>Les Peaux vertes partagent une même voie de\_peuple, mais les multiples ethnies composant ce\_groupe disposent de leurs propres voies culturelles. En revanche, contrairement aux autres\_peuples présentés jusque-là, les modificateurs de\_caractéristique de peuple, les traits spécifiques\_ne sont pas communs à tout le peuple des Peaux\_vertes mais détaillés pour\_ chacune des cultures,\_ogre, orque ou gobeline.</p>"
