  description: >-
    <p>Conçue pour être utilisée uniquement à cheval, la lance de cavalerie
    mesure environ 3 m de long. Il faut prendre de l’élan pour l’utiliser à son
    plein potentiel. L’attaque doit donc avoir lieu après un déplacement pour
    obtenir les DM indiqués. Sinon, en combat au contact classique, le cavalier
    subit un dé malus.</p>
