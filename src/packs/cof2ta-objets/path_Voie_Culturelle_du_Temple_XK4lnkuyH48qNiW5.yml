  description: "<h2>L’ordre du Temple</h2><p>L’ordre du Temple est une caste bicéphale. Il\_regroupe d’une part les bâtisseurs, les\_ architectes,\_les ingénieurs et les savants. On y retrouve\_également des mineurs et des forgerons, dédiés\_au travail de la pierre là où ceux de l’ordre de la\_Forge œuvrent pour le travail du métal. D’autre\_part, cet ordre est aussi l’organisation en charge\_du culte du dieu nain Yjdad. C’est pourquoi\_le Temple compte aussi des prêtres, sages et\_mystiques qui desservent le culte et rendent les\_hommages divins ou jouent le rôle de guides\_spirituels, d’exorcistes, de conseillers politiques\_ou d’enquêteurs.</p><p>Les guerriers et paladins du Temple sont particulièrement respectés et appelés en première\_ligne pour faire face aux menaces occultes.\_</p>"
