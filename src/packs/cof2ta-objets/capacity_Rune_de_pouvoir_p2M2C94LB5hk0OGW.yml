  description: "<p>Le PJ <strong>peut lier un sort à un objet par une inscription\_runique</strong>. </p><p>S’il ne connaît pas lui-même le sort, il doit se\_faire aider par une personne qui sait le lancer.</p><p> Le sort\_ainsi lié <strong>peut être utilisé trois fois par jour</strong>. </p><p>Le processus\_est le même que pour fabriquer une arme ou une armure\_magique : remplacez le niveau de magie par le rang du\_sort à lier. </p><p><strong><span style=\"text-decoration:underline\">À partir du niveau 8</span></strong>, le PJ <strong>peut lier plusieurs\_sorts à un objet</strong>, mais la somme des rangs des sorts ne\_peut excéder le niveau de magie maximal auquel il a droit.</p>"
