name: Mauvais œil
type: capacity
img: icons/creatures/eyes/humanoid-single-yellow.webp
system:
  description: "<p>Tant que le PJ regarde sa cible avec le mauvais\_œil, celle-ci est accablée de malchance.\_En plus\_de ses actions normales, le personnage <strong>peut\_poser le mauvais œil sur la cible visible de son\_choix à chaque tour</strong>.</p><p><strong>La victime choisie subit une\_pénalité de -2 à tous les tests.</strong></p><p>Si elle obtient un\_résultat de 1 ou 2 au d20 alors qu’elle est sous\_l’effet du mauvais œil, le joueur peut décider, en\_accord avec le MJ, des conséquences extrêmement désagréables que cet échec critique a pour\_la cible.\_S’il s’agit d’une créature ou d’un PNJ\_mineur, un tel résultat conduit généralement\_à sa mort d’une façon grotesque et/ou atroce.</p>"
  source: ""
  origin: Livre du Joueur p.150
  slug: ""
  inGame: >-
    <p>L'action permet d'appliquer automatiquement un effet supplémentaire sur
    une cible sélectionnée. La cible obtient le malus à ses tests pendant un
    seul round. Il faudra choisir de nouveau une cible au prochain round.</p>
