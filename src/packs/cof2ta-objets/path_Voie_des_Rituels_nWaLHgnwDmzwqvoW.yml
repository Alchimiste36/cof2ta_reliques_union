  description: "<h5>Les rituels constituent un ensemble de techniques\_mystiques complexes élaborées pour permettre\_à des profanes de manipuler dans une certaine\_mesure les puissances arcaniques du monde.\_</h5><p>Ils <strong>ne consomment aucun PM</strong> lors de leur\_exécution et délivrent des effets puissants et\_durables. En contrepartie, ils sont longs à\_produire : un rituel demande <strong>une préparation</strong>\_<strong>d’au moins 30 minutes pour être lancé</strong>.\_</p><p>Chaque rang atteint dans cette voie permet\_l’acquisition d’un rituel au choix parmi la liste\_suivante :</p><ul><li><p>@UUID[Item.e2NG6tHiiLRKh1pY]{Animation des morts}</p></li><li><p>@UUID[Item.hxghOvA3PoSQYQTH]{Communion de l’esprit}</p></li><li><p>@UUID[Item.tBMeHRc9kahsAoZs]{L’eau des sens}</p></li><li><p>@UUID[Item.LyLB6vDYMWe7vbQZ]{Sanctuaire}</p></li><li><p>@UUID[Item.TGuSCCxItG15Vbj0]{Imitation}</p></li></ul>"
