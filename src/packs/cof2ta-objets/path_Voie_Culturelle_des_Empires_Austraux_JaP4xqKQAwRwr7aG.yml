system:
  description: "<h2>Humains\_des Empires Austraux</h2><p>Les Humains ayant colonisé les Terres du Sud\_ont fondé la cité marchande de Scarande ainsi\_que les immenses empire Assanide et empire de\_Dumn. Ces civilisations se vantent de compter\_parmi les nations les plus évoluées des Terres\_d’Arran bien qu’elles soient jugées décadentes\_par les peuples nordiques.</p><p>S’il est vrai que la guerre tient un rôle central\_dans l’organisation de ces empires – comme\_partout ailleurs –, l’art et la science se sont forgés une place de choix aux côtés du commerce\_et de la politique. Et en première ligne des\_centres d’intérêts des savants se trouvent les arts\_mystiques. Nombre de gouverneurs et sénateurs\_sont des Mages ayant obtenu leur charge au\_moyen de leur puissance arcanique plutôt qu’à\_l’aide de manœuvres politiques.</p>"
