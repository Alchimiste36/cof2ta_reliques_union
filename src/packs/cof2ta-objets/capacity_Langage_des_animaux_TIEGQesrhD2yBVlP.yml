  description: "<p>Le PJ peut communiquer avec les animaux\_qui, en général, se comportent avec lui de\_manière amicale. </p><p>Il gagne un bonus de <strong>+5 à\_tous les tests destinés à influencer un animal</strong>.\_La communication reste primitive et limitée à\_l’intelligence de l’animal et à son point de vue\_(prédateur, proie, etc.).</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée\_:</span></strong></span>  en réussissant un test d’INT\_difficulté 20 (le bonus de la capacité s’applique\_à ce test), le PJ peut réussir à entretenir une\_conversation beaucoup plus poussée avec l’animal, lui prêtant des raisonnements humanoïdes.</p></blockquote>"
