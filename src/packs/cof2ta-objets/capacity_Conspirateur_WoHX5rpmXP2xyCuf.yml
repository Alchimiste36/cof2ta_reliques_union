  description: "<p>Le PJ connaît beaucoup de monde dans les\_Terres d’Arran. </p><p><strong><span style=\"text-decoration:underline\">Une fois par aventure</span></strong>, il peut\_<strong>faire appel à un ami ou contact pour en obtenir\_un service, une information ou sceller une\_alliance</strong>. </p><p>Pour cela, il doit réussir <strong>un test de CHA\_difficulté 10</strong> si le service est du domaine de la\_routine, <strong>de 15</strong> si le service est difficile à rendre\_ou s’il peut présenter un risque pour le contact,\_et <strong>de 20</strong> si le service fait appel à une information\_secrète ou s’il met ouvertement l’allié en danger. </p><p>En cas d’échec, l’ami peut malgré tout accorder\_son aide, mais elle ne sera pas gratuite...</p>"
