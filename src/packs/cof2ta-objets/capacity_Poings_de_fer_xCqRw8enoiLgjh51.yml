system:
  description: "<p>Lorsqu’il <strong>combat à mains nues</strong>, le PJ peut (s’il le souhaite) <strong>utiliser son score d’attaque à distance</strong>\_au lieu de celui d’attaque au contact. </p><p>Au rang 1\_de cette voie, il inflige <strong>[1d6 + Mod. de FOR]\_DM létaux</strong>. Ces DM passent à <strong>1d8 au rang 3</strong>\_et à <strong>1d10 au rang 5</strong>.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> la valeur du dé des DM\_est augmentée d’une catégorie, jusqu’au d12\_au rang 5.</p></blockquote>"
  source: ''
  origin: Livre du Joueur p.125
  slug: ''
  inGame: >-
    <p>La première action permet de réaliser l'attaque à Mains nues avec le
    score d'attaque de contact. La deuxième permet de réaliser l'attaque avec le
    score d'attaque à distance.</p><p>Si le PJ obtient la capacité avancée,
    modifiez sur les deux actions la valeur du champs "Dommages" des Résolutions
    par "<strong>@rang[1d8,1d8,1d10,1d10,1d12] +@for]</strong>"</p>
