  description: "<p>La peau du PJ prend la consistance de l’écorce.\_</p><p>Il gagne <strong>+2 en DEF pendant [5 + Mod. de\_SAG] tours</strong>. Ce bonus passe à +4 au rang 4 de\_cette voie.</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée :</span></strong></span> le PJ bénéficie d’un bonus\_de +2 à son test d’attaque magique.</p></blockquote>"
