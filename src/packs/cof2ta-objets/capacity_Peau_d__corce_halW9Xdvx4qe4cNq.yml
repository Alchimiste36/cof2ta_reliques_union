  inGame: "<p>L'action activable permet d'obtenir le bonus en DEF.\_</p><p>Au rang 4, le PJ doit remplacer la Valeur du Modificateur DEF de l'action par \"+4\".</p><p>Si le PJ obtient la capacité avancée, ajoutez un nouveau Modificateur sur l'action de type Combat - Attaque magie - \"+2\".</p><blockquote><p><strong>Note : Pour utiliser la \"concentration\" faites SHIFT+CLIC sur l'action</strong></p></blockquote><p></p>"
