name: Nature nourricière
type: capacity
img: icons/magic/nature/cornucopia-orange.webp
system:
  description: "<p>Si le PJ passe <strong>une heure en forêt</strong>, il trouve de\_quoi <strong>nourrir deux personnes</strong> (pour une journée)\_<strong>pour chaque rang atteint dans cette voie</strong>. </p><p>En\_passant <strong>1d6 heures</strong> et en réussissant <strong>un test\_de SAG difficulté 10</strong>, le PJ trouve des plantes\_médicinales qui lui permettent de <strong>soigner 1d6\_PV par rang</strong> atteint dans cette voie. Ces plantes\_doivent être utilisées immédiatement. Ces soins\_peuvent toutefois être répartis sur plusieurs\_patients: le joueur décide combien de d6 il\_alloue à chaque patient .</p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capacité avancée\_:</span></strong></span> le PJ peut choisir un autre\_environnement naturel (plaine, montagne,\_marais ou désert) et appliquer les effets de la\_capacité. Dans ce milieu, il doit passer deux\_heures à chercher des vivres et les herbes récoltées\_ne soignent que 1d4 PV par rang atteint dans\_cette voie.</p></blockquote>"
  source: ''
  origin: Livre du Joueur p.130
  slug: ''
  inGame: >-
    <p>La première action permet de réaliser le test de PER difficulté 10. Les
    DM de l'action correspondent à 1d6 par rang atteint dans la voie. Le MJ
    pourra répartir les soins en fonction du résultat de chaque dé.</p><p>Si le
    PJ obtient la capacité avancée, ajoutez simplement la Condition "est appris"
    sur la deuxième action qui fonctionne de la même manière que la première. Le
    PJ pourra inscire le domaine choisi dans le Label de l'action.</p>
