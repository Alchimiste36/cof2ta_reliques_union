system:
  description: >-
    <p>L'utilisateur prend l’apparence de la mort pendant INT minutes. Il est
    alors considéré non‑vivant et devient immunisé à la plupart des pouvoirs des
    morts‑vivants (drain de vigueur et affaiblissement, paralysie de la goule,
    etc.). De plus, ceux‑ci le prennent pour l’un des leurs. Il divise par deux
    tous les DM de froid. Il ne peut pas bénéficier de soins tant qu’il est sous
    l’effet de cette potion.</p>
