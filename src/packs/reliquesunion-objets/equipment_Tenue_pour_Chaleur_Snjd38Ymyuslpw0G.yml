system:
  description: >-
    <p>En se couvrant de la tête aux pieds de vêtements légers et aériens, le
    personnage se rafraîchit plutôt que d’exposer sa peau nue au soleil. Cette
    tenue comprend généralement une ample robe en lin et un turban ou un ample
    couvre-chef et un voile. Elle donne un bonus de +2 aux jets de Constitution
    pour résister aux climats chauds ou torrides. Ce bonus ne se cumule pas avec
    les bonus accordés par la compétence Nature/Survie</p>
