system:
  description: "<blockquote><h3><span style=\"font-family:hobo\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">Monsieur Lothar,</strong></span></h3><p>D'après les récentes informations qui me viennent aux oreilles, il semblerait que derrière la tenue de fermier et les mains rugueuses du travail des champs, vous ayez des compétences qui dépasse votre apparence. On me rapporte des faits d'armes contre les attaques de pillards et de Peaux Vertes sur le hameau où vous habitez.</p><p>Votre droiture et vos capacités sont des atouts pour moi et pourront avoir un grand impact sur votre quotidien.</p><p><strong>Ainsi, je peux vous proposer un contrat qui serait bénéfique pour tout le monde.\_J'ai besoin de vous et avant tout de votre discrétion.</strong></p><p><strong>Si vous souhaitez venir en aide à un homme de haute position et récupérer les fruits bien sucrés d'un travail à votre hauteur, je vous donne rendez-vous à l'Auberge du Passage Gourmand demain aux premières lueurs du jour.</strong></p></blockquote>"
