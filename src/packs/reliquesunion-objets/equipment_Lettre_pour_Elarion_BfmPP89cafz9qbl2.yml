system:
  description: "<blockquote><h3><span style=\"font-family:hobo\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">Elarion Venclair,</strong></span></h3><p>J'ai cru, un temps, que votre renommée infiltrée dans les quartiers populaires de Blanche Paix venait de vos propres chansons mais certaines de mes sources semblent confirmer les récits qui arrivent à mes oreilles.</p><p>Vos talents diplomatiques et votre expertise des routes et des terres sauvages me poussent à vous conacter en priorité.</p><p><strong>Ainsi, je peux vous proposer un contrat qui serait bénéfique pour tout le monde.\_J'ai besoin de vous et avant tout de votre discrétion.</strong></p><p><strong>Si vous souhaitez venir en aide à un homme de haute position et récupérer les fruits bien sucrés d'un travail à votre hauteur, je vous donne rendez-vous à l'Auberge du Passage Gourmand demain aux premières lueurs du jour.</strong></p></blockquote>"
