system:
  description: "<div class=\"arran-mod\"><h5>Notes compilées  sur le Plastron de la Séduction trouvées dans une cache dans les appartement de Hisp Galik.</h5><hr /><p><span style=\"font-family:Bookinsanity\"><em>Lorsque nous avons découvert le Plastron de la Séduction, avec <strong>ma chère Amanori BELLARA</strong>, il me fallut <strong>plusieurs semaines pour comprendre comment il fonctionnait</strong>.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Elle avait beau le porter, toucher chaque zone du plastron, tester plusieurs incantations, rituels ou formules, rien ne semblait réveiller ce Plastron de la Séduction. Malgré l'agacement de ma maîtresse, <strong>elle l'a porté</strong>\_<strong>sans le moindre succès malgré tous mes efforts.</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Avant d'équiper elle-même le plastron, chose curieuse, lorsque'il était équipé sur une Peaux Verte soit il lui grillait le cerveau soit il le plongeait dans une espèce de coma fatal si ne retirions pas le plastron rapidement.\_</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Lié aux Peaux Verte par nature, le plastron ne pouvait pas être équipé par un orc, un gobelin ou un ogre ni même une de ces abominations, mélange d'une race pure et d'un Peau Verte.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em><strong>Au moment d'équiper le plastron, une quantité astronomique de connaissance sur les peaux vertes se déversa dans son esprit</strong>, lui polluant la tête et souilant son âme.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em><strong>C'est par pur hasard qu'Amaroni a réussi à activer le Plastron. Un jour où elle portait cette relique, elle s'énerva sur un gobelin abject qui venait de renverser un broc d'eau sur le sol. Elle le gifla si fort que son coup se brisa !</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em><strong>Foudroyée par une intense énergie, ma Maîtresse resta de nombreuses minutes paralysée</strong> sujette à des électrochocs intenses, un large sourires aux lèvres.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Lorsqu'elle sorti de cette \"transe\" <strong>elle sentait un pouvoir nouveau couler dans ses veines et du jour au lendemain, les Peaux Vertes qui la voyaient ou l'entendaient semblait \"attirés\" ou fascinés\"</strong> par sa simple présence.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Elle apprit à libérer tout le pouvoir du Plastron au fur et à mesure de son utilisation, la rendant quasi divine aux yeux des Peaux Vertes.</em></span></p></div>"
