  description: "<p><strong>A première vue, il semble que ce ne soit qu'un pendentif classique et un peu grossier mais dès qu'on le touche on peut ressentir son aura magique qui nous chatouille les doigts.</strong></p><p>Les runes gravées sur cette pierre légèrement polie <strong>permet à un nécromancien de posséder un corps à plus grande distance que sans la pierre</strong>.\_</p><p>Elle est reliée a son créateur et <strong>ne peut donc pas être utlisée par une autre personne</strong>. Rien, à part la reconnaissance fine du style des runes ou de la façon de les graver ne peut permettre à une personne d'identifier le créateur ou l'utilisateur.</p><p>Personne n'achètera ce genre d'objet de nécromancien à part une personne peu recommandable.</p>"
