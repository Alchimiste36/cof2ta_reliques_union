  description: "<p>Ces lourdes bottes en cuir sont fabriquées avec une couche de poussière de brique qui protège les pieds de la chaleur. Le personnage gagne une\_résistance\_au feu de 2 contre les attaques de feu visant ses pieds ou venant de dessous, comme lorsqu’il marche sur des charbons ardents. Si les bottes sont exposées aux dégâts de feu de façon répétée ou prolongée, la chaleur finit par brûler la couche de cuir extérieure et par détruire les bottes (généralement après environ 1d10 + 20\_rounds\_d’exposition).</p>"
