system:
  description: >-
    <p>L'orge et le houblon ne viennent pas de la Vallée du Novrak mais des
    champs fertiles de Mordrian ou de Kosland. Mais la fabrication de cette
    bière avec les neiges et glaces fondues, pures et parfaites, des hautes
    montagnes donne à cette bière une saveur douce et élégante.</p><p>Bien
    fraiche, elle est très appréciée lors des repas mais attention car elle
    monte vite à la tête malgré sa douceur apparente.</p><p>Vendue en tonnelet
    de 5 litres</p>
