system:
  description: "<p>Lorsque le personnage arrive dans une localité, le joueur peut <strong>dépenser au choix 1\_ DR\_ou 1\_PC pour y être déjà venu</strong>. Dans ce cas, le\_MJ lui <strong>indique les lieux les plus connus et lui\_fournit un contact de confiance</strong> dans la place.\_</p><p>De\_plus, lorsqu’il fait du commerce dans cette\_localité, il <strong>réduit d’un niveau la rareté des objets\_qu’il recherche</strong> (par exemple, un objet très rare\_devient seulement rare). </p><p>La\_dépense du DR ou\_du PC est valable pour toute l’aventure en cours.</p>"
  source: ""
  origin: Atlas d'Osgild et Règles Optionnelles p180
  slug: ""
  inGame: >-
    <p>Les deux actions permettent de diminuer de 1 les DR ou les PC du PJ de
    façon permanente en ajoutant la Condition "est appris" dessus. A la fin de
    l'aventure, supprimez la Condition pour regagner la ressource.</p>
