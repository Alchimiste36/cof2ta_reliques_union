  description: "<p>Ce vin est produit dans les hauteurs des montagnes des Crocs d'Acier, où un type de vigne posse à l'abri du vent et du froid dans une petite cuvette.</p><p>Entourée de falaise, les grains de raisin ne prennent pas souvent le soleil et la pauvreté du sol ne les rend pas vraiment sucrés.\_</p><p>Le vin a, du coup la même qualité que les grains : dur, amère et légèrement piquant. Autant dire que ce n'est pas le produit phare de l'exportation de la Vallée de Novrak.</p><p>Vendue en bouteille de 1 litre.</p>"
