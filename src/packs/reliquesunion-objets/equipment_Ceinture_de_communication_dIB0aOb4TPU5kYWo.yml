system:
  description: "<p>Cette ceinture fine en cuir se ferme avec une boucle de métal.\_Sur la ceinture se trouve une pochette en cuir fermée par une boucle simple en métal.</p><p>La pochette permet d'y glisser une boite en bois gravée de runes qui peut contenir des messages ou de petits objets.\_<strong>L'intérieur de la boite fait 14 cm x 7 cm x 4 cm.</strong></p><p>Chaque ceinture peut être associée uniquement avec sa jumelle. Parfois, il est possible de lier plusieurs boites pour le même duo de ceinture mais c'est très rare au vu de la puissante magie qu'il faut utiliser pour ce genre d'objet.</p><p><em>Une ceinture de communication seule ne vaut rien à part le prix du cuir et du travail. Une paire de ceinture avec une ou plusieurs boites peut valoir plusieurs centaines de Pièces d'Or, voir des milliers.</em></p><h4>\_Effet :</h4><p>Lorsque l'on place une des boites <strong>au soleil pendant 2d8 minutes</strong>, elle disparait entièrement avec tout son contenu. <strong>Elle réapparaitra 6d6 heures plus tard</strong> dans la pochette de la deuxième ceinture de communication. <strong>Tout le contenu de la boite sera intact sauf pour les êtres vivants</strong>. Un être vivant voyageant grâce à la ceinture de communication arrivera mort mais totalement intact à l'arrivé (l'essence vitale de l'être vivant étant resté au point de départ).</p><img src=\"modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/ceinture_de_communication_boite.webp\" width=\"300\" height=\"300\" />"
