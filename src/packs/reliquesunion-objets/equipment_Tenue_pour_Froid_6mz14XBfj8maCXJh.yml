  description: "<p>Cette tenue est prévue pour les excursions en montagne et pour les voyages ou la chasse dans les environnements gelés. Elle comprend un manteau en laine ou en épaisse fourrure animale, une chemise en lin, une casquette en laine, une cape épaisse, une jupe ou un pantalon épais et des bottes en cuir imperméables. Dans certaines régions, cette tenue peut se composer essentiellement de fourrure et de peaux animales. Elle accorde un bonus de circonstances de +5 aux jets de\_Constitution\_contre l’exposition au froid.</p>"
