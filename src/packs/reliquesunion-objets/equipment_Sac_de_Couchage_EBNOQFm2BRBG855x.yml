system:
  description: >-
    <p>Ce sac se compose de deux draps de laine cousus ensemble au niveau des
    pieds et sur un côté pour former un sac de couchage. Certains sont pourvus
    de courroies en tissus sur le côté ouvert, que le personnage peut resserrer
    pour dormir.</p><p>On peut l'enrouler et l'attacher pour y ranger des objets
    ou pour le transporter. La plupart des gens utilisent une couverture en plus
    du sac de couchage pour se tenir au chaud ou pour se faire un coussin.</p>
