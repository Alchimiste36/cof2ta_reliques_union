  description: "<p>Au bout de la corde en chanvre de ce pendentif se trouve une pierre aux reflets bleutée sur laquelle une plaque dorée est incrustée. Au centre de la plaque se trouve un symbole finement façonné.</p><p>Une aura magique est perceptible lorsque l'on touche le pendentif.</p><hr /><p>Lorsque l’on active la pierre en la pressant\_quelques minutes dans sa main, les deux commandants de la Toile Vivante reçoivent mentalement une alerte et savent où se situe la Pierre de Localisation\_de la Toile Vivante.</p><p>Chaque Capitaine d’une Maille amène de une à cinq Pierre\_de Localisation de la Toile Vivante lorsqu’ils partent en mission.</p><img src=\"modules/cof2ta_reliques_union/assets/ru_objets/symboles_bannieres/tatouage_toile_vivante.webp\" width=\"100\" height=\"100\" />"
