  description: >-
    <p>Chaque dose correspond à environ 30cl de liquide visqueux. La projection
    d’une dose de poison sur la peau d’un individu inflige 8d6 DM (la moitié si
    @Test[car:con|diff:10|comp:Résistance au poison] réussi). </p><p>La cible
    reçoit 1d6 DM par tour à partir de l’empoisonnement.</p><p> Les DM sont
    cumulables si la cible est mise en contact avec une nouvelle dose.</p>
