system:
  description: "<p>Les scies peuvent prendre différentes formes, de la petite scie de charpentier à la longue scie à deux mains qu'utilisent les bûcherons. Le personnage peut insérer une scie entre une porte et son encadrement pour couper les verrous ou les barres en bois.</p><p>Par une action Limité, il inflige 5 points de dégâts plus son modificateur de Force\_par\_round\_à l'objet scié.</p><p>Il faut réussir un test de Perception DD10 pour entendre quelqu'un scier. Les scies utilisées pour découper la glace des rivières ont un bout pointu permettant de percer la glace avant de la découper.</p>"
