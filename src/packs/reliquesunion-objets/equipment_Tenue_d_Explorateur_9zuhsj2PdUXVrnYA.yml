system:
  description: >-
    <p>Ces vêtements sont idéaux pour celui qui ne sait jamais ce qui l’attend.
    Ils comprennent des bottes résistantes, un pantalon ou une jupe en cuir, une
    ceinture, une chemise (avec éventuellement une veste ou un gilet), des gants
    et une cape. On peut porter une tunique en cuir pardessus une jupe en tissu
    plutôt qu’une jupe en cuir. Ces vêtements ont de nombreuses poches
    (notamment la cape). Cette tenue inclut également tous les accessoires
    supplémentaires dont le personnage pourrait avoir besoin, comme une écharpe
    ou un chapeau à large bord.</p>
