  description: "<p>Cette huile essentielle a été créée par la jeune @UUID[Actor.CJXonzJKD36jl2VD]{Harikoa} grâce à l'Alambic du village d'Arkanov.</p><p>Un savant mélange d'une huile extraite d'une racine et mélangée à des spore de champignons, cette huile, une fois inhalée permet de détendre tous les muscles du corps et accroit ainsi l'agilité et a précision du consommateur pour plusieurs minutes.</p><p>Consommée de temps en temps par les artisans pour une réalisation très minutieuse ou pas les combattants pour leur danse de combat lors de cérémonie, l'Huile Harikoa est assez facile à réaliser (même si le dosage est précis) mais le manque de spores de ce champignon spécifique en fait un produit assez rare.</p><p>\_</p><p><strong>Lorsque l'Harikoa est appliquée sur la nuque (Action de mouvement) =&gt; DEX +4 pendant 5d6 + 10 rounds (/r 5d6+10)</strong></p>"
