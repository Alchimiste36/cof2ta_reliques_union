system:
  description: >-
    <p><em><strong>Par ce document, cette signature et ce sceau seigneurial,
    moi, Jaspar Bonarion, seigneur de la Cité d'Ispier en Terres d'Ourann,
    garanti que les porteurs sont à mon service pour une mission capitale pour
    notre cité.</strong></em></p><p><em><strong>Les Héros de la Dame d'Honneur
    d'Ispier, protecteurs des Reliques de l'Union, sont dignes de
    confiance.</strong></em></p><p><em><strong>Il vous serait gré de bien
    vouloir, dans la mesure du possible, les aider dans leurs enquêtes et dans
    leurs demandes.</strong></em></p><p><em><strong>La Cité d'Ispier par mon
    biais vous remercie amplement pour vos
    services.</strong></em></p><p><em>Jaspar Bonarion, seigneur de la Cité
    d'Ispier</em></p>
