name: Matrone Exsangue
type: feature
img: >-
  https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/glanae_reth/elfes_exsangues/soeur8.webp
_id: 6p5oh34uZfmbzvGL
system:
  description: "<p>Cette ville souterraine est régie par un système hiérarchique et violent à faire tourner les yeux à un ogre. Gouvernée par un groupe de femmes vicieuses et vivant dans la manipulation, le luxe et le plaisir de la torture et du sexe.</p><p>Les femmes elfes Exsangues des cavernes sont au sommet de la chaine alimentaire de la ville. Elles ont à peu près tous les droits mais chacune doit faire attention aux autres matrones car le moindre signe de faiblesse et la mort peut surgir.</p><p>Elles jouent beaucoup sur leur attirance physique et leur talents innés pour envouter les faibles mâles qui les servent.</p><p>Assassinats, tortures, sexes et maltraitances sont le quotidien des matrones.</p><p>L'un des plus grands plaisir de certaines matrones est de commencer par l'humiliation d'un serviteur, travailleur, soldat ou otage, poursuivi par une petite séance de torture, une partie de jambes en l'air avec le malheureux pour enfin l'amener proche de la mort à la fin du coït en le tabassant ou par étranglement.</p><p>Entre elles, les matrones utilisent plus la manipulation, les secrets et l'influence plutôt que la force physique ou l'affrontement direct.</p><h2>Modificateurs des Elfes Exsangues</h2><p>Atout : <strong>+2 DEX et +2 CHA</strong><br />Faiblesse : <strong>-2 CON et -2 SAG</strong><br />Âge de départ à l’aventure : 50 ans et plus<br />Espérance de vie : théoriquement immortel<br />Taille : entre 1,65 m et 1,90 m<br />Poids : entre 50 kg et 80 kg<br />Trait des Elfes Exsangues :</p><ul><li><strong>Vision dans le Noir</strong> (15m)</li><li><strong>Récupération par la Volonté</strong> : chaque PR dépensé rend [DV + Niveau + Mod.CHA] PV</li></ul><p>\_</p>"
