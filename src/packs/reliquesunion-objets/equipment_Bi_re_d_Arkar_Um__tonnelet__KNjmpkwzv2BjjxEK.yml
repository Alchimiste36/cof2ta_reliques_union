    <p>Ce petit tonnelet de 2,5 litres est marqué par le blason de la
    forteresse-état d'Arkar'Um. Cette bière est très appréciée localement même
    si elle ne rivalise pas avec les alcools de maître que l'on peut trouver
    plus au sud, dans les Hauts Plateaux de l'Ourann.</p><p>Le prix de 28 pa
    peut sembler élevé mais le vendeur vous rachètera le tonnelet vide pour 8 pa
    s'il est en bon état comme le veut la tradition naine.</p>
