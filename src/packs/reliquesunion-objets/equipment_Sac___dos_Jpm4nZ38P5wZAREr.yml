system:
  description: "<p>Ce sac à dos en cuir se compose d'une grande poche qui se ferme avec une sangle à boucle et peut contenir environ 60 litres de matériel. Certains ont une ou plusieurs poches supplémentaires sur les côtés.<br /><br /><em><strong>Sac à dos de maître.</strong></em><strong>\_</strong>Ce sac à dos est pourvu de nombreuses poches dans lesquelles conserver des objets bien utiles quand on part à l'aventure. Il inclut également des crochets permettant d'accrocher des objets tels que des\_gourdes, des sacoches, voire même une\_couverture\_enroulée. Il est pourvu de lanières matelassées à accrocher en travers de la poitrine et à la taille afin de mieux répartir le poids. Comme pour le sac à dos ordinaire, la poche principale peut contenir environ 60 litres de matériel. Lorsque le personnage porte un sac à dos de maître, il rajoute +1 à son score de\_Force\_lorsqu'il calcule la\_charge\_qu'il peut transporter.</p>"
