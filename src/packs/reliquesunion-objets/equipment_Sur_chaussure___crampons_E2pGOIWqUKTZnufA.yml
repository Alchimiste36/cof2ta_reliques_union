system:
  description: >-
    <p>Matériel pratique pour arpenter les plateaux enneigés et grimper des
    chemins glacé, ces semelles de cuir et de métal s'ajustent et se fixent sous
    une paire de chaussures classiques.</p><p>Grâce à cet équipement, les tests
    pour éviter de tomber ou pour monter sur la neige et la glace gagnent un
    bonus de +5.</p><section id="secret-s69a0UOXhu2P2V5w" class="secret"><p>La
    piètre qualité de ses sur-chaussures les rendent plus dangereuses qu'autre
    chose. Si on les équipe pour marcher dans la neige ou la glace, le métal
    refroidi et casse au bout de quelques kilomètres. Un test de
    @Test[car:agi|diff:15|echstatut:prone] permet de ne pas glisser et tomber à
    terre.</p></section>
