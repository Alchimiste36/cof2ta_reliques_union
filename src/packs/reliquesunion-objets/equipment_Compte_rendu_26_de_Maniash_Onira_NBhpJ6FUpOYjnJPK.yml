system:
  description: >-
    <h4>Sur la première page :</h4><p><strong>9019 après le grand
    schisme</strong>, troisième lune du printemps, douzième nuit…</p><hr
    /><h4>Sur la dernière page :</h4><p><strong>9048 après le grand
    Schisme</strong>, deuxième lune de l’hiver, huitième
    nuit.</p><blockquote><p>Les acolytes ont rejoint l’Arbre-Mère depuis trois
    jours, leur regard apaisé me donne confiance pour ce qui arrive. Shanivara,
    ma dernière suivante est sortie du Temple pour s’intégrer dans la tribu de
    sylvains. J’espère, par la sève de l’Arbre-mère, qu’elle saura insuffler les
    légendes que nous avons créées.</p><p>Aurions dû sceller pour l’éternité ce
    temple afin que les mémoires s’effacent ?</p><p>La peur me fait trembler
    comme une feuille vibrée par la brise. Plus de 780 cycles pour se faire
    oublier, des siècles pour disparaître. Une attente qui se termine demain
    lorsque je rejoindrai mes acolytes au cœur de l’Arbre-Mère.</p><div
    class="arran-mod"><p>La Gardienne rejoint la sève et la
    terre.</p><ul><li><p>Par la mère et l’enfant,</p></li><li><p>Par l’Arbre et
    le Fruit,</p></li><li><p>Par la Plante et la Graine,</p></li><li><p>La
    Glace, le Vent et le Sable,</p></li><li><p>Renferme le
    Savoir.</p></li></ul></div></blockquote>
