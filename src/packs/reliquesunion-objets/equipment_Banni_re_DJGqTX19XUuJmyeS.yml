system:
  description: >-
    <p>Il s'agit d'une bannière, d'un drapeau ou d'un fanion. Le personnage le
    fixe à une perche, à une lance ou à une arme d'hast. La plupart des
    bannières sont tissées, colorées ou peintes avec un motif ou un symbole,
    comme les armoiries d'un chevalier ou le drapeau d'un pays. Une bannière
    simple avec une seule couleur dominante et un insigne simple comme une arme
    ou un bouclier coûte 2 pa. Une bannière avec de 2 à 4 couleurs dominantes et
    un insigne complexe comme un lion ou un dragon coûte 10 pa. Une bannière
    détaillée avec 4 couleurs dominantes ou plus et un insigne très complexe
    comme une armoirie à 8 sections ou plus coûte 60 pa.</p>
