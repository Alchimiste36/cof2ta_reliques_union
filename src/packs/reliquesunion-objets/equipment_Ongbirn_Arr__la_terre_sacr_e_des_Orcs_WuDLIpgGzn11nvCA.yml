system:
  description: "<h4>Réflexion du conseil de la Forteresse-Etat d’Arkar’um\_:</h4><p>(la date n’est pas précisée)</p><p><strong>Le territoire sacrée des Orcs, Ongbirn’Arr.</strong></p><blockquote><p>Cette zone perdue à l’Est du Pays des Vents, dans les Hauts Plateaux, est redoutable et dangereuse. Rare sont les nains ou les hommes qui s’y aventurent.</p><p><strong>Barbares, violents et désorganisés, les clans Orcs semblent s’unir lorsqu’ils sont sur ces terres sacrées.</strong> On peut douter que seules les traditions, les rites et la sacralité des lieux expliquent cette union entre les Orcs et même quelques gobelins ou les aberrations que l’on voit de temps en temps.</p><p><strong>Ils sont trop bêtes et violents pour s’unir sur ces terres. Un secret bien gardé par les chefs de tribus se cache derrière cette situation.</strong> Il est trop dangereux d’envoyer des enquêteurs dans la vallée des Khans mais il serait bon, aux responsables de la forteresse-état d’Arkar’um, en lien avec les autres citadelles naines, d’<strong>interroger les prisonniers Orcs à ce sujet et de profiter des campagnes d’exploration pour investiguer sur ce lieu.</strong></p></blockquote><p><strong>Demande et rapport effectué par le capitaine de la garde du Bouclier, Orbarar, lors de la campagne de pacification des flancs Ouest des Hauts Plateaux.</strong></p>"
