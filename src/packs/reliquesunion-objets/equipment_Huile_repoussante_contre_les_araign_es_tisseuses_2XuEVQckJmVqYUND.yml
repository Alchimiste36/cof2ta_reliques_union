system:
  description: >-
    <p>Cette huile à l'odeur légère de poisson permet de repousser les araignées
    tisseuses présentes dans les gorges et les failles des montagnes des Crocs
    d'Acier.</p><p>En appliquant une dose de cette huile sur son corps (souvent
    les épaules et les chaussures), les araignées tisseuses ne peuvent plus
    approcher de la personnes à 6m (3 cases). Cet effet dure maximum 48h si la
    personne n'est pas trempée ou lavée.</p><p>Un pot contient 10
    doses.</p><section class="secret" id="secret-lxA5OhWNN4R8MFax"><p>Ce produit
    est inutile et n'a strictement aucun effet</p></section>
