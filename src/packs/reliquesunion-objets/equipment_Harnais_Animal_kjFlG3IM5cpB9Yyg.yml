    Nature/Survie.</p><p>Il existe des harnais tout prêts sur la plupart des
    marchés qui vendent des animaux domestiques courants comme les chats, les
    chiens, les chevaux et les bœufs mais on peut en fabriquer pour toutes les
    créatures ou presque.</p>
