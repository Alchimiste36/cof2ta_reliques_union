  description: "<h4>Résumé d’une légende datant d’environ 7500 après le Grand Schisme découverte dans la bibliothèque de Blanche Paix\_:</h4><blockquote><p>Sur l’ile au Nord-Ouest des montagnes maudites, une légende raconte qu’un artéfact aurait été entreposé dans une ville forteresse investie par les Nains d’Ufgrim. Ne pouvant pas utiliser cet artéfact, le roi déviant l’aurait installé à la vue de tous pour rappeler aux fidèles la grande puissance du roi. L’un des noms donnés à cette ville est Kanasfi.</p><p>Nul ne sait ce qui se passe sur cette ile ou ce qui s'est passé pour ce roi ou cette relique mais il semblerait qu'un conflit ai éclaté sur cette grande bande de terre entre le roi, les nains d'Ufgrim et les elfes bleus.</p></blockquote>"
