  description: >-
    <p>Cette tente pour une personne est composée d'un rouleau de tissu épais et
    de perches d'environ un mètres. En assemblant correctement les perches et en
    disposant le tissus autour, l'utilisateur aura une tente pour une personne
    (ou deux enfants) qui protège des vents froids et des chutes de
    neige.</p><p>Bonus de +10 pour résister au froid dans la tente.</p><section
    id="secret-4nTwIIhFTGQDZzqS" class="secret"><p>Ce produit est de très
    mauvaise qualité. Au premier montage, le tissu est déjà abimé et la tente
    devient inutilisable au deuxième montage.</p></section>
