system:
  description: >-
    <h5>Rapport trouvé dans la bibliothèque d’Arkar’um <strong>datant de 8279
    après le Grand Schisme</strong>.</h5><h6><strong>Les Cavernes des Nains
    Tordues</strong></h6><p class="MsoNormal"
    style="margin-bottom:.0001pt">C’est ainsi que l’on nomme ironiquement l’un
    des investissements les plus déplorables du monde nain.</p><p
    class="MsoNormal" style="margin-bottom:.0001pt">Souhaitant trouver de
    nouveaux filons de minerais dans une zone sauvage et inexplorée, <strong>le
    seigneur Darum de la Cité-Etat de Krüg-Daraz</strong>, entreprit de miner
    les flancs Est des Crocs d’Acier. Après plusieurs péripéties et expéditions,
    des veines de métaux, minéraux et traces de cristaux sont découverts par
    <strong>le maître mineur Faro’Oro de l’Ordre du Temple</strong>. La pierre
    d’une structure parfaite, la situation entre la Birkanie et le Territoire
    des Mangeurs des Plaines ainsi que l’estimation des filons ont accéléré
    l’installation.</p><p class="MsoNormal"
    style="margin-bottom:.0001pt">Familles entières, artisans, structures,
    machines et milliers de Talions empruntés, un grand chantier commence. Les
    montagnes sont façonnées, les mines sont creusées, les familles
    installées.</p><p class="MsoNormal" style="margin-bottom:.0001pt">Après des
    années de forage, de construction et de dépenses de pièces d'or, force est
    de constater l’absence quasiment totale de retour sur investissement. Pas de
    veine miraculeuse, une poignée de pierres précieuses de qualité moyenne et
    une absence de commerce dans cette région, une perte sèche avec
    certitude.</p><p class="MsoNormal" style="margin-bottom:.0001pt">Près de 25
    ans plus tard, quand les tunnels, fondations, bâtiments et installations
    commencent à se fissurer, Les experts du Temple venus inspecter le travail
    ont du constater avec désespoir la friabilité de cette roche mise à l’air
    libre.</p><p class="MsoNormal" style="margin-bottom:.0001pt">A la suite de
    plusieurs effondrements, de murs qui penchent, de ponts qui se brisent,
    <strong>la Cité-Mine de Krüg-Zoram</strong> fût abandonnée par tous les
    habitants.</p><p class="MsoNormal" style="margin-bottom:.0001pt">Faro’Oro
    fût désavoué et jugé, le seigneur de Krüg-Daraz auditionné et la dette de
    cette faillite durera encore des siècles.</p><p><span
    style="font-family:Calibri, 'sans-serif'">L’un des plus grands scandales du
    peuple nain même si ces derniers aimeraient bien l’oublier.</span></p>
