system:
  description: >-
    <blockquote><p>Bonjour aux sauveur de la Dame d'Honneur,</p><p>Suite à notre
    entretien dans les salon du château de la cité d'Ispier, j'ai encore du mal
    à dormir au vu des révélations que vous m'avez fournie.</p><p>A mon retour
    au monastère, <strong>j'ai lancé des recherches dans nos ouvrages grâce à
    des frères méticuleux et volontaires. Ils ont trouvés les informations
    suivantes sur les Mines d'Hyrr'Tarën comme noté sur la carte que vous m'avez
    montré.</strong></p><p>De plus, <strong>je suis enfin prêt à prendre la
    route en direction de l'Ogrie avec une dizaine de vaillants frères qui
    veulent, comme moi, enquêté sur le mal qui s'y déroule.</strong> Lorsque
    vous recevrez ce message, le temps qu'il parvienne à Ispier puis à vous,
    j'espère avoir parcouru assez de chemin pour m'approcher de la zone où sont
    esclavagisée les Peaux Vertes.</p><p><strong>Que vos dieux soient à vos
    côtés et que la soif de justice soit dans votre esprit
    !</strong></p><p><strong>Frère aîné Zagrenn
    Fredfisk.</strong></p><p>@UUID[JournalEntry.dOIIKioj7BAY4Ij7]{Forteresse-État
    d'Hyrr'Tarënn}</p></blockquote>
