system:
  description: "<blockquote><h3><span style=\"font-family:hobo\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">Elwyn,</strong></span></h3><p><span style=\"font-family:hobo\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">Votre arrivée soudaine dans la région me permet de penser que vous n'avez pas d'attache avec vos semblables d'ici. Contre l'avis de tous mes conseillers, j'aimerais faire appel à vos services car, d'après des rumeurs locales, vous avez l'esprit affuté et des connaissances plurielles. Votre compagnon à la fourrure sombre influence également ma décision.</strong></span></p><p><strong>Ainsi, je peux vous proposer un contrat qui serait bénéfique pour tout le monde.\_J'ai besoin de vous et avant tout de votre discrétion.</strong></p><p><strong>Si vous souhaitez venir en aide à un homme de haute position et récupérer les fruits bien sucrés d'un travail à votre hauteur, je vous donne rendez-vous à l'Auberge du Passage Gourmand demain aux premières lueurs du jour.</strong></p></blockquote>"
