system:
  description: >-
    <div><p><strong>Ce message a été envoyé par Lana'Sir grâce à la Ceinture de
    Communication. Il est écrit sur une belle feuille de
    papier.</strong></p><blockquote><p>Votre découverte est incroyable.
    Laotissa, à mes côté, est excitée et heureuse de votre
    réalisation.</p><p>Grâce à dame Rosna, nous avons atteint la Cité d'Orkadia
    et j'ai pu m'entretenir avec le conseil sur place. Ils vont m'escorter
    jusqu'à la Cité de mon père pour enquêter sur ce conflit affreux avec les
    elfes sylvains.</p><p>Au regard de votre récit, la plupart des survivants
    veulent revenir dans la forêt du Val Rouge malgré mes inquiétudes et ils
    vont certainement me suivre pour retourner chez eux. J'ai déjà pour objectif
    de leur fournir des fonds et de l'aide pour reconstruire leur
    village.</p><p>Je vous fais confiance pour étudier les écritures que vous
    avez trouvez dans le Temple et identifier des éléments qui pourraient nous
    être utiles pour comprendre ce  Bracelet de l'Union et ce que nous devons en
    faire.</p><p>J'espère trouver des informations dans la grande bibliothèque
    de la Cité d'Orkadia même s'ils me tardent de vous retrouver le plus vite
    possible.</p><p></p><p>Je lui indique votre retour à la Cité. il saura vous
    protéger et vous récompenser pour votre réussite.</p><p>Heureuse de vous
    revoir dans une quinzaine de jour.</p><p>Lana'Sir Bonarion, dame d'honneur
    de la Cité d'Ispier</p></blockquote></div>
