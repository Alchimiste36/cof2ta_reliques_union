system:
  description: "<p>La plupart des parfums et eaux de Cologne sont fabriqués à partir d'huiles essentielles de fleurs. Un parfum ou une eau de Cologne peut (si le\_MJ\_donne son accord) accorder un bonus de circonstances de +1 à différents tests de compétences basées sur le\_Charisme.<br /><br /><em><strong>Ordinaire</strong>.</em>\_Le parfum et l'eau de Cologne sont des accessoires ordinaires pour ceux qui veulent éviter d'indisposer les autres par leur odeur.</p><p><em><strong>Exotique</strong>.</em> Les parfums et l'eau de Cologne exotiques sont vendus dans des fioles contentant dix doses, chacune durant vingt-quatre heures au cours desquelles le personnage gagne un bonus de circonstance de +2 aux tests de Psychologie (sauf contre les créatures que le MJ\_considère comme indifférentes au parfum).</p>"
