  description: "<p>Si le personnage souhaite faire l’acquisition\_d’un objet ou d’un bien de grande valeur et qu’il\_n’a pas l’argent nécessaire sur lui, <strong>on lui fait crédit\_sans problème : il\_a un mois devant lui pour payer. </strong></p><p>Ensuite, il peut faire un <strong>test de CHA difficulté 15\_pour prolonger ce délai d’un mois</strong> supplémentaire, et peut renouveler ce test plusieurs mois\_d’affilée si nécessaire. Mais attention, lorsque le\_couperet tombe, ça peut faire mal…</p>"
