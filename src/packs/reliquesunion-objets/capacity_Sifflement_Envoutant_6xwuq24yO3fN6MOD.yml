system:
  description: "<p>La Matrone siffle en observant intensément sa cible. Le rythme et les vibrations du sifflement résonnent dans la tête de la cible et lui embrouille l'esprit.</p><p>\_Attaque Magique, portée 10m, doit voir la cible :\_</p><ul><li>si réussi = <strong>Ralenti pendant [1d4+Mod.CHA] tours</strong></li></ul><p>La cible peut tenter un <strong>test de CHARISME DD[10+Mod.CHA de la Matrone] pour annuler</strong> mais à chaque échec, la cible est en plus <strong>Affaiblie pendant un tour</strong></p>"
  source: ""
  origin: ""
  slug: ""
  inGame: >-
    <p>La première action permet de réaliser l'attaque magique en opposition et
    d'appliquer l'effet Ralenti en cas de réussite.</p><p>La deuxième action
    permet de réaliser le test de sauvegarde pour annuler l'effet et d'appliquer
    le statut Affaibli en cas d'échec de la cible.</p>
