system:
  description: "<p>Ce superbe brassard composé de tissus et de métal travaillé en forme de feuilles d'arbre enroulées les unes sur les autres dégage une légère aura magique. Des dizaines de petites runes sont gravées sur la face intérieure des feuilles.</p><p>Avec une dominante d'argenté, le bracelet se porte avec une grande diversité de vêtements sans que ça ne paraisse bizarre. Il ne ressemble pas à des pièces d'armure mais plutôt à des ornementations.</p><h5>Les équiper :\_</h5><p>Lorsqu'il est équipé, il se fonde à l'avant-bras du porteur, s'accroche sans pouvoir le retirer. Une vibration et une énergie parcourt le porteur et déverse une multitude d'informations sur la culture Elfique (les langues et patois, les écritures, l'histoire et les légendes, les expressions, les rituels les plus communs…) dans l'esprit du porteur.</p><p>Le Bracelet souhaite être activé sans savoir exactement leur rôle. La possibilité et l'envie d'asservir chaque elfe des Terres d'Arran ou devenir un phare d'espoir, de joie et d'émancipation pour ce peuple.</p><h5>Capacités :</h5><p>Le porteur connait dorénavent :</p><ol><li>toutes les langues et patois elfiques, lire et écrire leurs dialectes.</li><li>les grandes lignes de l'histoire des elfes, les personnalités importantes, les légendes pas trop enfouies de ce peuple</li><li>les traditions et rituels classiques ou communs des elfes</li><li>les expressions et \"bonnes manières\" des différentes cultures elfiques</li></ol><p>De plus, le porteur gagne <strong>un bonus de +5 à tous ces tests de CHARISME lorsqu'il intéragit avec des elfes.</strong> <strong>Ce bonus est de +2 face aux autres races.</strong></p>"
