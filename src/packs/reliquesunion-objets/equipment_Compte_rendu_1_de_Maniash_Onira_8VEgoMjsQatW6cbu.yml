system:
  description: >-
    <h4>Sur la première page :</h4><p><strong>8267 après le grand
    schisme</strong>, deuxième lune du printemps, sixième
    nuit…</p><blockquote><p>Je prend mes fonctions dans le Temple du Val Rouge
    et l'exitation se mélange au stresse face à cette responsabilité. Je suis
    seule mais l'Ordre de l'Union compte sur moi et les autres.</p><p>La
    première nuit, des larmes coulent sur mes joues quand je sens, au plus
    profond de moi, les vibrations de l'Arbre-Mère, protecteur, apaisant, qui
    partage mainenant mon quotidien.</p><p>Contre la fascination, l'Union
    !</p></blockquote><h4>Autres pages :</h4><p><strong>8267 après le grand
    schisme</strong>, première lune de l'été, cinquième nuit…</p><p>L'oubli, le
    souvenir … Le peu de temps de préparation et mon entrain face à ma mission
    m'a empêché de penser, d'analyser. Maintenant seule face à moi-même, je
    prend conscience et ça me rend triste. Dans un projet d'effacer l'Histoire,
    il ne peut pas y avoir de témoins. Ainsi, je tourne mes pensées gorgées de
    la nécessité de notre quête vers les familles de tous les travailleurs,
    artisans, commerçants, gestionnaires, architectes… qui ont travaillé à la
    construction du Temple de l'Arbre-Mère. Ils ont du être éliminés par l'Ordre
    de l'Union pour protéger l'Oubli mais j'essayerais de garder leurs souvenirs
    au fond de mon coeur.</p>
