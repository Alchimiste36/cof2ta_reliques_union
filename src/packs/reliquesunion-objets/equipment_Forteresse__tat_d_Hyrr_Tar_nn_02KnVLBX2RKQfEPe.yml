system:
  description: "<h4>Note apportée par Zagrenn Fredfisk depuis le Monastère des Frères du Désespoir.\_</h4><p>@UUID[Compendium.world.reliquesunion-objets.Item.JN1C49J4H1KXW5NT]{Message de Zagrenn}</p><p><strong>Cette note vient de trois ouvrages compilés chacun datant environ de 7000 après le Grand Schisme</strong>. Un quatrième ouvrage daté de 8371 après le Grand Schisme environ relate les événements qui ont marqués la fin de la cité.</p><p><strong>La Forteresse-Etat d’Hyrr’Tarënn</strong> fût l’une des plus prospère Cité-Forge Naine de l’Ourann.</p><p>Au bord du fleuve Qolos, pouvant atteindre aisément l’océan, les autres Forteresses-Etats de l’Ourann et, presque, la frontière des Marches du Venkor, cette cité souterraine, fondée par l’un des descendants d’Yjdad en personne, était respectée et imprenable.</p><p><strong>Le commerce et les échanges de marchandises se faisaient à l’Avant-Goise</strong> (<em><strong>goiser</strong>\_: vieux verbe nain signifiant négocier, bavarder, marchander</em>). Cette ville fortifiée, non loin d’Hyrr’Tarënn, sur les rives du fleuve Qolos, était protégée par un bataillon de cognards chevronnés du Bouclier.</p><p>Peu d’étrangers sont admis dans la forteresse mais <strong>des ambassades permanentes pour la plupart des villes et peuples étaient installées dans le cœur de la forteresse</strong> pour faciliter les discussions, les relations commerciales et les bons rapports avec tout le monde. D’après certains récits, une ambassade des tribus Orcs et Goblines était occupée en toute l’année par un petit nombre de Peaux Vertes qui vivaient dans la cité.</p><p></p><p>A la manière de cette ville imprenable et impénétrable, <strong>le roi Abadar portait en permanence sa légendaire armure runique</strong>. Ce chef d’œuvre des maîtres forgerons, le protégeait de toutes les attaques, aussi solide que les parois de la Cité-Forge. Aucun ennemi n’a réussi, durant les 286 ans de la vie d’Abadar, à pénétrer son armure à part <strong>la pique d’un chef de guerre Orc qui perça la cheville gauche du roi</strong> lors d’une bataille mémorable. La tête de ce chef de guerre fût exposée sur les colonnes de Basalte pendant un an pour lui faire honneur à cette prouesse.</p><p></p><p><strong>Les enfants d’Abadar et de sa femme Lyen développèrent la Forteresse</strong>, augmentant son influence au court des siècles. <strong>De nombreux travaux d’agrandissement, dans la zone du palais et des forges</strong>, furent entrepris vers 8300 après le Grand Schisme.</p><p>Ces investissements massifs devaient en faire l’un des piliers de la race naine. <strong>Mais</strong><span style=\"mso-spacerun:yes\"><strong>\_ </strong></span><strong>en quelques années, la grande et majestueuse cité d’Hyrr’Tarënn fût désertée.</strong> Criminalité, perte de qualité des produits, suicides nombreux, violence, mauvais rapports avec les commerçants et les acheteurs… la vie dans la Cité-Forge devenait dure et peu enviable. La plupart des artisans talentueux, des responsables de secteurs et des familles entières quittèrent progressivement l’obscurité des souterrains, entrainant <strong>un cercle vicieux départs et abandons après départs et abandons</strong>.</p><p>Devenu paranoïaque et anxieux, dur et agressif en affaires et rejeté par bon nombre de seigneurs nains, <strong>les derniers habitants de la forteresse d’Hyrr’Tarënn</strong> (le roi et sa famille ainsi qu’une partie des plus fidèles nobles) <strong>ont fermé la cité pour toujours en 8367 après le Grand Schisme.</strong> Ils sont morts seules et désespérés, emmurés dans une immense cité grandiose.</p><p></p><p><strong>Ainsi fini, l’histoire d’Hyrr’Tarënn et la lignée légendaire du roi Abadar, descendant d’Yjdad.</strong></p>"
