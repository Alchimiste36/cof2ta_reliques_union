system:
  description: >-
    <p>Cette simple lentille permet de regarder les petits objets de plus près.
    Elle peut également servir de substitut à l'amorce et au silex pour allumer
    des feux. Pour allumer un feu avec une loupe, il faut concentrer une lumière
    vive, comme celle du soleil, sur du petit bois à enflammer. Cela demande au
    moins une action Limité. Une loupe accorde un bonus de circonstances de +2
    aux tests de Perception ou de Filouterie pour Estimer tout objet de taille P
    ou grandement détaillé.</p>
