system:
  description: >-
    <p>La soumission et la perte de repère des Mâles Exsangues des Cavernes les
    rendent particulièrement dangereux lorsqu'ils sont enragés.</p><p><strong>Au
    prix d'une perte de 1d6 PV, le Mâle gagne +2 ATT de Contact et +1d6
    DM.</strong></p><p>Par contre, <strong>il devra attaquer dès qu'il le
    peut</strong> sur les ennemis, il se rue dans le combat et <strong>ne pourra
    pas fuir.</strong></p>
  source: ""
  origin: ""
  slug: ""
  inGame: >-
    <p>La première action permet de s'infliger 1d6 DM autoamtiquement.</p><p>La
    deuxième action activable/désactivable permet d'obtenir les bonus à
    l'attaque et aux DM.</p><p>Lors de l'apprentissage, cette capacité donne
    droit à une capacité liée pour l'effet de la capacité de rang 2.
    Glissez-déposez la capacité choisie sous cette capacité.</p><p></p>
