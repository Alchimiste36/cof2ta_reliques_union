system:
  description: >-
    <p>De nombreuses portes sont de conception similaire et se déverrouillent
    donc avec une même clé. Le passe-partout peut être utilisé sur toutes les
    serrures standards à clé, même si le personnage n'a pas la compétence
    Filouterie. Il utilise le bonus de Filouterie de +10 du passe-partout plutôt
    que son propre bonus.</p><p>Il ne peut pas faire 10 en utilisant un
    passe-partout.</p><p>Avec le passe-partout, on ne peut faire qu'un seul jet
    par serrure. Si le jet est raté, la clé ne peut pas verrouiller ou
    déverrouiller la serrure.</p><p>Il arrive que les passe-partout inférieurs
    n'offrent qu'un bonus de +5.</p>
