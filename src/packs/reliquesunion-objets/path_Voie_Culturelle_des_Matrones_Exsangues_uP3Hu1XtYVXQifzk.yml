system:
  description: >-
    <p>Cette ville souterraine est régie par un système hiérarchique et violent
    à faire tourner les yeux à un ogre. Gouvernée par un groupe de femmes
    vicieuses et vivant dans la manipulation, le luxe et le plaisir de la
    torture et du sexe.</p><p>Les femmes elfes Exsangues des cavernes sont au
    sommet de la chaine alimentaire de la ville. Elles ont à peu près tous les
    droits mais chacune doit faire attention aux autres matrones car le moindre
    signe de faiblesse et la mort peut surgir.</p><p>Elles jouent beaucoup sur
    leur attirance physique et leur talents innés pour envouter les faibles
    mâles qui les servent.</p><p>Assassinats, tortures, sexes et maltraitances
    sont le quotidien des matrones.</p><p>L'un des plus grands plaisir de
    certaines matrones est de commencer par l'humiliation d'un serviteur,
    travailleur, soldat ou otage, poursuivi par une petite séance de torture,
    une partie de jambes en l'air avec le malheureux pour enfin l'amener proche
    de la mort à la fin du coït en le tabassant ou par étranglement.</p><p>Entre
    elles, les matrones utilisent plus la manipulation, les secrets et
    l'influence plutôt que la force physique ou l'affrontement direct.</p>
