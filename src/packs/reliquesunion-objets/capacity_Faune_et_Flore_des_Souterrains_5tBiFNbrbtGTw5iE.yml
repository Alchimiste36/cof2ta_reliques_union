system:
  description: "<p>Vivant dans les souterrains, les Elfes Exsangues connaissent toutes les créatures et les plantes qui s'y trouvent. Ils apprennent vite à manger ce qu'ils trouvent dans cette environnement éxigent.\_</p><p>\_Ils <strong>ne peuvent plus se perdre dans des souterrains</strong> naturels ou architecturaux.</p><p>Ils sont <strong>immunisés aux poisons</strong> et <strong>ne peuvent plus tomber malade</strong> à cause d'une substance venant d'une créature ou d'une plante des souterrains (vermines, goules...).</p><p>De plus, ils obtiennent <strong>+2 ATT et +1d6 DM contre les créatures des souterrains</strong>.</p>"
