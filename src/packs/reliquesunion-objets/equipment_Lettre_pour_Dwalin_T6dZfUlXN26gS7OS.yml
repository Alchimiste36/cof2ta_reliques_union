  description: "<blockquote><h3><span style=\"font-family:hobo\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">Maître Dwalin,</strong></span></h3><p><span style=\"font-family:hobo\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">De n</strong><strong>ombre</strong><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">uses fois, votre nom est arrivé à mes oreilles et votre implication dans votre travail est réputé. Les contrats que vous avez effectués ces dernières semaine me confirme l'atout que vous pouvez être pour ma situation.</strong></span></p><p><strong>Ainsi, je peux vous proposer un contrat qui serait bénéfique pour tout le monde.\_J'ai besoin de vous et avant tout de votre discrétion.</strong></p><p><strong>Si vous souhaitez venir en aide à un homme de haute position et récupérer les fruits bien sucrés d'un travail à votre hauteur, je vous donne rendez-vous à l'Auberge du Passage Gourmand demain aux premières lueurs du jour.</strong></p></blockquote>"
