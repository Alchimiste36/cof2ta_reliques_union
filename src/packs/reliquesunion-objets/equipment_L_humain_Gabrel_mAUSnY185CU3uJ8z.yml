system:
  description: "<h4>Résumé de plusieurs récits provenant de la bibliothèque d’Orkadia\_:</h4><blockquote><p><strong>Gabrel était le seigneur humain d’une ville des Marches du Venkor à la frontière des Rocs Exsangues.</strong></p><p><strong>A partir de 8220 après le Grand Schisme, il dilapida la fortune de la ville en quelques années.</strong> De nombreuses familles sont parties vers Kosland et Alberich tandis qu’un bon tiers des habitants sont partis avec lui vers les Montagnes, laissant la ville à la merci des brigands et des bandes de pillards.</p><p><strong>Le seigneur d’Alberich démonta la majeure partie de la ville du seigneur Gabrel pour étendre et développer sa cité.</strong></p><p>Nul n'entendit parler de Gabrel après son départ dans les montagnes. Les premières suppositions disent qu'il serait tomber dans une sorte de secte inconnue.</p></blockquote><h4>Autre document officiel retrouvé dans les archives d'Orkadia</h4><p>Une copie d'un <strong>acte de vente au profit du seigneur humain Gabrel et d'une centaure nommée Kaitiaki</strong> officialise l'achat d'une <strong>large région située dans les montagnes des Rocs Exsangues</strong>. Cette région est <strong>nommée Esdavia.</strong></p><p>Pour l'époque, la somme de vente peut justifier une grande partie des dépenses du seigneur exposée dans le texte précédant.</p>"
