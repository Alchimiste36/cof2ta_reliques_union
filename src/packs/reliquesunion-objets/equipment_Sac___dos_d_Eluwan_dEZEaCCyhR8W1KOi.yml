system:
  description: "<p>Grâce au savoir-faire des elfes sylvains de la forêt d’Eluwan, ce sac à dos est\_étudié pour être agréable à porter sur de longue marche ou pour porter de\_lourdes charges.</p><p>Ces boucles sont renforcées et ses multiples poches sont\_accessibles rapidement.</p><p>Grâce à son confort, <strong>si une personne le porte toute\_la journée, il ne subit pas de pénalité ou de perte de DR lors de longues randonnées ou des marches forcées.</strong></p><p>Il est possible de dormir en portant le sac sans gène (la personne doit\_quand même retirer les autres équipements qui pourraient l’incommoder).</p>"
