system:
  description: "<p><strong>8299 après le grand schisme</strong>, troisième lune de l'hiver, onzième nuit…</p><p><strong>La gardienne du Savoir Maniash'Onira aborde la cérémonie qui a permis le retrait des reliques des porteurs temporaires. </strong></p><p>Elle se souvient de l'<strong>énergie qui passait entre les mains des cinq porteurs</strong>, tournoyante de plus en plus vite jusqu'au <strong>moment où les reliques sont tombées au sol</strong> aux pieds des anciens porteurs, chacun arborant un immense sourire de soulagement. </p><p><strong>Chaque relique fut prise par les membres de l'Ordre de l'Union</strong> et apportées dans les lieux spécifiques à leur \"gardiennage\".</p><hr /><p>Une\_autre partie, quelques jours plus tard, <strong>transcrit sa grande colère</strong>. </p><p><strong>Elle parle de la trahison des porteurs temporaires qui auraient pu détruire les reliques</strong> une fois pour toutes au lieu de se leurrer sur la soi-disant harmonie qu'ils pourraient apporter dans les Terres d'Arran. </p><p>Elle est en colère car <strong>elle pense qu'ils ne voulaient juste pas mourir pour permettre la destruction des reliques</strong>. Tout ce passage est assez cryptique car la gardienne exprime ses émotions sans vraie logique ni explications. </p><p>Une phrase est marquante : \"<em><strong>je perds ma vie car les puissants veulent garder la leur</strong></em>\".</p>"
