system:
  description: >-
    <p>Dans ces documents sont notés les informations les plus sensibles sur les
    défenses de la Cité d'Ispier. En tant que conseiller du seigneur Bonarion,
    le mage donnait des ordres et notait méticuleusement les éléments autour de
    la protection de la ville.</p><ul><li><p>Des listes de gardes et des
    rondes</p></li><li><p>Les postes d'affectation des gardes et
    miliciens</p></li><li><p>Les "brebis galeuses" chez les soldats ou les
    gardes</p></li><li><p>Les agents les plus haineux face aux elfes sylvains
    avec le détail de leur famille</p></li><li><p>de nombreux commentaires de
    Hisp Galik sur chaque soldat, garde et milicien</p></li></ul>
