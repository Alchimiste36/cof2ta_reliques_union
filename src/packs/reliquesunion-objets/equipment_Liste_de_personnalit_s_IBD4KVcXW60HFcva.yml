system:
  description: >-
    <p>Une partie des recherches de Hisp Galik, grâce à son poste auprès du
    seigneur de la Cité d'Ispier, a été de référencé une grande partie des
    seigneurs, nobles, responsable de guildes d'artisans, juristes, personnalité
    fortes ou influentes des villes voisines mais aussi quelques cités
    éloignées.</p><p>Pour chaque personnalité, Hisp notai les liens familiaux,
    professionnels et d'influences connus ou supposés, les dossiers plus ou
    moins compromettants, les casseroles ou délits…</p><p>Certains commentaires
    esquissent des stratégies d'approche pour certaines personnalités politiques
    ou influentes.</p>
