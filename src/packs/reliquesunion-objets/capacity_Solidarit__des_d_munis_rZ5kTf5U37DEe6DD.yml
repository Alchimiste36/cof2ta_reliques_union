  description: "<p>Les démunis et les miséreux se reconnaissent\_instinctivement et font parfois preuve d’un grand\_sens du sacrifice. <strong>Lorsqu’un autre miséreux a la\_possibilité d’aider le personnage, lancez 1d6</strong>. </p><p>De 1 à 3, <strong>le PNJ apporte son aide totale et\_inconditionnelle</strong> (sans attendre de rémunération\_et sans se méfier du danger). </p><p>Cependant, <strong>le MJ\_lance également 1d6 en secret : sur\_un 6, le PNJ\_fomente en réalité un sale coup</strong> afin de se faire\_un peu d’argent…</p>"
