  description: "<p>Ce morceau de bois bordé d'écorce est aplati sur une face, légèrement poncé et gravé de plusieurs runes complexes. Les symboles n'ont pas beaucoup de cohérences entre eux mais sont tout de même harmonieux.</p><p>D'une vongtaine de centimètre de long, ce morceau de bois a été vendu par\_@UUID[Actor.jOyeMRRjZyGYKoeP]{Warbane} à l'auberge de la Croisée du Tranchoir et du Bouclier de la forteresse-état d'Arkar'Um afin, d'après lui, de pouvoir négocier des montures \"spéciale\" avec l'Ainé d'une tribu de Mangeurs des Plaines.</p>"
