system:
  description: >-
    <p>Une flasque de 0,5 litre d'huile permet de faire brûler une lanterne ou
    une lampe pendant 6 heures.</p><p>Le personnage peut également utiliser la
    flasque d'huile comme une arme à aspersion, à la seule différence qu'il faut
    une action Limité pour la doter d'une mèche. Une fois la flasque lancée, il
    y a 50% de chances qu'elle s'enflamme correctement.</p><p>Le personnage peut
    déverser la pinte d'huile sur le sol pour couvrir une zone de 1,50 mètre de
    côté, à condition que la surface soit lisse. Lorsqu'elle est enflammée,
    l'huile brûle pendant 2 rounds et inflige 1d3 points de dégâts de feu à
    toutes les créatures situées dans la zone.</p>
