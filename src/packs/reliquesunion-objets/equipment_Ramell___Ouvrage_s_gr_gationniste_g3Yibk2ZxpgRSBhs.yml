system:
  description: "<h4>Résumé d’un ouvrage trouvé dans la bibliothèque du château de la Cité d’Ispier\_:</h4><p><strong>Ramell a écrit, en 8964 après le Grand Schisme, un texte ségrégationniste espérant la domination des humains sur les Terres d’Arran.</strong> Cet érudit extrémiste et controversé, était <strong>à la recherche de tous les savoirs et objets pouvant augmenter l’influence des humains sur le monde et trouver toutes les faiblesses des anciennes races.</strong></p><p>Il appelle ces anciennes races \"<strong>les races inertes</strong>\". D’après lui, elles ne voudraient pas changer, seraient conservatrice des balances sur le monde et surtout sans ambition. Dans son propos, vu qu’elles sont destinées à disparaitre, ne pouvant pas s’adapter aux changements, <strong>il est du devoir de Ramell et des peuples humains d’accélérer leur extinction par tous les moyens possibles.</strong></p><hr /><p><strong>Après un long procès pour de multiples accusations</strong> (tortures, destruction de lieux sacrés, meurtres avec préméditation, expériences sur personnes vivantes…), <strong>Ramell fut emprisonné (en 8981 AGS) et mourut, 6 ans plus tard, dans les prisons de Kosland.</strong> Le procès et les quelques années passées en cellule lui ont permis de propager ses pensées à de nombreux humains.</p>"
