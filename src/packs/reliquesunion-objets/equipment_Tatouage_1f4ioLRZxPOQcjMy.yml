  description: >-
    <p>Le prix d'un tatouage dépend de sa qualité, de sa taille et du nombre de
    couleurs utilisées.</p><p>Un tatouage de la taille d'une pièce de monnaie à
    l'encre bleue qui s'effacera au bout de 10 ans coûte 1 pc, un tatouage de la
    taille de la main à l'encre noire qui ne s'effacera pas coûte 1 pa et un
    tatouage couvrant le dos nécessite plusieurs séances et coûte 10
    po.</p><p>Chaque couleur supplémentaire coûte autant qu'un tatouage de la
    même taille. Si ces prix sont une indication de base, les tatouages (comme
    toute autre réalisation artistique) peuvent coûter bien plus cher en
    fonction de la renommée de l'artiste.</p>
