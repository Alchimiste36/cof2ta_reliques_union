  description: >-
    <p>Ce tabac ne vous fera pas briller en société parmi les nains et les
    naines de haute naissance mais il a l'avantage d'être à la portée de toutes
    les bourses.</p><p>Sa puissance en bouche est insupportable pour les non
    initiés mais après quelques jours d'habitude, le tabac des mineur à
    l'avantage de mettre son consommateur dans un état de somnolence lors que le
    stresse est trop fort.</p><p>Les feuilles de ce tabac sont vendues attachées
    ensemble simplement par une fine corde. Chaque dose permet de fumer environ
    20 pipes.</p>
