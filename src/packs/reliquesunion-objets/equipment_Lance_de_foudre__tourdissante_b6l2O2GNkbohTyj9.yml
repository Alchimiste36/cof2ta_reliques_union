system:
  description: "<p>Une arme d’environ 1,50 m. Elle peut être utilisée à une ou à deux mains (DM 1d6/1d10) ou lancée (1d6 DM à 10 m).</p><p>La lance est une arme intermédiaire entre un\_épieu et une pique. Prévue pour un usage à deux\_mains, elle est suffisamment légère pour être\_maniée à une seule main, permettant le port\_d’un bouclier par exemple. Ses DM passent alors\_à 1d6.</p><p>Enfin, il est possible de l’utiliser comme\_une arme de jet mortelle à courte portée, mais\_utilisée dans ces conditions, elle impose un\_malus au test d’attaque à distance de -3.</p><hr /><p><strong>Arme magique de Centaure - Titiro</strong></p><ul><li><p>Bonus de +1d6 DM de foudre</p></li><li><p>A chaque fois que la Lance de foudre étourdissante inflige des DM, la cible doit réaliser un test de CON difficulté (10+CHA) ou être étourdi pendant 1d4 rounds.</p></li></ul>"
