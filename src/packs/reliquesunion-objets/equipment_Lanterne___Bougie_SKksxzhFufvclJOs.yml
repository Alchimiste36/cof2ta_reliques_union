  description: "<p>Une lanterne à bougie est un petit objet semblable à une lanterne, avec des panneaux en verre et un emplacement destiné à accueillir une\_bougie. Elle protège la bougie contre les courants d'air et récupère les gouttes de cire. Elle offre la même lumière qu'une bougie mais on peut la couvrir de façon à ce qu'elle n'éclaire que de 1 à 3 cases adjacentes. Le personnage peut utiliser une lanterne à bougie pour se réchauffer les mains.</p>"
