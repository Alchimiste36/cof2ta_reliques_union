system:
  description: "<p><strong>Ce document a été trouvé dans le Temple du Val Rouge dans un recueil philosophique nommé : \"Divination, un rêve à atteindre ou une chimère mortelle\". Il a été écrit par un maitre elfe nommé Acclespireth.</strong></p><hr /><p style=\"text-align:center\"><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><strong><span style=\"text-decoration:underline\">Tel'Ques'Aar, le Basculement</span></strong></span></span></p><p style=\"text-align:center\"><span style=\"font-family:Bookinsanity\"><em>Une souffle de vie balancé par un maigre fils,</em></span></p><p style=\"text-align:center\"><span style=\"font-family:Bookinsanity\"><em>Une délicatesse qui peut rompre et tout changer,</em></span></p><p style=\"text-align:center\"><span style=\"font-family:Bookinsanity\"><em>Une situation incertaine pouvant provoquer cataclysme ou harmonie,</em></span></p><p style=\"text-align:center\"><span style=\"font-family:Bookinsanity\"><em>Un instant, un choix, une respiration qui inverse le cours du temps.</em></span></p><p style=\"text-align:center\"><span style=\"font-family:Bookinsanity\"><em>Ressentir Tel'Ques'Aar à tout instant pour éviter ou enclencher les basculements.</em></span></p><p style=\"text-align:center\"><span style=\"font-family:Bookinsanity\"><em>Celui qui emplit Tel'Ques'Aar dans son coeur et dans ses rêves orientera les fils de la toile du temps.</em></span></p><p style=\"text-align:right\"><strong>Maitre Acclespireth</strong>,\_philosophe\_chair de divination de l'école d'Elsémur</p><hr /><p>Texte écrit dans un vieux dialecte elfique dont les tournures de phrases sont complexes et la traduction incertaine.</p><p>Les grandes lignes de l'ouvrage <strong>cherchent à éclaircir les bienfaits et les risques liés à la pratique de la divination</strong>. Serait-il bénéfique de développer cette pratique au vu des risques énormes liés à la connaissance même partielle de l'avenir. Influencer ce qui pourrait advenir est-il souhaitable ? Est-ce que la prédiction n'amène pas inlassablement l'apparition de la prédiction malgré tous les espoirs de changer le futur ?</p><p><em><strong>La thèse de Maitre Acclespireth est assez orientée vers l'abandon de toutes les techniques et pratiques visant à connaitre l'avenir</strong> d'une manière ou d'une autre et même la pénalisation des praticiens (lui y compris). Le mage qui connait l'avenir horrible ou joyeux qu'il a perçu lors de ses séances utilisera TOUT son pouvoir pour l'empêcher ou le voir advenir sans notion de l'ordre actuel du monde. Le mage SAIT et est LE SEUL à savoir, cela n'entraine que mépris, supériorité et autoritarisme aveugle !</em></p>"
