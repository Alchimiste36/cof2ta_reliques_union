system:
  description: >-
    <p>Tous les personnages qui savent manier le bâton ferré savent aussi manier
    le bâton. Un bâton est un simple morceau de bois, un bâton ferré est adapté
    au combat, plus lourd et généralement couvert de métal aux extrémités (bien
    que les druides utilisent des bâtons de bois noueux avec le même
    effet).</p><hr /><p><strong>Arme magique de Centaure -
    Karekau</strong></p><ul><li><p>Le porteur de ce bâton ferré peut, par une
    action limitée, faire dormir une cible qu'elle touche pendant 2d4 rounds.
    Après cette durée, une cible non volontaire peut réaliser un test de CON
    difficulté 15 ou tomber dans l'inconscience pendant 4d6 heures. Karekau
    utilise cette faculté pour s'endormir malgré ses douleurs et
    courbatures.</p></li></ul>
