system:
  description: >-
    <h4>Obtenu à la bibliothèque du Château du Ravin de Novrak
    :</h4><p><em><strong>Résumé du procès du marchand Timaor Dunclin, l'accusé
    contre l'Assemblée des Marchands Novraki et
    Apparentés</strong></em></p><p></p><p>En date du 7 Pharast 681
    CA,</p><p>Suite aux témoignages de la défense et aux prises de paroles de
    l'accusé, <br />suite aux délibérations du Conseil Juridique du Ravin de
    Novrak, <br />suite à la présentation des preuves pour les deux parties, <br
    />compte tenu des éléments fournis à ca jour <br />et par validation du
    seigneur Arbosk'char Mieili de la Tour de Mabeuil, <br /><span
    style="text-decoration:underline"><strong><span
    style="text-decoration:underline">Timaor Dunclin est jugé coupable de
    :</span></strong></span></p><ul><li><p>Association de Malfaiteurs avec des
    pillards humains et Peaux Vertes,</p></li><li><p>Recel et vente de
    marchandises volées,</p></li><li><p>mensonges et fausses déclarations devant
    les autorités locales,</p></li><li><p>actes de violence sur des
    concurrents.</p></li></ul><p></p><p><span
    style="text-decoration:underline"><strong><span
    style="text-decoration:underline">Le Conseil Juridique du Ravin de Novrak
    décide à 13 voies contre 4 :</span></strong></span></p><ul><li><p>le retrait
    du droit de commercer à l'accusé Timaor Dunclin,</p></li><li><p>le paiement
    de dommages et intérêts d'une valeur de 75 Talions d'Or à la
    défense,</p></li><li><p>la Réquisition de toutes les marchandises
    frauduleuses de l'accusé,</p></li><li><p>L'obligation pour l'accusé de
    présenter des excuses publiques lors de la prochaine Fête des
    Flocons.</p></li></ul><p>Les allégations de l'accusé concernant la présence
    d'un village de Centaures dans les montagnes, ses récits farfelus sur son
    séjour avec eux ainsi que ses mensonges sur la provenance des marchandises
    vendues par l'accusé, sont tous estimés sans fondement
    aucun.</p><p><strong>Quiconque utilisera ses arguments pour vendre, échanger
    ou marchander des biens sera coupables d'accords commerciaux
    frauduleux.</strong></p><p><strong>L'accusé Timaor Dunclin, ne voulant pas
    guider une compagnie d'experts vers le, soit disant, village de Centaures,
    aucun argument n'a réussi à convaincre le Conseil Juridique du Ravin de
    Novrak.</strong></p><p></p><p><span
    style="text-decoration:underline"><strong><span
    style="text-decoration:underline">Mise à jour du jugement
    :</span></strong></span></p><ul><li><p>Le droit de commercer a été retiré à
    l'accusé à compté du lendemain du procès à l'aube par le Conseil Commercial
    du Ravin de Novrak avec comme témoin principal le seigneur Arbosk'char
    Mieili de la Tour de Mabeuil.</p></li><li><p>Les marchandises ont été
    saisies à l'accusé dans la semaine à la suite du
    jugement.</p></li><li><p>L'accusé, Timaor Dunclin a réglé les dommages et
    intérêts complets après un an et 8 mois d'étalement des
    échéances.</p></li><li><p>Les excuses publiques ont été faites au centre de
    l'ampjithéâtre lors de la Fête des Flocons comme convenu.</p></li></ul>
