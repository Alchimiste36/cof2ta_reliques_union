system:
  description: >-
    <div><h5>Livre trouvé dans la bibliothèque du Temple du Val Rouge</h5><p>Ce
    livre parle d'Esdavia. Une ville ou une région fondée par 5 personnalités
    (un elfe, un nain, un humain, un gobelin et un centaure).</p><p>Le livre
    raconte que les habitants étaient fascinés par leurs seigneurs et qu’ils
    étaient “manipulés” ou “fanatiques”. La prospérité et le bonheur étaient
    présents mais la région était entièrement coupée du monde dans une vallée
    montagneuse isolée. La population était composée d’elfes, de nains, de peaux
    vertes, d’humains et d’animaux plus ou moins sauvages.</p><p>La région a été
    entièrement détruite par l'Ordre de l'Union créé pour l'occasion et les
    seigneurs tués lors d’un affrontement simultané.</p><p>L’Ordre de l’Union a
    été créé pour éteindre le souvenir d’Esdavia.</p><hr /><h4>Récit de
    l’affrontement avec Izareaa, le faux dieu Elfe :</h4><blockquote><p>Pour en
    finir avec les faux dieu d’Esdavia, l’ordre de l’union fut
    créé.</p><p><strong>12 Elfes, 12 Nains, 12 Humains, 12 Peaux Vertes, 12
    Centaures</strong></p><p>Parmi les meilleurs de leur peuple réunis pour en
    finir avec cette atrocité. Tous furent réunis sur <strong>les terres neutres
    Daractariin</strong> pour planifier la chute des faux dieux.</p><p>Pour
    éviter la fascination des reliques, <strong>chaque peuple devra</strong>, au
    même moment, <strong>s’occuper du faux dieu de son peuple</strong> et chaque
    peuple remettra, ensemble, la relique à son peuple pour <strong>les faire
    disparaître et ainsi éviter toute tentation.</strong></p><p>L’escarmouche
    fut donnée à la <strong>deuxième lune de l’an 8261 après le grand
    Schisme</strong>.</p><p>Nos meilleurs elfes, sous les ordres de
    <strong>Laajaan</strong>, portant la couronne de capitaine, devait réduire à
    néant <strong>l’impitoyable Izareaa</strong>, le faux dieu Elfe portant
    <strong>les</strong> <strong>bottes d’Esdavia</strong>. Il fallut localiser
    Izareaa grâce aux notes du carnet de<strong> Marjina.</strong> Les témoins
    interrogés, les informations récoltées et les observations regroupées nous
    permîrent de connaître les habitudes du Faux dieu. Le Sextant<strong>
    d’Ealireth</strong> nous a permis de nous guider dans les hautes montagnes
    et les vallées proches de la ville d’Eskovia. Nous approchions à petits pas
    de la ville, voyant, au loin, les centaines d’esclaves sous l’emprise des
    reliques. Une partie du groupe partit avec la plus grande discrétion dans
    les rues de la cité et <strong>Kanfireth</strong> aperçut Izareaa grâce à sa
    lunette en haut d’une tour imposante à l'architecture elfe
    typique.</p><p>Grimpant à la paroi, nos trois guerriers entrèrent par une
    fenêtre juste en face d’Izareaa faisant diversion pour le reste de notre
    groupe.</p><p>Prit par surprise Izareaa reçu une flèche de notre talentueuse
    archère <strong>Diramfir</strong> directement dans l’épaule. Il vacilla le
    temps d’un soupir avant de récupérer sa lame courbe à sa ceinture. La
    maîtrise de la lance d’<strong>Aboreth</strong> tient à distance l’elfe
    corrompu permettant à l’épée acérée de <strong>Comissana</strong> de lui
    faire de multiples entailles sur les membres. Affaibli et enragé, Izareaa ne
    remarqua pas l’arrivée du groupe dans son dos.</p><p>A cet instant tout
    s’accéléra. <strong>Iris Mea</strong> combina son bâton avec le cristal de
    <strong>Fannilias</strong> pour isoler Izareaa. La bulle se serra autour de
    son corps limitant de plus en plus ses mouvements. Le faux dieu nous maudit
    tant qu’il le pût. Fou de rage, immobile, Izareaa hurla et se débattit comme
    un monstre. <strong>Ramajissa</strong> s’approcha pour lui installer les
    menottes quelques instants avant que le cristal se brise et que <strong>Iris
    Mea</strong> ne tombe inconsciente. Malgré la rapidité de cette attaque nous
    étions tous épuisés et sur nos gardes. Nous ne pouvions savoir si la
    baguette de <strong>Boeliaa</strong> fonctionnerait sur l’esprit d’Izareaa
    avant qu’elle ne l'ait posée sur son front. Une lumière en jaillit, un
    éclair aveuglant. Malheureusement, mon cœur se serre encore à ce souvenir,
    <strong>Boeliaa</strong>, l’une des plus respectable mage de notre peuple et
    Izareaa moururent sur le coup. Toute leur énergie vitale semblant être
    vaporisée claquement de doigt.</p><p>Nous pouvions retirer <strong>les
    Bottes de l’union</strong> des pieds d’Izareaa et les placer dans le coffre.
    Ce dernier fut porté par <strong>Laajaan</strong> et la clef fut remise à
    <strong>Ramajissa</strong>.</p><p><strong>Iris Mea</strong> se réveilla 7
    jours plus tard sans aucun souvenir de sa vie et les corps de
    <strong>Boeliaa</strong> et d’Izareaa furent brûlés la veille de la dernière
    réunion de l’Ordre de l’Union avant notre séparation.</p><p><strong>Chaque
    peuple a pour mission de protéger sa relique et de la faire tomber dans
    l’oubli !</strong></p><p><span
    style="text-decoration:underline"><strong><span
    style="text-decoration:underline">Contre la fascination, l’Union
    !</span></strong></span></p></blockquote></div>
