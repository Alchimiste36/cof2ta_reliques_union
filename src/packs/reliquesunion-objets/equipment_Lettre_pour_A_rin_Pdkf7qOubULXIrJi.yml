  description: "<blockquote><h3><span style=\"font-family:hobo\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">Mage Aërin Fendecercle,</strong></span></h3><p>J'irai droit au but pour ne pas brusquer votre personnalité qu'on me rapporte. Vos talents, vos expertises et votre sens du devoir m'ont été conseiller. J'aimerai vous rencontrer pour mettre à mon service pour un temps votre discrétion.\_</p><p><strong>Ainsi, je peux vous proposer un contrat qui serait bénéfique pour tout le monde.\_J'ai besoin de vous et avant tout de votre discrétion.</strong></p><p><strong>Si vous souhaitez venir en aide à un homme de haute position et récupérer les fruits bien sucrés d'un travail à votre hauteur, je vous donne rendez-vous à l'Auberge du Passage Gourmand demain aux premières lueurs du jour.</strong></p></blockquote>"
