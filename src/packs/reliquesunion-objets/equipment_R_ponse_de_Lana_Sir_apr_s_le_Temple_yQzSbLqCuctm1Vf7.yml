system:
  description: >-
    <div><p>Ce message a été envoyé par Lana'Sir grâce à la Ceinture de
    Communication. Il est écrit sur une belle feuille de
    papier.</p><blockquote><p>Votre découverte est incroyable. Laotissa, à mes
    côté, est excitée et heureuse de votre réalisation.</p><p>Grâce à dame
    Rosna, nous avons atteint la Cité d'Orkadia et j'ai pu m'entretenir avec le
    conseil sur place. Ils vont m'escorter jusqu'à la Cité de mon père pour
    enquêter sur ce conflit affreux avec les elfes sylvains.</p><p>Au regard de
    votre récit, la plupart des survivants veulent revenir dans la forêt du Val
    Rouge malgré mes inquiétudes et ils vont certainement me suivre pour
    retourner chez eux. J'ai déjà pour objectif de leur fournir des fonds et de
    l'aide pour reconstruire leur village.</p><p>J'attends notre prochaine
    rencontre pour que vous me racontiez vos découvertes et je comprends votre
    méfiance à me dévoiler de plus profonds secrets. Restons-en là mais
    n'hésitez pas à faire des recherches sur vos trouvailles avant mon retour
    afin de nous ouvrir les yeux.</p><p>J'informe mon père de votre retour à la
    Cité. il saura vous protéger et vous récompenser pour votre
    réussite.</p><p>Heureuse de vous revoir dans une quinzaine de
    jour.</p><p>Lana'Sir Bonarion, dame d'honneur de la Cité
    d'Ispier</p></blockquote></div>
