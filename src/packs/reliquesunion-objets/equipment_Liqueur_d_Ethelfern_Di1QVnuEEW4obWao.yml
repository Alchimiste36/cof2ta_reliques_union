system:
  description: >-
    <p>Cette petite fleur pousse dans les vallées et plateaux des Crocs d'Acier
    alors même que la neige ou la glace n'a pas encore fondue. Avec ses petites
    cloches violacées, l'Ethelfern peut être pressée et distillée pour en
    extraire une liqueur douce et au notes de champignon.</p><p>Produite en
    petite quantité (pour préserver la ressource) et conditionnée dans une belle
    petite cruche en terre cuite, la Liqueur d'Ethelfern est une boisson très
    précieuse. Peu connues des tables des grandes villes de l'Ourann, si vous
    voulez subjuguer vos hôtes, amenez une bouteille de liqueur
    d'Ethelfern.</p><p>Vendue uniquement à la Vallée de Novrak dans une
    bouteille de 30 cl.</p>
