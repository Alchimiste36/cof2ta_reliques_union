  description: >-
    <p>Les valeurs morales des Centaures sont inscrites dans leur peau et il est
    bien compliqué de les ébranler. Grâce à leur éducation et leur idéaux
    ancrés, il est bien compliqué de les manipuler et leur discours sont souvent
    percutants.</p><p>Le Centaure gagne un <strong>Dé bonus</strong> et un bonus
    de <strong>+5 à tous les tests de CHARISME contre la
    Manipulation</strong>.</p><p>Tant qu'il suit les valeurs enseignées à
    Arkanov, le Centaure gagne un bonus de <strong>+10 à tous ses tests de
    CHARISME</strong>.</p><p><strong>Les deux effets sont
    cumulables.</strong></p>
