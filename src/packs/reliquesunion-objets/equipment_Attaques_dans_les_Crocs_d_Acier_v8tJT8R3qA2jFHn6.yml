  description: "<h4>Information envoyée par l’archiviste de la bibliothèque de Blanche Paix\_:</h4><blockquote><p><strong>Depuis 702 CA, des marchands, voyageurs et autres habitants de la région rapportent le nouveau danger qui sévi dans les montagnes.</strong> La nuit, les campements se font attaquer. Certains soldats ou gardes sont tués et à chaque fois certaines personnes se font kidnapper. Quelques marchandises sont dérobées mais la plupart du temps les attaques sont trop rapides et les ennemis s’enfuient dès que leurs cibles sont attrapées.</p><p><strong>Des chasseurs de la Vallée de Novrak ont commencé à parler d’Ombres blanches car le peu de personnes ayant pu apercevoir cette menace ont décrit des silhouettes aussi menue que des elfes et à la peau blanche comme la craie.</strong></p><p><strong>Une enquête a été demandée</strong> mais la faible fréquence des attaques et la difficulté de trouver un rythme d’attaque ou d’estimer la zone des prochaines escarmouches ont rendu impossible le pistage des Ombres Blanches.</p></blockquote>"
