  description: >-
    <h4><em>Discussion entre Maniash'Onira et Hoani du village
    d'Arkanov</em></h4><p>Dans le tome 25 des livres de compte-rendu de la
    Gardienne Maniash'Onira.</p><hr /><h4>Les premières lignes commencent par
    une réflexion de la Gardienne :</h4><blockquote><p><em><strong>8934 après le
    grand schisme, première lune de l'hiver, huitième
    nuit</strong></em></p><p><em>Lorsque j'ai vu la planche de bois flottée dans
    le bassin de la grande salle de l'Union mon coeur s'est arrêté. Les acolytes
    et ma suivante transpiraient l'inquiétude et il m'a fallu toute ma
    persuasion et mes grands sourires pour les calmer. Je pris la planche et
    allait l'étudier dans mon bureau.</em></p></blockquote><hr
    /><h4>Transcription des écritures sur la planche
    :</h4><blockquote><p>Gardienne des elfes, protectrice du Bracelet, que
    l'oubli arrive au plus vite.</p><p>Je viens à votre conseil face à une
    grande menace pour la Ceinture de l'Union. Au coeur de notre village, dans
    les montagnes d'Arkanov, la grande histoire cache la Ceinture. Nous avons
    tout pour survivre, tout pour vivre heureux. Le village s'agrandit un petit
    peu et certains des jeunes veulent partir "à l'aventure" dans le vaste
    monde. Ne savant rien de notre noble rôle, certains ont franchi les portes
    d'Arkanov. La tradition se poursuit encore et toujours et les quatre initiés
    qui connaissent l'existence de la Ceinture ont le coeur pur et l'esprit
    affuté. Nos rituels et nos traditions fonctionnent comme le voulait l'Ordre
    de l'Union.</p><p>Récemment, une créature maléfique est apparue dans notre
    village. Elle a prit le contrôle de 3 adolescents avant que nous nous en
    rendions compte. Créature démoniaque, elle installait un climat de chaos
    dans le village. Nous avons été obligé de tuer les trois adolescents avec
    tristesse et nous avons brulé les corps.</p><p>Je tenais à t'en informer car
    je ne sais pas si l'entité a trouver des informations concernant Esdavia ou
    des informations sur les autres temples. Garde toi bien de surveiller les
    pupilles des prêtresses qui partage tes journées.</p></blockquote><hr
    /><h4>Réflexion de la Gardienne :</h4><blockquote><p>Sur une pierre, j'ai
    écris à Hoani une réponse simple et brève lui expliquant qu'aucune entité
    maléfique ne saurais mettre en péril le Temple du Val Rouge et qu'aucune
    autre communication ne devait interférer avec notre mission. Je lui ai
    rappelé le rôle que nous avons et l'importance de notre mission. J'ai passé
    quelques cycles à inspecter les pupilles de mes acolytes et de ma suivante
    juste par acquis de conscience.</p><p>Je ne comprend pas pourquoi Hoani a
    rompu le silence entre le village d'Arkanov et notre Temple pour une
    histoire aussi banale. Les centaures ont du être inquiets mais rien ne
    devrait les faire craquer. "<strong>Que l'oubli arrive au plus
    vite</strong>" je sens par ces mots que l'impatience s'infiltre dans
    l'esprit d'Hoani. Ils ont déjà de la chance d'avoir accès à la lumière du
    jour et au grand air. Je dois me calmer, je dois rester concentré sur ma
    tâche et sur le bien fondé de ma place.</p><p>Je vais dissoudre la planche
    dans le bassin et oublier cette histoire avant que ça ne me rende inquiète
    et que mes acolyte le ressente.</p></blockquote><p></p>
