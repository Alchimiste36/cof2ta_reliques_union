system:
  description: >-
    <p>Cette eau de vie est très forte et à peine fruitée. Elle a l'avantage
    pour les plus pauvres d'être peu chère, de saouler très vite et,
    régulièrement, de faire oublier des soirées de solitude.</p><p>L'Assomoir
    porte bien son nom car après une longue journée de travail quelques gorgées
    permettent de dromir comme un bébé en oubliant les douleurs ou les
    tracas.</p><p>Vendue en bouteille de terre cuite de 1 litre.</p>
