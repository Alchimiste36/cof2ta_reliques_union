  modules/cof2ta_reliques_union/assets/ru_objets/armes/arkanov_epieu_glace_3.webp
system:
  description: "<p>Arme formée d'un bâton d'environ un mètre et demi de long, muni d'un fer large et pointu.</p><p>L’épieu est une lance courte (1,50 m environ)\_et massive, formidable pour la chasse. Elle offre\_un bonus de +2 en DEF contre les créatures\_seulement dotées d’armes naturelles et inflige\_2d6 DM contre celles qui ne portent pas\_d’armure manufacturée.</p><hr /><p><strong>Arme magique de Centaure - Karekau</strong></p><p>Cet épieu est, traditionnellement, porté par le doyen du village. Il n'est pas réellement plus puissant au combat mais il possède deux pouvoirs utilisent pour le village :</p><ul><li><p>Par une action limitée, le porteur peut frapper le sol avec la pointe de l'épieu et faire résonner/vibrer tout le sol du village tant qu'il frappe un tempo ou un rythme. Très utile pour les danses et chants lors des cérémonies même si Karekau, faute d'une grande oreille musicale, ne l'utilise pas souvent.</p></li><li><p>Par un rituel d'environ 10 minutes, le porteur de l'épieu cérémonial du doyen peut communiquer avec n'importe quel habitant étant né à Arkanov. Cette communication peut durée de façon illimitée tant que l'utilisateur de l'épieu est concentré. Cette faculté a rarement utilisée car le chef du village, Kiliko, a fortement encouragé le doyen d'arrêté d'importuner sans raison un bon nombre d'habitant du village de jour comme de nuit.</p></li></ul><p>Théoriquement rien ne prouve que ces pouvoirs fonctionnent en dehors du village mais c'est bien le cas.</p>"
