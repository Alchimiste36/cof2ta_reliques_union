system:
  description: >-
    <div class="arran-mod"><h5>Récit trouvé dans la Bibliothèque du Château de
    la Cité d'Ispier, datant de 681 Athée.</h5><p><em>Entre folie et mensonge,
    <strong>un marchand raconte à qui veut
    l'entendre</strong>.</em></p><p><em>Il voyageait dans les montagnes hostiles
    des Crocs d'Acier</em></p><p><em>Faisant halte dans un village reculé dans
    des montagnes reculées</em></p><p><em><strong>Il racontait à qui veut
    l'entendre</strong></em></p><p><em>Les hommes y sont rudes, les femmes y
    sont froides.</em></p><p><em>Les maisons rustiques et les bêtes
    résistantes,</em></p><p><em>Son nom est aussi brut que la vie sur les flancs
    de montagnes</em></p><p><em><strong>Xerbar'Anni, la Vallée de
    Novrak</strong></em></p><p><em><strong>Il continuait à le raconter à qui
    veut l'entendre</strong></em></p><p><em>le marchand circule dans les
    alentours</em></p><p><em>Parcours les falaises du nord au
    sud</em></p><p><em><strong>mais bien sûr !</strong></em></p><p><em>Le
    marchand rencontre <strong>un peuple de
    Centaures</strong></em></p><p><em>Isolé, solitaires et
    méfiants</em></p><p><em><strong>Mais pourquoi pas
    !</strong></em></p><p><em>Le marchand passe cinq lunes avec
    eux</em></p><p><em>apprenant leur langage et leurs
    coutumes</em></p><p><em><strong>Mais puis quoi encore
    !</strong></em></p><p><em>Il nous montre les merveilles que ces chevaux
    fabriquent</em></p><p><em>Il en veut un prix digne d'un prince
    d'Elsémur</em></p><p><em><strong>Mais oui encore plus
    !</strong></em></p><p><em>Contrefaçon, arnaque ou
    manipulation</em></p><p><em>il s'énerve pour nous faire ouvrir les
    yeux</em></p><p><em><strong>Mais ça va être de notre faute
    !</strong></em></p><p><em><strong>Il répétait et racontait encore à qui veut
    l'entendre.</strong></em></p><p><em>Raillé, hué, et rejeté, le marchand ne
    sortit jamais de ses mensonges</em></p><p><em>le marchand finit sans le
    sous, saoule dans les tavernes</em></p><p><em><strong>à raconté à qui veut
    l'entendre sa découverte des Centaures.</strong></em></p><p><em>Quelque soit
    l'histoire que l'on raconte à qui veut l'entendre,</em></p><p><em>le sage
    saura émerger du brouillard des mensonges pour retrouver la
    vérité</em></p><p><em>sinon leurs poids le fera
    sombrer.</em></p><p><em><strong>C'est cette morale qu'il faut raconter à qui
    veut l'entendre.</strong></em></p></div>
