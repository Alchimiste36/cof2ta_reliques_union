system:
  description: >-
    <p>Ce récipient métallique doté d'un couvercle amovible de petite taille
    contient un petit creuset dans lequel on brûle de l'encens. Utilisé lors de
    rituels ou de cérémonies religieuses, un encensoir peut contenir jusqu'à dix
    morceaux d'encens. Une fois allumé, l'encensoir brûle un morceau d'encens
    par heure.</p><p>Toutes les créatures dans la zone enfumée gagnent un bonus
    de circonstances de +2 à leurs jets de Constitution pour résister aux
    maladies inhalées.</p>
