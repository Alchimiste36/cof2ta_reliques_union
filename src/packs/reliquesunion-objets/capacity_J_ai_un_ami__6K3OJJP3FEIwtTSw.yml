  description: "<p>Le courtisan connaît du monde, beaucoup de\_monde. </p><p>Il\_est capable d’<strong>obtenir un rendez-vous\_ou une information avec bien des personnes</strong>, plus\_ou moins puissantes. </p><p>Une\_fois par jour, en réussissant un <strong>test de CHA difficulté 10</strong>, il peut <strong>obtenir\_une entrevue avec une personne d’importance\_moyenne</strong> (le bras droit d’un maître de guilde, le\_chef de la pègre local, un patron d’une des plus\_grandes maisons de plaisir de la cité…). </p><p>En\_réussissant un <strong>test de CHA\_ difficulté 15</strong>, il est capable\_d’<strong>obtenir une entrevue avec les plus grands représentants des milieux qu’il fréquente</strong>.</p>"
