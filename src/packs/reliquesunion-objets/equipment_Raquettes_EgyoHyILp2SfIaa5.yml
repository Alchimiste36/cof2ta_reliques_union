system:
  description: >-
    <p>Ces maillages de corde ou de tendons, encadrés de bois, s’attachent aux
    pieds de manière à répartir le poids du personnage sur la neige, pour éviter
    qu’ il s’enfonce dedans et faciliter ses déplacements. Les raquettes
    réduisent le malus lié à la marche dans la neige de 50 %. Par exemple, il
    faut dépenser 2 cases de mouvement pour avancer d’une case dans la neige (1
    case + 1 case de malus). Les raquettes réduisent ce malus à 1,5 case de
    mouvement pour avancer d’une case. Les raquettes peuvent compléter une autre
    tenue.</p>
