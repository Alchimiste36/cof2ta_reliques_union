  description: "<h4>Information recueillie de la bibliothèque d’Orkadia\_:</h4><blockquote><p><strong>Cette note date de 667 CA, il y a presque 40 ans.</strong></p><p><strong>D’après un groupe de chasseurs,</strong> faisant parti d’une caravane marchande, <strong>un groupe de trois centaures immenses ont été aperçus dans les hauteurs de la montagne des Crocs d’Acier.</strong> Ils ont hurlé en levant leurs sabots avant et se sont enfuis vers le Nord après cette intimidation.</p><p><strong>Notre érudit naturaliste, Herbest Falcon, nous dit</strong>, après consultation sur ce fait divers, <strong>qu’il est fort peu probable que les créatures vues par ces chasseurs soient réellement des centaures.</strong> Surement une erreur de vision dans ces montagnes où nous pouvons croiser, de temps en temps, des bouquetins de grandes tailles avec des cornes biscornues.</p></blockquote>"
