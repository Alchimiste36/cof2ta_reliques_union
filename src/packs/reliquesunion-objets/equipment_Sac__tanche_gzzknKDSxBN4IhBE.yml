  description: >-
    <p>Ce sac en cuir étanchéifié avec du goudron ou de la poix conserve les
    objets fragiles à l'abri des ravages de l'eau.</p><p>Les objets placés dans
    le sac restent relativement secs, ce qui en fait un sac idéal pour les
    cartes, les parchemins, les grimoires et autres, même s'il n'est pas
    imperméable et ne peut être complètement immergé que pendant 10 rounds avant
    que trop d'eau ne s'infiltre et ne ruine ce genre d'objets.</p>
