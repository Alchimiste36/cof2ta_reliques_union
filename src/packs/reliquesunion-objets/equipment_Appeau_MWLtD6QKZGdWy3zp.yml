system:
  description: >-
    <p>Ces sifflets en roseau ou en bambou imitent le cri de divers animaux
    sauvages. Chaque appeau est lié à un type d'animal spécifique ou à un cri
    donné (signalant, en général, la présence de nourriture ou d'un partenaire
    pour attirer l'animal). Avec le bon sifflet, le personnage gagne un bonus de
    +2 aux tests de Nature/Survie pour pister les animaux d'un type spécifique
    ou pour subvenir à ses besoins dans la nature.</p>
