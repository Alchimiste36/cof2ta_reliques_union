  description: "<p>Les tentes existent en différentes tailles et peuvent accueillir de 1 à 10 personnes.</p><ul><li>Une tente de taille P accueille 1 créature de taille M et prend 20 minutes à monter,</li><li>une tente de taille M accueille deux créatures et prend 30 minutes à monter,</li><li>une tente de taille G accueille quatre créatures et prend 45 minutes à monter et</li><li>un pavillon accueille 10 créatures et prend 90 minutes à monter (deux créatures de taille P comptent comme une créature de taille M et une créature de taille G compte comme deux créatures de taille M). Les pavillons sont suffisamment grands pour faire un petit feu au centre.</li></ul><p>\_</p><p>Il faut moitié moins de temps pour remballer une tente que pour la monter.</p>"
