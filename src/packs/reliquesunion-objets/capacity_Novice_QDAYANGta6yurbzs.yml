system:
  description: "<p>L’érudit dispose d’<strong>un novice à son service</strong>\_(Initiative 10, Défense 11, PV\_=\_[10\_+\_niveau], Att\_+1, DM 1d4°). </p><p>Celui-ci est absolument <strong>loyal à\_son maître et tient les rôles de serviteur et d’assistant</strong>. Il\_s’occupe de son équipement, trie ses\_documents et en prend soin, panse les blessures,\_etc. </p><p>Grâce au novice, les <strong>durées de recherche\_documentaire sont divisées par deux</strong>. </p><p>De\_plus, le\_novice peut <strong>effectuer les premiers soins jusqu’à 3\_fois par jour</strong> : l’érudit récupère au choix <strong>1d4°\_PV\_ou 1\_PM</strong>. </p><p>Si\_le novice vient à mourir, l’érudit en\_prend un autre à son service lors de son passage\_au niveau suivant.</p>"
