system:
  description: "<p>La barde est un type d’armure couvrant la tête, le cou, le poitrail, le corps et éventuellement les jambes des\_chevaux\_ou d’autres montures. Les bardes lourdes ou intermédiaires offrent une meilleure protection que les bardes légères mais réduisent la vitesse. Les bardes se fabriquent comme n’importe quel type d’armure.<br /><br />Une armure pour\_cheval\_(créature non-humanoïde de taille G) coûte quatre fois plus cher qu’une armure pour humain (humanoïde de taille M) et pèse deux fois plus lourd. Si la barde est pour un poney ou une autre monture de taille M, elle ne coûte que deux fois plus cher et fait le même poids qu’une armure intermédiaire pour un humanoïde. Les bardes intermédiaires ou lourdes ralentissent les montures qui les portent, comme l’indique la table ci-contre. Les montures volantes ne peuvent pas voler avec une barde intermédiaire ou lourde.<br /><br />Pour retirer ou enfiler une barde, il faut cinq fois le temps indiqué. Un animal bardé ne peut pas transporter d’autres charges qu’un cavalier et des fontes normales.</p>"
