system:
  description: >-
    <p>Il existe différents types de couvre-chefs dans toutes les cultures. Ils
    vont du turban au tricorne en passant par la casquette en fourrure, et
    servent juste à couvrir la tête. Certains groupes religieux ou sociaux
    imposent le port de couvre-chefs particuliers. Un couvre-chef ayant une
    véritable utilité pratique, comme un tricorne, coûte généralement 2 pa.<br
    /><br />Les pirates portent souvent des bandanas ou des tricornes, alors que
    les capitaines préfèrent les bicornes qu’ils portent « à la proue et à la
    poupe » (avec les pointes positionnées vers l’avant et l’arrière) ou « en
    travers » (avec les pointes positionnées sur les côtés).</p>
