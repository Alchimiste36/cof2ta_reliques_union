system:
  description: "<p>Une arme d’environ 1,50 m. Elle peut être utilisée à une ou à deux mains (DM 1d6/1d10) ou lancée (1d6 DM à 10 m).</p><p>La lance est une arme intermédiaire entre un\_épieu et une pique. Prévue pour un usage à deux\_mains, elle est suffisamment légère pour être\_maniée à une seule main, permettant le port\_d’un bouclier par exemple. Ses DM passent alors\_à 1d6.</p><p>Enfin, il est possible de l’utiliser comme\_une arme de jet mortelle à courte portée, mais\_utilisée dans ces conditions, elle impose un\_malus au test d’attaque à distance de -3.</p><hr /><p><strong>Arme magique de Centaure - Kahao</strong></p><ul><li><p>Bonus de +1 en attaque et DM</p></li><li><p><strong>Aura de peur :</strong> Lorsque le dé d'attaque fait 15 à 20, la cible subit 1d4° DM suplémentaire et est étourdi pendant 1 round, ressentant une peur intense et courte.</p></li></ul>"
