system:
  description: >-
    <p>Les vêtements d’artisan sont faits de tissus simples mais résistants
    convenant à ceux dont le métier implique un travail spécialisé et souvent
    manuel comme la cuisine, la charpenterie et les autres professions des
    classes moyennes. Cette tenue comprend une chemise boutonnée, une jupe ou un
    pantalon retenu par un cordon, des chaussures et, éventuellement, une
    casquette ou un chapeau. Elle peut également inclure une ceinture ou un
    tablier en cuir ou en tissu pour porter des outils.</p>
