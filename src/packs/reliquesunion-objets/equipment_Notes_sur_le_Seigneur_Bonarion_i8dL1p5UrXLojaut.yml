system:
  description: >-
    <p>Au plus près du seigneur Jaspar Bonrion depuis 6 ans, Hisp Galik
    développait, sur un petit carnet caché derrière une couverture de traité sur
    l'herboristerie, ses impressions, émotions et ressenti sur Jaspar
    Bonarion.</p><p>Il décrit dans les détails les colères, les joies, les
    doutes, les réflexions du seigneur et commente avec les leviers que ça peut
    lui donner sur lui.</p><p>La deuxième partie du carnet est une succession
    d'expériences qui ont été faite sur le seigneur par Hisp Galik. Les
    produits, huiles, aliments, mistures qui ont été données au seigneur à son
    insu avec les doses, la fréquence et les effets qu'ils ont eu sur lui et ses
    facultés de réflexions.</p><p>Il développe une petite partie sur les
    sortilèges qu'il a lancé sur le seigneur mais fini cette section en parlant
    du risque trop élevé de se faire repérer et accuser de manipulation en usant
    de sorts.</p>
