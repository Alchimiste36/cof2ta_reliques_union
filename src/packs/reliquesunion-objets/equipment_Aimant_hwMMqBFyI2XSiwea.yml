  description: >-
    <p>Les aimants portables sont relativement faibles et servent surtout à
    détecter ou à attirer le fer, le mithral ou l'adamantium sur de courtes
    distances. Ils ne sont pas suffisamment puissants pour tracter le métal sur
    de grandes distances ni pour aider à désarmer les créatures portant des
    armes en métal. Cet aimant en forme de fer à cheval peut soulever jusqu'à
    1,5 kg de fer.</p>
