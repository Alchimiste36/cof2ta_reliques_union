system:
  description: "<p>L’argent permet bien des excentricités, parfois même ignorer la loi. </p><p><strong>Lorsque le personnage\_commet une action illégale</strong>, il peut faire un <strong>test\_de CHA pour échapper à la justice</strong>, avec une difficulté de <strong>10 pour un délit</strong>, <strong>15 pour un crime</strong> et <strong>20\_pour un acte odieux</strong>. </p><ul><li><p>Si\_l’action contrarie un puissant, la difficulté augmente de 5. </p></li><li><p>Si\_la victime du\_crime ou du délit est un personnage important,\_cette capacité est inefficace.</p></li><li><p> Si\_ le personnage\_utilise cette capacité plusieurs fois dans la même\_semaine, la difficulté du test de CHA augmente\_de 10 à chaque fois. </p></li></ul><p>Il\_n’est pas possible d’utiliser\_Pot-de-vin pour améliorer le résultat de ce test.</p>"
