  description: "<h4>Médaillon confié par\_@UUID[Actor.CM9KTluTWjSZcuUH]{Laotissa Graine Dépeautre} à Lavoise après avoir rencontré les survivants du village du Val Rouge.</h4><p><em><strong>Le médaillon est composé d'un disque bombé central avec 5 branches plates qui en part.</strong> Sur chaque branches vous voyez deux grands symboles et des mots gravés à côté en langue elfique ancienne. </em></p><p><em><strong>Chaque mot correspond au mot de la comptine de Laotissa</strong> (la mère, l'enfants, l'arbre, le fruit, la plante, la graine, la glace, le vent, le sable et le savoir). </em></p><p><em>Les gravures sont remplies d'une ambre bleuté polie alors que les symboles sont remplies d'une ambre violacée polie. </em></p><p><em>Le médaillon semble être fabriqué en bois mais lorsque vous le prenez il pèse le poids d'un métal lourd et dense.</em></p>"
