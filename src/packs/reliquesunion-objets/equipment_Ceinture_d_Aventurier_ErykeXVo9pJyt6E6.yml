system:
  description: "<p>Cette bandoulière comporte six poches dans le sens de la longueur et une sacoche au niveau de la hanche. Chaque poche a un épais rabat de cuir qui peut être fermé en cas de secousses (ce qui nécessite une\_action de mouvement\_pour l'ouvrir et l'attacher) ou peut être laissée ouverte pour y accéder plus facilement. Les poches et la sacoche contiennent chacune un certain nombre d'anneaux et de liens permettant d'attacher davantage d'équipement. La ceinture se fixe à l'épaule, et peut être libérée en tirant d'un geste sec en cas d'urgence, par une action de mouvement.</p>"
