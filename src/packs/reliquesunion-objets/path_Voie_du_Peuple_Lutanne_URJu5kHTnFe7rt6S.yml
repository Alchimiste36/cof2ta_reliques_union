  description: >-
    <p>Très peu présents dans les différentes régions des Terres d'Arran, les
    Lutannes vivent en Lutannie isolés par la plupart du monde.</p><p>Peuple de
    chasseurs et de grimpeurs, ils ressemblent à des elfes de petite taille mais
    leur pieds sont griffus.</p><p>En étudiant les Lutannes, un érudit pourrait
    penser à un savant mélange entre l'agilité des elfes, les capacités des
    gobelins et la détermination des nains.</p>
