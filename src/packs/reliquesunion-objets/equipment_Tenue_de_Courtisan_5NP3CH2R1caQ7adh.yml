  description: "<p>Cette tenue se compose de vêtements taillés sur mesure selon la mode en vigueur dans les cours nobles de la région. Quiconque cherche à influencer des nobles ou des courtisans en portant des vêtements de tous les jours aura bien du mal à parvenir à ses fins (malus de -2 aux tests de compétences basés sur le\_Charisme\_pour influencer ce genre de personnes).</p><p>Si le personnage porte cette tenue sans bijoux (coûtant un supplément de 100 pa), il passera pour un roturier qui n’est pas à sa place.</p>"
