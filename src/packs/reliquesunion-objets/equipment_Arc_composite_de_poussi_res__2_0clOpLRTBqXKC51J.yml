  description: "<p>Score minimum en FOR requis : 12.</p><hr /><p><strong>Arme magique centaure - Haputanga</strong></p><p>L'arc composite de Haputanga est une merveille qu'elle maitrise avec brio.</p><p>Le manche de l'arc est sculpté à la main de l'archère et certains petits gestes des doigts permettent de rendre cette arc effroyable pour les ennemis.</p><ul><li><p>Bonus de +2 en attaque et DM.</p></li><li><p>\_<span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Flèches Poussières (L) :\_</span></strong></span>si l'attaque touche la cible, elle la désoriente en créant un nuage de poussière autour d'elle. La cible gagne le statut Etourdi pendant 1 tour. Si l'attaque est un critique, la cible est aveuglée 1d4 tour</p></li></ul>"
