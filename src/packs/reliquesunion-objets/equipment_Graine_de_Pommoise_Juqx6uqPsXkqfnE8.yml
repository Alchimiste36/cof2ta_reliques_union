system:
  description: "<p>La chair est assez farineuse et son goût ressemble à un petit pois fade. </p><p>Lorsqu’une personne mange une graine de Pommoise, il ressent de la\_quiétude, son rythme cardiaque diminue et son stress ou sa peur s’apaisent.</p><hr /><p>Le consommateur gagne +4 à ses tests PER/VOL et il récupère 1 Point\_de Récupération. Le bonus aux tests de PER/VOL sont doublés (+8) pour\_résister au stresse ou à la peur. </p><p><strong>Lorsqu’un porteur d’une des Reliques de l’Union</strong> consomme une graine de\_Pommoise il peut communiquer plus facilement avec la personnalité de la\_Relique. La communication n’est pas une discussion claire mais les échanges\_sont beaucoup plus clair pour le Porteur et la Personnalité de la Relique\_«comprend» plus facilement les interrogations du Porteur.</p><p>Les effets de la graine de Pommoise <strong>durent pendant 2d4+1 heures</strong>.</p>"
