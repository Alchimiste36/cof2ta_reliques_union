  description: >-
    <p>Dans de grands carnets épais, Hisp Galik prenait de nombreuses notes sur
    ses recherches en magie élémentailiste et surtout sur sa pratique de la
    nécromancie.</p><p>L'une de ses recherches portait sur l'emprise d'un démon
    sur un être vivant ou encore sur le moyen de faire durer un enchantement de
    déguisement le plus longtemps possible.</p><p>Ses recherches sont complexes
    et avancées. L'étude longue des recueil de la bibliothèque et des notes et
    expériences du mage Galik peut améliorer les compétences des PJ mages ou
    mystiques.</p>
