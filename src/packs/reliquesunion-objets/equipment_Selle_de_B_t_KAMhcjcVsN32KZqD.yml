system:
  description: "<p>Les selles servent à caler un cavalier ou des provisions sur une monture.<br /><br /><em><strong>Selle d’équitation</strong></em>. Ces selles constituent le matériel d’équitation le plus répandu. Si le cavalier tombe\_inconscient\_alors qu’il est en selle, il a 50% de chances de rester en selle.</p><p><em><strong>Selle de bât</strong></em>. La selle de bât maintient l’équipement et les provisions mais pas un cavalier. Elle contient autant d’équipement que la monture peut en porter.</p><p><em><strong>Selle de guerre</strong></em>. Cette selle maintient le cavalier, lui accordant un bonus de circonstances de +2 à ses tests d’Athlétisme pour rester en selle. Si le cavalier tombe inconscient\_alors qu’il est en selle, il a 75% de chance de rester en selle.</p><p><em><strong>Selle spéciale</strong></em>. Ces selles sont conçues pour différents types de montures extraordinaires, chacune étant taillée pour un type de créature spécifique. Les selles spéciales existent en selles de guerre, en selles de bât et en selles d’équitation, comme les selles normales, et elles ont les mêmes caractéristiques.</p>"
