items:
  - folder: QZKWGWu8512Lhphc
    name: Peaux Vertes Orc
    type: feature
    img: modules/cof2ta_reliques_union/assets/cof2ta_icones/cof2ta_pv_orc_token.webp
    system:
      description: "<h2>Les\_Orcs</h2><p>Les Orcs sont de grandes créatures incroyablement musclées. Leur visage, généralement considéré comme disgracieux par les autres peuples,\_n’attire guère la sympathie. Il faut avouer que\_leurs canines inférieures proéminentes leur\_confèrent un air perpétuellement féroce.</p><p>Le clan ou le groupe est souvent au centre de\_la vie des Orcs, symbole de stabilité mais aussi\_synonyme de survie dans un monde qui leur\_est particulièrement hostile. C’est pourquoi,\_malgré les mésententes ou les conflits, rien n’est\_plus important que la loyauté envers le clan\_ou la famille. Dans ce type de communauté,\_le statut social de l’Orc est lié à sa force, sa\_capacité à prendre la place du dominant ou\_bien à ses exploits, qu’ils soient liés à la guerre ou à la chasse.</p><p>À l’extérieur des territoires de leurs clans, les\_Orcs sont craints pour leur puissance et leurs\_capacités de combat. Ils sont de ce fait bien\_souvent traqués comme des bêtes dangereuses.</p><h4>Modificateurs des Orcs</h4><p>Atouts : <strong>+2 FOR, +2 CON</strong></p><p>Faiblesses : <strong>-2 INT, -2 CHA</strong></p><p>Âge de départ à l’aventure : <strong>15 ans et plus</strong></p><p>Espérance de vie : <strong>50 ans</strong></p><p>Taille : <strong>entre 1,70 m et 2,20 m</strong></p><p>Poids : <strong>entre 70 kg et 170 kg</strong></p><p>Trait des Orcs : <strong>Instinct de survie</strong></p><p><strong>Noms féminins :</strong> <em>Bashuk, Batul, Boora, Deleeg, Dura, Durgat, Durz, Elisha, Gashnakh,\_Kharza, Lambee, Melash, Morn, Olaan, Rysha,\_Shag’dub, Shel, Shena, Thabel, Tuzel, Urzeel,\_Usha’an, Yshela, Zera’an.</em></p><p><strong>Noms masculins :</strong> <em>Atulg, Cuba, Gorgo, Horr,\_Igubat, Knah, Krug, Kul’gha, Naguk, Narod,\_Pomg, Rilug, Saba, Slogh, Ulag, Ur’am, Urlgan,\_Verr, Viggu, Vitgut, Yakha, Yam, Yogg.</em></p><h2>Les Peaux vertes</h2><p>Les Peaux vertes forment un grand peuple\_qui regroupe plusieurs ethnies très\_différentes les unes des autres, que ce\_soit morphologiquement ou culturellement.\_Cependant, à l’échelle des Terres d’Arran, toutes\_sont souvent considérées de la même façon par\_les autres peuples en raison de la couleur de leur\_peau et du danger que peuvent représenter les\_clans organisés aux frontières de la civilisation.\_Il est vrai que toutes les Peaux vertes ont des\_choses en commun.</p><p>Depuis les temps immémoriaux, les Orcs\_semblent être en guerre permanente contre\_la plupart des peuples des Terres d’Arran. Au\_nord-est, les Ogres menacent dangereusement\_les forteresses-États naines tandis que souvent\_les Gobelins prolifèrent dans les bas-fonds des\_plus grandes villes ou bien s’organisent en tribus\_de pillards dans les contrées sauvages.</p><p>S’il est vrai que les Peaux vertes sont craintes\_et méprisées, il n’est pas rare pour autant de les\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">croiser en nombre restreint dans certaines villes\_</span>cosmopolites, négociant leurs services en tant\_que mercenaires, voleurs ou gardes du corps,\_la nature les ayant pourvues de formidables\_capacités physiques prêtes à être monnayées.</p><p>Les Peaux vertes partagent une même voie de\_peuple, mais les multiples ethnies composant ce\_groupe disposent de leurs propres voies culturelles. En revanche, contrairement aux autres\_peuples présentés jusque-là, les modificateurs de\_caractéristique de peuple, les traits spécifiques\_ne sont pas communs à tout le peuple des Peaux\_vertes mais détaillés pour\_ chacune des cultures,\_ogre, orque ou gobeline.</p>"
      source: ""
      origin: Livre du Joueur p.95
      slug: ""
