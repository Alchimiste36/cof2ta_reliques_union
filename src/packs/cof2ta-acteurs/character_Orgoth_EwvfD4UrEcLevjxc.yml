  - folder: BF5UormkBEDrCFHs
    name: Frappe déloyale
    type: capacity
    img: icons/skills/melee/sword-damaged-broken-orange.webp
    system:
      description: "<p>Une fois par adversaire, <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">après avoir manqué une\_attaque de contact</span></strong></span>, le PJ peut annoncer que cette\_attaque était en réalité une frappe déloyale : le\_coup avait pour objectif de détourner l’attention\_de l’adversaire, le temps pour le PJ de placer un\_coup vicieux.</p><p>À l’issue d’un test opposé dont\_la nature est précisée ci-dessous, le personnage\_peut réaliser l’une des manœuvres suivantes :\_</p><p><strong>aveugler</strong> (DEX contre CON), <strong>désarmer</strong> (FOR\_ou DEX contre FOR) ou <strong>repousser</strong> (FOR contre\_FOR) – voir page 110 pour plus d’informations\_sur le résultat de ces manœuvres.</p>"
      source: ""
      origin: Livre du Joueur p.93
      slug: ""
      inGame: >-
        <p>La première action permet d'activer la capacité et de faire
        apparaitre les 4 autres Actions. Chaque action permet de réaliser le
        test opposé de la manoeuvre.</p>
