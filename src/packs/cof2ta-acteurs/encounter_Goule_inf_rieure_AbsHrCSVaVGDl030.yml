  pasteData: ''
  details:
    category: undead
    size: medium
    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: "<p>«Goule» est une appellation générique qui\_désigne toute créature ayant été préalablement\_mordue par une autre goule, processus qualifié\_d'engoulement. Les goules sont le fruit d'un\_rituel oublié de la nécromancie et rares sont\_les mages assez puissants - ou assez fous - pour\_le mener et en contrôler les conséquences.</p><p>Lorsqu'une créature devient une goule, sa\_peau se flétrit et prend une couleur violacée\_tandis que ses lèvres se retroussent au point\_de disparaître presque totalement, révélant\_des dents en nombre anormalement élevé\_et tranchantes comme une lame. Les griffes\_poussent de façon démesurée tandis que les\_yeux prennent une teinte blanche sanieuse.\_</p><p>Les goules sont des créatures non vivantes\_d'un genre singulier. En effet, elles ne saignent\_pas, sont insensibles à la douleur, dépourvues\_d'intelligence et les effets mentaux (tels\_que les sorts d'envoûtement) n'ont aucune\_prise sur elles. Cependant, elles partagent\_certaines caractéristiques avec les créatures\_vivantes: elles respirent (et peuvent donc se\_noyer), ont besoin de se nourrir et peuvent\_être contaminées par des maladies mortelles.</p><p>Le moyen le plus conventionnel de tuer une\_goule est de lui trancher la tête.\_Lorsqu'elles sont frappées par les rayons du soleil, les goules «s'endorment» et se mettent à\_rêver. Elles perdent presque toute combativité\_et repensent à leur vie avant l'engoulement,\_reprenant presque leur apparence d'origine.</p>"
    languages: []
    properties: ''
