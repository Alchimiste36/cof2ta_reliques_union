    notes:
      private: ''
      public: "<p>Une dryade – également appelé esprit de la\_forêt – est une sorte d'arbre vivant ou un\_amalgame de végétaux ayant pris une forme\_grossièrement humanoïde. C'est la reine\_sylvaine Eliseii qui a réveillé ces créatures\_avant que la reine Ora ne renouvelle l'exploit\_quelques décennies plus tard.\_</p><p>Aujourd'hui, les dryades sont retournées à\_leur hibernation séculaire mais leur essence est\_toujours présente dans les forêts de Duhann\_et de Daëdenn. Il n'est pas exclu qu'un\_druide ou un sage suffisamment puissant soit\_capable d'en éveiller de nouvelles, quels que\_soit ses dessins.</p>"
