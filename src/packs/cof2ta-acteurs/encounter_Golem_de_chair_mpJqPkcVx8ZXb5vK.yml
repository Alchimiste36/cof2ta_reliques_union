  pasteData: ''
  details:
    category: humanoid
    size: large
    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: "<h4>Golem de chair</h4><p>Monstre à la fois pitoyable et effrayant, le\_golem de chair est une créature imposante\_mesurant presque 2,50 mètres constituée de\_l'assemblage grossier de divers cadavres.</p><h4>Les Golems</h4><p>Les golems sont des créatures artificielles\_fabriquées à partir d'éléments étranges ou\_précieux et animés grâce aux arcanes de la\_magie runique. Il faut une connaissance\_pointue de la magie pour réussir un tel exploit\_et rares sont les mystiques à en être capables.</p><p>Les golems décrits ici correspondent à des\_gardiens infatigables auquel on confie la\_mission de garder un trésor ou un passage\_pour l'éternité. Généralement, un mot de\_passe prononcé à voix haute ou un symbole\_brandi devant soi permet d'accéder au lieu\_protégé en toute sécurité.</p><p>Les golems sont des créatures non vivantes,\_dépourvues d'esprit, ce qui les immunise à\_toute magie qui affecterait la volonté ou les\_émotions.</p>"
    languages: []
    properties: "<p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Résistance :</span></strong></span> le golem de chair divise par deux tous\_<span style=\"white-space: initial; color: var(--color-text-primary); font-size: var(--font-size-14); font-family: var(--font-body)\">les DM élémentaires (feu, froid, électricité, acide).</span></p>"
  wealth:
    gp:
      value: 0
    sp:
      value: 0
    cp:
      value: 0
