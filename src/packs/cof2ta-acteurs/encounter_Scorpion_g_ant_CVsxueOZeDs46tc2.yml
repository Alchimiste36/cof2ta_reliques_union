    system:
      description: "<p>Le scorpion peut désormais\_tenter d’attraper une créature entre ses pinces,\_si elle n’est pas d’une taille supérieure à la\_sienne. </p><p><strong>Lorsqu’il obtient un résultat de 15 à\_20 sur son dé d’attaque, le scorpion attrape\_son adversaire</strong>. </p><p>Au début de son tour, la cible\_saisie doit faire <strong>un test de FOR en opposition</strong>\_avec le scorpion, en cas de succès, elle réussit à\_se libérer, sinon elle est <strong>étourdie</strong> (pas d’action\_et -5 en DEF) et le scorpion maintient l’étreinte.\_</p><p>Lorsqu’il maintient une étreinte, le scorpion ne\_peut rien faire pendant son tour, mais il <strong>inflige\_automatiquement [1d6+3] DM</strong> à la créature\_prisonnière. Le scorpion peut lâcher son étreinte\_quand il le veut.</p>"
