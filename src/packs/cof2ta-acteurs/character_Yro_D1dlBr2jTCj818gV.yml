  details:
    biography:
      private: ''
      public: "<p>Mon maître disait qu’on en apprend\_plus sur un cognard en observant son\_ombre qu’en admirant ses éclats. Telle\_était ma destinée: fouiller les ombres, traquer\_la lignée maudite et y vaincre le mal.</p><p>Mais j’ai refusé de m’y perdre.</p><p>Orphelin, j’ai été choisi en raison d’un don\_dont je n’avais pas conscience. Une capacité à\_faire appel à des forces obscures, néfastes. Dans\_un sanctuaire éloigné de toute civilisation, j’ai\_subi un entraînement rude, à la fois spirituel et\_physique, pour éveiller et contrôler ce don qui\_me préparait à ma tâche: purifier mon peuple\_de la lignée maudite.</p><p>J’avais accepté depuis longtemps l’horreur de\_cette mission, persuadé que je condamnais\_mon âme pour notre salut à tous. Mais en fait,\_je n’étais pas prêt.\_</p><p>Lorsque mon maitre me demanda d’arracher\_un pisse-lait des mains de sa mère, reconnu\_coupable d’être le fruit des entrailles d’un\_père maudit, quelque chose s’est brisé en moi.\_L’arrogance de nos convictions m’est apparue\_d’un seul coup. Comment pouvions-nous avoir\_la certitude qu’il avait hérité du sang maudit?\_Qui étions-nous pour juger?</p><p>Je me suis révolté contre mon maître. Dans la\_folie de notre affrontement, je suis tombé dans\_un ravin enneigé. J’ignore par quel miracle j’ai\_survécu, mais je suis là pour en parler.</p><p>Depuis, j’erre à travers le monde à la recherche\_d’un sens à toute cette folie.</p>"
    appearance:
      private: ''
      public: "<p>Yro apparaît bien plus vieux qu’il ne l’est\_réellement. Son affinité avec les forces nécromantiques, mais également les séquelles laissées\_par son affrontement avec le maître de son ordre\_lui donnent l’allure d’un Nain vénérable alors\_qu’il est dans la force de l’âge.\_</p><p>Il porte une barbe blanche tandis que son\_crâne est lisse et chauve. Plusieurs cicatrices lui\_zèbrent le visage, stigmates laissées par sa chute\_mortelle. Il ne se sépare jamais de sa lourde\_masse d’armes à deux mains qu’il manie avec\_une grande dextérité.</p>"
    notes:
      private: ''
      public: ''
    size: medium
    languages:
      - ''
