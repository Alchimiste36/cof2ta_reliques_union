    system:
      description: "<p>Chaque fois que le PJ est la cible d’un sort (à\_l’exception d’un sort de zone), le <strong>joueur lance\_1d4 : sur un résultat supérieur au rang du sort,\_il peut en ignorer les effets.</strong></p>"
