  details:
    biography:
      private: ""
      public: "<p>Insoumise j’étais. Insoumise je resterai.\_</p><p>Je suis originaire des vastes terres sauvages,\_par-delà le massif du Lime. Pendant des\_générations, nos tribus et clans n’ont vécu que\_pour la guerre. À la gloire des chefs. Des milliers\_de morts. Tuer pour satisfaire un honneur qui\_n’est pas le mien ?</p><p>Un jour, j’ai décidé que c’en était terminé.\_Que mon bras ne s’abattrait plus que pour ma\_grandeur. Que mes victimes seraient miennes.\_Que mes choix guideraient mes actes.</p><p>Klo, le chef de ma tribu, n’a pas accepté. Je suis\_fière que mon premier «siya », mon premier\_éclat, ait été sa main tombant au sol, tranchée\_nette du reste de sa petite personne. Bien\_sûr, il m’a fallu fuir sa colère et les appels à la\_vengeance. Survivre à la Birkanie. Gagner la\_cité des Sang-mêlés et y apprendre les codes de\_la « civilisation» des Terres d’Arran. Mercenaire\_est devenu mon métier.</p><p>Depuis, je voyage à travers le monde à la\_recherche de défis dignes de mon ambition.\_Je suis Nizra, et j’ai décidé d’écrire ma propre\_légende.</p>"
    appearance:
      private: ""
      public: "<p>Nizra est très grande, même pour une ogresse.\_Elle mesure plus de 2,60 m sans compter ses\_cornes, qui sont larges et – de façon remarquable - dirigées vers l’arrière. Elle les taille\_régulièrement pour leur donner un aspect\_dentelé.</p><p>Sa peau bleue est sombre, elle est constellée de\_nombreuses cicatrices à la teinte plus claire,\_presque blanche. Enfin, ses yeux sont d’un rouge\_sombre des plus effrayants.</p><p>Son armure de cuir ressemble plus à un ensemble\_de pièces de cuir placées sur son corps de façon\_stratégique pour couvrir ses organes vitaux sans\_contraindre ses mouvements.</p>"
    notes:
      private: ""
      public: ""
    size: medium
    languages:
      - ""
