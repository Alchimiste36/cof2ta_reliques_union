  - folder: ER8GmcWWezCOADVe
    name: Voie Culturelle des Ogres
    type: path
    img: modules/cof2ta_reliques_union/assets/cof2ta_icones/cof2ta_pv_ogre2.webp
    _id: pJCOC1Arnl0mXMuJ
    system:
      description: "<h2>Les\_Ogres</h2><p>Les ogres comptent parmi les humanoïdes les\_plus grands et puissants des Terres d’Arran.\_Massifs, musclés, arborant de larges cornes\_sur leur crâne et souvent disgracieux, ils sont\_rarement aperçus en dehors des régions du sud,\_de l’Orient ou des frontières les plus orientales\_de l’Ourann. Ils sont tellement craints que la\_plupart des communautés les chassent à vue.\_</p><p>Cependant, il arrive que des sociétés commerciales fassent appel à ces êtres d’exception en tant\_que main-d’œuvre ou mercenaire. Leur vie n’est\_pas forcément facile au milieu de la civilisation,\_mais un simple regard ou grognement suffit à\_faire taire toute forme de velléité à leur encontre.</p><p>Sur le champ de bataille, l’ogre fait partie des\_adversaires les plus grands: bien que sa taille en\_fasse une cible facile, toute personne en ayant\_déjà combattu un – et survécu pour en parler\_– livrera le témoignage glaçant d’une force de la\_nature capable de combattre et de tuer malgré\_des blessures manifestement mortelles.</p><h4>Modificateurs des Ogres</h4><p>Atouts : <strong>+4 CON, +2 FOR</strong></p><p>Faiblesses : <strong>-4 DEX, -2 INT, -2 CHA</strong></p><p>Âge de départ à l’aventure : <strong>15 ans et plus</strong></p><p>Espérance de vie : <strong>60 ans</strong></p><p>Taille : <strong>entre 2,00 m et 2,50\_m</strong></p><p>Poids : <strong>entre 200 kg et 340 kg</strong></p><p>Trait des Ogres : <strong>Endurant</strong></p><p><strong>Noms :</strong> les noms ogres sont assez mixtes. Pour\_les autres peuples, il est impossible de faire la\_différence entre une femelle et un mâle sur la\_simple base du prénom.</p><p><em>Anozur, Arog, Brakik, Broukork, Daduzar,\_Droozug, Gaarag, Glarok, Grezog, Klikor,\_Murag, Muzig, Nezig, Nizir, Treirig, Uzur,\_Vaukag, Vrork, Vrigruk, Vroxarag, Vrugark,\_Xakohr, Xogark, Vrokurek, Wigrut.</em></p>"
      source: ""
      origin: Livre du Joueur p.94
      slug: ""
      subtype: people
      capacities:
