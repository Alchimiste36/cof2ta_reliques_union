  details:
    biography:
      private: ''
      public: "<p>Je suis le fruit de l’amour désapprouvé entre\_une Humaine du royaume d’Yrlanie et un\_Sylvain de Daëdenn. Contrairement à de\_nombreux Semi-Elfe, je n’ai pas l’impression\_d’avoir eu une enfance difficile. Du moins,\_jusqu’au décès de ma mère.</p><p>Ce drame a été comme un signal du destin. Un\_appel à comprendre et à appréhender une autre\_part de mes origines. J’ai tout quitté et remué\_ciel et terre pour rejoindre mon père. C’est lui\_qui m’a initiée à l’art exigeant de l’archerie.</p><p>Je ne suis pas sûre de me sentir à ma place à\_Daëdenn, mais j’ai l’intention de connaître mon\_héritage au mieux. Je suis une Semi-Elfe, à la fois\_Humaine et Elfe. Je suis la preuve que l’amour\_ne connaît aucune frontière et j’en suis fière.</p>"
    appearance:
      private: ''
      public: "<p>Élora revendique ses origines et son métissage. </p><p>Elle affiche un style vestimentaire qui tranche\_avec la sobriété sylvaine, mêlant cuir, tissage de\_fibres végétales et fourrure. Ses cheveux, roux,\_sont noués en une multitude de fines tresses qui\_encadrent parfaitement son doux visage à la peau\_mate. Elle a les yeux bleus et les oreilles ornées\_de bijoux confectionnés à partir de plumes ou\_de petites pierres colorées.</p>"
    notes:
      private: ''
      public: ''
    size: medium
    languages:
      - ''
