    system:
      description: "<p>En chantant, une harpie\_peut fasciner une créature. </p><p>Toutes les créatures\_humanoïdes dans un <strong>rayon de 30 mètres</strong>\_(sauf les harpies) doivent réussir un <strong>test de\_SAG difficulté 10 ou succomber à la magie.</strong>\_</p><p>Le chant affecte l'esprit, aussi <strong>se boucher les\_oreilles apporte-t-il un bonus de +5 au test de\_SAG</strong> mais n'immunise pas contre le pouvoir (se\_boucher les oreilles avec les mains remplace\_une action d'attaque à chaque tour). </p><p>Une\_créature fascinée s'approche de la harpie et\_reste sans défense tant que la harpie chante\_et pendant encore un tour complet après la\_fin du chant. Une créature qui résiste au chant\_des harpies y est immunisée pour une durée\_de 1 heure.</p>"
