      description: "<p><strong>Sur une attaque magique réussie</strong> (portée: 20 m), le\_PJ <strong>crée un double translucide</strong> de la cible pendant\_<strong>[5 + Mod. de SAG] tours</strong>. </p><p><strong>Le double est sous le\_contrôle du PJ.</strong> Il possède <strong>les mêmes caractéristiques</strong>\_que l’original mais seulement <strong>la moitié de ses PV,\_et tous les DM qu’il inflige sont divisés par deux</strong>.\_</p><p>Il disparaît si ses PV tombent à 0. Une créature ne\_peut être dédoublée qu’une fois par combat.</p>"
