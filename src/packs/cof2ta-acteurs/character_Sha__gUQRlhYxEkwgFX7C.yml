  details:
    biography:
      private: ""
      public: "<p>Je suis née dans les faubourgs de la cité des\_Sangs-mêlés. Là-bas, le crime est plus qu’un\_art de vivre, c’est une nécessité.</p><p>Dans ce monde où les liens de sang n’ont aucune\_importance, je me suis créée une famille de\_toute pièce dont les membres se comptaient\_sur les doigts d’une main : Loshi un pickpocket\_gobelin, Tark le Nain alcoolique, soi-disant\_ancien soldat, et Vina et Solilas, des Humains\_et amis d’enfance.</p><p>Une bande inséparable qui - à défaut d’être\_loyale - adoucissait un peu le goût de la vie. Et\_puis il y a eu le casse manqué: le plan semblait\_juteux, une caisse d’œufs de dragons volés en\_provenance d’Akrähyng qui devait nous assurer\_une retraite dorée.</p><p>Ça a mal tourné. Pour sauver leurs peaux des\_griffes de la Rosa, un gang très influent et se\_prétendant « propriétaire légitime des œufs\_volés», Vina et Solilas m’ont balancée. J’ai quand\_même senti le coup venir et j’ai eu le temps de\_m’enfuir en sautant à bord du premier navire\_marchand, sans me soucier de sa destination.</p><p>Savoir que Solilas a perdu une main dans\_l’histoire ne rend pas sa trahison ni la fin de\_notre amitié plus plaisante. Qu’aurais-je fait\_à sa place? J’espère ne jamais être soumise un\_jour à un tel choix.</p>"
    appearance:
      private: ""
      public: "<p>Shaï est une gobeline de petite taille (pour son\_peuple), svelte et féline, à la peau foncée presque\_bleutée. Elle a les traits plutôt doux et les yeux\_d’un blanc nacré. Ses oreilles sont percées et\_ornées de plusieurs bijoux confectionnés à partir\_de petits ossements et dents d’animaux. Elle\_arbore une longue chevelure noire tressée en\_une unique natte qu’elle ramène généralement\_en avant, par-dessus son épaule.</p><p>La peau de ses épaules, de sa poitrine et de son\_dos est parsemée de tâche naissance rappelant\_les motifs des fourrures de guépard.</p>"
    notes:
      private: ""
      public: ""
    size: medium
    languages:
      - ""
