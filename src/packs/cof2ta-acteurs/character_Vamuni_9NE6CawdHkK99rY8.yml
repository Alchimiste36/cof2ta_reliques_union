    system:
      description: "<h2>L’ordre du Talion</h2><p>L’ordre du Talion, dont le nom est tiré de\_l’ancienne monnaie naine, représente la caste\_commerçante. Marchands, négociants, marins,\_banquiers ou convoyeurs sont des exemples des\_professions du Talion. Très influent dans toutes\_les couches des forteresses-États, c’est également\_l’ordre des politiciens et des diplomates.</p><p>Il se murmure que la caste serait également\_dotée d’une société secrète d’assassins ‒ la\_Loge noire ‒ chargée d’exécuter les contrats et\_basses besognes illégales au nom des intérêts\_de l’ordre. Cette secte est une légende qu’on\_jure fantasque ou éteinte. Pourtant, le Talion\_parvient mystérieusement toujours à ses fins…</p>"
