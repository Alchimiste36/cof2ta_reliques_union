  details:
    biography:
      private: ''
      public: "<p>J’ai été acquise par l’ordre dès mon plus jeune\_âge, alors que je n’étais qu’une traîne-poussière d’Azar-Ün. Pour la pisseuse que j’étais,\_mon tuteur, le seigneur Rom, est ce que j’ai\_connu de plus proche d’un paternel. Il m’a\_soignée, instruite et forgée. Pour devenir son\_outil : une espionne.</p><p>Il n’a guère eu le temps d’avoir un retour sur\_investissement: alors que je venais tout juste\_de terminer ma formation, le Bouclier a fait\_irruption dans nos vies. Perquisitionné nos\_foyers, saisi nos biens, emprisonné mon maître.\_Je ne connais pas les détails, les ennemis de Rom\_étaient nombreux à conspirer à sa chute.</p><p>J’ai tout juste eu le temps de fuir Azar-Ün pour\_ne pas tomber entre les pognes de la milice.\_Officiellement, les espions du Talion n’ont\_aucune existence; il aurait été plus simple de\_me raccourcir que de compromettre les secrets\_de l’ordre.</p><p>Depuis, j’erre en direction des contrées nordiques de l’empire Assanide. Je ne suis plus une\_pisseuse sans défense: je sais que je pourrai me\_faire une place dans cette société. Et peut-être\_revenir à Azar-Ün un jour. Pour sortir Rom de\_ses geôles. Ou me délecter de sa chute. Je ne suis\_toujours pas sûre de ce qui me plairait le plus…</p>"
    appearance:
      private: ''
      public: "<p>Vamuni est jeune pour une Naine, âgée d’à\_peine une trentaine d’année. Ses longs cheveux\_noirs encadrent un visage gracieux, durci par des\_sourcils perpétuellement froncés. Elle a la peau\_mate et un regard profond, couleur émeraude.</p>"
    notes:
      private: ''
      public: ''
    size: medium
    languages:
      - ''
