    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: "<p>Un fantôme est la manifestation physique\_de l'âme d'une créature qui n'a pas trouvé\_le repos. Il s'agit généralement d'une race\_pensante humanoïde. Les fantômes peuvent\_être plus ou moins dangereux en fonction\_de la volonté et de la puissance de l'être qui\_se manifeste ou de sa haine pour les vivants.\_</p><p>Certains fantômes mineurs sont peu dangereux tandis que les fantômes les plus haineux\_sont beaucoup plus difficiles à vaincre.\_</p><p>Dans tous les cas, il est rare que vaincre la\_manifestation du fantôme soit suffisant pour\_s'en débarrasser à long terme, et seul le recours\_à un exorciste ou une action qui permet à\_l'âme tourmentée de trouver le repos mettra\_fin à sa réapparition systématique au bout\_de 24 heures.</p><p>En contrepartie, les fantômes sont généralement liés à un lieu, un objet ou une personne\_et s'éloigner est souvent une action suffisante\_pour lui échapper.</p>"
