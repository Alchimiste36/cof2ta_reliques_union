  pasteData: ""
  details:
    category: living
    size: large
    description:
      private: ""
      public: ""
    notes:
      private: ""
      public: "<p>L'hydre est une grande créature reptilienne\_de presque deux tonnes pourvue de multiples\_têtes. Son grand corps quadrupède est lourd\_et massif. De son tronc émerge plusieurs\_encolures terminées par des têtes draconiques\_aux mâchoires larges et mortelles.</p>"
    languages: []
    properties: "<ul><li><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Couper une tête :</span></strong></span> l'hydre est un adversaire\_très dangereux à cause de son nombre élevé\_d'attaques. Pour réduire le nombre de têtes, un\_personnage peut tenter de la décapiter. Dans\_ce cas, l'attaque souffre d'une pénalité de -5\_et elle doit infliger au moins 10 points de DM\_en une seule fois. En cas de réussite, la tête est\_coupée et les PV du monstre baissent de 10.\_Toutefois la guérison accélérée de l'hydre fait\_repousser la tête en 2 tours (sauf DM de feu).\_En cas d'échec, l'hydre ne subit aucun DM.</p></li><li><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Ajouter des têtes :</span></strong></span> pour chaque tête supplémentaire, ajoutez 10 PV, +1 en attaque et une\_attaque supplémentaire. Le NC augmente\_de +1.</p></li></ul>"
