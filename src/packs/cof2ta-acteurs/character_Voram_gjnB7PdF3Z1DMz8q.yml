    img: icons/skills/social/diplomacy-unity-alliance.webp
    system:
      description: "<p>Les Errants et les miséreux se reconnaissent\_instinctivement et font parfois preuve d’un\_grand sens du sacrifice pour leurs semblables.\_</p><p><strong>Lorsqu’un autre miséreux a la possibilité d’aider\_le PJ, lancez 1d6</strong>. De 1 à 4, le PNJ apporte son\_<strong>aide totale et inconditionnelle</strong> (sans attendre de\_rémunération et sans tenir compte du danger). </p><p>Il peut faire jouer ses propres contacts et alliés\_pour mener à bien la tâche si nécessaire, mais ces\_intermédiaires peuvent avoir des exigences que\_les PJ devront peut-être satisfaire. <strong><span style=\"text-decoration:underline\">Cependant,\_le MJ lance également 1d6 en secret : sur un 6,\_le PNJ fomente en réalité un sale coup afin de\_se faire un peu d’argent…</span></strong></p>"
      source: ''
      origin: Livre du Joueur p.85
