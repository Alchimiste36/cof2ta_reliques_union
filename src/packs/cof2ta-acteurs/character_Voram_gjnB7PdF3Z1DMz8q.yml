      inGame: "<p>Deux tables aléatoires sont configurées pour effectuer les jets :\_</p><p>@UUID[RollTable.PjL819g8sFQldrGm]{Nain PJ : Solidarité des Errants} pour le Joueur et\_@UUID[RollTable.Ra4gWMWihAd3AwuS]{Nain MJ : Solidarité des Errants} pour le test du MJ.</p><p>Cette capacité permet de lier une autre capacité pour le choix de la capacité de rang 2\_@UUID[Item.tN0UxRTGCXRov2Ux]{Passé révolu}</p>"
