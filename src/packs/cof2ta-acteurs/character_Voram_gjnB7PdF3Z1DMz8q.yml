  details:
    biography:
      private: ''
      public: "<p>Je suis né Errant. Comme nombre des miens.\_J’étais destiné à ne connaître que la misère\_et l’humiliation. La promesse d’une vie de\_traine-poussière à engraisser la cité-forteresse\_de Kernor’Draz contre quelques misérables\_piécettes.</p><p>Par chance, ma route a croisé celle d’Esekren.\_Un boitard du Bouclier, déchu pour une raison\_qu’il n’a jamais voulu cracher. Moi, j’étais un\_jeune poilu bouillant d’hormones et de colère.</p><p>Je pense qu’il a vu quelque chose en moi. Il a\_décidé de m’apprendre l’art du tranchoir. J’étais\_bon. Je me sentais prêt à étriper n’importe quel\_cognard. J’en mourais d’envie en vérité.</p><p>Mais Esekren aurait peut-être dû commencer\_par m’apprendre à la fermer. Je crois que seul le\_temps peut nous apprendre ce genre de chose.\_</p><p>Un regard de trop, une remarque sur les cuisses\_de ma sœur, et un trollard de la Forge s’est\_retrouvé avec les tripes à l’air avant d’avoir le\_temps de finir sa phrase. Ma tête a été mise à\_prix avant la fin de la journée. Pour sauver les\_miens, j’ai pas eu d’autre choix que de fuir à\_dos de grognar vers l’Est.</p><p>Un jour, je reviendrai. Le vent de la révolte\_souffle chez les Errants. Le vent du changement.</p>"
    appearance:
      private: ''
      public: "<p>Voram est un Nain robuste, au corps massif\_forgé par le pénible travail de la terre. Il porte\_une barbe dense et rousse, ornée de quelques\_tresses discrètes. Il a le teint pâle et les yeux bleus.</p><p>Il porte une lourde hache à deux mains ainsi\_<span style=\"color: var(--color-text-primary); font-size: var(--font-size-14); font-family: var(--font-body)\">qu’une armure de cuir complète, renforcée de\_</span>fines plaques de métal. Il ne se sépare jamais\_de son cochon de combat, pour lequel il a\_bricolé une selle sur mesure. Il combat alors\_généralement avec une lourde lance en métal\_capable de décimer ses adversaires lors de charges\_dévastatrices.</p>"
    notes:
      private: ''
      public: ''
    size: medium
    languages:
      - ''
