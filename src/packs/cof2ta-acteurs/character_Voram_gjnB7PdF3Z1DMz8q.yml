  - folder: Int0t6v1ZMCZd7Mw
    name: Voie Culturelle des Errants
    type: path
    img: >-
      modules/cof2ta_reliques_union/assets/cof2ta_icones/cof2ta_nain_errant2.webp
    system:
      description: "<h2>L’ordre des Errants</h2><p>Il y a traditionnellement deux façons de devenir\_errant: être déchu de son ordre à la suite d’une\_faute grave ou d’un déshonneur majeur, ou\_bien naître d’un père errant. Dans tous les cas,\_il s’agit d’un sort peu enviable et il est difficile,\_voire impossible, d’espérer s’élever de son\_vivant et rejoindre l’un des ordres prestigieux\_et traditionnels du peuple nain.</p><p>Les Errants ne constituent pas un ordre au sens\_strict du terme, tout au plus une caste. Aux yeux\_des Nains, il s’agit de la lie de la société, déchue\_de la plupart de ses droits. Par exemple, il leur est\_interdit de tailler la pierre, de faire le commerce\_de l’or ou encore de porter des armes de guerre.</p><p>Les Errants sont des fermiers, des paysans, des\_agriculteurs qui vivent en marge des forteresses-États et ne s’y rendent que pour y vendre\_le fruit de leurs récoltes à des prix misérables. Ils\_sont dénigrés et bafoués au quotidien. Pourtant,\_ils constituent un maillon indispensable à la\_survie des Nains car ils sont les principaux producteurs de denrées alimentaires. Régulièrement\_persécutés et torturés pour l’exemple ou pour\_mater par anticipation toute velléité de révolte,\_la rudesse de leur vie maintient entre Errants\_une union et une solidarité plus fortes qu’au\_sein de n’importe quel ordre.</p>"
      source: ''
      origin: Livre du Joueur p.85
      slug: ''
      subtype: people
      capacities:
        - Actor.gjnB7PdF3Z1DMz8q.Item.KXo9P5rP11P11uxN
