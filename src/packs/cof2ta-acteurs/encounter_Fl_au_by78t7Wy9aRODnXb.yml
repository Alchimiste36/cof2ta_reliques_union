  pasteData: ""
  details:
    category: living
    size: colossal
    description:
      private: ""
      public: ""
    notes:
      private: ""
      public: "<p>Également appelés géants ou titans, les\_Fléaux sont d'immenses créatures animées\_par\_ l'énergie primordiale du monde. Ils\_dominaient les Terres d'Arran avant même\_l'arrivée des premiers Elfes et ont ravagé le\_monde par leurs guerres de territoires avant\_de s'apaiser et de s'endormir.\_</p><p>Les légendes racontent qu'ils se sont éveillés\_une fois et que leur colère à la découverte\_des civilisations émergentes avait manqué\_<span style=\"white-space: initial; color: var(--color-text-primary); font-size: var(--font-size-14); font-family: var(--font-body)\">d'éradiquer toute forme de vie pensante.</span></p><p>Nul ne sait comment ils ont été de nouveau\_plongés dans leur sommeil sans fin.\_Le monde a depuis oublié leur existence.\_Mais s'il est vrai que les eaux, les roches et\_la végétation ont recouvert leur corps, ils ne\_sont pas morts. Ils dorment, simplement.</p><p>Les Fléaux sont des créatures immenses, mesurant jusqu'à près de 20 mètres de haut –\_ voire\_bien plus, les légendes traitant de certains\_Fléaux comme de véritables\_ montagnes –, à\_la forme humanoïde mais aux traits bestiaux.\_</p><p>Ils sont habités d'une rage ancestrale et dotés\_d'une force encore plus considérable que ce\_que laisse envisager leur stature. Certains\_disposent de pouvoirs magiques dépassant\_l'entendement.</p><p><strong><span style=\"text-decoration: underline;\">Personnalisation :</span></strong> vous pouvez ajouter des\_voies de profil ou de prestige pour un bonus\_de +1 au NC par voie. Il n'y a virtuellement\_aucune limite au NC d'un Fléau mais ajoutez\_un rang de boss pour deux voies pour ne pas\_surcoter sa puissance.</p>"
    languages: []
    properties: ""
