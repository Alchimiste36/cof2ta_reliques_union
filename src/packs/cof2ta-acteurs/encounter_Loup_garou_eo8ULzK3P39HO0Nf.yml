  pasteData: ""
  details:
    category: humanoid
    size: medium
    description:
      private: ""
      public: ""
    notes:
      private: ""
      public: "<p>Malgré les légendes et les superstitions, la\_lycanthropie n'est pas une maladie mais\_plutôt une forme de rituel magique. En\_fusionnant son essence avec celle d'un animal\_totem, de rares mystiques ont pu devenir des\_créatures hybrides mythiques, mi-animal\_mi-humanoïde.</p><p>Ces individus sont extrêmement rares et\_relèvent de la légende. Les raisons les ayant\_poussés à un tel acte n'appartiennent qu'à\_eux : par exemple, l'esprit du roi sylvain\_Lotomn s'est lié à celui d'un loup après sa\_mort pour continuer à veiller sur sa reine\_Eliseii. D'autres contes elfiques évoquent des\_druides bannis par leur cercle et ayant été\_contraints de se lier à des animaux inférieurs,\_tels que les rats.</p><h4>Le loup-garou</h4><p>Un loup-garou peut changer de forme à\_volonté et possède deux formes : la forme\_classique de loup et une forme hybride\_mi-homme, mi-loup (ou de loup redressé\_sur ses pattes arrière), plus dangereuse. Le\_loup-garou décrit ici est un profil de base\_mais vous pouvez le rendre plus puissant\_en lui ajoutant des voies de profil ou, plus\_simplement, des niveaux de boss.</p>"
    languages: []
    properties: ""
