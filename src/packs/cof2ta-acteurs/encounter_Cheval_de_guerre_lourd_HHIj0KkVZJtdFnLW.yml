    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: "<p>Le cheval de guerre ne souffre pas des pénalités\_du cheval de selle en combat : son score\_d'attaque passe à +5. </p><p>Un cheval de guerre\_est apte à porter une barde, un ensemble de\_protections pour le cheval :</p><ul><li><p>Un caparaçon de\_mailles augmente la DEF du cheval de +3\_pour un prix de 100 pa. </p></li><li><p>Une barde de plaques\_de métal apporte un bonus de +5 en DEF pour un prix de 300 pa. Les bardes octroient\_un malus en Init. au cheval et à son cavalier\_égal au bonus de DEF.</p></li></ul><p><strong>Un cheval sauvage, non dressé</strong>, se défend\_comme s'il était un cheval de guerre léger. </p><p><strong>Un cheval de guerre lourd</strong> voit son NC\_augmenter de +1 : il gagne +2 en DEF, en\_attaque, aux DM et augmente ses PV de 20\_(boss de rang 1).</p>"
    languages: []
    properties: "<p><strong>Monture :</strong> la créature double son Mod. de FOR\_pour porter une charge.</p>"
