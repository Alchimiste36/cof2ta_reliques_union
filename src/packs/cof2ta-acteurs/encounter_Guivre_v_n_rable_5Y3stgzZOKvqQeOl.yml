    description:
      private: ""
      public: ""
    notes:
      private: ""
      public: "<p>Une guivre est une grande créature ailée\_rappelant une immense chauve-souris. Très\_agressif, ce prédateur essentiellement nocturne\_piste ses proies à l'ouïe grâce à ses grandes\_oreilles. Tout comme la chauve-souris, il peut\_pousser des cris stridents dont la réverbération\_des sons dans l'environnement lui permet de\_se repérer en absence de lumière. Cependant,\_contrairement au petit mammifère il n'est\_pas aveugle.</p><p>Certaines guivres ont été dressées pour servir\_de monture. L'exercice est périlleux, mais s'il\_est vrai qu'elles ne peuvent égaler en vitesse\_ou endurance les dragons d'Akrähyng, elles\_sont plus robustes et rustiques.</p>"
