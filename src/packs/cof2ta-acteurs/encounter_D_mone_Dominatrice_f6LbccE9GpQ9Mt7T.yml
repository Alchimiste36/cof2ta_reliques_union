  - folder: uvHtoSiBBvs1nfqu
    name: Absorption d'énergie
    type: capacity
    img: icons/creatures/abilities/fangs-teeth-bite.webp
    _id: hx8JOiYVMCofxd9l
    system:
      description: "<p>Cette créature\_peut aspirer l'énergie vitale de sa victime en\_l'enlaçant ou en l'embrassant.</p><p>Si la victime n'est\_pas consentante, la créature\_<strong>doit auparavant\_réussir un test d'attaque au contact</strong> puis <strong>gagner\_un test opposé de FOR</strong>.</p><p>La victime de l'absorption\_d'énergie est <strong>affaiblie</strong> (utilise un d12 aux tests)\_<strong>pour 24 heures</strong> mais ressent une jouissance\_extatique lors de ce contact.</p><p>Elle ressent <strong>le besoin\_impérieux de le renouveler pendant les 24 heures\_suivantes</strong> à moins de réussir <strong>un test de SAG difficulté 18</strong>. Si la victime résiste, elle est immunisée\_à cet effet pour les prochaines 24 heures.</p><p>En plus\_des autres effets, si la créature le souhaite, à\_chaque fois qu'elle absorbe l'énergie, <strong>elle peut\_infliger 1d6 DM et guérir d'autant</strong> (les points de\_vie acquis au-delà de son score maximum de PV\_sont perdus après dix minutes).</p>"
      source: ''
      origin: ''
      slug: ''
      inGame: >-
        <p>La première action permet de réaliser l'attaque initiale pour
        l'absorption d'énergie. N'oubliez pas de faire un test de FOR
        opposé.</p><p>La deuxième action permet de réaliser le test de
        sauvegarde pour résister à la tentation tous les 24 heures.</p><p>La
        troisième action permet de jeter des DM et de les appliquer à la cible
        et en soin pour la créature. Attention : les Soins ne peuvent pas
        dépasser le maximum des PV de la créature. Notez à part les PV en
        excès.</p>
