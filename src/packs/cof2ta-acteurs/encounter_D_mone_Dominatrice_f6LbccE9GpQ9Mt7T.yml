  pasteData: ''
  details:
    category: humanoid
    size: medium
    description:
      private: ''
      public: ''
    notes:
      private: "<p>Les démons sont des créatures qui ne sont pas\_originaires des Terres d'Arran.\_ Maléfiques,\_elles habitent une autre dimension, l'espace\_qui se tisse entre les ombres et les cauchemars,\_ce lieu perceptible uniquement du coin de\_l'œil ou dans nos terreurs les plus abjectes. </p><p>Leurs moyens d'action sur le plan matériel\_sont limités et elles cherchent\_ continuellement\_à pervertir les âmes faillibles des mystiques\_pour s'y incarner et prendre possession de leur\_corps. Ces dépouilles mortelles amoindrissent\_considérablement leur puissance démoniaque,\_mais les démons n'ont d'autre choix que d'y\_recourir s'ils veulent œuvrer sur les Terres\_d'Arran.</p><p>Le royaume des nécromants était jusqu'à\_récemment leur plus sinistre réussite puisque\_trois princes-démons avait réussi à profaner\_les corps de puissants sorciers et y faire régner\_leur loi démente. Ce qu'il advint d'eux fait\_partie de la légende de Redwin.</p><p>Les démons sont de nature variable et, s'il\_est vrai qu'ils sont presque tous dépositaires\_d'un pouvoir néfaste et incommensurable,\_certains ont une préférence pour le contrôle\_des âmes des mortels tandis que d'autres\_disposent d'une force inimaginable. Fort\_heureusement, rares sont les démons à avoir\_réussi à s'incarner complètement dans les\_Terres d'Arran. Ils restent cependant une\_menace permanente.</p><p>Lorsqu'un démon prend possession du corps\_d'un mortel, il marque ce dernier de stigmates\_repoussants qui trahissent sa possession, tels\_que des yeux sombres où l'on ne voit plus\_les pupilles, des veines noires apparentes\_sous leur peau ou encore une haleine putride\_trahissant des chairs en état de décomposition\_avancée. Souvent, le démon se contente de ces\_modifications, mais il peut arriver de façon\_rarissime qu'il arrive à s'incarner totalement,\_modifiant grandement son apparence pour\_révéler sa véritable nature.</p>"
      public: "<p>Bien qu'asexuée, la dominatrice apprécie\_de prendre la voix et le corps de belles\_humanoïdes pour dominer et corrompre les\_individus mâles. Elle préfère avoir recours\_à la ruse et la domination psychologique\_plutôt qu'au combat pour tuer et assouvir\_ses instincts de destruction.</p>"
    languages: []
    properties: ''
