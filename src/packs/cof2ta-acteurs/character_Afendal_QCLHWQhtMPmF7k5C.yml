  details:
    biography:
      private: ''
      public: "<p>Jamais je ne renierai mes racines. Jamais je\_ne pourrai vivre en paix sous un autre ciel\_que le feuillage des arbres de la forêt de\_Duhann. Et pourtant, je m’interroge… Au-delà\_de nos bois, le monde évolue et le chaos ronge\_chaque année un peu plus les orées. Rester ici\_et protéger les ruines des anciens temps est un\_devoir sacré, mais comment accomplir notre\_tâche si nous restons aveugles aux dangers qui\_pourraient nous frapper ?</p><p>Nous avons déjà tendu la main aux Humains.\_Depuis plusieurs années, notre sang coule autant\_que celui des habitants de feu la cité d’Eysine.\_Et pour quoi? Quelle est la signification de\_tout ceci ? Ces Humains ne font que lutter\_contre d’autres Humains. Il y a quelque chose\_qui m’échappe.</p><p>Nos sages semblent confiants quant au bien-fondé de nos actes. Je n’en suis pas aussi sûr. Je veux\_comprendre le monde, pour mieux défendre ce\_qui m’est cher.\_</p><p>Le maître de chasse n’acceptera jamais que je\_quitte Duhann. Peut-être pourrais-je demander\_conseil auprès de notre reine, mais je ne survivrai\_certainement pas à la déception que je lirai\_dans son regard si elle ne comprenait pas mes motivations. Tant pis, ma décision est prise :\_je vais quitter Duhann, parcourir le monde,\_trouver un sens à mon devoir. Gommer les\_doutes qui assombrissent mon cœur.</p><p>J’ignore combien de temps cela me prendra.\_Mais les Elfes sont immortels, je ne suis pas\_inquiet.</p>"
    appearance:
      private: ''
      public: "<p>Afendal est un jeune Elfe adulte d’une centaine\_d’années. De taille moyenne, il a de longs cheveux blancs qu’il coiffe généralement en queue\_de cheval. Sa peau, perpétuellement exposée\_aux rayons du soleil, affiche une teinte mate\_tandis que ses yeux sont d’un bleu clair éclatant.</p>"
    notes:
      private: ''
      public: ''
    size: medium
    languages:
      - ''
