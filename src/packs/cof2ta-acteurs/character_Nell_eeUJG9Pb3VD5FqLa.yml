  - folder: TM2vZsQjVMSGf4wH
    name: Enseignement exotique
    type: capacity
    img: icons/weapons/daggers/dagger-magical-glowing-blue.webp
    system:
      description: "<p>Le PJ choisit l’une des formations martiales\_maîtrisées par son personnage ainsi qu’une\_tradition d’un des peuples des Terres d’Arran :\_le PJ peut porter et utiliser uniquement\_ les\_armes ou armures qu’il maîtrise, forgées dans\_cette tradition.</p><blockquote><h4><em><strong>Armes et armures\_traditionnelles</strong></em></h4><p><em>Les objets issus du savoirfaire d’une tradition\_ethnique constituent un\_ensemble de techniques\_de tissage, de confection\_et de forge transmis de\_génération en génération\_entre les artisans des\_différents peuples d’Arran.\_</em></p><p><em>Au final, ces objets\_dépassent le strict cadre\_de l’artisanat. Les objets\_créés en respectant ces\_processus renferment\_des pouvoirs étranges et\_puissants. Ils nécessitent\_un apprentissage long\_pour les maîtriser.\_ Les voies de peuple\_ouvrent toutes au rang\_3 à la maîtrise\_d’une tradition.\_En tant que joueur,\_le moment venu et\_en accord avec votre\_MJ, vous aurez accès\_à certaines de ces\_informations, décrites\_au chapitre «Objets de\_traditions et de légendes»\_du Livre du meneur.</em></p></blockquote>"
