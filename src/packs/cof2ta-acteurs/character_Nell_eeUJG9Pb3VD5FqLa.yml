  details:
    biography:
      private: ''
      public: "<p>Je rêvais de finir ma vie à Majinorr. Je tenais\_plus encore à ma liberté.</p><p>Je suis né à Anthem, la région nord de\_l’empire de Dumn. Orphelin dans un village\_fermier triste, un avenir misérable m’était\_réservé. Par un curieux hasard, j’ai eu la chance\_de croiser le chemin de Maître Iseold, un Mage\_qui a décelé en moi un certain potentiel, une\_prédisposition pour la magie élémentaliste.</p><p>Grâce à une lettre de recommandation de sa\_part, j’ai pu obtenir une place en tant qu’apprenti à l’académie de Majinorr. La faiblesse de\_mon statut social m’a obligé à travailler deux\_fois plus dur que les autres, à mériter encore et\_toujours ma place, à remettre en question en\_permanence mes compétences. Mais j’ai tenu\_bon face aux épreuves, aux moqueries ou à la\_mesquinerie de mes pairs.</p><p>Jusqu’à ce fameux soir. Alors que l’académie\_dormait depuis bien longtemps et que j’étudiais\_encore dans un recoin de la bibliothèque, j’ai\_surpris une conversation entre le doyen et\_Maître Iseold. Ils passaient en revue les noms de\_recrues prometteuses à transmettre à l’ordre des\_Ombres. Mon sang n’a fait qu’un tour lorsque\_j’ai entendu mon nom dans la bouche du doyen.\_Les rumeurs les plus folles couraient à propos de\_cet ordre occulte mais une certitude demeurait :\_du moment où je rejoindrais les Ombres, ma\_vie ne m’appartiendrait plus.</p><p>Le soir même, j’ai réuni mes quelques affaires\_en silence et j’ai quitté l’académie sans me\_retourner. Les Terres d’Arran sont immenses,\_j’y trouverai ma place. Personne ne me dictera\_mon destin.</p>"
    appearance:
      private: ''
      public: "<p>Nell a le teint mat et cuivré des habitants de\_l’empire de Dumn, ainsi que les yeux bleus.\_Son visage glabre est marqué par l’innocence\_de la jeunesse ainsi que de discrètes taches de\_rousseur. Ses cheveux sont bruns et relativement\_courts, coiffés en arrière.\_</p><p>Il porte une ample toge d’érudit, couverte\_jusqu’aux épaules d’une cape en cuir dotée\_d’une capuche qu’il revêt lorsque le soleil est\_trop chaud. Sa taille est cintrée par une large\_ceinture de tissu. Il a presque toujours un livre\_dans les mains ou dans une sacoche qu’il porte\_en bandoulière. Enfin, il manipule régulièrement\_des cristaux et pierres de sel colorés, noués à de\_fines lanières de cuir, qu’il porte autour du cou.</p>"
    notes:
      private: ''
      public: ''
    size: medium
    languages:
      - ''
