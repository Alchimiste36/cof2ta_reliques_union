    system:
      description: "<p>Le nécromancien doit\_réussir une <strong>attaque magique sur une cible vivante\_à une distance maximale de 30 mètres</strong>.</p><p>En cas\_de réussite, la cible <strong>subit [1d6 x NC/2] DM</strong> et la\_créature <strong>régénère autant de PV que de DM</strong>\_<strong>infligés</strong>.</p><p>De plus, à chaque fois qu'une <strong>créature</strong>\_<strong>meurt à moins de 20 mètres d'elle</strong>, la créature\_siphonne son énergie et <strong>gagne [1d6 + NC] PV</strong>.</p>"
