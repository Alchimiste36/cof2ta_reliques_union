      description: "<p>Ce pouvoir permet\_d'<strong>animer le cadavre d'une créature morte pendant\_le combat</strong>. La créature se relève <strong>avec les mêmes\_caractéristiques</strong> mais elle <strong>subit une pénalité de -2\_en attaque et en initiative</strong>. Lorsque le cadavre est\_à nouveau vaincu, il ne peut plus être réanimé.\_</p><p>Le cadavre de la créature animée <strong>ne peut être\_d'un NC ou d'un niveau supérieur</strong> à celui du\_nécromancien.</p>"
      source: ''
      origin: Livre du meneur p150
