  - type: equipment
    system:
      subtype: misc
      description: "<p>Ici, à <strong>Elsémur</strong>, je me sens un peu en décalage\_avec les autres Elfes. Fougueuse, aventurière,\_<strong>tête brûlée</strong>, je crois que j’ai toujours cultivé\_un goût prononcé pour le <strong>défi de l’autorité</strong>.</p><p>Cependant, je reste une Bleue : <strong>je n’ai qu’une\_parole</strong>, je suis fidèle et stoïque.\_Personne ne s’explique réellement d’où provient\_ce tumulte incontrôlable qui anime mon cœur,\_où se mêlent colère et joie de vivre. Probablement du décès précoce de mes parents, marins\_tous les deux et emportés par un océan furieux,\_me laissant orpheline.</p><p>Avec un caractère comme le mien, j’avais le\_choix entre devenir marin ou protectrice. J’avais\_trop de colère pour affronter le calme de la mer.\_Mon tempérament me promettait de nombreuses sanctions disciplinaires, mais la fulgurance de mes agissements m’a bien souvent\_permis d’éviter les problèmes. Je suis douée et\_mon instructeur, le capitaine Myonwae, le sait.</p><p>Il est à la fois mon guide, mon supérieur et… un\_père de substitution. Je sais qu’il espère un jour\_être capable de canaliser mon torrent intérieur.\_J’aimerais qu’il y parvienne.\_</p><p>Depuis que la malédiction des goules a brisé\_Kastennroc, je brûle d’envie de déverser ma colère\_sur les armées de Lah’saa. Trop de mes amis ont\_trouvé la mort dans la chute de la forteresse et je\_vis comme une punition les missions de patrouille\_maritime confiée par Myonwae. Certes, il faut\_protéger les villages côtiers ou les navires de\_réfugiés fuyant la guerre et l’avidité des pillards\_yrlanais. Mais je boue à l’idée d’être ainsi tenue\_en marge du vrai combat, celui qui compte pour\_l’avenir des Terres d’Arran.</p>"
