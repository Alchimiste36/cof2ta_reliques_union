  details:
    biography:
      private: ''
      public: "<p>Ici, à Elsémur, je me sens un peu en décalage\_avec les autres Elfes. Fougueuse, aventurière,\_tête brûlée, je crois que j’ai toujours cultivé\_un goût prononcé pour le défi de l’autorité.</p><p>Cependant, je reste une Bleue : je n’ai qu’une\_parole, je suis fidèle et stoïque.\_Personne ne s’explique réellement d’où provient\_ce tumulte incontrôlable qui anime mon cœur,\_où se mêlent colère et joie de vivre. Probablement du décès précoce de mes parents, marins\_tous les deux et emportés par un océan furieux,\_me laissant orpheline.</p><p>Avec un caractère comme le mien, j’avais le\_choix entre devenir marin ou protectrice. J’avais\_trop de colère pour affronter le calme de la mer.\_Mon tempérament me promettait de nombreuses sanctions disciplinaires, mais la fulgurance de mes agissements m’a bien souvent\_permis d’éviter les problèmes. Je suis douée et\_mon instructeur, le capitaine Myonwae, le sait.</p><p>Il est à la fois mon guide, mon supérieur et… un\_père de substitution. Je sais qu’il espère un jour\_être capable de canaliser mon torrent intérieur.\_J’aimerais qu’il y parvienne.\_</p><p>Depuis que la malédiction des goules a brisé\_Kastennroc, je brûle d’envie de déverser ma colère\_sur les armées de Lah’saa. Trop de mes amis ont\_trouvé la mort dans la chute de la forteresse et je\_vis comme une punition les missions de patrouille\_maritime confiée par Myonwae. Certes, il faut\_protéger les villages côtiers ou les navires de\_réfugiés fuyant la guerre et l’avidité des pillards\_yrlanais. Mais je boue à l’idée d’être ainsi tenue\_en marge du vrai combat, celui qui compte pour\_l’avenir des Terres d’Arran.</p>"
    appearance:
      private: ''
      public: "<p>Aëlyn est une jeune Elfe bleue d’à peine 80\_ans. Relativement petite pour une protectrice\_(1,65 mètre), elle n’impressionne guère par\_sa stature. Cependant, elle compense par une\_vivacité et une grâce quasi félines.\_</p><p>Ses longs cheveux gris aux reflets cuivrés sont\_généralement coiffés en fines tresses nouées en\_queue de cheval pour éviter de gêner ses mouvements ou le port d’un casque. Adolescente,\_ses yeux verts semblaient pétiller d’une malice\_perpétuelle. Aujourd’hui, son regard a gagné en\_profondeur et en férocité.</p>"
    notes:
      private: ''
      public: ''
    size: medium
    languages:
      - ''
