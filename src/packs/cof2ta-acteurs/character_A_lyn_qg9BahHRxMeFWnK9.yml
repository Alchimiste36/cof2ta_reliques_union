  - folder: Gq8P8x8TCY5JkUDj
    name: Voie Culturelle des Elfes Bleus
    type: path
    img: modules/cof2ta_reliques_union/assets/cof2ta_icones/cof2ta_elfe_bleu2.webp
    _id: UkGDFkcBGnMOHIdY
    system:
      description: "<h2>Les Elfes Bleus</h2><p>Les Elfes bleus sont liés à l’élément primordial de\_l’eau. Ils ont – comme leur nom le suggère – la\_peau teintée d’une couleur azurée. La plupart\_vivent dans des villes portuaires au nord des\_Terres d’Arran, sur des îles au large du Nodrënn\_ou encore à Elsémur, la capitale. Ils sont fiers,\_honnêtes et droits. La plupart des autres ethnies\_les jugent soit respectables soit hautains.</p><p>L’affinité des Bleus avec l’eau est si forte qu’ils\_subissent une sorte de dépression lorsqu’ils en\_sont éloignés trop longtemps. C’est pourquoi\_les cités des Elfes bleus sont toujours des ports,\_maritimes ou fluviaux et richement agrémentées\_de fontaines.</p><p>De nombreuses colonies de pêcheurs et marins\_elfes bleus voguent sur les mers et ne connaissent\_d’autre patrie que leur navire ou leur flotte. Plus\_rustiques et bourrus, ces individus\_ jouissent\_d’un contact privilégié avec les autres peuples\_d’Arran, notamment au détour des comptoirs\_commerciaux.</p>"
