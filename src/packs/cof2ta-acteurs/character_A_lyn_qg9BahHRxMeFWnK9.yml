  - folder: oXin2F69W6OYUCr3
    name: Maîtrise des armes elfiques
    type: capacity
    img: icons/weapons/bows/shortbow-recurve-yellow.webp
    system:
      description: "<p>Le PJ a appris à manier l’artisanat raffiné de\_son peuple. Il peut porter et utiliser armes et\_armures de la tradition elfique, pour lesquels il\_possède la formation martiale. Voir à ce sujet la\_marge <em><strong>Armes et armures traditionnelles.</strong></em></p><blockquote><h4><em><strong>Armes et armures\_traditionnelles</strong></em></h4><p><em>Les objets issus du savoirfaire d’une tradition\_ethnique constituent un\_ensemble de techniques\_de tissage, de confection\_et de forge transmis de\_génération en génération\_entre les artisans des\_différents peuples d’Arran.\_</em></p><p><em>Au final, ces objets\_dépassent le strict cadre\_de l’artisanat. Les objets\_créés en respectant ces\_processus renferment\_des pouvoirs étranges et\_puissants. Ils nécessitent\_un apprentissage long\_pour les maîtriser.\_ Les voies de peuple\_ouvrent toutes au rang\_3 à la maîtrise\_d’une tradition.\_En tant que joueur,\_le moment venu et\_en accord avec votre\_MJ, vous aurez accès\_à certaines de ces\_informations, décrites\_au chapitre «Objets de\_traditions et de légendes»\_du Livre du meneur.</em></p></blockquote>"
