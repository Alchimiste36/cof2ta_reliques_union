  - folder: hombdbi06Pu0gz8U
    name: Prison végétale
    type: capacity
    img: icons/magic/nature/root-vine-entangle-foot-green.webp
    system:
      description: "<p>modifié : affecte les cibles\_dans une zone de 30 mètres de diamètre\_pendant 11 tours. Subissent -2 en attaque, en\_DEF et ne peuvent se déplacer. </p><p>Libération\_contre un test de FOR difficulté 20.</p>"
      source: ''
      origin: Livre du Joueur p.134
      slug: ''
      inGame: >-
        <p>La première action activable permet d'activer le sort (dépense des PM
        et apparition de la seconde action).</p><p>La deuxième action permet
        d'appliquer pendant 5 + PER round les malus aux cibles sélectionnées.
        Cette action ne consomme pas de PM car vous pourrez l'utiliser autant de
        fois que nécessaire en fonction des créatures qui entrent et qui sortent
