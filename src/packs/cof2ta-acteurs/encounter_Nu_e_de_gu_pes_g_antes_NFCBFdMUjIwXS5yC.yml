  pasteData: ''
  details:
    category: living
    size: medium
    description:
      private: ''
      public: ''
    notes:
      private: ''
      public: "<p>Les rats ne sont généralement ni agressifs ni\_dangereux mais poussés par la faim, la peur ou\_un quelconque maléfice, ils peuvent attaquer\_en grand nombre. Vous pouvez vous servir\_de ce profil pour créer des nuées d'autres\_créatures comme, par exemple, des insectes\_géants. </p><p>Les caractéristiques données ici ne\_correspondent pas à un individu mais à un\_groupe de plusieurs dizaines de créatures\_(davantage si elles sont plus petites) recouvrant une surface de deux mètres de côté et\_équivalant à une créature de taille moyenne.</p><h4>Les nuées</h4><p>Une nuée est un regroupement de très nombreuses petites créatures qui ne représentent\_pas de réel danger prises individuellement\_mais peuvent s'avérer redoutables dans le cas\_d'une vague de plusieurs dizaines (voire de\_centaines) d'individus.</p>"
    languages: []
    properties: "<p>Les guêpes géantes combinent le pire des\_araignées et des oiseaux. En plus d'<strong>un\_ poison\_similaire à celui des araignées</strong>, elles ont la particularité de <strong>se déplacer en vol de 30 mètres\_par action de mouvement</strong> ce qui rend toute\_tentative de fuite futile…</p>"
