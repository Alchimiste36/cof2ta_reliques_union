    notes:
      private: ''
      public: "<p>Le monde a changé. Les entités primordiales\_ont lentement été corrompues et les fées qui\_les servent ne sont plus les mêmes. </p><p>La fée noire\_est une créature hybride dont le buste est celui\_d'une femme minuscule tandis que le bas du\_corps est celui d'une créature insectoïde. Ce\_sont les charmants bambins de celle que l'on\_nomme la mère des Fléaux. </p><p>Apparemment\_inoffensifs, le cœur de ces créatures vibre d'une\_magie ancestrale qui leur donne le pouvoir\_de pénétrer dans le sommeil des gens. Elles se\_nourrissent des rêves, ce qui leur permettrait,\_d'après la légende, de muter et devenir des\_araignées aux proportions démesurées. </p><p>Mais\_sans rêves pour se nourrir, elles meurent.</p>"
