            name: Orbe de Lumière Scintillante
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/04.ICONES/ICONES%20de%20Base/MAGIQUE/LUMIERE/explosion-star-small-orange.webp
            _id: u9r5Zje8SUwAOKmr
            system:
              key: orbe-de-lumiere-scintillante
              description: >-
                <p>Trouv&eacute; dans la cit&eacute; de Glanae'Reth, cet orbe
                &eacute;tait pos&eacute; dans la main d'une statue
                repr&eacute;sentant une Matrone Elfe Exsangue.</p>

                <p>L'orbe projette autour de lui une lumi&egrave;re multicolore
                vibrante et bougeante en tout sans cr&eacute;ant un effet
                optique assez joli mais hypnotisant.</p>

                <p>&nbsp;</p>

                <p>Lorsque l'on fixe pendant une minute la lumi&egrave;re de
                l'orbe, on ressent un sentiment de vide et de calme se
                traduisant par une perte temporaire de -6 en SAG et INT. Ces
                points reviennent &agrave; raison de 1 point de chaque
                caract&eacute;ristique par heure apr&egrave;s la fin de la
                vision de la lumi&egrave;re de l'orbe.</p>

                <p>Si une cible est mise en contact avec la lumi&egrave;re de
                l'orbe pendant 6h minimum (enferm&eacute; dans une pi&egrave;ce
                baign&eacute;e par la lumi&egrave;re de l'orbe, par exemple),
                elle perd les 6 points en SAG et INT temporaire comme l'effet
                pr&eacute;c&eacute;dent mais, en plus, r&eacute;pondra &agrave;
                des ordres simples plus facilement comme s'il &eacute;tait
                soumis au sort <strong>Injonction</strong>. L'effet dure 1d4+1
                heures &agrave; partir du moment o&ugrave; la cible n'est plus
                en contact avec la lumi&egrave;re de l'orbe.</p>

                <p>La cible peut r&eacute;sister &agrave; cet effet en
                r&eacute;ussissant un test de INT-ARCANES DD15. Il doit refaire
                un test tous les jours tant qu'il est sous l'effet de
                l'orbe.</p>
              source: Lana'Sir
