      content: "<div class=\"arran-mod\" data-pm-slice=\"3 3 []\">\n<div class=\"salledescr\">\n<p><strong>Description :</strong></p>\n<p>cette salle de 6m par 8m est entièrement recouverte de bibliothèques du sol au plafond. Des centaines d’ouvrages de toutes tailles sont positionnés avec soin sur les étagères. Certains livres sont très épais alors que d’autres ne ressemblent qu’à de fins fascicules. Les étagères montent jusqu’au plafond à 6m de haut et sur votre droite, sur un magnifique chevalet ouvragé, se tient un grand livre. A première vue, il s’agit de l’index de la bibliothèque. La position des livres y est consignée en fonction de son thème, de son auteur et de son intérêt.</p>\n</div>\n<div class=\"sallemj\">\n<p><strong>Notes pour le MJs :</strong></p>\n<p>l’étude de cette bibliothèque donne une bonus de +5 sur un test de Culture Générale au bout d’une heure d’étude. Si on y consacre une journée entière le bonus passe à +15 pour des connaissances “pas trop” spécifiques.</p>\n<h3>Si les PJs cherchent (CULTURE GENERALE DD15 environ une heure), ils trouvent un livre parlant des “<strong>Reliques de l’Union</strong>” et de son histoire. Appelé “<strong>les faux dieux des Plateaux Venteux à Esdavia</strong>”\_ @UUID[JournalEntry.E3770fjIQrJtxb4X]{Les Faux Dieux des Plateaux Venteux à Esdavia}\_</h3>\n</div>\n<div class=\"salleplus\">\n<p><strong>Plus :</strong></p>\n<p><strong>Trésors :</strong> Certains recueils de cette bibliothèque sont inestimables mais il faudrait de longues heures d’estimation d’un expert pour établir un prix. INT DD20 : environ 8000pa. @UUID[Item.My0eKixNTTnUuUlj]{Livres Anciens de la Bibliothèque du Temple du Val Rouge}</p>\n</div>\n</div>"
