    text:
      format: 1
      content: >-
        <div class="arran-mod"><p>Zagrenn Fredfisk est un frère du Désespoir
        humain d'une trentaine d'années.</p><p>Il a un visage dur et stricte
        comme la plupart des frères du désespoir et porte tous les jours sa
        tenue de moine impeccable.</p><p>Initié depuis presque 15 ans, il a de
        nombreuses fois participer à des missions confiées par ses supérieurs.
        Il est droit dans ses actes et demande souvent à retourner sur le
        terrain pour combattre l'injustice. Depuis une dizaine d'années, il
        s'intéresse aux contes et légendes des Terres d'Arran liées aux faits
        d'injustice et de domination.</p><p>Son obsession depuis c'est de
        comprendre POURQUOI les peuples sont toujours sujets à se laisser
        dominer ou a se laisser tenter par dominer ses semblables. Qu'est-ce qui
        pousse les hommes, les elfes, les nains et les peaux vertes a essayer
        d'opprimer son voisin ou son frère ?</p><p></p><p>Du côté de son
        caractère, Zagrenn est très studieux et peut passer de nombreuses heures
        dans des rayons de bibliothèque pour ses recherches et il peut
        difficilement rester passif devant une injustice ou une domination
        flagrante qui se passe devant ses yeux ou dans son environnement proche.
        Il a reçu plusieurs blâmes de ses supérieurs pour avoir prit parti dans
        des conflits qui ne concernait pas le Monastère. Il sait aussi que ce
        caractère l'empêchera de devenir un instructeur. Ce n'est pas pour lui
        déplaire car sa seule envie est d'être au contact avec les cultures et
        les peuples pour se battre contre tous les types de domination.</p><p>Ne
        connaissant pas les plaisirs charnels ni même la passion amoureuse, il
        lui est très pénible de voir un homme dominer une femme ou penser la
        "posséder".</p></div>
