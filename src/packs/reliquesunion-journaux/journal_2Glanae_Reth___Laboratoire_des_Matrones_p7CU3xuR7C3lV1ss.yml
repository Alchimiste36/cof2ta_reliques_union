            _id: Szbo77l9K46zctzG
            system:
              key: plastron-du-predateur
              description: >-
                <p>Ce plastron assez simple compos&eacute; d'un &eacute;pais
                tissu rouge sombre et de plusieurs boucles de m&eacute;tal mat,
                s'installe sur le torse du porteur. Il s'ajuste parfaitement aux
                corps apr&egrave;s quelques minutes pour s'&eacute;quiper.</p>

                <p>Le porteur gagne +1 DEF</p>

                <p>De plus, si le porteur a la @UUID[Item.IUi5zrlVUrB8NktI]{Voie
                du compagnon animal (Aventurier)}, le Compagnon du porteur gagne
                +3 DEF.</p>

                <p>Si le porteur poss&egrave;de la
                @UUID[Item.tZ6lrX6t74ccT5HL]{Voie des arts druidiques
                (Mystique)}, @UUID[Item.IXaE13A7nwuGtHFD]{Le guetteur} du
                porteur gagne +3 DEF et la dur&eacute;e de tranformation du
                porteur gr&acirc;ce &agrave; la capacit&eacute;
                @UUID[Item.WQQru2X7A0kpM2C6]{Masque du pr&eacute;dateur*} est
                doubl&eacute;e (passant de 5+Mod.SAG Tours &agrave; 10+2xMod.SAG
                Tours).</p>

                <p>&nbsp;</p>

                <p>Cit&eacute; de Glarnae'Reth : &eacute;quipement de Shakk</p>
