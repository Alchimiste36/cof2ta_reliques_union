    text:
      format: 1
      content: "<p><strong>Grim, porteur d’honneur et ami des peuples,</strong></p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Ton message a réchauffé mon cœur en cette période où les responsabilités m’accablent chaque jour un peu plus. Après l’euphorie suite à la fin de la guerre entre mon peuple et la Cité d’Ispier, des tensions apparaissent à nouveau entre nos peuples et je dois avouer ne pas être de taille pour apaiser les conflits et les chamailleries entre elfes et humains. Rien de bien grave mais chaque grimace et chaque insulte me glacent le sang et me pétrifient.</p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">J’aimerais tellement que tu sois à mes côtés pour imposer ton sens de la justice à ces habitants mus par des vieilles rancunes et des aprioris néfastes. Lana’Sir est très occupée par la reconstruction et l’organisation des travaux mais je sens qu’elle devient de plus en plus aigrie, cynique et autoritaire face aux agissements des humains de sa cité.</p><p></p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Face au réveil de la Relique de l’Union, tu me vois rassuré par tes propos. Ainsi, tes gestes, paroles et la lumière de ton âme ne m’a pas trompé. Tu es surement le meilleur Porteur que la relique pouvait trouver. Mes connaissances s’étoffent sur leurs pouvoirs et je peux t’assurer que si tes intentions sont justes, les Bracelets sauront reconnaitre la pureté de tes actes. Avant d’être pervertis par les Faux-Dieux d’Esdavia, les cinq reliques étaient des phares d’espoir et d’union pour les peuples. Ils ont été créés pour faciliter les liens, l’entre-aide et l’émancipation des peuples. Les souvenirs de mon peuple qui affluent dans tes pensées te montrent que nous n’avons pas toujours été honorables et honnêtes mais je suis convaincu que tu utiliseras les pouvoirs des Bracelets pour le meilleur.</p><p></p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Tu le dis toi-même, grand frère, dans ton adorable message\_: Les belles âmes sont rares dans notre monde. Tu en fais parti et la peur que tu ressens est la preuve que tu sauras utiliser les pouvoirs des Bracelets avec franchise et que, surtout, tu sauras demander de l’aide si tu perçois des signes inquiétants.</p><p></p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Que les bras d’Yjdad et de tous les dieux de nous autres \"oreilles pointues\" éclairent ton chemin et ton cœur en attendant de se revoir, bientôt j’espère.</p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Avec toute mon affection,</p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\"><strong>Laotissa Graine Dépeautre, Gardienne du Savoir et de l’Ordre de l’Union.</strong></p>"
