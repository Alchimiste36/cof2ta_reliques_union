    text:
      format: 1
      content: "<p>Shanni est une jeune humaine, très studieuse au service de Falika Rosna.</p>\n<p>Elle prend très a coeur son travail et ne se déplace jamais sans son calepin pour prendre en note TOUT ce qu'elle doit rapporter à sa maîtresse. Elle parle un language soutenu mais elle sait se faire comprendre des gens plus modestes.</p>\n<p>\_</p>\n<p>Les habitants de Lavoise la connaissent bien car elle va régulièrement faire des courses ou partez des messages en ville pour dame ROSNA.</p>\n<p>Selon quelques personnes de la ville, elle aime chantonner lorsqu'elle descend de la colline ou ce trouve l'Ecole Rosna.</p>\n<p>Elle ne connait pas grand chose du monde extérieur à part les récit racontés par Falika, les textes qu'elle a lu et les histoires qu'on lui raconte dans la ville de Lavoise. Recueilli à 5 ans par Falika après la mort de ses parents, elle n'a jamais quitter l'enceinte fortifiée de Lavoise.</p>\n<p>\_</p>\n<p>\_</p>\n<p>\_</p>\n<p>\_</p>"
