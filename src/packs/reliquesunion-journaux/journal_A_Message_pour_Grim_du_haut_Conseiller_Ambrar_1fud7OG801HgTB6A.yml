    text:
      format: 1
      content: "<p><strong>Monsieur Grim le Cogneur, fils de Brann</strong></p><p></p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Je me dois d’être surpris par votre courrier à propos des mines d’Arkir’Am et de leur réouverture.</p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Vous devriez vous trouver un autre endroit paisible pour votre maison de campagne car les mines ne sont plus bonnes à révéler la moindre richesse, le moindre minerai ou le plus petit confort depuis leur fermeture.</p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Si vous souhaitez entrer dans les mines pour en avoir le cœur net, tous les travaux seront à vos frais et vous serez dans l’obligation de sceller à nouveau les mines si, par pragmatisme, vous ne souhaitiez plus l’acquérir. Sachez que je serais très vigilant aux agissements qui se passeront dans les mines et alentours dans les prochains temps car je me refuse à voir apparaitre, dans ma propriété, une bande de suce-queutards avec de mauvaises intentions ou des occupations illégales.</p><p></p><p>Voici joint à cette missive la séquence de rune permettant l'ouverture de la grille principale de la mine d'Arkir'Am. Les runes sont dissimulées à droite de la grille au dessus du symbole de l'Ordre du Temple.</p><p></p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Pour votre information, même si je ne me fait aucune illusion sur votre déception, la location des mines pour usage personnel est fixée à 200 Talions d’or par mois d’exploitation en plus d’une commission sur les ventes de 15%. L’achat des mines d’Arkir’Am est évalué par les plus éminents experts du Talion à 8\_587 Talion d’Or. Soyez assuré que si votre dossier est assez fourni, la banque de pierre peut vous fournir un prêt à court, moyen ou long terme afin de financer cet investissement si cela est votre désir.</p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Si vous souhaitez me rencontrer, sachez que je suis la majorité du temps à la Banque de Pierre ou à la forteresse-état d’Olam-Bakor.</p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\">Que le père et la mère vous apportent profit et richesse, salutations,</p><p></p><p class=\"MsoNormal\" style=\"tab-stops:262.2pt\"><strong>Haut Conseiller Ambrar de l’Ordre du Talion.</strong></p>"
