        width="200" /><p>Ramell est un immortel aux pouvoirs immenses et à la
        déterminations sans faille.</p><p>Il souhaite depuis toujours que les
        hommes soient les maître des Terres d'Arran suite aux différentes
        altercations qu'il a subit enfants avec ses enseignants elfes, ses
        serviteurs nains ou des esclaves peaux vertes.</p><p>Moqué et
        ridiculisé, il est devenu autoritaire puissant et implacable.</p><p>Son
        but à l'époque, trouver et conserver des objets magiques capables de
        rendre les humains aussi puissants que les elfes, les nains ou les orcs
        afin d'obtenir une place dans le monde des personnages influents. Ses
        écritures et thèses seront rejetées durant des dizaines d'années et
        beaucoup d'érudits le considéraient néfastes et obscènes avec ses
        théories eugénistes.</p><p>Après un pacte avec un démon, il obtient le
        pouvoir de l'immortalité et des capacités diverses qui vont lui servir
        toute sa vie (métamorphose, charme, injonction, guérison accrue…). Son
        altercation avec la main des cinq a permis d'étendre son influence
        rapidement en corrompant les Reliques mais il fut capturé et endormi
        pendant des siècles par l'Ordre de l'Union.</p><p>Libéré par erreur, il
        manipule Amanori Bellara pour réunir les Relique et un armée assez
        puissante pour afin déclencher une guerre qui réduira les races inertes
        à peau de chagrin.</p>
