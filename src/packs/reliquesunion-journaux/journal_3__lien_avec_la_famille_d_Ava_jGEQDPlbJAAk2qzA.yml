      content: >-
        <p><strong>Avec les découvertes faites sur les gardiennes du Basculement
        et la rencontre de Syma.</strong></p><h3>Résumé de la famille d'Ava
        :</h3><p><strong>La famille d'Ava est descendante directe de la juge
        Tintaëlle Siar'yn.</strong> D'après la légende, les femmes de cette
        lignée aurait un grande pouvoir pour apercevoir les bouleversements<span
        style="font-family:'Google Sans', Arial, sans-serif"> </span>à venir.
        Ils se sont renommés Starym afin d'éviter les persécutions ou les
        tentatives de corruption.</p><p>Ainsi, l'oncle Lomarh d'Ava voulait
        utiliser ce pouvoir pour la grandeur de la tribu d'elfes sylvains au
        détriment de la morale de Nimwai'A, la mère d'Ava. Il était persuadé que
        cette légende était vraie et pouvait mettre les elfes au centre des
        Terres d'Arran, leur place légitime d'après
        Lomarh.</p><p></p><p>Personne de la famille d'Ava ne croyait à cette
        histoire même si la plupart des femmes de cette famille étaient douées
        avec les runes et la magie. <strong>Seule Syma, l'une des grands-tantes
        croyait en ce pouvoir oublié et en la responsabilité de leur
        famille.</strong></p><ul><li><p><strong>Tintai'A</strong> - grand-mère
        d'Ava - soeur avec <strong>Symai'A</strong> (Syma) et
        <strong>Aviri'A</strong></p></li><li><p><strong>Nimwai'A</strong> - mère
        d'Ava - soeur de
        <strong>Lomarh</strong></p></li><li><p><strong>Syma</strong> n'a aucune
        descendance alors que <strong>Aviri'A</strong> a, aux dernières
        nouvelles, une grande famille au sein d'un clan d'elfe sylvains dans la
        forêt dans le Sud-Est de l'Ogrie entre les marais et les hautes
        montagnes des Rocs Exsangues.</p></li><li><p>Le vrai nom d'Ava est
        <strong>Avai'A</strong>. Après la mort de son frère <span
        style="font-family:Signika, sans-serif"><strong>Josidiah</strong>,
        Avai'A est la dernière héritière de la lignée des Siar'yn de ce côté là
        de la famille.</span></p></li></ul><p></p><p><strong>Syma est persuader
        que des catastrophes approchent à grand pas</strong> et que la Guerre
        des Goules n'est qu'une épine sur un chemin bien plus dangereux.
        <strong>Elle avoue avoir élevé Ava dans le respect des textes
        anciens</strong> et d'avoir tout fait pour ne pas corrompre "le regard
        du nouveau-né" d'un côté ou de l'autre.</p><p>Si Ava accepte cette
        histoire, au prix de lourdes décisions et de grands dangers, elle pourra
        révéler au monde une menace existentielle pour les Terres d'Arran.</p>
