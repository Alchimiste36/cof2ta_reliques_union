            system:
              key: tienbon
              description: >-
                <p>Cette boisson verdatre est tr&egrave;s sucr&eacute;e quand on
                la boit.</p>

                <p>Le consommateur ne ressent aucun effet de la fatigue pendant
                1d4+1 jours. L'ingestion d'une dose suppl&eacute;mentaire
                augmente la dur&eacute;e de l'effet.</p>

                <p>Apr&egrave;s les premi&egrave;res 24h sous l'effet du
                Tienbon, le consommateur a 5% de chance (+5% par jour) de tomber
                inconscient apr&egrave;s une minute de douleur &agrave; la
                t&ecirc;te et de vomissements.</p>

                <p>&nbsp;</p>

                <p>A la fin de l'effet, le consommateur tombe &agrave; 0PR et il
                est affaibli jusqu'au moment o&ugrave; il se repose assez pour
                avoir r&eacute;cup&eacute;r&eacute; la totalit&eacute; de ses
                PR.</p>
