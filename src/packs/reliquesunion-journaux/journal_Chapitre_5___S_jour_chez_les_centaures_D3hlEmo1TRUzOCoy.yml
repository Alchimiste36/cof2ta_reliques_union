      content: "<p> </p><p>Dans ce chapitre, les groupe va devoir, après une courte période en prison, vivre plusieurs semaines dans le village d’Arkanov avec les Centaures.</p><p>Les problèmes de communications seront, au début, compliques pour se faire accepter par des habitants repliés sur eux-même depuis des centaines d’années. Par la suite, il faudra gagner la confiance des centaures pour arriver à leur fin, la découverte de la Ceinture de l’Union et pouvoir poursuivre leurs aventures.</p><p>Les joueurs vont rapidement découvrir un village coupé en deux entre les centaures méfiants mais curieux et promptes à rencontrer les inconnus et certaines familles voyant d’un très mauvais œil l’arrivée de ces intrus. Les uns sont tenter par s’ouvrir au monde sous l’impulsion des plus jeunes centaures. Les autres pensent que les centaures d’Arkanov devraient s’étendre, prendre le contrôle de la montagnes et retrouver la grandeur de leur culture.</p><p>Tout au long de ce séjour, les Personnages vont pouvoir découvrir les bâtiments du village dévoilant des machines imposantes, des ateliers de qualité et des objets étranges venus d’une autre époque. Ils rencontreront des centaures, vieux ou jeunes, chacun avec sa personnalité, ses valeurs et ses tracas. De plus, ils devront essayer de comprendre leur culture, leurs traditions et leur quotidien pour pouvoir forger des liens avec une partie des habitants.</p><p>Après les jours de captivité dans les mines et les premiers jours de vie avec les centaures, le chapitre prendra la forme d’un «Temps Long», un Intermède durant lequel les PJs pourront développer leur personnage, faire de l’artisanat, concevoir des alternative de sorts ou, encore, faire des recherches sur leurs points d’intérêt.</p><p>Tout au long de leur vie dans la village d’Arkanov, les aventuriers ressentiront la crainte des centaures face aux «Atarangi Kino», les Ombres Blanches qui attaquent le village régulièrement pour kidnapper certains jeunes habitants. La tranquillité relative des PJs sera bouleversé, au bout de plusieurs mois, par l’attaque nocturne des Atarangi Kino entraînant le kidnapping d’un jeune centaure et le décès d’autres.</p><p>Partir à la recherche de cette menace et ramener le jeune centaure au village scelleront dans le marbre la confiance des centaures auprès des Héros, entraînant la découverte de la Ceinture de l’Union.</p><hr /><h2>Explications</h2><p>Le village d’Arkanov a été fondé en 8265 après le Grand Schisme (-1037 CA), il y a 1745 ans. Les centaures ont toujours vécus reclus depuis cette époque dans un village possédant tout le nécessaire pour une vie paisible et en autarcie.</p><p>Les coutumes, traditions et rituels des centaures ont été mises en place, à l’époque, pour maintenir la cohésion des familles, éviter les naissances trop nombreuses, trop peu nombreux ou la consanguinité et, aussi, pour maintenir un niveau d’apprentissage et une technicité artisanale et martiale élevée.</p><p>Il y a 8 familles de centaures dans le village pour un total de 72 adultes et de 17 adolescents et enfants, même si environ 45 ont une histoire et une personnalité développée dans ce chapitre. </p><p>En aucun cas, les Personnages pourront quitter le village d’Arkanov sauf pour des parties de chasse ou pour bûcheronner dans la forêt extérieure mais, après quelques jours, lorsqu’ils récupéreront leur équipement, ils pourront communiquer via la Ceinture de Communication avec Lana’Sir. Si les PJs dévoilent l’emplacement du village, demandent de l’aide ou donnent trop d’informations, une équipe venue de la Cité d’Ispier arrivera à Arkanov et la confiance avec les centaures sera grandement entachée. Les centaures ne font aucune différence entre les races des intrus. Qu’ils soient humains, elfes, nains ou peaux vertes, les Pjs seront tous considérés de la même manière sans aucun préjugé ni discrimination.</p><p>La paix et l’harmonie du village était encore forte avant les premières attaques des Atarangi Kino, les Ombres Blanches depuis environ 15 ans. Devant cette menace, ces kidnappings et ces morts, les idées expansionnistes ont commencé à ce développer dans certains esprits. Le village se clive depuis en deux groupe. La majorité des villageois voudrait s’ouvrir sur le monde et commencer à nouer des relations avec les autres peuples des montagnes malgré  les craintes et les peurs que cela représente. Une minorité, menée par la famille de Kaha, pense que les centaures sont supérieurs aux autres cultures. Plus forts, plus rigoureux et plus fiers, les centaures devraient prendre le contrôle\_des alentours, soumettre les voisins et redevenir les maîtres des montagnes d’après leurs idées reçues et leurs croyances.</p><p>Comme expliqué brièvement dans l’Explication du Chapitre 4, les Atarangi Kino sont, en faite, des Elfes Exsangues vivant dans une cité souterraine où règne la peur, la torture et l’esclavage. Système matriarcale très sévère et pervers, les femmes qui dirigent ont, de temps en temps, besoin de main d’œuvre supplémentaire. </p><p>Soit elles choisissent quelques elfes exsangues mâles de mauvaise qualité physique ou mentale soit elles organisent une attaque sur les villages et cités aux alentours de leur ville. Les raids sur la Vallée de Novrak, sur des clans de Peaux Vertes des montagnes ou sur le village d’Arkanov permettent de ramener du sang frais pour les plaisirs sexuels des matriarches, de la main d’œuvre pour les ateliers de fabrication et des «jouets» pour les jeunes filles afin de développer leur goût de la torture et leur connaissances en anatomie, en charme et s’entraîner à l’utilisation des sorts de domination ou autres.</p><p>Durant leur séjour, les joueurs découvriront les lieux, objets et particularités du village d’Arkanov.</p><p>Au-delà des coutumes et traditions des centaures, beaucoup de choses pourront être découvertes et vécues par les Personnages :</p><ul><li><p>L’histoire personnelle de certains centaures permettra aux joueurs de créer des liens forts avec eux (la colère de Taitamariki face à son père, les agissements de Te’Tipu sur Kaimoe, les angoisses de Peka depuis les attaques des Ombres Blanches, les traumatismes du jeune Mataro ou encore les émotions refoulées de Kahao…) </p></li><li><p>Des événements joyeux ou tristes viendront ponctuer leur séjour (la naissance du petit d’Haputanga, l’union entre Harikoa et Roa’Tane, la Cérémonie de l’automne, le décès du doyen Karekau)</p></li><li><p>Les machines et ateliers du village permettront aux personnages de faire de l’artisanat (meunerie, scierie, poterie, forge, alambic…)</p></li><li><p>Les objets spéciaux et magiques d’Arkanov seront des mystères à comprendre (l’Orbe Élémentaire, le duo de marteaux de la cloche, les baumes, potions et élixirs de Kara, les arbres de la forêts intérieurs nommés Kaora…)</p></li></ul><p>Bien que, pour le moment, les aventuriers ne connaissent pas la Kicha, cette drogue qui permettra dans un avenir proche d’asservir les anciennes races par les humains durant les Guerres d’Arran, ils découvriront la drogue préférée des centaures, la feuille de Mohio. Elle permet de calmer, de déstresser, de détendre et de faire des méditations agréables pour les centaures. Ces derniers utilisent les racines de Kaora pour éviter l’addiction à la feuille de Mohio et pour soigner les anciens qui en abusent. Les racines de Kaora sont abondantes dans le village d’Arkanov et elles deviendront, peut-être grâce aux Héros de la Dame d’Honneur un atout clef lors des Guerres d’Arran dans quelques années.</p><p>En ce qui concerne la Ceinture de l’Union, son secret est bien gardé car plus aucun villageois ne connait son existence. Personne ne se souvient de la salle secrète derrière la fresque de la salle de cérémonie et aucun centaure ne connait le moyen d’ouvrir cette salle. Ces d’ailleurs cet oubli qui apporte les envies et les idées d’ouverture sur le monde. Ayant perdu le souvenir du but ultime de leur village, une partie des centaures ne comprennent pas pourquoi ils doivent rester enfermés dans ce lieux. </p><p>Après avoir gagner la confiance des centaures et récupéré les esclaves des Atarangi Kino,  la passion du jeune Te’Whakama pour les cérémonies anciennes permettra d’ouvrir la fresque et de trouver la Ceinture de l’Union.</p><hr /><p> </p><h2>Notes au MJ :</h2><p>Ce chapitre est un mélange de session de jeu classique avec des interactions sociales, des événements importants et des prises de décisions et un Intermède permettant des ellipses temporelles.</p><p>Intermède divisé en trois phases de Confiance, les joueurs n’auront pas tous accès aux mêmes activités en fonction de leurs relations avec les centaures. A chaque passage de palier de Confiance, gardez à l’esprit que c’est un grand honneur pour les aventuriers d’obtenir plus de liberté dans le village et d’avoir accès à de nouveaux secrets.</p><p>Le MJ devra utiliser cet Intermède pour récompenser l’implication des joueurs dans la Campagne en leur permettant de rattraper leur Points de Vie Maximum, d’enchanter une de leurs armes à la forge, de créer une nouvelle potion pour booster ses capacités, trouver une alternative intéressante à un sort et même, dans une plus petite mesure, trouver des informations sur leur histoire personnelle.</p>"
