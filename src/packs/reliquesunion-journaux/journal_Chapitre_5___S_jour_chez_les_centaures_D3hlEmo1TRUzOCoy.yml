      content: "<p>Les aventuriers ont parcouru un chemin périlleux pour trouver l’endroit décrit par Timaor Dunclin. Enfin arrivés, ils vont découvrir rapidement la méfiance du peuple des centaures d’Arkanov pour les étrangers.\_Les premières impressions des Héros d’Ispier face à cette culture mystérieuse laisseront-elles des traces pour leur séjour parmi eux ? </p><h2>Découverte de l'entrée du Village</h2><p>En fonction des informations que les joueurs ont réussies à tirer de Timaor Dunclin, décrivez les éléments marquants ou pointez du doigts les étrangetés de la zone : </p><ul><li><p>Les arbres proprement coupés dans la forêt,</p></li><li><p>La paroi de la montagne recouverte d’une épaisse couche de lierre et de plantes sur une large surface,</p></li><li><p>Les bruits qui semblent absents (pas de sons venant de la cascade qui produit le nuage de vapeur d’eau, pas de bruissement des plantes accrochées à la paroi, pas de craquèlement de la roche)</p></li></ul><h3>Intimidation Rythmée</h3><p>Lorsque les PJs se rapprochent de la paroi :</p><p>SAG-PERC DD10 : Vous entendez un cliquetis d’un rouage provenant du mur végétal.</p><p>SAG-PERC DD15 : vous remarquez au travers des végétaux une grille et des mouvements sombres au travers des feuilles.</p><p>SAG-PERC DD20 : Une partie du lierre se trouvant au milieu de la paroi bouge légèrement comme si le mur de l’autre côté se déplaçait.</p><p>Laissez les Personnages réagir et se préparer. Ils ont quelques minutes devant eux. S’ils essayent de communiquer, personne ne répond. S’ils sortent des armes ou sont menaçants les centaures sortiront de suite. Ils sont actuellement en train d’observer les PJs depuis les tours du mur d’enceinte et au travers de la grille de la porte. </p><p>Les aventuriers peuvent rebrousser chemin s’ils veulent mettre en place un plan. Dans ce cas, C.A.S. p.???.</p><blockquote><p>Au bout de quelques secondes, la flèche d’une baliste se plante dans le sol à un mètre de vous et vous voyez sortir du mur de lierre huit Centaures mâles et femelles armés de lances. Certains portent des armures de cuir, d’autres sont torses nus. Ils avancent en prenant soin de vous contourner en criant des phrases incompréhensibles chacun en rythme et en se répondant les uns les autres.</p></blockquote><p>Ils se retrouvent en arc de cercle autour de vous, pointant leur lances dans votre direction, tapant des sabots, montrant leurs bras et leurs tatouages. Ils commencent un chant de guerre ou d’intimidation, se déplaçant en rythme et en faisant de grands gestes explicites (le pouce qui tranche la gorge, un main qui brise un os, la lance qui étripe…). <em>Ca ressemble au Haka de Nouvelle-Zélande</em></p><p>CHA-PSY DD15 ou FOR-COMM DD20 :</p><ul><li><p><strong>Si Raté :</strong> </p><p>Vous êtes impactez par cette démonstration de cohésion et de puissance. Aucun de vous n’est à la hauteur face à ces guerriers. Vous êtes dans l’incapacité de réagir face à cette danse de guerre. (-10 à tous les prochains tests tant que les Centaures menacent les PJs impressionnés)</p></li><li><p><strong>Si réussi :</strong> </p><p>Vous êtes impressionnés par ces centaures grands et musculeux. C’est la première fois que vous croisez ces créatures majestueuses mais vous arrivez à garder votre sang froid devant cette intimidation.</p></li></ul><p>Que faites-vous pendant cette danse de guerre ?</p><p>Ca dure deux ou trois minutes et ensuite, ils se positionnent en position de combat autour de vous, lances pointées dans votre direction et muscles bandés. Une femelle Centaure fait un pas en avant et dit : Unataka nini ? (Que voulez-vous ?)</p><p>Elle semble attendre une réaction de votre part.</p><p>Personnages coopératifs</p><p>Les centaures échangent quelques mots dans une langue incompréhensive et des regards interrogatifs en direction de l’un des leurs. Un centaures à la peau sombre, tatoué à de nombreux endroits sur le corps, le cou et le visage et muni d’un beau collier. Un signe de tête de sa part et des centaures s’approchent de vous en sortant un bout de tissu de leur poche pendant que les autres se crispent sur leurs lances. Ils tendent les bras pour vous mettre un sac en tissu autour de la tête. </p><p>Tandis qu’une main vous tient la tête, au moment où la deuxième atteint votre nuque, vous sentez ne forte pression sur vos vertèbres .</p><p>FOR-ATHL DD20</p><p>Si Raté :</p><p>Enfermé dans la cagoule, tu sens tes jambes qui se dérobent sous toi. Tes pensées deviennent floues et, au bout de quelques secondes, tu tombes inconscient.</p><p>Si Réussi :</p><p>Tu ressens une nouvelle fois cette pression sur ta vertèbre avec encore plus de force.</p><p>FOR-ATHL DD22</p><p>Si réussi à nouveau : </p><p>Tu as la tête qui tourne mais tu parviens à garder tes esprits. Tu entends le centaure rire fortement et dire : He kaha tenei (Il est fort celui-là !).</p><p>Un coup de sabot te fauche les jambes, tu t’écrases au sol sans délicatesse et tu sens que le centaure te ligote les mains dans le dos. Il t’attrape par le col et tu es trimbalé comme une poupée de chiffon.</p><p>Je personnage subit 1d4+2 DM dus à la chute.</p><p>Personnages hostiles</p><p>La tension augmente autour de vous. Vous voyez les centaures qui froncent les sourcils et tirent la langue en prononçant des mots brutaux vers vous même si vous ne les comprenez pas. Ils recommencent une danse  martiale d’intimidation, tous en rythme avec plus de force et de puissance dans leurs gestes.</p><p>Ils se rapprochent de plus en plus de votre groupe, vous entourant totalement, empêchant une éventuelle retraite et ils tendent leurs lances de plus en plus près de vos visages ou torses. Certains d’entre eux attrapent un filet attaché à leur côté et commencent à le faire tourner au dessus de leur tête. </p><p>DISTANCE +8 </p><p>Si l’attaque réussie :</p><p>Tu es pris au piège par un lourd filet de pêche et tu vois un centaure bondir vers toi pour te faucher les jambes avec un grand coup de sabot et il approche ses mains de ta nuque.</p><p>Si le PJs essaye de se débattre ou de riposter : </p><p>Voir la section : Combat vs les huit centaures.</p><p>Si le PJ se laisse faire :</p><p>Le centaure exerce une forte pression sur ta nuque au niveau de tes vertèbres et tu penses qu’il essaye de te briser le cou. La douleur est intense et ton esprit commence à se brouiller. Tu t’évanouis au bout de quelques secondes.</p><p>Si l’attaque raté :</p><p> Grâce à ta réactivité, tu esquive le filet qui arrivait dans ta direction. Dans la seconde où le filet touche le sol, deux centaures se ruent sur toi avec leurs lances en avant. La pointe de leur lances se stoppent à quelques centimètres de ton visage et de ta gorge. Que fais-tu ?</p><p>Combat vs 6 Centaures</p><p>Si les Personnages sont encore menaçants ou récalcitrants face à cette démonstration de force et les tentatives des centaures pour appréhender les aventuriers, un combat se déclenche entre six des huit centaures et les Personnages hostiles. L’un des Centaures restant gardera les PJs inconscients ou ligotés et le deuxième entrera au village pour préparer les renforts..</p><p>Face à cette hostilité, les centaures ne prendront pas de pincettes, ils combattront pour tuer, un point c’est tout. Tous les trois round de combat, un trait de baliste essayera de toucher un PJ qui n’est pas au Corps à Corps avec un centaure.</p><p>Après 6 round de combat, une équipe de cinq centaures (quatre à la lance et deux à l’arc) viendront renforcer l’équipe de combattants.</p><p>Les Personnages ont peu de chance de survie dans cette confrontation. Si toute l’équipe s’est montrée hostile, les centaures essayeront d’assommer les PJs au lieu de les tuer. Si, par contre, seulement un ou deux aventuriers se retrouvent dans le combat, montrez l’exemple pour les autres.</p><p>Il y a moyen d’intégrer leur nouveau personnage dans la prison du village dès leur arrivé au peu après.</p><p>Réveil dans des mines</p><p>Vous vous réveillez dans une grotte sans savoir depuis combien de temps on vous a placé là. Vous ressentez un mal de crane digne d’un lendemain de cuite et vous mettez du temps à retrouver la stabilité de vos jambes. Des troches sont allumées et vous voyez autour de vous de nombreuses choses. Vous remarquez rapidement que vous n’avez plus votre équipement (armes, armures, sac à dos, ceintures…) mais vous êtes habillés avec vos propres habits. </p><p>La première chose qui vous choque en ouvrant les yeux, ce sont les bruits qui vous entourent. D’abord le son sourd et constant d’une grande chute d’eau qui résonne dans cette grotte. Des bruits métalliques claquent régulièrement et derrière ces sons d’ambiance, vous percevez des paroles agitées dans une langues inconnues. </p><p> - He aha ta tatou e mahi ai ki aua tangata? </p><p> - Me whakamate ratou !</p><p> - Me marama tatou ki a ratou.</p><p>Pour vous même si vous ne comprenez pas les propos, cela ressemble à une dispute ou un débat agité à l’extérieur. Vous distinguez plusieurs types de voix masculines ou féminines et avec des timbres provenant de personnes plus ou moins jeunes.</p><p>A. La Mine-Prison</p><p>Dans cette grotte, vous distinguez des nombreux objets et caisses de stockage. Il y a des points d’eau clair malgré quelques planches et bout de tissu qui flotte à la surface, un coin cuisine avec quelques étagère et ustensiles de cuisine et le long de certains murs vous voyez des sacs et des caisses qui contiennent quelques vivres et, aussi, des outils et des matériaux (planches de bois, charbon, gravats…). Dans un renfoncement, vous trouver une petite paroi de bois qui cache des toilettes et dans un autre coin de la grotte, de la paille a été étalée au sol en guise de literie.</p><p>Dans le fond de la grotte, vous remarquez l’atelier et les outils pour miner les parois, briser les rocailles et même un fourneau pour forger et faire fondre les métaux minés. De nombreux gravats jonchent le sol, les marteaux, poinçons et pinces sont en très bon état malgré un début de rouille sur certain et un peu partout dans votre nouvelle demeure, vous trouvez des brouettes et des chariots.</p><p>Pour finir, au bout d’un couloir, vous trouvez un porte solide et fermée d’où vous entendez distinctement les bruits du village.</p><p>Fouille de la mine</p><p>SAG-PERC DD15 : Dans le coin entre les paillasses et les caisses de stockage contre le mur ouest, vous remarquez d’anciennes traces de sang. La flaque a été nettoyée depuis longtemps mais la surface recouverte indique qu’une grande quantité de sang a été versée ici contre le mur.</p><p>SAG-PERC DD20 : Au niveau des sacs et caisses près de la paroi des toilettes, en fouillant, vous trouvez un sac en tissu qui contient des vêtements imbibés de sang séché. En observant le style, vous remarquez des vêtements proches des habits elfiques mais fabriqués avec un tissu bizarre. Certaines parties des habits sont étirables. Au touché, les fibres ne ressemblent pas à de la laine ou une autre matière que vous connaissez. Vous trouvez un pantalon, une chemise, une veste, des gants et une paire de bottes munies de crampons.</p><p>Ce sont les traces d’un prisonnier Atarangi Kino qui a été capturé par les centaures lors de la dernière attaque, il y a 1,5 an. Les habitants ont essayé de l’interroger mais la barrière de la langue a empêché toute communication. Le père de famille Kaha avec deux de ses fils, Te’Tipu et Kaihoko l’ont malmené pendant plusieurs semaines avant de le tuer dans l’angle près des paillasses.</p><p>L’eau dans les flasques est pur et potable même si certains débris flotte ou sont visible au fond de l’eau. Si des PJs se lavent ou plonge pour fouiller le fond de l’eau, ils remarqueront des gros blocs de pierre calcaire d’environ 80cm de côté. Ils permettent de purifier un minimum l’eau et éviter l’apparition d’algues.</p><p>Premières heures d’attente</p><p>Les prisonniers peuvent s’occuper de multiples manière dans les mines. Ils peuvent miner la paroi, concasser des roches pour extraire les pépites de métaux, fabriquer de petit objets en bois, faire des travaux de couture… Ils trouvent rapidement des caisses, cagots et sacs permettant de cuisiner des plats de qualité grâce au foyer et au plan de travail.</p><p>Ils ont aussi l’occasion de se reposer et de se soigner si besoin. Si, a la suite du voyage dans les montagnes, un PJ était blessé gravement, lorsqu’il s’inspecte, il remarque qu’un baume et un bandage a été appliqué sur sa plaie ou ses ecchymoses par Kara lorsqu’il était inconscient.</p><p>Ils peuvent aussi s’équiper avec des armes (marteaux de forge, gros marteau pour casser les cailloux, pioches, couteaux de cuisine…) ou autres.</p><p></p>"
