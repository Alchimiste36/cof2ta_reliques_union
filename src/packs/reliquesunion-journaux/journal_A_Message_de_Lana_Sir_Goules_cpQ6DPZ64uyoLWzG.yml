      content: "<h4>02 Décémuirn 708, forêt du Val Rouge</h4><h3>Mes chers amis,</h3><p class=\"MsoNormal\">Une catastrophe s’abat actuellement sur les côtes de l’Ourann. Je me dois de vous prévenir et de vous pousser à agir au plus vite.</p><p class=\"MsoNormal\">Depuis plusieurs semaines, des vagues d’informations me parviennent sans grande cohérence mais à l’heure où j’écris ces mots, la MORT est à nos portes. Une armée de goules débarque sur le littoral et une grande partie des forces armées se dirigent vers Kastennroc pour affronter le plus gros des mort-vivants.</p><p>Les premières goules ont été aperçues non loin de ma cité hier.</p><p class=\"MsoNormal\">Je suis actuellement entouré de certains habitants de la Cité d’Ispier ainsi que de la grande majorité des elfes sylvains du Val Rouge et nous nous apprêtons à investir le temple de Val Rouge pour notre sécurité. Je ne peux envisager que les goules puissent réussir à entrer. Nous avons fait des réserves pour plusieurs mois et j’espère que la proximité dans un si petit endroit ne causera pas trop de problèmes.</p><p class=\"MsoNormal\">Mes amis et sauveurs, je vous sais non loin de Lavoise actuellement. Je vous prie de protéger et sauver le plus grand nombre de vivants face à cette menace mortelle qui sera sur vous dans environ une semaine ou plus si les dieux anciens le veulent. Prévenez mon amie Falika Rosna et les érudits qui partagent son école afin de préserver tous les savoirs de ces grands intellectuels.</p><p class=\"MsoNormal\">Trouvez une cachette, faites des réserves, organisez votre survie par tous les moyens possible. Chaque personne tombée sous les griffes des goules agrandit cette armée corrompue. Chaque mort nous approche de l’anéantissement.</p><p class=\"MsoNormal\">Que vos dieux vous protègent et vous apportent la force de protéger le plus de vivants que possible.</p><p class=\"MsoNormal\">\_</p><p class=\"MsoNormal\">Avec toute mon amitié, j’espère vous revoir un jour dans un monde vivable.</p><p class=\"MsoNormal\">Lana’Sir Bonarion, dame de la Cité d’Ispier</p><p></p><p>PS\_: mon très cher Drakk’o, j’ai commencé à prendre contact avec le commerçant mais j’ai bien peur que la crise actuel ne permette pas d’aller plus loin. J’espère que Flenamor sera épargnée mais j’ai bien peur que des nouvelles des quatre coins du monde me confirme que les goules débarquent partout où c’est possible. Pour finir, j’ai reçu des nouvelles inquiétantes du Ravin de Novrak. Une attaque de Peaux Vertes aurait causée de nombreuses pertes et de nombreux dégâts. Je n’en sais pas plus pour le moment à part la présence sur place d’un nécromancien puissant qui pourrait être Hisp Galik</p>"
