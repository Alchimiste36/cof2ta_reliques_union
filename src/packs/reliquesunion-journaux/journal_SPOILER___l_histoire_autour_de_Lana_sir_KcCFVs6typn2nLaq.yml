      content: >-
        <p>C'est un jour de grand soleil dans la cité d'Ispier, que les PJs sont
        conviés auprès du seigneur local, Jaspar Bonarion.</p><p>Sa fille a
        disparu et il lui faut une équipe pour la retrouver et la ramener saine
        et sauve derrière les murs fortifiées de la ville.</p><h3>Dans quelles
        aventures se jèteront les protagonistes de cette nouvelle histoire
        ?</h3>
