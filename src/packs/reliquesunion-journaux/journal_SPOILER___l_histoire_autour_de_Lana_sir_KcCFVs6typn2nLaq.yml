  - sort: 300000
    name: 'SPOILER : Histoire complète'
    type: text
    _id: 3t54WblUtNZoULyV
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><span>Depuis que les humains se sont installés dans l'Ourann et ont
        prospéré sur ces grandes terres fertiles, les forêts ont été repoussées
        au fur et à mesure pour la construction, l'espace et l'agriculture. Les
        Elfes Sylvains qui vivaient ici en petites villes ne le voyaient pas
        d'un bon oeil mais ont laissé faire pendant les premières
        années.</span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span>Les bosquets qui se
        faisaient rasés étaient petits et éparpillés. <strong>Lorsque les forêts
        plus grandes ont commencé à être coupées, des tensions intenses sont
        apparues entre les elfes sylvains, les hommes et les bâtisseurs
        nains.</strong> Tout le nord de l'Ourann a été colonisé par les
        forteresses états des nains et les villes petites ou grandes des
        humains. Les elfes ont fuient vers le centre de l'Ourann et le sud de la
        Birkanie mais <strong>dans les dernières forêts qui persistent quelques
        villages Elfes sont restés et vivent sous en statut quo avec les hommes
        et les nains</strong>.</span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span>Lorsque le chantier
        de la grande route traversant l'Ourann du sud vers le nord a commencé,
        de nouvelles tensions sont apparues mais <strong>les elfes ont négocié
        des parcelles de forêts sacrée pour leur village. La forêt du Val Rouge,
        au sud de @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier}, en
        fait partie.</strong></span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span>Il y a de cela
        quelques années, après un essor croissant de la cité de la famille
        Bonarion, <strong>des bucherons braconniers humains ont commencé à
        grapiller sur la lisière de la forêt du Val Rouge.</strong> Des conflits
        ont éclaté marqué par quelques morts percés de flèches elfes. <strong>Le
        chef du village elfe a demandé au seigneur
        @UUID[JournalEntry.YZBFIHMD2pPy6DVS]{Jaspar} de respecter son accord et
        l'histoire s'est arrêté là pour le moment.</strong></span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span><strong>Il y a six
        mois, des assassinats ont commencé auprès de humain de la cité.</strong>
        D'abord des bucherons mandatés par la ville qui, d'après les dires ,
        travaillaient non loin de la forêt du Val Rouge sans pour autant l'a
        toucher. Puis, très rapidement, des marchands longeant la forêt et enfin
        une série de nobles hostiles à la causes des elfes. Malgré les deux
        rencontres entre le seigneur @UUID[JournalEntry.YZBFIHMD2pPy6DVS]{Jaspar
        Bonarion} et le conseil du village Elfe pour demander des comptes,
        <strong>les elfes persistent a nier leur implication dans ses
        assassinats et la colère du seigneur ne cesse d'augmenter. Les
        villageois d'Ispier, face à leur deuil et à leur colère, firent des
        excursions pour tuer des elfes sylvains et en représailles des camp
        entier de travailleur humains se sont fait massacrés par les
        elfes.</strong></span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span><em><strong>En
        secret, @UUID[JournalEntry.HoNs0YQCQeWlUAKr]{Lana'sir Bonarion} envoie
        des lettres au chefs elfes pour leur demander de calmer les choses et
        pour comprendre le fin mot de l'histoire.</strong></em></span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span>La tension est a son
        comble à cette instant.</span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span>Alors que les drames
        ne prennent pas fin, <strong>le meurtre de la chaman du village Elfe
        déclenche un conflit important contre la cité d'Ispier,</strong>
        <strong>il y a deux semaines.</strong> Suite à cette escarmouche rapide
        et brutale, les bucherons, la milice et un contingent de soldat avancent
        sur le village des elfes sylvains et un guerre ouverte éclate entre les
        deux forces. <strong>Le village du Val Rouge est réduit en cendres et
        seul quelques elfes arrivent à s'échapper du massacre</strong> (deux
        femmes, une dizaine d'enfants et un groupe quatre jeunes
        soldats).</span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span><strong>Il y a trois
        jours, la fille du seigneur,
        @UUID[JournalEntry.HoNs0YQCQeWlUAKr]{Lana'sir Bonarion} disparait de
        @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier} en pleine
        nuit</strong>, ne laissant aucun indice derrière elle.</span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Les PJs interviennent ici pour
        retrouver Lana'sir.</span></strong></span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span>En réalité,
        <strong>elle s'est enfuit de son propre chef</strong>, rejoindre le
        groupe d'elfes survivant pour les amener à
        @UUID[JournalEntry.IJse9uBbcqtPWW2C]{Orkadia} pour qu'il raconte leur
        histoire puis dans la forêt des Hauts Chênes au sud de la Birkanie. A
        force de communiquer avec le conseil des elfes en secret, <strong>elle
        en a déduit que les assassinats perpétrés six mois plus tôt ne sont pas
        du fait des elfes</strong>. En tout cas rien ne le laisse présager.
        <strong>Elle croit fermement à un coup monté pour anéantir le village du
        Val Rouge et s'emparer de la forêt.</strong></span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span>Lorsqu'elle rejoint
        le groupe de survivant dans les terres des mangeurs de prairie, un toute
        autres explication se profile. <strong>L'une des survivantes est la
        fille de la chaman, </strong></span><strong>Laotisaa Graine
        dépeautre</strong><span><strong> est la nouvelle gardienne du savoir du
        Val Rouge</strong>. Elle explique à Lana'sir que <strong>le village
        renferme l'ouverture du Temple du Val Rouge, un secret gardé par son
        village depuis des centaines d'années</strong> car, en son centre se
        trouverait une arme trop puissante pour les Terres d'Arran que se soit
        dans les mains d'un homme, d'un nain ou même d'un elfe. <strong>Quelque
        soit la menace qui rode sur cette histoire, nul ne doit récupérer "Les
        Bras de l'Union" et il doit être apporté dans la forêt des Hauts Chênes
        au sud de la Birkanie auprès du conseil des sages
        elfes.</strong></span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><br /><span
        style="font-weight:normal">Cet artefact n'est que le premier d'une série
        de quatre. Les brassard du peuple elfe, le plastron du peuple Humain,
        les bottes du peuple Nain et enfin le pantalon du peuple des peaux
        vertes. Ces quatre artefacts une fois réunis permettent au groupe qui
        les porte de booster leur puissance de façon inouï et surtout
        d'augmenter grandement leur faculté à se faire obéir des quatre
        peuples.</span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span
        style="font-weight:normal"><strong>C'est exactement ce que convoite le
        mage "au service" de @UUID[JournalEntry.YZBFIHMD2pPy6DVS]{Jaspar
        Bonarion} !</strong></span></p><p
        style="line-height:115%;margin-bottom:0.35cm"><span
        style="font-weight:normal">C'est lui qui a comploté pour l'assassinat
        des bucherons, marchands et noble de
        @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{la cité d'Ispier.}. C'est lui qui a
        fait tuer la chaman du village du Val Rouge. C'est lui qui a souffler à
        l'oreille du seigneur la nécessité de les attaquer. Et enfin c'est lui
        qui poussé les elfes à bout.</span></p><blockquote><h3><span
        style="font-weight:normal"><strong>Il recherche l'entrée du temple du
        Val Rouge en ce moment même avec une troupe de mercenaires, tous plus
        bourrins les uns que les autres. En pillant le village et en récoltant
        des informations sur le fameux temple, trouveras-t-il l'entrée avant les
        Héros de @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité
        d'Ispier}.</strong></span></h3></blockquote>
      markdown: ''
