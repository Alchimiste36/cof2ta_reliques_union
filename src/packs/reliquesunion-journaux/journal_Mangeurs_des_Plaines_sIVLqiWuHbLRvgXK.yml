    text:
      format: 1
      content: "<p><strong>Les mangeurs des Plaines sont un peuple nomade et guerriers vivant dans les grandes plaines et les montagnes à l'est de l'Ourann du Nord.</strong></p><p>Ils sont réputés pour leur fureur au combat et leur agilité. <strong>Il y a peu de connaissance sur leur habitudes, rituels et cultures.</strong> Certains Mangeurs des Plaines sont recrutés en tant que mercenaire lors de conflits (surtout par les nains) et d'autres se rapprochent fréquemment des villes et forteresses-états pour faire du troc ou des échanges.</p><p><strong>Ne les sous-estimez pas car derrière leur tranquilité et leur bonhommie pendant des échanges commerciaux, ils ne laisseront passer aucune fourberie ni traitrise.</strong></p><p>\_</p><p>Dans la plupart des clans de Mangeurs des Plaines, les hommes comme les femmes peuvent occuper chaque rôles (guerriers, tâhces quotidiennes, s'occuper des enfants...)</p><hr /><h2>Tribu de l'Aîné :</h2><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/kaspirionuratanokali1.webp\" width=\"150\" height=\"150\" /><p>@UUID[Actor.YBj4ZmPrf6ztg2ve]{Kaspirionuratanokali}</p><p>@UUID[Actor.xc1rH1BTEQ3JYrFr]{Sherbinertaliani}</p><p>@UUID[Actor.VGyRVm50f9zwGPXk]{Kiskirternatali}</p><p>@UUID[Actor.BNQkWT9wv1WzGbM4]{Sertilianoda}</p><p>@UUID[Actor.W7pa7C0rFZbF1Zyf]{Fertaliafe}</p><p>@UUID[Actor.VGyRVm50f9zwGPXk]{Kiskirternatali}</p><p>La tribu compte environ 18 combattants expérimentés (dont les 6 précédents) et une trentaines de membres en plus. Tous les memebres sont habiles avec une armes en cas de besoin mais la plupart de temps ce sont les combattants qui se chargent des conflits.</p><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/guerrier2.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/guerrier3.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/guerrier4.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/guerrier1.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/guerrier5.webp\" width=\"100\" height=\"100\" />"
