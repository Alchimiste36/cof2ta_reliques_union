  - sort: 300000
    name: Le Grand Souffle
    type: text
    _id: bV6JkvmZZITAFiuV
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p><strong>Les Mangeurs des Plaines vénèrent \"Le Grand Souffle\", l'esprit des plaines. Cette croyance apporte son lot de coutumes et de rites qu'un étranger ne peut pas comprendre et qu'aucun érudit n'a réellement étudié.</strong>\_</p><p>Si par mégarde, une personne offusque le Grand Souffle, les combattants seront dans la majorité des cas compréhensifs (même si les tribu les plus isolées réagiront avec une grande violence). Par contre, <strong>quelqu'un qui méprise volontairement la culture et le dogme du Grand Souffle sera torturé durant de longues heures pour apaiser les vents.</strong></p><p>Une multitude de mimiques, gestes, positions, phrases… semblent liés à cette religion mais personne ne sait faire la différence entre des habitudes ou de véritables obéïssances au Grand Souffle.</p>"
