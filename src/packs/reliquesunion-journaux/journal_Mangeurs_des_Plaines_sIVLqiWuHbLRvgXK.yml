  - sort: 200000
    name: Les Sanpurocks
    type: text
    _id: jTkf5P2kq7QkniYH
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Les Mangeurs des Plaines sont surtout réputés pour leur
        dressage de montures redoutables : les Sanpurock.</strong> C'est bêtes
        musculeuses sont aussi agiles que des cervidés mais avec des pattes
        puissantes comme un ours. Ils sont très pratiques pour arpenter les
        grandes plaines de l'Ourann.</p><p><strong>Les Mangeurs des Plaines ont
        développé une relation particulière avec les Sanpurock et peuvent
        "communiquer" avec eux de façon précise.</strong> Le lien qui lie une
        tribu avec ses monture est sacrée et un Sanpurock pourra traverser des
        centaines de kilomètre pour rejoindre sa tribu même après plusieurs mois
        d'absence.</p><p>Blesser ou s'en prendre à un Sanpurock signe votre
        arrêt de mort quasi certain. Les tribus les plus insérées auprès des
        cités de l'Ourann préfèrent réduire en esclavage les malheureux pour
        leur faire payer le mal qu'ils auraient fait à l'animal.</p><p>Dans tous
        les cas, il faut déjà survivre aux attaques du Sanpurock
        !</p><p>@UUID[Actor.gF3yqDESwoiZZCh3]{Sanpurock
        Natak}</p><p>@UUID[Actor.4cqA4JR3lNVnu4iG]{Sanpurock
        Nataka}</p><p>@UUID[Actor.U45iygDiZumN2kFw]{Sanpurock
        Natakia}</p><p>@UUID[Actor.szbBbLVfASVSKVgc]{Sanpurock
        Natana}</p><p>@UUID[Actor.1ZzNjfLCR1X3dX4i]{Sanpurock
        Natanao}</p><p>@UUID[Actor.3ypBPytVn9W5TeUy]{Sanpurock
        Natao}</p><p>@UUID[Actor.wTSeAFTOIB6tblvG]{Sanpurock
        Natouk}</p><p></p><hr /><p>Tous les Sanpurocks ont un nom, le
        reconnaissent et répondront à sa prononciation.</p><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/sanpurock1.webp"
        width="100" height="100" /><img
