    text:
      format: 1
      content: "<p>Falika Rosna est une elfe blanche qui vit depuis plusieurs siècles auprès des peuples humains de l'Ourann.</p><p>D'après ses dires, elle a eu un désaccord violent avec ses parents vivant sur les Iles Blanches et elle a décidé de partir avant l'âge adulte. Protégée dans un premier temps par des sylvains, elle a ensuite décidé d'apporter son aide et ses connaissances aux villes humaines.</p><p>Il y a 70 ans, elle a créé l'Ecole Rosna dans la ville nouvelle de Lavoise pour aider les nécessiteux et enseigner. Ses étudiant sont de jeunes adultes humains, nains ou elfes qui recherchent un enseignement rigoureux et global. D'après certaines rumeurs, elle aurait même instruit un groupe de gobelins, il y a quelques années.</p><p>Sa grande bibliothèque permet également de temps en temps à des érudits des quatre coins des Terres d'Arran de venir faire des recherches sur des sujets spécifiques. Elle facture extrêmement cher l'accès à sa bibliothèque et ses enseignements pour les nobles et les riches marchands afin de l'offrir pour les jeunes prometteurs.</p><p>Elle n'a ni enfants ni conjoint mais elle a recueilli et élevé Shanni à partir de ses 5 ans, lorsque ses parents ont été tués par des brigands.</p><p>\_</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Rosna.jpg\" width=\"150\" />"
