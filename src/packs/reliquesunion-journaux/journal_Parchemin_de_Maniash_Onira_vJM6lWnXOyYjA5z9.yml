    text:
      format: 1
      content: >-
        <div class="arran-mod"><p></p><blockquote><p>Si vous reprenez la place
        de Gardienne de la Relique de l’Union, c’est que le souvenir ne s’est
        pas envolé dans le noir de l’histoire.</p><p>Votre rôle sera long et la
        patience votre plus grande alliée. Les fanatiques d’Esdavia ne doivent
        pas réapparaitre et les reliques doivent rester entre de bonnes
        mains.</p><p>L’Arbre-Mère prendra soin de vous, de votre suivante et de
        vos acolytes. N’ayez crainte, il a fallu une quinzaine de cycles pour
        que la première trouve le Temple. Cette attente m’a valu de nombreuses
        nuits blanches mais tout est normal. Fiez-vous toujours aux merveilles
        de l’Arbre-Mère.</p><p></p><p>Maniash’onira, première gardienne du
        Temple de l’Union des Elfes.</p></blockquote></div>
