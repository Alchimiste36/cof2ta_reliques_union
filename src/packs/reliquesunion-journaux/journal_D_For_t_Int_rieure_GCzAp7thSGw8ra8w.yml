      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>-30</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>-30</strong></h2></td><td><h2
        style="text-align:center"><strong>+2 à
        +4</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>On peut s'occuper de 2 arbres maximum (3 à 5 heures de
        travail par arbre) par journée de travail. Couper un arbre est très
        fatiguant (-1PR par arbre coupé)</p><ul><li><p><strong>FOR-ATHLETISME
        DD10 pour couper l'arbre</strong> - si raté =&gt; blessures ou mauvais
        travail</p></li><li><p><strong>DEX-AGILITE DD10 pour s'occuper de
        l'écorce, les racines, les brindilles et les feuilles</strong> - si raté
        =&gt; blessures ou mauvais travail</p></li></ul><p></p><h2>Description
        :</h2><p>Au sein du village d'Arkanov, on peut trouver une parcelle de
        forêt avec des arbres étranges qui poussent le long de la paroi Nord aux
        abord des murailles du village.</p><p>Forêt assez dense, certains arbres
        sont coupés à la base par les centaures régulièrement pour fabriquer des
        outils, des structures et des équipements. Chaque partie de l'arbre est
        utilisée :</p><ul><li><p>le bois pour des structures très résistantes.
        Il est possible de tordre les troncs en les laissant se gorger d'eau en
        les trempant dans le lac pendant plusieurs semaines. L'essence de bois
        est assez lourde, pratiquement imputrescible mais il est assez dur à
        travailler.</p></li><li><p>Les brindilles : pour la fabrication de
        charbons qui se consume lentement, des manches d'outils ou des meubles
        ou autres objets usuels.</p></li><li><p>Les feuilles sont très larges et
        fibreuses ce qui permet le filage de fils ou de cordes. Grâce à ces
        fibres on peut fabriquer tissus, nappes, couvertures de
        fumage…</p></li><li><p>Les graines ne sont pas très nutritives mais
        elles sont utilisées pour la fabrications de baumes ou de cataplasmes et
        servent également à la fabrication d'un alcool assez fort et tannique
        lorsqu'elles sont torréfiées et fermentées.</p></li><li><p>Les racines,
        lorsqu'elles sont mâchées, permettent de résoudre des problèmes de
        digestion ou des crampes d'estomac. Réduite en poudre, les racines sont
        la base de certains breuvage ou baumes.</p></li></ul></div>
