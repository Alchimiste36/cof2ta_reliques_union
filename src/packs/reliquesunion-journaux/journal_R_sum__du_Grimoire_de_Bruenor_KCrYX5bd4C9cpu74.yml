    text:
      format: 1
      content: >-
        <p>Le bien épais grimoire de Bruenor est annoté de tous les côtés. A
        première vue, il est compliqué de comprendre les informations qui y sont
        écrites mais après plusieurs heures d’étude, quelques données peuvent en
        être retirées.</p><p class="MsoNormal">Bruenor a été plusieurs dizaines
        d’années, un exorciste pour le compte de l’Ordre du Temple de la
        cité-état de Krüg-Daraz. Il explique son intérêt pour le règne de
        Forgrim, le Dragon Immortel et de la Loge du Dragon. Le plus grand roi
        nain des Terres d’Arran, ayant permis l’unification des états et des
        royaumes, a permis d’amener à son apogée son peuple grâce aux nombreux
        savoirs magiques et runiques compilés par les plus grands mages de la
        Loge des Dragons.</p><p class="MsoNormal">Le Traité Runique de la
        Matière et de l’Ether avait permis de placer les nains au sommet de
        l‘influence et de la puissance sur tous les continents. Malgré les
        récits historiques racontant la folie de Forgrim et son objectif de
        devenir l’égal d’un dieu en massacrant une grande partie de son peuple,
        Bruenor est convaincu que cette version de l’histoire est un mensonge
        propagé par les responsables des Ordres pour qu’ils conservent leurs
        pouvoirs.</p><p class="MsoNormal">Pour l’exorciste, le Traité Runique de
        la Matière et de l’Ether est la solution parfaite pour élever le peuple
        nain vers un nouvel âge d’or et en finir avec les politiciens et les
        bureaucrates des quatre Ordres, la Forge, le Bouclier, le Temple et le
        Talion.</p><p class="MsoNormal">Il met toute son énergie à la recherche
        de l’un des Traité dans toutes les vieilles cités souterraines oubliées.
        Il efface ses traces et ses motivations en éliminant les membres de
        chaque expédition qu’il entreprend.</p><p class="MsoNormal">Après avoir
        exploré deux ruines effondrées de vieilles mines obscures, les notes de
        Bruenor deviennent de plus en plus illisibles et erratiques. Il se
        contredit souvent, parle plus de ses émotions et de son empressement que
        des événements qu’il vit comme au début de son grimoire et il évoque, de
        temps en temps, les discutions qu’il a, tard le soir, avec son compagnon
        de voyage.</p><p class="MsoNormal">Après s’être téléporté, il y a 7
        mois, dans la Cité-Forge d’Hyrr’Tarënn, déclenchant un piège qui l’a
        beaucoup amoindri, Bruenor essaye d’explorer la cité à la recherche du
        Traité mais passe ses journées et ses nuits à se protéger de Grouillants
        et a essayé de garder ses idées claires face à la présence d’une
        malveillante force démoniaque. Il craint d’ailleurs que le démon Mangeur
        des Rêves ne relâchera pas son emprise sur la cité car il ne veut pas
        rencontrer le Démon Grouillant accompagné de son armée au détour d’un
        couloir.</p><p class="MsoNormal">Il est persuadé que la Traité se trouve
        dans la cité d’Hyrr’Traënn mais il n’arrive pas à trouver, seul, des
        informations sur le moyen de trouver et d’ouvrir le Cœur d’Hyrr’Tarënn
        et le Tourbillon.</p><p class="MsoNormal">Les dernières pages de son
        grimoire son totalement illisibles, composées de gribouillis, de
        symboles ésotériques et de prières au père et à la mère.</p>
