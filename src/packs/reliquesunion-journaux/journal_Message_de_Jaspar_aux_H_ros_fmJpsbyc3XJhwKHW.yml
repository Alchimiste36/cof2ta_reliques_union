    text:
      format: 1
      content: >-
        <p><em><strong>Cher Ramiel, chers Héros de la Dame
        d'Honneur,</strong></em></p><p><em><strong>Vous me voyez ravi de votre
        arrivée à bonne destination. Ici l'effervescence continu pour la
        reconstruction du village des sylvains et l'ambiance est à la
        coopération et à la camaraderie.</strong></em></p><p><em><strong>Les
        artisans et villageois d'Ispier apprennent à vivre aux côtés des elfes
        accueillants.</strong></em></p><p><em><strong>Voici un document officiel
        signé de ma main qui peut vous servir. Merci de faire honneur à ma
        confiance.</strong></em></p><p>@UUID[JournalEntry.lrfIPHMirJ9mQFu8]{Mandat
        officiel de la Cité
        d'Ispier}</p><p><em><strong>Cordialement,</strong></em></p><p><em><strong>Jaspar
        Bonarion, Seigneur de la Cité d'Ispier.</strong></em></p>
