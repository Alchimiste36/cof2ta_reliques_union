    text:
      format: 1
      content: >-
        <p>Situé à environ une heure de marche de
        @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier}, l'auberge est à
        la croisée de la route allant de
        @UUID[JournalEntry.hrgO7vkdwCMPB2cP]{Blanche Paix} à
        @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier} et la grande
        route reliant les Forteresse-Etat Naines d'Arkar'um et Akar
        Bram.</p><p>Lieu très grand et très mouvementé, on peut y dormir
        confortablement, y manger des spécialité venant des quatre coins de
        l'Ourann et plus loin et souvent y voir des représentations culturelles
        (pièces de théâtre, soirées dansantes, comiques…).</p><p>Le gérant se
        nomme Stepson Gruger et il est aidé en salle par sa fille Nada et en
        cuisine par sa femme.</p>
