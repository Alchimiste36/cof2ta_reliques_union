  - sort: 900000
    name: Voyage dans les étendues sauvages
    type: text
    _id: ZajdGvjbWnJnZG6B
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <p>Le groupe d’aventurier est fin prêt pour effectuer cette longue randonnée sur les plateau déserts des Crocs d’Acier.</p>\n  <p>\n    40 kilomètres, ça semble facile mais c’est sans compter les multiples dangers qui les séparent encore de leur\_destination. Seront-ils à la hauteur pour affronter les étendues\n    sauvages ?\n  </p>\n  <blockquote>\n    <p>C’est l’heure du départ pour les montagnes\_en direction du point que vous a indiqué\_Timaor. En espérant que vous soyez assez équipé\_pour faire ce voyage exigeant.</p>\n    <p>\n      Vous commencez cette randonnée en montant un\_chemin en lacet qui part vers le nord et dans votre\_progression vous distinguez la Vallée de Novrak qui\_rétrécit au fur et à\n      mesure de votre progression. Au\_bout de quelques heures de marches avec un fort\_dénivelé, vous passez une crête et toute traces de\_civilisation disparaît dans l’instant.\n    </p>\n    <p>\n      En face de vous, une étendue sauvage, presque\_entièrement recouverte des neiges éternelles des\_hauts sommets. Résineux éparses, failles profondes,\_crevasses dissimulées,\n      plaques de glaces et escalades\_pénibles semblent les seules certitudes que vous\_percevez devant vous. Vous vous dirigez vers des\_crêtes plus hautes encore et ce n’est pas\n      pour vous\_rassurer sur la difficulté de ce voyage.\n    </p>\n    <p>D’après vos informations, si tout se passe bien, le\_voyage devrait durer trois jours.</p>\n  </blockquote>\n  <hr />\n  <h2>Règles de voyage</h2>\n  <p>\n    Les joueurs doivent choisirent un personnage «Éclaireur» qui s’occupe de les diriger, suivre la piste et trouver des endroits abrités et confortables pour passer des nuits\n    reposantes.\n  </p>\n  <p>\n    Il faut trois jours entiers pour atteindre la forêt de feuillues proche du village d’Arkanov et chaque jour est décomposé en quatre périodes (matinée, midi, après-midi et\n    campement).\n  </p>\n  <p>\n    Pour chaque période, le personnage Éclaireur effectuer un test de @Test[car:per|diff:15|comp:Voyage en terrain difficile] (ou plus si vous voulez corser leur voyage et les\n    mettre en difficulté sachant que l’Éclaireur peut utiliser des Points de Chance s’il le souhaite).\n  </p>\n  <p>Il faudra donc, en moyenne, 12 périodes pour atteindre leur objectif.</p>\n  <h3>Pour les périodes du matin, midi et après-midi :</h3>\n  <ul>\n    <li>\n      <p><strong>Si réussi :</strong></p>\n      <p>\n        Le groupe avance normalement dans les plateaux rocheux. Ils arrivent à éviter les failles et crevasses, contourner les rochers sans se perdre et sont assez réactifs pour se\n        cacher lorsqu’un prédateur sauvage se fait entendre ou voir au loin.\n      </p>\n    </li>\n    <li>\n      <p><strong>Si réussi de 10+ points :</strong></p>\n      <p>Les conseils de l’Éclaireur sont pertinents et ses prises de décisions incroyables. Le groupe d’explorateurs avancent vite. Ils gagnent une période de voyage.</p>\n    </li>\n    <li>\n      <p><strong>Si raté :</strong></p>\n      <p>\n        Des doutes et des problèmes d’orientation viennent perturber l’Éclaireur du groupe. Les explorateurs doivent rebrousser chemin, contourner une large faille non prévue ou se\n        retrouvent coincé par une paroi rocheuse. Ils n’avancent quasiment pas. Cette période de voyage est perdue !\n      </p>\n    </li>\n    <li>\n      <p><strong>Si raté de 10+ points :</strong></p>\n      <p>\n        Alors qu’ils avancent péniblement sur les plaques de neige et de glace, des problèmes vont venir perturber notre groupe d’explorateurs. La période de voyage est perdue et\n        un événement se produit :\n      </p>\n      <ul>\n        <li>\n          <p>L’un des personnage tombe dans une crevasse profonde et étroite. Il faudra plusieurs heures pour le sortir de là et la chute blesse le PJs =&gt; 3d6 DM</p>\n        </li>\n        <li>\n          <p>\n            L’éclaireur perd totalement la piste et le groupe doit faire demi-tour sur une longue distance. En plus de la perte de temps, l’agacement et la fatigue augmente. Perte\n            de deux périodes au lieu de une et chaque personnage perd 2 PR.\n          </p>\n        </li>\n        <li>\n          <p>\n            Sur le chemin, malgré les traces que l’Éclaireur auraient pu apercevoir, le groupe tombe nez à nez avec un repère de Jarguals. Les bêtes affamées se jettent sur les\n            PJs. Soit jouer le combat (utiliser la scène\_@UUID[Scene.YtUQev9XmexJVbYn]{4.Attaque Scarabée} contre 3\n            @UUID[Compendium.world.cof2ta-acteurs.Actor.Aw3zZPMsNnEWb2VK]{loups} et 1 @UUID[Compendium.world.cof2ta-acteurs.Actor.nb37b3cIaZs9y2ft]{Loup géant} soit répartissez les\n            dégâts suivant aux PJs (2d8+5 DM, 2d8+2 DM, 1d8+5 DM et 1d8+2 DM)\n          </p>\n        </li>\n        <li>\n          <p>L’éclaireur n’est pas clair dans ses avertissements et l’un des personnages glisse sur une plaque de glace et se blesse gravement =&gt; 4d6 DM</p>\n        </li>\n        <li>\n          <p>\n            En marchant le long d’une paroi rocheuse, un éboulement tombe sur le groupe, les recouvrant de petites pierres et d’une bonne couche de neige. Perte de deux période au\n            lieu de une et chaque personnage perd 2 PR.\n          </p>\n        </li>\n      </ul>\n    </li>\n  </ul>\n  <h3>Pour les périodes Campement :</h3>\n  <p>L’éclaireur effectue un nouveau @Test[car:per|diff:15|comp:Trouver et monter un camapement] pour trouver un endroit pour établir un campement reposant.</p>\n  <ul>\n    <li>\n      <p><strong>Si réussi :</strong></p>\n      <p>\n        Le campement est à l’abri du vent glacial, de la bruine qui tombe et les PJs arrivent même à trouver assez de bois sec pour faire un bon feu réconfortant. Chaque personnage\n        récupère normalement ses PM et son PR.\n      </p>\n    </li>\n    <li>\n      <p><strong>Si réussi de 10+ points :</strong></p>\n      <p>\n        Le campement est idéal. Une grotte, un bosquet dense ou une enclave le long d’une paroi, le groupe passe une excellente nuit, réchauffé par une belle flambée, le ventre\n        bien rempli par les rations complémentées par de délicieuses baies sauvages. Chaque PJs récupère normalement ses PM et son PR. En plus de cela, grâce à cette bonne nuit de\n        repos, l’Éclaireur gagne un bonus de +5 aux deux prochains\n        <span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">tests de Voyage</span>.\n      </p>\n    </li>\n    <li>\n      <p><strong>Si raté :</strong></p>\n      <p>\n        Pris par surprise par le soir qui arrive, le groupe s’installe à la va-vite dans un coin pas idéal. Les vêtements et l’équipement sont mouillés et glacé, impossible de\n        faire un feu et le vent agite le sommeil des explorateurs. Les PJs ne récupèrent aucun PM ni PR durant leur nuit.\n      </p>\n    </li>\n    <li>\n      <p><strong>Si raté de 10+ points :</strong></p>\n      <p>\n        <span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">Le lieu du campement est catastrophique. Au milieu de la nuit, des plaques de neiges tombent sur le campement éteignant le maigre feu et trempant tout l’équipement des\n          explorateurs. Les PJs sont plus épuisés au réveil qu’au moment de se coucher. Ils perdent tous un PR supplémentaire et ne récupèrent aucun PM ou PR de leur nuit.\n          L’Éclaireur, fatigué dès le début de journée, obtient un malus de -5 à ses deux prochains tests de Voyage.</span>\n      </p>\n    </li>\n  </ul>\n  <hr />\n  <h3>Le froid des montagnes</h3>\n  <p>\n    En plus de l’orientation et de l’établissement du campement, tous les explorateurs sont exposés au froid, à la neige et au bourrasques de vent tout au long du voyage. A chaque\n    période (les quatre), chaque personnage effectue @Test[car:con|diff:12|comp:Résistance au froid] pour résister au froid (appliquer les bonus liés au vêtements adaptés et au\n    baume de résistance au froid si les personnages en ont acheté).\n  </p>\n  <ul>\n    <li>\n      <p><strong>Si réussi :</strong></p>\n      <p>Le PJ résiste bien à la morsure du froids. Il a les doigts endoloris mais rien de plus.</p>\n    </li>\n    <li>\n      <p><strong>Si raté :</strong></p>\n      <p>\n        Les extrémités (doigts, orteils, nez, oreilles…) du personnages sont très douloureuses. Il a plus de mal à se déplacer et commence à avoir la tête qui tourne et des\n        engelures apparaissent sur sa peau. Le PJ subit 1d6 DM de froid.\n      </p>\n    </li>\n  </ul>\n  <p>\n    Le groupe d’aventurier pourra utiliser toutes les stratégies pour améliorer ses chances lors du voyage et les MJs ne doivent pas hésiter à leur donner des bonus pour leurs\n    tests. Le DD du test peut être aussi augmenté ou diminué en fonction de la progression du groupe.\n  </p>\n  <p>\n    Les explorateurs peuvent aussi volontairement faire une ou deux périodes de pause pour se soigner et récupérer de leur fatigue. Si un ou plusieurs personnages tombent à 0PR, il\n    ne pourra plus avancé et tombera insconcient sur le chemin. Si la perte de PR intervient pendant la période de campement, il tombera insconcient dans la nuit. Il effectue alors\n    @Test[car:con|diff:10|comp:Hypothermie] trois fois. S’il obtient plus de réussite que d’échec, il se réveille sinon il meure d’hypothermie et de fatigue.\n  </p>\n  <hr />\n  <h2>Rencontre du Scarabée des Crocs d’Acier</h2>\n  <p>Cette rencontre intervient au début de la période Campement du deuxième jour de voyage.</p>\n  <p><strong>Scène :</strong>\_@UUID[Scene.YtUQev9XmexJVbYn]{4.Attaque Scarabée}</p>\n  <p><strong>Ennemi :</strong> @UUID[Actor.Le97DeTuKGeUDmh7]{Scarabée des Crocs d'Acier}</p>\n  <blockquote>\n    <p>\n      Vous marchez depuis deux jours et la fatigue commence à se faire vraiment sentir dans tous les muscles de votre corps. Le rythme est soutenu mais particulièrement saccadé\n      lorsqu’il faut faire marche arrière, contourner une crevasse ou se risquer dans des zones particulièrement accidentées.\n    </p>\n    <p>Le groupe trouve un endroit à l’abri des bourrasques de vents pour passer la nuit et c’est le bon moment pour poser votre barda.</p>\n    <p>Alors que vous êtes en train de sortir l’équipement de votre campement, une ombre massive passe dans les derniers rayons du soleil couchant.</p>\n  </blockquote>\n  <ul>\n    <li>\n      <p>@Test[car:per]</p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>10+</strong></span> : <em>Une créature a bouger sur la crête au dessus de vous</em>\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>15+</strong></span> : <em>Un bruit d’insecte est à peine perceptible, un cliquetis qui se rapproche</em>\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>20+</strong></span> : <em>En levant les yeux on distingue à peine, le bout d’un immense scarabée.</em>\n          </p>\n        </li>\n      </ul>\n    </li>\n    <li>\n      <p>\n        @Test[car:int|diff:15|comp:Connaitre une créature] :\n        <em>c’est un scarabée géant des Montagnes. Le personnage sait qu’ils sont très résistants et qu’ils peuvent projeter des crachats empoisonnés et très puissants.</em>\n      </p>\n    </li>\n  </ul>\n  <p>Comme la plupart des insectes, il n’est pas agressif mais effrayé.</p>\n  <p>\n    <strong>Si les PJs l’intimident en poussant des cris ou en étant menaçant</strong> : @Test[car:for|comp:Intimidation] Opposé. Si réussi le scarabée s’en va. Si raté le scarabée\n    intimide pendant un round et attaque par un crachat le personnage qui l’intimide.\n  </p>\n  <p><strong>Si les PJs l’attaquent :</strong>\_le scarabée attaquera après un round d’intimidation en levant ses pattes et en vibrant intensément.</p>\n  <p>\n    <strong>Si on ne l’attaque pas et qu’on a une position défensive face à lui :\_</strong>le Scarabée pourra laisser les PJs partir. Si les PJs ne bougent pas, il s’avancera\n    jusqu’au contact en intimidant le groupe.\n  </p>\n  <h3>Butin</h3>\n  <p>\n    Pour récupérer les quatre doses de poisons mortel dans les glandes du Scarabée des Crocs d’Acier, le PJ doit effectuer @Test[car:agi|diff:15|comp:Biologie]. En cas d’échec\n    critique le personnage entre en contact avec le poison et subit son effet.\n  </p>\n  <p>Pour récupérer la corne du Scarabée des Crocs d’Acier, le PJ doit effectuer @Test[car:agi|diff:12|comp:Biologie].</p>\n  <hr />\n  <h2>Destination Finale</h2>\n  <blockquote>\n    <p>\n      Après cette rencontre surprise, vous passez une nuit sans encombre. D’après les informations de Timaor, vous devriez arriver demain dans la journée à l’endroit qu’il vous a\n      indiqué. Au petit matin, vous reprenez votre route dans ces montagnes hostiles et sauvages.\n    </p>\n  </blockquote>\n  <p>Reprenez les @Test[car:per|diff:15|comp:Voyage en terrain difficile] pour l’Éclaireur pour les périodes restantes.</p>\n  <p>Lorsque la douzième période est réussie, le groupe d’explorateurs s’approche de leur destination.</p>\n  <blockquote>\n    <p>\n      Alors que vous arpentez les pentes abruptes, vous arrivez dans une foret dense, mélange d’essences de résineux de montagnes et de feuillus résistants au froid de l’altitude.\n      Vous traversez sans difficulté des petits cours d’eau prenant leur sources dans les hauteurs et alimentés par la fonte des neiges.\n    </p>\n  </blockquote>\n  <p>\n    Le groupe doit se diriger grâce aux informations qu’ils ont pu récupérés de Timaor Dunclin à la Vallée de Novrak. Il faudra qu’ils prennent les bonnes décisions pour approcher\n    le village des centaures.\n  </p>\n  <p>\n    En fonction de la quantité d’information qu’ils ont et de leur prise de notes, laissez-les tourner en rond et prendre du temps dans la forêt. Le climat de cette endroit est\n    beaucoup plus clément et les PJs n’auront plus besoin de faire des @Test[car:con|diff:12|comp:Résistance au froid] pour résister au froid.\n  </p>\n  <p>Lorsqu’ils approchent de la destination :</p>\n  <blockquote>\n    <p>\n      Au travers des branches et des buissons, vous distinguez un nuage de vapeur d’eau provenant d’une paroi rocheuse et lorsque vous vous en approchez, vous tombez sur une zone\n      où les arbres ont été coupés proprement à la hache.\n    </p>\n  </blockquote>\n  <p>Tant que les PJs ne s’approchent pas trop de la paroi recouverte de lierre et de plantes, ils peuvent discuter et mettre en place des stratégies diverses et variées.</p>\n  <hr />\n  <p>\n    <span><strong>PASSAGE DE NIVEAU</strong></span>\n  </p>\n  <hr />\n</div>"
