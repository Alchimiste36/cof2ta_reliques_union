      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <h2>2e jour dans les montagnes</h2>\n  <blockquote>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/passage3.webp\" width=\"100\" height=\"100\" />\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/montagnes_crocs_d_acier_large1.webp\" width=\"100\" height=\"100\" />\n    <p>\n      La route se poursuit en serpentant dans les\_montagnes et vous passez régulièrement sur\_des ponts anciens à l’architecture naine qui doivent\_avoir plusieurs centaines\n      d’années. Certains ouvrages\_sont assez délabrés et marqués par le manque d’entretien. Plusieurs tunnels de grandes tailles se succèdent\_également sur cette route.\n    </p>\n    <p>\n      A de nombreuses reprises, des rochers bloquent\_une partie du chemin et des éboulements semblent\_avoir été déblayés à la hâte histoire de faire passer la\_taille d’une caravane\n      de marchands ou des carrioles.\n    </p>\n    <p>\n      Plus vous avancez dans la montagne plus la végétation devient éparse et plus vous percevez les bruits,\_les cris ou les ombres de créatures sauvages autour de\_vous, en haut de\n      promontoires ou au fond de grottes\_naturelles que vous croisez. Des traces de roues de\_charrettes cassées ou des traces de campements sont\_présentes tout au long de la route.\n    </p>\n  </blockquote>\n  <hr />\n  <h2>4e jour dans les montagnes</h2>\n  <blockquote>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/croisement.webp\" width=\"100\" height=\"100\" />\n    <p>\n      Après 4 jours à arpenter les montagnes, vous\_arrivez à un croisement important. Pas\_seulement entre la route principale et des petits\_chemins annexes comme vous avez déjà\n      croisé mais\_bien un carrefour en patte d’oie où les deux routes\_sont de tailles et d’aspects similaires. L’une continue\_vers l’Est au travers les montagnes et la\n      deuxième\_pointe vers le sud et elle est encadrée par deux\_statues de pierre représentant un nain et une naine\_d’environ 8m de hauteur. Tous les deux portent des\_habits de\n      mineur, pioche à la main, casque à bougie\_et un beau symbole de l’ordre du Temple au centre\_de leur tablier.\n    </p>\n    <p>Le chemin vers l’Est semble plus fréquenté que\_celui du Sud. Par où allez-vous ?</p>\n  </blockquote>\n  <hr />\n  <h3>Chemin sud</h3>\n  <blockquote>\n    <p>Après une journée entière de voyage. Vous atteignez une ancienne mine naine à l’abandon depuis des dizaines voir des centaines d’années.</p>\n    <p>\n      Une quinzaine de mètres après la grande ouverture,\_le couloir est condamné par un entremêlement de\_gravats et de rochers et une grande grille de fer forgé\_et gravé de runes\n      est baissée devant les gravats.\n    </p>\n    <p>Au niveau de l’immense hache au dessus de\_l’ouverture, vous lisez : Forteresse-État de Arkir’am.\_</p>\n  </blockquote>\n  <p>\n    @Test[car:int|diff:18|comp:Culture Naine] (bonus de +5 pour les PJs nains) :\n    <em>c’est\_l’entrée d’une mine qui a été abandonnée. Certains\_parlent de l’épuisement des minerais ou d’un conflit\_politique. D’autres racontent que la cité a été perdue\_après\n      des attaques. Elle a été fermée il y a un peu\_plus de 1 000 ans (-298 CA).</em>\n  </p>\n  <p>Les PJs peuvent monter un camp sécurisé dans\_l’entrée de la mine.</p>\n  <p>\n    @Test[car:per|diff:20] :\n    <em>Vous vous sentez observés haut\_dessus de vous dans les montagnes. Les bruits que\_vous preniez pour les sifflements du vent ressemblent\_plus à des sifflements ou des\n      murmures.</em>\n  </p>\n  <p>Rien de plus sur ce chemin c’est un cul-de-sac !</p>\n  <hr />\n  <h3>Chemin Est</h3>\n  <blockquote>\n    <p>\n      En poursuivant vers l’Est la route continue\_de façon répétitive et interminable. Falaise,\_rocher, froid, tunnels et ponts s’enchaînent toute la\_journée. Le vent est de plus\n      en plus mordant et le\_froid commence à être pénible. Vous sentez que la\_fraicheur commence à mordre et la glace au-dessus\_de vous est renforcée par la température glaciale.\n      Le\_soleil fait scintiller les plaque de neige et de glace. Les\_plic-ploc résonnent entre les parois bordant la route.\_\n    </p>\n    <p>En début de matinée, vous entendez un sifflement\_au dessus de votre tête derrière le bruit du craquement des pierres et des rochers.</p>\n  </blockquote>\n  <ul>\n    <li>\n      <p>@Test[car:per] :</p>\n      <ul>\n        <li>\n          <p><strong>10+</strong> : <em>les bruits viennent d’au-dessus</em></p>\n        </li>\n        <li>\n          <p><strong>11 à 15</strong> : <em>ils viennent de votre droite</em>\_(montrer la plateforme où est la bête)</p>\n        </li>\n        <li>\n          <p><strong>20+</strong> : (indiquer l’endroit exacte de la\_bête). <em>Vous reconnaissez les bruit d’une Guivre</em>\_</p>\n        </li>\n      </ul>\n    </li>\n    <li>\n      <p>@Test[car:per|comp:Survie|diff:12] pour avoir des informations supplémentaires sur la guivre.</p>\n    </li>\n  </ul>\n  <p><strong>Scène :</strong> @UUID[Scene.52plQoZyLqz1Wgm0]{2.Attaque Guivre}</p>\n  <p><strong>Ennemi :</strong>\_@UUID[Actor.WMg1XixxYGvtKyKy]{Guivre}</p>\n  <p>\n    Si certains PJs le veulent, ils peuvent réussir à faire\_fuir la Guivre grâce à des cris et des bruits forts\_(@Test[car:cha|comp:Intimidation|diff:15] ou\_\n    @Test[car:for|comp:Intimidation|diff:15]) ou avec l’usage de torches ou de\_feu magique. La guivre se s’enfuira pas de suite mais\_restera à distance. Si on l’attaque, elle\n    attaquera mais\_si personne ne l’attaque, elle montera vers les sommets\_et disparaîtra.\n  </p>\n  <p>\n    Si le combat s'engage et que les PJ semblent remporter le combat facilement, n'hésitez pas à rajouter une guivre qui attaque par surprise après les premiers rounds de combat.\n  </p>\n  <hr />\n  <p>Après 7 (ou 9 jours s’ils sont passés par les mines\_naines d’Arkir’am), les PJs arrivent en vue de la ville\_de la Vallée de Novrak.</p>\n  <hr />\n  <p>\n    <span><strong>PASSAGE DE NIVEAU</strong></span>\n  </p>\n  <hr />\n</div>"
