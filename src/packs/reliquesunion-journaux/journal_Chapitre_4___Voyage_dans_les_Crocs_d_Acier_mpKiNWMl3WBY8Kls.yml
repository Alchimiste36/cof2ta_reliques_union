      content: |-
        <div class="journal-cof2ta-ru">
          <h1>2e jour dans les montagnes</h1>
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/passage3.webp" width="100" height="100" />
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/montagnes_crocs_d_acier_large1.webp" width="100" height="100" />
            <p class="paragraphe">
              La route se poursuit en serpentant dans les montagnes et vous passez régulièrement sur des ponts anciens à l'architecture naine qui doivent avoir plusieurs centaines
              d'années. Certains ouvrages sont assez délabrés et marqués par le manque d'entretien. Plusieurs tunnels de grandes tailles se succèdent également sur cette route.
            </p>
            <p class="paragraphe">
              A de nombreuses reprises, des rochers bloquent une partie du chemin et des éboulements semblent avoir été déblayés à la hâte histoire de faire passer la taille d'une caravane
              de marchands ou des carrioles.
            </p>
            <p class="paragraphe">
              Plus vous avancez dans la montagne plus la végétation devient éparse et plus vous percevez les bruits, les cris ou les ombres de créatures sauvages autour de vous, en haut de
              promontoires ou au fond de grottes naturelles que vous croisez. Des traces de roues de charrettes cassées ou des traces de campements sont présentes tout au long de la route.
            </p>
          </div>
          <hr />

          <h1>4e jour dans les montagnes</h1>
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/croisement.webp" width="100" height="100" />
            <p class="paragraphe">
              Après 4 jours à arpenter les montagnes, vous arrivez à un croisement important. Pas seulement entre la route principale et des petits chemins annexes comme vous avez déjà
              croisé mais bien un carrefour en patte d'oie où les deux routes sont de tailles et d'aspects similaires. L'une continue vers l'Est au travers les montagnes et la deuxième
              pointe vers le sud et elle est encadrée par deux statues de pierre représentant un nain et une naine d'environ 8m de hauteur. Tous les deux portent des habits de mineur,
              pioche à la main, casque à bougie et un beau symbole de l'ordre du Temple au centre de leur tablier.
            </p>
            <p class="paragraphe">Le chemin vers l'Est semble plus fréquenté que celui du Sud. Par où allez-vous ?</p>
          </div>
          <hr />

          <h2>Chemin sud</h2>
          <div class="description">
            <p class="paragraphe">Après une journée entière de voyage. Vous atteignez une ancienne mine naine à l'abandon depuis des dizaines voir des centaines d'années.</p>
            <p class="paragraphe">
              Une quinzaine de mètres après la grande ouverture, le couloir est condamné par un entremêlement de gravats et de rochers et une grande grille de fer forgé et gravé de runes
              est baissée devant les gravats.
            </p>
            <p class="paragraphe">Au niveau de l'immense hache au dessus de l'ouverture, vous lisez : Forteresse-État de Arkir'am.</p>
          </div>
          <p class="paragraphe">
            @Test[car:int|diff:18|comp:Culture Naine] (bonus de +5 pour les PJs nains) :
            <span class="description">c'est l'entrée d'une mine qui a été abandonnée. Certains parlent de l'épuisement des minerais ou d'un conflit politique. D'autres racontent que la cité a été perdue après
              des attaques. Elle a été fermée il y a un peu plus de 1 000 ans (-298 CA).</span>
          </p>
          <p class="paragraphe">Les PJs peuvent monter un camp sécurisé dans l'entrée de la mine.</p>
          <p class="paragraphe">
            @Test[car:per|diff:20] :
            <span class="description">Vous vous sentez observés haut dessus de vous dans les montagnes. Les bruits que vous preniez pour les sifflements du vent ressemblent plus à des sifflements ou des
              murmures.</span>
          </p>
          <p class="paragraphe">Rien de plus sur ce chemin c'est un cul-de-sac !</p>
          <hr />

          <h2>Chemin Est</h2>
          <div class="description">
            <p class="paragraphe">
              En poursuivant vers l'Est la route continue de façon répétitive et interminable. Falaise, rocher, froid, tunnels et ponts s'enchaînent toute la journée. Le vent est de plus
              en plus mordant et le froid commence à être pénible. Vous sentez que la fraicheur commence à mordre et la glace au-dessus de vous est renforcée par la température glaciale.
              Le soleil fait scintiller les plaque de neige et de glace. Les plic-ploc résonnent entre les parois bordant la route.
            </p>
            <p class="paragraphe">En début de matinée, vous entendez un sifflement au dessus de votre tête derrière le bruit du craquement des pierres et des rochers.</p>
          </div>
          <ul>
            <li>
              <p class="paragraphe">@Test[car:per] :</p>
              <ul>
                <li>
                  <p class="paragraphe"><span class="roll-result">10+</span> : <span class="description">les bruits viennent d'au-dessus</span></p>
                </li>
                <li>
                  <p class="paragraphe"><span class="roll-result">11 à 15</span> : <span class="description">ils viennent de votre droite</span> (montrer la plateforme où est la bête)</p>
                </li>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">20+</span> : <span class="description">Vous reconnaissez les bruit d'une Guivre</span> (indiquer l'endroit exacte de la bête).
                  </p>
                </li>
              </ul>
            </li>
            <li>
              <p class="paragraphe">@Test[car:per|comp:Survie|diff:12] pour avoir des informations supplémentaires sur la guivre.</p>
            </li>
          </ul>
          <hr />
          <p class="paragraphe"><strong>Scène :</strong> @UUID[Compendium.cof2ta_reliques_union.reliquesunion-scenes.Scene.52plQoZyLqz1Wgm0]{2.Attaque Guivre}</p>
          <p class="paragraphe"><strong>Ennemi :</strong> @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.UOEKoQMfxXkFeoQY]{Guivre}</p>
          <p class="paragraphe">
            Si certains PJs le veulent, ils peuvent réussir à faire fuir la Guivre grâce à des cris et des bruits forts (@Test[car:cha|comp:Intimidation|diff:15] ou
            @Test[car:for|comp:Intimidation|diff:15]) ou avec l'usage de torches ou de feu magique. La guivre se s'enfuira pas de suite mais restera à distance. Si on l'attaque, elle
            attaquera mais si personne ne l'attaque, elle montera vers les sommets et disparaîtra.
          </p>
          <p class="paragraphe">
            Si le combat s'engage et que les PJ semblent remporter le combat facilement, n'hésitez pas à rajouter une guivre qui attaque par surprise après les premiers rounds de combat.
          </p>
          <hr />
          <p class="paragraphe">Après 7 (ou 9 jours s'ils sont passés par les mines naines d'Arkir'am), les PJs arrivent en vue de la ville de la Vallée de Novrak.</p>

          <div class="levelup">PASSAGE DE NIVEAU</div>
        </div>
