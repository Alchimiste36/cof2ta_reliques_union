      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Synthèse du chapitre</h1>
          <p class="paragraphe">
            Les aventuriers sont repartis sur les routes en direction des hautes Montagnes des Crocs d'Acier. Ils vont parcourir des centaines de kilomètres au travers des plaines du Pays
            des Vents puis dans les chemins encombrés des hautes montagnes.
          </p>
          <p class="paragraphe">
            Le voyage sera long et dangereux lorsqu'ils arriveront dans les Crocs d'Acier mais le plus grand danger sera l'embuscade réalisée par la Toile Vivante sur le groupe lors d'une
            fraiche nuit.
          </p>
          <p class="paragraphe">
            La rencontre avec cette maille de la Toile Vivante sera une nouvelle étape dans la compréhension de leur mission. La Capitaine Dracki et son groupe interrogeront les héros ou
            se feront interrogé par eux.
          </p>
          <p class="paragraphe">
            La poursuite de leur voyage sera, de nouveau, perturbé par la rencontre avec une guivre sauvage mais les PJs arriveront à la Vallée de Novrak après plusieurs jours à crapahuter
            d'Ouest en Est. Dans la ville montagneuse et isolée de la Vallée de Novrak, le groupe devra trouver des informations sur la localisation du village des centaures. La recherche
            et la rencontre de Timaor Dunclin, ce vieil ivrogne renfrogné leur donnera une zone assez précise dans les montagnes pour aller à la rencontre des centaures du village
            d'Arkanov.
          </p>
          <p class="paragraphe">
            Au passage, pendant cette période de transition, les PJs entendront parler des fameuses Ombres Blanches qui attaquent de temps en temps les imprudents voyageurs, les personnes
            qui parcourent les montagnes environnantes et, certaines fois, les abords de la ville. Les aventuriers seront confrontés aussi au racisme qui commence à augmenter envers les
            anciennes races dans cette région presque coupée du monde.
          </p>
          <p class="paragraphe">
            Après plusieurs jours pour s'équiper à la Vallée de Novrak, obtenir des informations complémentaires sur les montagnes et même, peut-être, engager un pisteur pour les orienter,
            le groupe de PJs pourra commencer une randonnée périlleuse sur les sommets.
          </p>
          <p class="paragraphe">La découverte du village d'Arkanov sera le commencement d'une longue période de «captivité» au sein de cette étrange communauté.</p>
          <hr />
          <h1>Explications</h1>
          <p class="paragraphe">Le voyage sera une bonne occasion de mettre le groupe de PJs en danger et resserrer les liens entre eux.</p>
          <p class="paragraphe">
            Autour du feu de leur campement au milieu des plaines de l'Ourann ou dans les défilés des Crocs d'Acier, les personnages auront du temps pour discuter de leur passé et leurs
            passions.
          </p>
          <p class="paragraphe">
            L'attaque de la Toile Vivante, menée par la Capitaine Dracki, donnera du grain à moudre pour les PJs. La violence de leur escarmouche en comparaison avec les bonnes valeurs que
            cette organisation défendent sera un moment de forte réflexion pour les PJs. Quelle sont les motivations de ce groupe multiracial ? La Toile Vivante est-elle une alliée ou une
            ennemie pour la quête des héros ? Les PJs arriveront-ils a comprendre ces forts caractères qui donneront naissance, bien des années plus tard, à la Compagnie des Bannis ?
          </p>
          <p class="paragraphe">
            La Toile Vivante est une organisation qui a les mêmes motivations que les PJs : éviter la domination d'un peuple sur les autres et propager la paix et la coopération entre les
            races des Terres d'Arran. Ils se battent depuis des années contre les persécutions et les groupes qui utilisent des esclaves ou qui écrasent des communautés. Ils ne sont pas
            bien nombreux mais leur opérations coup-depoings et les raids qu'ils font ponctuellement sur des esclavagistes leur ont donné une petite renommée. La maille de la Capitaine
            Dracki a entendu parlé de la résurgence d'une des reliques de la fascination et elle a décidé de récupérer le Bracelet avant que les PJs ne l'utilisent pour de mauvaises
            intentions.
          </p>
          <p class="paragraphe">
            Si les PJs récupère de l'équipement des membres de la Toile Vivante, ils pourront augmenter leur puissance grandement. Les bombes de Franill'eh, les boucles d'oreilles de
            vision nocturne de Grooguen ou le marteau runique de Dracki seront très utiles pour notre groupe.
          </p>
          <p class="paragraphe">
            Arrivés à la Vallée de Novrak, cette ville isolée et rude, les aventuriers devront partir en enquête pour trouver Timaor Dunclin. Ce vieux célibataire alcoolique était un
            marchand plutôt prospère avant de rencontrer les centaures d'Arkanov. Il a été emprisonné pendant plusieurs mois avant de sympathiser avec cette population vivant en autarcie
            totale. Lorsqu'il est rentré à la Vallée de Novrak avec des récités farfelus et des produits étranges sortant des production d'Arkanov, aucun client ne l'a cru et il est devenu
            la risée de la ville. Il a continué quelques fois des visites à Arkanov mais une rumeur a commencé à se répandre à la Vallée de Novrak, le fameux Titi était, en faite, en lien
            avec des Peaux Vertes qui pillent des villes et des villages. Toutes ses marchandises sont soit volées soit fabriquées par des Peaux Vertes (et donc de piètre qualité). Timaor
            a fait faillite. Il est tombé dans les fortes boissons alcoolisées des montagnes.
          </p>
          <p class="paragraphe">
            Il n'est pas bien méchant mais, à chaque fois qu'il pensera qu'on se moque de lui, il perdra ses moyens et entrera dans une colère froide et assez exagérée. Il faudra aborder
            Timaor avec tacts, respect et délicatesse pour ne pas le fermer à toutes leurs questions. La recherches de Timaor et les délais de fabrication des équipements qui leur seront
            utiles pour le voyage sera nécessaire pour que les PJs restent quelques jours dans cette grande ville et recevoir des avertissements sur la menace des Ombres Blanches.
          </p>
          <p class="paragraphe">
            Les Ombres Blanches sont en fait des kidnappeurs venant d'une cité souterraine peuplée d'Elfes Exsangues. Ils vivent dans une société matriarcale extrêmement vicieuse où règne
            la torture, le travail forcé, l'esclavagisme et, encore, un système hiérarchique très dur. Les femmes elfes qui dirigent la cité ont tous les droits, choisissent leurs victimes
            pour des violences physiques, morales ou sexuelles comme bon leur semble.
          </p>
          <p class="paragraphe">
            Les PJs auront tout le loisir de découvrir la perversion de cette société lorsqu'il vivront dans le village des centaures. Les informations qu'ils récupéreront à la Vallée de
            Novrak sera un avant-goût de leur future attaque sur les elfes exsangues.
          </p>
          <p class="paragraphe">
            Pour finir, afin d'introduire un chapitre qui interviendra bien plus tard dans la campagne, les PJs ressentiront à la Vallée de Novrak les premiers signes du racisme commençant
            à gangrener les habitants humains de cette région du monde. Venant de la capitale de la Marche du Venkor, Kosland, les idées ségrégationnistes et racistes envers les anciennes
            races commencent à se répandre dans toutes les strates sociales de la ville. La Guerre des Goules, que vivra les aventuriers dans la Cité-Mine d'Hyrr'Tarënn, enflammera cette
            haine sur toutes les régions et déclenchera les Guerres d'Arran quelques années plus tard.
          </p>
        </div>
