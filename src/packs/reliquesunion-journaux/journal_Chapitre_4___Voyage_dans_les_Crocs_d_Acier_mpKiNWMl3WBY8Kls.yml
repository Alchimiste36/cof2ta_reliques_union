  - sort: 600000
    name: Investigation dans la ville
    type: text
    _id: NWuIIQG4gD5FBDzt
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Investigation dans la ville</h1>
          <p class="paragraphe">
            Il n'est pas si simple de trouver des informations sur une histoire datant de 27 ans. Les aventuriers vont devoir discuter et trouver les bonnes personnes pour retrouver le
            vieux Titi.
          </p>
          <p class="paragraphe">
            Si les PJs parlent du Village d'Arkanov, des centaures, des Reliques de l'Union ou de ce genre de détails, personne n'en aura entendu parler.
            <strong>La plupart des villageois posent de nombreuses questions</strong> aux PJs sans vraiment répondre à leurs interrogations.
          </p>
          <p class="paragraphe">
            La plupart du temps, <strong>ils dirigeront le groupe vers la bibliothèque du château</strong>, directement le seigneur Abrosk ou la Guilde des Jongleurs.
          </p>
          <p class="paragraphe">
            Les habitants vont rebondir souvent sur le réel danger qui les inquiète : <strong>les «Ombres Blanches» qui attaquent, tuent et kidnappent des jeunes régulièrement</strong>.
            Les villageois sont soit outrés par le manque d'action du seigneur soit dépités par ces attaques. Ils mettront en garde les PJs chaque fois que ces derniers parleront d'aller
            dans les montagnes.
          </p>

          <h2>Trouver le marchand du conte de Novrak</h2>
          <h3>Bibliothèque du Château</h3>
          <img src="modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_chateau_temple.webp" width="150" height="150" />
          <p class="paragraphe">
            Après des procédures fastidieuses, des heures d'attente et beaucoup de portes claquées au museau, les PJs pourront demander au maître Archiviste Tarrinn de rechercher des
            informations dans la bibliothèque du château. En fonction des demandes, de la précision des informations données et du délais accordé,
            <strong>le résultat arrivera plus ou moins vite et coûtera plus ou moins cher aux aventuriers. </strong>
          </p>
          <ul>
            <li>
              <p class="paragraphe">
                <strong>Dans le meilleur des cas</strong> (beaucoup d'informations données, diplomacie parfaite, dépense d'argent élevé, gentilesse, patience…), les bibliothécaires
                trouveront le fameux marchand du conte et @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.sAv6tykf70FxSJjP]{le récit de son procès}
                <strong>au bout de 4 ou 5 jours</strong>.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Dans le pire des cas</strong> (informations vagues, énervement, radinerie, impatience…), les bibliothécaires trouveront les documents
                <strong>après au moins 10 jours</strong> et pourront noyer le groupe avec de nombreux documents supplémentaires sans aucune importance.
              </p>
            </li>
          </ul>
          <img src="modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_bibliotheque2.webp" width="100" height="100" />
          <p class="paragraphe">
            En plus de la même version du Conte de Novrak trouvée par les PJs quelques jours plus tôt,
            <strong>l'archiviste Tarrinn leur fourni @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.sAv6tykf70FxSJjP]{un résumé du procès} de Timaor Dunclin faisant référence
              à toute cette histoire.</strong>
            S'ils demandent, les PJs seront dirigés vers les gardes de la ville pour connaitre l'endroit où vit Timaor Dunclin en ce moment.
          </p>
          <hr />

          <h3>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.OYaSLTALmbEo5XZL]{Sélénia}, l'Herboriste</h3>
          <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/vallee_novrak/villageois_selenia_bassebranche.webp" width="150" height="150" />
          <p class="paragraphe">
            Si les PJs demandent des informations à Sélénia, la propriétaire de l'École du Vivant, après quelques minutes pour comprendre leur demande et relier tous ces informations,
            <strong>elle pense connaitre le vieil alcoolique que les héros recherchent</strong>.
          </p>
          <p class="paragraphe">
            Son école faisant aussi office d'hôpital et de refuge pour les nécessiteux, elle a des contacts fréquent avec «<strong>le vieux Titi</strong>» qui vient lui demander de temps à
            autre des soins ou des plantes pour faire passer une maladie hivernale.
          </p>
          <p class="paragraphe">
            <strong>Sélénia hésitera à donner des informations aux PJs car «le vieux Titi» est un être brisé</strong> et elle ne souhaite pas que des inconnus viennent remuer les souvenirs
            douloureux du vieil homme.
          </p>
          <img src="modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_ecole_vivant.webp" width="100" height="100" />
          <p class="paragraphe">
            <strong>L'intimidation et les pot-de-vin ne fonctionneront pas avec Sélénia</strong>. Elle a bien assez de fonds propres et cela fait bien longtemps qu'elle n'a plus peur d'une
            bande d'étrangers agressifs.
          </p>
          <p class="paragraphe">
            Si les PJs sont aimables et qu'ils rassurent Sélénia sur leurs intentions (@Test[car:cha|diff:20|comp:Diplomacie] si besoin), elle voudra bien leur donner des renseignements
            sur «le vieux Titi» :
          </p>
          <ul>
            <li>
              <p class="paragraphe"><strong>Timaor vient la voir</strong> de temps en temps</p>
            </li>
            <li>
              <p class="paragraphe">Il est <strong>rarement sobre</strong> et soit l'ivresse le rend désagréable soit elle le rend triste et plaintif</p>
            </li>
            <li>
              <p class="paragraphe">Il <strong>habite une ruine toute petite dans le quartier pauvre</strong> de la ville, tout près des maisons closes.</p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Il n'aime pas raconter son histoire depuis le procès.</strong> Certains habitants, des jeunes et des enfants, se moquent de lui et lui font des crasses.
                <strong>Ca le rend paranoïaque et surtout méchants</strong>.
              </p>
            </li>
          </ul>
          <p class="paragraphe">
            Si Sélénia apprend que les PJs ont été malhonnête avec lui, ils auront affaire à elle car elle ne supporte pas qu'on s'en prenne aux personnes vulnérables.
          </p>
          <hr />

          <h3>Les voyous et enfants du village</h3>
          <p class="paragraphe">
            <strong>Si les PJs rencontrent les petits malfrats de la ville, la plupart de ses jeunes hommes et femmes connaissent le vieux Titi</strong> car il habite à côté de leur QG.
            Timaor se fournit en alcool auprès d'eux et de temps à autres,
            <strong>les voyous l'utilisent, contre quelques pièces d'argent, pour créer des «diversions» afin de faire les poches dans les tavernes</strong>
            ou sur les places de marché.
          </p>
          <p class="paragraphe">
            Au premier abord ils seront assez méfiant du groupe d'aventuriers mais <strong>avec une bourse bien remplie les langues se délieront</strong> rapidement.
          </p>
          <p class="paragraphe">
            Une partie des enfants de la Vallée de Novrak connaissent «le vieux Titi». Certains car ils aiment bien embêter ce vieil alcoolique colérique pour passer le temps et d'autres
            car «le vieux Titi», quand il est mélancolique de sa vie d'avant, raconte des histoires rigolotes sur sa rencontre avec les hommes-chevaux dans les hautes montagnes enneigées.
          </p>
          <hr />

          <h3>Mensonges pour une nouvelle vie</h3>
          <p class="paragraphe">
            Au bout de quelques jours <strong>alors que la rumeur d'un groupe d'aventuriers recherchant des informations augmente</strong>, plusieurs femmes humaines ou naines de la Vallée
            de Novrak viennent les voir à l'auberge ou à la taverne pour leur parler.
            <strong>Elles les draguent ouvertement et leur raconte une quantité phénoménale d'histoires</strong> en tout genre sur tous les marchands de la ville.
            <strong>Beaucoup d'informations sont fausses ou pas vraiment pertinentes mais si ça peut permettre à ses femmes de quitter la Vallée de Novrak, elles y mettront du coeur</strong>. Des jeunes hommes, encore moins subtils, viendront séduire les personnages féminins mais aussi masculins s'ils pensent qu'il y a une ouverture.
          </p>
          <p class="paragraphe">
            Parmi toutes ces informations, <strong>certaines mères veuves connaissent un vieux marchand alcoolique qui raconte des histoires farfelues aux enfants du village</strong>. Elle
            ne savent pas où il habite mais les enfants devraient pouvoir le trouver dans les rues de la cité.
          </p>
        </div>
