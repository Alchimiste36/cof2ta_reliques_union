      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Attaque de la Toile Vivante</h1>
          <p class="paragraphe">
            Après une longue journée de voyage dans les Crocs d'Acier, les PJs vont s'installer pour la nuit dans un ancien bâtiment qui devait servir à l'époque de halte de voyage et de
            péage pour emprunter le pont entre deux flancs de montagne.
          </p>
          <p class="paragraphe">
            Ils vont se faire attaquer par une Maille de la @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.fV8x7QzwxUlPb1Xp]{Toile Vivante} qui attend les
            aventuriers depuis quelques jours. A leur arrivé, les membres de la Maille s'installent sur les toits en attendant le bon moment pour surprendre les PJs.
          </p>
          <p class="paragraphe">
            <strong>Leur but :</strong> assommer ou ligoter les personnages les plus dangereux et surtout celui qui monte la garde pour pouvoir les interroger et si possible récupérer le
            Bracelet de l'Union ou des informations sur ce dernier et les motivations du groupe.
          </p>
          <p class="paragraphe"><span class="imp">Attention : </span>si un combat se déclenche, il est assez dangereux pour des héros de bas niveau.</p>
          <hr />

          <h1>Attaque surprise</h1>
          <h2>Premier Front : le PJ qui monte la garde</h2>
          <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/grooguen.webp" width="100" height="100" />
          <p class="paragraphe">
            Le PJ qui monte la garde va recevoir la visite de @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.rwst2vEmQPMvEUGy]{Grooguen}, un humain fort et expérimenté
            qui attend sur la toiture du bâtiment. Il attend le bon moment pour sauter sur le PJ qui fait sa ronde. Grooguen essaye de tomber sur le PJ et lui plaquer le tissu imbibé de
            Baume de mutisme sur le visage.
          </p>
          <p class="paragraphe">Si le combat s'engage avec Grooguen, il dégaine son épée longue et se défendra du mieux qu'il peut en se dirigeant vers ses camarades cachés.</p>
          <ul>
            <li>
              <p class="paragraphe">@Test[car:per] vs @Test[car:agi|comp:discrétion] (+6)</p>
            </li>
          </ul>
          <ul>
            <li>
              <p class="paragraphe"><strong>Si Perception raté : </strong></p>
              <div class="description">
                <p class="paragraphe">
                  Tu es tranquillement en train d'observer les alentours de la bâtisse où tes compagnons de voyage sont installés lorsque tu reçois une grande masse sur le dos. Au moment
                  de l'impact, tu tourne la tête et aperçois succinctement, un homme grand et costaux qui a sauté depuis les hauteurs directement sur toi, une épée longue à la main. Il a
                  des tatouages un peu partout sur le visage et le cou. Sa deuxième main se plaque sur ton visage avec un bout de tissu qui sent fortement le champignon.
                </p>
              </div>
              <p class="paragraphe"><strong>Dégâts du choc : 1d6+4 DM</strong></p>
              <p class="paragraphe">
                @Test[car:con|diff:20|comp:Résistance à un poison|echstatut:silence] (@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.uMux0pNjs73Usngm]{Baume de Mutisme})
              </p>
              <ul>
                <li>
                  <p class="paragraphe"><strong>Si Constitution raté : 2d10 heures.</strong></p>

                  <div class="description">
                    <p class="paragraphe">Tu sens que tes cordes vocales se crispent. Tu essayes de crier pour prévenir les dormeurs mais aucun son ne sort de ta bouche.</p>
                  </div>
                </li>
                <li>
                  <p class="paragraphe"><strong>Si Constitution réussi :</strong></p>
                  <div class="description">
                    <p class="paragraphe">Malgré la pâte qui semble te contracter les cordes vocales tu arrives à éloigner ton visage et tu peux crier pour prévenir les dormeurs.</p>
                  </div>
                </li>
              </ul>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Si Perception Réussie : </strong>

                </p><div class="description">
                  <p class="paragraphe">
                    Alors que tu es tranquillement en train d'observer les alentours de la bâtisse où tes compagnons de voyage sont installés pour la nuit, tu entends un craquement au
                    dessus de toi, sur le bord de la toiture. Au moment, où tu te retournes pour regarder l'endroit, tu distingues un homme grand et costaux qui est accroupi sur le rebord
                    près à bondir vers toi. Il tient dans la main une épée longue et dans l'autre un bout de tissu qui semble humide. Il saute dans ta direction mais tu arrive à l'éviter.
                    Il atterri à ton contact.
                  </p>
                </div>
              <p></p>
            </li>
          </ul>
          <hr />

          <h2>Deuxième Front : le PJ le plus dangereux</h2>
          <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/frahnilleh.webp" width="100" height="100" />
          <p class="paragraphe">
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.FJMtWtydebKWXYF0]{Franill'eh} est une Lutane (peuple très rare dans cette partie d'Arran). Elle est chargée
            d'assomer et de rendre muet le PJ considéré comme le plus dangereux du groupe. En cas de difficulté pour estimer, elle privilégira le PJ le plus isolé dans le bâtiment.
          </p>
          <p class="paragraphe">Si elle réussi à assomer le PJ sans déclencher d'alerte, elle tentera la même chose sur les autres.</p>
          <p class="paragraphe">@Test[car:per] vs @Test[car:agi|comp:discrétion] (+8)</p>
          <ul>
            <li>
              <p class="paragraphe"><strong>Si Perception raté : </strong></p>
              <p class="paragraphe"><strong>Dégâts du Gourdin à la Tête :</strong> 1d8 DM</p>
              <p class="paragraphe">
                @Test[car:con|diff:20|comp:Résistance au poison|echstatut:silence] (@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.uMux0pNjs73Usngm]{Baume de Mutisme})
              </p>
              <ul>
                <li>
                  <p class="paragraphe"><strong>Si Constitution raté : 2d10 heures</strong></p>
                  <div class="description">
                    <p class="Paragraphe">
                      Tu ressens une douleur intense pendant ton sommeil. Tu essayes de crier mais aucun son ne sort de ta bouche. En ouvrant les yeux, tu te rends compte que ton nez et ta
                      bouche sont obstrués par un bout de tissu qui sent une forte odeur de champignon. En tournant la tête sur ta droite, tu remarque d'abord du sang qui coule d'un
                      gourdin métallique.
                    </p>
                    <p class="paragraphe">
                      A cet instant tu vois le visage d'une espèce d'elfe mais plus petite qui tient le gourdin et qui lève le bras pour porter un nouveau coup sur ta tête.
                    </p>
                  </div>
                </li>
                <li>
                  <p class="paragraphe"><strong>Si Constitution réussi :</strong></p>
                  <div class="description">
                    <p class="paragraphe">
                      Tu ressens une douleur intense pendant ton sommeil. Lorsque tu crie, tu ressens que ta bouche et ton nez sont obstrué par un tissu qui sent fort le champignon. Tu
                      arrives à hurler malgré cette pâte qui semble vouloir t'empêcher de parler. En tournant la tête sur ta droite, tu remarque d'abord du sang qui coule d'un gourdin
                      métallique. A cet instant tu vois le visage d'une espèce d'elfe mais plus petite qui tient le gourdin et qui lève le bras pour porter un nouveau coup sur ta tête.
                    </p>
                  </div>
                </li>
              </ul>
            </li>
            <li>
              <p class="paragraphe"><strong>Si Perception réussie : </strong></p>
              <div class="description">
                <p class="paragraphe">
                  Tu ressens une présence au dessus de toi pendant que tu dors, tu ouvres les yeux et tu vois une sorte d'elfe mais plus petite qui est à tes côtés avec un gourdin
                  métallique dans sa main droite et un bout de tissu dans sa main gauche. Elle est à deux doigts de t'appliquer le bout de tissu sur le visage et tu sens qu'elle est prête
                  à t'assommer avec son gourdin.
                </p>
              </div>
            </li>
          </ul>
          <hr />

          <h1>Suite du Combat</h1>
          <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/naeel.webp" width="100" height="100" />
          <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/hodrok.webp" width="100" height="100" />
          <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/dracki.webp" width="100" height="100" />
          <p class="paragraphe">
            Les trois autres combattants sont positionnés sur le toit du bâtiment le long de la paroi rocheuse. Ils attendront que Grooguen et Franill'eh reviennent ou que l'alarme soit
            donnée par les aventuriers.
          </p>
          <p class="paragraphe">
            Lorsqu'ils rentrent en combat, ils mettront deux rounds entiers à descendre de la toiture sans grande discrétion et pour atteindre le combat avec les PJs.
          </p>
          <p class="paragraphe">
            La @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.ygBtxpDi9QGPhlbP]{Capitaine Dracki} donne beaucoup d'ordre à ses compagnons pendant le combat. Elle sera
            au contact avec son marteau de guerre magique. Elle ne quittera pas le combat et soit elle se rendra soit elle tombera inconsciente au combat.
          </p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.GZJsAI4TXWp1K5tD]{Hobrok} fonce dans le tas sans se poser de question.</p>
          <p class="paragraphe">
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.TulVLGrTjhhw27SM]{Nael} utilisera le plus possible son arbalète et reculera si on s'approche de lui.
          </p>
          <hr />

          <h2>Si le combat est en faveur des PJs</h2>
          <p class="paragraphe">Lorsque le combat sera un peu avancé :</p>
          <p class="paragraphe">
            Alors que la naine s'apprête à te donner un grand coup de marteau dont les runes scintillent d'une lueur orangée, elle hurle : «nul ne mérite de porter les reliques, l'oubli
            dans la mort» !
          </p>
          <p class="paragraphe">
            Si les membres de la @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.fV8x7QzwxUlPb1Xp]{Toile Vivante} semblent défavorisés, l'un des survivants émet
            un sifflement puissant.
          </p>
          <p class="paragraphe">
            <strong>Ils ont trois tours pour s'enfuir :</strong>
          </p>
          <ul>
            <li>
              <p class="paragraphe"><strong>Tour 1 :</strong> les ennemis se rapprochent des ouvertures du pont tous du même côté en essayant de combattre quand même.</p>
            </li>
          </ul>
          <div class="description">
            <p class="paragraphe">Vous entendez un cri strident en haut des montagnes assez loin du pont.</p>
          </div>
          <ul>
            <li>
              <p class="paragraphe"><strong>Tour 2 :</strong> pour les PJs qui ont une ligne de vue sur le gouffre</p>
            </li>
          </ul>
          <div class="description">
            <p class="paragraphe">
              Vous voyez du coin de l'œil une grande ombre qui plane dans le gouffre et qui se rapproche du pont. Les combattants continuent de s'approcher des ouvertures et pour ceux qui
              y sont déjà, ils posent un pied sur le rebord du pont.
            </p>
          </div>
          <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/dragon_toile_vivante.webp" width="100" height="100" />
          <ul>
            <li>
              <p class="paragraphe">
                <strong>Tour 3 :</strong> tous les membres de la Toile Vivante ont une action de mouvement pour atteindre le rebord du pont et utiliseront leur deuxième action de mouvement
                pour sauter dans le vide (@Test[car:agi|diff:15]).
              </p>
            </li>
          </ul>
          <div class="description">
            <p class="paragraphe">
              Au moment où les ennemis sautent du pont, vous voyez l'ombre d'@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.LIMMfaHSCOjcqfqL]{un grand volant} toutes
              ailes ouvertes qui passe sous le pont et réceptionne les ennemis. Un beuglement se fait entendre de ce petit dragon qui amène vos adversaires plus loin.
            </p>
          </div>
          <hr />

          <h3>Fouille des vaincus</h3>
          <p class="paragraphe">
            La @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.ygBtxpDi9QGPhlbP]{Capitaine Dracki} et
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.FJMtWtydebKWXYF0]{Franill'eh} ne peuvent pas mourir. Elles sont inconscientes, à deux doigts de mourir. Si
            les PJs le souhaitent, ils peuvent les soigner et les interroger. S'ils décident de les laisser mourir alors qu'ils savent qu'ils peuvent les sauver ou s'ils les finissent, il
            y a des conséquences pour le porteur du Bracelet de l'Union (il sent que la voie du FANATISME est ravie de ce choix) et il y aura des conséquences plus tard dans la campagne.
          </p>
          <img src="modules/cof2ta_reliques_union/assets/ru_objets/symboles_bannieres/tatouage_toile_vivante.webp" width="100" height="100" />
          <p class="paragraphe">Les PJs peuvent fouiller les adversaires et récupérer leurs équipements.</p>
          <ul>
            <li>
              <p class="paragraphe">@Test[car:per|diff:15|comp:Fouille des victimes] : Ils remarquent le tatouage présent sur tous les membres sur leur flanc droit.</p>
              <ul>
                <li>
                  <p class="paragraphe">@Test[car:int|diff:20|comp:Mémoire et analyse] : Il a, à peu près, la même forme que le symbole sur le pendentif de Laotissa.</p>
                </li>
              </ul>
            </li>
          </ul>
            <hr />
          <p class="paragraphe">
            <strong>Capitaine Dracki</strong>
          </p>
          <p class="paragraphe">
            S'ils ont accès à la Capitaine Dracki, ils peuvent trouver une carte ainsi que des Pierre de localisation de la Toile Vivante (attention ils peuvent l'activer sans faire exprès
            !!)
          </p>
          <img src="modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/carte_toile_vivante.webp" width="100" height="100" />
          <img src="modules/cof2ta_reliques_union/assets/ru_objets/divers/toile_vivante_pierre_de_localisation.webp" width="100" height="100" />
          <ul>
            <li>
              <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.clZAIMRCodrRABz1]{Carte sur la Capitaine Dracki} :</p>
              <p class="paragraphe">
                Cette carte es tracée sur une peau de cuir tannée, roulée sur elle-même. Sur la peau, on voit une carte approximative de la région de l'Ourann du Nord. Sur la carte, on
                voit deux tracés, un rouge de la Cité d'Ispier vers les montagnes des Crocs d'Acier et un vert partant de la forêt de Birkanie vers le même point.
              </p>
            </li>
            <li>
              <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.OOUzxMVHBKjSCFZV]{Pierre de Localisation} :</p>
              <p class="paragraphe">
                Cette petite pierre, gravée avec le même symbole que le tatouage représenté sur les ennemis, permet, quand on la serre dans sa main pendant quelques secondes d'indiquer la
                localisation exacte de la Pierre aux deux responsables de la Toile Vivante. @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.Y3uLofVyCzInAFP6]{Pierre de localisation de la
                Toile Vivante}
              </p>
            </li>
          </ul>
          <hr />

          <h3>Interrogatoire des vaincus</h3>
          <p class="paragraphe">
            En fonction des questions et surtout de l'animosité des PJs, l'un des membres et en premier la capitaine Dracki (si elle est présente) répondra ou non aux questions des PJs.
          </p>
          <p class="paragraphe"><strong>Si les PJs sont trop malsains</strong>, chaque membre préférera mourir que de leur livrer des informations.</p>
          <p class="paragraphe">
            <strong>Si les PJs essayent de comprendre ce qu'il se passe et sont «gentils» dans leur interrogatoire</strong>, Dracki, Franill'eh ou Grooguen répondra à leurs questions et
            leur expliquera leur mission et leurs valeurs. Si Dracki est convaincu de leur honnêteté, elle leur demandera de poursuivre leur mission de récupérer les autres Reliques, de
            faire attention a leurs effets et de les aider face au Clan de l'Épouse qui se cache quelque part dans l'Ogrie et qui souhaite récupérer les Reliques de l'Union. Si les PJs les
            libèrent, elle leur donnera une pierre runique marqué de leur symbole en leur expliquant qu'elle permet d'envoyer un signal aux deux commandants et leur indiquer la position de
            la pierre.
          </p>
          <p class="paragraphe">
            Si les PJs fraternise avec @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.fV8x7QzwxUlPb1Xp]{la Toile Vivante}, le ou les membres partis à dos de
            dragon pourront revenir sur le pont. @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.LIMMfaHSCOjcqfqL]{Pouik - Dragon de la Toile Vivante}
          </p>
          <hr />

          <h2>Si les PJs perdent le combat</h2>
          <p class="paragraphe">
            Ils se réveillent menottés et douloureux dans la pièce où ils ont dormis. Les survivants de la
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.fV8x7QzwxUlPb1Xp]{Toile Vivante} ont l'air en colère. Le PJ porteur du Bracelet de l'Union sent
            instantanément qu'ils ont essayé de lui retirer le bracelet par tous les moyens et son avant-bras est lacéré, brûlé et écrasé par endroit. La douleur est incroyablement forte.
          </p>
          <hr />

          <h3>Interrogatoire de la Capitaine Dracki</h3>
          <p class="paragraphe">
            La @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.ygBtxpDi9QGPhlbP]{Capitaine Dracki} mènera l'interrogatoire avec l'aide de
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.FJMtWtydebKWXYF0]{Franill'eh} pour calmer toute impertinence. Elle n'y va pas par quatre chemins et demandera
            illico l'objectif des aventuriers.
          </p>
          <ul>
            <li>
              <p class="paragraphe">
                <strong>Si les PJs sont coopératifs</strong>, elle leur expliquera leur mission et ce sera aux PJs de la convaincre de leur bonne volonté. Si Dracki est convaincu de leur
                honnêteté, elle leur demandera de poursuivre leur mission de récupérer les autres Reliques, de faire attention a leurs effets et de les aider face au Clan de l'Épouse qui
                se cache quelque part dans l'Ogrie et souhaite récupérer les Reliques de l'Union. Si elle fait confiance aux PJs, elle prendra ses précautions en marquant le porteur du
                Bracelet au fer rouge avec le symbole de la Toile Vivante et le préviendra qu'à partir de maintenant, les commandants sauront où il se trouve à chaque instant.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Si les PJs sont méprisants ou idiots</strong>, elle pourra en venir à tuer le porteur du Bracelet de l'Union pour le récupérer en laissant les autres PJs
                inconscients dans le bâtiment avec le minimum d'équipement pour survivre. Le MJ devra modifier le déroulement de la campagne pour palier à la bêtise des PJ (poursuite de la
                Toile Vivante, récupération de la Relique, reprise de leur voyage).
              </p>
            </li>
          </ul>
          <hr />
          
          <h3>Si les PJs fraternise avec la Toile Vivante</h3>
          <p class="paragraphe">S'il y a des morts parmi la Maille de la Toile Vivante, une cérémonie sera faite avant tout autre chose.</p>
          <p class="paragraphe">
            Avant de reprendre leur voyage, ils pourront demander des conseils ou des indications sur les prochains jours de voyage, sur les autres Reliques et sur le Clan de l'Épouse. Ils
            en savent déjà beaucoup et les deux groupes pourront échanger des informations.
          </p>
        </div>
