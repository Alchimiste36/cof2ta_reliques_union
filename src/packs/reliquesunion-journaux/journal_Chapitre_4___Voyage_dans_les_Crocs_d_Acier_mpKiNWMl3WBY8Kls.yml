      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Le défilé des Crocs d'Acier</h1>
          <p class="intro">
            Avec toutes les informations qu'ils ont trouvé, le groupe d'aventurier prépare son voyage vers les Montagnes d'Arkanov. Avec cette nouvelle responsabilité de trouver les
            Reliques de l'Union, leur quête va les amener vers le village de la Vallée de Novrak.
          </p>

          <h1>Voyage et Arkar'Um</h1>
          <h2>Préparation du Voyage</h2>
          <p class="paragraphe">En fonction des PJs, ils peuvent partir juste eux ou avec d'autres personnes : Maana, Zagrenn et/ou Laotissa.</p>
          <p class="paragraphe">
            Au vu de la situation, tout l'équipement nécessaire est fourni par la Cité d'Ispier dans la limite du raisonnable. Chariot, chevaux, rations, tentes, sacs…
          </p>
          <p class="paragraphe">
            Le groupe connait le début du voyage et ils savent qu'ensuite, en arrivant dans les montagnes sur le Territoire des Mangeurs de Plaines, la météo et les dangers ne seront pas à
            l'avantage des PJs. Ils peuvent vouloir s'équiper en vêtements chauds, en chaussures adaptées, en matériel d'escalade ou de randonnée en montagne.
          </p>
          <p class="paragraphe">En plus grâce à la grande récompense du seigneur Jaspar, ils devraient réussir à acheter les objets spéciaux à la Cité d'Ispier ou au début du voyage.</p>
          <hr />

          <h2>Voyage en Terres Connues</h2>
          <p class="paragraphe">Le début du voyage est exactement le même que pour la poursuite des survivants au début de la campagne.</p>
          <p class="paragraphe">
            En passant par la Cité Etat de Arkar'um, si le groupe retourne à l'@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.3WmRp12n04qZn5fn]{auberge de la Croisée du
            Bouclier et du Tranchoir}, le tavernier @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.jOyeMRRjZyGYKoeP]{Warbane} interagit avec les PJs différemment. La
            population a entendu parler des Sauveurs de la Dame d'Honneur et certaines personnes ont entendu parler de la recherche des reliques.
          </p>
          <p class="paragraphe">
            Dans la taverne, un Jongleur humain (ménestrel) est en train de conter des histoires et à un moment le groupe entendra l'histoire sur leur mission. Cette chanson est remplie
            d'approximations :
          </p>
          <ul>
            <li>
              <p class="paragraphe"><strong>Lana'Sir était kidnappée puis sauver d'abord par les elfes sylvains</strong></p>
            </li>
            <li>
              <p class="paragraphe"><strong>Jaspar était prêt à incendier</strong> toute la foret.</p>
            </li>
            <li>
              <p class="paragraphe">Le groupe de héros <strong>ont retrouvé Lana'Sir dans un temple de la Foret du Val Rouge</strong></p>
            </li>
            <li>
              <p class="paragraphe"><strong>Lana'Sir leur a offert une paire de Bracelets magiques</strong>, un artefact puissant</p>
            </li>
            <li>
              <p class="paragraphe"><strong>Les héros sont maintenant au service de la Dame d'Honneur</strong></p>
            </li>
            <li>
              <p class="paragraphe"><strong>Elle est amoureuse d'un des Héros</strong></p>
            </li>
          </ul>
          <hr />

          <h2>Retour voir l'Aîné Kaspirionuratanokali</h2>
          <p class="paragraphe">
            Si les PJs retournent voir @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.YBj4ZmPrf6ztg2ve]{l'Aîné} et surtout si l'un d'eux a conserver le Sanpuroch car il
            s'est lié d'amitié avec lui, la relation avec l'Aîné sera très différente. Il considérera le personnage en question comme un membre de la tribu presque comme un membre de la
            famille.
          </p>
          <p class="paragraphe">
            <strong>L'Aîné prévient le groupe des dangers de la montagne de leur territoire.</strong> Il dit y avoir passé beaucoup de temps mais que c'est très dangereux.
          </p>
          <p class="paragraphe">
            Si les PJs le demande : <strong>l'Aîné et sa tribu peuvent suivre les PJs dans les montagnes comme escorte.</strong> Ca coûtera 500pa pour le groupe mais leur chance de survie
            sera beaucoup plus grande.
          </p>
          <hr />
          <h1>La montagne vers la Vallée de Novrak</h1>
          <div class="description">
            <p class="paragraphe">
              Après avoir quitté les zones les plus civilisées après la Cité-État d'Arkar'um, vous vous dirigez une nouvelle fois sur les terres des mangeurs des Plaines. Votre voyage
              bifurque rapidement vers le sud en longeant les hautes montagnes des Crocs d'Acier. Les routes deviennent des moins en moins marquées, de plus en plus dures à repérer dans
              cette zone peu fréquentée.
            </p>
            <p class="paragraphe">
              Tout au long de votre voyage, vous croisez de loin des villages plus ou moins grands de Peaux Vertes entourés de barricades en bois au-delà desquelles vous apercevez le haut
              des huttes et des maisons d'orcs. Dès la fin de la première journée de voyage, vous ne croisez plus aucune ferme d'Errants ou de villages d'Hums sur votre route. Les falaises
              que vous suivez sur votre gauche sont imposantes et impénétrables.
            </p>
            <p class="paragraphe">Comment organisez-vous votre campement ?</p>
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/passage2.webp" width="100" height="100" />
            <p class="paragraphe">
              A la fin du troisième jour de voyage dans ces Plaines vallonnées, vous découvrez ce qui doit être la « route » à travers les Crocs d'Acier. A première vue ça ressemble plus à
              un coupe gorge qu'à un chemin mais à part si il vous pousse des ailes, il n'y a pas vraiment d'autres solutions. Malgré la poussière et les chutes de pierres, la route semble
              empruntée de temps en temps (traces de caravanes, ancien camp, débris et déchets…).
            </p>
            <p class="paragraphe">
              <strong>Si les PJs ont pour monture des Sanpuroch :</strong> Vos montures, habituées au voyage dans les Plaines, semblent connaitre ce passage à travers la montagne.
            </p>
            <p class="paragraphe">Le soleil à l'horizon commence à disparaitre dans votre dos, projetant vos ombres sur les murs rocheux de chaque côté du passage.</p>
            <p class="paragraphe">Que voulez-vous faire de particulier avant d'emprunter cette route ?</p>
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/passage1.webp" width="100" height="100" />
            <p class="paragraphe">
              En empruntant la route au travers des Crocs d'Acier, vous naviguez de longs kilomètres entre deux falaises abruptes sur une route assez dégagée qui se rétrécit et s'élargit
              au fur et à mesure de votre progression. Les nombreux débris et rochers tombés sur le chemin vous empêchent de prendre de la vitesse et de relâcher votre attention et après
              seulement quelques heures à dos de montures, la route commence à grimper et zigzaguer entre les différents reliefs. La température commence à baisser et vous recevez
              régulièrement des bourrasques de vent glacial venant des hauteurs en plein visage.
            </p>
            <p class="paragraphe">Le sol est encore assez dégagé et propre. L'écho des montagnes est assez perturbant car ça vous donne l'impression d'être suivi.</p>
            <p class="paragraphe">
              De temps à autre des piliers d'environ 5m de haut, droit comme des obélisques, en pierre taillée et gravée d'inscriptions naines balisent votre avancée.
            </p>
          </div>
          <hr />

          <h1>1er jour dans les montagnes</h1>
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/pont_dans_les_montagnes.webp" width="100" height="100" />
            <p class="paragraphe">
              A la fin de la première journée alors que vous n'avez quasiment pas vu le soleil depuis la veille au soir, vous arrivez devant un immense pont de pierre entre deux flans de
              montagnes et reliant les deux parties de la route, survolant un gouffre de plusieurs dizaines de mètres de profondeur. Au départ du pont, un large bâtiment, fortifié d'épais
              murs de pierre, possède une large ouverture voûtée avec de part et d'autres de cette ouverture des statues naines représentant des visages et des nains.
            </p>
          </div>
          <p class="paragraphe">Scène : @UUID[Compendium.cof2ta_reliques_union.reliquesunion-scenes.Scene.vXFZ7bL1IiVDwSsK]{1.Pont dans montagne}</p>
          <p class="paragraphe">
            <strong>A. Couloir : </strong>
            <span class="description">Dans un piteux état, certaines toitures sont encore étanches et en approchant vous voyez des traces de campements anciens. Les quelques bâtiments au milieu de cette muraille
              ne possèdent pas de portes mais sont, au moins protégés du froid et des fines gouttes qui commencent à tomber.</span>
          </p>
          <p class="paragraphe">
            <strong>B. Bâtiment Gauche : </strong><span class="description">le premier a un toit entièrement effondré et est quasiment rempli de débris et de gravats.</span>
          </p>
          <p class="paragraphe">
            <strong>C. Bâtiment au fond à gauche : </strong>
            <span class="description">Dans le second, vous voyez un feu de camp éteint depuis longtemps ainsi que des bancs de fortune autour fait avec des bout de mur ou de colonnes. Des débris de meubles sont
              entassés dans un coin et les gravats présents ont été repoussés vers le fond de la pièce.</span>
          </p>
          <p class="paragraphe">
            <strong>D. Bâtiment au fond à droite : </strong>
            <span class="description">Le troisième possède deux entrées. Vous y trouvez des piquets de bois reliés par une vielle corde à proximité d'auge pour les chevaux. Les auges sont vides mais il reste des
              tas de paille et de foin sur le sol et de vieilles traces de crottins.</span>
          </p>
          <p class="paragraphe">
            <strong>E. Bâtiment à droite : </strong>
            <span class="description">Enfin, la quatrième est entièrement vide à part un tas d'excréments dans le coin le plus éloigné ainsi que des traces de restes (carcasses de lapins, épluchures de
              légumes…). Dans le grand couloir qui relie l'entrée du bâtiment au début du pont, vous voyez également quelques statues de nains et de naines de l'ordre du Temple qui portent
              des outils de calcul ou de construction.</span>
          </p>
          <div class="description">
            <p class="paragraphe">Comment voulez-vous vous installer la nuit ? Est-ce que certains d'entre vous faites des gardes durant la nuit ? si oui dans quel ordre ?</p>
          </div>
        </div>
