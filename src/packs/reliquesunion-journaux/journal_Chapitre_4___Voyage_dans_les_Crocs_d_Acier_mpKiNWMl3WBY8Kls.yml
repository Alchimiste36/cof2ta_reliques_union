      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    <em><strong>Avec toutes les informations qu’ils ont trouvé, le groupe d’aventurier prépare son voyage vers les Montagnes\_d’Arkanov. Avec cette nouvelle responsabilité de trouver les\n        Reliques de l’Union, leur quête va les amener vers le\_village de la Vallée de Novrak.</strong></em>\n  </p>\n  <h2>Voyage et Arkar'Um</h2>\n  <h3>Préparation du Voyage</h3>\n  <p>En fonction des PJs, ils peuvent partir juste eux\_ou avec d’autres personnes : Maana, Zagrenn et/ou\_Laotissa.</p>\n  <p>Au vu de la situation, tout l’équipement nécessaire\_est fourni par la Cité d’Ispier dans la limite du raisonnable. Chariot, chevaux, rations, tentes, sacs…</p>\n  <p>\n    Le groupe connait le début du voyage et ils savent\_qu’ensuite, en arrivant dans les montagnes sur le\_Territoire des Mangeurs de Plaines, la météo et les\_dangers ne seront pas à\n    l’avantage des PJs. Ils peuvent\_vouloir s’équiper en vêtements chauds, en chaussures\_adaptées, en matériel d’escalade ou de randonnée en\_montagne.\n  </p>\n  <p>En plus grâce à la grande récompense du seigneur\_Jaspar, ils devraient réussir à acheter les objets\_spéciaux à la Cité d’Ispier ou au début du voyage.\_</p>\n  <hr />\n  <h3>Voyage en Terres Connues</h3>\n  <p>Le début du voyage est exactement le même que\_pour la poursuite des survivants au début de la\_campagne.</p>\n  <p>\n    En passant par la Cité Etat de Arkar’um, si le groupe\_retourne à l’@UUID[Actor.3WmRp12n04qZn5fn]{auberge de la Croisée du Bouclier et du Tranchoir}, le\_tavernier\n    @UUID[Actor.jOyeMRRjZyGYKoeP]{Warbane} interagit avec les PJs différemment. La population a entendu parler des Sauveurs\_de la Dame d’Honneur et certaines personnes ont\_entendu\n    parler de la recherche des reliques.\n  </p>\n  <p>\n    Dans la taverne, un Jongleur humain (ménestrel)\_est en train de conter des histoires et à un moment\_le groupe entendra l’histoire sur leur mission. Cette\_chanson est remplie\n    d’approximations :\n  </p>\n  <ul>\n    <li>\n      <p><strong>Lana’Sir était kidnappée puis sauver d’abord par\_les elfes sylvains</strong></p>\n    </li>\n    <li>\n      <p><strong>Jaspar était prêt à incendier</strong> toute la foret.</p>\n    </li>\n    <li>\n      <p>Le groupe de héros <strong>ont retrouvé Lana’Sir dans un\_temple de la Foret du Val Rouge</strong></p>\n    </li>\n    <li>\n      <p><strong>Lana’Sir leur a offert une paire de Bracelets\_magiques</strong>, un artefact puissant</p>\n    </li>\n    <li>\n      <p><strong>Les héros sont maintenant au service de la\_Dame d’Honneur</strong></p>\n    </li>\n    <li>\n      <p><strong>Elle est amoureuse d’un des Héros</strong>\_</p>\n    </li>\n  </ul>\n  <hr />\n  <h3>Retour voir l’Aîné\_Kaspirionuratanokali</h3>\n  <p>\n    Si les PJs retournent voir @UUID[Actor.YBj4ZmPrf6ztg2ve]{l’Aîné} et surtout si l’un\_d’eux a conserver le Sanpuroch car il s’est lié d’amitié\_avec lui, la relation avec l’Aîné\n    sera très différente. Il\_considérera le personnage en question comme un\_membre de la tribu presque comme un membre de\_la famille.\n  </p>\n  <p><strong>L’Aîné prévient le groupe des dangers de la\_montagne de leur territoire.</strong> Il dit y avoir passé\_beaucoup de temps mais que c’est très dangereux.</p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs le demande :</span></strong></span>\n    <strong>l’Aîné et sa tribu peuvent\_suivre les PJs dans les montagnes comme escorte.</strong> Ca\_coûtera 500pa pour le groupe mais leur chance de\_survie sera beaucoup plus\n    grande.\_\n  </p>\n  <hr />\n  <h2>La montagne vers la Vallée de Novrak</h2>\n  <blockquote>\n    <p>\n      Après avoir quitté les zones les plus civilisées\_après la Cité-État d’Arkar’um, vous vous\_dirigez une nouvelle fois sur les terres des mangeurs\_des Plaines. Votre voyage\n      bifurque rapidement vers\_le sud en longeant les hautes montagnes des Crocs\_d’Acier. Les routes deviennent des moins en moins\_marquées, de plus en plus dures à repérer dans\n      cette\_zone peu fréquentée.\n    </p>\n    <p>\n      Tout au long de votre voyage, vous croisez de loin\_des villages plus ou moins grands de Peaux Vertes\_entourés de barricades en bois au-delà desquelles\_vous apercevez le haut\n      des huttes et des maisons\_d’orcs. Dès la fin de la première journée de voyage,\_vous ne croisez plus aucune ferme d’Errants ou de\_villages d’Hums sur votre route. Les falaises\n      que\_vous suivez sur votre gauche sont imposantes et\_impénétrables.\n    </p>\n    <p>Comment organisez-vous votre campement ?</p>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/passage2.webp\" width=\"100\" height=\"100\" />\n    <p>\n      A la fin du troisième jour de voyage dans ces\_Plaines vallonnées, vous découvrez ce qui doit être la\_« route » à travers les Crocs d’Acier. A première vue\_ça ressemble plus à\n      un coupe gorge qu’à un chemin\_mais à part si il vous pousse des ailes, il n’y a pas\_vraiment d’autres solutions. Malgré la poussière et\_les chutes de pierres, la route semble\n      empruntée de\_temps en temps (traces de caravanes, ancien camp,\_débris et déchets…).\n    </p>\n    <p><strong>Si les PJs ont pour monture des Sanpuroch :</strong> Vos\_montures, habituées au voyage dans les Plaines,\_semblent connaitre ce passage à travers la montagne.\_</p>\n    <p>Le soleil à l’horizon commence à disparaitre dans\_votre dos, projetant vos ombres sur les murs rocheux\_de chaque côté du passage.</p>\n    <p>Que voulez-vous faire de particulier avant\_d’emprunter cette route ?</p>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/passage1.webp\" width=\"100\" height=\"100\" />\n    <p>\n      En empruntant la route au travers des Crocs\_d’Acier, vous naviguez de longs kilomètres entre\_deux falaises abruptes sur une route assez dégagée\_qui se rétrécit et s’élargit\n      au fur et à mesure de\_votre progression. Les nombreux débris et rochers\_tombés sur le chemin vous empêchent de prendre\_de la vitesse et de relâcher votre attention et\n      après\_seulement quelques heures à dos de montures, la\_route commence à grimper et zigzaguer entre les\_différents reliefs. La température commence à baisser\_et vous recevez\n      régulièrement des bourrasques de\_vent glacial venant des hauteurs en plein visage.\n    </p>\n    <p>Le sol est encore assez dégagé et propre. L’écho des\_montagnes est assez perturbant car ça vous donne\_l’impression d’être suivi.\_</p>\n    <p>De temps à autre des piliers d’environ 5m de\_haut, droit comme des obélisques, en pierre taillée\_et gravée d’inscriptions naines balisent votre\_avancée.</p>\n  </blockquote>\n  <hr />\n  <h2>1er jour dans les montagnes</h2>\n  <blockquote>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/crocs_acier/pont_dans_les_montagnes.webp\" width=\"100\" height=\"100\" />\n    <p>\n      A la fin de la première journée alors que vous\_n’avez quasiment pas vu le soleil depuis la\_veille au soir, vous arrivez devant un immense pont\_de pierre entre deux flans de\n      montagnes et reliant\_les deux parties de la route, survolant un gouffre\_de plusieurs dizaines de mètres de profondeur. Au\_départ du pont, un large bâtiment, fortifié\n      d’épais\_murs de pierre, possède une large ouverture voûtée\_avec de part et d’autres de cette ouverture des statues\_naines représentant des visages et des nains.\n    </p>\n  </blockquote>\n  <p>@UUID[Scene.vXFZ7bL1IiVDwSsK]{1.Pont dans montagne}</p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">A. Couloir :</span></strong></span>\n    <em>Dans un piteux état, certaines toitures\_sont encore étanches et en approchant vous voyez\_des traces de campements anciens. Les quelques\_bâtiments au milieu de cette muraille\n      ne possèdent\_pas de portes mais sont, au moins protégés du froid\_et des fines gouttes qui commencent à tomber.</em>\n  </p>\n  <p><strong>B. Bâtiment Gauche :</strong> <em>le premier a un toit entièrement effondré et est quasiment rempli de débris et\_de gravats.</em></p>\n  <p>\n    <strong>C. Bâtiment au fond à gauche :</strong>\n    <em>Dans le second, vous\_voyez un feu de camp éteint depuis longtemps ainsi\_que des bancs de fortune autour fait avec des bout\_de mur ou de colonnes. Des débris de meubles\n      sont\_entassés dans un coin et les gravats présents ont été\_repoussés vers le fond de la pièce.</em>\n  </p>\n  <p>\n    <strong>D. Bâtiment au fond à droite :</strong>\n    <em>Le troisième possède\_deux entrées. Vous y trouvez des piquets de bois\_reliés par une vielle corde à proximité d’auge pour\_les chevaux. Les auges sont vides mais il reste des\n      tas\_de paille et de foin sur le sol et de vieilles traces de\_crottins.</em>\n  </p>\n  <p>\n    <strong>E. Bâtiment à droite :</strong>\n    <em>Enfin, la quatrième est entièrement vide à part un tas d’excréments dans le coin le\_plus éloigné ainsi que des traces de restes (carcasses\_de lapins, épluchures de\n      légumes…). Dans le grand\_couloir qui relie l’entrée du bâtiment au début du\_pont, vous voyez également quelques statues de\_nains et de naines de l’ordre du Temple qui\n      portent\_des outils de calcul ou de construction.</em>\n  </p>\n  <blockquote>\n    <p>Comment voulez-vous vous installer la nuit ?</p>\n    <p>Est-ce que certains d’entre vous faites des gardes\_durant la nuit ? si oui dans quel ordre ?\_</p>\n  </blockquote>\n</div>"
