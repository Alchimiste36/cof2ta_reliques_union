  - sort: 800000
    name: Préparation du voyage
    type: text
    _id: S4D4KzPWf7tUJS3B
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    Au vu de la description de Timaor, il faudra <strong>prévoir\_de l’équipement de randonnée et peut-être d’escalade\_avant de partir</strong>, des\n    <strong>vêtements de protection contre le\_froid</strong> malgré le début du printemps et un <strong>paquetage\_léger</strong>. Il faudra aussi faire attention aux bêtes\n    sauvages\_et aux crevasses qui peuvent être mortels pour ceux\_qui ne sont pas compétents dans les étendues sauvages\_des montagnes.\n  </p>\n  <p>\n    L’équipement peut être trouvé dans les boutiques\_ou chez les artisans de la Vallée de Novrak et de\_nombreuses informations sur la faune et la flore\_sauvage peuvent être\n    apprises auprès de certaines\_personnes du village (herboriste, chasseurs,\_marchands), contre rémunération bien sur. Si le\_groupe de PJs prennent du temps, ils peuvent\n    acquérir\_beaucoup de savoir sur les dangers des montagnes et\_obtiendront un bonus de +2 par jour d’étude aux tests\_de PER (Survie) pendant le voyage (max +10 au bout\_de cinq\n    jours).\n  </p>\n  <p>\n    Bien utile,\n    <strong>les aventuriers\_peuvent acheter à @UUID[Actor.yNuVJLXFziWMMZJm]{l’École du Vivant}\_des @UUID[Compendium.world.reliquesunion-objets.Item.M8lyhS402gRyuh8I]{potions de soin\n      mineur}\_</strong>(1d4° PV\_pour 40 pa), des @UUID[Compendium.world.reliquesunion-objets.Item.zef5lgvYEPpKNOQ0]{potions de soin majeur} (3d4° PV pour 350 pa) et surtout\n    <strong>des @UUID[Compendium.world.reliquesunion-objets.Item.jbMY4j2T4DyckYfx]{baume de\_résistance au froid}</strong> (-10 au DD pour\_résister au froid pendant 24 heures\_pour\n    15 pa. Si on applique une\_demi dose du baume (seulement\_sur les zones critiques (extrémités,\_visage)) le DD est diminué de -5 au\_lieu de -10.\n  </p>\n  <p>\n    <strong>Des vêtements chauds fabriqués et ajustés par les\_artisans Novraks diminuent le DD pour\_ résister au\_froid de -5</strong> pour un prix allant de 25 pa à plus de 100\n    pa\_pour des pièces d’exception.\n  </p>\n  <p>\n    <strong>Certains marchands essayeront de leur\_vendre des produits inutiles ou de mauvaises\_qualités</strong>\n    (@UUID[Compendium.world.reliquesunion-objets.Item.2XuEVQckJmVqYUND]{huile repoussante contre les araignées\_tisseuses},\n    @UUID[Compendium.world.reliquesunion-objets.Item.S8N1HgUBhNSJjx28]{bouquet d’herbe} à faire brûler le soir\_pour repousser les Jarguals,\n    @UUID[Compendium.world.reliquesunion-objets.Item.1RHtgm1I4NKSY297]{tente qui se monte\_rapidement},\n    @UUID[Compendium.world.reliquesunion-objets.Item.E2pGOIWqUKTZnufA]{sur-chaussures à crampon} pour\_escalader qui se casseront rapidement,\n    @UUID[Compendium.world.reliquesunion-objets.Item.VTa2J9QIC3DJ6FyC]{corde\_en poils de bouquetin de Novrak} soit disant\_plus résistant, un\n    @UUID[Compendium.world.reliquesunion-objets.Item.5ZivKhWcJfSMjLzb]{élixir pour les longues randonnées}…).\n  </p>\n  <p>\n    N'hésitez pas à créer des objets que les PJ voudront acheter en piochant dans les compendiums ou en inventant des équipements spécifiques, sans oublier que les produits devront\n    être ajustés ou créer et que ça prendra du temps.\n  </p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Dans aucun cas, le groupe ne pourra\_utiliser des montures pour ce voyage dans\_les montagnes</span></strong></span>. Même les Sanpurochs, s’ils en\_ont, ne pourront avancer dans les conditions\_décrites pour Timaor Dunclin.\n  </p>\n  <p>\n    Les PJs peuvent profiter de la ville pour faire\_des emplettes et questionner en plus si besoin.\_<strong>Tous les magasins donnent des délais pour\_fabriquer des tenues de voyages adaptées au\_froid et de l’équipement</strong>, les PJs devront rester\_un peu dans la ville s’ils veulent s’équiper en\_conséquence.\n  </p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les joueurs passent du temps dans la ville,\_n’hésitez pas à leur donner des informations\_sur les Ombres Blanches et d’autres choses\_comme le racisme des humains\n          envers les\_anciennes races.</span></strong></span>\n  </p>\n</div>"
