  - sort: 600000
    name: Investigation dans la ville
    type: text
    _id: NWuIIQG4gD5FBDzt
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    Il n’est pas si simple de trouver des informations\_sur une histoire datant de 27 ans. Les aventuriers vont\_devoir discuter et trouver les bonnes personnes pour\_retrouver le\n    vieux Titi.\n  </p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs parlent du Village d’Arkanov, des\_centaures, des Reliques de l’Union ou de ce genre de\_détails</span></strong></span>, personne n’en aura entendu parler. <strong>La plupart\_des villageois posent de nombreuses questions</strong> aux\_PJs sans vraiment répondre à leurs interrogations.\_\n  </p>\n  <p>La plupart du temps, <strong>ils dirigeront le groupe vers la\_bibliothèque du château</strong>, directement le seigneur\_Abrosk ou la Guilde des Jongleurs.</p>\n  <p>\n    Les habitants vont rebondir souvent sur le réel\_danger qui les inquiète : <strong>les «Ombres Blanches» qui\_attaquent, tuent et kidnappent des jeunes régulièrement</strong>.\n    Les villageois sont soit outrés par le manque\_d’action du seigneur soit dépités par ces attaques. Ils\_mettront en garde les PJs chaque fois que ces derniers\_parleront d’aller\n    dans les montagnes.\n  </p>\n  <h2>Trouver le marchand du\_conte de Novrak</h2>\n  <h3>Bibliothèque du Château</h3>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_chateau_temple.webp\" width=\"150\" height=\"150\" />\n  <p>\n    Après des procédures fastidieuses, des heures\_d’attente et beaucoup de portes claquées au museau,\_les PJs pourront demander au maître Archiviste\_Tarrinn de rechercher des\n    informations dans la\_bibliothèque du château. En fonction des demandes,\_de la précision des informations données et du délais\_accordé,\n    <strong>le résultat arrivera plus ou moins vite et\_coûtera plus ou moins cher aux aventuriers.\_</strong>\n  </p>\n  <ul>\n    <li>\n      <p>\n        <strong>Dans le meilleur des cas</strong> (beaucoup d'informations données, diplomacie parfaite, dépense d'argent élevé, gentilesse, patience…), les bibliothécaires\n        trouveront le fameux marchand du conte et @UUID[Compendium.world.reliquesunion-objets.Item.sAv6tykf70FxSJjP]{le récit de son procès}\n        <strong>au bout de 4 ou 5 jours</strong>.\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>Dans le pire des cas</strong> (informations vagues, énervement, radinerie, impatience…), les bibliothécaires trouveront les documents\n        <strong>après au moins 10 jours</strong> et pourront noyer le groupe avec de nombreux documents supplémentaires sans aucune importance.\n      </p>\n    </li>\n  </ul>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_bibliotheque2.webp\" width=\"100\" height=\"100\" />\n  <p>\n    En plus de la même version du Conte de Novrak\_trouvée par les PJs quelques jours plus tôt,\n    <strong>l’archiviste Tarrinn leur fourni @UUID[Compendium.world.reliquesunion-objets.Item.sAv6tykf70FxSJjP]{un résumé du\_procès} de Timaor Dunclin faisant référence à toute\_cette\n      histoire.</strong>\n    S’ils demandent, les PJs seront dirigés\_vers les gardes de la ville pour connaitre l’endroit où\_vit Timaor Dunclin en ce moment.\n  </p>\n  <hr />\n  <h3>@UUID[Actor.OYaSLTALmbEo5XZL]{Sélénia}, l’Herboriste</h3>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/vallee_novrak/villageois_selenia_bassebranche.webp\" width=\"150\" height=\"150\" />\n  <p>\n    Si les PJs demandent des informations à Sélénia,\_la propriétaire de l’École du Vivant, après quelques\_minutes pour comprendre leur demande et relier\_tous ces informations,\n    <strong>elle pense connaitre le vieil\_alcoolique que les héros recherchent</strong>.\n  </p>\n  <p>\n    Son école faisant aussi office d’hôpital et de refuge\_pour les nécessiteux, elle a des contacts fréquent avec\_«<strong>le vieux Titi</strong>» qui vient lui demander de temps\n    à\_autre des soins ou des plantes pour faire passer une\_maladie hivernale.\n  </p>\n  <p>\n    <strong>Sélénia hésitera à donner des informations aux PJs\_car «le vieux Titi» est un être brisé</strong> et elle ne souhaite\_pas que des inconnus viennent remuer les\n    souvenirs\_douloureux du vieil homme.\n  </p>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_ecole_vivant.webp\" width=\"100\" height=\"100\" />\n  <p>\n    <strong>L’intimidation et les pot-de-vin ne fonctionneront\_pas avec Sélénia</strong>. Elle a bien assez de fonds propres\_et cela fait bien longtemps qu’elle n’a plus peur\n    d’une\_bande d’étrangers agressifs.\n  </p>\n  <p>\n    Si les PJs sont aimables et qu’ils rassurent Sélénia\_sur leurs intentions (@Test[car:cha|diff:20|comp:Diplomacie] si besoin), elle voudra\_bien leur donner des renseignements\n    sur «le vieux\_Titi» :\n  </p>\n  <ul>\n    <li>\n      <p><strong>Timaor vient la voir</strong> de temps en temps</p>\n    </li>\n    <li>\n      <p>Il est <strong>rarement sobre</strong> et soit l’ivresse le rend\_désagréable soit elle le rend triste et plaintif</p>\n    </li>\n    <li>\n      <p>Il <strong>habite une ruine toute petite dans le quartier\_pauvre</strong> de la ville, tout près des maisons closes.</p>\n    </li>\n    <li>\n      <p>\n        <strong>Il n’aime pas raconter son histoire depuis le procès.</strong>\_Certains habitants, des jeunes et des enfants, se\_moquent de lui et lui font des crasses.\n        <strong>Ca le rend\_paranoïaque et surtout méchants</strong>.\n      </p>\n    </li>\n  </ul>\n  <p>Si Sélénia apprend que les PJs ont été malhonnête\_avec lui, ils auront affaire à elle car elle ne supporte\_pas qu’on s’en prenne aux personnes vulnérables.</p>\n  <hr />\n  <h3>Les voyous et enfants du village</h3>\n  <p>\n    <strong>Si les PJs rencontrent les petits malfrats de la ville, la\_plupart de ses jeunes hommes et femmes connaissent\_le vieux Titi</strong> car il habite à côté de leur QG.\n    Timaor\_se fournit en alcool auprès d’eux et de temps à autres,\_<strong>les voyous l’utilisent, contre quelques pièces d’argent,\_pour créer des «diversions» afin de faire les poches\_dans les tavernes</strong>\n    ou sur les places de marché.\_\n  </p>\n  <p>Au premier abord ils seront assez méfiant du\_groupe d’aventuriers mais <strong>avec une bourse bien\_remplie les langues se délieront</strong> rapidement.\_</p>\n  <p>\n    Une partie des enfants de la Vallée de Novrak\_connaissent «le vieux Titi». Certains car ils aiment\_bien embêter ce vieil alcoolique colérique pour passer\_le temps et d’autres\n    car «le vieux Titi», quand il est\_mélancolique de sa vie d’avant, raconte des histoires\_rigolotes sur sa rencontre avec les hommes-chevaux\_dans les hautes montagnes enneigées.\n  </p>\n  <hr />\n  <h3>Mensonges pour une nouvelle vie</h3>\n  <p>\n    Au bout de quelques jours <strong>alors que la rumeur d’un\_groupe d’aventuriers recherchant des informations\_augmente</strong>, plusieurs femmes humaines ou naines\_de la Vallée\n    de Novrak viennent les voir à l’auberge\_ou à la taverne pour leur parler.\n    <strong>Elles les draguent\_ouvertement et leur raconte une quantité phénoménale d’histoires</strong> en tout genre sur tous les marchands\_de la ville.\n    <strong>Beaucoup d’informations sont fausses ou\_pas vraiment pertinentes mais si ça peut permettre\_à ses femmes de quitter la Vallée de Novrak, elles\_y mettront du coeur</strong>. Des jeunes hommes, encore\_moins subtils, viendront séduire les personnages\_féminins mais aussi masculins s’ils pensent qu’il y a\_une ouverture.\n  </p>\n  <p>\n    Parmi toutes ces informations, <strong>certaines mères\_veuves connaissent un vieux marchand alcoolique\_qui raconte des histoires farfelues aux enfants du\_village</strong>. Elle\n    ne savent pas où il habite mais les enfants\_devraient pouvoir le trouver dans les rues de la cité.\n  </p>\n</div>"
