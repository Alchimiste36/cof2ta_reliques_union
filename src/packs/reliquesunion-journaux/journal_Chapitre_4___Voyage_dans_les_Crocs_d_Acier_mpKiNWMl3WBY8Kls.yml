  - sort: 700000
    name: Rencontre avec Timaor Dunclin
    type: text
    _id: QaRVbzrZHN52mNpu
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <blockquote>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_maison_timaor.webp\" width=\"100\" height=\"100\" />\n    <p>\n      Peut-on appelez l’endroit où vit Timaor une\_maison ? pas vraiment. Ça ressemble plus à\_une petite cabane de chasse abandonnée et bringuebalante. Les planches de bardages\n      tombent, la toiture\_est partiellement effondrée et la porte tient par\_miracle. Située à quelques centimètre du rebord de\_la rivière, un mauvais pas et on fait une belle\n      chute\_d’une dizaine de mètre pour s’écraser sur un rocher\_ou se noyer dans l’eau glacée.\n    </p>\n    <p>En vous approchant, vous entendez une voix\_rauque qui marmonne dans cette cabane et lorsque\_vous toquez, vous entendez un bruit sourd d’un coup\_de poings sur une table.</p>\n  </blockquote>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/vallee_novrak/villageois_tinamor_dunclin.webp\" width=\"150\" height=\"150\" />\n  <p class=\"discussion\">\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Timaor Dunclin :</span></strong></span>\_Barrez-vous, bande de merdeux, bouffe fientes\_tout droit sorti du fion d’une catin. Foutez-moi la\_paix et allez crever !\n  </p>\n  <p>\n    @UUID[Actor.neCUXXBE3pDc77go]{Timaor Dunclin} est un vieil homme brisé depuis\_son procès. Il a été traîné dans la boue, moqué et\_ridiculisé. Il a perdu tout respect et sa\n    faculté de\_commercer. Il ne faut pas perdre du vue qu’il est\_régulièrement harcelé par des morveux et surtout\_montré du doigts par les villageois. Il est méfiant et\_peut partir\n    au quart de tour s’il se sent rabaissé.\_\n  </p>\n  <p>\n    Il est totalement saoule quelque soit l’heure de la\_journée que choisie par les héros d’Ispier pour venir\_le rencontrer. Il n’y a pas beaucoup d’espace dans sa\_cabane et aucune\n    autre chaise. A chaque déplacement\_pour récupérer une bouteille, un verre ou un saucisson à croquer, il bousculera l’un des personnages et le\_disputera d’être dans ses pattes.\n  </p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs l’abordent avec respect</span></strong></span>, il discutera autour\_d’un verre d’alcool de mauvaise qualité @UUID[Compendium.world.reliquesunion-objets.Item.5XIGv29ADrRM00yK]{Vin des Crocs d'Acier}. Il est assez alcoolisé\n    et dès\_que la bouteille est vide, il demandera aux PJs d’aller\_chercher d’autres bouteilles à la taverne et ne parlera\_de rien tant qu’ils ne seront pas revenu. Même si les\_PJs\n    sont gentils, Timaor sera vite fatigué et s’endormira sur sa table. Il faudra revenir ou le brusquer.\n  </p>\n  <p>\n    Au bout d’un moment à raconter des banalités et\_à répéter qu’il ne veut pas parler de son histoire, il\_cédera et un air sombre apparaîtra sur son visage. Il\_pourra se mettre à\n    pleurer et la colère se changera en\_rancœur et en mélancolie.\n  </p>\n  <p>\n    «<em>Personne n’a voulu me croire.</em>», «<em>Même mes amis\_de l’époque ont douté de ma parole. Ils ne voulait pas\_que la merde les éclabousse, les pleureuses préférant\_leurs bourses à notre amitié»</em>, «<em>J’avais toute la vie\_devant moi et une affaire florissante.</em>», «<em>Tout ça à\_cause d’une bande de chevaux reclus dans un village\_de merde !</em>»…\n  </p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs l’aborde avec dédain ou agressivité,</span></strong></span>\n    il se\_fermera comme une huître et demandera de l’argent\_pour répondre (pas moins de 150pa). Si les PJs sont\_menaçant ou essaye de lui coller des baffes, Timaor ne\_se démontera\n    pas et les provoquera «<em>vas-y j’ai plus\_rien à perdre</em>», «<em>même pas cap de frapper un vieux\_alcoolique</em>», «<em>Vous êtes tellement con que pour faire parler un vieux vous êtes obligé de la cogner ou de\_le brusquer</em>», «<em>Vous faites la même chose quand une\_dame vous dit non bande de violeurs</em>», «<em>Tuez moi et la\_garde s’occupera de vous, je n’ai plus à faire dans se\_monde de merde</em>»\n  </p>\n  <hr />\n  <h3>Informations de Timaor Dunclin</h3>\n  <ul>\n    <li>\n      <p>Il a <strong>rencontré par hasard le village des Centaures</strong>\_alors qu’il cherchait des herbes rares au nord du\_village, <strong>il y a plus de 30 ans.</strong></p>\n    </li>\n    <li>\n      <p>Les centaures l’ont <strong>enfermé dans une mine\_pendant plusieurs jours</strong> mais il était très bien\_traité.</p>\n    </li>\n    <li>\n      <p>Ils <strong>ne parlaient pas la même langue et avaient des\_coutumes bizarres</strong> (des danses, des chants, des\_rituels…).</p>\n    </li>\n    <li>\n      <p>\n        Ils ont <strong>réussi à se comprendre au bout de quelques\_semaines</strong> grâce à ses marchandises qu’il avait\_dans son sac et qui intriguaient les Centaures.\n        <strong>Ils\_ont fait des échanges</strong> (une belle dague de Timaor\_contre des herbes aromatiques qu’ils cultivent sur\_place, par exemple).\n      </p>\n    </li>\n    <li>\n      <p>Il a sympathisé avec «<strong>Kiliko</strong>», <strong>le fils du chef du\_village qui se nommait «Poauau»</strong>.</p>\n    </li>\n    <li>\n      <p>Il se souvient de <strong>femelles magnifiques et de\_bâtiments incroyables</strong> avec des machines\_superbes.</p>\n    </li>\n    <li>\n      <p>Il est <strong>resté plus de quatre mois dans le village</strong>\_avant d’être libéré par les Centaures.</p>\n    </li>\n    <li>\n      <p><strong>A son retour personne ne l’a cru</strong> et les d’habitants\_pensent qu’il est fou ou qu’il voulait garder secret\_ses échanges avec une tribu de Peaux Vertes.</p>\n    </li>\n    <li>\n      <p>Il a <strong>sombré plusieurs années dans l’alcool et les\_tavernes</strong>. Beaucoup le moquait.</p>\n    </li>\n    <li>\n      <p>\n        Il y est <strong>retourné quelques fois pendant les\_premiers temps pour faire des échanges</strong> mais ses\_marchandises ne se vendaient pas car personne ne\_le croyait.\n        Les gens pensaient qu’il avait récupéré\_des marchandises volées par des clans de Peaux\_Vertes. Devant le péril du voyage et le peu de\_reconnaissance et de retour sur\n        investissement, il\_a vite arrêté d’y retourner.\n      </p>\n    </li>\n    <li>\n      <p>Maintenant <strong>il est trop vieux pour ces aventures et\_en plus il perd la vue depuis 10 ans</strong>.</p>\n    </li>\n    <li>\n      <p><strong>Il n’y est jamais retourné depuis plus de 20\_ans</strong>.</p>\n    </li>\n  </ul>\n  <hr />\n  <p>\n    Timaor leur explique comment se rendre au village\_des centaures de façon assez précise si la montagne n’a\_pas changé.\n    <strong>Le village est à 40 km à vol d’oiseau mais\_en parcourant les montagnes, ça représente plutôt le\_double de distance à une allure très réduite.</strong> Il n’y a\_pas de\n    chemin balisé, pas d’itinéraire, pas de repère\_pour atteindre le point indiqué par Timaor.\n  </p>\n  <p>\n    Il décrit surtout <strong>la grande forêt de feuillus qui\_poussent à proximité du village</strong>, chose étrange à cette\_altitude. En suivant la montagne vers le l’ouest,\n    le\_groupe devrait trouver <strong>une zone de la paroi totalement recouverte de lierre et de plantes</strong> et c’est là que\_le village se trouve.\n  </p>\n  <hr />\n  <h3>Informations complémentaires</h3>\n  <p>\n    Si les PJs lui tire les vers du nez, sont très gentils,\_l’écoutent avec intérêt ou reviennent plusieurs jours\_d’affilé avec des bonnes bouteilles et quelques pièces,\_<strong>Timaor pourra leur raconter des histoires d’où les PJs\_tireront plusieurs détails intéressants</strong>\n    :\n  </p>\n  <ul>\n    <li>\n      <p>Non loin des portes, <strong>une zone de la forêt de\_feuillus est exploitée par les centaures</strong> et certains\_arbres sont coupés.</p>\n    </li>\n    <li>\n      <p>\n        La première fois, <strong>il était intrigué par un haut\_panache de vapeur d’eau derrière la paroi mais\_aucun son d’une cascade n’était pourtant perceptible</strong>. C’est\n        seulement lorsque les centaures l’ont\_capturé, en rentrant dans le village qu’il a entendu\_tous les bruits du village et de la cascade.\n      </p>\n    </li>\n    <li>\n      <p><strong>Quand on lève les mains et qu’on montre ses deux\_paumes, c’est un signe de défi</strong> et une invitation au\_combat pour provoquer l’autre.</p>\n    </li>\n    <li>\n      <p><strong>Il ne faut jamais toucher la croupe d’un ou une\_centaure</strong> si on ne nous le demande pas.</p>\n    </li>\n    <li>\n      <p><strong>Ils sont très fier de leurs tatouages et ils les\_montrent pour appuyer leur parole</strong>. Il ne faut\_jamais critiquer les tatouages des centaures.</p>\n    </li>\n    <li>\n      <p>\n        D’après ses souvenirs flous, ils\n        <strong>disaient « Ata Pai\_» le matin pour se saluer, «Kaua e Pena» quand\_il faisait une chose interdite et «Wakia» pour le\_féliciter de ses efforts.</strong>\n      </p>\n    </li>\n    <li>\n      <p>Les centaures l’ont toujours appelé « <strong>Tangata</strong> »\_(trad. Humain)</p>\n    </li>\n  </ul>\n  <p>\n    Pour finir, en fonction de l’attitude des PJs face à\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">Timaor, <strong>ce dernier n’acceptera aucune faveur de leur\_</strong></span><strong>part</strong> (logement à l’auberge, discutions avec les autorités…). <strong>Il est assez heureux que les aventuriers l’aient\_écouté</strong> mais il ne donne pas\n    beaucoup d’espoir que ça\_change sa vie. Il est plutôt pessimiste sur leur faculté\_à trouver le village des centaures.\n  </p>\n  <p><strong>A part quelques\_bouteilles d’alcool et qu’on lui foute la paix, il n’attend\_rien de plus de toute cette histoire.</strong></p>\n</div>"
