  - sort: 500000
    name: Arrivée à la Vallée de Novrak
    type: text
    _id: LI4an2BZdwglIaFZ
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <div class=\"intro\">\n    <p>Un long voyage s’achève pour le groupe d’aventuriers. Ils vont retrouver la civilisation après de longues journées\_passées dans les montagnes froides et austères.</p>\n    <p>La Vallée de Novrak est la prochaine étape de leur grande quête pour retrouver les Reliques de l’Union.</p>\n  </div>\n  <hr />\n  <blockquote>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_ensemble.webp\" width=\"150\" height=\"150\" />\n    <p>\n      Vous reprenez votre route et rapidement vous\_remarquez que le chemin est de plus en plus\_fréquenté. Des traces de charrettes, des traces de pas,\_des débris de campements et\n      surtout un déblayage\_plus net des rochers et des gravats. Des petites\_constructions aménagées vous permettent de passer\_des nuits confortables et calmes.\n    </p>\n    <p>\n      Après 7 (ou 9 jours) de voyage dans les montagnes,\_<strong>vous passez un col de montagnes et entendez au loin\_les premiers bruits d’une activité humaine masquée\_par le ronronnement de plus en plus fort d’un cours\_d’eau de\n        montagne</strong>.\n    </p>\n    <p>\n      En fin de matinée, vous arrivez sur une plateforme\_qui vous donne une vue dégagée sur une ville active\_en contre bas traversée par une rivière agitée.\n      <strong>La\_ville n’a pas de fortifications construites</strong> mais au vu\_de sa position, aucune armée ou groupe de pillards\_pourrait s’approcher assez sans être bloqué ou\n      perturbé par les hautes falaises qui l’entourent.\n    </p>\n    <p>\n      A première vu, vous ne pouvez pas dire si le grand\_bastion qui a été construit au centre du village est\_un donjon, un château ou une cathédrale. Avec ses\_tours\n      impressionnantes, cette structure domine cette\_ville où vous remarquez pas mal d’animation dans\_les rues et aux alentours. Les bruits des discussions et\_des outils remontent\n      à vos oreilles plus vous descendez la pente vers la rivière.\n    </p>\n  </blockquote>\n  <hr />\n  <p>@UUID[JournalEntry.V3FyUY2K3ajEVf3n]{La Vallée de Novrak}</p>\n  <p></p>\n</div>"
