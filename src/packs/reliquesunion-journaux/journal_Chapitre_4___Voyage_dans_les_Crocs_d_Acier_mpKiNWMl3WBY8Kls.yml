  - sort: 800000
    name: Préparation du voyage
    type: text
    _id: S4D4KzPWf7tUJS3B
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Préparation du voyage</h1>
          <p class="paragraphe">
            Au vu de la description de Timaor, il faudra <strong>prévoir de l'équipement de randonnée et peut-être d'escalade avant de partir</strong>, des
            <strong>vêtements de protection contre le froid</strong> malgré le début du printemps et un <strong>paquetage léger</strong>. Il faudra aussi faire attention aux bêtes sauvages
            et aux crevasses qui peuvent être mortels pour ceux qui ne sont pas compétents dans les étendues sauvages des montagnes.
          </p>
          <p class="paragraphe">
            L'équipement peut être trouvé dans les boutiques ou chez les artisans de la Vallée de Novrak et de nombreuses informations sur la faune et la flore sauvage peuvent être
            apprises auprès de certaines personnes du village (herboriste, chasseurs, marchands), contre rémunération bien sur. Si le groupe de PJs prennent du temps, ils peuvent acquérir
            beaucoup de savoir sur les dangers des montagnes et obtiendront un bonus de +2 par jour d'étude aux tests de PER (Survie) pendant le voyage (max +10 au bout de cinq jours).
          </p>
          <hr />
          <p class="paragraphe">Les aventuriers peuvent acheter à @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.yNuVJLXFziWMMZJm]{l'École du Vivant} :</p>
          <ul>
            <li>
              <p class="paragraphe">des @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.M8lyhS402gRyuh8I]{potions de soin mineur} (1d4° PV pour 40 pa)</p>
            </li>
            <li>
              <p class="paragraphe">des @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.zef5lgvYEPpKNOQ0]{potions de soin majeur} (3d4° PV pour 350 pa)</p>
            </li>
            <li>
              <p class="paragraphe">
                des @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.jbMY4j2T4DyckYfx]{baume de résistance au froid} (-10 au DD pour résister au froid pendant 24 heures
                pour 15 pa. Si on applique une demi dose du baume (seulement sur les zones critiques (extrémités, visage)) le DD est diminué de -5 au lieu de -10.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.E2pGOIWqUKTZnufA]{sur-chaussures à crampon} pour escalader qui se casseront rapidement,
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Des vêtements chauds fabriqués et ajustés par les artisans Novraks diminuent le DD pour résister au froid de -5 pour un prix allant de 25 pa à plus de 100 pa pour des
                pièces d'exception.
              </p>
            </li>
          </ul>
          <hr />
          <p class="paragraphe">
            <strong>Certains marchands essayeront de leur vendre des produits inutiles ou de mauvaises qualités :</strong>
          </p>
          <ul>
            <li>
              <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.2XuEVQckJmVqYUND]{huile repoussante contre les araignées tisseuses},</p>
            </li>
            <li>
              <p class="paragraphe">
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.S8N1HgUBhNSJjx28]{bouquet d'herbe} à faire brûler le soir pour repousser les Jarguals,
              </p>
            </li>
            <li>
              <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.1RHtgm1I4NKSY297]{tente qui se monte rapidement},</p>
            </li>
            <li>
              <p class="paragraphe">
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.E2pGOIWqUKTZnufA]{sur-chaussures à crampon} pour escalader qui se casseront rapidement,
              </p>
            </li>
            <li>
              <p class="paragraphe">
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.VTa2J9QIC3DJ6FyC]{corde en poils de bouquetin de Novrak} soit disant plus résistant,
              </p>
            </li>
            <li>
              <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.5ZivKhWcJfSMjLzb]{élixir pour les longues randonnées}….</p>
            </li>
          </ul>

          <p class="paragraphe">
            N'hésitez pas à créer des objets que les PJ voudront acheter en piochant dans les compendiums ou en inventant des équipements spécifiques, sans oublier que les produits devront
            être ajustés ou créer et que ça prendra du temps.
          </p>
          <h2>Montures impossibles</h2>
          <p class="paragraphe">
            <strong>Dans aucun cas, le groupe ne pourra utiliser des montures pour ce voyage dans les montagnes</strong>. Même les Sanpurochs, s'ils en ont, ne pourront avancer dans les
            conditions décrites pour Timaor Dunclin.
          </p>
          <p class="paragraphe">
            Les PJs peuvent profiter de la ville pour faire des emplettes et questionner en plus si besoin.
            <strong>Tous les magasins donnent des délais pour fabriquer des tenues de voyages adaptées au froid et de l'équipement</strong>, les PJs devront rester un peu dans la ville
            s'ils veulent s'équiper en conséquence.
          </p>
          <p class="paragraphe">
            <strong>Si les joueurs passent du temps dans la ville, n'hésitez pas à leur donner des informations sur les Ombres Blanches et d'autres choses comme le racisme des humains envers
              les anciennes races.</strong>
          </p>
        </div>
