  - sort: 700000
    name: Rencontre avec Timaor Dunclin
    type: text
    _id: QaRVbzrZHN52mNpu
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Rencontre avec Timaor Dunclin</h1>
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_maison_timaor.webp" width="100" height="100" />
            <p class="paragraphe">
              Peut-on appelez l'endroit où vit Timaor une maison ? pas vraiment. Ça ressemble plus à une petite cabane de chasse abandonnée et bringuebalante. Les planches de bardages
              tombent, la toiture est partiellement effondrée et la porte tient par miracle. Située à quelques centimètre du rebord de la rivière, un mauvais pas et on fait une belle chute
              d'une dizaine de mètre pour s'écraser sur un rocher ou se noyer dans l'eau glacée.
            </p>
            <p class="paragraphe">
              En vous approchant, vous entendez une voix rauque qui marmonne dans cette cabane et lorsque vous toquez, vous entendez un bruit sourd d'un coup de poings sur une table.
            </p>
          </div>
          <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/vallee_novrak/villageois_timaor_dunclin.webp" width="150" height="150" />
          <p class="discussion">
            <span class="discu-acteur">Timaor Dunclin :</span>
            Barrez-vous, bande de merdeux, bouffe fientes tout droit sorti du fion d'une catin. Foutez-moi la paix et allez crever !
          </p>
          <p class="paragraphe">
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.neCUXXBE3pDc77go]{Timaor Dunclin} est un vieil homme brisé depuis son procès. Il a été traîné dans la boue,
            moqué et ridiculisé. Il a perdu tout respect et sa faculté de commercer. Il ne faut pas perdre du vue qu'il est régulièrement harcelé par des morveux et surtout montré du
            doigts par les villageois. Il est méfiant et peut partir au quart de tour s'il se sent rabaissé.
          </p>
          <p class="paragraphe">
            Il est totalement saoule quelque soit l'heure de la journée que choisie par les héros d'Ispier pour venir le rencontrer. Il n'y a pas beaucoup d'espace dans sa cabane et aucune
            autre chaise. A chaque déplacement pour récupérer une bouteille, un verre ou un saucisson à croquer, il bousculera l'un des personnages et le disputera d'être dans ses pattes.
          </p>
          <p class="paragraphe">
            <strong>Si les PJs l'abordent avec respect</strong>, il discutera autour d'un verre d'alcool de mauvaise qualité
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.5XIGv29ADrRM00yK]{Vin des Crocs d'Acier}. Il est assez alcoolisé et dès que la bouteille est vide, il demandera
            aux PJs d'aller chercher d'autres bouteilles à la taverne et ne parlera de rien tant qu'ils ne seront pas revenu. Même si les PJs sont gentils, Timaor sera vite fatigué et
            s'endormira sur sa table. Il faudra revenir ou le brusquer.
          </p>
          <p class="paragraphe">
            Au bout d'un moment à raconter des banalités et à répéter qu'il ne veut pas parler de son histoire, il cédera et un air sombre apparaîtra sur son visage. Il pourra se mettre à
            pleurer et la colère se changera en rancœur et en mélancolie.
          </p>
          <p class="paragraphe">
            «<span class="discussion">Personne n'a voulu me croire.», «Même mes amis de l'époque ont douté de ma parole. Ils ne voulait pas que la merde les éclabousse, les pleureuses préférant leurs bourses à
              notre amitié», «J'avais toute la vie devant moi et une affaire florissante.», «Tout ça à cause d'une bande de chevaux reclus dans un village de merde !</span>»…
          </p>
          <p class="paragraphe">
            <strong>Si les PJs l'aborde avec dédain ou agressivité,</strong>
            il se fermera comme une huître et demandera de l'argent pour répondre (pas moins de 150pa). Si les PJs sont menaçant ou essaye de lui coller des baffes, Timaor ne se démontera
            pas et les provoquera «<span class="discussion">vas-y j'ai plus rien à perdre», «même pas cap de frapper un vieux alcoolique», «Vous êtes tellement con que pour faire parler un vieux vous êtes obligé de la cogner ou de le
              brusquer», «Vous faites la même chose quand une dame vous dit non bande de violeurs», «Tuez moi et la garde s'occupera de vous, je n'ai plus à faire dans se monde de
              merde</span>»
          </p>
          <hr />

          <h3>Informations de Timaor Dunclin</h3>
          <ul>
            <li>
              <p class="paragraphe">
                Il a <strong>rencontré par hasard le village des Centaures</strong> alors qu'il cherchait des herbes rares au nord du village, <strong>il y a plus de 30 ans.</strong>
              </p>
            </li>
            <li>
              <p class="paragraphe">Les centaures l'ont <strong>enfermé dans une mine pendant plusieurs jours</strong> mais il était très bien traité.</p>
            </li>
            <li>
              <p class="paragraphe">Ils <strong>ne parlaient pas la même langue et avaient des coutumes bizarres</strong> (des danses, des chants, des rituels…).</p>
            </li>
            <li>
              <p class="paragraphe">
                Ils ont <strong>réussi à se comprendre au bout de quelques semaines</strong> grâce à ses marchandises qu'il avait dans son sac et qui intriguaient les Centaures.
                <strong>Ils ont fait des échanges</strong> (une belle dague de Timaor contre des herbes aromatiques qu'ils cultivent sur place, par exemple).
              </p>
            </li>
            <li>
              <p class="paragraphe">Il a sympathisé avec «<strong>Kiliko</strong>», <strong>le fils du chef du village qui se nommait «Poauau»</strong>.</p>
            </li>
            <li>
              <p class="paragraphe">Il se souvient de <strong>femelles magnifiques et de bâtiments incroyables</strong> avec des machines superbes.</p>
            </li>
            <li>
              <p class="paragraphe">Il est <strong>resté plus de quatre mois dans le village</strong> avant d'être libéré par les Centaures.</p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>A son retour personne ne l'a cru</strong> et les d'habitants pensent qu'il est fou ou qu'il voulait garder secret ses échanges avec une tribu de Peaux Vertes.
              </p>
            </li>
            <li>
              <p class="paragraphe">Il a <strong>sombré plusieurs années dans l'alcool et les tavernes</strong>. Beaucoup le moquait.</p>
            </li>
            <li>
              <p class="paragraphe">
                Il y est <strong>retourné quelques fois pendant les premiers temps pour faire des échanges</strong> mais ses marchandises ne se vendaient pas car personne ne le croyait.
                Les gens pensaient qu'il avait récupéré des marchandises volées par des clans de Peaux Vertes. Devant le péril du voyage et le peu de reconnaissance et de retour sur
                investissement, il a vite arrêté d'y retourner.
              </p>
            </li>
            <li>
              <p class="paragraphe">Maintenant <strong>il est trop vieux pour ces aventures et en plus il perd la vue depuis 10 ans</strong>.</p>
            </li>
            <li>
              <p class="paragraphe"><strong>Il n'y est jamais retourné depuis plus de 20 ans</strong>.</p>
            </li>
          </ul>
          <hr />
          <p class="paragraphe">
            Timaor leur explique comment se rendre au village des centaures de façon assez précise si la montagne n'a pas changé.
            <strong>Le village est à 40 km à vol d'oiseau mais en parcourant les montagnes, ça représente plutôt le double de distance à une allure très réduite.</strong> Il n'y a pas de
            chemin balisé, pas d'itinéraire, pas de repère pour atteindre le point indiqué par Timaor.
          </p>
          <p class="paragraphe">
            Il décrit surtout <strong>la grande forêt de feuillus qui poussent à proximité du village</strong>, chose étrange à cette altitude. En suivant la montagne vers le l'ouest, le
            groupe devrait trouver <strong>une zone de la paroi totalement recouverte de lierre et de plantes</strong> et c'est là que le village se trouve.
          </p>
          <hr />
          <h3>Informations complémentaires</h3>
          <p class="paragraphe">
            Si les PJs lui tire les vers du nez, sont très gentils, l'écoutent avec intérêt ou reviennent plusieurs jours d'affilé avec des bonnes bouteilles et quelques pièces,
            <strong>Timaor pourra leur raconter des histoires d'où les PJs tireront plusieurs détails intéressants</strong>
            :
          </p>
          <ul>
            <li>
              <p class="paragraphe">Non loin des portes, <strong>une zone de la forêt de feuillus est exploitée par les centaures</strong> et certains arbres sont coupés.</p>
            </li>
            <li>
              <p class="paragraphe">
                La première fois, <strong>il était intrigué par un haut panache de vapeur d'eau derrière la paroi mais aucun son d'une cascade n'était pourtant perceptible</strong>. C'est
                seulement lorsque les centaures l'ont capturé, en rentrant dans le village qu'il a entendu tous les bruits du village et de la cascade.
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>Quand on lève les mains et qu'on montre ses deux paumes, c'est un signe de défi</strong> et une invitation au combat pour provoquer l'autre.</p>
            </li>
            <li>
              <p class="paragraphe"><strong>Il ne faut jamais toucher la croupe d'un ou une centaure</strong> si on ne nous le demande pas.</p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Ils sont très fier de leurs tatouages et ils les montrent pour appuyer leur parole</strong>. Il ne faut jamais critiquer les tatouages des centaures.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                D'après ses souvenirs flous, ils
                <strong>disaient « Ata Pai » le matin pour se saluer, «Kaua e Pena» quand il faisait une chose interdite et «Wakia» pour le féliciter de ses efforts.</strong>
              </p>
            </li>
            <li>
              <p class="paragraphe">Les centaures l'ont toujours appelé « <strong>Tangata</strong> » (trad. Humain)</p>
            </li>
          </ul>
          <p class="paragraphe">
            Pour finir, en fonction de l'attitude des PJs face à Timaor, <strong>ce dernier n'acceptera aucune faveur de leur part</strong> (logement à l'auberge, discutions avec les
            autorités…). <strong>Il est assez heureux que les aventuriers l'aient écouté</strong> mais il ne donne pas beaucoup d'espoir que ça change sa vie. Il est plutôt pessimiste sur
            leur faculté à trouver le village des centaures.
          </p>
          <p class="paragraphe"><strong>A part quelques bouteilles d'alcool et qu'on lui foute la paix, il n'attend rien de plus de toute cette histoire.</strong></p>
        </div>
