  - sort: 900000
    name: Voyage dans les étendues sauvages
    type: text
    _id: ZajdGvjbWnJnZG6B
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Voyage dans les étendues sauvages</h1>
          <p class="paragraphe">
            Le groupe d'aventurier est fin prêt pour effectuer cette longue randonnée sur les plateau déserts des Crocs d'Acier. 40 kilomètres, ça semble facile mais c'est sans compter les
            multiples dangers qui les séparent encore de leur destination. Seront-ils à la hauteur pour affronter les étendues sauvages ?
          </p>
          <div class="description">
            <p class="paragraphe">
              C'est l'heure du départ pour les montagnes en direction du point que vous a indiqué Timaor. En espérant que vous soyez assez équipé pour faire ce voyage exigeant.
            </p>
            <p class="paragraphe">
              Vous commencez cette randonnée en montant un chemin en lacet qui part vers le nord et dans votre progression vous distinguez la Vallée de Novrak qui rétrécit au fur et à
              mesure de votre progression. Au bout de quelques heures de marches avec un fort dénivelé, vous passez une crête et toute traces de civilisation disparaît dans l'instant.
            </p>
            <p class="paragraphe">
              En face de vous, une étendue sauvage, presque entièrement recouverte des neiges éternelles des hauts sommets. Résineux éparses, failles profondes, crevasses dissimulées,
              plaques de glaces et escalades pénibles semblent les seules certitudes que vous percevez devant vous. Vous vous dirigez vers des crêtes plus hautes encore et ce n'est pas
              pour vous rassurer sur la difficulté de ce voyage.
            </p>
            <p class="paragraphe">D'après vos informations, si tout se passe bien, le voyage devrait durer trois jours.</p>
          </div>
          <hr />

          <h1>Règles de voyage</h1>
          <p class="paragraphe">
            Les joueurs doivent choisirent un personnage «Éclaireur» qui s'occupe de les diriger, suivre la piste et trouver des endroits abrités et confortables pour passer des nuits
            reposantes.
          </p>
          <p class="paragraphe">
            Il faut trois jours entiers pour atteindre la forêt de feuillues proche du village d'Arkanov et chaque jour est décomposé en quatre périodes (matinée, midi, après-midi et
            campement).
          </p>
          <p class="paragraphe">
            Pour chaque période, le personnage Éclaireur effectuer un test de @Test[car:per|diff:15|comp:Voyage en terrain difficile] (ou plus si vous voulez corser leur voyage et les
            mettre en difficulté sachant que l'Éclaireur peut utiliser des Points de Chance s'il le souhaite).
          </p>
          <p class="paragraphe">Il faudra donc, en moyenne, 12 périodes pour atteindre leur objectif.</p>
          <hr />

          <h2>Pour les périodes du matin, midi et après-midi :</h2>
          <ul>
            <li>
              <p class="paragraphe"><strong>Si réussi :</strong></p>
              <p class="paragraphe">
                Le groupe avance normalement dans les plateaux rocheux. Ils arrivent à éviter les failles et crevasses, contourner les rochers sans se perdre et sont assez réactifs pour se
                cacher lorsqu'un prédateur sauvage se fait entendre ou voir au loin.
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>Si réussi de 10+ points :</strong></p>
              <p class="paragraphe">
                Les conseils de l'Éclaireur sont pertinents et ses prises de décisions incroyables. Le groupe d'explorateurs avancent vite. Ils gagnent une période de voyage.
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>Si raté :</strong></p>
              <p class="paragraphe">
                Des doutes et des problèmes d'orientation viennent perturber l'Éclaireur du groupe. Les explorateurs doivent rebrousser chemin, contourner une large faille non prévue ou se
                retrouvent coincé par une paroi rocheuse. Ils n'avancent quasiment pas. Cette période de voyage est perdue !
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>Si raté de 10+ points :</strong></p>
              <p class="paragraphe">
                Alors qu'ils avancent péniblement sur les plaques de neige et de glace, des problèmes vont venir perturber notre groupe d'explorateurs. La période de voyage est perdue et
                un événement se produit :
              </p>
              <ul>
                <li>
                  <p class="paragraphe">
                    L'un des personnage tombe dans une crevasse profonde et étroite. Il faudra plusieurs heures pour le sortir de là et la chute blesse le PJs =&gt; 3d6 DM
                  </p>
                </li>
                <li>
                  <p class="paragraphe">
                    L'éclaireur perd totalement la piste et le groupe doit faire demi-tour sur une longue distance. En plus de la perte de temps, l'agacement et la fatigue augmente. Perte
                    de deux périodes au lieu de une et chaque personnage perd 2 PR.
                  </p>
                </li>
                <li>
                  <p class="paragraphe">
                    Sur le chemin, malgré les traces que l'Éclaireur auraient pu apercevoir, le groupe tombe nez à nez avec un repère de Jarguals. Les bêtes affamées se jettent sur les
                    PJs. Soit jouer le combat (utiliser la scène @UUID[Scene.YtUQev9XmexJVbYn]{4.Attaque Scarabée} contre 3
                    @UUID[Compendium.cof2ta_reliques_union.cof2ta-acteurs.Actor.Aw3zZPMsNnEWb2VK]{loups} et 1
                    @UUID[Compendium.cof2ta_reliques_union.cof2ta-acteurs.Actor.nb37b3cIaZs9y2ft]{Loup géant} soit répartissez les dégâts suivant aux PJs (2d8+5 DM, 2d8+2 DM, 1d8+5 DM et
                    1d8+2 DM)
                  </p>
                </li>
                <li>
                  <p class="paragraphe">L'éclaireur n'est pas clair dans ses avertissements et l'un des personnages glisse sur une plaque de glace et se blesse gravement =&gt; 4d6 DM</p>
                </li>
                <li>
                  <p class="paragraphe">
                    En marchant le long d'une paroi rocheuse, un éboulement tombe sur le groupe, les recouvrant de petites pierres et d'une bonne couche de neige. Perte de deux période au
                    lieu de une et chaque personnage perd 2 PR.
                  </p>
                </li>
              </ul>
            </li>
          </ul>

          <h2>Pour les périodes Campement :</h2>
          <p class="paragraphe">L'éclaireur effectue un nouveau @Test[car:per|diff:15|comp:Trouver et monter un camapement] pour trouver un endroit pour établir un campement reposant.</p>
          <ul>
            <li>
              <p class="paragraphe"><strong>Si réussi :</strong></p>
              <p class="paragraphe">
                Le campement est à l'abri du vent glacial, de la bruine qui tombe et les PJs arrivent même à trouver assez de bois sec pour faire un bon feu réconfortant. Chaque personnage
                récupère normalement ses PM et son PR.
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>Si réussi de 10+ points :</strong></p>
              <p class="paragraphe">
                Le campement est idéal. Une grotte, un bosquet dense ou une enclave le long d'une paroi, le groupe passe une excellente nuit, réchauffé par une belle flambée, le ventre
                bien rempli par les rations complémentées par de délicieuses baies sauvages. Chaque PJs récupère normalement ses PM et son PR. En plus de cela, grâce à cette bonne nuit de
                repos, l'Éclaireur gagne un bonus de +5 aux deux prochains tests de Voyage.
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>Si raté :</strong></p>
              <p class="paragraphe">
                Pris par surprise par le soir qui arrive, le groupe s'installe à la va-vite dans un coin pas idéal. Les vêtements et l'équipement sont mouillés et glacé, impossible de
                faire un feu et le vent agite le sommeil des explorateurs. Les PJs ne récupèrent aucun PM ni PR durant leur nuit.
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>Si raté de 10+ points :</strong></p>
              <p class="paragraphe">
                Le lieu du campement est catastrophique. Au milieu de la nuit, des plaques de neiges tombent sur le campement éteignant le maigre feu et trempant tout l'équipement des
                explorateurs. Les PJs sont plus épuisés au réveil qu'au moment de se coucher. Ils perdent tous un PR supplémentaire et ne récupèrent aucun PM ou PR de leur nuit.
                L'Éclaireur, fatigué dès le début de journée, obtient un malus de -5 à ses deux prochains tests de Voyage.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Le froid des montagnes</h2>
          <p class="paragraphe">
            En plus de l'orientation et de l'établissement du campement, tous les explorateurs sont exposés au froid, à la neige et au bourrasques de vent tout au long du voyage. A chaque
            période (les quatre), chaque personnage effectue @Test[car:con|diff:12|comp:Résistance au froid] pour résister au froid (appliquer les bonus liés au vêtements adaptés et au
            baume de résistance au froid si les personnages en ont acheté).
          </p>
          <ul>
            <li>
              <p class="paragraphe"><strong>Si réussi :</strong></p>
              <p class="paragraphe">Le PJ résiste bien à la morsure du froids. Il a les doigts endoloris mais rien de plus.</p>
            </li>
            <li>
              <p class="paragraphe"><strong>Si raté :</strong></p>
              <p class="paragraphe">
                Les extrémités (doigts, orteils, nez, oreilles…) du personnages sont très douloureuses. Il a plus de mal à se déplacer et commence à avoir la tête qui tourne et des
                engelures apparaissent sur sa peau. Le PJ subit 1d6 DM de froid.
              </p>
            </li>
          </ul>
          <p class="paragraphe">
            Le groupe d'aventurier pourra utiliser toutes les stratégies pour améliorer ses chances lors du voyage et les MJs ne doivent pas hésiter à leur donner des bonus pour leurs
            tests. Le DD du test peut être aussi augmenté ou diminué en fonction de la progression du groupe.
          </p>
          <p class="paragraphe">
            Les explorateurs peuvent aussi volontairement faire une ou deux périodes de pause pour se soigner et récupérer de leur fatigue. Si un ou plusieurs personnages tombent à 0PR, il
            ne pourra plus avancé et tombera insconcient sur le chemin. Si la perte de PR intervient pendant la période de campement, il tombera insconcient dans la nuit. Il effectue alors
            @Test[car:con|diff:10|comp:Hypothermie] trois fois. S'il obtient plus de réussite que d'échec, il se réveille sinon il meure d'hypothermie et de fatigue.
          </p>
          <hr />

          <h1>Rencontre du Scarabée des Crocs d'Acier</h1>
          <p class="paragraphe">Cette rencontre intervient au début de la période Campement du deuxième jour de voyage.</p>
          <p class="paragraphe"><strong>Scène :</strong> @UUID[Scene.YtUQev9XmexJVbYn]{4.Attaque Scarabée}</p>
          <p class="paragraphe"><strong>Ennemi :</strong> @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.Le97DeTuKGeUDmh7]{Scarabée des Crocs d'Acier}</p>
          <div class="description">
            <p class="paragraphe">
              Vous marchez depuis deux jours et la fatigue commence à se faire vraiment sentir dans tous les muscles de votre corps. Le rythme est soutenu mais particulièrement saccadé
              lorsqu'il faut faire marche arrière, contourner une crevasse ou se risquer dans des zones particulièrement accidentées.
            </p>
            <p class="paragraphe">Le groupe trouve un endroit à l'abri des bourrasques de vents pour passer la nuit et c'est le bon moment pour poser votre barda.</p>
            <p class="paragraphe">Alors que vous êtes en train de sortir l'équipement de votre campement, une ombre massive passe dans les derniers rayons du soleil couchant.</p>
          </div>
          <ul>
            <li>
              <p class="paragraphe">@Test[car:per]</p>
              <ul>
                <li>
                  <p class="paragraphe"><span class="roll-result">10+</span> : <span class="description">Une créature a bouger sur la crête au dessus de vous</span></p>
                </li>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">15+</span> : <span class="description">Un bruit d'insecte est à peine perceptible, un cliquetis qui se rapproche</span>
                  </p>
                </li>
                <li>
                  <p class="paragraphe"><span class="roll-result">20+</span> : <span class="description">En levant les yeux on distingue à peine, le bout d'un immense scarabée.</span></p>
                </li>
              </ul>
            </li>
            <li>
              <p class="paragraphe">
                @Test[car:int|diff:15|comp:Connaitre une créature] :
                <span class="description">c'est un scarabée géant des Montagnes. Le personnage sait qu'ils sont très résistants et qu'ils peuvent projeter des crachats empoisonnés et très puissants.</span>
              </p>
            </li>
          </ul>

          <p class="paragraphe">Comme la plupart des insectes, il n'est pas agressif mais effrayé.</p>
          <p class="paragraphe">
            <strong>Si les PJs l'intimident en poussant des cris ou en étant menaçant</strong> : @Test[car:for|comp:Intimidation] Opposé. Si réussi le scarabée s'en va. Si raté le scarabée
            intimide pendant un round et attaque par un crachat le personnage qui l'intimide.
          </p>
          <p class="paragraphe"><strong>Si les PJs l'attaquent :</strong> le scarabée attaquera après un round d'intimidation en levant ses pattes et en vibrant intensément.</p>
          <p class="paragraphe">
            <strong>Si on ne l'attaque pas et qu'on a une position défensive face à lui : </strong>le Scarabée pourra laisser les PJs partir. Si les PJs ne bougent pas, il s'avancera
            jusqu'au contact en intimidant le groupe.
          </p>

          <h2>Butin</h2>
          <p class="paragraphe">
            Pour récupérer les quatre doses de poisons mortel dans les glandes du Scarabée des Crocs d'Acier, le PJ doit effectuer @Test[car:agi|diff:15|comp:Biologie]. En cas d'échec
            critique le personnage entre en contact avec le poison et subit son effet.
          </p>
          <p class="paragraphe">Pour récupérer la corne du Scarabée des Crocs d'Acier, le PJ doit effectuer @Test[car:agi|diff:12|comp:Biologie].</p>
          <hr />

          <h1>Destination Finale</h1>
          <div class="description">
            <p class="paragraphe">
              Après cette rencontre surprise, vous passez une nuit sans encombre. D'après les informations de Timaor, vous devriez arriver demain dans la journée à l'endroit qu'il vous a
              indiqué. Au petit matin, vous reprenez votre route dans ces montagnes hostiles et sauvages.
            </p>
          </div>
          <p class="paragraphe">Reprenez les @Test[car:per|diff:15|comp:Voyage en terrain difficile] pour l'Éclaireur pour les périodes restantes.</p>
          <p class="paragraphe">Lorsque la douzième période est réussie, le groupe d'explorateurs s'approche de leur destination.</p>
          <div class="description">
            <p class="paragraphe">
              Alors que vous arpentez les pentes abruptes, vous arrivez dans une foret dense, mélange d'essences de résineux de montagnes et de feuillus résistants au froid de l'altitude.
              Vous traversez sans difficulté des petits cours d'eau prenant leur sources dans les hauteurs et alimentés par la fonte des neiges.
            </p>
          </div>
          <p class="paragraphe">
            Le groupe doit se diriger grâce aux informations qu'ils ont pu récupérés de Timaor Dunclin à la Vallée de Novrak. Il faudra qu'ils prennent les bonnes décisions pour approcher
            le village des centaures.
          </p>
          <p class="paragraphe">
            En fonction de la quantité d'information qu'ils ont et de leur prise de notes, laissez-les tourner en rond et prendre du temps dans la forêt. Le climat de cette endroit est
            beaucoup plus clément et les PJs n'auront plus besoin de faire des @Test[car:con|diff:12|comp:Résistance au froid] pour résister au froid.
          </p>
          <p class="paragraphe">Lorsqu'ils approchent de la destination :</p>
          <div class="description">
            <p class="paragraphe">
              Au travers des branches et des buissons, vous distinguez un nuage de vapeur d'eau provenant d'une paroi rocheuse et lorsque vous vous en approchez, vous tombez sur une zone
              où les arbres ont été coupés proprement à la hache.
            </p>
          </div>
          <p class="paragraphe">
            Tant que les PJs ne s'approchent pas trop de la paroi recouverte de lierre et de plantes, ils peuvent discuter et mettre en place des stratégies diverses et variées.
          </p>
          <div class="levelup">PASSAGE DE NIVEAU</div>
        </div>
