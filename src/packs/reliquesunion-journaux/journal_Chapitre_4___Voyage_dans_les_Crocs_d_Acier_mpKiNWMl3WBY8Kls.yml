      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    Après une longue journée de voyage dans les Crocs\_d’Acier, les PJs vont s’installer pour la nuit dans un\_ancien bâtiment qui devait servir à l’époque de halte\_de voyage et de\n    péage pour emprunter le pont entre\_deux flancs de montagne.\n  </p>\n  <p>\n    Ils vont se faire attaquer par une Maille de la @UUID[JournalEntry.fV8x7QzwxUlPb1Xp]{Toile\_Vivante} qui attend les aventuriers depuis quelques\_jours. A leur arrivé, les membres\n    de la Maille\_s’installent sur les toits en attendant le bon moment\_pour surprendre les PJs.\n  </p>\n  <p>\n    <strong>Leur but :</strong> assommer ou ligoter les personnages les\_plus dangereux et surtout celui qui monte la garde\_pour pouvoir les interroger et si possible récupérer\_le\n    Bracelet de l’Union ou des informations sur ce\_dernier et les motivations du groupe.\n  </p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Attention :</span></strong></span>\n    si un combat se déclenche, il est assez\_dangereux pour des héros de bas niveau.\n  </p>\n  <hr />\n  <h2>Attaque surprise</h2>\n  <h3>Premier Front : le PJ qui monte la garde</h3>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/grooguen.webp\" width=\"100\" height=\"100\" />\n  <p>\n    Le PJ qui monte la garde va recevoir la visite de @UUID[Actor.rwst2vEmQPMvEUGy]{Grooguen}, un humain fort et expérimenté qui attend sur la toiture du bâtiment. Il attend le bon\n    moment pour sauter sur le PJ qui fait sa ronde. Grooguen essaye de tomber sur le PJ et lui plaquer le tissu imbibé de Baume de mutisme sur le visage.\n  </p>\n  <p>Si le combat s'engage avec Grooguen, il dégaine son épée longue et se défendra du mieux qu'il peut en se dirigeant vers ses camarades cachés.</p>\n  <ul>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:per] vs @Test[car:agi|comp:discrétion]</strong></span> (+6)\n      </p>\n    </li>\n  </ul>\n  <ul>\n    <li>\n      <p><strong>Si Perception raté :\_</strong></p>\n      <blockquote>\n        <p>\n          Tu es tranquillement en train d’observer les\_alentours de la bâtisse où tes compagnons de voyage\_sont installés lorsque tu reçois une grande masse sur\_le dos. Au moment\n          de l’impact, tu tourne la tête et\_aperçois succinctement, un homme grand et costaux\_qui a sauté depuis les hauteurs directement sur toi,\_une épée longue à la main. Il a\n          des tatouages un peu\_partout sur le visage et le cou. Sa deuxième main se\_plaque sur ton visage avec un bout de tissu qui sent\_fortement le champignon.\n        </p>\n      </blockquote>\n      <p>Dégâts du choc : 1d6+4 DM\_</p>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:con|diff:20|comp:Résistance à un poison|echstatut:silence]</strong></span>\n        (@UUID[Compendium.world.reliquesunion-objets.Item.uMux0pNjs73Usngm]{Baume de Mutisme})\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Si Constitution raté :</span></span> 2d10 heures\n          </p>\n          <blockquote>\n            <p>Tu sens que tes cordes vocales se crispent. Tu essayes\_de crier pour prévenir les dormeurs mais aucun son ne\_sort de ta bouche.</p>\n          </blockquote>\n        </li>\n        <li>\n          <p>\n            <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Si Constitution réussi :</span></span>\n          </p>\n          <blockquote>\n            <p>Malgré la pâte qui semble te contracter les cordes\_vocales tu arrives à éloigner ton visage et tu peux\_crier pour prévenir les dormeurs.</p>\n          </blockquote>\n        </li>\n      </ul>\n    </li>\n    <li>\n      <p><strong>Si Perception Réussie :</strong></p>\n      <blockquote>\n        <p>\n          Alors que tu es tranquillement en train d’observer les alentours de la bâtisse où tes compagnons\_de voyage sont installés pour la nuit, tu entends\_un craquement au dessus\n          de toi, sur le bord de la\_toiture. Au moment, où tu te retournes pour regarder\_l’endroit, tu distingues un homme grand et costaux\_qui est accroupi sur le rebord près à\n          bondir vers toi.\_Il tient dans la main une épée longue et dans l’autre\_un bout de tissu qui semble humide.\_Il saute dans ta direction mais tu arrive à l’éviter.\_Il\n          atterri à ton contact.\n        </p>\n      </blockquote>\n    </li>\n  </ul>\n  <hr />\n  <h3>Deuxième Front : le PJ le plus dangereux</h3>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/frahnilleh.webp\" width=\"100\" height=\"100\" />\n  <p>\n    @UUID[Actor.FJMtWtydebKWXYF0]{Franill'eh} est une Lutane (peuple très rare dans cette partie d'Arran). Elle est chargée d'assomer et de rendre muet le PJ considéré comme le\n    plus dangereux du groupe. En cas de difficulté pour estimer, elle privilégira le PJ le plus isolé dans le bâtiment.\n  </p>\n  <p>Si elle réussi à assomer le PJ sans déclencher d'alerte, elle tentera la même chose sur les autres.</p>\n  <p>\n    <span style=\"font-family:Arial\"><strong>@Test[car:per] vs @Test[car:agi|comp:discrétion]</strong></span> (+8)\n  </p>\n  <ul>\n    <li>\n      <p><strong>Si Perception raté :\_</strong></p>\n      <p><strong>Dégâts du Gourdin à la Tête :</strong> 1d8 DM</p>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:con|diff:20|comp:Résistance au poison|echstatut:silence]</strong></span>\_(@UUID[Compendium.world.reliquesunion-objets.Item.uMux0pNjs73Usngm]{Baume de Mutisme})\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Si Constitution raté :</span></span> 2d10 heures\n          </p>\n          <blockquote>\n            <p>\n              Tu ressens une douleur intense pendant ton\_sommeil. Tu essayes de crier mais aucun son ne\_sort de ta bouche. En ouvrant les yeux, tu te rends\_compte que ton nez et ta\n              bouche sont obstrués par\_un bout de tissu qui sent une forte odeur de champignon. En tournant la tête sur ta droite, tu remarque\_d’abord du sang qui coule d’un\n              gourdin métallique.\_\n            </p>\n            <p>A cet instant tu vois le visage d’une espèce d’elfe mais\_plus petite qui tient le gourdin et qui lève le bras pour\_porter un nouveau coup sur ta tête.</p>\n          </blockquote>\n        </li>\n        <li>\n          <p>\n            <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Si Constitution réussi :</span></span>\n          </p>\n          <blockquote>\n            <p>\n              Tu ressens une douleur intense pendant ton\_sommeil. Lorsque tu crie, tu ressens que ta bouche\_et ton nez sont obstrué par un tissu qui sent fort le\_champignon. Tu\n              arrives à hurler malgré cette pâte\_qui semble vouloir t’empêcher de parler. En tournant\_la tête sur ta droite, tu remarque d’abord du sang qui\_coule d’un gourdin\n              métallique. A cet instant tu vois\_le visage d’une espèce d’elfe mais plus petite qui tient\_le gourdin et qui lève le bras pour porter un nouveau\_coup sur ta tête.\n            </p>\n          </blockquote>\n        </li>\n      </ul>\n    </li>\n    <li>\n      <p><strong>Si Perception réussie :\_</strong></p>\n      <blockquote>\n        <p>\n          Tu ressens une présence au dessus de toi\_pendant que tu dors, tu ouvres les yeux et\_tu vois une sorte d’elfe mais plus petite qui\_est à tes côtés avec un gourdin\n          métallique\_dans sa main droite et un bout de tissu dans\_sa main gauche. Elle est à deux doigts de\_t’appliquer le bout de tissu sur le visage et\_tu sens qu’elle est prête\n          à t’assommer avec\_son gourdin.\n        </p>\n      </blockquote>\n    </li>\n  </ul>\n  <hr />\n  <h2>Suite du Combat</h2>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/naeel.webp\" width=\"100\" height=\"100\" />\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/hodrok.webp\" width=\"100\" height=\"100\" />\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/dracki.webp\" width=\"100\" height=\"100\" />\n  <p>\n    Les trois autres combattants sont positionnés sur\_le toit du bâtiment le long de la paroi rocheuse. Ils\_attendront que Grooguen et Franill’eh reviennent ou\_que l’alarme soit\n    donnée par les aventuriers.\n  </p>\n  <p>Lorsqu’ils rentrent en combat, ils mettront deux\_rounds entiers à descendre de la toiture sans grande\_discrétion et pour atteindre le combat avec les PJs.</p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">La @UUID[Actor.ygBtxpDi9QGPhlbP]{Capitaine Dracki}</span></strong></span>\_donne beaucoup\_d’ordre à ses compagnons pendant le\_combat. Elle sera au contact\_avec son marteau de guerre\_magique. Elle ne quittera pas le combat et soit\_elle se rendra soit\n    elle tombera\_inconsciente au combat.\n  </p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.GZJsAI4TXWp1K5tD]{Hobrok}</span></strong></span>\n    fonce dans le tas sans se poser de question.\n  </p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.TulVLGrTjhhw27SM]{Nael}</span></strong></span>\n    utilisera le plus possible son arbalète et reculera si on s’approche de lui.\n  </p>\n  <hr />\n  <h2>Si le combat est en faveur des PJs</h2>\n  <p>Lorsque le combat sera un peu avancé :</p>\n  <p>\n    Alors que la naine s’apprête à te donner un grand\_coup de marteau dont les runes scintillent d’une\_lueur orangée, elle hurle : «<em>nul ne mérite de porter\_les reliques, l’oubli dans la mort</em>» !\n  </p>\n  <p>Si les membres de la @UUID[JournalEntry.fV8x7QzwxUlPb1Xp]{Toile Vivante} semblent défavorisés, l’un des survivants émet un sifflement puissant.</p>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Ils ont trois tours pour s’enfuir :</span></strong></span>\n  </p>\n  <ul>\n    <li>\n      <p><strong>Tour 1 :</strong> les ennemis se\_rapprochent des ouvertures du pont tous du même\_côté en essayant de combattre quand même.</p>\n    </li>\n  </ul>\n  <blockquote>\n    <p>Vous entendez un cri strident en haut des\_montagnes assez loin du pont.</p>\n  </blockquote>\n  <ul>\n    <li>\n      <p><strong>Tour 2 :</strong> pour les PJs qui ont une ligne de vue sur le gouffre\_</p>\n    </li>\n  </ul>\n  <blockquote>\n    <p>\n      Vous voyez du coin de l’œil une grande ombre\_qui plane dans le gouffre et qui se rapproche du\_pont. Les combattants continuent de s’approcher des\_ouvertures et pour ceux qui\n      y sont déjà, ils posent un\_pied sur le rebord du pont.\n    </p>\n  </blockquote>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/dragon_toile_vivante.webp\" width=\"100\" height=\"100\" />\n  <ul>\n    <li>\n      <p>\n        <strong>Tour 3 :</strong> tous les membres de la Toile Vivante ont une action\_de mouvement pour atteindre le rebord du pont et\_utiliseront leur deuxième action de mouvement\n        pour\_sauter dans le vide (<span style=\"font-family:Arial\"><strong>@Test[car:agi|diff:15]</strong></span>).\n      </p>\n    </li>\n  </ul>\n  <blockquote>\n    <p>\n      Au moment où les ennemis sautent du pont, vous\_voyez l’ombre d’@UUID[Actor.LIMMfaHSCOjcqfqL]{un grand volant} toutes ailes ouvertes\_qui passe sous le pont et réceptionne les\n      ennemis. Un\_beuglement se fait entendre de ce petit dragon qui\_amène vos adversaires plus loin.\_\n    </p>\n  </blockquote>\n  <hr />\n  <h3>Fouille des vaincus</h3>\n  <p>\n    La @UUID[Actor.ygBtxpDi9QGPhlbP]{Capitaine Dracki} et\_@UUID[Actor.FJMtWtydebKWXYF0]{Franill’eh} ne peuvent pas mourir. Elles sont inconscientes,\_à deux doigts de mourir. Si les\n    PJs le souhaitent, ils\_peuvent les soigner et les interroger. S’ils décident de\_les laisser mourir alors qu’ils savent qu'ils peuvent les\_sauver ou s’ils les finissent, il y a\n    des conséquences\_pour le porteur du Bracelet de l’Union (il sent que la\_voie du FANATISME est ravie de ce choix) et il y aura\_des conséquences plus tard dans la campagne.\n  </p>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/tatouage_toile_vivante.webp\" width=\"100\" height=\"100\" />\n  <p>Les PJs peuvent fouiller les\_adversaires et récupérer leurs\_équipements.</p>\n  <ul>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:per|diff:15|comp:Fouille des victimes]</strong></span>\_: Ils remarquent\_le tatouage présent sur tous les\_membres sur leur flanc droit.\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>@Test[car:int|diff:20|comp:Mémoire et analyse]</strong></span>\_: Il a, à\_peu près, la même forme que le symbole\_sur le pendentif de Laotissa.\n          </p>\n        </li>\n      </ul>\n    </li>\n  </ul>\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Capitaine Dracki</span></strong></span>\n  </p>\n  <p>\n    S’ils ont accès\_à la Capitaine Dracki, ils peuvent trouver une\_carte ainsi que des Pierre de localisation de la\_Toile Vivante (attention ils peuvent l’activer sans faire\_exprès\n    !!)\_\n  </p>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/carte_toile_vivante.webp\" width=\"100\" height=\"100\" />\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/toile_vivante_pierre_de_localisation.webp\" width=\"100\" height=\"100\" />\n  <ul>\n    <li>\n      <p><strong>@UUID[Compendium.world.reliquesunion-objets.Item.clZAIMRCodrRABz1]{Carte sur la Capitaine Dracki}</strong> :</p>\n      <p>\n        Cette carte es tracée sur une peau de cuir tannée,\_roulée sur elle-même. Sur la peau, on voit une carte\_approximative de la région de l’Ourann du Nord.\_Sur la carte, on\n        voit deux tracés, un rouge de la Cité\_d’Ispier vers les montagnes des Crocs d’Acier et un\_vert partant de la forêt de Birkanie vers le même point.\n      </p>\n    </li>\n    <li>\n      <p><strong>@UUID[Compendium.world.reliquesunion-objets.Item.OOUzxMVHBKjSCFZV]{Pierre de Localisation} :</strong></p>\n      <p>\n        Cette petite pierre, gravée avec le même symbole\_que le tatouage représenté sur les ennemis, permet,\_quand on la serre dans sa main pendant quelques\_secondes d’indiquer la\n        localisation exacte de la Pierre\_aux deux responsables de la Toile Vivante.\_@UUID[Compendium.world.reliquesunion-objets.Item.Y3uLofVyCzInAFP6]{Pierre de localisation de la\n        Toile Vivante}\n      </p>\n    </li>\n  </ul>\n  <hr />\n  <h3>Interrogatoire des vaincus</h3>\n  <p>\n    En fonction des questions et surtout de l’animosité\_des PJs, l’un des membres et en premier la capitaine\_Dracki (si elle est présente) répondra ou non aux\_questions des PJs.\n  </p>\n  <p><strong>Si les PJs sont trop malsains</strong>, chaque membre\_préférera mourir que de leur livrer des informations.\_</p>\n  <p>\n    <strong>Si les PJs essayent de comprendre ce qu’il se passe\_et sont «gentils» dans leur interrogatoire</strong>, Dracki,\_Franill’eh ou Grooguen répondra à leurs questions\_et\n    leur expliquera leur mission et leurs valeurs. Si\_Dracki est convaincu de leur honnêteté, elle leur\_demandera de poursuivre leur mission de récupérer\_les autres Reliques, de\n    faire attention a leurs effets\_et de les aider face au Clan de l’Épouse qui se cache\_quelque part dans l’Ogrie et qui souhaite récupérer les\_Reliques de l’Union. Si les PJs les\n    libèrent, elle leur\_donnera une pierre runique marqué de leur symbole\_en leur expliquant qu’elle permet d’envoyer un signal\_aux deux commandants et leur indiquer la position\_de\n    la pierre.\n  </p>\n  <p>\n    Si les PJs fraternise avec @UUID[JournalEntry.fV8x7QzwxUlPb1Xp]{la Toile Vivante}, le ou les\_membres partis à dos de dragon pourront revenir sur\_le\n    pont.\_@UUID[Actor.LIMMfaHSCOjcqfqL]{Pouik - Dragon de la Toile Vivante}\n  </p>\n  <hr />\n  <h2>Si les PJs perdent le combat</h2>\n  <p>\n    Ils se réveillent menottés et douloureux dans la\_pièce où ils ont dormis. Les survivants de la @UUID[JournalEntry.fV8x7QzwxUlPb1Xp]{Toile\_Vivante} ont l’air en colère. Le PJ\n    porteur du Bracelet\_de l’Union sent instantanément qu’ils ont essayé\_de lui retirer le bracelet par tous les moyens et son\_avant-bras est lacéré, brûlé et écrasé par endroit.\n    La\_douleur est incroyablement forte.\n  </p>\n  <hr />\n  <h3>Interrogatoire de la Capitaine Dracki</h3>\n  <p>\n    La @UUID[Actor.ygBtxpDi9QGPhlbP]{Capitaine Dracki} mènera l’interrogatoire avec\_l’aide de @UUID[Actor.FJMtWtydebKWXYF0]{Franill’eh} pour calmer toute impertinence.\_Elle n’y va\n    pas par quatre chemins et demandera\_illico l’objectif des aventuriers.\n  </p>\n  <ul>\n    <li>\n      <p>\n        <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs sont coopératifs</span></strong></span>, elle leur expliquera\_leur mission et ce sera aux PJs de la convaincre de\_leur bonne volonté. Si Dracki est convaincu de leur\_honnêteté, elle leur demandera de poursuivre\n        leur\_mission de récupérer les autres Reliques, de faire\_attention a leurs effets et de les aider face au Clan\_de l’Épouse qui se cache quelque part dans l’Ogrie\_et souhaite\n        récupérer les Reliques de l’Union. Si elle\_fait confiance aux PJs, elle prendra ses précautions\_en marquant le porteur du Bracelet au fer rouge avec\_le symbole de la Toile\n        Vivante et le préviendra qu’à\_partir de maintenant, les commandants sauront où il\_se trouve à chaque instant.\n      </p>\n    </li>\n    <li>\n      <p>\n        <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs sont méprisants ou idiots</span></strong></span>, elle pourra en\_venir à tuer le porteur du Bracelet de l’Union pour le\_récupérer en laissant les autres PJs inconscients dans\_le bâtiment avec le minimum d’équipement\n        pour\_survivre. Le MJ devra modifier le déroulement de la campagne pour palier à la bêtise des PJ (poursuite de la Toile Vivante, récupération de la Relique, reprise de leur\n        voyage).\n      </p>\n    </li>\n  </ul>\n  <h3>Si les PJs fraternise avec\_la Toile Vivante</h3>\n  <p>S’il y a des morts parmi la Maille de la Toile Vivante,\_une cérémonie sera faite avant tout autre chose.\_</p>\n  <p>\n    Avant de reprendre leur voyage, ils pourront\_demander des conseils ou des indications sur les\_prochains jours de voyage, sur les autres Reliques et\_sur le Clan de l’Épouse. Ils\n    en savent déjà beaucoup et\_les deux groupes pourront échanger des informations.\n  </p>\n</div>"
