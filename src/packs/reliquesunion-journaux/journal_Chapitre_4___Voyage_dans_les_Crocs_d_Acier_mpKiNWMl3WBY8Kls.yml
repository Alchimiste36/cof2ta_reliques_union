      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    Les aventuriers sont repartis sur les routes en direction\_des hautes Montagnes des Crocs d’Acier. Ils vont parcourir des centaines de kilomètres au travers des plaines du\_Pays\n    des Vents puis dans les chemins encombrés des\_hautes montagnes.\n  </p>\n  <p>\n    Le voyage sera long et dangereux lorsqu’ils arriveront\_dans les Crocs d’Acier mais le plus grand danger sera\_l’embuscade réalisée par la Toile Vivante sur le groupe\_lors d’une\n    fraiche nuit.\n  </p>\n  <p>\n    La rencontre avec cette maille de la Toile Vivante\_sera une nouvelle étape dans la compréhension de leur\_mission. La Capitaine Dracki et son groupe interrogeront les héros ou\n    se feront interrogé par eux.\n  </p>\n  <p>\n    La poursuite de leur voyage sera, de nouveau, perturbé par la rencontre avec une guivre sauvage mais les PJs\_arriveront à la Vallée de Novrak après plusieurs jours à\_crapahuter\n    d’Ouest en Est.\_Dans la ville montagneuse et isolée de la Vallée de\_Novrak, le groupe devra trouver des informations sur\_la localisation du village des centaures. La\n    recherche\_et la rencontre de Timaor Dunclin, ce vieil ivrogne\_renfrogné leur donnera une zone assez précise dans les\_montagnes pour aller à la rencontre des centaures\n    du\_village d’Arkanov.\n  </p>\n  <p>\n    Au passage, pendant cette période de transition, les\_PJs entendront parler des fameuses Ombres Blanches qui\_attaquent de temps en temps les imprudents voyageurs,\_les personnes\n    qui parcourent les montagnes environnantes et, certaines fois, les abords de la ville. Les aventuriers seront confrontés aussi au racisme qui\_ commence\_à augmenter envers les\n    anciennes races dans cette région\_presque coupée du monde.\n  </p>\n  <p>\n    Après plusieurs jours pour s’équiper à la Vallée de\_Novrak, obtenir des informations complémentaires sur\_les montagnes et même, peut-être, engager un pisteur\_pour les orienter,\n    le groupe de PJs pourra commencer\_une randonnée périlleuse sur les sommets.\_\n  </p>\n  <p>La découverte du village d’Arkanov sera le commencement d’une longue période de «captivité» au sein de\_cette étrange communauté.\_</p>\n  <hr />\n  <h1>Explications</h1>\n  <p>Le voyage sera une bonne occasion de mettre le\_groupe de PJs en danger et resserrer les liens entre eux.\_</p>\n  <p>\n    Autour du feu de leur campement au milieu des plaines\_de l’Ourann ou dans les défilés des Crocs d’Acier, les\_personnages auront du temps pour discuter de leur\_passé et leurs\n    passions.\n  </p>\n  <p>\n    L’attaque de la Toile Vivante, menée par la Capitaine\_Dracki, donnera du grain à moudre pour les PJs. La\_violence de leur escarmouche en comparaison avec les\_bonnes valeurs que\n    cette organisation défendent sera un\_moment de forte réflexion pour les PJs. Quelle sont les\_motivations de ce groupe multiracial ? La Toile Vivante\_est-elle une alliée ou une\n    ennemie pour la quête des héros\_? Les PJs arriveront-ils a comprendre ces forts caractères\_qui donneront naissance, bien des années plus tard, à la\_Compagnie des Bannis ?\n  </p>\n  <p>\n    La Toile Vivante est une organisation qui a les mêmes\_motivations que les PJs : éviter la domination d’un peuple\_sur les autres et propager la paix et la coopération entre\_les\n    races des Terres d’Arran. Ils se battent depuis des\_années contre les persécutions et les groupes qui utilisent\_des esclaves ou qui écrasent des communautés. Ils ne\_sont pas\n    bien nombreux mais leur opérations coup-depoings et les raids qu’ils font ponctuellement sur des\_esclavagistes leur ont donné une petite renommée.\_La maille de la Capitaine\n    Dracki a entendu parlé de\_la résurgence d’une des reliques de la fascination et elle\_a décidé de récupérer le Bracelet avant que les PJs ne\_l’utilisent pour de mauvaises\n    intentions.\n  </p>\n  <p>\n    Si les PJs récupère de l’équipement des membres de\_la Toile Vivante, ils pourront augmenter leur puissance\_grandement. Les bombes de Franill’eh, les boucles\_d’oreilles de\n    vision nocturne de Grooguen ou le marteau\_runique de Dracki seront très utiles pour notre groupe.\_\n  </p>\n  <p>\n    Arrivés à la Vallée de Novrak, cette ville isolée et\_rude, les aventuriers devront partir en enquête pour\_trouver Timaor Dunclin. Ce vieux célibataire alcoolique\_était un\n    marchand plutôt prospère avant de rencontrer\_les centaures d’Arkanov. Il a été emprisonné pendant\_plusieurs mois avant de sympathiser avec cette population vivant en autarcie\n    totale. Lorsqu’il est rentré à\_la Vallée de Novrak avec des récités farfelus et\_des produits étranges sortant des production\_d’Arkanov, aucun client ne l’a cru et il\n    est\_\_devenu la risée de la ville. Il a continué quelques fois\_des visites à Arkanov mais une rumeur a commencé à\_se répandre à la Vallée de Novrak, le fameux Titi était,\_en\n    faite, en lien avec des Peaux Vertes qui pillent des\_villes et des villages. Toutes ses marchandises sont soit\_volées soit fabriquées par des Peaux Vertes (et donc\_de piètre\n    qualité). Timaor a fait faillite. Il est tombé\_dans les fortes boissons alcoolisées des montagnes.\n  </p>\n  <p>\n    Il n’est pas bien méchant mais, à chaque fois qu’il pensera qu’on se moque de lui, il perdra ses moyens\_et entrera dans une colère froide et assez exagérée. Il\_faudra aborder\n    Timaor avec tacts, respect et délicatesse pour ne pas le fermer à toutes leurs questions.\_La recherches de Timaor et les délais de fabrication\_des équipements qui leur seront\n    utiles pour le voyage\_sera nécessaire pour que les PJs restent quelques jours\_dans cette grande ville et recevoir des avertissements\_sur la menace des Ombres Blanches.\n  </p>\n  <p>\n    Les Ombres Blanches sont en fait des kidnappeurs\_venant d’une cité souterraine peuplée d’Elfes\_Exsangues. Ils vivent dans une société matriarcale\_extrêmement vicieuse où règne\n    la torture, le travail\_forcé, l’esclavagisme et, encore, un système hiérarchique très dur. Les femmes elfes qui dirigent la cité\_ont tous les droits, choisissent leurs victimes\n    pour des\_violences physiques, morales ou sexuelles comme\_bon leur semble.\n  </p>\n  <p>\n    Les PJs auront tout le loisir de découvrir la perversion de cette société lorsqu’il vivront dans le village\_des centaures. Les informations qu’ils récupéreront à\_la Vallée de\n    Novrak sera un avant-goût de leur future\_attaque sur les elfes exsangues.\_\n  </p>\n  <p>\n    Pour finir, afin d’introduire un chapitre qui\_interviendra bien plus tard dans la campagne, les PJs\_ressentiront à la Vallée de Novrak les premiers signes\_du racisme commençant\n    à gangrener les habitants\_humains de cette région du monde. Venant de la\_capitale de la Marche du Venkor, Kosland, les idées\_ségrégationnistes et racistes envers les anciennes\n    races\_commencent à se répandre dans toutes les strates\_sociales de la ville. La Guerre des Goules, que vivra les\_aventuriers dans la Cité-Mine d’Hyrr’Tarënn, enflammera cette\n    haine sur toutes les régions et déclenchera\_les Guerres d’Arran quelques années plus tard.\n  </p>\n</div>"
