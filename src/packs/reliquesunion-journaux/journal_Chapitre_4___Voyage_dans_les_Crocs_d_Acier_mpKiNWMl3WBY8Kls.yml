    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <div class="intro">
            <p class="paragraphe">
              Un long voyage s'achève pour le groupe d'aventuriers. Ils vont retrouver la civilisation après de longues journées passées dans les montagnes froides et austères.
            </p>
            <p class="paragraphe">La Vallée de Novrak est la prochaine étape de leur grande quête pour retrouver les Reliques de l'Union.</p>
          </div>
          <hr />
          <h1>Arrivée à la Vallée de Novrak</h1>
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_ensemble.webp" width="150" height="150" />
            <p class="paragraphe">
              Vous reprenez votre route et rapidement vous remarquez que le chemin est de plus en plus fréquenté. Des traces de charrettes, des traces de pas, des débris de campements et
              surtout un déblayage plus net des rochers et des gravats. Des petites constructions aménagées vous permettent de passer des nuits confortables et calmes.
            </p>
            <p class="paragraphe">
              Après 7 (ou 9 jours) de voyage dans les montagnes,
              <strong>vous passez un col de montagnes et entendez au loin les premiers bruits d'une activité humaine masquée par le ronronnement de plus en plus fort d'un cours d'eau de
                montagne</strong>.
            </p>
            <p class="paragraphe">
              En fin de matinée, vous arrivez sur une plateforme qui vous donne une vue dégagée sur une ville active en contre bas traversée par une rivière agitée.
              <strong>La ville n'a pas de fortifications construites</strong> mais au vu de sa position, aucune armée ou groupe de pillards pourrait s'approcher assez sans être bloqué ou
              perturbé par les hautes falaises qui l'entourent.
            </p>
            <p class="paragraphe">
              A première vu, vous ne pouvez pas dire si le grand bastion qui a été construit au centre du village est un donjon, un château ou une cathédrale. Avec ses tours
              impressionnantes, cette structure domine cette ville où vous remarquez pas mal d'animation dans les rues et aux alentours. Les bruits des discussions et des outils remontent
              à vos oreilles plus vous descendez la pente vers la rivière.
            </p>
          </div>
          <hr />
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.V3FyUY2K3ajEVf3n]{La Vallée de Novrak}</p>
        </div>
