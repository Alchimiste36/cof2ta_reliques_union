    text:
      format: 1
      content: >-
        <p>L'Organisation de la Toile Vivante est née il y a bien longtemps dans
        le nord des Terres d'Arran avec un seul objectif : éviter à tout prix
        que des Artéfacts trop puissants créent des guerres entre les peuples ou
        les régions.</p><p>Ils ne sont pas nombreux mais ils sont très obstinés.
        Grâce à leur recherches et leurs explorations, la Toile Vivante repère
        et récupère des Objets Magiques, des Artéfacts ou simplement des objets
        pouvant briser l'un des fils de la stabilité et de la paix. Lorsque
        cette organisation tombe sur une piste d'une malversation visant à
        voler, casser ou utiliser un objet pour déstabiliser un peuple, un
        royaume ou une communauté, elle passe à l'action de façon préventive ou
        curative.</p><p>Leurs valeurs se regroupent autour de la paix entre tous
        les peuples des Terres d'Arran et toutes les espèces, la coopération
        entre les communautés et la recherche du moindre mal. Si, pour éviter
        une guerre centenaire entre deux peuples, il faut mettre hors d'état de
        nuire une bande de malfrats ou une famille de noble alors aucun remord
        ne sera visible sur les traits des commandants de la Toile
        Vivante.</p><p>Pour mettre à bien leur mission, ils voyagent beaucoup et
        surtout se renseignent énormément sur les tensions et affrontements dans
        les Terres d'Arran. Ils sont présents quasiment que sur le continent de
        l'Ourann et des régions avoisinantes mais il leur arrivent de traverser
        les larges océans pour aller explorer un temple oublié afin de récupérer
        une vieille relique pouvant déstabiliser ou au contraire stabiliser une
        région.</p><p>Contrairement au Monastère de la Vala, jamais un membre de
        la Toile Vivante n'utilisera un objet pour son propre intérêt et la
        plupart du temps, les reliques sont soit rendues à leur propriétaire
        légitime soit dissimulées dans des endroits secrets.</p><p>Les deux
        commandants de la Toile Vivante sont positionnés dans un manoir au coeur
        d'une foret dense de la Birkanie au nord de la Cité de Kosland. Avec ses
        grandes murailles, son allure de ruine vu de l'extérieur et son immense
        parc, le bâtiment est parfait et sa position idéale pour atteindre assez
        rapidement toutes les zones du continent.</p><p></p><p>Toutes les races
        sont acceptées au sein de la Toile Vivante et de petites équipes, les
        Mailles, sont formées pour chaque mission sous les ordres d'un capitaine
        compétent.</p><p>La Maille chargée de récupérer les Reliques de l'Union
        est composée de @UUID[Actor.mTrCc2yyhi01YiWk]{Capitaine Dracki},
        @UUID[Actor.Tqxc9qSeNzeUgqoq]{Franill'eh},
        @UUID[Actor.9gM0vw0UN2Hb1Unn]{Grooguen},
        @UUID[Actor.pqRKvrNJdd0JZDCy]{Hodrok} et
        @UUID[Actor.qgtbpYX25oIhQG5W]{Nael}</p><p>L'un des capitaines de la
        Toile Vivante, responsable d'une Maille qui enquête sur les armes
        runiques disparues du premier seigneur des Elfes Sylvains de la Foret
        d'Eluwan, a sauvé Ramiel Maria Von Weber lorsqu'il était jeune. C'est un
        grand archer, maitre des runes de bois, qui se nomme Mata'ir
        Reessil</p><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Toile.Vivante/Toile%20Vivante%20Commandant%20.jpg"
