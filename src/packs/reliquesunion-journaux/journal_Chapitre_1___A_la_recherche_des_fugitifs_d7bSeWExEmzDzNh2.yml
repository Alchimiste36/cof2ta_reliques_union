      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    Dans ce premier chapitre, le groupe de personnages\_vont être recrutés par le seigneur de la Cité d’Ispier,\_Jaspar Bonarion, pour partir à la recherche de Lana’Sir,\_sa fille.\n    Les PJs partiront sur les chemins et les routes à la\_poursuite des kidnappeurs de cette noble jeune femme.\n  </p>\n  <p>\n    En plus de certains périples, permettant aux joueurs de\_s’initier aux règles, aux combats et aux interactions, ils\_commenceront à réfléchir aux différents protagonistes\_de\n    l’histoire et à se poser des questions sur le pourquoi et\_le comment de ce kidnapping.\n  </p>\n  <hr />\n  <h1>Événements passés</h1>\n  <p>\n    Lana’Sir, la Dame d’Honneur de la cité d’Ispier n’a\_pas été capturée par les elfes sylvains. Elle s’est enfouie\_à l’aide de Maana pour aider les survivants du village\_des\n    sylvains a atteindre la cité d’Orkadia. Ne pouvant\_pas faire confiance en son père, elle a mise en scène son\_kidnapping. Cela devrait empêcher le seigneur d’envoyer\_une troupe\n    de soldats à la poursuite des elfes sylvains\_rescapés et éviter la mise en danger de sa fille. En plus de\_ce risque, Jaspar Bonarion ne veut pas que la disparition\_de sa fille\n    ne vienne désespérer les habitants de la cité.\n  </p>\n  <p>\n    La guerre contre les elfes sylvains de la Forêt du Val\_Rouge a été déclenchée a cause de meurtres nombreux\_aux alentours de la forêt. Quelques mois plus tôt, des\_bûcherons et\n    travailleurs sont retrouvés morts avec tous\_les signes incriminant les elfes de la forêt. Après quelques\_discussion entre le seigneur et les responsables des elfes,\_ces\n    derniers clamant leur innocence, l’affaire se calme. Il\_y a quatre semaines, des nobles et des marchands sont\_attaqués et tués avec les mêmes indices.\n  </p>\n  <p>\n    Une offensive armée est lancée sur le village des\_elfes pour se «venger» car les sylvains ne veulent pas\_reconnaitre leur implication dans ces attaques. Malgré\_l’opposition de\n    Lana’Sir face à cette initiative, plusieurs\_elfes et soldats humains sont tués durant l’escarmouche.\_La riposte des elfes ne se fera pas attendre et une\_importante attaque sera\n    effectuée par les sylvains sur la\_ville d’Ispier en représailles.\n  </p>\n  <p>\n    Lana’Sir Bonarion essayera de raisonner son père\_et son ami elfe sylvain Maana pour éviter l’escalade de\_violence et ramener les protagonistes autour d’une table\_de négociation\n    mais, il y a une semaine, le seigneur\_Bonarion envoie toutes ses forces vers la village du Val\_Rouge. Lors de cette attaque la Gardienne du Savoir,\_chamane du peuple sylvain,\n    sera tuée ainsi que la plupart\_des habitants et combattants de la forêt.\n  </p>\n  <p>\n    Il y a quatre nuits, Lana’Sir est kidnappée dans ses\_appartements du château par un elfe sylvain blessé lors\_de sa fuite. Ils passeront une nuit à la cité d’Ispier, cachés\_dans\n    une auberge de plaisirs et sortiront de la ville\_par la porte Est au petit matin, retrouvant à quelques\_kilomètres de la cité le reste des survivants elfes.\n  </p>\n  <p>Jaspar Bonarion est furieux de ce kidnapping. Il\_souhaite la mort des terroristes sylvains et mettra tout\_en œuvre pour retrouver sa fille saine et sauve.</p>\n  <hr />\n  <h1>Explications</h1>\n  <p>\n    Les elfes sylvains n’ont jamais été impliqué dans les\_meurtres survenus sur les bûcherons ou les nobles de\_la Cité d’Ispier. Le seul responsable des faits est le mage\_Hisp\n    Galik, conseiller du seigneur Jaspar Bonarion.\_\n  </p>\n  <p>\n    Le but inconnu de tous du conseiller est de détruire le\_village des elfes sylvains afin d’atteindre l’Arbre-Mère de\_la forêt et essayer d’entrer dans le Temple du Val\n    Rouge\_pour y récupérer une des Relique de l’Union.\n  </p>\n  <p>\n    Hisp Galik a été mis au service du seigneur Bonarion\_volontairement afin d’étudier les voisins elfiques, mettre\_en place une stratégie pour accéder au Temple et trouver\_la\n    Relique afin de la ramener à sa Amanori Bellara. Cette\_dernière est une humaine possédant une des Reliques de\_l’Union. Le plastron de l’Union permettant de contrôler\_des Peaux\n    Vertes dans les hautes montagnes de l’Ogrie.\n  </p>\n  <p>\n    Les manipulations et les mises en scènes de Hisp\_Galik lui permettent d’influencer le seigneur d’Ispier,\_de déformer la réalité sur les attaques et d’augmenter\_la colère du\n    seigneur envers les elfes. Responsable de la\_garde et de l’investigation des scènes d’attaques, Hisp\_Galik avait le bon rôle pour manipuler son entourage.\n  </p>\n  <p>\n    Borass Taer a reçu comme ordre du mage d’éliminer\_tous les survivants elfiques et de récupérer toutes leurs\_possessions car Hisp Galik ne sait pas si les survivants\_son partis\n    avec la Relique des Elfes.\_\n  </p>\n  <p>\n    A part la Gardienne du Savoir, tuée lors de l’attaque du\_village, et sa fille Laotissa Graine Dépeautre, personne\_n’est au courant de la présence de cette relique caché\_dans un\n    temple sous l’Arbre-Mère. Ce secret est\_totalement oublié comme le souhaitait l’Ordre\_de l’Union, il y a presque 1000 ans\n  </p>\n</div>"
