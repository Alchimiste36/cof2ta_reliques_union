  - sort: 300000
    name: Direction Arkar'Um
    type: text
    _id: IV59QKjWWgmiqXom
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    <span class=\"intro\">\"Les PJs sont prêts pour partir à la recherche de Lana'sir. Ils ont des chevaux, de l'équipement et quelques informations pour commencer ce voyage. Direction le Sud-Est à\n      travers les plaines verdoyantes du Pays des Vents.\"</span>\n  </p>\n  <p></p>\n  <div>\n    <p>\n      Les PJs commence un voyage qui devrait <strong>durer environ trois semaines</strong>. Sur la première parti, jusqu'à la frontière avec le Territoire des Mangeurs de Plaine,\n      les routes sont balisées et bien tracées. Aucun problème ne vient perturber leur trajet.\n    </p>\n    <p>\n      En suivant la route principale jusqu'à la Forteresse-État d'Arkar'um, les personnages vont faire plusieurs étapes qui peuvent leur donner des informations complémentaires :\n    </p>\n    <hr />\n    <h2>Les premiers jours de voyage</h2>\n    <p>\n      @UUID[Actor.qa98BXzVwh7HrZZx]{Borass Taer} connait très bien la route entre la Cité d'Ispier et la forteresse-état d'Arkar'Um. Il a ses petites habitudes et connait de\n      nombreux fermiers ou habitants des Plaines de l'Ourann, proches du sentier. Il a un pas pressé et il est assez froid avec les PJ.\n    </p>\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/cite_ispier/maison%20naine%20dans%20les%20grandes%20plaines1.webp\" width=\"150\" height=\"150\" />\n    <p>\n      <strong>Le deuxième soir</strong>, ils dorment dans un village de fermiers, humains et nains, entouré de pâturages et de champs. Un couple avec cinq enfants peut les\n      accueillir pour la nuit. Ils s'appellent <strong>Marta</strong> et <strong>Gref</strong> et leurs enfants <strong>Saria, Molic, Caru, Carat et Natuu</strong>. Le plus jeune,\n      environ sept ans est très rigolo et intéressé par les voyageurs.\n    </p>\n    <div>\n      <p class=\"discussion\">\n        <strong>MARTA :</strong> C'est quand même terrible cette guerre avec les elfes de la forêt sacrée. Ils étaient là depuis tant de siècles. Ca me rend triste ce gâchis et ces\n        morts. On est bien mieux dans les grandes plaines que dans ces villes où pullulent la corruption et les conflits.\n      </p>\n      <p class=\"discussion\">\n        <strong>GREF :</strong> cesse un peu d'importuner nos invités avec tes jérémiades. Ils doivent être fatigué de leur voyage ils ne veulent pas entendre une vieille fermière\n        parler de problèmes qu'ils viennent de quitter.\n      </p>\n    </div>\n    <p>Si les PJs posent des questions au couple de fermiers (ou plus tard à Ronali s'ils le souhaitent) :</p>\n    <div>\n      <p class=\"discussion\">\n        <strong>MARTA :</strong> Notre voisin <strong>Ronali</strong>, un chasseur, a vu, non loin du village,\n        <strong>à la lisière d'un petit bois, un groupe de plusieurs personnes se reposer,</strong> il y a quelques jours de cela. D'après ces dires, ce devaient être des miséreux\n        qui fuient la Cité d'Ispier faute de travail et de reconnaissance ou des survivants du village du Val Rouge. Les pauvres, seuls dans la Plaine battue par la puissance\n        d'Eolis (esprit du Vent pour les peuple de la plaine). Il a même entendu des cris d'enfants, vous vous rendez compte quand même … des ENFANTS !!!\n      </p>\n    </div>\n    <p>Jamais Marta et Gref n'accepteraient de paiement pour leur hospitalité. Le lendemain matin, ils saluent chaleureusement les PJs avant qu'ils ne reprennent la route.</p>\n    <hr />\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/grandes_plaines_ourann/grandes_plaines_de_l_ourann18.webp\" width=\"150\" height=\"150\" />\n    <p><strong>Le troisième et quatrième jour</strong> se passent sans rencontre ni problème. Le voyage se poursuit calmement.</p>\n    <hr />\n    <p>\n      Le <strong>cinquième jour</strong>, ils croisent, une ferme isolée très pratique pour abreuver les chevaux. La fermière, Ri, leur demande 1pc/cheval pour son eau. Si les PJs\n      lui demandent, <strong>elle a bien croisé un groupe de voyageurs</strong> (peut-être une quinzaine de personnes dont plusieurs enfants) qui ont demandé la même chose que les\n      personnages (abreuver un cheval et remplir des outres). C'est une jeune femme, charmante qui lui a demandé et elle lui a donné 1pa pour cela. Ils ne se sont pas arrêté\n      longtemps et marchaient à bon pas.\n    </p>\n    <hr />\n  </div>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/cite_ispier/plaines%20de%20l%27ourann2.webp\" width=\"150\" height=\"150\" />\n  <p>\n    <strong>Le sixième jour</strong>, la route devient encore plus peuplée et entretenue. De nombreuses maisons de nains errants sont rapprochées et se multiplient dans les grandes\n    plaines.\_<strong>@UUID[Actor.qa98BXzVwh7HrZZx]{Borass Taer} semble plus réservé encore en approchant de Arkar'Um.</strong> il confie en quelques mots qu'il n'ai pas à l'aise\n    avec les nains retranchées dans leur ville fortifiée.\n  </p>\n  <p>\n    D'habitde il préfère rester à l'extérieur de la forteresse et coucher dans les grandes plaines. Il pourra avouer qu'il n'aime pas le regard méprisant des nains sur lui quand il\n    est obligé de rentrer dans la ville.\n  </p>\n</div>"
