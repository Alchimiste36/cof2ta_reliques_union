      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Synthèse du chapitre</h1>
          <p class="paragraphe">
            Dans ce premier chapitre, le groupe de personnages vont être recrutés par le seigneur de la Cité d'Ispier, Jaspar Bonarion, pour partir à la recherche de Lana'Sir, sa fille.
            Les PJs partiront sur les chemins et les routes à la poursuite des kidnappeurs de cette noble jeune femme.
          </p>
          <p class="paragraphe">
            En plus de certains périples, permettant aux joueurs de s'initier aux règles, aux combats et aux interactions, ils commenceront à réfléchir aux différents protagonistes de
            l'histoire et à se poser des questions sur le pourquoi et le comment de ce kidnapping.
          </p>
          <hr />
          <h1>Événements passés</h1>
          <p class="paragraphe">
            Lana'Sir, la Dame d'Honneur de la cité d'Ispier n'a pas été capturée par les elfes sylvains. Elle s'est enfouie à l'aide de Maana pour aider les survivants du village des
            sylvains a atteindre la cité d'Orkadia. Ne pouvant pas faire confiance en son père, elle a mise en scène son kidnapping. Cela devrait empêcher le seigneur d'envoyer une troupe
            de soldats à la poursuite des elfes sylvains rescapés et éviter la mise en danger de sa fille. En plus de ce risque, Jaspar Bonarion ne veut pas que la disparition de sa fille
            ne vienne désespérer les habitants de la cité.
          </p>
          <p class="paragraphe">
            La guerre contre les elfes sylvains de la Forêt du Val Rouge a été déclenchée a cause de meurtres nombreux aux alentours de la forêt. Quelques mois plus tôt, des bûcherons et
            travailleurs sont retrouvés morts avec tous les signes incriminant les elfes de la forêt. Après quelques discussion entre le seigneur et les responsables des elfes, ces
            derniers clamant leur innocence, l'affaire se calme. Il y a quatre semaines, des nobles et des marchands sont attaqués et tués avec les mêmes indices.
          </p>
          <p class="paragraphe">
            Une offensive armée est lancée sur le village des elfes pour se «venger» car les sylvains ne veulent pas reconnaitre leur implication dans ces attaques. Malgré l'opposition de
            Lana'Sir face à cette initiative, plusieurs elfes et soldats humains sont tués durant l'escarmouche. La riposte des elfes ne se fera pas attendre et une importante attaque sera
            effectuée par les sylvains sur la ville d'Ispier en représailles.
          </p>
          <p class="paragraphe">
            Lana'Sir Bonarion essayera de raisonner son père et son ami elfe sylvain Maana pour éviter l'escalade de violence et ramener les protagonistes autour d'une table de négociation
            mais, il y a une semaine, le seigneur Bonarion envoie toutes ses forces vers la village du Val Rouge. Lors de cette attaque la Gardienne du Savoir, chamane du peuple sylvain,
            sera tuée ainsi que la plupart des habitants et combattants de la forêt.
          </p>
          <p class="paragraphe">
            Il y a quatre nuits, Lana'Sir est kidnappée dans ses appartements du château par un elfe sylvain blessé lors de sa fuite. Ils passeront une nuit à la cité d'Ispier, cachés dans
            une auberge de plaisirs et sortiront de la ville par la porte Est au petit matin, retrouvant à quelques kilomètres de la cité le reste des survivants elfes.
          </p>
          <p class="paragraphe">
            Jaspar Bonarion est furieux de ce kidnapping. Il souhaite la mort des terroristes sylvains et mettra tout en œuvre pour retrouver sa fille saine et sauve.
          </p>
          <hr />
          <h1>Explications</h1>
          <p class="paragraphe">
            Les elfes sylvains n'ont jamais été impliqué dans les meurtres survenus sur les bûcherons ou les nobles de la Cité d'Ispier. Le seul responsable des faits est le mage Hisp
            Galik, conseiller du seigneur Jaspar Bonarion.
          </p>
          <p class="paragraphe">
            Le but inconnu de tous du conseiller est de détruire le village des elfes sylvains afin d'atteindre l'Arbre-Mère de la forêt et essayer d'entrer dans le Temple du Val Rouge
            pour y récupérer une des Relique de l'Union.
          </p>
          <p class="paragraphe">
            Hisp Galik a été mis au service du seigneur Bonarion volontairement afin d'étudier les voisins elfiques, mettre en place une stratégie pour accéder au Temple et trouver la
            Relique afin de la ramener à sa Amanori Bellara. Cette dernière est une humaine possédant une des Reliques de l'Union. Le plastron de l'Union permettant de contrôler des Peaux
            Vertes dans les hautes montagnes de l'Ogrie.
          </p>
          <p class="paragraphe">
            Les manipulations et les mises en scènes de Hisp Galik lui permettent d'influencer le seigneur d'Ispier, de déformer la réalité sur les attaques et d'augmenter la colère du
            seigneur envers les elfes. Responsable de la garde et de l'investigation des scènes d'attaques, Hisp Galik avait le bon rôle pour manipuler son entourage.
          </p>
          <p class="paragraphe">
            Borass Taer a reçu comme ordre du mage d'éliminer tous les survivants elfiques et de récupérer toutes leurs possessions car Hisp Galik ne sait pas si les survivants son partis
            avec la Relique des Elfes.
          </p>
          <p class="paragraphe">
            A part la Gardienne du Savoir, tuée lors de l'attaque du village, et sa fille Laotissa Graine Dépeautre, personne n'est au courant de la présence de cette relique caché dans un
            temple sous l'Arbre-Mère. Ce secret est totalement oublié comme le souhaitait l'Ordre de l'Union, il y a presque 1000 ans
          </p>
        </div>
