        <div class="journal-cof2ta-ru"><h1>Rendez-vous discret</h1><p
        class="paragraphe">Les PJs sont dans la ville de Blanche Paix. Ils
        s'occupent de leurs affaires respectives (imaginer leurs
        activités).</p><ul><li><p class="paragraphe">PJs Humains : font leur
        travail de façon correct (travail légal ou ilégal)</p></li><li><p
        class="paragraphe">PJs Elfes : en fonction de sa rôle et fonction dans
        la ville de Blanche Paix</p></li><li><p class="paragraphe">PJs Peaux
        Vertes : soit emprisonné soit forçat soit travail</p></li></ul><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/boras_taerr.webp"
        width="100" height="100" /><p class="paragraphe">Chaque PJs reçoit la
        visite d'un homme imposant, habillé de vêtements simples et
        confortables. Il a des cheveux châtain et longs et un grand manteau vert
        orné de motif de chasse et de nature. Il ressemble à un chasseur.
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.qa98BXzVwh7HrZZx]{Borass
        Taer}</p><p class="paragraphe">Dans sa main, il tend une lettre au
        personnage. Le cachet est neutre et il y est inscrit le prénom de chaque
        PJs.</p><div class="parcho"><p>Monsieur/Madame Prénom et Nom du
        PJ,</p><p>Vos compétences et votre parcours m'intéressent grandement
        depuis quelques temps. J'ai besoin de vous et avant tout de votre
        discrétion.</p><p>Si vous souhaitez venir en aide à un homme de haute
        position et récupérer les fruits bien sucrés d'un travail à votre
        hauteur, je vous donne rendez-vous à l'Auberge du Passage Gourmand
        demain aux premières lueurs du jour.</p></div><p class="paragraphe">Le
        coursier,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.qa98BXzVwh7HrZZx]{Borass
        Taer}, ne donnera que des réponses vagues aux questions de PJ. Il
        gardera toujours une distance et incitera les curieux à ce rendre au
        rendez-vous pour avoir plus d'informations. Il dira seulement que la
        personne qui souhaite les rencontrer est important et que cette
        rencontre sera profitable.</p></div>
