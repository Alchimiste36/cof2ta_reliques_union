      content: "<div class=\"journal-page-cof2ta\">\n  <div class=\"arran-mod\">\n    <p>\n      <span style=\"font-family:Signika, sans-serif\">Les PJs sont dans la ville de Blanche Paix. Ils s'occupent de leurs affaires respectives (imaginer leurs activités).</span>\n    </p>\n    <ul>\n      <li>\n        <p>PJs Humains : font leur travail de façon correct (travail légal ou ilégal)</p>\n      </li>\n      <li>\n        <p>PJs Elfes : en fonction de sa rôle et fonction dans la ville de Blanche Paix</p>\n      </li>\n      <li>\n        <p>PJs Peaux Vertes : soit emprisonné soit forçat soit travail</p>\n      </li>\n    </ul>\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/cite_ispier/boras_taerr.webp\" width=\"150\" height=\"150\" />\n    <p>\n      Chaque PJs reçoit la visite d'un homme imposant, habillé de vêtements simples et confortables. Il a des cheveux châtain et longs et un grand manteau vert orné de motif de\n      chasse et de nature. Il ressemble à un chasseur.\_@UUID[Actor.qa98BXzVwh7HrZZx]{Borass Taer}\n    </p>\n    <p>Dans sa main, il tend une lettre au personnage. Le cachet est neutre et il y est inscrit le prénom de chaque PJs.</p>\n    <div class=\"parcho\">\n      <p><strong>Monsieur/Madame Prénom et Nom du PJ,</strong></p>\n      <p><strong>Vos compétences et votre parcours m'intéressent grandement depuis quelques temps. J'ai besoin de vous et avant tout de votre discrétion.</strong></p>\n      <p>\n        <strong>Si vous souhaitez venir en aide à un homme de haute position et récupérer les fruits bien sucrés d'un travail à votre hauteur, je vous donne rendez-vous à l'Auberge du\n          Passage Gourmand demain aux premières lueurs du jour.</strong>\n      </p>\n    </div>\n    <p></p>\n    <p>\n      Le coursier,\_@UUID[Compendium.world.reliquesunion-acteurs.Actor.qa98BXzVwh7HrZZx]{Borass Taer}, ne donnera que des réponses vagues aux questions de PJ. Il gardera toujours\n      une distance et incitera les curieux à ce rendre au rendez-vous pour avoir plus d'informations. Il dira seulement que la personne qui souhaite les rencontrer est important et\n      que cette rencontre sera profitable.\n    </p>\n  </div>\n</div>"
