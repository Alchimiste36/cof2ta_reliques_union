  - sort: 600000
    name: Rencontre des survivants
    type: text
    _id: Z55uweuWiJfu6NvF
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Seizième jour :</span></strong></span>\n  </p>\n  <blockquote>\n    <p>\n      En fin d’après-midi du treizième jour de voyage, en haut d’une colline, vous voyez au loin un fleuve très large sinuant du Nord au Sud. Une ville portuaire est positionnée\n      sur une langue de terre qui semble rentrer dans le fleuve. La ville est à quatre heures de route à dos de Sanpuroch et de là où ils sont, ils distinguent déjà l’animation qui\n      règne dans la ville. La vue est stupéfiante du haut de la colline. Entre nature à perte de vue et ce petit écrin de civilisation qui émerge aux bord de ce très large fleuve.\n    </p>\n    <p>\n      Presque au pied de la colline, sur le chemin sinueux qui se dirige vers la ville, vous apercevez un groupe de voyageurs accompagnés d’un cheval et d'une charrette. Ils sont à\n      une centaine de mètres en contrebas. Il y a 6 adultes et quelques enfants.\n    </p>\n  </blockquote>\n  <ul>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:per|comp:Observation lointaine]</strong></span>\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>10+</strong></span> :\n            <em>Ce sont les survivants. Le cheval est chargé de différentes sacoches et sur la selle, il y a 3 enfants elfes sylvains. Trois des adultes sont armés d’arcs et\n              d’épées. Une femme est tenue par l’un des guerriers son bras au niveau du coup.</em>\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>15+</strong></span> :\n            <em>vu leur démarche, la femme est en train de soutenir le guerrier. A sa démarche, il est blessé à la jambe.</em>\n          </p>\n          <p>\_</p>\n        </li>\n      </ul>\n    </li>\n  </ul>\n  <p class=\"discussion\">\n    <strong>BORASS TAER :</strong> ce sont les survivants de la forêt du Val Rouge. Ils tiennent la Dame d’Honneur dans leurs griffes. SUIVEZ-MOI et PAS DE QUARTIER !!\n  </p>\n  <p>\_</p>\n  <p>Le Sanpuroch de Borass part au galop et il tire au clair</p>\n  <hr />\n  <h2>COMBAT : Borass, Survivants et PJs</h2>\n  <p>Combat : @UUID[Scene.SFtmbUCNK6Omosvj]{2.Rencontre des Survivants}</p>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/grandes_plaines_ourann/grandes_plaines_de_l_ourann10.webp\" width=\"150\" height=\"150\" />\n  <p>\n    <strong>INITIATIVE =&gt;</strong> si possible mettre en sourdine les PJs et leur demander leur action dans l’ordre d’initiative pour éviter qu’ils discutent d’une stratégie.\n  </p>\n  <p>Au grand galop, il faut 3 rounds pour être au contact des survivants. Les Sanpurochs sont plutôt discrets dans la plaine parsemés de rochers.</p>\n  <p>Si les PJs crient, tirent à l’arc ou toute autre action qui pourraient les faire repérer par le groupe de survivants, faire un test de perception pour les elfes sylvains.</p>\n  <p>Si les PJs sont repérés, le groupe de survivants ont trois rounds pour se préparer.</p>\n  <ul>\n    <li>\n      <p><strong>Premier round repérés :</strong> les 3 guerriers dégainent leurs arcs et demandent aux autres de se regrouper derrière le cheval.</p>\n    </li>\n    <li>\n      <p><strong>Deuxième round repérés :</strong> attaque à l’arc sur les PJs ou Borass les plus proches.</p>\n    </li>\n    <li>\n      <p><strong>Troisième round repérés :</strong> attaque à l’arc sur les PJs ou Borass les plus proches puis lâchent leurs arcs et ils dégainent leurs épées.</p>\n    </li>\n  </ul>\n  <hr />\n  <h2>Le groupe d’Elfes Sylvains survivants :</h2>\n  <blockquote>\n    <p>\n      Alors que l’affrontement se termine, vous prenez le temps d’observer le groupe de survivants. La première chose qui vous saute aux yeux c’est la fatigue des elfes. Le teint\n      blafard, les yeux lourds, les vêtements sales et élimés, les Sylvains ont voyagé sans se préserver.\n    </p>\n    <p>\n      Vous remarquez trois guerriers elfes grands, élancés et encore sur leur garde. L’un d'eux est proche de Lana’sir, son épée au clair. Son regard est sombre et marqué de\n      plusieurs traces de combat malgré sa jeunesse apparente. Il est blessé à la cuisse gauche.\n    </p>\n    <p>Parmi les survivants, vous remarquez deux femmes à bout de force et neuf enfants dont un nourrisson porté par l’une des femmes. Ils se tiennent groupés à côté du cheval.</p>\n    <p>Lana’sir et le guerrier elfe s’avance vers vous avec un regard exprimant la colère.\_</p>\n    <p></p>\n    <p class=\"discussion\"><strong>Lana’sir :</strong> qui êtes-vous et que venez vous faire ici ? répondez de suite ou laissez nous tranquille.</p>\n  </blockquote>\n  <hr />\n  <p><strong>ATTENTION :</strong> en fonction de la réaction des PJs, la relation avec Lana’sir sera complètement différente.</p>\n  <ul>\n    <li>\n      <p>\n        <strong>S’ils s’interposent contre Borass dès le début et qu'aucun mort n’est à déplorer dans les survivants</strong>, elle sera amicale et donnera sa confiance aux PJs. A\n        la fin du combat elle <strong>remercie les PJs pour leur courage et leur demande de s’expliquer.</strong> A la suite de cela, elle\n        <strong>accompagne les PJs à Lavoise vers l'École de Rosna</strong> pour discuter, se soigner et se reposer. Elle présente <strong>Maana</strong> et surtout\n        <strong>Laotissa Graine Dépeautre</strong>.\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>S’ils réagissent trop tard et que certains survivants se font tuer par Borass,</strong> elle sera méfiante un certain temps. Les PJs devront s’expliquer (test de\n        Charisme si nécessaire)\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>S’ils suivent les ordres de Borass :</strong> elle considérera les PJs comme des ennemis. Tout n’est pas perdu pour autant. En colère, elle accusera les PJs de\n        faire le jeu du mage Hisp Galik pour trouver le Temple Rouge et la relique. Ces révélations devraient permettre aux PJs de retrouver sa confiance.\n      </p>\n      <hr />\n    </li>\n  </ul>\n  <p><strong>En fonction de son état et de la réaction des PJ, Borass Taer réagira différemment :</strong></p>\n  <ul>\n    <li>\n      <p>\n        <strong>S'il est à 0 PV, il est inconscient</strong> et les PJ pourront le ligoter ou faire tout ce qui veulent de lui. Attention : s'il est achevé de sang froid par un PJ,\n        la confiance de Lana'Sir, Laotissa et des autres survivants sera très négativement impactée.\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>S'il est blessé par les PJ ou les elfes, il sera en colère</strong> et continuera dans son envie de mettre la Dame d'Honneur en sécurité loin des sylvains. La\n        mission avant tout. Même Lana'Sir aura du mal à le convaincre car il supposera qu'elle est menacée ou manipulée par les elfes.\n      </p>\n    </li>\n    <li>\n      <p><strong>S'il est indemne, il essayera de \"capturer\" Lana'Sir et de la monter de force sur son Sanpurock/monture</strong> pour retourner à la Cité d'Ispier.</p>\n    </li>\n  </ul>\n  <hr />\n  <p>\n    <strong>N'oubliez pas de noter clairement le ou les Sanpurocks qui ont été blessés, la gravité de la blessure et ce qui s'est passé exactement.</strong>\_@UUID[Actor.YBj4ZmPrf6ztg2ve]{Kaspirionuratanokali} demandera des explications aux PJ en cas de gros problème et si un Sanpurock lui remonte un manquement de la part des PJ.\n  </p>\n  <p>\n    De plus, les\_@UUID[JournalEntry.sIVLqiWuHbLRvgXK]{Mangeurs des Plaines} pourront devenir de grands alliés bien plus tard dans la campagne donc toutes offenses pourra se\n    retourner contre les aventuriers.\n  </p>\n  <hr />\n  <h2>Présentation du Groupe :</h2>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/cite_ispier/Lana%27Sir_bonarion1.webp\" width=\"100\" height=\"100\" />\n  <ul>\n    <li>\n      <p>\n        <strong>Lana’sir Bonarion :</strong>\n        <em>c’est une humaine aux cheveux d’or. Tout dans son apparence montre sa noble lignée. Sa posture, sa façon de parler et même son regard atteste de sa position. Malgré la\n          fatigue et les marques du voyage, elle est splendide. Elle transpire l’autorité et sa détermination.</em>\n      </p>\n      <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/val_rouge/maana2.webp\" width=\"100\" height=\"100\" />\n    </li>\n    <li>\n      <p>\n        \_<strong>Maana :</strong>\n        <em>grâce à son armure et son épée, vous savez directement que ce n’est pas un soldat de base. Il se présente comme le second capitaine de la garde du Village de Val Rouge.\n          Il vous prévient qu’au moindre mouvement suspect il sera capable de tuer une partie d’entre vous si ça lui permettait de protéger Lana’sir. Il semble fatigué malgré le\n          regard déterminé qu'il maintient face aux PJ.</em>\n      </p>\n      <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/val_rouge/laotissa_grainedepeautre2.webp\" width=\"100\" height=\"100\" />\n    </li>\n    <li>\n      <p>\n        <strong>Laotissa Graine dépeautre :</strong>\n        <em>l’une des jeunes elfes semble vous observer plus en profondeur que les autres. Elle ne semble pas craintive et se rapproche de Maana pendant qu’il se présente. “<strong>Moi c’est Laotissa Graine Dépeautre</strong>” a-t-elle le temps de dire avant que Maana lui fasse signe de se taire.</em>\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>Les autres survivants elfes :</strong> Il y a 3 archers, 2 combattants et une mystique pour les PNJ qui peuvent participer au combat. Six autres survivants sont\n        composées de deux vieilles dames, une vieux elfe fatigué et trois jeunes femmes dont une portant un nourrisson emmitouflé contre son ventre. Quatre enfants en bas âges sont\n        cahcés dans le chariot ou à côté.\n      </p>\n    </li>\n  </ul>\n  <p>\n    Dans tous les cas,\n    <strong>Lana’sir veut aller à Lavoise avec les survivants et rejoindre l'École Rosna pour se reposer, se soigner et préparer la suite de son périple.</strong> Une amie très\n    proche, Falika Rosna, prendra soin d’elle, des elfes sylvains et des PJs. Elle fera tout pour ne pas suivre les PJs vers la Cité d’Ispier. Sa responsabilité est envers le\n    peuple des Sylvains.\n  </p>\n  <p>\n    Lana'Sir ne donnera aucune information aux PJ tant qu'elle n'est pas en sécurité auprès de Falika Rosna. Si les PJ brusquent Lana'Sir ou la menacent, elle se met en colère\n    répétant que les Sylvains ne sont responsables de rien et il sera très compliqué de retrouver sa confiance.\n  </p>\n  <hr />\n  <h3>Que faire de Borass Taer s'il est encore en vie ?</h3>\n  <p>\n    Lana'Sir propose de la ligoter et de l'amener chez son amie Falika Rosna. Dans son école, l'éclaireur pourra être emprisonné en attendant de trouver les responsables de cette\n    machination. Il ne faut pas le ramener de suite à la Cité d'Ispier car personne en sait qui est mêlé au complot contre les elfes sylvains.\n  </p>\n  <p>Dans tous les cas Lana'Sir semble triste des propos et agissements de Borass Taer qu'elle connait depuis sa plus tendre enfance.</p>\n  <hr />\n  <blockquote>\n    <p>\n      Vous reprenez la route vers le fleuve Qolos et la ville de Lavoise. Rapidement vous remarquez que les elfes sont à bout de souffle, épuisés et qu'ils ont du forcer la marche\n      durant ces semaines de voyage. La plupart se relayent sur le chariot ou le cheval. Tout l'aide que vous apportez aux survivants est accueillie comme un petit miracle.\n    </p>\n  </blockquote>\n</div>"
