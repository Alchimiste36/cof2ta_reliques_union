  - sort: 500000
    name: Voyage dans les Grandes Plaines
    type: text
    _id: Lf0DWVH4dFAockm5
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <blockquote>\n    <p>\n      Les Sanpurochs sont très dociles et elles réagissent au quart de tour à chaque fois que l'on tire légèrement sur les poignées.\n      <strong>Elles tracent la Plaine à la vitesse du vent</strong>.\n    </p>\n    <p>Le paysage défile, les collines sont montées puis descendues sans ralentir, les rochers sont sautés, les rivières sont traversées.</p>\n    <p>\n      A part un mal de fesses de tout les Diables, vous fendez la Plaine à bonne vitesse. Tout le long du voyage, <strong>vous voyez des camps d'Orcs au loin</strong>. Vous\n      traversez <strong>des prairies</strong> assez dense, <strong>des bosquets aérés</strong> le tout traversé <strong>de petits cours d'eau</strong> qui serpentent autour de gros\n      rochers. Sur votre gauche, à l'horizon, <strong>une immense chaine de montagnes traverse du nord au sud à perte de vue.</strong>\n    </p>\n  </blockquote>\n  <hr />\n  <div>\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/grandes_plaines_ourann/grandes_plaines_de_l_ourann19.webp\" width=\"150\" height=\"150\" />\n    <p>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Sixième jour :</span></strong></span>\n      A la tombée de la nuit de cette première journée en Territoire des Mangeurs de Plaine, les PJs montent leur camp à l'abri d'un rocher qui forme une casquette, les protégeant\n      sur trois côtés. A part quelques grognements des Sanpurochs pendant la nuit, tout se passe bien.\n    </p>\n    <hr />\n    <p>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Septième, huitième et neuvième jour :</span></strong></span>\n      Rien de particulier. Les PJ, aidés par\_@UUID[Actor.qa98BXzVwh7HrZZx]{Borass Taer} suivent les traces des elfes sylvains qu'ils repèrent. Plusieurs fois par jour, il faut\n      s'arrêter pour s'assurer du chemin.\n    </p>\n    <hr />\n    <p>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Dixième jour :</span></strong></span>\n      vers la fin de la journée, le groupe <strong>remarque les traces d'un campement récent.</strong> Ils peuvent l'inspecter :\n    </p>\n    <p>\n      C'est un camp de fortune avec les traces d'un feu éteint. <strong>Des traces de bagarres sont visibles</strong> (trois cadavres d'Orcs, traces de sang, nombreuses traces de\n      pas…).\n    </p>\n    <ul>\n      <li>\n        <p>\n          <span style=\"font-family:Arial\"><strong>@Test[car:per|comp:Inspecter la scène]\_</strong></span>\n        </p>\n        <ul>\n          <li>\n            <p>\n              <span style=\"font-family:Arial\"><strong>10+</strong></span> : les Orcs ont été <strong>tués par des lames elfes et des flèches</strong>.\n            </p>\n          </li>\n          <li>\n            <p>\n              <span style=\"font-family:Arial\"><strong>15+</strong></span> : ils trouvent dans des hautes herbes, <strong>une bourse brodée des lettres BL</strong>. Elle contient\n              <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">35pa et 5pc</span></span>.\n            </p>\n          </li>\n          <li>\n            <p>\n              <span style=\"font-family:Arial\"><strong>18+</strong></span>\_: <strong>des traces de pas mènent vers un bosquet non loin</strong>. Le groupe trouve <strong>deux cadavres</strong> :\n              <strong>un enfant elfe sylvain et un guerrier elfe sylvain</strong>. Ils ont été recouverts de feuilles mortes et ils sont nus. Une marque en forme de colline est\n              tracée sur leur front avec du sang. D'après l'observation, <strong>ils sont morts il y a un peu plus de deux jours</strong>.\n            </p>\n          </li>\n        </ul>\n      </li>\n    </ul>\n  </div>\n  <div>\n    <hr />\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/cite_ispier/camp%20nomade%20orc.webp\" width=\"150\" height=\"150\" />\n    <p>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Onzième jour :</span></strong></span>\n      Les PJs reprennent la route à dos de Sanpurochs. Au milieu de la matinée, en longeant une petite rivière et au détour d'une colline,\n      <strong>ils tombent nez à nez sur un petit camp d'Orcs de quelques tentes</strong>. Les orcs sont occupés avec les enfants le long de la rivière pendant que d'autres\n      discutent autour d'un feu de camp.\n    </p>\n    <p>En fonction de la réaction des Pjs =&gt; soit discussion soit PREMIER COMBAT : @UUID[Scene.yTm7EDwlmS5UP22A]{Camp d'Orc 01}</p>\n    <hr />\n    <p>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Douzième jour :</span></strong></span>\_En milieu d'après-midi, <strong>Borass Taer prévient les PJs qu'ils viennent de pénétrer en Birkanie</strong>. A partir de là, ils vont croiser plus de villes de Nains\n      Errants et d'Humains que d'Orcs. On les regarde un peu de travers lorsqu'ils arrivent à dos de Sanpuroch mais\n      <strong>la plupart des personnes croisées sont aimables.</strong>\n    </p>\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/grandes_plaines_ourann/grandes_plaines_de_l_ourann_large1.webp\" width=\"150\" height=\"150\" />\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/grandes_plaines_ourann/grandes_plaines_de_l_ourann9.webp\" width=\"150\" height=\"150\" />\n    <p>\n      A part \"<em>un groupe d'elfe est passé par là il y a un jour ou deux.</em>\", \"<em>Ils sont fatigués</em>\", \"<em>Ils étaient charmants</em>\" ou encore \"<em>c'est bizarre un groupe d'elfes avec une humaine voyageant ensemble mais ce n'est pas notre problème</em>\", ils n'obtiennent pas d'informations supplémentaires.\n    </p>\n    <p>En tout cas, ils se rapprochent du groupe et d'après Borass, ils devraient les rattraper le long du fleuve Qolos dans deux jours.</p>\n    <hr />\n    <p>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">treizième, quatorzième et quinzième jour :</span></strong></span>\n      rien ne se passe de plus.\n    </p>\n  </div>\n</div>"
