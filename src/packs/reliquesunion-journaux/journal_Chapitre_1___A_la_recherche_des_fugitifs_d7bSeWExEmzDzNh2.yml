  - sort: 500000
    name: Voyage dans les Grandes Plaines
    type: text
    _id: Lf0DWVH4dFAockm5
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div class="journal-cof2ta-ru"><h1>Voyage dans les Grandes
        Plaines</h1><div class="description"><p class="paragraphe">Les
        Sanpurochs sont très dociles et elles réagissent au quart de tour à
        chaque fois que l'on tire légèrement sur les poignées. <strong>Elles
        tracent la Plaine à la vitesse du vent</strong>.</p><p
        class="paragraphe">Le paysage défile, les collines sont montées puis
        descendues sans ralentir, les rochers sont sautés, les rivières sont
        traversées.</p><p class="paragraphe">A part un mal de fesses de tout les
        Diables, vous fendez la Plaine à bonne vitesse. Tout le long du voyage,
        <strong>vous voyez des camps d'Orcs au loin</strong>. Vous traversez
        <strong>des prairies</strong> assez dense, <strong>des bosquets
        aérés</strong> le tout traversé <strong>de petits cours d'eau</strong>
        qui serpentent autour de gros rochers. Sur votre gauche, à l'horizon,
        <strong>une immense chaine de montagnes traverse du nord au sud à perte
        de vue.</strong></p></div><hr /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grandes_plaines_de_l_ourann19.webp"
        width="100" height="100" /><h3>Sixième jour :</h3><p
        class="paragraphe">A la tombée de la nuit de cette première journée en
        Territoire des Mangeurs de Plaine, les PJs montent leur camp à l'abri
        d'un rocher qui forme une casquette, les protégeant sur trois côtés. A
        part quelques grognements des Sanpurochs pendant la nuit, tout se passe
        bien.</p><hr /><h3>Septième, huitième et neuvième jour :</h3><p
        class="paragraphe">Rien de particulier. Les PJ, aidés par
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.qa98BXzVwh7HrZZx]{Borass
        Taer} suivent les traces des elfes sylvains qu'ils repèrent. Plusieurs
        fois par jour, il faut s'arrêter pour s'assurer du chemin.</p><hr
        /><h3>Dixième jour :</h3><p class="paragraphe">Vers la fin de la
        journée, le groupe <strong>remarque les traces d'un campement
        récent.</strong> Ils peuvent l'inspecter :</p><p>C'est un camp de
        fortune avec les traces d'un feu éteint. <strong>Des traces de bagarres
        sont visibles</strong> (trois cadavres d'Orcs, traces de sang,
        nombreuses traces de pas…).</p><ul><li><p
        class="paragraphe">@Test[car:per|comp:Inspecter la
        scène]</p><ul><li><p><span class="roll-result">10+</span> : les Orcs ont
        été <strong>tués par des lames elfes et des
        flèches</strong>.</p></li><li><p><span class="roll-result">15+</span> :
        ils trouvent dans des hautes herbes, <strong>une bourse brodée des
        lettres BL</strong>. Elle contient 35pa et 5pc.</p></li><li><p><span
        class="roll-result"><strong>18+</strong></span> : <strong>des traces de
        pas mènent vers un bosquet non loin</strong>. Le groupe trouve
        <strong>deux cadavres</strong> : <strong>un enfant elfe sylvain et un
        guerrier elfe sylvain</strong>. Ils ont été recouverts de feuilles
        mortes et ils sont nus. Une marque en forme de colline est tracée sur
        leur front avec du sang. D'après l'observation, <strong>ils sont morts
        il y a un peu plus de deux jours</strong>.</p></li></ul></li></ul><hr
        /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/camp_nomade_orc.webp"
        width="100" height="100" /><h3>Onzième jour :</h3><p
        class="paragraphe">Les PJs reprennent la route à dos de Sanpurochs. Au
        milieu de la matinée, en longeant une petite rivière et au détour d'une
        colline, <strong>ils tombent nez à nez sur un petit camp d'Orcs de
        quelques tentes</strong>. Les orcs sont occupés avec les enfants le long
        de la rivière pendant que d'autres discutent autour d'un feu de
        camp.</p><p class="paragraphe">En fonction de la réaction des Pjs =&gt;
        soit discussion soit PREMIER COMBAT :
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-scenes.Scene.yTm7EDwlmS5UP22A]{Camp
        d'Orc 01}</p><hr /><h3>Douzième jour :</h3><p class="paragraphe">En
        milieu d'après-midi, <strong>Borass Taer prévient les PJs qu'ils
        viennent de pénétrer en Birkanie</strong>. A partir de là, ils vont
        croiser plus de villes de Nains Errants et d'Humains que d'Orcs. On les
        regarde un peu de travers lorsqu'ils arrivent à dos de Sanpuroch mais
        <strong>la plupart des personnes croisées sont
        aimables.</strong></p><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grandes_plaines_de_l_ourann_large1.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grandes_plaines_de_l_ourann9.webp"
        width="100" height="100" /><p class="paragraphe">A part <span
        class="discussion">"un groupe d'elfe est passé par là il y a un jour ou
        deux.", "Ils sont fatigués", "Ils étaient charmants" ou encore "c'est
        bizarre un groupe d'elfes avec une humaine voyageant ensemble mais ce
        n'est pas notre problème"</span>, ils n'obtiennent pas d'informations
        supplémentaires.</p><p class="paragraphe">En tout cas, ils se
        rapprochent du groupe et d'après Borass, ils devraient les rattraper le
        long du fleuve Qolos dans deux jours.</p><hr /><h3>treizième,
        quatorzième et quinzième jour :</h3><p class="paragraphe">rien ne se
        passe de plus.</p></div>
