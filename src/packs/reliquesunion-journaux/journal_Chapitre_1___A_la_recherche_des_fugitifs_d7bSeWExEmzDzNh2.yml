      content: >-
        <div class="journal-cof2ta-ru"><h1>L'auberge du Passage
        Gourmand</h1><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/auberge_gourmand2.webp"
        width="100" height="100" /><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.mNWBOPSpJxMCembP.JournalEntryPage.5cvD33nUDCOBW7xp]{Auberge
        du Passage Gourmand}</p><h1>Arrivée la veille</h1><p
        class="paragraphe">Le rendez-vous à lieux à l'aube donc <strong>une
        partie des PJs peuvent vouloir voyager la veille pour dormir à l'auberge
        et être prêt le matin.</strong></p><p class="paragraphe">Dans ce cas là,
        <strong>ils découvrent une scène assez spéciale car tous les clients et
        voyageurs sont chassés de l'auberge avec fermeté et diplomacie par des
        gardes et miliciens de la Cité d'Ispier.</strong> Les malheureux
        s'énervent et s'agitent mais ils sont bien obligés de quitter les lieux
        direction Ispier ou un village entre l'auberge et Blanche Paix.</p><p
        class="paragraphe">Si un PJ se présente aux gardes comme un "invité"
        pour le lendemain matin, les gardes le font entrer et déclenche une
        colère d'autant plus grande chez les clients jetés à la porte. En
        fonction de la réaction des PJ, <strong>cela peut rapidement dégénérer
        donc les gardes essayent de les calmer s'ils ouvrent trop leurs bouches
        ou s'ils mettent de l'huile sur le feu.</strong></p><p
        class="paragraphe">A la nuit tombée, il n'y a plus de charette, de
        chevaux ou de visiteurs à l'Auberge du Passage Gourmand. <strong>Une
        compagnie de 4 gardes restent sur place pour éconduire les éventuels
        voyageurs.</strong> Ils se relayent par deux pour observer les alentours
        et se reposer.</p><hr /><p class="paragraphe">Les PJ qui arrivent la
        veille <strong>peuvent faire connaissance</strong> s'ils ne se
        connaissent pas déjà.</p><p class="paragraphe">Ils seront installé
        confortablement à l'auberge avec une chambre individuelle et des repas
        et boissons à volonté.</p><img class="left"
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/autres_pnjs/humain_f_18.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/autres_pnjs/humain_h_7.webp"
        width="100" height="100" /><p class="paragraphe">Ayant une soirée et une
        nuit plutôt calme,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.dzHwdyZI3S9rmxPp]{Nada
        Gruger}, <strong>la fille de l'aubergiste, en profitera pour discuter et
        passer du temps avec les seuls clients</strong>.
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.FDnA3d4NMld0vIyK]{Stepson
        Gruger} restera, lui, la plupart du temps dans les cuisines pour
        préparer les repas du lendemain.</p><hr /><h1>Arrivée le matin</h1><p
        class="paragraphe">Pour les PJ qui arrivent le matin même à l'auberge
        :</p><div class="description"><p class="paragraphe">L'auberge est à la
        croisée de deux routes à une demi-heure au nord de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.mNWBOPSpJxMCembP]{La
        Cité d'Ispier}. C'est une grande bâtisse bien entretenue au toit de
        chaume qui reçoit jours et nuits les voyageurs et les caravanes qui
        naviguent entre Blanche Paix, Ispier, la Forteresse-état d'Arkar'um et
        le littoral.</p><p class="paragraphe">Une légère fumée sort de la
        cheminée, la double porte est grande ouverte mais aucune charette n'est
        visible devant ou dans les écuries situées à la droite du bâtiment. On
        peut entendre quelques chevaux venant de derrière le bâtiment.</p><p
        class="paragraphe">En entrant, vous remarquez que l'auberge est
        totalement vide, les tables sont bien rangées et l'une d'entre-elle est
        garnie de plats, pains, pichets, friandises. L'émissaire qui vous a
        donné la lettre se tient dans un coin de la pièce comme pourrait le
        faire un garde du corps</p><p class="paragraphe">Devant la table vous
        voyez un homme bien habillé, une barbe bien fournie avec une chevelure
        impeccable. Il s'approche de vous, un large sourire aux lèvres et une
        démarche très conviviale.</p></div><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/hisp_galik3.webp"
        width="100" height="100" /><p class="paragraphe">Aucune information ne
        sera donnée aux PJ qui ont passé la nuit sur place tant que tous les
        invités ne seront pas là. Ils pourront attendre à une table dans un coin
        de l'auberge devant un petit déjeuner frugal en attendant le vrai repas
        avec les autres.</p><div class="discussion"><p class="paragraphe"><span
        class="discu-acteur">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.8o6yN7jPp8MOzUnW]{Hisp
        Galik} :</span> Bienvenu à toutes et tous, vous me voyez ravi de vous
        voir ici et à l'heure en plus. Nous serons tranquille ce soir. Mon
        maître vous demande la plus grande discrétion sur ce qui va se passer ce
        soir et avant qu'il ne descende, ceux qui ne savent pas tenir leur
        langue sont priés de sortir <strong>IMMÉDIATEMENT</strong>. <span
        class="imp">(mot prononcé avec une grande
        autorité)</span>.</p><p></p></div><p class="paragraphe">Laissez un temps
        d'attente pour un éventuel départ ou des questions. Si un PJ pose une
        question, Hisp Galik pourra lui répondre sèchement : "<span
        class="discussion">je ne vous croyais pas si impatient ! vous restez ou
        vous partez !!</span>".</p><hr /><div class="description"><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/jaspar_bonarion1.webp"
        width="100" height="100" /><p class="paragraphe">Vous voyez l'émissaire
        prend une petite cloche posée sur la table et la secouer doucement.
        Quelques instants plus tard, un homme d'une soixantaine d'année descend
        l'escalier avec une grande prestance. Il est habillé d'une tunique
        richement décorée d'un bleu profond. Ses cheveux, sa barbe blanche et
        ses traits marqués par l'âge montrent son grand âge mais ses mouvement
        et son charisme pourraient le faire passer pour un jeune homme.</p><p
        class="paragraphe">Il s'approche de vous et vous salue individuellement
        par votre Nom et prénom <span class="imp">(si un PJ est Elfe sylvain il
        ne lui sert pas la main !)</span></p></div><hr /><h1>Discussion avec
        Jaspar</h1><div class="discussion"><p class="paragraphe"><span
        class="discu-acteur">Jaspar Bonarion :</span> Installez vous je vous
        prie. Mon ami l'aubergiste, <strong>Stepson Gruger</strong>, nous a
        préparé quelque mets pour passer la soirée convenablement.</p><p
        class="paragraphe">Je vous ai convié ce soir pour vous confier une
        mission de la plus haute importance et j'espère bien que vous allez
        comprendre la gravité de la situation.</p><p class="paragraphe">Je suis
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.1bTMfWMjreS53TDc]{Jaspar
        Bonarion} le seigneur de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.mNWBOPSpJxMCembP]{La
        Cité d'Ispier}. Je vous présente
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.8o6yN7jPp8MOzUnW]{Hisp
        Galik}, le mage qui me conseille.</p><p class="paragraphe">Vous n'êtes
        pas sans savoir que nous avons eu des problèmes avec un village d'Elfes
        Sylvains dans les derniers jours. Nous avons gagné cette guerre
        provoquée par nos voisins des bois mais j'ai bien peur que ce drame ne
        vienne s'engouffrer au sein de ma famille !</p><p
        class="paragraphe"><span class="imp">Temps de pause et air
        grave</span></p><p class="paragraphe">Ma fille Lana'sir a été kidnappée
        par des Elfes Sylvains, il y a trois jours. Surement un groupe de
        survivants qui veulent me faire payer leur propres erreurs. Mes soldats
        personnels ont essayé de la retrouver et de suivre sa trace mais
        franchement ils sont incompétents et c'est peu dire. Je ne veux pas que
        sa disparition s'ébruite plus que les rumeurs qui se propagent déjà. Mon
        peuple est déjà bien assez sous tension pour ne pas rajouter la perte de
        leur Dame d'Honneur à leur moral. Vous devez la retrouver et la ramener
        saine et sauve au plus vite. Nous avons BESOIN d'oublier cette histoire
        et reprendre le court de nos vies maintenant que <span
        style="text-decoration:line-through"><s>ces enfoir…</s></span> ces elfes
        ne sont plus.</p></div><hr /><p class="paragraphe"><span class="imp">Si
        les PJs coupent la parole du seigneur Jaspar:</span> Hisp Galik les
        interrompt d'un : "<span class="discussion">On laisse parler le seigneur
        Bonarion</span>". En cas de récidive, "<span
        class="discussion">Taisez-vous maintenant et c'est mon dernier
        avertissement</span>". Jaspar lui lance un regard noir.</p><hr
        /><h1>Temps d'échange avec le seigneur Jaspar :</h1><p
        class="paragraphe"><span class="imp">(En cas de manque de respect des
        PJs, Hisp Galik peut les menacer à chaque instant voir leur fermer la
        bouche magiquement si besoin même si le seigneur
        s'interpose.)</span></p><p class="paragraphe">Après son discours et
        pendant que les PJs demandent des explications, le seigneur se met à
        manger et invite les PJs a faire de-même.</p><hr /><h2>Informations que
        le seigneur peut donner aux PJs :</h2><ul><li><p
        class="paragraphe"><strong>Lana'sir a disparue il y a quatre
        nuits</strong> au sein du château.</p></li><li><p class="paragraphe">Ils
        peuvent aller à <strong>La Cité d'Ispier pour investiguer</strong> avant
        de partir</p></li><li><p class="paragraphe">L'un des <strong>Elfes
        Sylvains a été blessé lors de sa fuite</strong> par les murs d'enceinte
        de la ville.</p></li><li><p class="paragraphe">Ils étaient <strong>à
        cheval</strong> et, d'après le garde, ils sont partis au <strong>Sud-Est
        de la cité</strong>.</p></li><li><p class="paragraphe">Récompense s'il
        demande : <strong>une propriété dans la Cité d'Ispier, 400 pa par
        personne</strong>.</p></li><li><p class="paragraphe">Il ne comprend pas
        car <strong>sa fille, Lana'sir, a toujours défendu la cause des elfes
        sylvains</strong></p></li><li><p class="paragraphe"><strong>autres
        questions</strong> des PJs à improviser.</p></li></ul><hr /><h2>Pourquoi
        les PJs :</h2><ul><li><p class="paragraphe"><strong>Lothar
        :</strong></p></li><li><p class="paragraphe"><strong>Dwalin
        :</strong></p></li><li><p class="paragraphe"><strong>Elarion Venclair
        :</strong></p></li><li><p class="paragraphe"><strong>Elwyn
        :</strong></p></li><li><p class="paragraphe"><strong>Aërin Fendecercle
        :</strong></p></li></ul><hr /><h1>A la fin du repas,</h1><p
        class="paragraphe">Hisp Galik, le mage, prend la parole :</p><div
        class="discussion"><p><span class="discu-acteur">Hisp Galik :</span> Il
        est bien évidant que <strong>les survivants Elfes devront être tués sans
        ménagement.</strong> Malgré leur erreurs et leur défaite, ils s'en sont
        prit à la Dame d'Honneur et ce crime ne pourrait rester impuni.
        Apportez-nous toutes les affaires que vous trouverez sur leurs cadavres
        afin que nous remontions la piste des survivants.</p></div><hr
        /><h2>Avant de partir :</h2><div class="discussion"><p><span
        class="discu-acteur">Jaspar Bonarion :</span> Vous pourrez venir à La
        Cité d'Ispier dès maintenant pour récupérer de l'équipement et
        <strong>investiguer au château s'il le faut</strong>. Pour votre
        mission, recevez déjà <strong>ces bourses contenant 25 pa
        chacun</strong> pour vous équiper et contribuer aux frais que cette
        poursuite engendrera. <strong>Des chevaux, poneys ou cochons de voyage
        pourront vous être fournit</strong> aux écuries de la Cité si vous le
        souhaitez.</p><p><strong>Mon conseiller ici présent Borass Taer vous
        accompagnera pour ce voyage. </strong><span class="imp">(l'émissaire
        s'avance d'un coin de l'auberge avec un grand sourire et s'avance
        jusqu'à la table)</span> Il connait la région comme sa poche, aime la
        chasse et le pistage et surtout, lorsque vous la retrouverez, ma fille
        saura que vous venez de ma part.</p><p><strong>Suivez-moi et ne perdons
        pas plus de temps.</strong></p></div></div>
