  - sort: 300000
    name: Direction Arkar'Um
    type: text
    _id: IV59QKjWWgmiqXom
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div class="journal-cof2ta-ru"><div class="intro"><p>"Les PJs sont prêts
        pour partir à la recherche de Lana'sir. Ils ont des chevaux, de
        l'équipement et quelques informations pour commencer ce voyage.
        Direction le Sud-Est à travers les plaines verdoyantes du Pays des
        Vents."</p></div><h1>Direction Arkar'Um</h1><p class="paragraphe">Les
        PJs commence un voyage qui devrait <strong>durer environ trois
        semaines</strong>. Sur la première parti, jusqu'à la frontière avec le
        Territoire des Mangeurs de Plaine, les routes sont balisées et bien
        tracées. Aucun problème ne vient perturber leur trajet.</p><p
        class="paragraphe">En suivant la route principale jusqu'à la
        Forteresse-État d'Arkar'um, les personnages vont faire plusieurs étapes
        qui peuvent leur donner des informations complémentaires :</p><hr
        /><h1>Les premiers jours de voyage</h1><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.qa98BXzVwh7HrZZx]{Borass
        Taer} connait très bien la route entre la Cité d'Ispier et la
        forteresse-état d'Arkar'Um. Il a ses petites habitudes et connait de
        nombreux fermiers ou habitants des Plaines de l'Ourann, proches du
        sentier. Il a un pas pressé et il est assez froid avec les PJ.</p><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/maison_naine_dans_les_grandes_plaines1.webp"
        width="100" height="100" /><p class="paragraphe"><strong>Le deuxième
        soir</strong>, ils dorment dans un village de fermiers, humains et
        nains, entouré de pâturages et de champs. Un couple avec cinq enfants
        peut les accueillir pour la nuit. Ils s'appellent <strong>Marta</strong>
        et <strong>Gref</strong> et leurs enfants <strong>Saria, Molic, Caru,
        Carat et Natuu</strong>. Le plus jeune, environ sept ans est très rigolo
        et intéressé par les voyageurs.</p><div class="discussion"><p><span
        class="discu-acteur">Marta :</span> C'est quand même terrible cette
        guerre avec les elfes de la forêt sacrée. Ils étaient là depuis tant de
        siècles. Ca me rend triste ce gâchis et ces morts. On est bien mieux
        dans les grandes plaines que dans ces villes où pullulent la corruption
        et les conflits.</p><p><span class="discu-acteur">Gref :</span> cesse un
        peu d'importuner nos invités avec tes jérémiades. Ils doivent être
        fatigué de leur voyage ils ne veulent pas entendre une vieille fermière
        parler de problèmes qu'ils viennent de quitter.</p></div><p
        class="paragraphe">Si les PJs posent des questions au couple de fermiers
        (ou plus tard à Ronali s'ils le souhaitent) :</p><p
        class="discussion"><span class="discu-acteur">Marta :</span> Notre
        voisin <strong>Ronali</strong>, un chasseur, a vu, non loin du village,
        <strong>à la lisière d'un petit bois, un groupe de plusieurs personnes
        se reposer,</strong> il y a quelques jours de cela. D'après ces dires,
        ce devaient être des miséreux qui fuient la Cité d'Ispier faute de
        travail et de reconnaissance ou des survivants du village du Val Rouge.
        Les pauvres, seuls dans la Plaine battue par la puissance d'Eolis
        (esprit du Vent pour les peuple de la plaine). Il a même entendu des
        cris d'enfants, vous vous rendez compte quand même … des ENFANTS
        !!!</p><p class="paragraphe">Jamais Marta et Gref n'accepteraient de
        paiement pour leur hospitalité. Le lendemain matin, ils saluent
        chaleureusement les PJs avant qu'ils ne reprennent la route.</p><hr
        /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grandes_plaines_de_l_ourann18.webp"
        width="100" height="100" /><p class="paragraphe"><strong>Le troisième et
        quatrième jour</strong> se passent sans rencontre ni problème. Le voyage
        se poursuit calmement.</p><p class="paragraphe">Le <strong>cinquième
        jour</strong>, ils croisent, une ferme isolée très pratique pour
        abreuver les chevaux. La fermière, Ri, leur demande 1pc/cheval pour son
        eau. Si les PJs lui demandent, <strong>elle a bien croisé un groupe de
        voyageurs</strong> (peut-être une quinzaine de personnes dont plusieurs
        enfants) qui ont demandé la même chose que les personnages (abreuver un
        cheval et remplir des outres). C'est une jeune femme, charmante qui lui
        a demandé et elle lui a donné 1pa pour cela. Ils ne se sont pas arrêté
        longtemps et marchaient à bon pas.</p><hr /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/plaines_de_ourann2.webp"
        width="100" height="100" /><p class="paragraphe"><strong>Le sixième
        jour</strong>, la route devient encore plus peuplée et entretenue. De
        nombreuses maisons de nains errants sont rapprochées et se multiplient
        dans les grandes plaines.
        <strong>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.qa98BXzVwh7HrZZx]{Borass
        Taer} semble plus réservé encore en approchant de Arkar'Um.</strong> il
        confie en quelques mots qu'il n'ai pas à l'aise avec les nains
        retranchées dans leur ville fortifiée.</p><p
        class="paragraphe">D'habitde il préfère rester à l'extérieur de la
        forteresse et coucher dans les grandes plaines. Il pourra avouer qu'il
        n'aime pas le regard méprisant des nains sur lui quand il est obligé de
        rentrer dans la ville.</p></div>
