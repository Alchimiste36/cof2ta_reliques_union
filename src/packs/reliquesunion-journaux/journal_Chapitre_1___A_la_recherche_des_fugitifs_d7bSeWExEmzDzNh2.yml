      content: >-
        <div class="journal-cof2ta-ru"><h1>Forterresse-État d'Arkar'Um</h1><div
        class="description"><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/arkarum/arkarum1.webp"
        width="100" height="100" /><p class="paragraphe">Le soir du cinquième
        jour, vous arrivez aux portent de <strong>la Forteresse-État
        d'Arkar'um</strong>.</p><p class="paragraphe">Cette structure naine est
        tout simplement stupéfiante. Les fortifications de cette cité sont
        immenses, en trois niveaux, protégeant une ville entière. De nombreux
        stigmates montrent les multiples assauts que la forteresse à surmontés
        au cours des siècles. Alors que le soleil descend à l'horizon, des
        volutes de fumées sortent des centaines de cheminées.</p><p
        class="paragraphe">Plus vous vous rapprochez et plus les sons, bruits et
        cris de la cité se font entendre. La large porte circulaire est ouverte
        et malgré l'heure tardive, des caravanes marchandes et des habitants
        entrent et sortent.</p><p class="paragraphe">En franchissant la première
        muraille, vous distinguez <strong>une ville propre, rangée et
        particulièrement active</strong>. Une très large majorité des gens sont
        de fiers nains et naines mais on peut distinguer quelques humains, elfes
        et même un ou deux gobelins au service de marchands itinérants. Personne
        en fait attention au groupe <span class="imp">(sauf si un peau verte
        fait parti du groupe).</span></p><p class="paragraphe">Vous savez que
        les visiteurs n'ont pas tous les droits dans une cité-état et encore
        plus dans celle-ci. Les marchands qui entrent se dirigent tous vers la
        place du marché et les autres visiteurs que vous croisez vont et
        viennent entre les boutiques et l'auberge principale que vous ne pouvez
        pas louper sur la place principale. <strong>"La Croisée du Tranchoir et
        du Bouclier"</strong> est écrit en grand sur la devanture. C'est une
        immense bâtisse pleine de vie avec un espace taverne, des chambres et
        une grande écurie, le long du bâtiment.</p></div><h2>"la Croisée du
        Tranchoir et du Bouclier".</h2><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/arkarum/auberge_du_bouclier1.webp"
        width="100" height="100" /><p class="paragraphe">Le propriétaire
        s'appelle
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.jOyeMRRjZyGYKoeP]{Warbane}
        et il est très accueillant avec tout le monde <span class="imp">(sauf
        encore avec les Peaux Vertes)</span>. Le repas (délicieux et copieux)
        est à 3pa la chambre est à 7pa pour des chambres individuelles ou
        4pa/personne pour des chambres de quatre. De toute façon, les étrangers
        n'ont pas bien le choix dans cette ville très sécurisée.</p><p
        class="paragraphe">Malgré un hadicap à l'épaule gauche, l'empêchant de
        tenir le rang, le tenancier nain est un combattant encore très
        expérimenté donc gare aux PJ qui voudraient titiller l'ancien nain du
        bouclier.</p><p class="paragraphe">Warbane peut aussi leur vendre
        quelques équipements de bases mais les prix sont doublés par rapport aux
        tarifs de base. Ses armes, armures et boucliers sont de facture naine et
        d'une grande qualité. Il a éaglement tout type de tabac et d'alcool
        venant des quatre coins d'Arran. Les tarifs sont élevés mais la qualité
        est au rendez-vous.</p><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.3WmRp12n04qZn5fn]{La
        croisée du Tranchoir et du Bouclier - Arkar'Um}</p><hr
        /><h2>Informations et discussion avec Warbane :</h2><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/arkarum/warbane.webp"
        width="100" height="100" /><p class="discussion"><span
        class="discu-acteur">Warbane :</span><strong> Un groupe d'Elwë en
        piteuse état s'est arrêté dans ma charmante auberge il y a trois
        nuits.</strong> Ils avaient des pisseuses dont une tellement vieille
        qu'on l'a croyait calanchée et des Marmouses particulièrement fatigués.
        <strong>Ils ont dormi une nuit puis sont partis avant les premières
        lueurs du soleil</strong>.</p><ul><li><p
        class="paragraphe">@Test[car:cha|comp:Interrogatoire]</p><ul><li><p
        class="paragraphe"><span class="roll-result">10 +</span> : <span
        class="discussion">la pisseuse Hum qui les accompagnait en <strong>avait
        dans la caboche et elle au moins elle avait des
        manières</strong>.</span></p></li><li><p class="paragraphe"><span
        class="roll-result">15 +</span> : <span class="discussion">Elle a bavé
        sur le fait de <strong>traverser le Territoire des Mangeurs de
        Plaine</strong> pour rejoindre de la famille. Elle voulait
        <strong>connaitre des lieux surs pour éviter les camps des Culs-Verts
        dans la région</strong>. Les quatre gugusses qui l'a suivaient n'étaient
        pas des Pisse-laits mais <strong>je ne leur donne pas beaucoup d'espoir
        sur ses terres</strong>, surtout que l'un d'eux trainait la patte.
        <strong>Ils m'ont acheté deux chevaux d'Hums</strong> à prix d'or et on
        fermer leur gueuloir toute la soirée au
        repas.</span></p></li></ul></li><li><p
        class="paragraphe"><strong>Comment peut-on les rattraper ?</strong>
        =&gt; pour la somme de <strong>30pa</strong>, Warbane peut mettre les
        PJs en <strong>contact avec "l'Ainé" d'une tribu de Mangeur de
        Plaine</strong>. Cette tribu pourra leur louer des <strong>montures
        spéciales</strong> pour traverser les plaines hostiles de leur
        territoire. Il est installé à un kilomètre à l'est de la
        Forteresse-État. Il donne au groupe <strong>un morceau de bois gravé de
        runes complexes</strong> qui nous permettra de négocier avec lui.
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.fNBOEap6OwAwCrLy]{Morceau
        de bois gravé}</p></li></ul><p class="paragraphe">Les PJs peuvent
        profiter de ce bout de la ville mais ils ne pourront pas explorer plus
        loin dans les strates supérieurs. <strong>Si l'un des PJs est un Peaux
        Verts mieux vaut ne pas courir les rues tout seul.</strong></p><p
        class="paragraphe">Le groupe peut dormir car la nuit est bien tombée
        après leur repas et la discussion avec Warbane.</p><h1>La Tribu de
        Kaspirionuratanokali, l'Ainé</h1><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/kaspirionuratanokali2.webp"
        width="100" height="100" /><p class="paragraphe">En poursuivant leur
        périple, le groupe va rencontrer l'Ainé de la tribu des Mangeurs de
        Plaine à un kilomètre de la forteresse.</p><div class="description"><p
        class="paragraphe">A environ, un kilomètre de la forteresse, en
        direction des plaines, vous distinguez au dernier moment, derrière une
        petite colline, <strong>un camp de nomades ayant montés leurs tentes et
        parqués d'étranges bêtes dans un enclos solide.</strong> Une quarantaine
        de personnes habillés avec des habits en cuir et en fourrure sont autour
        un petit feu. Une jeune femme fredonne une chanson, un bébé dans les
        bras. <strong>Les bêtes dans l'enclos grognent lorsque votre groupe se
        rapproche.</strong></p><p class="paragraphe">Un homme fier et bien
        musclé se lève pour vous saluer. Il semble plus perplexe qu'hostile.
        <strong>Il tire la langue vers le bas et croise ses bras sur son
        torse</strong> puis s'exprime avec un fort accent marqué :</p></div><p
        class="discussion"><span class="discu-acteur">Kaspirionuratanoki
        :</span> Le Grand Souffle salut toi ! Je être Kaspirionuratanokali …
        Ainé peuple nomade … Quoi toi veux ?</p><div class="description"><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/guerrier2.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/mangeurs_des_plaines/guerrier3.webp"
        width="100" height="100" /><p class="paragraphe">Vous voyez également
        les autres Mangeurs de Plaines se regrouper ensembles quelques mètres
        derrière. Quatre guerriers et guerrières se placent devant eux une main
        sur la poignée de leur cimeterre ou sortant leur longs poignards pour
        jouer avec. Ils ne semblent nullement intimidés ou perturbés par votre
        présence.</p></div><hr /><h2>Présentations</h2><p class="paragraphe">Les
        PJs peuvent se présenter. Adaptez la réaction de l'Aîné et des
        combattants en fonction de l'attitude des PJ. Ils devraient comprendre
        rapidement qu'ils ne font pas le poids face à ces combattants
        aguerris.</p><p class="paragraphe">Dans tous les cas, tant que les PJ
        parlent des montures sans montrer le bout de bois gravé,
        Kaspirionuratanokali ne répond même pas.</p><p>Lorsqu'ils présentent le
        bout de bois gravé, il le prend et dit :</p><p class="discussion"><span
        class="discu-acteur">KASPIRIONURATANOKALI</span> : Sanpurochs monture à
        nous, grand amis pour Plaine, famille ! Si toi traverse le Grand Souffle
        toi devoir Sanpurochs. Enfant dangereux, Enfant dressé. Toi donner 30pa
        pour nomade, toi avoir Sanpurochs pour traverse vite vite vite. Toi dit
        oui toi traverse. Au bout Grand Souffle toi dire : Kaspirionuratanokali
        et Sanpuroch voir famille. Sanpuroch protège toi et toi protège
        Sanpuroch.</p><h3>Si les PJs donne les 30pa :</h3><div
        class="descrption"><p class="paragraphe">Il fait un grand sourire
        chaleureux et pose sa main sur son front en tirant sa langue vers le
        bas. Il vous fait signe de le suivre vers l'enclos des Sanpuroch. Vous
        pouvez voir de plus près c'est <strong>grandes créatures cornus et
        poilues aux mains larges comme celle d'un troll et à la musculature plus
        sculptée qu'un nain du Bouclier.</strong> L'Ainé ouvre la porte de
        l'enclos, parle calmement à cinq Sanpuroch en posant son front sur leur
        tête tour à tour. Les animaux, d'un calme incroyable, se posent assis
        devant chacun de vous. <strong>Ils sont équipés d'une selle spéciale et
        chacun possède des anneaux à l'arrière de la selle</strong> pour fixer
        des cordes et de l'équipement. Au niveau du coup de la monture, deux
        poignées de bois recouvertes de cuir partent par dessus les cornes de la
        bête.</p><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sIVLqiWuHbLRvgXK.JournalEntryPage.jTkf5P2kq7QkniYH]{Les
        Sanpurocks}</p></div><p class="discussion"><span
        class="discu-acteur">Kaspirionuratanokali :</span> Toi doux avec
        Sanpuroch. Toi tiens poignée et toi tire pour dirige. Gentils beaucoup.
        Nom enfants : <strong>Natak, Natakia, Natao, Natana, Nataka, Natouk,
        Natanao</strong>. Toi jamais aller montagnes. Toi pars Toi Grand Souffle
        sur épaule pour voyage !</p><div class="decrciption"><p
        class="paragraphe">Il sourit et repars auprès de sa tribu avec une
        droiture et un calme parfait.</p></div></div>
