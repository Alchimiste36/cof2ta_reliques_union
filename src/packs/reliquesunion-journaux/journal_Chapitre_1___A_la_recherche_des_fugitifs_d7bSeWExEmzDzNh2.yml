      content: "<div class=\"journal-page-cof2ta\">\n  <blockquote>\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/arkarum/arkarum1.webp\" width=\"150\" height=\"150\" />\n    <p>\n      <em>Le soir du cinquième jour, vous arrivez aux portent de <strong>la Forteresse-État d'Arkar'um</strong>.</em>\n    </p>\n    <p>\n      <em>Cette structure naine est tout simplement stupéfiante. Les fortifications de cette cité sont immenses, en trois niveaux, protégeant une ville entière. De nombreux\n        stigmates montrent les multiples assauts que la forteresse à surmontés au cours des siècles. Alors que le soleil descend à l'horizon, des volutes de fumées sortent des\n        centaines de cheminées.</em>\n    </p>\n    <p>\n      <em>Plus vous vous rapprochez et plus les sons, bruits et cris de la cité se font entendre. La large porte circulaire est ouverte et malgré l'heure tardive, des caravanes\n        marchandes et des habitants entrent et sortent.</em>\n    </p>\n    <p>\n      <em>En franchissant la première muraille, vous distinguez <strong>une ville propre, rangée et particulièrement active</strong>. Une très large majorité des gens sont de fiers\n        nains et naines mais on peut distinguer quelques humains, elfes et même un ou deux gobelins au service de marchands itinérants. Personne en fait attention au groupe </em><span class=\"imp\">(sauf si un peau verte fait parti du groupe).</span>\n    </p>\n    <p>\n      <span><em>Vous savez que les visiteurs n'ont pas tous les droits dans une cité-état et encore plus dans celle-ci. Les marchands qui entrent se dirigent tous vers la place du\n          marché et les autres visiteurs que vous croisez vont et viennent entre les boutiques et l'auberge principale que vous ne pouvez pas louper sur la place principale.\n          <strong>\"La Croisée du Tranchoir et du Bouclier\"</strong> est écrit en grand sur la devanture. C'est une immense bâtisse pleine de vie avec un espace taverne, des\n          chambres et une grande écurie, le long du bâtiment.</em></span>\n    </p>\n  </blockquote>\n  <h3>\"la Croisée du Tranchoir et du Bouclier\".</h3>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/arkarum/auberge%20du%20bouclier1.webp\" width=\"100\" height=\"100\" />\n  <p>\n    Le propriétaire s'appelle @UUID[Actor.jOyeMRRjZyGYKoeP]{Warbane} et il est très accueillant avec tout le monde <span class=\"imp\">(sauf encore avec les Peaux Vertes)</span>. Le\n    repas (délicieux et copieux) est à 3pa la chambre est à 7pa pour des chambres individuelles ou 4pa/personne pour des chambres de quatre. De toute façon, les étrangers n'ont pas\n    bien le choix dans cette ville très sécurisée.\n  </p>\n  <p>\n    Malgré un hadicap à l'épaule gauche, l'empêchant de tenir le rang, le tenancier nain est un combattant encore très expérimenté donc gare aux PJ qui voudraient titiller l'ancien\n    nain du bouclier.\n  </p>\n  <p>\n    Warbane peut aussi leur vendre quelques équipements de bases mais les prix sont doublés par rapport aux tarifs de base. Ses armes, armures et boucliers sont de facture naine et\n    d'une grande qualité. Il a éaglement tout type de tabac et d'alcool venant des quatre coins d'Arran. Les tarifs sont élevés mais la qualité est au rendez-vous.\_\n  </p>\n  <p>@UUID[Actor.3WmRp12n04qZn5fn]{La croisée du Tranchoir et du Bouclier - Arkar'Um}</p>\n  <p></p>\n  <hr />\n  <h3>Informations et discussion avec Warbane :</h3>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/arkarum/warbane.webp\" width=\"100\" height=\"100\" />\n  <ul>\n    <li>\n      <p>\n        <strong>Un groupe d'Elwë en piteuse état s'est arrêté dans ma charmante auberge il y a trois nuits.</strong> Ils avaient des pisseuses dont une tellement vieille qu'on l'a\n        croyait calanchée et des Marmouses particulièrement fatigués. <strong>Ils ont dormi une nuit puis sont partis avant les premières lueurs du soleil</strong>.\n      </p>\n    </li>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:cha|comp:Interrogatoire]</strong></span>\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>10 +</strong></span> : la pisseuse Hum qui les accompagnait en\n            <strong>avait dans la caboche et elle au moins elle avait des manières</strong>.\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>15 +</strong></span> : Elle a bavé sur le fait de <strong>traverser le Territoire des Mangeurs de Plaine</strong> pour\n            rejoindre de la famille. Elle voulait <strong>connaitre des lieux surs pour éviter les camps des Culs-Verts dans la région</strong>. Les quatre gugusses qui l'a\n            suivaient n'étaient pas des Pisse-laits mais <strong>je ne leur donne pas beaucoup d'espoir sur ses terres</strong>, surtout que l'un d'eux trainait la patte.\n            <strong>Ils m'ont acheté deux chevaux d'Hums</strong> à prix d'or et on fermer leur gueuloir toute la soirée au repas.\n          </p>\n        </li>\n      </ul>\n    </li>\n    <li>\n      <p>\n        <strong>Comment peut-on les rattraper ?</strong> =&gt; pour la somme de <strong>30pa</strong>, Warbane peut mettre les PJs en\n        <strong>contact avec \"l'Ainé\" d'une tribu de Mangeur de Plaine</strong>. Cette tribu pourra leur louer des <strong>montures spéciales</strong> pour traverser les plaines\n        hostiles de leur territoire. Il est installé à un kilomètre à l'est de la Forteresse-État. Il donne au groupe\n        <strong>un morceau de bois gravé de runes complexes</strong> qui nous permettra de négocier avec\n        lui.\_@UUID[Compendium.world.reliquesunion-objets.Item.fNBOEap6OwAwCrLy]{Morceau de bois gravé}\n      </p>\n    </li>\n  </ul>\n  <p>\n    Les PJs peuvent profiter de ce bout de la ville mais ils ne pourront pas explorer plus loin dans les strates supérieurs.\n    <strong>Si l'un des PJs est un Peaux Verts mieux vaut ne pas courir les rues tout seul.</strong>\n  </p>\n  <p>Le groupe peut dormir car la nuit est bien tombée après leur repas et la discussion avec Warbane.</p>\n  <p></p>\n  <h2>La Tribu de Kaspirionuratanokali, l'Ainé</h2>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/mangeurs_des_plaines/kaspirionuratanokali2.webp\" width=\"150\" height=\"150\" />\n  <p>En poursuivant leur périple, le groupe va rencontrer l'Ainé de la tribu des Mangeurs de Plaine à un kilomètre de la forteresse.</p>\n  <blockquote>\n    <p>\n      A environ, un kilomètre de la forteresse, en direction des plaines, vous distinguez au dernier moment, derrière une petite colline,\n      <strong>un camp de nomades ayant montés leurs tentes et parqués d'étranges bêtes dans un enclos solide.</strong> Une quarantaine de personnes habillés avec des habits en cuir\n      et en fourrure sont autour un petit feu. Une jeune femme fredonne une chanson, un bébé dans les bras.\n      <strong>Les bêtes dans l'enclos grognent lorsque votre groupe se rapproche.</strong>\n    </p>\n    <p>\n      Un homme fier et bien musclé se lève pour vous saluer. Il semble plus perplexe qu'hostile.\n      <strong>Il tire la langue vers le bas et croise ses bras sur son torse</strong> puis s'exprime avec un fort accent marqué :\n    </p>\n  </blockquote>\n  <p class=\"discussion\"><strong>KASPIRIONURATANOKALI</strong> : Le Grand Souffle salut toi ! Je être Kaspirionuratanokali … Ainé peuple nomade … Quoi toi veux ?</p>\n  <blockquote>\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/mangeurs_des_plaines/guerrier2.webp\" width=\"100\" height=\"100\" />\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/mangeurs_des_plaines/guerrier3.webp\" width=\"100\" height=\"100\" />\n    <p>\n      Vous voyez également les autres Mangeurs de Plaines se regrouper ensembles quelques mètres derrière. Quatre guerriers et guerrières se placent devant eux une main sur la\n      poignée de leur cimeterre ou sortant leur longs poignards pour jouer avec. Ils ne semblent nullement intimidés ou perturbés par votre présence.\n    </p>\n  </blockquote>\n  <hr />\n  <h2>Présentations</h2>\n  <p>\n    Les PJs peuvent se présenter. Adaptez la réaction de l'Aîné et des combattants en fonction de l'attitude des PJ. Ils devraient comprendre rapidement qu'ils ne font pas le poids\n    face à ces combattants aguerris.\n  </p>\n  <p>\n    Dans tous les cas, tant que les PJ parlent des montures\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">sans montrer le bout de bois gravé</span></strong></span>, Kaspirionuratanokali ne répond même pas.\n  </p>\n  <p>Lorsqu'ils présentent le bout de bois gravé, il le prend et dit :\_</p>\n  <p class=\"discussion\">\n    <strong>KASPIRIONURATANOKALI</strong> : Sanpurochs monture à nous, grand amis pour Plaine, famille ! Si toi traverse le Grand Souffle toi devoir Sanpurochs. Enfant dangereux,\n    Enfant dressé. Toi donner 30pa pour nomade, toi avoir Sanpurochs pour traverse vite vite vite. Toi dit oui toi traverse. Au bout Grand Souffle toi dire : Kaspirionuratanokali\n    et Sanpuroch voir famille. Sanpuroch protège toi et toi protège Sanpuroch.\n  </p>\n  <p></p>\n  <p>Si les PJs donne les 30pa :</p>\n  <blockquote>\n    <p>\n      Il fait un grand sourire chaleureux et pose sa main sur son front en tirant sa langue vers le bas. Il vous fait signe de le suivre vers l'enclos des Sanpuroch. Vous pouvez\n      voir de plus près c'est\n      <strong>grandes créatures cornus et poilues aux mains larges comme celle d'un troll et à la musculature plus sculptée qu'un nain du Bouclier.</strong> L'Ainé ouvre la porte\n      de l'enclos, parle calmement à cinq Sanpuroch en posant son front sur leur tête tour à tour. Les animaux, d'un calme incroyable, se posent assis devant chacun de vous.\n      <strong>Ils sont équipés d'une selle spéciale et chacun possède des anneaux à l'arrière de la selle</strong> pour fixer des cordes et de l'équipement. Au niveau du coup de la\n      monture, deux poignées de bois recouvertes de cuir partent par dessus les cornes de la bête.\_\n    </p>\n    <p>@UUID[JournalEntry.sIVLqiWuHbLRvgXK.JournalEntryPage.jTkf5P2kq7QkniYH]{Les Sanpurocks}</p>\n  </blockquote>\n  <p class=\"discussion\">\n    <strong>KASPIRIONURATANOKALI :</strong> Toi doux avec Sanpuroch. Toi tiens poignée et toi tire pour dirige. Gentils beaucoup. Nom enfants :\n    <strong>Natak, Natakia, Natao, Natana, Nataka, Natouk, Natanao</strong>. Toi jamais aller montagnes. Toi pars Toi Grand Souffle sur épaule pour voyage !\n  </p>\n  <blockquote>\n    <p>Il sourit et repars auprès de sa tribu avec une droiture et un calme parfait.</p>\n  </blockquote>\n</div>"
