  - sort: 100000
    name: L'auberge du Passage Gourmand
    type: text
    _id: YPO3NqvD0S8IUdT6
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <p>@UUID[JournalEntry.mNWBOPSpJxMCembP.JournalEntryPage.5cvD33nUDCOBW7xp]{Auberge du Passage Gourmand}</p>\n  <h2>Arrivée la veille</h2>\n  <p>Le rendez-vous à lieux à l'aube donc <strong>une partie des PJs peuvent vouloir voyager la veille pour dormir à l'auberge et être prêt le matin.</strong></p>\n  <p>\n    Dans ce cas là,\n    <strong>ils découvrent une scène assez spéciale car tous les clients et voyageurs sont chassés de l'auberge avec fermeté et diplomacie par des gardes et miliciens de la Cité\n      d'Ispier.</strong>\n    Les malheureux s'énervent et s'agitent mais ils sont bien obligés de quitter les lieux direction Ispier ou un village entre l'auberge et Blanche Paix.\n  </p>\n  <p>\n    Si un PJ se présente aux gardes comme un \"invité\" pour le lendemain matin, les gardes le font entrer et déclenche une colère d'autant plus grande chez les clients jetés à la\n    porte. En fonction de la réaction des PJ,\n    <strong>cela peut rapidement dégénérer donc les gardes essayent de les calmer s'ils ouvrent trop leurs bouches ou s'ils mettent de l'huile sur le feu.</strong>\n  </p>\n  <p>\n    A la nuit tombée, il n'y a plus de charette, de chevaux ou de visiteurs à l'Auberge du Passage Gourmand.\n    <strong>Une compagnie de 4 gardes restent sur place pour éconduire les éventuels voyageurs.</strong> Ils se relayent par deux pour observer les alentours et se reposer.\n  </p>\n  <hr />\n  <p>Les PJ qui arrivent la veille <strong>peuvent faire connaissance</strong> s'ils ne se connaissent pas déjà.</p>\n  <p>Ils seront installé confortablement à l'auberge avec une chambre individuelle et des repas et boissons à volonté.</p>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/autres_pnjs/humain_f_18.webp\" width=\"100\" height=\"100\" />\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/autres_pnjs/humain_h_7.webp\" width=\"100\" height=\"100\" />\n  <p>\n    Ayant une soirée et une nuit plutôt calme,\_@UUID[Actor.dzHwdyZI3S9rmxPp]{Nada Gruger},\n    <strong>la fille de l'aubergiste, en profitera pour discuter et passer du temps avec les seuls clients</strong>.\_@UUID[Actor.FDnA3d4NMld0vIyK]{Stepson Gruger} restera, lui, la\n    plupart du temps dans les cuisines pour préparer les repas du lendemain.\n  </p>\n  <h2>Arrivée le matin</h2>\n  <p>Pour les PJ qui arrivent le matin même à l'auberge :</p>\n  <blockquote>\n    <p>\n      <span>L'auberge est à la croisée de deux routes à une demi-heure au nord de @UUID[JournalEntry.mNWBOPSpJxMCembP]{La Cité d'Ispier}. C'est une grande bâtisse bien entretenue au\n        toit de chaume qui reçoit jours et nuits les voyageurs et les caravanes qui naviguent entre Blanche Paix, Ispier, la\n        <em>Forteresse-état d'Arkar'um et le littoral.</em></span>\n    </p>\n    <p>\n      <span>Une légère fumée sort de la cheminée, la double porte est grande ouverte mais aucune charette n'est visible devant ou dans les écuries situées à la droite du bâtiment. On\n        peut entendre quelques chevaux venant de derrière le bâtiment.</span>\n    </p>\n    <p>\n      <span><em>En entrant, vous remarquez que l'auberge est totalement vide, les tables sont bien rangées et l'une d'entre-elle est garnie de plats, pains, pichets, friandises.\n          L'émissaire qui vous a donné la lettre se tient dans un coin de la pièce comme pourrait le faire un garde du corps</em></span>\n    </p>\n    <p>\n      <span><em>Devant la table vous voyez un homme bien habillé, une barbe bien fournie avec une chevelure impeccable. Il s'approche de vous, un large sourire aux lèvres et une\n          démarche très conviviale.</em></span>\n    </p>\n  </blockquote>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/cite_ispier/hisp_galik3.webp\" width=\"100\" height=\"100\" />\n  <p>\n    Aucune information ne sera donnée aux PJ qui ont passé la nuit sur place tant que tous les invités ne seront pas là. Ils pourront attendre à une table dans un coin de l'auberge\n    devant un petit déjeuner frugal en attendant le vrai repas avec les autres.\n  </p>\n  <div class=\"discussion\">\n    <p>\n      <em><strong>@UUID[Actor.8o6yN7jPp8MOzUnW]{Hisp Galik}\_: Bienvenu à toutes et tous, vous me voyez ravi de vous voir ici et à l'heure en plus. Nous serons tranquille ce soir. Mon\n          maître vous demande la plus grande discrétion sur ce qui va se passer ce soir et avant qu'il ne descende, ceux qui ne savent pas tenir leur langue sont priés de sortir\n          IMMÉDIATEMENT.</strong></em>\n      (mot prononcé avec une grande autorité).\n    </p>\n    <p></p>\n  </div>\n  <p>\n    Laissez un temps d'attente pour un éventuel départ ou des questions. Si un PJ pose une question, Hisp Galik pourra lui répondre sèchement : \"<em><strong>je ne vous croyais pas si impatient ! vous restez ou vous partez !!</strong></em>\".\n  </p>\n  <p></p>\n  <blockquote>\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/cite_ispier/jaspar_bonarion1.webp\" width=\"100\" height=\"100\" />\n    <p>\n      <span><em>Vous voyez l'émissaire prend une petite cloche posée sur la table et la secouer doucement. Quelques instants plus tard, un homme d'une soixantaine d'année descend\n          l'escalier avec une grande prestance. Il est habillé d'une tunique richement décorée d'un bleu profond. Ses cheveux, sa barbe blanche et ses traits marqués par l'âge\n          montrent son grand âge mais ses mouvement et son charisme pourraient le faire passer pour un jeune homme.</em></span>\n    </p>\n    <p>\n      <span><em>Il s'approche de vous et vous salue individuellement par votre Nom et prénom</em></span>\n      <span class=\"imp\">(si un PJ est Elfe sylvain il ne lui sert pas la main !)</span>\n    </p>\n  </blockquote>\n  <h2>Discussion avec Jaspar</h2>\n  <div class=\"arran-mod\">\n    <div class=\"discussion\">\n      <p>\n        <strong>JASPAR BONARION :</strong> Installez vous je vous prie. Mon ami l'aubergiste, <strong>Stepson Gruger</strong>, nous a préparé quelque mets pour passer la soirée\n        convenablement.\n      </p>\n      <p>Je vous ai convié ce soir pour vous confier une mission de la plus haute importance et j'espère bien que vous allez comprendre la gravité de la situation.</p>\n      <p>\n        Je suis @UUID[Actor.1bTMfWMjreS53TDc]{Jaspar Bonarion} le seigneur de @UUID[JournalEntry.mNWBOPSpJxMCembP]{La Cité d'Ispier}. Je vous présente\n        @UUID[Actor.8o6yN7jPp8MOzUnW]{Hisp Galik}, le mage qui me conseille.\n      </p>\n      <p>\n        Vous n'êtes pas sans savoir que nous avons eu des problèmes avec un village d'Elfes Sylvains dans les derniers jours. Nous avons gagné cette guerre provoquée par nos\n        voisins des bois mais j'ai bien peur que ce drame ne vienne s'engouffrer au sein de ma famille !\n      </p>\n      <h3>\n        <span style=\"text-decoration:underline\"><em><strong><span style=\"text-decoration:underline\">Temps de pause et air grave</span></strong></em></span>\n      </h3>\n      <p>\n        Ma fille Lana'sir a été kidnappée par des Elfes Sylvains, il y a trois jours. Surement un groupe de survivants qui veulent me faire payer leur propres erreurs. Mes soldats\n        personnels ont essayé de la retrouver et de suivre sa trace mais franchement ils sont incompétents et c'est peu dire. Je ne veux pas que sa disparition s'ébruite plus que\n        les rumeurs qui se propagent déjà. Mon peuple est déjà bien assez sous tension pour ne pas rajouter la perte de leur Dame d'Honneur à leur moral. Vous devez la retrouver et\n        la ramener saine et sauve au plus vite. Nous avons BESOIN d'oublier cette histoire et reprendre le court de nos vies maintenant que\n        <span style=\"text-decoration:line-through\"><s>ces enfoir…</s></span> ces elfes ne sont plus.\n      </p>\n      <hr />\n    </div>\n  </div>\n  <div class=\"arran-mod\">\n    <p>\n      <span class=\"imp\">Si les PJs coupent la parole du seigneur Jaspar:</span> Hisp Galik les interrompt d'un : \"<em>On laisse parler le seigneur Bonarion</em>\". En cas de\n      récidive, \"<em>Taisez-vous maintenant et c'est mon dernier avertissement</em>\". Jaspar lui lance un regard noir.\n    </p>\n    <hr />\n    <h2>Temps d'échange avec le seigneur Jaspar :</h2>\n    <p>\n      <span class=\"imp\"><strong>(En cas de manque de respect des PJs, Hisp Galik peut les menacer à chaque instant voir leur fermer la bouche magiquement si besoin même si le seigneur\n          s'interpose.)</strong></span>\n    </p>\n    <p><strong>Après son discours et pendant que les PJs demandent des explications, le seigneur se met à manger et invite les PJs a faire de-même.</strong></p>\n    <h3>\n      <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Informations que le seigneur peut donner aux PJs :</span></span>\n    </h3>\n    <ul>\n      <li>\n        <p><strong>Lana'sir a disparue il y a quatre nuits</strong> au sein du château.</p>\n      </li>\n      <li>\n        <p>Ils peuvent aller à <strong>La Cité d'Ispier pour investiguer</strong> avant de partir</p>\n      </li>\n      <li>\n        <p>L'un des <strong>Elfes Sylvains a été blessé lors de sa fuite</strong> par les murs d'enceinte de la ville.</p>\n      </li>\n      <li>\n        <p>Ils étaient <strong>à cheval</strong> et, d'après le garde, ils sont partis au <strong>Sud-Est de la cité</strong>.</p>\n      </li>\n      <li>\n        <p>Récompense s'il demande : <strong>une propriété dans la Cité d'Ispier, 400 pa par personne</strong>.</p>\n      </li>\n      <li>\n        <p>Il ne comprend pas car <strong>sa fille, Lana'sir, a toujours défendu la cause des elfes sylvains</strong></p>\n      </li>\n      <li>\n        <p><strong>autres questions</strong> des PJs à improviser.</p>\n      </li>\n    </ul>\n    <h3>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Pourquoi les PJs :</span></strong></span>\n    </h3>\n    <ul>\n      <li>\n        <p><strong>Lothar :</strong></p>\n      </li>\n      <li>\n        <p><strong>Dwalin :</strong></p>\n      </li>\n      <li>\n        <p><strong>Elarion Venclair :</strong></p>\n      </li>\n      <li>\n        <p><strong>Elwyn :</strong></p>\n      </li>\n      <li>\n        <p><strong>Aërin Fendecercle :</strong>\_</p>\n      </li>\n    </ul>\n    <h2>A la fin du repas,</h2>\n    <p>Hisp Galik, le mage, prend la parole :</p>\n    <div class=\"discussion\">\n      <p>\n        <strong>HISP GALIK :</strong> Il est bien évidant que <strong>les survivants Elfes devront être tués sans ménagement.</strong> Malgré leur erreurs et leur défaite, ils s'en\n        sont prit à la Dame d'Honneur et ce crime ne pourrait rester impuni. Apportez-nous toutes les affaires que vous trouverez sur leurs cadavres afin que nous remontions la\n        piste des survivants.\n      </p>\n    </div>\n    <p>\_</p>\n    <h3>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Avant de partir :</span></strong></span>\n    </h3>\n    <div class=\"discussion\">\n      <p>\n        <strong>JASPAR BONARION :</strong> Vous pourrez venir à La Cité d'Ispier dès maintenant pour récupérer de l'équipement et\n        <strong>investiguer au château s'il le faut</strong>. Pour votre mission, recevez déjà <strong>ces bourses contenant 25 pa chacun</strong> pour vous équiper et contribuer\n        aux frais que cette poursuite engendrera. <strong>Des chevaux, poneys ou cochons de voyage pourront vous être fournit</strong> aux écuries de la Cité si vous le souhaitez.\n      </p>\n      <p>\n        <strong>Mon conseiller ici présent Borass Taer vous accompagnera pour ce voyage. </strong><span><em>(l'émissaire s'avance d'un coin de l'auberge avec un grand sourire et s'avance jusqu'à la table)</em></span> Il connait la région comme sa poche, aime la chasse\n        et le pistage et surtout, lorsque vous la retrouverez, ma fille saura que vous venez de ma part.\n      </p>\n      <p><strong>Suivez-moi et ne perdons pas plus de temps.</strong></p>\n    </div>\n  </div>\n</div>"
