  - sort: 200000
    name: Arrivée à la Cité d'Ispier et Investigations
    type: text
    _id: 1jOo546DM6TkdOvM
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <blockquote>\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/cite_ispier/ispier.webp\" width=\"100\" height=\"100\" />\n    <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_lieux/cite_ispier/rue%20d%27ispier1.webp\" width=\"100\" height=\"100\" />\n    <p>\n      <span style=\"font-family:Bookinsanity\"><em>En arrivant, vous voyez la <strong>grande ville pousser sur une colline entourée de montagnes plus hautes. Les rivières contournent la cité</strong> et de nombreux ponts\n          viennent la franchir pour rallier les différents quartiers de la cité. Au premier coup d'oeil, on observe que\n          <strong>la cité est jeune et connait un essor rapide</strong>. Les constructions poussent ça et là sans aucune rigueur. Au delà, des nouveaux quartiers longeant les\n          berges, <strong>ils voient une épaisse muraille tout autours de la \"vieille ville\".</strong></em></span>\n    </p>\n    <p>\n      <span style=\"font-family:Bookinsanity\"><em>D'à peine cent ans, cette partie de la ville est plus marquée par d'anciennes batailles et des raids d'ogres ou d'orcs. D'après les livres d'histoire de la région,\n          <strong>Ispier était un camp avancé protégeant et avertissant Blanche Paix</strong> et les villes du Nord en cas d'attaque des Peaux Vertes. L'arrivée massive des humain\n          transforma le camp en une ville florissante et commerçante. Malgré quelques conflits avec des orcs qui viennent piller les fermes aux alentours,\n          <strong>peu de tracas viennent perturber les Ispierois et Ispieroises.</strong></em></span>\n    </p>\n    <p>\n      <span style=\"font-family:Bookinsanity\"><em>Lors de votre parcours dans les rues de la ville, <strong>vous distinguez des miliciens humains aux endroits clef</strong> (les ponts, les places, les grands bâtiments…)\n          et <strong>tout le monde ressent un climat de tension à chaque croisement</strong>. Des couples qui pleurent sur un banc, des bagarres, des grafitis \"Mort aux elfes\" ou\n          \"brulez-les tous\". Au abord du château, de construction naine comme la muraille,\n          <strong>une grande tente à été monter et ils peuvent voir des infirmiers et médecins essayer de soigner des blessés.</strong></em></span>\n    </p>\n    <p>\n      <span style=\"font-family:Bookinsanity\"><em>Vous êtes directement amenés aux écuries et le seigneur Jaspar vous propose une monture pour ceux qui veulent (Mirage, Robuste, Flèche et Droiture (le cheval de Borass\n          se nomme Cascade)).</em></span>\n    </p>\n  </blockquote>\n  <div class=\"discussion\">\n    <p>\n      <strong>JASPAR BONARION :</strong> Voici les moutures qui vont vous accompagner pour retrouver la Dame. Prenez quelques temps pour vous équiper et recueillir des informations\n      mais ne tardez pas trop. Chaque minute de perdu, réduit vos chances de les rattraper.\n    </p>\n    <p>\n      J'ai d'autres soucis à régler dans l'heure mais Borass saura vous guider si besoin. N'oubliez pas qu'à l'extérieur de cette enceinte, je souhaite une grande discrétion de\n      votre part. N'allez pas augmenter le désespoir des familles endeuillées.\n    </p>\n  </div>\n  <p></p>\n  <h2>Temps libre pour les PJs</h2>\n  <h3>\n    <span><strong>Faire des courses :</strong></span>\n  </h3>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/autres_pnjs/humain_h_12.webp\" width=\"100\" height=\"100\" />\n  <p>@UUID[JournalEntry.mNWBOPSpJxMCembP.JournalEntryPage.qbDDmvIsOVwhWsRM]{Aux rêves d'aventures}</p>\n  <p>\n    les PJs peuvent se rendre @UUID[Actor.sh7Qz1Zl3FUqx2Fr]{Au rêve d'Aventures}, le magasin d'équipement de @UUID[Actor.7hwDtuV2wcb0QAQE]{Ronrik}. S'ils en font la demande et\n    qu'ils sont \"aimable\" Ronrik peut leur fournir des outils de crochetage et un cristal lumineux qu'il a dans ses placards.\n  </p>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/autres_pnjs/humain_f_7%20-%20copie.webp\" width=\"100\" height=\"100\" />\n  <p>@UUID[JournalEntry.mNWBOPSpJxMCembP.JournalEntryPage.QK1CkxHzORGPB059]{Aux petits plats de Marta}</p>\n  <p>\n    Ils peuvent aussi se retrouver à la Taverne/épicerie <strong>\"@UUID[Actor.RevuSoVyGgx20eh1]{Aux petits plats de Marta}\"</strong> pour acheter des rations et des denrées pour le\n    voyage. Marta est une grande gueule qui pose énormément de questions et essaye de tirer les vers du nez. Gare aux PJs pour leur réponses.\n  </p>\n  <hr />\n  <h2>Investigations :</h2>\n  <h3>Dans la chambre de Lana'sir :</h3>\n  <ul>\n    <li>\n      <p>Les affaires de Lana'sir sont très bien rangées, le lit est fait, le linge est plié. Son bureau est recouvert de papiers, notes et livres mais bien organisés.</p>\n    </li>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:per|diff:15|comp:Fouille]</strong></span>\_: il manque une pile d'affaire dans un placard\n      </p>\n    </li>\n  </ul>\n  <hr />\n  <h3>Auprès de la gouvernante de Lana'sir :</h3>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/cite_ispier/gouvernante.webp\" width=\"100\" height=\"100\" />\n  <p>\n    @UUID[Actor.BVTpVArA6wJxolPd]{Shumia} est une femme assez timide et impressionnée par les PJ. Elle s'occupe de Lana'Sir depuis que la Dame d'Honneur est née. Elle baisse les\n    yeux tout le temps mais elle peut s'énerver si les PJs sont un peu trop brusque \"<em>c'est à cause des sales elfes de la forêt, ils l'ont tuée, elle est surement morte, je ne l'a reverrais jamais, … s'il vous plait ramenez-là, je vous en supplie ! Elle est\n      tellement gentille…</em>\" Elle n'a rien vue. Elle a l'air très triste et perturbée.\n  </p>\n  <p>\n    S'il l'interroge sur les affaires de Lana'sir : <span style=\"font-family:Arial\"><strong>@Test[car:cha|diff:10|comp:Interrogatoire]</strong></span> :\n    <em>Je n'ai pas retrouver son sac et une pile de vêtements de chasse. HA oui et son carnet de notes à été volé aussi par ces salauds, pardon pour ma vulgarité !</em>\n  </p>\n  <hr />\n  <h3>Gols, le serviteur de Lana'Sir</h3>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/cite_ispier/servant.webp\" width=\"100\" height=\"100\" />\n  <p>\n    @UUID[Actor.usURqzEGPA45I747]{Gols} est un jeune homme charmand et droit. Il sert Lana'Sir au sein du château et fait ses courses quand elle le demande (ce qui n'est pas\n    souvent le cas car elle préfère aller en ville elle-même). Il est occupé avec des plats dans chaque main mais répondra calmement aux questions des PJ.\n  </p>\n  <ul>\n    <li>\n      <p>\n        Lana'Sir ne ferait pas de mal à un elfe. Elle semble plutôt désolée de la récente situation avec les voisins de la @UUID[JournalEntry.lAzRUxtxusAXN0ZS]{forêt du Val Rouge}.\n        Elle en parle souvent.\n      </p>\n    </li>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:cha|comp:Interrogatoire]</strong></span>\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>12+</strong></span> :\n            <em>même si elle ne veut pas que ça se sache, elle a rencontrer plusieurs fois des elfes sylvains pour essayé de comprendre ce qui se passe et désarmorcer la\n              situation</em>.\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>15+\_</strong></span>:\n            <em>Il y a une semaine, elle est revenue blessée d'un rendez-vous avec des elfes sylvains mais elle m'a confié que c'était un accident bête. Sa plaie a l'épaule a été\n              soignée mais, malgré son optimisme constant, j'ai bien senti que ça l'avait peiné.</em>\n          </p>\n        </li>\n      </ul>\n    </li>\n  </ul>\n  <hr />\n  <h3>Les gardes :</h3>\n  <p>Le chef de la garde se nomme <strong>Rienn Forberk</strong>. Il fait appelé rapidement les gardes qui ont des informations sur la nuit de lincident.</p>\n  <ul>\n    <li>\n      <p>\n        <strong>Gurft :</strong> un des ses hommes sur la fortification a tiré un carreau d'arbalète sur un homme discret et rapide qui a sauté par dessus la fortification, à la\n        tombée de la nuit il y a quatre jours.\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>Sofion :</strong> l'un de ses hommes, posté à la porte Est de la ville, se rappelle avoir vu passer deux voyageurs à l'aube il y a trois jours. Ils étaient\n        chaudement habillés et faisaient profile bas. Ils étaient tous les deux sur le même cheval, un bête magnifique, bien entretenue.\n      </p>\n    </li>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:cha|diff:10|comp:Interrogatoire] :</strong></span> Au vu des dates et des horaires : ils ont pu passer la nuit dans une\n        auberge de la ville. La plus discrète pour des personnes recherchées serait \"<strong>l'Auberge des Yeux Bandés</strong>\"\n      </p>\n    </li>\n  </ul>\n  <hr />\n  <h3>Les marchands récemment arrivés en ville :</h3>\n  <p>\n    Un groupe de marchands voyageant ensemble, <strong>a vu un groupe de personnes à quelques dizaines de mètres de la route allant vers l'est</strong>.\n    <strong>Ils étaient rejoint par deux personnes sur un cheval.</strong> C'était à l'aube il y a trois jours lorsqu'ils sont arrivés en ville. Ils nous ont croisé et ils\n    prenaient la route vers le Sud-Est en direction de la Forteresse État d'Arkar'um.\n  </p>\n  <hr />\n  <h3>L'Auberge \"Aux yeux Bandés\"</h3>\n  <img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/les-reliques-de-lunion/assets/ru_acteurs/autres_pnjs/pnj_noble6.webp\" width=\"100\" height=\"100\" />\n  <p>\n    @UUID[JournalEntry.mNWBOPSpJxMCembP.JournalEntryPage.V8oX4BKLgGtJLUp5]{Cette auberge} malfamée dans les quartiers pauvres et ouvriers de la ville est un repère de malfrats et\n    de voyous. Elle se situe dans une ruelle entourée de magasins et d'habitations bringueballantes. Sur son enseigne, on distingue une fille de joie, un bandeau sur les yeux et un\n    large sourire sur les lèvres. L'aubergiste, @UUID[Actor.6lAY8FNMq5qB6kkq]{Krogan}, est un sale type imbu de lui-même et particulièrement désagréable. Chaque information donnée\n    coutera quelques PA aux PJs. Des filles nues humaines ou naines se promènent dans l'établissement n'hésitant pas à s'assoir sur les genoux des Personnages.\n  </p>\n  <ul>\n    <li>\n      <p>Un couple ont réservé une chambre il y a quatre nuit. Ils semblaient fatiguer et presser de faire leurs petites affaires.</p>\n    </li>\n    <li>\n      <p>Je n'ai pas vu le visage de ces clients et je m'en fout comme de ma première putain.</p>\n    </li>\n    <li>\n      <p>Ils sont partis de bonne heure le lendemain</p>\n    </li>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:cha|comp:Interrogatoire] / @Test[car:for|comp:Intimidation]</strong></span>\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>10+ / 15+</strong></span>: à mon avis la jeune femme devait être encore vierge car le lit était taché de sang à leur départ.\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>15+ / 20 +</strong></span> : Ils m'ont juste demander combien de temps de voyage pour atteindre le Territoire des Mangeurs de\n            Plaine puis ils m'ont réglé avec un joli pourboire.\n          </p>\n        </li>\n      </ul>\n    </li>\n  </ul>\n  <hr />\n  <h3>Laissez les PJs faire d'autres investigations s'ils le souhaitent</h3>\n  <p>\n    Ils peuvent par exemple questionner les exploitants de bois de @UUID[JournalEntry.lAzRUxtxusAXN0ZS]{la Forêt du Val Rouge} pour comprendre les raisons du conflit. De ce\n    côté-là, ils comprendront assez rapidement que, pour les bûcherons ou les exploitants, la Cité d'Ispier n'a rien a se reprocher par rapport aux anciens traités signés avec les\n    elfes sylvains.\n  </p>\n</div>"
