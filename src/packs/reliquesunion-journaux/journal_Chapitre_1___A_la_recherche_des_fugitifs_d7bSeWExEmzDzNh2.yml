      content: >-
        <div class="journal-cof2ta-ru"><h1>Arrivée à la Cité d'Ispier et
        Investigations</h1><div class="description"><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/rue_ispier1.webp"
        width="100" height="100" /><p class="paragraphe">En arrivant, vous voyez
        la <strong>grande ville pousser sur une colline entourée de montagnes
        plus hautes. Les rivières contournent la cité</strong> et de nombreux
        ponts viennent la franchir pour rallier les différents quartiers de la
        cité. Au premier coup d'oeil, on observe que <strong>la cité est jeune
        et connait un essor rapide</strong>. Les constructions poussent ça et là
        sans aucune rigueur. Au delà, des nouveaux quartiers longeant les
        berges, <strong>ils voient une épaisse muraille tout autours de la
        "vieille ville".</strong></p><p class="paragraphe">D'à peine cent ans,
        cette partie de la ville est plus marquée par d'anciennes batailles et
        des raids d'ogres ou d'orcs. D'après les livres d'histoire de la région,
        <strong>Ispier était un camp avancé protégeant et avertissant Blanche
        Paix</strong> et les villes du Nord en cas d'attaque des Peaux Vertes.
        L'arrivée massive des humain transforma le camp en une ville florissante
        et commerçante. Malgré quelques conflits avec des orcs qui viennent
        piller les fermes aux alentours, <strong>peu de tracas viennent
        perturber les Ispierois et Ispieroises.</strong></p><p
        class="paragraphe">Lors de votre parcours dans les rues de la ville,
        <strong>vous distinguez des miliciens humains aux endroits clef</strong>
        (les ponts, les places, les grands bâtiments…) et <strong>tout le monde
        ressent un climat de tension à chaque croisement</strong>. Des couples
        qui pleurent sur un banc, des bagarres, des grafitis "Mort aux elfes" ou
        "brulez-les tous". Au abord du château, de construction naine comme la
        muraille, <strong>une grande tente à été monter et ils peuvent voir des
        infirmiers et médecins essayer de soigner des blessés.</strong></p><p
        class="paragraphe">Vous êtes directement amenés aux écuries et le
        seigneur Jaspar vous propose une monture pour ceux qui veulent (Mirage,
        Robuste, Flèche et Droiture (le cheval de Borass se nomme
        Cascade)).</p></div><hr /><div class="discussion"><p><span
        class="discu-acteur">Jaspar Bonarion :</span> Voici les moutures qui
        vont vous accompagner pour retrouver la Dame. Prenez quelques temps pour
        vous équiper et recueillir des informations mais ne tardez pas trop.
        Chaque minute de perdu, réduit vos chances de les rattraper.</p><p>J'ai
        d'autres soucis à régler dans l'heure mais Borass saura vous guider si
        besoin. N'oubliez pas qu'à l'extérieur de cette enceinte, je souhaite
        une grande discrétion de votre part. N'allez pas augmenter le désespoir
        des familles endeuillées.</p></div><p></p><h2>Temps libre pour les
        PJs</h2><h3>Faire des courses :</h3><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/autres_pnjs/humain_h_12.webp"
        width="100" height="100" /><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.mNWBOPSpJxMCembP.JournalEntryPage.qbDDmvIsOVwhWsRM]{Aux
        rêves d'aventures}</p><p class="paragraphe">les PJs peuvent se rendre
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.sh7Qz1Zl3FUqx2Fr]{Au
        rêve d'Aventures}, le magasin d'équipement de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.7hwDtuV2wcb0QAQE]{Ronrik}.
        S'ils en font la demande et qu'ils sont "aimable" Ronrik peut leur
        fournir des outils de crochetage et un cristal lumineux qu'il a dans ses
        placards.</p><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/autres_pnjs/humain_f_7%20-%20copie.webp"
        width="100" height="100" /><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.mNWBOPSpJxMCembP.JournalEntryPage.QK1CkxHzORGPB059]{Aux
        petits plats de Marta}</p><p class="paragraphe">Ils peuvent aussi se
        retrouver à la Taverne/épicerie
        <strong>"@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.RevuSoVyGgx20eh1]{Aux
        petits plats de Marta}"</strong> pour acheter des rations et des denrées
        pour le voyage. Marta est une grande gueule qui pose énormément de
        questions et essaye de tirer les vers du nez. Gare aux PJs pour leur
        réponses.</p><hr /><h2>Investigations :</h2><h3>Dans la chambre de
        Lana'sir :</h3><ul><li><p class="paragraphe">Les affaires de Lana'sir
        sont très bien rangées, le lit est fait, le linge est plié. Son bureau
        est recouvert de papiers, notes et livres mais bien
        organisés.</p></li><li><p
        class="paragraphe"><strong>@Test[car:per|diff:15|comp:Fouille]</strong>
        : il manque une pile d'affaire dans un placard</p></li></ul><hr
        /><h3>Auprès de la gouvernante de Lana'sir :</h3><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/gouvernante.webp"
        width="100" height="100" /><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.BVTpVArA6wJxolPd]{Shumia}
        est une femme assez timide et impressionnée par les PJ. Elle s'occupe de
        Lana'Sir depuis que la Dame d'Honneur est née. Elle baisse les yeux tout
        le temps mais elle peut s'énerver si les PJs sont un peu trop brusque
        "<span class="discussion">c'est à cause des sales elfes de la forêt, ils
        l'ont tuée, elle est surement morte, je ne l'a reverrais jamais, … s'il
        vous plait ramenez-là, je vous en supplie ! Elle est tellement
        gentille…</span>" Elle n'a rien vue. Elle a l'air très triste et
        perturbée.</p><p class="paragraphe">S'il l'interroge sur les affaires de
        Lana'sir : <strong>@Test[car:cha|diff:10|comp:Interrogatoire]</strong> :
        <span class="discussion">Je n'ai pas retrouver son sac et une pile de
        vêtements de chasse. HA oui et son carnet de notes à été volé aussi par
        ces salauds, pardon pour ma vulgarité !</span></p><hr /><h3>Gols, le
        serviteur de Lana'Sir</h3><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/servant.webp"
        width="100" height="100" /><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.usURqzEGPA45I747]{Gols}
        est un jeune homme charmand et droit. Il sert Lana'Sir au sein du
        château et fait ses courses quand elle le demande (ce qui n'est pas
        souvent le cas car elle préfère aller en ville elle-même). Il est occupé
        avec des plats dans chaque main mais répondra calmement aux questions
        des PJ.</p><ul><li><p class="paragraphe"><span
        class="discussion">Lana'Sir ne ferait pas de mal à un elfe. Elle semble
        plutôt désolée de la récente situation avec les voisins de la
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.lAzRUxtxusAXN0ZS]{forêt
        du Val Rouge}. Elle en parle souvent.</span></p></li><li><p
        class="paragraphe"><strong>@Test[car:cha|comp:Interrogatoire]</strong></p><ul><li><p
        class="paragraphe"><span class="roll-result">12+</span> : <span
        class="discussion">même si elle ne veut pas que ça se sache, elle a
        rencontrer plusieurs fois des elfes sylvains pour essayé de comprendre
        ce qui se passe et désarmorcer la situation.</span></p></li><li><p
        class="paragraphe"><span class="roll-result">15+</span> : <span
        class="discussion">Il y a une semaine, elle est revenue blessée d'un
        rendez-vous avec des elfes sylvains mais elle m'a confié que c'était un
        accident bête. Sa plaie a l'épaule a été soignée mais, malgré son
        optimisme constant, j'ai bien senti que ça l'avait
        peiné.</span></p></li></ul></li></ul><hr /><h3>Les gardes :</h3><p
        class="paragraphe">Le chef de la garde se nomme <strong>Rienn
        Forberk</strong>. Il fait appelé rapidement les gardes qui ont des
        informations sur la nuit de lincident.</p><ul><li><p
        class="paragraphe"><strong>Gurft :</strong> un des ses hommes sur la
        fortification a tiré un carreau d'arbalète sur un homme discret et
        rapide qui a sauté par dessus la fortification, à la tombée de la nuit
        il y a quatre jours.</p></li><li><p class="paragraphe"><strong>Sofion
        :</strong> l'un de ses hommes, posté à la porte Est de la ville, se
        rappelle avoir vu passer deux voyageurs à l'aube il y a trois jours. Ils
        étaient chaudement habillés et faisaient profile bas. Ils étaient tous
        les deux sur le même cheval, un bête magnifique, bien
        entretenue.</p></li><li><p
        class="paragraphe"><strong>@Test[car:cha|diff:10|comp:Interrogatoire]
        :</strong> Au vu des dates et des horaires : ils ont pu passer la nuit
        dans une auberge de la ville. La plus discrète pour des personnes
        recherchées serait "<strong>l'Auberge des Yeux
        Bandés</strong>"</p></li></ul><hr /><h3>Les marchands récemment arrivés
        en ville :</h3><p class="paragraphe">Un groupe de marchands voyageant
        ensemble, <strong>a vu un groupe de personnes à quelques dizaines de
        mètres de la route allant vers l'est</strong>. <strong>Ils étaient
        rejoint par deux personnes sur un cheval.</strong> C'était à l'aube il y
        a trois jours lorsqu'ils sont arrivés en ville. Ils nous ont croisé et
        ils prenaient la route vers le Sud-Est en direction de la Forteresse
        État d'Arkar'um.</p><hr /><h3>L'Auberge "Aux yeux Bandés"</h3><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/autres_pnjs/pnj_noble6.webp"
        width="100" height="100" /><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.mNWBOPSpJxMCembP.JournalEntryPage.V8oX4BKLgGtJLUp5]{Cette
        auberge} malfamée dans les quartiers pauvres et ouvriers de la ville est
        un repère de malfrats et de voyous. Elle se situe dans une ruelle
        entourée de magasins et d'habitations bringueballantes. Sur son
        enseigne, on distingue une fille de joie, un bandeau sur les yeux et un
        large sourire sur les lèvres. L'aubergiste,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.6lAY8FNMq5qB6kkq]{Krogan},
        est un sale type imbu de lui-même et particulièrement désagréable.
        Chaque information donnée coutera quelques PA aux PJs. Des filles nues
        humaines ou naines se promènent dans l'établissement n'hésitant pas à
        s'assoir sur les genoux des Personnages.</p><ul><li><p
        class="paragraphe"><span class="discussion">Un couple ont réservé une
        chambre il y a quatre nuit. Ils semblaient fatiguer et presser de faire
        leurs petites affaires.</span></p></li><li><p class="paragraphe"><span
        class="discussion">Je n'ai pas vu le visage de ces clients et je m'en
        fout comme de ma première putain.</span></p></li><li><p
        class="paragraphe"><span class="discussion">Ils sont partis de bonne
        heure le lendemain</span></p></li><li><p
        class="paragraphe"><strong>@Test[car:cha|comp:Interrogatoire] /
        @Test[car:for|comp:Intimidation]</strong></p><ul><li><p
        class="paragraphe"><span class="roll-result">10+ / 15+</span> : <span
        class="discussion">à mon avis la jeune femme devait être encore vierge
        car le lit était taché de sang à leur départ.</span></p></li><li><p
        class="paragraphe"><span class="roll-result">15+ / 20+</span> : <span
        class="discussion">Ils m'ont juste demander combien de temps de voyage
        pour atteindre le Territoire des Mangeurs de Plaine puis ils m'ont réglé
        avec un joli pourboire.</span></p></li></ul></li></ul><hr /><h3>Laissez
        les PJs faire d'autres investigations s'ils le souhaitent</h3><p
        class="paragraphe">Ils peuvent par exemple questionner les exploitants
        de bois de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.lAzRUxtxusAXN0ZS]{la
        Forêt du Val Rouge} pour comprendre les raisons du conflit. De ce
        côté-là, ils comprendront assez rapidement que, pour les bûcherons ou
        les exploitants, la Cité d'Ispier n'a rien a se reprocher par rapport
        aux anciens traités signés avec les elfes sylvains.</p></div>
