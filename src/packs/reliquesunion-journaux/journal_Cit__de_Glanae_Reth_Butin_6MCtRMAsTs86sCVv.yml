          Sgob6nXfPdf4bcoA:
            folder: mwZqms4s1lPjWHbK
            name: Collier d'Explorateur
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/04.ICONES/ICONES%20de%20Base/EQUIPEMENTS/COLLIERS-PENDENTIFS/necklace-animal-scarab.webp
            _id: Sgob6nXfPdf4bcoA
            system:
              key: ''
              description: >-
                <p>Ce d&eacute;licat collier compos&eacute; d'une chaine en
                argent sur laquelle est fix&eacute; un pendentif en forme de
                scarab&eacute;e, permet au porteur d'&ecirc;tre beaucoup plus
                stable sur les terrains difficiles.</p>

                <p>&nbsp;</p>

                <p>Le porteur ne peut plus glisser ou tomber lorsqu'il marche
                sur des surfaces glissantes ou instables (neige, glace, huile,
                sable, boue, flaque d'eau...). Si le porteur court, il gagne un
                bonus de +5 aux tests pour &eacute;viter de tomber ou
                glisser.</p>

                <p>Cet effet ne s'applique pas pour tenir en &eacute;quilibre
                sur des cordes, des poutres, une corniche...</p>

                <p>&nbsp;</p>

                <p>Cit&eacute; de Glarnae'Reth : &eacute;quipement de Hooper</p>
