            system:
              key: baton-ferre
              description: >-
                <div title="Page 65">

                <p style="text-align: justify;">Ce magnifique b&acirc;ton,
                renforc&eacute; par des pi&egrave;ces de m&eacute;tal, est
                cisel&eacute; avec soin de symboles en langue Centaure.</p>

                <p style="text-align: justify;">Au niveau de sa poign&eacute;e,
                sous les lani&egrave;res de tissus, on peut trouver des runes
                magiques grav&eacute;es dans une configuration tr&egrave;s
                subtile.</p>

                <p style="text-align: justify;">3 fois par jour, le porteur peut
                faire gagner 1 PR &agrave; une cible que la pointe du Baton
                Ferr&eacute; de Repos touche.</p>

                <ul>

                <li style="text-align: justify;"><span style="text-decoration:
                underline;"><strong>Attaque &Eacute;puisante (L)
                :</strong></span> &agrave; la suite d'une ATT CONTACT
                r&eacute;ussie, en plus des DM de l'attaque, la cible perd 1d4+1
                PR et ressent une grande fatigue. Si la cible tombe &agrave; 0
                PR, elle est Affaiblie jusqu'&agrave; la
                r&eacute;cup&eacute;ration d'au moins un PR. La cible a le droit
                &agrave; un test de CON DD10+Mod.INT du porteur pour ne subir
                que la moiti&eacute; de la perte des PR.</li>

                </ul>

                <p style="text-align: justify;">&nbsp;</p>

                <p style="text-align: justify;">Cit&eacute; de Glarnae'Reth :
                &eacute;quipement de Wakamamae.</p>

                </div>
