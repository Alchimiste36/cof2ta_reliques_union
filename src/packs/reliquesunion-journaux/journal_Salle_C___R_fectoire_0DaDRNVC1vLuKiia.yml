      content: >-
        <div class="arran-mod" data-pm-slice="3 3 []">

        <div class="salledescr">

        <p><strong>Description :</strong></p>

        <p>Les portes s’ouvrent avec facilité et vous entrez dans une pièce de
        12m par 10m aménagée avec de longues tables en bois massif. Une
        quinzaine de chaises finement ouvragées sont positionnées devant les
        tables. Ca ressemble à une salle à manger commune.</p>

        <p>Il y a une double porte à l’Ouest et une porte simple à l’Est.</p>

        </div>

        <div class="sallemj">

        <p><strong>Notes pour le MJs :</strong></p>

        <p>La porte de l’Est est verrouillée. DEX DD20 pour l’ouvrir ou FOR DD20
        pour la forcer. PV 15 - Solidité RD4 - immunisée au feu (la clef se
        trouve dans le bureau de la salle H)</p>

        </div>

        </div>
