  - sort: 562110
    name: Clairière de l'Arbre-Mère
    type: text
    _id: ySLZ7yXZ7S7rid5l
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_arbre_mere_arriere.webp"
        width="200" height="200" /><p>Au bout d’un sentier qui a été
        particulièrement emprunté se trouve l’Arbre sacré du Val Rouge.</p><p>Un
        arbre immense au centre d’une clairière fleurie. L’arbre est entouré de
        plusieurs pierres gravées de runes elfiques, de dessins et
        représentations. Une pulsation lumineuse parcourt les gravures et monte
        le long de l’écorce de l’Arbre sacré. Toute la clairière a été piétinée
        par des groupes d’humains au vu des traces.</p><p>Des coups de haches
        ont été donnés à l’Arbre sacré et, à un endroit, un feu a été déclenché
        pour embraser le tronc sans succès.</p><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_arbre_mere.webp"
        width="200" height="200" />
