  - sort: 600000
    name: Informations SECRETES
    type: text
    _id: EcFAoaXDwOH8QlMP
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>La forêt du val Rouge est préservée depuis des milliers d'années
        grâce à d'anciens accords entre les elfes, les nains et les
        humains.</p><p>Un village d'elfes sylvains habitent cette forêt depuis
        bien longtemps.</p><p>Au coeur de la forêt se trouve une clairière et en
        son centre un gigantesque Arbre nommé Arbre-Mère parcouru de pulsations
        magiques le reliant à des dizaines de pierres gravées de runes disposées
        autour de l'arbre.</p><p>L'Arbre-Mère des sylvains protège un Temple
        construit en dessous. Il fut habité par une gardienne, sa suivante et
        dix acolytes qui gardaient caché une Relique puissante. Un bracelet
        magique mystérieux qui devait tomber dans l'oubli sans les manigances
        d'un certain Hisp Galik.</p><p></p>
