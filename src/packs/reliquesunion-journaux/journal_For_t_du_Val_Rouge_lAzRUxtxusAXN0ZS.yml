    text:
      format: 1
      content: "<h2><span style=\"font-family:Signika\">Population :</span></h2><p><span style=\"font-family:Signika\">100% d'Elfes</span></p><h2>Description :\_</h2><p>Cette étendue et dense forêt se situe dans le Nord du pays des vents, l'Ourann. Elle trône au milieu des plaines et semble infranchissable et sauvage.</p><p>A la lisière de la forêt on voit distinctement les troncs d'arbres géants qui ont donné le nom de cette forêt. Les troncs sombres ont des reflets rougeatres entre les rides de l'écorce. Au printemps cette couleur, plus intense, donne un aspect menaçant à cette forêt.</p><p>La seule partie visible de la forêt du Val Rouge qui est exploitée se trouve à l'ouest de la Cite d'Ispier où une large zone est couverte de plusieurs camps de bucherons avec les tentes, bâtiments, routes permettant l'exploitation du bois (troncs, branches, feuillage, fruits et graines).</p><p>Peu de personnes connaissent les elfes qui vivent au coeur de ce lieu et quasiment aucunes informations sur la structure sociale, politique et organisationnelle n'a percé la lisière des arbres. De temps en temps, des rencontres sont organisées entre les responsables elfes du Val Rouge, le seigneur Bonarion de la Cité d'Ispier et les exploitants de bois pour s'accorder sur les anciens traités d'exploitation de la petite partie de la forêt \"offerte\" aux humains il y a pusieurs siècles.</p><p>\_Récemment, de fortes tensions entre la Cité d'Ispier et les elfes de la forêt du Val Rouge ont éclaté. Les deux peuples sont impliqués dans une guerre faite d'escarmouches et d'assassinats. La peur et la haine grandit depuis quelques semaines.</p>"
