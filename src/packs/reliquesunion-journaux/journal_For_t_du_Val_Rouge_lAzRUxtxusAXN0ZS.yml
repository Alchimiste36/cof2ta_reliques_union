    text:
      format: 1
      content: >-
        <img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_village_ecole_de_chasse.webp"
        width="200" height="200" /><p>Malgré les dégradations et le pillage,
        l’école de chasse du village garde encore une salle fermée qui contient
        encore quelques armes elfiques (épée longues, épées courtes, arcs,
        bolas, fronde…) ainsi que quelques pièces d’armures elfiques (toutes en
        cuir, cuir clouté…). Sur un présentoir se trouve une armure de feuille
        particulièrement belle et
        gracieuse.</p><p>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.hWTNQcToxjkQ5MzZ]{École
