  - sort: 448438
    name: Village des elfes
    type: text
    _id: pLJyv8IGuN0DMDN2
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Le village des elfes du Val Rouge est dévasté, rasé, anéanti dans sa
        plus grande partie.</p><p>Les attaques récentes des soldats de la Cité
        d'Ispier ont défiguré ce qui devait être un joli village d'elfes
        sylvains. Les bâtiments sont cassés et pillés, les cadavres des elfes
        sont encore étendus sur les chemins et dans les maisons.</p><p>La forêt
        semble suspendue quand on entre dans ce lieu désolé. Aucun son, aucun
        animal, aucun mouvement. Il faudra des années pour réparer si possible
        ce village.</p><p></p><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_village.webp"
        width="200" height="200" /><p></p><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_village1.webp"
        width="200" height="200" />
