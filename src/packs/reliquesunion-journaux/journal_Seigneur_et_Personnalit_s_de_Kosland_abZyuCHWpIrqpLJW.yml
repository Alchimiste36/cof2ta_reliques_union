    text:
      format: 1
      content: >-
        <h3>Seigneur Gilduran :</h3><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Kosland/Seigneur%20Gilduran.jpg"
        width="200" /><p>Le seigneur est un personnage austère et colérique qui
        mêle parfaitement crise de rage et racisme profond.</p><p>Il n'hésite
        pas à faire des exemple parmi ces hommes, à rabrouer ses serviteurs et à
        user de son pouvoir pour obtenir ce qu'il veut. Il est violent, sadique
        et froid. </p><p>Pour la population le seigneur Gilduran est extrêment
        croyant envers Solima. En réalité son implication dans la religion est
        une stratégie payante pour étendre son influence toujours plus loin
        auprès des habitants.</p><p></p><h3>Le fils Gildarn :</h3><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Kosland/Gildarn%20fils%20de%20Gilduran.jpg"
        width="200" /><p>Dans la droite ligne de son père, Gildarn pousse le
        vice plus loin encore pour plaire au seigneur et essaye de se faire
        "respecter" par ses hommes et les habitants. On le sait coupable de
        plusieurs crimes suite à des pertes de contrôle dans des lieux de
        plaisir ou durant des beuvries. Mais personne ne saurait parler de cela
        à Kosland sous peine de se retrouver au bout d'une corde au mieux ou
        lapider en place public.</p><p>Sa haine des "races inertes" est
        viscérale et intense suite à la mort de sa mère par des Peaux Vertes et
        à l'inaction d'une compagnie de nains qui voyait la scène.</p><p>Solima
        est la religion de Gildarn et il y croit fermement. Un prêtre de Solima
        pourrait faire ce qu'il veut de lui et il y répondra
        aveuglément.</p><h3>La fille Heita :</h3><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Kosland/Heita%20fille%20Gilduran.jpg"
        width="200" /><p>Heita est moins connue que le seigneur ou son fils.
        Elle reste la plupart du temps au château apprenant les arts occultes et
        la magie sombre. Elle est quasiment muette et possède un regard perçant
        toutes âmes.</p><p>Sa rencontre récente avec le Duc Felissar de
        Miradeliu l'a rendu plus puissante et plus dangereuse que la folie de
        son frère ou de son père.</p><p>Heita méprise la religion de Solima. Son
        père a réussi à acheter son silence là-dessus  en lui fournissant toutes
        les machines ou produits qu'elle désire en échange de sa présence
        régulière aux messes et à ses faux semblants.</p><p></p><h3>Harlen, chef
        garde Kosland</h3><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Kosland/Harlen%2C%20chef%20garde%20Kosland.jpg"
        width="200" /><p>Ce chef n'a pas été choisi au hasard par le seigneur.
        Il est impitoyable et partage toutes les idées du seigneur et de son
        fils. Il pourrait tuer un bébé si on lui demandait et il aurait un
        sourire radieux si c'était un bébé elfique. Il est entouré par une
        compagnie fidèle et dévoué autant à leur chef qu'à leur
        seigneur.</p><p></p><h3>Foulquerr mage du Kosland</h3><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Kosland/Foulquerr%20mage%20du%20Kosland.jpg"
        width="200" /><p>Au service du seigneur et de la ville de Kosland,
        Foulquerr n'a pas choisi cette cité au hasard. C'est un mage assez
        médiocre en magie et en dicernement mais il partage avec la hiérarchie
        une envie compulsive de voir la race humaine gouverner les Marches du
        Venkor et peut-être même les terres d'Arran.</p><p>Il se pense
        intelligent et redoutable mais si on le vexe légèrement il peut
        réellement devenir fou et réagir sans aucun controle sur ce qu'il fait
        au risque de blesser des alliées ou des innoncents.</p><p>Ses pouvoirs
        magiques sont assez puissants pour être dangereux même s'il ne les
        utilisent pas vraiment correctement.</p><p></p><p></p><h3>Golbrey,
        lieutenant garde Kosland</h3><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Kosland/Golbrey%2C%20lieutenant%20garde%20Kosland.jpg"
        width="200" /><p>Golbrey sous ses airs renfrogné et obéïssant est l'un
        des seuls gardes du Kosland a réprouver les agissements face aux
        anciennes races de la ville. Il essaye, en preneur de grandes
        précautions, de minimiser la folie qui s'étend dans la ville.</p>
