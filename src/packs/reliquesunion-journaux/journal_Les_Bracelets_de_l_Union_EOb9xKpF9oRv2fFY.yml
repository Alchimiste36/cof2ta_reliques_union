      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Cette paire de bracelets est finement décorée par de léger fil d'or et d'argent assez discrets.</p><p>Avec une dominante de rouge, les Bracelets de l'Union se porte avec une grande diversité de vêtements sans que ça ne paraisse bizarre. Ils ne ressemblent pas à des pièces d'armure mais plutôt à des ornementations.</p><p></p><p>La voie pour les Bracelets de l'Union : <strong>@UUID[Item.jJOjvZolX6M30eZo]{Bracelets de L'Union}</strong></p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si une personne Non-Elfe active les Bracelets de l'Union :</span></strong></span></p><ul><li>Elle ressent une vibration magique qui pétille dans ses avant-bras. Elle comprend que les Bracelets veulent être activés et utilisés.</li><li><strong>Elle comprend les langages, les expressions et les écritures elfiques</strong> et peut les parler et les écrire comme si c'était sa langue natale.</li><li>Elle gagne un bonus aux <strong>Tests de CHA vs Elfes égal à 5 puis 5/Rang</strong> atteint dans cette voie.</li><li>Elle gagne un bonus aux <strong>Tests de CHA vs toutes les autres créatures égal à 2 puis 2/rang</strong></li><li>Elle n'a pas accès aux capacités des Bracelets de l'Union tant qu'ils ne sont pas activés.</li></ul><p>\_</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si une personne Elfe équipe les Bracelets de l'Union :</span></strong></span></p><p>Elle doit faire une test de CHA DD25.</p><p><strong>Réussite =</strong></p><ul><li>Migraine forte (CHA-4) pendant 1d10 heures\_après retrait des bracelets</li><li>1d6+1 DM psychique par round tant qu'il porte les Bracelets</li><li>des cauchemars et angoisses harcèle la personne pendant 1d4 jours par round équipé (aucun PR récupéré par nuit de sommeil).</li></ul><p><strong>Raté =</strong></p><ul><li>inconscient pendant 4d10 heures après retrait des bracelets</li><li>CHA-2 permanent</li><li>Traumatisme (cauchemars, peurs, angoisses...) pendant 4d10 jours (aucun PR récupéré par nuit de sommeil).</li></ul><p>\_</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Les Capacités :</span></strong></span></p><ul><li>Les capacités des Bracelets de l'Union fonctionne contre les Elfes purs ou mélangés.</li><li>Si le porteur les utilise contre une cible d'une autre race, la capacité fonctionne au prix de 1d4/Rang de la capacité utilisée points d'intelligence ou de Sagesse en malus (la caractéristique est choisie au hasard. Le porteur récupère un point par journée entière passée à se reposer sans utiliser une seule capacité des Bracelets. Ces malus ne sont pas soignables avec le repos naturel. Seul des effets de soins magiques permettent de les récupérer.</li><li>Le MJ note secrètement les jauges de FANATISME et de DÉVOTION du Porteur. Référez-vous à la table des Reliques pour connaitre les effets des seuils passés.</li><li><p></p></li></ul><p>\_<span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Activer les Bracelets de l'Union :</span></strong></span></p><p>Il y a deux moyens de les activer :</p><ul><li><p><strong>Voie du Fanatisme</strong> : il faut tuer un elfe volontairement en portant les bracelets. Lorsque que les bracelets sont activés dans cette voie, le porteur gagne immédiatement 10 points de FANATISME</p></li><li><p><strong>Voie de la Dévotion</strong> : il faut aider volontairement un elfe qui est en danger. Le danger peut être de plusieurs natures (dégâts, traumatisme psychologiques, grande tristesse ou détresse, précarité forte…). Lorsque les bracelets sont activés dans cette voie, le porteur gagne immédiatement 10 points de DÉVOTION.</p></li></ul><p>Quelle que soit la voie, le porteur peut dès que les bracelets sont activés avoir accès au RANG 1 des Bracelets.</p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Augmenter les Bracelets :</span></strong></span></p><p>Pour acquérir les rangs suivants, le porteur doit utiliser les capacités des Bracelets et de ce fait un certain total de points de FANATISME et de DÉVOTION cumulés. Cela ne fonctionne pas si le porteur utilise les capacités sans aucun effet (les activer dans le vide).</p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Les jauges de FANATISME et de DÉVOTION :</span></strong></span></p><p>Si une des jauges devient réellement dominante sur l'autre (3/4 vs 1/4), le porteur n'aura plus accès aux capacités de la jauge minoritaire et il commencera à ressentir les effets de DOMINATION des Bracelets de l'Union.</p><ul><li><p>Pour atteindre le <strong>Rang 2 : 50</strong> points cumulés</p></li><li><p>Pour atteindre le <strong>Rang 3 : 120</strong> points cumulés</p></li><li><p>Pour atteindre le <strong>Rang 4 : 210</strong> points cumulés</p></li><li><p>Pour atteindre le <strong>Rang 5 : 400</strong> points cumulés</p></li></ul><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Effets de DOMINATION :</span></strong></span></p><ul><li><p><strong>Voie du FANATISME :</strong> une rage sombre commence a entrer dans les veines du Porteur. Il fait de plus en plus de rêves de pouvoir et de massacre sur les elfes. Il se voit en Souverain de ce peuple inférieur et il aura des pulsion de menace, d'agression ou de violence envers la plupart des elfes qu'il croisera. Il prononcera des injures racistes et des menaces dans ses propos. En quelques jours, il devient affecter par cet effet et ne pourra le retirer qu'en rééquilibrant les deux jauges (minimum 50/50). Lors d'une interaction avec un elfe, <strong>le porteur a 60% de chance de rentrer en Rage</strong> (plus ou moins en fonction de la relation entreprise (90% envers un elfe hostile ou méprisant / 40% envers un elfe allié ou particulièrement amical)). <strong>Cette rage se traduit par un bonus à toutes les attaques vs elfes de +3, une réduction des dégâts portés par les elfes de moitié et 30% de chance d'utiliser les capacités de FANATISME des Bracelets à chaque fois qu'il le peut</strong>. Il ne peut pas sortir de sa rage tant que l'elfe n'est pas mort ou en réussissant un test de SAG DD25-1/round de rage)</p></li><li><p><strong>Voie de la DÉVOTION :</strong> Une aura de bienveillance envers les elfes commence à envahir le porteur. Il rêve de plus en plus de leur souffrance et de leurs malheurs. Il se voit en gardien de cette culture, en ange gardien de ce peuple. Des pulsions de d'aide, de protection, d'empathie ou d'amour envers les elfes commenceront à l'animer. Il prononcera des propos mielleux et lyrique dans ses propos. En quelques jour, il devient affecter par cet effet et ne pourra le retirer qu'en rééquilibrant les deux jauges (minimum 50/50). Lors d'une interaction avec un elfe, <strong>le porteur a 60% de chance de rentrer en empathie</strong> (plus ou moins en fonction de la relation entreprise (90% si l'elfe est amical / 40% envers un elfe hostile ou méprisant)=. <strong>Cette empathie se traduit par un bonus de +3 en DEF, en ATT et aux DM quand le porteur s'interpose pour protéger un elfe et 30% de chance d'utiliser les capacités de DÉVOTION des Bracelets à chaque fois qu'il le peut.</strong> Il ne peut pas sortir de son empathie tant que l'elfe est en danger physique ou psychologique ou en réussissant un test de SAG DD25-1/round d'empathie)</p></li></ul><p></p><p></p>"
