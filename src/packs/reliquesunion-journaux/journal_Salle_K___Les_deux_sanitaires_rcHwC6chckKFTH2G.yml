      content: >-
        <div class="arran-mod">

        <div data-pm-slice="3 3
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}}]">

        <div class="salledescr">

        <p><strong>Description :</strong></p>

        <p>Lorsque vous ouvrez la porte, vous sentez une légère odeur de fleurs.
        Une petite sensation de bien-être et de propreté. Vous distinguez de
        suite sur le mur d’en face, de cette pièce de 6m par 4m, quatre runes
        élémentaires gravées. D’un côté du mur, vous apercevez un banc de
        latrines en bois poli et de l’autre côté un assez grand bassin rempli
        d’une eau fraîche et limpide coulant d’une petite fissure au mur.</p>

        </div>

        <div class="sallemj">

        <p><strong>Notes pour le MJs :</strong></p>

        <p>Si le groupe regarde dans les latrines, ils voient une petit cours
        d’eau passant à une trentaine de centimètre sous le sol et permettant
        l’évacuation des déjections.</p>

        </div>

        </div>

        </div>
