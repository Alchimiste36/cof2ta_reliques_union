                system:
                  key: sac-a-dos
                  description: >-
                    <p>Ce sac &agrave; dos en cuir se compose d'une grande poche
                    qui se ferme avec une sangle &agrave; boucle et peut
                    contenir environ 60 litres de mat&eacute;riel. Certains ont
                    une ou plusieurs poches suppl&eacute;mentaires sur les
                    c&ocirc;t&eacute;s.<br><br><strong><em>Sac &agrave; dos de
                    ma&icirc;tre.</em>&nbsp;</strong>Ce sac &agrave; dos est
                    pourvu de nombreuses poches dans lesquelles conserver des
                    objets bien utiles quand on part &agrave; l'aventure. Il
                    inclut &eacute;galement des crochets permettant d'accrocher
                    des objets tels que des&nbsp;gourdes, des sacoches, voire
                    m&ecirc;me une&nbsp;couverture&nbsp;enroul&eacute;e. Il est
                    pourvu de lani&egrave;res matelass&eacute;es &agrave;
                    accrocher en travers de la poitrine et &agrave; la taille
                    afin de mieux r&eacute;partir le poids. Comme pour le sac
                    &agrave; dos ordinaire, la poche principale peut contenir
                    environ 60 litres de mat&eacute;riel. Lorsque le personnage
                    porte un sac &agrave; dos de ma&icirc;tre, il rajoute +1
                    &agrave; son score de&nbsp;Force&nbsp;lorsqu'il calcule
                    la&nbsp;charge&nbsp;qu'il peut transporter.</p>
