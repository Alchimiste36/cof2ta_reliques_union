              - name: Scie
                type: item
                img: icons/containers/chest/chest-small-gold-cherry.webp
                system:
                  key: scie
                  description: >-
                    <p>Les scies peuvent prendre diff&eacute;rentes formes, de
                    la petite scie de charpentier &agrave; la longue scie
                    &agrave; deux mains qu'utilisent les b&ucirc;cherons. Le
                    personnage peut ins&eacute;rer une scie entre une porte et
                    son encadrement pour couper les verrous ou les barres en
                    bois.</p>

