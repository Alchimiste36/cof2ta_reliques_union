  - type: text
    name: Parchemin Salle Arkanov
    _id: 5Lc6bPV99qIIS1K9
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Dans ces 30 parchemins enroulés ensemble et maintenus par une fine
        lanière de cuir on trouve :</p><ul><li><p><strong>Un texte expliquant le
        rôle de la création du Village d'Arkanov.</strong> Ces pages expliquent
        la découverte de la cité d'Esdavia et des faux-dieux qui contrôlent et
        manipulent les différents peuples des Terres d'Arran, l'expédition
        réalisée par le récent Ordre de l'Union, la récupération des Reliques,
        la création du Village d'Arkanov et son rôle de faire oublier la
        Ceinture de l'Union afin qu'elle ne tombe pas entre les mains de
        personnes mal intentionnées.</p></li><li><p><strong>Un texte explique
        l'utilisation des Objets magiques du village.</strong> Les pages
        détaillent les pouvoirs et la manipulation de l'Orbe Élementaire, du Duo
        de marteau de Silence et de la cloche, de l'Alambic, des Equipements de
        la Forge, du Portail du l'Union…</p></li><li><p><strong>Une page raconte
        l'événement survenu dans le village avec un démon qui a prit possession
        de trois centaures en 8934 après le Grand Schisme.</strong> Le rédacteur
        explique qu'ils ont réussi à le détruire mais ne mentionne pas la
        communication avec le Temple du Val Rouge.</p></li><li><p>U<strong>ne
        page explique un événement survenu en 8536 après le Grand Schisme lors
        duquel l'Orbe Élémentaire est devenu incontrôlable.</strong> Elle a jeté
        sur le village un climat glaciale parsemée de blizzard et de vents
        violents pendant environ une semaine. Cette mauvaise manipulation a
        causé de nombreux dégâts et couté la vie à 6
        centaures.</p></li><li><p><strong>Datée de 9656 après le Grand Schisme,
        une page donne les raisons qui ont poussé le chef du village et les
        responsables de 8 familles principales à ne plus parler de la salle
        secrète, de la Relique de l'Union, de la manière d'ouvrir la grotte et
        du rôle initial du village.</strong> Les anciens ont considéré que
        l'oubli était arrivé et qu'il était de leur devoir de finir leur mission
        une bonne fois pour toute. Le choix a été aussi justifié par l'envie
        croissante des jeunes centaures de prendre leur liberté et de quitter le
        village. Ce "risque" de voir des centaures parcourir le monde avec la
        connaissance de la Relique était trop lourd à porté pour les
        anciens.</p></li><li><p><strong>@UUID[JournalEntry.uX1gbCAXqhUSogix]{Une
        page parfaitement enluminée} comporte seulement 5 visages en face de 5
        noms et une simple phrase :</strong> un beau visage d'une elfe au traits
        marqués par les siècles nommée Faïlass / Une Naine au regard déterminé
        et à la mâchoire carrée nommée Tissra / Un Orc souriant et assez jeune
        nommé Darrag / Une Centaure au visage très fin avec un regard perçant et
        une longue chevelure châtain nommée Tuatahi / Un Humain assez vieux à la
        peau sombre et borgne dont le visage est recouvert de multiples
        cicatrices nommé Sura. La phrase est écrite en langage Centaure et peut
        être traduite par : <strong>"Flambeaux guidant les Peuples d'Arran, la
        corruption du Démon Immortel n'a pas réussi à éteindre votre lumière.
        Vous avez donné votre vie pour l'harmonie et dans l'oubli votre coeur ne
        pourra plus manipuler".</strong></p></li><li><p><strong>Une page est
        signé "Chef Kaumatua" et est daté de 9652 Après le Grand
        Schisme.</strong> La page semble écrite sans préparation et avec
        beaucoup d'émotion. <strong>Le chef donne son avis sur l'avenir du
        village d'Arkanov et son "souhait" pour son peuple.</strong> D'après
        lui, Arkanov peut devenir un havre de paix au milieu des montagnes. Il
        imagine un village ouvert à tous non loin de l'actuel village dans la
        forêt et les échanges que cela pourraient créer avec les villes humaines
        qui se développent dans la région, les tribus de Peaux Vertes et même
        les colonies naines exploitant certaines mines de la région. Le village
        principal serait sauvegardé et en grande partie caché. Certains
        centaures audacieux pourraient sortir des montagnes pour découvrir le
        monde et partager les savoirs et fabrications centaures avec les autres
        peuples. Il semble ému et évoque ces trois créations qui permettraient
        d'aider à la création de ce nouvel âge pour Arkanov : un pendentif, des
        sphères et une ceinture.</p></li><li><p>Au centre du rouleau, une
        dernière page contient seulement quelques phrases : "<em><strong>Le
        Démon Immortel, emprisonné dans son cercueil, survit par sa corruption
        des Reliques. Pour la paix, la responsabilité de chaque peuple est de
        résister à son Ombre persistante, cherchant la division, la haine et la
        manipulation. Le concept de "Race Inerte" n'existera jamais et aucun
        peuple, aucune culture ne sera JAMAIS supérieure aux autres. Le
        Tel'Quessir sera, je l'espère, le début d'un ère d'espoir. Contre la
        Fascination, l'Union ! - 8265 GS - Tuatanii Architecte du Sanctuaire
        d'Arkanov</strong></em>"</p></li></ul>
