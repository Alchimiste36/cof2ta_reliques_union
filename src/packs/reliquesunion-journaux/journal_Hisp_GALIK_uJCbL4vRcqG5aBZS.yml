      content: >-
        <p>Homme élégant et au maintien droit, Hisp GALIK est le principal
        conseiller du seigneur @UUID[JournalEntry.YZBFIHMD2pPy6DVS]{Jaspar
        Bonarion} de la @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité
        d'Ispier}.</p><p>Il n'est pas très costaud à première vue mais une
        certaine autorité émane de lui.</p><p>Le seigneur Bonarion l'a présenté
        comme le Mage GALIK.</p><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Hisp%20GALIK%202.jpg"
