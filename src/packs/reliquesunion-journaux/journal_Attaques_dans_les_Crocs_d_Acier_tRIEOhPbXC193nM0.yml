      content: "<h3>Information envoyée par l’archiviste de la bibliothèque de Blanche Paix\_:</h3><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">Depuis 702 CA, des marchands, voyageurs et autres habitants de la région rapportent le nouveau danger qui sévi dans les montagnes. La nuit, les campements se font attaquer. Certains soldats ou gardes sont tués et à chaque fois certaines personnes se font kidnapper. Quelques marchandises sont dérobées mais la plupart du temps les attaques sont trop rapides et les ennemis s’enfuient dès que leurs cibles sont attrapées.</p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">Des chasseurs du Ravin de Novrak ont commencé à parler d’Ombres blanches car le peu de personnes ayant pu apercevoir cette menace ont décrit des silhouettes aussi menue que des elfes et à la peau blanche comme la craie.</p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">Une enquête a été demandée mais la faible fréquence des attaques et la difficulté de trouver un rythme d’attaque ou d’estimer la zone des prochaines escarmouches ont rendu impossible le pistage des Ombres Blanches.</p>"
