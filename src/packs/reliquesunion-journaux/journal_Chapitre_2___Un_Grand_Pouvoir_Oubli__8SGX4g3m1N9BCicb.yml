      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    Le sauvetage de Lana’Sir et des rescapés du village des\_elfes sylvains va plonger le groupe de Héros dans une\_histoire bien plus ancienne et complexe que cette\n    simple\_course-poursuite.\n  </p>\n  <p>Les discussions avec Lana’Sir, Falika Rosna et Laotissa Graine Dépeautre vont révélés aux PJs leur prochaine\_mission, de la plus haute importance.</p>\n  <p>\n    Lana’Sir pense que Hisp Galik est responsable du\_conflit avec les elfes sylvains mais ne comprend pas ses\_motivations profondes. Grâce à leur «gentillesse» ou leur\_«honneur»,\n    Laotissa va révéler aux aventuriers le secret\_caché dans la forêt du Val Rouge. Un temple ancien garde\_une Relique ancienne protégée depuis des siècle pour\_ne pas tomber dans\n    de mauvaises mains. Sa puissance\_est trop dangereuse pour les Terres d’Arran et Laotissa\_pense que les tensions entre les humains et les elfes sont\_une couverture pour accéder\n    au temple.\n  </p>\n  <p>\n    Face à ces révélations, Lana’Sir et Falika Rosna pensent\_qu’il faut agir pour protéger cette relique recherchée par\_Hisp Galik ou une organisation prête à tout pour l’obtenir.\n    Elles motiveront les PJs a s’impliquer dans cette\_histoire.\n  </p>\n  <p>Les PJs devront retourner rapidement dans le village\_du Val Rouge, accéder au temple sous l’Arbre-Mère et\_trouver la relique afin de la garder en sécurité.</p>\n  <p>Pendant ce temps, Lana’Sir conduira les survivants\_sylvains à la Cité d’Orkadia pour défendre leur droits\_devant le seigneur responsable de cette région de\_l’Ourann.</p>\n  <hr />\n  <p></p>\n  <h1>Explications</h1>\n  <p>\n    Le Temple du Val Rouge a été construit pour cacher\_un Bracelet magique et puissant. Habité par douze elfes\_sylvaines pendant des siècles, elles attendaient que le\_souvenir des\n    Reliques de l’Union s’effacent et tombent\_dans l’oubli.\n  </p>\n  <p>\n    Le Bracelet de l’Union, une fois activé, permet de\_manipuler le peuple elfe. Soit par l’asservissement pour\_les réduire en esclavage soit par la dévotion pour émanciper ce\n    peuple, le remplir d’espoir et de courage.\n  </p>\n  <p>\n    Il y a plus de 1 700 ans, un groupe de cinq personnalités, un elfe, un nain, un humain, une centaure et un orc,\_utilisait les Reliques de l’Union pour asservir des\n    milliers\_d’habitants d’une ville nommée Esdavia. Située dans les\_montagnes des Rocs Exsangues, les faux-dieux d’Esdavia\_avait un pouvoir absolu sur les différents peuples\n    habitant\_la ville. Après la découverte de ce fanatisme, l’Ordre de\_l’Union fut créé pour attaquer les faux-dieux, récupérer\_les Reliques de l’Union, les remettre à leur peuple\n    respectif et les cacher à l’abri des mauvaises intentions.\n  </p>\n  <p>\n    Amanori Bellara a trouvé le Plastron de l’Union dans\_les montagnes de l’Ogrie et l’utilise depuis des années les\_Peaux Vertes des villages de la région. Submergée par\_sa\n    puissance, Amanori apprend l’existence d’une autre\_relique et ordonne à Hisp Galik de la trouver et de lui\_ramener afin d’avoir le même pouvoir sur les elfes.\n  </p>\n  <p>\n    Le Temple du Val Rouge a été abandonné par la\_Gardienne, la suivante et les acolytes il y a presque 1000\_ans laissant le secret de la Relique enfermé sous l’ArbreMère. La\n    suivante du Temple a été envoyée dans le village\_pour insuffler les légendes et rituels autour de cette forêt\_et partager avec la chaman une partie des informations\_permettant\n    d’accéder au Temple en cas de nécessité.\n  </p>\n  <p>Le médaillon et la comptine de Laotissa sont les clefs\_permettant d’ouvrir l’accès au Temple mais même cette\_jeune elfe ne sait pas exactement comment procéder.</p>\n  <p>\n    Les PJs découvriront dans le temple du Val Rouge de\_nombreuses informations sur cette histoire sans pour\_autant pouvoir faire de liens précis pour le moment. Ils\_trouveront le\n    récit de l’affrontement des elfes de l’Ordre\_de l’Union contre le faux-dieux Izareaa et\_ comprendront\_comment ouvrir la porte secrète et obtenir le Bracelet\_de l’Union. Les\n    informations complémentaires trouvées\_dans le Temple et les carnets de la Gardienne permettront de commencer des recherches approfondies pour\_la suite de l’aventure.\n  </p>\n  <hr />\n  <h1>Attentions particulières</h1>\n  <p>\n    Les PJs ne devront pas avoir d’informations précises\_sur la Relique de l’Union. Ils pourront faire des\_déductions mais devront être perdus lors de l’ouverture\_de la salle\n    secrète du Temple.\n  </p>\n  <p>\n    Entre la «machine du Val Rouge», les objets présents\_dans les coffres et le Bracelet, ils devraient se poser des\_questions et se creuser la tête. Le surplus d’informations\n    récoltées dans la Temple est volontaire\_pour plomber le groupe de PJs dans cette\_grande histoire.\n  </p>\n</div>"
