      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    Une fois passé le fleuve Qolos et avancé d’environ 50 kilomètres vers l’Ouest, le groupe de PJs peut rejoindre la Grande Route de l’Ourann. Si les PJs ont encore leurs\n    Sanpurochs à l’arrivée au abord de la Grande Route, les gardes des tours naines les ciblent et se méfient du groupe. Si, en plus, certains sont des Peaux Vertes, ils auront\n    plus de mal à passer les défenses. Beaucoup de diplomatie ou intimidation ou corruption.\n  </p>\n  <blockquote>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grande_route_de_l_ourann3.webp\" width=\"100\" height=\"100\" />\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grande_route_de_l_ourann1.webp\" width=\"100\" height=\"100\" />\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grande_route_de_l_ourann4.webp\" width=\"100\" height=\"100\" />\n    <p>\n      Après votre débarquement sur la rive ouest du fleuve Qolos, vous parcourez une cinquantaine de kilomètres dans les plaines de l’Ourann et vous arrivez devant l’un des plus\n      ambitieux projets des Terres d’Arran. Vous en avez entendu parlé mais le voir devant vos yeux est un spectacle d'ingénierie fascinant. La Grande Route de l’Ourann ! Une route\n      droite comme le tranchant d’une épée forgée par un maître forgeron nain. Une largeur de plusieurs dizaines de mètres, des tours de garde tout le long. Au loin, vers le sud,\n      vous observerez une colline éventrée par la route et vers le nord, vous distinguez déjà un pont de pierre qui passe par-dessus une large crevasse.\n    </p>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier4.webp\" width=\"100\" height=\"100\" />\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier1.webp\" width=\"100\" height=\"100\" />\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier2.webp\" width=\"100\" height=\"100\" />\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier3.webp\" width=\"100\" height=\"100\" />\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier5.webp\" width=\"100\" height=\"100\" />\n    <p>\n      Lorsque vous vous rapprochez de la route, vous voyez, au pied et en haut de la tour la plus proche, des guerriers nains du Bouclier qui s’agitent et se mettent en position.\n    </p>\n    <p>\n      En plus de quelques arbalétriers sui se trouvent en haut de tours mobiles aux abords du chantier, 6 nains du bouclier se dressent devant vous, armes en main, en position de\n      combat.\n    </p>\n    <p>Un nain qui semble plus gradé s'approche à bonne vitesse de votre groupe, le visage fermé.</p>\n  </blockquote>\n  <div>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/chef_protecteur_barum.webp\" width=\"100\" height=\"100\" />\n    <p class=\"discussion\">Chef protecteur Barum, déclinez votre identité, rebroussez chemin ou périssez !</p>\n    <p><br /></p>\n    <p><strong>Si les PJs sont agressifs,</strong> ils peuvent finir en prison voir en phase de combat.</p>\n    <p><strong>Si les PJs sont amicaux et qu'ils expliquent qu'ils veulent empreinter la route,</strong> Barum leur explique les règles :</p>\n    <p>\_</p>\n    <div class=\"discussion\">\n      <ol>\n        <li>\n          <p>\n            <strong>Laissez les travailleurs travailler est la règle première</strong>. Tout au long de la route des postes de gardes et d'observation vous tiennent à l'oeil et\n            protège la voie.\n          </p>\n        </li>\n        <li>\n          <p>\n            <strong>Portez TOUJOURS votre laisser passer apparent sur vous ou votre \"monture\"</strong> (il regarde les Sanpurock d'un oeil sévère). Si un garde doit vous arrêter\n            car il n'a pas vu votre laisser passer, vous devrez payer.\n          </p>\n        </li>\n        <li>\n          <p><strong>Régulièrement vous trouverez des tente portant un blason jaune à l'entrée</strong>. Vous pourrez vous reposer et manger dedans ou aux alentours proches.</p>\n        </li>\n        <li>\n          <p>\n            <strong>Il est strictement interdit de s'arrêter sur la voie centrale</strong> (il désigne les deux lignes de pierres plus sombres qui délimitent la Grande Route en\n            trois parties) et on se range à droite si on se fait rattraper par une caravane ou un cavalier.\n          </p>\n        </li>\n        <li>\n          <p>\n            <strong>Tous les conflits entre usagers devront être signalés et statuer par des Gardes de la Grande Route</strong>. Aucune justice ne saurai être rendu par les\n            usagers.\n          </p>\n        </li>\n        <li>\n          <p>A chaque fois que vous quitterez la Grande Route, <strong>vous devrez rendre votre laisser passer à un poste de garde</strong>.</p>\n        </li>\n      </ol>\n      <p>Si ces règles sont comprises, même par les plus idiots de votre … groupe, il ne vous reste plus qu'à payer 20pa par laisser-passer.</p>\n    </div>\n    <hr />\n    <p><strong>Laissez les PJs réagirent.</strong></p>\n    <p>\n      <strong>Si une personne joue au malin, est malpoli, trop méprisant…</strong> Les 6 gardes se rapprochent du groupe menançant et le chef Protecteur Barum se retourne,\n      s'éloigne en disant :\n    </p>\n    <p class=\"discussion\">Allez vous faire grailler le joufflu dans les Plaines du Pays des Vents et ne me briser plus les noix.</p>\n    <p>\_</p>\n    <p>Il sera impossible au groupe de se faire entendre d'une quelconque manière et s'ils s'obstinent l'un des garde les prévient :</p>\n    <p class=\"discussion\">\n      Je serais vous je partirais avant qu'on nous donne l'ordre de vous mettre aux arrêts ou bien pire que ça. A la vue de votre dégaine, vous n'avez aucune chance alors partez.\n    </p>\n    <p>\_</p>\n    <p>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs n'ont pas de Laisser-passer</span></strong></span><strong>, ils mettrons 16 jours pour atteindre la Forêt du Val Rouge</strong> (au lieu de 12,5 jours). Ils rencontreront plusieurs pépins (attaque d'animaux sauvages,\n      blessures après une chute, compagnie d'orc aperçue au loin donc impossible de s'arrêter pour dormir…). Leur faire comprendre que leur manque de diplomatie peut leur couter la\n      vie.\n    </p>\n    <p>\_</p>\n    <p>\n      <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs obtiennent un Laisser-passer :</span></strong></span><strong>\_</strong>\n    </p>\n    <p><strong>@UUID[Compendium.world.reliquesunion-objets.Item.zTbvnwmY2exeXZxQ]{Laisser-passer de la Grande Route de l'Ourann}</strong></p>\n    <blockquote>\n      <p>le voyage sur la Grande Route de l’Ourann est d’une <strong>simplicité et d’un confort superbe</strong>.</p>\n      <p>\n        <strong>Les experts du temple et les artisans de la Forge, les gardes du Bouclier, les contremaîtres du Talion et beaucoup de main-d’oeuvre humaine sont au travail pour avancer\n          cette route titanesque qui traverse l’Ourann de Draz-Kazar à la forteresse d’Akar-Bram</strong>. Le chantier est gigantesque et les machines sont plus grandes que des palais. Sur le côté du chantier,\n        <strong>on distingue de nombreuses tentes pour les ouvriers et les compagnies qui protègent le chantier.</strong> L’herbe est piétinée, des piles de matériaux sont\n        entreposées à perte de vue et un boucan se fait entendre à des kilomètres à la ronde.\n      </p>\n      <p>\n        Vous remarquez que <strong>les usagers que vous croisez sur la Grande Route ne portent pas tous le même Laisser-passer</strong> (pas la même forme ni le même dessin). Vous\n        y croisez des Hommes, des Elfes, des Orcs et même des Gobelins. A chaque arrêt pour manger ou pour la nuit,\n        <strong>on vous regarde à peine et chacun s'occupe de sa propre gamelle.</strong> Des petits commerçants essayent de vous vendre des babioles ou vous propose leurs services\n        mais jamais ils ne sont trop insistants ou agressifs.\n      </p>\n      <p>\n        <strong>A trois autres endroits de la Grande Route, vous approchez d'une section en construction et vous êtes guidez vers une route secondaire protégée et stabilisée</strong>\n        longeant le chantier pendant plusieurs dizaines de kilomètres avant de rejoindre une autre section terminée de la Grande Route.\n      </p>\n      <p>\n        A de nombreux moments, <strong>la route s'élargit sur environ 200m avec de grandes parties stabilisées de chaque côté.</strong> Des panneaux sont disposées de part et\n        d'autres indiquant les directions (Port de Tureyn, le nom de plusieurs petites villes…).\n      </p>\n      <p>\n        <strong>Après 5 jours de voyage, vous distinguez à l'est les fumées s'élevant de la Cité d'Eskar</strong> et de la Route vous apercevez les fortifications de la ville\n        humaine. Le lendemain en fin de journée, à l'horizon à l'Est <strong>vous pouvez voir le toit de certaines tour de la forteresse Etat de Krüg-Daraz</strong>.\n      </p>\n      <p>\n        A une allure assez intensive, vous mettez 9 jours à atteindre le bout de la Grande Route de l’Ourann qui s’arrête à environ 150 kilomètres du sud de la Forêt du Val Rouge.\n      </p>\n    </blockquote>\n  </div>\n</div>"
