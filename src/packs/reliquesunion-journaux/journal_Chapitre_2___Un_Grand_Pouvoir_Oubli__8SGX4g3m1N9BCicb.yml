        <div class="journal-cof2ta-ru">
          <h1>Lavoise</h1>
          <div class="description">
            <p class="paragraphe">
              La ville de Lavoise est positionnée au bord du fleuve Qolos, sur une bande de terre qui donne l'impression de percer le cours de l'eau.
              <strong>Une muraille de taille raisonnable protège la ville des attaques de Peaux Vertes</strong> venant des plaines de la Birkanie. Les toitures sont toutes faites de
              pierres bleutées qui rayonne sous les rayons du soleil. <strong>La chose la plus étonnante avec Lavoise c'est la végétation au coeur même de la ville</strong>. Comparé aux
              champs agricoles qui bordent la muraille et les grandes plaines clairsemées de Birkanie, <strong>Lavoise semble luxuriante</strong>. Du haut de la colline, on peut facilement
              remarquer <strong>l'effervescence de la ville et de son port</strong>. Autour de celui-ci, deux collines abruptes sont surmontées de bâtiments. A l'Ouest, une enceinte
              protège une belle demeure noble et à l'Est, un phare haut et élégant. De l'autre côté du fleuve,
              <strong>on voit à peine la berge et on peut percevoir à l'horizon des quais, bâtiments et routes qui partent vers l'Ourann</strong>, le Pays des Vents.
            </p>
            <p class="paragraphe">
              A fur et à mesure que l'on s'approche de cette ville, on peut remarquer les traces d'architecture naine qui sont visibles sur les tours des murailles, sur les pilonnes de
              soutènement, sur l'arche au-dessus de la porte nord ou encore sur la forme des dalles au sol lorsque l'on entre dans la cité.
            </p>
            <p class="paragraphe">Cette ville doit être construite sur les ruines d'un ancien village nain d'où sa faculté à résister aux attaques des tribus alentours.</p>
          </div>

          <img src="modules/cof2ta_reliques_union/assets/ru_lieux/lavoise/lavoise3.webp" width="100" height="100" />
          <p class="paragraphe">
            Les PJs arrivent par la porte du Nord, en fin d'après-midi (le soleil est sur le point de se coucher) et directement sur leur gauche, ils entendent les chants et les rires
            s'échappant d'une taverne. L'enseigne indique "la Taverne des chants de l'Ourann". Les maisons aux alentours sont bien entretenues et particulièrement modernes. Tout est bien
            organisé à Lavoise.
          </p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.JeFlIRMgcdohuK3j]{Lavoise}</p>
          <hr />
          <img src="modules/cof2ta_reliques_union/assets/ru_lieux/lavoise/lavoise_centre1.webp" width="100" height="100" />
          <p class="paragraphe">
            La belle demeure en haut de la colline <strong>au Sud-Ouest est une école d'érudit fermée au public</strong> <strong>sauf pour des contrats</strong> (recherche d'information,
            traduction, lecture de texte, écriture de lettre…). La responsable est <strong>une elfe du nom de Falika Rosma</strong>. Même si ce n'est pas son travail principal, elle aide
            souvent pour les soins et l'éducation des enfants présents dans la pension "les Bras de la Mère" et pour les habitants de Lavoise.
          </p>
          <hr />
          <img src="modules/cof2ta_reliques_union/assets/ru_lieux/lavoise/lavoise_centre3.webp" width="100" height="100" />
          <p class="paragraphe">
            <strong>Le port est aussi un lieu très mouvementé à Lavoise.</strong> Il n'est pas un moment où quelqu'un ne vide ou ne remplisse un bateau, une barque ou une charrette avec
            des marchandises en tout genre. A l'Est de la Porte Sud, <strong>un grand bâtiment sert à organiser les aller et venues et à collecter les taxes.</strong> A tout moment du jour
            et de la nuit, <strong>le port, et en particulier la capitainerie, sont protégés par des gardes lourdement armés</strong> qui prennent leur tâche très au sérieux. C'est un
            honneur, dans une ville qui se développe autour du commerce maritime d'être le gardien de l'économie.
          </p>
          <hr />
          <p class="paragraphe">
            Pour finir, <strong>le phare sur la colline du Sud-Est donne un point de vue panoramique sur les terres et sur le fleuve</strong>. Du haut de ce bâtiment solide et de belle
            facture, on distingue beaucoup les rives de l'Ourann à l'horizon. Un immense tas de bois bien préparé peut être allumé à n'importe quel moment, en cas de brouillard dense ou de
            problème.
          </p>
          <hr />
          <p class="paragraphe">
            <strong>Quelque soit les envies et les réactions des PJ, Lana'Sir les pousse à se rendre au plus vite à
              l'@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.JeFlIRMgcdohuK3j.JournalEntryPage.pLJyv8IGuN0DMDN2]{École Rosna} pour mettre à l'abri les
              sylvains et pouvoir enfin se sentir protégée.</strong>
          </p>
          <p class="paragraphe">
            Si les PJ prennent leur temps ou veulent faire des choses à Lavoise avant, elle bougonne, s'énerve et dirige le choriot et les elfes vers la colline sud-ouest. En fonction de
            la réaction des PJ, ils se difficile pour eux d'entrer chez Falika Rosna voir ils seront chassés par elle.
          </p>
          <p class="paragraphe">Dans ce dernier cas, il faudra que les PJ trouvent de bonnes idées pour reprendre le cours normal de la campagne.</p>

          <hr />
          <h2>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.JeFlIRMgcdohuK3j.JournalEntryPage.pLJyv8IGuN0DMDN2]{L'École Rosna}</h2>
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/lavoise/lavoise_ecole_rosna1.webp" width="100" height="100" />
            <p class="paragraphe">
              Vous suivez Lana'sir en direction de l'École Rosna. <strong>Elle semble très à l'aise dans la ville de Lavoise.</strong> En cette fin de journée, les rues sont agitées et
              nombreux sont les passants ou commerçants qui se retournent pour vous observer. Vous passez devant une belle église, des auberges plus ou moins chics, une place de marché en
              train de remballer leurs stands ou encore un magasin d'équipement nommé “A tout faire”. Arrivé au pied de la colline de l'ouest, Lana'sir s'engage sur la route en lacet qui
              monte vers la belle propriété de Falika Rosna. Les deux tours de guet entourant la grande porte sont allumées et la petite porte intégrée dans la grande est ouverte.
            </p>
            <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/lavoise/shanni.webp" width="100" height="100" />
            <p class="paragraphe">
              Vous distinguez, dès que vous entrez, une grande cour entourée de fortifications protégeant quatre grands bâtiments nobles très bien entretenus.
              <strong>La porte du bâtiment principal s'ouvre et une jeune femme avec un grand sourire s'approche du groupe.</strong> Elle porte des lunettes fines et des habits très jolis.
              Elle tient à la main un carnet et une sorte de stylo.
            </p>
          </div>
          <p class="paragraphe"></p>
          <p class="discussion"><span class="discu-acteur">Shanni :</span> Bonjour à vous, comment l'École Rosna peut-elle vous apporter de l'aide ou des connaissances ?</p>
          <p class="paragraphe"><br /></p>
          <p class="paragraphe">
            <strong>La jeune fille prend en note chaque mot énoncé par les PJs ou Lana'sir de façon rapide et avec une belle écriture.</strong> Si les PJs parlent trop vite ou tous
            ensemble, elle leur demande de répéter ou de ralentir leur propos.
          </p>
          <p class="paragraphe">
            Au bout de la conversation, le groupe est amené dans l'accueil du bâtiment principal et Shanni, la jeune femme, leur apporte de la nourriture et des boissons.
          </p>
          <p class="paragraphe">Quelques minutes plus tard, <strong>Falika Rosna entre avec entrain et s'approche à grandes enjambées de Lana'sir pour la serrer dans ses bras.</strong></p>
          <hr />
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/lavoise/falika_rosna1.webp" width="100" height="100" />
            <p class="paragraphe">
              Falika Rosna est une elfe grande et élancée vêtue d'une robe magnifique aux couleurs argentées et grises. Ses longs cheveux blonds sont élégamment attachés et tombent sur ses
              épaules. Un serre-tête fait de feuilles et de branches lui donne un air noble et intellectuel. Elle a un grand sourire en apercevant Lana'sir même si du coin de l'œil elle
              semble méfiante en posant le regard sur chacun d'entre vous.
            </p>
          </div>
          <p class="discussion">
            <span class="discu-acteur">Falika Rosna :</span> Bienvenue à tous dans mon école. Ma chère amie Lana'sir, c'est un plaisir de te savoir à mes côtés. A la vue de tes …
            compagnons, j'en déduis que tu as beaucoup de choses à me raconter.
          </p>
          <h2>Discussion explicative :</h2>
          <h3>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.6sFZjRM5qU7IZCGx]{Falika Rosna}</h3>
          <ul>
            <li>
              <p class="paragraphe">Elle connaît Lana'sir depuis sa jeunesse.</p>
            </li>
            <li>
              <p class="paragraphe"><strong>Elle a été sa professeure dans ses jeunes années</strong> et passait quelques semaines par an dans cette école pour apprendre.</p>
            </li>
            <li>
              <p class="paragraphe">Depuis, el<strong>les se voient environ une fois par an à Lavoise</strong> et sont devenues amies.</p>
            </li>
            <li>
              <p class="paragraphe">
                L'école a deux raisons : recevoir des érudits et certains nobles pour apprendre ou discuter de certains problèmes diplomatiques, politiques… et s'occuper des nécessiteux de
                Lavoise grâce à la Pension “les Bras de la Mère” qu'elle a fondée.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Elle est très appréciée à Lavoise</strong> mais ne s'occupe pas trop de la ville pour éviter les problèmes avec les elfes blancs qui n'aiment pas l'ingérence avec
                les villes humaines.
              </p>
            </li>
          </ul>
          <hr />
          <h3>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.ZWVJjJKfU1tyPzig]{Lana'sir Bonarion}</h3>
          <ul>
            <li>
              <p class="paragraphe"><strong>Les humains de la Cité d'Ispier ont attaqué le Village du Val Rouge</strong> et quasiment décimé les elfes sylvains du village.</p>
            </li>
            <li>
              <p class="paragraphe"><strong>Les elfes n'ont pas déclenché les hostilités</strong>. Ça doit être un coup monté.</p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Lana'sir veut se rendre à la Cité d'Orkadia pour rendre compte de la situation au seigneur local</strong>, responsable de cette partie de l'Ourann du Nord.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Les elfes sylvains survivants seront amenés dans la forêt des Hauts Chênes au Nord de la Cité d'Airain</strong> pour rejoindre un autre village d'elfes sylvains.
              </p>
            </li>
            <li>
              <p class="paragraphe">Le plus important <strong>c'est d'aider les survivants et d'écouter Laotissa Graine Dépeautre</strong>.</p>
            </li>
          </ul>
          <hr />

          <h3>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.CM9KTluTWjSZcuUH]{Laotissa Graine Dépeautre}</h3>
          <ul>
            <li>
              <p class="paragraphe">
                Dès le début, <strong>elle semble faire confiance aux PJ </strong>même si, de temps en temps, Maana lui lance des regards inquiets sur ce qu'elle dit. Elle va tourner
                autour des PJs tout en expliquant la situation et même leur toucher les mains ou les épaules tout en parlant dans les moments émotionnels. Si elle est triste, elle ne le
                montre pas du tout et <strong>garde sa joie de vivre à tout moment</strong>.
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>C'est la fille de la Gardienne du Savoir</strong> du village du Val Rouge.</p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Sa mère a été tuée sous ses yeux</strong> quelques semaines avant l'attaque du village et
                <strong>c'est cet événement qui a déclenché les plus gros conflits</strong> entre les humains et les elfes..
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Elle a reçu une partie du savoir de sa mère malgré son jeune âge et porte une grande responsabilité sur ses épaules.</strong> Elle a un côté espiègle et détachée
                malgré son rôle à venir.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Un groupe d'aventuriers comme les PJs est une bénédiction car
                <strong>elle aimerait leur confier une lourde responsabilité pour sauver le secret le mieux gardé de la forêt du Val Rouge.</strong>
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Elle ne sait pas tout mais <strong>sa mère, la Gardienne du Savoir, lui a parlé d'une relique ancienne gardée secrète</strong> dans le Temple du Val Rouge.
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>Elle n'est jamais entrée dans le Temple du Val Rouge et ne connait même pas son emplacement exact.</strong></p>
            </li>
            <li>
              <p class="paragraphe"><strong>Elle sait seulement qu'à l'intérieur se trouve l'objet que sa mère appelait : “le bras de l'Union”</strong>.</p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Elle disait que cet objet était trop dangereux pour les Terres d'Arran et qu'il devait être caché et oublié.</strong> C'est la responsabilité des Gardiennes du
                Savoir du Temple du Val Rouge depuis quelques centaines d'années.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Elle connaît une comptine qui permet de trouver le Temple.</strong> Sa mère lui chantait presque tous les soirs
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.02qxYov3KKmbXck8]{Comptine de Laotissa}
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>Les PJs doivent retourner dans la Forêt du Val Rouge, trouver l'entrée du temple et récupérer “le Bras de l'Union”</strong> puis
                <strong>le rapporter à Lavoise chez Falika Rosna</strong> en attendant qu'on sache comment le cacher. Il leur faudra l'aide de
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.dzh6odLUIhzHgVoO]{Maana} pour trouver le Village du Val Rouge au milieu de la forêt. Il sera d'une grande
                aide.
              </p>
            </li>
          </ul>
          <hr />
          <img src="modules/cof2ta_reliques_union/assets/ru_objets/divers/pendentif_de_laotissa.webp" width="100" height="100" />

          <h3>Le @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.PTN21Ifrk6pECfRO]{Médaillon de Laotissa}</h3>
          <p class="paragraphe">
            A la fin de cette discussion, <strong>Laotissa avance vers un des PJs et lui tend un médaillon finement ouvragé</strong>. Elle le tient avec la plus grande sensibilité comme
            s'il s'agissait d'un nourrisson.
          </p>
          <p class="discussion">
            <span class="discu-acteur">Laotissa :</span>
            Je me dois de vous confier le médaillon de ma mère. Elle m'a toujours dit qu'il était de la plus grande importance pour le Temple. A vous de savoir pourquoi.
          </p>
          <hr />
          <h2>Questions réponses</h2>

          <img src="modules/cof2ta_reliques_union/assets/ru_objets/divers/ceinture_de_communication.webp" width="100" height="100" />
          <img src="modules/cof2ta_reliques_union/assets/ru_objets/divers/ceinture_de_communication_boite.webp" width="100" height="100" />
          <p class="paragraphe">
            A la fin de la discussion,
            <strong>si les PJs acceptent, Lana'sir leur donne une boite finement ouvragée de petite taille (écrin à bijou). Elle explique que si nous enfermons dedans un message et en plaçant
              la boîte sous les rayons direct du soleil pendant quelques minutes, elle devrait disparaître et apparaître dans une petite sacoche sur l'une de ces boucles de
              ceintures.</strong>
          </p>
          <p class="paragraphe"></p>
          <p class="paragraphe">
            Elle leur donne également une ceinture semblable à la sienne avec une pochette en cuir sur le côté et permet de récupérer la boîte en sens inverse. La poche permet de récupérer
            la boite avec un message ou un objet dedans. Le processus prend plusieurs heures mais pour communiquer c'est quand même plus rapide.
          </p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.dIB0aOb4TPU5kYWo]{Ceinture de communication}</p>
          <p class="paragraphe">Elle souhaiterait être informée de l'avancée de leur mission régulièrement.</p>
          <hr />

          <h2>Avant de repartir</h2>
          <p class="paragraphe">
            Les PJs peuvent profiter de l'École de Rosna presque autant qu'ils le veulent même si régulièrement Lana'sir, Laotissa ou encore Falika leur rappellent leur mission.
          </p>
          <p class="paragraphe">Ils peuvent aussi se balader dans Lavoise pour faire :</p>
          <ul>
            <li>
              <p class="paragraphe">
                des emplettes dans le magasin “@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.4f52zJDDJ5loROSW]{A tout faire}, le regroupement d'artisan “Aux mains
                d'Or” ou au moulin à eau
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>des paris et des soirées agitées à la taverne</strong> “la pinte rafraîchissante” ou “la Hutte des Marins”</p>
            </li>
            <li>
              <p class="paragraphe"><strong>des nouvelles et histoires de l'Ourann du Nord ou de la Birkanie</strong> grâce aux conteurs de “la Vie en Chanson”</p>
            </li>
            <li>
              <p class="paragraphe"><strong>Des soirées ou midis bien plus calmes et raffinées</strong> dans “l'auberge des Voyageurs” ou la “La Taverne des Chants de l'Ourann”</p>
            </li>
          </ul>
          <p class="paragraphe">
            <span class="imp">
              Attention : comparé à d'autres villes, les peaux vertes qui se tiennent correctement dans la ville de Lavoise ne sont pas vues d'un mauvais œil car certains bateaux de
              commerce en ont comme équipage.</span>
          </p>
          <p class="paragraphe">
            <strong>Si les PJs se mélangent aux habitants</strong> et s'ils parlent de leurs aventures, une “<strong>mission secondaire</strong>” peut leur être proposée (enquête rapide
            autour de mercenaires ayant pillé des convois marchands pour “limiter” la concurrence).
          </p>
          <hr />

          <h3>Interrogatoire de Borass Taer</h3>
          <p class="paragraphe">
            Si les PJ le souhaite, et que l'éclaireur du seigneur Jaspar est encore vivant, ils pourront discuter avec lui dans une petite prison aménagée dans les caves de l'École Rosna.
            Le lieu est assez confortable et équipé de tout le nécessaire plutôt pour une retraite spirituelle ou philosophique mais le manque de fenêtre et la lourde portes en fer montre
            également que cette pièce peut retenir un captif parfaitement.
          </p>
          <p class="paragraphe">
            Si l'interrogatoire est réalisé uniquement par les PJ, Borass Taer restera muet et sur la défensive même face à des atteintes physiques. Par contre si Lana'Sir est présente ou
            se charge de l'interrogatoire, Borass Taer craque très rapidement devant les yeux de la Dame d'Honneur de la cité laissant même couler des larmes et s'effondrer.
          </p>
          <ul>
            <li>
              <p class="paragraphe"><strong>Borass n'a que suivi les ordres du seigneur Bonarion et de Hisp Galik</strong> face aux massacres des sylvains</p>
            </li>
            <li>
              <p class="paragraphe"><strong>Il a perdu des amis proches et des compagnons d'armes</strong> à cause des raids des sylvains sur la cité.</p>
            </li>
            <li>
              <p class="paragraphe">Tout le monde dit que <strong>ce sont les sylvains qui ont déclenchés cette guerre</strong>.</p>
            </li>
            <li>
              <p class="paragraphe"><strong>Il clamera son innocence</strong> car on lui a expliqué qu'il fallait tuer les terroristes et que tout pointait dans ce sens</p>
            </li>
            <li>
              <p class="paragraphe">
                Si les PJ pousse Borass dans ses retranchements avec de l'intimidation (@Test[car:cha|diff:20|comp:Intimidation]), il prononcera le terme "<strong>Race Inerte</strong>" en
                parlant des elfes. Ce terme n'a jamais été utilisé devant Lana'Sir ou les PJ et Borass explique que beaucoup d'Ispérois l'utilisent (de plus en plus).
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Si les PJ le brutalise ou l'intimide pour savoir qui a donner l'ordre de tuer les survivants absolument (@Test[car:cha|diff:20|comp:Interrogatoire]),
                <strong>il dira que le Mage Galik lui a expressément demander d'éliminer les terroristes qui ont kidnappés la Dame d'Honneur.</strong>
              </p>
            </li>
          </ul>
          <p class="paragraphe">Même si les PJ veulent être généreux avec Borass Taer, Lana'Sir ne laissera pas passer aussi facilement.</p>
          <div class="description">
            <p class="paragraphe">Vous voyez Lana'Sir s'approcher avec un regard noir de Borass Taer assis sur le bord du lit. Elle prend une grande respiration.</p>
          </div>
          <p class="discussion">
            <span class="discu-acteur">Lana'Sir :</span>
            Tu m'as déçu, trahi et blessé. Un homme d'honneur ? ça ? Laisse- moi rire. Au mieux un toutou qui obéit aveuglément à sa laisse. Tu as du sang d'innocent sur les mains et je ne
            sais pas encore si je pourrais te refaire confiance un jour. Le dégoût se mélange à ma colère et quelques jours dans cette prison dorée ne te fera pas aussi mal que je ne le
            souhaiterai. Espère seulement que je ne laisse pas mourrir ici. Adieu !
          </p>
          <div class="description">
            <p class="paragraphe">
              Elle crache à ses pieds, troune les talons et sort du petit salon servant de cellule. Vous constatez que l'éclaireur de la cité d'Ispier est traumatisé par les propos de la
              Dame d'Honneur. Il s'effondre en larme et tombe à genou au sol la tête dans les mains. Les propos de Lana'Sir ont jeté un froid glaciale dans la petite pièce.
            </p>
          </div>
          <hr />

          <p class="paragraphe">
            Maana suivra le groupe de PJ vers la forêt du Val Rouge afin de les guider et de les aider. En fonction de la réaction du groupe, le nombre de PJ, leur connaissance du JdR,
            leur attitude… <strong>vous pouvez laisser les PJ tout seul mais la suite risque d'être plus compliqué pour eux surtout pour s'orienter ou pour trouve rdes réponses</strong>.
          </p>

          <p class="paragraphe">
            De plus, en cas de mort d'un PJ, il sera possible de la transformer en PJ si besoin. Pour la Forêt du Val Rouge il serait d'une grande aide pour le groupe de PJs.
          </p>

          <div class="levelup">PASSAGE DE NIVEAU</div>
        </div>
