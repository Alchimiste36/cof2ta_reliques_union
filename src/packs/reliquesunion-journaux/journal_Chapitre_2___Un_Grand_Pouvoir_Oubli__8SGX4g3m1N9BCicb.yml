      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Synthèse du chapitre</h1>
          <p class="paragraphe">
            Le sauvetage de Lana'Sir et des rescapés du village des elfes sylvains va plonger le groupe de Héros dans une histoire bien plus ancienne et complexe que cette simple
            course-poursuite.
          </p>
          <p class="paragraphe">Les discussions avec Lana'Sir, Falika Rosna et Laotissa Graine Dépeautre vont révélés aux PJs leur prochaine mission, de la plus haute importance.</p>
          <p class="paragraphe">
            Lana'Sir pense que Hisp Galik est responsable du conflit avec les elfes sylvains mais ne comprend pas ses motivations profondes. Grâce à leur «gentillesse» ou leur «honneur»,
            Laotissa va révéler aux aventuriers le secret caché dans la forêt du Val Rouge. Un temple ancien garde une Relique ancienne protégée depuis des siècle pour ne pas tomber dans
            de mauvaises mains. Sa puissance est trop dangereuse pour les Terres d'Arran et Laotissa pense que les tensions entre les humains et les elfes sont une couverture pour accéder
            au temple.
          </p>
          <p class="paragraphe">
            Face à ces révélations, Lana'Sir et Falika Rosna pensent qu'il faut agir pour protéger cette relique recherchée par Hisp Galik ou une organisation prête à tout pour l'obtenir.
            Elles motiveront les PJs a s'impliquer dans cette histoire.
          </p>
          <p class="paragraphe">
            Les PJs devront retourner rapidement dans le village du Val Rouge, accéder au temple sous l'Arbre-Mère et trouver la relique afin de la garder en sécurité.
          </p>
          <p class="paragraphe">
            Pendant ce temps, Lana'Sir conduira les survivants sylvains à la Cité d'Orkadia pour défendre leur droits devant le seigneur responsable de cette région de l'Ourann.
          </p>
          <hr />
          <p class="paragraphe"></p>
          <h1>Explications</h1>
          <p class="paragraphe">
            Le Temple du Val Rouge a été construit pour cacher un Bracelet magique et puissant. Habité par douze elfes sylvaines pendant des siècles, elles attendaient que le souvenir des
            Reliques de l'Union s'effacent et tombent dans l'oubli.
          </p>
          <p class="paragraphe">
            Le Bracelet de l'Union, une fois activé, permet de manipuler le peuple elfe. Soit par l'asservissement pour les réduire en esclavage soit par la dévotion pour émanciper ce
            peuple, le remplir d'espoir et de courage.
          </p>
          <p class="paragraphe">
            Il y a plus de 1 700 ans, un groupe de cinq personnalités, un elfe, un nain, un humain, une centaure et un orc, utilisait les Reliques de l'Union pour asservir des milliers
            d'habitants d'une ville nommée Esdavia. Située dans les montagnes des Rocs Exsangues, les faux-dieux d'Esdavia avait un pouvoir absolu sur les différents peuples habitant la
            ville. Après la découverte de ce fanatisme, l'Ordre de l'Union fut créé pour attaquer les faux-dieux, récupérer les Reliques de l'Union, les remettre à leur peuple respectif et
            les cacher à l'abri des mauvaises intentions.
          </p>
          <p class="paragraphe">
            Amanori Bellara a trouvé le Plastron de l'Union dans les montagnes de l'Ogrie et l'utilise depuis des années les Peaux Vertes des villages de la région. Submergée par sa
            puissance, Amanori apprend l'existence d'une autre relique et ordonne à Hisp Galik de la trouver et de lui ramener afin d'avoir le même pouvoir sur les elfes.
          </p>
          <p class="paragraphe">
            Le Temple du Val Rouge a été abandonné par la Gardienne, la suivante et les acolytes il y a presque 1000 ans laissant le secret de la Relique enfermé sous l'ArbreMère. La
            suivante du Temple a été envoyée dans le village pour insuffler les légendes et rituels autour de cette forêt et partager avec la chaman une partie des informations permettant
            d'accéder au Temple en cas de nécessité.
          </p>
          <p class="paragraphe">
            Le médaillon et la comptine de Laotissa sont les clefs permettant d'ouvrir l'accès au Temple mais même cette jeune elfe ne sait pas exactement comment procéder.
          </p>
          <p class="paragraphe">
            Les PJs découvriront dans le temple du Val Rouge de nombreuses informations sur cette histoire sans pour autant pouvoir faire de liens précis pour le moment. Ils trouveront le
            récit de l'affrontement des elfes de l'Ordre de l'Union contre le faux-dieux Izareaa et comprendront comment ouvrir la porte secrète et obtenir le Bracelet de l'Union. Les
            informations complémentaires trouvées dans le Temple et les carnets de la Gardienne permettront de commencer des recherches approfondies pour la suite de l'aventure.
          </p>
          <hr />
          <h1>Attentions particulières</h1>
          <p class="paragraphe">
            Les PJs ne devront pas avoir d'informations précises sur la Relique de l'Union. Ils pourront faire des déductions mais devront être perdus lors de l'ouverture de la salle
            secrète du Temple.
          </p>
          <p class="paragraphe">
            Entre la «machine du Val Rouge», les objets présents dans les coffres et le Bracelet, ils devraient se poser des questions et se creuser la tête. Le surplus d'informations
            récoltées dans la Temple est volontaire pour plomber le groupe de PJs dans cette grande histoire.
          </p>
        </div>
