      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <blockquote>\n    <p>\n      <em>La ville de Lavoise est positionnée au bord du fleuve Qolos, sur une bande de terre qui donne l'impression de percer le cours de l'eau.\n        <strong>Une muraille de taille raisonnable protège la ville des attaques de Peaux Vertes</strong> venant des plaines de la Birkanie. Les toitures sont toutes faites de\n        pierres bleutées qui rayonne sous les rayons du soleil. <strong>La chose la plus étonnante avec Lavoise c'est la végétation au coeur même de la ville</strong>. Comparé aux\n        champs agricoles qui bordent la muraille et les grandes plaines clairsemées de Birkanie, <strong>Lavoise semble luxuriante</strong>. Du haut de la colline, on peut\n        facilement remarquer <strong>l'effervescence de la ville et de son port</strong>. Autour de celui-ci, deux collines abruptes sont surmontées de bâtiments. A l'Ouest, une\n        enceinte protège une belle demeure noble et à l'Est, un phare haut et élégant. De l'autre côté du fleuve,\n        <strong>on voit à peine la berge et on peut percevoir à l'horizon des quais, bâtiments et routes qui partent vers l'Ourann</strong>, le Pays des Vents.</em>\n    </p>\n    <p>\n      <em>A fur et à mesure que l'on s'approche de cette ville, on peut remarquer les traces d'architecture naine qui sont visibles sur les tours des murailles, sur les pilonnes de\n        soutènement, sur l'arche au-dessus de la porte nord ou encore sur la forme des dalles au sol lorsque l'on entre dans la cité.</em>\n    </p>\n    <p><em>Cette ville doit être construite sur les ruines d'un ancien village nain d'où sa faculté à résister aux attaques des tribus alentours.</em></p>\n  </blockquote>\n  <p></p>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/lavoise/lavoise3.webp\" width=\"150\" height=\"150\" />\n  <p>\n    Les PJs arrivent par la porte du Nord, en fin d'après-midi (le soleil est sur le point de se coucher) et directement sur leur gauche, ils entendent les chants et les rires\n    s'échappant d'une taverne. L'enseigne indique \"la Taverne des chants de l'Ourann\". Les maisons aux alentours sont bien entretenues et particulièrement modernes. Tout est bien\n    organisé à Lavoise.\n  </p>\n  <p>@UUID[JournalEntry.JeFlIRMgcdohuK3j]{Lavoise}</p>\n  <hr />\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/lavoise/lavoise_centre1.webp\" width=\"150\" height=\"150\" />\n  <p>\n    La belle demeure en haut de la colline <strong>au Sud-Ouest est une école d'érudit fermée au public</strong> <strong>sauf pour des contrats</strong> (recherche d'information,\n    traduction, lecture de texte, écriture de lettre…). La responsable est <strong>une elfe du nom de Falika Rosma</strong>. Même si ce n'est pas son travail principal, elle aide\n    souvent pour les soins et l'éducation des enfants présents dans la pension \"les Bras de la Mère\" et pour les habitants de Lavoise.\n  </p>\n  <p><br /></p>\n  <p>\n    <strong>Le port est aussi un lieu très mouvementé à Lavoise.</strong> Il n'est pas un moment où quelqu'un ne vide ou ne remplisse un bateau, une barque ou une charrette avec\n    des marchandises en tout genre. A l'Est de la Porte Sud, <strong>un grand bâtiment sert à organiser les aller et venues et à collecter les taxes.</strong> A tout moment du jour\n    et de la nuit, <strong>le port, et en particulier la capitainerie, sont protégés par des gardes lourdement armés</strong> qui prennent leur tâche très au sérieux. C'est un\n    honneur, dans une ville qui se développe autour du commerce maritime d'être le gardien de l'économie.\n  </p>\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/lavoise/lavoise_centre3.webp\" width=\"150\" height=\"150\" />\n  <p><br /></p>\n  <p>\n    Pour finir, <strong>le phare sur la colline du Sud-Est donne un point de vue panoramique sur les terres et sur le fleuve</strong>. Du haut de ce bâtiment solide et de belle\n    facture, on distingue beaucoup les rives de l'Ourann à l'horizon. Un immense tas de bois bien préparé peut être allumé à n'importe quel moment, en cas de brouillard dense ou de\n    problème.\n  </p>\n  <hr />\n  <p>\n    <strong>Quelque soit les envies et les réactions des PJ, Lana'Sir les pousse à se rendre au plus vite à\n      l'@UUID[JournalEntry.JeFlIRMgcdohuK3j.JournalEntryPage.pLJyv8IGuN0DMDN2]{École Rosna} pour mettre à l'abri les sylvains et pouvoir enfin se sentir protégée.</strong>\n  </p>\n  <p>\n    Si les PJ prennent leur temps ou veulent faire des choses à Lavoise avant, elle bougonne, s'énerve et dirige le choriot et les elfes vers la colline sud-ouest. En fonction de\n    la réaction des PJ, ils se difficile pour eux d'entrer chez Falika Rosna voir ils seront chassés par elle.\_\n  </p>\n  <p>Dans ce dernier cas, il faudra que les PJ trouvent de bonnes idées pour reprendre le cours normal de la campagne.</p>\n  <hr />\n  <h2>@UUID[JournalEntry.JeFlIRMgcdohuK3j.JournalEntryPage.pLJyv8IGuN0DMDN2]{L'École Rosna}</h2>\n  <blockquote>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/lavoise/lavoise_ecole_rosna1.webp\" width=\"150\" height=\"150\" />\n    <p>\n      <em>Vous suivez Lana’sir en direction de l'École Rosna. <strong>Elle semble très à l’aise dans la ville de Lavoise.</strong> En cette fin de journée, les rues sont agitées et\n        nombreux sont les passants ou commerçants qui se retournent pour vous observer. Vous passez devant une belle église, des auberges plus ou moins chics, une place de marché\n        en train de remballer leurs stands ou encore un magasin d’équipement nommé “A tout faire”. Arrivé au pied de la colline de l’ouest, Lana’sir s’engage sur la route en lacet\n        qui monte vers la belle propriété de Falika Rosna. Les deux tours de guet entourant la grande porte sont allumées et la petite porte intégrée dans la grande est\n        ouverte.</em>\n    </p>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/lavoise/shanni.webp\" width=\"100\" height=\"100\" />\n    <p>\n      <em>Vous distinguez, dès que vous entrez, une grande cour entourée de fortifications protégeant quatre grands bâtiments nobles très bien entretenus.\n        <strong>La porte du bâtiment principal s’ouvre et une jeune femme avec un grand sourire s’approche du groupe.</strong> Elle porte des lunettes fines et des habits très\n        jolis. Elle tient à la main un carnet et une sorte de stylo.</em>\n    </p>\n  </blockquote>\n  <p></p>\n  <p class=\"discussion\"><strong>SHANNI :</strong> Bonjour à vous, comment l'École Rosna peut-elle vous apporter de l'aide ou des connaissances ?</p>\n  <p><br /></p>\n  <p>\n    <strong>La jeune fille prend en note chaque mot énoncé par les PJs ou Lana’sir de façon rapide et avec une belle écriture.</strong> Si les PJs parlent trop vite ou tous\n    ensemble, elle leur demande de répéter ou de ralentir leur propos.\n  </p>\n  <p>Au bout de la conversation, le groupe est amené dans l’accueil du bâtiment principal et Shanni, la jeune femme, leur apporte de la nourriture et des boissons.</p>\n  <p>Quelques minutes plus tard, <strong>Falika Rosna entre avec entrain et s’approche à grandes enjambées de Lana’sir pour la serrer dans ses bras.</strong></p>\n  <hr />\n  <blockquote>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/lavoise/falika_rosna1.webp\" width=\"100\" height=\"100\" />\n    <p>\n      <em>Falika Rosna est une elfe grande et élancée vêtue d’une robe magnifique aux couleurs argentées et grises. Ses longs cheveux blonds sont élégamment attachés et tombent sur\n        ses épaules. Un serre-tête fait de feuilles et de branches lui donne un air noble et intellectuel. Elle a un grand sourire en apercevant Lana’sir même si du coin de l'œil\n        elle semble méfiante en posant le regard sur chacun d’entre vous.</em>\n    </p>\n  </blockquote>\n  <p class=\"discussion\">\n    <strong>FALIKA ROSNA :</strong> Bienvenue à tous dans mon école. Ma chère amie Lana’sir, c’est un plaisir de te savoir à mes côtés. A la vue de tes … compagnons, j’en déduis\n    que tu as beaucoup de choses à me raconter.\n  </p>\n  <h2>Discussion explicative :</h2>\n  <h3>@UUID[Actor.6sFZjRM5qU7IZCGx]{Falika Rosna}</h3>\n  <ul>\n    <li>\n      <p>Elle connaît Lana’sir depuis sa jeunesse.</p>\n    </li>\n    <li>\n      <p><strong>Elle a été sa professeure dans ses jeunes années</strong> et passait quelques semaines par an dans cette école pour apprendre.</p>\n    </li>\n    <li>\n      <p>Depuis, el<strong>les se voient environ une fois par an à Lavoise</strong> et sont devenues amies.</p>\n    </li>\n    <li>\n      <p>\n        L’école a deux raisons : recevoir des érudits et certains nobles pour apprendre ou discuter de certains problèmes diplomatiques, politiques… et s’occuper des nécessiteux de\n        Lavoise grâce à la Pension “les Bras de la Mère” qu’elle a fondée.\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>Elle est très appréciée à Lavoise</strong> mais ne s’occupe pas trop de la ville pour éviter les problèmes avec les elfes blancs qui n’aiment pas l’ingérence avec\n        les villes humaines.\_\n      </p>\n    </li>\n  </ul>\n  <hr />\n  <h3>@UUID[Actor.ZWVJjJKfU1tyPzig]{Lana’sir Bonarion}</h3>\n  <ul>\n    <li>\n      <p><strong>Les humains de la Cité d’Ispier ont attaqué le Village du Val Rouge</strong> et quasiment décimé les elfes sylvains du village.</p>\n    </li>\n    <li>\n      <p><strong>Les elfes n’ont pas déclenché les hostilités</strong>. Ça doit être un coup monté.</p>\n    </li>\n    <li>\n      <p><strong>Lana’sir veut se rendre à la Cité d’Orkadia pour rendre compte de la situation au seigneur local</strong>, responsable de cette partie de l’Ourann du Nord.</p>\n    </li>\n    <li>\n      <p>\n        <strong>Les elfes sylvains survivants seront amenés dans la forêt des Hauts Chênes au Nord de la Cité d’Airain</strong> pour rejoindre un autre village d’elfes sylvains.\n      </p>\n    </li>\n    <li>\n      <p>\n        Le plus important <strong>c’est d’aider les survivants et </strong><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">d’écouter Laotissa Graine Dépeautre</span></strong></span>.\_\n      </p>\n    </li>\n  </ul>\n  <hr />\n  <h3>@UUID[Actor.CM9KTluTWjSZcuUH]{Laotissa Graine Dépeautre}</h3>\n  <ul>\n    <li>\n      <p>\n        Dès le début, <strong>elle semble faire confiance aux PJ\_</strong>même si, de temps en temps, Maana lui lance des regards inquiets sur ce qu’elle dit. Elle va tourner\n        autour des PJs tout en expliquant la situation et même leur toucher les mains ou les épaules tout en parlant dans les moments émotionnels. Si elle est triste, elle ne le\n        montre pas du tout et <strong>garde sa joie de vivre à tout moment</strong>.\n      </p>\n    </li>\n    <li>\n      <p><strong>C’est la fille de la Gardienne du Savoir</strong> du village du Val Rouge.</p>\n    </li>\n    <li>\n      <p>\n        <strong>Sa mère a été tuée sous ses yeux</strong> quelques semaines avant l’attaque du village et\n        <strong>c’est cet événement qui a déclenché les plus gros conflits</strong> entre les humains et les elfes..\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>Elle a reçu une partie du savoir de sa mère malgré son jeune âge et porte une grande responsabilité sur ses épaules.</strong> Elle a un côté espiègle et détachée\n        malgré son rôle à venir.\n      </p>\n    </li>\n    <li>\n      <p>\n        Un groupe d’aventuriers comme les PJs est une bénédiction car\n        <strong>elle aimerait leur confier une lourde responsabilité pour sauver le secret le mieux gardé de la forêt du Val Rouge.</strong>\n      </p>\n    </li>\n    <li>\n      <p>Elle ne sait pas tout mais <strong>sa mère, la Gardienne du Savoir, lui a parlé d’une relique ancienne gardée secrète</strong> dans le Temple du Val Rouge.</p>\n    </li>\n    <li>\n      <p><strong>Elle n’est jamais entrée dans le Temple du Val Rouge et ne connait même pas son emplacement exact.</strong></p>\n    </li>\n    <li>\n      <p><strong>Elle sait seulement qu’à l’intérieur se trouve l’objet que sa mère appelait : “le bras de l’Union”</strong>.</p>\n    </li>\n    <li>\n      <p>\n        <strong>Elle disait que cet objet était trop dangereux pour les Terres d’Arran et qu’il devait être caché et oublié.</strong> C’est la responsabilité des Gardiennes du\n        Savoir du Temple du Val Rouge depuis quelques centaines d’années.\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>Elle connaît une comptine qui permet de trouver le Temple.</strong> Sa mère lui chantait presque tous les\n        soirs\_@UUID[Compendium.world.reliquesunion-objets.Item.02qxYov3KKmbXck8]{Comptine de Laotissa}\n      </p>\n    </li>\n    <li>\n      <p>\n        <strong>Les PJs doivent retourner dans la Forêt du Val Rouge, trouver l’entrée du temple et récupérer “le Bras de l’Union”</strong> puis\n        <strong>le rapporter à Lavoise chez Falika Rosna</strong> en attendant qu'on sache comment le cacher. Il leur faudra l'aide de\_@UUID[Actor.dzh6odLUIhzHgVoO]{Maana} pour\n        trouver le Village du Val Rouge au milieu de la forêt. Il sera d'une grande aide.\n      </p>\n    </li>\n  </ul>\n  <hr />\n  <img src=\"modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/pendentif_de_laotissa.webp\" width=\"100\" height=\"100\" />\n  <h3>Le\_@UUID[Compendium.world.reliquesunion-objets.Item.PTN21Ifrk6pECfRO]{Médaillon de Laotissa}</h3>\n  <p>\n    A la fin de cette discussion, <strong>Laotissa avance vers un des PJs et lui tend un médaillon finement ouvragé</strong>. Elle le tient avec la plus grande sensibilité comme\n    s'il s'agissait d'un nourrisson.\n  </p>\n  <p class=\"discussion\">\n    <strong>LAOTISSA :</strong>\n    <em>Je me dois de vous confier le médaillon de ma mère. Elle m'a toujours dit qu'il était de la plus grande importance pour le Temple. A vous de savoir pourquoi.</em>\n  </p>\n  <hr />\n  <h2>Questions réponses</h2>\n  <div>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/ceinture_de_communication.webp\" width=\"100\" height=\"100\" />\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/ceinture_de_communication_boite.webp\" width=\"100\" height=\"100\" />\n    <p>\n      A la fin de la discussion,\n      <strong>si les PJs acceptent, Lana’sir leur donne une boite finement ouvragée de petite taille (écrin à bijou). Elle explique que si nous enfermons dedans un message et en plaçant\n        la boîte sous les rayons direct du soleil pendant quelques minutes, elle devrait disparaître et apparaître dans une petite sacoche sur l’une de ces boucles de\n        ceintures.</strong>\n    </p>\n    <p></p>\n    <p>\n      Elle leur donne également une ceinture semblable à la sienne avec une pochette en cuir sur le côté et permet de récupérer la boîte en sens inverse. La poche permet de\n      récupérer la boite avec un message ou un objet dedans. Le processus prend plusieurs heures mais pour communiquer c’est quand même plus rapide.\n    </p>\n    <p><strong>@UUID[Compendium.world.reliquesunion-objets.Item.dIB0aOb4TPU5kYWo]{Ceinture de communication}</strong></p>\n    <p>Elle souhaiterait être informée de l’avancée de leur mission régulièrement.</p>\n    <hr />\n    <h2>Avant de repartir</h2>\n    <p>\n      <strong>Les PJs peuvent profiter de l’École de Rosna presque autant qu’ils le veulent même si régulièrement Lana’sir, Laotissa ou encore Falika leur rappellent leur\n        mission.</strong>\n    </p>\n    <p>Ils peuvent aussi se balader dans Lavoise pour faire :</p>\n    <ul>\n      <li>\n        <p><strong>des emplettes dans le magasin “@UUID[Actor.4f52zJDDJ5loROSW]{A tout faire}”</strong>, le regroupement d’artisan “Aux mains d’Or” ou au moulin à eau</p>\n      </li>\n      <li>\n        <p><strong>des paris et des soirées agitées à la taverne</strong> “la pinte rafraîchissante” ou “la Hutte des Marins”</p>\n      </li>\n      <li>\n        <p><strong>des nouvelles et histoires de l’Ourann du Nord ou de la Birkanie</strong> grâce aux conteurs de “la Vie en Chanson”</p>\n      </li>\n      <li>\n        <p><strong>Des soirées ou midis bien plus calmes et raffinées</strong> dans “l’auberge des Voyageurs” ou la “La Taverne des Chants de l’Ourann”</p>\n      </li>\n    </ul>\n    <p class=\"imp\">\n      Attention : comparé à d’autres villes, les peaux vertes qui se tiennent correctement dans la ville de Lavoise ne sont pas vues d'un mauvais œil car certains bateaux de\n      commerce en ont comme équipage.\n    </p>\n    <p>\n      <strong>Si les PJs se mélangent aux habitants</strong> et s’ils parlent de leurs aventures, une “<strong>mission secondaire</strong>” peut leur être proposée (enquête rapide\n      autour de mercenaires ayant pillé des convois marchands pour “limiter” la concurrence).\_\n    </p>\n    <hr />\n    <h3>Interrogatoire de Borass Taer</h3>\n    <p>\n      Si les PJ le souhaite, et que l'éclaireur du seigneur Jaspar est encore vivant, ils pourront discuter avec lui dans une petite prison aménagée dans les caves de l'École\n      Rosna. Le lieu est assez confortable et équipé de tout le nécessaire plutôt pour une retraite spirituelle ou philosophique mais le manque de fenêtre et la lourde portes en\n      fer montre également que cette pièce peut retenir un captif parfaitement.\n    </p>\n    <p>\n      Si l'interrogatoire est réalisé uniquement par les PJ, Borass Taer restera muet et sur la défensive même face à des atteintes physiques. Par contre si Lana'Sir est présente\n      ou se charge de l'interrogatoire, Borass Taer craque très rapidement devant les yeux de la Dame d'Honneur de la cité laissant même couler des larmes et s'effondrer.\n    </p>\n    <ul>\n      <li>\n        <p><strong>Borass n'a que suivi les ordres du seigneur Bonarion et de Hisp Galik</strong> face aux massacres des sylvains</p>\n      </li>\n      <li>\n        <p><strong>Il a perdu des amis proches et des compagnons d'armes</strong> à cause des raids des sylvains sur la cité.</p>\n      </li>\n      <li>\n        <p>Tout le monde dit que <strong>ce sont les sylvains qui ont déclenchés cette guerre</strong>.</p>\n      </li>\n      <li>\n        <p><strong>Il clamera son innocence</strong> car on lui a expliqué qu'il fallait tuer les terroristes et que tout pointait dans ce sens</p>\n      </li>\n      <li>\n        <p>\n          Si les PJ pousse Borass dans ses retranchements avec de l'intimidation (<span style=\"font-family:Arial\"><strong>@Test[car:cha|diff:20|comp:Intimidation]</strong></span>), il prononcera le terme \"<strong>Race Inerte</strong>\" en parlant des elfes. Ce terme n'a jamais été utilisé devant Lana'Sir ou les PJ et Borass explique que beaucoup\n          d'Ispérois l'utilisent (de plus en plus).\n        </p>\n      </li>\n      <li>\n        <p>\n          Si les PJ le brutalise ou l'intimide pour savoir qui a donner l'ordre de tuer les survivants absolument (<span style=\"font-family:Arial\"><strong>@Test[car:cha|diff:20|comp:Interrogatoire]</strong></span>), <strong>il dira que le Mage Galik lui a expressément demander d'éliminer les terroristes qui ont kidnappés la Dame d'Honneur.</strong>\n        </p>\n      </li>\n    </ul>\n    <p>Même si les PJ veulent être généreux avec Borass Taer, Lana'Sir ne laissera pas passer aussi facilement.</p>\n    <blockquote>\n      <p>Vous voyez Lana'Sir s'approcher avec un regard noir de Borass Taer assis sur le bord du lit. Elle prend une grande respiration.</p>\n      <p class=\"discussion\">\n        <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Lana'Sir :</span></strong></span>\n        Tu m'as déçu, trahi et blessé. Un homme d'honneur ? ça ? Laisse- moi rire. Au mieux un toutou qui obéit aveuglément à sa laisse. Tu as du sang d'innocent sur les mains et\n        je ne sais pas encore si je pourrais te refaire confiance un jour. Le dégoût se mélange à ma colère et quelques jours dans cette prison dorée ne te fera pas aussi mal que\n        je ne le souhaiterai. Espère seulement que je ne laisse pas mourrir ici.\_ Adieu !\n      </p>\n      <p>\n        Elle crache à ses pieds, troune les talons et sort du petit salon servant de cellule. Vous constatez que l'éclaireur de la cité d'Ispier est traumatisé par les propos de la\n        Dame d'Honneur. Il s'effondre en larme et tombe à genou au sol la tête dans les mains. Les propos de Lana'Sir ont jeté un froid glaciale dans la petite pièce.\n      </p>\n    </blockquote>\n    <hr />\n    <p>\n      Maana suivra le groupe de PJ vers la forêt du Val Rouge afin de les guider et de les aider. En fonction de la réaction du groupe, le nombre de PJ, leur connaissance du JdR,\n      leur attitude… <strong>vous pouvez laisser les PJ tout seul mais la suite risque d'être plus compliqué pour eux surtout pour s'orienter ou pour trouve rdes réponses</strong>.\n    </p>\n    <div>\n      <p>De plus, en cas de mort d’un PJ, il sera possible de la transformer en PJ si besoin. Pour la Forêt du Val Rouge il serait d'une grande aide pour le groupe de PJs.</p>\n      <hr />\n      <p>\n        <span><strong>PASSAGE DE NIVEAU</strong></span>\n      </p>\n      <hr />\n    </div>\n  </div>\n</div>"
