  - sort: 200000
    name: Entrée dans la forêt
    type: text
    _id: boTGVqEMeKH3BJHs
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Entrée dans la forêt</h1>
          <p class="paragraphe">
            De retour dans les plaines de l'Ourann sur des chemins beaucoup plus simples que la Grande Route,
            <strong>il reste environ 2 jours et demi de voyage pour atteindre le sud de la Forêt du Val Rouge.</strong>
          </p>
          <p class="paragraphe">Le voyage se passe parfaitement bien dans cette zone “civilisée” de l'Ourann.</p>
          <p class="paragraphe">
            <strong>Les PJs peuvent en profiter pour faire connaissance avec @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.dzh6odLUIhzHgVoO]{Maana}.</strong>
          </p>
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_foret5.webp" width="100" height="100" />
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_foret1.webp" width="100" height="100" />
            <p class="paragraphe">
              En milieu de l'après-midi, après deux jours de voyage, vous apercevez la lisière de
              @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.lAzRUxtxusAXN0ZS]{la Forêt du Val Rouge}. Une forêt dense et qui, d'un simple coup d'œil, semble
              sauvage. Vous entendez les dents de Maana se crisper car comme vous, il voit des dizaines de bûcherons à la lisière en plein travail. Haches, scies, chariots, bruits et
              agitations sur des centaines de mètres autour des arbres multi-centenaires de la forêt. Le camp est bien gardé et vous apercevez même des palissade de bois et quelques tours
              d'observation.
            </p>
          </div>
          <img src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge-camp_bucheron_1.webp" width="150" height="150" />
          <p class="paragraphe">
            <strong>Les PJs ont deux choix :</strong>
          </p>
          <ul>
            <li>
              <p class="paragraphe">Passer discrètement en évitant la compagnie de bucherons</p>
            </li>
            <li>
              <p class="paragraphe">Engager un combat avec eux. Autant dire que la défainte est très probable.</p>
            </li>
          </ul>
          <p class="paragraphe">
            Dans les deux cas,
            <strong>le groupe s'enfoncera dans la forêt et Hisp GALIK sera au courant en trouvant les morts ou par un bûcheron qui les a vu entrer dans la forêt.</strong>
          </p>
          <p class="paragraphe">
            Avant de rentrer dans la forêt, <strong>il faut libérer les Sanpuroch s'ils suivent encore les PJs.</strong> Si un PJs a choisi une voie avec une monture ou un animal de
            compagnie vous pouvez renforcer le lien avec le Sanpurock et lui transmettre en tant que monture ou compagnon animal.
          </p>
          <hr />
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/cof2ta_bestiaire/creatures/serpent_constricteur.webp" width="100" height="100" />
            <p class="paragraphe">
              La forêt est très dense et sauvage. D'après Maana, il va falloir un peu plus d'un jour pour atteindre le village du Val Rouge et il faudra rester sur nos gardes tout du long.
              Vous progressez à bon pas entouré de sons des animaux et de la végétation qui vous entourent. Les racines, les branches, les fougères et la mousse épaisse ne facilite pas la
              progression. Vous marchez pendant plusieurs heures en faisant quelques pauses et en essayant de vous frayer un passage au travers des branches et buissons. Plus vous avancez
              plus la frondaison assombrie le semblant de chemin que Maana semble suivre.
            </p>
            <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.cof2ta-acteurs.Actor.aEz8xGYDNqdm7SDh]{Serpent constricteur}</p>
          </div>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-scenes.Scene.KcqbyTJBUV2BAe59]{3.Serpent dans la Forêt}</p>
          <ul>
            <li>
              <p class="paragraphe">
                @Test[car:per|diff:15|comp:Perception auditive] : <strong>Un sifflement se fait entendre sur la droite</strong>. Si raté, le groupe est surpris par le Serpent Constricteur
              </p>
            </li>
          </ul>
          <p class="paragraphe"><strong>Loot :</strong></p>
          <ul>
            <li>
              <p class="paragraphe">
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.8gpkwMvJJ93igHH7]{Peau de serpent constricteur} (@Test[car:agi|diff:10|comp:Nature Survie] pour la retirer)
                (150pa)
              </p>
            </li>
            <li>
              <p class="paragraphe">
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.FWtl5Mg9dzap3vNL]{Crocs de serpent constricteur} (@Test[car:agi|diff:15|comp:Nature Survie] pour
                l'extraire) x2 (35pa)
              </p>
            </li>
          </ul>

          <hr />
          <div class="description">
            <p class="paragraphe">
              Vous passez une nuit en forêt dans le creux d'un arbre immense et aménagé. D'après Maana, c'est un avant poste pour éviter les invasions du village. Il vous explique qu'ils
              ne sont plus utilisés de ce côté-là de la forêt depuis que le conflit avec la Cité d'Ispier à débuté. Vous ressentez tous durant la nuit une certaine vibration dans votre
              corps, comme une énergie apaisante qui vous traverse.
            </p>
            <hr />
            <ul>
              <li>
                <p class="paragraphe">
                  @Test[car:cha|diff:15|comp:Empathie] :
                  <span class="description">
                    derrière la vibration apaisante, vous ressentez une profonde tristesse comme une désolation. Dans tous les cas, vous vous sentez bien reposé aux premières lueurs du
                    jour filtrant à travers l'épaisse canopée.</span>
                </p>
              </li>
            </ul>
            <hr />
            <p class="paragraphe">
              En reprenant votre voyage, vous arrivez trois heures plus tard aux abords de ce qu'il reste du village du Val Rouge (images). Le village est démoli en grande partie.
              Certaines maisons sont incendiées, des traces de luttes sont encore visibles à bien des endroits et vous remarquez quelques cadavres d'elfes sylvains. Au premier coup d'œil
              vous remarquez que des pillages ont eu lieu après la bataille.
            </p>
            <p class="paragraphe">Maana est effondré à la vue de son village et ne peut retenir un cri de rage.</p>
            <p class="paragraphe">Que faites-vous ?</p>
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_village.webp" width="150" height="150" />
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_village1.webp" width="150" height="150" />
          </div>
        </div>
