  - sort: 300000
    name: Le Village et l'Arbre-Mère
    type: text
    _id: 3F3iyUWMlCXm87n3
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Le Village et l'Arbre-Mère</h1>
          <p class="paragraphe">Il ne reste pas grand chose de ce joli village elfique.</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.lAzRUxtxusAXN0ZS.JournalEntryPage.pLJyv8IGuN0DMDN2]{Village des elfes}</p>
          <p class="paragraphe">
            Maana reste mutique en marchand lentement dans le village. Il semble traumatisé et pourra expliquer qu'il ne s'attendait pas à autant de destruction et de massacre.
          </p>
          <p class="paragraphe">Il commence à regrouper les cadavres pour leur donner un peu de dignité et une sépulture adaptée.</p>
          <hr />
          <p class="paragraphe">Le Repos des Esprits est un bâtiment assez intact pour s'y poser et passer la nuit tranquilement assez loin de la dévastation.</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.lAzRUxtxusAXN0ZS.JournalEntryPage.bOl059yt99dsbeuj]{Repos des esprits}</p>
          <hr />
          <p class="paragraphe">En parcourant le village, l'un des PJ découvre une salle fermée dans l'école de chasse.</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.lAzRUxtxusAXN0ZS.JournalEntryPage.9peq3zVjvs00wwzm]{Ecole de chasse}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.hWTNQcToxjkQ5MzZ]{École de chasse - Val Rouge}</p>
          <hr />

          <h1>La clairière de l'Arbre-Mère</h1>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-scenes.Scene.Fm3I69kcdbz0yoAE]{4.Clairière}</p>
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_arbre_mere.webp" width="100" height="100" />
            <p class="paragraphe">
              Au bout d'un sentier qui a été particulièrement emprunté se trouve l'Arbre sacré du Val Rouge. Un arbre immense au centre d'une clairière fleurie. L'arbre est entouré de
              plusieurs pierres gravées de runes elfiques, de dessins et représentations. Une pulsation lumineuse parcourt les gravures et monte le long de l'écorce de l'Arbre sacré. Toute
              la clairière a été piétinée par des groupes d'humains au vu des traces. Des coups de haches ont été donnés à l'Arbre sacré et, à un endroit, un feu a été déclenché pour
              embraser le tronc sans succès.
            </p>
          </div>
          <p class="paragraphe">
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.lAzRUxtxusAXN0ZS.JournalEntryPage.ySLZ7yXZ7S7rid5l]{Clairière de l'Arbre-Mère}
          </p>
          <hr />
          <h2>Examiner les traces</h2>
          <p class="paragraphe">Les traces sont très diverse. La clairière à été piétinée et saccagée.</p>
          <ul>
            <li>
              <p class="paragraphe">@Test[car:per|comp:Examiner les traces]</p>
              <ul>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">10+</span> :
                    <span class="description">Les traces montrent beaucoup de chaussures différentes. La plupart des bottes de soldats ou gardes. Vous voyez aussi des traces de roues de charrette
                      apparemment.</span>
                  </p>
                </li>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">15+</span> :
                    <span class="description">Des trainées d'huile ont été étalées près du tronc de l'Arbre Sacré. Vous trouvez également à quelques pas du tronc un pierre runique gravée de l'Ogham du Feu</span>
                  </p>
                </li>
              </ul>
            </li>
          </ul>
          <hr />
          <h2>Examiner l'arbre</h2>
          <p class="paragraphe">L'arbre est immense comparé aux autres arbres aux alentours. Les pulsations vertes parcourant l'écorce sont délicates et lentes.</p>
          <ul>
            <li>
              <p class="paragraphe">@Test[car:per|comp:Examiner l'arbre]</p>
              <ul>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">10+</span> :
                    <span class="description">Les coups qui ont été donnés à l'Arbre Sacré n'ont fait qu'égratigner l'écorce. Des éclats de métal venant de haches ou de piques se retrouvent à plusieurs endroit
                      au pied de l'Arbre.</span>
                  </p>
                </li>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">15+</span> :
                    <span class="description">A deux endroits, vous remarquez des traces à la craie et au charbon d'Oghams divers. Ogham de Feu, Mouvement, transformation, organique… beaucoup de formules ont été
                      testées.</span>
                  </p>
                </li>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">20+</span> : <span class="description">Tous les Oghams ont été tracés par la même personne avec soin et précision.</span>
                  </p>
                </li>
              </ul>
            </li>
          </ul>
          <hr />
          <h2>Examiner les pierres</h2>
          <div class="description">
            <p class="paragraphe">
              Il y a environ une trentaine de Pierres gravées dispersées dans la clairière. Elles sont toutes de taille différentes, certaines de 3m de haut et d'autres ne dépassant qu'à
              peine la hauteur des fleurs et de l'herbe. Elles sont visibles grâce à la lumière verte des pulsations qui éclairent les gravures sur les pierres. Les gravures sont un coup
              des écritures elfiques d'un dialècte ancien, des représentations simplifiées de la nature (animaux, feuilles, racines…) mais aussi des symboles. Certains des symboles
              ressemblent à ceux qui se trouve sur le médaillon de Laotissa Graine Dépeautre.
            </p>
          </div>
          <ul>
            <li>
              <p class="paragraphe">@Test[car:per|comp:Examiner les pierres]</p>
              <ul>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">5+</span> :
                    <span class="description">Les gravures sont très nombreuses et elles réagissent au contact en augmentant légèrement l'intensité de la lumière des pulsations. Sans les avoir toutes vues, pour
                      le moment certains symboles du médaillon de la Shaman sont présent en plusieurs exemplaires sur différentes pierres.</span>
                  </p>
                </li>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">10+</span> :
                    <span class="description">Lorsque vous touchez deux gravures sur la même pierre, la première revient à son état normale et la deuxième luit plus mais lorsque vous touchez plusieurs gravures
                      sur des pierres différentes chaque gravure continuent de luirent pendant une dizaine de minutes.</span>
                  </p>
                </li>
                <li>
                  <p class="paragraphe">
                    <span class="roll-result">15+</span> :
                    <span class="description">Après plusieurs minutes de fouille et d'observation, la rune située au centre du médaillon n'est présent qu'une seule et unique fois sur une petite pierre proche du
                      tronc de l'Arbre Sacré. Elle ne luit pas de cette lueur verte et aucune autre gravure n'est présente sur cette pierre là.</span>
                  </p>
                </li>
              </ul>
            </li>
          </ul>
          <hr />
          <h1>Ouvrir l'entrée du Temple du Val Rouge</h1>
          <p class="paragraphe">
            <strong>Pour accéder au temple, le groupe doit appuyer dans le bon ordre sur les bonnes runes présentes sur les pierres en suivant la comptine de Laotissa</strong> Graine
            Dépeautre. @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.02qxYov3KKmbXck8]{Comptine de Laotissa}
          </p>
          <div class="parcho">
            <p class="paragraphe"><strong>La mère, l'enfant, l'arbre, le fruit, la plante, la graine, la glace, le vent, le sable et enfin le savoir.</strong></p>
          </div>
          <p class="paragraphe">
            Comme certaines runes sont présentent sur plusieurs pierres gravées, <strong>il ne faut pas appuyer sur deux runes qui se trouvent sur la même pierre</strong>. Tout cela
            <strong>avant que la lueur de la première rune ne s'estompe</strong> (environ 10 minutes). S'ils ne trouvent pas la solution, donner des indices aux PJs grâce à Maana où
            lorsqu'ils observent le médaillon ou les pierres gravées.
          </p>
          <p class="paragraphe">Au moment où ils complètent la séquence des 10 premières runes :</p>
          <div class="description">
            <p class="paragraphe">
              Au moment, où ils appuient sur la rune du Savoir, toutes les runes s'allument de façon plus vive, les autres gravures s'éteignent et les pulsations accélèrent jusqu'à devenir
              une vibration lumineuse parcourant chaque craquelure de l'écorce de l'Arbre Sacré. Rien ne se passe de plus. Le temps semble suspendu. Vous ressentez comme une sensation
              d'attente ou d'apaisement provenant de l'Arbre Sacré.
            </p>
          </div>
          <p class="paragraphe">Pour ouvrir l'entrée du Temple du Val Rouge, <strong>il faut toucher sur la rune similaire à celle du centre du médaillon</strong>. Lorsqu'ils le font :</p>
          <div class="description">
            <p class="paragraphe">
              Toutes les lumières vertes sur les runes et sur l'écorce vous flashent d'un coup et un rayon lumineux vert jaillit vers le ciel puis tout s'éteint instantanément. Un fort
              sifflement se fait entendre puis les vibrations s'arrêtent d'un coup. Toute la nature se fige autour de vous. Tout devient silencieux.
            </p>
            <p class="paragraphe">
              Quelques battements de coeur plus tard vous entendez un craquement et vous voyez les racines de l'Arbre Sacré non loin de la Pierre gravée de la dernière rune bouger et
              s'écarter. Elles libèrent une entrée assez large pour laisser passer deux personnes côte à côte qui laisse voir un escalier en colimaçon en pierre qui descend en sous-sol. Au
              moment où les racines s'arrêtent de bouger, les rayon d'une lumière s'allume un peu plus bas dans l'escalier. Les premières marches en pierres que vous voyez sont finement
              gravées de branches, de feuilles et de racines. Aucune trace de poussière ou de saleté n'est visible.
            </p>
            <p class="paragraphe">Que faites-vous ?</p>
          </div>
        </div>
