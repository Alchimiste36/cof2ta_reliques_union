      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Le Temple du Val Rouge</h1>
          <p class="paragraphe">
            Après l'ouverture de l'Arbre-Mère parle groupe et l'apparition de l'escalier, vous pouvez activer la scène :
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-scenes.Scene.MEmbyDWkSWIgnGVW]{5.Temple du Val Rouge} et positionner les tokens de PJ en bas de l'escalier au centre de la
            Salle A.
          </p>
          <hr />
          <h2>Les Salles du Temple du Val Rouge :</h2>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.qNrZZ3CEkvn24VlV]{Salle A : Entrée}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.mfq8P93jxFSAgxNQ]{Salle B : Passage du Dortoir}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.wMVqVieNKUHZHrUR]{Salle C : Réfectoire}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.LMyL5NOgH5qlFo6u]{Salle D : Bibliothèque}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.SaxUVzzTLDk5O68v]{Salle E : Cuisine}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.9EW3Luuqm057GwxP]{Salle F : La salle de prière}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.hPzzQ7YeUN7qfltF]{Salle G : Dortoir de la suivante}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.s7KtmtQGUEC9jG3Z]{Salle H : Dortoir de la Gardienne}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.FPIfaud51uhQobti]{Salle I : les 10 dortoirs des acolytes}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.Ru1kPf3U522FbVxc]{Salle J : Garde manger}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.rcHwC6chckKFTH2G]{Salle K : Les deux sanitaires}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.KxdATvtr2j4z7Vcy]{Salle L : La grande salle de l'Union}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.IuTSUN7bYbOtWKQd]{Salle Secrète § : La salle de la relique}</p>
          <hr />

          <section class="secret" id="secret-5WYTc9bLV9ID5qIA">
            <h2>Le Bracelet de l'Union</h2>
            <p class="paragraphe">
              Les PJ sont là pour récupérer "le Bras de l'Union", une relique puissante et dangereuse pour les Terres d'Arran. Après leurs fouilles et leurs recherches, seul le
              @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.5Uuj47G7huY5efth]{Brassard elfique} peut correspondre à cet artéfact.
            </p>
            <p class="paragraphe">
              Bien que magnifique et légèrement magique, le brassard ne semble pas si puissant que cela à première vue. Sa magie est bien cachée car elle vient surtout des deux
              personnalités qui sont emprisonnées dedans.
            </p>
            <p class="paragraphe">
              Pour résumer, la première personnalité est une elfe blanche de nom de Faïlass qui souhaite apporter paix, cohésion, rencontre et apaisement entre les peuples des Terres
              d'Arran. Pacifiste et humaniste, Faïlass est l'une des Cinq Doigts de l'Union.
            </p>
            <p class="paragraphe">
              La deuxième personnalité antagoniste se nomme Ramell. C'était un humain avant de devenir un démon immortel. Il a propagé des théories racialistes et ségrégationnistes pronant
              la supériosité du peuple humain sur les "Races Inertes" comme il les nomme. Il a corrompu les Reliques de l'Union avant d'être emprisonné par l'Ordre de l'Union dans un
              cercueil scellé dans les caves du Manoir Écarlate à Kosland. Depuis quelques dizaines d'années, il a réussi à s'échapper et il aimerait bien mettre la main sur les cinq
              reliques pour développer ses plans de suprématie. Le groupe de PJ découvriront bien plus tard que Ramell a manipulé Amanori Bellara et Hisp Galik dans leur entreprise de
              souission des Peaux Vertes.
            </p>
            <p class="paragraphe">
              Face à cet objet magique, si un PJ veut équiper le @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.5Uuj47G7huY5efth]{Brassard elfique}, il faut créer une
              tension immédiatement !
            </p>
          </section>

          <h2>Informations récoltées dans le Temple</h2>
          <p class="paragraphe">
            Les PJ peuvent rester plusieurs jours dans le Temple du Val Rouge s'ils veulent faire des recherches dans la bibliothèque, compiler les notes de la Gardienne Maniash'Onira ou
            étudier les runes du bassins ou les spécificités du Temple.
          </p>
          <p class="paragraphe">
            S'ils font des recherches poussées, fournissez leur ce document pour résumer les premiers éléments de l'histoire autour des Reliques :
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.3vLgG56UNatm4WBe]{Chronologie Résumée}.
          </p>
          <p class="paragraphe">
            <span class="imp">!!! ATTENTION !!!</span>
            <strong>En fonction des informations que les PJ ont trouvées, il faudra donner le droit "Observateur" sur les bonnes pages sans divulguer des informations sensibles sur la suite de
              l'aventure.</strong>
          </p>
          <hr />
          <h2>Missions personnelles</h2>
          <p class="paragraphe">
            En fonction de l'histoire de vos joueurs et de leurs missions personnelles, vous pouvez en profiter pour donner des informations sur leur famille, leur passé, leur objectif…
          </p>
          <p class="paragraphe">
            <strong>Tel'Quessir :</strong> le PJ qui a l'historique proposé "Tel'Quessir" pourra trouver dans la bibliothèque de la Gardienne s'il cherche une information proche de ce
            terme : @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.xrDJSuwMqhDQLr1Z]{Tel'Quess'Aar}
          </p>
        </div>
