  - sort: 100000
    name: La Grande Route de l'Ourann
    type: text
    _id: e1PWj2AJ2FQbQVo5
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>La Grande Route de l'Ourann</h1>
          <p class="paragraphe">
            Une fois passé le fleuve Qolos et avancé d'environ 50 kilomètres vers l'Ouest, le groupe de PJs peut rejoindre la Grande Route de l'Ourann. Si les PJs ont encore leurs
            Sanpurochs à l'arrivée au abord de la Grande Route, les gardes des tours naines les ciblent et se méfient du groupe. Si, en plus, certains sont des Peaux Vertes, ils auront
            plus de mal à passer les défenses. Beaucoup de diplomatie ou intimidation ou corruption.
          </p>
          <div class="description">
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grande_route_de_l_ourann3.webp" width="60" height="60" />
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grande_route_de_l_ourann1.webp" width="60" height="60" />
            <img src="modules/cof2ta_reliques_union/assets/ru_lieux/grandes_plaines_ourann/grande_route_de_l_ourann4.webp" width="60" height="60" />

            <p class="paragraphe">
              Après votre débarquement sur la rive ouest du fleuve Qolos, vous parcourez une cinquantaine de kilomètres dans les plaines de l'Ourann et vous arrivez devant l'un des plus
              ambitieux projets des Terres d'Arran. Vous en avez entendu parlé mais le voir devant vos yeux est un spectacle d'ingénierie fascinant. La Grande Route de l'Ourann ! Une route
              droite comme le tranchant d'une épée forgée par un maître forgeron nain. Une largeur de plusieurs dizaines de mètres, des tours de garde tout le long. Au loin, vers le sud,
              vous observerez une colline éventrée par la route et vers le nord, vous distinguez déjà un pont de pierre qui passe par-dessus une large crevasse.
            </p>
            <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier4.webp" width="60" height="60" />
            <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier1.webp" width="60" height="60" />
            <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier2.webp" width="60" height="60" />
            <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier3.webp" width="60" height="60" />
            <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/garde_nain_du_bouclier5.webp" width="60" height="60" />
            <p class="paragraphe">
              Lorsque vous vous rapprochez de la route, vous voyez, au pied et en haut de la tour la plus proche, des guerriers nains du Bouclier qui s'agitent et se mettent en position.
            </p>
            <p class="paragraphe">
              En plus de quelques arbalétriers qui se trouvent en haut de tours mobiles aux abords du chantier, 6 nains du bouclier se dressent devant vous, armes en main, en position de
              combat.
            </p>
            <img src="modules/cof2ta_reliques_union/assets/ru_acteurs/grande_route_ourann/chef_protecteur_barum.webp" width="60" height="60" />
            <p class="paragraphe">Un nain qui semble plus gradé s'approche à bonne vitesse de votre groupe, le visage fermé.</p>
          </div>

          <p class="discussion">Chef protecteur Barum, déclinez votre identité, rebroussez chemin ou périssez !</p>
          <hr />
          <p class="paragraphe"><strong>Si les PJs sont agressifs,</strong> ils peuvent finir en prison voir en phase de combat.</p>
          <p class="paragraphe"><strong>Si les PJs sont amicaux et qu'ils expliquent qu'ils veulent empreinter la route,</strong> Barum leur explique les règles :</p>
          <p class="paragraphe"></p>
          <div class="discussion">
            <ol>
              <li>
                <p class="paragraphe">
                  <strong>Laissez les travailleurs travailler est la règle première</strong>. Tout au long de la route des postes de gardes et d'observation vous tiennent à l'oeil et
                  protège la voie.
                </p>
              </li>
              <li>
                <p class="paragraphe">
                  <strong>Portez TOUJOURS votre laisser passer apparent sur vous ou votre "monture"</strong> (il regarde les Sanpurock d'un oeil sévère). Si un garde doit vous arrêter car
                  il n'a pas vu votre laisser passer, vous devrez payer.
                </p>
              </li>
              <li>
                <p class="paragraphe">
                  <strong>Régulièrement vous trouverez des tente portant un blason jaune à l'entrée</strong>. Vous pourrez vous reposer et manger dedans ou aux alentours proches.
                </p>
              </li>
              <li>
                <p class="paragraphe">
                  <strong>Il est strictement interdit de s'arrêter sur la voie centrale</strong> (il désigne les deux lignes de pierres plus sombres qui délimitent la Grande Route en trois
                  parties) et on se range à droite si on se fait rattraper par une caravane ou un cavalier.
                </p>
              </li>
              <li>
                <p class="paragraphe">
                  <strong>Tous les conflits entre usagers devront être signalés et statuer par des Gardes de la Grande Route</strong>. Aucune justice ne saurai être rendu par les usagers.
                </p>
              </li>
              <li>
                <p class="paragraphe">A chaque fois que vous quitterez la Grande Route, <strong>vous devrez rendre votre laisser passer à un poste de garde</strong>.</p>
              </li>
            </ol>
            <p class="paragraphe">Si ces règles sont comprises, même par les plus idiots de votre … groupe, il ne vous reste plus qu'à payer 20pa par laisser-passer.</p>
          </div>

          <hr />
          <h3>Laissez les PJs réagirent.</h3>
          <p class="paragraphe">
            <strong>Si une personne joue au malin, est malpoli, trop méprisant…</strong> Les 6 gardes se rapprochent du groupe menançant et le chef Protecteur Barum se retourne, s'éloigne
            en disant : <span class="discussion">Allez vous faire grailler le joufflu dans les Plaines du Pays des Vents et ne me briser plus les noix.</span>
          </p>

          <p class="paragraphe">
            Il sera impossible au groupe de se faire entendre d'une quelconque manière et s'ils s'obstinent l'un des garde les prévient :
            <span class="discussion">Je serais vous je partirais avant qu'on nous donne l'ordre de vous mettre aux arrêts ou bien pire que ça. A la vue de votre dégaine, vous n'avez aucune chance alors partez.
            </span>
          </p>

          <p class="paragraphe">
            <strong>Si les PJs n'ont pas de Laisser-passer, ils mettrons 16 jours pour atteindre la Forêt du Val Rouge</strong> (au lieu de 12,5 jours). Ils rencontreront plusieurs pépins
            (attaque d'animaux sauvages, blessures après une chute, compagnie d'orc aperçue au loin donc impossible de s'arrêter pour dormir…). Leur faire comprendre que leur manque de
            diplomatie peut leur couter la vie.
          </p>
          <p class="paragraphe">
            Si les PJ pousse l'agressivité trop loin, ils sont attaqués par les gardes avec le soutien des arbalétriers aux alentours. Ils n'ont quasiment aucune chance de remporter le
            combat et ils seront menottés et mis dans une pièce sans fenêtre d'une des tours de garde. La captivité dure tant que les PJ sont mécontents ou aggressifs. Un quignon de pain
            et une cruche d'eau de temps en temps, les aventuriers ne seront pas violentés outre mesure.
          </p>
          <p class="paragraphe">
            En fonction de l'entêtement du groupe, une amende plus ou moins forte sera demandée au groupe et s'ils refusent la somme sera récupérée directement dans leur affaire sous forme
            de pièce ou d'objets.
          </p>
          <p class="paragraphe">
            Si les PJ montent des Sanpurock et qu'ils sont réellement insupportable avec les nains du bouclier, leur montures seront relachées et ils devront parcourir les Plaines de
            l'Ourann à pied.
          </p>
          <p class="paragraphe">
            Dans tous les cas, si les PJ sont mises aux arrêt, leur identité sera consignée dans les registre de l'ordre du Bouclier et le MJ devra s'en souvenir tout au long de l'aventure
            (retour à la Cité d'Ispier, passage à Arkar'Um, confinement à Hyrr'Tarënn...).
          </p>
          <hr />

          <h3>Si les PJs obtiennent un Laisser-passer :</h3>

          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.zTbvnwmY2exeXZxQ]{Laisser-passer de la Grande Route de l'Ourann}</p>
          <div class="description">
            <p class="paragraphe">le voyage sur la Grande Route de l'Ourann est d'une <strong>simplicité et d'un confort superbe</strong>.</p>
            <p class="paragraphe">
              <strong>Les experts du temple et les artisans de la Forge, les gardes du Bouclier, les contremaîtres du Talion et beaucoup de main-d'oeuvre humaine sont au travail pour avancer
                cette route titanesque qui traverse l'Ourann de Draz-Kazar à la forteresse d'Akar-Bram</strong>. Le chantier est gigantesque et les machines sont plus grandes que des palais. Sur le côté du chantier,
              <strong>on distingue de nombreuses tentes pour les ouvriers et les compagnies qui protègent le chantier.</strong> L'herbe est piétinée, des piles de matériaux sont
              entreposées à perte de vue et un boucan se fait entendre à des kilomètres à la ronde.
            </p>
            <p class="paragraphe">
              Vous remarquez que <strong>les usagers que vous croisez sur la Grande Route ne portent pas tous le même Laisser-passer</strong> (pas la même forme ni le même dessin). Vous y
              croisez des Hommes, des Elfes, des Orcs et même des Gobelins. A chaque arrêt pour manger ou pour la nuit,
              <strong>on vous regarde à peine et chacun s'occupe de sa propre gamelle.</strong> Des petits commerçants essayent de vous vendre des babioles ou vous propose leurs services
              mais jamais ils ne sont trop insistants ou agressifs.
            </p>
            <p class="paragraphe">
              <strong>A trois autres endroits de la Grande Route, vous approchez d'une section en construction et vous êtes guidez vers une route secondaire protégée et stabilisée</strong>
              longeant le chantier pendant plusieurs dizaines de kilomètres avant de rejoindre une autre section terminée de la Grande Route.
            </p>
            <p class="paragraphe">
              A de nombreux moments, <strong>la route s'élargit sur environ 200m avec de grandes parties stabilisées de chaque côté.</strong> Des panneaux sont disposées de part et
              d'autres indiquant les directions (Port de Tureyn, le nom de plusieurs petites villes…).
            </p>
            <p class="paragraphe">
              <strong>Après 5 jours de voyage, vous distinguez à l'est les fumées s'élevant de la Cité d'Eskar</strong> et de la Route vous apercevez les fortifications de la ville
              humaine. Le lendemain en fin de journée, à l'horizon à l'Est <strong>vous pouvez voir le toit de certaines tour de la forteresse Etat de Krüg-Daraz</strong>.
            </p>
            <p class="paragraphe">
              A une allure assez intensive, vous mettez 9 jours à atteindre le bout de la Grande Route de l'Ourann qui s'arrête à environ 150 kilomètres du sud de la Forêt du Val Rouge.
            </p>
          </div>
        </div>
