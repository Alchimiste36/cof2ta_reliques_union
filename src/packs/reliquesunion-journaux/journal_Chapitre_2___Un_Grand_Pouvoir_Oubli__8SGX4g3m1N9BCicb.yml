  - sort: 300000
    name: Le Village et l'Arbre-Mère
    type: text
    _id: 3F3iyUWMlCXm87n3
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"journal-page-cof2ta\">\n  <p>Il ne reste pas grand chose de ce joli village elfique.</p>\n  <p>@UUID[JournalEntry.lAzRUxtxusAXN0ZS.JournalEntryPage.pLJyv8IGuN0DMDN2]{Village des elfes}</p>\n  <p>Maana reste mutique en marchand lentement dans le village. Il semble traumatisé et pourra expliquer qu'il ne s'attendait pas à autant de destruction et de massacre.\_</p>\n  <p>Il commence à regrouper les cadavre pour leur donner un peu de dignité et une sépulture adaptée.</p>\n  <hr />\n  <p>Le Repos des Esprits est un bâtiment assez intact pour s'y poser et passer la nuit tranquilement assez loin de la dévastation.</p>\n  <p>@UUID[JournalEntry.lAzRUxtxusAXN0ZS.JournalEntryPage.bOl059yt99dsbeuj]{Repos des esprits}</p>\n  <hr />\n  <p>En parcourant le village, l'un des PJ découvre une salle fermée dans l'école de chasse.</p>\n  <p>@UUID[JournalEntry.lAzRUxtxusAXN0ZS.JournalEntryPage.9peq3zVjvs00wwzm]{Ecole de chasse}</p>\n  <p>@UUID[Actor.hWTNQcToxjkQ5MzZ]{École de chasse - Val Rouge}</p>\n  <hr />\n  <h2>La clairière de l'Arbre-Mère</h2>\n  <p>@UUID[Scene.Fm3I69kcdbz0yoAE]{4.Clairière}</p>\n  <blockquote>\n    <img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/val_rouge/val_rouge_arbre_mere.webp\" width=\"100\" height=\"100\" />\n    <p>\n      Au bout d’un sentier qui a été particulièrement emprunté se trouve l’Arbre sacré du Val Rouge. Un arbre immense au centre d’une clairière fleurie. L’arbre est entouré de\n      plusieurs pierres gravées de runes elfiques, de dessins et représentations. Une pulsation lumineuse parcourt les gravures et monte le long de l’écorce de l’Arbre sacré. Toute\n      la clairière a été piétinée par des groupes d’humains au vu des traces. Des coups de haches ont été donnés à l’Arbre sacré et, à un endroit, un feu a été déclenché pour\n      embraser le tronc sans succès.\n    </p>\n  </blockquote>\n  <p>@UUID[JournalEntry.lAzRUxtxusAXN0ZS.JournalEntryPage.ySLZ7yXZ7S7rid5l]{Clairière de l'Arbre-Mère}</p>\n  <h3>Examiner les traces</h3>\n  <p>Les traces sont très diverse. La clairière à été piétinée et saccagée.</p>\n  <ul>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:per|comp:Examiner les traces]</strong></span>\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>10+</strong></span> :\n            <em>Les traces montrent beaucoup de chaussures différentes. La plupart des bottes de soldats ou gardes. Vous voyez aussi des traces de roues de charrette\n              apparemment.</em>\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>15+</strong></span> :\n            <em>Des trainées d'huile ont été étalées près du tronc de l'Arbre Sacré. Vous trouvez également à quelques pas du tronc un pierre runique gravée de l'Ogham du Feu</em>\n          </p>\n        </li>\n      </ul>\n    </li>\n  </ul>\n  <h3>Examiner l'arbre</h3>\n  <p>L'arbre est immense comparé aux autres arbres aux alentours. Les pulsations vertes parcourant l'écorce sont délicates et lentes.</p>\n  <ul>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:per|comp:Examiner l'arbre]</strong></span>\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>10+</strong></span> :\n            <em>Les coups qui ont été donnés à l'Arbre Sacré n'ont fait qu'égratigner l'écorce. Des éclats de métal venant de haches ou de piques se retrouvent à plusieurs endroit\n              au pied de l'Arbre.</em>\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>15+</strong></span> :\n            <em>A deux endroits, vous remarquez des traces à la craie et au charbon d'Oghams divers. Ogham de Feu, Mouvement, transformation, organique… beaucoup de formules ont été\n              testées.</em>\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>20+</strong></span> : <em>Tous les Oghams ont été tracés par la même personne avec soin et précision.</em>\n          </p>\n        </li>\n      </ul>\n    </li>\n  </ul>\n  <h3>Examiner les pierres</h3>\n  <blockquote>\n    <p>\n      Il y a environ une trentaine de Pierres gravées dispersées dans la clairière. Elles sont toutes de taille différentes, certaines de 3m de haut et d'autres ne dépassant qu'à\n      peine la hauteur des fleurs et de l'herbe. Elles sont visibles grâce à la lumière verte des pulsations qui éclairent les gravures sur les pierres. Les gravures sont un coup\n      des écritures elfiques d'un dialècte ancien, des représentations simplifiées de la nature (animaux, feuilles, racines…) mais aussi des symboles. Certains des symboles\n      ressemblent à ceux qui se trouve sur le médaillon de Laotissa Graine Dépeautre.\n    </p>\n  </blockquote>\n  <ul>\n    <li>\n      <p>\n        <span style=\"font-family:Arial\"><strong>@Test[car:per|comp:Examiner les pierres]</strong></span>\n      </p>\n      <ul>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>5+</strong></span> :\n            <em>Les gravures sont très nombreuses et elles réagissent au contact en augmentant légèrement l'intensité de la lumière des pulsations. Sans les avoir toutes vues, pour\n              le moment certains symboles du médaillon de la Shaman sont présent en plusieurs exemplaires sur différentes pierres.</em>\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>10+</strong></span> :\n            <em>Lorsque vous touchez deux gravures sur la même pierre, la première revient à son état normale et la deuxième luit plus mais lorsque vous touchez plusieurs gravures\n              sur des pierres différentes chaque gravure continuent de luirent pendant une dizaine de minutes.</em>\n          </p>\n        </li>\n        <li>\n          <p>\n            <span style=\"font-family:Arial\"><strong>15+</strong></span> :\n            <em>Après plusieurs minutes de fouille et d'observation, la rune située au centre du médaillon n'est présent qu'une seule et unique fois sur une petite pierre proche du\n              tronc de l'Arbre Sacré. Elle ne luit pas de cette lueur verte et aucune autre gravure n'est présente sur cette pierre là.</em>\n          </p>\n        </li>\n      </ul>\n    </li>\n  </ul>\n  <div>\n    <p>\n      <strong>Pour accéder au temple, le groupe doit appuyer dans le bon ordre sur les bonnes runes présentes sur les pierres en suivant la comptine de Laotissa</strong> Graine\n      Dépeautre.\_@UUID[Compendium.world.reliquesunion-objets.Item.02qxYov3KKmbXck8]{Comptine de Laotissa}\n    </p>\n    <blockquote>\n      <p>La mère, l’enfant, l’arbre, le fruit, la plante, la graine, la glace, le vent, le sable et enfin le savoir.</p>\n    </blockquote>\n    <p>\n      Comme certaines runes sont présentent sur plusieurs pierres gravées, <strong>il ne faut pas appuyer sur deux runes qui se trouvent sur la même pierre</strong>. Tout cela\n      <strong>avant que la lueur de la première rune ne s'estompe</strong> (environ 10 minutes). S'ils ne trouvent pas la solution, donner des indices aux PJs grâce à Maana où\n      lorsqu'ils observent le médaillon ou les pierres gravées.\n    </p>\n    <p>Au moment où ils complètent la séquence des 10 premières runes :</p>\n    <blockquote>\n      <p>\n        Au moment, où ils appuient sur la rune du Savoir, toutes les runes s'allument de façon plus vive, les autres gravures s'éteignent et les pulsations accélèrent jusqu'à\n        devenir une vibration lumineuse parcourant chaque craquelure de l'écorce de l'Arbre Sacré. Rien ne se passe de plus. Le temps semble suspendu. Vous ressentez comme une\n        sensation d'attente ou d'apaisement provenant de l'Arbre Sacré.\n      </p>\n    </blockquote>\n    <p>Pour ouvrir l'entrée du Temple du Val Rouge, <strong>il faut toucher sur la rune similaire à celle du centre du médaillon</strong>.\_Lorsqu'ils le font :</p>\n    <blockquote>\n      <p>\n        Toutes les lumières vertes sur les runes et sur l'écorce vous flashent d'un coup et un rayon lumineux vert jaillit vers le ciel puis tout s'éteint instantanément. Un fort\n        sifflement se fait entendre puis les vibrations s'arrêtent d'un coup. Toute la nature se fige autour de vous. Tout devient silencieux.\n      </p>\n      <p>\n        Quelques battements de coeur plus tard vous entendez un craquement et vous voyez les racines de l'Arbre Sacré non loin de la Pierre gravée de la dernière rune bouger et\n        s'écarter. Elles libèrent une entrée assez large pour laisser passer deux personnes côte à côte qui laisse voir un escalier en colimaçon en pierre qui descend en sous-sol.\n        Au moment où les racines s'arrêtent de bouger, les rayon d'une lumière s'allume un peu plus bas dans l'escalier. Les premières marches en pierres que vous voyez sont\n        finement gravées de branches, de feuilles et de racines. Aucune trace de poussière ou de saleté n’est visible.\n      </p>\n      <p>Que faites-vous ?</p>\n    </blockquote>\n  </div>\n</div>"
