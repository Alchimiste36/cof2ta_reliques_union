      content: "<div class=\"journal-page-cof2ta\">\n  <p>\n    Après l'ouverture de l'Arbre-Mère parle groupe et l'apparition de l'escalier, vous pouvez activer la scène :\_@UUID[Scene.MEmbyDWkSWIgnGVW]{5.Temple du Val Rouge} et positionner\n    les tokens de PJ en bas de l'escalier au centre de la Salle A.\n  </p>\n  <hr />\n  <p>\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Les Salles du Temple du Val Rouge :</span></strong></span>\n  </p>\n  <p>@UUID[JournalEntry.qNrZZ3CEkvn24VlV]{Salle A : Entrée}</p>\n  <p>@UUID[JournalEntry.mfq8P93jxFSAgxNQ]{Salle B : Passage du Dortoir}</p>\n  <p>@UUID[JournalEntry.wMVqVieNKUHZHrUR]{Salle C : Réfectoire}</p>\n  <p>@UUID[JournalEntry.LMyL5NOgH5qlFo6u]{Salle D : Bibliothèque}</p>\n  <p>@UUID[JournalEntry.SaxUVzzTLDk5O68v]{Salle E : Cuisine}</p>\n  <p>@UUID[JournalEntry.9EW3Luuqm057GwxP]{Salle F : La salle de prière}</p>\n  <p>@UUID[JournalEntry.hPzzQ7YeUN7qfltF]{Salle G : Dortoir de la suivante}</p>\n  <p>@UUID[JournalEntry.s7KtmtQGUEC9jG3Z]{Salle H : Dortoir de la Gardienne}</p>\n  <p>@UUID[JournalEntry.FPIfaud51uhQobti]{Salle I : les 10 dortoirs des acolytes}</p>\n  <p>@UUID[JournalEntry.Ru1kPf3U522FbVxc]{Salle J : Garde manger}</p>\n  <p>@UUID[JournalEntry.rcHwC6chckKFTH2G]{Salle K : Les deux sanitaires}</p>\n  <p>@UUID[JournalEntry.KxdATvtr2j4z7Vcy]{Salle L : La grande salle de l’Union}</p>\n  <p>@UUID[JournalEntry.IuTSUN7bYbOtWKQd]{Salle Secrète § : La salle de la relique}</p>\n  <hr />\n  <h2>Le Bracelet de l'Union</h2>\n  <section class=\"secret\" id=\"secret-5WYTc9bLV9ID5qIA\">\n    <div class=\"sallemj\">\n      <p>\n        Les PJ sont là pour récupérer \"le Bras de l'Union\", une relique puissante et dangereuse pour les Terres d'Arran. Après leurs fouilles et leurs recherches, seul\n        le\_@UUID[Compendium.world.reliquesunion-objets.Item.5Uuj47G7huY5efth]{Brassard elfique} peut correspondre à cet artéfact.\n      </p>\n      <p>\n        Bien que magnifique et légèrement magique, le brassard ne semble pas si puissant que cela à première vue. Sa magie est bien cachée car elle vient surtout des deux\n        personnalités qui sont emprisonnées dedans.\n      </p>\n      <p>\n        Pour résumer, la première personnalité est une elfe blanche de nom de Faïlass qui souhaite apporter paix, cohésion, rencontre et apaisement entre les peuples des Terres\n        d'Arran. Pacifiste et humaniste, Faïlass est l'une des Cinq Doigts de l'Union.\n      </p>\n      <p>\n        La deuxième personnalité antagoniste se nomme Ramell. C'était un humain avant de devenir un démon immortel. Il a propagé des théories racialistes et ségrégationnistes\n        pronant la supériosité du peuple humain sur les \"Races Inertes\" comme il les nomme. Il a corrompu les Reliques de l'Union avant d'être emprisonné par l'Ordre de l'Union\n        dans un cercueil scellé dans les caves du Manoir Écarlate à Kosland. Depuis quelques dizaines d'années, il a réussi à s'échapper et il aimerait bien mettre la main sur les\n        cinq reliques pour développer ses plans de suprématie. Le groupe de PJ découvriront bien plus tard que Ramell a manipulé Amanori Bellara et Hisp Galik dans leur entreprise\n        de souission des Peaux Vertes.\n      </p>\n    </div>\n  </section>\n  <p>\n    Face à cet objet magique, si un PJ veut équiper le\_@UUID[Compendium.world.reliquesunion-objets.Item.5Uuj47G7huY5efth]{Brassard elfique}, il faut créer une tension immédiatement\n    !\n  </p>\n  <p>Si\_</p>\n  <p></p>\n  <p>\n    Les PJ peuvent rester plusieurs jours dans le Temple du Val Rouge s'ils veulent faire des recherches dans la bibliothèque, compiler les notes de la Gardienne Maniash'Onira ou\n    étudier les runes du bassins ou les spécificités du Temple.\n  </p>\n  <p>\n    S'ils font des recherches poussées, fournissez leur ce document pour résumer les premiers éléments de l'histoire autour des Reliques\n    :\_@UUID[JournalEntry.3vLgG56UNatm4WBe]{Chronologie Résumée}.\n  </p>\n  <p class=\"imp\">\n    <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">!!! ATTENTION !!!</span></strong></span>\n    <strong>En fonction des informations que les PJ ont trouvé, il faudra donner le droit \"Observateur\" sur les bonnes pages sans divulguer des informations sensibles sur la suite de\n      l'aventure.</strong>\n  </p>\n  <hr />\n  <p>\n    En fonction de l'histoire de vos joueurs et de leurs missions personnelles, vous pouvez en profiter pour donner des informations sur leur famille, leur passé, leur objectif…\n  </p>\n  <p>\n    <strong>Tel'Quessir :</strong> le PJ qui a l'historique proposé \"Tel'Quessir\" pourra trouver dans la bibliothèque de la Gardienne s'il cherche une information proche de ce\n    terme :\_@UUID[Compendium.world.reliquesunion-objets.Item.xrDJSuwMqhDQLr1Z]{Tel'Quess'Aar}\n  </p>\n</div>"
