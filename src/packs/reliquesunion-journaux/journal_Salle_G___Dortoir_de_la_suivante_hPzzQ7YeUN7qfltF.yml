        <div class="arran-mod">

        <div data-pm-slice="3 3
        [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}}]">

        <div class="salledescr">

        <p><strong>Description :</strong></p>

        <p>Cette petite pièce est aménagée avec un coffre, un lit et un placard.
        Le lit est parfaitement fait. Dans le placard et le coffre, on retrouve
        des vêtements chauds et froids, quelques bijoux simples et un pendentif
        en forme d’un symbole (montrer le symbole). Le pendentif est sculpté
        dans un bois très clair et les motifs sont coulés avec une espèce de
        sève ou d’ambre.</p>

        </div>

        <div class="sallemj">

        <p><strong>Notes pour le MJs :</strong></p>

        <p>Tout l’équipement coûte pas plus de 30pa. Le pendentif est très joli
        et peut valoir entre 50 et 100pa en fonction de la négociation.</p>

        </div>

        </div>

        </div>
