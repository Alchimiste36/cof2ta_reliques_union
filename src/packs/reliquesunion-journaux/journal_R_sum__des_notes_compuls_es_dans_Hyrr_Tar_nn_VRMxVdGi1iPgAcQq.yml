      content: "<p>La consultation des journaux d’Okdar, des rapports officiels de la gardes d’élite sous le commandement d’Agirum, commandant de la garde d’élite royale, des documents juridiques de l’hôtel de ville et du palais royal ainsi que des différentes lettres et notes trouvées, a permis de créer une chronologie des événements survenus durant le règne d’Okdar, dernier roi d’Hyrr’Tarënn</p><ul><li><p class=\"MsoNormal\"><strong>7021 AGS</strong> – création et aménagement de la Cité-Forge par Abadar Ferlame.</p></li><li><p class=\"MsoNormal\"><strong>7142 AGS</strong> – Blessure à la cheville d’Abadar Ferlame par un chef de guerre Orc.</p></li><li><p class=\"MsoNormal\"><strong>7307 AGS</strong> – Mort d’Abadar Ferlame. Création de la statue et du mécanisme d’ouverture de l’entrée nommé La Plaie avec les deux portails de téléportation. Aménagement de la Falaise des Navires, la grande porte permettant l’ouverture de la rivière souterraine vers le Quartier des Echanges. Essor important de la cité</p></li><li><p class=\"MsoNormal\"><strong>7314 AGS</strong> – Aménagement d’une cité d’échange à quelques kilomètres de la cité ainsi que de nombreuses ambassades au sein d’Hyrr’Tarënn. L’Avant-Goise et les ambassades permettent de garder la cité fermée la grande majorité du temps.</p></li><li><p class=\"MsoNormal\"><strong>8303 AGS</strong> – Okdar devient roi d’Hyrr’Tarënn à l’âge de 62 ans</p></li><li><p class=\"MsoNormal\"><strong>8308 AGS</strong> – début des travaux de construction du Cœur d’Hyrr’Tarënn, du Tourbillon et des Jardins Royaux ainsi que de nombreuses explorations des mines Sud-Ouest.</p></li><li><p class=\"MsoNormal\"><strong>8332 AGS</strong> – Apparition et premiers effets du démon Dax’Ax’Revm.</p></li><li><p class=\"MsoNormal\"><strong>8338 AGS</strong> – désertion de la majorité des habitants de la Cité-Forge après de nombreux incidents, crimes, agressions…</p></li><li><p class=\"MsoNormal\"><strong>8340 AGS</strong> – Découverte de Dax’Ax’Revm, le Mangeur des Rêves dans l’ancien Quartier des Rois à l’Ouest du Quartier Noble. Première destruction du Démon et effondrement du Quartier des Rois. Poursuite des effets de Dax’Ax’Revm et réapparition du démon dans le Quartier des Fermes.</p></li><li><p class=\"MsoNormal\"><strong>8340 AGS à 8367 AGS</strong> – Multiples combats contre le démon durant les années qui suivent. Consultation des maîtres du Temple, des Exorcistes et encore des plus grands cognards nains. Départ de la majorité des familles nobles et des derniers habitants de la Cité-Forge.</p></li><li><p class=\"MsoNormal\"><strong>8367 AGS</strong> – fermeture définitive de la Cité-Forge après le départ de la dernière famille noble, le clan Pierre Dure. Seul reste Okdar (126 ans), sa femme Timalda, le frère du roi Raktar, cinq gardes personnels, le cuisinier de la famille et, enfin, Farlum, le jeune nain orphelin recueilli par la famille royale après la première fausse couche de Timalda.</p></li><li><p class=\"MsoNormal\" style=\"tab-stops:right 16.0cm\"><strong>8368 AGS</strong> – mort de Farlum, de Raktar, du cuisinier et de trois gardes<span style=\"mso-tab-count:1\">\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_</span></p></li><li><p class=\"MsoNormal\"><strong>8372 AGS</strong> – mort de Timalda et des deux derniers gardes.</p></li><li><p class=\"MsoNormal\"><strong>8373 AGS</strong> - Dépose de la Bague des Rois dans le cœur d’Hyrr’Tarënn et mort de Okdar.</p></li></ul>"
