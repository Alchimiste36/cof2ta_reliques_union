    text:
      format: 1
      content: >-
        <p>Dans la ville du Ravin de Novrak on peut trouver de nombreux artisans
        plus ou moins compétents et avec une diversité de produits.</p><p>Des
        forgerons, des tisserands, des orfèvre et autres armuriers, on peut
        presque tout trouver dans cette ville au coeur des montagnes des Crocs
        d'Acier.</p><p>Comme tout bon artisans, il ne faut pas compter avoir les
        objets dans la minutes et certains ne travaillent que
        sur-mesure.</p><p><em>NOTES IMPORTANTES : tous les commerçants ont
        tendance à poser beaucoup de questions sur les autres régions, les
        affaires, les rumeurs,…)</em></p><p></p><h3>Exemple d'Artisans
        :</h3><ul><li><p><strong>FORGERON :</strong> Kaldo (nain assez jeune et
        rigolard - très bon produits mais
        basiques)</p></li><li><p><strong>ARMURIER :</strong> filltari (humaine
        veuve fatiguée env. 50 ans exigeante et autoritaire, fabrique des armure
        de cuir avec le cuir des bouquetins de Novrak très bonne
        qualité)</p></li><li><p><strong>COUTURIER :</strong> Karl et Eveni
        (couple d'humains professionnels et peu
        causants)</p></li><li><p><strong>ORFEVRE :</strong> Tali (naine avec de
        l'or dans les mains elle est très
        sarcastique)</p></li><li><p><strong>SCIERIE/MENUISIER
        :</strong></p><ul><li><p>Entreprise Golcuri (une grande famille avec
        père, oncle, deux fils/cousins, trois filles/cousines, 2 gendres et 1
        belle-fille (conflit au sein de la famille mais très bon
        travail)</p></li><li><p>Bois Dur et Equipements (associés de plusieurs
        personnes dont un nain, arnaqueurs mais les prix sont pas chers. La
        plupart de l'équipement cassera après quelques utilisations. Si les PJs
        se plaignent ils pourront être battu voir
        tuer).</p></li></ul></li><li><p><strong>HERBORISTE :</strong> Racine et
        Feuillet (deux frères Orcs très respectés et compétents / vente de
        produits et soigneurs / poisons et potions si
        confiance)</p></li><li><p><strong>DISTILLERIE :</strong> Jean et Freska
        et leurs enfants (beaucoup de liqueurs, vins, bières, alcool forts…
        fabriqué sur place ou importés - de la bonne qualité ou de la piquette à
        tous les tarifs)</p></li><li><p><strong>EQUIPEMENTS DIVERS
        :</strong></p><ul><li><p>A Flanc de Montagne (magasin en déclin car
        presque personne ne va dans les montagnes depuis quelques années, le
        couple (Nathi et Matth) se plieront en quatre pour équiper les
        PJs)</p></li><li><p>Bois Dur et Equipements (associés de plusieurs
        personnes dont un nain, arnaqueurs mais les prix sont pas chers. La
        plupart de l'équipement cassera après quelques utilisations. Si les PJs
        se plaignent ils pourront être battu voir tuer dans une ruelle sombre de
        la ville).</p></li></ul></li><li><p><strong>CUISINE :</strong> Chez
        Matilda (une vraie Naine des montagnes au caractère bien trempé, du
        bagou et un vrai sens commercial, ses rations, plats et biscuits de
        voyages sont délicieux et certaines préparations sont revigorantes voir
        excitante (peuvent être considérer comme des potions avec quelques bonus
        intéressants (INIT, DEF, PERCEPTION, PR…)</p></li><li><p><strong>BARQUES
        A BRAS :</strong> Fabrique Novrak (seule entreprise qui fabrique les
        barques à bras / la négociation serait très dur si un PJs voulait
        acheter une de ces embarcations car le propriétaire Helder ne veut pas
        éventer ses secrets de fabrication à n'importe
        qui)</p></li><li><p><strong>HISTOIRE DU BOUCLIER :</strong> pas vraiment
        artisan mais plutôt collectionneur, ce vieux nain du bouclier possède
        une boutique avec de nombreux objets traditionnels nains, elfiques,
        Peaux Vertes et humains. Il est dur en affaire mais ses produits sont
        assez rares et leur magie est 100% garantie.</p></li></ul>
