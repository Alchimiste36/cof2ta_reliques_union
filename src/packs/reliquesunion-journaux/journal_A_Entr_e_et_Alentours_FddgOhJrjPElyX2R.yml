      content: >-
        <div class="arran-mod"><p></p><table><tbody><tr><td><p><span
        style="font-family:Bookinsanity"><em>Alors que vous arpentez les pentes
        abruptes, vous arrivez dans une foret dense, mélange d'essences de
        résineux de montagnes et de feuillus résistants au froid de l'altitude.
        Vous traversez sans difficulté des petits cours d'eau prenant leur
        sources dans les hauteurs et alimentés par la fonte du
        printemps.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Au travers des branches et des
        buissons, vous distinguez un nuage de vapeur d'eau provenant d'une paroi
        rocheuse et lorsque vous vous en approchez, vous tombez sur une zone où
        les arbres ont été coupés proprement à la hache. Aucun son ne vous
        parvient de la chute d'eau et, derrière une épaisse couche de lierre et
        de feuillage, vous remarquez des murs maçonnés et des grilles
        métalliques en continuité des parois
        rocheuses.</em></span></p></td></tr></tbody></table><p><span
        class="jet"><strong>Jet de SAG-PERCEPTION
        :</strong></span></p><ul><li><p><span class="jet"><strong>DD10
        :</strong> <span style="font-family:Bookinsanity"><em>Vous entendez un
        cliquetis d'un rouage.</em></span></span></p></li><li><p><span
        class="jet"><strong>DD15 :</strong> <span
        style="font-family:Bookinsanity"><em>vous voyez au travers d'une grille
        des mouvements sombres qui
        s'agitent</em></span></span></p></li><li><p><span
        class="jet"><strong>DD20 :</strong> <span
        style="font-family:Bookinsanity"><em>Une partie du lierre se trouvant au
        milieu de la paroi bouge légèrement comme si le mur de l'autre côté se
        déplaçait.</em></span></span></p></li></ul><p></p><p><span
        style="font-family:Bookinsanity"><em><strong>Que faites-vous
        ?</strong></em></span></p><p></p><table><tbody><tr><td><p><span
        style="font-family:Bookinsanity"><em>Au bout de quelques secondes, la
        flèche d'une baliste se plante dans le sol à un mètre de vous et vous
        voyez sortir du mur de lierre des Centaures armés de lances. Certains
        portent des armures, d'autres sont torses nus. Ils galopent en prenant
        soin de vous contourner en criant des phrases incompréhensibles chacun
        en rythme et en se répondant les uns les autres.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Ils se retrouvent en arc de cercle
        autour de vous, pointant leur lances dans votre direction, tapant des
        sabots, montrant leurs bras et leurs tatouages et ils commencent un
        chant de guerre ou d'intimidation, se déplaçant en rythme et en faisant
        de grands gestes explicites (le pouce qui tranche la gorge, un main qui
        brise un os, la lance qui étripe…)</em>.</span> "ça ressemble au Haka de
        Nouvelle-Zélande"</p></td></tr></tbody></table><p><span
        class="jet"><strong>Jet de COMMANDEMENT des Centaures vs PSYCHOLOGIE des
        PJs :</strong></span></p><ul><li><p><span class="jet"><strong>Si réussi
        =&gt;</strong> <span style="font-family:Bookinsanity"><em>Vous êtes
        impressionnés par ces centaures grands et musculeux. C'est la première
        fois que vous croisez ces créatures majestueuses mais vous arrivez à
        garder votre sang froid devant cette
        intimidation.</em></span></span></p></li><li><p><span
        class="jet"><strong>Si Raté =&gt;</strong> <span
        style="font-family:Bookinsanity"><em>Vous êtes impactez par cette
        démonstration de cohésion et de puissance. Aucun de vous n'est à la
        hauteur face à ces guerriers. Vous êtes dans l'incapacité de réagir face
        à cette danse de guerre. (-10 à tous les prochains tests tant que les
        Centaures menacent les PJs
        impressionnés)</em></span></span></p></li></ul><p></p><p><span
        style="font-family:Bookinsanity"><strong>Que faites-vous pendant cette
        danse de guerre
        ?</strong></span></p><p></p><table><tbody><tr><td><p><span
        style="font-family:Bookinsanity"><em>Ca dure deux ou trois minutes et
        ensuite, ils se positionnent en position de combat autour de vous, lance
        pointées et muscles bandés. Une femelle Centaure fait un pas en avant et
        dit : <strong>Unataka nini ?</strong> (Que voulez-vous
        ?)</em></span></p><p><span style="font-family:Bookinsanity"><em>Elle
        semble attendre une réaction de votre
        part.</em></span></p></td></tr></tbody></table><p></p><p></p><p></p></div>
