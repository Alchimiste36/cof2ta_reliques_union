      content: >-
        <div class="arran-mod" data-pm-slice="3 3 []">

        <div class="salledescr">

        <p><strong>Description :</strong></p>

        <p>Cette pièce de 6m par 6m est aménagée en cuisine. Des étagères
        contiennent tous les ustensiles pour préparer à manger. Des flacons sont
        remplis d’épices, de fruits et légumes séchés, des graines, de racines…
        Deux plans de travail de chaque côté sont munis de tiroirs remplis
        d’autres ustensiles.</p>

        <p>Sur l’étagère centrale une vasque en pierre est remplie d’une eau
        limpide coulant d’une petite fente sur le mur nord et dirigée vers la
        vasque.</p>

        </div>

        <div class="sallemj">

        <p><strong>Notes pour le MJs :</strong></p>

        <p>Il y a de quoi faire une trentaine de repas végétariens nourrissants
        avec les vivres présents dans cette cuisine.</p>

        </div>

        <div class="salleplus">

        <p><strong>Plus :</strong></p>

        <p><strong>Trésors :</strong> Les ustensiles, de bonne facture, valent
        environ 400pa pour un poids d’environ 25kg.
        @UUID[Item.JGsNhT3Kx45tY5an]{Ustensiles de Cuisine du Temple du Val
        Rouge}</p>

        </div>

        </div>
