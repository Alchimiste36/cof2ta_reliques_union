  - sort: 100000
    name: Personnages importants
    type: text
    _id: RAxGVYRyUvViVwxA
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Seigneur local :</span></strong></span>\_<strong>Arbosk Mieili de la Tour de Mabeuil</strong>\_et son épouse Veronia.</p><p><strong>Le père du seigneur Mieili, Arbosk’char, est encore\_très influent dans la ville.</strong></p><p><strong>Les trois fils et deux filles du\_seigneur</strong> (entre 15 ans et 37 ans) <strong>ont chacun une place\_dans la gestion de la ville</strong>. Le seigneur est respecté\_par la population même si certains lui reproche son\_inaction, sa passivité et son manque de changement\_ou d’ambition.</p><p><strong>Huit familles de nobles se partagent\_les intérêts de la ville et différents points de sa gestion.</strong>\_</p><p><strong>Il y a peu de conflit car chacun a sa place et son rôle.</strong> A\_chaque décès de seigneur, des tensions et des luttes de\_pouvoir apparaissent sans changer fondamentalement\_le quotidien des habitants. <strong>Politiquement parlant seul\_trois sujets secouent la tranquillité traditionnelle de la\_ville : le racisme envers les anciennes races</strong> tout droit\_venu des Marches du Venkor et s’essaimant petit à petit\_dans la ville, <strong>le désir de certains de faire prospérer la\_ville</strong> alors que d’autres préfèrent ne rien changer et\_enfin, <strong>les problèmes des « Ombres Blanches » et de la\_sécurité des montagnes</strong>. Sur ce dernier sujet certains\_veulent reprendre le pouvoir sur la montagne en\_faisant venir une armée de guerriers pour éradiquer\_cette menace une bonne fois pour toute tandis que\_d’autres parlent de l’esprit de la montagne et de ne\_pas aggraver la situation en amplifiant l’influence des\_humains sur l’équilibre des énergies de la montagne.</p><p>La grande majorité des sujets de discussion dans\_les auberges, les tavernes ou les étales de marché\_tourneront autour de ces trois sujets. Les habitants\_sont pour la plupart des gens simples mais durs au\_premier abord. Ils poseront, surtout les commerçants,\_marchands et nobles, des questions au groupe d’aventuriers sur ce qu’il se passe au-delà des montagnes et\_après quelques instants, une majorité des habitants\_répondront aux questions des PJs.</p><p>\_</p><table><tbody><tr><td><p></p></td><td><p></p></td><td><p></p></td><td><p></p></td></tr><tr><td><p></p></td><td><p></p></td><td><p></p></td><td><p></p></td></tr></tbody></table><p></p><p></p><p></p><p></p>"
