  - sort: 1500000
    name: 9. L’amphithéâtre
    type: text
    _id: o3a6w3Q8vRE0tzio
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Dans ce petit amphithéâtre on organise des tournois, des animations culturelles et des procès régulièrement. La plupart des\_animations festives sont organisées par la Guilde des Jongleurs locale.</p>"
