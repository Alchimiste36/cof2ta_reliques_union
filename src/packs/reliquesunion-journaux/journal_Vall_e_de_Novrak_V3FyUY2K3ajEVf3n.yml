  - sort: 1700000
    name: 11. Prêtres et Exorcistes
    type: text
    _id: Pn8Uoc68vKC6CMSa
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Un nain, Odrinar et deux humains, Fratell et Gueralf, officient ensemble dans les temples au sein du château. Moins connu, ils\_sont aussi compétents pour effectuer des exorcismes et ils sont de temps en temps recrutés pour chasser un démon ou une\_créature des ténèbres.</p><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/vallee_novrak/pretre_dertirn.webp\" width=\"100\" height=\"100\" /><p>Depuis quelques années, le prêtre de Solima Dertirm prend de plus en plus de place au sein du temple. Il vient des Marches du Venkor et ses prêches sont très appréciés par les plus radicaux des habitants de la Vallée de Novrak. Il est en parti responsable de la montée du racisme envrs les anciennes races dans cette ville isolée.</p>"
    video:
      controls: true
      volume: 0.5
    src: null
    category: null
