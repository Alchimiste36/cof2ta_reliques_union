  - sort: 900000
    name: 2. Quelques auberges ou tavernes plus ou moins chics
    type: text
    _id: XSApY4Yc1eZ71J6Y
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Comme dans toutes les villes, il y en a pour tous les goûts entre le
        quartier pauvre proche de la porte sud ou le quartier noble au
        Nord-Est.</p><p>Des chopes de bières frelattés accompagnant un gruaux
        infecte aux vins les plus rafinés d'Arran servi autour de mêts délicats,
        chaque bourse trouvera un servive à sa hauteur.</p><p>Dans les plus
        chics auberges ou tavernes, un filtrage à l'entrée sera fait alors que
        dans les plus malfamée de nombreux événements dramatiques peuvent
        frapper des visiteurs étrangers (surtout des représentants des anciennes
        races).</p>
