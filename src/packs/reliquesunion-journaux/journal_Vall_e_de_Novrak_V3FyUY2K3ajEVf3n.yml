  - sort: 1800000
    name: 12. Torak GrisTorse, collectionneur
    type: text
    _id: kcGbodx4dVP7tF1X
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/vallee_novrak/villageois_torak.webp\" width=\"100\" height=\"100\" /><p>Connu seulement des connaisseurs, un ancien nain du Bouclier possède une belle collection d’objets traditionnels de différentes\_cultures (nains mais aussi Elfique, humain et quelques pièces Peaux Vertes). Passant sa retraite dans la ville, il pourra vendre\_ou échanger des Objets Magiques avec les joueurs respectueux et aimables.</p>"
