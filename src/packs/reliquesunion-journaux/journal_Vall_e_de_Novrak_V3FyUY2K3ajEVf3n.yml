  - sort: 1600000
    name: 10. La Guilde des Jongleurs
    type: text
    _id: kBT8MAA5wywhcXkL
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Cette bâtisse est gérée par la Guilde des Jongleurs. Organisations de ménestrels transmettant les actualités partout dans les\_Terres d’Arran, c’est assez rare de trouver un bâtiment spécifique pour cette guilde. Pied à terre pour les Jongleurs, ils ne sont\_pas très accueillants, souhaitant surtout faire des pauses dans leurs longs périples.</p>"
    video:
      controls: true
      volume: 0.5
    src: null
    category: null
