  - sort: 1400000
    name: 7. Deux grandes places du marché
    type: text
    _id: ES9n54gHUnNFAAh5
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Non loin du château, de l’amphithéâtre et de la rue des artisans, avec des étales bien fournis, on peut se promener sur la place\_du marché populaire. Animée et festive, cette place fournit tous les produits de la vie courante (fruits, légumes, graines, pains,\_charcuterie…) mais aussi des bibelots et breloques. Dans le quartier noble, les allées sont plus calmes et produits sont bien\_plus chers.</p>"
    video:
      controls: true
      volume: 0.5
    src: null
    category: null
    ownership:
      default: 0
