  - sort: 1300000
    name: 6. «La Faille Humide»
    type: text
    _id: 6ylfY09nmOqtCrYX
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Maison close située entre le château et les quartiers nobles de la Vallée de Novrak. L’établissement est très chic et élégant. Sans\_aucune gène, on peut y voir rentrer tout le gratin de la ville et les riches marchands étrangers qui passent quelques nuits dans\_la cité.</p>"
