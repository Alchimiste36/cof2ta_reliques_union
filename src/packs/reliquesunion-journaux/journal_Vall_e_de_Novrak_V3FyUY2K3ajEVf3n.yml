  - sort: 1450000
    name: 8. L’École du Vivant de Sélénia
    type: text
    _id: FD84yzGGfH0T6fVS
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_ecole_vivant.webp\" width=\"100\" height=\"100\" /><p>Cette école spécialisée dans les recherches sur la géologie, la faune et la flore des montagnes est tenue par Sélénia, une femme\_de caractère connue de tous les Novraks. Il y a beaucoup de produits et d’informations à trouver en discutant avec des apprentis\_ou avec la propriétaire (danger des montagnes, plantes comestibles locales, potions et baumes, lieux d’intérêts de la ville…).</p><p>Cette école fait aussi office d’hôpital, d’herboriste et de vétérinaire.</p><p>Le magasin a plusieurs objets qui peuvent intéresser les Aventuriers mais en fonction de l'approche qu'ils auront face à\_@UUID[Actor.OYaSLTALmbEo5XZL]{Sélénia}, elle ne leur proposera pas les potions les plus rares.</p><p>@UUID[Actor.yNuVJLXFziWMMZJm]{École du Vivant - Vallée de Novrak}</p>"
