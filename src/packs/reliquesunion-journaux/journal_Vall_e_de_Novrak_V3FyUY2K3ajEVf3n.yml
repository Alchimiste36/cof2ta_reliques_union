    text:
      format: 1
      content: "<h2>Population :</h2><p>70% humains / 23% de nains / 0% d'Elfes / 0% de Sang-Mêlées / 7% de Peaux Vertes</p><h2>Description :\_</h2><p>Ville de près de <strong>550 habitants</strong> en grande partie constituée d’humain et de nains. On peut y croiser quelques Peaux Vertes mais pour trouver un elfe il va falloir se lever tôt.</p><p><strong>Le climat très rustique et froid de la Vallée de Novrak</strong> et surtout le manque de luminosité donne à cette ville des aspects austères et les habitants ont souvent le teint pâle et des marques du climat rude sur le visage et dans les postures.</p><p>Dans ce village, bien organisé, <strong>les caravanes et les voyageurs de passages sont toujours tolérés</strong> mais\_la frontière est particulièrement opaque entre les habitants et les gens de passage.\_<strong>Faire sa vie au milieu de ces habitants revient à être un étranger toute sa vie</strong>, même si, de temps à autre, on peut trouver des mariages entre un migrant d’Est ou de l’Ouest et un Novrak ou une Novraki.</p><p><strong>L’économie et les échanges se font très majoritairement avec les Marches du Venkor et sa capitale Kosland</strong> grâce à la rivière qui traverse la ville et qui prend sa source un peu plus haut dans les sommets.\_Cette rivière descend jusqu’à la rivière «\_Mordra\_» et <strong>permet le transport de marchandises dans de petites embarcations assez particulières nommée par les Novrak «\_barque à bras\_»</strong>, de la ville vers les zones plus civilisées en évitant les marécages et les périples présents dans cette zone de la Birkanie.</p><p>Arrivée le plus au Sud du Fleuve « Mordra »,\_<strong>une grande et belle cité fortifiée, « Mordian », permet d'écouler les marchandises\_et de faire le plein des denrées essentiellement alimentaires</strong> dont à besoin les habitants de la Vallée\_de Novrak. Ensuite,\_les « embarcations » sont tirées hors de l’eau et deviennent de charrettes tractables par un cheval ou deux à quatre hommes\_pour retourner dans les chemins de montagnes. Très maniables, <strong>les « barques à bras » sont un atout jalousement gardé par la ville</strong> tant sur sa conception que sur son utilisation.</p><p>Les produits phares du Village et qui s’exportent vers les Marches du Venkor essentiellement sont du\_<strong>cuir de haute qualité venant des bouquetins de Novrak</strong>\_(une espèce rustique et locale),\_les <strong>distillats de résines des conifères\_de la montagne</strong> ainsi que\_<strong>quelques plantes rares\_du coin</strong> et bien sûr <strong>les autres produit des montagnes environnantes</strong> (minerais, blocs de roches, bois de résineux…).</p><p>La position\_de la Vallée de Novrak lui\_permet aussi de <strong>monétiser un certain nombre d’informations stratégiques entre le grand Ouest et les régions à l’Est</strong> des montagnes des Crocs d’Acier\_(bandes de Peaux Vertes en mouvement, actualités, changement de gouvernement de différentes grandes cités éloignées). Ainsi,\_<strong>la plupart des commerçants et des nobles de la ville posent énormément de questions aux voyageurs et marchands</strong> passant par la ville\_afin de récupérer les informations importantes pour les vendre ensuite au plus offrant.</p><p><strong>La Vallée de Novrak est rarement attaqués par les tribus de Peaux Vertes</strong>\_qui peuvent vivre dans les montagnes ou en Birkanie car depuis plusieurs années,\_les habitants stoppent et libèrent les caravanes d’esclavagistes\_qui mettent à sac des tribus d’Orcs ou de Gobelins pour revendre des Peaux Vertes dans l’Ourann. Sans être officiel, les Orcs et Gobelins ont un certain respect pour ces habitants.</p><p>Il est, depuis quelques dizaines d’années, <strong>assez risqué d’aller dans les montagnes aux alentours de la ville sans une forte présence de protection</strong>.\_De nombreuses disparitions ont été signalées dès qu’on s’aventure dans les hauteurs\_ou que l’on prend ses distances à la recherche de plantes ou pour pouvoir chasser. Les éleveurs de bouquetins de Novrak redoutent toute l’année d’amener leurs bêtes dans des pâturages au risque de ne pas revenir au village. L’exploration des montagnes est de par nature assez dangereuse mais\_<strong>depuis des années les « Ombres Blanches » assassinent et kidnappent les imprudents\_faisant du hors piste.</strong></p><hr /><h2>Particularités Locales :</h2><p><strong>La plupart des habitants sont des gens simples,\_gentils et serviables.</strong> La vie dans les montagnes étant\_rudes, il est courant d’aider son voisins dans les tâches\_quotidiennes et l’entraide est plutôt la norme.</p><p>Au delà de ce caractère général, la plupart des\_<strong>jeunes hommes et femmes ou les veufs ou veuves\_seront assez entreprenant avec les groupes d’aventuriers et de marchands de passage</strong>, espérant trouver un\_amant qui les amènera dans une région plus douce\_et accueillante. Sans être trop oppressante, <strong>cette\_drague ou les propositions d’aventure des plus jeunes\_suivront les PJs où qu’ils aillent</strong>.</p><p><strong>L’économie de la ville étant fortement basée sur\_l’artisanat locale, les marchands sont très rigoureux\_dans leur travail</strong> (pour la plupart). <strong><span style=\"text-decoration:underline\">Ils n’accepteront pas de vendre une tenue, un bijou ou un équipement\_qui n’a pas été ajusté ou personnalisé d’une manière\_ou d’une autre</span></strong>. Le groupe de héros devront souvent\_patienter quelques heures voir quelques jours pour\_récupérer leurs achats auprès des artisans. <strong>Certains\_vendeurs sont moins respectueux et feront leur\_possible pour vendre à prix d’or de l’équipement de\_mauvaise qualité</strong> ou des pièces sans grande valeur.</p><p>L’accueille chaleureux des villageois est contre\_balancé par <strong>les procédures strictes lorsqu’on se rend\_au château de la ville</strong>. Du plus insignifiant serviteur au\_conseiller direct du seigneur Arbosk, <strong>tous les travailleur du château sont froids,\_ pointilleux, désagréables\_et procéduriers.</strong> De longs heures d’attente pour\_accéder au Maitre Archiviste Tarrinn, tout ça pour\_seulement payer des recherches qui prendront\_surement quelques jours. Les portes sont closes, la\_salle d’attente austère et le sarcasme ne semble pas du\_tout leur plaire. De quoi rendre fou le plus diplomate\_des Elfes Blancs !</p><p>Ce degré de procédure s’explique par la pression\_que subit le seigneur à cause des huits familles nobles\_de la ville. Ces dernières observent ses moindres faits\_et gestes à la recherche de favoritisme, d’erreurs ou\_de malversations qu’ils pourront utiliser contre lui et\_ses proches. L’ordre principal au château de la Vallée\_de Novrak : «<em><strong>tout doit être en règle, la loi est la même\_pour tout le monde !</strong></em>»</p>"
    video:
