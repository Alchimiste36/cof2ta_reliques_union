  - sort: 1900000
    name: 13. Voyous et Voleurs
    type: text
    _id: 7PcfmY0FlwEPM63h
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Totalement caché, on peut trouver, dans certains souterrains de la ville, une bande de voleurs assez grande pour qu’on puisse\_la qualifier de Guilde. Composé majoritairement d’adolescents et de jeunes pauvres sans grand avenir dans cette cité isolée, le\_groupe de voyous utilise toutes les techniques pour récupérer quelques piécettes, marchandises et objets de valeur. Ils ne sont\_pas bien méchants et les gardes de la ville connaissent la plupart de ces jeunes. Quelques jours dans les cellules du château,\_une pelletée d’heures de travaux forcés et l’affaire s’arrête là dans la plupart des cas.</p>"
