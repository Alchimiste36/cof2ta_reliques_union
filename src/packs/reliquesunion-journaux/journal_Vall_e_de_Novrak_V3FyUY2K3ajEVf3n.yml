  - sort: 700000
    name: 1. Château - Temples - Bibliothèque - Place Forte
    type: text
    _id: erBYEVTnBavgEKMH
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_bibliotheque2.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_bibliotheque1.webp\" width=\"100\" height=\"100\" /><p>Un château faisant office aussi de temple de Solima et d’Yjdad et de place forte en cas d’attaque. @UUID[JournalEntry.V3FyUY2K3ajEVf3n.JournalEntryPage.Pn8Uoc68vKC6CMSa]{Les deux temples (humain et\_nain)} sont bien séparés mais de mémoire c’est surement la seule ville qui accueille dans le même bâtiment les deux croyances.</p><p>C'est ici que vivent les membres de la famille seigneuriale.</p><p>La réception au château est extrêmement protocolaire et cela prendra du temps pour faire une demande pour consulter la bibliothèque auprès du Maitre Archiviste Tarrinn ou faire une demande de service.</p><img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_chateau_salle_attente.webp\" width=\"100\" height=\"100\" /><p>L'intendant qui reçoit un PJ sera froid, distant et intransigeant sur les identités, les papiers demandés ou encore sur les motifs invoqués. Les PJ attendront dans des salles d'attentes confortables mais pour des durées souvent longues sans que quiconque puisse leur donner des informations.</p><p>Le seigneur étant très surveillé par les grandes familles nobles de la ville, il est très stricte sur les protocoles de crainte qu'on puisse lui reprocher du favoritisme ou des conflits d'intérêt.</p><p>Bien entendu, la garde du château est équipée et compétente pour jeter dehors tous les visiteurs qui manqueront de patience ou de diplomatie. L'agression sur un agent de la ville, physiquement ou verbalement, pourrait avoir de lourdes conséquences judiciaires.</p><img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_chateau_diner.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/vallee_novrak/vallee_de_novrak_chateau_salon.webp\" width=\"100\" height=\"100\" /><hr /><p></p>"
