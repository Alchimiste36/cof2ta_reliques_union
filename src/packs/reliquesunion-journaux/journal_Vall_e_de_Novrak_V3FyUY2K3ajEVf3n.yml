  - sort: 1100000
    name: 4. Marchands et Transports
    type: text
    _id: VefgDOwljkgknKBr
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>Au niveau des deux portes de la ville, on trouve de nombreux entrepôts et comptoirs pour les marchands qui importent ou\_exportent leurs marchandises. Les produits locaux sont assez prisés dans les autres régions et surtout à Kosland (minerais, blocs\_de roches, distillation de résines ou de plantes de montagne, éleveur de bêtes, fabricant de cuir de haute qualité…)</p>"
