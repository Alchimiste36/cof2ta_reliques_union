    text:
      format: 1
      content: >-
        <blockquote><h2><span style="font-family:hobo"><strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold">Monsieur
        Ramiel Maria von Weber,</strong></span></h2><p
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;margin:5px;font-family:hobo;color:rgb(13,
        1,
        27);font-size:16px;text-indent:0px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify"><span
        style="font-family:hobo"><strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold">Je
        sais de source sur que vous n'avez aucun contact ni aucune relation avec
        les elfes sylvains de la région et cela fait de vous une atout pour moi.
        Malgré votre race, j'ai appris que vous aviez des compétences qui
        pourraient mettre utiles sans parler du contrat qui tourne à Blanche
        Paix pour avoir votre tête. Si vous souhaitez avoir un allié dans cette
        région et prendre, pour quelque temps, la route, je pense que je peux
        vous être utile aussi.</strong></span></p><p
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;margin:5px;font-family:hobo;color:rgb(13,
        1,
        27);font-size:16px;text-indent:0px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify"><span
        style="font-family:hobo"><strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold">J'ai
        besoin de vous et avant tout de votre discrétion.</strong></span></p><p
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;margin:5px;font-family:hobo;color:rgb(13,
        1,
        27);font-size:16px;text-indent:0px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify"><span
        style="font-family:hobo"><strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold">Si
        vous souhaitez venir en aide à un homme de haute position et récupérer
        les fruits bien sucrés d'un travail à votre hauteur, je vous donne
        rendez-vous à l'Auberge du Passage Gourmand demain aux premières lueurs
        du jour.</strong></span></p></blockquote>
