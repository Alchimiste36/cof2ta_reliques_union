                et pique le palet.</p>

                <p>En plus de cr&eacute;er un forte &eacute;rection
                incontrolable chez les consommateurs masculins et une
                lubrification vaginale pour les consommatrices f&eacute;minines,
                cette pillule donne un bonus de +5 aux test de CON pendant une
                heure. Les consommateurs ne ressentent plus la fatigue et ne
                peuvent plus dormir pendant tout le temps d'effet du sort.</p>

                <p>A chaque ingestion le consommateur doit r&eacute;ussir un
                test de FOR-ATHLETISME ou de CON DD5 au subir un arret
                cardiaque. Le DD augmente de +5 pour chaque dose
                suppl&eacute;mentaire consomm&eacute;e en moins de 24h
                apr&egrave;s la premi&egrave;re dose.</p>
