            system:
              key: potion-de-soumission-chimique
              description: >-
                <p>Cette petite fiole contient un liquide visceux ros&eacute;e.
                Son go&ucirc;t est piquant et assez mauvais pour la plupart des
                palets.</p>

                <p>Le consommateur perd une partie de sa facult&eacute; de
                jugement et de r&eacute;flexion, le rendant plus facilement
                manipulable.</p>

                <p>Il devient Affaibli (D12 au lieu du D20) pour tous les tests
                qu'il effectue pour r&eacute;sister &agrave; une manipulation,
                une n&eacute;gociation, une intimidation, ... L'effet dure 1d4+1
                Heure.</p>

                <p>De plus, tous les sorts de la Voie de l'Envoutement et le
                sort Suggestion de la Voie du Charme ont une dur&eacute;e
                doubl&eacute;e et un DD+2 pour r&eacute;sister contre une
                personne ayant consomm&eacute;e une dose de Soumission
                Chimique.</p>
