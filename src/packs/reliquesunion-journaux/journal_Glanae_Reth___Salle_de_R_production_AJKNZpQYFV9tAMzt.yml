          J0qSdD3swkyOyGNq:
            folder: mwZqms4s1lPjWHbK
            name: Potion de Soumission Chimique
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/04.ICONES/ICONES%20de%20Base/CONSOMMABLES/POTIONS/potion-flask-corked-labeled-pink.webp
