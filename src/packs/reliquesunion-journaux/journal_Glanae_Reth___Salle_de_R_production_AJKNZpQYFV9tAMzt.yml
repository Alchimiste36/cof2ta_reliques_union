          l77wShBQ9FVs8uwR:
            folder: mwZqms4s1lPjWHbK
            name: Potion de Vision Floue
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/04.ICONES/ICONES%20de%20Base/CONSOMMABLES/POTIONS/bottle-corked-empty.webp
            _id: l77wShBQ9FVs8uwR
            system:
              key: potion-de-vision-floue
              description: >-
                <p>Cette potion est s&eacute;par&eacute; en deux liquides l'un
                sur l'autre. Avant de consommer la potion il faut la secouer
                avec force (une action de mouvement).</p>

                <p>Apr&egrave;s l'ingestion de la Potion de Vision Floue, le
                consommateur et son &eacute;quipement deviennent
                l&eacute;g&egrave;rement flou &agrave; cause d'un effet
                ressemblant &agrave; une vibration quand on le regarde. Ces
                vibrations rend plus difficile de le distinguer.</p>

                <p>&nbsp;</p>

                <p>Le consommateur gagne +2 DEF et +5 DEX-DISCRETION. Le bonus
                de DEX-DISCRETION est doubl&eacute; si le consommateur ne bouge
                pas du tout (aucune action durant son tour).</p>

                <p>L'effet dure 1d6+Mod. SAG Minutes.</p>
