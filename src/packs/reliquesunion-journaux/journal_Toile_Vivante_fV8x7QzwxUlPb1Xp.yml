  - sort: 150000
    name: Les Commandants
    type: text
    _id: IAHswVgOMV5ale1B
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Il y a toujours eu deux Commandants de la Toile Vivante et ils ne
        peuvent pas être des représentants du même peuple et encore moins de la
        même culture.</p><p>Ils partagent TOUTES les informations entre eux et
        sont souvent choisis pour leur grande mémoire et leur morale adaptée à
        la mission de la Toile Vivante. C'est-à-dire une morale mettant
        l'objectif au dessus de tout quelque soit le prix à payer pour
        l'atteindre.</p><p>Si ça peut éviter une guerre ou la déstabilisation
        d'une région, les Commandants doivent prendre les mesures nécessaires
        (mensonges, assassinat, kidnapping, manipulation…).</p><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/commandant_humain.webp"
        width="150" height="150" /><h2>Le Commandant Dendrat</h2><p>Cet humain
        de 54 ans est marqué par une vie de combat et de voyage. Ancien chef de
        la garde d'Ysparh, il a déserté face à cette politique bloquante, ces
        procédures bâillons et la corruption qui l'empêchait de faire
        correctement son travail.</p><p>C'est un homme dur mais tout le monde
        s'accorde sur son sens de la justice malgré les ordres qu'il peut
        donner. Autant que faire ce peut, il essaye toujours d'avoir des actions
        les plus équilibrées possible et il se montre miséricordieux quand c'est
        possible.</p><p></p><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/toile_vivante/commandant_orc.webp"
        width="150" height="150" /><h2>Le Commandant Graton</h2><p>Cet orc âgé
        impose le respect malgré son âge et son corps qui est diminué par les
        années. Ancien chaman pour un Khan orc d'une tribu sanguinaire, Graton a
        déserté lorsqu'il a été informateur pour un ancien Commandant de la
        Toile Vivante.</p><p>Il possède de grands talents autour de la
        divination mais malgré sa musculature d'orc, il ne peut plus se battre
        physiquement. Bloqué des épaules et des genoux, il a de plus en plus de
        mal à se lever.</p><p>Il passe beaucoup de temps à discuter avec les
        Capitaines des Mailles pour repérer un éventuel apprenti pour reprendre
        sa place. Aujourd'hui son choix se porte sur le gobelin Faagh alias
        Fagot qui fait partie de la Maille de la Capitaine Sarlann. Il est
        malin, intelligent, stratège et possède un grand sens de
        l'honneur.</p><p></p>
