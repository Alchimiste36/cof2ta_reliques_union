  - sort: 200000
    name: Les Mailles
    type: text
    _id: ObunC14UHLdGFkTo
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Toutes les races sont acceptées au sein de la Toile Vivante et de
        petites équipes, les Mailles, sont formées pour chaque mission sous les
        ordres d'un capitaine compétent.</p><p>Chaque Maille est composée, si
        possible, de plusieurs peuples différents et surtout de compétences
        complémentaires. Même si les Commandants ont le dernier mot sur la
        composition d'une Maille, chaque membre peut émettre des avis pour faire
        parti ou non d'une Maille.</p><p>La cohésion d'une Maille est très
        importante pour la Toile Vivante et le ou la Capitaine de Maille prend
        la responsabilité de la mission sur ses épaules. Le ou la Capitaine est
        le seul décisionnaire lors de doutes ou de divergence de point de
        vue.</p><p>Dans de rares cas, les informations les plus sensibles ne
        seront transmises qu'au Capitaine mais la plupart du temps, chaque
        membre de la Maille aura toutes les informations nécessaire pour
        atteindre l'objectif.</p><p>La Maille de la Capitaine Dracki
        :</p><p></p><p>La Maille de la Capitaine Sarlann :</p><p></p>
