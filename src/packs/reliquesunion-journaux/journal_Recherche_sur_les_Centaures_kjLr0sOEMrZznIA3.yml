    text:
      format: 1
      content: "<h3>Information recueillie de la bibliothèque d’Orkadia\_:</h3><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\"><strong>Cette note date de 667 CA, il y a presque 40 ans.</strong></p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">D’après un groupe de chasseurs, faisant parti d’une caravane marchande, un groupe de trois centaures immenses ont été aperçus dans les hauteurs de la montagne des Crocs d’Acier. Ils ont hurlé en levant leurs sabots avant et se sont enfuis vers le Nord après cette intimidation.</p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">Notre érudit naturaliste, <em>Herbest Falcon</em>, nous dit, après consultation sur ce fait divers, qu’il est fort peu probable que les créatures vues par ces chasseurs soient réellement des centaures. Surement une erreur de vision dans ces montagnes où nous pouvons croiser, de temps en temps, des bouquetins de grandes tailles avec des cornes biscornues.</p>"
