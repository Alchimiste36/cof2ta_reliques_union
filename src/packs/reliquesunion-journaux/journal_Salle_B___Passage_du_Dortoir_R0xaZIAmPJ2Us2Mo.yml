      content: >-
        <div class="arran-mod" data-pm-slice="3 3 []">

        <div class="salledescr">

        <p><strong>Description :</strong></p>

        <p><strong>Cette salle possède une immense étagère dans l’angle Ouest
        (6m de haut). Sur celle-ci, se trouvent de nombreux draps, tissus,
        livres, serviettes, produits</strong> d’entretien et de toilette,
        équipement en tout genre. Une échelle est accrochée sur l’étagère pour
        atteindre les étages plus hauts.</p>

        <p>Un long couloir part vers l’Ouest et de nombreuses portes sont
        visibles tout autour de vous.</p>

        </div>

        <div class="sallemj">

        <p><strong>Notes pour le MJs :</strong></p>

        <p>La porte de la salle G et celle au fond du couloir (salle J) sont
        fermées à clef. DEX DD20 pour l’ouvrir ou FOR DD20 pour la forcer. PV 15
        - Solidité RD4 - immunisée au feu (la clef se trouve dans le bureau de
        la salle H)</p>

        <p>Les livres sur les étagères sont des recueils pratiques et techniques
        (cuisine, artisanat, ingénierie, communication, histoire de base des
        Terres d’Arran, contes et légendes, livres religieux de prières…).</p>

        </div>

        <div class="salleplus">

        <p><strong>Plus :</strong></p>

        <p>Dans les étagères, chaque objet est de très belle facture. Il y en a
        pour au minimum 2 000pa d’équipement. Maana verrait d’un très mauvais
        œil le pillage de ces objets.@UUID[Item.GPrsWtyYOxx9jMaD]{Etagère de la
        Salle B}</p>

        </div>

        </div>
