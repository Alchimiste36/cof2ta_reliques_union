      content: >-
        <h3>Gelmar, fils de Gälmon, capitaine de la Porte des Grav </h3><p>A
        l'intention de Maître Grim, fils de Brann de la Forge,</p><p>J'ai été
        surpris de recevoir le 20 Desnus 708, depuis le village Hum d'Ispier,
        votre mise en garde concernant un risque d'attaque de Vermines Vertes
        coordonnées.</p><p>La signature du seigneur a retenu mon envie de me
        torcher le joufflu avec ces inepties.</p><p>Mes capitaines ont été
        informés sans changer fondamentalement notre organisation.</p><p>Je ne
        sais pas quand ce message vous parviendra mais il y a une semaine, le 13
        Rova 708, mes poilus ont intercepté un groupe d'hums qui franchissait
        les montagnes avec des "prisonniers" Orcs. Le braconnage de Peaux Vertes
        ne peut se faire sans une petite taxe pour Arkar'Um. Arrivé à la Porte
        des Grav plusieurs éléments nous ont interpelé.</p><ul><li><p>depuis
        quand quatre brindilles d'hums peuvent maitriser 8 orcs seulement munis
        de menottes</p></li><li><p>les orcs semblaient particulièrement passifs
        devant leur condition</p></li><li><p>un des gardes a surpris l'un des
        hommes discuter avec l'un des prisonniers "d'égal à égal" pourrais-je
        dire.</p></li></ul><p>Nous avons cuisiné les hums à la manière du
        Bouclier et entre deux tornioles, ils ont gentillement accepté de nous
        dire qu'ils étaient de mèche avec les orcs et se rendaient dans l'Ourann
        pour rallier des clans d'orcs et de gobelins et les convaincre de
        rejoindre l'Ogrie et le "Clan de la Femme" et garnir son armée. Ces
        bâtards d'homme n'avait que du mépris pour les nains et les "races
        inertes" comme ils aimaient nous appeler.</p><p>Les Orcs quant à eux ne
        parlait que de liberté pour leur peuple barbare, de leur place légitime,
        de leur puissance et de la vague de vermine qui viendrait faucher les
        "races inertes" bientôt.</p><p>Ils sont devenus à moitié tarés à mesure
        des jours qui passaient. Ils avaient des pertes de mémoires, des spasmes
        et des pulsions agressives. Ils ont fini par s'entre-tuer dans leurs
        cellules respectives exactement au même moment alors que les Hums et les
        orcs n'étaient pas dans la même aile des murailles.</p><p>Beaucoup
        d'éléments étranges qui ont fortement inquiété le roi Bërark d'Arkar'Um.
        J'ai cru comprendre lors de ma convocation qu'il ne portait pas votre
        famille dans son coeur et qu'il refusait de vous révéler ces éléments.
        J'outrepasse mes ordres pour vous prévenir de ses événements et j'espère
        que votre route passera rapidement par les murailles de la Porte des
        Grav afin que nous puissions parler de votre intuition initiale.
        J'aimerais y voir plus clair et surtout pouvoir me préparer à une
        attaque massive venant du territoire des Ogres.</p><p>Puisse le Père et
        la Mère protéger les Terres Libres et notre peuple.</p>
