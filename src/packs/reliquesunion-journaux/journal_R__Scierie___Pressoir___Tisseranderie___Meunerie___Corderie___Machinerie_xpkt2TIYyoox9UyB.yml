      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>50</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>50</strong></h2></td><td><h2
        style="text-align:center"><strong>+5 à
        +8</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>Il faut beaucoup de confiance pour visiter et
        travailler dans ce bâtiment. La machinerie principale et chaque
        réalisation installées ici sont très précieuses voir vitales pour le
        village.</p><p>Les PJs seront observés les premiers jours où on leur
        permettra de travailler sur les différentes machines, pour leur sécurité
        mais aussi pour la sécurité des machines.</p><p>Si un PJ fait du mauvais
        travail et surtout s'il bloque une machine, il recevra les remontrance
        de @UUID[Actor.XP0WbhdG2M6FsbW1]{Tumuaki} et de
        @UUID[Actor.WIrrciqtGuvianLz]{Kamura} mais pourra recevoir le soutien de
        @UUID[Actor.nVnugxCfNlRY7EyL]{Miihini} ou de
        @UUID[Actor.BQvEXdnPDfoBuIr0]{Karekau}.</p><p></p><h3>Scierie et
        menuiserie :</h3><ul><li><p><strong>FOR-ATHLETISME DD10 pour utiliser le
        banc de scie et équarrir les troncs</strong> - si raté =&gt; blessure ou
        mauvais travail ou blocage de la machine (échec
        critique)</p></li></ul><p></p><h3>Pressoir, meunerie et tisseranderie
        :</h3><ul><li><p><strong>DEX-AGILITE DD10 pour utiliser les
        machines</strong> - si raté =&gt; bazar ou mauvais travail ou blocage de
        la machine (échec critique)</p></li></ul><p></p><h3>Corderie et
        filanderie :</h3><ul><li><p><strong>DEX-AGILITE DD10 pour utiliser les
        machines</strong> - si raté =&gt; bazar ou mauvais travail ou blocage de
        la machine (échec critique)</p></li><li><p><strong>CHA-PSYCHOLOGIE DD10
        en présence de @UUID[Actor.MIeAPHCIfVkPozXm]{Kaimoe}</strong> - si raté
        =&gt; @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} pourra s'en prendre aux PJs
        s'il pense que du mal a été fait à sa
        conjointe.</p></li></ul><p></p><h2>Description :</h2><p>C'est
        certainement le plus important bâtiment du village d'Arkanov. Le coeur
        d'activité du village, là où la salle commune est le coeur
        populaire.</p><p>Ce bâtiment est relié directement à l'immense roue à
        eau installée sous la cascade. La plupart de la machinerie est installée
        dans ce bâtiment et se connecte à toutes les machines qui permettent de
        réaliser le travail du village.</p><h3>Rez-de-Chaussée : la
        Scierie</h3><p>Dans cette grande pièce, on s'occupe des troncs, des
        branches, des grumes et des planches venant de la forêt intérieure et
        extérieure. Les troncs sont entreposés à l'extérieur près du lac et, au
        besoin, sont passés par la large ouverture dans le mur afin d'être
        débités sur le banc de coupe actionné par les engrenages et les cordes.
        Un centaure seul peut transformer un tronc en poutre ou en planches en
        quelques heures grâce à des systèmes de palans et de treuilles. Ensuite,
        les planches ou poutres sont entreposées et mises à sécher ou elles sont
        mises en oeuvre pour la fabrication des meubles, des structures, des
        charpentes…</p><p>Les outils y sont rangés méticuleusement dans des
        caisses afin d'être facilement déplaçable en même temps que le chantier
        (haches, doloires, ciseaux, règles, compas…). L'atelier est très propre
        à tout moment du jour comme de la nuit et
        @UUID[Actor.WIrrciqtGuvianLz]{Kamura} est très exigeante sur l'entretien
        du banc de scie et des rouages de la machine.</p><p>On trouve aussi la
        porte menant à la mine et servant en de rares occasions de prisons pour
        les aventuriers se présentant devant le village.</p><p></p><h3>Premier
        Étage : Meunerie - Pressoir - Tisseranderie et Machinerie</h3><p>En
        montant le large escalier menant au premier étage, on arrive dans une
        immense pièce tout en longueur. Dans un des coins, on voit une immense
        meule qui permet de transformer les grains en farine. Elle aussi reliée
        à la machinerie de la cascade, on peut la faire tourner à trois vitesses
        différentes pour optimiser la finesse de la farine. Bien que nettoyée
        régulièrement, une fine pellicule blanche est présente sur chaque bout
        de bois et chaque pièce de métal dans cette partie de la
        pièce.</p><p>Derrière l'escalier en colimaçon, un pressoir est installé
        pour extraire le jus des fruits, légumes et plantes diverses qui servent
        pour la cuisine, pour être transformé dans l'alambic, servir à
        aromatiser les bougies, réaliser des colorants pour les tissus ou encore
        pour la préparation des remèdes. Ce pressoir est relié également à la
        machinerie avec un ingénieux système qui permet de réaliser une très
        forte pression mais aussi de soulever le poids rapidement et sans
        effort.</p><p>Le long couloir mène à la tisseranderie et de chaque côté
        on parcours un chemin au milieu des tissus qui sont étendus pour sécher
        après leur teinture ou qui attendent d'être assemblé les uns avec les
        autres pour réaliser des vêtements, des draperies, des rembourrages de
        meubles… On trouve des tissus de toutes les couleurs et de toutes les
        compositions (laines d'animaux chassés dans les montagnes, cuirs, lins
        ou chanvres venant du jardin). Les couleurs sont issus de plantes
        tinctoriales triées et sélectionnées. La tisseuse fabriquée au fond de
        la pièce est une merveille de finesse et de fluidité. On peut voir les
        fils être assemblées lignes après lignes avec la possibilité
        d'intercaler plusieurs types de fils et plusieurs couleurs pour réaliser
        des étoffes multicolores et décorées. Le bruit "tchik tchik tchik" à
        chaque passage crée un rythme qui incite à danser quand on s'occupe de
        cette belle machine.</p><p>Enfin , derrière les parois proches de
        l'escalier, on peut accéder à la gigantesque machine d'Arkanov afin de
        réaliser l'entretien, changer une pièce ou tout simplement pour
        déconnecter telle ou telle machine lorsque l'on doit y faire une
        maintenance. Les courroies, les engrenage de plusieurs mètre de
        diamètre, le cordage qui décuple la force ou la vitesse, les rouages qui
        transmettent le mouvement vers les machines ou les autres bâtiments
        feraient rougir un nains du temple devant cette conception. Il est assez
        complexe de s'y retrouver dans se méli-mélo de coudes et cordes et c'est
        la raison pour laquelle @UUID[Actor.nVnugxCfNlRY7EyL]{Miihini} et
        @UUID[Actor.BQvEXdnPDfoBuIr0]{Karekau} laisse peu de personnes s'occuper
        de cette complexité. Miihini raconte souvent le démontage complet et le
        remontage effectué il y a trois ans pour changer un des engrenages
        principaux. Elle est fière de cette semaine menée d'une main de maitre
        grâce à l'aide de la plupart des villageois.</p><p></p><h3>Deuxième
        Étage : Corderie et Filanderie</h3><p>L'escalier nous mène au deuxième
        étage, là où sont fabriqués cordes, cordages et fils de tous les
        diamètres et dans toutes les matières. Les sacs et bottes de chanvre, de
        lin ou de laine sont montés ici et seront patiemment filés en fils pour
        coudre ou tisser et en solides cordes pour toutes les utilisations du
        village (transport des troncs, raccordement des machines aux poulies… Un
        banc à filer parcourt tout le couloir pour torsader les cordages et au
        fond de la pièce, on peut utiliser le grand rouet à filer qui est
        actionné par les sabots du centaure. Des étagères sont positionnées sur
        la plupart des murs pour stocker les bobines de fils, les rouleaux de
        cordes, les sacs de matières premières ainsi que les outils pour
        utiliser les machines et pour les entretenir.</p><p>A cet étage on
        trouve souvent @UUID[Actor.MIeAPHCIfVkPozXm]{Kaimoe} qui s'occupe de
        filer la laine, de colorer les fils ou de trier les bobines. Elle ne
        parle pas beaucoup et on vient rarement la perturber à cet étage. Elle
        aime être tranquille loin de @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} son
        agressif conjoint. Derrière le bruit de la machinerie, on peut parfois
        percevoir ses sanglots. Lorsqu'un autre villageois a besoin de ces
        machines, elle s'éclipse rapidement dans un autre coin isolé du
        village.</p><p></p><p></p><p></p><p></p></div>
