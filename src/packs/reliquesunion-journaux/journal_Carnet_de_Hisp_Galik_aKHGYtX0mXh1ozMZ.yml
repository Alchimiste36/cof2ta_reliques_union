      content: >-
        <div class="arran-mod"><p><strong>Carnet de cuir renforcé par des
        plaques métalliques.</strong></p><p><strong>Il était bien dissimulé
        derrière une pierre en bas d'un mur dans le laboratoire de nécromancie
        du mage.</strong></p><p><strong>Le carnet contient une bonne centaines
        de pages écrites avec une belle écritures
        serrée.</strong></p><p></p><p><span
        style="font-family:Bookinsanity"><em>Après une lecture approfondit, ce
        carnet décrit les ambitions de Hisp Galik depuis quelques
        années.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Cela commence en 698 Athée (il y a
        11 ans). Il explique avoir rencontré une humaine charismatique et
        ambitieuse voulant mettre à son service des tribus de peaux vertes pour
        développer son pouvoir. Son ambition était de se venger de son mari et
        des souffrances qu'il lui a fait subir.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Hisp aida cette humaine a récupérer
        un objet magique puissant dans les montagne de la Ogrie près du
        littoral. Grâce à ce plastron, elle pouvait mettre sous son contrôle des
        tribue entières de Peaux Vertes (Gobelins, Orcs, Ogres) et les faire
        travailler pour elle. Elle devient une reine au milieu de serviteurs et
        après 3 années de recherches du Plastron et une année entière pour
        réunir et contrôler les Peaux Vertes, elle marche sur son ancien village
        et le réduit en cendre.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Hisp décrit toutes les
        connaissances qu'il a apprise sur la nécromancie pendant les multiples
        séances de tortures de l'ancien mari capturé.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Après quelques mois passé à étudier
        en vivant au milieu de cet espace protégé par des centaines de
        "serviteurs" repoussant toutes les attaques sans se poser de questions,
        Hisp apprend l'existence d'une autre relique nommée "Les armes de la
        Séduction". Il documente ses voyages jusqu'à la bibliothèque d'Aliden à
        Od'Essa, celle de Majinorr dans l'Empire de Dumn et sa visite au
        monastère du Désespoir pour trouver des informations sur d'autres
        reliques.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Il raconte sa découverte de la
        création de l'Ordre de l'Union pour faire oublier les Armes de la
        Séduction et réussi à mettre la main sur le récit ancien d'un elfe ayant
        aidé à la création d'un Temple secret protégé par un Arbre géant dans la
        forêt du Val Rouge.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Il décide de mettre en place un
        plan pour rallier Blanche Paix puis se mettre au service du Seigneur de
        la Cité d'Ispier afin de se rapprocher de son
        but.</em></span></p><p><span style="font-family:Bookinsanity"><em>La
        suite est assez claire.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Il engage des mercenaires pour
        attaquer des caravanes de marchands et des camps de bucherons près de la
        foret du Val Rouge, incite le Seigneur Jaspar de prendre partie contre
        les sylvains. Face à ce premier échec, il en vient à assassiner des
        nobles de la ville en faisant incriminer les elfes et manipule une
        poignées de personnes pour arriver à un conflit direct avec les elfes et
        enfin assassiner la Shaman du village du Val
        Rouge.</em></span></p><p><span style="font-family:Bookinsanity"><em>En
        laissant la situation s'envenimer d'elle même, la guerre est déclarée et
        le village elfique est détruit, lui donnant libre accès à l'Arbre
        géant.</em></span></p><p><strong>Les notes s'arrêtent
        ici.</strong></p></div>
