      content: "<div class=\"arran-mod\" data-pm-slice=\"3 4 []\">\n<div class=\"salledescr\">\n<p><strong>Description :</strong></p>\n<p>Une très grande salle de 20m par 22m recouverte d’un carrelage de deux couleurs. Les carreaux blanc semblent lustrés et les bleu clair luisent d’une légère lueur dansante. Quatre braséros disposés au centre de la salle sont remplies de blocs translucides qui ressemblent à de la gelée et qui brillent d’une couleur jaune ou violette. Tout autour de la salle de nombreuses statues (13) sont toutes différentes et représentent des elfes sylvains. Certains semblent de grands guerriers, d’autres des nobles ou encore des érudits ou des shamans. Une plaque est visible sur chaque socle sur lequel est inscrit le nom de chaque personne. Sur le mur Est une statue est plus imposante que les autres. Elle représente un elfe sylvain richement habillée avec le visage déformé par un rictus de folie. L’avidité se sent dans son regard. Il porte une robe noble et une paire de bracelets richement ouvragés aux poignets. En face, de cette statue on trouve un trône imposant construit dans un mélange de pierre et de tronc d’arbre.</p>\n</div>\n<div>\n<div class=\"sallemj\">\n<p><strong>Notes pour le MJs :</strong></p>\n<h3>Les Statues <strong>:</strong></h3>\n<ul>\n<li>\n<p>3 Guerriers :</p>\n<ul>\n<li>\n<p><strong>Aboreth</strong> (H avec longue-vue) -</p>\n</li>\n<li>\n<p><strong>Comissana</strong> (F avec baguette) -</p>\n</li>\n<li>\n<p><strong>Diramfir</strong> (F avec cristal)</p>\n</li>\n</ul>\n</li>\n<li>\n<p>3 Nobles :</p>\n<ul>\n<li>\n<p><strong>Kanfireth</strong> (F avec livre) -</p>\n</li>\n<li>\n<p><strong>Ramajissa</strong> (F avec sextant) -</p>\n</li>\n<li>\n<p><strong>Gorss'Raa</strong> (H avec couronne)</p>\n</li>\n</ul>\n</li>\n<li>\n<p>3 érudits/mages :</p>\n<ul>\n<li>\n<p><strong>Marjina</strong> (H avec Lance) -</p>\n</li>\n<li>\n<p><strong>Boëliaa</strong> (F avec menottes) -</p>\n</li>\n<li>\n<p><strong>Ealireth</strong> (F avec baton)</p>\n</li>\n</ul>\n</li>\n<li>3 shamans :\n<ul>\n<li><strong>Fannilias</strong> (H avec Arc) -</li>\n<li><strong>Iris Mea</strong> (H avec clef) -</li>\n<li><strong>Laajaan</strong> (F avec épée)</li>\n</ul>\n</li>\n</ul>\n<p>Pour ouvrir la salle secrète §, il faut remettre le bon objet sur chaque statues pour correspondre à l'histoire de la chute du \"faux dieu\" Izareaa. Le récit se trouve dans la bibliothèque du dortoir de la Shaman Salle H.</p>\n<p>Si un objet est mal positionné sur une statue, la statue du Faux Dieu Izareaa se réveil et attaque toute forme de vie dans la pièce en commençant par le plus proche. Lorsque la statue est détruite elle se recompose sur son support au bout de quelques minutes.</p>\n<p>\_</p>\n</div>\n<div class=\"salleplus\">\n<p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Plus :</span></strong></span></p>\n<p><strong>Trésors :</strong> Les blocs translucides se transforment en liquide et coulent au sol si on les sort du braséro. Ils n’ont aucune valeur.</p>\n<p>Toutes les statues sont fixées au sol et ne peuvent être détachées sans les briser.</p>\n</div>\n</div>\n</div>"
