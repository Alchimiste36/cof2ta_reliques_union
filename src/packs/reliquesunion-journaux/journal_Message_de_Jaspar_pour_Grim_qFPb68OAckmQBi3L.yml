    text:
      format: 1
      content: >-
        <p><em><strong>Maître nain, Grim,</strong></em></p><p><em><strong>En
        échange de la propriété dans ma cité que vous avez déclinée, je suis
        prêt à un effort pour vous récompenser de la réussite du sauvetage de ma
        fille.</strong></em></p><p><em><strong>Les caisses de la Cité sont
        lourdement impactées par les travaux de reconstruction du village du Val
        Rouge et par les nouveaux aménagements de la Cité
        d'Ispier.</strong></em></p><p><em><strong>Pourriez-vous être plus précis
        sur votre demande de récompense et me dire clairement vos intentions et
        vos envie. Je verrais ce que je peux faire pour
        vous.</strong></em></p><p><em><strong>Amicalement,
        </strong></em></p><p><em><strong>Jaspar Bonarion, seigneur de la Cité
        d'Ispier.</strong></em></p>
