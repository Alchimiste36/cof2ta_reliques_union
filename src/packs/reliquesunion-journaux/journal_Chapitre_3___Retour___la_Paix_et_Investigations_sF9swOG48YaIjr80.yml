      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Fin de l'intermède</h1>
          <p class="paragraphe">
            Durant l'intermède, Lana'Sir et Laotissa discuteront souvent avec les PJs pour connaitre l'avancement de leurs recherches et les motiver à poursuivre leur mission pour
            retrouver les autres Reliques de l'Union.
          </p>
          <p class="paragraphe">
            Grâce aux informations trouvées et révélées au fur et à mesure de l'intermède, les différentes PNJs pourront également aider le groupe à faire le tri au milieu des noms, dates,
            lieux… qu'ils ont récolté. Si les PJs sont perdu, utilisez Zagrenn, Jaspar, Lana'Sir ou Laotissa pour les aider à prendre une décision.
          </p>
          <p class="paragraphe">
            Les PJs sont fin prêt à partir vers les Montagnes des Crocs d'Acier et la ville de la Vallée de Novrak pour chercher des informations sur le village d'Arkanov, les centaures
            grâce à un vieux marchand.
          </p>
          <p class="paragraphe">Il pourront s'équiper avant de partir avec des montures, des vêtements chauds, des rations de voyage, des outils…</p>
          <p class="paragraphe">La veille de leur départ, Zagrenn revient à la Cité d'Ispier pour donner sa découverte sur la Cité-Mine d'Hyrr'Tarënn aux Sauveurs de la Dame d'Honneur.</p>
          <p class="paragraphe">
            N'oubliez pas de vérifier l'équipement que les PJs amène avec eux et surtout le grand coffre contenant la Machine du Val Rouge. Elle pourrait être utile durant le voyage mais
            surtout lors de leur séjour dans le village d'Arkanov.
          </p>
          <hr />
          <div class="levelup">PASSAGE DE NIVEAU</div>
          <hr />
        </div>
