  - sort: 1200000
    name: Opportunités pour le MJ
    type: text
    _id: d9miuMwENmuQ1LVl
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Le Maître du Jeu pourra utiliser également l’intermède pour plusieurs choses en relation avec les PJs et\_avec la campagne : </p><h2>Créer de nouveaux contacts</h2><p>N’hésitez pas à développer les rencontres que\_pourraient faire les PJs dans la Cité d’Ispier ou les\_villes qu’ils visitent. Chaque PNJ pourra être un\_nouveau contact important pour développer chaque\_héros. </p><p>Un noble de Blanche Paix, un membre de la confrérie des Jongleur embauché pour louer les exploits des\_aventuriers, un commerçant passionné d’histoire\_ou de géopolitique, un entraineur qui deviendra\_confident, un ami à deux doigts de trahir… L’imagination est sans limite pour le MJ.\_</p><p>Le fait de passer du temps dans les tavernes, salles\_de jeux, maisons de joie ou bains publiques est un\_bon moyen aussi de faire des rencontres de personnalités importantes ou influentes dans la ville. Cela\_permet d’augmenter les capacités du PJ de réaliser des\_choses personnelles ou relatifs à la campagne.</p><hr /><h2>Faire des mission secondaires</h2><p>Si vous souhaitez augmenter la tension de la\_campagne et renforcer l’influence des héros dans la\_région, le MJ pourra proposer aux PJs des missions\_secondaires passionnantes. </p><p>Une caravane de marchands qui disparaît\_mystérieusement, une famille d’Ispier dont les\_enfants ont été kidnappés, une bande de Peaux Vertes\_qui arrivent dans la région… Vous pouvez développer une mission secondaire basée sur les combats, sur\_l’enquête ou la diplomatie.</p><p>Ces missions peuvent aussi être un bon moyen\_pour un personnage à la traîne des autres de récupérer un objet magique ou une compétence qui réajustera sa place dans le groupe.\_</p><p>Pour finir, il est assez dur d’intégrer au moment\_du passage de niveau un compagnon animal, une\_monture ou tout autre élément qui viendrait d’une\_capacité choisie par le joueur. Les mission secondaire\_permettent de rendre moins bizarre l’arrivée d’une\_monture fantastique, d’un dragon d’Akrähyng ou d’un\_loup dans le groupe. Pour éviter le fameux «pouf c’est\_magique», prévoyez une petite quête spéciale pour\_renforcer le lien entre le PJ et sa bestiole.\_</p><hr /><h2>Intégrer un nouveau PJ</h2><p>Les intermèdes sont aussi une manière simple et\_facile d’intégrer un nouveau joueur à la campagne\_ou d’intégrer le nouveau personnage d’un joueur qui\_serait mort ou qui n’aimerait pas son personnage du\_début de la campagne. </p><p>La relation qui lit un joueur et son personnage est\_très important. Si un joueur ne réussit pas à jouer\_ou développer son personnage, c’est peut-être le bon\_moment pour discuter avec lui de quelques modifications sur son personnage actuel ou de carrément\_changer de héros.</p><p>Vous pouvez aussi tomber (rarement mais ça\_arrive) sur un joueur qui a déjà créer son prochain\_personnage au cas où celui qu’il joue actuellement\_meure. Prenez quelques minutes de l’intermède pour\_faire interagir ce nouveau PNJ avec le groupe de PJs\_car, un jour peut-être, il fera parti des leurs.</p>"
