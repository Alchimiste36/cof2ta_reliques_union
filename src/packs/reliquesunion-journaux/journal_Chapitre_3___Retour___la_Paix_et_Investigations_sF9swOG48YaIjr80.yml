  - sort: -100000
    name: Synthèse du chapitre
    type: text
    _id: 6NsXFyszsTemclPn
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Dans ce nouveau chapitre, le groupe de PJs sort du\_Temple du Val Rouge avec beaucoup d’informations, de\_mystères et des objets divers et variés.</p><p>Après un temps très calme dans ce temple abandonnée, une bande de mercenaires tendent une embuscade\_aux aventuriers à leur sortie. Les combattants, peu\_expérimentés, attendent un signe de vie sortant du\_Temple depuis plusieurs heures, voir plusieurs jours, et\_ne seront pas très dynamique au moment de l’attaque.</p><p>Chose essentielle, un des mercenaires possède une\_lettre de mission non signée mais très claire et un autre\_mercenaire est possédé par un nécromancien. Ça devrait\_déjà mettre la lumière sur l’implication du mage Hisp\_Galik.</p><p>Après cette altercation, ils devraient se poser de\_nombreuses questions et, dans cette réflexion, il devraient\_penser à envoyer un message à Lana’Sir pour lui faire\_connaitre leurs avancées. Cet acte changera beaucoup de\_choses au retour des PJs à la Cité d’Ispier.\_En fonction des informations qu’ils transmettent à\_Lana’Sir, l’accueil du seigneur Jaspar Bonarion ne sera\_pas vraiment identique.</p><p>A leur retour à la Cité d’Ispier, en fonction de la\_réaction du seigneur, les PJs seront en mesure de lui\_expliquer la situation avec plus ou moins de secrets. Il\_trouveront un seigneur en colère contre son ancien\_mage-conseiller et, surtout en recherche de rédemption\_face aux décisions qu’il a prise.\_</p><p>La suite du chapitre sera plus espacée dans le temps.\_</p><p>Tout d’abord, la grande fête d’Ispier sera un bon\_moyen d’activer le Bracelet de l’Union pour le porteur\_à son insu. </p><p>Ensuite, le retour de la Dame d’Honneur, Lana’Sir, de\_Laotissa Graine Dépeautre et des survivants sylvains sera\_un moment crucial pour la suite de l’aventure. Le fait que\_Lana’Sir divulgue beaucoup d’informations sur l’Ordre\_de l’Union, le Bracelet et le rôle des PJs va enclencher\_beaucoup d’événements importants pour la poursuite de\_cette quête.</p><p>Pour finir, les nombreuses recherches des PJs sur les\_informations qu’ils ont trouvées dans le Temple du Val\_Rouge devraient éclaircir leurs idées mais aussi noyer le\_groupe dans une mare d’histoires et d’ouvrages plus ou\_moins relatifs avec leurs objectifs.</p><p>La deuxième partie de ce chapitre est un intermède qui\_peut durer assez longtemps en fonction des recherches\_et des envies des joueurs. Ils pourront faire des voyages,\_chercher des choses sur leur histoire personnelle, vendre\_et acheter des objets sur-mesures, créer des organisations ou des affaires, investir leur fortune… Ils pourront\_profiter de ce moment pour s’intégrer dans la communauté de la Cité d’Ispier ou aller aider à la reconstruction du\_village des elfes sylvains ou encore rencontrer des PNJs\_à leur convenance.\_</p><hr /><h1>Explications</h1><p>Il ne faudra pas, lors de ce chapitre, oublier le\_besoin de rédemption du Seigneur Bonarion face aux\_attaques catastrophiques qu’il a déclenché, manipulé\_par Hisp Galik. Il cherchera à se racheter par tous les\_moyens possibles grâce à la fortune de sa cité et ses\_décisions pour aider les sylvains et les PJs.</p><p>Par contre, si les PJs ne donne pas beaucoup\_d’informations au seigneur et que ce dernier à du\_mal à comprendre le pourquoi et le comment de la\_situation, il va transformer sa honte en colère. La\_lettre transmise de Lana’Sir par les PJs déterminera la\_réaction de Jaspar entre mise en prison et interrogatoire ou accueille chaleureux au château.</p><p>Le seigneur voulant réduire voir casser les attaques\_contre les elfes sylvains, il décide d’organiser une\_grande fête pour la paix et faire un beau discours\_devant tous les habitants. Ce temps de joie et de\_réconciliation permettra de mettre en scène l’attaque\_d’un groupe de haineux face à l’un des elfes sylvains\_du groupe de PJs ou sur Maana. En venant au secours\_de l’elfe attaqué et en danger, le porteur de la relique\_activera le Bracelet de l’Union et connaîtra, maintenant le premier pouvoir de cet artefact puissant.\_</p><p>Deux semaines après leur retour à la Cité, Lana’Sir\_rentrera chez elle. Elle a bien changée, elle a mûri\_et elle est déterminée comme jamais. Son discours\_permettra la divulgation de beaucoup d’informations\_sur les Reliques et cela aura des implications très\_lourdes. Les différentes organisations qui recherchent\_les Reliques auront conscience de cette nouvelle,\_la légende des Sauveurs d’Ispier commencera à se\_répandre et cela devrait «obliger» les PJs à continuer\_leur quête. </p><p>Laotissa Graine Dépeautre aura le rôle de motiver\_le porteur du Bracelet et ses compagnons vers la\_suite de l’aventure. Elle sera la gardienne des «bonnes\_valeurs» du porteur et un lien spécial se créera entre\_eux deux si le joueur est réceptif.</p><p>Un mois après leur sorti du Temple du Val Rouge,\_les PJs feront la rencontre du moine Zagrenn Fredfisk\_qui vient directement du Monastère des Frères du\_Désespoir. Ce PNJ sera une personnalité de confiance\_pour les PJs. Dans cette quête où les joueurs ne\_sauront pas à qui ils peuvent faire confiance, Zagrenn\_pourra devenir un personnage qui oriente les PJs, les\_guident, leur raconte des faits sur les Terres d’Arran\_que certains joueurs ne connaissent pas et, surtout,\_une boussole qui les gardera sur le droit chemin.\_Zagrenn Fredfisk ne devra pas forcément suivre\_les PJs dans leur quête mais à chaque grand\_chapitre, il sera là pour aider les PJs.\_</p><p>Bien entendu les PJs pourront commencer leurs\_investigations avant la fête et avant le retour de\_Lana’Sir mais il faut qu’ils comprennent que ce genre\_de recherches prennent énormément de temps.\_La période d’investigation des PJs sur les noms,\_lieux, objets,\_ correspondances… qu’ils ont trouvé\_dans le Temple du Val Rouge sera plus ou moins\_longue.</p><p>A chaque MJ de déterminer la fréquence de révélation des différentes recherches en fonction de l’intérêt\_des joueurs pour leur intermède. Afin que cela soit\_crédible, il faudrait que l’intermède dure environ 3\_à 4 mois car vous n’êtes pas sans savoir que trouver\_un nom spécifique dans les recueils d’une grande\_bibliothèque, retranscrire cette information et la\_transporter d’une cité à l’autre est extrêmement long\_et complexe.</p><p>Ne pas hésiter à intercaler une ou deux missions\_secondaires à ce moment en se basant sur les\_historiques personnels des personnages.\_</p><p>La masse d’informations récoltées par le groupe\_est volontaire pour attiser les discussions entre eux,\_Laotissa, Lana’Sir, Zagrenn et d’autres. Quand on\_recherches des informations, il est assez fréquent\_de trouver beaucoup de choses qui ne sont pas\_utiles directement pour leur prise de décision. Dans\_une campagne écrite qui est, de faite assez linéaire,\_transmettre aux joueurs les seules informations qui\_sont liées à leur mission oriente encore plus leur\_décision sans leur donner «l’illusion» du choix et de\_la réflexion.</p><p>A la fin de ce chapitre, le groupe de PJs devrait\_quand même connaitre leur prochaine direction avec\_plus de précision : la ville de la Vallée de Novrak.</p><p>Ils pourront ainsi, trouver la seule personne qui a\_rencontrée et parlée d’un village de centaures, 30 ans\_plus tôt. Cet ancien marchand a laissé derrière lui une\_histoire qui a traverser les Terres d’Arran sans qu’il ne\_s’en doute une seule seconde.</p>"
