      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Intermède à Ispier</h1>
          <p class="paragraphe">
            La suite de la campagne part du principe que les PJ ont réussi a se faire comprendre du seigneur Bonarion, qu'une partie des informations trouvées ont été transmises au moins à
            Lana'Sir ou Laotissa et que Hisp Galik est identifié comme le vrai responsable de la guerre contre les Sylvains.
          </p>
          <p class="paragraphe">Si les PJ ont gardé trop d'informations secrètes, il est possible d'utiliser Maana pour briser le silence volontairement ou non.</p>
          <p class="paragraphe">Lana'Sir doit rentrer dans environ 15 jours à la Cité d'Ispier. Les PJs peuvent l'informer de leurs trouvailles au fur et à mesure s'ils le souhaitent.</p>
          <p class="paragraphe">Pendant ce temps ils peuvent faire plusieurs investigations ou profiter de la vie dans leur nouvelle demeure.</p>
          <p class="paragraphe">Vous pouvez gérer cette séquence comme un petit intermède qui sera ponctué d'événements dans le quotidien des PJ.</p>

          <h2>Durant cette période, chronologiquement, il se passera :</h2>

          <ul>
            <li>
              <p class="paragraphe">
                <strong>3 jours plus tard :</strong> @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.tbCHg9xsciXhKtYI]{le
                discour de Jaspar Bonarion} devant les habitants de la Cité d'Ispier pour apaiser les tensions envers les elfes sylains. Ainsi que la grande fête qui suit qui sera un bon
                moyen d'activer le Bracelet de l'Union si un PJ le porte.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>15 jours après le retour à Ispier :</strong>
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.3Wro4FzwYLnaJN8X]{Le retour de la Dame d'Honneur} et de
                Laotissa Graine Dépeautre à Ispier et le début des trois jours pour la Paix.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>30 jours après le retour à Ispier :</strong>
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.JoWuu7l0J0l6Dtg5]{La rencontre de Zagrenn Freshfisk}, le frêre
                du Désespoir qui pourra devenir un allié pour les PJ.
              </p>
            </li>
          </ul>

          <h2>Tout au long de l'intermède, les PJ pourront aussi :</h2>

          <ul>
            <li>
              <p class="paragraphe">
                <strong>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.BgJSQx49MP1AWcGP]{Investigations à la Cité d'Ispier} pour
                  éclaircir la situation.</strong>
                Il y a beaucoup d'informations à trouver au sein même d'Ispier (dans les appartements de Hisp Galik, dans la bibliothèque, dans les livre du Temple du Val Rouge…)
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.V5F2XvsVDfviqdXn]{Lancer des recherches dans d'autres villes
                  ou institutions}</strong>
                (Monastère des frères du désespoir, Blanche Paix, Orkadia…)
              </p>
            </li>
            <li>
              <p class="paragraphe">
                <strong>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.tRndvEe6SCYAaaG6]{Faire des activités personnelles}</strong>
                (vendre des objets récupérés, rechercher des informations sur leur quête, faire de l'artisanat, s'entrainer ou apprendre…)
              </p>
            </li>
            <li>
              <p class="paragraphe"><strong>Aider à la reconstruction du village des elfes du Val Rouge</strong>.</p>
            </li>
          </ul>
          <p class="paragraphe">
            L'intermède sera aussi une bonne occasion pour le MJ d'intégrer certaines choses dans la campagne.
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.d9miuMwENmuQ1LVl]{Opportunités pour le MJ}
          </p>
        </div>
