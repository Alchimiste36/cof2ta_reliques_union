      content: "<p>Le groupe peuvent faire des choses dans plusieurs endroits de la cité :</p><h3>Fouiller les appartements de Hisp GALIK</h3><blockquote><p>Les appartements du conseiller du Seigneur Jaspar sont situés dans une assez grande bâtisse dans l'enceinte du Château. La porte n'est pas fermée à clef.</p><p>Lorsque vous entrez <strong>vous vous retrouvez dans un salon plutôt bien rangée</strong> avec de nombreux livres et des objets d'arts décorant des belles bibliothèques ornementées. Une table et deux chaises sont positionnées au centre d'un magnifique tapis et le long d'un mur vous distinguez un vaisselier contenant quelques belles pièces de vaisselles richement décorées. <strong>Une petite pièce sert de cuisine et de garde manger</strong> mais ne contient pas grand chose. Hisp devait se faire servir depuis les cuisine du château. Un porte donne sur <strong>une chambre jolie mais très peu aménagée</strong>. un lit, une table de nuit et un petit fauteuil de lecture, rien de plus.</p><p>A l'étage, vous trouver <strong>deux grandes pièces remplies de multiples objets,</strong> chacune avec un long et large plan de travail totalement encombrés. Au vu de la poussière et du bazar, <strong>les serviteurs ne doivent pas avoir le droit de rentrer dans ces pièces</strong>. Après quelques secondes d'observation, <strong>la première pièce doit servir de laboratoire de magie élémentaire et la deuxième d''étude de la magie nécromantique.</strong> Livres empilés ou ouverts, babioles en tout genre, outils gros ou petits, matériaux et matériel… une mère n'y retrouverait pas ses petits.</p><p>Il va falloir plusieurs heures pour fouiller ces\_deux pièces encombrées et étudier les ouvrages des\_bibliothèques.</p></blockquote><p><strong>Les PJs trouveront beaucoup d’informations peu\_pertinentes sur leur mission :</strong></p><p>Il ne faut pas hésiter à demander aux joueurs des\_tests de <span style=\"font-family:Arial\"><strong>@Test[car:per]</strong></span>ou de\_<span style=\"font-family:Arial\"><strong>@Test[car:int]</strong></span> pour trouver les informations\_ci-dessus afin de les induire en erreur et les pousser\_à la réflexion pensant que chaque découverte est un\_indice potentiel.</p><ul><li><p>Des listes de gardes, les commentaires de Hisp\_Galik et leurs postes d’affectation,</p></li><li><p>Des recherches personnelles sur la magie élémentaliste et nécromantique,</p></li><li><p>Des noms de seigneurs, responsables ou nobles\_des villes voisines ou éloignées,</p></li><li><p>Des réflexion sur les traits de caractères et les\_émotions de Jaspar Bonarion,</p></li><li><p>Un petit carnet avec des dossiers et anecdotes\_compromettantes sur différentes personnalités\_de la Cité d’Ispier et des groupes de malfrats qui\_sévissent dans la région,</p></li><li><p>Les documents relatif à son rôle de conseiller du\_seigneur Bonarion,</p></li><li><p>Ainsi que des livres d’histoire, de géographie, de\_philosophie, d’artisanat…</p></li></ul><p><strong>Les informations réellements pertinentes pour les PJ :</strong></p><ul><li><p><span style=\"font-family:Arial\"><strong>@Test[car:per|comp:Fouille d'une pièce]</strong></span></p></li><li><p><span style=\"font-family:Arial\"><strong>13+</strong></span> : sous la pile de bois de chauffage, <strong>un petit coffre de métal referme des pièces et quelques objets de valeurs</strong>. Il y a 5 agates (5 pa chacune), 14 pierres de lunes (25 pa chacune), 8 améthistes (50 pa), l'équivalent de 340 pa de bijoux et de petits objets d'art, 49 po, 98 pa et 24 pc. Autant dire une vraie fortune.</p><p class=\"imp\">Notez dans un coin ce que vont faire les PJ de cette richesse car ça pourra se retourner contre eux si ça venait à ce savoir.</p></li><li><p><span style=\"font-family:Arial\"><strong>18+</strong></span> : une pierre en bas d'un mur cache un carnet de note relié de cuir et renforcé par des plaques métalliques\_@UUID[Compendium.world.reliquesunion-objets.Item.H477LBLlNdScMBn6]{Carnet de Hispo Galik}</p></li><li><p>Dans la bibliothèque du laboratoire de magie élémentaire :</p><ul><li><p><span style=\"font-family:Arial\"><strong>@Test[car:int|diff:13|comp:Analyse de texte]\_</strong></span>: Dans un grimoire, vous trouvez une note grandement annotée parlant de l'activation du Plastron de la Séduction.\_@UUID[Compendium.world.reliquesunion-objets.Item.LljAEgeHwRcI5ZUR]{Note sur l'activation du Plastron de la Séduction}</p></li></ul></li></ul><p>Vous trouverez toutes les choses trouvables dans les appartements de Hisp Galik dans ce \"magasin\"\_@UUID[Actor.QEIhdgO5aqJFLCjG]{Appartements de Hisp Galik}. Rendez visible les éléments que la PJ ont trouvé.</p><p>En plus de la lettre trouvée sur le mercenaire et la rune de possession, toutes ces informations sont totalement compromettantes contre Hisp Galik.</p><hr /><h3>La bibliothèque du Château</h3><p>En fonction des informations que les PJs donne au seigneur et à l'archiviste Tartoun, ils ne trouveront pas forcément les mêmes textes.</p><blockquote><p>On peut résumé la Bibliothèque de la Cité d'Ispier ainsi : un vieux archiviste dur des esgourdes, un apprenti au bord de la déprime et des milliers de livres !</p><p>Lorsque l'on rentre, ça donne envie. De longs rayonnages remplis de livres, parchemins, grimoires et tablettes, des espaces sombres et poussiéreux, quelques bancs de lectures et tables d'études et c'est tout. Le confort y est rudimentaire et on comprend vite que l'entretien de la bibliothèque n'est pas la priorité du Seigneur Jaspar Bonarion.</p><p>Un jeune homme trainant des pieds et aux regard fuyant vous \"accueille\", façon de parler. Il parle bas avec un fort sentiment de lassitude.</p></blockquote><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/bibliothecaire_assistant.webp\" width=\"100\" height=\"100\" /><p class=\"discussion\"><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Asistant Serpin :</span></strong></span> En quoi je peux vous aider ? Si vous voulez voir l'archiviste Tartoun va falloir attendre, attendre et attendre encore un peu !</p><p></p><blockquote><p>Il semble en pleine dépression et avant même que vous n'ouvriez la bouche, il est déjà sur le point de se retourner et de partir en direction du fond de la Bibliothèque.</p><p>Quelques instants plus tard, un vieux bonhomme frêle et pas plus épais d'une feuille de papier s'approche du groupe au ralenti, traversant le couloir bordé des longues bibliothèques en un temps infini.</p></blockquote><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/bibliothecaire.webp\" width=\"100\" height=\"100\" /><p class=\"discussion\"><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Archisviste Tartoun :</span></strong></span> Je suis le maître Archiviste Tartoun, en quoi puis-je vous aider ?</p><blockquote><p>Les recherches dans la bibliothèque sont extrêmement longues et fastidieuses. Ne sachant pas par où commencer et ne comprenant pas vraiment ce que vous voulez, l'archiviste Tartoun passe d'une étagère à une autre, vous propose des lectures assez peu pertinentes et des histoires ou des contes souvent sans queue ni tête.</p></blockquote><p><strong>Pour chaque jour de recherche, chaque PJs qui aide aux recherches doit lancer 1d100</strong>.</p><ul><li><p><strong>Avec l'aide de l'archiviste Taroun et de son apprenti</strong>, le <strong>taux de chance de trouver est de 10% +2% par jour</strong> supplémentaire (10% le premier jour, puis 12% le second…)</p></li><li><p><strong>Sans l'aide de l'archiviste et de son apprenti, le taux de chance de trouver est de 5% +1% par jour</strong> supplémentaire (5% le premier jour puis 6% le second, puis 7%…)</p></li></ul><p></p><p>Au final, il n'y a quelques informations qui peuvent intéresser les PJs dans cette bibliothèque :</p><ul><li><p><strong>Une fiche sur le Ravin de Novrak</strong>, une des seules villes installées dans cette chaine de montagnes infranchissable.\_</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.adWjtsduoGViXzZc]{La Vallée de Novrak}</p></li><li><p><strong>Un ouvrage trouvé écrit par Ramell en 8964 AGS</strong>.\_</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.g3Yibk2ZxpgRSBhs]{Ramell - Ouvrage ségrégationniste}</p></li></ul><p></p><p>Ces deux références apporteront des informations pour les PJs qui ne sont pas cruciales pour trouver leur prochaine étape mais permettra de se préparer et d'obtenir de l'historique.</p><hr /><h3>Etudier les livres de la Bibliothèque du Val Rouge s'ils en ont récupéré.</h3><p>Dans les tomes récupérés dans le dortoir de la Gardienne et dans la bibliothèque du Temple du Val Rouge, les PJs peuvent trouver les informations qu'ils n'auraient pas trouvé pendant leur exploration.</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.iKHVHqU2fRGHSnwE]{Carte de Maniash'Onira}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.8VEgoMjsQatW6cbu]{Compte rendu 1 de Maniash'Onira}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.uTKKH0vsa8ywiWps]{Compte rendu 2 de Maniash'Onira}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.NBhpJ6FUpOYjnJPK]{Compte rendu 26 de Maniash'Onira}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.VsarcRUBqgxQ0pTY]{Échanges avec Hoani d'Arkanov}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.x6i82EQBaT05Qiuh]{Les faux dieux des Plateaux Venteux}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.bL9cX8RiDi5m7Qgm]{Parchemin de Maniash'Onira}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.xrDJSuwMqhDQLr1Z]{Tel'Quess'Aar}</p><hr /><h3>Étudier le Bracelet de l’Union</h3><p><strong>Si aucun PJ n'a équipé le\_@UUID[Compendium.world.reliquesunion-objets.Item.5Uuj47G7huY5efth]{Brassard elfique}</strong>, ils ne peuvent tirend découvrir dessus à part cette légère aura magique.</p><p><strong>Si un PJ a équipé le @UUID[Compendium.world.reliquesunion-objets.Item.P5PMiQW41aP28vb4]{Brassard de culture elfique}</strong>, le groupe devrait comprendre qu'il s'agit de la Relique de l'Union recherchée.</p><p>Les PJ qui cherchent et expérimentent ne trouvent aucun moyen de retirer le Bracelet.</p><p>Le porteur du Bracelet ressent la présence de deux vibrations quand il se concentre sur le pouvoir du bracelet. Il a du mal à distinguer clairement les émotions ou les volontés qui le parcours autour de cet objet magique. Sa seule certitude est que le Bracelet veut être activé et souhaite donner ses pouvoirs au porteur.</p><ul><li><p><span style=\"font-family:Arial\"><strong>@Test[car:cha|diff:15|comp:Interaction]</strong></span> <em>(essayer d'interagir avec les \"voies\" du bracelet)</em> ou </p></li><li><p><span style=\"font-family:Arial\"><strong>@Test[car:per|diff:20|comp:Ressentir]</strong></span> <em>(se concentrer sur les sensations ou méditer)</em> ou </p></li><li><p><span style=\"font-family:Arial\"><strong>@Test[car:int|diff:25|comp:Comprendre-Analyser]</strong></span> <em>(analyser rationnellement les vibrations)</em> : </p><p>Le PJ comprend que deux personnalités se disputent la place dans l'objet. Elles semblent se détester et \"se battre\" depuis de nombreuses années.</p></li></ul><h4><strong>Etude sur l'activation du Bracelet :</strong></h4><p>Si l’un des PJ souhaite étudier le bracelet pour l’activer, il lui faudra surement la note\_écrite par Hisp Galik se trouvant dans sa bibliothèque.\_</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.LljAEgeHwRcI5ZUR]{Note sur l'activation du Plastron de la Séduction}</p><p>Avec la note, ils comprendront, peut-être, qu’en\_tuant un elfe en portant le bracelet, il devrait s’activer.\_C’est l’une des deux manières de l’activer. La\_seconde est de venir en aide directement à un elfe\_sans ambition personnelle ou en «charmant» un elfe\_sans manipulation. Le porteur ou les PJ peuvent\_faire toutes les expériences qu’ils souhaitent pour\_activer le Bracelet.</p><p>Si le personnage souhaite tuer un elfe pour activer\_le Bracelet de l’Union, il pourra l’activer mais partira\_avec 10 points de FANATISME.</p><p>Si l’un des PJ porte le bracelet, profitez des festivités qui suivent le discours de Jaspar pour créer une\_situation de tension entre des habitants en colère et\_un elfe sylvain. Le porteur du Bracelet pourra venir\_en aide à l’elfe et ainsi activer le Bracelet. Si le personnage active ainsi le Bracelet, il gagnera automatiquement 10 points de DÉVOTION.</p><p>Le Bracelet de l’Union est détaillé dans ce journal @UUID[JournalEntry.YMvNXs6462PccvNn]{Le Bracelet de l'Union}.</p>"
