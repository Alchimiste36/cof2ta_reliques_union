  - sort: 600000
    name: Festivités et grand discours
    type: text
    _id: tbCHg9xsciXhKtYI
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div class="journal-cof2ta-ru"><h1>Festivités et Discours</h1><p
        class="paragraphe">Trois jours après le retour des PJs dans la cité
        d'Ispier, le seigneur Bonarion organise une grande fête pour apaiser les
        tensions des villageois envers les elfes sylvains et surtout expliquer
        la situation et la trahison de son ancien conseiller.</p><p
        class="paragraphe">La population est ravie de cette nouvelle.
        L'effervescence augmentera au fur et à mesure des jours qui passent et
        de nombreux commerçants et habitants de Blanche Paix et des villages aux
        alentours arrivent en ville. La grande place est lavée, dégagée et
        organisée pour accueillir une estrade pour un groupe de musique et une
        autre pour le discours du seigneur.</p><p class="paragraphe">Si les PJs
        veulent enquêter pour s'assurer de la sécurité de l'événement, ils
        trouveront seulement des gens heureux de cette fête, quelques familles
        endeuillées par la guerre et assez perturbées par la fête et, quelques
        gardes qui parlent de marchands peu fréquentables ou de mauvaise
        réputation.</p><p class="paragraphe">Les PJs peuvent aussi aider à
        l'organisation et ça augmentera la sympathie de Jaspar pour eux ainsi
        que leur renommée auprès des Ispierois et Ispieroises.</p><hr
        /><h2>Discours du seigneur Bonarion</h2><p
        class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-scenes.Scene.yYVvn49DyqaQhFoN]{6.Place
        Ispier}</p><div class="description"><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/fete1.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/fete2.webp"
        width="100" height="100" /><p class="paragraphe">Le moment est arrivé.
        L'après-midi commence et la plupart des habitants de la cité se
        réunissent sur la place principale. Un grand discours est organisé par
        le seigneur Jaspar Bonarion sur la place de la Cité suivi par de
        nombreuses festivités.</p><p class="paragraphe">La ville est en
        effervescence autour de cet événement et beaucoup de marchands et
        troubadours ont fait la route depuis Blanche Paix pour s'installer sur
        la place principale. Des stands en tout genre ont été montés autour de
        la place et une estrade assez haute et décorée de bannières aux couleurs
        de la cité se dresse devant l'entrée de la cour du château. Vous sentez
        que l'organisation de cette fête est une bonne excuse pour la plupart
        des habitants pour mettre de côté leur tristesse et leur peine face à la
        perte d'un être cher.</p><p class="paragraphe">En milieu d'après-midi,
        alors que la foule s'est déjà amassée sur la place, le seigneur Bonarion
        avance avec droiture de l'estrade, seulement escorté par quatre soldats
        fiers de leur position.</p><p class="paragraphe">Il monte, s'installe au
        centre devant toute la foule devenu très silencieuse.</p></div><div
        class="discussion"><p class="paragraphe"><span
        class="discu-acteur">Jaspar Bonarion :</span></p><p
        class="paragraphe">Ispierois, Ispieroises, C'est avec un immense plaisir
        que je me tiens devant vous et avec un sentiment de honte qui ne me
        quitte plus depuis plusieurs jours.</p><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/jaspar_bonarion2.webp"
        width="100" height="100" /><p class="paragraphe">Nous avons été trahi !
        … j'ai été trahi ! Les paroles venimeuses et les manipulations honteuses
        de mon ancien conseiller Hisp Galik m'ont fait commettre l'irréparable
        pour vous, habitants de la Cité d'Ispier et pour nos voisins de
        toujours, les elfes sylvains de la forêt du Val Rouge. La Dame d'Honneur
        a bien essayé de me prévenir, de m'ouvrir les yeux. Ma propre fille
        voulait me faire sortir de la brume et apercevoir la vérité. Je ne l'ai
        pas entendu, je ne l'ai pas écouté. Mon cœur était remplit par la haine
        soufflée à mes oreilles par ce mage odieux.</p><p
        class="paragraphe">Aucun Elfe Sylvain du Val Rouge, je dis bien AUCUN
        ELFE du Val Rouge n'a jamais souhaité s'en prendre à nous, s'en prendre
        à vos fils ou à vos maris.</p><p class="paragraphe">Nous avons … non
        J'AI été manipulé pour entrer en guerre contre eux pour les seules
        ambitions d'un vile personnage. Tout cela pour quoi, me direz-vous ? Non
        pas une fortune ou un trône mais pour trouver un temple secret perdu
        dans les mémoires et pour récupérer un artefact soit disant magique !
        Autant de morts, de peine et de tristesse pour une vieille histoire
        tombée dans l'oubli.</p><p class="paragraphe">La haine, légitime, que
        certains d'entre vous ressentent face aux Elfes doit maintenant être
        tournée vers le seul responsable de cette guerre : Hisp Galik.</p><p
        class="paragraphe">Mes espions sont à sa recherche en ce moment et quand
        JE le trouverais, il devra subir tous les tourments que chaque famille
        de la Cité d'Ispier a connu par sa faute.</p><p class="paragraphe">La
        découverte de cette trahison n'aurait pu être possible sans l'aide
        précieuse d'un groupe de héros. Ils ont bravé tous les dangers pour
        retrouver votre Dame d'Honneur et lever le voile du mensonge pour
        révéler cette dure vérité.</p><p class="paragraphe">Ils auront toujours
        leur place parmi nous dans notre belle cité et je suis sur que chacun de
        vous leur montrera l'hospitalité des Ispierois et Ispieroises comme il
        se doit !</p><p class="paragraphe">Malgré mes erreurs, je me tiens
        devant vous pour vous demander un immense service, à vous qui avez déjà
        tant donné dans cette histoire : AIDER le peuple des Elfes Sylvains a
        reconstruire leur village et apportons leur notre soutien ! Ils sont
        aussi les victimes de cette trahison et nous devons à présent rétablir
        les liens entre nos peuples. Nul ne pourra plus exploiter la forêt du
        Val Rouge et nos efforts serviront à reconstruire leur village.</p><p
        class="paragraphe">J'ai discuté longuement avec ces aventuriers/Maana
        (il fait un geste pour inviter les PJs/Maana à monter sur l'estrade). Ce
        groupe et ces elfes sylvains droit et honnête ont permis le sauvetage de
        ma fille, Lana'Sir, notre bien aimée Dame d'Honneur. Sans eux, la vérité
        serait encore enfouie dans les profondeurs du mensonge. Accueillez-les
        avec joie et reconnaissance !</p><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/jaspar_bonarion3.webp"
        width="100" height="100" /><p class="paragraphe">J'ai déjà trop parlé et
        vous avez envie de faire la fête, je le sais. Pour finir, j'ai le
        plaisir de vous annoncer que notre Dame d'Honneur revient à la Cité dans
        quelques jours et en cet honneur, elle souhaite, à son retour, que les
        portes du château soient ouvertes pour chacun de vous pendant trois
        jours et trois nuits pour venir discuter, parler de vos soucis et rire
        avec elle. Les bains publics seront gratuits et un repas copieux sera
        servit à chaque habitant qui le demande durant cette période.</p><p
        class="paragraphe">Merci à toutes et tous et c'est avec plaisir que je
        déclare les festivités ouvertes !</p></div><div class="description"><p
        class="paragraphe">Il ouvre ses bras en croix avec un très grand sourire
        et un groupe de musiciens monte sur l'estrade derrière lui commençant un
        morceau entraînant et joyeux.</p><p class="paragraphe">La plupart des
        spectateurs se mettent à danser, boire et profiter de la fête. Vous
        distinguez à quelques endroits des habitants renfrognés qui semblent en
        colère ou d'autres couples ou familles qui pleurent dans un coin de la
        place. A plusieurs moment de la soirée, vous pouvez voir la garde qui
        sépare des bagarres et vous entendez des phrases contre les elfes et
        contre Maana «ça ne fera pas revenir mon père, bâtard» - «ils ont tuer
        mon fils, un bûcheron honorable et vous voulez qu'on les aide ! - «j'ai
        combattu les elfes et maintenant on doit leur faire des câlins, plutôt
        sucer un cochon qu'aider les elfes !» C'est paroles sont très
        minoritaires mais bien présentes. Jaspar en personne passe toute la
        soirée à essayer de plaider la cause des elfes sylvains auprès de ces
        habitants en colère ou il essaye de réconforter les familles
        endeuillées. Vous découvrez qu'il connait la plupart des nom et prénom
        des habitants et qu'il est très respecté auprès de la
        population.</p></div><hr /><p class="paragraphe">Laissez les PJ profitez
        de la fête. Ils sont libres de se promener partout où ils le veulent
        mais gradez en tête les deux événements importants qui doivent
        intervenir durant la soirée : la rencontre du groupe de Frères du
        Désespoir et l'Activation du Bracelet de l'Union avec l'attaque d'un
        elfe par des badits.</p><hr /><h2>Les Frères du Désespoir</h2><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/freres_desespoir/frere_du_desespoir1_zagrenn_fredfisk.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/freres_desespoir/frere_du_desespoir1_2.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/freres_desespoir/frere_du_desespoir1_1.webp"
        width="100" height="100" /><p class="paragraphe">Près des façades à
        l'Ouest de la place, un stand est installé quelques instants après la
        fin du discours du seigneur Bonarion. La toile est bien blanche et les
        quatre côtés sont fermés par des tissus blanc. Seule une fente sur la
        partie de devant permet d'accéder à l'intérieur de la tente, assez
        grande pour recevoir quatre ou cinq personnes.</p><p
        class="paragraphe">Devant la tente, trois hommes se positionnent et
        observent la foule. Ce sont des Frères du Désespoir présents pour venir
        en aide aux nécessiteux et protéger les plus faibles.</p><p
        class="paragraphe">Si un PJ se rapproche de cet endroit de la place
        :</p><p class="paragraphe">Tu vois dans cet endroit de la place une
        tente assez grande et fermée sur les quatre côtés par un tissu blanc.
        Une fente sur la paroi de devant permet de faire entrer les personnes
        sans que l'on puisse voir ce qui se passe sous ce stand. Devant tu
        remarques trois grands hommes habillés de blanc et équipés d'équipements
        de voyage en cuir avec beaucoup de poches. Ils sont marqués par des
        stigmates de combats et ont un air assez sévère. Ils observent la place
        debout les bras croisés et, au moment où tu t'approche un peu plus près,
        deux homme du groupe avance d'un pas décidé vers un homme de la place
        qui est en train de brutaliser une jeune femme. Le plus grand des deux
        l'attrape par le col, le soulève du sol, lui colle une grosse claque et
        le lâche à ses pieds. Tu n'entends pas les paroles mais le harceleur
        semble s'excuser face à la jeune femme et part en ce tenant la joue. Les
        deux hommes retournent vers la tente tranquillement.</p><p
        class="paragraphe">Ce sont des frères venant du Monastère du Désespoir,
        ayant entendu parlé du conflit avec les elfes sylvains, de la détresse
        de certains habitants et de l'organisation de la
        fête.</p><h3>Informations des Frères du Désespoir</h3><p
        class="paragraphe">Le plus balaise s'appelle
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.9jqYFfLyS1Wiqc9p]{Frère
        Zathaen}, c'est un semi-elfe très expérimenté au combat. Il a 37 ans et
        il est le responsable de ce groupe. Il combat l'injustice et vient en
        aide aux miséreux. Il aime sa vie et sa mission et après quelques temps
        de discussion on se rend compte qu'il est très cultivé sur beaucoup de
        sujets.</p><p class="paragraphe">L'armoire à glace,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.cfIvxJ41l4mAljmp]{Frère
        Orathen}, est un autre sang-mêlé, union d'un nain et d'un humain, de 28
        ans. Il est beaucoup moins agréable que Zathaen et il observe tout le
        temps la place au lieu d'écouter les PJs. Il répondra essentiellement
        par oui ou par non en faisant comprendre que discutailler avec des
        riches n'est pas sa mission.</p><p class="paragraphe">Le plus jeune se
        nomme
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.S2jzBGIqb8f66dLl]{Frère
        aspirant Fergil}, c'est un homme de 19 ans au regard pétillant. Il est
        pas encore aussi costaud que les deux autres mais on remarque rapidement
        les traces d'entraînement sur son visage, ses bras et ses mains. Il a la
        parlotte facile et c'est lui qui accueille les villageois qui demande un
        entretien avec les frères du désespoir.</p><p class="paragraphe">En plus
        de séparer les bagarres, ils sont là pour aider les gens qui le
        demandent. Ils donnent quelques pièces d'argent au plus pauvres, ils
        auscultent les malades ou les blessés, ils écoutent les villageois
        traumatisés ou endeuillés.</p><p class="paragraphe">Leur paroles
        ressemblent à des paroles de prêtres mais ils n'essayent pas de
        manipuler les habitants.</p><p class="paragraphe">En milieu de soirée,
        un jeune homme est amené aux Frères du Désespoir par un des gardes de la
        Cité d'Ispier. Il s'appelle Karliar. C'est un orphelin humain dont les
        parents sont morts pendant les batailles contre les elfes sylvains. Les
        frères le regardent sous toutes les coutures, lui posent beaucoup de
        questions et, avec un grand sourire paternaliste, Gilder lui accroche un
        pendentif autour du coup. Une nouvelle recrue pour les Frères du
        Désespoir.</p><hr /><h2>Activer le Bracelet de L'union</h2><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/simio_arek.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/foukar_arek.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/certis_arek.webp"
        width="100" height="100" /><p class="paragraphe">Si un des PJ a équipé
        le Bracelet de l'Union, il est possible d'utiliser la fête pour
        provoquer une situation pour activer le Bracelet.</p><p
        class="paragraphe">La situation qui suit est prévue pour sauver Maana ou
        un des PJ qui serait un elfe ou un semi-elfe face à une bande
        d'habitants ivres et en colère. Vous pouvez aussi amener le porteur du
        Bracelet a "sauver" ou prévenir
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.9jqYFfLyS1Wiqc9p]{Frère
        Zathaen} (un semi-elfe) d'un danger imminent ou d'une menace.</p><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/grenn_tald.webp"
        width="100" height="100" /><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/jonio_frest.webp"
        width="100" height="100" /><p class="paragraphe">Lors de la soirée,
        alors que les villageois et les PJs sont en train de profiter de la
        fête, un groupe d'humains vindicatifs et armés d'armes blanches
        (couteaux, matraques…) voudront s'en prendre à Maana ou à un autre elfe
        sylvain du groupe. Faites en sorte que le Porteur du Bracelet ne soit
        pas trop loin du conflit et permettez-lui de s'interposer entre l'elfe
        et les villageois. Les groupes de gardes étant trop loin, seul le
        Porteur peut aider l'elfe contre les assaillants.</p><p
        class="paragraphe">Scène :
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-scenes.Scene.yYVvn49DyqaQhFoN]{6.Place
        Ispier}</p><p class="paragraphe">Ennemis :
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.qZiJwFZNwlmPiJa7]{Simio
        Arek} ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.ZiHxwgX6rG8mXu5k]{Foukar
        Arek} ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.7niWDcI2pRmQvExS]{Certis
        Arek} ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.bgZbpmw2aRGeaSuy]{Grenn
        Tald} ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.Ov8bouNrZwcAexRU]{Jonio
        Frest}</p><p class="paragraphe">Alliés après quelques tours de combat :
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.9jqYFfLyS1Wiqc9p]{Frère
        Zathaen} ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.cfIvxJ41l4mAljmp]{Frère
        Orathen} ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.S2jzBGIqb8f66dLl]{Frère
        aspirant Fergil} ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.I39Ns5OK94vZ6w8A]{Capitaine}
        ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.EnEo09R8kpNmVgG4]{Vétéran}
        ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.BluoAsge54vFBYm8]{Garde
        de la ville} ;
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.mw8dZobjZ0FpR6tT]{Milicien}</p><p
        class="paragraphe">Les frères du Désespoir pourront intervenir à coup de
        bâton après plusieurs tours si les PJs sont en mauvaise position. La vie
        de l'elfe sylvain doit être réellement menacée pour que le Bracelet
        puisse s'activer.</p><p class="paragraphe">Lorsque le Porteur prend la
        défense de l'elfe et l'aide à sortir de cette situation mortelle pour
        lui :</p><div class="description"><p class="paragraphe">Lorsque tu
        réussis à aider Maana face à ces habitants, tu sens que les bracelets se
        resserrent autour de tes poignets. Une décharge électrique vient
        paralyser tes mains et remonter le longs de tes bras
        progressivement.</p></div><p class="paragraphe">Le joueur a exactement
        une minute pour réagir avant que le Bracelet ne s'active
        définitivement.</p><h3>Description pour le Porteur seulement</h3><div
        class="description"><p class="paragraphe">Tu ressens une large énergie
        qui rempli chaque cellule de ton corps. Tu sens comme-ci le bracelet se
        fondait dans ton bras et monter vers tes épaules. Tu ne peux plus bouger
        et tu te crispes, les poings serrés, lorsque tu sens que les pulsations
        se divisent à l'intérieur de toi.</p><p class="paragraphe">Une vague
        remonte vers ta tête et entoure ton cerveau et l'autre descend droit
        vers ton cœur. Elle s'infiltre dedans. La sensation ne fait pas mal du
        tout mais c'est très perturbant. Tu as l'impression de rester ainsi au
        moins une heure entre impuissance et sentiment d'unité. Des mots et des
        phrases elfiques te passent dans l'esprit et tu les comprend
        parfaitement sans pouvoir t'en souvenir précisément.</p><p
        class="paragraphe">Dans ton cœur, tu sens une nouvelle capacité pour
        parler avec des elfes par la pensée et dans ton esprit, tu sais que tu
        es capable d'utiliser un pouvoir te permettant de lire les pensées des
        elfes contre leur volonté. Le Bracelet te transmet une sensation divisée
        entre son enthousiasme d'être activé et son envie de se développer
        encore plus.</p><p class="paragraphe">Lorsque que le flot d'énergie
        commence à diminuer, tu reprends conscience de ton corps encore immobile
        et tu commences à pouvoir bouger petit à petit et à voir ce qui
        t'entoure.</p></div><h3>Description pour les témoins de la
        scène</h3><div class="description"><p class="paragraphe">Vous voyez
        votre compagnon qui serre les poings et les avant-bras. Il les tend vers
        le bas et se dresse entièrement droit, les yeux fermés comme une statue.
        Il est totalement immobile comme paralysé mais vous ressentez des vagues
        d'énergie qui le parcours. Vous voyez les vêtements autour du Bracelet
        de l'Union qui fondent tandis que le bracelet se resserrent autour de
        son avant-bras. Il se soude à sa peau et ressemble presque à un
        tatouage.</p><p class="paragraphe">Il reste ainsi pendant environ deux
        minutes puis ses mains se décrispent, son corps se détend et ses yeux
        s'ouvrent. Une légère lueur verte passe sur le fond de ses pupilles
        avant de disparaitre. Seul un «ha !» de soulagement sort de sa
        bouche.</p></div><hr /><p class="paragraphe">Maintenant que le Bracelet
        de l'Union est activé seule le décès du Porteur pourra le retirer (ou un
        rituel oublié avec les quatre autres porteurs de reliques).</p><p
        class="paragraphe">Il avait déjà accès au pouvoir passif du Bracelet et
        maintenant, le porteur comprend qu'un nouveau pouvoir s'offre à lui pour
        lire les pensées des Elfes ou user de télépathie avec les représentants
        de ce peuple. Le joueur pourra débloquer les différents pouvoirs du
        Bracelet au fur et à mesure de son utilisation.</p><hr /><h3>Les témoins
        de l'activation</h3><p class="paragraphe">Si certains villageois voient
        la scène d'activation du bracelet, une rumeur commencera à courir dans
        la ville dès le lendemain. La "possession" du porteur ou ses pouvoirs
        magiques seront l'un des sujets de discussion principaux pour les
        habitants et des rumeurs fausses seront propagées rapidement. Une
        maladie grave pour lui, un sortilège lancé par un elfe… pour les pires
        ou un contact direct avec un dieu, une bénédiction, une indigestion…
        pour les meilleures. Dans tous les cas, si un habitant est témoin de la
        scène et n'est pas empêché de parlé par les PJ, ces informations
        remonteront aux oreilles de Hisp Galik après quelques semaines.</p><p
        class="paragraphe">Si un des frères du Désespoir voit l'activation du
        Bracelet, il ne dira rien, ne posera aucune question et fera comme s'il
        n'avait rien vu. Il fera un rapport plusieurs jours plus tard à son
        responsable, Frère Zagrenn Fredfisk.</p></div>
