      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Sortie du Temple du Val Rouge</h1>
          <div class="description">
            <p class="paragraphe">
              Au moment où vous monter l'escalier en colimaçon qui vous a mené à l'intérieur du temple du Val Rouge, vous entendez le même bruit de racines et de craquement de l'Arbre-Mère
              en train de s'ouvrir vers l'extérieur. Dès que vous êtes tous dans l'escalier, les lanternes du Temple s'éteignent derrière vous.Vous sortez au pied de l'Arbre-Mère.
            </p>
          </div>
          <ul>
            <li>
              <p class="paragraphe">@Test[car:per|comp:Analyser la situation]</p>
              <ul>
                <li>
                  <p class="paragraphe"><span class="roll-result">15+</span> : il y a du mouvement sur votre droite et en face de vous</p>
                </li>
                <li>
                  <p class="paragraphe"><span class="roll-result">20+</span> : vous entendez le bruit d'une arbalète qui se charge et des chuchotements</p>
                </li>
              </ul>
            </li>
          </ul>
          <div class="description">
            <p class="paragraphe">
              Le léger bruit du déclenchement d'une arbalète se fait entendre.Disposé en embuscade face aux abords de l'Arbre-Mère, vous entendez un groupe de combattants. Au premier coup
              d'oeil, ils ne semblent pas très organisés.
            </p>
          </div>
          <h2>Combat contre les mercenaires</h2>
          <p class="paragraphe"><strong>Scène :</strong> @UUID[Compendium.cof2ta_reliques_union.reliquesunion-scenes.Scene.Fm3I69kcdbz0yoAE]{4.Clairière}</p>
          <p class="paragraphe">
            <strong>Ennemis :</strong> @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.e9bakgU1xjcfQm3t]{Mercenaire Ronrik},
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.Kt9PoP90dBKFDzYl]{Mercenaire Expérimenté},
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.c6hQg7AOFK2TMboq]{Mercenaire}
          </p>
          <p class="paragraphe">
            En fonction de la PER des PJ et de leur réaction, ils seront supris ou pas. S'ils sont surpris, les mercenaires auront un tour entier avant que les PJ puissent riposter.
          </p>
          <ul>
            <li>
              <p class="paragraphe">
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.c6hQg7AOFK2TMboq]{Les trois mercenaires} de faible niveau attaquent le plus longtemps possible avec leur
                arbalète en se cachant derrière les rochers qui parsème la clairière.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.Kt9PoP90dBKFDzYl]{Le mercenaire expérimenté} est possédé par Hisp Galik grâce à la
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.QsWy0GgTljcsEnwh]{Rune de possession} qu'il porte autour du cou. Il combat de la même façon que les autres
                à l'arbalète tant qu'il est à distance.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.e9bakgU1xjcfQm3t]{Ronrik}, le chef de la bande, restera caché derrière un rocher et observe d'abord la
                scène. Son arbalète est chargée et il préfèrera attaque en traitre les PJ lorsqu'ils sont en combat contre les autres mercenaires. Il prendra le moins de risque possible.
              </p>
            </li>
          </ul>
          <div class="description">
            <p class="paragraphe">L'un des mercenaire se comporte bizarrement, comme au ralenti.</p>
            <ul>
              <li>
                <p class="paragraphe">@Test[car:per|diff:10|comp:Observer la scène] : il est possédé par un nécromancien et ce que vous voyez n'est autre qu'un cadavre animé.</p>
              </li>
              <li>
                <p class="paragraphe">@Test[car:int|diff:10|comp:Connaissance magique] : vous savez que dans ce cas là, le nécromancien peut voir au travers des yeux du possédé.</p>
              </li>
            </ul>
          </div>
          <h2>Fin du Combat :</h2>
          <div class="description">
            <p class="paragraphe">
              Quelque instants après la fin de cet affrontement, les lueurs vertes qui illuminaient les pierres et l'Arbre-Mère se remettent à pulser délicatement. Les racines sont
              denouveau fermées sur l'entrée du Temple et elle est maintenant totalement invisible. Sur l'un des mercenaires, vous trouvez une note dans une enveloppe de cuir.
            </p>
            <p class="paragraphe">
              C'est un ordre de mission pour l'élimination du groupe de PJs en échange d'une forte somme d'argent (1500pa). La lettre n'est pas signée.
              @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.IhyLsRxXzmwwM2GE]{Lettre trouvée sur le Mercenaire}
            </p>
            <p class="paragraphe">
              Sur le mercenaire qui agissait bizarrement et dont vous aviez pu voir qu'il était possédé par un nécromancien. La vue de sa dépouille vous confirme ce fait. Les chairs ont
              déjà commencé à se dégrader et il doit s'agir d'un corp mort depuis plusieurs jours ou plusieurs heures.Sur son corps, porté en pendentif, vous trouvez une pierre gravée
              d'une série de runes. C'est sans aucun doute possible une rune de possession qui permet à un nécromancien de posséder un corps sur de grandes distances.
              @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.QsWy0GgTljcsEnwh]{Rune de possession}
            </p>
          </div>
        </div>
