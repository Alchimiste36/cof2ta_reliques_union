  - sort: 1000000
    name: Recherches dans les autres villes
    type: text
    _id: V5F2XvsVDfviqdXn
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>En plus de ces événements, tout au long de l’intermède, vous pourrez révéler des recherches sur les\_différents termes, noms, histoires… Que les PJs\_ont trouvé jusque là. Volontairement, beaucoup de\_documents ne serviront à rien pour la poursuite de la\_campagne mais ça pourra faire mariner les PJs.</p><p>Les PJs peuvent faire des recherches dans\_beaucoup d’endroits des Terres d’Arran. En fonction\_du temps qu’ils veulent prendre pour les recherches,\_ils pourront aussi partir eux-même vers des villes\_voisines pour faciliter le travail des archivistes (même\_règles de recherche que pour la bibliothèque d’Ispier).</p><h3>Bibliothèque de Blanche Paix</h3><p>La bibliothèque de cette ville jeune et très\_dynamique n’est pas réputée pour sa qualité. Le\_seigneur de la ville Alvon Godert n’investit pas dans\_ce lieux et lorsqu’il a une demande, elle se limite à\_trouver le nom d’un seigneur, sa date d’anniversaire et\_la composition de sa famille ou les relations commerciales de telle ou telle cité-état. Autant dire que la\_section «contes et légendes» est assez pauvre.</p><p>Deux textes sont trouvables dans cette bibliothèque :</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.v8tJT8R3qA2jFHn6]{Attaques dans les Crocs d'Acier}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.X3Cnj5RrkfKZekUH]{Kanasfi}</p><p></p><h3>Bibliothèque de la Cité d’Orkadia</h3><p>Ce n’est pas tant la bibliothèque de la ville qui est\_intéressante mais plutôt les ouvrages entreposés dans\_l’école de magie de cette vieille cité d’Orkadia. L’audacieux seigneur nain Goranu a souhaité installer une\_des plus grandes écoles spécialisées pour les jeunes\_mages venant des quatre coins du monde. Compétition, concurrence et ambition sont les valeurs ancrées\_dans cette école. </p><p>Les demandes de recherche dans\_cette bibliothèque sont très chères. Le tarif pour\_n’importe quelle recherche est à 40 pa. Si la rapidité\_est exigée, les prix seront doublés voir plus.</p><p>Il y a deux ouvrages à trouver dans cette\_bibliothèque :</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.CERCfeVn5ZOnhb1r]{Recherche sur les Centaures}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.mAUSnY185CU3uJ8z]{L'humain Gabrel}</p><p></p><h3>Bibliothèque de la CitéÉtat d’Arkar’um</h3><p>La Forteresse-État naine d’Arkar’um a déjà reçu la\_visite des aventuriers. Il n’ont pas pu visiter les étages\_supérieurs de cette grande ville fortifiée mais, au nord\_de l’Ourann, tout le monde connait l’influence de\_cette cité. Pour ce qui est de la bibliothèque, elle est\_très bien fournie et assez ancienne pour trouver de\_nombreux ouvrages poussiéreux. </p><p>Un nain du groupe de PJs pourrait faire une\_demande spécifique auprès de l’archiviste d’Arkar’um\_sinon, il faudra passer par le seigneur Bonarion pour\_avoir accès aux immenses couloirs de la bibliothèque.</p><p>Le prix de la recherche dépend du temps nécessaire\_pour trouver. Ça peut aller de quelques pièces d’argent\_à 15 ou 20 Talions d’or. Le demandeur ne paye QUE\_lorsqu’une information est trouvée.</p><p>Il y a aussi deux informations à trouver dans la\_bibliothèque de cette forteresse naine. La première,\_sur @UUID[Compendium.world.reliquesunion-objets.Item.WuDLIpgGzn11nvCA]{la terre sacrée des orcs, Ongbirn’Arr}, coûte 32 pa\_et la deuxième, sur @UUID[Compendium.world.reliquesunion-objets.Item.OuMZq0TzeK0ApuAM]{les Cavernes des Nains Tordues},\_coûte 68 pa.</p><p></p><h3>Information de Falika Rosna</h3><p>L’elfe blanche que les PJs ont rencontré dans la\_ville de Lavoise a continué les recherches au sujet\_de l’Ordre de l’Union, les Reliques et la prochaine\_étape des aventuriers. Elle a retrouvé dans un livre de\_contes assez récent, le récit d’un événement se passant\_dans la Vallée de Novrak et qui parle d’un marchand\_et de sa rencontre avec des centaures. Elle profite du\_retour, sous bonne garde, du chasseur Borass Taer\_pour transmettre aux PJs le résultat de ses recherches.\_</p><p>Borass Taer, à la demande de Lana’Sir, est ramené\_à la Cité d’Ispier après plusieurs semaines de «captivités» dans l’école Rosna à Lavoise. Il passera quelques\_temps en cellule avant son procès.</p><p>Ce conte permet aux PJs de se mettre à la recherche\_du marchand lorsqu’ils arriveront à la Vallée de\_Novrak.\_@UUID[Compendium.world.reliquesunion-objets.Item.yPCwCYGR5MVop4xv]{Conte de la Vallée de Novrak}</p><p></p><h3>Découverte de Zagrenn</h3><p>Le frère du Désespoir, après son retour au\_Monastère, a mis beaucoup de temps et d’énergie pour\_farfouiller dans la grande bibliothèque. Il a essayé de\_faire des liens avec chaque noms trouvés par les PJs. </p><p>Alors que le groupe est prêt à repartir à l’aventure\_en direction de la Vallée de Novrak, Zagrenn leur\_apporte les multiples informations qu’il a découvert.</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.JN1C49J4H1KXW5NT]{Message de Zagrenn}</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.02KnVLBX2RKQfEPe]{Forteresse-État d'Hyrr'Tarënn}</p><p></p><p>Il a trouvé quelques informations que les PJs\_ont déjà reçu (note sur Ramell, sur Gabrel et sur\_les cavernes des nains tordus). Il a aussi trouvé un\_ouvrage racontant les grandes lignes de la Cité-Mine\_naine de Hyrr’Tarënn. Ce nom que l’on peut lire sur\_la carte de la gardienne Maniash’onira, est une grande\_forteresse souterraine bâtie il y a bien longtemps par\_le roi Abadar, descendant d’Yjdad puis abandonnée.</p><p>Ce récit permettra aux PJs de trouver l’entrée secrète\_de la Cité-Mine d’Hyrr’Tarënn après leur séjour chez\_les centaures et ainsi poursuivre la campagne. </p>"
