        <div class="journal-cof2ta-ru">
          <h1>Rencontre avec Zagrenn</h1>
          <p class="paragraphe">
            Durant l'intermède, le porteur du Bracelet va recevoir la visite d'un Frère du Monastère du Désespoir (LM39) nommé Zagrenn Fredfisk. Suite au discours de Lana'Sir et les
            informations transmises par l'équipe de frère du monastère présents lors de la fête de la ville, Zagrenn se débrouille pour être envoyé à la Cité d'Ispier pour rencontrer le
            Porteur du Bracelet de l'Union.
          </p>
          <p class="paragraphe">
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.tvKYvTtecsyhg5eW]{Zagrenn Fredfisk} est un personnage secondaire de la campagne qui a deux rôles principaux.
          </p>
          <p class="paragraphe">
            Tout d'abord, il pourrait devenir un indicateur de confiance pour diriger les PJs, leur fournir des informations ou les remettre dans le droit chemin lors de leurs hésitations.
          </p>
          <p class="paragraphe">
            Ensuite, il peut être un personnage de rechange suite à la mort d'un des PJs ou un renfort pour le groupe de PJs si vous estimez que leur groupe n'est pas très expérimentés
            pour les épreuves qui les attendent.
          </p>
          <hr />
          <h2>Rencontre avec Zagrenn</h2>
          <p class="paragraphe">Le porteur du Bracelet reçoit la visite d'un coursier au petit matin durant l'intermède.</p>
          <div class="description">
            <p class="paragraphe">
              Peu après le lever du soleil, tu reçois la visite d'un coursier qui porte une écharpe au couleurs de la Cité d'Ispier. Il se penche légèrement en avant pour te saluer et sans
              un mot, te donne un pli cacheté du sceau de Jaspar Bonarion.
            </p>
          </div>
          <div class="parcho">
            <p class="paragraphe">Ce matin, nous avons reçu au château la visite d'un individu souhaitant rencontrer le responsable du groupe des Héros Sauveur de la Dame d'honneur.</p>
            <p class="paragraphe">
              D'après ses dires, il vient directement du Monastère des Frères du Désespoir et disposerait d'informations sur ce que vous avez trouvé récemment. Dès qu'il vous sera
              possible, veuillez me rejoindre au château. Cordialement,
            </p>
            <p class="paragraphe">Jaspar Bonarion, seigneur de la Cité d'Ispier</p>
          </div>
          <div class="description">
            <p class="paragraphe">Le coursier est resté planté devant la porte comme s'il attendait une réponse.</p>
          </div>
          <p class="paragraphe">
            Arrivé au château de très bonne heure, Zagrenn Fredfisk est un moine du monastère des Frères du Désespoir. Cet ordre est assez connu et respecté par la plupart des habitants du
            Pays des Vents. Malgré le fait qu'il soit venu seul, Jaspar a installer ce visiteur dans un petit salon du château en attendant le porteur.
          </p>
          <p class="paragraphe">Ce dernier peut venir au rendez-vous seul ou prévenir ses compagnons pour l'accompagner. Lana'Sir est au village des sylvains ce jour-ci.</p>
          <div class="description">
            <p class="paragraphe">
              En arrivant au château, vous êtes amenez par un serviteur jusqu'à un salon de petite taille et aménagé pour les réunions privées. Debout devant une petite bibliothèque, les
              mains croisées dans le dos et dans une posture très droite, le moine se retourne vers vous et vous remarquez son visage neutre avec une légère note de contrariété sur ses
              traits.
            </p>
            <p class="paragraphe">Dans un coin de la pièce, vous voyez deux gardes postés pour la surveillance de ce visiteur.</p>
            <p class="paragraphe">
              Le moine vous observe rapidement et s'approche d'un pas décidé. Il est très musclé, chauve et porte une tenue de voyage et la tunique blanche de cet ordre.
            </p>
          </div>
          <p class="discussion">
            <strong>Zagrenn Fredfisk :</strong>
            Veuillez excuser ma venue si matinale. Je me nomme Zagrenn Fredfisk et je viens directement du Monastère des Frères du Désespoir pour vous rencontrer. Auriez-vous l'amabilité
            de vous entretenir avec moi quelques instants ?
          </p>
          <hr />
          <h2>Discussion avec Zagrenn</h2>
          <p class="paragraphe">
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.tvKYvTtecsyhg5eW]{Zagrenn }est un frère du Désespoir qui aime particulièrement l'étude de l'histoire des
            Terres d'Arran et, surtout, des légendes autour des conflits entre les différents peuples, les discriminations et le racisme.
          </p>
          <p class="paragraphe">
            Depuis 10 ans, il essaye, par tous les moyen, de comprendre pourquoi les peuples ou les individus cherchent à dominer ou opprimer leur prochain. Il n'arrive pas à comprendre
            les raisons de cette haine et ça l'énerve. Il a récemment entendu parlé des Sauveur de la Dame d'Honneur grâce à l'équipe de frères qui ont participé à la fête d'Ispier et
            suite au discours de Lana'Sir. Il a déjà entendu parlé de l'Ordre de l'Union et de la légende autour d'Esdavia. Il a, donc, demandé une autorisation à ses supérieurs pour venir
            en aide aux elfes sylvains de la forêt du Val Rouge avec l'espoir de pouvoir rencontrer le groupe de PJs.
          </p>
          <p class="paragraphe">
            Zagrenn est un vrai moine du Monastère des Frères du Désespoir. Il est droit, juste et intraitable avec les injustices ou les persécutions des faibles. Il a de grandes valeurs
            chevillées au corps et il a tendance à concevoir le monde avec vision binaire entre le bien et le mal. Il n'a strictement aucune notion du second degré ni du sarcasme. Il
            consacre sa vie à la création d'un monde meilleur et Zagrenn ne comprendra pas les personnages qui auront besoin de motivations supplémentaires pour s'impliquer dans cette
            mission.
          </p>
          <hr />
          <h3>Les informations de Zagrenn</h3>
          <ul>
            <li>
              <p class="paragraphe">Les reliques sont très puissantes et c'est pourquoi elles ont été séparées et cachées depuis plus de 1000 ans par l'Ordre de l'Union</p>
            </li>
            <li>
              <p class="paragraphe">Les Faux dieux, qui les ont utilisés à Esdavia, ont soumis et opprimés de nombreuses personnes avant que l'Ordre récupère les reliques</p>
            </li>
            <li>
              <p class="paragraphe">
                Chaque relique a des pouvoir identiques mais pour des races différentes. Elles ont deux voies différentes. L'une apportera domination/contrôle/possession et l'autre
                inspiration/émancipation/motivation. Chaque voie est influencée par les actions du porteur.
              </p>
            </li>
            <li>
              <p class="paragraphe">Une seule personne ne peut pas porter plusieurs reliques sinon elle devient folle ou elle meurt.</p>
            </li>
            <li>
              <p class="paragraphe">Le seul moyen connu de détruire les reliques est un suicide collectif des cinq porteurs.</p>
            </li>
            <li>
              <p class="paragraphe">
                L'Ordre de l'Union a souhaité conserver les reliques pour pouvoir s'en servir en cas de grand danger pour les Terres d'Arran. Certains puissants de l'Ordre avaient,
                peut-être, des ambitions personnelles ou un attrait pour le pouvoir des reliques.
              </p>
            </li>
          </ul>
          <p class="paragraphe">
            Pour Zagrenn, le but des PJs seraient de récupérer les cinq reliques de l'Union, essayer de les activer et, pour finir, les détruire pour sauver les Terres d'Arran face au
            risque qu'elles tombent entre de mauvaises mains. Les PJs deviendraient des héros pour le monde entier, leurs noms seraient chantés sur toute les place de cités et les livres
            d'histoire détailleraient leur légende. Il essayera de convaincre les PJs de poursuivre cette quête importante car d'après ses supérieurs, une tension grandit dans les
            campagnes et certains quartiers de cités. Les relations entre les humains et les anciennes races se détériorent et de nombreux actes de racismes remontent aux oreilles des
            Frères du Désespoir.
          </p>
          <p class="paragraphe">
            Les Reliques de l'Union, même si elles pourraient apaiser cette situation, sont des armes bien trop dangereuses si de mauvaises personnes les obtiennent.
          </p>
          <hr />
          <h3>Avertissements au Porteur du Bracelet</h3>
          <p class="paragraphe">
            Si Zagrenn apprend qu'un des PJ porte le Bracelet et l'a activé, il ne sera pas perturbé plus que ça mais il prendra un air grave et solennel face au porteur. Ses mises en
            gardes sont strictes et fermes. Si le porteur commence à profiter des pouvoirs du Bracelet pour opprimer ou soumettre des elfes, il ne pourra plus contrôler ses pulsions de
            domination au fur et à mesure. Cela fonctionne pour l'autre voie également d'après ses recherches. Pour développer les pouvoirs des Reliques, il faut les utiliser mais, en même
            temps, plus on les utilise et plus la Relique a de l'influence sur le porteur. Ce dernier doit rester très stable sur ses valeurs et ses motivations.
          </p>
          <p class="paragraphe">
            Zagrenn préviendra le porteur, avec un petit sourire malicieux, que s'il utilise le Bracelet pour de vils objectifs, il l'apprendra et qu'il viendra s'occuper personnellement
            de son cas, sans grandes subtilités.
          </p>
          <p class="paragraphe">Il gardera à l'œil le groupe de PJs pour éviter toute nouvelle menace de contrôle des peuples.</p>
          <p class="paragraphe">
            Dans tous les cas, après la discussion avec Zagrenn, les PJs devrait comprendre l'importance de leur quête. Zagrenn retournera au Monastère des Frères du Désespoir après avoir
            passé quelques jours dans le village des elfes sylvains et il pourra faire des recherches dans la magnifique bibliothèque du Monastère. Pour le moment, il ne souhaite pas
            informer ses supérieurs de la situation pour éviter les tentations.
          </p>
          <p class="paragraphe">
            Il faudrait inciter les PJs a partager leurs informations avec Zagrenn (les différents textes, la carte de la gardienne du Temps, les notes de Hisp Galik…).
          </p>
        </div>
