    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Et maintenant ?</h1>
          <p class="paragraphe">
            Les PJ en ont peut-être déjà parlé avant de sortir du Temple du Val Rouge mais après cette attaque leurs plans vont peut-être changés. Laissez-les élaborer un plan de ce qu'ils
            veulent faire.
          </p>
          <p class="paragraphe">Le groupe a réuni beaucoup d'informations dans le Temple du Val Rouge. Ils sont peut-être blessés, ils doivent discuter de leur prochain objectif.</p>
          <p class="paragraphe">
            Ils devrait penser à utiliser la @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.dIB0aOb4TPU5kYWo]{Ceinture de communication} pour envoyer un message à
            Lana'Sir et s'ils n'y pensent pas, Maana voudra envoyer un message pour informer Lana'Sir de la progression et de la réussite du groupe.
          </p>

          <h2>Quelles informations veulent-ils écrire sur le message ?</h2>
          <h3>S'ils écrivent un message contenant :</h3>
          <ul>
            <li>
              <p class="paragraphe">Découverte du Bracelet de l'Union</p>
            </li>
            <li>
              <p class="paragraphe">Informations sur Eskavia, les reliques</p>
            </li>
            <li>
              <p class="paragraphe">Les échanges avec Arkanov par la Gardienne</p>
            </li>
            <li>
              <p class="paragraphe">La rune de possession et/ou la lettre sur le mercenaire</p>
            </li>
          </ul>
          <p class="paragraphe">
            Dans ce cas-là suivez le prochain chapitre :
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.DYEz8oNQ4OcLZ4Te]{Retour Victorieux à la Cité d'Ispier}
          </p>

          <h3>S'ils écrivent un message qui ne mentionne pas :</h3>
          <p class="paragraphe">
            Le PJ peuvent vouloir dissimuler des informations à Lana'Sir après la découverte de la mission initiale de l'Ordre de l'Union de vouloir faire oublier les Reliques. De plus,
            Hisp Galik est à la Cité d'Ispier d'après eux donc ils ne veulent peut-être pas prendre de risques en dévoilant des informations sur leur possession du Bracelet de l'Union.
          </p>
          <ul>
            <li>
              <p class="paragraphe">Informations sur Eskavia, les reliques</p>
            </li>
            <li>
              <p class="paragraphe">Les échanges avec Arkanov par la Gardienne</p>
            </li>
            <li>
              <p class="paragraphe">La rune de possession et/ou la lettre sur le mercenaire</p>
            </li>
          </ul>
          <p class="paragraphe">
            Dans ce cas-là allez au chapitre : @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.y5X3Kp9wthuwcCoq]{Retour à la
            Cité d'Ispier}
          </p>
          <p class="paragraphe"></p>
          <h3>S'ils n'écrivent aucun message à Lana'Sir :</h3>
          <p class="paragraphe">
            Dans ce cas-là allez au Chapitre : @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.kwMtQDN5t95pbjP6]{Retour
            Mouvementé à la Cité d'Ispier}
          </p>
          <p class="paragraphe"></p>

          <div class="levelup">PASSAGE DE NIVEAU</div>
        </div>
