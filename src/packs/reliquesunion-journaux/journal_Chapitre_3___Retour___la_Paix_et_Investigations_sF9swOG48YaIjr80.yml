        <div class="journal-cof2ta-ru">
          <h1>Synthèse du chapitre</h1>
          <p class="paragraphe">Dans ce nouveau chapitre, le groupe de PJs sort du Temple du Val Rouge avec beaucoup d'informations, de mystères et des objets divers et variés.</p>
          <p class="paragraphe">
            Après un temps très calme dans ce temple abandonnée, une bande de mercenaires tendent une embuscade aux aventuriers à leur sortie. Les combattants, peu expérimentés, attendent
            un signe de vie sortant du Temple depuis plusieurs heures, voir plusieurs jours, et ne seront pas très dynamique au moment de l'attaque.
          </p>
          <p class="paragraphe">
            Chose essentielle, un des mercenaires possède une lettre de mission non signée mais très claire et un autre mercenaire est possédé par un nécromancien. Ça devrait déjà mettre
            la lumière sur l'implication du mage Hisp Galik.
          </p>
          <p class="paragraphe">
            Après cette altercation, ils devraient se poser de nombreuses questions et, dans cette réflexion, il devraient penser à envoyer un message à Lana'Sir pour lui faire connaitre
            leurs avancées. Cet acte changera beaucoup de choses au retour des PJs à la Cité d'Ispier. En fonction des informations qu'ils transmettent à Lana'Sir, l'accueil du seigneur
            Jaspar Bonarion ne sera pas vraiment identique.
          </p>
          <p class="paragraphe">
            A leur retour à la Cité d'Ispier, en fonction de la réaction du seigneur, les PJs seront en mesure de lui expliquer la situation avec plus ou moins de secrets. Il trouveront un
            seigneur en colère contre son ancien mage-conseiller et, surtout en recherche de rédemption face aux décisions qu'il a prise.
          </p>
          <p class="paragraphe">La suite du chapitre sera plus espacée dans le temps.</p>
          <p class="paragraphe">Tout d'abord, la grande fête d'Ispier sera un bon moyen d'activer le Bracelet de l'Union pour le porteur à son insu.</p>
          <p class="paragraphe">
            Ensuite, le retour de la Dame d'Honneur, Lana'Sir, de Laotissa Graine Dépeautre et des survivants sylvains sera un moment crucial pour la suite de l'aventure. Le fait que
            Lana'Sir divulgue beaucoup d'informations sur l'Ordre de l'Union, le Bracelet et le rôle des PJs va enclencher beaucoup d'événements importants pour la poursuite de cette
            quête.
          </p>
          <p class="paragraphe">
            Pour finir, les nombreuses recherches des PJs sur les informations qu'ils ont trouvées dans le Temple du Val Rouge devraient éclaircir leurs idées mais aussi noyer le groupe
            dans une mare d'histoires et d'ouvrages plus ou moins relatifs avec leurs objectifs.
          </p>
          <p class="paragraphe">
            La deuxième partie de ce chapitre est un intermède qui peut durer assez longtemps en fonction des recherches et des envies des joueurs. Ils pourront faire des voyages, chercher
            des choses sur leur histoire personnelle, vendre et acheter des objets sur-mesures, créer des organisations ou des affaires, investir leur fortune… Ils pourront profiter de ce
            moment pour s'intégrer dans la communauté de la Cité d'Ispier ou aller aider à la reconstruction du village des elfes sylvains ou encore rencontrer des PNJs à leur convenance.
          </p>
          <hr />
          <h1>Explications</h1>
          <p class="paragraphe">
            Il ne faudra pas, lors de ce chapitre, oublier le besoin de rédemption du Seigneur Bonarion face aux attaques catastrophiques qu'il a déclenché, manipulé par Hisp Galik. Il
            cherchera à se racheter par tous les moyens possibles grâce à la fortune de sa cité et ses décisions pour aider les sylvains et les PJs.
          </p>
          <p class="paragraphe">
            Par contre, si les PJs ne donne pas beaucoup d'informations au seigneur et que ce dernier à du mal à comprendre le pourquoi et le comment de la situation, il va transformer sa
            honte en colère. La lettre transmise de Lana'Sir par les PJs déterminera la réaction de Jaspar entre mise en prison et interrogatoire ou accueille chaleureux au château.
          </p>
          <p class="paragraphe">
            Le seigneur voulant réduire voir casser les attaques contre les elfes sylvains, il décide d'organiser une grande fête pour la paix et faire un beau discours devant tous les
            habitants. Ce temps de joie et de réconciliation permettra de mettre en scène l'attaque d'un groupe de haineux face à l'un des elfes sylvains du groupe de PJs ou sur Maana. En
            venant au secours de l'elfe attaqué et en danger, le porteur de la relique activera le Bracelet de l'Union et connaîtra, maintenant le premier pouvoir de cet artefact puissant.
          </p>
          <p class="paragraphe">
            Deux semaines après leur retour à la Cité, Lana'Sir rentrera chez elle. Elle a bien changée, elle a mûri et elle est déterminée comme jamais. Son discours permettra la
            divulgation de beaucoup d'informations sur les Reliques et cela aura des implications très lourdes. Les différentes organisations qui recherchent les Reliques auront conscience
            de cette nouvelle, la légende des Sauveurs d'Ispier commencera à se répandre et cela devrait «obliger» les PJs à continuer leur quête.
          </p>
          <p class="paragraphe">
            Laotissa Graine Dépeautre aura le rôle de motiver le porteur du Bracelet et ses compagnons vers la suite de l'aventure. Elle sera la gardienne des «bonnes valeurs» du porteur
            et un lien spécial se créera entre eux deux si le joueur est réceptif.
          </p>
          <p class="paragraphe">
            Un mois après leur sorti du Temple du Val Rouge, les PJs feront la rencontre du moine Zagrenn Fredfisk qui vient directement du Monastère des Frères du Désespoir. Ce PNJ sera
            une personnalité de confiance pour les PJs. Dans cette quête où les joueurs ne sauront pas à qui ils peuvent faire confiance, Zagrenn pourra devenir un personnage qui oriente
            les PJs, les guident, leur raconte des faits sur les Terres d'Arran que certains joueurs ne connaissent pas et, surtout, une boussole qui les gardera sur le droit chemin.
            Zagrenn Fredfisk ne devra pas forcément suivre les PJs dans leur quête mais à chaque grand chapitre, il sera là pour aider les PJs.
          </p>
          <p class="paragraphe">
            Bien entendu les PJs pourront commencer leurs investigations avant la fête et avant le retour de Lana'Sir mais il faut qu'ils comprennent que ce genre de recherches prennent
            énormément de temps. La période d'investigation des PJs sur les noms, lieux, objets, correspondances… qu'ils ont trouvé dans le Temple du Val Rouge sera plus ou moins longue.
          </p>
          <p class="paragraphe">
            A chaque MJ de déterminer la fréquence de révélation des différentes recherches en fonction de l'intérêt des joueurs pour leur intermède. Afin que cela soit crédible, il
            faudrait que l'intermède dure environ 3 à 4 mois car vous n'êtes pas sans savoir que trouver un nom spécifique dans les recueils d'une grande bibliothèque, retranscrire cette
            information et la transporter d'une cité à l'autre est extrêmement long et complexe.
          </p>
          <p class="paragraphe">Ne pas hésiter à intercaler une ou deux missions secondaires à ce moment en se basant sur les historiques personnels des personnages.</p>
          <p class="paragraphe">
            La masse d'informations récoltées par le groupe est volontaire pour attiser les discussions entre eux, Laotissa, Lana'Sir, Zagrenn et d'autres. Quand on recherches des
            informations, il est assez fréquent de trouver beaucoup de choses qui ne sont pas utiles directement pour leur prise de décision. Dans une campagne écrite qui est, de faite
            assez linéaire, transmettre aux joueurs les seules informations qui sont liées à leur mission oriente encore plus leur décision sans leur donner «l'illusion» du choix et de la
            réflexion.
          </p>
          <p class="paragraphe">
            A la fin de ce chapitre, le groupe de PJs devrait quand même connaitre leur prochaine direction avec plus de précision : la ville de la Vallée de Novrak.
          </p>
          <p class="paragraphe">
            Ils pourront ainsi, trouver la seule personne qui a rencontrée et parlée d'un village de centaures, 30 ans plus tôt. Cet ancien marchand a laissé derrière lui une histoire qui
            a traverser les Terres d'Arran sans qu'il ne s'en doute une seule seconde.
          </p>
        </div>
