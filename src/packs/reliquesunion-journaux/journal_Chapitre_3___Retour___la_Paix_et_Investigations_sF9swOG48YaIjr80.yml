  - sort: 1300000
    name: Fin de l'intermède
    type: text
    _id: FGLuvrx2OHywnu5z
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Durant l’intermède, Lana’Sir et Laotissa discuteront souvent avec les PJs pour connaitre l’avancement\_de leurs recherches et les motiver à poursuivre leur\_mission pour retrouver les autres Reliques de l’Union.</p><p>Grâce aux informations trouvées et révélées au\_fur et à mesure de l’intermède, les différentes PNJs\_pourront également aider le groupe à faire le tri au\_milieu des noms, dates, lieux… qu’ils ont récolté. Si\_les PJs sont perdu, utilisez Zagrenn, Jaspar, Lana’Sir\_ou Laotissa pour les aider à prendre une décision.</p><p>Les PJs sont fin prêt à partir vers les Montagnes des\_Crocs d’Acier et la ville de la Vallée de Novrak pour\_chercher des informations sur le village d’Arkanov, les\_centaures grâce à un vieux marchand.</p><p>Il pourront s’équiper avant de partir avec des\_montures, des vêtements chauds, des rations de\_voyage, des outils…</p><p>La veille de leur départ, Zagrenn revient à la Cité\_d’Ispier pour donner sa découverte sur la Cité-Mine\_d’Hyrr’Tarënn aux Sauveurs de la Dame d’Honneur.\_</p><p>N’oubliez pas de vérifier l’équipement que les PJs\_amène avec eux et surtout le grand coffre contenant la\_Machine du Val Rouge. Elle pourrait être utile durant\_le voyage mais surtout lors de leur séjour dans le\_village d’Arkanov.</p><hr /><p><span style=\"font-family:'Bruno Ace'\"><strong>PASSAGE DE NIVEAU</strong></span></p><hr />"
