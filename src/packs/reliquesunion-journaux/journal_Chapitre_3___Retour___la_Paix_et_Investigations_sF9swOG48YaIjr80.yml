  - sort: 1000000
    name: Recherches dans les autres villes
    type: text
    _id: V5F2XvsVDfviqdXn
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Recherches dans les autres villes</h1>
          <p class="paragraphe">
            En plus de ces événements, tout au long de l'intermède, vous pourrez révéler des recherches sur les différents termes, noms, histoires… Que les PJs ont trouvé jusque là.
            Volontairement, beaucoup de documents ne serviront à rien pour la poursuite de la campagne mais ça pourra faire mariner les PJs.
          </p>
          <p class="paragraphe">
            Les PJs peuvent faire des recherches dans beaucoup d'endroits des Terres d'Arran. En fonction du temps qu'ils veulent prendre pour les recherches, ils pourront aussi partir
            eux-même vers des villes voisines pour faciliter le travail des archivistes (même règles de recherche que pour la bibliothèque d'Ispier).
          </p>
          <h3>Bibliothèque de Blanche Paix</h3>
          <p class="paragraphe">
            La bibliothèque de cette ville jeune et très dynamique n'est pas réputée pour sa qualité. Le seigneur de la ville Alvon Godert n'investit pas dans ce lieux et lorsqu'il a une
            demande, elle se limite à trouver le nom d'un seigneur, sa date d'anniversaire et la composition de sa famille ou les relations commerciales de telle ou telle cité-état. Autant
            dire que la section «contes et légendes» est assez pauvre.
          </p>
          <p class="paragraphe">Deux textes sont trouvables dans cette bibliothèque :</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.v8tJT8R3qA2jFHn6]{Attaques dans les Crocs d'Acier}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.X3Cnj5RrkfKZekUH]{Kanasfi}</p>
          <p class="paragraphe"></p>
          <h3>Bibliothèque de la Cité d'Orkadia</h3>
          <p class="paragraphe">
            Ce n'est pas tant la bibliothèque de la ville qui est intéressante mais plutôt les ouvrages entreposés dans l'école de magie de cette vieille cité d'Orkadia. L'audacieux
            seigneur nain Goranu a souhaité installer une des plus grandes écoles spécialisées pour les jeunes mages venant des quatre coins du monde. Compétition, concurrence et ambition
            sont les valeurs ancrées dans cette école.
          </p>
          <p class="paragraphe">
            Les demandes de recherche dans cette bibliothèque sont très chères. Le tarif pour n'importe quelle recherche est à 40 pa. Si la rapidité est exigée, les prix seront doublés
            voir plus.
          </p>
          <p class="paragraphe">Il y a deux ouvrages à trouver dans cette bibliothèque :</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.CERCfeVn5ZOnhb1r]{Recherche sur les Centaures}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.mAUSnY185CU3uJ8z]{L'humain Gabrel}</p>
          <p class="paragraphe"></p>
          <h3>Bibliothèque de la CitéÉtat d'Arkar'um</h3>
          <p class="paragraphe">
            La Forteresse-État naine d'Arkar'um a déjà reçu la visite des aventuriers. Il n'ont pas pu visiter les étages supérieurs de cette grande ville fortifiée mais, au nord de
            l'Ourann, tout le monde connait l'influence de cette cité. Pour ce qui est de la bibliothèque, elle est très bien fournie et assez ancienne pour trouver de nombreux ouvrages
            poussiéreux.
          </p>
          <p class="paragraphe">
            Un nain du groupe de PJs pourrait faire une demande spécifique auprès de l'archiviste d'Arkar'um sinon, il faudra passer par le seigneur Bonarion pour avoir accès aux immenses
            couloirs de la bibliothèque.
          </p>
          <p class="paragraphe">
            Le prix de la recherche dépend du temps nécessaire pour trouver. Ça peut aller de quelques pièces d'argent à 15 ou 20 Talions d'or. Le demandeur ne paye QUE lorsqu'une
            information est trouvée.
          </p>
          <p class="paragraphe">
            Il y a aussi deux informations à trouver dans la bibliothèque de cette forteresse naine. La première, sur
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.WuDLIpgGzn11nvCA]{la terre sacrée des orcs, Ongbirn'Arr}, coûte 32 pa et la deuxième, sur
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.OuMZq0TzeK0ApuAM]{les Cavernes des Nains Tordues}, coûte 68 pa.
          </p>
          <p class="paragraphe"></p>
          <h3>Information de Falika Rosna</h3>
          <p class="paragraphe">
            L'elfe blanche que les PJs ont rencontré dans la ville de Lavoise a continué les recherches au sujet de l'Ordre de l'Union, les Reliques et la prochaine étape des aventuriers.
            Elle a retrouvé dans un livre de contes assez récent, le récit d'un événement se passant dans la Vallée de Novrak et qui parle d'un marchand et de sa rencontre avec des
            centaures. Elle profite du retour, sous bonne garde, du chasseur Borass Taer pour transmettre aux PJs le résultat de ses recherches.
          </p>
          <p class="paragraphe">
            Borass Taer, à la demande de Lana'Sir, est ramené à la Cité d'Ispier après plusieurs semaines de «captivités» dans l'école Rosna à Lavoise. Il passera quelques temps en cellule
            avant son procès.
          </p>
          <p class="paragraphe">
            Ce conte permet aux PJs de se mettre à la recherche du marchand lorsqu'ils arriveront à la Vallée de Novrak.
            @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.yPCwCYGR5MVop4xv]{Conte de la Vallée de Novrak}
          </p>
          <p class="paragraphe"></p>
          <h3>Découverte de Zagrenn</h3>
          <p class="paragraphe">
            Le frère du Désespoir, après son retour au Monastère, a mis beaucoup de temps et d'énergie pour farfouiller dans la grande bibliothèque. Il a essayé de faire des liens avec
            chaque noms trouvés par les PJs.
          </p>
          <p class="paragraphe">
            Alors que le groupe est prêt à repartir à l'aventure en direction de la Vallée de Novrak, Zagrenn leur apporte les multiples informations qu'il a découvert.
          </p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.JN1C49J4H1KXW5NT]{Message de Zagrenn}</p>
          <p class="paragraphe">@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.02KnVLBX2RKQfEPe]{Forteresse-État d'Hyrr'Tarënn}</p>
          <p class="paragraphe"></p>
          <p class="paragraphe">
            Il a trouvé quelques informations que les PJs ont déjà reçu (note sur Ramell, sur Gabrel et sur les cavernes des nains tordus). Il a aussi trouvé un ouvrage racontant les
            grandes lignes de la Cité-Mine naine de Hyrr'Tarënn. Ce nom que l'on peut lire sur la carte de la gardienne Maniash'onira, est une grande forteresse souterraine bâtie il y a
            bien longtemps par le roi Abadar, descendant d'Yjdad puis abandonnée.
          </p>
          <p class="paragraphe">
            Ce récit permettra aux PJs de trouver l'entrée secrète de la Cité-Mine d'Hyrr'Tarënn après leur séjour chez les centaures et ainsi poursuivre la campagne.
          </p>
        </div>
