pages:
  - sort: 0
    name: Sortie du Temple du Val Rouge
    type: text
    _id: LGE60tt8kcHiQYBZ
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<blockquote><p>Au moment où vous monter l'escalier en colimaçon qui vous a mené à l'intérieur du temple du Val Rouge, vous entendez le même bruit de racines et de craquement de l'Arbre-Mère en train de s'ouvrir vers l'extérieur. Dès que vous êtes tous dans l'escalier, les lanternes du Temple s'éteignent derrière vous.Vous sortez au pied de l'Arbre-Mère.</p></blockquote><ul><li><p><span style=\"font-family:Arial\"><strong>@Test[car:per|comp:Analyser la situation]</strong></span></p><ul><li><p><span style=\"font-family:Arial\"><strong>15+</strong></span> : <em>il y a du mouvement sur votre droite et en face de vous</em></p></li><li><p><span style=\"font-family:Arial\"><strong>20+</strong></span> : <em>vous entendez le bruit d'une arbalète qui se charge et des chuchotements</em></p></li></ul></li></ul><blockquote><p>Le léger bruit du déclenchement d'une arbalète se fait entendre.Disposé en embuscade face aux abords de l'Arbre-Mère, vous entendez un groupe de combattants. Au premier coup d'oeil, ils ne semblent pas très organisés.</p></blockquote><h2>Combat contre les mercenaires</h2><p><strong>Scène : @UUID[Scene.Fm3I69kcdbz0yoAE]{4.Clairière}</strong></p><p><strong>Ennemis :</strong>\_@UUID[Actor.e9bakgU1xjcfQm3t]{Mercenaire Ronrik},\_@UUID[Actor.Kt9PoP90dBKFDzYl]{Mercenaire Expérimenté},\_@UUID[Actor.c6hQg7AOFK2TMboq]{Mercenaire}</p><p>En fonction de la PER des PJ et de leur réaction, ils seront supris ou pas. S'ils sont surpris, les mercenaires auront un tour entier avant que les PJ puissent riposter.</p><ul><li><p>@UUID[Actor.c6hQg7AOFK2TMboq]{Les trois mercenaires} de faible niveau attaquent le plus longtemps possible avec leur arbalète en se cachant derrière les rochers qui parsème la clairière.\_</p></li><li><p>@UUID[Actor.Kt9PoP90dBKFDzYl]{Le mercenaire expérimenté} est possédé par Hisp Galik grâce à la\_@UUID[Compendium.world.reliquesunion-objets.Item.QsWy0GgTljcsEnwh]{Rune de possession} qu'il porte autour du cou. Il combat de la même façon que les autres à l'arbalète tant qu'il est à distance.</p></li><li><p>@UUID[Actor.e9bakgU1xjcfQm3t]{Ronrik}, le chef de la bande, restera caché derrière un rocher et observe d'abord la scène. Son arbalète est chargée et il préfèrera attaque en traitre les PJ lorsqu'ils sont en combat contre les autres mercenaires. Il prendra le moins de risque possible.</p></li></ul><blockquote><p>L'un des mercenaire se comporte bizarrement, comme au ralenti.</p><ul><li><p><span style=\"font-family:Arial\"><strong>@Test[car:per|diff:10|comp:Observer la scène]</strong></span> : il est possédé par un nécromancien et ce que vous voyez n'est autre qu'un cadavre animé.</p></li><li><p><span style=\"font-family:Arial\"><strong>@Test[car:int|diff:10|comp:Connaissance magique]</strong></span> : vous savez que dans ce cas là, le nécromancien peut voir au travers des yeux du possédé.</p></li></ul></blockquote><h2>Fin du Combat :</h2><blockquote><p>Quelque instants après la fin de cet affrontement, les lueurs vertes qui illuminaient les pierres et l'Arbre-Mère se remettent à pulser délicatement. Les racines sont denouveau fermées sur l'entrée du Temple et elle est maintenant totalement invisible. Sur l'un des mercenaires, vous trouvez une note dans une enveloppe de cuir.</p><p>C'est un ordre de mission pour l'élimination du groupe de PJs en échange d'une forte somme d'argent (1500pa). La lettre n'est pas signée.\_@UUID[Compendium.world.reliquesunion-objets.Item.IhyLsRxXzmwwM2GE]{Lettre trouvée sur le Mercenaire}</p><p>Sur le mercenaire qui agissait bizarrement et dont vous aviez pu voir qu'il était possédé par un nécromancien. La vue de sa dépouille vous confirme ce fait. Les chairs ont déjà commencé à se dégrader et il doit s'agir d'un corp mort depuis plusieurs jours ou plusieurs heures.Sur son corps, porté en pendentif, vous trouvez une pierre gravée d'une série de runes. C'est sans aucun doute possible une rune de possession qui permet à un nécromancien de posséder un corps sur de grandes distances.\_@UUID[Compendium.world.reliquesunion-objets.Item.QsWy0GgTljcsEnwh]{Rune de possession}</p></blockquote>"
