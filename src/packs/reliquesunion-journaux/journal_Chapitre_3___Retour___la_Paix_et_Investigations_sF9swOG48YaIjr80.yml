  - sort: 500000
    name: Intermède à la Cité d'Ispier
    type: text
    _id: KWSvn79yt8Z056lX
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>La suite de la campagne part du principe que les PJ ont réussi a se faire comprendre du seigneur Bonarion, qu'une partie des informations trouvées ont été transmises au moins à Lana'Sir ou Laotissa et que Hisp Galik est identifié comme le vrai responsable de la guerre contre les Sylvains.\_</p><p>Si les PJ ont gardé trop d'informations secrètes, il est possible d'utiliser Maana pour briser le silence volontairement ou non.</p><p></p><p>Lana'Sir doit rentrer dans environ 15 jours à la Cité d'Ispier. Les PJs peuvent l'informer de leurs trouvailles au fur et à mesure s'ils le souhaitent.</p><p>Pendant ce temps ils peuvent faire plusieurs investigations ou profiter de la vie dans leur nouvelle demeure.</p><p>Vous pouvez gérer cette séquence comme un petit intermède qui sera ponctué d'événements dans le quotidien des PJ.\_</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Durant cette période, chronologiquement, il se passera :</span></strong></span></p><ul><li><p><strong>3 jours plus tard :</strong> @UUID[JournalEntry.VYRmpBw9IJ9J6ZYi.JournalEntryPage.tbCHg9xsciXhKtYI]{le discour de Jaspar Bonarion} devant les habitants de la Cité d'Ispier pour apaiser les tensions envers les elfes sylains. Ainsi que la grande fête qui suit qui sera un bon moyen d'activer le Bracelet de l'Union si un PJ le porte.</p></li><li><p><strong>15 jours après le retour à Ispier :</strong> @UUID[JournalEntry.VYRmpBw9IJ9J6ZYi.JournalEntryPage.3Wro4FzwYLnaJN8X]{Le retour de la Dame d'Honneur} et de Laotissa Graine Dépeautre à Ispier et le début des trois jours pour la Paix.</p></li><li><p><strong>30 jours après le retour à Ispier :</strong> @UUID[JournalEntry.VYRmpBw9IJ9J6ZYi.JournalEntryPage.JoWuu7l0J0l6Dtg5]{La rencontre de Zagrenn Freshfisk}, le frêre du Désespoir qui pourra devenir un allié pour les PJ.</p></li></ul><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Tout au long de l'intermède, les PJ pourront aussi :</span></strong></span></p><ul><li><p><strong>@UUID[JournalEntry.VYRmpBw9IJ9J6ZYi.JournalEntryPage.BgJSQx49MP1AWcGP]{Investigations à la Cité d'Ispier} pour éclaircir la situation.</strong>\_ Il y a beaucoup d'informations à trouver au sein même d'Ispier (dans les appartements de Hisp Galik, dans la bibliothèque, dans les livre du Temple du Val Rouge…)</p></li><li><p><strong>@UUID[JournalEntry.VYRmpBw9IJ9J6ZYi.JournalEntryPage.V5F2XvsVDfviqdXn]{Lancer des recherches dans d'autres villes ou institutions}</strong> (Monastère des frères du désespoir, Blanche Paix, Orkadia…)</p></li><li><p><strong>@UUID[JournalEntry.VYRmpBw9IJ9J6ZYi.JournalEntryPage.tRndvEe6SCYAaaG6]{Faire des activités personnelles}</strong> (vendre des objets récupérés, rechercher des informations sur leur quête, faire de l'artisanat, s'entrainer ou apprendre…)</p></li><li><p><strong>Aider à la reconstruction du village des elfes du Val Rouge</strong>.</p></li></ul><p>L'intermède sera aussi une bonne occasion pour le MJ d'intégrer certaines choses dans la campagne.\_@UUID[JournalEntry.VYRmpBw9IJ9J6ZYi.JournalEntryPage.d9miuMwENmuQ1LVl]{Opportunités pour le MJ}</p>"
