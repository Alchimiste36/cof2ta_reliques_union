  - sort: 600000
    name: Festivités et grand discours
    type: text
    _id: tbCHg9xsciXhKtYI
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Trois jours après le retour des PJs dans la cité\_d’Ispier, le seigneur Bonarion organise une grande\_fête pour apaiser les tensions des villageois envers\_les elfes sylvains et surtout expliquer la situation et la\_trahison de son ancien conseiller.</p><p>La population est ravie de cette nouvelle. L’effervescence augmentera au fur et à mesure des jours qui\_passent et de nombreux commerçants et habitants\_de Blanche Paix et des villages aux alentours arrivent\_en ville. La grande place est lavée, dégagée et organisée pour accueillir une estrade pour un groupe de\_musique et une autre pour le discours du seigneur.</p><p>Si les PJs veulent enquêter pour s’assurer de la\_sécurité de l’événement, ils trouveront seulement des\_gens heureux de cette fête, quelques familles endeuillées par la\_ guerre et assez perturbées par la fête et,\_quelques gardes qui parlent de marchands peu fréquentables ou de mauvaise réputation.</p><p>Les PJs peuvent aussi aider à l’organisation et ça\_augmentera la sympathie de Jaspar pour eux ainsi\_que leur renommée auprès des Ispierois et Ispieroises.</p><hr /><h2>Discours du seigneur Bonarion</h2><p>@UUID[Scene.yYVvn49DyqaQhFoN]{6.Place Ispier}</p><blockquote><img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier_fete1.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier_fete2.webp\" width=\"100\" height=\"100\" /><p>Le moment est arrivé. L’après-midi commence\_et la plupart des habitants de la cité se\_réunissent sur la place principale. Un grand discours\_est organisé par le seigneur Jaspar Bonarion sur la\_place de la Cité suivi par de nombreuses festivités.</p><p>La ville est en effervescence autour de cet\_événement et beaucoup de marchands et troubadours\_ont fait la route depuis Blanche Paix pour s’installer\_sur la place principale. Des stands en tout genre ont\_été montés autour de la place et une estrade assez\_haute et décorée de bannières aux couleurs de la cité\_se dresse devant l’entrée de la cour du château. Vous\_sentez que l’organisation de cette fête est une bonne\_excuse pour la plupart des habitants pour mettre de\_côté leur tristesse et leur peine face à la perte d’un\_être cher.</p><p>En milieu d’après-midi, alors que la foule s’est déjà\_amassée sur la place, le seigneur Bonarion avance\_avec droiture de l’estrade, seulement escorté par\_quatre soldats fiers de leur position.</p><p>Il monte, s’installe au centre devant toute la foule\_devenu très silencieuse.</p></blockquote><div class=\"discussion\"><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Jaspar Bonarion :</span></strong></span></p><p>Ispierois, Ispieroises,\_C’est avec un immense plaisir que je me tiens\_devant vous et avec un sentiment de honte qui ne me\_quitte plus depuis plusieurs jours.</p><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/jaspar_bonarion2.webp\" width=\"100\" height=\"100\" /><p>Nous avons été trahi ! … j’ai été trahi !\_Les paroles venimeuses et les manipulations\_honteuses de mon ancien conseiller Hisp Galik m’ont\_fait commettre l’irréparable pour vous, habitants\_de la Cité d’Ispier et pour nos voisins de toujours,\_les elfes sylvains de la forêt du Val Rouge. La Dame\_d’Honneur a bien essayé de me prévenir, de m’ouvrir\_les yeux. Ma propre fille voulait me faire sortir de la\_brume et apercevoir la vérité. Je ne l’ai pas entendu, je\_ne l’ai pas écouté. Mon cœur était remplit par la haine\_soufflée à mes oreilles par ce mage odieux.\_</p><p>Aucun Elfe Sylvain du Val Rouge, je dis bien\_AUCUN ELFE du Val Rouge n’a jamais souhaité s’en\_prendre à nous, s’en prendre à vos fils ou à vos maris.\_</p><p>Nous avons … non J’AI été manipulé pour entrer en\_guerre contre eux pour les seules ambitions d’un vile\_personnage. Tout cela pour quoi, me direz-vous ? Non\_pas une fortune ou un trône mais pour trouver un\_temple secret perdu dans les mémoires et pour récupérer un artefact soit disant\_magique ! Autant de\_morts, de peine et de tristesse pour une vieille histoire\_tombée dans l’oubli.</p><p>La haine, légitime, que certains d’entre vous\_ressentent face aux Elfes doit maintenant être tournée\_vers le seul responsable de cette guerre : Hisp Galik.\_</p><p>Mes espions sont à sa recherche en ce moment et quand\_JE le trouverais, il devra subir tous les tourments que\_chaque famille de la Cité d’Ispier a connu par sa faute.</p><p>La découverte de cette trahison n’aurait pu être\_possible sans l’aide précieuse d’un groupe de héros. Ils\_ont bravé tous les dangers pour retrouver votre Dame\_d’Honneur et lever le voile du mensonge pour révéler\_cette dure vérité.</p><p>Ils auront toujours leur place parmi nous dans\_notre belle cité et je suis sur que chacun de vous leur\_montrera l’hospitalité des Ispierois et Ispieroises\_comme il se doit !</p><p>Malgré mes erreurs, je me tiens devant vous\_pour vous demander un immense service, à vous qui\_avez déjà tant donné dans cette histoire : AIDER le\_peuple des Elfes Sylvains a reconstruire leur village\_et apportons leur notre soutien ! Ils sont aussi les\_victimes de cette trahison et nous devons à présent\_rétablir les liens entre nos peuples. Nul ne pourra plus\_exploiter la forêt du Val Rouge et nos efforts serviront\_à reconstruire leur village.\_</p><p>J’ai discuté longuement avec ces aventuriers/Maana (il fait un geste pour inviter les PJs/Maana à monter\_sur l’estrade). Ce groupe et ces elfes sylvains droit et\_honnête ont permis le sauvetage de ma fille, Lana’Sir,\_notre bien aimée Dame d’Honneur. Sans eux, la\_vérité serait encore enfouie dans les profondeurs du\_mensonge. Accueillez-les avec joie et reconnaissance !</p><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/jaspar_bonarion3.webp\" width=\"100\" height=\"100\" /><p>J’ai déjà trop parlé et vous avez envie de faire la\_fête, je le sais. Pour finir, j’ai le plaisir de vous annoncer\_que notre Dame d’Honneur revient à la Cité dans\_quelques jours et en cet honneur, elle souhaite, à son\_retour, que les portes du château soient ouvertes pour\_chacun de vous pendant trois jours et trois nuits pour\_venir discuter, parler de vos soucis et rire avec elle. Les\_bains publics seront gratuits et un repas copieux sera\_servit à chaque habitant qui le demande durant cette\_période.</p><p>Merci à toutes et tous et c’est avec plaisir que je\_déclare les festivités ouvertes !\_</p></div><blockquote><p>Il ouvre ses bras en croix avec un très grand\_sourire et un groupe de musiciens monte sur l’estrade\_derrière lui commençant un morceau entraînant et\_joyeux.</p><p>La plupart des spectateurs se mettent à danser,\_boire et profiter de la fête. Vous distinguez à quelques\_endroits des habitants renfrognés qui semblent en\_colère ou d’autres couples ou familles qui pleurent\_dans un coin de la place. A plusieurs moment de\_la soirée, vous pouvez voir la garde qui sépare des\_bagarres et vous entendez des phrases contre les\_elfes et contre Maana «ça ne fera pas revenir mon\_père, bâtard» - «ils ont tuer mon fils, un bûcheron\_honorable et vous voulez qu’on les aide ! - «j’ai\_combattu les elfes et maintenant on doit leur faire\_des câlins, plutôt sucer un cochon qu’aider les elfes !»\_C’est paroles sont très minoritaires mais bien\_présentes. Jaspar en personne passe toute la soirée à\_essayer de plaider la cause des elfes sylvains auprès\_de ces habitants en colère ou il essaye de réconforter\_les familles endeuillées. Vous découvrez qu’il connait\_la plupart des nom et prénom des habitants et qu’il\_est très respecté auprès de la population.\_</p></blockquote><hr /><p>Laissez les PJ profitez de la fête. Ils sont libres de se promener partout où ils le veulent mais gradez en tête les deux événements importants qui doivent intervenir durant la soirée : la rencontre du groupe de Frères du Désespoir et l'Activation du Bracelet de l'Union avec l'attaque d'un elfe par des badits.</p><hr /><h2>Les Frères du Désespoir</h2><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/freres_desespoir/frere_du_desespoir1_zagrenn_fredfisk.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/freres_desespoir/frere_du_desespoir1_2.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/freres_desespoir/frere_du_desespoir1_1.webp\" width=\"100\" height=\"100\" /><p>Près des façades à l’Ouest de la\_place, un stand est installé quelques\_instants après la fin du discours\_du seigneur Bonarion. La toile est\_bien blanche et les quatre côtés sont\_fermés par des tissus blanc. Seule une\_fente sur la partie de devant permet\_d’accéder à l’intérieur de la tente,\_assez grande pour recevoir quatre ou\_cinq personnes.</p><p>Devant la tente, trois hommes se\_positionnent et observent la foule. Ce\_sont des Frères du Désespoir présents\_pour venir en aide aux nécessiteux et\_protéger les plus faibles.</p><p>Si un PJ se rapproche de cet endroit\_de la place :\_</p><p>Tu vois dans cet endroit de la place\_une tente assez grande et fermée sur les\_quatre côtés par un tissu blanc. Une\_fente sur la paroi de devant permet\_de faire entrer les personnes sans que\_l’on puisse voir ce qui se passe sous\_ce stand. Devant tu remarques trois\_grands hommes habillés de blanc et\_équipés d’équipements de voyage en\_cuir avec beaucoup de poches. Ils sont\_marqués par des stigmates de combats\_et ont un air assez sévère. Ils observent\_la place debout les bras croisés et, au\_moment où tu t’approche un peu plus\_près, deux homme du groupe avance\_d’un pas décidé vers un homme de la\_place qui est en train de brutaliser une\_jeune femme. Le plus grand des deux\_l’attrape par le col, le soulève du sol,\_lui colle une grosse claque et le lâche à\_ses pieds. Tu n’entends pas les paroles\_mais le harceleur semble s’excuser face\_à la jeune femme et part en ce tenant\_la joue. Les deux hommes retournent\_vers la tente tranquillement.\_</p><p>Ce sont des frères venant du Monastère du\_Désespoir, ayant entendu parlé du conflit avec les\_elfes sylvains, de la détresse de certains habitants et\_de l’organisation de la fête.</p><h3>Informations des Frères du Désespoir</h3><p>Le plus balaise s’appelle @UUID[Actor.9jqYFfLyS1Wiqc9p]{Frère Zathaen}, c’est un semi-elfe\_très expérimenté au combat. Il a 37 ans et il est le\_responsable de ce groupe. Il combat l’injustice et vient\_en aide aux miséreux. Il aime sa vie et sa mission et\_après quelques temps de discussion on se rend compte\_qu’il est très cultivé sur beaucoup de sujets.</p><p>L'armoire à glace, @UUID[Actor.cfIvxJ41l4mAljmp]{Frère Orathen}, est un autre sang-mêlé, union d'un nain et d'un humain, de\_28 ans. Il est beaucoup moins agréable\_que Zathaen et il observe tout le temps\_la place au lieu d’écouter les PJs. Il\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">répondra essentiellement par oui ou\_</span>par non en faisant comprendre que\_discutailler avec des riches n’est pas sa\_mission.</p><p>Le plus jeune se nomme @UUID[Actor.S2jzBGIqb8f66dLl]{Frère aspirant Fergil},\_c’est un homme de 19 ans au regard\_pétillant. Il est pas encore aussi costaud\_que les deux autres mais on remarque\_rapidement les traces d’entraînement\_sur son visage, ses bras et ses mains.\_Il a la parlotte facile et c’est lui qui\_accueille les villageois qui demande un\_entretien avec les frères du désespoir.</p><p>En plus de séparer les bagarres,\_ils sont là pour aider les gens qui le\_demandent. Ils donnent quelques\_pièces d’argent au plus pauvres, ils\_auscultent les malades ou les blessés,\_ils écoutent les villageois traumatisés\_ou endeuillés.</p><p>Leur paroles ressemblent à des\_paroles de prêtres mais ils n’essayent\_pas de manipuler les habitants.</p><p>En milieu de soirée, un jeune\_homme est amené aux Frères du\_Désespoir par un des gardes de la Cité\_d’Ispier. Il s’appelle Karliar. C’est un\_orphelin humain dont les parents sont\_morts pendant les batailles contre les\_elfes sylvains. Les frères le regardent\_sous toutes les coutures, lui posent\_beaucoup de questions et, avec un grand sourire paternaliste, Gilder lui\_accroche un pendentif autour du coup.\_Une nouvelle recrue pour les Frères du\_Désespoir.\_</p><hr /><h2>Activer le Bracelet de L'union</h2><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/simio_arek.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/foukar_arek.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/certis_arek.webp\" width=\"100\" height=\"100\" /><p>Si un des PJ a équipé le Bracelet de l'Union, il est possible d'utiliser la fête pour provoquer une situation pour activer le Bracelet.</p><p><em>La situation qui suit est prévue pour sauver Maana ou un des PJ qui serait un elfe ou un semi-elfe face à une bande d'habitants ivres et en colère. Vous pouvez aussi amener le porteur du Bracelet a \"sauver\" ou prévenir\_@UUID[Actor.9jqYFfLyS1Wiqc9p]{Frère Zathaen} (un semi-elfe) d'un danger imminent ou d'une menace.</em>\_</p><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/grenn_tald.webp\" width=\"100\" height=\"100\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/habitants_menacants/jonio_frest.webp\" width=\"100\" height=\"100\" /><p>Lors de la soirée, alors que les villageois et les\_PJs sont en train de profiter de la fête, un groupe\_d’humains vindicatifs et armés d’armes blanches\_(couteaux, matraques…) voudront s’en prendre à\_Maana ou à un autre elfe sylvain du groupe. Faites en\_sorte que le Porteur du Bracelet ne soit pas trop loin\_du conflit et permettez-lui de s’interposer entre l’elfe\_et les villageois. Les groupes de gardes étant trop loin,\_seul le Porteur peut aider l’elfe contre les assaillants.\_</p><p>Scène :\_@UUID[Scene.yYVvn49DyqaQhFoN]{6.Place Ispier}</p><p>Ennemis :\_</p><p>@UUID[Actor.qZiJwFZNwlmPiJa7]{Simio Arek} ;\_@UUID[Actor.ZiHxwgX6rG8mXu5k]{Foukar Arek} ;\_@UUID[Actor.7niWDcI2pRmQvExS]{Certis Arek} ;\_@UUID[Actor.bgZbpmw2aRGeaSuy]{Grenn Tald} ; @UUID[Actor.Ov8bouNrZwcAexRU]{Jonio Frest}</p><p>Alliés après quelques tours de combat :</p><p>@UUID[Actor.9jqYFfLyS1Wiqc9p]{Frère Zathaen} ;\_@UUID[Actor.cfIvxJ41l4mAljmp]{Frère Orathen} ;\_@UUID[Actor.S2jzBGIqb8f66dLl]{Frère aspirant Fergil} ;\_@UUID[Actor.I39Ns5OK94vZ6w8A]{Capitaine} ; @UUID[Actor.EnEo09R8kpNmVgG4]{Vétéran} ; @UUID[Actor.BluoAsge54vFBYm8]{Garde de la ville} ;\_@UUID[Actor.mw8dZobjZ0FpR6tT]{Milicien}</p><p></p><p>Les frères du Désespoir pourront intervenir à coup de\_bâton après plusieurs tours si les PJs sont en mauvaise\_position. La vie de l’elfe sylvain doit être réellement\_menacée pour que le Bracelet puisse s’activer.</p><p>Lorsque le Porteur prend la défense de l’elfe et l’aide\_à sortir de cette situation mortelle pour lui :\_</p><blockquote><p>Lorsque tu réussis à aider Maana face à ces\_habitants, tu sens que les bracelets se resserrent\_autour de tes poignets. Une décharge électrique vient\_paralyser tes mains et remonter le longs de tes bras\_progressivement.\_</p></blockquote><p>Le joueur a exactement une minute pour réagir\_avant que le Bracelet ne s’active définitivement.\_</p><h3>Description pour le Porteur seulement</h3><blockquote><p>Tu ressens une large énergie qui rempli chaque\_cellule de ton corps. Tu sens comme-ci le bracelet se\_fondait dans ton bras et monter vers tes épaules. Tu\_ne peux plus bouger et tu te crispes, les poings serrés,\_lorsque tu sens que les pulsations se divisent à l’intérieur de toi.</p><p>Une vague remonte vers ta tête et entoure ton\_cerveau et l’autre descend droit vers ton cœur. Elle\_s’infiltre dedans. La sensation ne fait pas mal du\_tout mais c’est très perturbant. Tu as l’impression de\_rester ainsi au moins une heure entre impuissance et\_sentiment d’unité. Des mots et des phrases elfiques te\_passent dans l’esprit et tu les comprend parfaitement\_sans pouvoir t’en souvenir précisément.</p><p>Dans ton cœur, tu sens une nouvelle capacité\_pour parler avec des elfes par la pensée et dans ton\_esprit, tu sais que tu es capable d’utiliser un pouvoir\_te permettant de lire les pensées des elfes contre\_leur volonté. Le Bracelet te transmet une sensation\_divisée entre son enthousiasme d’être activé et son\_envie de se développer encore plus.\_</p><p>Lorsque que le flot d’énergie commence à diminuer,\_tu reprends conscience de ton corps encore immobile\_et tu commences à pouvoir bouger petit à petit et à\_voir ce qui t’entoure.</p></blockquote><h3>Description pour les témoins de la scène</h3><blockquote><p>Vous voyez votre compagnon qui serre les\_poings et les avant-bras. Il les tend vers le bas\_et se dresse entièrement droit, les yeux fermés comme\_une statue. Il est totalement immobile comme\_paralysé mais vous ressentez des vagues d’énergie\_qui le parcours. Vous voyez les vêtements autour du\_Bracelet de l’Union qui fondent tandis que le bracelet\_se resserrent autour de son avant-bras. Il se soude à\_sa peau et ressemble presque à un tatouage.</p><p>Il reste ainsi pendant environ deux minutes puis\_ses mains se décrispent, son corps se détend et ses\_yeux s’ouvrent. Une légère lueur verte passe sur le\_fond de ses pupilles avant de disparaitre. Seul un «ha\_!» de soulagement sort de sa bouche.\_</p></blockquote><hr /><p>Maintenant que le Bracelet de l’Union est activé\_seule le décès du Porteur pourra le retirer (ou un rituel oublié avec les quatre autres porteurs de reliques).</p><p>Il avait déjà\_accès au pouvoir passif du Bracelet et maintenant, le\_porteur comprend qu’un nouveau pouvoir s’offre à lui\_pour lire les pensées des Elfes ou user de télépathie\_avec les représentants de ce peuple. Le joueur pourra\_débloquer les différents pouvoirs du Bracelet au fur et\_à mesure de son utilisation.</p><hr /><h3>Les témoins de l'activation</h3><p>Si certains villageois voient la scène d’activation du\_bracelet, une rumeur commencera à courir dans la\_ville dès le lendemain. La \"possession\" du porteur ou ses pouvoirs magiques seront l'un des sujets de discussion principaux pour les habitants et des rumeurs fausses seront propagées rapidement. Une maladie grave pour lui, un sortilège lancé par un elfe… pour les pires ou un contact direct avec un dieu, une bénédiction, une indigestion… pour les meilleures. Dans tous les cas, si un habitant est témoin de la scène et n'est pas empêché de parlé par les PJ, ces informations remonteront aux oreilles de Hisp Galik après quelques semaines.</p><p>Si un des frères du Désespoir voit l’activation du\_Bracelet, il ne dira rien, ne posera aucune question\_et fera comme s’il n’avait rien vu. Il fera un rapport\_plusieurs jours plus tard à son responsable, Frère Zagrenn Fredfisk.</p>"
