  - sort: 1100000
    name: Autres activités
    type: text
    _id: tRndvEe6SCYAaaG6
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Autres activités</h1>
          <p class="paragraphe">
            Durant cette intermède, les PJs auront du temps libre et pourront s'occuper de leurs affaires. Ils sont connus et reconnus dans la Cité d'Ispier et les alentours. Leurs noms
            circulent dans des histoires et des chansons qui tournent dans les tavernes et le soir autour des foyers dans les maisons. Les enfants et certains habitants les arrêtent dans
            la rue pour les féliciter. Certains hommes ou certaines femmes dragueront les PJs car quel meilleur parti qu'un héros riche et célèbre pour sortir de la misère ou obtenir une
            vie plus simple.
          </p>
          <p class="paragraphe">Au delà de cela, les PJs pourront réaliser de nombreuses choses pendant leur temps de pause en attendant le résultat des différentes recherches.</p>
          <hr />
          <h2>Aider à la reconstruction du village des sylvains</h2>
          <p class="paragraphe">
            Sous le regard attentif de Lana'Sir et de Maana, beaucoup de villageois participent à la reconstruction du village des elfes sylvains de la Forêt du Val Rouge. Les artisans
            sont les premiers sur le chantier. Menuisiers, charpentiers, forgerons, tisserands, tanneurs, couvreurs… Tous les corps de métier aident à bâtir leurs maisons et remonter leur
            bâtiments.
          </p>
          <p class="paragraphe">
            La présence d'un ou plusieurs PJs sur le chantier est une motivation immense pour les ouvriers. A côté de ces Héros, les travailleurs feront d'autant plus d'efforts et
            essayeront de se distinguer. Chaque artisan est dédommagé pour son travail par le seigneur d'ispier en personne mais le travail est dur et long face aux dégradations qu'a subi
            le village.
          </p>
          <p class="paragraphe">
            Le fait de venir au village des sylvains fréquemment permettra aussi de mieux connaitre Laotissa qui prend son nouveau rôle très à cœur et qui gagne le respect des elfes et des
            humains jours après jour.
          </p>
          <p class="paragraphe">Lana'Sir passe aussi beaucoup de temps dans le village pour organiser les travaux et motiver les ouvriers.</p>
          <hr />
          <h2>Vendre les objets récupérés</h2>
          <p class="paragraphe">Lors du début de l'aventure, le groupe d'aventurier a pu récupérer pas mal d'objets. Cet intermède est le bon moment pour les revendre ou les donner.</p>
          <p class="paragraphe">
            Les objets trouvés dans, le village des elfes sylvains, dans le Temple du Val Rouge et sur les mercenaires qu'ils ont combattu dans la clairière peuvent être estimés et vendus
            dans la Cité d'Ispier ou dans une ville plus grande. Les armes et armures peuvent aussi être données au seigneur Bonarion pour la garde et les soldats de la ville.
          </p>
          <p class="paragraphe">
            La plupart des objets sont assez communs mais s'ils veulent vendre des objets spécifiques (lampes magique du Temple, objets du village des sylvains, machine du Val Rouge…),
            l'acheteur aura des questions pour les PJs et pourra propager des rumeurs sur eux rapidement. Ce n'est pas tous les jours qu'on trouve une lampe décorée de motifs elfiques qui
            s'allume toute seule et qui ne fait aucune fumée et aucune chaleur.
          </p>
          <h3>La Machine du Val Rouge</h3>
          <p class="paragraphe">
            La vente de la Machine du Val Rouge (voir C.A.S. p.??) est très compliquée. Un artefact aussi puissant et unique ne pourra pas être acheté par des marchands, ou nobles de la
            Cité d'Ispier. Certains acheteurs peuvent être trouvés à Blanche Paix ou dans la Forteresse-État d'Arkar'um mais ils seront méfiants de la provenance de cette machine et de son
            côté sacré pour les elfes.
          </p>
          <p class="paragraphe">
            Ils pourront, avec beaucoup de marchandage et de diplomatie, trouver un acheteur pour 300 Talions d'or. Un noble nain de la Cité d'Arkar'um qui possède un commerce de produit
            en tout genre.
          </p>
          <p class="paragraphe">
            Si les PJs veulent vendre la Machine du Val Rouge au elfes sylvains survivants, ces derniers seront outrés de leur demande. Pour eux un objet aussi puissant ne devrait pas être
            monnayé par les PJs. S'ils trouve une autre communauté d'elfes pour vendre le coffre, ils se feront certainement réprimandés par les elfes.
          </p>
          <h3>Répercussions pour les PJs</h3>
          <p class="paragraphe">
            Pour chaque objet vendu du Temple ou du village des sylvains, le MJ devra prévoir des répercussions négatives pour les PJs. De plus, si les PJs récupèrent une petite fortune,
            des voleurs et des escrocs de bas étages pourront tomber sur les PJs pour leur faire les poches (utiliser le chapître 4 du Livre du Meneur (LM.117) pour créer rapidement des
            combats contre des Combattants ou des aventuriers NC 1 ou 2).
          </p>
          <hr />
          <h2>Entraînement et Apprentissage</h2>
          <p class="paragraphe">L'intermède permet aussi aux PJs de poursuivre leur entraînement ou apprendre sur des sujets diverses.</p>
          <h3>Récupération de Points de Vie</h3>
          <p class="paragraphe">
            Les PJs n'ont peut-être pas lancé le score maximum de Points de Vie à chaque passage de Niveau et ils pourront durant l'intermède «récupérer» les PV qu'ils n'ont pas reçu au
            moment du passage.
          </p>
          <p class="paragraphe">
            Pour récupérer 3 PV max, le Personnage devra trouver un entraineur physique (le maître d'arme de la Cité d'Ispier ou Toregg, un bûcheron de la ville qui s'entraîne tous les
            matins) net il devra le payer minimum 10 pa par jour d'entraînement.
          </p>
          <h3>Apprentissages divers</h3>
          <p class="paragraphe">Si le PJ souhaite étudier un sujet particulier pendant l'intermède, chaque MJ pourra trouver un moyen de récompenser se temps passer à étudier.</p>
          <p class="paragraphe">
            Par exemple, en donnant un bonus aux tests liés à cette compétence sur le sujet précis ou en lui donnant des informations au moment venu (le nom d'un seigneur, la présence
            d'une organisation secrète dans une ville…).
          </p>
          <h3>Faire des recherche sur un sort</h3>
          <p class="paragraphe">
            Le système de magie des Terres d'Arran n'étant pas le plus détaillé, le PJ qui possède une voie mystique pourra utiliser l'intermède pour développer une version alternative
            d'un sort qu'il peut lancer. Cela prend du temps et certaines ressources (environ 75 pa par rang du sort modifié). Le joueur devra discuter avec le MJ de l'effet et des
            caractéristique du sort qu'il souhaite créer et c'est seulement avec l'accord du Maître des Jeu que le personnage trouvera cet alternative.
          </p>
          <p class="paragraphe"><strong>Prenons l'exemple du sort Brumes au rang 1 de la Voie de la Magie Élémentaliste (LJ.136)</strong> :</p>
          <p class="paragraphe">
            <em>Le PJ créé un brouillard très dense jusqu'à une portée de 20 m sur une zone de 20 m de diamètre. Dans cette zone la visibilité est très réduite et équivalente à de la
              pénombre. Il n'est pas possible de voir par-delà le brouillard qui persiste pendant [5 + Mod.SAG] tours. En partant de cette description, le joueur et le MJ pourrait se
              mettre d'accord pour modifier l'élément du sort et, du coup, ne plus créer un nuage de brouillard mais une zone glissante ou instable au sol. La portée, la taille de la zone
              et la durée n'est pas modifiée mais au lieu d'un effet perturbant la visibilité, le sort influera sur la stabilité des personnes présentes dans la zone.</em>
          </p>
          <p class="paragraphe"><strong>Deuxième exemple avec le sort Prison Végétale au rang 2 de la Voie de la Forêt (LJ.135)</strong> :</p>
          <p class="paragraphe">
            <em>Ce sort permet de faire pousser rapidement la végétation pour entraver le mouvement des ennemis. Après discussion, le joueur et le MJ se mettent d'accord sur une variante du
              sort Prison Végétale qui permet de faire pousser rapidement la végétation de la même manière que le sort de base mais pour créer des structures plus ou moins solides (une
              barricade qui solidifie une porte ou une ouverture, une tente pour les protéger, un petit pont pour traverser une crevasse, un entremêlement de branchage pour se dissimuler
              derrière…). Au vu de la versatilité de cette variante, le MJ décide que le sort aura une portée de contact au lieu des 20 m de base et que la durée pour créer la structure
              sera réduite à [2+Mod.SAG] tours.</em>
          </p>
          <p class="paragraphe">A chaque MJ de décider quelles libertés il donne à leur joueur pour créer des alternatives à leur sort.</p>
          <h3>Faire de l'artisanat ou d'autres activités</h3>
          <p class="paragraphe">Les personnages qui ont des compétences en artisanat peuvent utiliser cet intermède pour réaliser des objets personnalisés.</p>
          <p class="paragraphe">
            Les PJs peuvent même créer un commerce ou une activité lucrative autour de leur art dans la Cité d'Ispier ou autre part. Avec l'aide du seigneur Bonarion, de Lana'Sir ou des
            survivants des elfes sylvains, le personnage peut obtenir un local pour développer son affaire.
          </p>
          <p class="paragraphe">
            Que se soit une activité artisanale, un commerce, une organisation ou une profession, la discussion peut se mettre en place entre le personnage et le MJ pendant l'intermède.
          </p>
          <p class="paragraphe">Les personnages ayant une bel somme d'argent, il est possible d'investir pour avoir une affaire qui tourne bien et qui intéresse le joueur.</p>
          <hr />
          <h2>Événements personnels</h2>
          <p class="paragraphe">Les personnages pourront, durant cet intermède, voir leur histoire personnelle venir perturber leur période de pause.</p>
          <p class="paragraphe">
            Un vieil ennemi qui attaque, sa famille qui lui rend visite avec un problème spécifique, un messager avec une nouvelle information ou encore une tension ancienne qui resurgit,
            il y a beaucoup de choses qui peuvent perturber l'intermède du joueur.
          </p>
          <p class="paragraphe">
            Si vous avez lu la suite de la campagne, n'hésitez pas à intégrer un PNJ de l'historique du joueur dans une organisation qui interviendra plus tard (la Toile Vivante, le Clan
            de la Justice, la guilde de voleurs de la Vallée de Novrak, les nobles de Kosland…).
          </p>
          <p class="paragraphe">
            En plus des événements qui peuvent intervenir, les PJs peuvent vouloir faire des recherches ou des actions relative à leur historique. A chaque MJ de discuter avec les joueurs
            pour développer cet arc de l'intermède et peut-être même embarquer le groupe d'aventurier dans une mission secondaire liée à l'historique d'un des personnages.
          </p>
        </div>
