pour écarter les habitants. A deux reprises, les soldats répriment des passants voulant se rapprocher des elfes sylvains en les insultant et en les menaçant. Vous arrivez devant un château à l'architecture purement humaine sans fioriture ni élégance. Fonctionnel et brut de décoration, les murs sont solides et bien équipés pour la défense. Passez les lourdes portes du château, dans une cour où vous voyez plusieurs bâtiments utilitaires (écuries, salle des soldats, forgeron…), Le soldat de tête ouvre l'une des porte du donjon et Jaspar vous invite à vous laver, vous changer et à le rejoindre dans le salon pour manger dès que vous serez prêts.</p></blockquote><p><strong>Les PJs peuvent avoir accès à des soins, des bains, des artisans pour réparer leur équipements et la plupart des services qu'ils demandent.</strong> Malgré certains regards interrogatifs ou curieux, ils sont <strong>parfaitement en sécurité dans le donjon</strong>. On leur fournit des vêtements propres et élégants ou tout autre style en fonction des demandes. <strong>Un serviteur ou une servante est assigné à chaque PJs et à Manaa.</strong></p><p>Après quelques heures (en fonction de leur demande), <strong>un jeune homme gracieux vient les prévenir que le repas sera servit dans peu de temps</strong> dans le grand salon.</p><hr /><h2>Discussion avec Jaspar :</h2><blockquote><p>Après quelques banalités et paroles creuses, le seigneur Bonarion prend un air plus posé :</p></blockquote><p class=\"discussion\"><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">JASPAR :</span></strong></span><strong>\_</strong>Maintenant que chacun à pu récupérer de son voyage, pourriez-vous m'éclairer sur ce qu'il se passe depuis le conflit avec le village des elfes sylvains. J'ai bien l'impression de mettre fait trahir mais pour l'heure vous me voyez perdu.</p><p></p><p><strong>En fonction des informations que les PJs dévoilent à Jaspar Bonarion il pourra éclaircir des détails et se montrera de plus en plus confiant et amicale. Par contre si le groupe se méfie du Seigneur de la Cité, il pourra se mettre en colère de plus en plus car il ne comprendra pas la situation et pensera que les PJs essayent de le tromper.</strong></p><p><strong>Si le groupe manque de respect de façon répétée au seigneur, il décidera de les mettre aux arrêts en attendant le retour de Lana'Sir une quinzaine de jours plus tard.</strong></p><section class=\"secret\" id=\"secret-3vP0YPesfO8NQeu4\"><p class=\"sallemj\"><strong>Explications de l'état d'esprit du seigneur :</strong> Jaspar a été trahi par Hisp Galik son conseiller. Ce dernier a manipuler les évènements pour que la guerre éclate entre les elfes sylvains et les hommes de la Cité d'Ispier. Après quoi le nécromancien pourrait ouvrir le Temple du Val Rouge et récupérer la ou les reliques pour le compte du Clan de l'Épouse/Compagnie de la Justice. Si Jaspar Bonarion arrive a tirer des informations des PJs les bonnes conclusions, il sera tellement outré et abasourdi qu'il va placer l'entièreté de sa confiance dans le groupe et mettre toute son énergie à réparer son erreur face aux Elfes.</p></section><h3>Informations détenues par Jaspar Bonarion :</h3><ul><li><p>Hisp GALIK s'est mis <strong>à son service il y a presque 6 ans</strong>.</p></li><li><p>Hisp GALIK est <strong>responsable de la garde à l'extérieur de la cité</strong> et <strong>c'est lui qui lui faisait des rapports sur les attaques des sylvains sur les bucherons ou les caravanes de marchands</strong></p></li><li><p>Hisp GALIK <strong>a des compétence en nécromancie et possède les bases de la magie élémentaire</strong>.</p></li><li><p>JASPAR est outré de <strong>sa faiblesse et de la manipulation qui l'a fait attaquer le village</strong> des Sylvains</p></li><li><p>JASPAR <strong>est prêt à beaucoup de sacrifices pour rembourser sa dette</strong> envers les elfes de la Forêt du Val Rouge.</p></li><li><p>JASPAR <strong>n'a jamais entendu parlé de l'ordre de l'Union, d'Esdavia, des reliques</strong> ou de tout autres sujets liés.</p></li><li><p>JASPAR <strong>autorise la fouille des appartements de Hisp Galik, de consulter la bibliothèque du château</strong> ou tout autres choses que les PJs lui demande pour enquêter, sans aucune restriction.</p></li><li><p>JASPAR <strong>récompense le groupe avec un coffre rempli de 400 po</strong> (4000pa) et <strong>une jolie propriété pour chaque joueur dans la cité d'Ispier avec une famille de serviteur</strong> vivant sur place. Le complexe de plusieurs bâtiments mitoyens les uns des autres est situé au Nord Est de la cité d'Ispier</p></li><li><p>JASPAR fera <strong>une déclaration publique dans les prochains jours pour calmer la haine</strong> des habitants contre les elfes sylvains.</p></li><li><p><strong>LANA'SIR rentre à la cité d'Ispier après avoir convaincu le seigneur de la Cité d'Orkadia d'enquêter</strong> sur les malversations de Hisp GALIK et trouver des complices ou des informations complémentaires.</p></li><li><p><strong>LANA'SIR devrait être de retour dans 2 semaines avec des érudits</strong> ainsi que les autres survivants.</p></li></ul><hr /><h2>Fin du repas</h2><p><strong>Laissez les PJ poser des questions, rebondir sur les informations de Jaspar Bonarion</strong> ou interagir avec le seigneur à leur guise. Gardez en mémoire que <strong>Jaspar est perturbé par la trahison de Hisp Galik et qu'il pourra être à fleur de peau face aux questions insistantes ou aux accusations des PJ</strong>.</p><p>Avant de retourner dans ses appartements, le seigneur Bonarion, en se levant, vous résume la situation. Il semble bien fatigué mais vous assure que la fête dans 3 jours devrait adoucir la situation et que le retour de sa fille Lana'Sir dans 15 jours sera un réel signal de paix pour les habitants de la cité et les sylvains du Val Rouge.</p><p>Il conseille à Maana (et aux autres elfes sylvains du groupe) de rester au château tant que la situation est tendue. Il propose aux autres de rester également au château ou d'aller directement profiter de votre nouvelle demeure dans la ville.</p>"
