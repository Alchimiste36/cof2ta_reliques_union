      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Opportunités pour le MJ</h1>
          <p class="paragraphe">Le Maître du Jeu pourra utiliser également l'intermède pour plusieurs choses en relation avec les PJs et avec la campagne :</p>
          <h2>Créer de nouveaux contacts</h2>
          <p class="paragraphe">
            N'hésitez pas à développer les rencontres que pourraient faire les PJs dans la Cité d'Ispier ou les villes qu'ils visitent. Chaque PNJ pourra être un nouveau contact important
            pour développer chaque héros.
          </p>
          <p class="paragraphe">
            Un noble de Blanche Paix, un membre de la confrérie des Jongleur embauché pour louer les exploits des aventuriers, un commerçant passionné d'histoire ou de géopolitique, un
            entraineur qui deviendra confident, un ami à deux doigts de trahir… L'imagination est sans limite pour le MJ.
          </p>
          <p class="paragraphe">
            Le fait de passer du temps dans les tavernes, salles de jeux, maisons de joie ou bains publiques est un bon moyen aussi de faire des rencontres de personnalités importantes ou
            influentes dans la ville. Cela permet d'augmenter les capacités du PJ de réaliser des choses personnelles ou relatifs à la campagne.
          </p>
          <hr />
          <h2>Faire des mission secondaires</h2>
          <p class="paragraphe">
            Si vous souhaitez augmenter la tension de la campagne et renforcer l'influence des héros dans la région, le MJ pourra proposer aux PJs des missions secondaires passionnantes.
          </p>
          <p class="paragraphe">
            Une caravane de marchands qui disparaît mystérieusement, une famille d'Ispier dont les enfants ont été kidnappés, une bande de Peaux Vertes qui arrivent dans la région… Vous
            pouvez développer une mission secondaire basée sur les combats, sur l'enquête ou la diplomatie.
          </p>
          <p class="paragraphe">
            Ces missions peuvent aussi être un bon moyen pour un personnage à la traîne des autres de récupérer un objet magique ou une compétence qui réajustera sa place dans le groupe.
          </p>
          <p class="paragraphe">
            Pour finir, il est assez dur d'intégrer au moment du passage de niveau un compagnon animal, une monture ou tout autre élément qui viendrait d'une capacité choisie par le
            joueur. Les mission secondaire permettent de rendre moins bizarre l'arrivée d'une monture fantastique, d'un dragon d'Akrähyng ou d'un loup dans le groupe. Pour éviter le fameux
            «pouf c'est magique», prévoyez une petite quête spéciale pour renforcer le lien entre le PJ et sa bestiole.
          </p>
          <hr />
          <h2>Intégrer un nouveau PJ</h2>
          <p class="paragraphe">
            Les intermèdes sont aussi une manière simple et facile d'intégrer un nouveau joueur à la campagne ou d'intégrer le nouveau personnage d'un joueur qui serait mort ou qui
            n'aimerait pas son personnage du début de la campagne.
          </p>
          <p class="paragraphe">
            La relation qui lit un joueur et son personnage est très important. Si un joueur ne réussit pas à jouer ou développer son personnage, c'est peut-être le bon moment pour
            discuter avec lui de quelques modifications sur son personnage actuel ou de carrément changer de héros.
          </p>
          <p class="paragraphe">
            Vous pouvez aussi tomber (rarement mais ça arrive) sur un joueur qui a déjà créer son prochain personnage au cas où celui qu'il joue actuellement meure. Prenez quelques minutes
            de l'intermède pour faire interagir ce nouveau PNJ avec le groupe de PJs car, un jour peut-être, il fera parti des leurs.
          </p>
        </div>
