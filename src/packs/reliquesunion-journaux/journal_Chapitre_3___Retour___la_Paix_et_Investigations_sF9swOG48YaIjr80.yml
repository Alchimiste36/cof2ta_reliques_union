    text:
      format: 1
      content: "<p>Durant cette intermède, les PJs auront du temps\_libre et pourront s’occuper de leurs affaires. Ils\_sont connus et reconnus dans la Cité d’Ispier et les\_alentours. Leurs noms circulent dans des histoires\_et des chansons qui tournent dans les tavernes et le\_soir autour des foyers dans les maisons. Les enfants\_et certains habitants les arrêtent dans la rue pour\_les féliciter. Certains hommes ou certaines femmes\_dragueront les PJs car quel meilleur parti qu’un héros\_riche et célèbre pour sortir de la misère ou obtenir\_une vie plus simple.</p><p>Au delà de cela, les PJs pourront réaliser de\_nombreuses choses pendant leur temps de pause en\_attendant le résultat des différentes recherches.</p><hr /><h2>Aider à la reconstruction\_du village des sylvains</h2><p>Sous le regard attentif de Lana’Sir et de Maana,\_beaucoup de villageois participent à la reconstruction du village des elfes sylvains de la Forêt du Val\_Rouge. Les artisans sont les premiers sur le chantier.\_Menuisiers, charpentiers, forgerons, tisserands,\_tanneurs, couvreurs… Tous les corps de métier aident\_à bâtir leurs maisons et remonter leur bâtiments.</p><p>La présence d’un ou plusieurs PJs sur le chantier est\_une motivation immense pour les ouvriers. A côté de\_ces Héros, les travailleurs feront d’autant plus d’efforts\_et essayeront de se distinguer. Chaque artisan est\_dédommagé pour son travail par le seigneur d’ispier\_en personne mais le travail est dur et long face aux\_dégradations qu’a subi le village.</p><p>Le fait de venir au village des sylvains fréquemment permettra aussi de mieux connaitre Laotissa\_qui prend son nouveau rôle très à cœur et qui gagne\_le respect des elfes et des humains jours après jour.\_</p><p>Lana’Sir passe aussi beaucoup de temps dans le village\_pour organiser les travaux et motiver les ouvriers.\_</p><hr /><h2>Vendre les objets récupérés</h2><p>Lors du début de l’aventure, le groupe d’aventurier\_a pu récupérer pas mal d’objets. Cet intermède est le\_bon moment pour les revendre ou les donner.</p><p>Les objets trouvés dans, le village des elfes sylvains,\_dans le Temple du Val Rouge et sur les mercenaires\_qu’ils ont combattu dans la clairière peuvent être\_estimés et vendus dans la Cité d’Ispier ou dans une\_ville plus grande. Les armes et armures peuvent aussi\_être données au seigneur Bonarion pour la garde et\_les soldats de la ville. </p><p>La plupart des objets sont assez communs mais s’ils\_veulent vendre des objets spécifiques (lampes magique\_du Temple, objets du village des sylvains, machine du\_Val Rouge…), l’acheteur aura des questions pour les\_PJs et pourra propager des rumeurs sur eux rapidement. Ce n’est pas tous les jours qu’on trouve une\_lampe décorée de motifs elfiques qui s’allume toute\_seule et qui ne fait aucune fumée et aucune chaleur.</p><h3>La Machine du Val Rouge</h3><p>La vente de la Machine du Val Rouge (voir C.A.S.\_p.??) est très compliquée. Un artefact aussi puissant et\_unique ne pourra pas être acheté par des marchands, ou\_nobles de la Cité d’Ispier. Certains acheteurs peuvent\_être trouvés à Blanche Paix ou dans la Forteresse-État\_d’Arkar’um mais ils seront méfiants de la provenance\_de cette machine et de son côté sacré pour les elfes. </p><p>Ils pourront, avec beaucoup de marchandage et de\_diplomatie, trouver un acheteur pour 300 Talions d’or.\_Un noble nain de la Cité d’Arkar’um qui possède un\_commerce de produit en tout genre. </p><p>Si les PJs veulent vendre la Machine du Val Rouge\_au elfes sylvains survivants, ces derniers seront outrés\_de leur demande. Pour eux un objet aussi puissant ne\_devrait pas être monnayé par les PJs. S’ils trouve une\_autre communauté d’elfes pour vendre le coffre, ils se\_feront certainement réprimandés par les elfes.</p><h3>Répercussions pour les PJs</h3><p>Pour chaque objet vendu du Temple ou du village\_des sylvains, le MJ devra prévoir des répercussions\_négatives pour les PJs. De plus, si les PJs récupèrent\_une petite fortune, des voleurs et des escrocs de bas\_étages pourront tomber sur les PJs pour leur faire\_les poches (utiliser le chapître 4 du Livre du Meneur\_(LM.117) pour créer rapidement des combats contre des\_Combattants ou des aventuriers NC 1 ou 2).</p><hr /><h2>Entraînement et Apprentissage</h2><p>L’intermède permet aussi aux PJs de poursuivre leur\_entraînement ou apprendre sur des sujets diverses.</p><h3>Récupération de Points de Vie</h3><p>Les PJs n’ont peut-être pas lancé le score maximum\_de Points de Vie à chaque passage de Niveau et ils\_pourront durant l’intermède «récupérer» les PV qu’ils\_n’ont pas reçu au moment du passage.</p><p>Pour récupérer 3 PV max, le Personnage devra\_trouver un entraineur physique (le maître d’arme de\_la Cité d’Ispier ou Toregg, un bûcheron de la ville\_qui s’entraîne tous les matins) net il devra le payer\_minimum 10 pa par jour d’entraînement.</p><h3>Apprentissages divers</h3><p>Si le PJ souhaite étudier un sujet particulier pendant\_l’intermède, chaque MJ pourra trouver un moyen de\_récompenser se temps passer à étudier.</p><p>Par exemple, en donnant un bonus aux tests liés à\_cette compétence sur le sujet précis ou en lui donnant\_des informations au moment venu (le nom d’un\_seigneur, la présence d’une organisation secrète dans\_une ville…).</p><h3>Faire des recherche sur un sort</h3><p>Le système de magie des Terres d’Arran n’étant pas\_le plus détaillé, le PJ qui possède une voie mystique\_pourra utiliser l’intermède pour développer une\_version alternative d’un sort qu’il peut lancer. Cela\_prend du temps et certaines ressources (environ 75\_pa par rang du sort modifié). Le joueur devra discuter\_avec le MJ de l’effet et des caractéristique du sort\_qu’il souhaite créer et c’est seulement avec l’accord\_du Maître des Jeu que le personnage trouvera cet\_alternative.</p><p><strong>Prenons l’exemple du sort Brumes au rang 1 de la\_Voie de la Magie Élémentaliste (LJ.136)</strong> :\_</p><p><em>Le PJ créé un brouillard très dense jusqu’à une portée\_de 20 m sur une zone de 20 m de diamètre. Dans cette\_zone la visibilité est très réduite et équivalente à de la\_pénombre. Il n’est pas possible de voir par-delà le brouillard qui persiste pendant [5 + Mod.SAG] tours.\_En partant de cette description, le joueur et le MJ\_pourrait se mettre d’accord pour modifier l’élément\_du\_ sort et, du coup, ne plus créer un nuage de brouillard mais une zone glissante ou instable au sol. La\_portée, la taille de la zone et la durée n’est pas modifiée\_mais au lieu d’un effet perturbant la visibilité, le sort\_influera sur la stabilité des personnes présentes dans\_la zone.</em></p><p><strong>Deuxième exemple avec le sort Prison Végétale\_au rang 2 de la Voie de la Forêt (LJ.135)</strong> :</p><p><em>Ce sort permet de faire pousser rapidement la\_végétation pour entraver le mouvement des ennemis.\_Après discussion, le joueur et le MJ se mettent\_d’accord sur une variante du sort Prison Végétale qui\_permet de faire pousser rapidement la végétation de\_la même manière que le sort de base mais pour créer\_des structures plus ou moins solides (une barricade\_qui solidifie une porte ou une ouverture, une tente\_pour les protéger, un petit pont pour traverser une\_crevasse, un entremêlement de branchage pour se\_dissimuler derrière…). Au vu de la versatilité de cette\_variante, le MJ décide que le sort aura une portée de\_contact au lieu des 20 m de base et que la durée pour\_créer la structure sera réduite à [2+Mod.SAG] tours.</em></p><p>A chaque MJ de décider quelles libertés il donne\_à leur joueur pour créer des alternatives à leur sort.</p><h3>Faire de l’artisanat ou\_d’autres activités</h3><p>Les personnages qui ont des compétences en\_artisanat peuvent utiliser cet intermède pour réaliser\_des objets personnalisés. </p><p>Les PJs peuvent même créer un commerce ou\_une activité lucrative autour de leur art dans la\_Cité d’Ispier ou autre part. Avec l’aide du seigneur\_Bonarion, de Lana’Sir ou des survivants des elfes\_sylvains, le personnage peut obtenir un local pour\_développer son affaire.</p><p>Que se soit une activité artisanale, un commerce,\_une organisation ou une profession, la discussion\_peut se mettre en place entre le personnage et le MJ\_pendant l’intermède.</p><p>Les personnages ayant une bel somme d’argent,\_il est possible d’investir pour avoir une affaire qui\_tourne bien et qui intéresse le joueur.\_</p><hr /><h2>Événements personnels</h2><p>Les personnages pourront, durant cet intermède,\_voir leur histoire personnelle venir perturber leur\_période de pause.</p><p>Un vieil ennemi qui attaque, sa famille qui lui rend\_visite avec un problème spécifique, un messager avec\_une nouvelle information ou encore une tension\_ancienne qui resurgit, il y a beaucoup de choses qui\_peuvent perturber l’intermède du joueur.</p><p>Si vous avez lu la suite de la campagne, n’hésitez\_pas à intégrer un PNJ de l’historique du joueur dans\_une organisation qui interviendra plus tard (la Toile\_Vivante, le Clan de la Justice, la guilde de voleurs de la\_Vallée de Novrak, les nobles de Kosland…).</p><p>En plus des événements qui peuvent intervenir,\_les PJs peuvent vouloir faire des recherches ou des\_actions relative à leur historique. A chaque MJ de\_discuter avec les joueurs pour développer cet arc de\_l’intermède et peut-être même embarquer le groupe\_d’aventurier dans une mission secondaire liée à\_l’historique d’un des personnages.</p>"
