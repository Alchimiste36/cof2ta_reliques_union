      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Retour de Lana'Sir</h1>
          <p class="paragraphe">
            Après la fête dans la cité d'Ispier, la vie reprend son court et le groupe de PJs peut s'occuper de leurs affaires ou commencer les recherches pour anticiper leur prochaine
            destination.
          </p>
          <p class="paragraphe">
            La plupart des tensions dans la ville se sont affaiblies et la garde commence a réprimer les actes de discrimination contre les elfes sylvains (écritures sur les murs,
            insultes, agression…). Quelques jours après le discours de Jaspar Bonarion, la ville se prépare au retour de Lana'Sir, la Dame d'Honneur de la Cité d'Ispier.
          </p>
          <hr />
          <h2>Le veille du retour</h2>
          <div class="description">
            <p class="paragraphe">
              Une quinzaine de jours après le discours de Jaspar Bonarion à la population, la vie du château et de toute la cité d'Ispier est en effervescence. La Dame d'Honneur retourne à
              la maison et tout le monde veut la recevoir comme il se doit.
            </p>
            <p class="paragraphe">
              Vous pouvez voir les magasins et échoppes se faire récurer de fond en combles, les devantures des maisons sont arrangées, la plupart des habitants fortunés se retrouvent aux
              bains publics et les plus pauvres se font tous une belle toilettes de chat et préparent leur tenue pour ce retour. La population est joyeuse et tout le monde ne parle que du
              retour de Lana'Sir à la Cité d'Ispier.
            </p>
            <p class="paragraphe">Voulez-vous faire quelque chose avant le lendemain en milieu d'après-midi, le moment estimé pour le retour de Lana'Sir ?</p>
          </div>
          <p class="paragraphe">
            Les PJs peuvent faire certains préparatifs avant le retour. Encourager les joueurs à s'impliquer dans les préparatifs de la ville ou leur propre préparation.
          </p>
          <p class="paragraphe">
            Le seigneur Bonarion aimerait que les PJs soient présents pour le discours de sa fille. Ils peuvent se positionner à droite ou à gauche de la porte du château ou attendre avec
            lui derrière les portes du château et sortir avec lui au dernier moment. Quelle que soit leur position, ils ne rateront rien de ce moment grâce aux grilles permettant de voir
            la place.
          </p>
          <p class="paragraphe">
            Cet événement est important pour le seigneur et il ne comprendra pas les personnages qui ne souhaitent pas être présents pour le retour de sa fille. Ce sont les Héros de la
            Dame d'Honneur tout de même !
          </p>
          <hr />
          <h2>Le discours de Lana'Sir</h2>
          <p class="paragraphe">
            Les gardes de la cité sont formelles, Lana'Sir arrive dans quelques heures et la plupart des gardes se positionnent de la porte jusqu'aux premières marches du château, de part
            et d'autre de la rue. L'ambiance est intense sur l'ensemble de la Cité.
          </p>
          <div class="description">
            <p class="paragraphe">
              L'heure est venue. La Cité est entièrement calme à part les rires de quelques enfants qui jouent sur la place principale proche du château. Les portes de ce dernier sont
              fermées et beaucoup de gens sont à leur fenêtre et observent les rangées de gardes statiques dans les rues. Ils sont tous propres comme des Talions neufs. Au moment où les
              cornes des portes sonnent, vous entendez des petits cris de joie des habitants qui attendaient cet instants depuis des jours.
            </p>
            <p class="paragraphe">
              Les portes s'ouvrent et les trompettes sonnent le retour de la Dame d'Honneur si aimée de la population. Les Ispierois et Ispieroises sortent de chez eux pour s'aligner le
              long des rues, certains avec leurs enfants sur les épaules, d'autres avec des fleurs à jeter. Le sourire et le soulagement est sur tous les visages. Certains pleurent de joie
              lorsque le cheval de Lana'Sir, en tête d'une petite escorte de soldats arrive dans la ville. Vous remarquez la présence de Laotissa Graine Dépeautre juste derrière la fille
              du seigneur. Aucun autre Elfe n'est présent dans le groupe.
            </p>
            <p class="paragraphe">
              Lana'Sir prend son temps, un immense sourire aux lèvres, et salut chaleureusement plusieurs personnes sur la route. Elle prend des bouquets et des cadeaux qu'elle confie à un
              des soldats qui s'est approché de son cheval. Quelques instants avant qu'elle n'atteigne la place du Château, Jaspar ouvre les portes et s'installe sur le perron encadré par
              quatre gardes de la cité.
            </p>
            <p class="paragraphe"><strong>Voulez-vous faire quelque chose avant qu'elle ne rencontre son père ?</strong></p>
            <p class="paragraphe">
              En arrivant sur la Place, Lana'Sir descend seule de son cheval et s'approche de son père pour l'enlacer tendrement. Le seigneur Jaspar s'apprête à prendre la parole devant la
              foule regroupée sur la place mais Lana'Sir en plaçant sa main sur son épaule lui fait comprendre qu'elle souhaite parler. Il s'écarte et lui laisse la place centrale alors
              que Laotissa se rapproche de la Dame d'Honneur.
            </p>
          </div>
          <div class="discussion">
            <p class="paragraphe">
              <span style="text-decoration:underline"><strong>Lana'Sir :</strong></span>
            </p>
            <p class="paragraphe">
              Mes chers amis de la Cité d'Ispier. Je suis de retour à la maison pour mon plus grand bonheur. Je sais que vous avez été inquiets, que ma disparition a perturbé certains
              d'entre vous et que les conflits avec nos voisins et amis de la foret du Val Rouge a été un traumatisme pour notre région.
            </p>
            <p class="paragraphe">
              Je suis là pour vous et je ne suis pas prête de repartir, vous pouvez compter sur moi. Je ne vais pas y aller par quatre chemins mais Hisp Galik cet ignoble manipulateur a
              brouillé tous les esprits de cette ville dont celle de mon père ici présent.
            </p>
            <p class="paragraphe">
              Je sais au fond de mon cœur que sa honte est immense mais c'est bien lui qui a engager le groupe d'aventuriers qui m'ont retrouvé et sauver la vie.
              <em>(La foule applaudit avec des hourras et des cris de joie)</em>.
            </p>
            <p class="paragraphe">
              Je n'ai jamais cru aux mensonges de Hisp Galik et c'est de mon propre chef que j'ai suivi les survivants du village des Elfes Sylvains pour leur venir en aide et trouver la
              vérité autour de cette guerre. Les Elfes, protecteurs d'une puissante relique oubliée, sont les premières victimes de cette guerre. Nous avons empêché notre ennemi, Hisp
              Galik, de mettre la main sur le Bracelet mais, à partir de maintenant, il faudra retrouver ce pleutre manipulateur. Laotissa Graine Dépeautre, à mes côtés, est comme une sœur
              pour moi et elle prend son rôle de Gardienne de l'Union très à cœur.
            </p>
            <p class="paragraphe">Va-t-on laisser une vieille histoire oubliée briser nos relations avec nos voisins les Elfes Sylvains de la Forêt du Val Rouge ? NON</p>
            <p class="paragraphe">
              Demain, et pour les trois prochains jours, toute ma vie ne sera que pour vous, habitants de la Cité d'Ispier mais je dois vous prévenir, ensuite mon attention et mes forces
              seront au service des Elfes Sylvains de la forêt du Val Rouge pour les aider à reconstruire et à se réinstaller dans leur village détruit. J'espère sincère- ment que toute
              personne capable de se joindre à mon effort sera à mes côtés. Bâtisseurs, artisans, transporteurs, cuisiniers, herboristes… chacun de vous a un rôle à jouer pour racheter les
              erreurs de mon père et les malversations de son ancien conseiller.
            </p>
            <p class="paragraphe">
              Je tiens à vous informer et vous prévenir, avec force, qu'aucun survivant de ce village, malgré leurs peines, leurs souffrances et leurs colères légitimes ne souhaite de
              représailles judiciaires contre les hommes de notre Cité qui ont participé aux massacres.
            </p>
            <p class="paragraphe">
              Je finirais par vous dire que pendant les Trois Jours pour la Paix, chacun de vous pourra venir me rencontrer, discuter à mes côtés et maudire de tous les maux les Elfes
              Sylvains devant moi sans restriction. La colère et les pleurs seront autorisés lors de ces audiences avec moi. A la suite des Trois jours pour la Paix, toutes les attaques
              physiques ou morales, les insultes, les agressions ou les discussions de comptoirs enragées prenant pour cible nos voisins de la forêt du Val Rouge seront sévèrement punis !
              Je peux vous aider à faire votre deuil mais ma tolérance aura des limites. <em>(Lorsqu'elle prononce ces mots le silence est TOTAL sur la place)</em>.
            </p>
            <p class="paragraphe">
              A partir de demain, de l'aube au coucher du soleil, je me tiens à votre disposition dans la salle d'audience du château. Les cuisines serviront à qui le demande un plat chaud
              et nourrissant et à partir de maintenant les bains publics sont accessibles à qui le souhaite.
            </p>
            <p class="paragraphe">Les Trois Jours pour la Paix commencent ! <em>(Cris de joie et applaudissements de la foule)</em>.</p>
            <p class="paragraphe">
              Maintenant retournez auprès de votre famille, de vos voisins, de vos amis pendant que je retrouve mon père adoré et que je remercie comme il se doit les Sauveurs de la Dame
              d'Honneur.
            </p>
            <p class="paragraphe">Merci à toutes et tous.</p>
          </div>
          <hr />
          <div class="description">
            <p class="paragraphe">Lana'Sir enlace à nouveau son père sous les acclamation des habitants qui commencent à quitter la place principale.</p>
            <p class="paragraphe">Elle vous fait signe de la rejoindre et Laotissa semble très heureuse de vous voir.</p>
            <p class="paragraphe">
              Vous remarquez que la Dame d'Honneur a bien changé en quelques semaines. Elle a mûri et son regard semble encore plus déterminé qu'à votre première rencontre. Vous aviez
              rencontré une jeune femme naïve et idéaliste, vous découvrez une femme droite et qui impose le respect.
            </p>
            <p class="paragraphe">
              A côté d'elle, Laotissa a changé également. La fille innocente au regard d'enfant s'est transformée en jeune fille sereine et souriante. Vous avez l'impression que plusieurs
              années se sont écoulées lorsque vous posez les yeux sur Laotissa Graine Dépeautre.
            </p>
          </div>
          <h3>Dire au Porteur du Bracelet :</h3>
          <div class="description">
            <p class="paragraphe">
              Laotissa te regarde avec un sourire immense. Elle s'approche rapidement de toi et se colle à tes côtés en plaçant son bras sous le tien comme pourrait le faire une fille pour
              l'un de ces parents. Tout en suivant le groupe qui rentre dans le château en direction de la salle de banquet, elle n'arrête pas de lever les yeux vers toi avec un regard
              malicieux et complice et de temps en temps elle tapote ta main comme pour dire «c'est bien, c'est bien».
            </p>
          </div>
          <h3>A tous les PJs :</h3>
          <div class="description">
            <p class="paragraphe">
              Vous êtes amené dans la salle de banquet où une grande table est préparée. Lana'Sir se positionne debout derrière une chaise entouré de son père et de Laotissa. Les
              serviteurs vous montrent vos places autour de la table. Les gardes sortent et des plats sont apportés. Le repas peut commencer.
            </p>
            <p class="paragraphe">
              Les PJs sont amenés à la suite de Jaspar et Lana'Sir vers la salle à manger qu'ils commencent à bien connaitre. La plupart des serviteurs sont en train de préparer un repas
              copieux et diversifié mais dès que les plats sont sur la table, tous les gardes et serviteurs quittent la pièce.
            </p>
          </div>
          <p class="paragraphe">Le Porteur du Bracelet est positionné à côté de Laotissa.</p>
          <hr />
          <h2>Repas et discussion</h2>
          <h3>Lana'Sir</h3>
          <p class="paragraphe">Malgré la fatigue, Lana'Sir est très heureuse de revenir à la cité d'Ispier et elle est assez excitée par les Trois Jours pour la Paix.</p>
          <p class="paragraphe">
            Elle passera le repas à discuter gentiment mais elle prendra toutes les occasions pour faire des piques et des remarques à son père et on peut se douter qu'elle lui en veut de
            ne pas l'avoir soutenu.
          </p>
          <p class="paragraphe">
            Dès qu'elle parle de Hisp Galik la colère prend le dessus et on comprend qu'elle veut plus que tout retrouver, juger et condamner à mort l'ancien conseiller de son père.
          </p>
          <p class="paragraphe">
            Elle ne sera pas avare de compliments pour le groupe d'aventuriers mais, attention, elle n'aime pas le sarcasme et l'irrespect d'autant plus quand elle est fatiguée. Elle ira
            droit au but avec les PJs et ne mâchera pas ses mots.
          </p>
          <p class="paragraphe"><strong>Elle informe les PJs :</strong></p>
          <ul>
            <li>
              <p class="paragraphe">Falika Rosna a fait des recherches sur les Reliques de L'union (même infos que les PJs ont déjà mais elle peut synthétiser)</p>
            </li>
            <li>
              <p class="paragraphe">
                Elle aidera les PJs dans toutes leurs recherches grâce à son réseau et ses contacts dans quelques villes. Elle connait bon nombre de personnes surtout à Orkadia, à Blanche
                Paix et à Lavoise.
              </p>
            </li>
            <li>
              <p class="paragraphe">Les juristes de la Cité d'Orkadia ont envoyé des messages aux quatre coins des Terres d'Arran pour retrouver Hisp Galik</p>
            </li>
            <li>
              <p class="paragraphe">Les autres survivants de Village elfique sont déjà retourner dans leur village sur la route du retour.</p>
            </li>
            <li>
              <p class="paragraphe">
                Maana devrait rejoindre les survivants Après les premières informations transmises par Lana'Sir, son père, un peu perdu dans cette conversation, ira se coucher et
                remerciera les PJs après avoir embrassé sa fille avec tendresse.
              </p>
            </li>
          </ul>
          <p class="paragraphe">
            Après le départ de son père, Laotissa sera plus décontractée et commencera progressivement à se détendre et à reprendre son air de jeune femme détendue et simple. Elle en
            profitera pour être plus vindicative envers la faiblesse de son père et elle aura des mots très dur envers toutes les personnes qui sont impliquées dans cette trahison (Hisp
            Galik, Rodric, son père, les chefs du village sylvains…).
          </p>
          <h3>Laotissa</h3>
          <p class="paragraphe">
            La jeune Laotissa parle aux PJs avec une joie non feinte. Elle est très excitée d'entendre le récit détaillé de leurs aventures et elle coupe les aventuriers plusieurs fois
            avec des questions ou des compliments.
          </p>
          <p class="paragraphe">
            Elle regarde surtout le Porteur du Bracelet et elle prononcera des phrases signifiant qu'elle a bien choisi et que le Porteur est le bon de son point de vue. Elle est ravi que
            le Bracelet de l'Union soit entre de bonnes mains et que les PJs aient révélés les secrets du Temple du Val Rouge.
          </p>
          <p class="paragraphe">
            Maintenant que la relique est entre de bonnes mains, elle souhaite que les PJs retrouvent et protègent les autres pour le bien de toutes les Terres d'Arran. Elle a confiance en
            eux et elle sent qu'ils seront des héros bons et justes.
          </p>
          <p class="paragraphe">
            Laotissa leur fera comprendre que s'ils ne veulent pas trouver les autres Reliques, maintenant que le secret est connu, toutes les pires personnes et organisations seront sur
            leurs traces pour s'emparer du pouvoir de ces artefacts puissants.
          </p>
          <p class="paragraphe">
            Elle proposera aux PJs de les accompagner s'ils le souhaitent même si maintenant qu'elle est la nouvelle Gardienne de l'Union du Temple du Val Rouge, elle a une certaine
            responsabilité envers les elfes sylvains.
          </p>
          <h3>Tout le long du repas</h3>
          <p class="paragraphe">
            Le repas est agréable dans l'ensemble si les PJs se comportent bien. Si les PJs se montrent irrespectueux ou grossier, Lana'Sir se montrera tout d'accord perplexe voir choquée.
            Si les marques d'irrespect se multiplie, elle pourra se mettre en colère ou, même, menacer de congédier le personnage s'il ne retrouve pas de bonnes manières.
          </p>
          <p class="paragraphe">
            La situation pour la Dame d'Honneur est grave. Elle a encore beaucoup de travail et de sacrifices à faire pour résoudre entièrement les problèmes de la Cité d'Ispier et du
            village des Sylvains.
          </p>
          <p class="paragraphe">
            Elle expliquera avant de prendre congé qu'elle en sera pas très disponible lors des Trois Jours pour la Paix mais que pour les PJs elle peut faire une exception. Ensuite, elle
            ira rejoindre les survivants sylvains pour organiser les réparation. Si certains PJs veulent l'aider à encourager des habitants de la cité de s'investir dans la reconstruction
            du village des elfes, elle en serait ravie. Laotissa va rester au château pendant les prochains jours et suivra Lana'Sir ensuite vers la forêt du Val Rouge.
          </p>
        </div>
