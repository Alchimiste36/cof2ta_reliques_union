  - sort: 400000
    name: Retour Mouvementé à la Cité d'Ispier
    type: text
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<blockquote><p>Le voyage de retour à la cité se passe sans problème à travers la forêt piétinée et ravagée par les troupes d'humains. Des chemins sont praticables et au bout de 6h de marche, vous atteignez l'orée de la Forêt du Val Rouge. Loin au nord, vous apercevez la fumée venant de la Cité d'Ispier. De nombreuses souches sont visibles autour de vous, là où les bucherons ont récolté les arbres de la forêt.</p><p></p><p>Il vous faut encore une demi-journée de marche pour atteindre les murailles de la cité.</p><p>Lorsque vous arrivez à quelques mètres des portes extérieures de la Cité, un groupe de marchands pointent Maana du doigt et se rapproche de votre groupe à grands pas sortant de leur chariot des pelles, bâtons ou encore couteaux. Grâce à leur cris et leurs invectives, les gardes positionnés devant les grandes portes sortent leurs lances et se rapprochent presque au pas de course pour se positionner entre vous et les marchands.</p><p></p><p><strong>\"A l'assassin !\" - \"sale elfe puant !\" - \"traitre\" - \"enculés\" - \"en voilà un à mettre au bout d'une corde !\" - \"la garde va vous tabasser la tronche, amis des elfes !\"</strong></p><p>La tension est très forte et les 8 soldats ont bien du mal à calmer le petit groupe qui grossit au fur et à mesure que les passants se rajoutent à cette colère.</p></blockquote><p>Il y a une très forte tension et chaque décision des PJ aura un impact sur la réaction des villageois et des gardes. Comme personne ne connait le statut et le rôle des PJ, gardez à l'esprit que même les gardes sont méfiants et pourront se positionner du côté des villageois si les PJ font les idiots.\_</p><p>Le groupe pourra recevoir des projectiles sur eux (légumes, cailloux, mottes de terre… et même des objets plus offensifs).</p><h2>Si les PJs sont diplomates :</h2><blockquote><p>Les gardes vous encerclent et vous font passer les portes de la ville. L'un des gardes part en courant comme si la mort était à ses trousses dans les rues de la ville. Ils mettent des coups sur les villageois les plus vindicatifs et violents, ils cassent quelques nez et dents au passage et mètre après mètres vous arrivez devant les portes du château de la Cité d'Ispier.</p><p>Dès que vous passez les portes du Château vous voyez le Seigneur Bonarion avec un regard sévère et le soldat qui a couru derrière lui qui reprend son souffle. Les gardes ferment la porte, se retournent vers vous et baissent leurs lances dans votre direction.</p></blockquote><p class=\"discussion\"><strong><span style=\"text-decoration:underline\">JASPAR :</span></strong> Que se passe-t-il ici ? Où est ma fille ? et pourquoi avez-vous pactisé avec cette raclure d'elfe Sylvain après tout ce qu'ils ont fait à mon peuple ? Soyez bref et clair si vous ne voulez pas finir au fer !</p><hr /><h3>S'ils expliquent clairement la situation :</h3><p>Ils seront escortés dans la salle du trône où ils pourront compléter l'histoire et retrouver la confiance du Seigneur. Dans ce cas-là retournez sur le chapitre :\_@UUID[JournalEntry.TMzJ1MDuRZCkI0V5.JournalEntryPage.y5X3Kp9wthuwcCoq]{Retour à la Cité d'Ispier}</p><hr /><h3>S'ils racontent des conneries, ne sont pas clairs ou sont impertinents :</h3><p><strong>Jaspar ordonne qu'on les mettent aux arrêts jusqu'au retour de Lana'Sir à la Cité.</strong></p><p><strong>En voyant la Ceinture de Communication de Lana'Sir sur les PJs, Jaspar pensera qu'elle est morte et que les PJs y sont pour quelque chose.</strong> Ils seront tous <strong>emprisonnés en sous-vêtements dans la prison du Château</strong>. </p><p><strong>Ils n'auront plus de nouvelles de Maana. Ce dernier sera torturé et succombera à ses blessures</strong> avant le retour de la Dame d'Honneur.</p><p><strong>20 jours plus tard, alors qu'ils pourrissent en prison, ils reçoivent la visite de Lana'Sir qui vient les libérer et les convier à une audience</strong> avec elle et son père. Elle semble particulièrement énervée et une pointe de tristesse est encore visible sur ces traits.</p><p><strong>Lana'Sir a raconté ce qu'il s'est passé à son père. Elle a laissé les survivant dans la Cité de Lavoise à l'école Rosna pour leur protection</strong>. Elle a fouillé les affaires des PJs et ne comprend pas pourquoi ils ne l'ont pas prévenu de leur trouvailles.</p><p></p><p>Si les PJ arrivent à regagner la confiance de Jaspar et de Lana'Sir vous pouvez reprendre la discussion à l'audience avec les informations contenue dans le chapitre\_@UUID[JournalEntry.TMzJ1MDuRZCkI0V5.JournalEntryPage.y5X3Kp9wthuwcCoq]{Retour à la Cité d'Ispier}.</p><p>Si les PJ sont toujours impertinents ou agressifs, ça peut signifier la fin de la campagne ou<strong> il faudra trouver un moyen de les réintégrer dans le fil de la Campagne malgré leur échec apparent.</strong></p>"
