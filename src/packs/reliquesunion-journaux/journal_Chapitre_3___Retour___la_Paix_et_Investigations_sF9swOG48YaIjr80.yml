  - sort: 100000
    name: Et maintenant ?
    type: text
    _id: pPAlLLMIEclfA4YV
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Les PJ en ont peut-être déjà parlé avant de sortir du Temple du Val Rouge mais après cette attaque leurs plans vont peut-être changés. Laissez-les élaborer un plan de ce qu'ils veulent faire.</p><p>Le groupe a réuni beaucoup d'informations dans le Temple du Val Rouge. Ils sont peut-être blessés, ils doivent discuter de leur prochain objectif.</p><p>Ils devrait penser à utiliser la\_@UUID[Compendium.world.reliquesunion-objets.Item.dIB0aOb4TPU5kYWo]{Ceinture de communication} pour envoyer un message à Lana'Sir et s'ils n'y pensent pas, Maana voudra envoyer un message pour informer Lana'Sir de la progression et de la réussite du groupe.</p><p></p><h2>Quelles informations veulent-ils écrire sur le message ?</h2><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S'ils écrivent un message contenant :</span></strong></span></h3><ul><li><p>Découverte du Bracelet de l'Union</p></li><li><p>Informations sur Eskavia, les reliques</p></li><li><p>Les échanges avec Arkanov par la Gardienne</p></li><li><p>La rune de possession et/ou la lettre sur le mercenaire</p></li></ul><p>Dans ce cas-là suivez le prochain chapitre : @UUID[JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.DYEz8oNQ4OcLZ4Te]{Retour Victorieux à la Cité d'Ispier}</p><div><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S'ils écrivent un message qui ne mentionne pas :</span></strong></span></h3><p>Le PJ peuvent vouloir dissimuler des informations à Lana'Sir après la découverte de la mission initiale de l'Ordre de l'Union de vouloir faire oublier les Reliques. De plus, Hisp Galik est à la Cité d'Ispier d'après eux donc ils ne veulent peut-être pas prendre de risques en dévoilant des informations sur leur possession du Bracelet de l'Union.</p><ul><li><p>Informations sur Eskavia, les reliques</p></li><li><p>Les échanges avec Arkanov par la Gardienne</p></li><li><p>La rune de possession et/ou la lettre sur le mercenaire</p></li></ul><p>Dans ce cas-là allez au chapitre : @UUID[JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.y5X3Kp9wthuwcCoq]{Retour à la Cité d'Ispier}</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S'ils n'écrivent aucun message à Lana'Sir :</span></strong></span></h3><p>Dans ce cas-là allez au Chapitre : @UUID[JournalEntry.sF9swOG48YaIjr80.JournalEntryPage.kwMtQDN5t95pbjP6]{Retour Mouvementé à la Cité d'Ispier}</p><p>\_</p><hr /><p><span style=\"font-family:'Bruno Ace'\"><strong>PASSAGE DE NIVEAU</strong></span></p><hr /></div>"
