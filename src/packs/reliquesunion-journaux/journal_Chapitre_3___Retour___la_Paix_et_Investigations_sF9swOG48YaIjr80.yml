  - sort: 700000
    name: Le Retour de Lana'Sir
    type: text
    _id: 3Wro4FzwYLnaJN8X
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Après la fête dans la cité d’Ispier, la vie reprend\_son court et le groupe de PJs peut s’occuper de leurs\_affaires ou commencer les recherches pour anticiper\_leur prochaine destination.</p><p>La plupart des tensions dans la ville se sont\_affaiblies et la garde commence a réprimer les actes de\_discrimination contre les elfes sylvains (écritures sur\_les murs, insultes, agression…). Quelques jours après\_le discours de Jaspar Bonarion, la ville se prépare au\_retour de Lana’Sir, la Dame d’Honneur de la Cité\_d’Ispier.</p><hr /><h2>Le veille du retour</h2><blockquote><p>Une quinzaine de jours après le discours de\_Jaspar Bonarion à la population, la vie du\_château et de toute la cité d’Ispier est en effervescence. La Dame d’Honneur retourne à la maison et\_tout le monde veut la recevoir comme il se doit.</p><p>Vous pouvez voir les magasins et échoppes se\_faire récurer de fond en combles, les devantures des\_maisons sont arrangées, la plupart des habitants\_fortunés se retrouvent aux bains publics et les plus\_pauvres se font tous une belle toilettes de chat et\_préparent leur tenue pour ce retour. La population\_est joyeuse et tout le monde ne parle que du retour\_de Lana’Sir à la Cité d’Ispier.</p><p>Voulez-vous faire quelque chose avant le\_lendemain en milieu d’après-midi, le moment estimé\_pour le retour de Lana’Sir ?</p></blockquote><p>Les PJs peuvent faire certains préparatifs avant le\_retour. Encourager les joueurs à s’impliquer dans les\_préparatifs de la ville ou leur propre préparation.</p><p>Le seigneur Bonarion aimerait que les PJs soient\_présents pour le discours de sa fille. Ils peuvent se\_positionner à droite ou à gauche de la porte du château\_ou attendre avec lui derrière les portes du château et\_sortir avec lui au dernier moment. Quelle que soit\_leur position, ils ne rateront rien de ce moment grâce\_aux grilles permettant de voir la place.</p><p>Cet événement est important pour le seigneur et il\_ne comprendra pas les personnages qui ne souhaitent\_pas être présents pour le retour de sa fille. Ce sont les\_Héros de la Dame d’Honneur tout de même !</p><hr /><h2>Le discours de Lana'Sir</h2><p>Les gardes de la cité sont formelles, Lana’Sir arrive\_dans quelques heures et la plupart des gardes se\_positionnent de la porte jusqu’aux premières marches\_du château, de part et d’autre de la rue. L’ambiance est\_intense sur l’ensemble de la Cité.</p><blockquote><p>L’heure est venue. La Cité est entièrement calme\_à part les rires de quelques enfants qui jouent sur la\_place principale proche du château. Les portes de ce\_dernier sont fermées et beaucoup de gens sont à leur\_fenêtre et observent les rangées de gardes statiques\_dans les rues. Ils sont tous propres comme des Talions\_neufs. Au moment où les cornes des portes sonnent,\_vous entendez des petits cris de joie des habitants qui\_attendaient cet instants depuis des jours.</p><p>Les portes s’ouvrent et les trompettes sonnent le\_retour de la Dame d’Honneur si aimée de la population. Les Ispierois et Ispieroises sortent de chez eux\_pour s’aligner le long des rues, certains avec leurs\_enfants sur les épaules, d’autres avec des fleurs à\_jeter. Le sourire et le soulagement est sur tous les\_visages. Certains pleurent de joie lorsque le cheval\_de Lana’Sir, en tête d’une petite escorte de\_soldats arrive dans la ville. Vous remarquez\_la présence de Laotissa Graine Dépeautre\_juste derrière la fille du seigneur. Aucun autre Elfe\_n’est présent dans le groupe.</p><p>Lana’Sir prend son temps, un immense sourire\_aux lèvres, et salut chaleureusement plusieurs\_personnes sur la route. Elle prend des bouquets et\_des cadeaux qu’elle confie à un des soldats qui s’est\_approché de son cheval. Quelques instants avant\_qu’elle n’atteigne la place du Château, Jaspar ouvre\_les portes et s’installe sur le perron encadré par\_quatre gardes de la cité.</p><p><strong>Voulez-vous faire quelque chose avant qu’elle ne\_rencontre son père ?</strong></p><p>En arrivant sur la Place, Lana’Sir descend seule\_de son cheval et s’approche de son père pour l’enlacer\_tendrement. Le seigneur Jaspar s’apprête à prendre\_la parole devant la foule regroupée sur la place\_mais Lana’Sir en plaçant sa main sur son épaule\_lui fait comprendre qu’elle souhaite parler. Il s’écarte\_et lui laisse la place centrale alors que Laotissa se\_rapproche de la Dame d’Honneur.\_</p></blockquote><div class=\"discussion\"><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Lana’Sir :</span></strong></span></p><p>Mes chers amis de la Cité d’Ispier. Je suis de\_retour à la maison pour mon plus grand bonheur. Je\_sais que vous avez été inquiets, que ma disparition a\_perturbé certains d’entre vous et que les conflits avec\_nos voisins et amis de la foret du Val Rouge a été un\_traumatisme pour notre région.</p><p>Je suis là pour vous et je ne suis pas prête de repartir,\_vous pouvez compter sur moi.\_Je ne vais pas y aller par quatre chemins mais Hisp\_Galik cet ignoble manipulateur a brouillé tous les\_esprits de cette ville dont celle de mon père ici présent.</p><p>Je sais au fond de mon cœur que sa honte est immense\_mais c’est bien lui qui a engager le groupe d’aventuriers qui m’ont retrouvé et sauver la vie. <em>(La foule\_applaudit avec des hourras et des cris de joie)</em>.\_</p><p>Je n’ai jamais cru aux mensonges de Hisp Galik et\_c’est de mon propre chef que j’ai suivi les survivants\_du village des Elfes Sylvains pour leur venir en aide\_et trouver la vérité autour de cette guerre. Les Elfes,\_protecteurs d’une puissante relique oubliée, sont\_les premières victimes de cette guerre. Nous avons\_empêché notre ennemi, Hisp Galik, de mettre la main\_sur le Bracelet mais, à partir de maintenant, il faudra\_retrouver ce pleutre manipulateur. Laotissa Graine\_Dépeautre, à mes côtés, est comme une sœur pour moi\_et elle prend son rôle de Gardienne de l’Union très à\_cœur.</p><p>Va-t-on laisser une vieille histoire oubliée briser\_nos relations avec nos voisins les Elfes Sylvains de la\_Forêt du Val Rouge ? NON</p><p>Demain, et pour les trois prochains jours, toute ma\_vie ne sera que pour vous, habitants de la Cité d’Ispier\_mais je dois vous prévenir, ensuite mon attention et\_mes forces seront au service des Elfes Sylvains de la\_forêt du Val Rouge pour les aider à reconstruire et à se\_réinstaller dans leur village détruit. J’espère sincère- ment que toute personne capable de se joindre à mon\_effort sera à mes côtés. Bâtisseurs, artisans, transporteurs, cuisiniers, herboristes… chacun de vous a un\_rôle à jouer pour racheter les erreurs de mon père et les\_malversations de son ancien conseiller.</p><p>Je tiens à vous informer et vous prévenir, avec\_force, qu’aucun survivant de ce village, malgré leurs\_peines, leurs souffrances et leurs colères légitimes ne\_souhaite de représailles judiciaires contre les hommes\_de notre Cité qui ont participé aux massacres.</p><p>Je finirais par vous dire que pendant les Trois\_Jours pour la Paix, chacun de vous pourra venir me\_rencontrer, discuter à mes côtés et maudire de tous\_les maux les Elfes Sylvains devant moi sans restriction. La colère et les pleurs seront autorisés lors de ces\_audiences avec moi. A la suite des Trois jours pour\_la Paix, toutes les attaques physiques ou morales, les\_insultes, les agressions ou les discussions de comptoirs\_enragées prenant pour cible nos voisins de la forêt du\_Val Rouge seront sévèrement punis ! Je peux vous\_aider à faire votre deuil mais ma tolérance aura des\_limites. <em>(Lorsqu’elle prononce ces mots le silence est TOTAL\_sur la place)</em>.</p><p>A partir de demain, de l’aube au coucher du soleil,\_je me tiens à votre disposition dans la salle d’audience\_du château. Les cuisines serviront à qui le demande\_un plat chaud et nourrissant et à partir de maintenant les bains publics sont accessibles à qui le souhaite.</p><p>Les Trois Jours pour la Paix commencent ! <em>(Cris de joie\_et applaudissements de la foule)</em>.\_</p><p>Maintenant retournez auprès de votre famille,\_de vos voisins, de vos amis pendant que je retrouve\_mon père adoré et que je remercie comme il se doit les\_Sauveurs de la Dame d’Honneur.</p><p>Merci à toutes et tous.</p></div><hr /><blockquote><p>Lana’Sir enlace à nouveau son père sous les\_acclamation des habitants qui commencent à\_quitter la place principale.</p><p>Elle vous fait signe de la rejoindre et Laotissa\_semble très heureuse de vous voir.\_</p><p>Vous remarquez que la Dame d’Honneur a bien\_changé en quelques semaines. Elle a mûri et son\_regard semble encore plus déterminé qu’à votre\_première rencontre. Vous aviez rencontré une jeune\_femme naïve et idéaliste, vous découvrez une femme\_droite et qui impose le respect.</p><p>A côté d’elle, Laotissa a changé également. La fille\_innocente au regard d’enfant s’est transformée en\_jeune fille sereine et souriante. Vous avez l’impression\_que plusieurs années se sont écoulées lorsque vous\_posez les yeux sur Laotissa Graine Dépeautre.</p></blockquote><h3>Dire au Porteur du Bracelet :</h3><blockquote><p>Laotissa te regarde avec un sourire immense. Elle\_s’approche rapidement de toi et se colle à tes côtés en\_plaçant son bras sous le tien comme pourrait le faire\_une fille pour l’un de ces parents. Tout en suivant le\_groupe qui rentre dans le château en direction de la\_salle de banquet, elle n’arrête pas de lever les yeux\_vers toi avec un regard malicieux et complice et de\_temps en temps elle tapote ta main comme pour dire\_«c’est bien, c’est bien».</p></blockquote><h3>A tous les PJs :</h3><blockquote><p>Vous êtes amené dans la salle de banquet où une\_grande table est préparée. Lana’Sir se positionne\_debout derrière une chaise entouré de son père et\_de Laotissa. Les serviteurs vous montrent vos places\_autour de la table. Les gardes sortent et des plats sont\_apportés. Le repas peut commencer.</p><p>Les PJs sont amenés à la suite de Jaspar et Lana’Sir\_vers la salle à manger qu’ils commencent à bien\_connaitre. La plupart des serviteurs sont en train de\_préparer un repas copieux et diversifié mais dès que\_les plats sont sur la table, tous les gardes et serviteurs\_quittent la pièce.</p></blockquote><p>Le Porteur du Bracelet est positionné à côté de\_Laotissa.</p><hr /><h2>Repas et discussion</h2><h3>Lana'Sir</h3><p>Malgré la fatigue, Lana’Sir est très heureuse de\_revenir à la cité d’Ispier et elle est assez excitée par les\_Trois Jours pour la Paix.</p><p>Elle passera le repas à discuter gentiment mais elle\_prendra toutes les occasions pour faire des piques et\_des remarques à son père et on peut se douter qu’elle\_lui en veut de ne pas l’avoir soutenu.</p><p>Dès qu’elle parle de Hisp Galik la colère prend\_le dessus et on comprend qu’elle veut plus que tout\_retrouver, juger et condamner à mort l’ancien conseiller de son père.</p><p>Elle ne sera pas avare de compliments pour le\_groupe d’aventuriers mais, attention, elle n’aime\_pas le sarcasme et l’irrespect d’autant plus quand\_elle est fatiguée. Elle ira droit au but avec les PJs\_et ne mâchera pas ses mots.\_</p><p><strong>Elle informe les PJs :</strong></p><ul><li><p>Falika Rosna a fait des recherches sur les Reliques\_de L’union (même infos que les PJs ont déjà mais\_elle peut synthétiser)</p></li><li><p>Elle aidera les PJs dans toutes leurs recherches\_grâce à son réseau et ses contacts dans quelques\_villes. Elle connait bon nombre de personnes\_surtout à Orkadia, à Blanche Paix et à Lavoise.</p></li><li><p>Les juristes de la Cité d’Orkadia ont envoyé des\_messages aux quatre coins des Terres d’Arran\_pour retrouver Hisp Galik</p></li><li><p>Les autres survivants de Village elfique sont déjà\_retourner dans leur village sur la route du retour.</p></li><li><p>Maana devrait rejoindre les survivants\_Après les premières informations transmises par\_Lana’Sir, son père, un peu perdu dans cette conversation, ira se coucher et remerciera les PJs après avoir\_embrassé sa fille avec tendresse.</p></li></ul><p>Après le départ de son père, Laotissa sera plus\_décontractée et commencera progressivement à\_se détendre et à reprendre son air de jeune femme\_détendue et simple. Elle en profitera pour être plus\_vindicative envers la faiblesse de son père et elle aura\_des mots très dur envers toutes les personnes qui sont\_impliquées dans cette trahison (Hisp Galik, Rodric,\_son père, les chefs du village sylvains…).</p><h3>Laotissa</h3><p>La jeune Laotissa parle aux PJs avec une joie non\_feinte. Elle est très excitée d’entendre le récit détaillé de leurs aventures et elle coupe les aventuriers\_plusieurs fois avec des questions ou des compliments.\_</p><p>Elle regarde surtout le Porteur du Bracelet et elle\_prononcera des phrases signifiant qu’elle a bien choisi\_et que le Porteur est le bon de son point de vue. Elle\_est ravi que le Bracelet de l’Union soit entre de bonnes\_mains et que les PJs aient révélés les secrets du Temple\_du Val Rouge.</p><p>Maintenant que la relique est entre de bonnes\_mains, elle souhaite que les PJs retrouvent et protègent\_les autres pour le bien de toutes les Terres d’Arran.\_Elle a confiance en eux et elle sent qu’ils seront des\_héros bons et justes.</p><p>Laotissa leur fera comprendre que s’ils ne veulent\_pas trouver les autres Reliques, maintenant que le\_secret est connu, toutes les pires personnes et organisations seront sur leurs traces pour s’emparer du\_pouvoir de ces artefacts puissants.</p><p>Elle proposera aux PJs de les accompagner s’ils le\_souhaitent même si maintenant qu’elle est la nouvelle\_Gardienne de l’Union du Temple du Val Rouge, elle\_a une certaine responsabilité envers les elfes sylvains.\_</p><h3>Tout le long du repas</h3><p>Le repas est agréable dans l’ensemble si les PJs se\_comportent bien. Si les PJs se montrent irrespectueux ou grossier, Lana’Sir se montrera tout d’accord\_perplexe voir choquée. Si les marques d’irrespect se\_multiplie, elle pourra se mettre en colère ou, même,\_menacer de congédier le personnage s’il ne retrouve\_pas de bonnes manières.</p><p>La situation pour la Dame d’Honneur est grave.\_Elle a encore beaucoup de travail et de sacrifices à\_faire pour résoudre entièrement les problèmes de la\_Cité d’Ispier et du village des Sylvains.\_</p><p>Elle expliquera avant de prendre congé qu’elle en\_sera pas très disponible lors des Trois Jours pour\_la Paix mais que pour les PJs elle peut faire une\_exception. Ensuite, elle ira rejoindre les survivants\_sylvains pour organiser les réparation. Si certains PJs\_veulent l’aider à encourager des habitants de la cité\_de s’investir dans la reconstruction du village des\_elfes, elle en serait ravie. Laotissa va rester au château\_pendant les prochains jours et suivra Lana’Sir ensuite\_vers la forêt du Val Rouge.</p>"
