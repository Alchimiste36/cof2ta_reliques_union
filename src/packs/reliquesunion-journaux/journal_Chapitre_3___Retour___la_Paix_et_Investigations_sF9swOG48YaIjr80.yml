  - sort: 800000
    name: Rencontre de Zagrenn
    type: text
    _id: JoWuu7l0J0l6Dtg5
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Durant l’intermède, le porteur du Bracelet\_va recevoir la visite d’un Frère du Monastère du\_Désespoir (LM39) nommé Zagrenn Fredfisk. Suite au\_discours de Lana’Sir et les informations transmises\_par l’équipe de frère du monastère présents lors de\_la fête de la ville, Zagrenn se débrouille pour être\_envoyé à la Cité d’Ispier pour rencontrer le Porteur\_du Bracelet de l’Union.</p><p>@UUID[Actor.tvKYvTtecsyhg5eW]{Zagrenn Fredfisk} est un personnage secondaire de\_la campagne qui a deux rôles principaux.\_</p><p>Tout d’abord, il pourrait devenir un indicateur\_de confiance pour diriger les PJs, leur fournir des\_informations ou les remettre dans le droit chemin\_lors de leurs hésitations.</p><p>Ensuite, il peut être un personnage de rechange\_suite à la mort d’un des PJs ou un renfort pour le\_groupe de PJs si vous estimez que leur groupe n’est pas\_très expérimentés pour les épreuves qui les attendent.</p><hr /><h2>Rencontre avec Zagrenn</h2><p>Le porteur du Bracelet reçoit la visite d’un coursier\_au petit matin durant l’intermède.</p><blockquote><p>Peu après le lever du soleil, tu reçois la visite\_d’un coursier qui porte une écharpe au\_couleurs de la Cité d’Ispier. Il se penche légèrement\_en avant pour te saluer et sans un mot, te donne un\_pli cacheté du sceau de Jaspar Bonarion.\_</p></blockquote><div class=\"parcho\"><p>Ce matin, nous avons reçu au château la visite\_d’un individu souhaitant rencontrer le responsable\_du groupe des Héros Sauveur de la Dame d’honneur.</p><p>D’après ses dires, il vient directement du Monastère\_des Frères du Désespoir et disposerait d’informations\_sur ce que vous avez trouvé récemment.\_Dès qu’il vous sera possible, veuillez me rejoindre au château. Cordialement,</p><p>Jaspar Bonarion, seigneur de la Cité d’Ispier</p></div><blockquote><p>Le coursier est resté planté devant la porte comme\_s’il attendait une réponse.</p></blockquote><p>Arrivé au château de très bonne heure, Zagrenn\_Fredfisk est un moine du monastère des Frères du\_Désespoir. Cet ordre est assez connu et respecté par la\_plupart des habitants du Pays des Vents. Malgré le fait\_qu’il soit venu seul, Jaspar a installer ce visiteur dans\_un petit salon du château en attendant le porteur.\_</p><p>Ce dernier peut venir au rendez-vous seul ou\_prévenir ses compagnons pour l’accompagner. Lana’Sir est au village des sylvains ce jour-ci.\_</p><blockquote><p>En arrivant au château, vous êtes amenez par\_un serviteur jusqu’à un salon de petite taille\_et aménagé pour les réunions privées. Debout devant\_une petite bibliothèque, les mains croisées dans le dos\_et dans une posture très droite, le moine se retourne\_vers vous et vous remarquez son visage neutre avec\_une légère note de contrariété sur ses traits.</p><p>Dans un coin de la pièce, vous voyez deux gardes\_postés pour la surveillance de ce visiteur.</p><p>Le moine vous observe rapidement et s’approche\_d’un pas décidé. Il est très musclé, chauve et porte\_une tenue de voyage et la tunique blanche de cet\_ordre.</p></blockquote><p class=\"discussion\"><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Zagrenn Fredfisk :</span></strong></span>\_Veuillez excuser ma venue si matinale. Je me\_nomme Zagrenn Fredfisk et je viens directement\_du Monastère des Frères du Désespoir pour vous\_rencontrer.\_Auriez-vous l’amabilité de vous entretenir\_avec moi quelques instants ?</p><hr /><h2>Discussion avec Zagrenn</h2><p>@UUID[Actor.tvKYvTtecsyhg5eW]{Zagrenn }est un frère du Désespoir qui aime\_particulièrement l’étude de l’histoire des Terres\_d’Arran et, surtout, des légendes autour des conflits\_entre les différents peuples, les discriminations et le\_racisme.</p><p>Depuis 10 ans, il essaye, par tous les moyen, de\_comprendre pourquoi les peuples ou les individus\_cherchent à dominer ou opprimer leur prochain. Il\_n’arrive pas à comprendre les raisons de cette haine\_et ça l’énerve.\_Il a récemment entendu parlé des Sauveur de la\_Dame d’Honneur grâce à l’équipe de frères qui ont\_participé à la fête d’Ispier et suite au discours de\_Lana’Sir. Il a déjà entendu parlé de l’Ordre de l’Union\_et de la légende autour d’Esdavia. Il a, donc, demandé\_une autorisation à ses supérieurs pour venir en aide\_aux elfes sylvains de la forêt du Val Rouge avec l’espoir\_de pouvoir rencontrer le groupe de PJs.</p><p>Zagrenn est un vrai moine du Monastère des\_Frères du Désespoir. Il est droit, juste et intraitable\_avec les injustices ou les persécutions des faibles. Il a\_de grandes valeurs chevillées au corps et il a tendance\_à concevoir le monde avec vision binaire entre le bien\_et le mal. Il n’a strictement aucune notion du second\_degré ni du sarcasme. Il consacre sa vie à la création\_d’un monde meilleur et Zagrenn ne comprendra pas\_les personnages qui auront besoin de motivations\_supplémentaires pour s’impliquer dans cette mission.</p><hr /><h3>Les informations de Zagrenn</h3><ul><li><p>Les reliques sont très puissantes et c’est pourquoi\_elles ont été séparées et cachées depuis plus de\_1000 ans par l’Ordre de l’Union</p></li><li><p>Les Faux dieux, qui les ont utilisés à Esdavia, ont\_soumis et opprimés de nombreuses personnes\_avant que l’Ordre récupère les reliques</p></li><li><p>Chaque relique a des pouvoir identiques mais\_pour des races différentes. Elles ont deux voies\_différentes. L’une apportera domination/contrôle/possession et l’autre inspiration/émancipation/motivation. Chaque voie est influencée par les\_actions du porteur.</p></li><li><p>Une seule personne ne peut pas porter plusieurs\_reliques sinon elle devient folle ou elle meurt.</p></li><li><p>Le seul moyen connu de détruire les reliques est\_un suicide collectif des cinq porteurs.</p></li><li><p>L’Ordre de l’Union a souhaité conserver les\_reliques pour pouvoir s’en servir en cas de\_grand danger pour les Terres d’Arran. Certains\_puissants de l’Ordre avaient, peut-être, des\_ambitions personnelles ou un attrait pour\_le pouvoir des reliques.</p></li></ul><p>Pour Zagrenn, le but des PJs seraient de récupérer les cinq reliques de l’Union, essayer de les activer\_et, pour finir, les détruire pour sauver les Terres\_d’Arran face au risque qu’elles tombent entre de\_mauvaises mains. Les PJs deviendraient des héros\_pour le monde entier, leurs noms seraient chantés sur\_toute les place de cités et les livres d’histoire détailleraient leur légende. Il essayera de convaincre les PJs\_de poursuivre cette quête importante car d’après ses\_supérieurs, une tension grandit dans les campagnes\_et certains quartiers de cités. Les relations entre les\_humains et les anciennes races se détériorent et de\_nombreux actes de racismes remontent aux oreilles\_des Frères du Désespoir.</p><p>Les Reliques de l’Union, même si elles pourraient\_apaiser cette situation, sont des armes bien trop\_dangereuses si de mauvaises personnes les obtiennent.\_</p><hr /><h3>Avertissements au Porteur du Bracelet</h3><p>Si Zagrenn apprend qu’un des PJ porte le Bracelet\_et l’a activé, il ne sera pas perturbé plus que ça mais il\_prendra un air grave et solennel face au porteur.\_Ses mises en gardes sont strictes et fermes. Si le\_porteur commence à profiter des pouvoirs du Bracelet\_pour opprimer ou soumettre des elfes, il ne pourra\_plus contrôler ses pulsions de domination au fur et à\_mesure. Cela fonctionne pour l’autre voie également\_d’après ses recherches. Pour développer les pouvoirs\_des Reliques, il faut les utiliser mais, en même temps,\_plus on les utilise et plus la Relique a de l’influence\_sur le porteur. Ce dernier doit rester très stable sur ses\_valeurs et ses motivations.</p><p>Zagrenn préviendra le porteur, avec un petit\_sourire malicieux, que s’il utilise le Bracelet pour de\_vils objectifs, il l’apprendra et qu’il viendra s’occuper\_personnellement de son cas, sans grandes subtilités.</p><p>Il gardera à l’œil le groupe de PJs pour éviter toute\_nouvelle menace de contrôle des peuples.\_</p><p>Dans tous les cas, après la discussion avec Zagrenn,\_les PJs devrait comprendre l’importance de leur quête.\_Zagrenn retournera au Monastère des Frères du\_Désespoir après avoir passé quelques jours dans le\_village des elfes sylvains et il pourra faire des recherches\_dans la magnifique bibliothèque du Monastère. Pour\_le moment, il ne souhaite pas informer ses supérieurs\_de la situation pour éviter les tentations.\_</p><p>Il faudrait inciter les PJs a partager leurs informations avec Zagrenn (les différents textes, la carte de la\_gardienne du Temps, les notes de Hisp Galik…).</p>"
