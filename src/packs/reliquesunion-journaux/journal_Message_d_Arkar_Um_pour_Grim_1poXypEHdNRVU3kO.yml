    text:
      format: 1
      content: >-
        <p><strong>A l'intention de Grim le cogneur, fils de Brann de la
        Forge,</strong></p><p>Les anciennes mines d'Arkir'Am ont été mise en
        service en -251 du Calendrier Athéen, exploitées pendant près 345 années
        puis condamnées par demande du propriétaire et décision du Conseil
        d'Arkar'Um en 94 du Calendrier Athéen.</p><p>Pour l'heure, les mines
        d'Arkir'Am appartiennent au Haut Conseiller Ambrar de l'Ordre du Talion.
        </p><p>D'après les derniers enregistrements de nos services, les mines
        d'Arkir'Am sont composées des mines, bâtiments, fourneaux et forges en
        souterrain, du chemin d'accès à partir du croisement du Temple (dans la
        limite droite des deux socles extérieurs des statues sculptées au
        croisement des routes) ainsi que des terres, montagnes et sommets à 3
        kilomètre de rayon autour du pilier gauche de la porte principale, au
        droit de la marque du temple sculptée à 1,2 mètre de hauteur en partant
        de la base du socle.</p><p>D'après le propriétaire, les mines ont été
        fermées par manque de rentabilité suite à l'appauvrissement des filons
        de minerais et de métaux. Dans intempéries (avalanches, craquellement
        des roches due à l'expansion des glaces…) ont, de plus, été enregistrées
        fréquemment durant l'exploitation de la mine impliquant un impact fort
        sur les rendements et l'augmentation des charges pour acheminer les
        artisans et les marchandises.</p><p>Toute négociation de vente ou
        d'exploitation des mines d'Arkir'Am devront être administrées par le
        Conseil d'Arkar'Um et validé par la Chambre des Infrastructures et des
        Architectes de l'Ordre du Temple d'Arkar'Um.</p><p><em>Par obligations
        légales de nos services, le Haut Conseiller Ambrar de l'Ordre du Talion
        a été informé de votre demande d'informations sur son bien.</em> </p>
