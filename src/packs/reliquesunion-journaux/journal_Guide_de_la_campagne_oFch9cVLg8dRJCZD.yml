      content: "<div><h2>Maitre des Jeu Avancé</h2><p>Cette grande campagne pour Chroniques Oubliées Fantasy, dans l’univers des Terres d’Arran, <strong>se destine plutôt à un MJ ayant déjà encadré des sessions de Jeu de Rôles.</strong> En parcourant ces chapitres, vous pourrez vous rendre compte de la densité de l’histoire et de la nécessité de savoir les informations à révéler aux PJs, celles à dissimuler et celles à masquer au milieu de textes à priori inutiles.\_<strong>Avec une très bonne lecture de la campagne et avec une compréhension de l’histoire, un MJ novice peut réussir à masteriser la campagne des Reliques de l’Union mais le risque de louper un élément crucial est important.</strong></p></div><p>De plus, <strong>une bonne connaissance de l’univers des Terres d’Arran, via les Bandes Dessinées, est recommandée.</strong> Les PJs vont beaucoup voyager, rencontrer de nombreuses personnes, prendre des décisions alternatives et rechercher des informations nombreuses. Ainsi, un MJ maîtrisant l’histoire, la géographie et, surtout, les relations entre les peuples et régions des Terres d’Arran aura beaucoup plus de facilité pour broder et improviser face aux demandes de son groupe de joueurs.</p><p><strong>Toutes les informations nécessaires à l’histoire de la campagne sont détaillées dans chaque chapitre mais il conviendra à chaque MJ de s’inspirer des BD des Terres d’Arran pour satisfaire les demandes spécifiques des joueurs.</strong></p><div><h2>Diversités et stéréotypes</h2></div><p><strong>Une attention particulière, tout au long de la campagne, a été portée aux représentations des différentes cultures, aux différents PNJ rencontrés et à la diversité des lieux parcourus par les aventuriers.</strong></p><p>La répartition des rôles sociaux des PNJ ont été répartis entre les différents genres et peuples afin de représenter une large diversité des cas. De la même manière que dans les BD, les personnages importants sont autant des hommes que des femmes.\_</p><p><strong>La personnalité de chaque PNJ qu’il soit homme ou femme, humain, elfe, nain, peau verte ou centaure, poussé par des idéaux humanistes ou haineux, est crédible et détaillée.</strong> Sans tomber dans les clichés et les stéréotypes du genre Fantasy, le groupe de PJ sera placé dans des situations où il leur sera difficile de faire confiance, où les actions et réactions des PNJ pourront être incompréhensibles ou inappropriées et où les motivations des protagonistes ne seront pas totalement alignées à leur mission.</p><p><strong>Deux civilisations ont été développées dans cette campagne</strong> en ce basant sur les peuples présents dans les BD des Terres d’Arran et en partant du principe que cet univers est gigantesque et mystérieux. <strong>Le village d’Arkanov est peuplé par des centaures reprenant en grande partie la culture des peuples Polynésiens et Maori.</strong> De son côté, <strong>la cité de Glanae’Reth, habitée par les Elfes Exsangues, est une caricature poussée à l’extrême d’une société violente et malsaine</strong> sous le contrôle de quelques matrones toutes puissantes.</p><p>Rien ne vous empêche de modifier, ajuster ou adapter les rôles, les cultures ou les traditions des PNJ rencontrés afin qu’ils correspondent plus finement à votre groupe de joueurs où à vos connaissances et goûts personnels.</p><div><h2>Violences et consentement</h2></div><p><strong>La campagne des Reliques de l’Union va mener votre groupe de joueur dans des situations difficiles et parfois intenses ou violentes.</strong></p><p>Lorsque l’on parle de violences ou d’agressions physiques, vous aurez la capacité de vous mettre d’accord avec vos PJs sur le degré de violence qu’ils peuvent ou souhaitent subir. L’adaptation des différents chapitres sera assez facile pour satisfaire les joueurs.</p><p>Par contre, <strong>dans le cadre de cette campagne qui prend pour base la lutte contre le racisme gangrénant progressivement les Terres d’Arran et la haine des humains envers les anciennes races, il est nécessaire de prévenir le groupe sur les discriminations et les violences psychologiques qui se mettront sur la route des aventuriers.</strong></p><p>Tout au long des chapitres, <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">discutez régulièrement avec vos joueurs de leurs sentiments ou de leur malaise face aux violences qu’ils rencontrent dans cette campagne.</span></strong></span></p><h2>Adaptation pour Chroniques Oubliées Fantasy 2ème Édition</h2><p>Créé initialement pour COF 1, le Jeu de Rôles des Terres d'Arran s'adapte aussi très bien aux règles de la version 2. Afin de faciliter l'intégration de la campagne sur Foundry VTT, le choix a été fait d'adapter les règles pour COF2. Pour le MJ, il convient de bien connaitre les règles de COF 2 et d'avoir au minimum le Livre des Règles en PDF ou en physique.</p><h3>Quelques modifications apportées</h3><ul><li><p><strong>La caractéristique de Volonté ne sert à rien pour les personnages et réprésente le bonus universel pour les rencontres</strong> du Livre du meneur.</p></li><li><p><strong>Chaque personnage reçoit des Points de Mana à chaque niveau en fonction de son profil ET des PM quand il apprend un sort dans une voie</strong>. Les personnages auront de ce fait surement plus de PM que dans la version 1. A chaque MJ d'adapter les personnages pour réduire leur nombre de PM.</p></li><li><p><strong>Il n'y a plus de \"d12\" dans les capacités. Il est remplacé par un Dé Malus</strong> (lancer deux d20 et garder le plus faible)</p></li><li><p><strong>Le nombre de Points de Capacité des personnages sont calculés avec les règles de COF 2</strong> et donc les PJ auront 3 points de capacités à la création du personnage.</p></li></ul><h3>Hight Fantasy et règles optionnelles</h3><p>La campagne est prévue pour être épique et amener les aventuriers vers un statut de leader et même de légende. De ce fait, <strong>il y a, tout au long de leur périple, des objets magiques puissants, des potions nombreuses et de grandes quantités de richesses.</strong> Durant les intermèdes, <strong>les PJ pourront acheter des objets magiques, dépenser leur fortune pour monter des projets d'ampleur, influencer des PNJ et, même, réaliser des recherches pour découvrir de nouveaux sorts pour les mystiques ou faire de l'artisanat magique</strong>.</p><p>Une attention particulière a été portée pour parsemer la campagne d'objets magiques peu communs dans les JdR (bonbns, biscuits, boucle d'oreille…). <strong>Les intermèdes permettront aussi aux joueurs et au MJ de créer des objets magiques personnalisés pour chaque profil</strong>. Si un aventurier utilise une arme ou une armure peu présente dans les butins et les trésors trouvés par le groupe, le MJ devra adapter les rencontres pour que chaque PJ puisse obtenir des objets magiques adaptés à son personnage et garder un équilibre de la puissance des PJ.</p><p><strong>Certaines rencontres utilisent les voies géographiques et professionnelles présentent dans l'Atlas d'Orgild et Règles Optionnelles</strong> pour leur donner plus de profondeur et il est possible pour le MJ d'ajouter des règles optionnelles s'il le souhaite (capacités épiques, magie vancienne…).</p><div><h2>Intégration dans la Grande Histoire</h2><p>Dans la chronologie des Terres d’Arran, <strong>la campagne commence en 708 du Calendrier d’Athéen soit un an environ avant la guerre des Goules provoquée par l’elfe Lah’saa</strong>. Elle se déroule dans le nord de l’Ourann, le Pays des Vents. <strong>Le monde est en paix</strong>, la vie y est normale, chacun faisant leur travail, leur vie de famille et leur tâches quotidiennes tranquillement. Le groupe d’aventuriers commencera la campagne dans ce cadre mais, ils seront rattrapés par les événements mondiaux au fur et à mesure de leurs avancées.</p><p>Dans le cadre de la campagne, <strong>tout l’arc autour du réveil des fléaux et le combat d’Alyana a volontairement été effacé car cet arc est peu compatible avec le groupe de héros et l’histoire.</strong></p><p>Pour finir, les PJs seront, en toute fin de campagne, amenés à rejoindre la résistance dans le conflit qui opposera l’alliance des monarques humains contre les anciennes races après leur victoire sur Ramell et Amanori Bellara.</p><p><strong>Il est très compliqué de connaitre la position des personnages clefs des Bandes Dessinées à telle ou telle période des BD.</strong> Ainsi, dans la campagne, <strong>aucun héros des BD n’interviendra</strong>, à part les lieutenants de Lah’saa. Pour plus d’immersion, certains récits pourront arriver aux oreilles des PJs au fil de la campagne via des chanteurs de tavernes ou des jongleurs de place de marché.</p><h3>Divergences</h3></div><p>Par rapport aux BD des Terres d’Arran, <strong>il est possible que vous constatiez des erreurs, des modifications ou des approximations.</strong> Une vigilance a été prise pour respecter les BD et les histoires mais il peut y avoir des changements à certains endroits. La campagne a été créée en 2024-2025 et ne peut pas prendre en compte la suite de l’histoire officielle publiée après.</p><p><strong>De nombreux lieux, personnages, objets ou légendes ont été inventés pour cette campagne en essayant, au maximum, de conserver l’ambiance et le style des Terres d’Arran.</strong></p><h2>Autres points importants</h2><ul><li><p><strong>Certains passages permettent de rajouter des \"missions secondaires\" à l’histoire principale</strong>. Chaque quête réalisée par le groupe d’aventuriers augmentera leur renommée, la sympathie des habitants et la légende de leur groupe.</p></li><li><p><strong>Le Maître du Jeu doit garder en tête que les Terres d’Arran sont dangereuses pour des PJs de bas niveau.</strong> Ils rencontreront des groupes beaucoup, beaucoup plus forts qu’eux et ils pourront se faire massacrer s’ils choisissent à chaque fois la violence. Dans la mesure du possible, les PJs pourront être fait prisonnier, tabassés et laissés pour morts dans la nature, vendus à des esclavagistes, dépouillés de leurs équipements, arrêtés et jugés par un seigneur local (amende, prison, travaux d’intérêts généraux…).</p></li><li><p><strong>Dans de nombreux cas, des PNJ amicaux pourront accompagner les aventuriers pour certains chapitres</strong> (Maana dans la forêt du Val Rouge, Zagrenn dans les Montagnes des Crocs d’Acier…).\_ Ils pourront aussi payer les services de mercenaires pour les protéger. A chaque MJ de limiter leur faculté d’avoir recours à des aides extérieures.</p></li><li><p><strong>Comme vous le savez surement, le monde des Terres d’Arran est très grand, les voyages sont très longs et la magie est moins courante que dans d’autres univers.</strong> Envoyer un message dans une ville «voisine» peut prendre plusieurs jours voir semaines.</p></li></ul><p></p>"
