    text:
      format: 1
      content: "<div><h2>Principes de Base</h2></div><p><strong>Cette campagne est créée pour un groupe de personnages ayant de \"bonnes valeurs\" en générale.</strong></p><p>Il vous est possible de modifier les interactions et une partie de cette histoire pour un groupe mauvais mais, à mon sens, vous perdriez une partie de cette épopée luttant contre le racisme et les discriminations.</p><p>Toutes les actions des personnages ne devront pas forcément être \"bonnes\" (vol, colère, avarice, ambitions personnelles…) mais, comme vous le verrez en lisant cette campagne, <strong>le groupe de Héros devra, autant que faire se peut, vouloir aider son prochain, venir au secours des peuples, remettre en question les ordres malsains ou malhonnêtes, s’opposer aux autoritaires et aux âmes sombres.</strong></p><hr /><p>Voulant s’intégrer dans les petites et grandes histoires racontées dans chacune des BD des Terres d’Arran, la volonté était de créer une histoire ayant les mêmes valeurs que les Héros qui nous font rêver à chaque page des BD.</p><blockquote><p><strong>Par exemple :</strong></p><p>Tout au long des aventures de Redwin de la Forge nous prenons conscience de la part d’ombre de ce personnage, de ces choix difficiles et de sa colère profonde mais tout le monde sera d’accord avec ses valeurs universalistes et sa volonté de combattre pour un monde meilleur.</p><p>La plupart des Héros Orcs ou Gobelins des BD sont de fieffés saligots avec des actions répréhensibles et illégales. Malgré leurs vices et leurs ambitions personnelles, même le plus vil gobelin se soulèvera contre l’oppression des peuples ou pour venir en aide à son prochain.</p><p></p></blockquote><div><h2>Attentions pour la création des Personnages</h2></div><p><strong>Il n’est pas prévu pour cette campagne d’intégrer des joueurs voulant jouer un personnage Ogre</strong>. La campagne étant basée sur les discussions, la renommée et les interactions, un personnage Ogre serait un handicap trop grand pour le groupe.</p><p>Il faut prendre également en compte que la cité d’Ispier est en guerre contre un village d’elfe sylvain de la forêt voisine. <strong>Les joueurs voulant jouer un personnage sylvain subiront de la discrimination forte des villageois et du seigneur. Le joueur devra être informé de cette complexité pour le début de la campagne.</strong></p><p>Comme dans la plupart des villes des Terres d’Arran, <strong>les personnages Peaux Vertes (Orcs ou Gobelins) seront souvent discriminés et pourront avoir des accès limités dans certaines cités, une méfiance plus grande de la plupart des habitants et subir des violences verbales ou du rejet.</strong> Dans la cité d’Ispier, la guerre avec les elfes sylvains effacera cette méfiance. La présence d’un ou plusieurs Peaux Vertes apportera certainement beaucoup d’épices dans les interactions tout au long de l’histoire.</p><p>Pour finir, cette campagne ayant pour but ultime de créer un groupe multiraciale à la recherche de reliques anciennes liées à chaque peuple, <strong>il sera beaucoup plus intéressant d’avoir un groupe d’aventuriers ayant des peuples différents</strong> (elfe, nain, humain et peau verte). Ainsi chacun pourra voir son rôle prendre plus de place à chaque étape importante de la campagne.</p><div><h2>Intégration des Personnages</h2></div><p>Les futurs héros sont des personnes lambda de niveau 1 mais, chacun d’eux a eu un acte important pouvant arriver aux oreilles du seigneur.</p><p><strong>Situés à la cité de Blanche-Paix, cosmopolite et prospère, ou dans les alentours, les personnages devront intégrer dans leur histoire personnelle un fait d’arme, un événement ou un rôle pouvant amener le seigneur Bonarion à faire appelle à chacun d’eux.</strong></p><p>Dans tous les cas, les PJs commencent à être connus en bien ou en mal par les autorités de Blanche-Paix et c’est grâce à cette petite influence qu’ils seront choisis par le seigneur Bonarion de la Cité d’Ispier.</p><ul><li><p>Mercenaire avec une renommée montante</p></li><li><p>Artisan ou artiste reconnu</p></li><li><p>Survie à une attaque d’animal sauvage</p></li><li><p>Pistonnage familial ou relation avec la noblesse</p></li><li><p>Petit tire-laine ayant mis son nez dans des affaires qui le dépassent</p></li><li><p>Prisonnier avec de bonnes valeurs</p></li><li><p>Combattant, soldat ou garde de Blanche-Paix ayant une petite notoriété</p></li><li><p>Personne ayant une dette avec un noble</p></li><li><p>Marginal de la cité</p></li></ul><p>\_</p><div><h2>Orientation de la Campagne</h2></div><p><strong>Cette campagne devrait permettre à tous les styles de personnages d’être utiles et intégrés.</strong></p><p>Très loin du \"Porte-Monstres-Trésor\" de certaines campagnes, <strong>les Reliques de l'Union alternera entre des passages d’investigation, d’interaction longues avec des PNJ, de la recherche fastidieuse en bibliothèque, des combats contre des créatures sauvages ou dans des \"donjons\", des voyages à travers les Grandes Plaines du Pays des Vents ou des Montagnes, des passage de vie dans des communautés plus ou moins mystérieuses ou, encore, des périodes d’intermède plus ou moins longues.</strong></p><p>La plupart des combats pourront être résolues par la diplomatie, l’intimidation ou la discrétion.</p><p><strong>Les investigations et recherches des PJs les amèneront à trouver des informations qui ne leur serviront à rien pour l’histoire principale</strong> mais ces multiples textes et découvertes permettront de \"noyer\" les PJs et donneront des prises de décisions plus fines.</p><p>La campagne est assez linéaire dans les grandes lignes de l’histoire principale mais n’oubliez pas de suivre les dérives des PJs tant que vous les ramenez vers l’histoire à un moment.</p>"
