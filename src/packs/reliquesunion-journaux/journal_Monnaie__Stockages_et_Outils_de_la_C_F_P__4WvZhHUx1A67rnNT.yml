            system:
              key: materiel-des-arts-mystiques
              description: >-
                <p>Trouv&eacute; dans la cit&eacute; de Glanae'Reth, sur le plan
                de travail du laboratoire, ce mat&eacute;riel est tr&egrave;s
                divers et complet pour faire des exp&eacute;riences magiques
                multiples.</p>

                <p>Des carnets remplies de notes peuvent &ecirc;tre tr&egrave;s
                utiles ainsi que de nombreux composants rares voir m&ecirc;me
                inconnus (insectes, animaux, poudres, r&eacute;sines, ...)</p>

                <p>&nbsp;</p>

                <p>En utilisant cet &eacute;quipement dans un laboratoire,
                pendant au moins une heure, l'utilisateur gagne :&nbsp;</p>

                <ul>

                <li>&nbsp;+5 aux tests pour faire des cr&eacute;ations magiques
                ou alchimique</li>

                <li>+10 aux tests pour des rituels</li>

                <li>+5 aux variable des sorts</li>

                <li>une facilit&eacute; pour cr&eacute;er des alternatives de
                sorts.</li>

                </ul>
              source: Lana'Sir
