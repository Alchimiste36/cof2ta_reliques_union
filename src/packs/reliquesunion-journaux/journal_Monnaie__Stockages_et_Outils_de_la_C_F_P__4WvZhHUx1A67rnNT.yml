          SwkbODlWGnRsRsnB:
            folder: mwZqms4s1lPjWHbK
            name: Stockage proche des fermes
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/04.ICONES/ICONES%20de%20Base/CONTENANTS/BOITES/crate-heavy-brown.webp
            system:
              key: stockage-nord
              description: >-
                <p>Trouv&eacute; dans la cit&eacute; de Glanae'Reth, ces
                multiples caisses, sacs, cagettes, panier, tonneaux...
                contiennent divers produits.</p>

                <p>Dans les stocks proches des fermes, on trouve essentiellement
                des plantes des souterrains s&eacute;ch&eacute;es ou
                tranform&eacute;es. On peut trouver aussi des produit plus
                classiques :</p>

                <ul>

                <li>Des v&ecirc;tements,</li>

                <li>De la nourriture,&nbsp;</li>

                <li>des outils de tous les jours,&nbsp;</li>

                <li>du papier et mat&eacute;riel d'&eacute;criture,</li>

                <li>des bouteilles de sirop ou d'alcool</li>

                <li>des tonneaux d'huile, de vinaigre, de bi&egrave;re et
                cidre</li>

                <li>des sacs de c&eacute;r&eacute;ales,</li>

                <li>des ustensils de cuisine</li>

                <li>des sacs de charbons</li>

                <li>des cordes</li>

                <li>...</li>

                </ul>

                <p>Le poids total des diff&eacute;rents stocks dans les
                pi&egrave;ces repr&eacute;sente des centaines de
                kilogrammes.</p>

                <p>Apr&egrave;s inspection, on remarque qu'une partie non
                n&eacute;gligeable des stocks proviennent de diff&eacute;rentes
                cultures et on peut se douter qu'en partie ils proviennent de
                pillage de caravanes ou de villages.</p>
              source: Lana'Sir
