    text:
      format: 1
      content: "<h2>Retour à la Cité d'Ispier</h2><div class=\"arran-mod\"><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Après avoir envoyé le message à Lana'Sir grâce à la Ceinture de Communication, il est temps de sortir de la foret du Val Rouge en direction de la Cité d'Ispier.</em></span> <span style=\"font-family:Bookinsanity\"><em>Le voyage de retour à la cité se passe sans problème à travers la forêt piétinée et ravagée par les troupes d'humains. Des chemins sont praticables et au bout de 6h de marche, vous atteignez l'orée de la Forêt du Val Rouge. Loin au nord, vous apercevez la fumée venant de la Cité d'Ispier. De nombreuses souches sont visibles autour de vous, là où les bucherons ont récolté les arbres de la forêt.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Au moment où vous arrivez dans le grandes plaines vers Ispier, la boite de la Ceinture de Communication vibre légèrement. Un message est arrivé : <strong>@UUID[JournalEntry.RmsCdG6f2uSF89VB]{Réponse de Lana'Sir après le Temple 02}</strong></em></span></p><p></p><p><span style=\"font-family:Bookinsanity\"><em>Il vous faut encore une demi-journée de marche pour atteindre les murailles de la cité.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>A votre arrivée, vous êtes accueilli à la porte d'entrée par Jaspar Bonarion en personne entouré de 8 soldats aux couleurs de la cité.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Il vous salut en ouvrant les bras et vous salut cordialement.</em></span></p><p></p><div class=\"discussion\"><p><strong>JASPAR :</strong> <span style=\"font-family:Bookinsanity\">j'ai été prévenu de votre retour par ma fille saine et sauve et pour cela je vous suis profondément reconnaissant. Venez vous installer au château, vous reposer et manger un bout.</span></p><p><span style=\"font-family:Bookinsanity\"><em><strong>Il se tourne vers Manaa soudainement grave :</strong></em> Je tiens, au nom de tous les habitants de la cité, à vous offrir mon hospitalité et mes sincères regrets même si à cet instant je ne comprend pas les tenants et les aboutissants de ce … retournement de situation. Il va falloir expliquer clairement pourquoi la Dame d'Honneur de la cité a placer sa confiance en vous.</span></p></div></td></tr></tbody></table><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Il se dirige vers le château et les soldats se positionnent autour de lui et de vous pour écarter les habitants. A deux reprises, les soldats répriment des passants voulant se rapprocher de Manaa en l'insultant et en le menaçant. Vous arrivez devant un château à l'architecture purement humaine sans fioriture ni élégance. Fonctionnel et brut de décoration, les murs sont solides et bien équipés pour la défense. Passez les lourdes portes du château, dans une cour où vous voyez plusieurs bâtiments utilitaires (écuries, salle des soldats, forgeron…), Le soldat de tête ouvre l'une des porte du donjon et Jaspar vous invite à vous laver, vous changer et à le rejoindre dans le salon pour manger</em> <em>dès que vous serez prêts.</em></span></p></td></tr></tbody></table><p>Les PJs peuvent avoir accès à des soins, des bains, des artisans pour réparer leur équipements et la plupart des services qu'ils demandent. Malgré certains regards interrogatifs ou curieux, ils sont parfaitement en sécurité dans le donjon. On leur fournit des vêtements propres et élégants ou tout autre style en fonction des demandes. Un serviteur ou une servante est assigné à chaque PJs et à Manaa.</p><p>Après quelques heures (en fonction de leur demande), un jeune homme gracieux vient les prévenir que le repas sera servit dans peu de temps dans le grand salon.</p><p>\_</p><h3>Discussion avec Jaspar :</h3><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Après quelques banalités et paroles creuses, le seigneur Bonarion prend un air plus posé :</em></span></p><div class=\"discussion\"><p><strong>JASPAR : </strong><span style=\"font-family:Bookinsanity\">Maintenant que chacun à pu récupérer de son voyage, pourriez-vous m'éclairer sur ce qu'il se passe depuis le conflit avec le village des elfes sylvains. J'ai bien l'impression de mettre fait trahir mais pour l'heure vous me voyez perdu.</span></p></div></td></tr></tbody></table><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">En fonction des informations que les PJs dévoilent à Jaspar Bonarion il pourra éclaircir des détails et se montrera de plus en plus confiant et amicale. Par contre si le groupe se méfie du Seigneur de la Cité, il pourra se mettre en colère de plus en plus car il ne comprendra pas la situation et pensera que les PJs essayent de le tromper.</span></strong></span></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si le groupe manque de respect de façon répétée au seigneur, il décidera de les mettre aux arrêts en attendant le retour de Lana'Sir une quinzaine de jours plus tard.</span></strong></span></p></div><div class=\"arran-mod\"><p></p><section class=\"apsj-block apsj-dialogue apsj-red\"><main><p><em><strong>Jaspar a été trahi par Hisp Galik son conseiller. Ce dernier a manipuler les évènements pour que la guerre éclate entre les elfes sylvains et les hommes de la Cité d'Ispier. Après quoi le nécromancien pourrait ouvrir le Temple du Val Rouge et récupérer la ou les reliques pour le compte du Clan de la Femme. Si Jaspar Bonarion arrive a tirer des informations des PJs les bonnes conclusions, il sera tellement outré et abasourdi qu'il va placer l'entièreté de sa confiance dans le groupe et mettre toute son énergie à réparer son erreur face aux Elfes.</strong></em></p></main></section><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Informations détenues par Jaspar :</span></strong></span></p><ul><li><p>Hisp GALIK s'est mis à son service il y a presque 10 ans.</p></li><li><p>Hisp GALIK est responsable de la garde à l'extérieur de la cité et c'est lui qui lui faisait des rapports sur les attaques des sylvains sur les bucherons ou les caravanes de marchands</p></li><li><p>Hisp GALIK a des compétence en magie élémentaire et possède les bases de la nécromancie.</p></li><li><p>JASPAR est outré de sa faiblesse et de la manipulation qui l'a fait attaquer les village des Sylvains</p></li><li><p>JASPAR est prêt à beaucoup de sacrifices pour rembourser sa dette envers les elfes de la Forêt du Val Rouge.</p></li><li><p>JASPAR n'a jamais entendu parlé de l'ordre de l'Union , d'Esdavia, des reliques ou de tout autres sujets liés.</p></li><li><p>JASPAR autorise, sans aucune restriction, la fouille des appartements de Hisp Galik, de consulter la bibliothèque du château ou tout autres choses que les PJs lui demande pour enquêter.</p></li><li><p>JASPAR récompense le groupe avec un coffre rempli de 400 pa par PJs et une jolie propriété pour chaque joueur dans la cité d'Ispier avec une famille de serviteur vivant sur place.</p></li><li><p>JASPAR fera une déclaration publique dans les prochains jours pour calmer la haine des habitants contre les elfes sylvains.</p></li><li><p>LANA'SIR rentre à la cité d'Ispier après avoir convaincu le seigneur de la Cité d'Orkadia d'enquêter sur les malversations de Hisp GALIK et comprendre pourquoi il voulait accéder au Temple du Val Rouge.</p></li><li><p>LANA'SIR devrait être de retour dans 2 semaines avec des érudits ainsi que les autres survivants.</p></li><li><p>Les informations venant du Monastère des Frères du Désespoir devraient arriver un peu après.</p></li></ul><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Lorsque le groupe arrive à ce point reprenez la Campagne au chapitre : </span><strong><span style=\"text-decoration:underline\">Investigation des PJs.</span></strong></span></p><p>\_</p></div>"
