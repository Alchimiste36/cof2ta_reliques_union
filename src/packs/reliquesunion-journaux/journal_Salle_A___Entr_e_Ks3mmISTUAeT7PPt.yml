      content: >-
        <div class="arran-mod" data-pm-slice="3 3 []">

        <div class="salledescr">

        <p><strong>Description :</strong></p>

        <p>Vous arrivez dans une grande pièce de 12m par 12m carré. Les parois,
        d’environ 6m de haut, sont faites de pierres et lorsque vous descendez
        vous remarquez directement les lanternes accrochées aux murs qui
        s’allument et brûlent pour éclairant la pièce. Aucune fumée ne se dégage
        des lanternes et l’air semble particulièrement pur et frais. Le sol est
        en carreaux de pierres finement taillées dont les joints laissent
        pousser de la mousse. Lorsque vous arrivez en bas de l’escalier, un
        bruit de bois se fait entendre et la racine libérant l’escalier se
        referme.</p>

        <p>Au nord et à l’ouest il y a de grandes doubles portes. A l’est, vous
        remarquez une avancée de 8m de large qui semble donner sur une immense
        pièce éclairée et une porte simple. et au sud, un passage de 4m de large
        donne sur une autre pièce. Chaque ouverture (passages ou portes) fait 4m
        de haut environ.</p>

        </div>

        <div class="sallemj">

        <section class="secret">

        <p><strong>Notes pour le MJs :</strong></p>

        <p>Les lanternes s’allument lorsque l’on emprunte l’escalier. Elles sont
        magiques et peuvent illuminer à volonté. Ce sont les mêmes dans tout le
        temple. Elles s’allument lorsqu’on rentre dans une pièce.</p>

        <p>INT-INGÉNIERIE DD15 (trois tests environ 30 minutes chacun) : pour en
        récupérer une. Objet magique très appréciable et cher (environ 1
        000pa/lanterne). @UUID[Item.J2BG9a52KRsmkkC9]{Lanterne du Temple du Val
        Rouge}</p>

        <p>Si les PJs remontent l’escalier, la racine libère à nouveau l’entrée
        du temple.</p>

        <p>La porte à l’est (vers salle D) est verrouillée DEX DD20 pour
        l’ouvrir ou FOR DD20 pour la forcer. PV 15 - Solidité RD4 - immunisée au
        feu (la clef se trouve dans le bureau de la salle H)</p>

        </section>

        </div>

        </div>
