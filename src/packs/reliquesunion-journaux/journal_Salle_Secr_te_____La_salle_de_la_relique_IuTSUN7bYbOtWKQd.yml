          3HfwUDenncAZRnh6:
            folder: hdmFAaSkU07SBH6I
            name: Machines du Val Rouge
            type: item
            img: icons/tools/cooking/pot-camping-iron-black.webp
            _id: 3HfwUDenncAZRnh6
            system:
              key: machines-du-val-rouge
              description: >-
                <p>Un coffre mesurant 70cm de long par 50 cm de large et 60 cm
                de haut, contient une machinerie &eacute;trange avec beaucoup de
                petits objets.</p>

                <p>Un livret est gliss&eacute; sur le c&ocirc;t&eacute; remplit
                d'images explicites expliquant la marche &agrave; suivre pour
                utiliser la machine.</p>

                <ul>

                <li>D&eacute;shydrater des aliments</li>

                <li>griller des insectes</li>

                <li>conserver des graines</li>

                <li>produire des feuilles de papier &agrave; partir de fibre de
                plantes</li>

                <li>produire de l'encre &agrave; partir d'insectes</li>

                <li>st&eacute;riliser un outil</li>

                <li>st&eacute;riliser un tissu</li>

                <li>faire fondre du m&eacute;tal</li>

                <li>&eacute;tanch&eacute;ifier un tissu ou du cuir</li>

                <li>fa&ccedil;onner une corde ou cordelette &agrave; partir de
                fibre de plantes ou de tissu</li>

                </ul>

                <p>La machine fonctionne gr&acirc;ce &agrave; une succession de
                runes grav&eacute;es sur les diff&eacute;rentes pi&egrave;ces de
                la machine. Elles sont tr&egrave;s complexe de
                r&eacute;alisation mais l'utilisation a &eacute;t&eacute;
                pens&eacute;e pour &ecirc;tre simple.</p>
              source: Lana'Sir
