    image: {}
    text:
      format: 1
      content: "<div class=\"arran-mod\"><div class=\"salledescr\"><p><strong>Description :</strong></p><img src=\"modules/cof2ta_reliques_union/assets/ru_objets/objets_campagne/bracelet_de_l_union.webp\" width=\"100\" height=\"100\" /><p>Après avoir déposer le dernier objet dans la main de la bonne statue, une porte s'ouvre à droite du trône.</p><p>Une petite pièce contient 5 coffres.</p><p>Celui qui vous fait face est ouvert et vous y voyez un brassard magnifiquement ouvragé. il est impeccable sans aucune trace de poussière ou de rayures.<strong>\_</strong></p><p>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.5Uuj47G7huY5efth]{Brassard elfique}</p></div><div class=\"sallemj\"><p><strong>Notes pour le MJs :</strong></p><ul><li><p>Les autres coffres contiennent une multitude d'objets plus ou moins intéressants<strong>\_</strong>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.NmSmEWRYYB2ptNq9]{Salle secrète du Temple}</p></li><li><p></p><img src=\"modules/cof2ta_reliques_union/assets/ru_objets/divers/machine_du_val_rouge.webp\" width=\"100\" height=\"100\" /><p>L'un des coffre est très bizarre. Lorsque vous l'ouvrez vous voyez une machinerie complexe. Des trous, des manivelles, des boutons, des outils bien rangés dans des emplacements dédiés… Sur certaines pièces des runes complexes sont inscrites. Un carnet est glissé le long de la paroi de droite et contient de nombreuses images expliquant le fonctionnement de cette machine.<strong>\_</strong>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.al3lObh0ecGgElon]{Machine du Val Rouge}</p></li></ul></div><div><div class=\"salleplus\"><p><strong>Plus :</strong></p><p>Si une personne équipe les bracelets de l'Union :<strong>\_cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.YMvNXs6462PccvNn]{Le Bracelet de l'Union}</strong></p></div></div></div>"
