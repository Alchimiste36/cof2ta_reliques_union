    text:
      format: 1
      content: >-
        <p><span style="font-family:hobo">Le père du seigneur Mieili, <strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold">Arbosk’char,
        est encore très influent dans la ville</strong>. Les <strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold">trois
        fils et deux filles du seigneur (entre 15 ans et 37 ans) ont chacun une
        place dans la gestion de la ville</strong>. <strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold">Le
        seigneur est respecté</strong> par la population même si certains lui
        reproche son inaction, sa passivité et son manque de changement ou
        d’ambition. <strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold">Huit
        familles de nobles</strong> se partagent les intérêts de la ville et
        différents points de sa gestion. Il y a peu de conflit car chacun a sa
        place et son rôle. A chaque décès de seigneur, des tensions et des
        luttes de pouvoir apparaissent sans changer fondamentalement le
        quotidien des habitants. Politiquement parlant <strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold">seul
        trois sujets secouent la tranquillité traditionnelle</strong> de la
        ville : </span><span style="text-decoration:underline"><span
        style="font-family:hobo"><strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold"><span
        style="text-decoration:underline">le racisme envers les anciennes
        races</span></strong></span></span><span style="font-family:hobo"> tout
        droit venu des Marches du Venkor et s’essaimant petit à petit dans la
        ville, </span><span style="text-decoration:underline"><span
        style="font-family:hobo"><strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold"><span
        style="text-decoration:underline">le désir de certains de faire
        prospérer la ville</span></strong></span></span><span
        style="font-family:hobo"> alors que d’autres préfèrent ne rien changer
        et enfin, </span><span style="text-decoration:underline"><span
        style="font-family:hobo"><strong
        style="box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold"><span
        style="text-decoration:underline">les problèmes des « Ombres Blanches »
        et de la sécurité des montagnes</span></strong></span></span><span
        style="font-family:hobo">. Sur ce dernier sujet certains veulent
        reprendre le pouvoir sur la montagne en faisant venir une armée de
        guerriers pour éradiquer cette menace une bonne fois pour toute tandis
        que d’autres parlent de l’esprit de la montagne et de ne pas aggraver la
        situation en amplifiant l’influence des humains sur l’équilibre des
        énergies de la montagne.</span></p><p></p>
