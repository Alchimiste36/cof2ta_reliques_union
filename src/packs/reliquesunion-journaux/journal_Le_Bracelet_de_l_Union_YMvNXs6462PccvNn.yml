name: Le Bracelet de l'Union
_id: YMvNXs6462PccvNn
pages:
  - sort: 100000
    name: Description
    type: text
    _id: pW9ujS5jVAO2wr5H
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Le @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.5Uuj47G7huY5efth]{Brassard elfique}, trouvé dans le Temple du Val Rouge, possède une légère vibration magique. </p><p>Lorsqu’on l’étudie, on comprend que c’est un  @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.P5PMiQW41aP28vb4]{Brassard de culture elfique} permettant d’obtenir un grand\_savoir sur ce peuple.</p><section class=\"secret\" id=\"secret-eyMtzG8OIBsdVQtd\"><div class=\"sallemj\"><p>La véritable magie de la relique est bien cachée car elle vient surtout des deux personnalités qui sont emprisonnées dedans.</p><p>Pour résumer, la première personnalité est une elfe blanche de nom de Faïlass qui souhaite apporter paix, cohésion, rencontre et apaisement entre les peuples des Terres d'Arran. Pacifiste et humaniste, Faïlass est l'une des Cinq Doigts de l'Union.</p><p>La deuxième personnalité antagoniste se nomme Ramell. C'était un humain avant de devenir un démon immortel. Il a propagé des théories racialistes et ségrégationnistes pronant la supériosité du peuple humain sur les \"Races Inertes\" comme il les nomme. Il a corrompu les Reliques de l'Union avant d'être emprisonné par l'Ordre de l'Union dans un cercueil scellé dans les caves du Manoir Écarlate à Kosland. Depuis quelques dizaines d'années, il a réussi à s'échapper et il aimerait bien mettre la main sur les cinq reliques pour développer ses plans de suprématie. Le groupe de PJ découvriront bien plus tard que Ramell a manipulé Amanori Bellara et Hisp Galik dans leur entreprise de souission des Peaux Vertes.</p><p>Le bracelet de l’Union est un artefact\_extrêmement puissant qui peut être utilisé pour\_émanciper, souder et diriger les elfes en canalisant\_les motivations et en inspirant l’espoir et la passion, si le porteur est guidé par Faïlass et réalise de \"bonnes actions\" envers les elfes et les peuples.</p><p>Si le porteur cède aux manipulations et aux théories de Ramelle, le Bracelet de l'Union peut être aussi utilisé pour manipuler, soumettre et\_asseoir sa domination sur les elfes en leur inspirant de\_la peur ou du désespoir.</p><hr /><p>Le porteur du Bracet de l'Union ne pourra pas le retirer sans périr sauf s'il découvre le rituel des Cinq Doigts de l'Union qu'il faut réaliser avec les quatre autres porteurs.</p><p>A la mort du Porteur, le Bracelet de l'Union met 2d6 heures avant de se détacher de l'avant-bras du porteur s'il n'est pas activé. S'il a été activé par le porteur, le Bracelet de l'Union mettre [rang]d4 jours pour se détacher du porteur.</p></div></section><p></p><p> </p>"
