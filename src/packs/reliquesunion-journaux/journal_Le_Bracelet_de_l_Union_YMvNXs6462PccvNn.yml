  - sort: 300000
    name: Effets du Bracelet
    type: text
    _id: 32NfjzrUEYzotzzn
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Le porteur a de nouvelles \"connaissances\" sur le peuple elfique des Terres d'Arran. </p><p>Il connait :</p><ul><li><p><strong>Toutes les langues et patois elfiques</strong>. Il peut les\_lire, les écrire et les parler.</p></li><li><p><strong>Les grandes lignes de l’histoire des elfes</strong>, les\_personnalités importantes, les légendes pas trop\_enfouies de ce peuple</p></li><li><p><strong>Les traditions et rituels classiques ou communs\_des elfes</strong> des différents lieux des Terres d’Arran</p></li><li><p><strong>Les expressions et «bonnes manières»</strong> des\_différentes cultures elfiques</p></li></ul><p>Ces connaissent donne <strong>un bonus de +10 à tous les test d'INT relatives à de la culture générale elfique.</strong></p><p>Le porteur <strong>ne peut pas vraiment activement fouiller\_dans ses connaissances elfiques</strong>. Il réagit instinctivement lorsqu’il doit utiliser ces savoirs.</p><p><em>Par exemple, lorsqu’il trouve un texte écrit dans un\_ancien dialecte elfique (comme le pendentif), il arrive\_à lire sans problème les mots et les phrases. Lorsqu’il\_interagit avec un elfe, il connait d’instinct les gestes et\_formules de politesse. Lorsqu’il entend le nom d’un\_personnage historique de la culture elfique, il sait\_directement les grandes lignes de son histoire et de\_ses actions.</em></p><hr /><p>De plus, <strong>le Bracelet offre au porteur un pouvoir d'attraction envers les elfes</strong>. Une sensation de confiance ou de respect englobe le porteur face aux elfes mais aussi légèrement avec les autres peuples.</p><p>Le porteur gagne <strong>un bonus de +5 à tous\_ces tests de CHARISME lorsqu’il interagit avec des\_elfes</strong>. Ce bonus est de <strong>+2 face aux autres races</strong>.</p><p></p>"
