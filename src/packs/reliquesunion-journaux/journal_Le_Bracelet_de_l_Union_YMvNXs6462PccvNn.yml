  - sort: 500000
    name: Dévotion / Fanatisme
    type: text
    _id: M4DTHQltqPOYw3xw
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>A partir du moment où le Bracelet de l'Union est activé, <strong>le porteur reçoit une jauge qui est ajustée en fonction de ses actions et motivations.</strong></p><p>Les pouvoirs des rangs obtenus par le porteur qui sont <strong>du côté où penche la jauge de Dévotion/Fanatisme seront plus puissants</strong> que ceux de l'autre côté.</p><p>De plus, <strong>si la jauge augmente beaucoup d'un côté au détriment de l'autre, le porteur sera plus facilement \"manipulé\"</strong> par la personnalité associée. </p><ul><li><p>Ainsi, un porteur auyant une jauge élevée en Dévotion sera facilement empêché dans certaines actions par Faïlass. Elle pourra l'empêcher de se défendre face à un danger, l'obliger à venir en aide à une personne que le porteur croise dans une rue, faire un grand discours devant des inconnus pour apporter la paix et la sérénité…</p></li><li><p>Si le porteur à une jauge qui penche fortement en Fanatisme sera facilement poussé par Ramell a comettre des actes violents envers les elfes ou les autres races anciennes, à mentir sans raisons, à intimider ou se moquer d'un passant, de se sentir supérieur ou meilleur devant un représentant d'une race ancienne, à torturer ou maltraiter…</p></li></ul><h2>Dévotion</h2><p><strong>La jauge se décale vers la Dévotion par les \"bonnes\" actions réalisées auprès des elfes et grâce aux motications humanistes et pacifistes du porteur.</strong>\_</p><p>Lorsque le porteur entretien une relation de confiance, aide, soutien, sauve… un elfe, sa jauge se décale vers la Dévotion.</p><p>De même, lorsqu'il applique les conseils de Faïlass, la personnalité elfique dans le Bracelet, ou change de point de vue pour se rapprocher du sien, sa jauge augmente vers la Dévotion.</p><h2>Fanatisme</h2><p><strong>La jauge se décale vers le Fanatisme lorsque le porteur fait du mal, lorsqu'il manipule, lorsqu'il trahi, lorsqu'il embrouille… un elfe ou un semi-elfe.</strong></p><p>Lorsque le porteur a des pensées racistes, oppressives, dégradante… envers un elfe, sa jauge se déplace vers le Fanatisme.</p><p>De plus, si le porteur applique les conseil de Ramell, le démon corrupteur des reliques, s'énerve à cause de lui ou se laisse convaincre par lui, sa jauge augmente vers le Fanatisme.</p><h2>Nombre de points</h2><p><strong>Le MJ peut estimer l'impact de l'action, de la réflexion ou des motivations du porteur pour décaler la jauge de plus ou moins de points d'un côté ou de l'autre.</strong></p><p>Le nombre de point gagné d'un côté ou de l'autre <strong>peut varié de 1 à 10 points</strong>. Exceptionnellement, si le porteur fait une action incroyable vers le Fanatisme ou la Dévotion, il pourra gagner plus de 10 points d'un coup.</p><h2>Utilisation des pouvoirs</h2><p><strong>Chaque utilisation d'un pouvoir du Bracelet donne des points de Dévotion ou de Fanatisme au porteur. Le nombre de point gagné est égale à [rang x2] points.</strong></p><p><em>Ainsi, l'utilisation de Télépathie du rang 1 donne 2 points de Dévotion au porteur.</em></p><p>Le MJ pourra estimer que l'utilisation d'un pouvoir n'a pas réellement eu d'effet sur un elfe et pourra ne pas faire évoluer la jauge ou au contraire que l'utilisation d'un pouvoir a eu un effet très important et doubler, par exemple, le nombre de points obtenus.</p><p></p>"
