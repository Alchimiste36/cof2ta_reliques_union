  - sort: 200000
    name: Équiper le Bracelet
    type: text
    _id: xH9AtN2i4GZdPOZm
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>En aucun cas un elfe ou un semi-elfe ne pourra porter le Bracelet de l'Union. Les Cinq Doigts de l'Union ont fait en sorte, bien malgré eux, d'empêcher le représentant d'un peuple d'avoir un pouvoir aussi grand sur les membres de son propre peuple. Cela oblige les porteurs a travailler ensemble.</p><h2>Si un elfe ou semi-elfe équipe le Bracelet\_</h2><p>La personne doit faire un test de CHA 25 au moment de glisser le\_@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.5Uuj47G7huY5efth]{Brassard elfique} autour de son avant-bras.</p><h3>Réussite :</h3><ul><li><p><strong>1d6+1 DM psychique par tour</strong> tant que le Bracelet de l’Union\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">est porté</span></p></li><li><p><strong>Migraine forte (-4 INT et CHA) pendant 1d10 heures</strong> après\_retrait des bracelets</p></li><li><p><strong>des cauchemars et angoisses harcèlent la personne pendant\_1d4 jours par round équipé</strong> (aucun PR récupéré par nuit de\_sommeil).</p></li></ul><h3>Échec :</h3><ul><li><p><strong>Tombe immédiatement inconscient</strong></p></li><li><p><strong>Perte de 2 points de CHA permanent même après retrait du Bracelet</strong></p></li><li><p><strong>Inconscient 4d10 heures après retrait</strong> du bracelet</p></li><li><p><strong>Traumatisme</strong> (cauchemars, peurs, angoisses…) <strong>pendant 4d10\_jours</strong> (aucun PR récupéré par nuit de sommeil).</p></li></ul><h2>Si un autre peuple équipe le Bracelet</h2><p>Lorsqu’il est équipé, il se fonde à l’avant-bras du\_porteur. il s’accroche sans pouvoir le retirer. Une\_vibration et une énergie parcourt le porteur et déverse une multitude d’informations sur la culture elfique dans l’esprit du porteur (les langues et patois,\_les écritures, l’histoire et les légendes, les expressions,\_les rituels les plus communs…).</p><p>Le porteur ressent que le Bracelet souhaite être\_activé sans savoir exactement son rôle. La possibilité\_et l’envie d’asservir chaque elfe des Terres d’Arran ou\_devenir un phare d’espoir, de joie et d’émancipation\_pour ce peuple.</p><p>Cette transe dure environ une minute et les témoins de la scène voient le porteur crispé, totalement tendu,\_les yeux révulsés et parcouru de tremblements.</p><p>Sans douleur, cet événement est juste très perturbant pour le nouveau porteur.</p>"
