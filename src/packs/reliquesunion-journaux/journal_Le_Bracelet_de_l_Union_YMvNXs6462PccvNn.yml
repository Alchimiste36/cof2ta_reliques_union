  - sort: 400000
    name: Activer le Bracelet
    type: text
    _id: HVECw0itFGVxX9ME
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Il n'y a que deux manières d'Activer le Bracelet de l'Union :\_\_</p><p><strong>La première est de tuer volontairement ou non un elfe ou un semi-elfe.</strong> <strong>La\_seconde est de venir en aide directement à un elfe\_sans ambition personnelle ou en «charmant» un elfe\_sans manipulation.</strong> Le porteur ou les PJs peuvent\_faire toutes les expériences différentes qu’ils souhaitent pour\_activer le Bracelet sans succès.</p><ul><li><p>Si le porteur tue un elfe pour activer\_le Bracelet de l’Union, il active la relique, obtient le rang 1 de la voie associée et partira\_avec 10 points de FANATISME.</p></li><li><p>Si le porteur sauve ou charme un elfe,  il active la relique, obtient le rang 1 de la voie associée et il gagnera automatiquement 10 points de DÉVOTION.</p></li></ul><p>Au moment où l'acte est fait, le joueur a exactement une minute pour réagir\_avant que le Bracelet ne s’active définitivement.\_</p><h2>Description pour le Porteur seulement :</h2><blockquote><p>Tu ressens une large énergie qui rempli chaque\_cellule de ton corps. Tu sens comme-ci le bracelet se\_fondait dans ton bras et montait vers tes épaules. Tu\_ne peux plus bouger et tu te crispes, les poings serrés,\_lorsque tu sens que les pulsations se divisent à l’intérieur de toi.\_</p><p>Une vague remonte vers ta tête et entoure ton\_cerveau et l’autre descend droit vers ton cœur. Elle\_s’infiltre dedans. La sensation ne fait pas mal du\_tout mais c’est très perturbant. Tu as l’impression de\_rester ainsi au moins une heure entre impuissance et\_sentiment d’unité. Des mots et des phrases elfiques te\_passent dans l’esprit et tu les comprend parfaitement\_sans pouvoir t’en souvenir précisément.\_</p><p>Dans ton cœur, tu sens une nouvelle capacité\_pour parler avec des elfes par la pensée et dans ton\_esprit, tu sais que tu es capable d’utiliser un pouvoir\_te permettant de lire les pensées des elfes contre\_leur volonté. Le Bracelet te transmet une sensation\_divisée entre son enthousiasme d’être activé et son\_envie de se développer encore plus.</p><p>Lorsque que le flot d’énergie commence à diminuer,\_tu reprends conscience de ton corps encore immobile\_et tu commences à pouvoir bouger petit à petit et à\_voir ce qui t’entoure.</p></blockquote><h2>Description pour les PJs\_qui voient la scène</h2><blockquote><p>Vous voyez votre compagnon qui serre les\_poings et les avant-bras. Il les tend vers le bas\_et se dresse entièrement droit, les yeux fermés comme\_une statue. Il est totalement immobile comme\_paralysé mais vous ressentez des vagues d’énergie\_qui le parcours. Vous voyez les vêtements autour du\_<span style=\"color:var(--color-text-primary);font-size:var(--font-size-14);font-family:var(--font-body)\">Bracelet de l’Union qui fondent tandis que le bracelet\_</span>se resserrent autour de son avant-bras. Il se soude à\_sa peau et ressemble presque à un tatouage.</p><p>Il reste ainsi pendant environ deux minutes puis\_ses mains se décrispent, son corps se détend et ses\_yeux s’ouvrent. Une légère lueur verte passe sur le\_fond de ses pupilles avant de disparaitre. Seul un «ha\_!» de soulagement sort de sa bouche.\_</p></blockquote><p>Maintenant que le Bracelet de l’Union est activé\_seule le décès du Porteur pourra le retirer. Il avait déjà\_accès au pouvoir passif du Bracelet et maintenant, le\_porteur comprend qu’un nouveau pouvoir s’offre à lui\_pour lire les pensées des Elfes ou user de télépathie\_avec les représentants de ce peuple. Le joueur pourra\_débloquer les différents pouvoirs du Bracelet au fur et\_à mesure de son utilisation.</p>"
