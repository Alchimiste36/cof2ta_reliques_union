            system:
              key: passe-partout
              description: >-
                <p>De nombreuses portes sont de conception similaire et se
                d&eacute;verrouillent donc avec une m&ecirc;me cl&eacute;. Le
                passe-partout peut &ecirc;tre utilis&eacute; sur toutes les
                serrures standards &agrave; cl&eacute;, m&ecirc;me si le
                personnage n'a pas la comp&eacute;tence Filouterie. Il utilise
                le bonus de Fikouterie de +10 du passe-partout plut&ocirc;t que
                son propre bonus.</p>

                <p>Il ne peut pas faire 10 en utilisant un passe-partout.</p>

                <p>Avec le passe-partout, on ne peut faire qu'un seul jet par
                serrure. Si le jet est rat&eacute;, la cl&eacute; ne peut pas
                verrouiller ou d&eacute;verrouiller la serrure.</p>

                <p>Il arrive que les passe-partout inf&eacute;rieurs n'offrent
                qu'un bonus de +5.</p>
