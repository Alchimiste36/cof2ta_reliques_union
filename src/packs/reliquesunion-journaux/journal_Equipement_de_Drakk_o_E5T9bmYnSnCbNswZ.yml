          kLea0VaOaDDRmbxl:
            name: Menottes
            type: item
            img: >-
              https://assets.forge-vtt.com/bazaar/core/icons/containers/chest/chest-small-gold-cherry.webp
            system:
              key: menottes
              description: >-
                <p>Ces menottes permettent d'attacher une cr&eacute;ature de
                taille M.</p>

                <p>Une cr&eacute;ature menott&eacute;e peut utiliser la
                comp&eacute;tence &Eacute;vasion pour se d&eacute;gager (DD 30
                ou DD 35 pour les menottes de ma&icirc;tre).Il faut
                r&eacute;ussir un test de Force pour briser les menottes (DD 26,
                ou DD 28 pour les menottes de ma&icirc;tre). Les menottes ont
                une solidit&eacute; de 10 et 10 points de vie.</p>

                <p>La plupart des menottes ont une serrure. Rajoutez le
                co&ucirc;t de la serrure pour avoir le prix des menottes.</p>

                <p>Pour le m&ecirc;me prix, le personnage peut acheter des
                menottes adapt&eacute;es &agrave; une cr&eacute;ature de taille
                P. Pour une cr&eacute;ature de taille G, les menottes
                co&ucirc;tent 10 fois le prix indiqu&eacute; et pour une
                cr&eacute;ature de taille TG, elles co&ucirc;tent 100 fois le
                prix indiqu&eacute;. Les cr&eacute;atures de taille Gig, C, TP,
                Min ou I ne peuvent &ecirc;tre attach&eacute;es qu'avec des
                menottes fabriqu&eacute;es sp&eacute;cialement, ce qui
                co&ucirc;te au moins 100 fois le prix indiqu&eacute;.</p>
