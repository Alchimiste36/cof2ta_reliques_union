          eWh27Ke4e8ty2vf0:
            name: Tuba
            type: item
            img: >-
              https://assets.forge-vtt.com/bazaar/core/icons/containers/chest/chest-small-gold-cherry.webp
            system:
              key: tuba
              description: >-
                <p>L'une des extr&eacute;mit&eacute;s de ce tube en bois
                &eacute;tanche est recourb&eacute;e et pourvue d'un embout pour
                la bouche. Lorsque le personnage place l'embout dans la bouche,
                le tube se prolonge vers l'arri&egrave;re de sa t&ecirc;te, ce
                qui lui permet de respirer ind&eacute;finiment lorsqu'il nage
                face vers le fond, juste sous la surface.</p>

                <p>Si le personnage immerge le bout libre du tuba, il se remplit
                d'eau et ne permet plus de respirer tant qu'il n'a pas
                &eacute;t&eacute; vid&eacute; de son eau (ce qui
                n&eacute;cessite une action Limit&eacute; et un acc&egrave;s
                &agrave; l'air libre).</p>

                <p>Un tuba fait g&eacute;n&eacute;ralement 38 centim&egrave;tres
                de long, s'il est moins long, il se remplit
                g&eacute;n&eacute;ralement d'eau lorsque le personnage est sous
                l'eau, mais s'il est plus long, le personnage ne fait pas
                circuler suffisamment d'air frais pour que le tuba soit
                efficace.<br><br><strong><em>Tuba de
                ma&icirc;tre.</em>&nbsp;</strong>Le tuba de ma&icirc;tre est
                pourvu d'une valve &agrave; son sommet pour emp&ecirc;cher l'eau
                d'y entrer et prot&eacute;geant le personnage des
                &eacute;claboussures ou lorsqu'il plonge. Il comporte
                &eacute;galement une purge et une valve au niveau de la bouche,
                emp&ecirc;chant l'eau d'atteindre la bouche et drainant
                automatiquement l'exc&egrave;s d'eau lorsque le personnage
                refait surface.</p>
              source: PF
