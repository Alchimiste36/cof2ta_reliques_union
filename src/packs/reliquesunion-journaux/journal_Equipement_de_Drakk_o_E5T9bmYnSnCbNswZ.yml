          kFEt8x3OlAveWtaC:
            folder: IgzU7sOFj0GK4r31
            name: Baume de Résistance au Froid
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/04.ICONES/ICONES%20de%20Base/CONSOMMABLES/POTIONS/potion-jar-corked-glowing-blue.webp
            _id: kFEt8x3OlAveWtaC
            system:
              key: baume-de-resistance-au-froid
              description: >-
                <p>Ce baume, &agrave; la consistance d'une huile onctueuse, est
                obtenue gr&acirc;ce au m&eacute;lange pr&eacute;cis de plusieurs
                plantes m&eacute;dicinales.</p>

                <p>Lorsque l'on applique cette huile sur la peau, en
                majorit&eacute; sur les extr&eacute;mit&eacute;s, <strong>une
                sensations de chaleur parcours le corps et la peau.</strong>
                Sans douleur ni d&eacute;sagr&eacute;ment, cette huile permet de
                r&eacute;sister plus longtemps aux temp&eacute;ratures froide
                des hautes montagnes ou permet de manipuler des mat&eacute;riaux
                tr&egrave;s froid sans risque de blessures, gelures ou effet
                collant.</p>

                <p>Ce baume est souvent utilis&eacute; par les explorateur,
                chasseurs ou voyageurs parcourant les sommets enneig&eacute;s ou
                lors de situations climatiques extr&ecirc;mes.</p>

                <p>&nbsp;</p>

                <p><strong>Une dose de baume permet de se prot&eacute;ger du
                froid pendant 24h en cumul&eacute;</strong> ou plus si on
                choisit m&eacute;ticuleusement certaines zones du corps
                (seulement les mains et orteils par exemple).</p>
              source: Lana'Sir
