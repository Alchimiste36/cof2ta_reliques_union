          6G954DNQqfHmdB0T:
            folder: hdmFAaSkU07SBH6I
            name: Laisser-Passer de la Grande Route de l'Ourann
            type: item
            img: >-
              https://assets.forge-vtt.com/bazaar/core/icons/equipment/shield/round-wooden-axe-brown.webp
            _id: 6G954DNQqfHmdB0T
            system:
              key: liasser-passer-de-la-grande-route-de-lourann
              description: >-
                <p>Cette broche en forme de bouclier est marqu&eacute; d'une
                hache blanche sur fond jaune.</p>

                <p>C'est une marque permettant d'utiliser la Grande Rouute de
                l'Ourann en respectant les r&egrave;gles.</p>

                <p>&nbsp;</p>

                <ol data-pm-slice="3 3
                [&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;arran-mod&quot;}},&quot;div&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;discussion&quot;}}]">

                <li>

                <p>Laissez les travailleurs travailler est la r&egrave;gle
                premi&egrave;re. Tout au long de la route des postes de gardes
                et d'observation vous tiennent &agrave; l'oeil et prot&egrave;ge
                la voie.</p>

                </li>

                <li>

                <p>Portez TOUJOURS votre laisser passer apparent sur vous ou
                votre monture. Si un garde doit vous arr&ecirc;ter car il n'a
                pas vu votre laisser passer, vous devrez payer.</p>

                </li>

                <li>

                <p>R&eacute;guli&egrave;rement vous trouverez des tente portant
                un blason jaune &agrave; l'entr&eacute;e. Vous pourrez vous
                reposer et manger dedans ou aux alentours proches.</p>

                </li>

                <li>

                <p>Il est strictement interdit de s'arr&ecirc;ter sur la voie
                centrale et on se range &agrave; droite si on se fait rattraper
                par une caravane ou un cavalier.</p>

                </li>

                <li>

                <p>Tous les conflits entre usagers devront &ecirc;tre
                signal&eacute;s et statuer par des Gardes de la Grande Route.
                Aucune justice ne saurai &ecirc;tre rendu par les usagers.</p>

                </li>

                <li>

                <p>A chaque fois que vous quitterez la Grande Route, vous devrez
                rendre votre laisser passer &agrave; un poste de garde.</p>

                </li>

                </ol>
              source: Lana'Sir
              moduleData:
