      content: >-
        <h2>Retour Mouvementé à la Cité d'Ispier</h2><div
        class="arran-mod"><table><tbody><tr><td><p><span
        style="font-family:Bookinsanity"><em>Le voyage de retour à la cité se
        passe sans problème à travers la forêt piétinée et ravagée par les
        troupes d'humains. Des chemins sont praticables et au bout de 6h de
        marche, vous atteignez l'orée de la Forêt du Val Rouge. Loin au nord,
        vous apercevez la fumée venant de la Cité d'Ispier. De nombreuses
        souches sont visibles autour de vous, là où les bucherons ont récolté
        les arbres de la forêt.</em></span></p><p></p><p><span
        style="font-family:Bookinsanity"><em>Il vous faut encore une
        demi-journée de marche pour atteindre les murailles de la
        cité.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Lorsque vous arrivez à quelques
        mètres des portes extérieures de la Cité, un groupe de marchands
        pointent Maana du doigt et se rapproche de votre groupe à grands pas
        sortant de leur chariot des pelles, bâtons ou encore couteaux. Grâce à
        leur cris et leurs invectives, les gardes positionnés devant les grandes
        portes sortent leurs lances et se rapprochent presque au pas de course
        pour se positionner entre vous et les
        marchands.</em></span></p><p></p><p><span
        style="font-family:Bookinsanity"><em>"A l'assassin !" - "sale elfe puant
        !" - "traitre" - "enculés" - "en voilà un à mettre au bout d'une corde
        !" - "la garde va vous tabasser la tronche, amis des elfes
        !"</em></span></p><p><span style="font-family:Bookinsanity"><em>La
        tension est très forte et les 8 soldats ont bien du mal à calmer le
        petit groupe qui grossit au fur et à mesure que les passants se
        rajoutent à cette
        colère.</em></span></p></td></tr></tbody></table><p></p><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Si les PJs se la jouent diplomates
        :</span></strong></span></p><table><tbody><tr><td><p><span
        style="font-family:Bookinsanity"><em>Les gardes vous encerclent et vous
        font passer les portes de la ville. L'un des gardes part en courant
        comme si la mort était à ses trousses dans les rues de la ville. Ils
        mettent des coups sur les villageois les plus vindicatifs et violents,
        ils cassent quelques nez et dents au passage et mètre après mètres vous
        arrivez devant les portes du château de la Cité
        d'Ispier.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Dès que vous passez les portes du
        Château vous voyez le Seigneur Bonarion avec un regard sévère et le
        soldat qui a couru derrière lui qui reprend son souffle. Les gardes
        ferment la porte, se retournent vers vous et baissent leurs lances dans
        votre direction.</em></span></p><div
        class="discussion"><p><strong>JASPAR : </strong><span
        style="font-family:Bookinsanity"><strong>Que se passe-t-il ici ? Où est
        ma fille ? et pourquoi avez-vous pactisé avec cette raclure d'elfe
        Sylvain après tout ce qu'ils ont fait à mon peuple ? Soyez bref et clair
        si vous ne voulez pas finir au fer
        !</strong></span></p></div></td></tr></tbody></table><ul><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">S'ils expliquent clairement la
        situation :</span></strong></span></p></li></ul><p>Ils seront escortés
        dans la salle du trône où ils pourront compléter l'histoire et retrouver
        la confiance du Seigneur. Dans ce cas-là retournez sur le chapitre :
        <strong>@UUID[JournalEntry.J453aB89IcdZdngl]{Retour à la Cité
        d'Ispier}</strong></p><p></p><ul><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">S'ils racontent des conneries, ne sont
        pas clairs ou sont impertinents
        :</span></strong></span></p></li></ul><p>Jaspar ordonne qu'on les
        mettent aux arrêts jusqu'au retour de Lana'Sir à la Cité.</p><p>En
        voyant la Ceinture de Communication de Lana'Sir sur les PJs, Jaspar
        pensera qu'elle est morte et que les PJs y sont pour quelque chose. Ils
        seront tous emprisonnés en sous-vêtements dans la prison du Château et
        ils n'auront plus de nouvelles de Maana. Ce dernier sera torturé et
        succombera à ses blessures avant le retour de la Dame
        d'Honneur.</p></div><div class="arran-mod"><p>20 jours plus tard, alors
        qu'ils pourrissent en prison, ils reçoivent la visite de Lana'Sir qui
        vient les libérer et les convier à une audience avec elle et son père.
        Elle semble particulièrement énervée et une pointe de tristesse est
        encore visible sur ces traits.</p><p>Lana'Sir a raconté ce qu'il s'est
        passé à son père. Elle a laissé les survivant dans la Cité de Lavoise à
        l'école Rosna pour leur protection. Elle a fouillé les affaires des PJs
        et ne comprend pas pourquoi ils ne l'ont pas prévenu de leur
        trouvailles.</p><p>Il faudra trouver un moyen de les réintégrer dans le
        fil de la Campagne malgré leur échec apparent.</p><p></p></div><div
        class="arran-mod"><h3></h3></div>
