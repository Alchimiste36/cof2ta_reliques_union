              description: >-
                <p style="text-align:
                justify;">La&nbsp;<strong>lance&nbsp;</strong>est une arme
                interm&eacute;diaire entre un &eacute;pieu et une pique.
                Pr&eacute;vue pour un usage &agrave; deux mains, elle est
                suffisamment l&eacute;g&egrave;re pour &ecirc;tre mani&eacute;e
                &agrave; une seule main, permettant le port d&rsquo;un bouclier
                par exemple. Ses&nbsp;<strong>DM</strong>&nbsp;passent alors
                &agrave; 1d6.</p>

                <p style="text-align: justify;">Enfin, il est possible de
                l&rsquo;utiliser comme une arme de jet mortelle &agrave; courte
                port&eacute;e, mais utilis&eacute;e dans ces conditions, elle
                impose un malus au test d&rsquo;attaque &agrave; distance de
                -3.</p>
