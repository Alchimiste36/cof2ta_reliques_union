      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Mes chers amis, sauveurs de la dame d’honneur et héros de la
        cité d’Ispier,</strong></p><p class="MsoNormal"
        style="tab-stops:262.2pt">Mes pensées se tournent souvent vers vous où
        que vous soyez car je sais dans chaque partie de mon corps que vous
        mettez beaucoup d’énergie à la lourde mission que la destinée à mise sur
        votre parcours.</p><p class="MsoNormal"
        style="tab-stops:262.2pt">J’espère sincèrement que, malgré les dangers
        et l’impératif de trouver les reliques de l’Union, vous savez trouver
        sur votre chemin des touches de bonheur, de plaisir et que vous faites
        de belles rencontres.</p><p></p><p class="MsoNormal"
        style="tab-stops:262.2pt">De mon côté, les vieilles tensions entre les
        elfes et les humains ressurgissent petit à petit et il est difficile
        pour moi de limiter les idées nauséabondes que je vois et entends de
        plus en plus. Lana’Sir est très perturbée par les conflits qui percutent
        le chantier de reconstruction mais elle semble déçue et aigrie face à la
        bêtise des peuples et leur facilité à se détester.</p><p
        class="MsoNormal" style="tab-stops:262.2pt">Je souhaite de tout mon cœur
        que vous trouviez les Reliques de l’Union rapidement et que vous
        reveniez me voir afin que nous fêtions la réussite de votre mission
        comme il se doit. J’ai toute confiance en vous et je tiendrais mon rôle
        avec honneur et détermination tous les jours pour le bien des
        peuples.</p><p class="MsoNormal" style="tab-stops:262.2pt"></p><p
        class="MsoNormal" style="tab-stops:262.2pt">Avec toute mon amitié,</p><p
        class="MsoNormal" style="tab-stops:262.2pt"><strong>Laotissa Graine
        Dépeautre, Gardienne du Savoir et de l’Ordre de l’Union.</strong></p>
