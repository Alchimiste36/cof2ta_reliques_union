      content: "<h2>Acte 1 – le Val Rouge</h2><p><strong>Recrutés en secret par le seigneur Bonarion, les personnages doivent poursuivre un groupe d’elfes sylvains ayant kidnappé sa fille après une guerre entre les deux peuples.</strong> Accompagnés par le pisteur du seigneur, Borass Taer, persuadé de la menace des sylvains, ils parcourent les Grandes Plaines de l’Ourann, battues par les vents violents caractéristiques de cette région.</p><p><strong>Ils rattrapent les survivants avant leur arrivée dans la ville de Lavoise. Borass Taer ne cherche pas à faire de prisonniers, et l’attitude des aventuriers aura des conséquences importantes sur la confiance de Lana’Sir.</strong></p><p>Dans tous les cas, <strong>Lana’Sir, les survivants et les aventuriers iront jusqu’à Lavoise pour recevoir la protection de Falika Rosna</strong> dans son école d’érudits.</p><p>Enfin au calme, <strong>les PJ rencontrent la curieuse et pétillante Laotissa Graine Dépeautre</strong>. Fille de la défunte chaman des sylvains du Val Rouge, elle accorde sa confiance à ces étranges inconnus et leur confie une mission bien plus capitale pour les Terres d’Arran : <strong>retourner au village des elfes, ouvrir le Temple du Val Rouge — sans savoir comment —, récupérer un artefact ancien et dangereux afin qu’il ne tombe pas entre de mauvaises mains. Elle est persuadée que cette guerre absurde est liée à cet objet.</strong></p><hr /><p>Alors que Lana’Sir et les survivants elfes poursuivent vers la Cité d’Orkadia, <strong>les PJ se dirigent vers la forêt du Val Rouge</strong>. Le voyage est long mais relativement confortable sur la Grande Route Naine traversant l’Ourann.</p><p>Après quelques péripéties, ils se retrouvent dans le village dévasté des sylvains, au milieu de cadavres elfiques. Grâce à une vieille comptine d’enfance de Laotissa et à son pendentif, <strong>le groupe parvient à ouvrir le Temple du Val Rouge, au pied de l’Arbre-Mère.</strong></p><p>Abandonné depuis 962 années, <strong>les PJ mettront quelque temps à trouver le Bracelet de l’Union et à récupérer des informations importantes pour poursuivre leur quête</strong>.</p><p>À la sortie du Temple, accueillis par une équipe de mercenaires engagés par Hisp Galik, les PJ obtiennent une nouvelle preuve contre le magicien, retrouvée sur les cadavres des attaquants.</p><hr /><p>De retour à la Cité d’Ispier, en fonction des informations partagées avec le seigneur Bonarion, leur accueil sera plus ou moins chaleureux.</p><p><strong>Découvrant le départ précipité de Hisp Galik et racontant une partie de leur voyage au seigneur, l’apaisement reviendra progressivement dans la ville humaine et la vérité sur la conspiration du conseiller se propagera rapidement.</strong> Quelques investigations dans les appartements du mage, ainsi que l’étude des textes trouvés dans le Temple, permettront aux PJ d’obtenir de nombreuses informations sur les Reliques de l’Union et de mieux comprendre la situation.</p><p>Avant le retour à la Cité d’Ispier de Lana’Sir et de Laotissa, <strong>une fête est organisée</strong> pour apporter un vent de paix sur la ville humaine. Dans cette foule, en protégeant un elfe sylvain d’une bande de lascars venus se venger, <strong>le porteur du Bracelet de l’Union active par mégarde la Relique et découvre un aperçu de son pouvoir.</strong> Le porteur rencontre également les deux personnalités présentes dans l’artefact, ouvrant ainsi de nombreuses nouvelles questions.</p><p>Quelques jours plus tard, à son retour à Ispier, <strong>le discours de la Dame d’Honneur est sévère et sans détour.</strong> Elle reproche ouvertement aux habitants leur faiblesse face aux rumeurs et leur empressement à transformer la peur en haine. Elle accuse publiquement Hisp Galik d’avoir manipulé la cité, d’avoir attisé les tensions et d’avoir conduit les deux peuples à la guerre par mensonge et ambition personnelle.</p><p><strong>Elle révèle également l’existence d’un artefact ancien, lié aux événements récents, dont l’influence aurait pesé sur le conflit et dont la nature dépasse les simples rivalités politiques.</strong> Sans tout dévoiler, elle partage suffisamment d’informations pour rendre cette menace crédible aux yeux de tous.</p><p>La population, bouleversée par ces révélations, exprime une profonde reconnaissance envers les aventuriers, désormais nommés les Sauveurs de la Dame d’Honneur. Leur statut change : d’étrangers mandatés en secret, ils deviennent des figures publiques respectées par beaucoup.</p><p><strong>Cet épisode marque le début d’un bref intermède. Tandis que la cité tente de retrouver son équilibre et que la traque de Hisp Galik s’organise, les PJ disposent du temps nécessaire pour approfondir leurs découvertes faites au Temple du Val Rouge et mieux comprendre les implications des Reliques de l’Union</strong> — non sans attirer, peut-être, l’attention de ceux qui voudraient récupérer les reliques avant eux.</p><p>\_</p><h2>Acte 2 – Montagnes des Crocs d’Acier</h2><p>Grâce à la rencontre avec un Frère du Désespoir, Zagrenn, <strong>les PJ trouvent la clef vers la seconde relique. Un vieux conte enfantin crée un lien entre un village de centaures, un village nommé Arkanov et une ville perdue au milieu des Crocs d’Acier</strong>, chaîne de montagnes séparant l’Ourann de l’Ogrie et de la Birkanie.</p><p>Un nouveau voyage amène les aventuriers vers l’Est. Sur le chemin, ils entendent, dans les villages et les tavernes, leur propre histoire déformée par des exagérations, des romances inventées et des mensonges flagrants. Après quelques jours passés dans le Pays des Vents, ils atteignent le défilé étroit menant vers les sommets des Crocs d’Acier et commencent leur ascension vers la Vallée de Novrak.</p><hr /><p><strong>Ils seront pris pour cible à leur campement par un groupe venu de loin pour récupérer la relique. Il s’agit d’une Maille de la Toile Vivante, organisation discrète opérant dans l’ombre des conflits des Terres d’Arran.</strong></p><p>La Toile Vivante poursuit un objectif simple, mais à la moralité flottante : préserver l’équilibre du monde, quel qu’en soit le prix. Ses membres interviennent lorsqu’ils estiment qu’une situation risque de dégénérer en guerre ou en crise majeure, privilégiant l’efficacité à la justice et la stabilité à l’innocence.\_C’est à la suite des révélations publiques du discours de Lana’Sir que la Toile Vivante a eu vent de l’existence des PJ et des Reliques. Considérés comme un facteur potentiel de déséquilibre, les aventuriers deviennent une variable à évaluer.</p><p><strong>La rencontre peut tourner de plusieurs manières : tentative d’arrestation et d’interrogatoire, affrontement sans sommation, ou capture de membres de la Maille permettant d’obtenir quelques bribes d’informations.</strong> Alliée pragmatique ou obstacle supplémentaire, la Toile Vivante demeure une énigme dont les intentions véritables ne seront pas immédiatement révélées.</p><hr /><p><strong>Ils arrivent à la Vallée de Novrak, dans un village rude et isolé, et peuvent chercher Timaor Dunclin, le marchand du conte, afin d’obtenir des informations sur Arkanov</strong> et les centaures. À la rencontre des habitants, ils sont témoins d’un racisme rampant parmi eux et d’une forte tension causée par les attaques répétées des « Ombres Blanches », ces êtres qui tuent et capturent des habitants régulièrement.</p><p>Timaor, alcoolique miséreux, leur raconte son séjour dans un village de centaures trente ans auparavant et sa descente aux enfers lorsqu’il fut accusé de mensonges et de pacte avec des Peaux-Vertes. Quelques indications plus tard, et bien équipés pour parcourir les étendues glaciales des sommets enneigés, <strong>les PJ peuvent entamer les kilomètres qui les séparent d’Arkanov.</strong></p><hr /><p>À leur arrivée, au moment de leur première rencontre avec de grands et puissants centaures, ils sont emprisonnés dans une grotte au fond du village étonnamment tempéré. Sans langage commun, face à un peuple coupé du monde depuis toujours, <strong>les Sauveurs de la Dame d’Honneur passent plusieurs mois à obtenir la confiance de ces êtres droits et fiers.</strong></p><p>De nombreux événements viennent ponctuer un long intermède au milieu des centaures et des liens forts se créent entre les deux groupes. Les PJ découvrent les divergences entre les centaures voulant prendre le contrôle de leur région proche, ceux souhaitant rester dans ce paradis confiné et ceux voulant s’ouvrir sur le monde extérieur. Malgré l’intégration des aventuriers au village, aucun centaure ne se souvient du rôle premier de leur village : protéger et faire oublier la Ceinture de l’Union.</p><p><strong>Les semaines passent, ponctuées de moments de joie et de tension, jusqu’à une nuit sinistre durant laquelle les «\_Atarangi Kino\_» viennent kidnapper deux jeunes centaures du village. Les PJ font le lien avec les Ombres Blanches de la Vallée de Novrak et poursuivent les criminels dans les montagnes.</strong></p><hr /><p>Arrivés au pied d’une falaise, devant une entrée dissimulée, <strong>les PJ pénètrent dans la cité malsaine de Glanae’Reth</strong>. Peuplée d’elfes exsangues, dégénérés et pervertis par un système autoritaire et extrêmement violent, la cité est remplie d’esclaves de tous les peuples sous le joug de matrones sadiques. <strong>Au terme d’une exploration dangereuse et oppressante des longs couloirs de Glanae’Reth, les aventuriers seront capturés ou libèreront des dizaines d’esclaves, dont des centaures d’Arkanov.</strong></p><p>Que doivent-ils faire de cette cité désormais déserte et de ses captifs ? Est-ce prioritaire sur leur recherche de la Ceinture ? Un retour à Arkanov ne risquerait-il pas de révéler l’existence du village secret des centaures ?\_Autant de questions qui n’attendent que les décisions de héros libérateurs.</p><p>Dans tous les cas, <strong>ils finiront par découvrir la danse et le chant traditionnel à effectuer dans la salle de cérémonie d’Arkanov pour ouvrir la salle dissimulée qui renferme la Relique de l’Union.</strong></p><hr /><p>Avec un grand groupe de survivants des Ombres Blanches, après l’éradication de cette menace dans la région et une partie des centaures voulant enfin quitter leur village isolé, <strong>le retour à la Vallée de Novrak sera un choc pour cette ville où il ne se passe habituellement que peu de choses.</strong></p><p>Entre le bonheur de revoir des êtres chers kidnappés depuis longtemps, la joie d’apprendre que les Ombres Blanches sont détruites et la crainte de voir débarquer une bande de centaures, la ville humaine est tiraillée entre débats et émotions contradictoires. Le seigneur Arbosk tentera d’apaiser les tensions en convoquant une assemblée dans le grand amphithéâtre, où chaque habitant pourra s’exprimer sur la situation.</p><p>Rejet et racisme, acceptation et tolérance ou opportunisme et ambition : <strong>les PJ découvrent de nombreux courants de pensée, mais seront sûrement hostiles aux prises de parole des habitants les plus virulents et racistes.</strong> Derrière la figure charismatique du prêtre de Solima, Dertirn, les héros d’Ispier prennent une fois de plus conscience de cette vague ségrégationniste qui se propage chez les humains contre les anciennes races. Les théories suprémacistes de Ramell percuteront même les oreilles des PJ lorsqu’ils entendront l’expression caractéristique de « Races Inertes ».</p><p>À leur retour à la Vallée de Novrak, <strong>les PJ retrouvent Zagrenn, le Frère du Désespoir, apportant de nombreuses nouvelles inquiétantes sur son expédition en Ogrie à la recherche d’Amanori Bellara. D’après ses observations, elle rassemble des centaines de Peaux-Vertes qu’elle contrôle grâce au Plastron : une véritable armée d’esclaves et de fidèles en préparation.</strong> Aux dernières nouvelles, ils sont tous partis en direction des Rocs Exsangues. Zagrenn doit également se rendre au Nodrënn, où une grande menace semble émerger sur la banquise. Il remet aux PJ le fruit de ses recherches sur la Cité-forge d’Hyrr’Tarënn, leur permettant de localiser la relique des nains.</p><p>Si les PJ restent quelques jours dans la Vallée de Novrak, <strong>ils pourront aider la population face à une violente attaque d’Hisp Galik, désireux d’éliminer les aventuriers et de récupérer les Reliques ainsi que leurs informations.</strong> S’ils partent précipitamment, la ville sera lourdement impactée par l’offensive du nécromancien et de ses combattants Peaux-Vertes.</p><p>Le départ des aventuriers de la Vallée de Novrak marque la fin de l’Acte 2 et leur départ vers Lavoise et la mythique cite-forge d'Hyrr'Tarënn.</p><p>\_</p><h2>Acte 3 – La cité-forge d'Hyrr’Tarënn</h2><p>Après quelques recherches et un long voyage, <strong>les PJ découvrent une immense statue de nain en armure, à quelques kilomètres de Lavoise</strong>, les pieds plongés dans les profondeurs du fleuve Qolos. L’entrée de la Cité-forge d’Hyrr’Tarënn, joyau oublié de la civilisation naine, se trouve immergée au niveau de la cheville de la statue. Parvenant à entrer, <strong>ils découvrent une immense cité abandonnée, perdue dans les légendes</strong>.</p><p><strong>Soumise à la malédiction de Dax’Ax’Revm, le démon mangeur de rêves, les habitants de la cité ont fui à cause des violences et des troubles insufflés par la créature.</strong> L’exploration se révèle dangereuse et psychologiquement éprouvante. Les aventuriers y découvrent également des bâtiments impressionnants, des ateliers antiques, des objets magiques anciens et des richesses considérables.</p><p>Avant d’atteindre la source oppressante d’Hyrr’Tarënn, <strong>un message inquiétant de Lana’Sir oblige les Sauveurs de la Dame d’Honneur à réagir en urgence. Une armée de goules se répand sur les Terres d’Arran depuis le Nodrënn, dévastant les villes sur son passage. Plus qu’un affrontement à remporter, il s’agit désormais d’organiser la survie.</strong></p><hr /><p>\_<strong>Il faut mettre à l’abri le plus de vivants possibles</strong>, en commençant par les habitants de Lavoise et les fermes environnantes. La vague sera là dans quelques jours, et il convient de se préparer à une retraite dans la Cité-forge d’Hyrr’Tarënn.</p><p>Une décision devra être prise pour les autres peuples aux alentours : les nains errants dans les plaines, les tribus de Peaux-Vertes dans les collines, les marchands elfes bleus amarrés à Lavoise ou encore le groupe redouté des Mangeurs des Plaines parcourant le Pays des Vents. Les héros d’Ispier et d’Arkanov seront-ils à la hauteur de leur légende et prévoiront-ils assez de vivres et de réserves pour tous en si peu de temps ? <strong>L’enjeu dépasse la simple défense : c’est l’occasion inespérée de rassembler des peuples qui, quelques mois plus tôt, se regardaient encore avec méfiance.</strong></p><p>La menace toujours présente dans la cité naine, <strong>les portes sont tout de même scellées afin de protéger la population des armées de Lah’saa</strong>, la nécromancienne qui va défigurer une grande partie des Terres d’Arran. L’ennemi extérieur enferme les survivants dans la pierre et le métal d’Hyrr’Tarënn, mais offre paradoxalement un espace pour tisser des alliances durables.</p><p>Durant leur séjour dans la Cité-forge, <strong>les PJ devront rechercher et éliminer la contamination du Mangeur des Rêves, protéger la population des attaques des Grouillants, organiser la vie enfermée dans cette grande ville naine, relancer la production de vivres et explorer les centaines de bâtiments à la recherche de la Botte de l’Union.</strong> Un rôle indispensable qui pourrait élever certains PJ au rang de dirigeant, de chef ou même de seigneur d’Hyrr’Tarënn — sauf si leurs mauvaises décisions accentuent conflits, tensions et divisions.</p><hr /><p><strong>Alors que la vie s’installe plus ou moins confortablement dans l’ancienne cité, l’armée des goules prend d’assaut la forteresse naine</strong>, car Lah’saa cherche Falika Rosna pour lui faire payer une très vieille trahison. Les brèches ouvertes par les morts-vivants dans la ville sont redoutables et mortelles, et les Héros devront redoubler d’ingéniosité et de stratégie pour préserver le plus d’habitants possible.</p><p><strong>Enfin, après presque une année enfermée dans ces souterrains, l’ouverture de portails entre le Temple du Val Rouge, le village d’Arkanov et la Cité-forge d’Hyrr’Tarënn permet de respirer quelque peu en attendant la fin de l’invasion des goules.</strong></p><p><strong>Les PJ trouvent le passage secret menant au trésor de la cité</strong> : une quantité astronomique de richesses, d’objets d’art et d’objets magiques, ainsi que le passage vers le Tourbillon, long couloir menant à la Relique de l’Union et à un étrange traité magique nain ayant réveillé par mégarde Dax’Ax’Revm.</p><p>Au moment où les goules s’effondrent à la mort de Lah’saa, les portes d’Hyrr’Tarënn s’ouvrent à nouveau sur un monde anéanti. La destruction, les morts et les pleurs accompagnent les aventuriers à la fin de cet Acte 3.</p><p><strong>En fonction de leurs actions et de l’organisation de la cité durant cette période, les PJ ne sortent pas seulement survivants mais ils pourraient émerger comme figures centrales d’un réseau d’alliances inédit entre les peuples. Ces amitiés et ces relations diplomatiques auront un grand intérêt pour la suite de la campagne face à l’armée d’Amanori Bellara.</strong></p><p>\_</p><h2>Acte 4 – Confrontations finales</h2><p>À la sortie d’Hyrr’Tarënn, le monde ne ressemble plus à celui que les aventuriers ont quitté quelques mois auparavant. <strong>Les goules se sont effondrées, mais la paix n’est pas revenue. Elle n’était qu’une illusion suspendue au-dessus d’un continent à vif.</strong></p><p>À l’Est des Crocs d’Acier, Amanori Bellara a trouvé un terrain que les armées de Lah’saa ont relativement épargné. <strong>Dans l’ancienne cité d’Esdavia, elle rassemble ses forces. Les tribus de Peaux-Vertes dominées par le Plastron de l’Union grossissent ses rangs.</strong> Des guerriers humains séduits par un discours de pureté et de restauration nationale jurent fidélité à sa bannière. Les géants du Diggenfald, attirés par la perspective d’écraser les nains des plaines, répondent à ses appels. Peu à peu, une armée disparate devient une force structurée.</p><p>Dans le même temps, à Kosland, <strong>Ramell agit sans se montrer. Le Manoir Écarlate, derrière ses façades respectables, demeure le centre névralgique d’une propagande qui se répand comme un feu sec.</strong> Les mensonges se transforment en évidences. Les attentats ciblés deviennent des preuves fabriquées. Les villes humaines, encore fragiles après le passage des goules, cherchent des responsables. <strong>Hisp Galik attise les rancœurs. Les discours suprémacistes trouvent un public prêt à les entendre. La guerre militaire se prépare, mais la guerre des idées, elle, est déjà en marche — et peut-être déjà perdue.</strong></p><p>Les Sauveurs de la Dame d’Honneur se trouvent alors face à un monde qui attend d’eux une décision.</p><hr /><p><strong>Certains alliés les pressent d’agir vite et fort. Si les liens tissés à Ispier, Arkanov et Hyrr’Tarënn sont solides, une coalition peut encore se former.</strong> Centaures puissants, contingents nains, elfes sylvains et cités humaines lucides peuvent se rassembler pour barrer la route à Amanori avant qu’elle ne déferle sur l’Ourann. <strong>Une bataille dans les plaines au nord de Kosland pourrait briser l’élan de l’invasion et offrir un affrontement décisif</strong>. Mais une guerre ouverte est un risque : même si une victoire serait une réelle marque d'espoir, la défaite contraindrait les survivants à un repli précipité vers la Cité-forge, transformant Hyrr’Tarënn en ultime bastion.</p><p>D’autres pourraient juger qu’affronter l’armée n’est qu’un symptôme et non la cause. <strong>Esdavia, cœur politique et symbolique du pouvoir d’Amanori, représente une cible plus audacieuse.</strong> Y pénétrer revient à affronter une ville façonnée par la conviction et la propagande. Là-bas, les aventuriers peuvent découvrir qu’Amanori n’est pas simplement une conquérante. Le Plastron exalte sa colère, amplifie ses blessures anciennes et déforme son jugement. <strong>Elle agit par conviction, mais sous une influence constante. La tuer affaiblirait l’armée ; la confronter pourrait fissurer l’idéologie.</strong> Si le doute s’installe, si la manipulation de Ramell lui est révélée avec des preuves irréfutables, un retournement demeure possible. Mais convaincre une femme persuadée de sauver son peuple est une entreprise plus périlleuse qu’un assaut frontal.</p><p><strong>D’autres encore comprendront que le véritable nœud du conflit ne se situe ni dans les plaines ni dans les remparts d’Esdavia, mais à Kosland. Tant que Ramell orchestre la discorde, tant qu’il corrompt les Reliques et murmure aux puissants, chaque victoire restera fragile.</strong> S’introduire dans le Manoir Écarlate pour frapper le maître plutôt que ses pions pourrait changer la nature même de la guerre. La mort de Ramell ne serait pas seulement celle d’un nécromancien ; elle romprait le lien corrupteur qui permet aux Reliques d’imposer une domination non consentie. Les Peaux-Vertes retrouveraient leur libre arbitre. L’armée d’Amanori se fragmenterait. Elle-même, libérée de l’influence occulte, pourrait s’effondrer sous le poids de ses actes ou chercher une rédemption impossible.</p><p><strong>Il reste enfin la voie du bastion. Hyrr’Tarënn, restaurée et habitée par des peuples autrefois ennemis, peut devenir un symbole d’union véritable.</strong> Se retrancher derrière ses murailles de pierre et de métal, organiser la défense et attendre l’assaut d’Amanori transforme la campagne en siège long et éprouvant. Le temps jouerait alors contre les régions laissées sans protection, mais <strong>il offrirait aussi l’opportunité de bâtir une alliance durable, non plus seulement militaire, mais politique et culturelle. Ramell, tôt ou tard, serait contraint de sortir de l’ombre pour récupérer les Reliques</strong>. La confrontation finale pourrait alors se jouer dans les profondeurs de la cité-forge, au cœur des runes ancestrales et des forges réveillées au prix d'abandonner toutes les régions sur la route de l'armée d'Amanori Bellara.</p><hr /><p><strong>Quel que soit le chemin choisi, l’Acte 4 n’est pas une simple bataille. Il est la mise à l’épreuve de tout ce qui a été construit depuis le Val Rouge. Les alliances forgées dans la méfiance, les peuples réunis par nécessité, les idées défendues face à la haine : tout converge vers une décision qui dépassera la survie immédiate.</strong></p><p>Les Reliques de l’Union ne sont plus de simples artefacts anciens. Elles sont devenues le miroir de ceux qui les portent.</p><p>Et dans ce miroir, les Terres d’Arran s’apprêtent à découvrir ce qu’elles souhaitent réellement devenir.</p>"
