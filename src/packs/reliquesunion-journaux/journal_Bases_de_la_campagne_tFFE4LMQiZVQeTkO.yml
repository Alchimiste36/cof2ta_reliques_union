      content: "<p>Après la lecture de l'@UUID[JournalEntry.tFFE4LMQiZVQeTkO.JournalEntryPage.oRIDjl3nN28m93Nx]{Explication de la campagne} et des\_@UUID[JournalEntry.tFFE4LMQiZVQeTkO.JournalEntryPage.0YERvKRGvA8T2s0a]{Synopsis des Actes}, <strong>vous comprenez que les relations humaines sont importantes pour la campagne.</strong></p><p>Tout au long de leurs périples, <strong>les PJ réagiront face à des PNJ de chaque peuple plus ou moins importants dans la hiérarchie sociale</strong>. En fonction de leur interactions, ils seront plus ou moins appréciés. De plus, <strong>les rumeurs et les histoires qui circuleront sur eux seront plus ou moins agréables pour eux.</strong> S'il sont méprisants avec un serviteur ou un marchand, qu'ils se comportent mal en public ou qu'ils s'énervent sans raison, les ménestrels et les habitants déformeront et propageront de terribles rumeurs sur eux. <strong>Même s'ils se comportent bien, de toute façon, leurs faits et gestes seront manipulés par les crieurs de rue ou les \"jongleurs\" entre les villes et villages aux alentours alors imaginez s'ils réalisent des actions illégales ou immorales.</strong></p><hr /><p>Pour ajouter un impact local à l'aventure des PJ, <strong>le MJ pourra évoquer, lorsque les PJ passent une nuit dans une auberge, les histoires qui sont chantées ou racontées sur leurs actions.</strong> Sans être forcément reconnus, <strong>les aventuriers entendront les rumeurs et fausses informations sur leurs relations ou leurs actions.</strong> </p><p>Dans un monde qui sera de plus en plus gangréné par l'intolérance et le racisme, il convient de partager régulièrement aux PJ des faits d'actualité mettant en scène :</p><ul><li><p><strong>des agressions sur des anciennes races</strong> validées par le conteur ou les habitants, </p></li><li><p><strong>des rumeurs d'attentats lointains sur des marchands</strong> par des elfes, des peaux vertes ou des nains, </p></li><li><p><strong>des faits de ségrégations acceptés par les villageois</strong> (ventes interdites aux nains dans certains commerces, rapprochement et contrôle de la garde quand ils voient un elfe, suspicion très appuyée de certains habitants ou mise en garde de villageois prévenant le danger pour les anciennes races),</p></li><li><p><strong>le montage en épingle de faits divers insignifiants</strong> prouvant que les humains sont en dangers face aux anciennes races…</p></li></ul><p><strong>Cette ambiance pesante devrait amener les aventuriers à faire attention à leurs comportements et leurs actions.</strong> S'ils se comportent avec brutalité ou mépris, chaque MJ pourra organiser des guet-apens contre les PJ dans des ruelles sombres ou des larcins quand ils dorment à l'auberge ou la propagations de mensonges à leurs égards.</p><hr /><p>Tout au long de la campagne, <strong>les PJ seront en relation avec des seigneurs, des nobles, des marchands importants de tous les peuples.</strong> Ils vivront même confinés pendant plusieurs mois dans la cité d'Hyrr'Tarënn avec de nombreux peuples et tribus bien différentes les unes des autres. <strong>La légende propagée par les ménestrels/jongleurs durant le début de l'aventure devra avoir un impact sur la confiance apportée aux PJ durant ces phases.</strong> S'ils ont toujours été des symboles de respect et de tolérance, les interactions seront plus simples que si certaines mauvaises rumeurs arrivent aux oreilles des puissants.</p><p>Le sauvetage de Lana'Sir, la libération des esclaves de Glanae'Reth, la mise en sécurité de la population dans Hyrr'Tarënn face aux goules et leur rencontre avec des personnes importantes (Zagrenn, Jaspar Bonarion, Sélénia, l'Aîné, Falika Rosna…) permettront aux PJ de briller et d'augmenter leur popularité rapidement. A voir s'ils jouent le jeu ou s'ils se comportent comme des rustres.</p><p><strong>Afin de créer des alliances militaires, commerciales ou diplomatiques avec les villes et cités-états du nord de l'Ourann face à l'armée d'Amanori Bellara, la popularité des PJ et leurs valeurs seront des éléments clefs à prendre en compte.</strong></p><p><strong>Chaque MJ devra garder des notes pour chaque PJ sur leurs jauges de confiance et de méfiance face aux différents peuples et PNJ.</strong></p>"
