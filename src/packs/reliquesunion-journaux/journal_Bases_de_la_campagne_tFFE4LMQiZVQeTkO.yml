      content: "<p><strong>Onze ans avant le début de cette aventure, Amanori Bellara, noble répudiée d’une petite ville côtière de l’Ogrie, rencontre un magicien du nom de Hisp Galik</strong>, un mage élémentaliste poussé par son ambition vers les voies de la nécromancie. <strong>Amanori propose au mage de trouver un vieil objet magique puissant, une légende contée les soirs sans lune aux enfants, pour se venger de son ancien mari l’ayant rejetée et diffamée.</strong></p><p><strong>Il a fallu presque trois ans pour mettre la main sur le Plastron de l’Union, comprendre et activer une partie de ses pouvoirs et commencer à manipuler les villages et tribus de peaux vertes des plaines de l’Ogrie.</strong> La voie de Ramell s’immisce dans l’esprit d’Amanori Bellara, s’accroche à ses émotions, détourne son interprétation de la réalité et l’a pousse à utiliser les pouvoirs du Plastron face aux peaux vertes.</p><p><strong>A la tête d’une armée d’orcs, de gobelins et d’ogres sous son contrôle ou soumis par la peur, elle écrase la ville et son ancien mari.</strong> Devant cette victoire et grâce aux informations de Ramell, <strong>Hisp Galik poursuit ses recherches autour des Reliques de l’Union et découvre l’existence du bracelet du peuple elfe dans la Forêt du Val Rouge</strong> au Nord des Grandes Plaines de l’Ourann.</p><p>Hisp Galik devient alors le conseiller du Seigneur Jaspar Bonarion, dirigeant de la petite cité d’Ispier, proche de leur objectif.</p><p>La majorité des habitants d’Ispier vit depuis des années en relative harmonie avec les sylvains du Val Rouge. Les anciens traités permettent l’exploitation encadrée d’une partie de la forêt, apportant bois, travail et prospérité à la cité. Beaucoup y voient un équilibre fragile mais bénéfique.</p><p><strong>Les elfes répugnent Hisp Galik. Dans l’ombre du pouvoir, il commence à propager mensonges et calomnies sur les voisins sylvains de la forêt.</strong> Il s’appuie d’abord sur une minorité déjà méfiante — artisans lésés par les quotas forestiers, familles ayant perdu un proche lors d’anciens incidents frontaliers — et amplifie leurs griefs.</p><p><strong>Il organise des mises en scène destinées à raviver de vieilles tensions entre les sylvains et les humains, puis achève son œuvre en orchestrant une attaque contre des bûcherons d’Ispier, afin d’en faire accuser le village du Val Rouge.</strong></p><p>Les rumeurs circulent vite. Dans les tavernes, on parle de l'arrogance des elfes. Sur les marchés, on évoque des sabotages imaginaires. <strong>Chaque incident mineur devient preuve d’un complot plus vaste.\_</strong>Laissant mijoter les colères et conseillant avantageusement le seigneur Bonarion, l’énervement se transforme en conflit, puis en guerre.<br />Ce qui n’était au départ qu’une méfiance entretenue par quelques voix devient progressivement une opinion partagée. </p><p><strong>Les humains attaquèrent des sylvains par petits groupes dès que l’occasion se présente recevant, en retour, des escarmouches d’elfes sur les camps de bucherons, les caravanes de marchands ou les voyageurs s’approchant trop près de la forêt du Val Rouge.</strong></p><p><strong>Une infiltration au sein de la forêt permet à quelques bucherons, soldats et habitants d’Ispier d’assassiner un groupe d’elfes, dont la chaman du village</strong> venue parlementer avec leurs voisins humains. Après cette barbarie, la guerre est inévitable.</p><p><strong>Malgré les protestations de la fille du seigneur, Lana’Sir, l’armée d’Ispier marche vers le village sylvain et en éradique la population, permettant à Hisp Galik de commencer ses recherches sur la relique.<br /></strong>Au moment de l’attaque, beaucoup se convainquent d’agir par nécessité, persuadés que les elfes préparaient eux-mêmes une offensive armée contre la ville. La manipulation a porté ses fruits : la peur a remplacé la confiance.</p><p><strong>Peu après la bataille, Lana’Sir s’échappe du château d’Ispier en compagnie des survivants elfes. Elle souhaite rejoindre d’abord Lavoise pour trouver conseil auprès d’une vieille amie elfe blanche, Falika Rosna</strong>, puis la ville d’Orkadia, afin de plaider la cause des sylvains, de les protéger et de découvrir le responsable de cette escalade de haine incompréhensible.</p><p><strong>Jaspar Bonarion, persuadé par son conseiller du kidnapping de sa fille par les terroristes sylvains, est dévasté par cette disparition.</strong> Dans une cité déjà fragilisée par la guerre récente, cette accusation renforce encore l’idée d’une menace elfique persistante.</p><p><strong>Au lieu de propager la nouvelle aux habitants adorant la Dame d’Honneur d’Ispier et d’envoyer des soldats dociles et manipulables à la poursuite des fuyards, le seigneur décide, contre l’avis de Hisp Galik, d’engager une bande d’aventuriers aux motivations inconnues et de dissimuler la disparition de sa fille à la population.</strong></p><p><strong>C’est dans ce contexte que les joueurs et joueuses, incarnant leurs aventuriers, vont évoluer et devront passer de simples habitants à de véritables légendes dans le nord des Terres d’Arran.</strong></p><p>\_</p>"
