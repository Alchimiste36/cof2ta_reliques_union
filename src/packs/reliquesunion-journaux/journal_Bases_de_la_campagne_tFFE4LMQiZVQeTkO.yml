      content: "<p>L’histoire racontée dans ces lignes remonte à un temps ancien. Un âge où les grandes Plaines de l’Ourann étaient dominées par les forteresses-États du peuple nain et où les villes humaines n’étaient pas encore aussi développées dans cette zone en grande partie battues par les vents.\_Les grandes forêts étaient peuplées de larges cités d’elfes sylvains tandis que les vallons herbeux dissimulaient des clans de Peaux Vertes, survivant tant bien que mal aux climat rude de l’Ourann. Il était aussi possible d'apercevoir des hardes de centaures, peuple nomade de l'Ourann.</p><p>Les guerres et les conflits étaient nombreux. Attaques d’orcs de Birkanie sur les cités naines, conflits entre elfes et humains ou affrontements au sein du même peuple pour des richesses, des territoires ou de l’influence. Les grimoires et les archives ne peuvent consigner le nombre de mort dans chaque camp.</p><h2>Les Cinq Doigts de l’Union</h2><p>C’est dans cette région des Terres d’Arran qu’une légende apparait près de 7500 ans après le Grand Schisme même si nul ne peut définir clairement la date des évenements suivants.</p><p><strong>Les récits anciens racontent la présence d’un groupe de cinq fortes personnalités parcourant le continent pour propager des idées de paix et de coopération entre les peuples.</strong> Composé de <strong>la Noble elfe Faïlass</strong>, de la <strong>puissante naine Tissra</strong>, de l’<strong>intimidant orc Darrag</strong>, du <strong>diplomate humain Sura</strong> et de la <strong>loyale centaure Tuatahi</strong>, cette équipe rencontrait les seigneurs de guerres, les rois ou les nobles de chaque peuples pour diminuer les tensions, négocier des trèves et propager de l’empathie dans les villes et villages. <strong>Ils accomplissait de nombreuses manœuvres pour créer une cohésion entre les peuples des Terres d’Arran.</strong> Ils militaient pour développer les accords, partager les savoirs, créer des relations diplomatiques, amicales et même amoureuses…</p><p><strong>Leur idéologie prenait pour principe premier que le monde était constitué par chaque culture et que chacune d’entre elles permettait l’équilibre.</strong> La domination d’un peuple sur les autres ou la spécialisation de chaque espèce est trop dangereuse pour les cinq compagnons. Il faut absolument mélanger les cultures pour que les systèmes économiques, sociaux et arcaniques reposent sur des bases stables et solides dans lesquels les peuples s’entraident, apprennent les uns des autres et protègent le plus important : <strong>la coexistence des peuples dans la paix.</strong></p><p>Connu sur le nom des <strong>Cinq Doigts de l’Union</strong>, le groupe ne se séparait jamais et parcourait tous les continents des Terres d’Arran pour faciliter les échanges et les partages. Ils ont milité, entre autre, à la création des druides humains formés à l’écoute du chant de la terre par les elfes, à la coopération entre les elfes, les nains et les humains pour la construction de nombreuses cités anciennes, à la préservation de nombreuses forêts et espaces naturels pour conserver des milieux de vie agréables pour de nombreux animaux dont les centaures ou, encore, à la défense juridique et physiques des sang-mêlés de toutes espèces (semi-elfes, ogrelin…).</p><p>Sans que ce ne soit leur but à la base, <strong>leur philosophie était soutenue par de nombreuses personnes</strong> (du monarque au villageois de base) et au fur et à mesure des années de nouveaux militants sont apparus à la suite des Cinq Doigts de l’Union, propageant les idées un peu partout. L’organisation de la Main de l’Union apparue dans le sillage de cette philosophie. <strong>Aucune église, aucun prêtre, aucune hiérarchie, aucun dogme, La Main de l’Union ressemblait à un courant philosophique plutôt qu’à une religion.</strong></p><h2>La naissance des Reliques de l’Union</h2><p><strong>Cette organisation connu un événement fondateur lorsque les Cinq Doigts de l’Union réunissent les chefs de cinq peuples qui se font la guerre depuis plusieurs années dans les Plaines de l’Ourann au sud de la cité d’Orkadia</strong>. Les Nains, dominant dans la région, les humains, se développant très vite en Yrlanie et sur le littoral, les elfes, présent dans les grandes forêts de l’Ourann, les tribus unifiées de Peaux Vertes des grandes plaines repoussées vers les montagnes et les hardes de Centaures vivant libres depuis toujours dans cette région sont tous en conflit, depuis des années, les uns contre les autres. Les combats sont violents et meurtriers pour chaque partie.</p><p><strong>Chose décisif pour la réussite de cette réunion, tous les dirigeants des peuples n’étaient pas responsables du déclenchement de la guerre.</strong> C’était leurs pères, les anciens seigneurs ou rois, l’ancien mâle alpha d’une harde ou un ancien Khan belliqueux qui ont envenimé la situation. Ainsi, lors de cette réunion, sous l’œil conciliant des Cinq Doigts de l’Union, <strong>les chefs de chaque peuple acceptent de signer un accord de paix et stopper les combats et les conflits provoqués par leurs ancêtres.</strong></p><p><strong>Les cinq chefs offrirent à la fin de la réunion un objet symbolisant cette paix retrouvée</strong>\_:</p><ul><li><p>un Bracelet Elfique</p></li><li><p>une Botte Naine</p></li><li><p>une Ceinture Centaure</p></li><li><p>un Plastron Orc</p></li><li><p>\_un Pantalon Humain</p></li></ul><p>Une grande fête fut organisée avec tous les peuples présents annonçant un nouvel âge pour la région. <strong>Alors que les Cinq Doigts de l’Union montèrent sur l’estrade pour célébrer la paix en brandissant les objets partagés par les chefs, les spectateurs furent témoins de leur disparition progressive et de la forte lumière qui émanait des cinq objets flottant dans les airs.</strong></p><p></p><p><strong>Les Reliques furent réparties entre les chefs, chacun équipant la relique d’un autre peuple et ils racontèrent à plusieurs reprises que les Cinq Doigts de l’Union partageaient leur philosophie avec eux dès qu’il fallait prendre des décisions importantes</strong>.</p><p>L’histoire ne raconte pas le destin de chaque porteur mais la région connue de longues périodes de paix grâce aux souverains conciliants de chaque culture. Des rumeurs racontent que les autres seigneurs et rois voyaient cette union des peuples d’un mauvais œil, entre jalousie et idéologie.</p><p>Chaque armée voulant attaquer une cité ou une communauté dans cette région se fracassait sur l’Union de tous les peuples. Elle était prise en tenaille entre les flèches des elfes des bois, les boucliers nains, la férocité des Peaux Vertes, l’ingéniosité des Humains et la puissance des Centaures et de leurs alliés animaux (griffons, dragons, Sanpurock…). <strong>Personne ne sait ce qui a cassé cette alliance ni comment les Reliques se sont retrouvées séparées mais force est de constater que les années ont fait oubliées en grande partie cette périodes des livres d’histoires préférant les récits de conflits, de guerres et de trahisons entre les peuples</strong>.</p><p>Il existe bien des histoires parlant de seigneurs doué en diplomatie ayant évités de lourds conflits grâce à l’aide d’un « porte-bonheur » ou d’un « objet symbolique » d’après eux. Nous pouvons prendre l’exemple, du gobelin Bel’œil ayant collaboré avec une cité-état naine grâce aux conseils prodigués par ses « bottes » racontait-il. Une autre histoire, devenue légende, parle de la rencontre de Ferlaan, un elfe bleu, avec une ville humaine au large du Royaume du Léhon qui développa une société quasiment symbiotique entre les elfes et les humains. Ferlaan parlait souvent des conseils donnés par Sura, un humain qu’il considérait comme un frère.</p><h2>La corruption des Reliques de l’Union</h2><p><strong>Les Reliques refont surface plusieurs siècles plus tard, aux environ de l’année 8100 après le Grand Schisme, dans les Marches du Venkor sous les traits d’un homme recherchant la grandeur des Humains avec une haine profonde des \"Races Inertes\"</strong> comme il a souvent surnommé les Anciennes Races. Rien n’est certain mais en réunissant plusieurs textes historiques, <strong>on peut supposer qu’il aurait récupérer la Ceinture du peuple Centaure.</strong> Il aurait cherché les autres reliques pour les confier à certains nobles ou petits seigneurs qui partageaient ses idées ségrégationnistes. Enfin, grâce à ses facultés en Nécromancie et, d’après certaines sources, à son lien avec un démon, <strong>il a pu pervertir les Reliques et y insérer des miettes de sa personnalité et de ses idées racistes.</strong></p><p>En 8225 après les Grand Schisme, <strong>Ramell avait trouvé et perverti les cinq Reliques de l’Union et trouvé des porteurs adaptés à ses objectifs</strong> : utiliser les pouvoirs des Reliques pour corrompre leur personnalité initiale et asservir les peuples des Terres d’Arran. <strong>Dans les montagnes isolées des Rocs Exsangues, Ramell créa la cité d’Esdavia avec les cinq porteurs.</strong> <strong>L’elfe Izareaa, la centaure Kaitiaki, le nain Durizmor, l’humain Gabrel et l’orc Gruulh soumirent une multitude de personnes durant une trentaine d’année.</strong> Réduit en esclavage par la puissance des Reliques ou la persécution des plus téméraires, les habitants d’Esdavia avaient pour la plupart perdus tout espoir de retrouver leur liberté.</p><p><strong>C’est seulement par hasard, qu’une compagnie naine, en quête de nouveaux filons de métaux à exploiter, découvrit la présence de cette cité ressemblant davantage à un camp de plusieurs milliers de prisonniers qu’à une ville isolée dans les hautes montagnes des Rocs Exsangues.</strong> Leurs investigations discrêtes et leur compte-rendu accablant à leur roi permit la création de l’Ordre de l’Union en quelques mois. <strong>Cette coopération de circonstance des nains, des elfes, des peaux vertes, des humains et des centaures permit d’attaquer simultanément chaque porteur des Reliques de l’Union et, ainsi, de mettre fin à la manipulation des peuples d’Esdavia</strong>.</p><p><strong>L’Ordre de l’Union prit la décision de faire disparaitre dans l’oubli les Reliques</strong>. Une organisation conscientieuse a été mise en place pour bâtir des zones secrètes et sécurisées pour chaque Relique. Il aurait été possible de les détruite au prix du sacrifice des porteur mais par ambition ou par lacheté, un autre choix a été prit.</p><h2>Le Grand Oubli</h2><p>Le Temple du Val Rouge fût construit sous l’aura protectrice de l’Arbre-Mère pour dissimuler le Bracelet Eflique. Le village d’Arkanov, au coeur des montagnes des Crocs d’Acier fût construit pour éliminer le souvenir de la Ceinture centaure. Une ancienne salle secrête fût réouverte pour la première fois depuis des siècles pour entreposer la Botte naine dans la grande Cité-Forge d’Hyrr’Tarënn. Le Plastron peaux vertes trouva une place de choix dans le socle de l’immense statue des dieux enlacés au milieu de la prestigieuse ville des Khans au nord de l’Ogrie.</p><p><strong>Bien que immortel, l’humain Ramell fut jugé par l'Ordre de l'Union. Sa mort fut mise en scène dans l'incendie des prisons de Kosland. Puis il fut emprisonné dans un cercueil protégé par des runes puissantes</strong>, caché et enterré dans les cryptes de son manoir dans la ville de Kosland. D’après l’Ordre de l’Union, rien ne pourra libérer ce nécromant de sa prison magique. Ensuite, le Pantalon humain fut dissimulé dans un cache secrète dans la cathédrale construite à Kosland grâce à la grande richesse confisquée à Ramell.</p><p><strong>Chaque groupe protège la Relique de son peuple sans avoir la connaissance des autres lieux ou organisations responsables des autres Reliques.</strong></p><h2>l’Échec de l’Oubli</h2><p><strong>Plusieurs siècles plus tard, en 8 964 après le Grand Schisme, les idées de Ramell réapparaissent sous la forme d’un traité raciste et ségrégationniste se propageant petit à petit dans les Marches du Venkor</strong>. Ces concepts prennent place insidieusement au sein du clergé de Solima, l’une des divinité les plus influentes chez les humains. Sans pouvoir en être sûr, certains historiens pensent que ce nouveau Ramell n’est qu’un adepte de l’idéologie de cet érudit mort depuis longtemps. Il s'agit, en faite, du duc Garnissar de Mirabeliu ayant acheté le manoir écarlate quelques années plus tôt. Feuilletant les pires livres de la bibliothèque de Ramell et en s'ouvrant à ses pensées transpirantes au travers de sa prison, le duc écrit le manifeste traduisant indirectement l'idéologie du démon immortel.</p><p><strong>L’histoire des Héros de la Cité d’Ispier confirmera qu’il s’agit bel et bien de Ramell, un nécromant immortel libéré de son cercueil par mégarde</strong>. C’est, entre autre, grâce à lui qu’Amanori Bellara et Hisp Galik trouvèrent, en 701 du Calendrier Athéen, le Plastron de l’Union et commençèrent la formation d’une armée de peaux vertes dans les dangereuses montagnes d’Ogrie. <strong>Hisp Galik qui reçoit comme mission la recherche et la récupération des quatre autres Reliques de l’Union pendant que Ramell reprend ses marques dans la ville de Kosland, diffusant ses idées petit à petit dans la population et les cercles de pouvoir depuis le Manoir Écarlate.</strong></p><p><strong>Le kidnapping simulé de Lana’Sir, la fille du seigneur Bonarion de la Cité d’Ispier, va mener un petit groupe d’aventuriers a révéler les plans de Ramell et permettre la récupération des Reliques de l’Union avant quelles ne tombent entre ses mains.</strong> Face aux nombreux dangers qu’ils croiseront sur leurs routes, la compagnie devra surtout combattre les vents d’intolérence, de racisme et de haine qui se propagent sur les Terres d’Arran.</p>"
