      content: >-
        <div class="arran-mod"><p><strong>Le monastère des Frères du Désespoir
        est une institution très stricte située sur une péninsule à l'ouest de
        l'Ourann du Nord.</strong></p><p><strong>Elle enseigne a une multitude
        de jeunes, venant des quatre coins des Terres d'Arran sans distinction
        de races ou de niveau social, une disciple de fer et une instruction
        pointilleuse dans le but d'en faire des
        Frères.</strong></p><p><strong>Pendant plusieurs années, ils
        emmagasineront des savoirs divers et pratiques (histoire, géographie,
        art en tout genre, ingénierie, langages et écritures…) avant d'être
        missionné, en tant que Frère pour des missions humanitaires et de
        justices pour les pauvres et les nécessiteux. Il n'est pas rare, dans la
        plupart des grandes villes cosmopolites de croiser un groupe de Frères
        du Désespoir qui viennent en aide aux blessés, aux sans abris, au
        peuples ou communauté opprimés.</strong></p><p><strong>En plus de leur
        apprentissage moral et théorique, les Frères sont entrainés de façon
        très intensive au combat et à une discipline physique
        extrême.</strong></p><p></p><p><em>Appelé également «le couvent des
        soupirs». La nuit, les voyageurs peuvent entendre les gémissements des
        novices, épuisés par leurs interminables journées d'apprentissage,
        s'échapper de fenêtres dépourvues de vitres mais munies de barreaux. La
        confrérie du désespoir est un ordre religieux intransigeant. Les
        enfants, généralement des orphelins mâles, indifféremment des fils
        d'Homme ou de Semi-Elfes, sont admis dès leur plus jeune âge au sein de
        cette congrégation dirigée de main de fer par d'austères
        religieux.</em></p><p><em>Entre ces murs épais et bruts, les anciens
        pensionnaires dispensent aux plus jeunes une discipline rigoureuse,
        associée à une éducation morale et philosophique des plus strictes. Les
        novices se retrouvent plongés dans cet endroit sans y avoir étaient
        préparés. À coups de cravache, de fouet et de bâton, ils apprennent à
        lire, à compter, à réfléchir, à observer et à comprendre la nature. Ils
        découvrent aussi de nombreux textes sacrés, méconnus du commun des
        mortels. Ces textes relatent les origines des dogmes, leurs secrets, les
        savoirs interdits, les différentes magies. Au cours de leur séjour entre
        les murs de cette institution, on leur apprend aussi à maîtriser la
        faim, la soif, le sommeil, la température de leur corps et… leurs
        érections. En même temps qu'on leurs enseigne à mépriser l'argent, le
        confort, les plaisirs faciles et l'ambition.</em></p><p><em>Outre cette
        connaissance et cette maîtrise absolue de soi, ils subissent
        quotidiennement un entraînement intensif au combat. Une fois leur
        formation achevée, ils participent à de nombreuses missions. Les «frères
        du désespoir» sont des moines guerriers. Ils se sont donné pour objectif
        de combattre l'injustice à travers le monde, de manière totalement
        désintéressée. Il me semble que le monastère se trouve dans une zone
        montagneuse du pays des vents.</em></p></div>
