      content: "<div class=\"arran-mod\"><p><span class=\"intro\">Avec toutes les informations qu'ils ont trouvé, le groupe d'aventurier prépare son voyage vers les Montagnes d'Arkanov. Avec cette nouvelle responsabilité de trouver les Reliques de l'Union, leur quête va les amener vers le village du Ravin de Novrad.</span></p><p></p><h1>Voyage et Arkar'um</h1><p></p><h3>Préparation du Voyage</h3><p>En fonction des PJs, ils peuvent partir juste eux ou avec d'autres personnes : Maana, Zagrenn et/ou Laotissa.</p><p>Au vu de la situation, tout l'équipement nécessaire est fourni par la Cité d'Ispier dans la limite du raisonnable. Chariot, chevaux, rations, tentes, sacs…</p><p>Le groupe connait le début du voyage et ils savent qu'ensuite, en arrivant dans les montagnes sur le Territoire des Mangeurs de Plaines, la météo et les dangers ne seront pas à l'avantage des PJs. Ils peuvent vouloir s'équiper en vêtements chauds, en chaussures adaptées, en matériel d'escalade ou de randonnée en montagne.</p><p>En plus grâce à la grande récompense du seigneur Jaspar, ils ne devraient pas avoir trop de mal à acheter les objets spéciaux à la Cité d'Ispier ou au début du voyage.</p><p></p><h3>Voyage en Terres Connues</h3><p>Le début du voyage est exactement le même que pour la poursuite des survivants au début de la campagne.</p><p>En passant par la Cité Eta de Arkan'um, si le groupe retourne à l'auberge du Bouclier et du Tranchoir, le tavernier Warbane interagit avec les PJs différemment. La population a entendu parler des Sauveurs de la Dame d'Honneur et certaines personnes ont entendu parler de la recherche des reliques.</p><p>Dans la taverne, un Jongleur humain (ménestrel) est en train de conter des histoires et à un moment le Groupe entendra l'histoire sur leur mission. Cette chanson est remplie d'approximations :</p><ul><li><p>Lana'Sir était kidnappée puis sauver d'abord par les elfes sylvains</p></li><li><p>Jaspar Bonarion était prêt à incendier toute la foret.</p></li><li><p>Le groupe de héros ont retrouvé Lana'Sir dans un temple de la Foret du Val Rouge</p></li><li><p>Lana'Sir leur a offert une paire de Bracelets magiques, un artefact puissant</p></li><li><p>Les héros sont maintenant au service de la Dame d'Honneur</p></li><li><p>Elle est amoureuse d'un des Héros</p></li></ul><p></p><h3>Retour voir @UUID[JournalEntry.girhYx1gqd7lJrbc]{l'Ainé Kaspirionuratanokali}</h3><p>Si les PJs retournent voir l'Aîné et surtout si Eärendel a conserver le Sanpurock car il s'est lié d'amitié avec lui, la relation avec l'Aîné sera très différente. Il considèrera Eärendel comme un membre de la tribu presque comme un membre de la famille.</p><p>L'Aîné prévient le groupe des dangers de la montagne de leur territoire. Il dit y avoir passé beaucoup de temps mais que c'est très dangereux.</p><p>Si les PJs le demande : l'Aîné et sa tribu peuvent suivre les PJs dans les montagnes comme escorte. Ca coutera 500pa pour le groupe mais leur chance de survie sera beaucoup plus grande.</p><p></p></div><div class=\"arran-mod\"><p></p><h1>La montagne vers le Ravin de Novrak</h1><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/montagnes.des.crocs.dacier.jpg\" width=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>Après avoir quitté les zones les plus civilisées après la Cité-Etat d’Arkar’um, vous vous dirigez une nouvelle fois sur les terres des mangeurs des Plaines. <strong>Votre voyage bifurque rapidement vers le sud en longeant les hautes montagnes des Crocs d’Acier.</strong> Les routes deviennent des moins en moins marquées, de plus en plus dures à repérer dans cette zone peu fréquentée.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Tout au long de votre voyage, <strong>vous croisez de loin des villages plus ou moins grands de Peaux Vertes entourés de barricades</strong> en bois au-delà desquelles vous apercevez le haut des huttes et des maisons d’orcs. Dès la fin de la première journée de voyage, vous ne croisez plus aucune ferme d’Errants ou de villages d’Hums sur votre route. <strong>Les falaises que vous suivez sur votre gauche sont imposantes et impénétrables.</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em><strong>Comment organisez-vous votre campement le soir venu\_?</strong></em></span></p><p></p><p><span style=\"font-family:Bookinsanity\"><em>A la fin du </em></span><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><em><strong><span style=\"text-decoration:underline\">troisième jour de voyage</span></strong></em></span></span><span style=\"font-family:Bookinsanity\"><em> dans ces Plaines vallonnées, vous découvrez ce qui doit être la «\_route\_» à travers les Crocs d’Acier. A première vue <strong>ça ressemble plus à un coupe gorge qu’à un chemin</strong> mais à part si il vous pousse des ailes, <strong>il n’y a pas vraiment d’autres solutions</strong>. Malgré la poussière et les chutes de pierres, la route semble empruntée de temps en temps (traces de caravanes, ancien camp, débris et déchets…)</em></span></p><p><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><strong><span style=\"text-decoration:underline\">Si les PJs ont pour monture des Sanpuroch\_:</span></strong></span></span><span style=\"font-family:Bookinsanity\"><em> Vos montures, habituées au voyage dans les Plaines, semblent connaitre ce passage à travers la montagne.</em></span></p><p></p><p><span style=\"font-family:Bookinsanity\"><em>Le soleil à l’horizon commence à disparaitre dans votre dos, projetant vos ombres sur les murs rocheux de chaque côté du passage.\_</em></span></p><p></p><p><span style=\"font-family:Bookinsanity\"><em><strong>Que voulez-vous faire de particulier avant d’emprunter cette route\_?</strong></em></span></p></td></tr></tbody></table><p class=\"MsoNormal\">\_</p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/montagnes.des.crocs.dacier2.jpg\" width=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>En empruntant la route au travers des Crocs d’Acier, <strong>vous naviguez de longs kilomètres entre deux falaises abruptes sur une route assez dégagée</strong> qui se rétrécit et s’élargit au fur et à mesure de votre progression. Les nombreux débris et rochers tombés sur le chemin vous empêchent de prendre de la vitesse et de relâcher votre attention et après seulement quelques heures à dos de montures, <strong>la route commence à grimper et zigzaguer entre les différents reliefs.</strong> La température commence à baisser et vous recevez régulièrement des bourrasques de vent glacial venant des hauteurs en plein visage. Le sol est encore assez dégagé et propre. L'écho des montagnes est assez perturbant car ça vous donne l'impression d'être suivi.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>De temps à autre des piliers d’environ 5m de haut, droit comme <strong>des obélisques, en pierre taillée et gravée d’inscriptions naines balisent votre avancée</strong>.</em></span></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/montagnes.pont.jpg\" width=\"250\" /><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><strong><span style=\"text-decoration:underline\">1</span></strong></span></span><sup><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><strong><span style=\"text-decoration:underline\">er</span></strong></span></span></sup><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><strong><span style=\"text-decoration:underline\"> jour\_:</span></strong></span></span><span style=\"font-family:Bookinsanity\"> <em>A la fin de la première journée alors que vous n’avez quasiment pas vu le soleil depuis la veille au soir, <strong>vous arrivez devant un immense pont de pierre entre deux flans de montagnes</strong> et reliant les deux parties de la route, survolant un gouffre de plusieurs dizaines de mètres de profondeur. Au départ du pont, <strong>un large bâtiment, fortifié d’épais murs de pierre,</strong> possède une large ouverture voutée avec de part et d'autres de cette ouverture des statues naines représentant des visages et des nains.</em></span></p><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><span style=\"text-decoration:underline\">Couloir :</span></span></span><span style=\"font-family:Bookinsanity\"> <em>Dans un piteux état, certaines toitures sont encore étanches et en approchant vous voyez des traces de campements anciens. Les quelques bâtiments au milieu de cette muraille ne possèdent pas de portes mais sont, au moins protégés du froid et des fines gouttes qui commencent à tomber.</em></span></p><p class=\"MsoNormal\"><span style=\"font-family:Bookinsanity\"><em>Vous remarquez quatre bâtiments :</em></span></p><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><span style=\"text-decoration:underline\">Bâtiment Gauche :</span></span></span><span style=\"font-family:Bookinsanity\"> <em>le premier a un toit entièrement effondré et est quasiment rempli de débris et de gravats.</em></span></p><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><span style=\"text-decoration:underline\">Bâtiment au fond à gauche :</span></span></span><span style=\"font-family:Bookinsanity\"> <em>Dans le second vous voyez un feu de camp éteint depuis longtemps ainsi que des bancs de fortune autour fait avec des bout de mur ou de colonnes. Des débris de meubles sont entassés dans un coin et les gravats présents ont été repoussés vers le fond de la pièce.</em></span></p><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><span style=\"text-decoration:underline\">Bâtiment au fond à droite :</span></span></span><span style=\"font-family:Bookinsanity\"> <em>Le troisième possède deux entrées. Vous y trouvez des piquets de bois reliés par une vielle corde à proximité d'auge pour les chevaux. Les auges sont vides mais il reste des tas de paille et de foin sur le sol et de vieilles traces de crottins.</em></span></p><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><span style=\"text-decoration:underline\">Bâtiment à droite :</span></span></span><span style=\"font-family:Bookinsanity\"> <em>Enfin, la quatrième est entièrement vide à part un tas d'excréments dans le coin le plus éloigné ainsi que des traces de restes (carcasses de lapins, épluchures de légumes…). Dans le grand couloir qui relie l'entrée du bâtiment au début du pont, vous voyez également quelques statues de nains et de naines de l'ordre du Temple qui portent des outils de calcul ou de construction.</em></span></p><p></p><p><span style=\"font-family:Bookinsanity\"><em>Comment voulez-vous vous installer pour la nuit ?</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Est-ce que certains d'entre vous faites des gardes durant la nuit ? si oui dans quel ordre ?</em></span></p></td></tr></tbody></table><p class=\"MsoNormal\"></p><h2>Attaque de la Toile Vivante</h2><p><strong>@UUID[Scene.0uRsNKGm0daFzJ5G]{Pont dans montagne}</strong></p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Toile.Vivante/ToileVivante02.jpg\" width=\"150\" /><h3>Pour le porteur des Bracelets de l'Union en train de dormir :</h3><p>Test SAG-PERCEPTION vs DEX-DISCRETION de @UUID[Actor.Tqxc9qSeNzeUgqoq]{Franill'eh}</p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si le test est réussi :</span></strong></span> <span style=\"font-family:Bookinsanity\"><em>\"</em>le porteur de la relique<em>\" tu ressens une présence au dessus de toi pendant que tu dors, tu ouvres les yeux et tu vois une sorte d'elfe mais plus petite qui est à tes côtés avec un gourdin métallique dans sa main droite et un bout de tissu dans sa main gauche. Elle est à deux doigt de t'appliquer le bout de tissu sur le visage et tu l'a sent focalisée sur les Bracelets que tu portes et tu sens qu'elle est prête à t'assommer avec son gourdin.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Que fais-tu ?</em></span></p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si le test est raté :</span></strong></span> <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Test de CON-ATHLETISME DD20 (@UUID[Item.PPuUNcWOthcUjhpp]{Baume de Mutisme (dose)}) =&gt; si raté : /r 2d10 pour la durée du mutisme =&gt;</span></strong></span></p><p><span style=\"font-family:Bookinsanity\"><em>\"</em>le porteur de la relique<em>\" tu ressens une douleur intense pendant ton sommeil. Tu essayes de crier mais aucun son ne sort de ta bouche. En ouvrant les yeux tu te rends compte que ton nez et ta bouche sont obstrués par un bout de tissu qui sent une forte odeur de champignon. En tournant la tête sur ta droite, tu remarque d'abord du sang qui coule d'un gourdin métallique. A cet instant tu vois le visage d'une espèce d'elfe mais plus petite qui tient le gourdin et qui lève le bras pour porter un nouveau coup sur ta tête.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Que fais-tu ?</em></span></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si le test contre le baume de mutisme réussi =&gt;</span></strong></span> <span style=\"font-family:Bookinsanity\"><em>\"</em>le porteur de la relique<em>\" tu ressens une douleur intense pendant ton sommeil. Lorsque tu crie, tu ressens que ta bouche et ton nez sont obstrué par un tissu qui sent fort le champignon. Tu arrives à hurler malgré cette pâte qui semble vouloir t'empêcher de parler. En tournant la tête sur ta droite, tu remarque d'abord du sang qui coule d'un gourdin métallique. A cet instant tu vois le visage d'une espèce d'elfe mais plus petite qui tient le gourdin et qui lève le bras pour porter un nouveau coup sur ta tête.</em></span></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">DM à la tête pour le PJ : /r 1d8+4</span></strong></span></p><p></p><p></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Toile.Vivante/ToileVivante01.jpg\" width=\"150\" /><h3>Pour le PJ qui monte la garde :</h3><p>Test de SAG-PERCEPTION vs DEX-DISCRETION de @UUID[Actor.9gM0vw0UN2Hb1Unn]{Grooguen}</p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si Perception raté =&gt;</span></strong></span> <span style=\"font-family:Bookinsanity\"><em>Tu es tranquillement en train d'observer les alentours de la bâtisse où tes compagnons de voyage sont installés lorsque tu reçois une grande masse sur le dos. Au moment de l'impact, tu tourne la tête et aperçois succintement, un homme grand et costaux qui a sauté depuis les hauteur directement sur toi, une épée longue à la main. Il a des tatouages un peu partout sur le visage et le cou. Sa deuxième main se plaque sur ton visage avec un bout de tissu qui sent fortement le champignon.</em></span></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Test de CON-ATHLETISME DD20 (@UUID[Item.PPuUNcWOthcUjhpp]{Baume de Mutisme (dose)}) =&gt; si raté : /r 2d10 pour la durée du mutisme =&gt;</span></strong></span> <span style=\"font-family:Bookinsanity\"><em>Tu sens que tes cordes vocales se crispent. Tu essayes de crier pour prévenir les dormeurs mais aucun son ne sort de ta bouche.</em></span></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si test du Baume réussi =&gt;</span></strong></span> <span style=\"font-family:Bookinsanity\"><em>Malgré la pâte qui semble te contracter les cordes vocales tu arrives à éloigner ton visage et tu peux crier pour prévenir les dormeurs.</em></span></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">DM du choc : /r 1d6+4</span></strong></span></p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si Perception Réussie =&gt;</span></strong></span> <span style=\"font-family:Bookinsanity\"><em>Alors que tu es tranquillement en train d'observer les alentours de la bâtisse où tes compagnons de voyage sont installés pour la nuit, tu entends un craquement au dessus de toi, sur le bord de la toiture. Au moment, où tu te retournes pour regarder l'endroit, tu distingues un homme grand et costaux qui est accroupi sur le rebord près à bondir vers toi. Il tient dans la main une épée longue et dans l'autre un bout de tissu qui semble humide.</em></span></p></td></tr></tbody></table><h3>COMBAT vs La Toile Vivante</h3><p>Les trois autres combattants sont positionnés sur le toit du bâtiment le long de la paroi rocheuse. Ils sont totalement silencieux et attendront que Grooguen et Franill'eh reviennent ou que l'alarme soit donnée par les PJs.</p><p>Lorsqu'ils rentrent en combat, ils mettront deux rounds entiers à descendre de la toiture sans grande discrétion et pour atteindre le Corps à Corps avec les PJs.</p><p>@UUID[Actor.mTrCc2yyhi01YiWk]{Capitaine Dracki} + @UUID[Actor.pqRKvrNJdd0JZDCy]{Hodrok} + @UUID[Actor.qgtbpYX25oIhQG5W]{Nael}</p><p></p><p>Hodrok fonce dans le tas sans se poser de question. Nael utilisera le plus possible son arbalète et reculera si on s'approche de lui. La Capitaine Dracki sera au contact avec son marteau de guerre magique.</p><p>La Capitaine Dracki donne beaucoup d'ordre à ses compagnons pendant le combat.</p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Lorsque le combat sera un peu avancé =&gt;</span></strong></span> <span style=\"font-family:Bookinsanity\"><em>Alors que la naine s'apprête à te donner un grand coup de marteau dont les runes scintillent d'une lueur orangée, elle hurle : \"Personne ne mérite un trop grand pouvoir\" !</em></span></p><p></p><ul><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si le combat est en faveur des PJs :</span></strong></span></p></li></ul><p>Si les membres de la Toile Vivante semblent défavorisés, l'un des survivants émet un sifflement puissant. Ils ont 3 tours pour s'enfuir :</p><p>Tour 1 : \"<em>Vous entendez un cri strident en haut des montagnes assez loin du pont</em>\" les membres de la Toile Vivante se rapprocheront des ouvertures du pont tous du même côté en essayant de combattre quand même.</p><p>Tour 2 : pour les PJs qui ont une ligne de vue sur le gouffre \"<em>Vous voyez du coin de l'oeil une grande ombre qui plane dans le gouffre et qui se rapproche du pont</em>\" Les membres de la Toile Vivante continueront à s'approcher des ouverture et pour ceux qui y sont déjà, ils poseront un pied sur le rebord.</p><p>Tour 3 : Tous les membres de la Toile Vivante ont une action de mouvement pour atteindre le rebord du pont et utiliseront leur deuxième action de mouvement pour sauter dans le vide (DEX-AGILITE DD15). \"<em>Au moment où les ennemis sautent du pont, vous voyez l'ombre d'un grand volant toutes ailes ouvertes qui passe sous le pont et réceptionne les ennemis. Un beuglement se fait entendre de ce petit dragon qui amène vos adversaires plus loin</em>\"</p><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">La @UUID[Actor.mTrCc2yyhi01YiWk]{Capitaine Dracki} ne quittera pas le combat et soi se rendra soit tombera inconscient au combat.</span></span></p><p><strong>Parmi les adversaires morts :</strong> @UUID[Actor.mTrCc2yyhi01YiWk]{Capitaine Dracki} et @UUID[Actor.Tqxc9qSeNzeUgqoq]{Franill'eh} ne peuvent pas mourir. Ils sont inconscients, à deux doigts de mourir. Si les PJs le souhaitent, ils peuvent les soigner et les interroger. S'ils décident de les laisser mourir alors qu'ils savent qu'ils peuvent les sauver ou s'ils les finissent =&gt; conséquences pour le porteur des bracelets de l'Union (il sent que la voie du FANATISME est ravie de ce choix)</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Symbole.Toile.Vivante.png\" height=\"100\" /><p>Les PJs peuvent fouiller les adversaires et récupérer leur équipement. Ils remarquent le tatouage présent sur tous les membres au niveau de leur flanc droit. Il a a peu près la même forme que le symbole sur le pendentif de Laotissa. S'ils ont accès à la Capitaine Dracki, ils peuvent trouver une carte : @UUID[JournalEntry.GAGmgKuolB5VRKjY]{Carte Sur Capitaine Dracki} ainsi que des @UUID[Item.JONEshU6JoEsR4Lw]{Pierre de localisation de la Toile Vivante} <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">(attention ils peuvent l'activer sans faire exprès !!)</span></strong></span></p><p></p><p><strong>Interrogatoire des PJs :</strong></p><ul><li><p>En fonction des questions et surtout de l'animosité des PJs, l'un des membres et en premier le capitaine Dracki (si elle est présente) répondra ou non aux questions des PJs.</p></li><li><p>Si les PJs sont trop malsains, chaque membre préfèrera mourir que de leur livrer des informations</p></li><li><p>Si les PJs essayent de comprendre ce qu'il se passe et sont \"gentils\" dans leur interrogatoire, Dracki, Franill'eh ou Grooguen répondra à leurs questions et leur expliquera leur mission et leurs valeurs. Si Dracki est convaincu de leur honnêteté, elle leur demandera de poursuivre leur mission de récupérer les autres Reliques, de faire attention a leurs effets et de les aider face au Clan de l'Épouse qui se cache quelque part dans l'Ogrie et qui souhaite récupérer les Reliques de l'Union. Si les PJs les libèrent, elle leur donnera une pierre runique marqué de leur symbole en leur expliquant qu'elle permet d'envoyer un signal aux deux commandants et leur indiquer la position de la pierre.</p></li><li><p>Si les PJs fraternise avec la Toile Vivante, le ou les membres parti à dos de dragon pourront revenir sur le pont.</p></li></ul><p></p><ul><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs perdent le combat :</span></strong></span></p></li></ul><p>Ils se réveillent menottés et douloureux dans la pièce où ils ont dormis. Les survivants de la Toile Vivante ont l'air en colère. Le PJ porteur des Bracelets de l'Union sent instantanément qu'ils ont essayé de lui retirer les bracelets par tous les moyens et ses avant-bras sont lacérés, brulés et écrasés par endroit. La douleur est incroyablement forte.</p><p></p><p><strong>Interrogatoire de la Capitaine Dracki :</strong></p><ul><li><p>La Capitaine Dracki mènera l'interrogatoire avec l'aide de Fanill'eh pour calmer toute impertinence.</p></li><li><p>Elle n'y va pas par quatre chemins et demandera illico l'objectif des PJs avec les Reliques de l'Union</p><ul><li><p>Si les PJs sont coopératifs, elle leur expliquera leur mission et ce sera aux PJs de la convaincre de leur bonne volonté. Si Dracki est convaincu de leur honnêteté, elle leur demandera de poursuivre leur mission de récupérer les autres Reliques, de faire attention a leurs effets et de les aider face au Clan de l'Épouse qui se cache quelque part dans l'Ogrie et souhaite récupérer les Reliques de l'Union. Si elle fait confiance aux PJs elle prendra ses gardes en marquant le porteur des Bracelets au fer rouge avec le symbole de la Toile Vivante et le préviendra qu'à partir de maintenant, les commandants sauront où il se trouve quand bon leur semble.</p></li><li><p>Si les PJs sont méprisants ou idiots, elle pourra en venir à tuer le porteur des Bracelets de l'Union pour les récupérer en laissant les autres PJs inconscients dans le bâtiment avec le minimum d'équipement pour survivre.</p></li></ul></li></ul><p></p><p>Si les PJs fraternise avec la Toile Vivante :</p><ul><li><p>S'il y a des morts parmi la Maille de la Toile Vivante, une cérémonie sera faite avant tout autre chose.</p></li><li><p>Avant de reprendre leur voyage, ils pourront demander des conseils ou des indications sur les prochains jours de voyage, sur les autres Reliques et sur le Clan de l'Épouse. Ils en savent déjà beaucoup et les deux groupes pourront échanger des informations.</p></li></ul><p></p><p></p><h3>Suite du Voyage</h3><table><tbody><tr><td><p><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><strong><span style=\"text-decoration:underline\">2</span></strong></span></span><sup><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><strong><span style=\"text-decoration:underline\">e</span></strong></span></span></sup><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><strong><span style=\"text-decoration:underline\"> jour\_:</span></strong></span></span><span style=\"font-family:Bookinsanity\"><em> La route se poursuit en serpentant dans les montagnes et vous passez régulièrement sur des ponts anciens à l’architecture naine qui doivent avoir plusieurs centaines d’années. Certains ouvrages sont assez délabrés et marqués par le manque d’entretien. Plusieurs tunnels de grandes tailles se succèdent également sur cette route.</em></span></p><p class=\"MsoNormal\"><span style=\"font-family:Bookinsanity\"><em>A de nombreuses reprises, <strong>des rochers bloquent une partie du chemin et des éboulements semblent avoir été déblayés à la hâte</strong> histoire de faire passer la taille d’une caravane de marchands ou des carrioles.</em></span><span style=\"mso-spacerun:yes\"><span style=\"font-family:Bookinsanity\"><em>\_ </em></span></span><span style=\"font-family:Bookinsanity\"><em>Plus vous avancez dans la montagne plus la végétation devient éparse et plus <strong>vous percevez les bruits, les cris ou les ombres de créatures sauvages autour de vous</strong>, en haut de promontoires ou au fond de grottes naturelles que vous croisez. Des traces de roues de charrettes cassées ou des traces de campements sont présentes tout au long de la route.</em></span></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/statues.nains.dans.montagnes.jpg\" width=\"150\" /><p class=\"MsoNormal\"><span style=\"font-family:Bookinsanity\"><em><strong>Après 4 jours à arpenter les montagnes, vous arrivez à un croisement important.</strong> Pas seulement entre la route principale et des petits chemins annexes comme vous avez déjà croisé mais bien <strong>un carrefour en patte d’oie où les deux routes sont de tailles et d’aspects similaires.</strong> L’une continue vers l’Est au travers les montagnes et la deuxième pointe vers le sud et elle est encadrée par deux statues de pierre représentant un nain et une naine d’environ 8m de hauteur. Tous les deux portent des habits de mineur, pioche à la main, casque à bougie et un beau symbole de l’ordre du Temple au centre de leur tablier.</em></span></p><p class=\"MsoNormal\"><span style=\"font-family:Bookinsanity\"><em>Le chemin vers l’Est semble plus fréquenté que celui du Sud.</em></span></p><p class=\"MsoNormal\"></p><p class=\"MsoNormal\"><span style=\"font-family:Bookinsanity\"><em><strong>Par où allez-vous\_?</strong></em></span></p></td></tr></tbody></table><p class=\"MsoNormal\"></p><table><tbody><tr><td><h3>Chemin sud\_:</h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Mines.Arkiram.jpg\" width=\"150\" /><p class=\"MsoNormal\">Après une journée entière de voyage. Les PJs atteignent une ancienne mine naine à l’abandon depuis des dizaines voir des centaines d’années. Une quinzaine de mètres après la grande ouverture, le couloir est condamné par un entremêlement de gravats et de rochers et une grande grille de fer forgé et gravé de runes est baissée devant les gravats.</p><p class=\"MsoNormal\">Au niveau de l’immense hache au dessus de l’ouverture, vous pouvez lire\_: <strong>Forteresse-État de Arkir’am.</strong></p><p class=\"MsoNormal\"></p><p class=\"MsoNormal\">INT-CULTURE GÉNÉRALE DD18 (DD12 pour les PJs Nains)\_: c’est l’entrée d’une mine qui a été abandonnée. Certains parlent de l’épuisement des minerais et d’un conflit politique. D’autres raconte que la cité a été perdue après de multiples attaques. Elle a été fermée il y a un peu plus de 1\_000 ans (-298 CA).</p><p class=\"MsoNormal\"></p><p class=\"MsoNormal\"><strong>Les PJs peuvent monter un camp sécurisé dans l’entrée de la mine.</strong></p><p class=\"MsoNormal\"></p><p class=\"MsoNormal\">SAG-PERCEPTION DD20\_: Vous vous sentez observés haut dessus de vous dans les montagnes. Les bruits que vous preniez pour les sifflements du vent ressemblent plus à des sifflements ou des murmures.</p><p class=\"MsoNormal\"><strong>Rien de plus sur ce chemin c’est un cul-de-sac\_!</strong></p></td></tr></tbody></table><p class=\"MsoNormal\">\_</p><table><tbody><tr><td><h3>Chemin Est\_:</h3><p class=\"MsoNormal\">En poursuivant vers l’Est la route continue de façon répétitive et interminable. Falaise, rocher, froid, tunnels et ponts s’enchainent toute la journée. Le vent est de plus en plus mordant et le froid commence à être pénible. Vous sentez que la fraicheur commence à mordre et la glace au-dessus de vous est renforcée par la température glaciale. Le soleil fait scintiller les plaque de neige et de glace. Les Plic-ploc résonnent entre les parois bordant la route.</p><p class=\"MsoNormal\">En début de matinée, vous entendez un sifflement au dessus de votre tête derrière le bruit du craquement des pierres et des rochers.</p><p></p><p class=\"MsoNormal\">PERCEPTION DD10\_: les bruits viennent d’au-dessus</p><p class=\"MsoNormal\">PERCEPTION DD15\_: ils viennent de votre droite (montrer la plateforme où est la bête)</p><p class=\"MsoNormal\">PERCEPTION DD20\_: (indiquer l’endroit exacte de la bête). Vous reconnaissez les bruit d’une\_Guivre NATURE-SURVIE DD12 pour info supplémentaires.</p><p class=\"MsoNormal\"></p><p>Si certains PJs le veulent, ils peuvent réussir à faire fuir la Guivre grâce à des cris et des bruits forts (CHA-COMMANDEMENT DD15) ou avec l'usage de torches ou de feu magique. La guivre se s'enfuira pas de suite mais restera à distance. Si on l'attaque elle attaquera mais si personne ne l'attaque elle montera vers les sommets et disparaitra.</p><p></p><p class=\"MsoNormal\">COMBAT vs une Guivre NC3 (LM93) =&gt; <strong>@UUID[Scene.WbZBS2hZZaonJl6X]{Attaque Guivre}</strong></p><p class=\"MsoNormal\"></p><p class=\"MsoNormal\">Après 7 (ou 9 jours s’ils sont passé par les mines naines d’Arkir’am), les PJs arrivent en vue de la ville du Ravin de Novrak.</p></td></tr></tbody></table><p class=\"MsoNormal\"></p><h1>\_La Ville du Ravin de Novrak</h1><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Après ce combat contre la Guivre, <strong>vous reprenez votre route et rapidement vous remarquez que le chemin est de plus en plus fréquenté.</strong> Des traces de charrettes, des traces de pas, des débris de campements et surtout un déblayage plus net des rochers et des gravats. <strong>Des petites constructions aménagées vous permettent de passer des nuits confortables et calmes</strong>.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Après 7 jours de voyage dans les montagnes</em> (9 jours s’ils sont passez par les mines naines)<em>, <strong>vous passez un col de montagne et entendez au loin les premiers bruits d’une activité humaine masquée par le ronronnement de plus en plus fort d’un cours d’eau</strong> de montagne.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>En fin de matinée, vous arrivez sur une plateforme qui vous donne <strong>une vue dégagée sur une ville active en contre bas traversée par une rivière agitée</strong>. La ville n’a pas de fortifications construite mais au vu de sa position, aucune armée ou groupe de pillards pourrait s’approcher assez sans être bloqué ou perturbé par les hautes falaises qui l’entourent.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>A première vu, <strong>vous ne pouvez pas dire si le grand bastion qui a été construit au centre du village est un donjon, un château ou une cathédrale.</strong> Avec ses tours impressionnantes, cette structure domine cette ville où vous remarquez pas mal d’animation dans les rues et aux alentours. <strong>Les bruits des discussions et des outils remontent à vos oreilles</strong> plus vous descendez la pente vers la rivière.</em></span></p></td></tr></tbody></table><p class=\"MsoNormal\"></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/RavindeNovrak01.jpg\" width=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/RavindeNovrak03.jpg\" width=\"150\" /><h3>Ce qu’il faut savoir sur Le Ravin de Novrak :</h3><p>Ville de près de 550 habitants en grande partie constituée d’humain (70%) et de nains (23%). On peut y croiser quelques Peaux Vertes (7%) mais pour trouver un elfe il va falloir se lever tôt.</p><p><strong>Le climat très rustique et froid du Ravin de Novrak et surtout le manque de luminosité donne à cette ville des aspects austères et les habitants ont souvent le teint pâle et des marques du climat rude sur le visage et dans les postures.</strong></p><p>Dans ce village, bien organisé, les caravanes et les voyageurs de passages sont toujours tolérés mais <strong>la frontière est particulièrement opaque entre les habitants et les gens de passage.</strong> Faire sa vie au milieu de ces habitants revient à être un étranger toute sa vie, même si, de temps à autre, on peut trouver des mariages entre un migrant de l’Est ou de l’Ouest et un Novrak ou une Novraki.</p><p><strong>L’économie et les échanges se font très majoritairement avec les Marches du Venkor et sa capitale Kosland grâce à la rivière qui traverse la ville et qui prend sa source un peu plus haut dans les sommets.</strong> Cette rivière descend jusqu’à la rivière « <strong>Mordra</strong> » et permet le transport de marchandises dans de petites embarcations assez particulières nommée par les Novrak « <strong>barque à bras</strong> », de la ville vers les zones plus civilisées en évitant les marécages et les périples présents dans cette zone de la Birkanie. Arrivée le plus au Sud du Fleuve « Mordra », <strong>une grande et belle cité fortifiée, « Mordian », permet découler les marchandises</strong> et de faire le plein des denrées essentiellement alimentaires dont à besoin les habitants du Ravin de Novrak. Ensuite, <strong>les « embarcations » sont tirées hors de l’eau et deviennent de charrettes tractables par un cheval ou deux à quatre hommes</strong> pour retourner dans les chemins de montagnes. Très maniables, les « barques à bras » sont un atout jalousement gardé par la ville tant sur sa conception que sur son utilisation.</p><p>Les produits phares du Village et qui s’exportent vers les Marches du Venkor essentiellement sont du <strong>cuir de haute qualité venant des bouquetins de Novrak</strong> (une espèce rustique et locale), <strong>les distillats de résines des conifères</strong> de la montagne ainsi que <strong>quelques plantes rares</strong> du coin et bien sur les autres produit des montagnes environnantes (<strong>minerais, blocs de roches, bois de résineux</strong>…).</p><p>La position du Ravin de Novrak lui <strong>permet aussi de monétiser un certain nombre d’informations stratégiques entre le grand Ouest et les régions à l’Est des montagnes des Crocs d’Acier</strong> (bandes de Peaux Vertes en mouvement, actualités, changement de gouvernement de différentes grandes cités éloignées). Ainsi, <strong>la plupart des commerçants et des nobles de la ville posent énormément de questions aux voyageurs et marchands passant par la ville</strong> afin de récupérer les informations importantes pour les vendre ensuite au plus offrant.</p><p><strong>Le Ravin de Novrak est rarement attaqué par les tribus de Peaux Vertes</strong> qui peuvent vivre dans les montagnes ou en Birkanie car depuis plusieurs années, <strong>les habitants stoppent et libèrent les caravanes d’esclavagistes</strong> qui mettent à sac des tribus d’Orcs ou de Gobelins pour revendre des Peaux Vertes dans l’Ourann. Sans être officiel, les Orcs et Gobelins ont un certain respect pour ces habitants.</p><p>Il est, depuis quelques dizaines d’années, assez risqué d’aller dans les montagnes aux alentours de la ville sans une forte présence de protection. <strong>De nombreuses disparitions ont été signalées dès qu’on s’aventure dans les hauteurs</strong> ou que l’on prend ses distances à la recherche de plantes ou pour pouvoir chasser. Les éleveurs de bouquetins de Novrak redoutent toute l’année d’amener leurs bêtes dans des pâturages au risque de ne pas revenir au village. L’exploration des montagnes est de par nature assez dangereuse mais <strong>depuis des années les « Ombres Blanches » assassinent et kidnappent les imprudents</strong> faisant du hors piste.</p><p></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Arbosk.Mieili.de.la.Tour.de.Mabeuil.jpg\" width=\"150\" /><p>Seigneur local : <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Arbosk Mieili de la Tour de Mabeuil</span></strong></span> et son épouse Veronia.</p><p>Le père du seigneur Mieili, <strong>Arbosk’char, est encore très influent dans la ville</strong>. Les <strong>trois fils et deux filles du seigneur (entre 15 ans et 37 ans) ont chacun une place dans la gestion de la ville</strong>. <strong>Le seigneur est respecté</strong> par la population même si certains lui reproche son inaction, sa passivité et son manque de changement ou d’ambition. <strong>Huit familles de nobles</strong> se partagent les intérêts de la ville et différents points de sa gestion. Il y a peu de conflit car chacun a sa place et son rôle. A chaque décès de seigneur, des tensions et des luttes de pouvoir apparaissent sans changer fondamentalement le quotidien des habitants. Politiquement parlant <strong>seul trois sujets secouent la tranquillité traditionnelle</strong> de la ville : <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">le racisme envers les anciennes races</span></strong></span> tout droit venu des Marches du Venkor et s’essaimant petit à petit dans la ville, <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">le désir de certains de faire prospérer la ville</span></strong></span> alors que d’autres préfèrent ne rien changer et enfin, <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">les problèmes des « Ombres Blanches » et de la sécurité des montagnes</span></strong></span>. Sur ce dernier sujet certains veulent reprendre le pouvoir sur la montagne en faisant venir une armée de guerriers pour éradiquer cette menace une bonne fois pour toute tandis que d’autres parlent de l’esprit de la montagne et de ne pas aggraver la situation en amplifiant l’influence des humains sur l’équilibre des énergies de la montagne.</p><p><strong>La grande majorité des sujets de discussion dans les auberges, les tavernes ou les étales de marché tourneront autour de ces trois sujets.</strong> Les habitants sont pour la plupart des gens simples mais durs au premier abord. Ils poseront, surtout les commerçants, marchands et nobles, des questions au groupe d’aventuriers sur ce qu’il se passe au-delà des montagnes et après quelques instants, une majorité des habitants répondront aux questions des PJs.</p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Au Ravin de Novrak, on peut trouver :</span></strong></span></p><ul><li><p><strong>Un château faisant office aussi de temple de Solima et d’Yjdad et de place forte en cas d’attaque</strong>. Les deux temples (humain et nain) sont bien séparés mais de mémoire c’est surement la seule ville qui accueille dans le même bâtiment les deux croyances.</p></li><li><p><strong>Quelques auberges ou tavernes</strong> plus ou moins chics</p></li><li><p><strong>De nombreux artisans</strong> de la vie de tous les jours (forgeron, orfèvre, tisserands, scieurs et menuisiers…) <strong>@UUID[JournalEntry.BoNGgNod3GGBvA3G]{Artisans de Novrak}</strong></p></li><li><p><strong>Des artisans spécialisés dans les produits à exporter</strong> (minerais, blocs de roches, distillation de résines ou de plantes de montagne, éleveur de bêtes, fabricant de cuir de haute qualité…)</p></li><li><p><strong>Des bordels</strong> et maisons closes</p></li><li><p><strong>Une grande place du marché</strong> non loin du château avec des étales bien fournis</p></li><li><p><strong>Une</strong> <strong>école spécialisée dans les recherches sur la géologie, la faune et la flore de montagne</strong>. <em>(Donne bonus pour le voyage +5 ou +10 en fonction du prix et du temps passé à étudier et questionner)</em></p></li><li><p><strong>Un petit amphithéâtre</strong> où sont organisé des tournois, des animations culturelles et des procès régulièrement.</p></li><li><p>Une bâtisse gérée par <strong>la Guilde des Jongleurs</strong> (assez rare pour être noté). <em>Ils ont entendu parlé des Héros du Val Rouge avec quelques FakeNews - rien de plus)</em></p></li><li><p>Même si c’est dur d’avoir l’information, au sein du château et du temple, on peut trouver dans cette ville <strong>un groupe d’exorcistes</strong> (deux humains et un nain du temple).</p></li><li><p>Une bâtisse fait office <strong>d’hôpital, d’herboristerie et de vétérinaire</strong></p></li><li><p>Connu seulement des connaisseurs, <strong>un ancien nain du Bouclier possède un magasin et une belle collection d’objets traditionnels</strong> de différentes cultures (Objets magiques nains mais aussi Elfique, humain et quelques pièces Peaux Vertes)</p></li><li><p>Totalement caché, on peut trouver, dans certains souterrains de la ville, <strong>une bande de voleurs assez grande</strong> pour qu’on puisse la qualifier de Guilde.</p></li></ul></div><div class=\"arran-mod\"><p></p><p></p><h3>INVESTIGATION dans la village :</h3><p>Si les PJs parlent du Village <strong>d’Arkanov personne n’en a entendu parler et beaucoup les dissuadent d’aller dans les montagnes</strong>.</p><p>Si les PJs leur parlent d’un <strong>village de Centaures personne ne souhaite répondre réellement. Les villageois posent des questions aux PJs mais font de la langue de bois sur leur questions.</strong></p><p><strong>Au bout de quelques jours alors que la rumeur du groupe de PJs augmente, un groupe de femmes du Ravin de Novrak viennent les voir à l'auberge ou taverne pour leur parler. Elles les draguent ouvertement et leur parlent d’un vieux marchand alcoolique du village</strong> <strong>qui raconte des histoires aux enfants autour de ses relations avec des centaures</strong> soi-disant isolés dans un village à quelques kilomètres du village. Ce ne sont que des fantaisies d’un vieux marchand qui trafiquait surement avec une tribu de Peaux Vertes pendant quelques années et qui voulait vendre ses marchandises plus chères en rajoutant une dose d’exotisme sur ces histoires.</p><p>Il se nomme <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Timaor DUNCLIN</span></strong></span> mais tout le monde l’appelle <strong>le vieux Titi</strong>.</p><p><strong>Timaor n’est pas facile à trouvé dans le village car il se balade toute la journée</strong>, s’assoie quelques heures sur un banc, mange tranquillement dans une auberge et arpente de nouveau les rues. Il discute avec les habitants et raconte des histoires aux enfants qu’il croise. <strong>Certains enfants aiment l’embêter</strong> et lui faire des blagues mais la plupart des habitants bien ce vieux marchand.</p><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Si le groupe demande à des enfants</span></span> ils seront heureux de les guider dans les rues du Ravin de Novrak contre quelques pièces. Il y a de grandes chances de le croiser en train de marcher dans les rues ou de discuter de façon énervante avec un Novrak ou une Novraki.</p><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Si les PJs l’abordent avec respect</span></span>, il les amènera dans sa petite maison rustique et discutera autour d’un verre d'alcool fort. Il est assez alcollisé et dès que la bouteille est vide, il demandera aux PJs d'aller chercher d'autres bouteilles à la taverne et ne parlera de rien tant qu'ils ne seront pas revenu. Même si les PJs sont gentils, Timaor sera vite fatigué et s'endormira quasiment. Il faudra revenir ou le brusquer.</p><p>Attention Timaor se méfie des moqueries ou des petites phrases agressives ou le manque de respect. Il pourra s'énerver si il pense que le groupe se moque de lui.</p><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Si les PJs l’aborde avec dédain ou agressivité</span></span>, il se fermera comme une huitre et demandera de l’argent pour répondre (pas moins de 150pa). Si les PJs sont menaçant ou essaye de lui coller des baffes, Timaor ne se démontera pas et les provoquera \"vas-y j'ai plus rien à perdre\", \"même pas cap de frapper un vieux alcoolique\" \"Vous êtes tellement con que pour faire parler un vieux vous êtes obligé de la cogner ou de le brusquer\" \"Vous faites la même chose quand une dame vous dit non bande de violeurs\" \"Tuez moi et la garde s'occupera de vous, je n'ai plus à faire dans se monde de merde\"</p><p></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/timaor02.jpg\" width=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/timaor03.jpg\" width=\"150\" /><h3>Informations données par Timaor Dunclin :</h3><ul><li><p>Il a rencontré par hasard le village des Centaures alors qu’il cherchait des herbes rares au nord du village, <strong>il y a plus de 30 ans</strong>.</p></li><li><p><strong>Les centaures l’ont enfermé dans une mine</strong> pendant plusieurs jours mais <strong>il était très bien traité</strong>.</p></li><li><p><strong>Ils ne parlent pas la même langue et ont des coutumes bizarres</strong> (des danses, des chants, des rituels…).</p></li><li><p>Ils ont réussi à se comprendre au bout de quelques semaines grâce à ses marchandises qu’il avait dans son sac et qui intriguaient les Centaures. <strong>Ils ont fait des échanges</strong> (une belle dague de Timaor contre des herbes aromatiques qu’ils cultivent sur place, par exemple). <strong>Il a sympathisé avec le chef du village qui se nommait </strong><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Poauau</span></strong></span>.</p></li><li><p>Il est resté <strong>plus de 4 mois dans le village</strong> avant d’être libéré par les Centaures.</p></li><li><p>A son retour <strong>personne ne l’a cru et beaucoup d’habitants pensent qu’il est fou</strong> ou qu’<strong>il voulait garder secret ses échanges avec une tribu de Peaux Vertes</strong>.</p></li><li><p>Il a <strong>sombré plusieurs années dans l’alcool</strong> et les tavernes. Beaucoup le moquait.</p></li><li><p><strong>Il y est retourné quelques fois pendant les premiers temps pour faire des échanges mais ses marchandises ne se vendaient pas</strong> car personne ne le croyait. Les gens pensaient qu’il avait récupéré des marchandises volées par des clans de Peaux Vertes. Devant le péril du voyage et le peu de reconnaissance et de retour sur investissement, il a vite arrêté d’y retourner.</p></li><li><p>Maintenant <strong>il est trop vieux pour ces aventures</strong> et en plus il perd la vue depuis 10 ans.</p></li><li><p>Il n’y est jamais retourné <strong>depuis plus de 20 ans</strong>.</p></li></ul><p></p><h3>Informations complémentaires si les PJs lui tire les vers du nez, sont très gentils ou l’écoutent avec intérêt :</h3><ul><li><p>Quand on lève les mains et <strong>qu’on montre ses deux paumes, c’est un signe de défi</strong> et une invitation au combat pour provoquer l’autre.</p></li><li><p><strong>Il ne faut jamais toucher la croupe d’un ou une centaure</strong> si on ne nous le demande pas.</p></li><li><p>Ils sont très <strong>fier de leurs tatouages</strong> et ils les montrent pour appuyer leur parole (même s’il ne comprenait pas)</p></li><li><p>D’après Timaor : ils disaient « <strong>Ata Pai</strong> » pour nous saluer</p></li><li><p>Et quand Timaor faisait une chose interdite : « <strong>kaua e pena</strong> »</p></li><li><p>Son nom pour les centaures « <strong>Tangata</strong> » (trad. Humain)</p></li></ul><p><strong>Timaor leur indique sur une carte l’endroit approximatif où se trouve le village d’Arkanov</strong>. Les murailles et les portes sont recouvertes de lierre et on peut trouver l’endroit car certains arbres étaient coupés devant les murailles. A l’époque, il était intrigué par un épais nuage de vapeur d’eau venant surement d’une grande cascade mais il n’entendait pas de bruit de cette cascade.</p><p><strong>En passant les portes du petit village, les bruits et les sons des activités des Centaures se répandent à vos oreilles.</strong></p><hr /><p></p><h3>Description du Voyage :</h3><p><strong>Le village est à 40 km à vol d’oiseau mais en parcourant les montagnes, ça représente plutôt le double de distance à une allure très réduite</strong>. Il n’y a pas de chemin balisé, pas d’itinéraire, pas de repère pour atteindre le point indiqué par Timaor. <strong>Il faudra prévoir de l’équipement</strong> de randonnée et peut-être d’escalade avant de partir, des vêtements de protection contre le froid malgré le début du printemps et un paquetage léger. <strong>Il faudra aussi faire attention aux bêtes sauvages et aux crevasses qui peuvent être mortels</strong> pour ceux qui ne sont pas à la hauteur.</p><p class=\"MsoNormal\"><strong>L’équipement peut être trouvé dans les boutiques ou chez les artisans du Ravin de Novrak et de nombreuses informations sur la faune et la flore sauvage peuvent être apprises</strong> auprès de certaines personnes du village (herboriste, chasseurs, marchands), <strong>contre rémunération bien sur</strong>. Le groupe de <strong>PJs peuvent aussi engager un pisteur</strong> pour les guider dans les montagnes (minimum 80pa par jour – mise de départ 180pa par jour). <strong>Certains marchands essayeront de leur vendre des produits inutiles ou de mauvaises</strong> <strong>qualités</strong> (huile repoussante contre les araignées tisseuses, bouquet d’herbe à faire bruler le soir pour repousser les Jarguals, tente qui se monte rapidement, sur-chaussure à crampon pour escalader qui se casseront rapidement, corde en poils de bouquetin de Novrak soit disant plus résistant…).</p><p></p><p><strong>Les PJs peuvent profiter de la ville pour faire des emplettes et questionner en plus si besoin. Tous les magasins donnent des délais pour fabriquer des tenues de voyages adaptées au froid et de l'équipement, les PJs devront rester un peu dans la ville s'ils veulent s'équiper en conséquence.</strong></p><p><strong>Inciter les joueurs a passer du temps dans la ville pour avoir informations sur les Ombres Blanches et d'autres choses comme le racisme des humains envers les anciennes races.</strong></p><p></p><blockquote><p style=\"text-align:center\"><strong>Prochain Acte = le Village d'Arkanov</strong></p></blockquote></div>"
