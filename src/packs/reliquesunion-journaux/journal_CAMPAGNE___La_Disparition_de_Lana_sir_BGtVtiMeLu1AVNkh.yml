    text:
      format: 1
      content: "<div class=\"arran-mod\"><h1>Un séjour avec les Centaures</h1><p></p><p><strong>Le village d'Arkanov est un village totalement isolé du monde depuis sa création.</strong> Il est très ancien et seulement peuplé par des familles de Centaures. On peut y trouver 8 familles pour un total de 72 adultes et 17 enfants ou adolescents. Les habitants y vivent de façon assez rustique mais tout y est très fonctionnel et des machineries permettent de nombreuses fabrications artisanales que les aventuriers vont pouvoir découvrir tout au long de leur séjour.</p><p>Chose capitale : <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">aucun centaure ne parle la langue commune.</span></strong></span> <em>[Ils parlent un dialecte proche du Swahili]</em> et il sera difficile de communiquer entre le groupe et les habitants. Ils suivent un mode de vie cadrer autour <strong>d'une culture d'honneur, de d'entraide, de rituels complexes</strong> (danses, chants, histoires contées…) <strong>et d'une grande joie de vivre</strong>. <em>[mélange du code d'honneur Japonais et de la culture Maori]</em></p><p>Ils seront méfiants envers les PJs mais <strong>toujours bienveillants sauf si certains des héros se montrent désobligeants ou méprisants ou agressifs</strong>.</p><p>Le séjour devrait durer plusieurs mois, le temps de gagner la confiance de ce peuple.</p><p></p><p>Les PJs devraient découvrir assez rapidement qu'<strong>il y a un conflit entre deux groupes au sein du village : la majorité des habitants veulent vivre leur vie tranquillement dans le village et parmi eux une partie pense que les centaures pourraient sortir du village pour s'ouvrir au monde, faire des rencontres, des échanges et nouer des relations avec les peuples qu'ils ne connaissent que très peu</strong>. Un deuxième groupe est beaucoup plus agressif et méfiant avec le monde extérieur. Ils propagent l'idée que les centaures sont une race plus forte, plus intelligente et plus puissante que la majorité des autres peuples des Terres d'Arran. Ils aimeraient annexer la partie de la montagne où se situe le village d'Arkanov, attaquer les peuples présents et imposer la présence des centaures sur cette région. Il ne faut pas paraitre faible sinon les centaures seront exterminés.</p><p></p><p>Tout au long de leur séjour, <strong>chaque PJs aura une </strong><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">jauge de Confiance</span></strong></span><strong> secrète</strong> qui permettra de réagir plus adéquatement avec les habitants. <strong>Plus la jauge de Confiance sera élevé plus on leur autorisera des libertés et des activités complexes et gratifiantes. Plus leur jauge de Confiance est Basse plus on les gardera à vu, on les disputera voir corrigera, on leur fera faire des tâches ingrates et on les laissera dans leur coin dans l'indifférence</strong>. A chacun de faire ses propres gains de Confiance ou de Méfiance en fonction des réaction des PJs. La plupart des Centaures commencent avec un rapport neutre (jauge de confiance à 0) envers les PJs mais certains conservateurs baissent de base la jauge de Confiance et certains émancipateurs augmentent de base la jauge de Confiance.</p><p><strong>Les bâtiments et lieux du village ont une note de Confiance pour pouvoir y accéder (Confiance d'Accès) et une autre note pour que les PJs puissent y travailler (Confiance de Travail).</strong> Lorsqu'ils dépasse la Confiance d'Accès, les centaures pourront leur faire visiter accompagnés et observés. Lorsque le PJ dépasse la Confiance de Travail, il pourra soit y travailler soit visiter le bâtiment seul.</p><p>Toutes les actions des PJs (travail, interactions, aides, respect des traditions, motivation à se faire comprendre…) auront un effet à la hausse ou à la baisse sur la Jauge de Confiance.</p><p>Lorsqu'il est noté <strong>PJs CONF</strong> =&gt; ça signifie les personnages qui ont une jauge de confiance assez haute.</p><p></p><h3>Si les PJs sont respectueux et compréhensifs, qu'ils font des efforts :</h3><ul><li><p>Les centaures les gardent <strong>enfermés pendant une quinzaine de jours</strong></p></li><li><p>On leur fournit <strong>des repas de bonne qualité dans les mines</strong>, on vide les toilettes, on leur fournit des vêtements propres, des soins si besoin…</p></li><li><p><strong>Certains centaures assez vieux viennent pour essayer de communiquer</strong> avec les PJs mais ils s'agacent vite.</p></li><li><p>On les invite à <strong>travailler dans les mines</strong> pour récupérer des pépites de métaux bruts, de tailler des flèches, éplucher des légumes, tailler du bois… S'ils ne le font pas les centaures seront très étonnés et perplexe de leur manque d'intérêt et de politesse. Les centaures seront plus fermes et autoritaires s'ils refusent. Si les PJs travaillent, on les encouragera, félicitera avec des tapes sur les épaules… les centaures seront très respectueux.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Au bout de 5 jours</span></strong></span>, une voix appelle à la porte pour essayé de communiquer avec les PJs : <strong>elle s'appelle Vaiata Viata @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata}</strong>. C'est une jeune femelle Centaure âgée d'environ 18 ans. <strong>Elle est très curieuse, souriante et fera beaucoup d'effort pour apprendre des mots aux PJs et essayé de les comprendre</strong> (dessins passé par la trappe de la porte, symboles, traduction d'objets…). Elle se fera gronder quand on l'a découvre en train de discuter avec les aventuriers.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Au 15è jour</span></strong></span>, les PJs CONF sont invités à <strong>manger avec les centaures sur la place principale</strong>. Ils découvriront alors une partie du village et certains centaures en armes pourront leur faire <strong>visiter certains bâtiments</strong>. Les relations avec les PJs seront assez simples et pleins de <strong>curiosités pour les émancipateurs</strong>. Par contre certains <strong>conservateurs pourront grogner, bousculer, invectiver</strong>… Devant les \"offenses\" des PJs et les \"entorses\" non voulues aux coutumes des centaures, il y aura beaucoup de rires et de moqueries aimables (par exemple : il ne faut jamais siffler pendant un repas / le plus vieux commence à manger / après un éternument on claque des doigts deux fois / on se mouille le front avant de rentrer dans le lac pour se laver ou nager…)</p></li><li><p>Pour les PJs CONF, il faudra <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">minimum 30 jours</span></strong></span><strong> pour qu'on leur propose de venir sur les bancs de l'école</strong> avec les jeunes centaures pour commencer à apprendre la langue.</p></li><li><p>Il faudra au <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">minimum 40 jours</span></strong></span><strong> pour que les PJs CONF puissent dormir dans une maison à eux</strong> et un des centaures auront même créer dans la menuiserie des lits adaptés aux Héros avec le matelas et les draps.</p></li><li><p>Après quelques semaines/mois, <strong>certains PJs devraient pouvoir comprendre et se faire comprendre</strong> par les centaures et si leur jauge de confiance est assez haute on pourra leur faire découvrir la grottes de cérémonie avec la grande fresque.</p></li><li><p><strong>Les PJs CONF qui comprennent les centaures entendront parlé des Atarangi Kino (les Ombres Blanches)</strong> qui viennent attaquer le village de temps en temps</p></li><li><p><strong>Au bout de 4 mois dans le village d'Arkanov, une soirée va venir perturber le village : </strong><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">l'attaque des Atarangi Kino</span></strong></span> va tuer un centaure ami avec un ou plusieurs PJs et kidnapper un jeune centaures d'une 15è d'année. Si les Centaures ont assez confiance envers les PJs ils leur demanderont d'aller venger leur camarade et libérer le jeune. Leur succès permettra l'ouverture de la salle secrète.</p></li></ul><p></p><h3>Si les PJs sont violents, agressifs, obtus ou renfermés :</h3><ul><li><p><strong>Le séjour en prison durera jusqu'à leur début de coopération</strong>. On ne leur demandera que de miner avec beaucoup d'hostilité, d'interrogatoire incompréhensif et d'intimidation</p></li><li><p><strong>Vaiata Viata @UUID[Actor.odrYGDrjFeqgEW6e]{Fe18 Vaiata Viata (Curieuse)} brave les interdits et se rapproche des PJs pour défendre leur cause</strong> malgré les remontrances des adultes et les engueulades fréquentes</p></li><li><p><strong>Si la Méfiance se transforme en Confiance =&gt;</strong> Voir plus haut et suivre le déroulement mais ça prend plus de temps</p></li><li><p><strong>S'ils sont toujours hostiles,</strong> Vaiata essayera de les faire s'évader</p></li><li><p><strong>S'ils sont hostiles même envers Vaiata =&gt;</strong> ils seront exclus du village sans plus aucun équipement et abandonnés dans la montagnes avec le stricte minimum pour survivre. On leur fera boire une décoction qui brouille leurs souvenirs depuis les deux dernières années. Presque FIN de la Campagne (seul chose : retour à Ispier et retour de <strong>@UUID[JournalEntry.nMagpI6MXzMv2o8p]{Zagrenn Fredfisk} </strong>avec de nouvelles informations). Tout le monde est déçu. Laotissa sermonne le groupe et en fonction de leur réaction =&gt; continuer la campagne ou FIN)</p></li></ul><p></p><h3>Si les PJs souhaite trouver le village des centaure de façon furtif et s'infiltrer dedans</h3><p>C'est possible mais extrêmement difficile et long. Observation depuis les montagnes, compréhension des rites, découverte de la grotte des rituels et de la fresque, trouver le moyen de l'ouvrir et récupérer la Ceinture. <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Vraiment très compliqué</span></strong></span>.</p><p><strong>Si les PJs se font repérer, appliquer la même méthode que si les PJs étaient tombé sur le village normalement.</strong></p><p></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Dessin%20vaiataretouch%C3%A9.png\" width=\"150\" /><h1>Personnages Importants d'Arkanov :</h1><p>Même si les Centaures n'ont pas de nom de famille, on peut trouver cinq familles importantes dans le village. La liste qui suit ne représente pas l'intégralité des habitants mais ceux qui ont un caractère, un poste ou une responsabilité au sein de la communauté. Libre à chaque MJ de créer de nouveaux habitants.</p><p></p><h2>La famille de Kiliko et Tumuaki :</h2><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.2LqDHT8bg08iIa0b]{Poauau} :</span></strong></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme24.png\" width=\"70\" style=\"float:left\" /><p>le père de @UUID[Actor.acT0Ir2r38h6NiGJ]{Kiliko} l'actuel chef du village. <strong>Il a un mauvais caractère et est très imbu de sa position</strong>. En plus de perdre la mémoire, il n'aime pas du tout ces étrangers accueillis dans le village. Il est toujours assez fermé et souvent en désaccord avec les choses qu'on lui dit. <strong>Rien n'est assez bien pour lui</strong> et ce tempérament renfrogné est dur à vivre pour son fils. @UUID[Actor.nVnugxCfNlRY7EyL]{Miihini}, sa fille, arrive encore a lui tirer un sourire de temps en temps mais c'est bien la seule qui semble réussir à lui tirer un mot gentil ou un compliment.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.acT0Ir2r38h6NiGJ]{Kiliko}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme22.png\" width=\"70\" style=\"float:left\" /><p><strong>Chef du village</strong> et époux de @UUID[Actor.XP0WbhdG2M6FsbW1]{Tumuaki}, il prend sa responsabilité très au sérieux. Toujours balancé entre l'envie de faire plaisir et le risque prit par la communauté face aux PJs. Il est dure mais juste. Il ne pardonne rien en cas d'erreur mais porte une grande attention aux efforts qui sont fait. Son couple avec @UUID[Actor.XP0WbhdG2M6FsbW1]{Tumuaki} est un vrai soutien pour lui. Il sait qu'elle partage ses valeurs et ses responsabilités. Kiliko aime profondément tous ses enfants même s'il ne veut pas les privilégier face aux autres habitants. A première vue, on pourrait le penser froid et distant à cause de cela. Son rôle de chef est important pour lui et combien même il ne peut plus passer ses journées à s'entrainer, il reste un très talentueux combattant bien qu'un petit peu rouillé. Depuis les premières attaques des Atarangi Kino/Ombres Blanches, Kiliko est tiraillé entre poursuivre ces assassins kidnappeurs et les faire payer pour leurs crimes et continuer de protéger le village en conservant la bulle de secret autour d'Arkanov. Kiliko, @UUID[Actor.XP0WbhdG2M6FsbW1]{Tumuaki} et @UUID[Actor.JPUV1enjGxhcOmiz]{Wakaweti} sont les seul à connaitre l'existence d'une pièce cachée dans la grotte de cérémonie mais ils ignorent la présence de la Ceinture de l'Union.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.XP0WbhdG2M6FsbW1]{Tumuaki}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme21.png\" width=\"70\" style=\"float:left\" /><p>Elle partage avec son conjoint, @UUID[Actor.acT0Ir2r38h6NiGJ]{Kiliko}, <strong>la responsabilité du bien-être et de la sécurité du village</strong>. C'est une centaure très <strong>sombre et colérique</strong> et elle peut se montrer <strong>manipulatrice</strong> lorsqu'elle se sent menacée. La plupart des villageois la perçoit <strong>sévère et intransigeante</strong> comme son grand frère @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha}. Elle observe tout le monde et s'occupe de tout. Elle aime fortement son conjoint et elle le soutiendra à chaque décision mais avant cela elle essayera de le convaincre et elle arrive souvent à lui faire durcir sa position. Les traditions sont importantes ou le décorum du village mais Tumuaki sent que <strong>l'avenir doit changer et que les centaures vont devoir prendre leur place légitime dans la région.</strong> Elle est particulièrement déçu du choix de son fils aîné, @UUID[Actor.JPUV1enjGxhcOmiz]{Wakaweti}, de succomber à sa passion pour sa cousine, @UUID[Actor.BQvEXdnPDfoBuIr0]{Karekau}, lui qui avait un avenir tout tracé à la tête du village. Tumuaki continue de la pousser vers cette responsabilité mais elle a perdu foi en lui. Elle s'est enfermée depuis quelques années dans son rôle et elle se rapproche de plus en plus des idées de @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha} après chaque attaque des Atarangi Kino/Ombres Blanches et après chaque tension entre les émancipateurs et les conservateurs du village.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.tJpJlFACm4Cztfya]{Karekau}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme05.png\" width=\"70\" style=\"float:left\" /><p>le d<strong>oyen du village</strong> et père de @UUID[Actor.XP0WbhdG2M6FsbW1]{Tumuaki}, malgré son grand âge c'est un <strong>centaure respecté</strong> et il le sait. Il joue de sa position pour braver les interdit avec une certaine malice. Au premiers abords on dirait qu'il est très conservateur mais pourra prendre le parti des PJs si ça lui permet d'embêter le chef du village. Il a <strong>tendance à passer du temps à observer les membres de sa famille et en particulier @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha}</strong> pour lui répéter à longueur de journée qu'il aurait du être le chef pour que le village soit mieux géré et sa fille, @UUID[Actor.ZGq5yQFYuv43MxqN]{Kite'Tihe} pour grogner avec elle sur l'avenir du village et sur sa maladie.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.nVnugxCfNlRY7EyL]{Miihini}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme24.png\" width=\"70\" style=\"float:left\" /><p><strong>soeur du chef</strong>, cette femelle centaure a toujours été célibataire et elle a un sacré caractère. Sa force de caractère lui permet de confronter son grand frère quand il est trop sévère ou qu'il manque à ses devoirs. Elle est très ouverte d'esprit et un vrai modèle pour @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata}. <strong>Elle est experte de toutes les machines</strong> du village et elle passe beaucoup de temps avec @UUID[Actor.BQvEXdnPDfoBuIr0]{ Karekau}. Bonne cuisinière, elle aime les personnes qui ont un bon coup de fourchette. Lorsque l'on arrive à passer sa méfiance, <strong>elle est très rigolote</strong>.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.ZGq5yQFYuv43MxqN]{Kite'Tihe}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme26.png\" width=\"70\" style=\"float:left\" /><p>Grande soeur de @UUID[Actor.XP0WbhdG2M6FsbW1]{Tumuaki}, cette femme est <strong>d'une méchanceté profonde</strong>. Veuve depuis plusieurs années, elle <strong>bougonne</strong>, <strong>rage et grogne</strong> tout le temps. Une maladie l'empêche de faire le moindre effort à cause de <strong>quintes de toux</strong> et elle passe ses journées à invectiver les habitants. Le fait que sa seule fille décide de choisir comme conjoint @UUID[Actor.JPUV1enjGxhcOmiz]{Wakaweti}, le premier né du chef, son propre cousin, est un vrai poison pour elle. En plus de cette déception profonde, elle <strong>commence à perdre la mémoire</strong> et elle se répètera souvent et redécouvrira les PJs à chaque rencontre.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.JPUV1enjGxhcOmiz]{Wakaweti}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme15.png\" width=\"70\" style=\"float:left\" /><p>le premier né de Kiliko a le caractère pour prendre la succession de son père à la tête du village, dur, tranchant lors des conflits et obtus. Cette avenir est bousculé par son amour pour @UUID[Actor.BQvEXdnPDfoBuIr0]{Karekau}, sa cousine directe. La loi leur interdisant de se reproduire, @UUID[Actor.JPUV1enjGxhcOmiz]{Wakaweti} choisi de protéger le village par sa grande maitrise des armes et des danses de combat. C'est un combattant impressionnant avec un mental serré autour des traditions, rites et dogmes de la communauté. Il prend la défense de son père à chaque fois que la famille de @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha} l'attaque sur les décisions qui sont prises ou sur sa vision sur le village. Il est le <strong>responsable de l'armurerie</strong> et <strong>s'occupe en priorité de frapper la cloche du village</strong> pour créer la bulle de silence. Il aime de tout son coeur ses parents mais est de plus en plus en conflit avec les pensées de sa mère.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.BQvEXdnPDfoBuIr0]{Karekau}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme27.png\" width=\"70\" style=\"float:left\" /><p>Conjointe de @UUID[Actor.JPUV1enjGxhcOmiz]{Wakaweti}, son cousin, il leur ai interdit de se reproduire. Ca ne les empêche pas de vivre un vrai amour depuis aussi longtemps qu'elle s'en souvient. Elle soutient son conjoint et elle est aussi compétente que lui avec une lance, un épieu ou un arc entre les mains. Tous les matin dans la grotte de prière, ils se retrouvent tous les deux pour une <strong>séance de prière suivi d'un entrainement intensif</strong> aux danses de combat et à la maitrise des armes. Calme et introvertie, <strong>elle s'occupe des machineries complexes</strong> au niveau de la cascade ou dans les différents bâtiments du village.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.WIrrciqtGuvianLz]{Kamura}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme06.png\" width=\"70\" style=\"float:left\" /><p>Cette femelle centaure rigoureuse, exigeante et doté d'un charisme fort est persuadée que son avenir est de prendre la place du chef. Elle décide de se mettre en couple avec @UUID[Actor.PL2XneyOs3rbecnt]{Iti}, le premier né d'une famille influente du village. Elle a de nombreuses qualités et s'occupe en particulier des <strong>besoin en artisanat et du suivi des fabrications</strong>. Bonne <strong>sculptrice, menuisière, forgeronne</strong>, elle <strong>aime le travail bien fait</strong>. Même si elle se montrera dure avec les PJs, ceux qui travailleront consciencieusement auront son attention. Son rôle et son travail lui prenant toutes ces journées, elle n'a pas beaucoup de temps à consacrer à son conjoint et malgré de nombreuses années de couple et leur quarantaine passée, ils n'ont pas encore d'enfant.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.oChorGnSdltQBYeg]{Kaiwhakairo}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme09.png\" width=\"70\" style=\"float:left\" /><p>Ce centaure mâle aime particulièrement sa famille, s'entrainer avec son grand frère @UUID[Actor.JPUV1enjGxhcOmiz]{Wakaweti} malgré leurs caractères diamétralement opposés et rendre service à la communauté. Il n'a aucune envie de devenir chef du village et il est un soutien discret de sa soeur @UUID[Actor.WIrrciqtGuvianLz]{Kamura}. En couple avec @UUID[Actor.o7tjD6cFNk5vMYC4]{Kara}, ils partagent leur optimisme et leur envie de rendre leur prochain heureux. Père de @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata} et de @UUID[Actor.mmAaWJQJDLTjYPKl]{Mataro}, il vit une existence calme dans le travail du bois et surtout dans <strong>l'atelier de sculpture</strong> où il peut passer des nuits entières, rejoint par sa conjointe ou ses enfants pour de longues discussions ou l'invention d'histoire sur le monde extérieur. Il a beaucoup d'intérêt pour les PJs mais garde ses distances pour ne pas embarrasser son père.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.o7tjD6cFNk5vMYC4]{Kara}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme23.png\" width=\"70\" style=\"float:left\" /><p>La mère de @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata} est une femelle centaure très respectée au village d'Arkanov. Sa connaissance des plantes, breuvages, potions et baumes en font une femme précieuse. Sa mère lui a apprit les recettes et les secrets de fabrication et d'utilisation de l'immense alambic du village. <strong>Soigneuse et psychologue</strong> <strong>à son insu</strong>, elle connait très bien tous les petits tracas et les grands secrets des habitants. Elle sait trouver les mots pour réconforter les peines de coeur et elle saura amputer un bras sans broncher. Elle tient son conjoint @UUID[Actor.oChorGnSdltQBYeg]{Kaiwhakairo} et ses enfants d'un main de maitre et elle peut élever la voix de façon ferme lors des réunions de village. Les PJ CONF apprendront que sa mère à été tuée par les Atarangi Kino/Ombres Blanches alors que son père a été kidnappé lors de la même attaque, il y a environ 6 mois. Véritable modèle pour @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata}, @UUID[Actor.o7tjD6cFNk5vMYC4]{Kara} a plus de mal avec son fils @UUID[Actor.mmAaWJQJDLTjYPKl]{Mataro}. En pleine adolescence, il ne comprend pas pourquoi son père ne pourrait pas être le prochain chef du village.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme13.png\" width=\"70\" style=\"float:left\" /><p>la flamme de la jeunesse incarnée dans cette jeune centaure à la <strong>curiosité maladive</strong> et à l'espièglerie dans chaque fibre de son corps. Toujours souriante, ses yeux trahissent souvent son manque d'attention. Après avoir trépigner sur les <strong>bancs de l'école</strong> en début de journée, elle passe son temps à aider qui le souhaite mais surtout pas trop longtemps. Douée dans beaucoup de tâches du Village, elle ne sera peut-être jamais assez assidue pour devenir experte d'un sujet ou d'un artisanat. En fin de journée, elle est <strong>souvent avec @UUID[Actor.qsgd9QLO6PEL2A3j]{Peepi} et @UUID[Actor.LxkXMsgkJ28QpYVR]{Taiohi}</strong>, un frère et une soeur de 7 et 6 ans a les faire marrer, faire des pirouettes ou leur raconter des histoires d'aventures, de voyages et de dragons. Elle passe aussi <strong>beaucoup de temps avec @UUID[Actor.nVnugxCfNlRY7EyL]{Miihini}</strong> a se raconter des ragots et pur l'aider dans <strong>l'entretien des machines du Village</strong>. Les seuls moments où elle peut être triste, c'est lorsqu'elle constate la distance qui commence à les séparer avec son petit frère, @UUID[Actor.mmAaWJQJDLTjYPKl]{Mataro}. Elle n'arrive pas a comprendre cette colère bloquée de son frère et son sérieux depuis quelques temps. L'arrivée des Aventuriers étrangers sera une bénédiction pour @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata} : de la nouveauté, des histoires, des découvertes et la perspective d'en apprendre plus sur le vaste monde extérieur. Elle bravera tous les interdits pour leur parler et les aider.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.mmAaWJQJDLTjYPKl]{Mataro}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme10.png\" width=\"70\" style=\"float:left\" /><p>Autrefois un jeune garçon heureux et souriant, Mataro a changé ses sourires pour une <strong>froide colère</strong>, depuis quelques mois. Il <strong>est renfermé et introverti</strong> malgré sa <strong>passion pour la forge</strong>. Il passe beaucoup de son temps à jouer du marteau et façonner le métal rougeoyant. Il a un certain talent mais ne semble pas prendre de plaisir malgré les encouragements. Ses explications à sa mère ou son père tournent autour de la place du chef qui devrait être confiée à son père selon la tradition. @UUID[Actor.o7tjD6cFNk5vMYC4]{Kara} sait qu'une souffrance plus profonde est cachée mais elle n'arrive pas à la déceler et ce genre de discussions apportent plus de colère, de cris et de disputes. Si un PJ partage la forge avec @UUID[Actor.mmAaWJQJDLTjYPKl]{Mataro} et commence à se lier d'amitié avec lui, il pourra apprendre qu'il était présent quand sa grand-père maternelle s'est faite massacrée devant ses yeux et qu'en plus du traumatisme, il est en colère contre son inaction et la peur qui l'a paralysée. Il s'en veut, il est triste, il dort mal et surtout il est en colère car personne ne veut faire payer à ces Ombres Blanches.</p><p></p><h2>La famille de Kaha :</h2><p>Cette famille est la seconde la plus influente du village. Tenue d'une main de fer par l'ainé de la famille @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha}, le frère de @UUID[Actor.XP0WbhdG2M6FsbW1]{Tumuaki} et de l'aigrie @UUID[Actor.ZGq5yQFYuv43MxqN]{Kite'Tihe}.</p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.2wKeOBzbiMxxECAt]{Kaha}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme25.png\" width=\"70\" style=\"float:left\" /><p>Malgré son âge, Kaha est une force de la nature tant par son physique, son expertise du combat et son caractère intransigeant. Veuf depuis plus de 40 ans, à la naissance de son dernier fils, il a une place importante à Arkanov et ne se prive pas de confronter le chef @UUID[Actor.acT0Ir2r38h6NiGJ]{Kiliko} lorsqu'il désapprouve une décision. Pour lui le village doit se développer, s'agrandir et revendiquer les parcelles qui entourent l'entrée. Les centaures sont bien assez forts et déterminés pour s'émanciper de cette prison. Il enrage de la décision du chef de ne pas partir chercher les Atarangi Kino/Ombres Blanches pour leur faire payer leurs attaques et même s'il se méfie énormément des étrangers, pour lui les montagnes et tout ce qu'elle contiennent appartiennent aux centaures et à eux seuls. Ces deux fils les plus jeunes, @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} et @UUID[Actor.CumtzwDvuf1EGa5A]{Kaihoko}, ont les mêmes idées d'expansion alors que son aîné, @UUID[Actor.wC6n6PG5zG9b1r1q]{Kaiako}, partage plus la position du chef pour le plus grand désespoir de Kaha. A 78 ans, Kaha est un <strong>guerrier expérimenté</strong>, peut-être le seul qui pourrait battre @UUID[Actor.JPUV1enjGxhcOmiz]{Wakaweti}.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.wC6n6PG5zG9b1r1q]{Kaiako}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme12.png\" width=\"70\" style=\"float:left\" /><p><strong>Professeur principal</strong> du village, Kaiako est un centaure mâle qui passe la plupart de son temps avec sa conjointe @UUID[Actor.r5qI27mY2igTtPx9]{Toa} et les parents de @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata}. Il n'a presque plus aucun rapport avec son père @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha} ni avec ses deux frères et leurs idées de conquêtes. Moqué par sa famille, sa conjointe Toa sait calmer ses beaux-frères à coup de grandes claques dans leurs tronches lors des entrainements aux armes ou aux danses de combats. La plus grande fierté de Kaiako est ses enfants, deux jeunes femelles centaures à la passion aussi tranchante que leur mère et un jeune centaure mâle d'à peine 17 ans talentueux et qui a une passion pour l'art du Combat.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.r5qI27mY2igTtPx9]{Toa}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme03.png\" width=\"70\" style=\"float:left\" /><p>la conjointe de @UUID[Actor.wC6n6PG5zG9b1r1q]{Kaiako} est la <strong>maitre d'arme</strong> du village. Elle connait la rigueur et la précision de chaque danse de combat des centaures. Elle possède une technique parfaite même si sa puissance ne pourrait rivaliser avec @UUID[Actor.BQvEXdnPDfoBuIr0]{Karekau} ou @UUID[Actor.JPUV1enjGxhcOmiz]{Wakaweti}. Elle profite de son rôle pour mettre quelques branlées à ses beaux-frères quand ils dépassent les bornes. Elle passe <strong>beaucoup de temps avec ses enfants</strong> et partage l'amour que porte son fils, @UUID[Actor.z1cpfnKDsGoXcHQ7]{Te'Whakama} pour @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata}. Depuis les attaques des Atarangi Kino/Ombres Blanches, elle cherche un moyen de les stopper et on se rend vite compte que son impuissance face à cette menace la ronge de plus en plus.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.wEL33Ik2Ks3635EK]{Teina}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme07.png\" width=\"70\" style=\"float:left\" /><p>Bien qu'elle soit certainement la meilleure amie de @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata}, Teina ne partage pas vraiment sa fougue. Beaucoup plus raisonnable, on peut dire qu'elle porte sur ses épaules le rôle de grande soeur pour la naïve @UUID[Actor.yOcrS6I3guFnlFKt]{Harikoa} et son renfermé petit frère @UUID[Actor.z1cpfnKDsGoXcHQ7]{Te'Whakama}. Sa mère est un vrai modèle pour elle et Teina voudrait pouvoir être aussi forte et stratège qu'elle. Ces derniers temps, elle ressent la même peur et colère que Toa face aux Atarangi Kino/Ombres Blanches. Elle comprend bien que sa force ne viendra jamais de sa maitrise des danses de combat comme sa mère mais avec les années qui passent elle se rend compte que <strong>ses yeux, son caractère et une bonne touche de manipulation</strong> permettaient d'atteindre un objectif plus facilement qu'un conflit physique. Elle en use beaucoup sur ses deux oncles, leur donnant un discours qu'ils veulent entendre tout en leur instillant quelques idées. @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} et @UUID[Actor.CumtzwDvuf1EGa5A]{Kaihoko} l'amènent depuis un an <strong>à la chasse</strong> avec eux, lui confient des secrets et semblent l'apprécier au delà de leur détestation pour ses parents. C'est peut-être la seule villageoise qui peut faire entendre raison à Vaiata Viata lorsqu'elle se met en tête une nouvelle folie. Elle pousse discrètement son frère à, enfin, déclarer officiellement sa flamme pour son amie.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.yOcrS6I3guFnlFKt]{Harikoa}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme20.png\" width=\"70\" style=\"float:left\" /><p>Cette jeune femelle Centaure est, à l'image de sa famille, optimiste et plutôt joyeuse au quotidien. Elle n'a jamais vraiment eu beaucoup d'amie et quand elle était petite elle essayait de trainer avec sa grande soeur. A 18 ans, elle passa une journée avec @UUID[Actor.kHadmZ0V3DnyPm4Y]{Hei Tunu} pour l'aider à gérer <strong>les préparations de l'Alambic</strong>. La jeune Harikoa est tombée amoureuse de cette machine et de la transformation qu'elle permet. L'étude des plantes et de leurs extraits, la distillation des huiles, la fermentation des céréales, le dosage pour rendre délicieux une bière râpeuse… autant de chose qu'elle étudie, expérimente et teste presque tous les jours aux côtés de Hei Tunu. Elle doit faire <strong>d'autres tâches pour la communauté</strong> mais à chaque instant ses pensées sont tourner vers la prochaine recette qu'elle va modifier ou inventer. L'une des huiles essentielles porte son nom @UUID[Item.Q4mkYCG3Ov2AhA7m]{l'Harikoa}. Elle a découvert, avec l'aide et le soutien de @UUID[Actor.o7tjD6cFNk5vMYC4]{Kara} une huile qui permet de détendre tous les muscles du corps après inhalation pendant plusieurs minutes et accentue l'agilité et la précision de consommateur. Très appréciée des travailleurs et des combattants, cette huile, extraite d'une racine et mélangée à des spores de champignons, est assez rare.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.z1cpfnKDsGoXcHQ7]{Te'Whakama}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme19.png\" width=\"70\" style=\"float:left\" /><p>cet adolescent assez timide a pour passion <strong>les rites et rituels des centaures</strong>. A chaque cérémonie, danse, union ou décès, il participer aux préparations, aux discours et au respect des traditions sacrées de son peuple. Il y voit de la beauté et une certaine harmonie. Plongé dans les <strong>livre de la bibliothèque</strong>, il a remis en place une ancienne tradition pour célébrer la perfection de leur village : la Danse de l'Union. Une fois tous les deux ans, les meilleurs danseurs de combat prépare une cérémonie sur la place du village mélangeant une grande chorégraphie guerrière et synchronisée. Grâce à ses recherches il a pu refaire vivre ce rituel pour la première fois l'année dernière. Il est amoureux de @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata} depuis aussi longtemps qu'il s'en souvient et même s'il a un peu de mal à suivre son rythme, à chaque fois qu'elle est là, le jeune Te'Whakama s'illumine.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} et @UUID[Actor.CumtzwDvuf1EGa5A]{Kaihoko}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme21.png\" width=\"70\" style=\"float:left\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme17.png\" width=\"70\" style=\"float:left\" /><p>les deux derniers fils de @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha} sont très similaires autant par leur physique que par leur état d'esprit. Combatifs, revendicateurs, sévères et colériques, les deux font la paire. Dans la lignée de leur père et sous l'influence de leur tante @UUID[Actor.ZGq5yQFYuv43MxqN]{Kite'Tihe}, ils voient chaque conflits ou problèmes comme une offense contre leur famille. Ils perçoivent les regards et les sourires autour d'eux comme des moqueries orchestrées par le chef @UUID[Actor.acT0Ir2r38h6NiGJ]{Kiliko}. La chose qui irrite le plus @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} c'est de voir ses deux petits enfants, @UUID[Actor.LxkXMsgkJ28QpYVR]{Taiohi} et @UUID[Actor.qsgd9QLO6PEL2A3j]{Peepi}, jouer avec la désinvolte et irresponsable @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata}. Que son gendre @UUID[Actor.nM4Gj5Vl8qTGkQpH]{Kaihoroi} soit un faible passe encore mais que sa propre fille, @UUID[Actor.mQp0nSZ1glywyxyt]{Haputanga}, partage cette joie, le rend fou de colère. Les deux frères passe la plupart de leur temps au <strong>bucheronnage à l'intérieur ou à l'extérieur</strong> du Village pouvant concentrer leur colère et leur rage sur les troncs. Il leur arrive fréquemment de <strong>partir chasser</strong> dans les montagnes environnantes malgré l'interdiction du chef du village.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.MIeAPHCIfVkPozXm]{Kaimoe}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme11.png\" width=\"70\" style=\"float:left\" /><p>Cette femelle centaure très discrète ne partage pas la violence de son conjoint, @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} mais elle ne pourra jamais lui dire ou s'opposer à lui. Craignant ces colères, elle reste soumise à son conjoint malgré des coups qu'elle peut recevoir de temps en temps. Elle passe beaucoup de temps seule dans le long couloir de la <strong>tisseranderie</strong>. Elle ne parle presque à personne et préfère passer ses journées dans des endroits où on ne risque pas de la rencontrer. Devant le rouet de filage, avec le bruit et les vibrations de la machinerie, il lui est possible de laisser ses larmes couler. @UUID[Actor.o7tjD6cFNk5vMYC4]{Kara}, soigneuse et psychologue du village a deviné par ses blessures et derrière ses paroles la violence régulière de Te'Tipu mais malheureusement elle ne peut pas faire grand chose au risque d'envenimer la situation pour cette centaure perturbée.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.mQp0nSZ1glywyxyt]{Haputanga}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme19.png\" width=\"70\" style=\"float:left\" /><p>La fille aînée de @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} est une magnifique femelle Centaure radieuse et épanouie aux côtés de son conjoint, @UUID[Actor.nM4Gj5Vl8qTGkQpH]{Kaihoroi}. Elle ne partage rien des idées de son père ou de son oncle mais elle préfère se taire, les laisser parler et faire sa vie en famille. Elle garde un fort contact avec sa mère, @UUID[Actor.MIeAPHCIfVkPozXm]{Kaimoe} et elle essaye de la convaincre de quitter son conjoint depuis des années pour s'émanciper de l'influence de Kaha. Son père l'a déjà frappé pour son insolence mais cette épisode l'a rendu encore plus déterminée. Elle est maman de la petite @UUID[Actor.LxkXMsgkJ28QpYVR]{Taiohi} de 7ans et du petit @UUID[Actor.qsgd9QLO6PEL2A3j]{Peepi} de 6 ans. Des enfants très agréables et rieurs. Elle est enceinte d'un troisième enfant qui devrait voir le jour d'ici un mois (grossesse de 11 mois sur 12). Sa grossesse la met en joie même si ces dernières semaines elle a de plus en plus de douleurs et de mal à faire des activités. Elle passe beaucoup de temps <strong>dans la salle commune ou auprès de Kara</strong>, la soigneuse. Elle ressent souvent une crainte que son père, son oncle ou son grand-père ne s'en prennent un jour à son conjoint.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.nM4Gj5Vl8qTGkQpH]{Kaihoroi}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme18.png\" width=\"70\" style=\"float:left\" /><p>Quand on doit <strong>déplacer une charge lourde, tirer un tronc énorme ou soulever un rocher</strong>, on peut compter sur ce Centaure à la musculature impressionnante. Il ne possède que les base du combat et préfère échapper aux entrainements mais rien qu'une claque et on ne relève pas rapidement. Il est costaux mais garde un sourire constant sur son visage. Toujours heureux et serviable, rien ne semble le toucher même les nom d'oiseaux qu'il entend de la part de la famille de sa conjointe. Il est très attentionné avec ses enfants et ne cache pas son empathie face aux douleurs de la grossesse de @UUID[Actor.mQp0nSZ1glywyxyt]{Haputanga}. Au village, il s'occupe beaucoup du <strong>compost</strong> et il aime <strong>nettoyer les rues, les bâtiments et les outils</strong>. Un vrai maniaque qui apprécie que chaque chose soit à sa place et bien propre. Lorsqu'il jardine au <strong>potager</strong>, @UUID[Actor.hTu85rs1ZBvxS77S]{Peka} ne cesse de la réprimander car pour elle rien n'est aussi propre et ranger dans la nature.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.5EMuSo6IAOrndEBQ]{Taitamariki}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme27.png\" width=\"70\" style=\"float:left\" /><p>Ce jeune centaure de 13 ans est presque muet et garde en permanence la tête baissée. Il est sensible à la détresse de sa mère, @UUID[Actor.MIeAPHCIfVkPozXm]{Kaimoe} et il est souvent témoin des colère de son père, @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu}, sur elle. Sans pour autant en avoir la capacité, <strong>il pense de plus en plus à empoisonner mortellement son père</strong> et il souhaite, qu'un jour, il ne rentre pas de sa partie de chasse. Ce jeune, un soir après un cauchemar, c'est confié à son grand-père @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha} sur les agissements de Te'Tipu. Kaha a fortement insisté sur la nécessité de son silence pour le bien de leur famille et des mauvaises conséquences pour sa mère et lui s'il racontait ses mensonges à qui voulait l'entendre. Un des PJs se fera-t-il voler une dose de poison par cet adolescent perturbé.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.9P8QmwAlAqCmfFsX]{Te'Riri}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme15.png\" width=\"70\" style=\"float:left\" /><p>La conjointe de @UUID[Actor.CumtzwDvuf1EGa5A]{Kaihoko} est une Centaure très maigre qui peut passer d'un moment de calme et de concentration à une grande colère contre le premier venu. Dans la plupart des situation elle est assez gentille et malicieuse, jouant avec ces deux adolescents en toute tranquillité mais en quelques secondes, un regard désapprobateurs, une trop grande excitation, un dégât ou un mot de travers et la colère influe dans les veine de Te'Riri. Elle est rarement violente mais elle pourra s'acharner verbalement sur un villageois pendant plusieurs heures s'il le faut. Ses crises de colère n'épargnent pas son conjoint Kaihoko ni même son beau-père, @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha} malgré son fort caractère. Les deux enfants de Te'Riri, de 14 et 13 ans, partagent les valeurs de cette famille plus par peur des représailles que par réelle conviction. Ayant besoin de concentration, de calme et d'éviter tout stresse, Te'Riri est devenue <strong>experte du tissage</strong>, <strong>de la corderie</strong> et passe aussi beaucoup de temps dans l'atelier de <strong>poterie</strong> <strong>sur le banc à bâton</strong>.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.LxkXMsgkJ28QpYVR]{Taiohi}</span></strong><span style=\"text-decoration:underline\"> et </span><strong><span style=\"text-decoration:underline\">@UUID[Actor.qsgd9QLO6PEL2A3j]{Peepi}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme22.png\" width=\"70\" style=\"float:left\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme23.png\" width=\"70\" style=\"float:left\" /><p>Les deux jeunes enfants de @UUID[Actor.CumtzwDvuf1EGa5A]{Kaihoko} et @UUID[Actor.mQp0nSZ1glywyxyt]{Haputanga} sont de vrais bouilles d'amour, toujours un sourire et un mot gentils à la bouche. Ils sont souvent entrainés dans des bêtises par @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata}. Cette dernière aime passer du temps avec eux surtout depuis que leur mère est affaiblie par sa grossesse. Les parents de Taiohi et Peepi leur laissent beaucoup de liberté mais sont très <strong>attentif à leurs études et à leurs apprentissages</strong>. Très bons élèves, ils sont quand même inquiets par la fatigue et les douleurs de leur mère. Ils se battent presque tous les jours sur le sexe du futur petit frère ou de la future petite soeur. Aucun des deux n'est d'accord sur ce qui serait le mieux pour eux.</p><p></p><h2>Famille de Kaipara et Whakarewa</h2><p>Cette famille est très appréciée dans le village et possède une réelle influence sur la vie de tous les jours. De part leur gestion et leur talent dans la forge et leur proportion à aider les habitants d'Arkanov, cette famille semble indispensable pour le bon déroulé des jours. @UUID[Actor.PCoXZeY1iFNBwn9V]{Whakarewa} donne toujours son avis lors des réunion du village de façon péremptoire et affirmée tandis que @UUID[Actor.gwSrhtEW8lmej4dY]{Kaipara}, de part sa maitrise des runes, est un réel soutien pour améliorer les machines ou la vie des villageois.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.gwSrhtEW8lmej4dY]{Kaipara}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme13.png\" width=\"70\" style=\"float:left\" /><p>Kaipara et sa conjointe @UUID[Actor.PCoXZeY1iFNBwn9V]{Whakarewa} sont les deux experts en forge du village. Tous les villageois savent forger un clou ou tordre une barre de fer mais mettez un marteau dans les mains puissante de Kaipara et la forge devient un art subtil, respectueux, presque mystique. Il semble ressentir la matière pour l'amener à se plier mieux que sa propre volonté. Ce centaure ne parle pas beaucoup et il ne vaut mieux pas le déranger quand il affute une lame ou réalise un trempe sinon il vous sortira de la forge à coup de sabot dans le joufflu. Il a appris l'art des runes aux côtés de sa mère depuis son plus jeune âge et transmets patiemment son savoir à deux de ses enfants, @UUID[Actor.sKhBqPRt8ltRfoIj]{Ka'Kata} et @UUID[Actor.7YLgQMsyaWE2zic8]{Titiro}. Depuis quelques temps, il accueille le jeune @UUID[Actor.mmAaWJQJDLTjYPKl]{Mataro} dans la forge et il semble fortement apprécier ce jeune sous tensions. Les blagues de Kaipara sont catastrophiques mais il pense que ça va aider le jeune garçon.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.PCoXZeY1iFNBwn9V]{Whakarewa}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme28.png\" width=\"70\" style=\"float:left\" /><p>Cette femelle centaure à la musculature discrète est capable de tenir un marteau de forge durant plusieurs jours sans avoir une seule courbature. Contrairement à son conjoint @UUID[Actor.gwSrhtEW8lmej4dY]{Kaipara} elle est très exigeante et elle peut se montrer hautaine voir méprisante face à un travail bâclé ou un épuisement physique. Elle n'est pas là pour faire de la dentelle, des runes ou des fioritures, sa forge est efficace, maîtrisée et fonctionnelle. On lui confie souvent la restauration des pièces mécaniques des différentes machines du Village. Elle a entre autre remplacé l'engrenage principal de la machine reliée à la roue de la cascade. Sans aucune contradiction, Whakarewa est la cheffe de la forge et il faudra son aval pour l'utiliser. Leur différence de caractère n'empêche par Kaipara et Whakarewa de s'aimer comme au premier jour même si cette dernière est souvent atterrée par l'humour vaseux de son conjoint.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.PL2XneyOs3rbecnt]{Iti}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme03.png\" width=\"70\" style=\"float:left\" /><p>c'est un travailleur touche-à-tout qui peut passer de la scierie, à la tissanderie ou à la mine sans aucun problème. Il fait un boulot correct partout et il aime, comme sa mère @UUID[Actor.PCoXZeY1iFNBwn9V]{Whakarewa} le travail bien fait et efficace. Depuis qu'il est en couple avec @UUID[Actor.WIrrciqtGuvianLz]{Kamura}, il s'occupe car elle n'est pas très disponible. Il apprécie travailler à ses côtés dans la scierie ou au pressoir mais il est assez impuissant face à la distance qu'il y a entre eux. Il n'ont pas d'enfants et ça ronge Iti depuis que son frère et sa soeur ont fondé une famille. Les trois enfants de @UUID[Actor.gwSrhtEW8lmej4dY]{Kaipara} et @UUID[Actor.PCoXZeY1iFNBwn9V]{Whakarewa} se portent volontaire pour \"s'occuper\" des PJs lorsqu'ils seront dans les mines à leur arrivée.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.sKhBqPRt8ltRfoIj]{Ka'Kata}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme04.png\" width=\"70\" style=\"float:left\" /><p>Ce Centaure est très proche de ses parents et de leur amour de la forge. Il a les même capacités que son père pour la minutie du travail de finition mais contrairement à lui, son humour est toujours percutant et juste. Passionné par ses deux filles @UUID[Actor.XN95qhEw56X4FQ7M]{Tamariki} et @UUID[Actor.t0pzM3kzedQ1pW6I]{Hunga}, il passe beaucoup de temps avec eux et les amène dans chaque bâtiment d'artisanat du village. Il est en couple avec @UUID[Actor.OSN1NT8DsUrvzzBc]{Maamaa} qui s'occupe en particulier de la cuisine collective avec son père. Ils ont deux jeunes femelles, @UUID[Actor.XN95qhEw56X4FQ7M]{Tamariki} et @UUID[Actor.t0pzM3kzedQ1pW6I]{Hunga}.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.XN95qhEw56X4FQ7M]{Tamariki}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme16.png\" width=\"70\" style=\"float:left\" /><p>très jeune femelle qui suit les traces de sa mère avec passion. Que se soit à la cuisine collective ou lors des séances d'entrainement, Tamariki est la copie conforme de @UUID[Actor.OSN1NT8DsUrvzzBc]{Maamaa}. Tamariki préfère le couteau de lancer à l'arc mais elle sait déjà réaliser des manoeuvres aussi impressionnantes que celle de sa mère. La routine de ses parents lui convient très bien et seule les soirées contes et légendes dans la salle de cérémonie lui fait retarder le moment où elle va dormir. Elle participe à toutes les soirées communautaires et elle adore participer aux pièces de théâtre ou aux soirées ludiques.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.t0pzM3kzedQ1pW6I]{Hunga}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme12.png\" width=\"70\" style=\"float:left\" /><p>Malgré ses 11 ans, Hunga est restée un bébé précieux. Elle souffle à chaque effort, à peur de se casser un ongle, préfère se balader dans le verger et passe une bonne partie de sa journée à nager dans le lac ou à se coiffer les cheveux. Elle est très moyenne à l'école et son esprit papillonne en moins de 10 minutes. La psychologue Kara ne comprend pas cette jeune femelle que l'on retrouve de temps en temps seule posée sur la margelle du bassin de la place principale, les yeux de la vague, pendant des heures.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.7YLgQMsyaWE2zic8]{Titiro}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme08.png\" width=\"70\" style=\"float:left\" /><p>La seule fille de @UUID[Actor.gwSrhtEW8lmej4dY]{Kaipara} et @UUID[Actor.PCoXZeY1iFNBwn9V]{Whakarewa} est une pure beauté. Même si elle a beaucoup de talent pour la forge et qu'elle aime bien partager des moments avec ses parents et son grand frère, @UUID[Actor.sKhBqPRt8ltRfoIj]{Ka'Kata} autour du foyer et des enclumes, son plus grand plaisir se trouve dans l'atelier de couture où elle peut y passer des heures à confectionner des vêtements, toiles, sacs, pièces de cuir ou jouets pour les enfants. Lorsque son conjoint, @UUID[Actor.WIT1Zzt27kXkvsy4]{Kupu}, lui décrit un projet de costume pour un spectacle ou une pièce de théâtre, elle le dessine et le confectionne avec beaucoup de patience et de plaisir. Enceinte depuis peu, elle est transportée par cette nouvelle. Plus radieuse que jamais, elle est illuminée par la joie. Son conjoint est un peu trop protecteur à son goût mais elle apprécie son imagination et sa façon de raconter les histoires.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.WIT1Zzt27kXkvsy4]{Kupu}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme08.png\" width=\"70\" style=\"float:left\" /><p>Mâle très distingué et parlant avec de grandes tirades très longues, Kupu est l'une des figures les appréciées du village. Il a prit le rôle de sa mère depuis 4 ans pour organiser les soirées théâtres et c'est souvent lui qui anime les veillées dans la salle commune. Il raconte les histoires avec de grandes envolées lyriques et beaucoup de mise en scènes ponctuées de \"Bam\" \"Plouf\" \"Haaaa\" ou encore \"Hum Miam miam\" très expressifs. Peu de jongleurs ou ménestrels des Terres d'Arran atteignent son talents pour captiver une assemblée de spectateurs. Les enfants l'adorent et la plupart des adultes apprécient sa gentillesse et sa bonhommie. Il aime tendrement sa conjointe @UUID[Actor.7YLgQMsyaWE2zic8]{Titiro} et il n'hésite pas à lui demander de participer à ses histoires quand c'est nécessaire. Grâce à son écoute assidue des PJs, il sera certainement le premier à comprendre la langue commune et à pouvoir communiquer avec eux par la parole. Lorsqu'il n'organise pas les soirées, il s'occupe, avec Titiro, de l'atelier de couture, il aide @UUID[Actor.wC6n6PG5zG9b1r1q]{Kaiako} à l'école, il écrit les événements du village sous forme de contes et d'histoires romancées et il peut aider dans la plupart des postes pour assister un autre Centaure. Depuis qu'il est au courant de la grossesse de sa conjointe, Kupu est euphorique et très protecteur avec elle.</p><p></p><h2>Famille de Kaiputu et Ka'Huri :</h2><p>Cette famille est assez éclatée car entre les parents et les enfants, on peut dire que les tensions sont marquées. Certains sont pour conserver l'harmonie et les traditions ancestrales du village tandis que d'autres souhaitent s'étendre et exploiter les alentours de la montagne. Ces derniers sont influencés par la famille de @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha}. Les autres qui aimeraient bien s'intégrer dans le monde et ouvrir leur culture vers les Terres d'Arran se positionnent contre cette idée de conquête, de force et de prise de contrôle. Souvent séparés car sinon des étincelles se créent entre eux, cette famille est divisée.</p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.3c7FC0iXTMdlUfJO]{Kaiputu}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme14.png\" width=\"70\" style=\"float:left\" /><p>Ce grand et maigre centaure à la barbe longue et hirsute aime les plantes, les arbres et la nature. Il passe son temps dans le verger, le potager et la forêt a récolter, chouchouter et entretenir les plantes. C'est un des seul Centaure du village autorisé à quitter le village pour aller trouver et ramener des plantes non cultivables dans l'enceinte du village. Il est très calme et discret et certains adolescents ou enfants le pensent un peu fou. Il est très tactile avec la nature mais aussi avec les autres personnes (la main dans les cheveux, des serrages dans ses bras…), ce qui peut agacer certains villageois. Depuis une dizaine d'années, il entreprend de répertorier la faune et la flore locales dans plusieurs grands volumes en dessinant le plus précisément possible chaque caractéristiques et chaque propriété. Les 4 tomes de plusieurs dizaines de pages sont des ouvrages magnifiques et assez inestimable pour un botaniste. Il ne supporte plus sa conjointe, @UUID[Actor.EJeXmdLLDSK408TI]{Ka'Huri}, depuis qu'elle traine avec @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha}, @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} et @UUID[Actor.CumtzwDvuf1EGa5A]{Kaihoko}. Il l'a trouve plus violente, plus stressée et surtout elle parle de plus en plus de son envie de \"conquérir\" la montagne et de prendre le contrôle de leur région. De la même manière, il aime passer du temps avec deux de ses filles, @UUID[Actor.eSGDofhCwvuGg4dS]{Te'Wikitoria} et @UUID[Actor.kHadmZ0V3DnyPm4Y]{Hei Tunu} mais a de plus en plus de mal à supporter la colère de @UUID[Actor.9P8QmwAlAqCmfFsX]{Te'Riri} et les prises de positions de @UUID[Actor.hTu85rs1ZBvxS77S]{Peka}.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.EJeXmdLLDSK408TI]{Ka'Huri}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme18.png\" width=\"70\" style=\"float:left\" /><p>Ses sourires cachent une grande violence et un stresse de chaque instant pour Ka'Huri. Elle traine beaucoup avec @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha} et ses deux fils et elle partage de plus en plus leur envie de prendre le contrôle de la région et de la montagne. Les attaques des Ombres Blanches sont des plaies pour ce groupe et ils revendiquent leur place dans cette région. Il faut éradiquer les Ombres Blanches, il faut étendre le village et occuper les terres environnantes. Les centaures sont plus forts que tous les autres peuples. Au delà de ses idées, Ka'Huri est une bonne artisane et surtout à la poterie et à la fabrication des bougies (c'est d'ailleurs une des seule qui arrive à supporter @UUID[Actor.ZGq5yQFYuv43MxqN]{Kite'Tihe}). Elle sait combattre et elle est assez douée à la chasse donc cela lui arrive de suivre les frères hors du village.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.eSGDofhCwvuGg4dS]{Te'Wikitoria}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme10.png\" width=\"70\" style=\"float:left\" /><p>Te'Whikitoria a longtemps été poussée a devenir une grande guerrière ou une talentueuse chasseresse par sa mère, @UUID[Actor.EJeXmdLLDSK408TI]{Ka'Huri}, mais l'influence passive de son père, @UUID[Actor.3c7FC0iXTMdlUfJO]{Kaiputu}, et sa joie devant toutes les merveilles de la nature a séduit Te'Whikitoria. Elle se passionne rapidement pour l'étude de la faune et de la flore et la découverte des particularités de chaque espèces. @UUID[Actor.o7tjD6cFNk5vMYC4]{Kara}, la soigneuse, la prend sous son aile et s'accorde sur ses compétences et son goût pour la préparation de baumes, potions et autres remèdes. Grâce au soutien de sa petite soeur, @UUID[Actor.kHadmZ0V3DnyPm4Y]{Hei Tunu} et de sa connaissance dans de l'alambic, elle apprend vite et prend plaisir à aider Kara avec les blessés ou les malades. Kara lui raconte même les secrets et émotions des villageois pour que Te'Whikitoria puisse l'aider lors de ses séances de psychologie.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.kHadmZ0V3DnyPm4Y]{Hei Tunu)}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme04.png\" width=\"70\" style=\"float:left\" /><p>Hei Tunu est jeune mais un ancien du village, aujourd'hui décédé, lui a appris tout le savoir nécessaire pour s'occuper de l'Alambic, cette magnifique machine d'une complexité extrême. Elle connait toutes les vannes, cadrans, courbes et tuyaux de l'Alambic et elle prend son rôle très au sérieux. Depuis quelques temps elle initie @UUID[Actor.yOcrS6I3guFnlFKt]{Harikoa} à son métier et reconnait en elle un grand talent et une belle inventivité. Hei Tunu a un caractère très stable, elle est patiente et très réfléchie dans chacun de ses gestes. Elle sait que sa machine peut faire \"péter\" la moitié du village si elle fait une mauvaise manipulation. Elle est enceinte et la joie de Harikoa est une bénédiction pour ses journées. Son conjoint, @UUID[Actor.nHxCCnLRrIVduAlQ]{Whakaaro} et elle passent beaucoup de temps avec la famille de @UUID[Actor.odrYGDrjFeqgEW6e]{Vaiata Viata} et celle de @UUID[Actor.wC6n6PG5zG9b1r1q]{Kaiako}. Elle n'a presque plus aucun rapport avec sa propre famille, à part son père, @UUID[Actor.3c7FC0iXTMdlUfJO]{Kaiputu} qui lui apprend beaucoup de choses sur la nature et avec sa soeur, @UUID[Actor.eSGDofhCwvuGg4dS]{Te'Wikitoria} avec qui elle a beaucoup de rapport pour la confection de remèdes.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.hTu85rs1ZBvxS77S]{Peka}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme05.png\" width=\"70\" style=\"float:left\" /><p>Cette centaure est tout le temps fourrée avec sa mère ou enfermée dans le jardin potager. Elle est plutôt peureuse et stressée et, malgré quelques remarques de @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha} sur sa faiblesse apparente, elle partage les idées de ce groupe. Elle en a marre d'avoir peur et de vivre dans cette \"prison\" alors que la race des centaures est puissante. Elle se sent en sécurité au milieu des plantes et elle parle très peu aux villageois qui se bercent dans les valeurs du respect des traditions ou de l'ouverture du village sur le monde avec bienveillance et partage. Lorsqu'elle est aux côtés de @UUID[Actor.Gq3QKHUI7V4CLita]{Te'Tipu} ou de @UUID[Actor.CumtzwDvuf1EGa5A]{Kaihoko}, elle se sent en sécurité mais lorsque @UUID[Actor.2wKeOBzbiMxxECAt]{Kaha} est là, Peka est écrasée par son autorité et ses paroles guerrières. Son conjoint a été kidnappé lors de la dernière attaque des Ombres Blanches et au-delà de la tristesse, elle ressent une profonde injustice pour sa situation et l'inaction de @UUID[Actor.acT0Ir2r38h6NiGJ]{Kiliko}, le chef du village.</p><p></p><h2>Famille de Kai et Kaha :</h2><p>Ce couple est expert en cuisine et leurs enfants prennent leur suite avec le même talent.</p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.ykudVP9vdRG7tgXb]{Kai}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme16.png\" width=\"70\" style=\"float:left\" /><p>Kai est un centaure assez débonnaire. Il est d'une grande bonté et tout le temps favorable aux envies et éxigences des villageois. Son plus grand plaisir avec sa fille, @UUID[Actor.OSN1NT8DsUrvzzBc]{Maamaa}, est de préparer des repas dans la cuisine collective, de trouver de nouvelles recettes, de nouveaux goût et associations de saveurs. Il aime beaucoup l'union de sa fille avec le talentueux @UUID[Actor.sKhBqPRt8ltRfoIj]{Ka'Kata} et Kai passe beaucoup de temps avec le couple de forgeron du village, @UUID[Actor.gwSrhtEW8lmej4dY]{Kaipara} et @UUID[Actor.PCoXZeY1iFNBwn9V]{Whakarewa}. En plus de ses talents en cuisine, Kai est un archer d'élite mais il ne souhaite pas participer aux chasses à l'extérieur du village. Il chasse seulement les animaux qui volent au dessus du village ou les mammifères qui s'aventurent sur les parois et les hauteurs des montagnes visibles depuis des habitations.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.qCIZX33qck1bYGgL]{Kahao)}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme14.png\" width=\"70\" style=\"float:left\" /><p>Kahao est une femelle qui s'occupe beaucoup des préparations sortantes du potager, du verger ou des champs. Saumures, séchage, conserves, triage et stockage, elle peut passer ses journées enfermée dans ce grand bâtiment du village. La plupart des gens la trouve dure dans ces relations et elle-même préfère rester seule avec les fruits et légumes à préparer. Elle peut se montrer très agressive lorsque l'on critique son travail ou ses méthodes et elle pourra même devenir violente avec les PJs qui ne la comprennent pas. Elle ne supporte simplement pas d'être critiquer ou qu'on l'a regarde de travers. Elle ne se sent pas soutenue par son conjoint, @UUID[Actor.ykudVP9vdRG7tgXb]{Kai} mais c'est une illusion. Elle est assez paranoïaque. Elle n'en a jamais parlé à personne, pas même Kara mais elle a toujours été amoureuse de @UUID[Actor.acT0Ir2r38h6NiGJ]{Kiliko}, le chef du village et elle enrage de sa position dégradée. Elle ressent beaucoup de rancoeur envers @UUID[Actor.XP0WbhdG2M6FsbW1]{Tumuaki} sans qu'elle n'y soit pour rien dans les illusions de Kahao.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.OSN1NT8DsUrvzzBc]{Maamaa}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureFemme17.png\" width=\"70\" style=\"float:left\" /><p>Elle adore préparer les repas dans la cuisine collective aux côtés de son père, @UUID[Actor.ykudVP9vdRG7tgXb]{Kai}. Ils partagent se plaisir d'adapter les recettes en fonction des goûts des villageois et de varier en fonction des fruits ou légumes de saison. Elle, comme son père, est une combattante très douée et elle a remporté beaucoup de combat lors des cérémonies du village. Elle se lève tous les jours très tôt pour récolter quelques légumes, s'occuper de la cuisine puis, avant de préparer les repas du soir, on peut la trouver dans les murailles à faire du sport et des entrainements pour développer sa souplesse et ses techniques peu conventionnelles. Très peu musclée, Maamaa est d'une rare souplesse. Elle peut bondir, glisser ou manoeuvrer autour d'un adversaire en évitant tous ses coups. Elle est extrêmement douée un arc à la main, également.</p><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">@UUID[Actor.nHxCCnLRrIVduAlQ]{Whakaaro)}</span></strong><span style=\"text-decoration:underline\"> :</span></span></h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/TOKEN%20PNJ/CENTAURES/TOKEN-CentaureHomme01.png\" width=\"70\" style=\"float:left\" /><p>Whakaaro est un centaure qui peut tout faire dans le village. Il travaille pour tout le monde et avec tout le monde sans distinction des conflits ou des tensions entre les familles et les habitants. Toutes ces gesticulations lui passe bien au-delà de la tête. Pour lui seul le \"bien faire\" est important et il met toute son énergie à aider, fabriquer, soutenir et anticiper. Il a peur de sa capacité à être un bon père et la grossesse de sa conjointe,<span style=\"mso-spacerun:yes\">\_ </span>@UUID[Actor.kHadmZ0V3DnyPm4Y]{Hei Tunu} le divise entre la joie et le stresse. On ne peut pas vraiment dire que Whakaaro divertissant. Il a un caractère sobre et assez austère et il ne comprend pas le second degré ou la plupart des blagues ou plaisanteries.<span style=\"mso-spacerun:yes\">\_ </span>Il voit les PJs arrivés au village comme une menace pour son futur enfant et il se méfiera d'eux mais à aucun moment il ne sera désobligeant ou agressif envers eux.</p><p></p><p></p><h1>Lieux du Village :</h1><table><tbody><tr><td data-colwidth=\"59\"><p><strong>#</strong></p></td><td data-colwidth=\"618\"><p><strong>Lieux</strong></p></td><td data-colwidth=\"120\"><p><strong>Conf d'Accès</strong></p></td><td data-colwidth=\"125\"><p><strong>Conf de Travail</strong></p></td><td data-colwidth=\"341\"><p><strong>Gain de Conf</strong></p></td></tr><tr><td data-colwidth=\"59\"><p><strong>V</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.OS0QKt6iIB9SgLL0]{Mines et Prison} <strong>!!!!?????</strong></p></td><td data-colwidth=\"120\"><p>X</p></td><td data-colwidth=\"125\"><p>X</p></td><td data-colwidth=\"341\"><p>+1 à +3</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>D</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.LstFkUlfMIyfR2XO]{D.Forêt Intérieure / Bucheron}</p></td><td data-colwidth=\"120\"><p>-30</p></td><td data-colwidth=\"125\"><p>-30</p></td><td data-colwidth=\"341\"><p>+2 à +4</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>T</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.RwEQa4LVGayCdqrs]{Verger - Champs - Potager - Compost}</p></td><td data-colwidth=\"120\"><p>-20</p></td><td data-colwidth=\"125\"><p>-20</p></td><td data-colwidth=\"341\"><p>+2 à +4</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>U</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.RwEQa4LVGayCdqrs]{Place du Village + Bains Publics}</p></td><td data-colwidth=\"120\"><p>0</p></td><td data-colwidth=\"125\"><p>0</p></td><td data-colwidth=\"341\"><p>+2 si aimable avec les habitants</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>H</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.TYY4L0KSIqR1lRJU]{École et Étude}</p></td><td data-colwidth=\"120\"><p>10</p></td><td data-colwidth=\"125\"><p>10</p></td><td data-colwidth=\"341\"><p>+3</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>J</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.3yTXJoDknYuCy9PC]{Préparation de Nourriture - Stockage}</p></td><td data-colwidth=\"120\"><p>10</p></td><td data-colwidth=\"125\"><p>10</p></td><td data-colwidth=\"341\"><p>+3 à +4</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>I</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.8fxGMN4npLjpW7J8]{Cuisine Collective}</p></td><td data-colwidth=\"120\"><p>20</p></td><td data-colwidth=\"125\"><p>20</p></td><td data-colwidth=\"341\"><p>+3 à +4</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>Q</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.CB9sVmeR0y0csM0T]{Stockage produits fini - Outils - Couture - Observatoire}</p></td><td data-colwidth=\"120\"><p>20</p></td><td data-colwidth=\"125\"><p>20</p></td><td data-colwidth=\"341\"><p>+3 à +5</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>M</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.fksTHKiRzIsgNrpB]{Fabrication de Bougie - Poterie}</p></td><td data-colwidth=\"120\"><p>20</p></td><td data-colwidth=\"125\"><p>30</p></td><td data-colwidth=\"341\"><p>+4 à +5</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>N</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.nSSxkrHsRekrJADB]{Forge - Atelier de Forge}</p></td><td data-colwidth=\"120\"><p>20</p></td><td data-colwidth=\"125\"><p>30</p></td><td data-colwidth=\"341\"><p>+4 à +6</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>O</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.MblHPrLhTxvB7ifZ]{Four et Artisanat de Base}</p></td><td data-colwidth=\"120\"><p>20</p></td><td data-colwidth=\"125\"><p>30</p></td><td data-colwidth=\"341\"><p>+4 à +6</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>G</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.mtyMiPEaUpfUZA2s]{Bibliothèque - Salle d'étude - Cloche}</p></td><td data-colwidth=\"120\"><p>30</p></td><td data-colwidth=\"125\"><p>30</p></td><td data-colwidth=\"341\"><p>+1</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>F</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.hLYmAmmTNmyOa3MX]{Salle Commune - Salle de Repos - Pièce de Méditation - Observatoire}</p></td><td data-colwidth=\"120\"><p>30</p></td><td data-colwidth=\"125\"><p>50 cérémonie</p></td><td data-colwidth=\"341\"><p>+2 à +3</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>K</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.CSgrTB5ekPDATXNh]{Apothicaire - Médecin - Préparation des Soins}</p></td><td data-colwidth=\"120\"><p>30 sauf blessure</p></td><td data-colwidth=\"125\"><p>50</p></td><td data-colwidth=\"341\"><p>+3 à +6</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>P</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.vzezLWFt6ypLO06Z]{Gestion des Artisanats - Sculpteur}</p></td><td data-colwidth=\"120\"><p>40</p></td><td data-colwidth=\"125\"><p>50</p></td><td data-colwidth=\"341\"><p>+4 à +5</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>R</strong></p></td><td data-colwidth=\"618\"><p>@UUID[JournalEntry.hQlYDp4usnsEBU1P]{Scierie - Pressoir - Tisseranderie - Meunerie - Corderie - Machinerie}</p></td><td data-colwidth=\"120\"><p>50</p></td><td data-colwidth=\"125\"><p>50</p></td><td data-colwidth=\"341\"><p>+5 à +8</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>L</strong></p></td><td data-colwidth=\"618\"><p>Alambic - Préparation des Breuvages</p></td><td data-colwidth=\"120\"><p>50</p></td><td data-colwidth=\"125\"><p>60</p></td><td data-colwidth=\"341\"><p>+5 à +8</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>C</strong></p></td><td data-colwidth=\"618\"><p>Armurerie - Equipements</p></td><td data-colwidth=\"120\"><p>50</p></td><td data-colwidth=\"125\"><p>X</p></td><td data-colwidth=\"341\"><p>X</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>B</strong></p></td><td data-colwidth=\"618\"><p>Murailles - Entrainements</p></td><td data-colwidth=\"120\"><p>50</p></td><td data-colwidth=\"125\"><p>60</p></td><td data-colwidth=\"341\"><p>+3 par entrainement ou entretien</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>A</strong></p></td><td data-colwidth=\"618\"><p>Entrée - Forêt Extérieure - Alentours</p></td><td data-colwidth=\"120\"><p>70</p></td><td data-colwidth=\"125\"><p>70</p></td><td data-colwidth=\"341\"><p>+5</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>W</strong></p></td><td data-colwidth=\"618\"><p>Grotte de Cérémonie</p></td><td data-colwidth=\"120\"><p>80</p></td><td data-colwidth=\"125\"><p>80</p></td><td data-colwidth=\"341\"><p>+5 si impliqué dans cérémonie</p></td></tr><tr><td data-colwidth=\"59\"><p><strong>S</strong></p></td><td data-colwidth=\"618\"><p>Salle Secrète de la Relique</p></td><td data-colwidth=\"120\"><p>90</p></td><td data-colwidth=\"125\"><p>90</p></td><td data-colwidth=\"341\"><p style=\"text-align:center\"></p></td></tr></tbody></table><p></p><p></p><p></p></div>"
