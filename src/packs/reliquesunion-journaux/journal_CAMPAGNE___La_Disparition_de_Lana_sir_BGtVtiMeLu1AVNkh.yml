      content: "<div class=\"arran-mod\"><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Voyage.en.Ourann.01.jpg\" height=\"150\" /><p><span class=\" intro\">\"Les PJs sont prêts pour partir à la recherche de Lana'sir. Ils ont des chevaux, de l'équipement et quelques informations pour commencer ce voyage. Direction le Sud-Est à travers les plaines verdoyantes du Pays des Vents.\"</span></p><p>\_</p><p>Les PJs commence un voyage qui devrait <strong>durer environ deux semaines</strong>. Sur la première parti, jusqu'à la frontière avec le Territoire des Mangeurs de Plaine, les routes sont balisées et bien tracées. Aucun problème ne vient perturber leur trajet.</p><p>En suivant la route principale jusqu'à la Forteresse-État d'Arkar'um, <strong>les personnages vont faire plusieurs étapes qui peuvent leur donner des informations complémentaires</strong> :</p><p></p><hr /><h2>Les premiers jours de voyage</h2><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Village.Marta.et.Gref.01.PNG\" height=\"150\" /><p>Le deuxième soir, ils dorment dans un village de fermiers, humains et nains, entouré de pâturages et de champs. <strong>Un couple avec cinq enfants peut les accueillir pour la nuit.</strong> Ils s'appellent <strong>Marta</strong> et <strong>Gref</strong> et leurs enfants <strong>Saria, Molic, Caru, Carat et Natuu</strong>. Le plus jeune, environ sept ans est très rigolo et intéressé par les voyageurs.</p><div class=\"discussion\"><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">MARTA :</span></span> <strong>C'est quand même terrible cette guerre avec les elfes de la forêt sacrée.</strong> Ils étaient là depuis tant de siècles. Ca me rend triste ce gâchis et ces morts. On est bien mieux dans les grandes plaines que dans ces villes où pullulent la corruption et les conflits.</p><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">GREF :</span></span> <strong>cesse un peu d'importuner nos invités avec tes jérémiades</strong>. Ils doivent être fatigué de leur voyage ils ne veulent pas entendre une vieille fermière parler de problèmes qu'ils viennent de quitter.</p></div><p><strong>Si les PJs posent des questions au couple de fermiers</strong> (ou plus tard à Ronali s'ils le souhaitent) :</p><div class=\"discussion\"><p>MARTA : <strong>Notre voisin Ronali</strong>, un chasseur, <strong>a vu</strong>, non loin du village, à la lisière d'un petit bois, <strong>un groupe de plusieurs personnes se reposer, il y a quelques jours de cela.</strong> D'après ces dires, ce devaient être des miséreux qui fuient la Cité d'Ispier faute de travail et de reconnaissance <strong>ou des survivants du village du Val Rouge.</strong> Les pauvres, seuls dans la Plaine battue par la puissance <strong>d'Eolis</strong> (esprit du Vent pour les peuple de la plaine). <strong>Il a même entendu des cris d'enfants, vous vous rendez compte quand même … des ENFANTS !!!</strong></p></div><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Jamais Marta et Gref n'accepteraient de paiement pour leur hospitalité</span></span>. Le lendemain matin, ils saluent chaleureusement les PJs avant qu'ils ne reprennent la route.</p><p></p><hr /><ul><li><p><strong>Le troisième et quatrième jour se passent sans rencontre ni problème.</strong> Le voyage se poursuit calmement.</p></li><li><p><strong>Le cinquième jour, ils croisent, une ferme isolée très pratique pour abreuver les chevaux</strong>. La fermière, <strong>Ri</strong>, leur demande <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">1pc/cheval pour son eau</span></span>. Si les PJs lui demandent, <strong>elle a bien croisé un groupe de voyageurs</strong> (peut-être une quinzaine de personnes dont plusieurs enfants) qui ont demandé la même chose que les personnages (abreuver un cheval et remplir des outres). C'est une jeune femme, charmante qui lui a demandé et elle lui a donné 1pa pour cela. Ils ne se sont pas arrêté longtemps et marchaient à bon pas.</p><p></p></li></ul><hr /><h2>La Forteresse-État d'Arkar'um</h2><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/forteresse.Arkarum.01.jpg\" height=\"200\" /><p><span style=\"font-family:Bookinsanity\"><em>Le soir du cinquième jour, vous arrivez aux portent de <strong>la Forteresse-État d'Arkar'um</strong>.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Cette structure naine est tout simplement stupéfiante. Les fortifications de cette cité sont immenses, en trois niveaux, protégeant une ville entière. De nombreux stigmates montrent les multiples assauts que la forteresse à surmontés au cours des siècles. Alors que le soleil descend à l'horizon, des volutes de fumées sortent des centaines de cheminées.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Plus vous vous rapprochez et plus les sons, bruits et cris de la cité se font entendre. La large porte circulaire est ouverte et malgré l'heure tardive, des caravanes marchandes et des habitants entrent et sortent.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>En franchissant la première muraille, vous distinguez <strong>une ville propre, rangée et particulièrement active</strong>. Une très large majorité des gens sont de fiers nains et naines mais on peut distinguer quelques humains, elfes et même un ou deux gobelins au service de marchands itinérants. Personne en fait attention au groupe </em></span><span class=\"imp\"><span style=\"font-family:Bookinsanity\">(sauf si un peau verte fait parti du groupe).</span></span></p><p><span style=\"font-family:Bookinsanity\"><em>Vous savez que les visiteurs n'ont pas tous les droits dans une cité-état et encore plus dans celle-ci. Les marchands qui entrent se dirigent tous vers la place du marché et les autres visiteurs que vous croisez vont et viennent entre les boutiques et l'auberge principale que vous ne pouvez pas louper sur la place principale. <strong>\"La Croisée du Tranchoir et du Bouclier\"</strong> est écrit en grand sur la devanture. C'est une immense bâtisse pleine de vie avec un espace taverne, des chambres et une grande écurie, le long du bâtiment</em></span><em>.</em></p></td></tr></tbody></table><p></p><h3><strong>\"la Croisée du Tranchoir et du Bouclier\"</strong>.</h3><p>Le propriétaire s'appelle <strong>Warbane</strong> et il est très accueillant avec tout le monde <span class=\"imp\">(sauf encore avec les Peaux Vertes)</span>. Le repas (délicieux et copieux) est à <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">3pa</span></span> la chambre est à <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">7pa</span></span> pour des chambres individuelles ou <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">4pa/personne</span></span> pour des chambres de quatre. De toute façon, les étrangers n'ont pas bien le choix dans cette ville très sécurisée.</p><p>Warbane peut aussi leur vendre quelques équipements de bases mais <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">les prix sont doublés</span></span> par rapport aux tarifs de base.</p><p>\_</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Auberge.crois%C3%A9e.du.Tranchoir.et.du.Bouclier.01.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Warbane%20nain%20aubergiste.jpg\" height=\"150\" /><h3>Informations et discussion avec Warbane :</h3><ul><li><p><strong>Un groupe d'Elwë en piteuse état s'est arrêté dans ma charmante auberge il y a trois nuits</strong>. Ils avaient des pisseuses dont une tellement vieille qu'on l'a croyait calanchée et des Marmouses particulièrement fatigués. Ils ont dormi une nuit puis <strong>sont partis avant les premières lueurs du soleil.</strong></p></li><li><p><span class=\"jet\"><strong>CHA-PERSUASION DD10</strong> : <strong>la pisseuse Hum</strong> qui les accompagnait en avait dans la caboche et elle au moins elle avait des manières.</span></p></li><li><p><span class=\"jet\"><strong>CHA-PERSUASION DD15</strong> : Elle a bavé sur <strong>le fait de traverser le Territoire des Mangeurs de Plaine</strong> pour rejoindre de la famille.</span> Elle voulait <strong>connaitre des lieux surs pour éviter les camps des Culs-Verts</strong> dans la région. <strong>Les quatre gugusses qui l'a suivaient n'étaient pas des Pisse-laits</strong> mais je ne leur donne pas beaucoup d'espoir sur ses terres, surtout que l'un d'eux trainait la patte. <strong>Ils m'ont acheté deux chevaux d'Hums à prix d'or</strong> et on fermer leur gueuloir toute la soirée au repas.</p></li><li><p><strong>Comment peut-on les rattraper ?</strong> =&gt; pour la somme de <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">10pa</span></span>, Warbane peut mettre les PJs en contact avec <strong>\"l'Ainé\" d'une tribu de Mangeur de Plaine</strong>. Cette tribu pourra <strong>leur louer des montures spéciales</strong> pour traverser les plaines hostiles de leur territoire. Il est installé à un kilomètre à l'est de la Forteresse-État. <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Il donne au groupe un morceau de bois gravé de runes complexes</span></span> qui nous permettra de négocier avec lui.@UUID[Item.wAI1JQOvic45jB5p]{Morceau de Bois gravé}</p></li></ul><p>Les PJs peuvent profiter de ce bout de la ville mais ils ne pourront pas explorer plus loin dans les strates supérieurs. <span class=\"imp\">Si l'un des PJs est un Peaux Verts mieux vaut ne pas courir les rues tout seul.</span></p><p>Le groupe peut dormir car la nuit est bien tombée après leur repas et la discussion avec Warbane.</p><p></p><hr /><h2>Le Territoire des Mangeurs de Plaines</h2><p></p><h3>La Tribu de Kaspirionuratanokali, l'Ainé</h3><p>En poursuivant leur périple, le groupe va rencontrer l'Ainé de la tribu des Mangeurs de Plaine à un kilomètre de la forteresse.</p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/l%27Ain%C3%A9%20Kaspirionuratanokali.jpg\" height=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>A environ, un kilomètre de la forteresse, en direction des plaines, vous distinguez au dernier moment, derrière une petite colline, <strong>un camp de nomades ayant montés leurs tentes et parqués d'étranges bêtes dans un enclos solide</strong>. Une trentaine de personnes habillés avec des habits en cuir et en fourrure sont autour un petit feu. Une jeune femme fredonne une chanson, un bébé dans les bras. <strong>Les bêtes dans l'enclos grognent lorsque votre groupe se rapproche.</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Un homme fier et bien musclé se lève pour vous saluer. Il semble plus perplexe qu'hostile. <strong>Il tire la langue vers le bas et croise ses bras sur son torse</strong> puis s'exprime avec un fort accent marqué :</em></span></p><div class=\"discussion\"><p><strong>KASPIRIONURATANOKALI :</strong> Le Grand Souffle salut toi ! Je être Kaspirionuratanokali … Ainé peuple nomade … Quoi toi veux ?</p></div><p><span style=\"font-family:Bookinsanity\"><em>Vous voyez également les autres Mangeurs de Plaines se regrouper ensembles quelques mètres derrière. Quatre guerriers et guerrières se placent devant eux une main sur la poignée de leur cimeterre ou sortant leur longs poignards pour jouer avec. Ils ne semblent nullement intimidés ou perturbés par votre présence.</em></span></p></td></tr></tbody></table><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Mangeur%20des%20Plaines%202.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Mangeur%20des%20Plaines%203.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Mangeur%20des%20Plaines%204.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Mangeur%20des%20Plaines.jpg\" height=\"150\" /><p>Les PJs peuvent se présenter.</p><ul><li><p>S'ils parlent des montures <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">sans montrer le bout de bois gravé</span></span>, Kaspirionuratanokali ne répond même pas.</p></li><li><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">S'ils présente le bout de bois gravé</span></span>, il le prend et dit :\_</p></li></ul><div class=\"discussion\"><p><strong>KASPIRIONURATANOKALI :</strong> Sanpurochs monture à nous, grand amis pour Plaine, famille ! Si toi traverse le Grand Souffle toi devoir Sanpurochs. Enfant dangereux, Enfant dressé. Toi donner 30pa pour nomade, toi avoir 5 Sanpurochs pour traverse vite vite vite. Toi dit oui toi traverse. Au bout Grand Souffle toi dire : Kaspirionuratanokali et Sanpuroch voir famille. Sanpuroch protège toi et toi protège Sanpuroch.</p></div><p></p><p>Si les PJs donne les <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">30pa</span></span> :</p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/ANIMAUX/Sanpuroch.jpg\" height=\"150\" /><p>Il fait un grand sourire chaleureux et pose sa main sur son front en tirant sa langue vers le bas. Il vous fait signe de le suivre vers l'enclos des Sanpuroch. Vous pouvez voir de plus près c'est <strong>grandes créatures cornus et poilues aux mains larges comme celle d'un troll et à la musculature plus sculptée qu'un nain du Bouclier.</strong> L'Ainé ouvre la porte de l'enclos, parle calmement à cinq Sanpuroch en posant son front sur leur tête tour à tour. Les animaux, d'un calme incroyable, se posent assis devant chacun de vous. <strong>Ils sont équipés d'une selle spéciale et chacun possède des anneaux à l'arrière de la selle</strong> pour fixer des cordes et de l'équipement. Au niveau du coup de la monture, deux poignées de bois recouvertes de cuir partent par dessus les cornes de la bête.@UUID[Actor.BxgPAW3fnJBV3xJW]{Sanpuroch}</p><p></p><div class=\"discussion\"><p><strong>KASPIRIONURATANOKALI :</strong> Toi doux avec Sanpuroch. Toi tiens poignée et toi tire pour dirige. Gentils beaucoup. Nom enfants : <strong>Natak, Natakia, Natao, Natana, Nataka</strong>. Toi jamais aller montagnes. Toi pars Toi Grand Souffle sur épaule pour voyage !</p></div><p></p><p><span style=\"font-family:Bookinsanity\"><em>Il sourit et repars auprès de sa tribu avec une droiture et un calme parfait.</em></span></p></td></tr></tbody></table><p></p><hr /><h3>Voyage dans le Territoire des Mangeurs de Plaine</h3><p></p><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Les Sanpurochs sont très dociles et elles réagissent au quart de tour à chaque fois que l'on tire légèrement sur les poignées. <strong>Elles tracent la Plaine à la vitesse du vent.</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Le paysage défile, les collines sont montées puis descendues sans ralentir, les rochers sont sautés, les rivières sont traversées.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>A part un mal de fesses de tout les Diables, vous fendez la Plaine à bonne vitesse. Tout le long du voyage, <strong>vous voyez des camps d'Orcs</strong> au loin. Vous traversez <strong>des prairies</strong> assez dense, <strong>des bosquets aérés</strong> le tout traversé <strong>de petits cours d'eau</strong> qui serpentent autour de gros rochers. Sur votre gauche, à l'horizon, <strong>une immense chaine de montagnes traverse du nord au sud à perte de vue</strong>.</em></span></p></td></tr></tbody></table><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Sixième, septième et huitième jour :</span></strong></span> A la tombée de la nuit de cette première journée en Territoire des Mangeurs de Plaine, les PJs montent leur camp à l'abri d'un rocher qui forme une casquette, les protégeant sur trois côtés. A part quelques grognements des Sanpurochs pendant la nuit, tout se passe bien.</p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">neuvième jour :</span></strong></span> vers la fin de la journée, <strong>le groupe remarque les traces d'un campement récent.</strong> Ils peuvent l'inspecter :</p><p>C'est un camp de fortune avec les traces d'un feu éteint. <strong>Des traces de bagarres sont visibles</strong> (trois cadavres d'Orcs, traces de sang, nombreuses traces de pas…).</p><ul><li><p><span class=\"jet\"><strong>SAG-PERSEPTION DD10</strong> : les Orcs ont été <strong>tués par des lames elfes et des flèches</strong>.</span></p></li><li><p><span class=\"jet\"><strong>SAG-PERCPETION DD15</strong> : ils trouvent dans des hautes herbes, <strong>une bourse brodée des lettres BL.</strong> Elle contient </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">35pa et 5pc</span></span>.</p></li><li><p><span class=\"jet\"><strong>SAG-PERCEPTION DD15</strong> : des traces de pas mènent <strong>vers un bosquet non loin</strong>. Le groupe trouve <strong>deux cadavres : un enfant elfe sylvain et un guerrier elfe sylvain</strong>. Ils ont été recouverts de feuilles mortes et ils sont nus. Une marque en forme de colline est tracée sur leur front avec du sang. D'après l'observation, <strong>ils sont morts il y a un peu plus de deux jours</strong>.</span></p></li></ul><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Village.ORC.dans.l.Ourann.01.PNG\" height=\"200\" /></div><p></p><div class=\"arran-mod\"><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">dixième jour :</span></strong></span> Les PJs reprennent la route à dos de Sanpurochs. Au milieu de la matinée, en longeant une petite rivière et au détour d'une colline, <strong>ils tombent nez à nez sur un petit camp d'Orcs de quelques tentes</strong>. Les orcs sont occupés avec les enfants le long de la rivière pendant que d'autres discutent autour d'un feu de camp.</p><p>En fonction de la réaction des Pjs =&gt; soit discussion soit <span class=\"imp\"><strong>PREMIER COMBAT : Camp d'Orc 01 </strong></span>@UUID[Scene.0nbl6IpCnZNESJ6U]{1.Camp Orc 01}</p><p></p><p></p><p>Fin de la deuxième Séance !!!</p><p></p><p></p><p>En milieu d'après-midi, <strong>Borass Taer prévient les PJs qu'ils viennent de pénétrer en Birkanie</strong>. A partir de là, ils vont croiser plus de villes de Nains Errants et d'Humains que d'Orcs. On les regarde un peu de travers lorsqu'ils arrivent à dos de Sanpuroch mais la plupart des personnes croisées sont aimables.</p><p>A part \"<em>un groupe d'elfe est passé par là il y a un jour ou deux.</em>\", \"<em>Ils sont fatigués</em>\", \"<em>Ils étaient charmants</em>\" ou encore \"<em>c'est bizarre un groupe d'elfes avec une humaine voyageant ensemble mais ce n'est pas notre problème</em>\", ils n'obtiennent pas d'informations supplémentaires. En tout cas ils se rapprochent du groupe et <strong>d'après Borass, ils devraient les rattraper le long du fleuve Qolos dans deux jours</strong>.</p><p>\_</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Onzième, douzième :</span></strong></span> rien ne se passe de plus.</p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Treizième jour :</span></strong></span></p><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>En fin d’après-midi du treizième jour de voyage, en haut d’une colline, vous voyez au loin un fleuve très large sinuant du Nord au Sud. Une ville portuaire est positionnée sur une langue de terre qui semble rentrer dans le fleuve. La ville est à quatre heures de route à dos de Sanpuroch et de là où ils sont, ils distinguent déjà l’animation qui règne dans la ville. La vue est stupéfiante du haut de la colline. Entre nature à perte de vue et ce petit écrin de civilisation qui émerge aux bord de ce très large fleuve.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Presque au pied de la colline, sur le chemin sinueux qui se dirige vers la ville, vous apercevez un groupe de voyageurs accompagnés d’un cheval et d'une charrette. Ils sont à une centaine de mètres en contrebas. Il y a 6 adultes et quelques enfants.</em></span></p><ul><li><p><span class=\"jet\"><strong>SAG-PERCEPTION DD10</strong> : <span style=\"font-family:Bookinsanity\"><em>ce sont les survivants. Le cheval est chargé de différentes sacoches et sur la selle, il y a 3 enfants elfes sylvains. Trois des adultes sont armés d’arcs et d’épées. Une femme est tenue par l’un des guerriers son bras au niveau du coup.</em></span></span></p></li><li><p><span class=\"jet\"><strong>SAG-PERCEPTION DD15</strong> : <span style=\"font-family:Bookinsanity\"><em>vu leur démarche, la femme est en train de soutenir le guerrier. A sa démarche, il est blessé à la jambe.</em></span></span></p><p>\_</p></li></ul><div class=\"discussion\"><p><em><strong>BORASS TAER :</strong></em> ce sont les survivants de la forêt du Val Rouge. Ils tiennent la Dame d’Honneur dans leurs griffes. <strong>SUIVEZ-MOI et PAS DE QUARTIER !!</strong></p></div><p>\_</p><p><span style=\"font-family:Bookinsanity\"><em>Le Sanpuroch de Borass part au galop et il tire au clair son épée, en direction du groupe de survivants.</em></span></p></td></tr></tbody></table><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Combat :</span></strong></span><strong> @UUID[Scene.FFiRESygbjPlvrCr]{1.Rencontre des Survivants}</strong></p><p>\_</p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">COMBAT : Borass, Survivants et PJs</span></strong></span></h3><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">INITIATIVE =&gt;</span></strong></span> <span class=\"imp\">si possible mettre en sourdine les PJs et leur demander leur action dans l’ordre d’initiative pour éviter qu’ils discutent d’une stratégie.</span></p><p>Au grand galop, il faut 3 rounds pour être au contact des survivants. Les Sanpurochs sont plutôt discrets dans la plaine parsemés de rochers.</p><p><strong>Si les PJs crient, tirent à l’arc ou toute autre action qui pourraient les faire repérer</strong> par le groupe de survivants, faire un test de perception pour les elfes sylvains.</p><p><strong>Si les PJs sont repérés</strong>, le groupe de survivants ont trois rounds pour se préparer.</p><ul><li><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Premier round repérés</span></span> : les 3 guerriers dégainent leurs arcs et demandent aux autres de se regrouper derrière le cheval.</p></li><li><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Deuxième round repérés</span></span> : attaque à l’arc sur les PJs ou Borass les plus proches.</p></li><li><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Troisième round repérés</span></span> : attaque à l’arc sur les PJs ou Borass les plus proches puis lâchent leurs arcs et ils dégainent leurs épées.</p></li></ul><p></p></div><hr /><h2>Le groupe d’Elfes Sylvains survivants :</h2><div class=\"arran-mod\"><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Lana%27sir%20Bonarion.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Maana.01.jpg\" height=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>Alors que l’affrontement se termine, vous prenez le temps d’observer le groupe de survivants. La première chose qui vous saute aux yeux c’est la fatigue des elfes. Le teint blafard, les yeux lourds, les vêtements sales et élimés, les Sylvains ont voyagé sans se préserver.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Vous remarquez trois guerriers elfes grands, élancés et encore sur leur garde. L’un d'eux est proche de Lana’sir, son épée au clair. Son regard est sombre et marqué de plusieurs traces de combat malgré sa jeunesse apparente. Il est blessé à la cuisse gauche.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Parmi les survivants, vous remarquez deux femmes à bout de force et neuf enfants dont un nourrisson porté par l’une des femmes. Ils se tiennent groupés à côté du cheval.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Lana’sir et le guerrier elfe s’avance vers vous avec un regard exprimant la colère.\_</em></span></p><p></p><div class=\"discussion\"><p><span style=\"font-family:Bookinsanity\"><em><strong>Lana’sir :</strong> qui êtes-vous et que venez vous faire ici ? répondez de suite ou laissez nous tranquille.</em></span></p></div></td></tr></tbody></table><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">ATTENTION</span></strong></span> : en fonction de la réaction des PJs, la relation avec Lana’sir sera complètement différente.</p><ul><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S’ils s’interposent contre Borass dès le début et qu'aucun mort n’est à déplorer dans les survivants</span></strong></span>, elle sera amicale et donnera sa confiance aux PJs. A la fin du combat elle remercie les PJs pour leur courage et leur demande de s’expliquer. A la suite de cela, elle accompagne les PJs à Lavoise vers l'École de Rosna pour discuter, se soigner et se reposer. Elle présente Maana et surtout Laotissa Graine Dépeautre. Elle raconte toute l’histoire, demande l’aide des PJs pour aller au Temple du Val Rouge et récupérer la relique, leur fournira des ressources ou de l’argent. De son côté, elle va se rendre à la Cité d’Orkadia pour expliquer cette grave situation et permettre aux survivants de rejoindre une tribu d’elfes sylvains dans la forêt au Nord de la Cité d’Airain</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S’ils réagissent trop tard et que certains survivants se font tuer par Borass</span></strong></span>, elle sera méfiante un certain temps. Les PJs devront s’expliquer (test de Charisme si nécessaire)</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S’ils suivent les ordres de Borass :</span></strong></span> elle considérera les PJs comme des ennemis. Tout n’est pas perdu pour autant. En colère, elle accusera les PJs de faire le jeu du mage Hisp Galik pour trouver le Temple Rouge et la relique. Ces révélations devraient permettre aux PJs de retrouver sa confiance.</p></li></ul><p>\_</p><h3>Présentation du Groupe :</h3><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Lana’sir Bonarion :</span></strong></span> c’est une humaine aux cheveux d’or. Tout dans son apparence montre sa noble lignée. Sa posture, sa façon de parler et même son regard atteste de sa position. Malgré la fatigue et les marques du voyage, elle est splendide. Elle transpire l’autorité et sa détermination.</p><p>\_</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Maana :</span></strong></span> grâce à son armure et son épée, vous savez directement que ce n’est pas un soldat de base. Il se présente comme le second capitaine de la garde du Village de Val Rouge. Il vous prévient qu’au moindre mouvement suspect il sera capable de tuer une partie d’entre vous si ça lui permettait de protéger Lana’sir.</p><p>\_</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Laotissa%20Enfant.png\" height=\"150\" /><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Laotissa Graine dépeautre :</span></strong></span> l’une des jeunes elfes semble vous observer plus en profondeur que les autres. Elle ne semble pas craintive et se rapproche de Maana pendant qu’il se présente. “Moi c’est Laotissa Graine dépeautre” a-t-elle le temps de dire avant que Maana lui fasse signe de se taire.</p><p>Dans tous les cas, Lana’sir veut aller à Lavoise avec les survivants et rejoindre l'École Rosna pour se reposer, se soigner et préparer la suite de son périple. Une amie très proche, Falika Rosna, prendra soin d’elle, des elfes sylvains et des PJs. Elle fera tout pour ne pas suivre les PJs vers la Cité d’Ispier. Sa responsabilité est envers le peuple des Sylvains.</p><p>\_</p><hr /><h2>Arrivée à Ville Portuaire de Lavoise</h2><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/VILLES-CARTES/Lavoise.Carte.01.png\" height=\"250\" /><p><span style=\"font-family:Bookinsanity\"><em>La ville de Lavoise est positionnée au bord du fleuve Qolos, sur une bande de terre qui donne l'impression de percer le cours de l'eau. <strong>Une muraille de taille raisonnable protège la ville des attaques de Peaux Vertes</strong> venant des plaines de la Birkanie. Les toitures sont toutes faites de pierres bleutées qui rayonne sous les rayons du soleil. <strong>La chose la plus étonnante avec Lavoise c'est la végétation au coeur même de la ville</strong>. Comparé aux champs agricoles qui bordent la muraille et les grandes plaines clairsemées de Birkanie, <strong>Lavoise semble luxuriante</strong>. Du haut de la colline, on peut facilement remarquer <strong>l'effervescence de la ville et de son port</strong>. Autour de celui-ci, deux collines abruptes sont surmontées de bâtiments. A l'Ouest, une enceinte protège une belle demeure noble et à l'Est, un phare haut et élégant. De l'autre côté du fleuve, <strong>on voit à peine la berge et on peut percevoir à l'horizon des quais, bâtiments et routes qui partent vers l'Ourann</strong>, le Pays des Vents.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>A fur et à mesure que l'on s'approche de cette ville, on peut remarquer les traces d'architecture naine qui sont visibles sur les tours des murailles, sur les pilonnes de soutènement, sur l'arche au-dessus de la porte nord ou encore sur la forme des dalles au sol lorsque l'on entre dans la cité.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Cette ville doit être construite sur les ruines d'un ancien village nain d'où sa faculté à résister aux attaques des tribus alentours.</em></span></p></td></tr></tbody></table><p></p><p><strong>Les PJs arrivent par la porte du Nord, en fin d'après-midi</strong> (le soleil est sur le point de se coucher) et directement sur leur gauche, ils entendent les chants et les rires s'échappant d'une taverne. L'enseigne indique \"la Taverne des chants de l'Ourann\". Les maisons aux alentours sont bien entretenues et particulièrement modernes. Tout est bien organisé à Lavoise.</p><ol><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">La garnison :</span></strong></span> Bâtiment imposant et fermé renfermant une cour d'entrainement intérieure.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">L'église de Lavoise :</span></strong></span> lieu de culte pour de multiples cultes (tant humain que elfe ou nain). En arrivant de la Porte Nord on ne peut pas la louper.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">L'hôtel de ville :</span></strong></span> une demeure courbe donnant sur la place du marché.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">\"l'Auberge des Voyageurs\" :</span></strong></span> Une belle auberge assez chic avec une charmante devanture dorée.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">\"A tout faire\"</span></strong></span> : magasin d'équipements en tout genre (cuisine, voyage, nourriture, artisanat…). Une boutique immense et bien fournie dont les articles viennent de près comme de loin.@UUID[JournalEntry.E9iyM65xMG787BqG]{A tout Faire}</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Place du jugement :</span></strong></span> endroit où les criminels sont pendus ou décapités</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Moulin à eau :</span></strong></span> Vaste bâtiment aux multiples fonctions (meunier, menuisier, tanneur…)</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">\"Aux Mains d'Or\"</span></strong></span> : complexe de bâtiments regroupant plusieurs artisans (forgeron, charpentier, rémouleur…)</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">\"Les Bras de la Mère\"</span></strong></span> : pension pour jeunes orphelins ou personnes nécessiteuses pouvant trouver refuge, repas et soin</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">\"La Pinte Rafraichissante\" :</span></strong></span> bar populaire et très agité. Il n'est pas rare d'y trouver des bagarres et des vols.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">\"La Vie en Chanson\" :</span></strong></span> service de Barde, Ménestrel et coursiers. Une grande étable pour chevaux est adossée au bâtiment principal.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">\"La Hutte des Marins\" :</span></strong></span> à l'extérieur de la ville, cette taverne est le lieu de rencontre des marins, prostituées, voleurs et autres malfrats mais l'ambiance et les secrets y sont nombreux</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">\"Les Chevaux de Kilorn\" :</span></strong></span> Kilorn est réputé dans la région pour ses montures de qualité et bien dressées. Les prix sont un tier plus cher mais les chevaux sont parfaits</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">\"la Taverne des chants de l'Ourann\" :</span></strong></span> taverne principale de Lavoise et bien mieux fréquentée que les autres, ici tous les habitants peuvent passer un bon moment sans la peur au ventre.</p></li></ol><p></p><p>La belle demeure en haut de la colline <strong>au Sud-Ouest est une école d'érudit fermée au public</strong> <strong>sauf pour des contrats</strong> (recherche d'information, traduction, lecture de texte, écriture de lettre…). La responsable est <strong>une elfe du nom de Falika Rosma</strong>. Même si ce n'est pas son travail principal, elle aide souvent pour les soins et l'éducation des enfants présents dans la pension \"les Bras de la Mère\" et pour les habitants de Lavoise.</p><p></p><p><strong>Le port est aussi un lieu très mouvementé à Lavoise.</strong> Il n'est pas un moment où quelqu'un ne vide ou ne remplisse un bateau, une barque ou une charrette avec des marchandises en tout genre. A l'Est de la Porte Sud, <strong>un grand bâtiment sert à organiser les aller et venues et à collecter les taxes.</strong> A tout moment du jour et de la nuit, <strong>le port, et en particulier la capitainerie, sont protégés par des gardes lourdement armés</strong> qui prennent leur tâche très au sérieux. C'est un honneur, dans une ville qui se développe autour du commerce maritime d'être le gardien de l'économie.</p><p></p><p>Pour finir, <strong>le phare sur la colline du Sud-Est donne un point de vue panoramique sur les terres et sur le fleuve</strong>. Du haut de ce bâtiment solide et de belle facture, on distingue beaucoup les rives de l'Ourann à l'horizon. Un immense tas de bois bien préparé peut être allumé à n'importe quel moment, en cas de brouillard dense ou de problème.</p><p>\_</p><hr /><blockquote><p style=\"text-align:center\"><strong>Prochain Acte = Ecole de Falika Rosna</strong></p></blockquote></div>"
