      content: "<div class=\"arran-mod\"><p><span class=\" intro\">\"Les PJs sont arrivés dans la ville de Lavoise. Ils accompagnent le groupe de survivants des elfes sylvains vers la demeure de Falika Rosna.</span></p><p>\_</p><p></p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Lavoise.01.jpg\" height=\"150\" /><p><em>Vous suivez Lana’sir en direction de l'École Rosna. <strong>Elle semble très à l’aise dans la ville de Lavoise.</strong> En cette fin de journée, les rues sont agitées et nombreux sont les passants ou commerçants qui se retournent pour vous observer. Vous passez devant une belle église, des auberges plus ou moins chics, une place de marché en train de remballer leurs stands ou encore un magasin d’équipement nommé “A tout faire”. Arrivé au pied de la colline de l’ouest, Lana’sir s’engage sur la route en lacet qui monte vers la belle propriété de Falika Rosna. Les deux tours de guet entourant la grande porte sont allumées et la petite porte intégrée dans la grande est ouverte.</em></p><p><em>Vous distinguez, dès que vous entrez, une grande cour entourée de fortifications protégeant quatre grands bâtiments nobles très bien entretenus. <strong>La porte du bâtiment principal s’ouvre et une jeune femme avec un grand sourire s’approche du groupe.</strong> Elle porte des lunettes fines et des habits très jolis. Elle tient à la main un carnet et une sorte de stylo.</em></p><p>\_</p><div class=\"discussion\"><p><strong>SHANNI :</strong> Bonjour à vous, comment l'École Rosna peut-elle vous apporter de l'aide ou des connaissances ?</p></div><p>\_</p></td></tr></tbody></table><p></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Ecole.Rosna.01.jpg\" height=\"200\" /><p><strong>La jeune fille prend en note chaque mot énoncé par les PJs ou Lana’sir de façon rapide et avec une belle écriture.</strong> Si les PJs parlent trop vite ou tous ensemble, elle leur demande de répéter ou de ralentir leur propos.</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Shanni%20Jeune%20fille%20%C3%A0%20la%20porte%20de%20l%27%C3%A9cole%20Rosna.jpg\" height=\"150\" /><p>Au bout de la conversation, le groupe est amené dans l’accueil du bâtiment principal et Shanni, la jeune femme, leur apporte de la nourriture et des boissons.</p><p>Quelques minutes plus tard, <strong>Falika Rosna entre avec entrain et s’approche à grandes enjambées de Lana’sir pour la serrer dans ses bras.</strong></p><p>\_</p><p></p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Rosna.jpg\" height=\"200\" /><p><em>Falika Rosna est une elfe grande et élancée vêtue d’une robe magnifique aux couleurs argentées et grises. Ses longs cheveux blonds sont élégamment attachés et tombent sur ses épaules. Un serre-tête fait de feuilles et de branches lui donne un air noble et intellectuel. Elle a un grand sourire en apercevant Lana’sir même si du coin de l'œil elle semble méfiante en posant le regard sur chacun d’entre vous.</em></p><p>\_</p><div class=\"discussion\"><p><strong>FALIKA ROSNA :</strong> Bienvenue à tous dans mon école. Ma chère amie Lana’sir, c’est un plaisir de te savoir à mes côtés. A la vue de tes … compagnons, j’en déduis que tu as beaucoup de choses à me raconter.</p></div><p>\_</p></td></tr></tbody></table><p></p><h2>Discussion avec Falika Rosna, Lana’sir, Maana et Laotissa Graine Dépeautre :</h2><h3>\_</h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Ecole.Rosna.03.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Ecole.Rosna.02.jpg\" height=\"150\" /><h3>Falika Rosna :</h3><ul><li><p>Elle connaît Lana’sir depuis sa jeunesse.</p></li><li><p><strong>Elle a été sa professeure dans ses jeunes années</strong> et passait quelques semaines par an dans cette école pour apprendre.</p></li><li><p>Depuis, el<strong>les se voient environ une fois par an à Lavoise</strong> et sont devenues amies.</p></li><li><p>L’école a deux raisons : recevoir des érudits et certains nobles pour apprendre ou discuter de certains problèmes diplomatiques, politiques… et s’occuper des nécessiteux de Lavoise grâce à la Pension “les Bras de la Mère” qu’elle a fondée.</p></li><li><p><strong>Elle est très appréciée à Lavoise</strong> mais ne s’occupe pas trop de la ville pour éviter les problèmes avec les elfes blancs qui n’aiment pas l’ingérence avec les villes humaines.</p></li></ul><p>\_</p><h3>Lana’sir :</h3><ul><li><p><strong>Les humains de la Cité d’Ispier ont attaqué le Village du Val Rouge</strong> et quasiment décimé les elfes sylvains du village.</p></li><li><p><strong>Les elfes n’ont pas déclenché les hostilités</strong>. Ça doit être un coup monté.</p></li><li><p><strong>Lana’sir veut se rendre à la Cité d’Orkadia pour rendre compte de la situation au seigneur local</strong>, responsable de cette partie de l’Ourann du Nord.</p></li><li><p><strong>Les elfes sylvains survivants seront amenés dans la forêt des Hauts Chênes au Nord de la Cité d’Airain</strong> pour rejoindre un autre village d’elfes sylvains.</p></li><li><p>Le plus important <strong>c’est d’aider les survivants et </strong><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">d’écouter Laotissa Graine Dépeautre</span></strong></span>.</p></li></ul><p>\_</p><h3>Laotissa Graine Dépeautre :</h3><ul><li><p>Dès le début, <strong>elle semble faire confiance aux PJs</strong> même si, de temps en temps, Maana lui lance des regards inquiets sur ce qu’elle dit. Elle va tourner autour des PJs tout en expliquant la situation et même leur toucher les mains ou les épaules tout en parlant dans les moments émotionnels. Si elle est triste, elle ne le montre pas du tout et <strong>garde sa joie de vivre à tout moment</strong>.</p></li><li><p><strong>C’est la fille de la Gardienne du Savoir</strong> du village du Val Rouge.</p></li><li><p><strong>Sa mère a été tuée sous ses yeux</strong> quelques semaines avant l’attaque du village et <strong>c’est cet événement qui a déclenché les plus gros conflits</strong> entre les humains et les elfes..</p></li><li><p><strong>Elle a reçu une partie du savoir de sa mère malgré son jeune âge et porte une grande responsabilité sur ses épaules.</strong> Elle a un côté espiègle et détachée malgré son rôle à venir.</p></li><li><p>Un groupe d’aventuriers comme les PJs est une bénédiction car <strong>elle aimerait leur confier une lourde responsabilité pour sauver le secret le mieux gardé de la forêt du Val Rouge.</strong></p></li><li><p>Elle ne sait pas tout mais <strong>sa mère, la Gardienne du Savoir, lui a parlé d’une relique ancienne gardée secrète</strong> dans le Temple du Val Rouge.</p></li><li><p><strong>Elle n’est jamais entrée dans le Temple du Val Rouge et ne connait même pas son emplacement exact.</strong></p></li><li><p><strong>Elle sait seulement qu’à l’intérieur se trouve l’objet que sa mère appelait : “les bras de l’Union”</strong>.</p></li><li><p><strong>Elle disait que cet objet était trop dangereux pour les Terres d’Arran et qu’il devait être caché et oublié.</strong> C’est la responsabilité des Gardiennes du Savoir du Temple du Val Rouge depuis quelques centaines d’années.</p></li><li><p><strong>Elle connaît une comptine qui permet de trouver le Temple.</strong> Sa mère lui chantait presque tous les soirs :</p></li></ul><div class=\"discussion\"><p><strong>Par la mère et l’enfant,</strong></p><p><strong>Par l’Arbre et le Fruit,</strong></p><p><strong>Par la Plante et la Graine,</strong></p><p><strong>La Glace, le Vent et le Sable,</strong></p><p><strong>Renferme le Savoir.</strong></p></div><ul><li><p><strong>Les PJs doivent retourner dans la Forêt du Val Rouge, trouver l’entrée du temple et récupérer “les Bras de l’Union”</strong> puis <strong>le rapporter à Blanche Paix</strong> en attendant qu'on sache comment le cacher.</p></li></ul><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Symbole%20de%20l%27ordre%20de%20l'Union%2001.png\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Symbole%20de%20l%27ordre%20de%20l'Union%2002.png\" height=\"150\" /><p></p><h3>Le médaillon de la Shaman @UUID[JournalEntry.TmZWwXI6QCZIfZmA]{Le médaillon de la Shaman}</h3><p>A la fin de cette discussion, <strong>Laotissa avance vers un des PJs et lui tend un médaillon finement ouvragé</strong>. Elle le tient avec la plus grande sensibilité comme s'il s'agissait d'un nourrisson.</p><p>\_</p><div class=\"discussion\"><p><strong>LAOTISSA :</strong> <em>Je me dois de vous confier le médaillon de ma mère. Elle m'a toujours dit qu'il était de la plus grande importance pour le Temple. A vous de savoir pourquoi.</em></p></div><p>\_</p><p><em>Le médaillon est composé d'un disque bombé central avec 5 branches plates qui en part. Sur chaque branches vous voyez deux grands symboles et des mots gravés à côté en langue elfique ancienne. Chaque mot correspond au mot de la comptine de Laotissa (la mère, l'enfants, l'arbre, le fruit, la plante, la graine, la glace, le vent, le sable et le savoir). Les gravures sont remplie d'une ambre bleuté polie alors que les symboles sont remplies d'une ambre violacée polie. Le médaillon semble être fabriqué en bois mais lorsque vous le prenez il pèse le poids d'un métal lourd et dense.</em></p><p>\_</p><div class=\"arran-mod\"><h2>Questions réponses auprès de Falika, Lana’sir et Laotissa.</h2><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/CeintureDeCommunication03.jpg\" height=\"100\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/CeintureDeCommunication02.jpg\" height=\"100\" /><p>A la fin de la discussion, si les PJs acceptent, Lana’sir leur donne une boite finement ouvragée de petite taille (écrin à bijou). Elle explique que si nous enfermons dedans un message et en plaçant la boîte sous les rayons direct du soleil pendant quelques minutes, elle devrait disparaître et apparaître dans une petite sacoche sur l’une de ces boucles de ceintures. Elle leur donne également ceinture semblable à la sienne avec trois pochettes en cuir sur le côté et permet de récupérer la boîte en sens inverse. Chaque poche permet de récupérer une boite avec un message ou un objet dedans. Le processus prend plusieurs heures mais pour communiquer c’est quand même plus rapide. Elle souhaiterait être informée de l’avancée de leur mission régulièrement. @UUID[Item.SWcqI6UUq1s34fwz]{Ceinture de Communication}</p><p>\_</p><p>Les PJs peuvent profiter de l’École de Rosna presque autant qu’ils le veulent même si régulièrement Lana’sir, Laotissa ou encore Falika leur rappellent leur mission. Ils peuvent aussi se balader dans Lavoise pour faire :</p><ul><li><p><strong>des emplettes</strong> dans le magasin “à tout faire”, le regroupement d’artisan “Aux mains d’Or” ou au moulin à eau</p></li><li><p><strong>des paris et des soirées agitées</strong> à la taverne “la pinte rafraîchissante” ou “la Hutte des Marins”</p></li><li><p><strong>des nouvelles et histoires de l’Ourann du Nord ou de la Birkanie</strong> grâce aux conteurs de “la Vie en Chanson”</p></li><li><p><strong>Des soirées ou midi bien plus calme et raffinées</strong> dans “l’auberge des Voyageurs” ou la “La Taverne des Chants de l’Ourann”</p></li></ul><p>\_</p><div class=\"imp\"><p>Attention : comparé à d’autres villes, les peaux vertes qui se tiennent correctement dans la ville de Lavoise ne sont pas vues d'un mauvais œil car certains bateaux de commerce en ont comme équipage.</p></div><p>\_</p><div class=\"imp\"><p>Si les PJs se mélangent aux habitants et s’ils parlent de leurs aventures, une “mission secondaire” peut leur être proposée (enquête rapide autour de mercenaires ayant pillé des convois marchands pour “limiter” la concurrence). <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Voir le journal \"Mission secondaire à Lavoise\"</span></strong></span></p></div><p>\_</p><div class=\"imp\"><p>En fonction du groupe, le nombre de PJ, leur connaissance du JdR, leur attitude… <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Maana peut les accompagner comme PNJ et peut servir tout au long de la campagne.</span></span> En cas de mort d’un PJ, il sera possible de la transformer en PJ si besoin. Pour la Forêt du Val Rouge il serait d'une grande aide pour le groupe de PJs.</p></div><p>\_</p><h2>La Grande Route de l’Ourann :</h2><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/La.Route.de.l%27Ourann.01.PNG\" height=\"100\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/La.Route.de.l%27Ourann.02.PNG\" height=\"100\" /><p>Une fois passé le fleuve Qolos et avancé d’environ 50 kilomètres vers l’Ouest, le groupe de PJs peut rejoindre la Grande Route de l’Ourann. Si les PJs ont encore leurs Sanpurochs à l’arrivée au abord de la Grande Route, les gardes des tours naines les ciblent et se méfient du groupe. Si, en plus, certains sont des Peaux Vertes, ils auront plus de mal à passer les défenses. Beaucoup de diplomatie ou intimidation ou corruption.</p><p>\_</p><p></p><table><tbody><tr><td><p><em>Après votre débarquement sur la rive ouest du fleuve Qolos, vous parcourez une cinquantaine de kilomètres dans les plaines de l’Ourann et vous arrivez devant l’un des plus ambitieux projets des Terres d’Arran. Vous en avez entendu parlé mais le voir devant vos yeux est un spectacle d'ingénierie fascinant. La Grande Route de l’Ourann ! Une route droite comme le tranchant d’une épée forgée par un maître forgeron nain. Une largeur de plusieurs dizaines de mètres, des tours de garde tout le long. Au loin, vers le sud, vous observerez une colline éventrée par la route et vers le nord, vous distinguez déjà un pont de pierre qui passe par-dessus une large crevasse.</em></p><p><em>Lorsque vous vous rapprochez de la route, vous voyez, au pied et en haut de la tour la plus proche, des guerriers nains du Bouclier qui s’agitent et se mettent en position.</em></p><p>\_</p><div class=\"arran-mod\"><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Secondaires/NainDuBouclier01.jpg\" height=\"100\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Secondaires/NainDuBouclier02.jpg\" height=\"100\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Secondaires/NainDuBouclier03.jpg\" height=\"100\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Secondaires/NainDuBouclier04.jpg\" height=\"100\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Secondaires/NainDuBouclier05.jpg\" height=\"100\" /><p><em>En plus de quelques arbalétriers sui se trouvent en haut de tours mobiles aux abords du chantier, 6 nains du bouclier se dressent devant vous, armes en main, en position de combat.</em></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Secondaires/NainDuBouclierChefProtecteurBarum.jpg\" height=\"150\" /><p><em>Un nain qui semble plus gradé s'approche à bonne vitesse de votre groupe, le visage fermé.</em></p><div class=\"discussion\"><p>Chef protecteur Barum, déclinez votre identité, rebroussez chemin ou périssez !</p></div></div><p>\_</p></td></tr></tbody></table><p></p></div><p>Si les PJs sont agressifs, ils peuvent finir en prison voir en phase de combat.</p><p>Si les PJs sont amicaux et qu'ils expliquent qu'ils veulent empreinter la route, Barum leur explique les règles :</p><p>\_</p><div class=\"discussion\"><ol><li><p>Laissez les travailleurs travailler est la règle première. Tout au long de la route des postes de gardes et d'observation vous tiennent à l'oeil et protège la voie.</p></li><li><p>Portez TOUJOURS votre laisser passer apparent sur vous ou votre \"monture\" (il regarde les Sanpurock d'un oeil sévère). Si un garde doit vous arrêter car il n'a pas vu votre laisser passer, vous devrez payer.</p></li><li><p>Régulièrement vous trouverez des tente portant un blason jaune à l'entrée. Vous pourrez vous reposer et manger dedans ou aux alentours proches.</p></li><li><p>Il est strictement interdit de s'arrêter sur la voie centrale (il désigne les deux lignes de pierres plus sombres qui délimitent la Grande Route en trois parties) et on se range à droite si on se fait rattraper par une caravane ou un cavalier.</p></li><li><p>Tous les conflits entre usagers devront être signalés et statuer par des Gardes de la Grande Route. Aucune justice ne saurai être rendu par les usagers.</p></li><li><p>A chaque fois que vous quitterez la Grande Route, vous devrez rendre votre laisser passer à un poste de garde.</p></li></ol><p>Si ces règles sont comprises, même par les plus idiots de votre … groupe, il ne vous reste plus qu'à payer 15pa par laisser-passer.</p></div><p></p><p><strong>Laissez les PJs réagirent.</strong></p><p><strong>Si une personne joue au malin, est malpoli, trop méprisant…</strong> Les 6 gardes se rapproche du groupe menançant et le chef Protecteur Barum se retourne, s'éloigne en disant :</p><div class=\"discussion\"><p>Allez vous faire grailler le joufflu dans les Plaines du Pays des Vents et ne me briser plus les noix.</p></div></div><p>\_</p><div class=\"arran-mod\"><p>Il sera impossible au groupe de se faire entendre d'une quelconque manière et s'ils s'obstinent l'un des garde les prévient :</p><div class=\"arran-mod\"><div class=\"discussion\"><p>Je serais vous je partirais avant qu'on nous donne l'ordre de vous mettre aux arrêts ou bien pire que ça. A la vue de votre dégaine, vous n'avez aucune chance alors partez.</p></div></div></div><p>\_</p><div class=\"arran-mod\"><p><strong>@UUID[Item.0ZG8x2LyVw34dzTD]{Laisser-Passer de la Grande Route de l'Ourann}</strong></p><div class=\"arran-mod\"><p>\_</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs n'ont pas de Laisser-passer</span></strong></span>, ils mettrons 14 jours pour atteindre la Forêt du Val Rouge (au lieu de 10,5 jours). Ils rencontreront plusieurs pépins (attaque d'animaux sauvages, blessures après une chute, compagnie d'orc aperçue au loin donc impossible de s'arrêter pour dormir…). Leur faire comprendre que leur manque de diplomatie peut leur couter la vie.</p><p>\_</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs obtiennent un Laisser-passer</span></strong></span>,</p><table><tbody><tr><td><p><em>le voyage sur la Grande Route de l’Ourann est d’une simplicité et d’un confort superbe.</em></p><p><em>Les experts du temple et les artisans de la Forge, les gardes du Bouclier, les contremaîtres du Talion et beaucoup de main-d’oeuvre humaine sont au travail pour avancer cette route titanesque qui traverse l’Ourann de Draz-Kazar à la forteresse d’Akar-Bram. Le chantier est gigantesque et les machines sont plus grandes que des palais. Sur le côté du chantier, on distingue de nombreuses tentes pour les ouvriers et les compagnies qui protègent le chantier. L’herbe est piétinée, des piles de matériaux sont entreposées à perte de vue et un boucan se fait entendre à des kilomètres à la ronde.</em></p><p><em>Vous remarquez que les usagers que vous croisez sur la Grande Route ne portent pas tous le même Laisser-passer (pas la même forme ni le même dessin). Vous y croisez des Hommes, des Elfes, des Orcs et même des Gobelins. A chaque arrêt pour manger ou pour la nuit, on vous regarde à peine et chacun s'occupe de sa propre gamelle. Des petits commerçants essayent de vous vendre des babioles ou vous propose leurs services mais jamais ils ne sont trop insistants ou agressifs.</em></p><p><em>A trois autres endroits de la Grande Route, vous approchez d'une section en construction et vous êtes guidez vers une route secondaire protégée et stabilisée longeant le chantier pendant plusieurs dizaines de kilomètres avant de rejoindre une autre section terminée de la Grande Route.</em></p><p><em>A de nombreux moments, la route s'élargit sur environ 200m avec de grandes parties stabilisées de chaque côté. Des panneaux sont disposées de part et d'autres indiquant les directions (Port de Tureyn, le nom de plusieurs petites villes…) Après 5 jours de voyage, vous distinguez à l'est les fumées s'élevant de la Cité d'Eskar et de la Route vous apercevez les fortifications de la ville humaine. Le lendemain en fin de journée, à l'horizon à l'Est vous pouvez voir le toit de certaines tour de la forteresse Etat de Krüg-Daraz.</em></p><p><em>A une allure assez intensive, vous mettez 8 jours à atteindre le bout de la Grande Route de l’Ourann qui s’arrête à environ 150 kilomètres du sud de la Forêt du Val Rouge.</em></p></td></tr></tbody></table><p>\_</p><hr /><blockquote><p style=\"text-align:center\"><strong>Prochain Acte = La Forêt du Val Rouge</strong></p></blockquote></div></div>"
