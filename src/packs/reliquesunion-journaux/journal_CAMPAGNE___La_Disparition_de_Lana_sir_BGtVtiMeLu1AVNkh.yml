      content: >-
        <div class="arran-mod"><p><span class=" intro">"La mission confiée aux
        groupe est obscure dans leur esprit. Remonter vers la Forêt du Val
        Rouge, trouver un temple caché, récupérer une relique ancienne pour
        protéger son secret ! A la sortie de la Grande route de l'Ourann, la
        forêt n'est plus très loin.</span></p><p></p><p>De retour dans les
        plaines de l’Ourann sur des chemins beaucoup plus simples que la Grande
        Route, <strong>il reste environ 2 jours et demi de voyage pour atteindre
        le sud de la Forêt du Val Rouge.</strong></p><p><strong>Le voyage se
        passe parfaitement bien</strong> dans cette zone “civilisée” de
        l’Ourann.</p><p><strong>Les PJs peuvent en profiter pour faire
        connaissance avec Maana.</strong></p><p></p><table><tbody><tr><td><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/CampDeBucheronsFortifie.jpg"
        height="100" /><p><span style="font-family:Bookinsanity"><em>En milieu
        de l’après-midi, après deux jours de voyage, vous apercevez la lisière
        de la Forêt du Val Rouge. Une forêt dense et qui, d’un simple coup
        d'œil, semble sauvage. Vous entendez les dents de Maana se crisper car
        comme vous, il voit des dizaines de bûcherons à la lisière en plein
        travail. Haches, scies, chariots, bruits et agitations sur des centaines
        de mètres autour des arbres multi-centenaires de la forêt. Le camp est
        bien gardé et vous apercevez même des palissade de bois et quelques
        tours
        d'observation.</em></span></p></td></tr></tbody></table><p></p><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Les PJs ont deux choix
        :</span></strong></span></p><ul><li><p>Passer discrètement en évitant la
        compagnie de bucherons</p></li><li><p>Engager un combat avec
        eux</p></li></ul><p>Dans les deux cas, le groupe s’enfoncera dans la
        forêt et Hisp GALIK sera au courant en trouvant les morts ou par un
        bûcheron qui les a vu entrer dans la forêt.</p><p><strong>Avant de
        rentrer dans la forêt, il faut libérer les Sanpuroch s’ils suivent
        encore les PJs. </strong><span style="text-decoration:underline"><span
        style="text-decoration:underline">Si un PJs a choisi une voie avec une
        monture ou un animal de compagnie vous pouvez renforcer le lien avec le
        Sanpurock et lui transmettre en tant que monture ou compagnon
        animal.</span></span></p><p></p><table><tbody><tr><td><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/ForetValRouge02.jpg"
        height="100" /><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/ForetValRouge03.jpg"
        height="100" /><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/ForetValRouge04.jpg"
        height="100" /><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/ForetValRouge01.jpg"
        height="100" /><p><span style="font-family:Bookinsanity"><em>La forêt
        est très dense et sauvage. D’après Maana, il va falloir un peu plus d’un
        jour pour atteindre le village du Val Rouge et il faudra rester sur nos
        gardes tout du long. Vous progressez à bon pas entouré de sons des
        animaux et de la végétation qui vous entourent. Les racines, les
        branches, les fougères et la mousse épaisse ne facilite pas la
        progression. Vous marchez pendant plusieurs heures en faisant quelques
        pauses et en essayant de vous frayer un passage au travers des branches
        et buissons. Plus vous avancez plus la frondaison assombrie le semblant
        de chemin que Maana semble
        suivre.</em></span></p></td></tr></tbody></table><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/ENNEMIS-CREATURES/Animaux/Serpent2.jpg"
        height="150" /><ul><li><p><span class="jet"><strong>SAG-PERC DD15
        :</strong></span> Un sifflement se fait entendre sur la droite. Si raté,
        le groupe est surpris par le Serpent
        Constricteur</p></li></ul><p></p><p><span
        class="imp"><strong>COMBAT</strong></span> vs 1 serpent
        constricteur</p><p><span style="text-decoration:underline"><span
        style="text-decoration:underline">Loot :</span></span> peau de serpent
        (<span class="jet"><strong>DEX-NATURE.SURVIE DD10</strong></span> pour
        la retirer) (150pa) / croc de serpent constriteur (<span
        class="jet"><strong>DEX-NATURE.SURVIE DD15</strong></span> pour
        l’extraire) x2 (35pa)</p><p></p><table><tbody><tr><td><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/VillageValRouge01.jpg"
        height="250" /><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/VillageValRouge02.jpg"
        height="150" /><p><span style="font-family:Bookinsanity"><em>Vous passez
        une nuit en forêt dans le creux d’un arbre immense et aménagé. D’après
        Maana, c’est un avant poste pour éviter les invasions du village. Il
        vous explique qu’ils ne sont plus utilisés de ce côté-là de la forêt
        depuis que le conflit avec la Cité d’Ispier à débuté. Vous ressentez
        tous durant la nuit une certaine vibration dans votre corps, comme une
        énergie apaisante qui vous traverse.</em></span></p><p><span
        class="jet"><strong>CHA-PSYCHOLOGIE DD15 :</strong> </span><span
        style="font-family:Bookinsanity"><em>derrière la vibration apaisante,
        vous ressentez une profonde tristesse comme une désolation. Dans tous
        les cas, vous vous sentez bien reposé aux premières lueurs du jour
        filtrant à travers l’épaisse canopée.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>En reprenant votre voyage, vous
        arrivez trois heures plus tard aux abords de ce qu’il reste du village
        du Val Rouge (images). Le village est démoli en grande partie. Certaines
        maisons sont incendiées, des traces de luttes sont encore visibles à
        bien des endroits et vous remarquez quelques cadavres d’elfes sylvains.
        Au premier coup d'œil vous remarquez que des pillages ont eu lieu après
        la bataille.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Maana est effondré à la vue de son
        village et ne peut retenir un cri de rage.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Que faites-vous
        ?</em></span></p></td></tr></tbody></table><p></p><h2>Ce qu’il faut
        savoir sur le village :</h2><h3>Le Repos des Esprits
        :<strong>@UUID[JournalEntry.t1PoYHogDdNmOfDH]{Le Repos des
        Esprits}</strong></h3><p>Une demeure intacte à quelques centaines de
        mètres du centre. Une maison de repos avec des vivres, des lits, et
        quelques objets utiles (cordes, torches, sac à dos,...). Un bon endroit
        pour passer la nuit s’ils le veulent.</p><p></p><h3>L’école de chasse
        :@UUID[JournalEntry.rG4xMMIkvffzUqWh]{L'École de Chasse}</h3><p>Malgré
        les dégradations et le pillage, l’école de chasse du village garde
        encore une salle fermée qui contient encore quelques armes elfiques
        (épée longues, épées courtes, arcs, bolas, fronde…) ainsi que quelques
        pièces d’armures elfiques (toutes en cuir, cuir clouté…). Sur un
        présentoir se trouve une armure de feuille particulièrement belle et
        gracieuse.</p><p></p><h3>L’Arbre Sacré :</h3><table><tbody><tr><td><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Arbre-Mere-du-Val-Rouge.02.jpg"
        height="200" /><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Arbre-Mere-du-Val-Rouge.01.jpg"
        height="250" /><p><span style="font-family:Bookinsanity"><em>Au bout
        d’un sentier qui a été particulièrement emprunté se trouve l’Arbre sacré
        du Val Rouge. Un arbre immense au centre d’une clairière fleurie.
        L’arbre est entouré de plusieurs pierres gravées de runes elfiques, de
        dessins et représentations. Une pulsation lumineuse parcourt les
        gravures et monte le long de l’écorce de l’Arbre sacré. Toute la
        clairière a été piétinée par des groupes d’humains au vu des traces. Des
        coups de haches ont été donnés à l’Arbre sacré et, à un endroit, un feu
        a été déclenché pour embraser le tronc sans
        succès.</em></span></p></td></tr></tbody></table><p></p><ul><li><p><strong>Examiner
        les traces :</strong></p></li></ul><table><tbody><tr><td><p><span
        style="font-family:Bookinsanity"><em>Les traces sont très diverse. La
        clairière à été piétinée et saccagée</em></span></p><ul><li><p><span
        class="jet">SAG-PERC DD10 :</span> <span
        style="font-family:Bookinsanity"><em>Les traces montrent beaucoup de
        chaussures différentes. La plupart des bottes de soldats ou gardes. Vous
        voyez aussi des traces de roues de charrette
        apparemment</em></span>.</p></li><li><p><span class="jet">SAG-PERC DD15
        :</span> <span style="font-family:Bookinsanity"><em>Des trainées d'huile
        ont été étalées près du tronc de l'Arbre Sacré. Vous trouvez également à
        quelques pas du tronc un pierre runique gravée de l'Ogham du
        Feu</em></span></p></li></ul></td></tr></tbody></table><p></p><ul><li><p><strong>Examiner
        l'arbre :</strong></p></li></ul><table><tbody><tr><td><p><span
        style="font-family:Bookinsanity"><em>L'arbre est immense comparé aux
        autres arbres aux alentours. Les pulsations vertes parcourant l'écorce
        sont délicates et lentes.</em></span></p><ul><li><p><span
        class="jet"><strong>SAG-PERC DD10 :</strong></span> <span
        style="font-family:Bookinsanity"><em>Les coups qui ont été donnés à
        l'Arbre Sacré n'ont fait qu'égratigner l'écorce. Des éclats de métal
        venant de haches ou de piques se retrouvent à plusieurs endroit au pied
        de l'Arbre.</em></span></p></li><li><p><span
        class="jet"><strong>SAG-PERC DD15 :</strong></span> <span
        style="font-family:Bookinsanity"><em>A deux endroits, vous remarquez des
        traces à la craie et au charbon d'Oghams divers. Ogham de Feu,
        Mouvement, transformation, organique… beaucoup de formules ont été
        testées.</em></span></p></li><li><p><span class="jet"><strong>SAG-PERC
        DD20 :</strong></span> <span style="font-family:Bookinsanity"><em>Tous
        les Oghams ont été tracés par la même personne avec soin et
        précision.</em></span></p></li></ul></td></tr></tbody></table><p></p><ul><li><p><strong>Examiner
        les pierres :</strong></p></li></ul><table><tbody><tr><td><p><span
        style="font-family:Bookinsanity"><em>Il y a environ une trentaine de
        Pierres gravées dispersées dans la clairière. Elles sont toutes de
        taille différentes, certaines de 3m de haut et d'autres ne dépassant
        qu'à peine la hauteur des fleurs et de l'herbe. Elles sont visibles
        grâce à la lumière verte des pulsations qui éclairent les gravures sur
        les pierres. Les gravures sont un coup des écritures elfiques d'un
        dialècte ancien, des représentations simplifiées de la nature (animaux,
        feuilles, racines…) mais aussi des symboles. Certains des symboles
        ressemblent à ceux qui se trouve sur le médaillon de Laotissa Graine
        Dépeautre.</em></span></p><ul><li><p><span class="jet"><strong>SAG-PERC
        DD5 :</strong></span> <span style="font-family:Bookinsanity"><em>Les
        gravures sont très nombreuses et elles réagissent au contact en
        augmentant légèrement l'intensité de la lumière des pulsations. Sans les
        avoir toutes vues, pour le moment certains symboles du médaillon de la
        Shaman sont présent en plusieurs exemplaires sur différentes
        pierres.</em></span></p></li><li><p><span class="jet"><strong>SAG-PERC
        DD10 :</strong></span> <span
        style="font-family:Bookinsanity"><em>Lorsque vous touchez deux gravures
        sur la même pierre, la première revient à son état normale et la
        deuxième luit plus mais lorsque vous touchez plusieurs gravures sur des
        pierres différentes chaque gravure continuent de luirent pendant une
        dizaine de minutes.</em></span></p></li><li><p><span
        class="jet"><strong>SAG-PERC DD15 :</strong></span> <span
        style="font-family:Bookinsanity"><em>Après plusieurs minutes de fouille
        et d'observation, la rune située au centre du médaillon n'est présent
        qu'une seule et unique fois sur une petite pierre proche du tronc de
        l'Arbre Sacré. Elle ne luit pas de cette lueur verte et aucune autre
        gravure n'est présente sur cette pierre
        là.</em></span></p></li></ul></td></tr></tbody></table><p></p><p>Pour
        accéder au temple, le groupe doit appuyer dans le bon ordre sur les
        bonnes runes présentes sur les pierres en suivant la comptine de
        Laotissa Graine Dépeautre. @UUID[JournalEntry.cwUamp5Q2wJgesSj]{Comptine
        de Laotissa}</p><p>La mère, l’enfant, l’arbre, le fruit, la plante, la
        graine, la glace, le vent, le sable et enfin le savoir.</p><p>Comme
        certaines runes sont présentent sur plusieurs pierres gravées, il ne
        faut pas appuyer sur deux runes qui se trouvent sur la même pierre. Tout
        cela avant que la lueur de la première rune ne s'estompe (environ 10
        minutes). S'ils ne trouvent pas la solution, donner des indices aux PJs
        grâce à Maana où lorsqu'ils observent le médaillon ou les pierres
        gravées.</p><p>Au moment où ils complètent la séquence des 10 premières
        runes :</p><table><tbody><tr><td><p><em><strong>Au moment, où ils
        appuient sur la rune du Savoir, toutes les runes s'allument de façon
        plus vive, les autres gravures s'éteignent et les pulsations accélèrent
        jusqu'à devenir une vibration lumineuse parcourant chaque craquelure de
        l'écorce de l'Arbre Sacré. Rien ne se passe de plus.</strong></em>
        <em><strong>Le temps semble suspendu. Vous ressentez comme une sensation
        d'attente ou d'apaisement provenant de l'Arbre
        Sacré.</strong></em></p></td></tr></tbody></table><p></p><p>Pour ouvrir
        l'entrée du Temple du Val Rouge, il faut toucher sur la rune similaire à
        celle du centre du médaillon.</p><p>Lorsqu'ils le font
        :</p><table><tbody><tr><td><p><em><strong>Toutes les lumières vertes sur
        les runes et sur l'écorce vous flashent d'un coup et un rayon lumineux
        vert jaillit vers le ciel puis tout s'éteint instantanément. Un fort
        sifflement se fait entendre puis les vibrations s'arrêtent d'un coup.
        Toute la nature se fige autour de vous. Tout devient
        silencieux.</strong></em></p><p><em><strong>Quelques battements de coeur
        plus tard vous entendez un craquement et vous voyez les racines de
        l'Arbre Sacré non loin de la Pierre gravée de la dernière rune bouger et
        s'écarter. Elles libèrent une entrée assez large pour laisser passer
        deux personnes côte à côte qui laisse voir un escalier en colimaçon en
        pierre qui descend en sous-sol. Au moment où les racines s'arrêtent de
        bouger, les rayon d'une lumière s'allume un peu plus bas dans
        l'escalier. Les premières marches en pierres que vous voyez sont
        finement gravées de branches, de feuilles et de racines. Aucune trace de
        poussière ou de saleté n’est
        visible.</strong></em></p><p><em><strong>Que faites-vous
        ?</strong></em></p></td></tr></tbody></table><p></p><hr /><blockquote><p
        style="text-align:center"><strong>Prochain Acte = Le Temple du Val
        Rouge</strong></p></blockquote></div>
