    type: text
    _id: 7CARZgILyyw3rT0T
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div class="arran-mod"><p><span class="intro">Le groupe a trouvé le
        moyen d'ouvrir le Temple du Val Rouge. Que vont-ils trouver à
        l'intérieur ? Vont-ils trouver la fameuse relique dont à parlé Laotissa
        Graine Dépeautre
        ?</span></p><p></p><p>@UUID[JournalEntry.x2OMygNOL2pY26EW]{Salle A :
        Entrée}</p><p>@UUID[JournalEntry.ilEpfOaeAMVsZiMM]{Salle B : Passage du
        Dortoir}</p><p>@UUID[JournalEntry.Zlc4qXRsD8JDV8Qx]{Salle C :
        Réfectoire}</p><p>@UUID[JournalEntry.8LRqf1PDZei6ZnHk]{Salle D :
        Bibliothèque}</p><p>@UUID[JournalEntry.vNQ4118gnffUFaYm]{Salle E :
        Cuisine}</p><p>@UUID[JournalEntry.lpkTy5e0ey0W4zRU]{Salle F : La salle
        de prière}</p><p>@UUID[JournalEntry.JN4ypCiw8OSM41xg]{Salle G : Dortoir
        de la suivante}</p><p>@UUID[JournalEntry.MLnAixiR5oRvaoua]{Salle H :
        Dortoir de la
        Gardienne}</p><p>@UUID[JournalEntry.wjwcoXQ1LWRuLyfJ]{Salle I : les 10
        dortoirs des acolytes}</p><p>@UUID[JournalEntry.e2b4KQy2aCOesR6x]{Salle
        J : Garde manger}</p><p>@UUID[JournalEntry.Jw4MFE1HfAM63Eyr]{Salle K :
        Les deux sanitaires}</p><p>@UUID[JournalEntry.wZSMzoTcyjoXyZ2E]{Salle L
        : La grande salle de
        l’Union}</p><p>@UUID[JournalEntry.LrldFymRlJR3KOHF]{Salle Secrète § : La
        salle de la relique}</p><blockquote><p
        style="text-align:center"><strong>Prochain Acte = La sortie du Temple du
        Val Rouge</strong></p></blockquote></div>
