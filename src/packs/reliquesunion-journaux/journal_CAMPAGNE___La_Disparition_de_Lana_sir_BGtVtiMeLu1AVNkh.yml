    text:
      format: 1
      content: "<div class=\"arran-mod\"><p><span style=\"font-family:Signika, sans-serif\">Les PJs sont dans la ville de Blanche Paix. Ils s'occupent de leurs affaires respectives (imaginer leurs activités).</span></p><ul><li><p>PJs Humains : font leur travail de façon correct (travail légal ou ilégal)</p></li><li><p>PJs Elfes : en fonction de sa rôle et fonction dans la ville de Blanche Paix</p></li><li><p>PJs Peaux Vertes : soit emprisonné soit forçat soit travail</p></li></ul><p></p><ul><li><p><strong>Earendel :</strong> Elle est chez Ianlyr. On toque à la porte. Ianlyr va ouvrir et t'appelle de façon passablement agacée.</p></li><li><p><strong>Ramiel :</strong> Positionné dans sa cabane forestière. Un homme appelle au loin disant qu'il souhaite te parlé. Il a les mains en l'air et semble ne pas vouloir de mal.</p></li><li><p><strong>Grim le cogneur :</strong> Tu viens de rentrer d'un contrat de protection d'une caravane de marchand et tu va rentré dans ta chambre d'une auberge de Blanche Paix. Un homme t'attend devant la porte de ta chambre.</p></li><li><p><strong>Drakk'o :</strong> Tu te balades sur la place du marché. Il y a pas mal de monde en cette matinée ensoleillée. Tu aperçois un homme qui t'observe et se dirige vers toi. Il a une lettre à la main.</p></li></ul><p>\_</p><p>Chaque PJs reçoit la visite d'un homme imposant, habillé de vêtements simples et confortables. Il a des cheveux châtain et longs et un grand manteau vert orné de motif de chasse et de nature. Il ressemble à un chasseur.</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Borass%20Taer.jpg\" height=\"200\" /><p>Dans sa main, il tend une lettre au personnage. Le cachet est neutre et il y est inscrit le prénom de chaque PJs.</p><p>\_</p><p>@UUID[JournalEntry.AjCbCwLVK7GDUqr7]{Lettre pour Earendel}</p><p>@UUID[JournalEntry.S39tzrVCKrFDTqjA]{Lettre pour Ramiel}</p><p>@UUID[JournalEntry.IAaOHPrggVnAfM3l]{Lettre pour Grim le Cogneur}</p><p>@UUID[JournalEntry.fTPZxxe0qQcoQs9f]{Lettre pour Drakk'o}</p><div class=\"parcho\"><p><strong>Monsieur/Madame Prénom et Nom du PJ,</strong></p><p><strong>Vos compétences et votre parcours m'intéressent grandement depuis quelques temps. J'ai besoin de vous et avant tout de votre discrétion.</strong></p><p><strong>Si vous souhaitez venir en aide à un homme de haute position et récupérer les fruits bien sucrés d'un travail à votre hauteur, je vous donne rendez-vous à l'Auberge du Passage Gourmand demain aux premières lueurs du jour.</strong></p></div><p style=\"text-align:center\">\_</p><h2>Rendez-vous à l'Auberge du Passage Gourmand</h2><p>Les PJs qui ne se connaissent pas se croise à un kilomètre de l'Auberge sur la route. Faites une description des PJs qui ne se sont jamais vu.</p><p></p><table><tbody><tr><td data-colwidth=\"800\"><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Hisp%20GALIK%201.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Auberge.Passage.Gourmand.01.jpg\" height=\"200\" /><p><span style=\"font-family:Bookinsanity\"><em>L'auberge est à la croisée de deux routes à une demi-heure au nord de @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier}. C'est une grande bâtisse bien entretenue au toit de chaume qui reçoit jours et nuits les voyageurs et les caravanes qui naviguent entre Blanche Paix, Ispier, la </em></span><span id=\"map-panel-title\"><span style=\"font-family:Bookinsanity\"><em>Forteresse-état d'Arkar'um et le littoral.</em></span></span></p><p><span style=\"font-family:Bookinsanity\"><em>Une légère fumée sort de la cheminée, la double porte est grande ouverte mais aucune charette n'est visible devant ou dans les écuries situées à la droite du bâtiment. On peut entendre quelques chevaux venant de derrière le bâtiment.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>En entrant, vous remarquez que l'auberge est totalement vide, les tables sont bien rangées et l'une d'entre-elle est garnie de plats, pains, pichets, friandises. L'émissaire qui vous a donné la lettre se tient dans un coin de la pièce comme pourrait le faire un garde du corps</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Devant la table vous voyez un homme bien habillé, une barbe bien fournie avec une chevelure impeccable. Il s'approche de vous, un large sourire aux lèvres et une démarche très conviviale.</em></span></p></td></tr></tbody></table><p>\_<strong>@UUID[JournalEntry.W6WginBqotp0noPm]{Jaspar +Hisp}</strong></p><div class=\"discussion\"><p><em><strong>HISP GALIK : Bienvenu à toutes et tous, vous me voyez ravi de vous voir ici et à l'heure en plus. Nous serons tranquille ce soir. Mon maître vous demande la plus grande discrétion sur ce qui va se passer ce soir et avant qu'il ne descende, ceux qui ne savent pas tenir leur langue sont priés de sortir IMMÉDIATEMENT.</strong></em> (mot prononcé avec une grande autorité).</p></div><p></p><p>Nada Gruger : la fille serveuse.</p><p></p><p>Pourquoi les PJs :</p><ul><li><p><strong>Earendel :</strong> Après ton entretien avec le seigneur de Blanche Paix Alvon Godfries, il a été prévenu qu'une elfe blanche était arrivé dans la région et souhaitait s'impliquer. I m'a suggérer votre nom pour ma requête.</p></li><li><p><strong>Ramiel :</strong> Malgré que tu sois un elfe sylvain, le seigneur Bonarion pense que ta connaissance de ton peuple peu aider. Son conseiller n'est pas du tout d'accord avec cette décision. Lorsque Alvon Godfries a dit au seigneur Bonarion qu'un elfe sylvain était en conflit avec des petits nobles de Blanche Paix, il s'est dit qu'un petit voyage serait le mieux pour Ramiel.</p></li><li><p><strong>Grim le cogneur :</strong> Une histoire raconte que tu es un survivant d'une expédition périlleuse et mortelle dans une région hostile. des compétences qui ont tapé dans l'oeil du seigneur Bonarion</p></li><li><p><strong>Drakk'o : </strong>Konriad, le fils du seigneur de Blanche Paix semble satisfait de tes capacités. De plus, les gardes de Blanche Paix en ont marre de vous surveiller ainsi je pense que cette mission serait bénéfique pour tout le monde.</p></li></ul><table><tbody><tr><td data-colwidth=\"800\"><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Jaspar%20Bonarion.jpg\" height=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>Vous voyez l'émissaire prend une petite cloche posée sur la table et la secouer doucement. Quelques instants plus tard, un homme d'une soixantaine d'année descend l'escalier avec une grande prestance. Il est habillé d'une tunique richement décorée d'un bleu profond. Ses cheveux, sa barbe blanche et ses traits marqués par l'âge montrent son grand âge mais ses mouvement et son charisme pourraient le faire passer pour un jeune homme.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Il s'approche de vous et vous salue individuellement par votre Nom et prénom</em></span> <span class=\"imp\">(si un PJ est Elfe sylvain il ne lui sert pas la main !)</span></p></td></tr></tbody></table><p></p><div class=\"discussion\"><p><strong>JASPAR BONARION :</strong> Installez vous je vous prie. Mon ami l'aubergiste, <strong>Stepson Gruger</strong>, nous a préparé quelque mets pour passer la soirée convenablement.</p><p>Je vous ai convié ce soir pour vous confier une mission de la plus haute importance et j'espère bien que vous allez comprendre la gravité de la situation.</p><p>Je suis @UUID[JournalEntry.YZBFIHMD2pPy6DVS]{Jaspar Bonarion} le seigneur de @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier}. Je vous présente Hisp Galik, le mage qui me conseille.</p><p>Vous n'êtes pas sans savoir que nous avons eu des problèmes avec un village d'Elfes Sylvains dans les derniers jours. Nous avons gagné cette guerre provoquée par nos voisins des bois mais j'ai bien peur que ce drame ne vienne s'engouffrer au sein de ma famille !</p><h3><span style=\"text-decoration:underline\"><em><strong><span style=\"text-decoration:underline\">Temps de pause et air grave</span></strong></em></span></h3><p>Ma fille Lana'sir a été kidnappée par des Elfes Sylvains, il y a trois jours. Surement un groupe de survivants qui veulent me faire payer leur propres erreurs. Mes soldats personnels ont essayé de la retrouver et de suivre sa trace mais franchement ils sont incompétents et c'est peu dire. Je ne veux pas que sa disparition s'ébruite plus que les rumeurs qui se propagent déjà. Mon peuple est déjà bien assez sous tension pour ne pas rajouter la perte de leur Dame d'Honneur à leur moral. Vous devez la retrouver et la ramener saine et sauve au plus vite. Nous avons BESOIN d'oublier cette histoire et reprendre le court de nos vies maintenant que <span style=\"text-decoration:line-through\"><s>ces enfoir…</s></span> ces elfes ne sont plus.</p></div><p>\_</p><p><span class=\"imp\">Si les PJs coupent la parole du seigneur Jaspar:</span> Hisp Galik les interrompt d'un : \"<em>On laisse parler le seigneur Bonarion</em>\". En cas de récidive, \"<em>Taisez-vous maintenant et c'est mon dernier avertissement</em>\". Jaspar lui lance un regard noir.</p><p>\_</p><h2>Temps d'échange avec le seigneur Jaspar :</h2><p><span class=\"imp\"><strong>(En cas de manque de respect des PJs, Hisp Galik peut les menacer à chaque instant voir leur fermer la bouche magiquement si besoin même si le seigneur s'interpose.)</strong></span></p><p>Après son discours et pendant que les PJs demandent des explications, le seigneur se met à manger et invite les PJs a faire de-même.</p><h3><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Informations que le seigneur peut donner aux PJs :</span></span></h3><ul><li><p>Lana'sir a disparue il y a quatre nuits au sein du château.</p></li><li><p>Ils peuvent aller à @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier} pour investiguer avant de partir</p></li><li><p>L'un des Elfes Sylvains a été blessé lors de sa fuite par les murs d'enceinte de la ville.</p></li><li><p>Ils étaient à cheval et, d'après le garde, ils sont partis au Sud-Est de la cité.</p></li><li><p>Récompense s'il demande : une propriété dans la Cité d'Ispier, 400 pa par personne.</p></li><li><p>Il ne comprend pas car sa fille, Lana'sir, a toujours défendu la cause des elfes sylvains</p></li><li><p>autres question des PJs à improviser.</p></li></ul><p>\_</p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">A la fin du repas, Hisp Galik, le mage, prend la parole :</span></strong></span></h3><div class=\"discussion\"><p><strong>HISP GALIK :</strong> Il est bien évidant que <strong>les survivants Elfes devront être tués sans ménagement.</strong> Malgré leur erreurs et leur défaite, ils s'en sont prit à la Dame d'Honneur et ce crime ne pourrait rester impuni. Apportez-nous toutes les affaires que vous trouverez sur leurs cadavres afin que nous remontions la piste des survivants.</p></div><p>\_</p><h3>Avant de partir :</h3><div class=\"discussion\"><p><strong>JASPAR BONARION :</strong> Vous pourrez venir à @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier} dès maintenant pour récupérer de l'équipement et <strong>investiguer au château s'il le faut</strong>. Pour votre mission, recevez déjà <strong>ces bourses contenant 25 pa chacun</strong> pour vous équiper et contribuer aux frais que cette poursuite engendrera. <strong>Des chevaux, poneys ou cochons de voyage pourront vous être fournit</strong> aux écuries de la Cité si vous le souhaitez.</p><p><strong>Mon conseiller ici présent Borass Taer vous accompagnera pour ce voyage. </strong><span style=\"font-family:Times New Roman\"><em>(l'émissaire s'avance d'un coin de l'auberge avec un grand sourire et s'avance jusqu'à la table)</em></span> Il connait la région comme sa poche, aime la chasse et le pistage et surtout, lorsque vous la retrouverez, ma fille saura que vous venez de ma part.</p><p><strong>Suivez-moi et ne perdons pas plus de temps.</strong></p></div><p>\_</p><h2>Arrivée à la Cité d'Ispier</h2><table><tbody><tr><td rowspan=\"2\"><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Cited%27Ispier01.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Cited%27Ispier02.jpg\" height=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>En arrivant, vous voyez la <strong>grande ville pousser sur une colline entourée de montagnes plus hautes. Les rivières contournent la cité</strong> et de nombreux ponts viennent la franchir pour rallier les différents quartiers de la cité. Au premier coup d'oeil, on observe que <strong>la cité est jeune et connait un essor rapide</strong>. Les constructions poussent ça et là sans aucune rigueur. Au delà, des nouveaux quartiers longeant les berges, <strong>ils voient une épaisse muraille tout autours de la \"vieille ville\".</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em>D'à peine cent ans, cette partie de la ville est plus marquée par d'anciennes batailles et des raids d'ogres ou d'orcs. D'après les livres d'histoire de la région, <strong>Ispier était un camp avancé protégeant et avertissant Blanche Paix</strong> et les villes du Nord en cas d'attaque des Peaux Vertes. L'arrivée massive des humain transforma le camp en une ville florissante et commerçante. Malgré quelques conflits avec des orcs qui viennent piller les fermes aux alentours, <strong>peu de tracas viennent perturber les Ispierois et Ispieroises.</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Lors de votre parcours dans les rues de la ville, <strong>vous distinguez des miliciens humains aux endroits clef</strong> (les ponts, les places, les grands bâtiments…) et <strong>tout le monde ressent un climat de tension à chaque croisement</strong>. Des couples qui pleurent sur un banc, des bagarres, des grafitis \"Mort aux elfes\" ou \"brulez-les tous\". Au abord du château, de construction naine comme la muraille, <strong>une grande tente à été monter et ils peuvent voir des infirmiers et médecins essayer de soigner des blessés.</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Vous êtes directement amenés aux écuries et le seigneur Jaspar vous propose une monture pour ceux qui veulent (Mirage, Robuste, Flèche et Droiture (le cheval de Borass se nomme Cascade)).</em></span></p></td></tr><tr></tr></tbody></table><p>\_</p><div class=\"discussion\"><p><strong>JASPAR BONARION :</strong> <strong>Voici les moutures qui vont vous accompagner pour retrouver la Dame. Prenez quelques temps pour vous équiper et recueillir des informations mais ne tardez pas trop. Chaque minute de perdu, réduit vos chances de les rattraper.</strong></p><p><strong>J'ai d'autres soucis à régler dans l'heure mais Borass saura vous guider si besoin. N'oubliez pas qu'à l'extérieur de cette enceinte, je souhaite une grande discrétion de votre part. N'allez pas augmenter le désespoir des familles endeuillées.</strong></p></div><p>\_</p><h2>Temps libre pour les PJs</h2><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Faire des courses :</span></strong></span></h3><p>les PJs peuvent se rendre @UUID[JournalEntry.xPc2KnecGCn2o0ND]{Au rêve d'Aventures}, le magasin d'équipement de Ronrik. S'ils en font la demande et qu'ils sont \"aimable\" Ronrik peut leur fournir des outils de crochetage et un cristal lumineux qu'il a dans ses placards.</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Marta%20les%20petits%20plats.jpg\" height=\"150\" /><p>Ils peuvent aussi se retrouver à la Taverne/épicerie <strong>\"Marta les Petits Plats\"</strong> pour acheter des rations et des denrées pour le voyage. Marta est une grande gueule qui pose énormément de questions et essaye de tirer les vers du nez. Gare aux PJs pour leur réponses.</p><p>\_</p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Investigation :</span></strong></span></h3><ul><li><p><strong>Dans la chambre de Lana'sir :</strong></p><ul><li><p>Les affaires de Lana'sir sont très bien rangées, le lit est fait, le linge est plié. Son bureau est recouvert de papiers, notes et livres mais bien organisés.</p></li><li><p><span class=\"jet\"><strong>SAG-PERCEPTION DD15 : </strong>il manque une pile d'affaire dans un placard</span></p></li></ul></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Auprès de la servante de Lana'sir :</span></strong></span></p><ul><li><p>Jeune femme assez timide et qui bégaye. Elle baisse les yeux tout le temps mais elle peut s'énerver si les PJs sont un peu trop brusque \"<em><strong>c'est à cause des sales elfes de la forêt, ils l'ont tuée, elle est surement morte, je ne l'a reverrais jamais, … s'il vous plait ramenez-là, je vous en supplie ! Elle est tellement gentille…</strong></em>\" Elle n'a rien vue. Elle a l'air très triste et perturbée.</p></li><li><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">S'il l'interroge sur les affaires de Lana'sir :</span></span> <span class=\"jet\"><strong>CHA-PERSUASION DD10 : </strong>Je n'ai pas retrouver son sac et une pile de vêtements de chasse. HA oui et son carnet de notes à été volé aussi par ces salauds, pardon pour ma vulgarité !</span></p></li></ul></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Les gardes, Le chef de la garde se nomme Rienn Forberk :</span></strong></span></p><ul><li><p><strong>Gurft :</strong> un des ses hommes sur la fortification <strong>a tiré un carreau d'arbalète sur un homme discret et rapide</strong> qui a sauté par dessus la fortification, <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">à la tombée de la nuit</span></span> il y a quatre jours.</p></li><li><p><strong>Sofion :</strong> l'un de ses hommes, posté à la porte Est de la ville, se rappelle <strong>avoir vu passer deux voyageurs </strong><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">à l'aube</span></strong></span><strong> il y a trois jours.</strong> Ils étaient chaudement habillés et faisaient profile bas. Ils étaient tous les deux sur le même cheval, un bête magnifique, bien entretenue.</p></li><li><p><strong>Au vu des dates et des horaires :</strong> ils ont pu passer la nuit dans une auberge de la ville. La plus discrète pour des personnes recherchées serait \"l'Auberge des Yeux Bandés\"</p></li></ul></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Les marchands récemment arrivés en ville :</span></strong></span></p><ul><li><p>Un groupe de marchands voyageant ensemble, a vu <strong>un groupe de personnes à quelques dizaines de mètres de la route allant vers l'est.</strong> Ils étaient rejoint par deux personnes sur un cheval. <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">C'était à l'aube</span></span> il y a trois jours lorsqu'ils sont arrivés en ville. Ils nous ont croisé et ils prenaient la route vers le Sud-Est en direction de la Forteresse État d'Arkar'um.</p></li></ul></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">L'Auberge \"Aux yeux Bandés\"</span></strong></span></p><ul><li><p>Cette auberge malfamée dans les quartiers pauvres et ouvriers de la ville est un repère de malfrats et de voyous. Elle se situe dans une ruelle entourée de magasins et d'habitations bringueballantes. Sur son enseigne, on distingue une fille de joie, un bandeau sur les yeux et un large sourire sur les lèvres. <strong>L'aubergiste, Krogan, est un sale type imbu de lui-même et particulièrement désagréable.</strong> Chaque information donnée coutera quelques PA aux PJs. Des filles nues humaines ou naines se promènent dans l'établissement n'hésitant pas à s'assoir sur les genoux des Personnages.</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Auberge.aux.Yeux.Band%C3%A9s.01.jpg\" height=\"150\" /><ul><li><p>Un couple ont réservé une chambre il y a quatre nuit. Ils semblaient fatiguer et presser de faire leurs petites affaires.</p></li><li><p>Je n'ai pas vu le visage de ces clients et je m'en fout comme de ma première putain.</p></li><li><p>Ils sont partis de bonne heure le lendemain</p></li><li><p><span class=\"jet\"><strong>CHA-PERSUASION / INTIMIDATION DD10</strong> : à mon avis la jeune femme devait être encore vierge car le lit était taché de sang à leur départ.</span></p></li><li><p><span class=\"jet\"><strong>CHA-PERSUASION / INTIMIDATION DD15</strong> : Ils m'ont juste demander combien de temps de voyage pour atteindre le Territoire des Mangeurs de Plaine puis ils m'ont réglé avec un jolie pourboire.</span></p></li></ul></li></ul></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Laissez les PJs faire d'autres investigations s'ils le souhaitent</span></strong></span></p></li></ul><p>Grim prend 0 pa d'avance</p><p>Ramiel prend 200 pa</p><p>Drakk'o prend 100 pa</p><p>Eärendel prend 0 pa d'avance.</p><blockquote><p style=\"text-align:center\"><strong>Prochain Acte = VOYAGE AU TRAVERS LE PAYS DES VENTS</strong></p></blockquote></div>"
