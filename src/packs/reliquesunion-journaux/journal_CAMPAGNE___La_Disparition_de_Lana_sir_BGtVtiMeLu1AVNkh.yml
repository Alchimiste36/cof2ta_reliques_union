    text:
      format: 1
      content: "<div class=\"arran-mod\"><p><span class=\" intro\">\"Le groupe d'aventurier, enfoncés dans les hautes montagnes des Crocs d'Acier cherchent le fameux village des Centaures. La route est courte mais remplie de dangers. Seront-ils à la hauteur ?</span></p><p></p><h1>Le voyage vers le Village d’Arkanov</h1></div><div class=\"arran-mod\"><p></p><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>C'est l'heure du départ pour les montagnes en direction du point que vous a indiqué Timaor. En espérant que vous soyez assez équipé pour faire ce voyage exigeant.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Vous commencez cette randonnée en montant un chemin en lacet qui part vers le nord et dans votre progression vous distinguez le Ravin de Novrak qui rétrécit au fur et à mesure de votre progression. Au bout de quelques heures de marches avec un fort dénivelé, vous passez une crête et toute traces de civilisation disparait dans l'instant.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>En face de vous, une étendue sauvage, presque entièrement recouverte des neiges éternelles des hauts sommets. Résineux éparses, failles profondes, crevasses dissimulées, plaques de glaces et escalades pénibles semblent les seules certitudes que vous percevez devant vous. Vous vous dirigez vers des crêtes plus hautes encore et ce n'est pas pour vous rassurer sur la difficulté de ce voyage.</em></span></p></td></tr></tbody></table><p class=\"MsoNormal\">Si tout se passe bien, le voyage devrait durer 3 jours.</p><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S’ils n’ont pas de pisteur</span></strong></span> (test Nature/Survie <strong>/r 2d20kh + 10</strong>), ils devront choisir un ou plusieurs PJs pour suivre la bonne direction.</p><p class=\"MsoNormal\"><strong>TEST de NATURE-SURVIE DD20 trois fois par jour\_:</strong></p><ul><li><p class=\"MsoNormal\"><strong>si réussi</strong> OK</p><ul><li><p class=\"MsoNormal\">Si réussi de 10 points ou plus gain de 1/3 de jour</p></li></ul></li><li><p class=\"MsoNormal\"><strong>si raté</strong> perte de 1/3 de journée</p><ul><li><p class=\"MsoNormal\">si raté de 10 ou plus problème.</p></li></ul></li></ul><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Les problèmes\_:</span></strong></span></p><ul><li><p class=\"MsoListParagraphCxSpFirst\" style=\"margin-left:19.5pt;mso-add-space:auto;text-indent:-18.0pt;mso-list:l0 level1 lfo1\">Tombe dans une crevasse (perte de 1/3 de journée et <strong>/r 3d6</strong> DM)</p></li><li><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-left:19.5pt;mso-add-space:auto;text-indent:-18.0pt;mso-list:l0 level1 lfo1\">Perte de repère important (un jour de retard et retour sur leurs pas + perte de 1 PR jusqu'à un bon repos)</p></li><li><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-left:19.5pt;mso-add-space:auto;text-indent:-18.0pt;mso-list:l0 level1 lfo1\">Repère de Jargual\_: 2 loups et 1 loup Alpha LM97 <strong>@UUID[Scene.ntczz9wlCb2zoRqA]{Rencontre chemin}</strong></p></li><li><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-left:19.5pt;mso-add-space:auto;text-indent:-18.0pt;mso-list:l0 level1 lfo1\">Blessure sur la route (cheville, chute, …) <strong>/r 4d6</strong> DM</p></li><li><p class=\"MsoListParagraphCxSpLast\" style=\"margin-left:19.5pt;mso-add-space:auto;text-indent:-18.0pt;mso-list:l0 level1 lfo1\">Eboulement sur les PJs (perte de une journée, perte de 2PR pour tous jusqu'à un bon repos)</p></li></ul><p></p><h2>Attaque du Scarabée Géant des Montagnes</h2><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Vous marchez depuis deux jours et la fatigue commence à se faire vraiment sentir dans tous les muscles de votre corps. Le rythme est soutenu mais particulièrement saccadé lorsqu'il faut faire marche arrière, contourner une crevasse ou se risquer dans des zones particulièrement accidentées.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Le groupe trouve un endroit à l'abri des bourrasques de vents pour passer la nuit et c'est le bon moment pour poser votre barda.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Alors que vous êtes en train de sortir l'équipement de votre campement, une ombre massive passe dans les derniers rayons du soleil couchant.</em></span></p></td></tr></tbody></table><p><span class=\"jet\"><strong>SAG-PERCEPTION DD10 : </strong>Une créature a bouger sur la crête au dessus de vous</span></p><p><span class=\"jet\"><strong>SAG-PERCEPTION DD15 : </strong>Un bruit d'insecte est à peine perceptible, une espèce de cliquetis qui se rapproche</span></p><p><span class=\"jet\"><strong>SAG-PERCEPTION DD20 : </strong>En levant les yeux on distingue à peine, le bout d'une espèce d'immense scarabée.</span></p><p></p><p><span class=\"jet\"><strong>SAG-NATURE/SURVIE DD20 :</strong> c'est un scarabée géant des Montagnes. Le personnage sait qu'ils sont très résistants et qu'ils peuvent projeter des crachats empoisonnés et très puissants.</span></p><p></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/ANIMAUX/f735fcbb1d9bae85e51f50d2a75804db.jpg\" width=\"150\" /><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">COMBAT vs @UUID[Actor.uvlReDo6JKZ9b3C6]{Scarabée des Crocs d'Acier}</span></strong></span> =&gt; <strong>@UUID[Scene.WhlIgqq978SoNTqT]{3.Attaque Scarabée}</strong></p><p class=\"MsoNormal\">Comme la plupart des insectes, il n’est pas agressif mais effrayé.</p><ul><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs l'intimident en poussant des cris ou en étant menaçant =&gt;</span></strong></span> CHA-COMMANDEMENT Opposé si réussi le scarabée s'en va. Si raté le scarabée intimide pendant un round et attaque par un crachat le PJ qui intimide.</p></li><li><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs l’attaquent =&gt;</span></strong></span> il attaquera après un round d’intimidation en levant ses pattes et en vibrant intensément.</p></li><li><p class=\"MsoNormal\"><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si on ne l’attaque pas et qu’on a une position défensive face à lui =&gt;</span></strong></span> il pourra laisser les PJs partir. Si les PJs ne bougent pas, il s'avancera jusqu'au contact en intimidant le groupe</p></li></ul><p class=\"MsoNormal\">Le Scarabée possède des glandes à poison mortel et très collant. Les PJs peuvent récupérer 4 doses de ce gel (NATURE-SURVIE DD12 ou AGILITÉ DD15). <strong>@UUID[Item.8LOrs45Nx81j2pyr]{Poison de Scarabée des Montagnes}</strong></p><p class=\"MsoNormal\">Les PJs peuvent aussi récupérer la corne du Scarabée (environ 1mx1m) et le transformer en bouclier moyen (70cmx50cm). Caractéristique du bouclier\_: DEF+2 - Encombrement 0 – résistant à l’acide – très léger – installé sur l’avant bras ce bouclier ne gène pas les attaques magiques et à Distance. AGILITÉ DD17 + bonus d’artisanat éventuel. Ce bouclier peut recevoir des runes. <strong>@UUID[Item.aLDEbxnsuF77bas4]{Corne de Scarabée}</strong></p><p></p><h2>Arrivée à Arkanov</h2><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Après cette rencontre surprise, vous passez une nuit sans encombre. D'après les informations de Timaor, vous devriez arriver demain dans la journée à l'endroit qu'il vous a indiqué. Au petit matin, vous reprenez votre route dans ces montagnes hostiles. </em></span>(Jet de NATURE/SURVIE encore =&gt; événement ou pas)<span style=\"font-family:Bookinsanity\"><em>.</em></span></p></td></tr></tbody></table><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Alors que vous arpentez les pentes abruptes, vous arrivez dans une foret dense, mélange d'essences de résineux de montagnes et de feuillus résistants au froid de l'altitude. Vous traversez sans difficulté des petits cours d'eau prenant leur sources dans les hauteurs et alimentés par la fonte du printemps.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Au travers des branches et des buissons, vous distinguez un nuage de vapeur d'eau provenant d'une paroi rocheuse et lorsque vous vous en approchez, vous tombez sur une zone où les arbres ont été coupés proprement à la hache.</em></span></p></td></tr></tbody></table><p><span class=\"jet\"><strong>Jet de SAG-PERCEPTION :</strong></span></p><ul><li><p><span class=\"jet\"><strong>DD10 :</strong><em>Aucun son ne vous parvient de la chute d'eau et, derrière une épaisse couche de lierre et de feuillage, vous remarquez des murs maçonnés et des grilles métalliques en continuité des parois rocheuses. </em><span style=\"font-family:Bookinsanity\"><em>Vous entendez un cliquetis d'un rouage.</em></span></span></p></li><li><p><span class=\"jet\"><strong>DD15 :</strong> <span style=\"font-family:Bookinsanity\"><em>vous voyez au travers d'une grille des mouvements sombres qui s'agitent</em></span></span></p></li><li><p><span class=\"jet\"><strong>DD20 :</strong> <span style=\"font-family:Bookinsanity\"><em>Une partie du lierre se trouvant au milieu de la paroi bouge légèrement comme si le mur de l'autre côté se déplaçait.</em></span></span></p></li></ul><p></p><p><span style=\"font-family:Bookinsanity\"><em><strong>Que faites-vous ?</strong></em></span></p><p></p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/CENTAURES/CM22.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/CENTAURES/CM25.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/CENTAURES/CM13.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/CENTAURES/CF03.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/CENTAURES/CM15.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/CENTAURES/CF15.jpg\" height=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>Au bout de quelques secondes, la flèche d'une baliste se plante dans le sol à un mètre de vous et vous voyez sortir du mur de lierre des Centaures armés de lances. Certains portent des armures, d'autres sont torses nus. Ils sont extrêmement musclés que ce soit les femelles ou les mâles. Ils galopent en prenant soin de vous contourner. Un des Centaures semble guider le reste des intervenants en criant des phrases incompréhensibles chacun en rythme et en se répondant les uns les autres. @UUID[Playlist.uBnMd2MBVWVhFh2q.PlaylistSound.pnk9YLU1YMQym0Mf]{Haka Intimidation 01}. Vous entendez aussi au niveau de la muraille de lierre, d'autres bruits de sabots et les chants qui résonnent sur les falaises autour de vous. Ils ne sont pas nombreux mais la puissance de leur chant donne l'impression d'une centaine de centaures.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Ils se retrouvent en arc de cercle autour de vous, pointant leur lances dans votre direction, tapant des sabots, montrant leurs bras et leurs tatouages et ils commencent un chant de guerre ou d'intimidation, se déplaçant en rythme et en faisant de grands gestes explicites (le pouce qui tranche la gorge, un main qui brise un os, la lance qui étripe…)</em>.</span> \"ça ressemble au Haka de Nouvelle-Zélande\"</p></td></tr></tbody></table><p><span class=\"jet\"><strong>CHA-COMMANDEMENT des Centaures vs CHA-PSYCHOLOGIE des PJs :</strong></span></p><ul><li><p><span class=\"jet\"><strong>Si réussi =&gt;</strong> <span style=\"font-family:Bookinsanity\"><em>Vous êtes impressionnés par ces centaures grands et musculeux. C'est la première fois que vous croisez ces créatures majestueuses mais vous arrivez à garder votre sang froid devant cette intimidation.</em></span></span></p></li><li><p><span class=\"jet\"><strong>Si Raté =&gt;</strong> <span style=\"font-family:Bookinsanity\"><em>Vous êtes impactez par cette démonstration de cohésion et de puissance. Aucun de vous n'est à la hauteur face à ces guerriers. Vous êtes dans l'incapacité de réagir face à cette danse de guerre. (-10 à tous les prochains tests tant que les Centaures menacent les PJs impressionnés)</em></span></span></p></li></ul><p></p><p><span style=\"font-family:Bookinsanity\"><strong>Que faites-vous pendant cette danse de guerre ?</strong></span></p><p></p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/CENTAURES/CF21.jpg\" height=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>Ca dure deux ou trois minutes et ensuite, ils se disposent en position de combat autour de vous, lance pointées et muscles bandés. Une femelle Centaure fait un pas en avant et dit : <strong>Unataka nini ?</strong> (Que voulez-vous ?)</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Elle vous regarde d'un air méprisant et agressif et elle semble attendre une réaction de votre part.</em></span></p></td></tr></tbody></table><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs sont aimables :</span></strong></span></h3><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Les Centaures vous font comprendre avec leurs lances que vous devez les suivre. Ils se placent derrière vous et vous intime d'avancer vers la paroi de lierre.</em></span></p><p>Alors que les centaures se rapprochent de vous, l'un deux vous frappe à la tête avec l'arrière de sa lance pour vous assommer</p></td></tr></tbody></table><p>=&gt; <strong>CONTACT vs ATHETISME</strong> : appliquer les DM /r 1d8 + 8</p><ul><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si Athlétisme Réussi =&gt;</span></strong></span> Le centaure recommence une deuxième fois et si ça n'assomme toujours pas le PJs =&gt; un centaure lui mets un sac sur la tête et on lui ligote les mains, on lui retirera toutes les armes visibles.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si Athlétisme Raté =&gt;</span></strong></span> Vous tombez inconscient</p></li></ul><p></p><h3><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si les PJs sont hostiles :</span></strong></span></h3><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Les centaures qui vous entourent sortent de leur sacoche des filets et tous ensembles ils vous visent.</em></span> <strong>DISTANCE :</strong> <strong>/r 2d20kh + 10 vs DEF des PJs</strong></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si attaque réussie =&gt;</span></strong></span> <span style=\"font-family:Bookinsanity\"><em>Vous êtes prit au piège par un lourd filet de pêche et vous voyez des centaures se rapprocher de vous pour vous attraper.</em></span></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si attaque raté =&gt;</span></strong></span> <span style=\"font-family:Bookinsanity\"><em>Grâce à votre réactivité, tu/vous esquivez le filet qui arrivait dans ta/votre direction. Dans la seconde où le filet touche le sol, deux centaures se ruent sur toi/vous avec leurs lances en avant. La pointe de leur lances se stoppent à quelques centimètres de ton visage et de ta gorge. Que fais-tu ?</em></span></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si le PJs est encore menaçant =&gt;</span></strong></span> Attaque des Centaures sur le ou les PJs hostiles. Ils essayeront d'assommer les récalcitrants mais si ce n'est pas possible ils pourront les tuer.</p></td></tr></tbody></table><p></p><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Vous vous réveillez dans une grotte sans savoir depuis combien de temps on vous a placé là. Des troches sont allumées et vous voyez autour de vous de nombreuses choses. Vous remarquez rapidement que vous n'avez plus votre équipement (armes, armures, sac à dos, ceintures…) mais vous êtes habillés avec vos propres habits. La première chose qui vous choque en ouvrant les yeux, ce sont les bruits qui vous entourent. D'abord le son sourd et constant d'une grande chute d'eau qui résonne dans cette grotte et derrière ce son d'ambiance, vous percevez des paroles agitées dans une langues inconnues. </em><strong>Unataka tuwafanyie nini hawa wavamizi !</strong></span></p><p><span style=\"font-family:Bookinsanity\"><em>Pour vous même si vous ne comprenez pas les propos, cela ressemble à une dispute ou un débat agité à l'extérieur. Vous distinguez plusieurs types de voix tantôt masculines tantôt féminines et avec des timbres provenant de personnes plus ou moins jeunes.</em></span></p><p></p><p>Que faites-vous ?</p><p></p></td></tr></tbody></table><p><strong>@UUID[JournalEntry.OS0QKt6iIB9SgLL0]{V.Grotte et Mine}</strong></p><p></p></div>"
