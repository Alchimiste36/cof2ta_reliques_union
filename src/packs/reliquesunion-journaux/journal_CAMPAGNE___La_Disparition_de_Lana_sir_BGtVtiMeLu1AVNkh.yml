  - sort: 500000
    name: Sortie du Temple du Val Rouge
    type: text
    _id: Qj2a4hBx568STYjg
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<div class=\"arran-mod\"><p><span class=\"intro\">Après avoir trouvé les Bracelets de l'Union et de nombreuses informations, il va falloir retrouver Lana'Sir Bonarion et les elfes survivants pour compter leur histoire. Mais est-ce que tout va se passer comme prévu !</span></p><p>\_</p><p>Fin de la 5e séance.</p><p>Les PJs ont décidé de rester plusieurs jours dans le Temple du Val Rouge pour faire des recherches dans la bibliothèque et dans le dortoir de la Gardienne.</p><ul><li><p>Ramiel recherche également des informations sur la magie des runes</p></li><li><p>Ava recherche des informations sur le terme Tel'Quessir</p></li></ul><p>Les recherches sont assez laborieuse malgré la présence du grand livre servant d'indexe. Comme les textes s'arrêtent en -254 CA il est parfois compliqué de savoir de quelle ville, région, personnage… il est question dans les recueils.</p><ul><li><p>Au bout de quelques jours grâce aux journaux intimes de la Gardienne, Maniash'Onira, ils arrivent à éclaircir les dates des différents événements liés aux reliques : <strong>@UUID[JournalEntry.4LlO0EYPGly2VrWU]{Résumé de la timeline}</strong></p></li></ul></div><div class=\"arran-mod\"><ul><li><p>Ava, grâce à l'aide de Grim qui arrive à lire un ouvrage écrit dans un ancien dialecte elfique, trouve une information que un terme proche de Tel'Quessir : <strong>@UUID[JournalEntry.5An6LV5uXTsTWrqR]{Tel'Ques'Aar}</strong></p></li><li><p>Ramiel trouve quelques informations sur des systèmes de runes utilisés par les elfes sylvains pour développer le pouvoir du bois et permettre la fabrication d'armures, d'armes ou d'objets magiques. Il ne peut pas utiliser ce savoir pour le moment mais c'est une bonne base pour poursuivre ses recherches (termes désignant la plupart des runes, comment les combiner et nommer les formules, les règles à suivre pour ne pas se blesser…) =&gt; INT-ARCANES +3</p></li></ul><p></p><h2>Sortie du Temple</h2><table><tbody><tr><td data-colwidth=\"800\"><p><span style=\"font-family:Bookinsanity\"><em>Au moment où vous monter l'escalier en colimaçon qui vous a mené à l'intérieur du temple du Val Rouge, vous entendez le même bruit de racines et de craquement de l'Arbre-Mère en train de s'ouvrir vers l'extérieur. Dès que vous êtes tous dans l'escalier, les lanternes du Temple s'éteignent derrière vous.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Vous sortez au pied de l'Arbre-Mère.</em></span></p><ul><li><span class=\"jet\"><strong>SAG-PERCEPTION DD15 :</strong> <em>il y a du mouvement sur votre droite et en face de vous</em></span></li><li><p><span class=\"jet\"><strong>SAG-PERCEPTION DD20 : </strong><em>vous entendez le bruit d'une arbalète qui se charge et des chuchotements</em></span></p></li></ul><p><span style=\"font-family:Bookinsanity\"><em>Le léger bruit du déclenchement d'une arbalète se fait entendre.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Disposé en embuscade face aux abords de l'Arbre-Mère, vous entendez un groupe de combattants.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Au premier coup d'oeil, ils ne semblent pas très organisés.</em></span></p></td></tr></tbody></table><p><strong>Scène : @UUID[Scene.dzqj6KWamPBfMxuz]{4.Clairière}</strong></p><p><strong>Ennemis :</strong> @UUID[Actor.gcluOVvBqZb4zH5u]{Mercenaire} - @UUID[Actor.BjT1qw9NPGAW43Nv]{Mercenaire Expérimenté}</p><p></p><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>L'un des mercenaire se comporte bizarrement, comme au ralenti.</em></span></p><ul><li><p><span class=\"jet\"><strong>SAG-PERCEPTION DD10 : </strong><span style=\"font-family:Bookinsanity\"><em>il est possédé par un nécromancien et ce que vous voyez n'est autre qu'un cadavre animé.</em></span></span></p></li><li><p><span class=\"jet\"><strong>INT-ARCANES DD10 :</strong> <span style=\"font-family:Bookinsanity\"><em>vous savez que dans ce cas là, le nécromancien peut voir au travers des yeux du possédé.</em></span></span></p></li></ul></td></tr></tbody></table><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Fin du Combat :</span></strong></span></p><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Quelque instants après la fin de cet affrontement, les lueurs vertes qui illuminaient les pierres et l'Arbre-Mère se remettent à pulser délicatement. Les racines sont denouveau fermées sur l'entrée du Temple et elle est maintenant totalement invisible.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Sur l'un des mercenaires, vous trouvez une note dans une enveloppe de cuir.</em></span></p></td></tr></tbody></table><p>C'est un ordre de mission pour l'élimination du groupe de PJs en échange d'une forte somme d'argent (1500pa). La lettre n'est pas signée.</p><p><strong>@UUID[JournalEntry.0ERKacAA01pKMsQs]{Lettre sur le Mercenaire}</strong></p></div><div class=\"arran-mod\"><p></p><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Sur le mercenaire qui agissait bizarrement et dont vous aviez pu voir qu'il était possédé par un nécromancien. La vue de sa dépouille vous confirme ce fait. Les chairs ont déjà commencé à se dégrader et il doit s'agir d'un corp mort depuis plusieurs jours ou plusieurs heures.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Sur son corps, porté en pendentif, vous trouvez une pierre gravée d'une série de runes. C'est sans aucun doute possible une rune de possession qui permet à un nécromancien de posséder un corps sur de grandes distances.</em></span></p><p><strong>@UUID[Item.ZzUHnw01Q9vyC6PX]{Rune de Possession}</strong></p></td></tr></tbody></table><p>\_</p><hr /></div><div class=\"arran-mod\"><h2>Et maintenant ?</h2><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Laissez les PJs élaborer un plan de ce qu'ils veulent faire.</span></strong></span></p><p>Le groupe a réuni beaucoup d'informations dans le Temple du Val Rouge. Ils sont peut-être blessés, ils doivent discuter de leur prochain objectif.</p><p>Ils devrait penser à utiliser la <strong>@UUID[Item.SWcqI6UUq1s34fwz]{Ceinture de Communication}</strong> pour envoyer un message à Lana'Sir et s'ils n'y pensent pas, Maana voudra envoyer un message pour informer Lana'Sir de la progression et de la réussite du groupe.</p><p></p><p>Quelles informations veulent-ils écrire sur le message ?</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S'ils écrivent un message contenant :</span></strong></span></p><ul><li><p>Découverte des Bracelets de l'Union</p></li><li><p>Informations sur Eskavia, les reliques</p></li><li><p>Les échanges avec Arkanov par la Gardienne</p></li><li><p>La rune de possession et/ou la lettre sur le mercenaire</p></li></ul><p>Dans ce cas-là suivez le prochain chapitre : Retour Victorieux à la Cité d'Ispier</p></div><div class=\"arran-mod\"><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S'ils écrivent un message qui ne mentionne pas</span></strong></span> (parce qu'ils veulent le cacher ou parce qu'ils ne l'ont pas découvert) :</p><ul><li><p>Informations sur Eskavia, les reliques</p></li><li><p>Les échanges avec Arkanov par la Gardienne</p></li><li><p>La rune de possession et/ou la lettre sur le mercenaire</p></li></ul><p>Dans ce cas-là allez au chapitre : <strong>@UUID[JournalEntry.J453aB89IcdZdngl]{Retour à la Cité d'Ispier}</strong></p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">S'ils n'écrivent aucun message à Lana'Sir.</span></strong></span> Dans ce cas-là allez au Chapitre : <strong>@UUID[JournalEntry.MMpIqvs5YANtptPd]{Retour Mouvementé à la Cité d'Ispier}</strong></p><p>\_</p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">PASSAGE DE NIVEAU</span></strong></span></p><p></p><h2>Retour Victorieux à la Cité d'Ispier</h2><div class=\"arran-mod\"><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Après avoir envoyé le message à Lana'Sir grâce à la Ceinture de Communication, il est temps de sortir de la foret du Val Rouge en direction de la Cité d'Ispier.</em></span> <span style=\"font-family:Bookinsanity\"><em>Le voyage de retour à la cité se passe sans problème à travers la forêt piétinée et ravagée par les troupes d'humains. Des chemins sont praticables et au bout de 10h de marche, vous atteignez l'orée de la Forêt du Val Rouge. Loin au nord, vous apercevez la fumée venant de la Cité d'Ispier. De nombreuses souches sont visibles autour de vous, là où les bucherons ont récolté les arbres de la forêt.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Au moment où vous arrivez dans le grandes plaines vers Ispier, la boite de la Ceinture de Communication vibre légèrement. Un message est arrivé : <strong>@UUID[JournalEntry.KYHkJNrSVg61YP6b]{Réponse de Lana'Sir après le Temple 01}</strong></em></span></p><p></p><p><span style=\"font-family:Bookinsanity\"><em>Il vous faut encore une journée de marche pour atteindre les murailles de la cité.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>A votre arrivée, vous êtes accueilli à la porte d'entrée par Jaspar Bonarion en personne entouré de 8 soldats aux couleurs de la cité.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Il vous salut en ouvrant les bras, un grand sourire aux lèvres.</em></span></p><p></p><div class=\"discussion\"><p><strong>JASPAR :</strong> <span style=\"font-family:Bookinsanity\">j'ai été prévenu de votre retour par ma fille saine et sauve et pour cela je vous suis profondément reconnaissant. Venez vous installer au château, vous reposer et manger un bout.</span></p><p><span style=\"font-family:Bookinsanity\"><em><strong>Il se tourne vers Manaa soudainement grave :</strong></em> Je tiens, au nom de tous les habitants de la cité, à vous offrir mon hospitalité et mes sincères regrets pour les horreurs qui ont secoués votre peuple par ma faute. Je connais le coupable mais que cela ne masque pas ma responsabilité dans cette affaire. J'espère pouvoir réparer un jour mes fautes. <em><strong>(Au moment de prononcer ces derniers mots, il hausse la voix pour que les badauds autour de vous puissent entendre)</strong></em></span></p></div></td></tr></tbody></table><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Il se dirige vers le château et les soldats se positionnent autour de lui et de vous pour écarter les habitants. A deux reprises, les soldats répriment des passants voulant se rapprocher des elfes sylvains en les insultant et en les menaçant. Vous arrivez devant un château à l'architecture purement humaine sans fioriture ni élégance. Fonctionnel et brut de décoration, les murs sont solides et bien équipés pour la défense. Passez les lourdes portes du château, dans une cour où vous voyez plusieurs bâtiments utilitaires (écuries, salle des soldats, forgeron…), Le soldat de tête ouvre l'une des porte du donjon et Jaspar vous invite à vous laver, vous changer et à le rejoindre dans le salon pour manger</em> <em>dès que vous serez prêts.</em></span></p></td></tr></tbody></table><p>Les PJs peuvent avoir accès à des soins, des bains, des artisans pour réparer leur équipements et la plupart des services qu'ils demandent. Malgré certains regards interrogatifs ou curieux, ils sont parfaitement en sécurité dans le donjon. On leur fournit des vêtements propres et élégants ou tout autre style en fonction des demandes. Un serviteur ou une servante est assigné à chaque PJs et à Manaa.</p><p>Après quelques heures (en fonction de leur demande), un jeune homme gracieux vient les prévenir que le repas sera servit dans peu de temps dans le grand salon.</p><p>\_</p><h3>Discussion avec Jaspar :</h3><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Après quelques banalités et paroles creuses, le seigneur Bonarion prend un air plus posé :</em></span></p><div class=\"discussion\"><p><strong>JASPAR : </strong><span style=\"font-family:Bookinsanity\">Maintenant que chacun à pu récupérer de son voyage, pourriez-vous m'éclairer sur ce qu'il se passe depuis le conflit avec le village des elfes sylvains. Je tiens à vous informer que mon conseiller Hisp GALIK est introuvable depuis hier. Il a prit quelques affaires et un garde de la portes nord l'a vu quitter la ville de façon précipitée sur un cheval et avec peu de bagages. Je ne m'inquiète pas des départs à l'improviste de mon ancien conseiller car ça peut lui arriver depuis qu'il s'est mit à mon service mais si j'avais su, il serait aux arrêts à l'heure qu'il est.</span></p><p><span style=\"font-family:Bookinsanity\">Expliquez moi ce qui a pousser ce traitre à déclencher une guerre avec nos voisins elfes sylvains ?</span></p></div></td></tr></tbody></table><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">En fonction des informations que les PJs dévoilent à Jaspar Bonarion il éclairciera les détails que les PJs ne connaissent pas. Le seigneur est de plus en plus énervé de sa propre faiblesse lorsqu'il comprend qu'il a été berné depuis le début.</span></strong></span></p><section class=\"apsj-block apsj-dialogue apsj-red\"><main><p><em><strong>Jaspar a été trahi par Hisp Galik son conseiller. Ce dernier a manipuler les évènements pour que la guerre éclate entre les elfes sylvains et les hommes de la Cité d'Ispier. Après quoi le nécromancien pourrait ouvrir le Temple du Val Rouge et récupérer la ou les reliques pour le compte du Clan de la Femme/Compagnie de la Justice. Si Jaspar Bonarion arrive a tirer des informations des PJs les bonnes conclusions, il sera tellement outré et abasourdi qu'il va placer l'entièreté de sa confiance dans le groupe et mettre toute son énergie à réparer son erreur face aux Elfes.</strong></em></p></main></section><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Informations détenues par Jaspar :</span></strong></span></p><ul><li><p>Hisp GALIK s'est mis à son service il y a presque 6 ans.</p></li><li><p>Hisp GALIK est responsable de la garde à l'extérieur de la cité et c'est lui qui lui faisait des rapports sur les attaques des sylvains sur les bucherons ou les caravanes de marchands</p></li><li><p>Hisp GALIK a des compétence en nécromancie et possède les bases de la magie élémentaire.</p></li><li><p>JASPAR est outré de sa faiblesse et de la manipulation qui l'a fait attaquer les village des Sylvains</p></li><li><p>JASPAR est prêt à beaucoup de sacrifices pour rembourser sa dette envers les elfes de la Forêt du Val Rouge.</p></li><li><p>JASPAR n'a jamais entendu parlé de l'ordre de l'Union , d'Esdavia, des reliques ou de tout autres sujets liés.</p></li><li><p>JASPAR autorise, sans aucune restriction, la fouille des appartements de Hisp Galik, de consulter la bibliothèque du château ou tout autres choses que les PJs lui demande pour enquêter.</p></li><li><p>JASPAR récompense le groupe avec un coffre rempli de 400 po (4000pa) et une jolie propriété pour chaque joueur dans la cité d'Ispier avec une famille de serviteur vivant sur place. Le complexe de plusieurs bâtiments mitoyens les uns des autres est situé au Nord Est de la cité d'Ispier (noté en violet sur le plan de la Ville)</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/VILLES-CARTES/CarteCiteIspier3.png\" height=\"200\" /></li><li><p>JASPAR fera une déclaration publique dans les prochains jours pour calmer la haine des habitants contre les elfes sylvains.</p></li><li><p>LANA'SIR rentre à la cité d'Ispier après avoir convaincu le seigneur de la Cité d'Orkadia d'enquêter sur les malversations de Hisp GALIK et comprendre pourquoi il voulait accéder au Temple du Val Rouge.</p></li><li><p>LANA'SIR devrait être de retour dans 2 semaines avec des érudits ainsi que les autres survivants.</p></li></ul><p></p><h2>Avant le retour de Lana'Sir :</h2></div><p>\_</p><p>Lana'Sir doit rentrer dans environ 15 jours à la Cité d'Ispier. Les PJs peuvent l'informer de leurs trouvailles au fur et à mesure s'ils le souhaitent.</p><p>Pendant ce temps ils peuvent faire plusieurs investigations ou profiter de la vie dans leur nouvelle demeure.</p><p></p><p>Dès le lendemain de leur discussion, Jaspar informe les PJs de son souhait de faire un grand discours sur la place publique pour calmer les tensions envers les elfes sylvains et qu'en attendant Maana ne pourra pas sortir du château. Le discours est prévu dans 2 jours.</p><p></p><h3><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Investigations des PJs :</span></span></h3><p>Le groupe peuvent faire des choses dans plusieurs endroits de la cité :</p><ul><li><p>Fouiller les appartements de Hisp Galik</p></li><li><p>Faire des recherches dans la bibliothèque du Château</p></li><li><p>Etudier les livres du Temple du Val Rouge</p></li><li><p>Activer les Bracelets de l'Union</p></li><li><p>Vendre des découvertes de leur début de mission et du Temple du Val Rouge</p></li><li><p>Autres activités</p></li></ul><p></p><h3>Fouiller les appartements de Hisp GALIK</h3><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Les appartements du conseiller du Seigneur Jaspar sont situés dans une assez grande bâtisse dans l'enceinte du Château. La porte n'est pas fermée à clef.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Lorsque vous entrez vous vous retrouvez dans un salon plutôt bien rangée avec de nombreux livres et des objets d'arts décorant des belles bibliothèques ornementées. Une table et deux chaises sont positionnées au centre d'un magnifique tapis et le long d'un mur vous distinguez un vaisselier contenant quelques belles pièces de vaisselles richement décorées. Une petite pièce sert de cuisine et de garde manger mais ne contient pas grand chose. Hisp devait se faire servir depuis les cuisine du château. Un porte donne sur une chambre jolie mais très peu aménagée. un lit, une table de nuit et un petit fauteuil de lecture, rien de plus.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>A l'étage, vous trouver deux grandes pièces remplies de multiples objets, chacune avec un long et large plan de travail totalement encombrés. Au vu de la poussière et du bazar, les serviteurs ne doivent pas avoir le droit de rentrer dans ces pièces. Après quelques secondes d'observation, la première pièce doit servir de laboratoire de magie élémentaire et la deuxième d''étude de la magie nécromantique. Livres empilés ou ouverts, babioles en tout genre, outils gros ou petits, matériaux et matériel… une mère n'y retrouverait pas ses petits.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Il va falloir plusieurs heures pour fouiller ces deux pièces.</em></span></p><ul><li><p><span class=\"jet\"><strong>SAG-PERCEPTION DD13 : </strong><span style=\"font-family:Bookinsanity\"><em>sous la pile de bois de chauffage, un petit coffre de métal referme des pièces et quelques objets de valeurs.</em></span> <strong>@UUID[JournalEntry.HB4cY0xuVGMumgmX]{Coffre de Hisp Galik}</strong></span></p></li><li><p><span class=\"jet\"><strong>SAG-PERCPETION DD18 : </strong><span style=\"font-family:Bookinsanity\"><em>une pierre en bas d'un mur cache un carnet de note relié de cuir et renforcé par des plaques métalliques <strong>@UUID[JournalEntry.V2VrU7n9kMrfdWgC]{Carnet de Hisp Galik}</strong></em></span></span></p></li></ul><p></p><p>Dans la bibliothèque du laboratoire de magie élémentaire :</p><ul><li><p><span class=\"jet\"><strong>INT-CULTURE GENERALE DD13 : </strong><span style=\"font-family:Bookinsanity\"><em>Dans un grimoire, vous trouvez une note grandement annotée parlant de l'activation du Plastron de la Séduction. <strong>@UUID[JournalEntry.jx87ZhtEZW8hNurw]{Note sur l'activation du Plastron de la Séduction}</strong></em></span></span></p></li></ul></td></tr></tbody></table><p>\_</p><p></p><p><strong>FIN DE LA SIXIEME SESSION</strong></p><p></p><p></p><h3>La bibliothèque du Château</h3><p>En fonction des informations que les PJs donne au seigneur, à l'archiviste Tartoun, ils ne trouveront pas forcément les mêmes textes.</p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Apprenti%20de%20l%27archiviste%20Taroun.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Archiviste%20Taroun.jpg\" height=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>On peut résumé la Bibliothèque de la Cité d'Ispier ainsi : un vieux archiviste dur des esgourdes, un apprenti au bord de la déprime et des milliers de livres !</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Lorsque l'on rentre, ça donne envie. De longs rayonnages remplis de livres, parchemins, grimoires et tablettes, des espaces sombres et poussiéreux, quelques bancs de lectures et tables d'études et c'est tout. Le confort y est rudimentaire et on comprend vite que l'entretien de la bibliothèque n'est pas la priorité du Seigneur Jaspar Bonarion.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Un jeune homme trainant des pieds et aux regard fuyant vous \"accueille\", façon de parler. Il parle bas avec un fort sentiment de lassitude.</em></span></p><p></p><div class=\"discussion\"><p><span style=\"font-family:Bookinsanity\"><em>En quoi je peux vous aider ? Si vous voulez voir <strong>l'archiviste</strong> <strong>Tartoun</strong> va falloir attendre, attendre et attendre encore un peu !</em></span></p></div><p></p><p><span style=\"font-family:Bookinsanity\"><em>Il semble en pleine dépression et avant même que vous n'ouvriez la bouche, il est déjà sur le point de se retourner et de partir en direction du fond de la Bibliothèque.</em></span></p><hr /><p><span style=\"font-family:Bookinsanity\"><em>Quelques instants plus tard, un vieux bonhomme frêle et pas plus épais d'une feuille de papier s'approche du groupe au ralenti, traversant le couloir bordé des longues bibliothèques en un temps infini.</em></span></p><div class=\"discussion\"><p><span style=\"font-family:Bookinsanity\"><em>Je suis le maître Archiviste Tartoun, en quoi puis-je vous aider ?</em></span></p></div></td></tr></tbody></table><p>Les recherches dans la bibliothèque sont extrêmement longues et fastidieuses. Ne sachant pas par où commencer et ne comprenant pas vraiment ce que vous voulez, l'archiviste Tartoun passe d'une étagère à une autre, vous propose des lectures assez peu pertinentes et des histoires ou des contes souvent sans queue ni tête.</p><p><strong>Pour chaque jour de recherche, chaque PJs qui aide aux recherches doit lancer 1d100.</strong></p><ul><li><p>Avec l'aide de l'archiviste Taroun et de son apprenti, <strong>le taux de chance de trouver est de 10% +2% par jour supplémentaire</strong> (10% le premier jour, puis 12% le second…)</p></li><li><p>Sans l'aide de l'archiviste et de son apprenti, <strong>le taux de chance de trouver est de 5% +1% par jour supplémentaire</strong> (5% le premier jour puis 6% le second, puis 7%…)</p></li></ul><p></p><p>Au final, il n'y a quelques informations qui peuvent intéresser les PJs dans cette bibliothèque :</p><ul><li><p>Une fiche sur le Ravin de Novrak, une des seules villes installées dans cette chaine de montagnes infranchissable =&gt; <strong>@UUID[JournalEntry.K0ZDUYdTYkV4FCB3]{02. le Ravin de Novrak}</strong></p></li><li><p>Un ouvrage trouvé écrit par Ramell en 8964 AGS =&gt; <strong>@UUID[JournalEntry.U8m9bkRsGckAYgrF]{05. Ramell}</strong></p></li></ul><div class=\"arran-mod\"><p></p><p>Ces deux références apporteront des informations pour les PJs qui ne sont pas cruciales pour trouver leur prochaine étape mais permettra de se préparer et d'obtenir de l'historique.</p><p></p><p></p><h3>Etudier les livres de la Bibliothèque du Val Rouge s'ils en ont récupéré.</h3></div><p>Dans les tomes récupérés dans le dortoir de la Gardienne et dans la bibliothèque du Temple du Val Rouge, les PJs peuvent trouver les informations qu'ils n'auraient pas trouvé pendant leur exploration.</p><p><strong>@UUID[JournalEntry.JN4ypCiw8OSM41xg]{Salle G : Dortoir de la suivante}</strong></p><p><strong>@UUID[JournalEntry.8LRqf1PDZei6ZnHk]{Salle D : Bibliothèque}</strong></p><p>\_</p><h3></h3><p></p><h3>Vente des découvertes du Temple de Val Rouge</h3><p>Cela énerve Maana mais en négociant bien auprès de quelques marchands ils peuvent se remplir les poches de pièces d'or ou d'argent. En fonction de ce qu'ils vendent ou de la quantité vendue (les lanternes par exemple) une rumeur commencera à courir dans la ville et une attaque peut-être porté contre eux dans la ville par des escrocs ou voleurs de bas étages (Combattants et aventuriers NC1/2).</p><p>\_</p><h3>Autres activités</h3><p>Dans une aussi grande ville que la Cité d'Ispier, il est possible de faire beaucoup de choses :</p><ul><li><p>Aider aux préparatifs des festivités après le discours du Seigneur</p></li><li><p>De l'artisanat</p></li><li><p>Des achats d'équipements</p></li><li><p>Aider les habitants pour différentes missions secondaires</p></li><li><p>des paris, jeux et activités diverses dans les auberges et tavernes</p></li><li><p>Rencontrer les nobles et les possédants pour se faire des relations.</p></li><li><p>…</p></li></ul><p></p><h2>Discours de Jaspar Bonarion et fête à Ispier</h2><table><tbody><tr><td><p><strong>@UUID[Scene.9Q18Gl9DX7aFji4k]{6.Place Ispier}</strong></p><p><span style=\"font-family:Bookinsanity\"><em>Trois jours après votre retour à la Cité d'Ispier, un grand discours est organisé par le seigneur Jaspar Bonarion sur la place de la Cité suivi par de nombreuses festivités.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>La ville est en effervescence autour de cet événement et beaucoup de marchands et troubadours ont fait la route depuis Blanche Paix pour s'installer sur la place principale. Des stands en tout genre ont été montés autour de la place et une estrade assez haute et décorée de bannières aux couleurs de la cité se dresse devant l'entrée de la cour du château. Vous sentez que l'organisation de cette fête est une bonne excuse pour la plupart des habitants pour mettre de côté leur tristesse et leur peine face à la perte d'un être cher.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>En milieu d'après-midi, alors que la foule s'est déjà amassée sur la place, le seigneur Bonarion avance avec droiture de l'estrade seulement escorté par 4 soldats fiers de leur position.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Il monte, s'installe au centre devant toute la foule devenu très silencieuse.</em></span></p><p></p><div class=\"discussion\"><p><span style=\"font-family:Bookinsanity\"><em>Isperois, Isperoise,</em></span></p><p></p><p><span style=\"font-family:Bookinsanity\"><em>C'est avec un immense plaisir que je me tiens devant vous et avec un sentiment de honte qui ne me quitte plus depuis plusieurs jours.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Nous avons été trahi ! … j'ai été trahi !</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Les paroles venimeuses et les manipulations honteuses de mon ancien conseiller Hisp Galik m'ont fait commettre l'irréparable pour vous, habitants de la Cité d'Ispier et pour nos voisins de toujours, les elfes sylvains de la forêt du Val Rouge. La Dame d'Honneur a bien essayé de me prévenir, de m'ouvrir les yeux. Ma propre fille voulait me faire sortir de la brume et apercevoir la vérité. Je ne l'ai pas entendu, je ne l'ai pas écouté. Mon coeur était remplit par la haine soufflée à mes oreilles par ce mage odieux.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Aucun Elfe Sylvain du Val Rouge, je dis bien AUCUN ELFE du Val Rouge n'a jamais souhaité s'en prendre à nous, s'en prendre à vos fils ou à vos maris. Nous avons … non J'AI été manipulé pour entrer en guerre contre eux pour les seules ambitions d'un vile personnage.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>La haine, légitime, que certains d'entre vous ressentent face aux Elfes doit maintenant être tournée vers le seul responsable de cette guerre : Hisp Galik.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Mes espions sont à sa recherche en ce moment et quand JE le trouverais, il devra subir tous les tourments que chaque famille de la Cité d'Ispier a connu par sa faute.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>La découverte de cette trahison n'aurait pu être possible sans l'aide précieuse d'un groupe de héros. Ils ont bravé tous les dangers pour retrouver votre Dame d'Honneur et lever le voile du mensonge pour révéler cette dure vérité.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Ils auront toujours leur place parmi nous dans notre belle cité et je suis sur que chacun de vous leur montrera l'hospitalité des Ispierois et Ispieroise comme il se doit !</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Malgré mes erreurs, je me tiens devant vous pour vous demander un immense service, à vous qui avez déjà tant donné dans cette histoire : AIDER le peuple des Elfes Sylvains a reconstruire leur village et apportons leur notre soutien ! Ils sont aussi les victimes de cette trahison et nous devons à présent rétablir les liens entre nos peuples. Nos efforts serviront à reconstruire leur village.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>J'ai discuté longuement avec ces aventuriers (il fait un geste pour vous inviter à monter sur l'estrade). Ce groupe et ces elfes sylvains droits et honnêtes ont permis le sauvetage de ma fille, Lana'Sir, notre bien aimée Dame d'Honneur. Sans eux, la vérité serait encore enfouie dans les profondeurs du mensonge. Accueillez-les avec joie et reconnaissance !</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>J'ai déjà trop parlé et vous avez envie de faire la fête, je le sais. Pour finir, j'ai le plaisir de vous annoncer que notre Dame d'Honneur revient à la Cité dans quelques jours et en cet honneur, elle souhaite, à son retour, que les portes du château soient ouvertes pour chacun de vous pendant trois jours et trois nuits pour venir discuter, parler de vos soucis et rire avec elle. Les bains publics seront gratuits et un repas copieux sera servit à chaque habitant qui le demande durant cette période.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Merci à toutes et tous et c'est avec plaisir que je déclare les festivités ouvertes !</em></span></p></div><p></p><div class=\"arran-mod\"><p><span style=\"font-family:Bookinsanity\"><em>Il ouvre ses bras en croix avec un très grand sourire et un groupe de musiciens monte sur l'estrade derrière lui commençant un morceau entrainant et joyeux. @UUID[Playlist.ieOeV7tfYwiLpnp1]{Fête ambiance}</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>La plupart des spectateurs se mettent à danser, boire et profiter de la fête. Vous distinguez à quelques endroits des habitants renfrognés qui semblent en colère ou d'autres couples ou familles qui pleurent dans un coin de la place. A plusieurs moment de la soirées, vous pouvez voir la garde qui s'épare des bagarres et vous entendez des phrases contre les elfes et contre certains d'entre vous <strong>\"ça ne fera pas revenir mon père, bâtard\" - \"ils ont tuer mon fils, un bucheron honorable et vous voulez qu'on les aide ! - \"j'ai combattu les elfes et maintenant on doit leur faire des câlins, plutôt sucer un cochon qu'aider les elfes !\"</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em>C'est paroles sont très minoritaires mais bien présentes. Jaspar en personne passe toute la soirée à essayer de plaider la cause des elfes sylvains auprès de ces habitants en colère ou il essaye de réconforter les familles endeuillées. Vous découvrez qu'il connait la plupart des nom et prénom des habitants et qu'il est très respecté auprès de la population.</em></span></p><p></p><p><strong>Laissez les joueurs profiter de la fête !!</strong></p></div></td></tr></tbody></table><p></p><h3>Les frères du Monastère du Désespoir :</h3><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Fr%C3%AAres%20du%20D%C3%A9sespoir/FrereDesespoir01.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Fr%C3%AAres%20du%20D%C3%A9sespoir/FrereDesespoir03.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Fr%C3%AAres%20du%20D%C3%A9sespoir/FrereDesespoir07.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Fr%C3%AAres%20du%20D%C3%A9sespoir/FrereDesespoir08.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Fr%C3%AAres%20du%20D%C3%A9sespoir/FrereDesespoir11.jpg\" height=\"150\" /><p>Choisir un PJ qui se balade sur la place de la Cité d'Ispier ou qui observe la fête :</p><table><tbody><tr><td><div class=\"arran-mod\"><p><span style=\"font-family:Bookinsanity\"><em>Tu vois, disposé le long d'un mur, à l'autre bout de la scène, un groupe d'hommes habillés à peu près de la même manière avec leur longues capes blanches élimées. Ils ont un physique impressionnant et lorsqu'ils se déplacent, tu remarques leur musculature et leur gestes ne laissant aucun doute sur leur entrainement martial. Leurs visages et leur attitude est assez neutre même si la plupart semblent sévères. Dans le groupe tu remarque un individu très jeune et à première vue il semble être un semi-elfe.</em></span></p><p></p></div></td></tr></tbody></table><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Fr%C3%AAres%20du%20D%C3%A9sespoir/FrereDesespoir09.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Fr%C3%AAres%20du%20D%C3%A9sespoir/FrereDesespoir04-1.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Fr%C3%AAres%20du%20D%C3%A9sespoir/FrereDesespoir06.jpg\" height=\"150\" /><table><tbody><tr><td><div class=\"arran-mod\"><p><span style=\"font-family:Bookinsanity\"><em>En tournant la tête, tu remarque qu'un deuxième groupe identique est en train de réconforter et soigner deux Ispéroises et un Ispérois au Nord de la place. A côté de toi, tu entends un homme avec des grosses mains d'artisan les appeler les Frères du Désespoir.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>D'après ce que tu vois, ils s'occupent des habitants dans le besoin, de ceux qui nécessite des soins ou des familles endeuillées.</em></span></p></div></td></tr></tbody></table><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Les frères du Désespoir pourront parler aux PJs :</span></strong></span></p><ul><li><p>S'ils veulent faire des recherches dans leur bibliothèque, il faut payer de fortes sommes (entre 150 et 1500pa en fonction de la demande et du délai). Cela prend du temps mais la bibliothèque du monastère est très bien fournie d'anciens textes, ouvrages et livres. Certains des Frères sont de très bons chercheurs et connaissent très bien la bibliothèque.</p></li><li><p>La vie et l'entrainement est dur dans le monastère mais la cause est juste et chaque Frère se sent impliqué dans son rôle. Ils sont un peu embrigadés mais ça semble leur convenir.</p></li><li><p>Ils s'occupent de toutes les injustices des Terres d'Arran lorsqu'ils le peuvent.</p></li><li><p>La plupart sont des hommes ou des semi-elfes discriminés</p></li><li><p>Ils \"règlent\" les problèmes lorsque les faibles sont soumis ou agressés</p></li><li><p>Ils voyagent un peu partout dans le nord de l'Ourann mais d'autres Frères sont dans d'autres endroits du monde.</p></li><li><p>Ils sont tous gentils et aimables mais attention, ce sont de terribles combattants qui pourront se défendre facilement face aux PJs</p></li></ul><p></p><p></p><p></p><h3>Activer les Bracelets de l'Union</h3><p>Lorsqu'un non-elfe équipe les Bracelets, le porteur peut déjà ressentir des effets magiques. Tout d'abord une grande facilité à comprendre les langues et expressions elfique, une masse de connaissance sur leur histoire et leurs comportements. De plus, le porteur obtient les bonus aux tests de Charisme donnés par les Bracelets. Grâce à cela, un des PJs devrait être incité à porter les Bracelets de l'Union en permanence.</p><div class=\"arran-mod\"><p><strong>@UUID[JournalEntry.ogXHqDhMk2Ei49jV]{Les Bracelets de l'Union} - @UUID[Item.jJOjvZolX6M30eZo]{Bracelets de L'Union VOIE}</strong></p></div><p>Si l'un des PJs souhaite étudier les bracelets de l'Union pour les activer, il lui faudra surement la note écrite par Hisp Galik se trouvant dans sa bibliothèque.</p><p>Avec la note, ils comprennent qu'en tuant un elfe en portant les bracelets cela devrait les activer.</p><p>C'est l'une des deux manières de les activer. La seconde est de venir en aide directement à un elfe sans ambition personnelle ou en \"charmant\" un elfe sans manipulation.</p><p>Le porteur ou les PJs peuvent faire toutes les expériences qu'ils souhaitent pour activer les Bracelets.</p><p>Si le personnage souhaite tuer un elfe pour activer les Bracelets de l'Union, il pourra les activer mais partira avec 10 points de FANATISME.</p><p></p><p>Si l'un des PJs porte les bracelets, profitez des festivités qui suivent le discours de Jaspar pour créer une situation de tension entre des habitants en colère et Maana. Le porteur des Bracelets pourra venir en aide à Maana et ainsi activer les Bracelets. Si le personnage aide Maana ou un autre elfe et active ainsi les Bracelets, il gagnera automatiquement 10 points de DÉVOTION.</p><p></p><p><strong>@UUID[Scene.9Q18Gl9DX7aFji4k]{6.Place Ispier}</strong></p><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Lorsque tu réussis à aider Maana face à ces habitants, tu sens que les bracelets se resserrent autour de tes poignets. Une décharge électrique vient paralyser tes mains et remonter le longs de tes bras progressivement. Tu sens qu'il va se passer quelques dans les secondes qui arrivent.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Que fais-tu ?</em></span> <strong>(le joueur a exactement une minute pour réagir avant que les Bracelets ne s'activent définitivement)</strong></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">PRENDRE LE JOUEUR A PART :</span></strong></span></p><p><span style=\"font-family:Bookinsanity\"><em>Tu ressens une large énergie qui rempli chaque cellule de ton corps. Tu sens comme-ci les bracelets se fondaient dans tes bras et monter vers tes épaules. Tu ne peux plus bouger et tu te crispes les poings serrés lorsque tu sens que les pulsations se divisent à l'intérieur de toi.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Une vague remonte vers ta tête et entoure ton cerveau et l'autre descend droit vers ton coeur s'infiltre dedans. La sensation ne fait pas mal du tout mais c'est très perturbant. Tu as l'impression de rester ainsi au moins une heure entre impuissance et sentiment d'unité. Des mots et des phrases elfiques te passent dans l'esprit et tu les comprend parfaitement sans pouvoir t'en souvenir. Tu ressens une vague de sentiments que ressentent les elfes et tu sens que tu comprends l'état d'esprit de tout un peuple.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Dans ton coeur, tu sens une nouvelle capacité pour parler avec des elfes par la pensée et dans ton esprit tu sais que tu es capable d'utiliser un pouvoir te permettant de lire les pensées des elfes.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Lorsque que le flot d'énergie commence à diminuer, tu reprends conscience de ton corps encore immobile et tu commences à pouvoir bouger et à voir ce qui t'entoure.</em></span></p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">PRENDRE LES AUTRES JOUEURS QUI VOIENT LA SCENE A PART :</span></strong></span></p><p><span style=\"font-family:Bookinsanity\"><em>Vous voyez votre compagnon qui serre les poings et les avant-bras. Il les tend vers le bas et se dresse entièrement droit, les yeux fermés comme une statue. Il est totalement immobile comme paralysé mais vous ressentez des vagues d'énergie qui le parcours. Vous voyez les vêtements autour des Bracelets de l'Union qui fondent tandis que les bracelets se resserrent autour de ses avant-bras. Ils se soudent à sa peau.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Il reste ainsi pendant environ deux minutes puis ses mains se décrispent, son corps se détend et ses yeux s'ouvrent. Une légère lueur verte passe sur le fond de ses pupilles avant de disparaitre. Seul un \"ha !\" de soulagement sort de sa bouche.</em></span></p></td></tr></tbody></table><p>Maintenant que les Bracelets de l'Union sont activés seule le décès du Porteur pourra les retirer. Il avait déjà accès au pouvoir passif des Bracelets et maintenant, le porteur comprend qu'un nouveau pouvoir s'offre à lui pour lire les pensées des Elfes ou user de télépathie avec les représentants de ce peuple. Le joueur pourra débloquer les différents pouvoir des Bracelets au fur et à mesure de son utilisation de cette relique de l'Union.</p><p></p><h3>Fin de la septième session</h3><p></p></div><div class=\"arran-mod\"><p></p><h2>Le retour de Lana'Sir</h2><table><tbody><tr><td data-colwidth=\"1052\"><p><span style=\"font-family:Bookinsanity\"><em>Une quinzaine de jours après le discours de Jaspar Bonarion à la population, la vie du château et de toute la cité d'Ispier est en effervescence. La Dame d'Honneur retourne à la maison et tout le monde veut la recevoir comme il se doit.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Vous pouvez voir les magasins et échoppes se faire récurer de fond en combles, les devantures des maisons sont arrangées, la plupart des habitants fortunés se retrouvent aux bains publics et les plus pauvres se font tous une belle toilettes de chat et préparent leur tenue pour ce retour. La population est joyeuse et tout le monde ne parle que de ce retour de Lana'Sir à la Cité d'Ispier.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Voulez-vous faire quelque chose avant le lendemain en milieu d'après-midi, le moment estimé pour le retour de Lana'Sir ?</em></span></p></td></tr></tbody></table><p></p><p>Les PJs peuvent faire certains préparatifs avant le retour. Encourager les joueurs à s'impliquer dans les préparatifs de la ville ou leur propre préparation.</p><p></p><table><tbody><tr><td><p>L'heure est venue. La Cité est entièrement calme à part les rires de quelques enfants qui jouent sur la place principale proche du château. Les portes de ce dernier sont fermées et beaucoup de gens sont à leur fenêtre et observent les rangées de gardes statiques dans les rues. Ils sont tous propres comme des Talions neufs.</p><p>Au moment où les cornes des portes principales sonnent, vous entendez des petits cris de joie des habitants qui attendaient cet instants depuis des jours.</p><p>Les portes s'ouvrent et les trompettes sonnent le retour de la Dame d'Honneur si aimée de la population. Les Ispériens et Ispériennes sortent de chez eux pour s'aligner le long des rues, certains avec leur enfants sur les épaules, d'autres avec des fleurs à jeter. Le sourire et le soulagement est sur tous les visages. Certains pleurent de joie lorsque le cheval de Lana'Sir, en tête d'une petite escorte de soldats arrive dans la ville. Vous remarquez la présence de Laotissa Graine Depeautre juste derrière la fille du seigneur. Aucun autre Elfe n'est présent dans le groupe.</p><p>Lana'Sir prend son temps, un immense sourire aux lèvres, et salut chaleureusement plusieurs personnes sur la route. Elle prend des bouquets et des cadeaux qu'elle confie à un des soldats qui s'est approché de son cheval. Quelques instants avant qu'elle n'atteigne la place du Château, Jaspar ouvre les portes et s'installe sur le perron encadré par 4 gardes de la cité.</p><p>Voulez-vous faire quelque chose avant qu'elle ne rencontres son père ?</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Lana%20sir%20guerri%C3%A8re.jpg\" height=\"300\" /><p></p><p>En arrivant sur la Place, Lana'Sir descend seule de son cheval et s'approche de son père pour l'enlacer tendrement. Le seigneur Jaspar s'apprête à prendre la parole devant la foule regroupée sur la place mais Lana'Sir en plaçant sa main sur son épaule lui fait comprendre qu'elle souhaite parler. Il s'écarte et lui laisse la place centrale alors que Laotissa se rapproche de la Dame d'Honneur.</p><div class=\"discussion\"><p><strong>Lana'Sir : </strong>Mes chers amis de la Cité d'Ispier. Je suis de retour à la maison pour mon plus grand bonheur. Je sais que vous avez été inquiets, que ma disparition a perturbé certains d'entre vous et que les conflits avec nos voisins et amis de la foret du Val Rouge ont été un traumatisme pour notre région.</p><p>Je suis là pour vous et je ne suis pas prête de repartir, vous pouvez compter sur moi. <strong>(Acclamations)</strong></p><p>Je ne vais pas y aller par quatre chemins mais Hisp Galik cet ignoble manipulateur a brouillé tous les esprits de cette ville dont celle de mon père ici présent. Je sais au fond de mon coeur que sa honte est immense mais c'est bien lui qui a engager le groupe d'aventuriers qui m'a retrouvé et sauver la vie. <strong>(La foule applaudit avec des hourras et des cris de joie)</strong>.</p><p>Je n'ai jamais cru aux mensonges de Hisp Galik et c'est de mon propre chef que j'ai suivi les survivants du village des Elfes Sylvains pour leur venir en aide et trouver la vérité autour de cette guerre. Les Elfes protecteurs d'une puissante relique oubliée sont les premières victimes de cette guerre. Nous avons empêché notre ennemi, Hisp Galik, de mettre la main sur l'une des reliques de l'union mais, à partir de maintenant, il faudra retrouver ce pleutre manipulateur. Laotissa Graine Dépeautre, à mes côtés, est comme une soeur pour moi et elle prend son rôle de Gardienne de l'Union très à coeur.</p><p>Va-t-on laisser une vieille histoire oubliée au fond d'un temple caché briser nos relations avec nos voisins les Elfes Sylvains de la Forêt du Val Rouge ? NON</p><p></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Laotissa%20Graine%20D%C3%A9pautre02.png\" height=\"150\" /><p>Demain à l'aube, et pour les trois prochains jours, toute ma vie ne sera que pour vous, habitants de la Cité d'Ispier mais je dois vous prévenir, ensuite mon attention et mes forces seront au service des Elfes pour les aider à reconstruire et à se réinstaller dans leur village détruit. J'espère sincèrement que toutes les personnes capables de se joindre à mon effort sera à mes côtés. Bâtisseurs, artisans, transporteurs, cuisiniers, herboristes… chacun de vous a un rôle à jouer pour racheter les erreurs de mon père et les malversations de son ancien conseiller.</p><p>Je tiens à vous informer et vous prévenir, avec force, qu'aucun survivant de ce village, malgré leurs peines, leurs souffrances et leurs colères légitimes ne souhaite de représailles judiciaires contre les hommes de notre Cité qui ont participé aux massacres.</p><p>Je finirais par vous dire que pendant les Trois Jours pour la Paix, chacun de vous pourra venir me rencontrer, discuter à mes côtés et maudire de tous les maux les Elfes Sylvains devant moi sans restriction. La colère et les pleurs seront autorisés lors de ces audiences avec moi. A la suite des Trois jours pour la Paix, toutes les attaques physiques ou morales, les insultes, les agressions ou les discussions de comptoirs enragées prenant pour cible nos voisins de la forêt du Val Rouge seront sévèrement punis ! Je peux vous aider à faire votre deuil mais ma tolérance aura des limites. <strong>(lorsqu'elle prononce ces mots le silence est TOTAL sur la place).</strong></p><p>A partir de demain, de l'aube à la mi nuit, je me tiens à votre disposition dans la salle d'audience du château. Les cuisines serviront à qui le demande un plat chaud et nourrissant et à partir de maintenant les bains publics sont accessibles à qui le souhaite. Les Trois Jours pour la Paix commencent ! <strong>(Cris de joie et applaudissements de la foule).</strong></p><p>Maintenant retournez auprès de votre famille, de vos voisins, de vos amis pendant que je retrouve mon père adoré et que je remercie comme il se doit les Sauveurs de la Dame d'Honneur. Merci à toutes et tous.</p></div><p><strong>Lana'Sir enlace son père sous les acclamation des habitants qui commencent à quitter la place principale. Des vendeurs a la sauvette pousse la voix pour attirer le public et un groupe de trois musiciens commencent à jouer des airs entrainants.</strong></p><p><strong>Elle vous fait signe de la rejoindre et Laotissa semble très heureuse de vous voir monter sur le perron du château.</strong></p><p></p><p><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><strong><span style=\"text-decoration:underline\">Si les Bracelets de l'Union ont été activés par un PJ : dire à ce PJ :</span></strong></span></span><span style=\"font-family:Bookinsanity\"> <em>Laotissa te regarde avec un sourire immense. Elle s'approche rapidement de toi et se colle à tes côtés en plaçant son bras sous le tien comme pourrait le faire une fille pour l'un de ces parents. Tout en suivant le groupe qui rentre dans le château en direction de la salle de banquet, elle n'arrête pas de lever les yeux vers toi avec un regard malicieux et complice et de temps en temps elle tapote ta main comme pour dire \"c'est bien, c'est bien\".</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Vous êtes amené dans la salle de banquet où une grande table est préparée. Lana'Sir se positionne debout derrière une chaise entouré de son père et de Laotissa. Les serviteurs vous montre vos places autour de la table. <strong>(le PJ porteur des Bracelets est positionné à côté de Laotissa et Maana juste à la suite). </strong></em></span><span style=\"text-decoration:underline\"><span style=\"font-family:Bookinsanity\"><em><strong><span style=\"text-decoration:underline\">En fonction de la relation des PJs avec Zagrenn, décider s'il participe au repas ou non.</span></strong></em></span></span></p><p><span style=\"font-family:Bookinsanity\"><em>Les gardes sortent et des plats sont apportés. Le repas peut commencer.</em></span></p></td></tr></tbody></table><p></p><h3>Repas et Discussion avec Lana'Sir et Laotissa :</h3><ul><li><p>Lana'Sir est <strong>fatiguée</strong> de son voyage</p></li><li><p>Laotissa est <strong>très heureuse</strong> et excité.</p></li><li><p><strong>Lana'Sir fera des piques à son père</strong> régulièrement et on peut se douter qu'elle lui en veut de sa faiblesse</p></li><li><p>Lana'Sir veut plus que tout que Hisp Galik soit retrouvé, condamné et mise à mort.</p></li><li><p><strong>Lana'Sir a hâte des Trois Jours pour la Paix</strong>. Elle adore ce genre d'exercice.</p></li><li><p><strong>Lana'Sir n'est pas avare de compliments pour les PJs</strong> mais n'aime pas trop l'irrespect ou le sarcasme encore plus quand elle est fatiguée.</p></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Lana'Sir informe les PJs que :</span></strong></span></p><ul><li><p>Falika Rosna a fait des recherches sur les Reliques de L'union (même infos que les PJs ont déjà mais elle peut synthétiser)</p></li><li><p>Les juristes de la Cité d'Orkadia ont envoyé des messages aux quatre coins des Terres d'Arran pour retrouver Hisp Galik</p></li><li><p>Les autres survivants de Village elfique sont déjà retourner dans leur village sur la route du retour.</p></li><li><p>Maana devrait rejoindre les survivants sauf si les PJs souhaitent qu'il les accompagne dans la suite de leur mission.</p></li></ul></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Laotissa parle aussi aux PJs</span></strong></span> avec joie et surtout en regardant le Porteur.</p><ul><li><p>Elle est contente qu'ils aient trouvé les Bracelets et découverts les secrets du Temple.</p></li><li><p>Maintenant que le secret derrière les Reliques sont éventés elle souhaite que le groupe les retrouve et les protège.</p></li><li><p>Elle a confiance en eux et elle sent qu'ils seront des héros bons et justes.</p></li><li><p>Elle leur fera comprendre que s'ils ne veulent pas trouver les autres Reliques, maintenant que leur secret est dévoilé, toutes les pires personnes et organisations seront sur leurs traces.</p></li><li><p>IL FAUT que les PJs partent pour les Montagnes d'Arkanov.</p></li><li><p>S'il le veulent Laotissa peut accompagner les PJs elle aussi.</p></li></ul></li><li><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Zagrenn prend part à la discussion pour valider les dires de Laotissa et de Lana'Sir</span></strong></span></p><ul><li><p><strong>Il ne peut pas suivre les PJs</strong> pour le moment car il préfère faire des recherches sur les Reliques sauf si les PJs sont très insistant.</p></li></ul></li></ul><p><span class=\"imp\">Le repas est agréable dans l'ensemble si les PJs se comportent bien. Jaspar ira se coucher rapidement et Lana'Sir sera un peu plus détendu et directe après son départ. Elle fait plus ample connaissance avec les PJs, découvre Zagrenn et si les PJs accepte de partir à la recherche des Reliques, elle sera d'autant plus détendu ensuite.</span></p><p></p><h1>Intermède</h1><p></p><p>Profitez de ce moment pour faire un intermède plus ou moins long pour les PJs en fonction de leurs envies. Ils peuvent :</p><ul><li><p>Profitez de leur nouvelle maison à la Cité d'Ispier,</p></li><li><p>Dépenser l'argent qu'ils ont gagnés,</p></li><li><p>Aider les elfes sylvains à la reconstruction de leur village</p></li><li><p>Réaliser leurs objectifs personnels,</p></li><li><p>Faire des recherches sur leur prochaine destination</p></li></ul><p></p><h2>Autres recherches / bibliothèques :</h2><p>Si les PJs envoie des demandes de recherche dans d'autres bibliothèques, ils recevront régulièrement pendant l'intermède des informations sur les noms et localités qu'ils ont demandés.</p><p></p><h3>Bibliothèque d'Orkadia :</h3><ul><li><p>Un témoignage sur la vision de Centaures dans les montagnes =&gt; <strong>@UUID[JournalEntry.sLy7dhSP6tcnz3Zm]{01. Recherche sur les Centaures}</strong></p></li><li><p>Un résumé léger sur le seigneur Gabrel =&gt; <strong>@UUID[JournalEntry.Jwc6XjQmiyRMMAmD]{06. l'humain Gabrel}</strong></p></li></ul><h3>Bibliothèque de Blanche Paix :</h3><ul><li><p>Un témoignage sur des attaques provenant des montagnes près du Ravin de Novrak (Ombres Blanches) =&gt; <strong>@UUID[JournalEntry.Tfg0i9iamu7aTNc9]{03. Attaques dans les Crocs d'Acier}</strong></p></li><li><p>Un ancien texte parlant d'une légende sur une ville nommée Kanasfi =&gt; <strong>@UUID[JournalEntry.Bgp4ZnTnuxhjhuBD]{04. Kanasfi}</strong></p></li></ul><h3>Bibliothèque d'Arkar'um :</h3><ul><li><p>Le rapport d'un capitaine du Bouclier sur Ongbirn'Arr =&gt; <strong>@UUID[JournalEntry.j1MmjDkmmriPXinW]{07. Ongbirn'Arr, la terre sacrée des Orcs}</strong></p></li><li><p>Un ouvrage relatant l'histoire de la Cité-Mine de Krüg-Zoram, la caverne des Nains Tordus =&gt; <strong>@UUID[JournalEntry.VdmsVKzXP9OxWnX1]{08. Caverne des Nains Tordus}</strong></p></li></ul><p></p><p></p><p></p><h2>Rencontre du Frère Zagrenn FREDFISK du Monastère du Désespoir</h2><p></p><p>Si les PJs veulent faire des recherches dans d'autres bibliothèque évoquez le monastère des frères du désespoir et ils pourront s'y rendre et rencontrer Zagrenn Fredfisk.</p><p>Sinon, l'événement survient pour le groupe de PJs plusieurs semaines après le retour de Lana'Sir..</p><p>Le PJs qui porte les bracelets (activés ou non) reçoit un message de la part de Jaspar Bonarion.</p><p></p><table><tbody><tr><td><p><span style=\"font-family:Bookinsanity\"><em>Peu après le lever du soleil, tu reçois la visite d'un coursier qui porte une écharpe au couleurs de la Cité d'Ispier. Il se penche légèrement en avant pour te saluer et sans un mot, te donne un pli cacheté du sceau de Jaspar Bonarion.</em></span></p><div class=\"parcho\"><p><strong>Cher Nom / prénom,</strong></p><p><strong>Ce matin, nous avons reçu au château la visite d'un individu souhaitant rencontrer le responsable du groupe de Héros Sauveur de la Dame d'honneur. D'après ses dires, il vient directement du Monastère des Frères du Désespoir et disposerait d'informations sur ce que vous avez trouvé récemment.</strong></p><p><strong>Dès qu'il vous sera possible, veuillez me rejoindre au château.</strong></p><p><strong>Cordialement, Jaspar Bonarion, seigneur de la Cité d'Ispier</strong></p></div><p></p><p><span style=\"font-family:Bookinsanity\"><em>Le coursier est resté planté devant la porte comme s'il attendait une réponse.</em></span></p></td></tr></tbody></table><p></p><p>Arrivé au château de très bonne heure, <strong>@UUID[JournalEntry.nMagpI6MXzMv2o8p]{Zagrenn Fredfisk}</strong> est un moine du <strong>@UUID[JournalEntry.rtsE1aCq5UkNBVhZ]{monastère des Frères du Désespoir}.</strong></p><table><tbody><tr><td><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Frere%20du%20D%C3%A9sespoir%20Zagrenn%20FREDFISK.jpg\" height=\"150\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Frere%20du%20D%C3%A9sespoir%20Zagrenn%20FREDFISK%20portrait.jpg\" height=\"150\" /><p><span style=\"font-family:Bookinsanity\"><em>En arrivant au château, tu/vous êtes amenez par un serviteur jusqu'à un salon de petite taille et aménagé pour les réunions privées. Debout devant une petite bibliothèque, les mains croisées dans le dos et dans une posture très droite, le moine se retourne vers toi/vous et tu/vous remarquez son visage totalement neutre avec une légère note de contrariété sur ses traits.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Dans un coin de la pièce, vous voyez deux gardes postés pour la surveillance de ce visiteur.</em></span></p><p><span style=\"font-family:Bookinsanity\"><em>Le moine te/vous observe rapidement et s'approche d'un pas décidé.</em></span></p><div class=\"discussion\"><p><span style=\"font-family:Bookinsanity\"><em><strong>Zagrenn Fredfisk :</strong> <strong>Veuillez excuser ma venue si matinale. Je me nomme Zagrenn Fredfisk et je viens directement du Monastère des Frères du Désespoir pour vous rencontrer.</strong></em></span></p><p><span style=\"font-family:Bookinsanity\"><em><strong>Auriez-vous l'amabilité de vous entretenir avec moi quelques instants ?</strong></em></span></p></div></td></tr></tbody></table><p></p><p>Le ou les PJs peuvent se présenter et s'ils acceptent de discuter avec Zagrenn, il a de nombreuses informations a leur transmettre.</p><p></p><h3>Discussion avec ZAGRENN :</h3><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Qui est-il ?</span></strong></span></p><ul><li><p>Il a entendu parler de vous grâce ou à cause du discours e Lana'Sir. La rumeur des Bracelets de l'Union a circulé très vite jusqu'à ses oreilles</p></li><li><p>Il s'intéresse à cette histoire tenant plus de la légende depuis plusieurs années. Il est fasciné par l'Ordre de l'Union.</p></li><li><p>Depuis 10 ans il essaye par tous les moyens de comprendre pourquoi les peuples ou les individus cherchent à se dominer ou a opprimer leur prochain. Il n'arrive pas à comprendre et ça l'énerve.</p></li><li><p>Il a demandé une autorisation à ses supérieurs pour venir aider les elfes sylvains de la forêt du Val Rouge mais il espérait plutôt voir le groupe de PJs.</p></li></ul><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Les informations qu'il a sur les reliques :</span></strong></span></p><ul><li><p>Les reliques sont très puissantes et c'est pourquoi elles ont été séparées et cachées depuis de si longues années</p></li><li><p>Les Faux dieux qui les ont utilisés à Esdavia ont soumis et opprimés de nombreuses personnes avant que l'Ordre du l'Union récupère les reliques</p></li><li><p>Les reliques ont deux voies différentes =&gt; l'une apportera domination/contrôle/possession et l'autre inspiration/aide/cohésion</p></li><li><p>Elles ne doivent pas tomber entre de mauvaises mains.</p></li><li><p>Heureusement une seule personne ne peut pas porter plusieurs reliques sinon elle devient folle voir elle meurt sur le champs.</p></li><li><p>Le seul moyen de détruire les reliques s'est que les 5 porteurs se tuent mutuellement en même temps.</p></li><li><p>Pour lui le but ultime des PJs devrait être de récupérer les 5 reliques et les détruire afin de devenir de vrais héros dont le nom sera connu de tous sur les Terres d'Arran.</p></li><li><p>Il connait l'existence de <strong>Arkanov</strong>, le village de Centaure isolé dans des montagnes mais ne sait pas où exactement.</p></li><li><p>Il connait l'existence d'une grande cité naine, <strong>les Mines de Hyrr'Tarënn</strong>. Il a étudier des documents décrivant les travaux réalisés dans une très grande cité naine juste après la création de l'Ordre de l'Union et dont le financement est assez obscur. Le seigneur nain de cette cité a, dans son discours, dit : \"<em><strong>Notre forteresse est assez puissante pour protéger le peuple nain contre toutes les attaques. Notre forteresse est un bastion face aux hordes de culs verts. Nous prospérons, nous forgeons, nous vivons fièrement. A partir de maintenant son rôle sera aussi de garder les peuples libres sur les Terres d'Arran !</strong></em>\". Cette cité a été abandonnée depuis longtemps. Désertée après de nombreux troubles, Zagrenn ne sait pas où elle est exactement ni comment y entrer <span style=\"text-decoration:underline\"><em><strong><span style=\"text-decoration:underline\">Si les PJs lui montre @UUID[JournalEntry.6rZrt5yTAcg5WYek]{La Carte de Maniash'Onira}</span></strong></em></span> Il va se renseigner sur l'existence d'une ancienne cité naine près de la marque inscrite sur la carte.</p></li></ul><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Si un des PJs a activé les Bracelets de l'Union :</span></strong></span></p><ul><li><p>Mise en garde stricte de Zagrenn. Si le PJ commence à profiter des pouvoirs des Bracelets pour opprimer ou dominer les Elfes, il ne pourra plus contrôler ses pulsions de domination au fur et à mesure.</p></li><li><p>Si il utilise les Bracelets pour de vils objectifs, Zagrenn saura s'occuper de lui pour éviter toute nouvelle menace de contrôle.</p></li></ul><p></p><p><span class=\"imp\"><strong>Dans tous les cas, après la discussion avec Zagrenn, les PJs devrait comprendre qu'ils doivent aller dans les montagnes d'Arkanov dans le village du Ravin de Novrak (anciennement nommé Xerbar'Anni) pour y trouver des informations sur le village des Centaures. Ensuite il faut s'y rendre et trouver la Ceinture de l'Union. Le seigneur Jaspar et Lana'Sir, s'ils communiquent avec elle, essayent de persuader les PJs d'attendre le retour de cette dernière avant de prendre la route.</strong></span></p></div><p></p><div class=\"arran-mod\"><blockquote><p style=\"text-align:center\"><strong>Prochain Acte = En Direction des Montagnes</strong></p></blockquote><p>\_</p></div>"
