      content: >-
        <h1>Dax’Ax’Revm</h1><p class="MsoNormal">24 maigeer 8369</p><p
        class="MsoNormal">Le mangeur des rêves est une forme démoniaque se
        nourrissant des pulsions et des désirs. Sa simple présence transforme le
        plus tendre poilu en un bouillon d’émotions incontrôlables. Malgré le
        combat qui entraina la destruction de Dax’Ax’Revm, son influence perdure
        et sa forme monstrueuse est réapparue quelques temps plus tard dans les
        mines.</p><p class="MsoNormal">Il semble se régaler des esprits les plus
        experts des Voies du Père. La totalité des exorcistes du Temple que l’on
        fit venir pour vaincre le démon ont été capturés par les sombres
        pulsions du Mangeur des Rêves.</p><p class="MsoNormal">Depuis la
        fermeture de la Cité-Forge, Dax’Ax’Revm semble s’affaiblir par manque de
        personne à torturer mentalement. Il est simple de le débusquer et d’en
        venir à bout avec seulement quelques coups de hache.</p><p
        class="MsoNormal">Il revient continuellement pour nous apporter
        cauchemars, tentation et ambition malsaine. Malgré les mois d’étude dans
        les ouvrages de la Cité-Forge et de nombreuses consultations faites
        avant la fermeture de la cité, personne n’a trouvé le moyen de vaincre
        une bonne fois pour toute le démon Dax’Ax’Revm.</p><p
        class="MsoNormal">Je prie le Père pour qu’il meure de faim quand la
        Cité-Forge sera enfin débarrassée du dernier nain vivant.</p><p
        class="MsoNormal">Okdar Ferlame, dernier roi d’Hyrr’Tarënn.</p>
