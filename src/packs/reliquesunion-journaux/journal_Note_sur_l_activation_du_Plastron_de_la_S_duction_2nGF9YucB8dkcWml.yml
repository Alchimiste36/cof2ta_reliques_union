    text:
      format: 1
      content: >-
        <div class="arran-mod"><p><span
        style="font-family:Bookinsanity"><em>Lorsque nous avons découvert le
        Plastron de la Séduction, avec ma chère Amanori BELLARA, il me fallut
        plusieurs semaines pour comprendre comment il
        fonctionnait.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Elle avait beau le porter, toucher
        chaque zone du plastron, tester plusieurs incantations, rituels ou
        formules, rien ne semblait réveiller ce Plastron de la Séduction. Malgré
        la réticence de ma maîtresse, je l'ai équipé sans le moindre succès non
        plus malgré tous mes efforts.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Chose curieuse, lorsque nous
        l'avons équipé sur un esclave Peaux Verte soit il lui grillait le
        cerveau soit il le plongeait dans une espèce de coma fatal si ne
        retirions pas le plastron rapidement.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Lié aux Peaux Verte par nature, le
        plastron ne pouvait pas être équipé par un orc, un gobelin ou un ogre ni
        même une de ces abominations, mélange d'une race pure et d'un Peau
        Verte.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>C'est par pur hasard qu'Amaroni a
        réussi à activer le Plastron. Un jour où elle portait cette relique,
        elle s'énerva sur un gobelin abject qui venait de renverser un broc
        d'eau sur le sol. Elle le gifla si fort que son coup se brisa
        !</em></span></p><p><span style="font-family:Bookinsanity"><em>Foudroyée
        par une intense énergie, ma Maîtresse resta de nombreuses minutes
        paralysée sujette à des électrochocs intenses, un large sourires aux
        lèvres.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Lorsqu'elle sorti de cette "transe"
        elle sentait un pouvoir nouveau couler dans ses veines et du jour au
        lendemain, les Peaux Vertes qui la voyaient ou l'entendaient semblait
        "attirés" ou fascinés" par sa simple présence.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Elle apprit à libérer tout le
        pouvoir du Plastron au fur et à mesure de son utilisation, la rendant
        quasi divine aux yeux des Peaux Vertes.</em></span></p></div>
