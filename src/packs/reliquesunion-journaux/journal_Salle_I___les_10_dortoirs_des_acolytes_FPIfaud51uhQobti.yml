    text:
      format: 1
      content: "<div class=\"arran-mod\">\n<div class=\"salledescr\">\n<p><strong>Description :</strong></p>\n<p>Vous rentrez dans une chambre rustique et sommaire composée d’un lit simple, d’un coffre en bois et d’une armoire fermée. Le lit est fait au carré d’un linge propre et frais.</p>\n<ul>\n<li>\n<p><strong>L’armoire :</strong>\_4 tenues identiques, des robes élégantes et confortables de couleur rouge sombre. Des sous-vêtements confortables. un jeu de deux serviettes et une pierre ponce. Un pendentif de la même forme que le médaillon de Laotissa mais sans aucune gravure dessus.</p>\n</li>\n<li>\n<p><strong>Coffre :</strong>\_quelques bijoux simples, un bloc de savon, un carnet vierge et un bâtonnet de charbon pour écrire.</p>\n</li>\n</ul>\n</div>\n<div class=\"sallemj\">\n<p><strong>Notes pour le MJs :</strong></p>\n<p>Toutes les chambres sont totalement identiques.</p>\n</div>\n</div>"
