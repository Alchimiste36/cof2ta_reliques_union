    text:
      format: 1
      content: >-
        <div class="arran-mod"><p><strong>Récit trouvé dans la Bibliothèque du
        Château de la Cité d'Ispier, datant de 681
        Athée.</strong></p><p></p><div class="parcho"><p><span
        style="font-family:DungeonDropCase"><em>Entre folie et mensonge, un
        marchand raconte à qui veut l'entendre.</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Il voyageait dans les montagnes
        hostiles des Crocs d'Acier</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Faisant halte dans un village
        reculé dans des montagnes reculées</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Il racontait a qui veut
        l'entendre</em></span></p><p></p><p><span
        style="font-family:DungeonDropCase"><em>Les hommes y sont rudes, les
        femmes y sont froides.</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Les maisons rustiques et les
        bêtes résistantes,</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Son nom est aussi brute que la
        vie sur les flancs de montagnes</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Xerbar'Anni, le ravin de
        Novrak</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Il continuait à le raconter à
        qui veut l'entendre</em></span></p><p></p><p><span
        style="font-family:DungeonDropCase"><em>le marchand circule dans les
        alentours</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>parcours les falaises du nord au
        sud</em></span></p><p><span style="font-family:DungeonDropCase"><em>mais
        bien sûr !</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Le marchand rencontre un peuple
        de Centaures</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Isolé, solitaires et
        méfiants</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Mais pourquoi pas
        !</em></span></p><p><span style="font-family:DungeonDropCase"><em>Le
        marchand passe cinq lunes avec eux</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>apprenant leur langage et leurs
        coutumes</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Mais puis quoi encore
        !</em></span></p><p><span style="font-family:DungeonDropCase"><em>Il
        nous montre les merveilles que ces chevaux
        fabriquent</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Il en veut un prix digne d'un
        prince d'Elsémur</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Mais oui encore plus
        !</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Contrefaçon, arnaque ou
        manipulation</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>il s'énerve pour nous faire
        ouvrir les yeux</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>Mais ça va être de notre faute
        !</em></span></p><p><span style="font-family:DungeonDropCase"><em>Il
        répétait et racontait encore à qui veut
        l'entendre.</em></span></p><p></p><p><span
        style="font-family:DungeonDropCase"><em>Raillé, hué, et rejeté, le
        marchand ne sortit jamais de ses mensonges</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>le marchand finit sans le sous,
        saoûle dans les tavernes</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>à raconté à qui veut l'entendre
        sa découverte des Centaures.</em></span></p><p></p><p><span
        style="font-family:DungeonDropCase"><em>Quelque soit l'histoire que l'on
        raconte à qui veut l'entendre,</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>le sage saura émerger du
        brouillard des mensonges pour retrouver la
        vérité</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>sinon leurs poids le fera
        sombrer.</em></span></p><p><span
        style="font-family:DungeonDropCase"><em>C'est cette morale qu'il faut
        raconter à qui veut l'entendre.</em></span></p></div></div>
