      content: "<h2><span style=\"font-family:Signika\">Population :</span></h2><p><span style=\"font-family:Signika\">55% humains / 34% de nains / 5% d'Elfes / 2% de Sang-Mêlées / 4% de peaux vertes</span></p><h2>Description :\_</h2><p>Grande cité à majorité humaine située au Nord du Pays des Vents.</p><p>Positionné sur la route entre les forteresses Etats Naines, la ville a prospéré depuis des dizaines d'années autour du commerce de marchandises venant des quatre coins des Terres d'Arran. Son large port accepte tous les navires et surtout toutes les marchandises.</p><p>La ville est très cosmopolite et nous pouvons y croiser des hommes, des elfes, des nains mais aussi des mercenaires ou des serviteurs Peaux Vertes, surtout au niveau des docks.</p><p>Protégée par de hautes montagnes au nord-ouest et située sur un point haut, les gardes peuvent voir très loin autour de la ville les éventuelles attaques venant des montagnes ou des plaines.</p><p>Le Seigneur de la Ville se nomme Alvon Godfires. Il est assez respecté de la population mais beaucoup moins des seigneurs nains alentours à cause des clauses commerciales que la ville applique sur les achats et ventes de marchandises.</p><p>La cité prospère essentiellement ces dernières années grâce à ses industries de brasseurs.</p><p>De grandes familles nobles se partagent le pouvoir dans les coulisses avec son lot de conflits ouverts ou secrets pour augmenter son influence, son pouvoir et imposer ses lois. Ce nid de vipères politiques crée de nombreuses injustices dans une ville qui a été construite rapidement et sans une structure claire et réfléchie.</p>"
