    text:
      format: 1
      content: "<p style=\"margin:6.0pt 0cm 6.0pt 0cm\"><span style=\"font-family:'Arial','sans-serif'\"><em><strong>Situé bien au sud de Blanche Paix, la cité d'Ispier bord la forêt du Val Rouge au sud et une chaine de montagnes escarpées dans toutes les autres directions.</strong></em></span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:'Arial','sans-serif'\"><strong style=\"box-sizing:border-box;user-select:text\">Ville d'environ 800 habitants,</strong>\_elle est bien gardée par une compagnie de nains du Bouclier et une milice humaine peu formée. Son épaisse muraille à plus de cent ans et on y voit des traces de batailles et de vétusté.</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:'Arial','sans-serif'\"><strong style=\"box-sizing:border-box;user-select:text\">La principale source de richesse de la ville est son exploitation intensive de la forêt du Val Rouge</strong>\_pour les constructions locales et pour l'exportation à Blanche Paix et au delà grâce à la marine marchande.</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:'Arial','sans-serif'\">La cité d'Ispier est menacée mais tient bon depuis une 30è d'années malgré les raids de Peaux Vertes réguliers sur les caravanes et les bucherons et aussi, à cause des tensions géopolitique avec les Elfes Sylvains qui vivent encore dans la partie sud de la forêt.<br style=\"box-sizing:border-box;user-select:text\" />Le projet de\_<strong style=\"box-sizing:border-box;user-select:text\">la Route Naine traversant l'Orann du nord au Sud</strong>\_devrait passer à côté de la Cité d'Ispier d'où l'importance de se développer en prévision de cet atout commerciale incroyable.</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:'Arial','sans-serif'\">La cité a beau être florissante, elle est vu de haut par les grandes forteresses naine de l'Ourann et méprisée par Blanche Paix. Le seigneur @UUID[JournalEntry.YZBFIHMD2pPy6DVS]{Jaspar Bonarion} </span><span style=\"box-sizing:border-box;user-select:text;font-size:var(--font-size-14)\"><span style=\"font-family:'var(--font-primary)','serif'\">tient la ville d'une main de maitre à l'aide de son conseiller </span>mage a son service,\_<span style=\"font-family:'var(--font-primary)','serif'\"><strong style=\"box-sizing:border-box;user-select:text;font-size:var(--font-size-14)\">Hisp Galik</strong></span>, un humain originaire de Dumn.</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:'Arial','sans-serif'\">La fille du seigneur se nomme<strong style=\"box-sizing:border-box;user-select:text\"> @UUID[JournalEntry.HoNs0YQCQeWlUAKr]{Lana'sir Bonarion}</strong>. Elle participe activement à la vie de la cité.</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:'Arial','sans-serif'\"><strong style=\"box-sizing:border-box;user-select:text\">Le climat d'Ispier est rude mais les terres sont fertiles et la rivière poissonneuse !\_</strong>Quand les vents n'arrachent pas les toitures, les fortes pluies inondent les rues ou les vagues de chaleurs ne grillent pas les cultures, la vie est parfaite protégée par les murailles de la cité d'Ispier.</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:'Arial','sans-serif'\">Population : 60% humains / 30% de nains / 4% d'Elfes / 1% de Sang-Mêlées / 5% de Gobelins</span></p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Cited%27Ispier02.jpg\" alt=\"\" width=\"250\" height=\"250\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/VILLES-CARTES/CarteCiteIspier2.png\" height=\"300\" /><p class=\"MsoNormal\">\_</p>"
