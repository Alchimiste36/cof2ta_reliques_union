    text:
      format: 1
      content: >-
        <p>C'est une très grande ville commposée majoritairement d'humain. Bati
        à la place d'une ville naine, les hums qui se sont installés à Orkadia
        deviennent de plus en plus nombreux et le commerce y est abondant et
        chaotique.</p>

        <p>Il y a une trentaine d'année, le seigneur Goranu, un noble nain plus
        intéressé par l'épaisseur de sa bourse que par les invective de son
        ordre, a proposé la constitution d'un conseil pour gérer la ville
        composé à moitié de courte guibolles et d'hums.</p>

        <p>Grâce à son influence à tous les niveau de la ville, chaque décision
        passe par lui et son cercle de conseillers proche et le conseil est plus
        là pour parader et valider les décisions. Même si certains habitants
        grognent à cause de cette manipulation tant que l'argent, les
        marchandises et la protection sont là tout le monde laisse faire.</p>

        <p>Les quelques fois où un membre du conseil ou une organisation a voulu
        se dresser contre le seigneur Goranu, un terrible accident a conclu
        l'affaire ou un voyage forcé vers une région inhospitalière ou un
        village isolé a permis de règler la colère ou les envies de
        rébellion.</p>

        <p>Grâce à sa position centrale entre les royaumes humains à l'ouest, le
        port de Tureyn au nord et l'immensité du Pays des Vents à l'est, Orkadia
        ne cesse de grandir et de gagner en influence et en pouvoir.</p>

        <p>Lieu intéressant de cette cité, une bâtisse rénovée depuis peu sert
        d'école pour les mages des Terres d'Arran. Venant de tout le continent
        (et même des quatres coins du monde) les enfants ou les adultes se
        découvrant des pouvoirs magiques peuvent payer une petite fortune pour
        accéder à cette école. Tous les 5 ans un concours ouvert à toutes et
        tous permet de sélectionner une demi douzaine de mages méritants et
        doués qui seront incorporés à l'école gratuitement. D'après certaine
        rumeur, cette école fait beaucoup de prosélitisme pour le pouvoir
        d'Orkadia et manipulerait les jeunes esprits avec des valeurs
        d'intolérance, de mérite poussé à l'extrême et d'une compétition sans
        limite. Le nombre de suicides et d'accidents tendrait à valider ces
        rumeurs.</p>

        <p>Récemment une loi à été promulguée permettant l'enrolement d'Orcs, de
        Gobelins et de semi-elfes dans l'armée et la garde d'Orkadia. Les
        conditions de vie n'y sont pas extraordinaire pour ces peuples mais le
        coût pour protéger la ville à fortement diminué pour une force de frappe
        et d'intimidation plus grande que jamais.</p>

        <p>Ne demandez pas au Seigneur Goranu de prendre parti entre les
        Humains, les elfes, les nains ou toutes les autres peuples des Terres
        d'Arran. Faisant des affaires avec tout le monde et n'importe qui, il
        n'est pas prêt à prendre des clients ou des partenaires de business pour
        une quelconque morale ou un positionnement éthique.</p>

        <p>Si vous êtes ambitieux, que vous souhaitez monter une affaire, vous
        mettre au service d'un riche noble ou marchand, arnaquer des badaux...
        la cité d'Orkadia est pour vous. Si vous aspirez à une vie paisible sur
        une petite propriété rustique, passez votre chemin.</p>
