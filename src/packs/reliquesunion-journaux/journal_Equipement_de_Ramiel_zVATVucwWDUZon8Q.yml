            name: Bague à Oiseau d'Ifra'Eth
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/BagueAOiseauEnchant%C3%A9e.jpg
            _id: SWgjBM3HBNfGVc5m
            system:
              key: bague-a-oiseau-difraeth
              description: >-
                <p>Ces bagues tr&egrave;s petites et cisel&eacute;es
                magnifiquement de motifs organiques sont tr&egrave;s
                l&eacute;g&egrave;res, faites de bois r&eacute;sistant. Les
                runes sur les bagues sont assez complexes.</p>

                <p>Lorsque l'on positionne l'une des bagues &agrave; la patte
                d'un oiseau, ce dernier partira directement en direction du
                runiste qui a enchant&eacute; les bagues, en l'occurence
                Ifra'Eth.</p>

                <p>Un papier de petite taille comportant un message peut
                &ecirc;tre gliss&eacute; entre la bague et la patte sans risque
                su'il tombe.</p>
              source: Lana'Sir
