          XBkXhEXmdyO8qjis:
            name: Ceinture de Communication
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/CeintureDeCommunication01.jpg
            system:
              key: ceinture-de-communication
              description: >-
                <p>Cette ceinture fine en cuir se ferme avec une boucle de
                m&eacute;tal.</p>

                <p>Sur la ceinture se trouve trois pochettes en cuir
                ferm&eacute;es par une boucle simple en m&eacute;tal.</p>

                <p>Chaque pochettes permet d'y glisser une boite en bois
                grav&eacute;e de runes. Les boites peuvent contenir des messages
                ou de petits objets.</p>

                <p><strong>L'int&eacute;rieur de la boite fait 9 cm x 7 cm x 4
                cm.</strong></p>

                <p>Pour chaque paire de ceinture, il n'existe que trois boites
                associ&eacute;es.</p>

                <p><em>Une ceinture de communication seule ne vaut rien &agrave;
                part le prix du cuir et du travail. Une paire de ceinture avec
                les trois boites peut valoir plusieurs centaines de
                Pi&egrave;ces d'Or.</em></p>

                <p>&nbsp;</p>

                <h2>Effet :</h2>

                <p>Lorsque l'on place une des boites <strong>au soleil pendant
                2d8 minutes</strong>, elle disparait enti&egrave;rement avec
                tout son contenu. <strong>Elle r&eacute;apparaitra 6d6 heures
                plus tard</strong> dans la pochette de la deuxi&egrave;me
                ceinture de communication. <strong>Tout le contenu de la boite
                sera intact sauf pour les &ecirc;tres vivants</strong>. Un
                &ecirc;tre vivant voyageant gr&acirc;ce &agrave; la ceinture de
                communication arrivera mort mais totalement intact &agrave;
                l'arriv&eacute; (l'essence vitale de l'&ecirc;tre vivant
                &eacute;tant rest&eacute; au point de d&eacute;part).</p>

                <p><img
                src="worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/CeintureDeCommunication03.jpg"
                alt="" width="238" height="200"></p>

                <p><img
                src="worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/CeintureDeCommunication01.jpg"
                alt="" width="200" height="200"><img
                src="worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/CeintureDeCommunication02.jpg"
                alt="" width="200" height="200"></p>
              source: CAMPAGNE Lana'Sir
