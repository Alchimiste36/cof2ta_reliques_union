          lq1EkCHkDoNIa7Qf:
            folder: uNMhpjZshO2kkr1S
            name: Crocs de Serpent Constricteur
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Crocs%20de%20serpent%20constricteur.jpg
            system:
              key: crocs-de-serpent-constricteur
              description: >-
                <p>Moins recherch&eacute; qu'une peau de Jargal, les crocs de
                serpent constricteur ne sont pas sans valeur si on trouve un
                marchand ou un artisan qui veut les acheter.</p>

                <p>Tr&egrave;s r&eacute;sistants et particuli&egrave;rement
                ac&eacute;r&eacute;s, les crocs peuvent servir pour certains
                artisans ou pour de la d&eacute;coration.</p>

                <p>Tr&egrave;s pris&eacute; chez les Peaux Vertes, certains
                guerriers, chef de clan ou shaman utilisent des dents de serpent
                constricteur comme symbole de puissance.</p>

                <p>Les dents de serpent constricteurs peuvent servir d'armes de
                fortune &agrave; la mani&egrave;re d'une dague.</p>

                <p>&nbsp;</p>

                <p>La valeur est pour chaque dent. Valeur doubl&eacute;e en cas
                de n&eacute;gociation avec des Peaux Vertes.</p>
