    text:
      format: 1
      content: >-
        <p style="text-align:center"><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">La Main des
        Cinq</span></strong></span></p><p style="text-align:center">Sertir à
        tout à rien</p><p style="text-align:center">Saluer, agir, saisir,
        dresser, caresser, frapper, tuer, attirer, basculer</p><p
        style="text-align:center"></p><p style="text-align:center">Cinq doigts
        regroupés unifiés - cinq doigts égarés symbole attraction
        tentation</p><p
        style="text-align:center">Puissance-contrôle-corruption-idéal-union</p><p
        style="text-align:center">: 1 ou 5 :</p><p
        style="text-align:center">lumière sombre - ténèbres éclairés</p><p
        style="text-align:center">Le but est incertain, les tentations
        innées</p><p></p><p style="text-align:center">La main des cinq nettoyant
        les chairs papillon ailes magnifiques</p><p
        style="text-align:center">une main, vitrail volant désirable vers
        l'esprit libre des êtres</p><p style="text-align:center">une main,
        ocelle vibrante hypnotique vers le brouillard dense de la
        soumission</p><p style="text-align:center"></p><p
        style="text-align:center">Tel une armée de phalanges, regrouper
        détruire</p><p style="text-align:center">Tel des pétales éclosion,
        réunir épanouir</p><p style="text-align:center"></p><p
        style="text-align:center">Ancestrales Implantés - Racine sacrée d'un
        doigt protégé</p><p style="text-align:center">Argiles Façonnées - Statue
        armurée d'un doigt immergé</p><p style="text-align:center">Faunes
        Variées - Montagne isolée d'un doigt entouré</p><p
        style="text-align:center">Adaptables Implantés - Coffre Immortel d'un
        doigt momifié</p><p style="text-align:center">Nomades Éparpillés- Dieux
        Embrassés d'un doigt enlacé</p><p style="text-align:center"></p><p
        style="text-align:center">La main à jamais séparée, le poing danger la
        main élevée</p><p style="text-align:center">la main le poing unir
        anéantir</p><p style="text-align:center">Tous Peuples oublier
        décider</p><p style="text-align:center"></p><p></p>
