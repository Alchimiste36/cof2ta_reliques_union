        <div class="journal-cof2ta-ru">
          <h1>V. Salle Secrète de l'Union</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Cachée derrière le mur de la grande fresque de la salle de cérémonie, le moyen d'ouvrir la salle secrète et la description de son contenue seront détaillés dans le chapitre
              ??? section ??? page ???.
            </p>
            <p class="paragraphe">
              Aucun centaure ne se rappelle de la présence de cette salle ni du moyen de l'ouvrir. Ainsi, il est impossible pour les PJs de trouver la salle pendant cette phase
              d'Intermède. Il faudra attendra l'attaque des Atarangi Kino sur le village et l'expédition du groupe de Héros de la Dame d'Honneur sur la cité des Ombres Blanches pour
              inciter définitivement Kiliko et les centaures de mettre toute leur énergie à aider les aventuriers pour trouver la Ceinture de l'Union. C'est Te'Whakama qui trouvera la
              cérémonie a exécuter dans la grotte pour ouvrir la porte de la salle secrète.
            </p>
          </div>
        </div>
