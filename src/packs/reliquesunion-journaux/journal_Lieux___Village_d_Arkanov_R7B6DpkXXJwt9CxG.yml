    name: 'I : Atelier de Bougies - Poterie'
    type: text
    _id: 3AL5tLVP6FLVPXw2
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>I. Fabrication de Bougies et Poterie</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Lorsque l'on passe à proximité de ce bâtiment, il est impossible de ne pas sentir les odeurs qui s'échappent par la porte. Lorsque l'on ouvre cette dernière, on arrive
              directement dans l'atelier de fabrication de bougies avec ces dizaines de récipients, de marmites, de colorants et d'ustensiles de préparation. des tâches de cires recouvrent
              une grande partie du sol et de tous les objets présents.
            </p>
            <p class="paragraphe">
              Des tubes calibrés sont empilés sur les plans de travail, certains remplis en train de sécher, d'autres vides et nettoyés. Des rouleaux de cordelettes pour faire des mèches
              sont disposées à droite et à gauche et au centre de la pièce on trouve un grand étendoir souvent remplis de dizaines de bougies à façonner. A côté de lui, une grande vasque
              remplie de cire maintenue liquide grâce à des braises chaudes en dessous. Au fond de la pièce, une cuisinière permet de faire fondre la cire ou les arômes à rajouter aux
              bougies. La plupart des outils et produits sont assez fragiles ainsi il faut être délicat quand on travail dans cet atelier.
            </p>
            <p class="paragraphe">
              Au rez-de-chaussée, presque tous les jours, on peut tomber sur Kite'Tihe qui grogne et s'énerve. Elle a un caractère particulièrement mauvais et aigri. Quand elle trouvera un
              des étrangers dans l'atelier de bougie, il faudra rester calme et diplomate pour ne pas réveiller sa colère et sa méchanceté. S'occuper de l'atelier de fabrication de bougie
              n'est pas très compliqué à part la délicatesse qu'il faut pour ne rien casser. Par contre la présence de Kite'Tihe compliquera la vie. Diplomatie et calme seront les
              meilleures armes pour ne pas se faire engueuler ou même frapper.
            </p>
            <ul>
              <li><p class="paragraphe">DEX-AGIL pour réaliser des bougies</p></li>
            </ul>
            <p class="paragraphe">
              A l'étage, on laisse la place à l'argile qui est récupéré et filtré depuis le fond du lac. Cette terre fine est utilisé pour réaliser des pots, des outils, de la vaisselle en
              poterie ou en faïence grâce au grand banc de tournage au bâton. Lorsque l'on s'installe sur le banc, à la dimension d'un centaure, on peut rester longtemps à façonner
              l'argile humide pour la réalisation de tous les équipements du quotidien. Malgré la complexité et l'énergie qu'il faudra pour utiliser le tour à bâton, si un PJ y parvient,
              cela impressionnera les centaures. La seule qui supporte assez Kite'Tihe est Ka'Huri qui aime passer du temps à l'atelier de poterie.
            </p>
            <ul>
              <li><p class="paragraphe">CONSTIT : pour s'occuper du four</p></li>
              <li><p class="paragraphe">FOR-ATHL pour utiliser le tour à bâton</p></li>
              <li><p class="paragraphe">DEX-AGIL pour la poterie au colombin</p></li>
            </ul>
          </div>
          <hr />

          <h2>Une Vielle Aigrie :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Il ne se passe pas souvent des événements à la fabrication de bougie de part la présence de Kite'Tihe. Assez insupportable, presque personne ne peut supporter sa présence
                trop longtemps. Lors d'une grande journée de création de bougie avec la stressée et belliqueuse Ka'Huri, Kite'Tihe entre en furie dans l'atelier et commence a donner des
                coups de bâton au PJ présent. Dans son énervement, elle casse du matériel et elle s'exprime avec beaucoup de colère et d'incohérence. Ka'Huri s'interpose mais, en fonction
                de la réaction du Personnage, la situation peut vite dégénérer.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Cuisson Sous Surveillance :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Teina, l'adolescente amie de Vaiata, a terminé tard son travail dans la poterie pour fabriquer des dizaines de tuiles pour les toitures. Elle est épuisée et interpelle un
                Personnage dans la rue pour lui demander d'entretenir le foyer de cuisson toute la nuit. Elle semble désolée mais elle est a deux doigts de tomber de sommeil. CONSTIT DD10
                trois tests pour rester réveillé toute la nuit pour surveiller le feu. Si le Personnage réussi, Teina sera très reconnaissante et voudra aider le PJ en retour. Si le
                personnage échoue, les tuiles sont fichues et Teina ainsi que le PJ se feront enguirlander par Ka'Huri. Bien sur, l'aventurier pourra résister à la nuit en présence d'une
                autre personne.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Capable ou Pas ? :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Ka'Huri arrive dans la poterie et trouve un PJ en train de réaliser des poteries au colombin. Elle sourit et commence à provoquer la fierté du Personnage sur son
                impossibilité d'utiliser le tour à bâton car il est trop faible. FOR-ATHL DD20 trois tests. Si le PJ réussit, Ka'Huri racontera et honorera le PJ lors de la prochaine
                soirée dans la Salle Commune. Si le PJ échoue, Ka'Huri se moquera gentiment car elle avait raison mais, au final, ils auront passé un bon moment de complicité ensemble.
              </p>
            </li>
          </ul>
        </div>
