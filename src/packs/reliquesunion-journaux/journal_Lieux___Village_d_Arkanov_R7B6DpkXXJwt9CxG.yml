    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>T. Réserves de Survie</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Ce grand bâtiment de deux étages est quasiment tout le temps fermé à clef. Toutes les femme aînées de chaque famille possèdent une clef pour cette zone de stockage. Lors de
              la première visite des Aventuriers, on leur explique que le contenu de ce bâtiment sert seulement dans le cas où une grande menace viendrait frapper le village. En rentrant
              des charrettes à l'intérieur, il leur sera possible de quitter rapidement Arkanov pour aller dans les montagnes.
            </p>
            <p class="paragraphe">
              A l'intérieur, on peut trouver tout le nécessaire pour que le village puisse survivre pendant plusieurs semaines. Tout y est empaqueté, emballé et trié soigneusement. On peut
              voir des numéros sur les étagères permettant de répartir les différentes caisses et sacs dans les différentes charrettes afin qu'elles reçoivent un peu de tout le nécessaire.
              Des fontes en cuir sont déjà remplies dans les étagères à l'étage et sur chacune on a soigneusement noté le nom de chaque centaure du village.
            </p>
            <p class="paragraphe">
              A côté des fontes, chaque centaure a une caisse à son nom qui contient une tenue de voyage ainsi que de l'équipement ‘armure, arme, outil, livres…). En cas d'alerte, chaque
              centaure sait ce qu'il doit faire pour évacuer le village de façon optimale. Des répétition sont réalisés tous les ans à différentes périodes de l'année. La gestion du stock
              et de l'organisation de cette procédure est à la charge de Miihini et Tumuaki.
            </p>
          </div>
          <hr />

          <h2>Évacuation Surprise :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Lors d'une soirée plaisante dans la salle commune, Kupu est en plein spectacle, lorsqu'une explosion retenti dans le village et tous les habitants se lèvent d'un coup entre
                surprise et effroi. Kamura entre dans la salle en criant de toute sa force «AWHINA !». En un instant, Kiliko hausse le ton et hurle deux mots «Kia Tupato». Tout les
                centaures s'activent d'un coup comme poussé par un devoir sacré. Ils partent tous dans des directions différentes et en sortant de la salle commune, les PJs remarque un
                grand nuage de fumée au dessus du lac, non loin du compost. Au bout de quelques instant, les aventuriers observent tous les habitants réunis devant ce bâtiment fermé,
                Miihini et Tumuaki de chaque côté de la porte. Malgré l'obscurité de la nuit, des charrettes sont vidés sans ménagements et apportés en ligne dans la rue non loin de la
                salle commune.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Par petit groupe, les centaures entrent dans le bâtiment sous les ordres des deux responsables. Ils en sortent entièrement équipés des sabots à la tête, avec de lourdes
                fontes sur leur dos et tirant leur charrette remplie vers les grilles du village. Pendant tout ce ballet millimétré, Toa, Wakaweti, Te'Tipu, Kaihoko et Maamaa sécurisent
                les centaures avec leurs armes, respectant visiblement une position de combat précise.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Lorsqu'il ne reste plus qu'une charrette devant les grandes portes du bâtiment, Miihini fait signe aux PJs de rentrer avec le dernier groupe. Ils observent que chaque
                centaure du groupe charge la charrette rapidement avec les caisses et sacs des étagères du RdC puis montent à l'étage, ouvrent la caisse à leur nom, s'habillent, s'équipent
                rapidement mais dans le calme, aident leur voisin à fixer les fontes sur le dos puis tous descendent la rampe, se positionnent autour de la charrette et sortent rejoindre
                les autres. Les Personnages aperçoivent Wakaweti, muni du Duo de Marteaux de Silence (p.153???), qui observe la scène. Il frappe au sol, les deux marteaux en respectant un
                rythme spécial et en un instant plus aucun son n'est perceptible. Grâce à des gestes, Kiliko fait ouvrir les grilles du village et les chariots sortent en ligne dans la
                forêt extérieure en pleine nuit.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Après quelques minutes à marcher dans la forêt, Kamura fait un signe à Wakaweti et lève haut le bras. Le convoi s'arrête et Kamura fait quelques gestes aux centaures qui
                l'observent avec attention. Les charrettes font demi-tour, tout le monde rentre tranquillement au village. Chaque habitant repositionne ses fontes et son équipement à
                l'endroit prévu du bâtiment, les charrettes sont vidées les unes après les autres et, après quelques dizaines de minutes, les centaures partent ce coucher. Certains sont
                excités par la manœuvre, d'autres épuisés par l'heure tardive et un petit groupe est encore perturbé par cette dose de stress intense.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Le lendemain, Miihini, Tumuaki et Kamura rassemblent les villageois pour faire un rapport sur cet exercice d'évacuation. Elles expliquent une nouvelle fois certains détails
                mal exécutés, félicitent des centaures et grondent ceux qui ont été trop lent ou qui ont oublié des étapes. Elles semblent, toutes les trois, satisfaite de la tenue de cet
                exercice et elles remercient chaleureusement Hei Tunu pour la belle explosion qu'elle a préparé.
              </p>
            </li>
          </ul>
        </div>
