      content: |-
        <div class="journal-cof2ta-ru">
          <h1>R. Alambic et Préparation de Breuvages</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Cette pièce est majoritairement remplie par une machine complexe et esthétiquement magnifique. Les tubes et tuyaux métalliques ainsi que les vannes, leviers, cadrans et cuves
              forment une sorte d'alambic étrange. Des jets de vapeurs sortent de certaines valves et dans l'angle de la pièce, on peut contempler une nouveau bassin remplie de charbon et
              gravé de nombreuses séquences de runes magiques permettant une combustion constante et précise sous la cuve principale. Des odeurs alcoolisées remplissent la pièce et il faut
              régulièrement ouvrir la fenêtre et la porte sous peine de finir saoule sans avoir bu.
            </p>
            <p class="paragraphe">
              Toutes sortes de distillats sont préparés grâce à cette machine que se soit pour la fabrication d'alcool, de base pour des soins, de concentrés de plantes tinctoriales ou
              modifier la viscosité de certains fluides.
            </p>
            <p class="paragraphe">
              Hei Tunu est la responsable de l'alambic mais, bien souvent, on trouve dans ce bâtiment, la jeune et dynamique Harikoa en train de préparer des mixtures complexes avec un
              sourires jusqu'aux oreilles. Cette jeune femelle est passionné par les huiles essentielle et une de ses trouvailles porte son nom.
            </p>
            <p class="paragraphe">
              A l'étage, on trouve tout le nécessaire pour préparer les plantes, champignons, racines et autres minéraux pour les préparations de breuvages, soins, huiles… L'ordre n'y est
              pas la priorité mais l'hygiène des outils et des récipients y est impeccable pour éviter de corrompre une préparation.
            </p>
            <p class="paragraphe">INT-ARCA pour utiliser l'alambic</p>
            <p class="paragraphe">SAG-SURVI pour préparer ingrédients et recettes</p>
          </div>
          <hr />

          <h2>Une Visite Excitée :</h2>
          <p class="paragraphe">
            Harikoa est une jeune femelle centaure passionnée et très expressive. Si un PJ souhaite travailler dans ce bâtiment, elle commencera une visite détaillée de la grande machine
            incroyable qui occupe presque toute la pièce. Elle parle vite et montre quatre trucs et machins en même temps. Elle fait des démonstrations des effets de chaque levier,
            poignée, cadran… Il est bien compliqué de tout comprendre mais, malgré cela, Harikoa arrive à captiver le Personnage. INT-CULT.GÉ DD20 pour comprendre les descriptions et
            informations d'Harikoa. Si réussi, la jeune centaure sera très impressionnée par l'intelligence et la compréhension du PJ. Elle pourra lui demander de l'aide à l'avenir. Si le
            Personnage a des connaissances dans une voie mystique ou en magie, INT-ARCANES DD20 (bonus de +5 au test si il a des capacités de la Voie de l'Alchimie). Si réussi,
            l'aventurier comprend même comment fonctionne l'alambic. Les multiples runes magiques, finement gravées sur la machine, sont limpides et assez logiquement disposées. Harikoa
            prendra le PJ comme assistant s'il le souhaite.
          </p>
          <hr />

          <h2>Cobaye Consentant :</h2>
          <p class="paragraphe">
            Hei Tunu, Harikoa et Kara viennent voir le Personnage. Les trois expertes en anatomie, soins et fabrication de médicaments souhaiteraient essayer des produits sur une autre
            espèce que les centaures. Il faut bien savoir si les produits utilisés pour soigner les habitants d'Arkanov fonctionnent sur les autres races des Terres d'Arran. Il y a peu de
            danger pour le PJ, assurent-elles ! Si le PJ accepte, il sera fortement remercié. Hei Tunu et Harikoa assemblent différents produits, préparent des mixtures. Elles demandent au
            PJ de boire, d'appliquer le baume sur sa peau, respirer ou encore goûter plusieurs recettes. De son côté Kara observe, questionne et ausculte le Personnage. FOR-ATHLETISME DD15
            pour résister aux effets quelques fois puissants (vertiges, aigreur d'estomac, sensations de brûlure…). Si raté, les trois centaure arrêteront rapidement les tests et
            remercieront grandement le PJ en lui offrant une petite flasque en métal contenant un délicieux sirop d'une plante du village. Si réussi, les tests se répéteront plusieurs fois
            avec des très bons résultats d'après les dires de Kara. Des effets intéressants seront trouvés (guérison rapide, constitution renforcée, perception visuelle aiguisée, somnifère
            foudroyant…).
          </p>
          <p class="paragraphe">
            Chaque MJ pourra créer des baumes, potions, huiles ou autres pouvant servir pour le reste de la campagne. Il est aussi possible de permettre au Joueurs de créer, avec l'aide et
            l'accord du MJ, une mixture qu'il souhaite.
          </p>
        </div>
