      content: |-
        <div class="journal-cof2ta-ru">
          <h1>K. Four et Artisanat divers</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Dans cette pièce, on trouve un grand bazar organisé qui permet de réaliser beaucoup de petites tâches du quotidien et aussi de s'isoler lorsque l'on veut travailler sur une
              pièce spécifique. Même s'il n'y a pas vraiment de plan de travail, la plupart des Centaures travaillent sur les caisses, sur l'enclume ou sur la margelle du four. Ce dernier
              est assez particulier. Il permet de transformer du bois en charbon très calorifique en étouffant la combustion et sert aussi fréquemment pour faire cuire des réalisations
              simples de la poterie (tuiles, briques, bols…). Le plus agaçant ici c'est de devoir aller chercher dans les autres bâtiments d'artisanat certains outils spécifiques ou des
              matériaux manquants.
            </p>
            <p class="paragraphe">
              On peut trouver dans cette pièce plusieurs jours par semaine, le père de Vaiata, Kaiwhakairo occupé à réparer des objets ou meubles du village lorsqu'il n'est pas dans
              l'atelier de sculpture.
            </p>
            <p class="paragraphe">
              Réparer certains meubles, faire du petit artisanat divers, fabriquer le charbon… Il y a toujours quelque chose à faire ici. Souvent seul, le Personnage pourra être «dérangé»
              par Kaiwhakairo qui vient réparer un tiroir ou un manche d'outil.
            </p>

            <ul>
              <li><p class="paragraphe">DEX-AGIL pour réaliser des travaux utilitaires</p></li>
            </ul>
          </div>
          <hr />

          <h2>Assemblage Robuste :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Khaiwakairo vient chercher un PJ de bon matin pour lui demander de l'aide. Il doit assembler un grand établi et remplacer la table centrale dans le bâtiment de production
                de nourriture. L'établi est costaud, muni de nombreux tiroirs de différentes tailles et surtout, chaque partie a été sculptée avec soin par Khaiwakairo durant de longues
                nuits. Il est tout simplement magnifique et cela fait des années que Kahao et Whakaaro demande l'installation d'un meuble plus fonctionnel. Toutes les pièces sont préparées
                devant ce bâtiment. Le travail n'est pas extrêmement physique mais il faut emboîter chaque pièce dans le bon ordre avec soin et minutie. Il faudra surtout une bonne
                compréhension entre Khaiwakairo et le Personnage pour ne pas s'emmêler les pinceaux. DEX-AGIL DD15 et CHA-PSY DD20. Si échoué, le grand établi mais monté mais ça n'a pas
                été une partie de plaisir pour se faire comprendre entre le centaure et le PJ. Si réussi, le Personnage et le centaure passe une excellente matinée à assembler cette belle
                pièce de menuiserie, mange ensemble cordialement et installe l'établi à sa place définitive dans l'après-midi sous l'œil reconnaissant de Kahao et Whakaaro.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Inspection Surprise :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Si un Personnage prend l'initiative d'une création artisanale dans ce bâtiment (fabrication d'un meuble, d'un objet, réparation d'une structure…), il se fait interrompre
                par Kamura pendant son travail. Elle venait récupérer une petite enclume et elle commence à inspecter le travail du PJ et lui poser des questions sur ce qu'il fait. Elle
                semble intriguée par cette initiative et elle montre des signes d'encouragement pour l'aventurier qui réalise ce travail. CHA-PSY DD15 pour convaincre Kamura du bien fait
                de la réalisation ou CHA-FILOU DD20 pour embobiner Kamura.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Un Roupillon et de la Mauvaise Foi :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Un PJ qui a besoin d'un outil, de réparer un objet ou simplement passant dans ce bâtiment pour affûter un outil, tombe face à Poauau, le vieux centaure, en train de dormir
                au milieu de la pièce. Il se réveille en sursaut faisant tomber une caisse d'outils au sol. Il semble désorienté et lance un regard noir au Personnage. Avec beaucoup de
                mauvaise fois, il pointe les outils au sol et commence à rouspéter l'aventurier pour sa maladresse. CHA-PSY DD20 pour faire entendre raison à Poauau, CHA-FILOU DD15 pour
                jouer de la situation absurde face à Poauau ou FOR-COMM DD20 pour envoyer paître le centaure et le confronter face à sa responsabilité. Si le PJ réussi son test, Poauau
                reconnaîtra sa tentative de manipulation et demandera au PJ de ne pas ébruiter l'histoire. Si le test échoue, Poauau s'empressera de raconter à tout le village comment il a
                recadre un intrus après sa maladresse.
              </p>
            </li>
          </ul>
        </div>
