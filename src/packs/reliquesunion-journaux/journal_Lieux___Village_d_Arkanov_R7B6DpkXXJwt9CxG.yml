  - sort: 800000
    name: 'G : Cuisine collective'
    type: text
    _id: QYs90mKhx9fHyy79
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>G. Cuisine Collective</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Il y a tout dans ce bâtiment pour préparer un grand nombre de repas tous les jours si on organise bien le travail et l'espace. Une partie des préparation se font d'abord dans
              le bâtiment de Préparation de Nourriture. La pièce est remplie de plan de travail, d'ustensiles, de vaisselles et surtout de nourriture en tous genres. Deux belles
              cuisinières sont quasiment toujours en chauffe et des bassins, directement reliés à la nappe phréatique, sont installés pour nettoyer les légumes et autres salades. A
              l'étage, on trouve de nombreux stocks de denrées alimentaires en tout genre, ainsi que des sacs de céréales ou des caisses de produits séchés.
            </p>
            <p class="paragraphe">
              A n'importe quel moment du jour ou de la nuit, il n'est pas étonnant de croiser des Centaures dans cette cuisine collective. Que se soit la gourmande et cordon bleue Miihini,
              Kaiwhakairo ayant oublié de se nourrir après une soirée passé dans l'atelier de sculpture ou encore le fils du chef, Wakaweti qui prépare un repas copieux après un
              entraînement intensif.
            </p>
            <p class="paragraphe">
              Kai et sa fille Maamaa passent énormément de temps à préparer les repas de la collectivité quand cette dernière ne fait pas d'exercices d'assouplissement.
            </p>
            <p class="paragraphe">
              Les Personnages peuvent aider à préparer des repas et il faut en faire beaucoup tous les jours. Couper, cuire, rissoler, éplucher, aller chercher des herbes, touiller… et
              tout ça pour la grande majorité des Centaures du Village d'Arkanov. Certains préfèrent se restaurer en cuisinant seul avant ou après les autres car ils veulent continuer le
              travail mais tous les midis et tous les soirs, des repas sont préparés et chaque Centaure vient se servir et apporter leur repas aux membres de leur famille. Même si certains
              mangent dans leur coin ou dans leur atelier, il est plus fréquent que les Centaures s'installent sur la Place du Village, le long du lac, dans le verger ou même dans la salle
              commune au rez-de-chaussée ou à l'étage.
            </p>
            <ul>
              <li><p class="paragraphe">SAG-/SURVI ou DEX-AGIL pour préparer des repas</p></li>
              <li><p class="paragraphe">CHA-PSY ou CHA-FILOU pour apporter leur repas à certains Centaures.</p></li>
            </ul>
          </div>
          <hr />

          <h2>Cuisine Diplomatique :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Kaha, Te'Tipu et Kaihoko rentrent de la chasse avec un magnifique cerf qu'ils déposent dans la cuisine collective en bombant le torse quand il passe à côté du Personnage.
                Les trois centaures repartent avec un grognement pour aller se laver et se reposer. Le PJ peut préparer le cerf avec la complexité que cela représente. SAG-SURVI ou
                DEX-AGIL DD20. Si le Personnage échoue, il sera lourdement réprimandé par Kaha et ses fils devant tout le village. Par contre, si le PJ réussi, les trois chasseurs seront
                étonnés et ils auront un peu plus d'estime pour le Personnage. Lors du repas, Kaha fera même un signe de tête au PJ. Si la réussite est critique, les trois centaures, en
                goûtant le repas, éclateront de rire, les yeux entre l'étonnement et la reconnaissance.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Douleurs Intenses :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                L'après-midi à préparer le repas est finie aux côtés de Maamaa et Kai qui ne sont pas avares de compliments. Ils tendent un large bol au PJ et lui demande d'aller
                l'apporter dans la Salle Commune à Haputanga qui est enceinte. En entrant, le PJ entend des gémissements de douleur au fond de la pièce derrière le paravent. Il trouve
                Haputanga pliée en deux par les douleurs de sa grossesse. Elle transpire à grosses gouttes et elle tend la main vers une serviette et une bouteille d'eau. L'aventurier peut
                l'aider directement ou aller chercher son conjoint, Kaihoroi, ou un autre habitant. Dans tous les cas, Haputanga, Kaihoroi et la soigneuse Kara seront très reconnaissant
                envers le Héros d'Ispier pour son aide ou son alerte.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Apprenti Empoisonneur :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Avant l'aube, tandis que le PJ entre dans la cuisine collective pour prendre un petit déjeuner, il tombe nez-à-nez avec le jeune Taitamariki qui semble effrayé par sa
                présence. Il tient dans sa main une petite fiole contenant un liquide blanchâtre qu'il cache de suite dans son dos, l'air de rien. CHA-PSY DD20 pour discuter et
                questionner, CHA-FILOU DD20 pour baratiner et manipuler ou FOR-COMM DD15 pour intimider et impressionner le jeune centaure. Si le test est réussi, Taitamariki donnera la
                fiole au PJ et le suppliera de garder le silence. C'est une fiole de poison qu'il voulait utiliser pour tuer son père Te'Tipu.
              </p>
            </li>
          </ul>
        </div>
