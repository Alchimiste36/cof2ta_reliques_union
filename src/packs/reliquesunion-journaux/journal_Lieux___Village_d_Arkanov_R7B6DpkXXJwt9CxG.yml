  - sort: 500000
    name: 'D : Préparations et stockages alimentaires'
    type: text
    _id: PKaXRrmLTYIoQkbS
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>D. Préparation et Stockage des Vivres</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">Dans ce très grand bâtiment, on peut trouver des centaines de caisses, paniers, sacs remplis de légumes, plantes, feuilles, graines, fruits, baies…</p>
            <p class="paragraphe">
              Des plans de travail, étagères et caisses permettent de trier, stocker et garder tous ces aliments. En plus de cela, des structures permettent de préparer les aliments pour
              les conserver (séchage, bocaux, saumure, fermentation…), de les trier et de les préparer pour la cuisine collective ou pour que chaque habitant du village puisse trouver de
              quoi se nourrir au quotidien.
            </p>
            <p class="paragraphe">
              A l'étage, des stocks de nourritures sont entreposés sur des étagères bien organisées. On remarque qu'au premier étage comme au second, un ingénieux système de ventilation
              est associé à quelques runes magique qui permettent de garder la pièce fraiche et avec un bon taux d'humidité. Il y a de quoi tenir plusieurs semaines voir mois avec toute
              cette nourriture stockée.
            </p>
            <p class="paragraphe">Les Personnages peuvent être appelés pour aider à préparer les légumes, graines, plantes, fruits…</p>
            <p class="paragraphe">
              Dans ce bâtiment, il est possible de faire sécher, écraser, mettre en sacs ou sachets, découper, trier, éplucher, faire des bocaux, saler, mettre à fermenter, effeuiller,
              organiser… toute les différentes denrées venant du Verger, Champs ou Potager.
            </p>
            <p class="paragraphe">Le travail n'est pas compliqué mais il faut souvent de la minutie, une grande rigueur et une hygiène impeccable.</p>
            <ul>
              <li><p class="paragraphe">DEX-AGIL pour s'occuper de la préparation des denrées alimentaires.</p></li>
              <li><p class="paragraphe">INT-SURVI pour réaliser des opérations de conservation et utiliser les machines de ce bâtiment.</p></li>
            </ul>
            <p class="paragraphe">
              Dans toute la partie du village servant à la culture de la nourriture, on croise le plus souvent Peka, une Centaure assez stressée, Kaihoroi toujours disponible pour rendre
              service ainsi que la lunatique Kahao.
            </p>
          </div>
          <hr />

          <h2>Désespoir Ô Désespoir :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                En fin de journée, Peka se trouvera au deuxième étage du bâtiment en train de pleurer. Elle essayera d'expliquer à l'aventurier que son conjoint, Kahaki, a été kidnappé
                lors de la dernière attaque des Atarangi Kino. Elle est triste, désespérée et en colère de l'inaction du village face a cette menace. Le personnage pourra essayé de la
                réconforter et/ou en parler à Kara ou à un autre centaure.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Intéraction Tendue :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Le PJ est en train de mettre en sachet des feuilles séchées sorties du séchoir solaire au RdC du bâtiment lorsque Kahao s'approche de lui et commence à lui expliquer
                quelque chose de façon agressive. Elle essaye de se faire comprendre mais sa manière de communiquer est assez bloquante. CHA-PSY DD15 si réussi, Kahao se calme et arrive à
                se faire comprendre. Si raté, Kahao s'énerve de plus en plus et deviendra véhémente envers le PJ. Elle le bouscule, le menace, se muni d'un bâton pour le faire sortir…
              </p>
            </li>
          </ul>
        </div>
