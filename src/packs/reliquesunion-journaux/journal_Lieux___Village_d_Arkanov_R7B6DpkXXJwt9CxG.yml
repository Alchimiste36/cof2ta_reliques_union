    name: 'H : Stocks de produits finis - Couture'
    type: text
    _id: NDrkpxJE2qxi4A0X
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>H. Produits Finis, Outils et Couture</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Lorsque l'on rentre au rez-de-chaussée de ce bâtiment, on pense à un grand foutoir désorganisé tellement il y a de caisses, tablettes, rangements ou sacs tous remplis
              d'outils en tout genre, des matériaux divers et variés, des pièces pas encore finies, des structures cassées ou déboîtées qui demanderaient réparation. Après quelques heures
              passées à chercher un outil ou un matériel on repère une sorte d'organisation et mieux vaut ne pas mettre le bazar dans cette «harmonie» étrange.
            </p>
            <p class="paragraphe"></p>
            <p class="paragraphe">
              Au premier étage, vous pouvez trouver un atelier complet de couture avec tout le nécessaire pour la fabrication de vêtements, poupées, sacs… que ce soit avec le tissus tout
              droit sortie de la tisseranderie ou les quelques pièces de cuir provenant de la chasse. Provenant de la forge, il est aussi possible de sertir des œillets ou de coudre des
              boucles. Quelques seaux et des étendoirs servent à colorer ou d'étendre les tissus.
            </p>
            <p class="paragraphe">
              Ce n'est pas étonnant mais le sol, les meubles et les étagères sont recouverts de petits bouts de fils, de tissus, des chutes de cuirs et des morceaux de craie permettant de
              tracer sur les étoffes. Les Personnages qui travaillent dans l'atelier de couture comprennent rapidement que tous les tissus, fils, cordes, œillets, boutons… sont fabriqués
              au village avec minutie et patience. Les Centaures seront très mécontents si le Héros d'Ispier gâche les matériaux par manque d'attention ou étourderie.
            </p>
            <p class="paragraphe"></p>
            <p class="paragraphe">
              Au deuxième étage dans une petite tour assez haute, on peut utiliser une longue-vue qui permet d'observer soit les étoiles et le ciel soit les hauteurs des montagnes
              environnantes. Les aventuriers qui passeront leurs nuits dans l'atelier de couture verront chaque nuit, un ou une Centaure monter dans la tour d'observation pour faire le
              guet.
            </p>
            <p class="paragraphe"></p>
            <ul>
              <li><p class="paragraphe">SAG-PERC pour trouver le bon objet, le bon matériel ou le bon outil dans le stockage du RDC.</p></li>
              <li><p class="paragraphe">DEX-AGIL pour le travail de couture et du cuir.</p></li>
            </ul>
          </div>
          <hr />

          <h2>Une Aide Précieuse :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Le PJ passe devant la porte du bâtiment de stockage de produits finis et des outils et il entend des bruits d'agitations et d'agacement par la porte. S'il regarde, il voit
                Aroha énervée en train de déplacer des caisses et des cagettes en grognant. Elle fait signe au PJ. Elle souhaite de l'aide pour sortir un trio de grands tréteaux qui sont
                noyés sous le bazar de la pièce. L'aide du PJ sera très appréciée par Aroha qui doit ensuite installer une grande place de travail pour travailler sur une partie importante
                de la machine du village.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Couture et Complicité :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Alors qu'un Personnage se dirige à l'étage du bâtiment, dans l'atelier de couture, il tombe sur Titiro qui a du passer plusieurs heures dans la pièce pour préparer des
                costumes de spectacle. Elle demande au PJ ce qu'il veut et elle va lui proposer son aide pour fabriquer, rapiécer ou améliorer ses vêtements. Le PJ et la belle centaure
                vont passer un long moment dans l'atelier. Souriante et complice, Titiro apportera une touche élégante à la réalisation et surtout, elle arrivera à ajuster le vêtement à la
                perfection.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Un Cadeau pour son Aimée :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Un Personnage se trouve en plein travail dans l'atelier de couture, lorsque arrive Te'Whakama. L'adolescent explique qu'il veut faire un joli cadeau à Vaiata mais il ne
                sait pas quoi. Il a pensé à une belle ceinture ou un haut ou … Il ne sait pas. Il demandera conseils au PJ et ce dernier pourra même l'aider à concevoir le vêtement (<span>DEX-AGIL</span>
                estimer la qualité de la réalisation en fonction du résultat).
              </p>
            </li>
          </ul>
          <hr />

          <h2>Une Étagère sur la Tête :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Le PJ est parti chercher un outil au RdC du bâtiment et il entend un grand fracas à l'étage ainsi qu'une volée d'insultes en langue centaure. Une étagère remplie de boites
                et de bobines de fils est tombée au sol répandant des milliers d'objets partout. Titiro est au sol légèrement assommée par l'étagère. Le PJ pourra amener la jeune centaure
                enceinte voir Kara et s'il range la pièce, Titiro sera la plus heureuse des centaure lorsqu'elle découvrira son atelier réparé.
              </p>
            </li>
          </ul>
        </div>
