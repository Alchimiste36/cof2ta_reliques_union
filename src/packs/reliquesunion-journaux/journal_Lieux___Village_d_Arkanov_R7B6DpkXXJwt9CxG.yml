      content: |-
        <div class="journal-cof2ta-ru">
          <h1>U. Forêt Extérieure et Chasse</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              En sortant su village par les larges grilles, on arrive dans la grande forêt de feuillus en haut des hautes montagnes des Crocs d'Acier. Régulièrement, un groupe de centaures
              sortent du village pour aller chasser, cueillir des plantes, bûcheronner un arbre ou faire une ronde aux alentours du village pour vérifier si une tribus Peaux Vertes ou des
              traces d'animaux sauvages sont visibles.
            </p>
            <p class="paragraphe">
              C'est souvent Kaha, Te'Tipu et Kaihoko qui partent en chasse accompagnés ou non par Ka'Huri ou de la jeune Teina. Ils passent une journée ou deux dans la forêt et reviennent
              avec un cervidé, quelques lapins ou oiseaux. La forêt n'est pas «entretenue» comme la plupart des forêts proches des villes des Terres d'Arran et certaines zones sur
              difficiles d'accès à cause des buissons épineux, des fougères et autres branches basses. Seule la zone auprès du village a été dégagée pour exploiter le bois et surveiller
              depuis les murailles.
            </p>
            <p class="paragraphe">
              Kaiputu, Harikoa et Hei Tunu font, aussi, de temps en temps une expédition hors du village pour aller récupérer des feuilles, écorces, baies, racines ou autres produits
              qu'ils ne cultivent pas dans le potager. Ils sont à chaque fois protégés par Kai et Maamaa ou Aroha et Wakaweti.
            </p>
            <p class="paragraphe">
              C'est dernières années, des expéditions ont été faites pour suivre les traces des Atarangi Kino après des attaques sur le village. Toutes les empreintes se dirigeaient vers
              le nord mais, à chaque fois, Kiliko décidait de rebrousser chemin avant de découvrir quoi que ce soit.
            </p>
          </div>
          <hr />

          <h2>Partie de Chasse :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Si un PJ a sympathisé avec Kaha et ses deux fils, ces derniers pourront lui proposer de l'accompagner pour leur prochaine sortie. Si le Personnage n'est pas très doué à
                l'arc, ils essayeront d'attaquer plutôt un ours des montagnes sinon, les trois centaures préfèrent la poursuite des cervidés. Ils se préparent pour partir avant le levé du
                soleil et ils semblent très excités. Tout le long de la journée, les centaures essayeront de convaincre leur nouveau compagnon de chasse des idées qu'ils ont pour le
                village. Explorer, conquérir, récupérer leur place sur les montagnes et montrer au monde la puissance des centaures. SAG-SURVI DD20. Si réussi, le PJ trouve rapidement la
                piste d'un ours ou de cervidés dans la forêt. Les trois centaures sont bluffés par ces compétences en pistage. ATT-CONTACT DD17 pour la chasse à l'ours ou ATT-DIST DD15
                pour la chasse au cervidé. Trois tests. En fonction du nombre de réussite, le PJ est soit une aide majeure pour cette chasse et les trois centaures seront impressionnés par
                le talent du Personnage soit, ils se moqueront ouvertement de ces races qui ne sont bonnes à rien comparé aux centaures forts, puissants et compétents. Si le Personnage
                fait trois échecs, il se blessera durant la chasse. Il subit 2d10+4 DM
              </p>
            </li>
          </ul>
          <hr />

          <h2>Expédition Botanique :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Kaiputu souhaite organiser une longue expédition dans la forêt et plus loin si le chef Kilko le permet afin d'aller étudier, répertorier, cueillir et dessiner des plantes
                ou des animaux. Avec l'expertise de Harikoa et la protection de Kai et Maamaa, le centaure passionné de botanique pense qu'il peut trouver de nouvelles espèces qui
                pourraient être utiles pour le village. Kiliko accepte sous certaines conditions et Kaiputu demande à un PJ s'il souhaite les accompagner. L'expédition devrait durer trois
                jours et deux nuits. Tout le nécessaire est prévu. Le rythme est soutenue pour la journée au travers de cette partie de la forêt qui est connue. Le soir est agréable malgré
                l'absence de feu et la fraicheur de la nuit. Le deuxième jour, Kaiputu et Harikoa parcourent différentes zones et récupèrent beaucoup d'échantillons de plantes, d'insectes
                ou de petits animaux. De leur côté Kai et Maamaa, le père et la fille, prennent très au sérieux leur rôle de protection sans que ça leur empêche de papoter et rigoler
                ensemble. En fonction du rôle du PJ, faites des tests de SAG-SURVI DD25 pour aider Kaiputu et Harikoa à la recherche de faune et de flore intéressantes ou de SAG-PERC DD15
                pour rester aux aguets des dangers qui pourraient subvenir. Le deuxième jours, en début de matinée, alors qu'ils parcourent les étendues sauvages et enneigées hors de la
                forêt, SAG-PERC DD20. Si raté, le PJ semble avoir aperçu une silhouette en haute d'un pic montagneux à quelques dizaines de mètres d'eux. Si réussi, le Personnage distingue
                clairement quatre silhouettes positionnées sur la pente d'une montagne à quelques dizaines de mètres de leur position. Les intrus ne semblent pas les avoir vu. Ils sont
                habillés d'une tenue noire et blanche, encapuchonnés, et ils se déplacent avec l'agilité d'un elfe sur les plaques glissantes. SAG-PERC DD20. Si réussi, le PJ remarque, en
                plus, que l'un deux porte un long sac sur l'épaule pouvant ressembler à un corps emballé dans un tissu. Kai et Maamaa refuseront catégoriquement que leur expédition parte
                au-delà de l'arête montagneuse mais si le PJ le souhaite, ils pourront observer de cette hauteur la route empruntée par ce petit groupe. Positionnés en haut de la crête,
                cachés par quelques buissons rachitiques, le PJ et les centaures suivront des yeux les quatre humanoïdes sur plusieurs kilomètres avant qu'ils ne soient plus visibles.
              </p>
              <p class="paragraphe">
                C'est un raid d'Ombres Blanches ou Atarangi Kino pour les centaures qui reviennent avec une proie gobelin qu'ils ont kidnappé récemment. Si le PJ a observé la scène, il
                gagnera un bonus pour traquer les Atarangi Kino après l'attaque sur le village.
              </p>
            </li>
          </ul>
        </div>
