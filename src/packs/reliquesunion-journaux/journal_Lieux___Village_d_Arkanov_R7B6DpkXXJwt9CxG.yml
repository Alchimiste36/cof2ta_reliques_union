  - sort: 700000
    name: 'F : École'
    type: text
    _id: WB0bl6i0ApQZTpR3
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>F. École et Études</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              L'école du village n'est pas bien grande mais elle possède tout ce qu'il faut pour bien étudier. Quelques tables centrales et déplaçables, des étagères remplies de nombreux
              ouvrages de diverses difficultés, des tableaux noirs pour écrire et même un globe assez complet des Terres d'Arran (mais ancien). Il est possible de pousser les éléments de
              la pièce pour faire des activités (apprentissage des danses rituelles, activités créatives, arts…)
            </p>
            <p class="paragraphe">
              A l'étage, on trouve d'autres bibliothèques et quelques tables pour des études plus approfondies pour les élèves avancées ou pour les adultes voulant développer leurs
              compétences ou leurs savoirs sur des sujets divers. Mécanique, menuiserie, préparation de repas ou de remèdes, étude du travail du bois ou du métal, apprentissage des runes…
              il y en a pour tous les goûts et pour tous les domaines dans cette bibliothèque. Les livres sont tous écrits en langage Centaure mais certain contiennent des images et des
              plans. Un bon moyen pour le groupe de développer son vocabulaire.
            </p>
            <p class="paragraphe">Kaiako est un professeur respecté par les villageois. Il travaille souvent avec sa compagne Toa qui elle enseigne les danses et les arts de combat.</p>
            <p class="paragraphe">
              Au vu de la difficulté à se faire comprendre, les aventuriers seront invités à passer quelques jours par semaine à l'école avec les enfants, adolescents et certains adultes
              du village. Si les héros sont assidus, essayent de bien comprendre et sont respectueux malgré la difficulté, ils gagneront rapidement de l'estime pour Kaiako et sa compagne
              Toa.
            </p>
            <p class="paragraphe">Des cours particuliers seront proposés aux Personnages les plus attentif avec le Professeur Kaiako.</p>
            <p class="paragraphe"></p>
            <ul>
              <li><p class="paragraphe">INT-CULT.GÉ pour étudier avec les autres élèves, pour apprendre la langue…</p></li>
              <li>
                <p class="paragraphe">
                  CHA-FILOU pour faire rigoler les élèves, pour les cours artistiques ou pour faire croire qu'on a compris alors qu'on a pas réviser son contrôle de grammaire.
                </p>
              </li>
              <li><p class="paragraphe">CHA-PSYCHO pour les cours particuliers avec Kaiako ou Toa.</p></li>
            </ul>
          </div>
          <hr />

          <h2>Raconte Nous une Histoire :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Après quelques jours d'études dans l'école du village, Kaiako devant s'absenter quelques instants, les jeunes centaures présents se retournent vers le PJ. Ils ont pleins de
                questions et de sollicitations pour lui. Ils lui demandent de se lever, ils l'observent, le font tourner… Le Personnage pourra réagir de la manière qui souhaite mais rien
                de comblera plus les jeunes centaure qu'un récit d'aventure mimé et théâtralisé, même s'ils ne comprennent pas un seul mot du conteur improvisé.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Harcèlement Scolaire :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Pendant une leçon de Kaiako devant la classe, le Personnage remarque une tension qui monte entre Taitamariki et Hunga. Ils commencent à se jeter des regards noirs, se
                lancent discrètement des noms d'oiseau et s'énervent. Il semblerait que Taitamariki se moque de la chevelure de Hunga et qu'elle rentre dans son jeu. Si le PJ ne fait rien
                au bout de quelques minutes la jeune Hunga se lève se met à crier sur le centaure moqueur et s'avance vers lui bien décidé à lui retourner une gifle ou pire. Le professeur
                est à l'autre bout de la pièce. Comment le PJ va réagir pour éviter un conflit physique entre les deux jeunes ?
              </p>
            </li>
          </ul>
          <hr />

          <h2>Initiation aux Danses Martiales :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Toutes les tables de l'école sont rangées, la pièce est entièrement dégagée et Toa, la maître d'arme s'apprête à commencer une leçon autour d'une danse martiale
                d'intimidation. Elle commence les mouvements des bras pour que le ou les PJs puissent apprendre aussi. DEX-AGIL DD15 ou FOR-ATHL DD15 pour suivre correctement les
                consignes. Si le test est réussi, Toa sera impressionnée par les techniques et l'expertise du ou des Personnages. En cas de réussite critique, les jeunes et la professeure
                sont éblouis par le talent du PJ. Si le test est raté, les gestes approximatifs et les difficultés du ou des PJs déclencheront une hilarité bienveillante dans toute la
                salle. Si le PJ le souhaite, il peut accentuer la drôlerie de la scène avec un CHA-FILOU DD10. En cas de réussite, les jeunes centaures raconteront cette histoire pendant
                des décennies !
              </p>
            </li>
          </ul>
        </div>
