  - sort: 200000
    name: 'A : Grotte et Prison'
    type: text
    _id: KaN8MUqbIPPsXoyQ
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>A. Mines et Prison :</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Dans les mines, bien connues du groupe d'aventuriers, il y a beaucoup de choses à faire qui peuvent rendre service aux Centaures. En plus d'améliorer les relations avec ces
              derniers, les travaux à la mine permettront aux Personnages de développer leur conditions physiques et de passer des journées à l'abri des conflits et des villageois
              lorsqu'un moment de détente se fera sentir. Une partie des Centaures du village se sert des mines pour s'isoler quelques jours, suer et trimer, changer leurs idées ou se
              défouler.
            </p>
            <p class="paragraphe">
              Si un Personnage veut partager les mines avec certains Centaures, il s'aperçoit rapidement que casser du cailloux plusieurs heures dans un environnement sombre et confiné
              permet de créer des liens et des moments de fraternité.
            </p>
            <ul>
              <li><p class="paragraphe">FOR-ATHL pour miner, broyer, concasser…</p></li>
              <li><p class="paragraphe">SAG-SURVI pour ranger, nettoyer, trier les caisses ou organiser les mines.</p></li>
            </ul>
          </div>
          <hr />

          <h2>Découverte Assommante :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                En arrivant pour travailler à la mine, le PJ trouve Itu au sol inconscient. Pendant son travail, un bout de plafond est tombé sur sa tête. Le Personnage peut lui venir
                directement en aide ou aller chercher de l'aide. Itu sera très reconnaissant envers l'aventurier.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Ca Brille à la Mine :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Lors d'une journée de travail à miner les parois (avec un bon test ou une réussite critique), le Personnage va découvrir une pierre précieuse de belle taille. Si le mineur
                retire la pierre et l'a montre à un centaure, une partie des habitants viendront voir la trouvaille et féliciter le Héros. Plusieurs jours plus tard, Kaiwhakairo montrera
                au PJ la réalisation qu'il a fait avec la pierre. Il a sculpté un pendentif magnifique pour chacun des aventuriers. Chaque pendentif se connecte aux autres pour former une
                belle rosace avec la pierre recomposée au centre.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Infestation Inquiétante :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                En rangeant les caisses de la mine ou pendant qu'il recherche un outil ou un objet, le PJ découvre une colonie de petits insectes le long d'un mur. Il se nourrissent de
                bois et souillent les caisses de nourriture. Les insectes sont arrivés par les conduits de ventilation positionnés au plafond. Dès que les centaures seront informés, il
                faudra plusieurs jours pour déplacer, nettoyer et inspecter chaque partie de la grotte pour venir à bout de cette invasion.
              </p>
            </li>
          </ul>
        </div>
