  - sort: 1100000
    name: 'J : Forge'
    type: text
    _id: w5pMCoYMA92Enjdp
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>J. Forge et Atelier de Forge</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">Au delà des bruits que l'on peut entendre derrière les portes de ce bâtiment, on perçoit toujours de la fumée qui sort de sa cheminée.</p>
            <p class="paragraphe">
              La forge est une grande pièce dont le cœur est magnifique. Une forge incroyable digne des plus grande Forteresse-État naines des Terres d'Arran. Le foyer est divisé en deux
              cercles concentriques recouverts de runes finement ciselées et rayonnantes d'une énergie bleutée. Les braises du centre sont teintées de bleue et permet de monter les
              creusets à très haute température tandis que le cercle extérieur, plus classique permet de travailler le métal entre les coups de marteaux. Un autre foyer magique est
              positionné dans un coin de la pièce.
            </p>
            <p class="paragraphe">
              Le reste du rez-de-chaussée est équipé de plusieurs enclumes, racks à outils de très bonne qualité, chariots roulants et autre meules d'affûtage et de façonnage. Sur le mur
              du fond, sous le large tuyau d'évacuation des fumées, se trouve des caisses remplies de différentes pépites de minerais pour réaliser les alliances, les épurer et les
              transformer en lingots facilement utilisables.
            </p>
            <p class="paragraphe">
              Marteaux, pinces, moules, sacs à charbon, étaux, enclumes… il y a tout pour faire un travail exceptionnel pour les équipements du quotidien, les armes ainsi que les éléments
              de structure, les pièces mécaniques et la quincaillerie.
            </p>
            <p class="paragraphe">
              Par une des fenêtre du RdC et du premier étage, deux cordes permettent d'actionner des soufflets qui maintiennent la température des foyers grâce à l'énergie hydraulique de
              la cascade du village.
            </p>
            <p class="paragraphe"></p>
            <p class="paragraphe">
              Au premier étage, le travail de finition commence avec un plus petit foyer enchanté aussi par une forte magie. A part la coupole de la forge du RdC qui prend une grosse
              partie du centre de la pièce, on peut trouver ici quelques enclumes et plans de travail pour réaliser des travaux de forge plus précis avec plus de calme mais aussi pour
              graver les runes magiques qui peuvent rendre les réalisations exceptionnelles.
            </p>
            <p class="paragraphe">Le long d'un mur, ce trouve deux bacs pour le traitement thermique du métal.</p>
            <p class="paragraphe">
              Dans une pièce plus petite au deuxième étage, on trouve un espace de travail spécialement conçu pour les dernières finitions. Affûtage, travail de manches et poignées, étuis
              et lanières de cuirs, polissage et nettoyage des lames et des réalisations mécaniques.
            </p>
            <p class="paragraphe">
              Un couple s'occupe le plus de la forge. La responsable est Whakarewa, cette centaure femelle avec un talent exceptionnel pour le travail du métal. Son conjoint, Kaipara,
              possède une force impressionnante et une capacité à travailler le métal de façon subtil et dans les moindres détails pour un résultat d'une rare finesse. Ils travaillent main
              dans la main et Kaipara répond à toutes les exigences de sa conjointe sans broncher. Ils travaillent le plus souvent avec leur fils Ka'Kata qui partage le travail de
              précision de son père et l'efficacité de sa mère. C'est derniers mois, il leur arrive souvent d'être rejoint par le jeune Mataro voulant passer ses nerfs sur l'enclume et qui
              aime modeler le métal en fusion même si ses muscles ne sont pour le moment pas très développés. Ce sont les seuls moments où on peut voir une certaine sérénité sur les traits
              du visage de cet adolescent introverti.
            </p>
            <p class="paragraphe">
              Les héros, qu'ils soient compétents ou non en forge, pourront être sollicités pour aider dans ce bâtiment. Il y a beaucoup à faire entre la fabrication des lingots raffinés,
              le trie des pépites de minerais et leur association pour réaliser des alliances, la réalisation de blocs damassés, l'entretien des foyers, le nettoyage des lieux et des
              outils…
            </p>
            <p class="paragraphe">Au premier et deuxième étage, seuls les Personnages montrant une bonne volonté pourront aider pour des réalisation plus techniques et délicates.</p>
            <p class="paragraphe">
              Ils seront continuellement sous la supervision de Whakarewa qui est une très bonne cheffe d'atelier et félicitera les aventuriers pour leurs belles réalisations ou leur
              motivation. Whakarewa et Kaipara montreront, au fil de jours, leur complicité malgré les différences de ce couple.
            </p>
            <p class="paragraphe"></p>
            <ul>
              <li><p class="paragraphe">FOR-ATHL pour s'occuper de la forge</p></li>
              <li><p class="paragraphe">DEX-AGIL pour faire des réalisations de précision au RdC et dans les étages</p></li>
              <li><p class="paragraphe">INT-ARCA pour s'essayer à la gravure des runes pour les PJs ayant la Voie de la magie runique.</p></li>
            </ul>
          </div>
          <hr />

          <h2>Un Réflexe ou un Accident :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                La forge tourne à plein régime depuis quelques jours pour transformer du minerai en plusieurs lingots de fer ou d'alliage. Après avoir retirer les déchets à la surface du
                métal fondu dans un grand creuset, le PJ entend un craquement grave. Un clignement d'œil plus tard, le creuset bascule du foyer entre Whakarewa et lui. DEX-AGIL DD15 ou
                FOR-ATHL DD20. Si le PJ réussi, il attrape la longue poignée du creuset et le maintien en équilibre le temps que Whakarewa se retourne et l'aide. Si le PJ échoue au test,
                le creuset tombe au sol, éclaboussant la zone de métal fondu. ATT-CONTACT vs DEF 14. Si réussi, le Personnage saute, l'épaule en avant pour bousculer Whakarewa et lui
                éviter de terribles brûlures. Si le test échoue, Le PJ, en poussant Whakarewa, se retrouve dans la zone de projection des boulettes de métal fondues. Il reçoit 2d6+8 DM,
                sera amené chez Kara pour quelques soins et gardera des cicatrices de ces brûlures sur les bras et la joue. Après la chute du creuset, il faudra passer quelques heures de
                nettoyage et surtout fabriquer un nouveau creuset de forge.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Colère Juvénile :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Les journées de travail à la forge sont agréables même si les efforts sont intenses et la chaleur étouffante. Kaipara, Whakarewa et Ka'Kata forme une bonne équipe pour
                guider le Personnage dans le bâtiment. A part les blagues nulles du père de famille, l'ambiance est appréciable. Mataro, le jeune centaure, partage souvent la forge avec
                cette famille et le Personnage malgré son air renfermé et sombre. Lorsqu'il est présent, le travail avance vite mais une tension s'installe et les coups de marteau passent
                d'harmonieux à colériques. Alors que Kaipara et Whakarewa sont occupés à l'étage, Mataro, après une erreur bête et sans conséquence, entre dans une colère violente. Il
                jette sa pince dans le foyer, donne un coup de sabot à une caisse de tige de fer et renverse le contenu d'une table. Il hurle des mots grossiers et des insultes dans le
                vide. Une vraie tornade proche de Ka'Kata et le Personnage. CHA-PSY DD20 ou FOR-COMM DD15 pour réussir à calmer le jeune Mataro. Si le Personnage y parvient, Mataro sortira
                de la forge, se dirigera vers les habitants à l'Est du bâtiment et commencera a expliquer son traumatisme face aux actes des Atarangi Kino dont il a été témoin, il y a 6
                mois. Il a vu, par la fenêtre, sa grand-mère maternelle se faire massacrer et son grand-père se faire kidnapper par les Atarangi Kino alors qu'il était caché dans leur
                maison. Il est totalement traumatisé par ces images et son quotidien balance entre colère et tristesse depuis.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Une Maintenance Complexe :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                En fin de Phase 2, si un PJ a passé quelques jours de travail dans la forge et qu'il est bien perçu par le Whakarewa, cette dernière demandera à Miihini d'intégrer le
                Personnage dans une grande maintenance sur une pièce de la machine principale du village. Pendant trois jours, le Personnage va participer à de nombreuses visites de la
                machine, étudier des plans et des procédures avec un groupe de 5 autres centaures (Kaipara, Ka'Kata, Aroha, Kai et Miihini). Chaque étape n'est pas des plus complexes mais
                il va falloir enchaîner chorégraphie millimétrée pour démonter, transporter, installer et réparer cet engrenage énorme. Le PJ devra réussir trois tests différents, pas très
                compliqués, pour être, à la fin des opérations considéré comme une aide et non comme un frein : INT-CULT.GE DD10 puis FOR-ATHL DD10 et pour finir DEX-AGIL DD10. S'il réussi
                tout le processus, Miihini fera monter sur la tribune le PJ le soir même devant tout le village réunit et lui confiera qu'il est digne de recevoir le tatouage des forgerons
                d'Arkanov sur le pectoral gauche. L'émotion du village est palpable et le PJ ressentira l'honneur dans les mots et les émotions de Miihini. Ce travail devrait faire
                basculer le PJ en Phase 3 sans problème.
              </p>
            </li>
          </ul>
        </div>
