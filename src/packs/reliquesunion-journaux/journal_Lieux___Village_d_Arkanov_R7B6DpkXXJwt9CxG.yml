      content: |-
        <div class="journal-cof2ta-ru">
          <h1>N. Bibliothèque, Salle d'Étude et la Cloche</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Un immense bâtiment qui renferme une montagne de savoirs et de connaissances dans ses ouvrages et ses parchemins. Situé en face de la salle commune, les deux bâtiments
              entourent une place où peut se réunir les villageois.
            </p>
            <p class="paragraphe">
              Lorsque l'on rentre dans la bibliothèque, la première chose que l'on ressent, c'est la fraicheur sèche de la pièce. Le murs, le sol et les vitraux sont conçus afin de
              favoriser la conservation des tomes et volumes présents dans les longues étagères de la bibliothèque.
            </p>
            <p class="paragraphe">
              Au premier étage, on découvre la poursuite du RdC avec d'autres étagères remplies de livres, tomes et parchemins plus ou moins anciens. Ici on peut atteindre aussi le balcon
              qui surplombe la cour et donne sur les immenses portes de la salle commune.
            </p>
            <p class="paragraphe">
              Un pupitre permet la lecture de discours ou d'histoires. Contre le mur de chaque côté de la porte du balcon se trouve deux bannières en tissus magnifiquement décorées de
              symboles et de dessins stylisés de Centaures dans des scènes de la vie courante.
            </p>
            <p class="paragraphe">
              Il est très compliqué pour le groupe d'aventuriers de trouver des informations ou des livres intéressants car la quasi-totalité des ouvrages sont écrites dans le langage des
              Centaures. Il est tout de même possible de trouver des plans techniques sans beaucoup de textes ou des livres très imagés (contes, histoires pour les enfants, livres
              techniques sur les plantes ou l'artisanat…). Par contre dans la bibliothèque, on trouve presque tous les jours le jeune Centaure Te'Whakama en train de lire et de rechercher
              des informations sur les traditions anciennes ou sur les savoirs perdus du village. De temps en temps, on peut l'observer répéter des danses traditionnelles dans les allées
              de la bibliothèque en essayant de décrypter certains livres.
            </p>
            <p class="paragraphe">
              Lorsqu'elles s'ennuient ou qu'elles veulent discuter avec Te'Whakama, on peut trouver Vaiata et sa meilleure amie Teina dans la bibliothèque en train de papoter ou de
              feuilleter des ouvrages de contes et de légendes ou des tomes expliquant certaines techniques d'artisanat.
            </p>
            <p class="paragraphe">
              Régulièrement on peut croiser également l'hirsute Kaiputu en train de compiler les savoirs sur la faune et la flore locale dans de grands volumes illustrés
            </p>
            <p class="paragraphe">
              Il y a deux escaliers au premier étage, le premier amène dans une salle de réunion assez élégante avec beaucoup de meubles qui permettent de ranger des livres et parchemins
              ainsi que des carnets de notes ou des cartes de la région. Au centre de la pièce une très grande table ronde surmontée d'une partie plus haute, permet de prendre des
              décisions en conseil restreint lorsqu'il y a des conflits par exemple ou pour organiser le déroulement d'une cérémonie.
            </p>
            <p class="paragraphe">
              L'autre escalier mène dans une petite tour ouverte sur ses quatre côtés permettant une vue panoramique sur le village d'Arkanov. Prenant une grande partie de l'espace, une
              immense cloche en métal est accrochée à l'entrait du toit. Le long du mur, un support contient un gros marteau semblable à ceux que l'on utilise à la forge et en face de
              l'escalier se trouve un coffre très joli contenant deux marteaux quasiment identiques. Ils sont recouverts de runes magiques qui sont une bonne synthèse entre les runes
              Naines et les runes des Centaures.
            </p>
            <ul>
              <li><p class="paragraphe">INT-CULT.GÉ pour faire des recherches ou étudier des livres de la bibliothèque.</p></li>
            </ul>
          </div>
          <hr />

          <h2>Découvertes Intéressantes :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Après plusieurs heures, voir jours, de recherche, le personnage trouve des informations intéressantes. Il tombe sur la description du Temple du Val Rouge et il reconnait le
                nom de Maniash'Onira. Il arrive à traduire un texte faisant référence au symbole de l'Ordre de l'Union, comme le pendentif de Laotissa, et lit un passage sur l'importance
                de préserver la sécurité du village pour protéger le monde entier. Le but réel d'Arkanov n'es pas clairement détaillé. Par contre, un passage très lyrique parle de cinq
                objets protégés. Le premier à l'intérieur d'une statue d'Orc, le second dans un arbre géant, le troisième dans la botte d'un nain, le quatrième dans un cercueil immortel et
                le dernier dans une montagne.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                De plus, il trouve un ouvrage sur un peuple d'elfes souterrains peu répandus dans les Terres d'Arran, les Elfes Exsangues. Aucune description physique mais quelques
                paragraphes sur leurs villes souterraines, leur vie dans les ombres et la grande différence de personnalité entre les groupes car ils ne se côtoient pas les uns les autres.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Pour finir, l'un des PJs trouvera la reproduction du symbole de l'Union tout en bas des bannières positionnées sur le balcon. Le symbole est brodé de fils d'argent entouré
                par cinq rayons dorés.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Conseils en Séduction :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Pendant les heures de recherches d'un PJ dans la bibliothèque, Te'Whakama vient demander conseil au Personnage sur sa relation avec Vaiata. Le jeune centaure aimerait faire
                sa demande à sa bien-aimée mais il ne sait pas comment s'y prendre. CHA-PSY DD15 ou CHA-FILOU DD20 pour donner de bons conseils à Te'Whakama.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Une Cloche de Silence :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Wakaweti aborde le PJ le plus intégré au village. Il veut offrir au Personnage l'honneur de frapper la Cloche dans la tour. Si le PJ accepte, le fils du chef expliquera
                quel rythme faire avec le duo de marteaux. A la vue des marteaux runiques, Wakaweti décrira les effets de ces objets fascinants qui permettent tous les trois jours de créer
                une bulle de silence autour du village grâce à l'amplification de la cloche. A part étendre la rayon d'action des marteaux, la cloche ne fait pas partie de la magie des
                marteaux.
              </p>
            </li>
            <li><p class="paragraphe">Duo de Marteaux de Silence : ATTAQUE +3 | Dégâts 1d6+3 DM +1d6 DM de vibrations et La cible devient muet pendant un tour.</p></li>
            <li>
              <p class="paragraphe">
                Silence (L) : en frappant les deux marteaux sur une surface en faisant un rythme spécial, une zone de silence entoure la zone sur un rayon de 10m/tour pendant [5+Mod.INT]
                tours.
              </p>
            </li>
            <li>
              <p class="paragraphe">
                Appel des Centaures (Rituel 1min) : en frappant le plat du marteau avec la pointe du deuxième, en respectant un rythme précis, les marteaux envoient un signal d'alerte et
                la localisation du point d'impact à tous les centaures des Terres d'Arran.
              </p>
            </li>
          </ul>
        </div>
