    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>E. Place du Village, Rues et Bains Publics</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">Il n'y a pas de travail à faire sur la place public mais les PJs auront le droit de se promener dans les rues.</p>
            <p class="paragraphe">
              L'observation des Centaures qui s'activent, discutent, font leurs tâches quotidiennes et se réunissent autour de la place est riche d'enseignement sur leurs coutumes, rituels
              et routines. Cette vie au milieu des habitants permettra aussi de se familiariser avec leur langage et leur gestuelle. Certains Centaures, parmi les plus curieux, viennent
              proposer au Personnage des choses à manger, pour leur montrer quelque chose (un oiseau qui se pose sur la montagne, une particularité d'un bâtiment…), pour leur proposer un
              trait d'humour incompréhensif ou simplement pour s'asseoir ou se promener avec lui.
            </p>
            <p class="paragraphe">
              Lors de ces journées oisives, ce sont surtout les jeunes Centaures qui seront intrigués par les intrus. Régulièrement, des gestes ou mots qui semblent insultant voir des
              actes intimidant viendront de quelques Centaures particulièrement mécontents de la présence des aventuriers dans leur village.
            </p>
            <p class="paragraphe">
              Même s'ils ont accès à des petite mares souterraines dans les mines, pouvoir se laver dans le lac est réellement un plaisir. Sur le ponton, ils ont l'occasion aussi de
              nettoyer leurs vêtements. S'ils aident ou s'occupent du nettoyage des tissus ou vêtements pour les Centaures (lavage, pliage, déplacement…), ils pourront progresser dans
              l'estime des Centaures.
            </p>
            <p class="paragraphe">
              Ce balader dans les rues d'Arkanov permet aussi de remarquer les différences entre les villes classiques des Terres d'Arran et le village isolé des centaures. La plupart des
              habitants vivent toute la journée dans les bâtiments de travail ou dans les rues. Les maisons ne servent quasiment qu'à dormir, s'isoler quelques minutes pour une sieste ou
              les moments les plus intimes entre couple ou avec la famille proche. Sans parler du sexe qui se passe caché, la plupart des instants de câlins, d'embrassades ou de
              rapprochements sensuels se passent à la vue de tous. De plus, bien souvent les centaures mâles comme femelles se promène entièrement nus dans les rues sans que cela ne semble
              poser de problèmes à quiconque.
            </p>
            <p class="paragraphe">
              Les centaures font leurs besoins dans les rues et régulièrement les crottins sont ramassés puis apportés au compost. Cela doit être étrange pour les étrangers.
            </p>
            <p class="paragraphe">
              Plusieurs fois par jours, matin, midi ou soir, les aventuriers pourront assister à des scènes de danses et de chants dans les rues ou dans les ateliers du village. Ce peuple
              est très joyeux et il arrive d'un centaure commence un chant traditionnel puis qu'il soit rejoint par un groupe qui peut aller de 3 à plus des 30 centaures qui suivent la
              chanson et se mettent à danser spontanément.
            </p>
            <p class="paragraphe">
              Près du lac, un ponton permet de se baigner facilement dans cette étendue d'eau cristalline animée par les chutes d'eau fraîches venues des hauteurs. C'est également
              l'endroit où le linge est nettoyé et mis à sécher sur des étendoirs. Un petit groupe de centaures se retrouvent pour discuter, ragoter et chanter en lavant le linge du
              village.
            </p>
            <p class="paragraphe"></p>
            <ul>
              <li><p class="paragraphe">CHA-PSY pour essayer de discuter, être aimable, se faire comprendre, nouer des liens…</p></li>
              <li><p class="paragraphe">CHA-FILOU pour faire rire les enfants, faire semblant, manipuler l'opinion…</p></li>
              <li><p class="paragraphe">FOR-COMM pour rouler des mécaniques, montrer qu'on est pas n'importe qui, essayer d'en imposer, paraître fier…</p></li>
            </ul>
          </div>
          <hr />

          <h2>Crottins et Compost :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                En pleine balade dans les rues d'Arkanov, vous remarquez Kaihoroi est en train de ramasser, à l'aide d'une longue pelle plate, les crottins de la communauté. Il remplit une
                brouette pour les amener au compost. Même si ce n'est pas naturel pour les PJs, le centaure, au caractère serviable, serait bien heureux et reconnaissant si on venait
                l'aider dans cette tâche fastidieuse et répétitive.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Coiffure Insouciante :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Après une bonne journée de travail, l'un des Personnages se dirige vers le lac pour une baignade décontractante. A moment de s'immerger, il voit le long du verger la très
                jeune Hunga qui nage autour du lac tranquillement. Elle finit par s'approcher du ponton près du PJ, attrape une brosse à cheveux et attend passivement que le PJ sorte de
                l'eau en l'observant. Lorsqu'il sort de l'eau, elle lui tend la brosse et lui fait comprendre qu'elle souhaiterait qu'il l'a coiffe. Si le PJ refuse, elle restera allongée
                sur le ponton une bonne partie de la nuit les yeux dans le vide. Elle semble toute contente si l'aventurier accepte et elle parlera beaucoup durant le brossage. Des
                villageois regarderont la scène avec ravissement car cette jeune centaure est très timide habituellement.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Plier pour la Communauté :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                En ce dirigeant vers le lac pour récupérer son linge mise à séché, le Personnage remarque l'étendoir remplie de tissus et de linges totalement sec, prêt à être plié. Si le
                PJ, sans incitation, entreprend de plier le linge de la communauté, il sera félicité par Te'Riri qui approchait pour s'en occuper. Conjointe de l'hostile Kaihoko, Te'Riri
                saura valoriser l'intrus du village auprès de son conjoint conservateur.
              </p>
            </li>
          </ul>
        </div>
