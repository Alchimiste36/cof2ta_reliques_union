      content: |-
        <div class="journal-cof2ta-ru">
          <h1>M. Salle Commune, Repos et Méditation</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Dans ce très grand bâtiment, au plafond très haut, la grande majorité du sol est couvert de paille et au centre de la pièce se trouve un grand foyer merveilleusement décoré
              et graver de runes magiques qui permet d'éviter de propager la chaleur trop brutale des braises et flammes et de permettre une combustion automatique du charbon ou du bois.
              Une estrade en pierre taillée est située devant la rampe qui monte dans les étages et permet de s'installer pour raconter les histoires, les contes et les annonces.
            </p>
            <p class="paragraphe">
              Au delà de la porte normale qui donne sur la rue, sur le mur qui donne vers la bibliothèque est installée trois immenses portes en bois ferrées de bandes de métal joliment
              travaillées. Un système de poulies installé sur la hauteur du mur extérieur permet, grâce à une grande manivelle de soulever entièrement les trois lourdes portes pour ouvrir
              sur la cour. Il faut au moins deux centaures pour manipuler la manivelle et c'est un grand honneur. Ils respectent une danse très rythmique lorsqu'il soulèvent ces portes.
            </p>
            <p class="paragraphe"></p>
            <p class="paragraphe">
              Au rez-de-chaussée, un espace au fond, partiellement sous la rampe, est «caché» par des paravents qui permettent à certains Centaures en famille ou entre amis de se retrouver
              plus au calme pendant les soirées. Dans la plupart des cas, c'est dans ce coin de la pièce que les femelles Centaure mettent bas.
            </p>
            <p class="paragraphe">
              Plusieurs types de cérémonies sont faites dans cette pièce. Les naissances, les unions, les rites traditionnels mais aussi des soirées humoristiques, des pièces de théâtre
              proposées par les enfants ou les adultes, la lecture d'histoires vécues ou inventées… Lorsqu'il faut faire une grande cérémonie importante, les portes sont ouvertes et le
              maître de cérémonie s'installe sur le balcon à l'étage de la bibliothèque pour officier.
            </p>
            <p class="paragraphe">
              Que se soit pour des cérémonies traditionnelles ou des soirées plus légères, l'ambiance est toujours agréable et bon enfant. On peut ressentir le trac des participants avant
              la soirée mais sinon ce sont des grands moments de joie et de sourire. Les enfants sont toujours devant l'estrade et donnent de la voix lorsqu'ils connaissent déjà le conte.
              Dans la plupart des cérémonie ou soirées légères, les Centaures participent en tapant du sabot, en répétant ou en applaudissant, par exemple. Si les Héros de la Dame d'Ispier
              jouent le jeu avec les Centaures, ils ne seront jamais moqués mais, au contraire, même les plus conservateurs leur lanceront des regards approbateurs et/ou complices<br />
            </p>
            <ul>
              <li><p class="paragraphe">CHA-FILOU pour participer aux et soirées</p></li>
              <li><p class="paragraphe">INT-CULT.GÉ pour comprendre un peu mieux les rites et coutumes du Village</p></li>
            </ul>
            <ul>
              <li><p class="paragraphe">Premier Étage : Repos et convalescence</p></li>
            </ul>
            <p class="paragraphe">Au premier étage, la pièce est entièrement recouverte d'une paille fraiche, à part le dôme du foyer du RdC.</p>
            <p class="paragraphe">Les villageois peuvent venir ici pour se reposer, prendre du temps pour eux, discuter entre amis ou régler des comptes lors de conflits.</p>

            <p class="paragraphe">Deuxième Étage : Observatoire et Méditation</p>
            <p class="paragraphe">
              Dans l'une des tour du bâtiment, on peut utiliser une longue-vue qui permet d'observer soit les étoiles et le ciel soit les hauteurs des montagnes environnantes. Il y a
              chaque nuit un ou une Centaure dans cette tour ou celle à l'étage de l'atelier de couture.
            </p>
            <p class="paragraphe">
              L'autre tour est une petite pièce très cocooning tapissée de coussins confortables. Les vitraux sont colorées de teintes réconfortantes. Quand on s'installe dans cette pièce,
              les bruits du village sont presque tous étouffés et l'ambiance permet de faire des séances de méditation très appréciables. Une petite clochette en métal permet à un Centaure
              de «réveiller» la personne qui médite.
            </p>
          </div>
          <hr />

          <h2>Une Première Soirée Tendue :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Lors de la première soirée des PJs dans la Salle Commune, Kupu a prévu un spectacle de contes traditionnels. Les Personnages connaissent assez bien la langue pour
                comprendre les grandes lignes de la pièce. Les gestes et grimaces de Kupu permettent aussi de mieux interpréter les mots et expressions. Juste avant le début du spectacles
                lorsque Kaha, Te'Tipu, Kaimoe et Peka entrent dans la pièce, ils semblent offusqués de la présence des intrus dans la salle. Ils commencent à s'énerver sur Kiliko et une
                dispute s'engage devant les grandes portes. Une partie des centaures se mêlent à la joute verbale, certains du côté de Kiliko d'autres prenant le partie de Kaha et Te'Tipu.
                Le reste des centaures semblent intimidés par cette situation et, après quelques hurlements, Peepi et Taiohi se mettent à pleurer. Si les aventuriers décident de quitter la
                pièce et de donner raison à Kaha et son groupe, ses derniers marqueront des points auprès des habitants. Si les PJs restent calmes et soutiennent Kiliko, les centaures
                amicaux envers les PJs seront renforcés par cette décision. Si les Personnages se mêlent en colère ou deviennent violent, ils perdront de la confiance auprès de tous les
                habitants du village.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Héros et Comédiens :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Après plusieurs soirées partagées dans la Salle Commune avec les villageois, les PJs auront l'honneur d'être interpellés par Kupu et Titiro pour leur proposer de jouer dans
                la prochaine pièce de théâtre. Le couple aimerait mettre en scène les enfants et adolescents du village qui vivent des aventures avec les Héros d'Ispier. Ils partent
                ensemble dans les montagnes pour découvrir les dangers du monde. Titiro a déjà des idées de costumes et Kupu explique en détail les scènes et les morales. Si les PJs
                acceptent, ils passeront quelques jours avec le couple de centaures, les plus jeunes habitants pour faire des répétitions. INT-CULT.GÉ DD15 pour bien retenir le texte. Le
                soir de la représentation, tous les habitants sont présents et, à part quelques centaures toujours hostiles, l'excitation est à son comble. CHA-FILOU DD15 ou CHA-PSY DD20.
                Si échoué, la pièce tourne à la comédie moqueuse envers le comédien improvisé. Si réussi, la pièce est un succès et la soirée se termine avec beaucoup de rigolades, de
                gentillesse et de félicitation pour les PJs.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Une Naissance Heureuse :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Les Personnages qui ont développé leur relation avec Kahoroi, Haputanga, Vaiata, Peepi ou Taiohi seront invités à assister au poulinage d'Haputanga dans l'espace intimiste
                de la Salla Commune. Ils seront aux côtés de Kara et Te'Wikitoria, les soigneuses, Kaihoroi, le conjoint, Taitamariki, le petit frère, les enfants Taiohi et Peepi, Kaimoe,
                la maman et Harikoa pour donner des antidouleurs si nécessaire. Le moment est extrêmement touchant et joyeux. Des larmes coulent, des chants sont entonnés, des embrassades
                sont faites et le poulain femelle semble en pleine forme. Si l'un des PJ a établit une bonne relation avec Haputanga, elle lui proposera de choisir le prénom du petit
                poulain mâle fraîchement né sinon il s'appellera : Te'Ao (le monde).
              </p>
            </li>
          </ul>
          <hr />

          <h2>Une Honorable Surveillance :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                A la fin de la Phase 2, Kiliko proposera au PJ le plus apprécié par Kiliko, Wakaweti ou Toa de monter la garde dans l'une des tours d'observation du village (dans la Salle
                Commune ou dessus de l'atelier de couture). C'est un grand honneur mais surtout une grande responsabilité. Ils faut observer les hauteurs de la montagnes et avertir le
                village si une menace approchent (Atarangi Kino, bête sauvage…). CONSTIT DD10 puis CONSTIT DD12 puis CONSTIT DD15. Si les trois tests sont réussi le PJ reste réveillé, à
                son poste et focalisé sur sa tâche. Si le Personnage échoue l'un des tests, il peut soit prévenir qu'il est trop fatigué, demander une relève ou essayé de résister à la
                fatigue. CONSTIT DD20. S'il réussi, il ne s'endort pas de suite et poursuit la séquence des trois premiers tests. S'il échoue, il s'endort à son poste causant de lourdes
                remontrances envers son manque de responsabilité envers le village.
              </p>
            </li>
          </ul>
        </div>
