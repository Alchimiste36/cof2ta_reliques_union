  - sort: 1800000
    name: 'Q : le Coeur d''Arkanov'
    type: text
    _id: IeiOoPvxliVcuC3Y
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Q. Le Cœur d'Arkanov</h1>
          <div class="description">
            <h2>Description :</h2>
            <ul>
              <li><p class="paragraphe">Scierie et Menuiserie</p></li>
            </ul>
            <p class="paragraphe">C'est certainement le plus important bâtiment du village d'Arkanov. Le cœur d'activité du village, là où la salle commune est le cœur populaire.</p>
            <p class="paragraphe">
              Ce bâtiment est relié directement à l'immense roue à eau installée sous la cascade. La plupart de la machinerie est installée dans ce bâtiment et se connecte à toutes les
              machines qui permettent de réaliser le travail du village.
            </p>
            <p class="paragraphe">
              Dans cette grande pièce du RdC, on s'occupe des troncs, des branches, des grumes et des planches venant de la forêt intérieure et extérieure. Les troncs sont entreposés à
              l'extérieur près du lac et, au besoin, sont passés par la large ouverture dans le mur afin d'être débités sur le banc de coupe actionné par les engrenages et les cordes. Un
              centaure seul peut transformer un tronc en poutre ou en planches en quelques heures grâce à des systèmes de palans et de treuilles. Ensuite, les planches ou poutres sont
              entreposées et mises à sécher ou elles sont mises en œuvre pour la fabrication des meubles, des structures, des charpentes…
            </p>
            <p class="paragraphe">
              Les outils y sont rangés méticuleusement dans des caisses afin d'être facilement déplaçable en même temps que le chantier (haches, doloires, ciseaux, règles, compas…).
              L'atelier est très propre à tout moment du jour comme de la nuit et Kamura est très exigeante sur l'entretien du banc de scie et des rouages de la machine. On trouve dans le
              scierie le plus souvent les deux frères conservateurs Te'Tipu et Kaihoko ainsi que le calme Itu. Kamura vérifie les réalisations et supervise l'utilisation des machines.
            </p>
            <hr />

            <ul>
              <li><p class="paragraphe">Meunerie, Pressoir, Tisseranderie et Machinerie</p></li>
            </ul>
            <p class="paragraphe">
              En montant la large rampe en colimaçon menant au premier étage, on arrive dans une immense pièce tout en longueur. Dans un des coins, on voit une immense meule qui permet de
              transformer les grains en farine. Elle aussi reliée à la machinerie de la cascade, on peut la faire tourner à trois vitesses différentes pour optimiser la finesse de la
              farine. Bien que nettoyée régulièrement, une fine pellicule blanche est présente sur chaque bout de bois et chaque pièce de métal dans cette partie de la pièce.
            </p>
            <p class="paragraphe">
              Derrière la rampe, un pressoir est installé pour extraire le jus des fruits, légumes et plantes diverses qui servent pour la cuisine, pour être transformé dans l'alambic,
              servir à aromatiser les bougies, réaliser des colorants pour les tissus ou encore pour la préparation des remèdes. Ce pressoir est relié également à la machinerie avec un
              ingénieux système qui permet de réaliser une très forte pression mais aussi de soulever le poids rapidement et sans effort.
            </p>
            <p class="paragraphe">
              Le long couloir mène à la tisseranderie et de chaque côté on parcours un chemin au milieu des tissus qui sont étendus pour sécher après leur teinture ou qui attendent d'être
              assemblé les uns avec les autres pour réaliser des vêtements, des draperies, des rembourrages de meubles… On trouve des tissus de toutes les couleurs et de toutes les
              compositions (laines d'animaux chassés dans les montagnes, cuirs, lins ou chanvres venant du jardin). Les couleurs sont issus de plantes tinctoriales triées et sélectionnées.
              La tisseuse fabriquée au fond de la pièce est une merveille de finesse et de fluidité. On peut voir les fils être assemblées lignes après lignes avec la possibilité
              d'intercaler plusieurs types de fils et plusieurs couleurs pour réaliser des étoffes multicolores et décorées. Le bruit «tchik tchik tchik» à chaque passage crée un rythme
              qui incite à danser.
            </p>
            <p class="paragraphe">
              Enfin, derrière les parois proches de la rampe, on peut accéder à la gigantesque machine d'Arkanov afin de réaliser l'entretien, changer une pièce ou tout simplement pour
              déconnecter telle ou telle machine lorsque l'on doit y faire une maintenance. Les courroies, les engrenages de plusieurs mètres de diamètre, le cordage qui décuple la force
              ou la vitesse, les rouages qui transmettent le mouvement vers les machines ou les autres bâtiments feraient rougir un nains du temple devant cette conception. Il est assez
              complexe de s'y retrouver dans se méli-mélo de coudes et cordes et c'est la raison pour laquelle Miihini et Aroha laisse peu de personnes s'occuper de cette complexité.
              Miihini raconte souvent le démontage complet et le remontage effectué il y a trois ans pour changer un des engrenages principaux. Elle est fière de cette semaine menée d'une
              main de maître grâce à l'aide de la plupart des villageois.
            </p>
            <hr />

            <ul>
              <li><p class="paragraphe">Corderie et Filanderie</p></li>
            </ul>
            <p class="paragraphe">
              La rampe dans le couloir nous mène au deuxième étage, là où sont fabriqués cordes, cordages et fils de tous les diamètres et dans toutes les matières. Les sacs et bottes de
              chanvre, de lin ou de laine sont montés ici et seront patiemment filés en fils pour coudre ou tisser et en solides cordes pour toutes les utilisations du village (transport
              des troncs, raccordement des machines aux poulies…). Un banc à filer parcourt tout le couloir pour torsader les cordages et au fond de la pièce, on peut utiliser le grand
              rouet à filer qui est actionné par les sabots du Centaure. Des étagères sont positionnées sur la plupart des murs pour stocker les bobines de fils, les rouleaux de cordes,
              les sacs de matières premières ainsi que les outils pour utiliser les machines et pour les entretenir.
            </p>
            <p class="paragraphe">
              A cet étage, on trouve souvent Kaimoe qui s'occupe de filer la laine, de colorer les fils ou de trier les bobines. Elle ne parle pas beaucoup et on vient rarement la
              perturber à cet étage. Elle aime être tranquille loin de Te'Tipu son agressif conjoint. Derrière le bruit de la machinerie, on peut percevoir ses sanglots. Lorsqu'un autre
              villageois a besoin de ces machines, elle s'éclipse rapidement dans un autre coin isolé du village.
            </p>
            <p class="paragraphe">
              Il faut beaucoup de confiance pour visiter et travailler dans ce bâtiment. La machinerie principale et chaque réalisation installées ici sont très précieuses voir vitales
              pour le village. Les Personnages seront observés les premiers jours où on leur permettra de travailler sur les différentes machines, pour leur sécurité mais aussi pour la
              sécurité des machines.
            </p>
            <p class="paragraphe">
              Si un héros fait du mauvais travail et surtout s'il bloque une machine, il recevra les remontrances de Tumuaki et de Kamura mais pourra recevoir le soutien de Miihini ou de
              Aroha.
            </p>
            <ul>
              <li><p class="paragraphe">FOR-ATHL pour utiliser les travaux physiques ou d'endurance</p></li>
              <li><p class="paragraphe">DEX-AGIL pour utiliser les travaux de précision</p></li>
            </ul>
          </div>
          <hr />

          <h2>Un engrenage qui casse :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Dans la scierie, en voulant déplacer une longue planche de bois venant juste d'être débitée, le Personnage tape par mégarde dans les engrenages qui actionnent la machine.
                Un terrible bruit mécanique se fait entendre et la machine s'arrête. Aroha, à l'étage, descend la rampe au galop et après un temps d'arrêt devant les dégâts, elle s'agite
                et s'énerve. En fonction de la réaction du PJ, faites CHA-PSY DD15 pour expliquer calmement, CHA-FILOU DD15 pour raconter un bobard ou FOR-COMM DD20 pour imposer sa vision
                de la situation à Aroha. Dans tous les cas, le Personnage sera mis à contribution pour réparer la machine mais s'il échoue, Aroha l'engueulera sans ménagement et en cas de
                réussite, la situation s'apaise et Aroha comprendra les arguments de l'aventurier. Quelques instants plus tard, Miihini et Tumuaki arriveront dans la scierie. Le PJ aura le
                soutien ou non d'Aroha et passera une bonne ou une horrible soirée face à cet incident.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Des pleurs, un désespoir :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Teina demande à un des Personnages s'il peut l'aider à plier les longues bandes de tissus de la tisseranderie. Maintenant qu'ils sont secs être deux pour les plier et les
                ranger ferait gagner énormément de temps. Si le PJ acceptent, Teina l'amènera dans le long couloir du premier étage du bâtiment. En arrivant en haut de la rampe, ils
                entendent des sanglots au dessus d'eux. Teina semble bouleversée. Elle explique que c'est Kaimoe, la conjointe de Te'Tipu qui passe son temps dans la corderie. Personne ne
                sait vraiment pourquoi elle est si triste et repliée sur elle-même. Teina se doute que c'est à cause de son agressif conjoint. Teina demande au PJ d'aller lui parler et la
                soutenir. Si le PJ accepte, il découvrira Kaimoe positionnée sur le rouet à filer. Elle est surprise par la présence de l'aventurier. Elle est sur la défensive. CHA-PSY
                DD20 pour essayé de l'apaiser et de comprendre pourquoi elle pleure. Si réussi, Kaimoe accordera sa confiance rapidement à cet intrus sans trop savoir pourquoi. Elle
                expliquera que son conjoint est parfois violent avec elle. Elle est soutenue par sa fille Haputanga mais son fils, Taitamariki, est très perturbé par les agissements de son
                père. Elle a peur de lui et de ses réactions. CHA-FILOU DD25 pour lui changer les esprits avec des «blagues» ou des phrases rassurantes. Si réussi, Kaimoe arrête de pleurer
                et elle arrive même à sourire et rigoler des traits d'humour du PJ. FOR-COMM DD10 pour imposer son autorité et lui intimer de se calmer. Si réussi, Kaimoe arrêtera
                rapidement de pleurer, se donnera une lourde gifle sur la joue et reprendra son travail dans le silence quelques larmes encore sur les joues. Kaimoe sera définitivement
                fermée pour la plupart des PJs craignant leur autorité. Si le PJ arrive à calmer et à sympatiser avec Kaimoe, elle descendra avec lui et ils plieront, avec Teina, les
                tissus dans une joyeuse ambiance.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Joyeuse famille au pressoir :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Le PJ est abordé par le professeur Kaiako en fin de journée. Toute sa famille s'occupe de la récolte des Waina le lendemain. Les fruits du Hewaina sont de petites grappes
                sucrées et très rafraîchissantes qu'ils doivent récolter, nettoyer, transporter, presser et mettre en tonneau. C'est une tâche plutôt festive mais physique. Si le PJ
                accepte, il se retrouvera au petit matin en compagnie de Kaiako, Toa, Teina, Harikoa, Te'Whakama ainsi que Vaiata venue aider ses amis. DEX-AGIL DD10 pour la récolte.
                SAG-SURVI DD10 pour le nettoyage. FOR-ATHL DD15 pour le transport et le pressage. DEX-AGIL DD10 pour la mise en tonneau. La famille échange les tâche tout au long de la
                journée afin de pouvoir discuter, rigoler, chanter et danser avec chaque centaure. L'ambiance est très agréable et à chaque fois que l'aventurier rate un test, des
                moqueries sympathiques feront rire toute la famille. Il est bien tard quand la tâche est terminée. Tout le monde est épuisé et Toa sort une bouteille est terre cuite,
                scellée à la cire et la débouche. Elle contient une délicieuse liqueur de Waina aromatisée aux herbes par Harikoa. La soirée est merveilleuse entourée par cette charmante
                famille.
              </p>
            </li>
          </ul>
        </div>
