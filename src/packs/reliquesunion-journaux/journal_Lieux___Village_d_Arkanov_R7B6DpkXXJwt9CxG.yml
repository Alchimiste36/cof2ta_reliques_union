  - sort: 1700000
    name: 'P : Gestion de l''artisanat - Sculpture'
    type: text
    _id: vv6fVlGxk0YXLq8F
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>P. Gestion des Artisanat et Sculpture</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Il n'y a pas grand chose au RdC. Quelques caisses de matériaux ou d'outils, un long bac remplie de sciure et surtout un table remplie de document et carnets de notes. C'est
              ici que se concentre les informations pour les différents artisans. Lorsqu'il y a une demande ou un problème, lorsqu'un villageois décide de s'occuper d'une tâche ou, par
              exemple, l'endroit où on a placé telle pièce ou matériel.
            </p>
            <p class="paragraphe">
              On peut y croiser souvent la cheffe du village, Tumuaki, venant inspecter si le travail avance, Kamura la responsable des fabrications ou encore Kaiwhakairo regardant s'il y
              a moyen de rendre service en répondant à telle ou telle demande mais aussi car il passe beaucoup de temps et de longues nuits dans l'atelier de sculpture du premier étage.
            </p>
            <p class="paragraphe">
              Rien qu'en montant la rampe, on commence à sentir la sciure et cette légère odeur du bois que l'on travaille. En arrivant dans cette pièce, on découvre un sol recouvert de
              copeaux, bout de bois et poussières. Sur le très grand établi, de nombreux outils sont disposés sur un côté, des grands tiroirs sont remplis et une multitude de pièces de
              bois sont posées partout. Sous l'épaisse planche de travail, une espèce de tabouret rembourré permet au centaure de se poser pour pouvoir travailler pendant de longues
              heures.
            </p>
            <p class="paragraphe">
              Sur la table, on trouve des jouets pour les enfants, des façades de meubles qui attendent d'être gravés, des manches d'outils à adapter ou encore des boutons et autres objets
              servant tous les jours au village. Dans cette pièce, on entend en continu le ronronnement et les légères vibrations de la machinerie qui est fixée sur l'un des murs. Ça fait
              le même effet qu'un chat posé sur les genoux une froide nuit d'hiver.
            </p>
            <p class="paragraphe">Kaiwhakairo passe la plupart de son temps dans l'atelier de sculpture. Il aime graver, poncer, décorer et personnaliser les objets du quotidien.</p>
            <p class="paragraphe">
              Au RdC, il est assez rare qu'on ai besoin des aventuriers mais on pourra leur demander d'aller vérifier des quantités, des dimensions ou des plans de fabrication. Ce qui est
              bien avec les documents techniques c'est que, même sans parler la langue, un travailleur sera reconnaitre un plan d'un autre.
            </p>
            <ul>
              <li><p class="paragraphe">INT-CULT.GÉ pour comprendre les plans et les quantités</p></li>
            </ul>
            <p class="paragraphe">
              Dans l'atelier de Sculpture, les Personnages peuvent être amenés à décorer, ajuster, créer de petits objets, adapter un manche d'outils… Tout se travail nécessite agilité,
              patience et calme pour être réalisé.
            </p>
            <ul>
              <li><p class="paragraphe">DEX-AGIL pour les tâches de sculpture</p></li>
            </ul>
          </div>
          <hr />

          <h2>Multitâche :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Si un Personnage ne sait pas quoi faire de ses dix doigts, il se fait aborder par Kamura. Elle l'amène au RdC de ce bâtiment et lui montre une liste. Elle demande au PJ de
                s'occuper de ces multiples petites tâches à réaliser pour la communauté (réparer un tiroir, ranger les outils de la forge, nettoyer les tubes en verre de la fabrication de
                bougies, faire l'inventaire des planches de la scierie, plier et rouler les tissus secs dans la tisseranderie…). DEX-AGIL DD15 + INT-CULT.GÉ DD15 + FOR-ATHL DD10. Si le PJ
                réussi les trois tests, il exécute les tâches correctement et obtiendra les remerciement de plusieurs villageois. Si le PJ rate certains tests, il n'est pas bien efficace
                mais au bout de deux jours de travail, il arrive a venir péniblement à bout de cette liste.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Soirée légende familiale :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Le Personnage a passer une bonne après-midi de travail dans l'atelier de sculpture. Il n'a pas fini son travail mais il entend monter la rampe plusieurs bruits de sabots.
                Kaiwhakairo, Kara, Vaiata, Peepi et Taiohi arrivent, grands sourires, dans l'atelier. Après avoir saluer le PJ, Kara lui explique qu'ils veulent faire une soirée
                discussions, contes et histoires tous ensemble. Ils semblent exités à l'idée que le PJ participe lui aussi. Si l'aventurier accepte, tous les centaures présents sont super
                contents. CHA-PSY DD10 pour interagir avec la famille et CHA-FILOU DD15 pour raconter des histoires captivantes, humoristiques ou personnelles. Pendant toute la soirée,
                Kaiwhakairo sculptera de petits objets. Ce moment familiale et intimiste permet de nouer des liens forts avec ce groupe de centaures.
              </p>
            </li>
          </ul>
        </div>
