  - sort: 400000
    name: 'C : Potager - Champs - Verger  Compost'
    type: text
    _id: 13YUedrBxZY1CUBb
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>C. Compost, Potager, Verger</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Entouré par le lac et la forêt, on trouve toute une zone pour cultiver la nourriture et les plantes médicinales et aromatiques pour le village. Une petite zone de culture en
              ligne pour des céréales et des graines, une partie assez luxuriante avec de nombreux légumes et petits arbustes fruitiers, un verger contenant plusieurs espèces d'arbres et,
              le long du lac, une zone de compost où sont déposer les déchets de cuisine, les crottins des centaures et les rebuts des artisans (copeaux, sciures, vieux tissus…), les
              feuilles mortes…
            </p>
            <p class="paragraphe">
              Il faut régulièrement retourner le compost, l'amender, le mouiller en ouvrant une partie du mur entre le lac et le compost ou l'assécher. Une petite zone du compost permet de
              récupérer des insectes qui y vivent afin de les griller pour les manger ou les préparer pour la fabrication de remèdes.
            </p>
            <p class="paragraphe">Le potager, à première vue, semble assez anarchique mais tout y est à sa place et chaque plante y pousse en harmonie avec ses voisines.</p>
            <p class="paragraphe">
              Le grand bâtiment sert à entreposer les outils de jardinage mais également pour conserver les légumes et les plantes, pour faire sécher certaines denrées et pour y entreposer
              les graines, tubercules et autres sachets de pollens.
            </p>
            <p class="paragraphe">
              Désherber, planter, faucher, retourner la terre, récupérer des fleurs ou des graines, cueillir les légumes, nettoyer les allées et surtout s'occuper du compost et des
              crottins de Centaures, il y toujours de quoi faire.
            </p>
            <p class="paragraphe"></p>
            <p class="paragraphe">SAG-SURVI pour s'occuper des plantes</p>
            <ul>
              <li><p class="paragraphe">FOR-ATHL pour s'occuper du compost et des tâches physiques (désherbage, labour…)</p></li>
            </ul>
            <p class="paragraphe">
              Quasiment tous les jours, en fin de matinée, les jeunes Centaures s'amusent et se chamaillent dans cette zone où il est facile d'engager un cache-cache ou profiter d'une
              baignade rafraîchissante. Vaiata n'hésite pas à faire des bêtises avec Taiohi et Peepi, les deux petits de Kaihoko et Hapunga.
            </p>
          </div>
          <hr />

          <h2>Inspection Méprisante :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Alors que le PJ travaille dans le jardin potager et le verger, Tumuaki, la cheffe du village, conjointe de Kiliko, arrive pour inspecter le travail de l'intrus. Avec son
                regard froid, ses manières fermées et ses paroles incompréhensibles mais sans aucun doute méprisantes, Tumuaki fait passer un mauvais moment au Personnage. A voir comment
                ce dernier réagira pour apaiser ou aggraver la situation.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Attaque Ludique :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Le Personnage récolte quelques fruits dans les branches des arbres fruités du verger lorsque deux enfants centaures se mettent à courir dans sa direction en criant. Taiohi
                et Peepi sont poursuivis par Vaiata qui porte un masque représentant une sorte de loup. Les deux enfants se cachent dans les hautes céréales de la petite parcelle de champs
                tandis que Vaiata s'approche en imitant les grognements d'une bête sauvage, les deux bras levés et avec une démarche saccadée. Se retrouvant entre le «prédateur» et ses
                «proies», le PJ va-t-il sauver les deux enfants dans cette partie de jeu ? CHA-FILOU DD10 pour participer à cette pièce de théâtre improvisée de façon naturelle.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Travaille d'Orfèvrerie Végétale :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Le PJ est en train de désherber quelques rangées de légumes dans le potager lorsque Harikoa s'approche directement de lui avec une petit pot dans la main. La jeune centaure
                au regard pétillant lui demande de l'aide. Le Personnage doit récolter de toutes petites graines au centre de belles fleurs orangées. Les graines sont minuscules et, après
                la récolte, il faut les écraser délicatement entre ses doigts pour retirer la fine pellicule autour d'elle. Elle montre au PJ comment faire et lui indique qu'il doit
                remplir le pot entièrement. Harikoa félicitera le PJ grandement quand il aura fini. DEX-AGIL DD15 pour faire du bon boulot.
              </p>
            </li>
          </ul>
        </div>
