  - sort: 2000000
    name: 'S : Grotte de cérémonie'
    type: text
    _id: LBVEFbLnueNeTXNF
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>S. Grotte de Cérémonie</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Bien que les Personnage est déjà été amené visiter cette immense grotte façonnée dans la montagne, c'est un grand honneur pour eux quand ils sont invités à assister à une des
              cérémonies qui s'y produit.
            </p>
            <p class="paragraphe">
              La pièce creusée possède cinq piliers merveilleusement ouvragés, un autel en pierre de taille d'où s'élève un pupitre et, par dessus tout, une fresque gigantesque qui
              recouvre toute la paroi du fond.
            </p>
            <p class="paragraphe">
              Sur cette fresque sculptée à même la roche, on peut voir des scène de vie d'un village de Centaures. Les représentations sont d'une finesse rare et on peut reconnaitre chaque
              élément de la vie quotidienne. Une représentation de la machine d'Arkanov est positionnée au centre de la fresque et chaque partie du tableau est connectée aux pièces de la
              machinerie complexe, donnant presque l'impression que c'est cette mécanique qui a créer la vie du village.
            </p>
            <p class="paragraphe">Les Centaures du village regardent encore tous cette fresque avec un respect non dissimulé et une certaine mélancolie ou peut-être même une tristesse.</p>
            <p class="paragraphe">
              Une chose que les aventuriers remarquent assez vite : les lampes qui éclairent la grotte de cérémonie sont exactement les mêmes que celle présentes dans le Temple du Val
              Rouge. Elles sont réglées pour s'allumer au moment où une personne rentre dans la grotte.
            </p>
          </div>
          <hr />

          <h2>Une Union Magnifique :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Harikoa et Roa'Tane veulent unir officiellement leur passion devant les habitants du village. Les PJs sont bien entendu conviés à ce grand moment. Si un des Personnages à
                développé de bonnes relations avec Harikoa, elle lui demandera de participer à la cérémonie. La soirée se déroule dans la Grotte de cérémonie, décorée en conséquence
                (fanions colorés, bouquets de fleurs, bannières en tissu…). Tout le village est rassemblé dans la grande salle dont les lanternes éclairent sans fumée les murs en pierres
                sombres. Après quelques minutes de discutions, rigolade et bonne ambiance, Kiliko monte sur l'estrade et frappe de son sabot un gond installé au centre de la fresque. Tous
                les centaures se mettent à battre la mesure de leur sabots. L'entrée d'Harikoa et de Roa'Tane est très rythmée et leur danse est sensuelle. Ils se séparent et tournent
                autour des habitants pour monter sur l'estrade de chaque côté. Kiliko prononce un discours sur la passion, l'amour, les valeurs de la famille et le pouvoir des liens.
                Ensuite, il attrape une main des futurs conjoints et appelle les «créateurs de liens». Kaiako s'approche de Roa'Tane, portant un grand tissu entre ses mains et Hei Tunu (ou
                un PJ qui a sympathisé avec Harikoa) fait la même chose vers Harikoa. Les pièces de tissu sont drapés sur les nouveaux conjoints, tourné autour de leur bras et noués
                ensemble au niveau de leurs mains. A cette instant, l'intégralité des habitants commencent une danse et un chant joyeux et intense. La fête peut commencer et durera toute
                la nuit pour la majorité des villageois. Une rotation de centaures sera faite au niveau des deux tours d'observation du village. Les PJs remarquent certains villageois qui
                consomment des feuilles de Mohio (voir p.155???).
              </p>
            </li>
          </ul>
          <hr />

          <h2>Départ du Doyen :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Au milieu d'une après-midi, alors que les PJs sont occupés, la cloche du village résonne. Quatre coups rapides et, à part le bruit des machines et de la cascade, tous les
                sons du village s'arrêtent. Les centaures sortent des bâtiments le visage fermé ou étonné. Les villageois qui sont avec les PJs leur expliquent qu'un centaure est mort. En
                ce dirigeant vers la grotte de cérémonie, les Personnage retrouvent tous les habitants sauf Kaha, Kiliko et Kara. La plupart des centaures semblent tristes malgré quelques
                sourires tendres aux lèvres. Quelques instants après, Kara arrive dans la grotte, suivi de Kaha et Kiliko qui portent entre eux, sur une civière tressée, le corps sans vie
                de Karekau, le père de Kaha. Tous les centaures se rapprochent les uns après les autres, touchent le corps de Karekau et certains déposant une fleur, une feuille ou une
                baie sur la civière. Durant une heure environ, des chansons, tantôt tristes tantôt joyeuses, sont initiées par l'un des petits enfants ou arrière-petits-enfants de Karekau.
                De nombreuses embrassades, contes d'anecdotes et chants plus tard, Kiliko et Kaha soulèvent la civière et se dirigent vers la zone du compost dans un silence presque total.
                A l'aide de presque tous les centaures d'Arkanov munis de pelles, le tas de compost est aplani, une couche de feuilles et de fleurs est étalée et le corps du doyen du
                village est déposé en son centre. A cette instant, Te'Whakama commence une chanson rapide et complexe et tout le village se met à danser. Chacun leur tour, tous les
                habitants vont recouvrir le corps avec le compost. Cette dernière chanson est plutôt joyeuse, les villageois semblent heureux, soutenu par la forte voix de Te'Whakama.
                Après cette cérémonie incroyable, le village semble reprendre sa vie normale rapidement. Dans les jours qui suivent, beaucoup d'histoires, d'anecdotes et de blagues seront
                faites, le soir, sur la vie de Karekau.
              </p>
            </li>
          </ul>
        </div>
