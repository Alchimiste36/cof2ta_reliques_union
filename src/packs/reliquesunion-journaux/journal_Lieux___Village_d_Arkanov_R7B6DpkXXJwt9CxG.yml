  - sort: 1300000
    name: 'L : Murailles - Salles d''entrainement'
    type: text
    _id: fqQEw5YAUk6zHgZm
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>L. Murailles et Entraînement Martial</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Le mur d'enceinte d'Arkanov est très grand avec ses longs couloirs et ses tours de chaque côté. Dans ces pièces de nombreux objets militaires sont stockés. Spécialisés dans
              l'utilisation des armes d'hast, les centaures sont, pour la plupart, formés à tous les types d'armes. Tous les adultes s'entraînent régulièrement même si certains Centaures
              talentueux sont devenus maître de l'art du combat et des danses de conflit.
            </p>
            <p class="paragraphe">
              Tous les jours, on peut croiser Wakaweti, le fils du chef du village, ainsi que sa conjointe Karekau dans les murailles pour l'entretien de l'équipement ou pour des
              entraînements intensifs. Toa, la maître d'arme du village, passe aussi beaucoup de temps dans ces pièces pour entrainer les habitants et surtout les plus jeunes.
            </p>
            <p class="paragraphe">
              Autant pour les entraînements physiques et la maitrise des armes, les aventuriers ne seront pas trop perdus par rapport à leur vie passée mais lorsqu'on leur explique, montre
              et apprend les bases des danses de conflit les choses se compliquent. Les rythmes, les pas, les gestes sont d'une complexité phénoménale et d'une précision chirurgicale. Il
              faudrait plus d'une vie pour apprendre à maîtriser l'une des danses du conflit et surtout avoir 4 sabots à la place des bottes .<br />
            </p>
            <ul>
              <li><p class="paragraphe">ATT-CONTACT ou ATT-DIST pour les entraînements martiaux</p></li>
              <li><p class="paragraphe">FOR-ATHL pour les exercices physiques</p></li>
              <li><p class="paragraphe">SAG-SURVI pour l'entretien des armes</p></li>
            </ul>
          </div>
          <hr />

          <h2>Entraînement Commun :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Afin de renforcer sa musculature et sa résistance, le PJ s'entraîne au RdC d'une des tours de la muraille. Il enchaîne les manœuvres de puissance avec des exercices
                d'assouplissement et continue par des frappes lourdes sur les mannequins d'entraînement. Il gravit de multiples fois les rampes pour monter dans les étages en courant et ne
                fait des pauses que pour boire et essuyer la sueur de son visage. Après une heure d'entraînement, le Personnage est surpris par Maamaa qui l'observe dans l'encadrement de
                la porte. Elle est là pour s'entraîner également et surtout sa souplesse comme à peu près tous les jours. Elle fait un signe d de tête au PJ et attrape des gants
                matelassés, les enfile, et se positionne devant l'aventurier les deux bras tendus, l'invitant à frapper dans les gants. Maamaa est d'une rare rapidité et souplesse et
                permet au PJ de développer ses réflexes et son cardio. ATT-CONTACT DD15 ou FOR-ATHL DD20. Si le PJ échoue, Maamaa lui fera comprendre qu'elle l'attendra tous les après-midi
                après la distribution des repas pour poursuivre l'entraînement avec elle. Si le PJ réussi, elle est impressionnée et invitera le PJ pour d'autres séances d'entraînement
                plus intensive dès le lendemain. Les phases d'entraînement avec Maamaa sont très agréable bien et les conversations viennent compléter la sueur et l'effort.
              </p>
            </li>
          </ul>
          <hr />

          <h2>La Danse du Chef :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Un Personnage, voulant s'entraîner rapidement avant d'aller se coucher, entre dans les murailles et entend immédiatement des bruits rythmés de sabots au premier étage de la
                tour Ouest. En montant la rampe, il voit Kiliko en train d'exécuter une danse de combat méditative au centre de la pièce, les yeux fermés. Il fait des gestes précis et
                rapides, mêlant puissance dans l'impact et fluidité dans les enchaînements. Ce moment est comme sorti du temps tellement la danse est enivrante pour le PJ qui observe. A la
                fin de la danse, au moment où Kiliko ouvre les yeux, il voit le PJ. En fonction de la réaction du Personnage, le chef du village proposera à l'aventurier de lui expliquer
                les gestes de cette danse permettant de se concentrer et de décharger son stress. DEX-AGIL DD20. Si le PJ réussi, il parvient à reproduire assez bien la danse et Kiliko le
                gratifie pour cette performance. Si le PJ échoue, Kiliko est amusé et incite le Personnage a continuer ses efforts pour la danse mais aussi au sein du village. Dans tous
                les cas Kiliko discutera quelques minutes avec le Personnage pour lui expliquer qu'il est déchiré entre son plaisir de découvrir de nouvelles têtes étrangères et sa
                nécessité de protéger le village et de maintenir une cohésion du groupe.
              </p>
            </li>
          </ul>
          <hr />

          <h2>Concours de Tir à l'Arc :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                En fin de Phase 2, pour les PJs à l'aise avec l'utilisation des arcs ou des arbalètes, Toa, la maître d'arme du village, vient les trouver un soir pour leur proposer de
                participer à un concours de tir à l'arc organisé tous les ans. Les PJs qui acceptent sont attendu dans une semaine sur la place publique à l'aube. Le village ne parle que
                de cet événement durant toute la semaine et on peut voir certains centaure s'entraîner ou fabriquer leur propres flèches ou améliorer leur arc. Lorsque le concours
                commence, les PJs sont en concurrence avec 7 centaures munis de leurs arcs et flèches. Le concours se déroule en plusieurs manches et le PJ ne peut utiliser qu'un seul
                Point de Chance durant toute la compétition. Le Personnage a deux essais par manche. Pour la première manche, ATT-DIST DD5. A chaque manche le Degré de Difficulté augmente
                de 5 points. Les centaures lancent ATT-DIST deux fois par manche également. Le but du PJ tenir le plus de manche et si possible être le dernier archer dans le concours. Si
                le Personnage atteint le podium, les habitants du village sont impressionnés. Si le personnage est premier, le village propose de tatouer le symbole du chasseur au
                Personnage sur l'avant-bras droit. Un honneur immense pour leur culture. Si le PJ est parvenu à une bonne place, ce concours lui ouvrira les portes de la Phase 3.
              </p>
            </li>
          </ul>
          <ul>
            <li><p class="paragraphe">Participants :</p></li>
            <ul>
              <li><p class="paragraphe">Ka'Huri : ATT-DIST +14</p></li>
              <li><p class="paragraphe">Kai : ATT-DIST +13</p></li>
              <li><p class="paragraphe">Kamura : ATT-DIST +12</p></li>
              <li><p class="paragraphe">Kaiputu : ATT-DIST +11</p></li>
              <li><p class="paragraphe">Maamaa : ATT-DIST +10</p></li>
              <li><p class="paragraphe">Te'Wikitoria : ATT-DIST +9</p></li>
              <li><p class="paragraphe">Kaiako :ATT-DIST +8</p></li>
            </ul>
          </ul>
          <hr />

          <h2>Combats Démonstratifs :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Pendant qu'un PJ qui s'entraîne au combat au Corps à Corps, au premier étage d'une des tours de la muraille, De bon matin, il est interrompu par le couple Toa et Wakaweti
                venu, eux aussi, pour s'entraîner. Ils proposent au Personnage une séance de combats démonstratifs. Sans vouloir se blesser, les deux centaures souhaitent, tout de même,
                des combats intenses, à un contre un. Il est possible de jouer le combat de façon classique en convertissant tous les dégâts létaux en non-létaux ou juste quelques test
                d'<span>ATT-CONTACT</span> vs ATT-CONTACT de Wakaweti ou Toa. Si le PJ emporte le combat, le centaure vaincu et son conjoint en parlera pendant de nombreux jours. Si le PJ
                est battu, le couple de centaures rigolera avec le Personnage et ils lui proposeront de continuer des entraînements régulièrement.
              </p>
            </li>
          </ul>
        </div>
