  - sort: 300000
    name: 'B : Forêt intérieure'
    type: text
    _id: fh429wTzMRKO8X4G
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>B. Forêt Intérieure - Bûcheronnage</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Au sein du village d'Arkanov, on peut trouver une parcelle de forêt avec des arbres étranges qui poussent le long de la paroi Nord aux abords des murailles.
            </p>
            <p class="paragraphe">
              Forêt assez dense, certains arbres sont coupés à la base par les centaures régulièrement pour fabriquer des outils, des structures et des équipements. Chaque partie de
              l'arbre est utilisée :
            </p>
            <ul>
              <li>
                <p class="paragraphe">
                  Le bois pour des structures très résistantes. Il est possible de tordre les troncs en les laissant se gorger d'eau en les trempant dans le lac pendant plusieurs semaines.
                  L'essence de bois est assez lourde, pratiquement imputrescible mais il est assez dur à travailler.
                </p>
              </li>
              <li><p class="paragraphe">Les brindilles pour la fabrication de charbons qui se consume lentement, des manches d'outils ou des meubles ou autres objets usuels.</p></li>
              <li>
                <p class="paragraphe">
                  Les feuilles sont très larges et fibreuses ce qui permet le filage de fils ou de cordes. Grâce à ces fibres on peut fabriquer tissus, nappes, couvertures de fumage…
                </p>
              </li>
              <li>
                <p class="paragraphe">
                  Les graines ne sont pas très nutritives mais elles sont utilisées pour la fabrication de baumes ou de cataplasmes et servent également à la fabrication d'un alcool assez
                  fort et tannique lorsqu'elles sont torréfiées et fermentées.
                </p>
              </li>
              <li>
                <p class="paragraphe">
                  Les racines, lorsqu'elles sont mâchées, permettent de résoudre des problèmes de digestion ou des crampes d'estomac. Réduite en poudre, les racines sont la base de
                  certains breuvage ou baumes.
                </p>
              </li>
              <li>
                <p class="paragraphe">
                  La sève, au printemps, est récupérée grâce à des petites saignées faites dans l'écorce. Il est comestible et permet de réalisé des boissons alcoolisées ou non.
                </p>
              </li>
            </ul>
            <p class="paragraphe"></p>
            <p class="paragraphe">
              Lorsque les Personnages vont travailler dans la Forêt Intérieure, les Centaures leur fourniront des haches d'abattage très bien affûtées et ils seront surveillés à chaque
              instant. D'une part pour vérifier leurs agissements et d'autre part pour vérifier s'ils font un travail de qualité. Les arbres d'Arkanov sont une ressource fondamentale pour
              le village et il ne faudrait pas la gâcher en tranchant l'arbre au mauvaise endroit ou de la mauvaise manière ni piétiner les jeunes pousses.
            </p>
            <ul>
              <li><p class="paragraphe">FOR-ATHL pour couper, débiter, soulever, transporter…</p></li>
              <li><p class="paragraphe">DEX-AGIL pour s'occuper de l'écorce, des racines, des brindilles et des feuilles.</p></li>
            </ul>
            <p class="paragraphe">
              C'est un travail long, fastidieux et dangereux mais chaque journée de travail semble ravir tous les Centaures même les plus agressifs. Par contre, si le Personnage
              n'entreprend pas un travail de qualité avec le soin adéquat, il se fera réprimander voir plus en fonction de sa réaction.
            </p>
            <p class="paragraphe">
              La présence fréquente, dans la Forêt Intérieure, de Kaha et ses deux fils, Te'Tipu et Kaihoko ne rend pas non plus le travail très sympathique. Dès les premières minutes de
              bûcheronnage, ils seront assez agressifs et désagréable avec ceux qu'ils considèrent comme des intrus et des menaces.
            </p>
          </div>
          <hr />

          <h2>Tension Accidentelle :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Le ou les Personnages coupent des branches et récupèrent des feuilles dans la forêt intérieur non loin de Te'Tipu et Kaihoko qui s'occupent de couper un arbre sur pied.
                L'ambiance est détestable et les deux centaures sont hargneux envers les intrus du village. Au moment de tomber, l'arbre dévie et se retrouve sur les pattes arrières de
                Kaihoko bloqué. Le ou les PJs pourront aider Te'Tipu a soulever le tronc puis amener le blessé aux bons soins de Kara. Même si cet événement n'adoucira pas Te'Tipu, son
                frère sera reconnaissant pour l'aide des Personnages.
              </p>
            </li>
          </ul>
          <hr />
          <h2>Impressionnant Travail :</h2>
          <ul>
            <li>
              <p class="paragraphe">
                Sur une réussite critique ou avec un test élevé, le PJ passe une journée au travail dans la forêt intérieur, soit à couper des arbres soit à s'occuper des branches,
                écorces, feuilles… Il fait un boulot extraordinaire et la plupart des centaures en entendront parler rapidement.
              </p>
            </li>
          </ul>
        </div>
