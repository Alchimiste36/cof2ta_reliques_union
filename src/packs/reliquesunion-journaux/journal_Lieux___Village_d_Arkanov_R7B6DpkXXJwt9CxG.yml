  - sort: 1600000
    name: 'O : Apothicaire, médecine et herboriste'
    type: text
    _id: 5wcCUOCIIg6eaYVd
    system: {}
    title:
      show: false
      level: 1
    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>O. Apothicaire, Médecin et Herboriste</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Avant d'être autorisé à aider et travailler dans ce bâtiment, certains des aventuriers ont pu déjà découvrir les lieux. A chaque fois qu'un personnage est blessé de façon
              significative, il sera amené aux bons soins de Kara pour le rafistoler. Il est très rare qu'une autre personne s'occupe des blessés même si le professeur Kaiako a les
              connaissances sur le sujet.
            </p>
            <p class="paragraphe">La porte est en permanence fermée à clef car certains produits sont toxiques et il y a aussi des drogues potentiellement dangereuses dans ce bâtiment.</p>
            <p class="paragraphe">
              Dans cette pièce, les meubles sont rangées au cordeau. Tout y est à sa place et chaque chose à une place précise. De nombreuses étagères et des dizaines de tiroirs renferment
              tout le nécessaire pour soigner les Centaures du village. Des outils, des produits (baumes, potions, pommades, infusions, graines ou alcools), des attelles, des bandages… et
              aussi de nombreux ouvrages sur l'anatomie, la toxicité des végétaux ou animaux, les différentes maladies connues…, les Personnages pourraient passer plusieurs semaines rien
              que dans cette pièce sans tout découvrir.
            </p>
            <p class="paragraphe">
              Un grand miroir sous l'escalier permet d'ausculter les blessés et deux grands tableaux représentent des Centaures en pleine forme, tous leurs muscles et articulations bien
              prononcées. Un tonneau est remplie d'une eau limpide permettant de nettoyer les outils, ses mains ou d'humidifier les bandages.
            </p>
            <p class="paragraphe"></p>
            <p class="paragraphe">
              Cette pièce est utilisé par Kara comme espace de soins psychologiques et d'écoute pour les habitants du village. Kara est secondée par la rayonnante Te'Wikitoria qui apprend
              avec patience et attention.
            </p>
            <p class="paragraphe">
              Dans la pièce du premier étage, baignée d'une lumière filtrée par des très beaux vitraux de multiples couleurs, on trouve des bacs de cultures de plantes en tous genres
              (fleurs, champignons, herbes, aromatiques…) ainsi qu'une table avec le nécessaire pour découper, ciseler, piler, trier, nettoyer… tous les végétaux et de la mélanger ou
              laisser macérer dans certaines huiles. Un bassin est directement relié à la nappe phréatique et permet de récupérer une eau fraiche et pure pour la préparation des breuvages
              et autres potions.
            </p>
            <p class="paragraphe">L'objet le plus important de cette pièce, c'est l'Orbe disposée sur un joli piédestal en bronze. De cette Orbe émane une puissante énergie magique.</p>
            <p class="paragraphe">
              Pour atteindre l'étage, il faudra avoir une très bonne confiance avec Kara pour qu'elle accepte de leur faire découvrir son atelier de préparation des soins et surtout la
              présence de l'Orbe Élémentaire.
            </p>
            <p class="paragraphe">
              Les Personnages pourront être mise à contribution pour aider à soigner des blessés ou aider Kara à ranger ou nettoyer son cabinet. Ils pourront aider au premier étage à la
              préparation des potions, soins, baumes…
            </p>
            <p class="paragraphe"></p>
            <ul>
              <li><p class="paragraphe">DEX-AGIL ou SAG-SURVI pour les tâches du RdC et de l'étage</p></li>
              <li><p class="paragraphe">INT-ARCA pour analyser, comprendre et, même, utiliser l'Orbe Élémentaire</p></li>
            </ul>
          </div>
          <hr />

          <h2>Interrogatoire sur la Relique :</h2>
          <p class="paragraphe">
            A chaque fois qu'un Personnage est blessé ou malade, il sera amené dans le domaine de Kara, la soigneuse. Assisté de Te'Wikitoria, Kara prendra un grand soin des aventuriers
            qui en ressentent le besoin. Dès qu'ils comprendront un peu plus la langue des centaures, Kara jouera aussi le rôle de psychologue. Le porteur du Bracelet de l'Union s'est
            blessé à la main. En l'oscultant, Kara remarque les marques ressemblant à des scarifications sur les avants-bras du Porteur. Elle sera intriguée et posera beaucoup de
            questions. CHA-PSY DD15 pour être honnête ou CHA-FILOU DD20 pour mentir ou déformer la réalité.
          </p>
          <hr />

          <h2>Alchimie amateur :</h2>
          <p class="paragraphe">
            Avec un PJ de confiance, Kara lui proposera d'aider Te'Wikitoria pour préparer des mixtures et des onguents. Positionné à l'étage, le PJ passera un bon moment avec l'assistante
            de Kara en coupant, ciselant, écrasant, pesant ou encore mélangeant de nombreuses plantes pour fabriquer différentes recettes. DEX-AGIL DD15 ou SAG-SURVI DD15 pour réaliser les
            préparations. Si l'aventurier possède une ou plusieurs Voies Mystiques, il devrait être intrigué par l'Orbe Élémentaire. INT-ARCA DD20 pour étudier l'Orbe Élémentaire. CHA-PSY
            DD20 pour questionner Te'Wikitoria ou Kara sur l'Orbe Élémentaire.
          </p>
          <hr />

          <h2>Drogue sénior :</h2>
          <p class="paragraphe">
            Poauau, l'ancien chef du village, père de Kiliko, propose, en fin de journée, à un ou plusieurs PJs, d'expérimenter le feuille de Mohio. Ce genre de tabac est une drogue
            permettant de se détendre et, si on en fume beaucoup, d'avoir des sensations étranges. Hallucinations féériques, impression de flotter ou de voler et, même, des rêves
            d'aventures plus vrais que nature, les centaures consomment de temps en temps cette substance et surtout les anciens du village, comme Poauau et Karekau. FOR-ATHL DD15 ou
            FOR-COMM DD20 pour garder ses esprits.
          </p>
          <p class="paragraphe">
            Kara voit la scène de «détente» du PJ et de Poauau et approche au trot pour sermonner le vieux centaure. Elle explique au PJ que les feuilles de Mohio sont addictive et qu'il
            doit, après chaque absorption mâcher un bout de racine de Kaora pour ne pas développer une addiction forte au Mohio. Elle part et revient rapidement avec un petit bout de bois
            craquelé qu'elle donne au Personnage pour qu'il le mâche.
          </p>
          <hr />

          <div>
            <p class="paragraphe">l'Orbe Élémentaire</p>
            <p class="paragraphe">
              Cette sphère, d'environ 30cm de diamètre, a été façonnée avec une sorte de cristal bleuâtre, striée de veines argentées. L'Orbe Éléméntaire est parcouru d'une lueur bleuté.
              On ressent les vibrations magique de l'objet sans aucune difficulté même si on n'est pas rompu aux Arcanes des Terres d'Arran.
            </p>
            <p class="paragraphe">
              Lorsque l'on touche l'Orbe à certains endroits, il est possible de faire varier la température de la pièce, le dégrée d'humidité et la ventilation (runes de feu, d'air et
              d'eau).
            </p>
            <p class="paragraphe">Portée des effets : de 0m à 250m (+10m /min)</p>
            <p class="paragraphe">Température : de -60°C à +90°C (+/-20°C /min)</p>
            <p class="paragraphe">Humidité dans l'air : de 0% à 100% (+/-20% /min)</p>
            <p class="paragraphe">Ventilation : de 0km/h à 250km/h (+/-50km/h /min)</p>
            <p class="paragraphe">
              L'utilisation de l'Orbe Élémentaire est très dangereuse quand on voit les plages de modification des éléments possible. Imaginez les dégâts que l'Orbe Élémentaire pourraient
              faire sur le village si elle était mal utilisée.
            </p>
            <p class="paragraphe">L'Orbe Élémentaire peut être déplacée grâce à une sacoche en cuir spéciale permettant de bloquer ses effets.</p>
            <p class="paragraphe">
              Lors de circonstances climatiques majeures et durables, les Centaures peuvent décider de «réguler» le climat du village pour ne pas perdre les récoltes ou ne pas risquer la
              mort de certains habitants (canicules, froid intense, tempête…).
            </p>
          </div>
          <div>
            <p class="paragraphe">Feuille de Mohio</p>
            <p class="paragraphe">Ce tabac à fumer est une drogue récréative ayant plusieurs effets en fonction de la quantité absorbée.</p>
            <p class="paragraphe">
              A faible dose, elle permet de se détendre, agit comme un déstressant. Certains centaures prétendent que fumer de petites quantité de Mohio leur permet d'être plus concentré
              dans leur travail.
            </p>
            <p class="paragraphe">
              A plus forte dose, les sensations sont diverses. Somnifère pour certains, hallucinations merveilleuses pour d'autres ou encore sensation de planer ou de voler, les centaures
              l'utilisent souvent pour faire des rêves magnifiques ou passer des soirées psychédéliques. Lors de fortes douleurs, la consommation du Mohio permet de calmer et d'anesthésier
              le patient pendant l'opération et la convalescence.
            </p>
            <p class="paragraphe">
              La consommation des feuilles de Mohio est addictive rapidement. A chaque utilisation, le consommateur à 10% de chance d'être addicte par dose consommée. Ce risque augmente de
              10% à chaque nouvelle utilisation.
            </p>
            <p class="paragraphe">
              Le sevrage est très long et désagréable. L'ancien consommateur voudra désespérément consommer du Mohio. Il ressent un manque profond, tremble, ne peut quasiment plus rien
              faire et son esprit est brouillé par son envie de fumer des feuilles à nouveau. L'individu doit réussir cinq tests consécutifs pour se sevrer du Mohio. Il lance 1D100 par
              jour de sevrage et il a 1% de chance de réussir (+1% par jour de sevrage total). La consommation d'une seule dose de Mohio remet les chances de se sevrer à 0.
            </p>
            <p class="paragraphe">Racine de Kaora</p>
            <p class="paragraphe">
              Le masticage de Racine de Kaora, récupérées sur les arbres de la Forêt Intérieure, permet de remettre à 0 le risque de dépendance. Si le consommateur est déjà dépendant au
              Mohio, le Kaora n'a pas d'effet. Si l'individu est en sevrage, le masticage quotidien de Racine de Kaora permet de tripler les pourcentages de chance de réussite.
            </p>
          </div>
        </div>
