      content: "<p><em>04 décémuirn 8373 après le Grand Schisme</em></p><p>En ces dernières heures du dénouement de la grande et belle Cité-Forge d’Hyrr’Tarënn, mes pensées sont enfin apaisées. Mes démons semblent se taire alors que la mort approche de mes paupières.</p><p class=\"MsoNormal\">Ma femme a succombé il y a un an exactement, à la folie qui a touché la cité bien des années auparavant. Elle repose, avec le reste de mon amour dans notre jardin, entouré des couleurs florales qu’elle aimait tant.</p><p class=\"MsoNormal\">Les ombres de mon esprit se calment à mesure que j’écris ces lignes.</p><p class=\"MsoNormal\">Suite au départ de la dernière famille Pierre Dure, grands nobles du Talion, Hyrr’Tarënn fût fermée définitivement. Les années de violences, de haine, de peurs et de cauchemars ont été éprouvantes. En quelques mois, la plupart des habitants ont désertés ou se sont foutu sur le renifloir pour des broutilles parfois jusqu’au crime barbare et absurde.</p><p class=\"MsoNormal\">La flamboyance de la Cité-Forge bascula dans les ténèbres à cause d’une simple erreur de ma chère et si dévouée Timalda. Alors que mon aïeul, le grand roi Abadar, fit d’Hyrr’Tarënn l’une des plus belles cités du peuple nain durant presque trois siècles, il a fallu quelques lunes pour que tout bascule à l’ouverture du traité par ma femme. Alors que la haute prêtresse d’Yjdad Enam, fondatrice de l’Ordre de l’Union, déposait les bottes au cœur du tourbillon, Timalda posa ses yeux sur le Traité maudit. Quelques années plus tard, dans le secret de tous, elle consulta quelques pages de ce Traité oublié du peuple nain. Elle m’avoua, avant de partir pour son dernier voyage, avoir agi sur un coup de tête dans l’unique but de trouver une solution pour poursuivre la longue lignée des rois d’Hyrr’Tarënn, descendants d’Yjdad. Tant de malheurs déversés pour une simple émotion égoïste et un désir d’enfant intense.</p><p class=\"MsoNormal\">Les forces démoniaques, tout droit sorties du joufflu de Hej, ont déferlées en quelques semaines sur une partie des habitants. Tensions, hargne, cupidité, jalousie et violence, tout cela pour quelques lignes d’un Traité ancien.</p><p class=\"MsoNormal\">Aurais-je du bruler le Traité\_? Qui suis-je pour prendre une telle responsabilité\_? La destruction du Traité aurait-il fait disparaitre Dax’Ax’Revm, le mangeur de rêves ou l’aurait-il renforcé\_?</p><p class=\"MsoNormal\">Tant de questions dans les ténèbres.</p><p class=\"MsoNormal\">Alors que la Cité-Forge d’Hyrr’Tarënn sera totalement désertées à ma mort, j’aurais voulu exprimer des regrets ou des excuses. Justifier haut et fort nos actes. Je constate juste que notre culture ambitieuse et structurée autour de figures fortes pousse même les plus fervents amoureux du Père et de la Mère à commettre de tristes erreurs égoïstes.</p><p class=\"MsoNormal\">Fasciné par l’or et les richesses, le Traité est bien dissimulé. A mon sens, n’est pas né le nain en haillons qui reculera, tête baissée, devant le trésor accumulé de la belle et prestigieuse Cité-Forge d’Hyrr’Tarënn, joyau du grand Abadar, descendant d’Yjdad.</p><p class=\"MsoNormal\">Après ces derniers mots, afin de déposer la bague des rois dans le cœur froid et triste d’Hyrr’Tarënn, sous la protection du Héros de l’Ordre du Bouclier, ma main sur le manche de la hache du seigneur de bataille de l’Ordre de la Forge, je commencerais par toucher le compas du Maitre de l’Ordre du Temple pour enfin embrasser l’éclat de l’émeraude du bouton du Gardien de l’Ordre du Talion.</p><p class=\"MsoNormal\">Je rejoins la valeureuse Timalda ce soir. Nous retournons à l’argile pour les prochains millénaires.</p><p class=\"MsoNormal\">Okdar, dernier roi d’Hyrr’Tarënn, responsable de sa chute</p>"
