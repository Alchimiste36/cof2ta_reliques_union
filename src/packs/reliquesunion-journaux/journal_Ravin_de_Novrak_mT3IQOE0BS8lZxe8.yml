      content: >-
        <div class="arran-mod"><p>Ville de près de 550 habitants en grande
        partie constituée d’humain (70%) et de nains (23%). On peut y croiser
        quelques Peaux Vertes (7%) mais pour trouver un elfe il va falloir se
        lever tôt.</p><p><strong>Le climat très rustique et froid du Ravin de
        Novrak et surtout le manque de luminosité donne à cette ville des
        aspects austères et les habitants ont souvent le teint pâle et des
        marques du climat rude sur le visage et dans les
        postures.</strong></p><p>Dans ce village, bien organisé, les caravanes
        et les voyageurs de passages sont toujours tolérés mais <strong>la
        frontière est particulièrement opaque entre les habitants et les gens de
        passage.</strong> Faire sa vie au milieu de ces habitants revient à être
        un étranger toute sa vie, même si, de temps à autre, on peut trouver des
        mariages entre un migrant d’Est ou de l’Ouest et un Novrak ou une
        Novraki.</p><p><strong>L’économie et les échanges se font très
        majoritairement avec les Marches du Venkor et sa capitale Kosland grâce
        à la rivière qui traverse la ville et qui prend sa source un peu plus
        haut dans les sommets.</strong> Cette rivière descend jusqu’à la rivière
        « <strong>Mordra</strong> » et permet le transport de marchandises dans
        de petites embarcations assez particulières nommée par les Novrak «
        <strong>barque à bras</strong> », de la ville vers les zones plus
        civilisées en évitant les marécages et les périples présents dans cette
        zone de la Birkanie. Arrivée le plus au Sud du Fleuve « Mordra »,
        <strong>une grande et belle cité fortifiée, « Mordian », permet découler
        les marchandises</strong> et de faire le plein des denrées
        essentiellement alimentaires dont à besoin les habitants du Ravin de
        Novrak. Ensuite, <strong>les « embarcations » sont tirées hors de l’eau
        et deviennent de charrettes tractables par un cheval ou deux à quatre
        hommes</strong> pour retourner dans les chemins de montagnes. Très
        maniables, les « barques à bras » sont un atout jalousement gardé par la
        ville tant sur sa conception que sur son utilisation.</p><p>Les produits
        phares du Village et qui s’exportent vers les Marches du Venkor
        essentiellement sont du <strong>cuir de haute qualité venant des
        bouquetins de Novrak</strong> (une espèce rustique et locale),
        <strong>les distillats de résines des conifères</strong> de la montagne
        ainsi que <strong>quelques plantes rares</strong> du coin et bien sur
        les autres produit des montagnes environnantes (<strong>minerais, blocs
        de roches, bois de résineux</strong>…).</p><p>La position du Ravin de
        Novrak lui <strong>permet aussi de monétiser un certain nombre
        d’informations stratégiques entre le grand Ouest et les régions à l’Est
        des montagnes des Crocs d’Acier</strong> (bandes de Peaux Vertes en
        mouvement, actualités, changement de gouvernement de différentes grandes
        cités éloignées). Ainsi, <strong>la plupart des commerçants et des
        nobles de la ville posent énormément de questions aux voyageurs et
        marchands passant par la ville</strong> afin de récupérer les
        informations importantes pour les vendre ensuite au plus
        offrant.</p><p><strong>Le Ravin de Novrak est rarement attaqué par les
        tribus de Peaux Vertes</strong> qui peuvent vivre dans les montagnes ou
        en Birkanie car depuis plusieurs années, <strong>les habitants stoppent
        et libèrent les caravanes d’esclavagistes</strong> qui mettent à sac des
        tribus d’Orcs ou de Gobelins pour revendre des Peaux Vertes dans
        l’Ourann. Sans être officiel, les Orcs et Gobelins ont un certain
        respect pour ces habitants.</p><p>Il est, depuis quelques dizaines
        d’années, assez risqué d’aller dans les montagnes aux alentours de la
        ville sans une forte présence de protection. <strong>De nombreuses
        disparitions ont été signalées dès qu’on s’aventure dans les
        hauteurs</strong> ou que l’on prend ses distances à la recherche de
        plantes ou pour pouvoir chasser. Les éleveurs de bouquetins de Novrak
        redoutent toute l’année d’amener leurs bêtes dans des pâturages au
        risque de ne pas revenir au village. L’exploration des montagnes est de
        par nature assez dangereuse mais <strong>depuis des années les « Ombres
        Blanches » assassinent et kidnappent les imprudents</strong> faisant du
        hors piste.</p><p></p><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Arbosk.Mieili.de.la.Tour.de.Mabeuil.jpg"
        width="150" /><p>Seigneur local : <span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Arbosk Mieili de la Tour de
        Mabeuil</span></strong></span> et son épouse Veronia.</p><p>Le père du
        seigneur Mieili, <strong>Arbosk’char, est encore très influent dans la
        ville</strong>. Les <strong>trois fils et deux filles du seigneur (entre
        15 ans et 37 ans) ont chacun une place dans la gestion de la
        ville</strong>. <strong>Le seigneur est respecté</strong> par la
        population même si certains lui reproche son inaction, sa passivité et
        son manque de changement ou d’ambition. <strong>Huit familles de
        nobles</strong> se partagent les intérêts de la ville et différents
        points de sa gestion. Il y a peu de conflit car chacun a sa place et son
        rôle. A chaque décès de seigneur, des tensions et des luttes de pouvoir
        apparaissent sans changer fondamentalement le quotidien des habitants.
        Politiquement parlant <strong>seul trois sujets secouent la tranquillité
        traditionnelle</strong> de la ville : <span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">le racisme envers les anciennes
        races</span></strong></span> tout droit venu des Marches du Venkor et
        s’essaimant petit à petit dans la ville, <span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">le désir de certains de faire
        prospérer la ville</span></strong></span> alors que d’autres préfèrent
        ne rien changer et enfin, <span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">les problèmes des « Ombres Blanches »
        et de la sécurité des montagnes</span></strong></span>. Sur ce dernier
        sujet certains veulent reprendre le pouvoir sur la montagne en faisant
        venir une armée de guerriers pour éradiquer cette menace une bonne fois
        pour toute tandis que d’autres parlent de l’esprit de la montagne et de
        ne pas aggraver la situation en amplifiant l’influence des humains sur
        l’équilibre des énergies de la montagne.</p><p><strong>La grande
        majorité des sujets de discussion dans les auberges, les tavernes ou les
        étales de marché tourneront autour de ces trois sujets.</strong> Les
        habitants sont pour la plupart des gens simples mais durs au premier
        abord. Ils poseront, surtout les commerçants, marchands et nobles, des
        questions au groupe d’aventuriers sur ce qu’il se passe au-delà des
        montagnes et après quelques instants, une majorité des habitants
        répondront aux questions des PJs.</p><p></p><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Au Ravin de Novrak, on peut trouver
        :</span></strong></span></p><ul><li><p><strong>Un château faisant office
        aussi de temple de Solima et d’Yjdad et de place forte en cas
        d’attaque</strong>. Les deux temples (humain et nain) sont bien séparés
        mais de mémoire c’est surement la seule ville qui accueille dans le même
        bâtiment les deux croyances.</p></li><li><p><strong>Quelques auberges ou
        tavernes</strong> plus ou moins chics</p></li><li><p><strong>De nombreux
        artisans</strong> de la vie de tous les jours (forgeron, orfèvre,
        tisserands, scieurs et menuisiers…)
        <strong>@UUID[JournalEntry.BoNGgNod3GGBvA3G]{Artisans de
        Novrak}</strong></p></li><li><p><strong>Des artisans spécialisés dans
        les produits à exporter</strong> (minerais, blocs de roches,
        distillation de résines ou de plantes de montagne, éleveur de bêtes,
        fabricant de cuir de haute qualité…)</p></li><li><p><strong>Des
        bordels</strong> et maisons closes</p></li><li><p><strong>Une grande
        place du marché</strong> non loin du château avec des étales bien
        fournis</p></li><li><p><strong>Une</strong> <strong>école spécialisée
        dans les recherches sur la géologie, la faune et la flore de
        montagne</strong>.</p></li><li><p><strong>Un petit amphithéâtre</strong>
        où sont organisé des tournois, des animations culturelles et des procès
        régulièrement.</p></li><li><p>Une bâtisse gérée par <strong>la Guilde
        des Jongleurs</strong> (assez rare pour être noté).</p></li><li><p>Même
        si c’est dur d’avoir l’information, au sein du château et su temple, on
        peut trouver dans cette ville <strong>un groupe d’exorcistes</strong>
        (deux humains et un nain du temple).</p></li><li><p>Une bâtisse fait
        office <strong>d’hôpital, d’herboristerie et de
        vétérinaire</strong></p></li><li><p>Connu seulement des connaisseurs,
        <strong>un ancien nain du Bouclier possède un magasin et une belle
        collection d’objets traditionnels</strong> de différentes cultures
        (Objets magiques nains mais aussi Elfique, humain et quelques pièces
        Peaux Vertes)</p></li><li><p>Totalement caché, on peut trouver, dans
        certains souterrains de la ville, <strong>une bande de voleurs assez
        grande</strong> pour qu’on puisse la qualifier de
        Guilde.</p></li></ul></div>
