    text:
      format: 1
      content: "<h3>Réflexion du conseil de la Forteresse-Etat d’Arkar’um\_:</h3><p>(la date n’est pas précisée)</p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\"><strong>Le territoire sacrée des Orcs, Ongbirn’Arr.</strong></p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">Cette zone perdue à l’Est du Pays des Vents, dans les Hauts Plateaux, est redoutable et dangereuse. Rare sont les nains ou les hommes qui s’y aventurent.</p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">Barbares, violents et désorganisés, les clans Orcs semblent s’unir lorsqu’ils sont sur ces terres sacrées. On peut douter que seules les traditions, les rites et la sacralité des lieux expliquent cette union entre les Orcs et même quelques gobelins ou les aberrations que l’on voit de temps en temps.</p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">Ils sont trop bêtes et violents pour s’unir sur ces terres. Un secret bien gardé par les chefs de tribus se cache derrière cette situation. Il est trop dangereux d’envoyer des enquêteurs dans la vallée des Khans mais il serait bon, aux responsables de la forteresse-état d’Arkar’um, en lien avec les autres citadelles naines, d’interroger les prisonniers Orcs à ce sujet et de profiter des campagnes d’exploration pour investiguer sur ce lieu.</p><p></p><p><span style=\"font-family:'Calibri','sans-serif'\"><em>Demande et rapport effectué par le capitaine de la garde du Bouclier, Orbarar, lors de la campagne de pacification des flancs Ouest des Hauts Plateaux.</em></span></p>"
