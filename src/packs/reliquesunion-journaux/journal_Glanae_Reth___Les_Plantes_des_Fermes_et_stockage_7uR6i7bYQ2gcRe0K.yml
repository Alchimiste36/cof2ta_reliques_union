          AuIA51OGOBASIbwc:
            folder: mwZqms4s1lPjWHbK
            name: Plantes des Souterrains
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/04.ICONES/ICONES%20de%20Base/CONSOMMABLES/CHAMPIGNONS/cluster-red-brown.webp
            _id: AuIA51OGOBASIbwc
            system:
              key: ''
              description: >-
                <p>Dans la grande ferme souteraine de la cit&eacute; de
                Glanae'Reth, les esclaves kidnapp&eacute;s faisaient pousser et
                entretenaient des parcelles de plantes pouvant vivre dans
                l'obscurit&eacute; des grottes.</p>

                <p>&nbsp;</p>

                <p>Certaines vari&eacute;t&eacute;s sont parfaitement connues de
                tout bon explorateurs mais certaines esp&egrave;ces sont
                &eacute;tranges voirs inconnues.</p>

                <p>Champignons de plusieurs formes et couleurs, lianes &agrave;
                &eacute;pines ou sans, plantes &agrave; feuilles multicolores...
                la vari&eacute;t&eacute; est grande.</p>

                <p>La majorit&eacute; des plantes servent &agrave; la
                consommation mais certaines sont plu&ocirc;t utiliser pour
                fabriquer des produits alchimiques ou d'autres produits.</p>

                <p>La grande majorit&eacute; des plantes peuvent &ecirc;tre
                conserv&eacute;es par s&eacute;chage mais il est peu proble de
                pouvoir cultiver ces plantes dans un autres environnement que
                des grottes sombres, humides et fraiches comme les fermes de
                Glanae'Reth.</p>
