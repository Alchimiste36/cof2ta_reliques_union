    text:
      format: 1
      content: "<h3>Résumé de plusieurs récits provenant de la bibliothèque d’Orkadia\_:</h3><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">Gabrel était le seigneur humain d’une ville des Marches du Venkor à la frontière des Rocs Exsangues.</p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">A partir de 8215 après le Grand Schisme, il dilapida la fortune de la ville en quelques années. De nombreuses familles sont parties vers Kosland et Alberich tandis qu’un bon tiers des habitants sont partis avec lui vers les Montagnes, laissant la ville à la merci des brigands et des bandes de pillards.</p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\">Le seigneur d’Alberich démonta la majeure partie de la ville du seigneur Gabrel pour étendre et développer sa cité.</p><p>Nul n'entendit parler de Gabrel après son départ dans les montagnes. Les premières suppositions disent qu'il serait tomber dans une sorte de secte inconnue.</p>"
