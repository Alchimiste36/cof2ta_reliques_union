  - sort: 448438
    name: École Rosna
    type: text
    _id: pLJyv8IGuN0DMDN2
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/lavoise/lavoise_ecole_rosna1.webp\" width=\"200\" height=\"200\" /><p>Située sur l'une des collines de Lavoise, cette propriété est accessible seulement par le chemin qui serpente entre la ville et le mur d'enceinte de l'Ecole.</p><p>De l'extérieur, les bâtiments ne semblent pas particuliers mais dès qu'on passe les portes des fortifications, on distingue un lieux calme, très bien décoré et fleuri. Les bâtiments sont grands et bien entretenus.</p><p>Les portes extérieurs sont fermées tous les soirs et ouvertes tous les matins. Quiconque peut monter jusqu'à l'Ecole Rosna et accéder à la cour mais, sans raison, ils seront raccompagnés rapidement à la porte.\_</p><p>La bâtisse principale est immense et c'est la seule accessible aux personnes extérieures après les avoir laissé entrer. Les autres bâtiments ont plusieurs utilités mais peu de personne y sont déjà entré. On distingue de temps à autre, des gardes qui circulent d'un bâtiment à un autres, des cuisiniers ou serviteurs également.\_</p><p>Dans l'édifice principal, ce trouve un hall d'entrée assez cosi, une salle de réception bien aménagée, une grande bibliothèque aux étagères très hautes, plusieurs salles de classe ou d'étude, un réfectoire et un espace sanitaire.</p><p>Le grand escalier mène à plusieurs chambres, salle de repos ou encore une salle d'observation avec une magnifique longue-vue permettant d'observer à plusieurs kilomètres de distance à 360° quasiment.</p><p>Dans presque chaque pièce, un oeil observateur trouvera des petites lucarnes d'observation et des portes dissimulées et sécurisées. Régulièrement, les \"invités\" sont observés avec minutie par des gardes qui peuvent atteindre toutes les parties du rez-de-chaussée par des couloirs cachés. Au dessus des larges bibliothèques entourant la salle de réception et le hall d'entrée, des mezzanines sont accessibles par les gardes et, du bas, on distingue des arbalètes installées tout autour. Il est presque impossible de savoir si on est observer ou non lorsqu'on se trouve au Rez-de-Chaussée de l'Ecole.\_</p>"
