        style="text-align:center"><span style="font-family:Arial"><strong>Il y a
        1367 ans</strong></span></p></td></tr></tbody></table><p
        class="MsoNormal">Fermeture définitive de la Cité-Forge après le départ
        de la dernière famille noble, le clan Pierre Dure. Seul reste Okdar (126
        ans), sa femme Timalda, le frère du roi Raktar, cinq gardes personnels,
        le cuisinier de la famille et, enfin, Farlum, le jeune nain orphelin
        recueilli par la famille royale après la première fausse couche de
        Timalda.</p><p class="MsoNormal" style="tab-stops:right 16.0cm">Cinq ans
        plus tard, le dernier habitant de la cité, le roi Okdar meurt après
        avoir déposé la bague des Rois dans le coeur d'Hyrr'Tarënn.</p>
