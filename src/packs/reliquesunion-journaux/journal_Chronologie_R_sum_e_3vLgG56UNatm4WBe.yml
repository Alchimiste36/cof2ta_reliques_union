        CA</strong></span></p></td><td><p style="text-align:center"><span
        style="font-family:Arial"><strong>Il y a 2157
        ans</strong></span></p></td></tr></tbody></table><p>Un groupe de cinq
        personnalités, de cinq espèces différentes, influence de nombreux
        peuples et tribus pour éviter les guerres, les conflits et créer des
        liens de partage et de fraternités.</p><p>Le terme <strong>Les Cinq
        Doigts de l'Union est inventé</strong>.</p><table><tbody><tr><td><p>Une
        elfe : Faïlass</p></td><td><p>Une Naine : Tissra</p></td><td><p>Un Orc :
        Darrag</p></td></tr><tr><td><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/main_des_cinq/main_des_cinq_failass_elfes.webp"
        width="100" height="100" /></td><td><img
