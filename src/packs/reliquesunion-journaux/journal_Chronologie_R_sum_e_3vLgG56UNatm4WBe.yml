        AGS</strong></span></p></td><td><p style="text-align:center"><span
        style="font-family:Arial"><strong>-994 CA</strong></span></p></td><td><p
        style="text-align:center"><span style="font-family:Arial"><strong>Il y a
        1702 ans</strong></span></p></td></tr></tbody></table><p
        class="MsoNormal">Début des travaux de construction du Cœur
        d’Hyrr’Tarënn, du Tourbillon et des Jardins Royaux ainsi que de
        nombreuses explorations des mines Sud-Ouest.</p><p>A la fin des travaux,
        la haute prêtresse d’Yjdad Enam, fondatrice de l’Ordre de l’Union déposa
        au sein du Tourbillon la Botte de l'Union et Timalda, la femme du roi,
        découvre la présence du Traité de la Matière et de l'Ether.</p><p>Cet
        événement signe l'arrivée quelques années plus tard de démon Mangeur des
        Rêves Dax'Ax'Revm et la chute de la puissante et rayonnante Cité-Forge
        d'Hyrr'Tarënn.</p>
