        src="modules/cof2ta_reliques_union/assets/ru_acteurs/main_des_cinq/main_des_cinq_darrag_peaux_vertes.webp"
        width="100" height="100" /></td></tr><tr><td><p>Une Centaure :
        Tuatahi</p></td><td><p>Un Humain :
        Sura</p></td><td><p></p></td></tr><tr><td><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/main_des_cinq/main_des_cinq_centaures_total.webp"
        width="100" height="100" /></td><td><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/main_des_cinq/main_des_cinq_sura_humains.webp"
        width="100" height="100"
        /></td><td><p></p></td></tr></tbody></table><p></p><p></p><p></p><p></p><p></p><p></p><p></p>
