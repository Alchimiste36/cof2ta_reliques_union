        1029 ans</strong></span></p></td></tr></tbody></table><p><strong>Après
        un long procès pour de multiples accusations</strong> (tortures,
        destruction de lieux sacrés, meurtres avec préméditation, expériences
        sur personnes vivantes…), <strong>Ramell fut emprisonné (en 8981 AGS) et
        mourut, 6 ans plus tard, dans les prisons de Kosland.</strong> </p><p>Le
        procès et les quelques années passées en cellule lui ont permis de
        propager ses pensées à de nombreux
        humains.</p><p>@UUID[Compendium.world.reliquesunion-objets.Item.g3Yibk2ZxpgRSBhs]{Ramell
