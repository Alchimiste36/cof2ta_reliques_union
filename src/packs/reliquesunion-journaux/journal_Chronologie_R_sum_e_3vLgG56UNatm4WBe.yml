    name: 8265 AGS - Note de l'architecte Tuatanii
    type: text
    _id: MwXqPhoVWen0nY37
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <table><tbody><tr><td><p style="text-align:center"><span
        style="font-family:Arial"><strong>8265
        AGS</strong></span></p></td><td><p style="text-align:center"><span
        style="font-family:Arial"><strong>-1037
        CA</strong></span></p></td><td><p style="text-align:center"><span
        style="font-family:Arial"><strong>Il y a 1745
        ans</strong></span></p></td></tr></tbody></table><p>Trouvée au centre
        des parchemins dans la salle secrète du village d'Arkanov, l'architecte
        Tuatanii parle du Démon immortel, de sa volonté de lutter contre le
        concept de Races Inertes et du Tel'Quessir.</p><blockquote><p>Le Démon
        Immortel, emprisonné dans son cercueil, survit par sa corruption des
        Reliques. Pour la paix, la responsabilité de chaque peuple est de
        résister à son Ombre persistante, cherchant la division, la haine et la
        manipulation. Le concept de "Race Inerte" n'existera jamais et aucun
        peuple, aucune culture ne sera JAMAIS supérieure aux autres. </p><p>Le
        Tel'Quessir sera, je l'espère, le début d'un ère d'espoir. Contre la
        Fascination, l'Union !</p><p>8265 GS - Tuatanii Architecte du Sanctuaire
        d'Arkanov</p></blockquote>
