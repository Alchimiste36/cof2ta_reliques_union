        style="font-family:Arial"><strong>-1437
        CA</strong></span></p></td><td><p style="text-align:center"><span
        style="font-family:Arial"><strong>Il y a 2145
        ans</strong></span></p></td></tr></tbody></table><p><strong>Les cinq
        doigts de l'Union réunnissent les responsables des peuples en
        guerre</strong> depuis des décennies dans les grandes plaines de
        l'Ourann pour les inciter à faire la paix et collaborer.</p><p>A la
        signature du traité de paix, <strong>les chefs offrirent chacun un objet
        symbolique aux Cinq Doigts de l'Union</strong> et dans un rayon
        lumineux, <strong>les Cinq Doigts de l'Union disparurent laissant
        derrière eux les Cinq Reliques de l'Union</strong>.</p>
