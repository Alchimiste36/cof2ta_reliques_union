  - sort: 250000
    name: Auberge du Passage Gourmand
    type: text
    _id: 5cvD33nUDCOBW7xp
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<p>C'est une grande bâtisse bien entretenue au toit de chaume qui reçoit jours et nuits les voyageurs et les caravanes qui naviguent entre Blanche Paix, Ispier, la Forteresse-état d'Arkar'um et le littoral.</p><p>Lieu très grand et très mouvementé, on peut y dormir confortablement, y manger des spécialité venant des quatre coins de l'Ourann et plus loin et souvent y voir des représentations culturelles (pièces de théâtre, soirées dansantes, comiques…).</p><p>Le responsable de l'auberge,\_@UUID[Actor.FDnA3d4NMld0vIyK]{Stepson Gruger}, est respecté par la population et les marchands depuis plusieurs décennies bénificiant de la sympathie de ses parents qui ont fondées l'auberge. Sa fille,\_@UUID[Actor.dzHwdyZI3S9rmxPp]{Nada Gruger}, l'aide à la cuisine, au service et à l'entretien du bâtiment. Elle ne se laisse pas faire par les clients lourdeaux.\_</p><p>Lors des foires et des périodes estivales, l'auberge embauche plusieurs travailleurs journaliers .</p><img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier%20auberge%20gourmand2.webp\" width=\"200\" height=\"200\" /><img src=\"modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier%20auberge%20gourmand.webp\" width=\"200\" height=\"200\" />"
    video:
