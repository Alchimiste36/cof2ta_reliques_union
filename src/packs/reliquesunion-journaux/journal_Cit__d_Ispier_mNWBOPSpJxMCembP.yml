  - sort: 293750
    name: L'auberge "Aux yeux bandés"
    type: text
    _id: V8oX4BKLgGtJLUp5
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Cette auberge malfamée dans les quartiers pauvres et ouvriers de la
        ville est un repère de malfrats et de voyous. Elle se situe dans une
        ruelle entourée de magasins et d'habitations bringueballantes. Sur son
        enseigne, on distingue une fille de joie, un bandeau sur les yeux et un
        large sourire sur les lèvres. L'aubergiste,
        @UUID[Actor.6lAY8FNMq5qB6kkq]{Krogan}, est un sale type imbu de lui-même
        et particulièrement désagréable. Chaque information donnée coutera
        quelques PA aux PJs. Des filles nues humaines ou naines se promènent
        dans l'établissement n'hésitant pas à s'assoir sur les genoux des
        Personnages.</p><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/bordel%20aux%20yeux%20band%C3%A9s.webp"
        width="200" height="200" />
