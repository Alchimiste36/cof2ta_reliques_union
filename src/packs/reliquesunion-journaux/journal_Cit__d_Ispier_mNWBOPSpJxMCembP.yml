  - sort: 562110
    name: Bibliothèque du château
    type: text
    _id: SovpifYtpQGwFbYh
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <div class="arran-mod"><p>On peut résumé la Bibliothèque de la Cité
        d'Ispier ainsi : un vieux archiviste dur des esgourdes, un apprenti au
        bord de la déprime et des milliers de livres !</p><p>Lorsque l'on
        rentre, ça donne envie. De longs rayonnages remplis de livres,
        parchemins, grimoires et tablettes, des espaces sombres et poussiéreux,
        quelques bancs de lectures et tables d'études et c'est tout. Le confort
        y est rudimentaire et on comprend vite que l'entretien de la
        bibliothèque n'est pas la priorité du Seigneur Jaspar
        Bonarion.</p><p>Réaliser des recherches dans cette bibliothèque doit
        prendre du temps si vous ne demandez pas le livre spécifique qu'étudie
        l'archiviste Tartoun en ce moment. Dans tous les cas, n'oubliez jamais
        de relancer votre requête régulièrement car le vieux bibliothécaire a
        tendance a se disperser lorsqu'une brillante idée de recherche lui
        traverse l'esprit.</p></div><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/bibliothecaire_assistant.webp"
        width="200" height="200" /><div class="arran-mod"><img
        src="modules/cof2ta_reliques_union/assets/ru_acteurs/cite_ispier/bibliothecaire.webp"
        alt="Archiviste Tartoun" width="200" height="200" /><p></p><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier_bibliotheque1.webp"
        width="200" height="200" /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier_bibliotheque2.webp"
        width="200" height="200" /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier_bibliotheque3.webp"
        width="200" height="200" /><p></p></div>
