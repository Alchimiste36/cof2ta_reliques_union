  - sort: 448438
    name: Appartements de Hisp Galik
    type: text
    _id: pLJyv8IGuN0DMDN2
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p><span
        style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
        var(--color-scrollbar-track);font-family:Bookinsanity"><em
        style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
        var(--color-scrollbar-track);font-style:italic">Les appartements du
        conseiller du Seigneur Jaspar sont situés dans une assez grande bâtisse
        dans l'enceinte du Château. La porte n'est pas fermée à
        clef.</em></span></p><p><span
        style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
        var(--color-scrollbar-track);font-family:Bookinsanity"><em
        style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
        var(--color-scrollbar-track);font-style:italic">Lorsque vous entrez vous
        vous retrouvez dans un salon plutôt bien rangée avec de nombreux livres
        et des objets d'arts décorant des belles bibliothèques ornementées. Une
        table et deux chaises sont positionnées au centre d'un magnifique tapis
        et le long d'un mur vous distinguez un vaisselier contenant quelques
        belles pièces de vaisselles richement décorées. Une petite pièce sert de
        cuisine et de garde manger mais ne contient pas grand chose. Hisp devait
        se faire servir depuis les cuisine du château. Un porte donne sur une
        chambre jolie mais très peu aménagée. un lit, une table de nuit et un
        petit fauteuil de lecture, rien de plus.</em></span></p><p><span
        style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
        var(--color-scrollbar-track);font-family:Bookinsanity"><em
        style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
        var(--color-scrollbar-track);font-style:italic">A l'étage, vous trouver
        deux grandes pièces remplies de multiples objets, chacune avec un long
        et large plan de travail totalement encombrés. Au vu de la poussière et
        du bazar, les serviteurs ne doivent pas avoir le droit de rentrer dans
        ces pièces. Après quelques secondes d'observation, la première pièce
        doit servir de laboratoire de magie élémentaire et la deuxième d''étude
        de la magie nécromantique. Livres empilés ou ouverts, babioles en tout
        genre, outils gros ou petits, matériaux et matériel… une mère n'y
        retrouverait pas ses petits.</em></span></p><p><span
        style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
        var(--color-scrollbar-track);font-family:Bookinsanity"><em
        style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
        var(--color-scrollbar-track);font-style:italic">Il va falloir plusieurs
        heures pour fouiller ces deux pièces.</em></span></p><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier_hisp_galik_laboratoire1.webp"
        width="200" height="200" /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier_hisp_galik_laboratoire2.webp"
        width="200" height="200" /><img
        src="modules/cof2ta_reliques_union/assets/ru_lieux/cite_ispier/ispier_hisp_galik_salon.webp"
        width="200" height="200" /><p></p>
