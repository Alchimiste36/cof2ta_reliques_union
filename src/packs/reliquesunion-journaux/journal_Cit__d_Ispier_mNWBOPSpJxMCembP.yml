  - sort: 275000
    name: Aux rêves d'aventures
    type: text
    _id: qbDDmvIsOVwhWsRM
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Un joli magasin d'équipements en bazard mais avec des produits de
        qualité. Le vendeur, @UUID[Actor.7hwDtuV2wcb0QAQE]{Ronrik } est charmand
        et sens bien que les tensions actuelles de la ville vont lui apporter
        des clients. D'après lui, il saura vous dénicher un équipement
        spécifique si vous avez du temps et SURTOUT les moyens
        !</p><p>@UUID[Actor.sh7Qz1Zl3FUqx2Fr]{Au rêve
        d'Aventures}</p><blockquote><p>"Bien le bonjour, videz votre bourse sur
        mon comptoir si vous n'voulez pas qu'on la retrouve sur votre cadavre
        !"</p><p></p></blockquote>
