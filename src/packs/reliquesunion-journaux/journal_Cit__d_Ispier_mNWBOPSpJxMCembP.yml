  - sort: 296875
    name: Les camps de bucherons de l'ouest
    type: text
    _id: sUTUAQB4RGVjt41p
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Situés en dehors de la Cité d'Ispier, au-delà des entrepôts protégés
        par les murailles de la ville, les camps de bucherons sont étalés sur
        plusieurs hectares. Des tentes, des bâtiments en bois et en pierres, des
        chemins carossables et une quantité incroyables d'outils, d'établis et
        de structures permettent d'exploiter une partie de la forêt du Val
        Rouge. Les troncs de ses arbres massifs, à l'écorce rougeâtre au
        printemps, sont d'une solidité et d'une flexibilité très appréciés pour
        les chantiers navals et pour la construction de bâtiments ou de
        machines.</p><p>La Cité d'Ispier a négocié, depuis plusieurs décénies,
        des accords avec les elfes sylvains pour l'exploitation de cette partie
        de la forêt du Val Rouge. Les accords ont été signés entre les elfes,
        les nains et les humains et ils sont toujours d'actualité. Bien que
        quelques tensions ont été répertoriées au fil de siècles, la Coté
        d'Ispier a toujours (au maximum de ses capacités) respecté ces
        accords.</p><p>Les fortes tensions et les meurtres perpétrés il y a peu
        créent un trouble palpable parmis les bucherons et les exploitants. La
        haine des elfes augmente parmi les travailleurs.</p>
    video:
