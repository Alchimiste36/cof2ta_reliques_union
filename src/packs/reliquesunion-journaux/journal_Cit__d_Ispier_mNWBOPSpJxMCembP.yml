  - sort: 287500
    name: Aux petits plats de Marta
    type: text
    _id: QK1CkxHzORGPB059
    system: {}
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: >-
        <p>Une taverne-épicerie permet aux habitants de se procurer des plats
        préparer, des ingrédients de qualité et des rations de voyage gouteux et
        pratiques. Marta est réputée pour sa gouaille tonitruante et ses
        questions intrusives. Elle aime tirer les vers du nez de ses clients
        pour avoir des histoires, des ragôts, des
        anecdotes…</p><p>@UUID[Actor.RevuSoVyGgx20eh1]{Aux petits plats de
        Marta}</p>
