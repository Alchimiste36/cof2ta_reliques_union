    text:
      format: 1
      content: "<blockquote><h2><span style=\"font-family:hobo\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">Monsieur Drakk'o,</strong></span></h2><p><span style=\"font-family:hobo\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-color:initial;font-weight:bold\">Le fils du Seigneur de Blanche Paix m'a recommandé vos services suite à l'enquête que vous avez mené pour lui. Il m'a certifié que vos compétences pourraient mettre utiles. De plus, son père me signale que les gardes de la ville sont agacés de leur surveillance sur vos faits et gestes. Ainsi, je peux vous proposer un contrat qui serait bénéfique pour tout le monde.\_J'ai besoin de vous et avant tout de votre discrétion.Si vous souhaitez venir en aide à un homme de haute position et récupérer les fruits bien sucrés d'un travail à votre hauteur, je vous donne rendez-vous à l'Auberge du Passage Gourmand demain aux premières lueurs du jour.</strong></span></p></blockquote>"
