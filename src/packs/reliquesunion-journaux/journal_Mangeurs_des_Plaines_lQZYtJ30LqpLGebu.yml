    text:
      format: 1
      content: "<p>Les mangeurs des Plaines sont un peuple nomade et guerriers vivant dans les grandes plaines et les montagnes à l'est de l'Ourann du Nord.</p><p>Ils sont réputés pour leur fureur au combat et leur agilité. Il y a peu de connaissance sur leur habitudes, rituels et cultures. Certains Mangeurs des Plaines sont recrutés en tant que mercenaire lors de conflits (surtout par les nains) et d'autres se rapprochent fréquemment des villes et forteresses-états pour faire du troc ou des échanges.</p><p>Ne les sous-estimez pas car derrière leur tranquilité et leur bonhommie pendant des échanges commerciaux, ils ne laisseront passer aucune fourberie ni traitrise.</p><p>\_</p><p>Dans la plupart des clans de Mangeurs des Plaines, les hommes comme les femmes peuvent occuper chaque rôles (guerriers, tâhces quotidiennes, s'occuper des enfants...)</p><p>\_</p><p>En premier l'image de @UUID[JournalEntry.girhYx1gqd7lJrbc]{l'Ainé Kaspirionuratanokali}</p><p>ensuite quatre images de Mangeurs des Plaines combattant du clan.</p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Mangeur%20des%20Plaines%202.jpg\" alt=\"\" width=\"167\" height=\"300\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Mangeur%20des%20Plaines%203.jpg\" alt=\"\" width=\"176\" height=\"300\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Mangeur%20des%20Plaines.jpg\" alt=\"\" width=\"109\" height=\"300\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Mangeur%20des%20Plaines%204.jpg\" alt=\"\" width=\"168\" height=\"300\" /><p>\_</p>"
