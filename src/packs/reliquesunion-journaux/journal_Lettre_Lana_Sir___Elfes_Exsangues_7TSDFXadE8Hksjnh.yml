    text:
      format: 1
      content: >-
        <h3>Mes chers sauveurs,</h3><p>Vous me voyez ravi de vous savoir en vie
        après autant de semaines sans nouvelles de vos avancées sur les traces
        des Reliques.</p><p>J'ai hâte de connaitre les aventures que vous avez
        traversé.</p><p>En ce qui concerne votre demande sur des elfes albinos,
        je vous assure de l'implication des recherches effectuées mais avec bien
        peu de résultats malgré les nombreuses demandes faites.</p><p>Toutes les
        bibliothèques m'assurent de la présence de traités, messages et recueils
        relatant l'existence d'un peuple d'elfes à la peau clair et à la
        chevelure blanche. Au delà de ce constat, dont moi-même ignorait tout,
        il est compliqué de trouver des informations complémentaires autour de
        ce peuple.</p><p>Ma chère amie Falika Rosna, qui vous envoi ses amitiés,
        a lu quelques grimoire parlant d'eux comme les Elfes Exsangues. Certains
        prétendent qu'ils vivent dans des cités souterraines sans jamais sortir.
        D'après sa mémoire du temps où elle vivait sur les Iles Blanches, il
        semble que son peuple a essayé de créer des ponts et relations avec eux
        sans grand succès car le peuple est extrêmement divisé.</p><p>De son
        côté, Laotissa, grâce à la bibliothèque du Temple du Val Rouge,
        m'explique que les Elfes Exsangues ne forment pas un peuple à part
        entière. Certaines cités semblent vivre comme les autres peuples
        elfiques avec des valeurs équivalentes mais d'autres souterrains
        seraient peuplés d'Elfes Exsangues violents, dégénérés et corrompu par
        de sombres idéologies.</p><p>Laotissa a été soulagée d'avoir des
        nouvelles de vous et il m'est compliqué de raisonner son excitation
        depuis qu'elle a lu votre message. Elle a beaucoup murie depuis qu'elle
        assume son rôle de Gardienne de l'Union mais je sens que cette charge
        est lourde sur de si jeunes épaules.</p><p>De mon côté, après de longues
        nuits de réflexion, l'obligation impérieuse ressentie de révéler
        l'existence des Reliques à mon retour dans ma cité n'aura pas accéléré
        les recherches du traitre Galik. La colère et le sens du devoir ont
        propulsé mes paroles, vous plaçant sur une route parsemée de périls.
        L'avenir dira si cette stratégie était moins pire que ce qu'elle indique
        aujourd'hui et amènera je l'espère une once de pardon de mes
        Sauveurs.</p><p>Je joins à ce message, une lettre cachetée pour Maître
        Grim venant d'arriver de la Porte des Grav.</p><p>Recevez, où que vous
        soyez, toute ma sympathie ainsi que celle de Laotissa et des Elfes
        Sylvains de la Forêt du Val Rouge.</p><p>Lana'Sir Bonarion, responsable
        de la Cité du Val d'Ispier.</p>
