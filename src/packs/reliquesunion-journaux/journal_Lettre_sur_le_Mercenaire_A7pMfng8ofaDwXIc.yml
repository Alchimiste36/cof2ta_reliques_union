    text:
      format: 1
      content: >-
        <div class="arran-mod"><blockquote><p>Rodrik,</p><p>Choisis une équipe
        et rend toi dans la forêt du Val Rouge le plus vite possible. Retourne
        au grand arbre et élimine toutes les personnes que tu
        verras.</p><p>D'après mes informations, si tu ne trouves personne attend
        en embuscade aux abord de l'arbre que le groupe sorte du
        Temple.</p><p>Ne me déçoit pas et tu auras le reste de tes 1 500pa ainsi
        que le poste que je t'ai promis.</p><p>TOUTES les possessions que tu
        trouveras sur leur cadavres devront mettre apportées au plus vite. Si tu
        me dupes j'aspirerais toute ta vitalité ainsi que celle de ta femme et
        de ton fils.</p><p>Ne me déçoit pas !</p></blockquote></div>
