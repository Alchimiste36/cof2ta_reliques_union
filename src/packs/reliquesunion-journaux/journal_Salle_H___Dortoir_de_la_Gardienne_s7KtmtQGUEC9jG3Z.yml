      content: "<div class=\"arran-mod\"><div><div class=\"salledescr\"><p><strong>Description :</strong></p><p>Vous rentrez dans une grande chambre en L. Elle est bien douillette avec un grand lit au carré, au pied duquel se trouve un tabouret rembourré. Dans l’angle se trouve un bain en bois élégant, un fauteuil, un coffre et une table basse recouverte d’une grande feuille de papier.</p><p>Dans le renfoncement de la chambre se trouve un espace bureau avec un très grand tapis au sol ouvragé. De chaque côté sont disposés des étagères remplies de livres de toutes tailles et épaisseurs. Contre le mur enfin est positionné un bureau en bois avec tout le matériel d’écriture et de lecture. Le fauteuil est gravé de nombreux motifs de branches et de feuilles d’arbre. Sur le bureau, vous voyez un livre ouvert et un autre fermé, une belle plume d’écriture et un encrier ainsi qu’un parchemin roulé et maintenu par une cordelette très fine.</p><ul><li><p><strong>Le bain :</strong> l’eau dans le bain est claire comme une source. Un fil d’eau coule depuis une fissure dans le mur et remplit le bain en continu.</p></li><li><p><strong>Le coffre :</strong> dans le coffre. Il y a aussi du savon, et quelques brosses, 3 belles tenues vertes magnifiquement ouvragées.</p></li><li><p><strong>La carte :</strong> sur la table basse se trouve une carte des Terres d’Arran. Beaucoup d'inscriptions sont présentes dessus. Des noms de villes anciennes et encore présentes, des zones grisées ou hachurées, des forêts, des montagnes, … Une zone dans les montagnes séparant l’Ogrie actuelle et les Rocs Exsangues est entourée d’une ligne rouge. Elle est presque circulaire et doit faire environ 50km de diamètre. Le nom écrit en dessous est “Esdavia”\_@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.iKHVHqU2fRGHSnwE]{Carte de Maniash'Onira}</p></li><li><p><strong>Les bibliothèques :</strong> de nombreux livres sur de nombreux sujets (religion, architecture, cuisine, médecine, rituel de prière, histoire et géographie des Terres d’Arran (avant -254)...). Il y a aussi une collection de 25 livres ressemblant à celui qui est ouvert sur le bureau.</p></li><li><p><strong>Le livre fermé :</strong> aux premières lectures vous y trouvez des listes et des tâches à faire. Une espèce d’agenda et d’organisation pour une douzaine de personnes (une gardienne, une suivante et 10 acolytes).</p></li><li><p><strong>Le livre ouvert :</strong> c’est un journal des événements recensé par la gardienne. Elle y inscrit chaque semaine ses émotions, sentiments, craintes… Le livre est noté du nombre 26. Sur la première ligne est noté “<strong>9019 après le grand schisme, troisième lune du printemps, douzième nuit</strong>”. Le livre est ouvert sur une page qui commence par “<strong>9048 après le grand Schisme, deuxième lune de l’hiver, huitième nuit. Les acolytes ont rejoint l’Arbre-Mère depuis trois jours, leur regard apaisé me donne confiance pour ce qui arrive. Shanivara, ma dernière suivante est sortie du Temple pour s’intégrer dans la tribu de sylvains. J’espère, par la sève de l’Arbre-mère, qu’elle saura insuffler les légendes que nous avons créées. Aurions dû sceller pour l’éternité ce temple afin que les mémoires s’effacent ? La peur me fait trembler comme une feuille vibrée par la brise. Plus de 780 cycles pour se faire oublier, des siècles pour disparaître. Une attente qui se termine demain lorsque je rejoindrai mes acolytes au cœur de l’Arbre-Mère. La Gardienne rejoint la sève et la terre. Le poème pour finir</strong>”.\_@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.NBhpJ6FUpOYjnJPK]{Compte rendu de Maniash'Onira}</p></li><li><p><strong>Le parchemin :</strong> Il est noté : “<strong>Si vous reprenez la place de Gardienne de la Relique de l’Union, c’est que le souvenir ne s’est pas envolé dans le noir de l’histoire. Votre rôle sera long et la patience votre plus grande alliée. Les fanatiques d’Esdavia ne doivent pas réapparaitre et les reliques doivent rester entre de bonnes mains. L’Arbre-Mère prendra soin de vous, de votre suivante et de vos acolytes. N’ayez crainte, il a fallu une quinzaine de cycles pour que la première trouve le Temple. Cette attente m’a valu de nombreuses nuits blanches mais tout est normal. Fiez-vous toujours aux merveilles de l’Arbre-Mère. Maniash’onira, première gardienne du Temple de l’Union des Elfes</strong>.\_@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.bL9cX8RiDi5m7Qgm]{Parchemin de Maniash'Onira}</p></li><li><p><strong>Le clef du Temple :</strong> sous le livre ouvert, il y a une magnifique clef ouvragée avec une belle décoréation en forme de feuille de chêne. Cette clef permet l'ouverture des pièces intérieures du Temple du Val Rouge.\_@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.PxlepxGDzxFRxJH4]{Clef du Temple du Val Rouge}</p></li></ul></div><div class=\"sallemj\"><p><strong>Notes pour le MJs :</strong></p><p>Bibliothèque : après 1d4 heures de recherche et d’étude confère un bonus de +10 en INT <em>(culture générale)</em> (attention les faits historiques s’arrêtent en -254 du calendrier Athée et la géographie (ville, seigneurs, organisations…) ont beaucoup changés aussi)</p><div class=\"arran-mod\"><div class=\"sallemj\"><p><span style=\"font-family:Arial\"><strong>@Test[car:int|diff:15|comp:Culture générale]</strong></span><span class=\"jet\"><strong> : en feuilletant le compte-rendu de la gardienne vous découvrez un échange, une discussion entre la gardienne et un autre peuple vivant dans les montagnes d'Arkanov.</strong>\_\_</span></p></div></div><p><strong>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.VsarcRUBqgxQ0pTY]{Échanges avec Hoani d'Arkanov}</strong></p><p>Après d'autres lectures et recherches dans le Temple ou à leur retour à la Cité d'Ispier, les PJ trouvent des informations :\_</p><ul><li><p>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.8VEgoMjsQatW6cbu]{Compte rendu 1 de Maniash'Onira},\_</p></li><li><p>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.uTKKH0vsa8ywiWps]{Compte rendu 2 de Maniash'Onira}.</p></li></ul><p><span class=\"imp\">Si les PJs ne recherchent pas dans les autres tomes, incitez les à fouiller, à embarquer les tomes de compte-rendu ou utilisez Manna pour les guider.</span></p></div><div class=\"salleplus\"><p><strong>Plus :</strong></p><p><strong>Infos supplémentaires :</strong> Abandon du temple par les gardiennes en -254 du calendrier Athée soit l’année 9048 après le grand schisme.</p></div></div></div>"
