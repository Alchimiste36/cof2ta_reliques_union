      content: "<p><em>Le médaillon est composé d'un disque bombé central avec 5 branches plates qui en part. Sur chaque branches vous voyez deux grands symboles et des mots gravés à côté en langue elfique ancienne. Chaque mot correspond au mot de la comptine de Laotissa (la mère, l'enfants, l'arbre, le fruit, la plante, la graine, la glace, le vent, le sable et le savoir). Les gravures sont remplie d'une ambre bleuté polie alors que les symboles sont remplies d'une ambre violacée polie. Le médaillon semble être fabriqué en bois mais lorsque vous le prenez il pèse le poids d'un métal lourd et dense.</em></p>\n<p><em>\_</em></p>\n<p>Ce médaillon a été donné par Laotissa Graine Dépeautre. Elle l'a reçu de sa mère la shaman du village elfe de la forêt du Val Rouge.</p>\n<p>\_</p>\n<p>\_</p>\n<p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Symbole%20de%20l%27ordre%20de%20l'Union%2002.png\" alt=\"\" width=\"200\" height=\"200\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Symbole%20de%20l%27ordre%20de%20l'Union%2001.png\" alt=\"\" width=\"303\" height=\"200\" /></p>"
