      content: "<p><em>14 Marsit 8308</em></p><p class=\"MsoNormal\">Cinq ans que je suis roi de la grandiose Cité-Forge d’Hyrr’Tarënn et je m’apprête à valider des travaux gigantesques au sein de la cité de mes ancêtres.</p><p class=\"MsoNormal\">Les vieux fripés de l’Ordre du Temple et la grande prêtresse Enam de l’Ordre du l’Union doivent financer la majorité des travaux mais devoir subir les allers et venus d’ouvriers des quatre coins d’Arran dans le Palace Royal n’est pas pour me ravir. D’après les estimations des maîtres architectes du Temple, les travaux devraient durer 3 ans et 8 mois. Autant compter sur cinq avec cette bande de baratineurs.</p><p class=\"MsoNormal\">Réunions, plans, réunions, études, discutailles, réunions, mesures et disputailles, je suis déjà fatigué alors qu’aucun tunnel n’a encore été creusé à quelques mètres de mon propre lit\_!!!</p><p class=\"MsoNormal\">Ils répètent à chaque phrase\_: «\_la grandeur du peuple nain\_», «\_notre protection\_», «\_Hyrr’Tarënn deviendra le rempart de tous les fanatismes\_», blablabla\_! Des phrases de charlatans pour me faire accepter les travaux colossaux du Cœur d’Hyrr’Tarënn et du Tourbillon. Heureusement que j’ai réussi à négocier une grotte spéciale. Il me tarde de découvrir les jardins qu’ils veulent construire.</p><p><span style=\"font-family:'Calibri','sans-serif'\">Si Abadar pouvait me voir, penché sur mon bureau, fatigué par des vieux broutards voulant dépenser une fortune dans des travaux délirant, il se foutrait bien de ma gueule. Connaissant l’ambition de mon aïeul, il aurait surement été fier de déposer dans sa cité deux des armes les plus dangereuses pour le peuple nain.</span></p>"
