          QfswyGelQa2yAolZ:
            folder: tiG4Eo4Z8zFqkXhF
            name: Ceinture
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Ceinture%20de%20l%27Union.jpg
            system:
              key: ceinture-de-lunion
              description: >-
                <p>Cette ceinture est compos&eacute;e d'une bande de cuir
                recouverte de feuilles dor&eacute;es et finement
                d&eacute;cor&eacute;e de millier de petits motifs. On peut y
                distinguer des repr&eacute;sentations stylis&eacute;es de
                nombreux animaux (mamif&egrave;res, amphibiens, insectes,
                oiseaux...).</p>

                <p>Le cuir est assez souple mais sa rigidit&eacute; permet son
                maintien en place si on le place au niveau des flancs &agrave;
                hauteur du ventre.&nbsp;</p>

                <p>De chaque c&ocirc;t&eacute; de l'ouverture permettant de
                v&ecirc;tir la ceinture, on trouve des pendentifs verts et
                rouges pouvant faire penser &agrave; des bois de cerfs ou des
                branches d'arbres. Ils sont fait dans une sorte de r&eacute;sine
                translucide.</p>

                <p>A premi&egrave;re vu, &agrave; part leur bonne facture, la
                ceinture n'a rien d'&eacute;trange &agrave; part une
                l&eacute;g&egrave;re aura magique.</p>

                <p>Elle est l&eacute;g&egrave;re et s'adapte parfaitement au
                corps de la personne qui l'&eacute;quipe.</p>
              source: Lana'Sir
