            system:
              key: duo-de-sphere
              description: >-
                <p>Dans deux coffrets en bois de simple facture bien que
                tr&egrave;s solide, les deux Sph&egrave;res, de 8cm de
                diam&egrave;tre chacune, sont assez lourde. Compos&eacute;es
                d'une pierre grisatre, les Sph&egrave;res sont orn&eacute;es de
                bandes m&eacute;talliques en bronze et grav&eacute;es de runes
                magiques complexes. Des pierres pr&eacute;cieuses
                bleut&eacute;es embellissent chaque croisement des bandes
                m&eacute;talliques.</p>

                <p>&nbsp;</p>

                <p>Lorsqu'on touche l'une des Sph&egrave;res, on ressent un fort
                courant magique parcourir tout le corps et se mettre &agrave;
                vibrer doucement.</p>
