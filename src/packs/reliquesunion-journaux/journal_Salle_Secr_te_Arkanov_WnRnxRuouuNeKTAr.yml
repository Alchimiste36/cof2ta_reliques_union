            folder: hdmFAaSkU07SBH6I
            name: Pendentif en cristal
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Pedentif.jpg
            _id: feA86BIeiGK0VgZG
            system:
              key: pendentif-en-cristal
              description: >-
                <p>Ce joli pendentif est compos&eacute; d'une cordelette assez
                fine tenant au bout une pierre cristaline bleut&eacute;
                d&eacute;licatement taill&eacute;e et polie.</p>

                <p>En observant de plus pret, on distingue une brume blanchatre
                bougeant l&eacute;g&egrave;rement au coeur de la pierre. Un
                lanceur de sort ressent &eacute;galement un l&eacute;ger frisson
                de magie lorsqu'il touche le pendentif.</p>

                <p>&nbsp;</p>

                <section class="secret">

                <p>Une fois par jour, apr&egrave;s une minute de concentration,
                le porteur du pendentif, peut faire jaillir la brume de l'objet
                qui se dirige vers sa gorge et disparait dans son coup. Le
                porteur peut choisir une langue ou un dialecte et il sera
                capable de parler et de comprendre cette langue pendant 1d4+3
                heures cons&eacute;cutives.</p>

                </section>
              source: Laana'Sir
