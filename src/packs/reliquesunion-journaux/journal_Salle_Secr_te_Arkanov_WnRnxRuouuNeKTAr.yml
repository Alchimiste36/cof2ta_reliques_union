            folder: hdmFAaSkU07SBH6I
            name: Carnet d'Analyse
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/03.OBJETS/OBJETS%20CAMPAGNE/Carnet%20d%27Analyse.jpg
            _id: NdPmqYNWynI8B5VO
            system:
              key: carnet-danalyse
              description: >-
                <p>Cette trousse de cuir s'enroule pour prot&eacute;ger une
                multitude d'objets qui servent &agrave; analyser des produits,
                des plantes, des roches ou toute autre choses.</p>

                <p>Les petites limes, les fioles remplies de diff&eacute;rents
                acides ou liquide, le carnet et son crayon, la petite pince...
                tout est d'excellente qualit&eacute; et aucune trace de rouille
                ou d'usure n'est visible.</p>

                <p>&nbsp;</p>

                <p>Lorsque qu'on utilise le Carnet d'Analyse pour &eacute;tudier
                un objet, une plante, un mat&eacute;riaux, un insecte, un
                m&eacute;tal... l'utilisateur obtient <strong>un bonus de +10
                &agrave; son test</strong> <strong>pour connaitre les
                caract&eacute;ristiques et les propri&eacute;t&eacute;s de
                l'objet &eacute;tudi&eacute;.</strong></p>
              source: Lana'Sir
