          ohdiZ4fB0MYopowk:
            folder: mwZqms4s1lPjWHbK
            name: Récupération Forcée
            type: item
            img: >-
              https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/04.ICONES/ICONES%20de%20Base/CONSOMMABLES/NOURRITURE/salt-seasoning-spice-pink.webp
            _id: ohdiZ4fB0MYopowk
            system:
              key: recuperation-forcee
              description: >-
                <p>Cette poudre rosatre et cristaline a une odeur de
                champignon.</p>

                <p>En sniffant une dose de cette poudre, le consommateur ressent
                une forte fatigue. Apr&egrave;s 1d6 minutes ,il s'endort
                profond&eacute;ment pendant 1d4+2 heures.&nbsp;</p>

                <p>Il r&eacute;cup&egrave;re 1PR toutes les 2H de sommeil.</p>

                <p>Une consommation excessive de la poudre de
                R&eacute;cup&eacute;ration Forc&eacute;e diminue rapidement
                l'&eacute;tat physique du consommateur car son corps est trop
                rapidement sollicit&eacute;.</p>

                <p>Pour chaque dose consomm&eacute;e, apr&egrave;s la
                premi&egrave;re, en moins de 7 jours, le consomateur perd 1
                point de CON, de FOR et de DEX.</p>

                <p>Seules des soins magiques sp&eacute;ciaux ou une semaine de
                sport et de r&eacute;cup&eacute;ration permet de
                r&eacute;cup&eacute;rer ces points de caract&eacute;ristiques
                perdus.</p>
              source: Lana'Sir
