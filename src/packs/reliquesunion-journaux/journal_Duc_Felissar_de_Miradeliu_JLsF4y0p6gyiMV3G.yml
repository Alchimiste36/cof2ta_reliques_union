      content: >-
        <img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Duc%20Felissar%20de%20Miradeliu.jpg"
        width="200" /><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Kosland/Duc%20Felissar%20de%20Miradeliu%20peinture.jpg"
        width="200" /><p>Le Duc Felissar de Maradeliu est un jeune dandi qui vie
        de ses rentes et des plaisirs de la vie.</p><p>Il est impertinent et
        connait son pouvoir pour obtenir ce qu'il souhaite grâce à ses charmes
        ou son argent ou sa réputation. Il aime jouer avec les nerfs des gens
        surtout ceux qui semblent imbu de leur position.</p><p></p><h3>Kaïos
        Frapo, Bras droit du Duc Felissar de Miradeliu</h3><img
        src="https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/01.PERSONNAGES/PNJ/Kosland/Bras%20droit%20du%20Duc%20Felissar%20de%20Miradeliu.jpg"
        width="200" /><p>Ce guerrier expérimenté ne quitte jamais son maître et
        meilleur ami. Son visage est marqué par de nombreuses vieilles blessures
        et il a une aura ténébreuse. </p><p>Même s'il ne quitte que rarement la
        présence du Duc, Kaios ne partage jamais les joies de la vie de
        Felissar. Aucune goûte d'alcool, de drogue, de sexe ou de débauche.</p>
