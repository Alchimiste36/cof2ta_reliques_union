  - type: text
    name: 02. le Ravin de Novrak
    _id: dJXcr9SSIqOcHxCN
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h3>Fiche sur la ville du Ravin de Novrak récupérée dans la bibliothèque de la Cité d’Ispier\_:</h3><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt\"><strong>Cette note est ancienne mais est fréquemment mise à jour en fonction des informations recueillies auprès des voyageurs.</strong></p><p class=\"MsoNormal\">\_</p><p><span style=\"font-family:'hobo','serif'\">Ville</span> de près de 550 habitants en grande partie constituée d’humain (70%) et de nains (23%). On peut y croiser quelques Peaux Vertes (7<span style=\"font-family:'hobo','serif'\">%) mais pour trouver un elfe il va falloir se lever tôt.</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>Le climat très rustique et froid du Ravin de Novrak et surtout le manque de luminosité donne à cette ville des aspects austères et les habitants ont souvent le teint pâle et des marques du climat rude sur le visage et dans les postures.</strong></span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\">Dans ce village, bien organisé, les caravanes et les voyageurs de passages sont toujours tolérés mais\_<strong>la frontière est particulièrement opaque entre les habitants et les gens de passage.</strong>\_Faire sa vie au milieu de ces habitants revient à être un étranger toute sa vie, même si, de temps à autre, on peut trouver des mariages entre un migrant d’Est ou de l’Ouest et un Novrak ou une Novraki.</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>L’économie et les échanges se font très majoritairement avec les Marches du Venkor et sa capitale Kosland grâce à la rivière qui traverse la ville et qui prend sa source un peu plus haut dans les sommets.</strong>\_Cette rivière descend jusqu’à la rivière «\_<strong>Mordra</strong>\_» et permet le transport de marchandises dans de petites embarcations assez particulières nommée par les Novrak «\_<strong>barque à bras</strong>\_», de la ville vers les zones plus civilisées en évitant les marécages et les périples présents dans cette zone de la Birkanie. Arrivée le plus au Sud du Fleuve « Mordra »,\_<strong>une grande et belle cité fortifiée, « Mordian », permet découler les marchandises</strong>\_et de faire le plein des denrées essentiellement alimentaires dont à besoin les habitants du Ravin de Novrak. Ensuite,\_<strong>les « embarcations » sont tirées hors de l’eau et deviennent de charrettes tractables par un cheval ou deux à quatre hommes</strong>\_pour retourner dans les chemins de montagnes. Très maniables, les « barques à bras » sont un atout jalousement gardé par la ville tant sur sa conception que sur son utilisation.</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\">Les produits phares du Village et qui s’exportent vers les Marches du Venkor essentiellement sont du\_<strong>cuir de haute qualité venant des bouquetins de Novrak</strong>\_(une espèce rustique et locale),\_<strong>les distillats de résines des conifères</strong>\_de la montagne ainsi que\_<strong>quelques plantes rares</strong>\_du coin et bien sur les autres produit des montagnes environnantes (<strong>minerais, blocs de roches, bois de résineux</strong>…).</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\">La position du Ravin de Novrak lui\_<strong>permet aussi de monétiser un certain nombre d’informations stratégiques entre le grand Ouest et les régions à l’Est des montagnes des Crocs d’Acier</strong>\_(bandes de Peaux Vertes en mouvement, actualités, changement de gouvernement de différentes grandes cités éloignées). Ainsi,\_<strong>la plupart des commerçants et des nobles de la ville posent énormément de questions aux voyageurs et marchands passant par la ville</strong>\_afin de récupérer les informations importantes pour les vendre ensuite au plus offrant.</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>Le Ravin de Novrak est rarement attaqués par les tribus de Peaux Vertes</strong>\_qui peuvent vivre dans les montagnes ou en Birkanie car depuis plusieurs années,\_<strong>les habitants stoppent et libèrent les caravanes d’esclavagistes</strong>\_qui mettent à sac des tribus d’Orcs ou de Gobelins pour revendre des Peaux Vertes dans l’Ourann. Sans être officiel, les Orcs et Gobelins ont un certain respect pour ces habitants.</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\">Il est, depuis quelques dizaines d’années, assez risqué d’aller dans les montagnes aux alentours de la ville sans une forte présence de protection.\_<strong>De nombreuses disparitions ont été signalées dès qu’on s’aventure dans les hauteurs</strong>\_ou que l’on prend ses distances à la recherche de plantes ou pour pouvoir chasser. Les éleveurs de bouquetins de Novrak redoutent toute l’année d’amener leurs bêtes dans des pâturages au risque de ne pas revenir au village. L’exploration des montagnes est de par nature assez dangereuse mais\_<strong>depuis des années les « Ombres Blanches » assassinent et kidnappent les imprudents</strong>\_faisant du hors piste.</span></p><p class=\"MsoNormal\" style=\"margin-bottom:.0001pt;line-height:normal\"><span style=\"font-family:'Arial','sans-serif'\">\_</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\">Seigneur local :\_<strong><span style=\"text-decoration:underline\">Arbosk Mieili de la Tour de Mabeuil</span></strong>\_et son épouse Veronia.</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\">Le père du seigneur Mieili,\_<strong>Arbosk’char, est encore très influent dans la ville</strong>. Les\_<strong>trois fils et deux filles du seigneur (entre 15 ans et 37 ans) ont chacun une place dans la gestion de la ville</strong>.\_<strong>Le seigneur est respecté</strong>\_par la population même si certains lui reproche son inaction, sa passivité et son manque de changement ou d’ambition.\_<strong>Huit familles de nobles</strong>\_se partagent les intérêts de la ville et différents points de sa gestion. Il y a peu de conflit car chacun a sa place et son rôle. A chaque décès de seigneur, des tensions et des luttes de pouvoir apparaissent sans changer fondamentalement le quotidien des habitants.</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\">Les habitants sont pour la plupart des gens simples mais durs au premier abord. Ils poseront, surtout les commerçants, marchands et nobles, des questions au groupe de passage </span><span style=\"mso-spacerun:yes\"><span style=\"font-family:'hobo','serif'\">\_</span></span><span style=\"font-family:'hobo','serif'\">sur ce qu’il se passe au-delà des montagnes.</span></p><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:3.25pt;margin-bottom:.0001pt;margin-left:3.25pt;line-height:normal;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong><span style=\"text-decoration:underline\">Au Ravin de Novrak, on peut trouver :</span></strong></span></p><ul><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>Un château faisant office aussi de temple de Solima et d’Yjdad et de place forte en cas d’attaque</strong>. Les deux temples (humain et nain) sont bien séparés mais de mémoire c’est surement la seule ville qui accueille dans le même bâtiment les deux croyances.</span></p></li><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>Quelques auberges ou tavernes</strong>\_plus ou moins chics</span></p></li><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>De nombreux artisans</strong>\_de la vie de tous les jours (forgeron, orfèvre, tisserands, scieurs et menuisiers…)\_<strong>Artisans de Novrak</strong></span></p></li><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>Des artisans spécialisés dans les produits à exporter</strong>\_(minerais, blocs de roches, distillation de résines ou de plantes de montagne, éleveur de bêtes, fabricant de cuir de haute qualité…)</span></p></li><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>Des bordels</strong>\_et maisons closes</span></p></li><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>Une grande place du marché</strong>\_non loin du château avec des étales bien fournis</span></p></li><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>Une</strong>\_<strong>école spécialisée dans les recherches sur la géologie, la faune et la flore de montagne</strong>.\_</span></p></li><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\"><strong>Un petit amphithéâtre</strong>\_où sont organisé des tournois, des animations culturelles et des procès régulièrement.</span></p></li><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\">Une bâtisse gérée par\_<strong>la Guilde des Jongleurs</strong>\_(assez rare pour être noté).\_</span></p></li><li><p class=\"MsoNormal\" style=\"margin-top:0cm;margin-right:1.3pt;margin-bottom:.0001pt;margin-left:14.4pt;text-indent:0cm;line-height:normal;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt;text-align:justify\"><span style=\"font-family:'hobo','serif'\">Une bâtisse fait office\_<strong>d’hôpital, d’herboristerie et de vétérinaire</strong></span></p></li></ul>"
