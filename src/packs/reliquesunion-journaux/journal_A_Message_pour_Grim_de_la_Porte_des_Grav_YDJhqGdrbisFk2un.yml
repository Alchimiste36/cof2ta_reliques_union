      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Maitre Grim et vos inhabituels compagnons de
        route,</strong></p><p class="MsoNormal" style="tab-stops:262.2pt">Votre
        missive me perturbe grandement et la menace que vous décrivez est devenu
        immédiatement ma priorité numéro un. Pour information, j’ai renforcé les
        patrouilles et je me suis permis d’envoyer quelques cognards
        expérimentés en explorateur au-delà des murailles.</p><p
        class="MsoNormal" style="tab-stops:262.2pt">Quelques jours après l’envoi
        de ma première missive, j’ai reçu la visite d’un groupe de Frères du
        Désespoir souhaitant traverser la Porte des Grav pour se rendre en
        Ogrie. Le responsable, un certain Zagrenn Fredfisk, souhaitait
        investiguer sur une grande menace présente dans les montagnes. S’ils
        sont retournés en terres civilisés, ils ne sont pas repassés par
        là.</p><p class="MsoNormal" style="tab-stops:262.2pt">J’ai relancé notre
        bon roi d’Arkar’Um pour obtenir des poilus supplémentaires mais
        j’attends depuis de semaines une réponse.</p><p class="MsoNormal"
        style="tab-stops:262.2pt">Pour le moment, il n’y a rien à déclarer de
        plus comme perturbations au niveau de la porte.</p><p class="MsoNormal"
        style="tab-stops:262.2pt">Par Yjdad, j’espère que vous trouverez une
        solution face à cette menace invisible.</p><p></p><p class="MsoNormal"
        style="tab-stops:262.2pt"><strong>Maître Gelmar, fils de
        Gälmon,</strong></p><p class="MsoNormal"
        style="tab-stops:262.2pt">Capitaine de la Porte des Grav,</p>
