    text:
      format: 1
      content: "<p>C'est le chef d'une tribue de @UUID[JournalEntry.3aOGCUeR3oXMRQKk]{Mangeurs des Plaines}</p>\n<p>Un homme fier et élégant drapé dans de larges vêtements chaud et confortable. Il a toujours un sourire aux lèvres mais peut se montrer extrèmement violent si on lui manque de respect ou qu'on le trahi.</p>\n<p>Il est respecté par les membres de son clan.</p>\n<p>Il parle la langue commune de façon correcte et il est pas trop compliqué de le comprendre. Cela lui permet d'avoir de bonnes relations avec certaines Forteresse-Etats du nord de l'Ourann.\_</p>\n<p>Il possède un clan d'une 30e d'individus composé à parité de femmes et d'hommes. Chaque sexe peut être guerrier ou s'occuper de la famille ou des tâches quotidiennes comme le veut la tradition des mAngeurs de Plaines. Il a aussi une 50e de Sanpuroch, leur farouches montures. Le sens de l'orientation et l'esprit de famille des Sanpuroch lui permet de les \"confier\" à des personnes et les bêtes retrouveront toujours le clan.</p>\n<p>\_</p>"
