        B2lHEMirhf4eAR4i:
          notes: >-
            <p>En cas de trahison majeure, Kaspirionuratanokali aime se venger
            en kidnappant le coupable et en le torturant le plus longtemps
            possible. Il attache le coupable &agrave; l'arri&egrave;re de son
            Sanpuroch, les mains au niveau de la selle et les jambes autour des
            cuisses de la monture. Pendant plusieurs jours il va "trimballer" la
            personne o&ugrave; qu'il aille. Les mouvements amples et agiles du
            Sanpuroch vont d&eacute;sarticuler progressivement les membres et
            lac&eacute;rer la peau en de multiples endroits.</p>
