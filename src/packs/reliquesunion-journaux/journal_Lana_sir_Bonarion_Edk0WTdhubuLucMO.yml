      content: "<p style=\"margin:6.0pt 0cm 6.0pt 0cm\"><span style=\"font-size:10.0pt;font-family:'Arial','sans-serif';color:#191813\">Fille du seigneur, @UUID[JournalEntry.YZBFIHMD2pPy6DVS]{Jaspar Bonarion}, de <strong style=\"box-sizing:border-box;user-select:text\"><span style=\"font-family:'Arial','sans-serif'\">@UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier}</span></strong>,\_</span></p>\n<p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;text-align:start;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm\"><span style=\"font-size:10.0pt;font-family:'Arial','sans-serif';color:#191813\">Âgée de 17 ans, elle est promise à un bel avenir dans la cité. Elle s'intéresse à la vie locale, la politique et les relations internationales avec soin malgré la désapprobation de son père qui préfèrerait qu'elle se trouve un bon mari.</span></p>\n<p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;text-align:start;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm\"><span style=\"font-size:10.0pt;font-family:'Arial','sans-serif';color:#191813\">Calme et respectée, l'avenir de Lana'sir est aujourd'hui menacé ! Sa disparition changera à coup sur la ville d'Ispier.</span></p>"
