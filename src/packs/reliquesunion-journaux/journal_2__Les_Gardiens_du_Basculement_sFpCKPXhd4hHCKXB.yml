    text:
      format: 1
      content: >-
        <p><em><strong>Résumé des informations trouvées dans les bibliothèques
        d'Hyrr'Tarënn lors de la guerre des
        Goules.</strong></em></p><p><em><strong>Les textes de références sont
        divers et anciens mais la plupart sont des livres elfiques datant du
        septième millénaire après le Grand
        Schisme</strong></em>.</p><p></p><p><strong>Tel'Quess'Aar Tilka, les
        Gardiennes du Basculement, naît, d'après les textes trouvés, à la suite
        du procès de Nenandir et du Culte de la Balance.</strong> </p><p>Lignée
        de femmes liées par un promesse, les Gardiennes du Basculement semblent
        être plus une légende autour de la personnalité de la juge Tintaëlle
        Siar'yn qu'une réalité. </p><p><strong>Les histoires racontent que la
        descendance de la juge Siar'yn serait parcouru d'une forte magie et de
        pouvoirs pouvant renverser les rois et les empereurs.</strong> Aucune
        manipulation, aucun mensonge, aucune manigance ne pourrait faire fléchir
        la volonté des femmes de cette lignée. Leur pouvoir permettrai de
        connaitre les sombres pensées de leurs interlocuteurs et de révéler les
        complots rampants dans l'ombre. </p><p>Si ces histoires ont une once de
        réalité, au milieu des multiples versions et des récits fantasques, il
        semblerait que régulièrement <strong>une descendante de la lignée des
        Siar'yn naitrai avec un pouvoir assez grand pour s'interposer entre la
        vie et la mort, entre la fin de tout et la continuité apaisée.</strong>
        Certains contes parlent d'un papillon fragile révélant aux justes un
        complot ou une catastrophe et pouvant empêcher une large destruction.
        Voyant son environnement avec des yeux de nouveau né, la gardienne
        millénaire vole, portée par les brises, et absorbe toutes les vérités du
        monde qui l'entoure, éloignée des mensonges et des illusions.
        <strong>Innocente de toute manipulation, elle devra choisir entre laissé
        advenir ou empêcher la destruction de la
        réalité.</strong></p><p></p><p>D'après les historiens nains qui ont
        analysé les textes tirés de l'ancienne langue elfique, ce genre de récit
        est souvent parsemé de légende pour faire peur aux personnalités
        puissantes et des contes que l'on raconte aux enfants pour les tenir
        dans le rang ("Si tu mens, le regard des Gardiennes du Basculement
        viendra ta hanter dans tes songes").</p><p></p>
