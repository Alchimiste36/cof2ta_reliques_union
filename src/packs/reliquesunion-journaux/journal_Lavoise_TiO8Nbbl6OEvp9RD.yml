      content: "<p>La ville de Lavoise se situe techniquement en Birkanie sur la rive du fleuve Qolos.\_ Réelle passerelle entre l'Ourann et la Birkanie, cette petit ville prospère permet les échanges marchands et la traversé du fleuve facilement. Ses fortifications et son cadre de vie paisible et verdoyant en fait une cité où il fait bon vivre et particulièrement appréciée par les voyageurs de passage.</p>\n<p>\_</p>\n<h3>Description de la Ville :</h3>\n<p><em>La ville de Lavoise est positionnée au bord du fleuve Qolos, sur une bande de terre qui donne l'impression de percer le cours de l'eau.\_<strong>Une muraille de taille raisonnable protège la ville des attaques de Peaux Vertes</strong>\_venant des plaines de la Birkanie. Les toitures sont toutes faites de pierres bleutées qui rayonne sous les rayons du soleil.\_<strong>La chose la plus étonnante avec Lavoise c'est la végétation au coeur même de la ville</strong>. Comparé aux champs agricoles qui bordent la muraille et les grandes plaines clairsemées de Birkanie,\_<strong>Lavoise semble luxuriante</strong>. Du haut de la colline, on peut facilement remarquer\_<strong>l'effervescence de la ville et de son port</strong>. Autour de celui-ci, deux collines abruptes sont surmontées de bâtiments. A l'Ouest, une enceinte protège une belle demeure noble et à l'Est, un phare haut et élégant. De l'autre côté du fleuve,\_<strong>on voit à peine la berge et on peut percevoir à l'horizon des quais, bâtiments et routes qui partent vers l'Ourann</strong>, le Pays des Vents.</em></p>\n<p><strong>Lorsque l'on franchi les portes Nord de la ville</strong>, les voyageurs entendent les chants et les rires s'échappant d'une taverne. L'enseigne indique \"la Taverne des chants de l'Ourann\". Les maisons aux alentours sont bien entretenues et particulièrement modernes. Tout est bien organisé à Lavoise.</p>\n<p>\_</p>\n<p>La belle demeure en haut de la colline\_<strong>au Sud-Ouest est une école d'érudit fermée au public</strong>\_<strong>sauf pour des contrats</strong>\_(recherche d'information, traduction, lecture de texte, écriture de lettre…). La responsable est\_<strong>une elfe du nom de Falika Rosma</strong>. Même si ce n'est pas son travail principal, elle aide souvent pour les soins et l'éducation des enfants présents dans la pension \"les Bras de la Mère\" et pour les habitants de Lavoise.</p>\n<p><strong>Le port est aussi un lieu très mouvementé à Lavoise.</strong>\_Il n'est pas un moment où quelqu'un ne vide ou ne remplisse un bateau, une barque ou une charrette avec des marchandises en tout genre. A l'Est de la Porte Sud,\_<strong>un grand bâtiment sert à organiser les aller et venues et à collecter les taxes.</strong>\_A tout moment du jour et de la nuit,\_<strong>le port, et en particulier la capitainerie, sont protégés par des gardes lourdement armés</strong>\_qui prennent leur tâche très au sérieux. C'est un honneur, dans une ville qui se développe autour du commerce maritime d'être le gardien de l'économie.</p>\n<p>Pour finir,\_<strong>le phare sur la colline du Sud-Est donne un point de vue panoramique sur les terres et sur le fleuve</strong>. Du haut de ce bâtiment solide et de belle facture, on distingue beaucoup les rives de l'Ourann à l'horizon. Un immense tas de bois bien préparé peut être allumé à n'importe quel moment, en cas de brouillard dense ou de problème.</p>\n<p>\_</p>\n<h3>Les lieux d'intérêt de Lavoise :\_</h3>\n<ol>\n<li>\n<p><strong>La garnison :</strong>\_Bâtiment imposant et fermé renfermant une cour d'entrainement intérieure.</p>\n</li>\n<li>\n<p><strong>L'église de Lavoise :</strong>\_lieu de culte pour de multiples cultes (tant humain que elfe ou nain). En arrivant de la Porte Nord on ne peut pas la louper.</p>\n</li>\n<li>\n<p><strong>L'hôtel de ville :</strong>\_une demeure courbe donnant sur la place du marché.</p>\n</li>\n<li>\n<p><strong>\"l'Auberge des Voyageurs\" :</strong>\_Une belle auberge assez chic avec une charmante devanture dorée.</p>\n</li>\n<li>\n<p><strong>\"A tout faire\"</strong>\_: magasin d'équipements en tout genre (cuisine, voyage, nourriture, artisanat…). Une boutique immense et bien fournie dont les articles viennent de près comme de loin.</p>\n</li>\n<li>\n<p><strong>Place du jugement :</strong>\_endroit où les criminels sont pendus ou décapités</p>\n</li>\n<li>\n<p><strong>Moulin à eau :</strong>\_Vaste bâtiment aux multiples fonctions (meunier, menuisier, tanneur…)</p>\n</li>\n<li>\n<p><strong>\"Aux Mains d'Or\"</strong>\_: complexe de bâtiments regroupant plusieurs artisans (forgeron, charpentier, rémouleur…)</p>\n</li>\n<li>\n<p><strong>\"Les Bras de la Mère\"</strong>\_: pension pour jeunes orphelins ou personnes nécessiteuses pouvant trouver refuge, repas et soin</p>\n</li>\n<li>\n<p><strong>\"La Pinte Rafraichissante\" :</strong>\_bar populaire et très agité. Il n'est pas rare d'y trouver des bagarres et des vols.</p>\n</li>\n<li>\n<p><strong>\"La Vie en Chanson\" :</strong>\_service de Barde, Ménestrel et coursiers. Une grande étable pour chevaux est adossée au bâtiment principal.</p>\n</li>\n<li>\n<p><strong>\"La Hutte des Marins\" :</strong>\_à l'extérieur de la ville, cette taverne est le lieu de rencontre des marins, prostituées, voleurs et autres malfrats mais l'ambiance et les secrets y sont nombreux</p>\n</li>\n<li>\n<p><strong>\"Les Chevaux de Kilorn\" :</strong>\_Kilorn est réputé dans la région pour ses montures de qualité et bien dressées. Les prix sont un tier plus cher mais les chevaux sont parfaits</p>\n</li>\n<li>\n<p><strong>\"la Taverne des chants de l'Ourann\" :</strong>\_taverne principale de Lavoise et bien mieux fréquentée que les autres, ici tous les habitants peuvent passer un bon moment sans la peur au ventre.</p>\n</li>\n</ol>\n<p>\_</p>\n<p><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/VILLES-CARTES/Lavoise.Carte.01.png\" alt=\"\" width=\"292\" height=\"400\" /><img src=\"https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/worlds/test-v10/Campagne%20LANA%27SIR/02.LIEUX/ILLUSTRATIONS/Lavoise.01.jpg\" alt=\"\" width=\"632\" height=\"342\" /></p>\n<p>\_</p>"
