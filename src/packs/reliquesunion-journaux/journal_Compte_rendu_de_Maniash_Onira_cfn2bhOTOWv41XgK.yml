    text:
      format: 1
      content: >-
        <div class="arran-mod"><h3>Sur la première page
        :</h3><p></p><blockquote><p>9019 après le grand schisme, troisième lune
        du printemps, douzième
        nuit</p><p>…</p></blockquote><p></p><p></p><h3>Sur la dernière page
        :</h3><p></p><blockquote><p>9048 après le grand Schisme, deuxième lune
        de l’hiver, huitième nuit.</p><p></p><p>Les acolytes ont rejoint
        l’Arbre-Mère depuis trois jours, leur regard apaisé me donne confiance
        pour ce qui arrive. Shanivara, ma dernière suivante est sortie du Temple
        pour s’intégrer dans la tribu de sylvains. J’espère, par la sève de
        l’Arbre-mère, qu’elle saura insuffler les légendes que nous avons
        créées.</p><p>Aurions dû sceller pour l’éternité ce temple afin que les
        mémoires s’effacent ?</p><p>La peur me fait trembler comme une feuille
        vibrée par la brise. Plus de 780 cycles pour se faire oublier, des
        siècles pour disparaître. Une attente qui se termine demain lorsque je
        rejoindrai mes acolytes au cœur de l’Arbre-Mère.</p><p>La Gardienne
        rejoint la sève et la
        terre.</p></blockquote><p></p><p></p><blockquote><p>Par la mère et
        l’enfant,</p><p>Par l’Arbre et le Fruit,</p><p>Par la Plante et la
        Graine,</p><p>La Glace, le Vent et le Sable,</p><p>Renferme le
        Savoir.</p></blockquote></div>
