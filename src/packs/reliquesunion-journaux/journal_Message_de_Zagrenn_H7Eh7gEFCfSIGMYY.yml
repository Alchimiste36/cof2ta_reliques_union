    text:
      format: 1
      content: >-
        <p><em><strong>Bonjour aux sauveur de la Dame
        d'Honneur,</strong></em></p><p><em><strong>Suite à notre entretien dans
        les salon du château de la cité d'Ispier, j'ai encore du mal à dormir au
        vu des révélations que vous m'avez
        fournie.</strong></em></p><p><em><strong>A mon retour au monastère, j'ai
        lancé des recherches dans nos ouvrages grâce à des frères méticuleux et
        volontaires. Ils ont trouvés les informations suivantes sur les Mines
        d'Hyrr'Tarën comme noté sur la carte que vous m'avez
        montré.</strong></em></p><p><em><strong>De plus, je suis enfin prêt à
        prendre la route en direction de l'Ogrie avec une dizaine de vaillants
        frères qui veulent, comme moi, enquêté sur le mal qui s'y déroule.
        Lorsque vous recevrez ce message, le temps qu'il parvienne à Ispier puis
        à vous, j'espère avoir parcouru assez de chemin pour m'approcher de la
        zone où sont esclavagisée les Peaux
        Vertes.</strong></em></p><p><em><strong>Que vos dieux soient à vos côtés
        et que la soif de justice soit dans votre esprit
        !</strong></em></p><p><em><strong>Frère aîné Zagrenn
        Fredfisk.</strong></em></p>
