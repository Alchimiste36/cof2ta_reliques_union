        <div class="journal-cof2ta-ru">
          <h1>Salle C : Réfectoire</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Les portes s'ouvrent avec facilité et vous entrez dans une pièce de 12m par 10m aménagée avec de longues tables en bois massif. Une quinzaine de chaises finement ouvragées
              sont positionnées devant les tables. Ca ressemble à une salle à manger commune.
            </p>
            <p class="paragraphe">Il y a une double porte à l'Ouest et une porte simple à l'Est.</p>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <p class="paragraphe">
              La porte de l'Est est verrouillée. @Test[car:agi|diff:20|comp:Crocheter une serrure] pour l'ouvrir ou @Test[car:for|diff:20|comp:Défoncer une porte] pour la forcer. PV 15 -
              Solidité RD4 - immunisée au feu (la clef se trouve dans le bureau de la salle H)
            </p>
          </div>
        </div>
