        <div class="journal-cof2ta-ru">
          <h1>Salle B : Passage du Dortoir</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              <strong>Cette salle possède une immense étagère dans l'angle Ouest (6m de haut). Sur celle-ci, se trouvent de nombreux draps, tissus, livres, serviettes, produits</strong>
              d'entretien et de toilette, équipement en tout genre. Une échelle est accrochée sur l'étagère pour atteindre les étages plus hauts.
            </p>
            <p class="paragraphe">Un long couloir part vers l'Ouest et de nombreuses portes sont visibles tout autour de vous.</p>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <p class="paragraphe">
              La porte de la salle G et celle au fond du couloir (salle J) sont fermées à clef. @Test[car:agi|diff:20|comp:Crocheter une serrure] pour l'ouvrir ou
              @Test[car:for|diff:20|comp:Défoncer une porte] pour la forcer. PV 15 - Solidité RD4 - immunisée au feu (la clef se trouve dans le bureau de la salle H)
            </p>
            <hr />
            <p class="paragraphe">
              Les livres sur les étagères sont des recueils pratiques et techniques (cuisine, artisanat, ingénierie, communication, histoire de base des Terres d'Arran, contes et légendes,
              livres religieux de prières…).
            </p>
          </div>
          <hr />

          <div class="salleplus">
            <h2>Plus :</h2>
            <p class="paragraphe">
              Dans les étagères, chaque objet est de très belle facture. Il y en a pour au minimum 2 000pa d'équipement. Maana verrait d'un très mauvais œil le pillage de ces objets.
              @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.siKjS65RiyTM8DNz]{Étagères du Passage du dortoir}
            </p>
          </div>
        </div>
