        <div class="journal-cof2ta-ru">
          <h1>Salle I : les 10 dortoirs des acolytes</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Vous rentrez dans une chambre rustique et sommaire composée d'un lit simple, d'un coffre en bois et d'une armoire fermée. Le lit est fait au carré d'un linge propre et frais.
            </p>
            <ul>
              <li>
                <p class="paragraphe">
                  <strong>L'armoire :</strong> 4 tenues identiques, des robes élégantes et confortables de couleur rouge sombre. Des sous-vêtements confortables. un jeu de deux serviettes
                  et une pierre ponce. Un pendentif de la même forme que le médaillon de Laotissa mais sans aucune gravure dessus.
                </p>
              </li>
              <hr />
              <li>
                <p class="paragraphe"><strong>Coffre :</strong> quelques bijoux simples, un bloc de savon, un carnet vierge et un bâtonnet de charbon pour écrire.</p>
              </li>
            </ul>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <p class="paragraphe">Toutes les chambres sont totalement identiques.</p>
          </div>
        </div>
