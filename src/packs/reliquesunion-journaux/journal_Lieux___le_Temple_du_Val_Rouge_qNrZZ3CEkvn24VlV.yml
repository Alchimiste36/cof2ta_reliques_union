        <div class="journal-cof2ta-ru">
          <h1>Salle J : Garde manger</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              La pièce de 4m de large par 14m de long est aménagée avec d' immenses étagères sur le mur du fond et sur le mur à votre gauche. Sur la droite, des étagères spécialement
              conçues pour des bouteilles. Les étagères montent jusqu'au plafond à environ 6m de hauteur. Des échelles sont fixées sur des barres coulissantes le long des étagères. La
              température de la pièce est beaucoup plus froide que dans les autres pièces et de la buée sort de votre bouche à chaque respiration. Sur les étagères et dans les casiers à
              bouteilles, vous apercevez des victuailles nombreuses et variées. Toutes semblent en parfait état de conservation. Des féculents, des graines, des légumes racines, des bocaux
              divers, des sacs de sels, de poivres et d'épices, des bouteilles de vinaigre, d'huiles et aromatiques et plantes médicinales séchées.
            </p>
            <ul>
              <li>
                <p class="paragraphe">@Test[car:per|comp:Fouiller une pièce]</p>
                <ul>
                  <li>
                    <p class="paragraphe">
                      <span class="roll-result">10+</span> : sur un sac de tubercules, ressemblant à des topinambour, vous pouvez lire : “Arbre-Mère, Arbre-sacré, âme de nos forêts, par
                      cette offrande merci de prendre soin de ma famille et apporte le bonheur dans le coeur de mon nouveau-né”
                    </p>
                  </li>
                  <li>
                    <p class="paragraphe">
                      <span class="roll-result">15+</span> : quatre runes élémentaires sont gravées sur les quatre murs de la salle permettant de maintenir une température faible et un bon
                      taux d'humidité dans la pièce.
                    </p>
                  </li>
                </ul>
              </li>
            </ul>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <p class="paragraphe">
              La porte est fermée. @Test[car:agi|diff:20|comp:Crocheter une serrure] pour l'ouvrir ou @Test[car:for|diff:20|comp:Défoncer une porte] pour la forcer. PV 15 - Solidité RD4 -
              immunisée au feu (la clef se trouve dans le bureau de la salle H)
            </p>
          </div>
          <hr />

          <div class="salleplus">
            <h2>Plus :</h2>
            <p class="paragraphe">
              <strong>Infos supplémentaires :</strong> Grâce au contenu de ce garde-manger, il y a de quoi préparer une bonne centaine de repas copieux et bien plus si on devait rationner.
            </p>
          </div>
        </div>
