      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Salle L : La grande salle de l'Union</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Vous entrez dans une immense pièce de 36m de large par 30m de long. Le plafond est à environ 10m de hauteur. Plusieurs choses sont remarquables dans cette pièce. Tout d'abord
              vous remarquez que le fond de la pièce est rempli de racines énormes couvertes de mousses et suintant d'humidité. Elles ont pénétré par les murs et envahissent une partie de
              cette salle.
            </p>
            <p class="paragraphe">
              Au sol se trouve gravé deux grands cercles, couleur ambre, avec des formes ésotériques qui sont placés de part et d'autre d'un bassin en pierre de taille positionné au centre
              de la pièce. L'eau du bassin est rougeâtre. De chaque côté du bassin se trouve deux immenses statues de pierre représentant un homme et une femme elfe agenouillés posant la
              pointe de leur lame sur le bord du bassin.
            </p>
            <p class="paragraphe">
              Le fond de la pièce est assez sombre mais vous distinguez que les lanternes au mur ainsi que des statues ont été cassées par les racines. Le long du mur de l'entrée il reste
              encore intact 9 statues et les lanternes. Chaque statue le long du mur de l'entrée sont identiques et représentent une guerrier elfe sylvain tandis que les statues sur le mur
              nord sont identiques entre elles mais représentent une guerrière elfe sylvaine.
            </p>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <ul>
              <li>
                <p class="paragraphe">@Test[car:per|diff:10|comp:Inspecter le bassin] : vous remarquez que le bassin est gravé de runes magiques.</p>
              </li>
              <li>
                <p class="paragraphe">
                  @Test[car:int|diff:10|comp:Connaissance magique] : les runes sont de deux types différentes. La première série est composée de 4 Oghams : Organique, transformation, Néant
                  et une source moyenne. La deuxième série est plus puissante : Air, Mouvement, conscience, Infini, Divination et une source puissante.
                </p>
              </li>
              <li>
                <p class="paragraphe">
                  @Test[car:int|diff:15|comp:Connaissance magique] : La première formule permet de faire “disparaître” de la matière organique (lorsqu'une acolyte meure par exemple)
                </p>
              </li>
              <li>
                <p class="paragraphe">
                  @Test[car:int|diff:20|comp:Connaissance magique] : la deuxième formule permet “d'appeler” partout de nouvelles recrues (acolyte ou suivante). En fonction de la “demande”
                  de la gardienne, une jeune femme elfe venant de n'importe où sur les Terres d'Arran sentait le besoin impérieux (et joyeux) de rejoindre le temple du Val Rouge. Elle ne
                  comprenait pas forcément son futur rôle mais elle le désirait de tout son cœur. Elle pouvait ainsi trouver une Arbre Mère dans une forêt s'y installer et elle
                  disparaissait pour réapparaître quelque temps plus tard dans le bassin. Une autre utilité de cette formule permettait de faire “ressentir” aux elfes du Val Rouge leur
                  envie de faire des offrandes à l'Arbre Sacré lorsque les denrées alimentaires venaient à manquer.
                </p>
              </li>
            </ul>

            <p class="paragraphe">
              Ce bassin servira de portail, bien plus tard dans la campagne, pour créer un pont entre le Village d'Arkanov, la Cité-état de Hyrr'Tarënn et le Temple du Val Rouge. Il mène
              également dans le Manoir Écarlate de Ramell à Kosland et dans la ville abandonnée des Peaux Vertes dans l'Ogrie.
            </p>
          </div>
        </div>
