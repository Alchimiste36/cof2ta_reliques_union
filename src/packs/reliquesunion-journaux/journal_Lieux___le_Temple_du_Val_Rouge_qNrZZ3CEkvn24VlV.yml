        <div class="journal-cof2ta-ru">
          <h1>Salle G : Dortoir de la suivante</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Cette petite pièce est aménagée avec un coffre, un lit et un placard. Le lit est parfaitement fait. Dans le placard et le coffre, on retrouve des vêtements chauds et froids,
              quelques bijoux simples et un pendentif en forme d'un symbole (montrer le symbole). Le pendentif est sculpté dans un bois très clair et les motifs sont coulés avec une espèce
              de sève ou d'ambre.
            </p>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <p class="paragraphe">Tout l'équipement coûte pas plus de 30pa. Le pendentif est très joli et peut valoir entre 50 et 100pa en fonction de la négociation.</p>
          </div>
        </div>
