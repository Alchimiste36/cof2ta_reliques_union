    image: {}
    text:
      format: 1
      content: |-
        <div class="journal-cof2ta-ru">
          <h1>Salle A : Entrée</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Vous arrivez dans une grande pièce de 12m par 12m carré. Les parois, d'environ 6m de haut, sont faites de pierres et lorsque vous descendez vous remarquez directement les
              lanternes accrochées aux murs qui s'allument et brûlent pour éclairant la pièce. Aucune fumée ne se dégage des lanternes et l'air semble particulièrement pur et frais. Le sol
              est en carreaux de pierres finement taillées dont les joints laissent pousser de la mousse. Lorsque vous arrivez en bas de l'escalier, un bruit de bois se fait entendre et la
              racine libérant l'escalier se referme.
            </p>
            <p class="paragraphe">
              Au nord et à l'ouest il y a de grandes doubles portes. A l'est, vous remarquez une avancée de 8m de large qui semble donner sur une immense pièce éclairée et une porte
              simple. et au sud, un passage de 4m de large donne sur une autre pièce. Chaque ouverture (passages ou portes) fait 4m de haut environ.
            </p>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <p class="paragraphe">
              Les lanternes s'allument lorsque l'on emprunte l'escalier. Elles sont magiques et peuvent illuminer à volonté. Ce sont les mêmes dans tout le temple. Elles s'allument
              lorsqu'on rentre dans une pièce.
            </p>
            <ul>
              <li>
                <p class="paragraphe">
                  @Test[car:int|diff:15|comp:Comprendre un mécanisme] (trois tests environ 30 minutes chacun) : pour en récupérer une. Objet magique très appréciable et cher (environ 1
                  000pa/lanterne). @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.ZIcZJ2BclgcmKT3t]{Lanterne du Temple du Val Rouge}
                </p>
              </li>
            </ul>
            <hr />
            <p class="paragraphe">Si les PJs remontent l'escalier, la racine libère à nouveau l'entrée du temple.</p>
            <hr />
            <p class="paragraphe">
              La porte à l'est (vers salle D) est verrouillée @Test[car:agi|diff:20|comp:Crocheter une serrure] pour l'ouvrir ou @Test[car:for|diff:20|comp:Défoncer une porte] pour la
              forcer. PV 15 - Solidité RD4 - immunisée au feu (la clef se trouve dans le bureau de la salle H)
            </p>
          </div>
        </div>
