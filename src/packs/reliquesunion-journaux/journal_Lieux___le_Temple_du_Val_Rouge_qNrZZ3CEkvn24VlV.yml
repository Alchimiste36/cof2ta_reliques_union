        <div class="journal-cof2ta-ru">
          <h1>Salle D : Bibliothèque</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              cette salle de 6m par 8m est entièrement recouverte de bibliothèques du sol au plafond. Des centaines d'ouvrages de toutes tailles sont positionnés avec soin sur les
              étagères. Certains livres sont très épais alors que d'autres ne ressemblent qu'à de fins fascicules. Les étagères montent jusqu'au plafond à 6m de haut et sur votre droite,
              sur un magnifique chevalet ouvragé, se tient un grand livre. A première vue, il s'agit de l'index de la bibliothèque. La position des livres y est consignée en fonction de
              son thème, de son auteur et de son intérêt.
            </p>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <p class="paragraphe">
              l'étude de cette bibliothèque donne une bonus de +5 sur un test de Culture Générale au bout d'une heure d'étude. Si on y consacre une journée entière le bonus passe à +15
              pour des connaissances “pas trop” spécifiques.
            </p>
            <p class="paragraphe">
              Si les PJs cherchent (@Test[car:int|diff:15|comp:Culture générale] environ une heure), ils trouvent un livre parlant des “<strong>Reliques de l'Union</strong>” et de son
              histoire. Appelé “<strong>les faux dieux des Plateaux Venteux à Esdavia</strong>” @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.x6i82EQBaT05Qiuh]{Les faux
              dieux des Plateaux Venteux}
            </p>
          </div>
          <hr />

          <div class="salleplus">
            <h2>Plus :</h2>
            <p class="paragraphe">
              <strong>Trésors :</strong> Certains recueils de cette bibliothèque sont inestimables mais il faudrait de longues heures d'estimation d'un expert pour établir un prix.
              @Test[car:int|diff:20|comp:Estimation] : environ 8000 pa. @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.7tnuVFofK4mXVInS]{Livres anciens du Val Rouge}
            </p>
          </div>
        </div>
