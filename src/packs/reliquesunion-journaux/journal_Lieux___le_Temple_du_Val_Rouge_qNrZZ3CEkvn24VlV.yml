        <div class="journal-cof2ta-ru">
          <h1>Salle K : Les deux sanitaires</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Lorsque vous ouvrez la porte, vous sentez une légère odeur de fleurs. Une petite sensation de bien-être et de propreté. Vous distinguez de suite sur le mur d'en face, de
              cette pièce de 6m par 4m, quatre runes élémentaires gravées. D'un côté du mur, vous apercevez un banc de latrines en bois poli et de l'autre côté un assez grand bassin rempli
              d'une eau fraîche et limpide coulant d'une petite fissure au mur.
            </p>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <p class="paragraphe">
              Si le groupe regarde dans les latrines, ils voient une petit cours d'eau passant à une trentaine de centimètre sous le sol et permettant l'évacuation des déjections.
            </p>
          </div>
        </div>
