        <div class="journal-cof2ta-ru">
          <h1>Salle E : Cuisine</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Cette pièce de 6m par 6m est aménagée en cuisine. Des étagères contiennent tous les ustensiles pour préparer à manger. Des flacons sont remplis d'épices, de fruits et légumes
              séchés, des graines, de racines… Deux plans de travail de chaque côté sont munis de tiroirs remplis d'autres ustensiles.
            </p>
            <p class="paragraphe">Sur l'étagère centrale une vasque en pierre est remplie d'une eau limpide coulant d'une petite fente sur le mur nord et dirigée vers la vasque.</p>
          </div>
          <hr />

          <div class="sallemj">
            <h2>Notes pour le MJs :</h2>
            <p class="paragraphe">Il y a de quoi faire une trentaine de repas végétariens nourrissants avec les vivres présents dans cette cuisine.</p>
          </div>
          <hr />

          <div class="salleplus">
            <h2>Plus :</h2>
            <p class="paragraphe">
              <strong>Trésors :</strong> Les ustensiles, de bonne facture, valent environ 400 pa pour un poids d'environ 25kg.
              @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.JTXx3GRfLc0D2qpJ]{Ustensils de cuisine du Val Rouge}
            </p>
          </div>
        </div>
