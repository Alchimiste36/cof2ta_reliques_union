        <div class="journal-cof2ta-ru">
          <h1>Salle F : La salle de prière</h1>
          <div class="description">
            <h2>Description :</h2>
            <p class="paragraphe">
              Une très grande salle de 20m par 22m recouverte d'un carrelage de deux couleurs. Les carreaux blanc semblent lustrés et les bleu clair luisent d'une légère lueur dansante.
              Quatre braséros disposés au centre de la salle sont remplies de blocs translucides qui ressemblent à de la gelée et qui brillent d'une couleur jaune ou violette. Tout autour
              de la salle de nombreuses statues (13) sont toutes différentes et représentent des elfes sylvains. Certains semblent de grands guerriers, d'autres des nobles ou encore des
              érudits ou des shamans. Une plaque est visible sur chaque socle sur lequel est inscrit le nom de chaque personne. Sur le mur Est une statue est plus imposante que les autres.
              Elle représente un elfe sylvain richement habillée avec le visage déformé par un rictus de folie. L'avidité se sent dans son regard. Il porte une robe noble et une paire de
              bracelets richement ouvragés aux poignets. En face, de cette statue on trouve un trône imposant construit dans un mélange de pierre et de tronc d'arbre.
            </p>
          </div>
          <hr />

          <h2>Notes pour le MJs :</h2>
          <div class="sallemj">
            <h3>Les Statues :</h3>
            <ul>
              <li>
                <p class="paragraphe">3 Guerriers :</p>
                <ul>
                  <li>
                    <p class="paragraphe"><strong>Aboreth</strong> (H avec longue-vue)</p>
                  </li>
                  <li>
                    <p class="paragraphe"><strong>Comissana</strong> (F avec baguette)</p>
                  </li>
                  <li>
                    <p class="paragraphe"><strong>Diramfir</strong> (F avec cristal)</p>
                  </li>
                </ul>
              </li>
              <li>
                <p class="paragraphe">3 Nobles :</p>
                <ul>
                  <li>
                    <p class="paragraphe"><strong>Kanfireth</strong> (F avec livre)</p>
                  </li>
                  <li>
                    <p class="paragraphe"><strong>Ramajissa</strong> (F avec sextant)</p>
                  </li>
                  <li>
                    <p class="paragraphe"><strong>Gorss'Raa</strong> (H avec couronne)</p>
                  </li>
                </ul>
              </li>
              <li>
                <p class="paragraphe">3 érudits/mages :</p>
                <ul>
                  <li>
                    <p class="paragraphe"><strong>Marjina</strong> (H avec Lance)</p>
                  </li>
                  <li>
                    <p class="paragraphe"><strong>Boëliaa</strong> (F avec menottes)</p>
                  </li>
                  <li>
                    <p class="paragraphe"><strong>Ealireth</strong> (F avec baton)</p>
                  </li>
                </ul>
              </li>
              <li>
                <p class="paragraphe">3 shamans :</p>
                <ul>
                  <li>
                    <p class="paragraphe"><strong>Fannilias</strong> (H avec Arc)</p>
                  </li>
                  <li>
                    <p class="paragraphe"><strong>Iris Mea</strong> (H avec clef)</p>
                  </li>
                  <li>
                    <p class="paragraphe"><strong>Laajaan</strong> (F avec épée)</p>
                  </li>
                </ul>
              </li>
            </ul>
            <p class="paragraphe">
              Pour ouvrir la salle secrète §, il faut remettre le bon objet sur chaque statues pour correspondre à l'histoire de la chute du "faux dieu" Izareaa. Le récit se trouve dans la
              bibliothèque du dortoir de la Shaman Salle H.
            </p>
            <p class="paragraphe">
              Si un objet est mal positionné sur une statue, la statue du Faux Dieu Izareaa se réveil et attaque toute forme de vie dans la pièce en commençant par le plus proche. Lorsque
              la statue est détruite elle se recompose sur son support au bout de quelques minutes.
            </p>
          </div>
          <hr />

          <h2>Plus :</h2>
          <div class="salleplus">
            <p class="paragraphe"><strong>Trésors :</strong> Les blocs translucides se transforment en liquide et coulent au sol si on les sort du braséro. Ils n'ont aucune valeur.</p>
            <hr />
            <p class="paragraphe">Toutes les statues sont fixées au sol et ne peuvent être détachées sans les briser.</p>
          </div>
        </div>
