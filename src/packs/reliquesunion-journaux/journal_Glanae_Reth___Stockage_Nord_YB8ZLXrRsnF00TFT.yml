            system:
              key: stockage-nord
              description: >-
                <p>Trouv&eacute; dans la cit&eacute; de Glanae'Reth, ces
                multiples caisses, sacs, cagettes, panier, tonneaux...
                contiennent divers produits.</p>

                <ul>

                <li>Des v&ecirc;tements,</li>

                <li>De la nourriture,&nbsp;</li>

                <li>des outils de tous les jours,&nbsp;</li>

                <li>du papier et mat&eacute;riel d'&eacute;criture,</li>

                <li>des bouteilles de sirop ou d'alcool</li>

                <li>des tonneaux de bi&egrave;re et cidre</li>

                <li>des sacs de c&eacute;r&eacute;ales,</li>

                <li>des ustensils de cuisine</li>

                <li>...</li>

                </ul>

                <p>Le poids total des diff&eacute;rents stocks dans les
                pi&egrave;ces repr&eacute;sente des centaines de
                kilogrammes.</p>
              source: Lana'Sir
