    text:
      format: 1
      content: "<p style=\"margin:6.0pt 0cm 6.0pt 0cm\"><span style=\"font-family:Arial, 'sans-serif'\">Seigneur de @UUID[JournalEntry.igUjJ5hLR3SUgGDR]{La Cité d'Ispier}, Jaspar Bonarion est un homme dans la force de l'âge.\_</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:Arial, 'sans-serif'\">Grâce aux stratégies militaires mises en place par son père durant les assauts des Peaux Vertes contre la cité Orkadia, sa famille hérite de la cité d'Ispier. Jaspar prend les rênes de la ville à la mort de son père, il y a 15 ans et @UUID[JournalEntry.IJse9uBbcqtPWW2C]{Orkadia} met à son service un mage humain du nom de Hisp Galik, il y a presque 6 ans.</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:Arial, 'sans-serif'\">Il est respecté par son peuple malgré son peu d'intervention directe dans les rue de la ville, préférant la gestion de la cité depuis le château. Il connait tous les dossiers de la ville et de ses habitants et il prend à coeur de gérer au plus vite les confrontations de voisinage ou les conflits. Le château est accessible sur rendez-vous pour des séances de doléances mais n'importe quel villageois peut s'entretenir avec le seigneur dès qu'il en ressent le besoin.</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:Arial, 'sans-serif'\">Sa fille unique se nomme <strong style=\"box-sizing:border-box;user-select:text\">@UUID[JournalEntry.HoNs0YQCQeWlUAKr]{Lana'sir Bonarion}</strong></span><span style=\"box-sizing:border-box;user-select:text;font-size:var(--font-size-14)\"><span style=\"font-family:'var(--font-primary)', 'serif'\"><strong style=\"box-sizing:border-box;user-select:text;font-size:var(--font-size-14)\">.</strong></span> Elle a 17 ans et elle n'a jamais connue sa mère qui est morte d'une infection lorsqu'elle avait 3 ans.</span></p><p style=\"box-sizing:border-box;user-select:text;font-variant-ligatures:normal;font-variant-caps:normal;orphans:2;widows:2;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;word-spacing:0px;margin:6.0pt 0cm 6.0pt 0cm;text-align:start\"><span style=\"font-family:Arial, 'sans-serif'\">A la suite de ce drame, Jaspar Bonarion a subit une longue période de dépression lors de laquelle son conseiller a continué la gestion de la ville. A la suite de cette dépression, il reprend le contrôle de la cité d'Ispier avec une main juste et une grande ambition pour développer cette petite cité dans l'ombre de Blanche Paix. Il se tourne de plus en plus vers la Grande Cité d'Orkadia et coupe de plus en plus les ponts avec sa voisine car, il s'en doute, le développement de sa ville n'est pas idéal pour le commerce de Blanche Paix.</span></p>"
