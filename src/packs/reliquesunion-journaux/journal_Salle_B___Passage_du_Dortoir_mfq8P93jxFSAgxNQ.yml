    text:
      format: 1
      content: "<div class=\"arran-mod\"><div class=\"salledescr\"><p><strong>Description :</strong></p><p><strong>Cette salle possède une immense étagère dans l’angle Ouest (6m de haut). Sur celle-ci, se trouvent de nombreux draps, tissus, livres, serviettes, produits</strong> d’entretien et de toilette, équipement en tout genre. Une échelle est accrochée sur l’étagère pour atteindre les étages plus hauts.</p><p>Un long couloir part vers l’Ouest et de nombreuses portes sont visibles tout autour de vous.</p></div><div class=\"sallemj\"><p><strong>Notes pour le MJs :</strong></p><p>La porte de la salle G et celle au fond du couloir (salle J) sont fermées à clef. <span style=\"font-family:Arial\"><strong>@Test[car:agi|diff:20|comp:Crocheter une serrure]</strong></span> pour l’ouvrir ou <span style=\"font-family:Arial\"><strong>@Test[car:for|diff:20|comp:Défoncer une porte]</strong></span> pour la forcer. PV 15 - Solidité RD4 - immunisée au feu (la clef se trouve dans le bureau de la salle H)</p><p>Les livres sur les étagères sont des recueils pratiques et techniques (cuisine, artisanat, ingénierie, communication, histoire de base des Terres d’Arran, contes et légendes, livres religieux de prières…).</p></div><div class=\"salleplus\"><p><strong>Plus :</strong></p><p>Dans les étagères, chaque objet est de très belle facture. Il y en a pour au minimum 2 000pa d’équipement. Maana verrait d’un très mauvais œil le pillage de ces objets.\_@UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.siKjS65RiyTM8DNz]{Étagères du Passage du dortoir}</p></div></div>"
