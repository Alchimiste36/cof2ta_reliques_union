      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><em><strong>Compilation de quelques textes historiques trouvés dans
        la bibliothèque royale et du maitre runiste d'Hyrr'Tarënn. Les textes
        semblent dater d'environ 7 800 après le Grand Schisme suite à la
        découverte d'un ancien grimoire elfique dans une
        tombe.</strong></em></p><p></p><p>Le culte de la Balance est une
        religion elfique oubliée depuis bien des siècles. Sa création semble
        remonter à trois millénaires après le Grand Schisme.</p><p>D'après les
        racontars, certains vieux elfes isolés parlent encore de ce dogme dans
        les Iles Blanches mais aujourd'hui ce culte est en grande majorité
        oublié ou méprisé par les quelques elfes qui s'en
        souviennent.</p><p><strong>Fondé par des elfes blanc, le culte de la
        Balance est basé sur l'équilibre à tout moment et partout sur les Terres
        d'Arran.</strong> Le Grand Schisme ayant séparé la race elfique en
        plusieurs peuples très différents les uns des autres et aux motivations
        divergentes, <strong>les prêtres et prêtresses de la Balance ont
        longtemps pensé qu'un équilibre parfait entre les espèces d'elfes
        permettrait une réunification des elfes en un seul et même peuple. Leur
        symbole était une chrysalide de</strong> <strong>papillon pouvant
        renfermer une beauté ultime ou un grand danger.</strong></p><p></p><p>Si
        cette idéologie parait saine et inoffensive, <strong>son application a
        vite créé d'énormes problèmes au sein des communautés elfiques.</strong>
        De nombreux débats ont bouleversés la politique des hauts dignitaires
        face aux "accomplissements" du culte de la Balance.</p><p>Pour
        équilibrer la balance géopolitique, d'abord au sein des peuples elfes
        puis de toutes les espèces des Terres d'Arran, <strong>il convient
        d'intervenir le plus vite possible et s'interposer entre les puissants
        du monde. Assassinats, raids meurtriers, empoisonnements, kidnapping,
        menaces et tortures, les prêtres de la Balance justifiaient leurs actes
        à chaque fois.</strong> Eviter une guerre, placer le bon dirigeant,
        inciter un mariage… des excuses qui permirent au culte de maneouvrer
        dans un silence des quelques personnes misent au courant de leurs
        agissements.</p><p>Qu'il est agréable pour une personnalité politique
        d'avoir une force qui se salit les mains pour évincer un voisin devenu
        trop puissant !</p><p></p><p><strong>Le culte de la Balance a réellement
        posé problème lorsque la pratique de la divination devint fréquente
        voire systématique</strong> dans la recherche
        d'équilibre.</p><p><strong>Près de 500 ans après sa création, le culte
        de la Balance commença à éliminer de futur tortionnaires avant même leur
        sorti du berceau.</strong> Pour empêcher un conflit s'il est nécessaire
        de traumatiser le jeune fils d'un seigneur de guerre avec une séquence
        de torture, c'est un prix minime à payer, d'après leur dogme. Maintenant
        réparti sur tous les continent et dans toutes les communautés, les
        responsables isolés sur les îles Blanches ne voyaient que bien trop tard
        les atrocités qui étaient commises au nom de la
        Balance.</p><p></p><p><strong>La dissolution de la Balance intervient en
        en 5842 après le Grand Schisme suite au procès d'un prêtre de la
        Balance</strong> d'une cité d'elfes sylvains.</p><p><strong>Nenandir du
        clan des Souches, prêtre de la Balance fut accusé de l'assassinat d'une
        jeune sylvaine de 8 ans.</strong> Il reconnu les faits immédiatement et
        se défendit à hauts cris en clamant que cette jeune elfe allait causer
        de grands préjudices pour les clans sylvains de Birkanie et du Nord de
        l'Ourann. A la suite de nombreux interrogatoires et débats publiques,
        Nenandir craqua dans un excès de rage et dévoila la triste
        vérité.</p><p>D'après ses visions divinatoires, la jeune sylvaine, dont
        le nom a été oublié, aurait fondé une famille avec le fils unique de
        Nenandir lui ouvrant les yeux sur les pratiques infames de son père et
        entrainant un rupture radicale et violente entre Nenandir et son fils.
        Cela aurait pour conséquence le bannissement du prêtre de la Balance
        dans un déshonneur total. Saupoudrez cette vision d'une bonne dose de
        vanité, d'une pincée d'impunité et de force consommation de drogues en
        tous genres et vous obtiendrez un assassinat odieux, cruel et
        abjecte.</p><p><strong>Le nom de la juge du procès de Nenandir devint un
        symbole, à cette époque, de la lutte contre la corruption</strong> et la
        vanité des puissances elfiques sur les Terres d'Arran. <strong>Tintaëlle
        Siar'yn fut anoblie quelques années après le procès</strong> et consacra
        le reste de sa longue vie à traquer et juger les dirigeants vaniteux,
        interventionnistes et aux idées coloniales. D'après certains passages du
        grimoire, <strong>la juge Siar'yn aurait pu être la créatrice des
        Tel'Quess'Aar Tilkaa, les Gardiens du Basculement, </strong>sans
        qu'aucune preuve ne puisse attester ces
        dires<strong>.</strong></p><p></p><p><strong>Après ce long procès, la
        vindicte populaire s'empara de ce drame et les procès se succédèrent
        pour une très grande partie des membres de ce culte catalogué en secte
        durant toute cette période et entraina la dissolution et la
        criminalisation du Culte de la Balance.</strong> Les récits racontés
        durant les procès devinrent des sujets d'études philosophiques pendant
        des siècles et depuis la pratique de la divination est extrêmement
        encadrée dans la majorité des peuples elfiques. <strong>L'un des experts
        des réflexions sur ces sujets est incontestablement </strong><span
        style="font-family:Signika, sans-serif"><strong>Maitre
        Acclespireth.</strong> Ce philosophe est le responsable de la
        </span>chair de divination de l'école d'Elsémur.</p><p></p><p>D'après
        les historiens ayant enquêtés sur le Culte de la Balance malgré la
        réticence des diplomates elfes, ces événements ont servi de leçon aux
        elfes même s'il existe certaines rumeurs historiques sur l'intervention
        préventive de dirigeants elfiques ou d'organisations obscures et/ou
        illégales. Certaines parties des textes recueillis parlent du "génocide
        préventif" des Elfes Rouges par la Loge Noire et un terme revient
        fréquemment : l'Aruspice. Une entité indéfinie qui aurait de puissants
        pouvoirs de divinations au service des elfes blanches.</p><p>Les résumés
        et analyses du Culte de la Balance sont parsemés souvent de commentaires
        des historiens nains. "Ca c'est bien la mentalité des elfes", "toujours
        à causer des problèmes en voulant sauver le monde", "après une telle
        infamie, ils ne vont pas nous prendre longtemps de haut, les bouffeurs
        de graines"… Autant de pages noircies par des remarques acerbes et
        surtout inutiles font perdre beaucoup de temps d'étude pour les
        érudits.</p><p></p><p></p>
