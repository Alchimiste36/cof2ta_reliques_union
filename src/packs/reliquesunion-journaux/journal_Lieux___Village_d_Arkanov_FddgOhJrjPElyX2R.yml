  - type: text
    name: F. Salle Commune - Salle de Repos/Méditation
    flags: {}
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>30</strong></h2></td><td
        data-colwidth="349"><h2 style="text-align:center"><strong>50 pour
        assister</strong></h2></td><td><h2 style="text-align:center"><strong>+2
        à +3</strong></h2></td></tr></tbody></table><h2><strong>Journée de
        travail :</strong></h2><p>La visite des différents étages du bâtiment
        sera permis dès que la jauge de Confiance attiendra 30 points mais pour
        assister aux soirées de cérémonies ou populaires, il faudra que le PJ
        atteigne minimum 50 points de Confiance.</p><p>Que se soit pour des
        cérémonies traditionnelles ou des soirées plus légères, l'ambiance est
        toujours agréable et bon enfant. On peut ressentir le trac des
        participants avant la soirée mais sinon ce sont des grands moments de
        joie et de sourire. Les enfants sont toujours devant l'estrade et
        donnent de la voix lorsqu'ils connaissent déjà le conte. Dans la plupart
        des cérémonie ou soirées légères, les Centaures participent en tapant du
        sabot, en répétant ou en applaudissant, par exemple. Si les PJs jouent
        le jeu avec les Centaures, ils ne seront jamais moqués mais, au
        contraire, même les plus conservateurs leur lanceront des regards
        approbateurs et/ou complices.</p><ul><li><p><strong>CHA-FILOUTERIE DD10
        pour participer aux cérémonies et soirée</strong> - si raté =&gt;
        quelques rires et chuchotements - si réussi de 10+ =&gt; Confiance
        +5</p></li><li><p><strong>INT-CULTURE GÉNÉRALE DD10 pour comprendre un
        peu mieux les rites et coutumes du
        Village</strong></p></li></ul><p></p><h2>Description
        :</h2><h3>Rez-de-Chaussée :</h3><p>Dans ce très grand bâtiment, au
        plafond très haut (9m), la grande majorité du sol est couvert de paille
        et au centre de la pièce se trouve un grand foyer merveilleusement
        décoré et graver de runes magiques qui permet d'éviter de propager la
        chaleur trop brutale des braises et flammes aussi de permettre une
        combustion automatique du charbon ou du bois., Une estrade en pierre
        taillée est située devant le grand escalier qui monte dans les étages et
        permet de s'installer pour raconter les histoires, les contes et les
        annonces.</p><p>Au delà de la porte normale qui donne sur la rue, sur le
        mur qui donne vers la bibliothèque est installée trois immenses portes
        en bois ferrées de bandes de métal joliment travaillées. Un système de
        corde et de poulies installé sur la hauteur du mur extérieur permet,
        grâce à une grande manivelle de soulever entièrement les trois lourdes
        portes pour ouvrir sur la cour située entre la salle commune et la
        bibliothèque. Il faut au moins deux Centaures pour manipuler la
        manivelle et c'est un grand honneur. Ils respectent une danse très
        rythmique lorsqu'il soulèvent ces portes.</p><p>Au rez-de-chaussée, un
        espace au fond partiellement sous l'escalier est "caché" par des
        paravents qui permettent à certains Centaures en famille ou entre amis
        de se retrouver plus au calme pendant les soirées. Dans la plupart des
        cas, c'est dans ce coin de la pièce que les femelles Centaure mettent
        bas en choisissant les villageois qui peuvent assister à ce
        moment.</p><p>Plusieurs types de cérémonies sont faites dans cette
        pièce. Les naissances, les unions, les rites traditionnels mais aussi
        des soirées humoristiques, des pièces de théâtre proposées par les
        enfants ou les adultes, la lecture d'histoires vécues ou inventées…
        Lorsqu'il faut faire une grande cérémonie importante, les portes sont
        ouvertes et le maitre de cérémonie s'installe sur le balcon à l'étage de
        la bibliothèque pour officier.</p></div><div
        class="arran-mod"><p></p><h3>Premier étage : Repos et
        convalescence</h3><p>Au premier étage, la pièce est entièrement
        recouverte d'une paille fraiche, à part le dôme du foyer du
        RdC.</p><p>Les villageois peuvent venir ici pour se reposer, prendre du
        temps pour eux, discuter entre amis ou régler des comptes lors de
        conflits. Lorsqu'il y a un drame (attaque des Ombres Blanches) ou une
        catastrophe (éboulement ou risque de tempête de neige), la totalité des
        villageois peuvent se réunir au RdC et au premier étage pour se protéger
        et se réconforter. C'est dans cette pièce que l'on voit le mieux la
        résistance de ce bâtiment et de certains autres du village. Les murs
        sont réalisés en pierre avec une structure de bois et renforcés par des
        barres de métal. Autant dire qu'ici on est en sécurité même si un bout
        de la montagne venait à tomber sur le village.</p><p></p><h3>Deuxième
        étage : Observatoire et salle de méditation</h3><p>Dans l'une des tour
        du bâtiment <span style="font-family:hobo">on peut utiliser une
        longue-vue qui permet d'observer soit les étoiles et le ciel soit les
        hauteurs des montagnes environnantes. Peu de personne utilise la lunette
        mais depuis les attaques des Ombres Blanches il y a chaque nuit un
        Centaure dans cette tour ou celle à l'étage de l'atelier de
        couture.</span></p><p><span style="font-family:hobo">L'autre tour est
        une petite pièce très cocooning tapissée de coussins confortables. Les
        vitraux sont colorées de teintes réconfortantes. Quand on s'installe
        dans cette pièce, les bruits du village sont presque tous étouffés et
        l'ambiance permet de faire des séances de méditation très appréciables.
        Une petite clochette en métal permet à un Centaure de "réveiller" la
        personne qui médite.</span></p><p></p><p></p></div>
