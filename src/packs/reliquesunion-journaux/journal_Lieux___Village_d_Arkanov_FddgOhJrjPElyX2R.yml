              - name: Huile
                type: item
                img: icons/containers/chest/chest-small-gold-cherry.webp
                system:
                  key: huile
                  description: >-
                    <p>Une flasque de 0,5 litre d'huile permet de faire
                    br&ucirc;ler une lanterne ou une lampe pendant 6 heures.</p>

                    <p>Le personnage peut &eacute;galement utiliser la flasque
                    d'huile comme une arme &agrave; aspersion, &agrave; la seule
