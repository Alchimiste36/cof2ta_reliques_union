    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>-20</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>-20</strong></h2></td><td><h2
        style="text-align:center"><strong>+2 à
        +4</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>Désherber, planter, faucher, retourner la terre,
        récupérer des fleurs ou des graines, cueillir les légumes, nettoyer les
        allées et surtout s'occuper du compost et de la gestions des crottins de
        Centaures, il y toujours de quoi faire dans cette zone du
        village.</p><ul><li><p><strong>SAG-NATURE/SURVIE DD10 pour s'occuper des
        plantes</strong> - si raté =&gt; blessures ou mauvais
        travail</p></li><li><p><strong>FOR-ATHLETISME DD10 pour s'occuper du
        compost</strong> - si raté =&gt; maladie ou mauvais
        travail</p></li></ul><p></p><h2>Description :</h2><p>Entouré par le lac
        et la forêt, on trouve toute une zone pour cultiver la nourriture et les
        plantes médicinales et aromatiques pour le village. Une petite zone de
        culture en ligne pour des céréales et des graines, une partie assez
        luxuriante avec de nombreux légumes et petits arbustes fruitiers, un
        verger contenant plusieurs espèces d'arbres et, le long du lac, une zone
        de compost où sont déposer les déchets de cuisine, les crottins des
        centaures et les rebus des artisans (copeaux, sciures, vieux tissus…),
        les feuilles mortes... Il faut régulièrement retourner le compost,
        l'amender, le mouiller en ouvrant une partie du mur entre le lac et le
        compost ou l'assécher. Une petite zone du compost permet de récupérer
        des insectes qui y vivent afin de les griller pour les manger ou les
        préparer pour la fabrication de remèdes.</p><p>Le potager, à première
        vue, semble assez anarchique mais tout y est à sa place et chaque plante
        y pousse en harmonie avec ses voisines.</p><p>Dans le potager ou la
        parcelle de champs, il est possible de trouver des herbes et graines qui
        sont fumées ou consommées par les Centaures et qui les apaisent ou les
        rendre "stone" à la manière des têtes de chanvre qu'utilisent les
        humains. <em>(voir notes secrètes)</em></p><p>Le grand bâtiment sert à
        entreposer les outils de jardinage mais également pour conserver les
        légumes et les plantes, pour faire sécher certaines denrées et pour y
        entreposer les graines, tubercules et autres sachets de
        pollens.</p><p></p><p></p></div>
