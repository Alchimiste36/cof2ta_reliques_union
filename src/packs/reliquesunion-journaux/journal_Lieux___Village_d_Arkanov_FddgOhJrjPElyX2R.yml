      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>20</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>20</strong></h2></td><td><h2
        style="text-align:center"><strong>+3 à
        +5</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>On peut demander aux PJs d'aller récupérer des outils
        ou matériaux au RdC du bâtiment :</p><ul><li><p><strong>SAG-PERCEPTION
        DD10 pour trouver le bon objet</strong> - si raté =&gt; moquerie et
        revient bredouille</p></li></ul><p>Les PJs peuvent surtout aider dans
        l'atelier de couture au premier étage avec minutie et rigueur, sans
        oublier que chaque morceau de tissus ou bout de ficelle est fabriqué au
        village à la main avec beaucoup d'exigence, ainsi il convient de ne pas
        gaspiller. </p><ul><li><p><strong>DEX-AGILITE DD10 pour aider à
        l'atelier de couture et de cuir</strong> - si raté =&gt; blessures ou
        mauvais travail ou gaspillage.</p></li></ul><p>Si les PJs ont une jauge
        de Confiance dépassant les 60 points, on peut leur demander de passer la
        nuit au poste d'observation. C'est un grand honneur et il faut espérer
        que la personne ne s'endorme pas sous peine d'avoir de grandes
        remontrances :</p><ul><li><p><strong>SAG-PERCEPTION DD10 pour observer
        les alentours</strong> - si raté =&gt; Pas trop grave sauf si c'est le
        soir de l'attaque des Ombres
        Blanches</p></li><li><p><strong>CONSTITUTION DD10</strong> <strong>=&gt;
        3 tests à réussir d'affilés</strong> - si raté =&gt; perte de 1 PR si
        plus aucun PR le PJ s'endors. Libre au PJ de prévenir un Centaure qu'il
        est trop fatigué et de se faire
        remplacer.</p></li></ul><p></p><h2>Description :</h2><p>Lorsque l'on
        rentre au rez-de-chaussée de ce bâtiment, on pense à un grand foutoir
        désorganisé tellement il y a de caisses, tablettes, rangements ou sacs
        tous remplis d'outils en tout genre, des matériaux divers et variés, des
        pièces pas encore finies, des structures cassées ou déboitées qui
        demanderaient réparation. Après quelques heures passées à chercher un
        outil ou un matériel on repère une sorte d'organisation et mieux vaut ne
        pas mettre le bazar dans cette "harmonie" étrange.</p><p>Au premier
        étage, vous pouvez trouver un atelier complet de couture avec tout le
        nécessaire pour la fabrication de vêtements, poupées, sacs… que ce soit
        avec le tissus tout droit sortie de la tisseranderie ou les quelques
        pièces de cuir provenant de la chasse. Provenant de la forge, il est
        aussi possible de sertir des oeillets ou de coudre des boucles. Quelques
        seaux et des étendoirs servent à colorer ou déteindre les
        tissus.</p><p>Ce n'est pas étonnant mais le sol, les meubles et les
        étagères sont recouverts de petits bouts de fils, de tissus, des chutes
        de cuirs et des morceaux de craie permettant de tracer sur les
        étoffes.</p><p>Au deuxième étage dans une petite tour assez haute, on
        peut utiliser une longue-vue qui permet d'observer soit les étoiles et
        le ciel soit les hauteurs des montagnes environnantes. Peu de personne
        utilise la lunette mais depuis les attaques des Ombres Blanches il y a
        chaque nuit un Centaure dans cette tour ou celle de la salle
        commune.</p><p></p><p></p><p></p></div>
