      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>40</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>50</strong></h2></td><td><h2
        style="text-align:center"><strong>+4 à
        +5</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>Au RdC, il est assez qu'on ai besoin des PJs mais on
        pourra leur demander d'aller vérifier des quantités, des dimensions ou
        des plans de fabrication. Ce qui est bien avec les documents techniques
        s'est que, même sans parler la langue, un travailleur sera reconnaitre
        un plan d'un autre.</p><p>Dans l'atelier de Sculpture, les PJs peuvent
        être amenés à décorer, ajuster, créer de petits objets, adapter un
        manche d'outils… Tout se travail nécessite agilité, patience et calme
        pour être réalisé.</p><ul><li><p><strong>DEX-AGILITE DD10 pour les
        tâches de sculpture</strong> - si raté =&gt; bazar ou mauvais travail.
        Kaiwhakairo sera taquin avec des PJs pas très
        doués.</p></li></ul><p></p><h2>Description :</h2><h3>Rez-de-Chaussée
        :</h3><p>Il n'y a pas grand chose au RdC de ce petit bâtiment. Quelques
        caisses de matériaux ou d'outils, un long bac remplie de sciure et
        surtout un table remplie de document et carnets de notes. C'est ici que
        se concentre les informations pour les différents artisans du village.
        Lorsqu'il y a une demande ou un problème, lorsqu'un villageois décide de
        s'occuper d'une tâche ou, par exemple, l'endroit où on a placé tel pièce
        ou matériel.</p><p>On peut y croiser souvent la cheffe du village,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.XP0WbhdG2M6FsbW1]{Tumuaki},
        venant inspecter si le travail avance,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.WIrrciqtGuvianLz]{Kamura}
        la responsable des fabrications ou encore
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.oChorGnSdltQBYeg]{Kaiwhakairo}
        regardant s'il y a moyen de rendre service en répondant à telle ou telle
        demande mais aussi car il passe beaucoup de temps et de longues nuits
        dans l'atelier de sculpture du premier étage.</p><p></p><h3>Premier
        Étage : Atelier de Sculpture</h3><p>Rien en montant l'escalier, on
        commence à sentir la sciure et cette légère odeur du bois que l'on
        travaille. En arrivant dans cette pièce, on découvre un sol recouvert de
        copeaux, bout de bois et poussières. Sur le très grand établi, de
        nombreux outils sont disposés sur un côté, des grands tiroirs sont
        installés sous le plan de travail et une multitude de pièces de bois
        sont posées à droite et à gauche. Sous l'épaisse planche de travail, une
        espèce de tabouret rembourré permet au Centaure de se poser pour pouvoir
        travailler pendant plusieurs heures confortablement.</p><p>Sur la table
        on trouve des jouets pour les enfants, des façades de meubles qui
        attendent d'être gravés de belles fioritures, des manches d'outils à
        adapter ou encore des boutons et autres objets servant tous les jours au
        village.</p><p>Dans cette pièce, on entend en continu le ronronnement et
        les légères vibrations de la machinerie qui est fixée sur l'un des murs.
        Ca fait le même effet qu'un chat posé sur les genoux une froide nuit
        d'hiver, apaisant et
        réconfortant.</p><p>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.oChorGnSdltQBYeg]{Kaiwhakairo}
        passe la plupart de son temps dans l'atelier de sculpture. Il aime
        graver, poncer, décorer et personnaliser les objets du quotidien. Avec
        l'aide des menuisiers, il fabriquera des lits adaptés aux PJs lorsqu'ils
        seront assez en Confiance pour être installé dans une
        maison.</p><p></p><p></p></div>
