      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>20</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>30</strong></h2></td><td><h2
        style="text-align:center"><strong>+4 à
        +6</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>Réparer certains meubles, faire du petit artisanat
        divers, fabriquer le charbon… Il y a toujours quelque chose à faire ici.
        Souvent seul, le PJ pourra être "dérangé" par
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.oChorGnSdltQBYeg]{Kaiwhakairo}
        qui vient réparer un tiroir ou un manche
        d'outil.</p><ul><li><p><strong>DEX-AGILITE DD10 pour réaliser de petits
        travaux utilitaires</strong> - si raté =&gt; blessures ou mauvais
        travail</p></li></ul><p></p><h2>Description :</h2><p>Dans cette pièce,
        on trouve un grand bazar organisé qui permet de réaliser beaucoup de
        petites tâches du quotidien et aussi de s'isolé lorsque l'on veut
        travailler sur une pièce spécifique. Même s'il n'y a pas vraiment de
        plan de travail, la plupart des Centaures travaillent sur les caisses,
        sur l'enclume ou sur la margelle du four. Ce dernier est assez
        particulier. Il permet de transformer du bois en charbon très
        calorifique en étouffant la combustion et sert aussi fréquemment pour
        faire cuire des réalisations simples de la poterie (tuiles, briques,
        bols…). Le plus agaçant ici c'est de devoir aller chercher dans les
        autres bâtiments d'artisanat certains outils spécifiques ou des
        matériaux manquants.</p><p>On peut trouver dans cette pièce plusieurs
        jours par semaine, le père de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.odrYGDrjFeqgEW6e]{Vaiata
        Viata},
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.oChorGnSdltQBYeg]{Kaiwhakairo}
        occupé à réparer des objets ou meubles du village lorsqu'il n'est pas
        dans l'atelier de sculpture.</p></div>
