        pagetype: quest
        img: >-
          https://assets.forge-vtt.com/65df8afbb461b8edb28b1d27/cof2ta_reliques_unions/test-v10/Campagne%20LANA%27SIR/04.ICONES/ICONES%20de%20Base/ENVIRONNEMENT/LIEUX-VILLES/house-farmland-small.webp
    _id: HpHLHMON7UhDnguz
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div class="arran-mod"><table><tbody><tr><td><p><span
        style="font-family:Bookinsanity"><em>Dans cette grotte, vous distinguez
        des nombreux objets et caisses de stockage. Il y a des points d'eau
        clair malgré quelques planches et bout de tissu qui flotte à la surface,
        un coin cuisine avec quelques étagère et ustensiles de cuisine et le
        long de certains murs vous voyez des sacs et des caisses qui contiennent
        quelques vivres et, aussi, des outils et des matériaux (planches de
        bois, charbon, gravats…). Dans un renfoncement, vous trouver une petite
        paroi de bois qui cache des toilettes et dans un autre coin de la
        grotte, de la paille a été étalée au sol en guise de
        literie.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Dans le fond de la grotte, vous
        remarquez les signes et les outils pour miner les parois, briser les
        rocailles et même un fourneau pour forger et faire fondre les métaux
        minés. De nombreux grâvat jonche le sol, les marteau, poinçon et pinces
        sont en très bon état malgré un début de rouille sur certain et un peu
        partout dans votre nouvelle demeure, vous trouvez des brouettes et des
        chariots.</em></span></p><p><span
        style="font-family:Bookinsanity"><em>Pour finir, au bout d'un large
