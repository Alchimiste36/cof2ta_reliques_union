        B2lHEMirhf4eAR4i:
          notes: >-
            <p>La plante qui est fumée par les Centaures est de la Kicha,
            celle-là même qui sera utilisée contre les elfes et les anciennes
            races pendant les Guerres d'Arran.</p><p>Les Centaures ne sont pas
            immunisés contre leur côté très additif mais ils consomment une
            tubercules spéciale poussant sur les racines des arbres étranges de
            leur forêt pour totalement annuler les effets délétères de la Kicha.
            Dans plusieurs chapitres de cette campagne, ça pourra leur
            servir.</p>
