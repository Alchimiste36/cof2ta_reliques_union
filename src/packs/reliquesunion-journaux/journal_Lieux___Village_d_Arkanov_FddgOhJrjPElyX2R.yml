      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>10</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>10</strong></h2></td><td><h2
        style="text-align:center"><strong>+3</strong></h2></td></tr></tbody></table><h2><strong>Journée
        de travail :</strong></h2><p>Au vu de la difficulté à se faire
        comprendre, dès que les PJs atteignent les 10 points de Confiance, ils
        seront inviter à passer quelques jours par semaine à l'école avec les
        enfants, adolescents et certains adultes du village.</p><p>Si les PJs
        sont assidus et essayent de comprendre, ils gagneront 3 points de
        Confiance par jour d'étude.</p><p>Des cours particuliers seront proposés
        aux PJs les plus attentif avec le Professeur
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.wC6n6PG5zG9b1r1q]{Kaiako}
        :</p><ul><li><p><strong>Cours à l'école : INT-CULTURE GÉNÉRALE
        DD10</strong> - si raté =&gt; énervement des autres élèves (perte de 2
        points de Confiance)</p></li><li><p><strong>Cours particuliers ;
        CHA-PSYCHOLOGIE DD10</strong> - si raté =&gt; perte de 4 points de
        Confiance</p></li></ul><p>Dans les livres ou les cours, les PJs pourront
        découvrir certaines particularités du Village d'Arkanov
        :</p><ul><li><p>l'existence du duo de marteaux et de la cloche qui
        créent la bulle de silence autour du village</p></li><li><p>L'histoire
        du démon qui s'en ai prit au village il y a bien longtemps et dont le
        récit est raconté par la Gardienne du Temple du Val Rouge
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.srtuJJYdsgb22oAc]{Échanges
        avec Arkanov}</p></li><li><p>La venue de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.fcheFuyyHvhesbGI]{Timaor
        "Titi" DUNCLIN} il y a environ 15 ans</p></li><li><p>La grotte de
        cérémonie et une représentation de la fresque.</p></li><li><p>Les
        différentes machineries du Village</p></li><li><p>Les premières
        informations sur les Ombres Blanches (attaques depuis une dizaine
        d'années, kidnapping et meurtres, furtivité et attaques
        éclairs…)</p></li></ul><p>Le professeur restera vague sur les
        découvertes que font les PJs et il les enverra voir
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.acT0Ir2r38h6NiGJ]{Kiliko}
        s'ils ont des questions. Bien sur le chef ne répondra pas aux questions
        sauf si leur jauge de Confiance est assez
        haute.</p><p></p><h2>Description :</h2><p>L'école du village n'est pas
        bien grande mais elle possède tout ce qu'il faut pour bien étudier.
        Quelques tables centrales et déplaçables, des étagère remplies de
        nombreux ouvrages de diverses difficultés, des tableaux noirs pour
        écrire et même un globe assez complet des Terres d'Arran (mais ancien).
        Il est possible de pousser les éléments de la pièce pour faire des
        activités (apprentissage des danses rituelles, activités créatives,
        arts…</p><p>A l'étage on trouve d'autres bibliothèques et quelques
        tables pour des études plus approfondies pour les élèves avancées ou
        pour les adultes voulant développer leurs compétences ou leurs savoirs
        sur des sujets divers. Mécanique, menuiserie, préparation de repas ou de
        remèdes, étude du travail du bois ou du métal, apprentissage des runes…
        il y en a pour tous les goûts et pour tous les domaines dans cette
        bibliothèque. Les livres sont tous écrits en langage Centaure mais
        certain contiennent des images et des plans. Un bon moyen pour le groupe
        de développer son
        vocabulaire.</p><p>@UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.wC6n6PG5zG9b1r1q]{Kaiako}
        est un professeur respecté par les villageois (sauf par ses frères et
        son père). Il travaille souvent avec son épouse
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.r5qI27mY2igTtPx9]{Toa}
        qui elle enseigne les danses et les arts de
        combat.</p><p></p><p></p><p></p></div>
