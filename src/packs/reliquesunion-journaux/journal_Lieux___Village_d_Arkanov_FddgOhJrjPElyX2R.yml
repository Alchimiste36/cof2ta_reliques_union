    text:
      format: 1
      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>20</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>30</strong></h2></td><td><h2
        style="text-align:center"><strong>+4 à
        +6</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>Les PJs, qu'ils soient compétents ou non en forge,
        pourront être sollicités pour aider dans ce bâtiment. Il y a beaucoup à
        faire entre la fabrication des lingots raffinés, le trie des pépites de
        minerais et leur association pour réaliser des alliances, la réalisation
        de blocs damassés, l'entretien des foyers, le nettoyage des lieux et des
        outils…</p><p>Au premier et deuxième étage, seuls les PJs montrant une
        bonne volonté pourront aider pour des réalisation plus techniques et
        délicates.</p><p>Ils seront continuellement sous la supervision de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.PCoXZeY1iFNBwn9V]{Whakarewa}
        qui est une très bonne cheffe d'atelier et félicitera mes PJs pour leurs
        belles réalisations ou leur motivation. Souvent accompagnée par
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.gwSrhtEW8lmej4dY]{Kaipara},
        Whakarewa et lui montreront leur complicité malgré leurs
        différences.</p><p>Pour aider le jeune
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.5EMuSo6IAOrndEBQ]{Taitamariki}
        avec ses problèmes familiaux il faudra beaucoup de temps et de
        diplomatie.</p><ul><li><p><strong>FOR-ATHLETISME DD10 pour s'occuper de
        la forge au RdC</strong> - si raté =&gt; blessures ou mauvais
        travail</p></li><li><p><strong>DEX-AGILITE DD10 pour faire des
        réalisations dans les étages</strong> - si raté =&gt; blessures ou
        mauvais travail</p></li><li><p><strong>INT-ARCANES DD10 pour s'essayer à
        la gravure des runes</strong> pour les PJs ayant la
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-objets.Item.NjxSrzWK8434qvVY]{Voie
        de la magie runique} - si raté =&gt; échec simple / si réussi =&gt;
        objet ou arme magique et forte reconnaissance de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.PCoXZeY1iFNBwn9V]{Whakarewa}
        (+5 points de Confiance de base et +5 supplémentaires si c'est pour le
        bien de la communauté).</p></li></ul><p></p><h2>Description :</h2><p>Au
        delà des bruits que l'on peut entendre derrière les portes de ce
        bâtiment, on perçoit toujours de la fumée qui sort de sa
        cheminée.</p><p>La forge est une grande pièce dont le coeur est
        magnifique. Une forge incroyable digne des plus grande Forteresse-État
        naines des Terres d'Arran. Le foyer est divisé en deux cercles
        concentriques recouverts de runes finement ciselées et rayonnantes d'une
        énergie bleutée. Les braises du centre sont teintées de bleue et permet
        de monter les creusets à très haute température tandis que le cercle
        extérieur, plus classique permet de travailler le métal entre les coups
        de marteaux. Un autre foyer magique est positionné dans un coin de la
        pièce.</p><p>Le reste du rez-de-chaussée est équipé de plusieurs
        enclumes, racks à outils de très bonne qualité, chariots roulants et
        autre meules d'affutage et de façonnage. Sur le mur du fond, sous le
        large tuyau d'évacuation des fumées, se trouve des caisses remplies de
        différentes pépites de minerais pour réaliser les alliances, les épurer
        et les transformer en lingots facilement utilisables.</p><p>Marteaux,
        pinces, moules, sacs à charbon, étaux, enclumes… il y a tout pour faire
        un travail exceptionnel pour les équipements du quotidien, les armes
        ainsi que les éléments de structure, les pièces mécaniques et la
        quincaillerie.</p><p>Par une des fenêtre du RdC et du premier étage,
        deux cordes permettent d'actionner des soufflets qui maintiennent la
        température des foyers grâce à l'énergie hydraulique de la cascade du
        village.</p><p>Au premier étage, le travail de finition commence avec un
        plus petit foyer enchanté aussi par une forte magie. A part la coupole
        de la forge du RdC qui prend une grosse partie du centre de la pièce, on
        peut trouver ici quelques enclumes et plans de travail pour réaliser des
        travaux de forge plus précis avec plus de calme mais aussi pour graver
        les runes magique qui peuvent rendre les réalisations
        exceptionnelles.</p><p>Le long d'un mur, ce trouve deux bacs pour le
        traitement thermique du métal.</p><p>Dans une pièce plus petite au
        deuxième étage, on trouve un espace de travail spécialement conçu pour
        les dernières finitions. Affutage, travail de manches et poignées, étuis
        et lanières de cuirs, polissage et nettoyage des lames et des
        réalisations mécaniques.</p></div><div class="arran-mod"><p>Le couple
        qui s'occupe le plus de la forge est
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.PCoXZeY1iFNBwn9V]{Whakarewa},
        cette centaure femelle avec un talent exceptionnel pour le travail du
        métal et
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.gwSrhtEW8lmej4dY]{Kaipara}
        qui comble son manque de talent par une force impressionnante et une
        capacité à travailler pendant des heures sans sembler fatiguer. Ils
        travaillent main dans la main et Kaipara répond à toutes les exigences
        de sa conjointe sans broncher. Il leur arrive souvent d'être rejoint par
        le jeune
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.5EMuSo6IAOrndEBQ]{Taitamariki}
        voulant fuir sa maison et qui aime modeler le métal en fusion même si
        ses muscles ne sont pour le moment pas très développés. Ce sont les
        seuls moments où on peut voir une certaine sérénité sur les traits du
        visage de cet adolescent
        introverti.</p><p></p><p></p><p></p><p></p></div>
