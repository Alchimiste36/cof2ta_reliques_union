      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>20</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>30</strong></h2></td><td><h2
        style="text-align:center"><strong>+4 à
        +5</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>S'occuper de l'atelier de fabrication de bougie n'est
        pas très compliqué à part la délicatesse qu'il faut pour ne rien casser.
        Par contre la présence fréquente de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.ZGq5yQFYuv43MxqN]{Kite'Tihe}
        compliquera la vie du PJ. Diplomatie et calme seront els meilleures
        armes face à elle pour ne pas se faire engueuler ou même
        frapper.</p><ul><li><p><strong>DEX-AGILITE DD10 pour réaliser des
        bougies</strong> - si raté =&gt; casse d'outils, blessure ou mauvais
        travail</p></li><li><p><strong>CHA-PSYCHOLOGIE DD15</strong>
        <strong>face à Kite'Tihe</strong> - si raté =&gt; engueulade, si raté de
        5 ou plus, Kite'Tihe donnera un coup de bâton au PJ ou une gifle.
        </p></li></ul><p>Dans l'atelier de poterie, les PJs pourront entretenir
        le feu dans le four pendant de longues heures ou aider au façonnage des
        objets en argile. L'utilisation du tour à bâton sera difficile pour les
        PJs car il est dimensionné pour des Centaures mais avec un bon coup de
        force, cela impressionnera les
        Centaures.</p><ul><li><p><strong>CONSTITUTION DD10 pour entretenir le
        foyer</strong> - si raté =&gt; s'endort et perte des produits à
        cuire.</p></li><li><p><strong>FOR-ATHLETISME DD15 (deux tests) pour
        utiliser le tour à bâton</strong> - si raté =&gt; aucune conséquence /
        si réussi =&gt; +5 point de Confiance
        supplémentaires.</p></li><li><p><strong>DEX-AGILITE DD10 pour faire de
        la poterie</strong> - si raté =&gt; -1 PR mais aucune
        conséquence</p></li></ul><p></p><h2>Description :</h2><p>Lorsque l'on
        passe à proximité de ce bâtiment, il est impossible de ne pas sentir les
        odeurs qui s'échappent par la porte. Lorsque l'on ouvre cette dernière,
        on arrive directement dans l'atelier de fabrication de bougies avec ces
        dizaines de récipient, de marmites, de colorants et d'ustensiles de
        préparation. des tâches de cires recouvrent une grande partie du sol et
        de tous les objets présents. </p><p>Des tubes calibrés sont empilés sur
        les plans de travail, certains remplis en train de sécher, d'autres
        vides et nettoyés. Des rouleaux de cordelettes pour faire des mèches
        sont disposées à droite et à gauche et au centre de la pièce on trouve
        un grand étendoir souvent remplis de dizaines de bougies à façonner. A
        côté de lui, une grande vasque remplie de cire maintenue liquide grâce à
        des braises chaudes en dessous. Au fond de la pièce, une cuisinière
        permet de faire fondre ou de préparer la cire ou les arômes à rajouter
        aux bougies.</p><p>La plupart des outils et produits sont assez fragiles
        ainsi il faut être délicat quand on travail dans cet atelier tout en
        supportant la chaleur constante de la pièce.</p><p>Au rez-de-chaussée,
        presque tous les jours, on peut tomber sur
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.ZGq5yQFYuv43MxqN]{Kite'Tihe}
        qui grogne et s'énerve. Elle a un caractère particulièrement mauvais et
        aigri. Quand elle trouvera un des étrangers dans l'atelier de
        fabrication de bougie, il faudra rester calme et diplomate pour ne pas
        réveiller sa colère et sa méchanceté.</p><p>A l'étage, on laisse la
        place à l'argile qui est récupéré et filtré depuis le fond du lac. Cette
        terre fine est utilisé pour réaliser des pots, des outils, de la
        vaisselle en poterie ou en faïence grâce au grand banc de tournage au
        bâton. Lorsque l'on s'installe sur le banc, au dimension pour un
        Centaure, on peut rester longtemps à façonner l'argile humide pour la
        réalisation de tous les équipements du quotidien.</p><p>Un grand four de
        cuisson est installé au fond de la pièce et il faut rester à son contact
        pendant de longues heures pour maintenir une température constante, ni
        trop haute ni trop basse. Cette chaleur permet aussi de faire sécher les
        réalisations avant de la cuire.</p><p></p><p></p></div>
