      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>20</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>20</strong></h2></td><td><h2
        style="text-align:center"><strong>+3 à
        +4</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>Les PJs peuvent aider à préparer des repas et il faut
        en faire beaucoup tous les jours. Couper, cuire, rissoler, éplucher,
        aller chercher des herbes, touiller… et tout ça pour la grande majorité
        des Centaures du Village d'Arkanov. Certains préfère se restaurer en
        cuisinant seul avant ou après les autres car ils veulent continuer le
        travail mais tous les midi et tous les soir, des repas sont préparés et
        chaque Centaure vient se servir et apporter leur repas aux membres de
        leur famille. Même si certains mangent dans leur maison ou dans leur
        atelier, il est plus fréquent que les Centaures s'installent sur la
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.4zAi05f8Wo4newn1]{Place
        du Village}, le long du lac, dans le verger ou même dans la salle
        commune au rez-de-chaussée ou à
        l'étage.</p><ul><li><p><strong>INT-NATURE/SURVIE DD10 ou DEX-AGILITE
        DD10 pour préparer des repas</strong> - si raté =&gt; blessures ou
        mauvais travail</p></li><li><p><strong>CHA-PSYCHOLOGIE DD10 pour
        apporter leur repas à certains Centaures</strong> - si raté =&gt;
        maladresse ou mauvaise personne ou
        incivilité</p></li></ul><p></p><h2>Description :</h2><p>Il y a tout dans
        ce bâtiment pour préparer un grand nombre de repas tous les jours si on
        organise bien le travail et l'espace. Une partie des préparation se font
        d'abord dans le bâtiment de
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.3yTXJoDknYuCy9PC]{Préparation
        de Nourriture}.</p><p>La pièce est remplie de plan de travail,
        d'ustensiles, de vaisselles et surtout de nourriture en tous genres.
        Deux belles cuisinières sont quasiment toujours en chauffe et des
        bassins, directement reliés à la nappe phréatique, sont installer pour
        nettoyer les légumes et autres salades.</p><p>A l'étage, on trouve de
        nombreux stocks de denrée alimentaires en tout genre, ainsi que des sacs
        de céréales ou des caisses de produits séchés.</p><p>A n'importe quel
        moment du jour ou de la nuit, il n'est pas étonnant de croiser des
        Centaures dans cette cuisine collective. Que se soit la gourmande et
        cordon bleue
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.nVnugxCfNlRY7EyL]{Miihini},
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.oChorGnSdltQBYeg]{Kaiwhakairo}
        ayant oublié de se nourrir après une soirée passé dans l'atelier de
        sculpture ou encore le fils du chef,
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.JPUV1enjGxhcOmiz]{Wakaweti}
        qui prépare un repas copieux après un entrainement
        intensif.</p><p></p><p></p><p></p></div>
