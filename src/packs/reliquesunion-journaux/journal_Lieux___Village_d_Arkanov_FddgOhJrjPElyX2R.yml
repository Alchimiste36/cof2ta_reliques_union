  - type: text
    name: G. Bibliothèque - Salle d'étude - Cloche
    flags: {}
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>30</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>X</strong></h2></td><td><h2
        style="text-align:center"><strong>+1</strong></h2></td></tr></tbody></table><h2><strong>Journée
        de travail :</strong></h2><p>Il n'y a pas vraiment de travail à faire
        dans la bibliothèque mais les PJs pourront y accéder si leur jauge de
        Confiance est assez élevée.</p><p>Pour chaque demi-journée de recherche,
        les PJs pourront trouver quelques informations sur le village, certaines
        techniques ou des savoirs génériques mais surtout ils apprendront
        l'écriture et la langue des Centaures plus
        rapidement.</p><ul><li><p><strong>INT-CULTURE GÉNÉRALE DD10 pour
        apprendre progressivement la langue</strong> - si raté =&gt;
        rien</p></li><li><p><strong>INT-ARCANES DD10 pour comprendre un peu
        mieux les rites et coutumes du
        Village</strong></p></li></ul><p></p><h2>Description
        :</h2><h3>Rez-de-Chaussée et premier étage :</h3><p>Un immense bâtiment
        qui renferme une montagne de savoirs et de connaissances dans ses
        ouvrages et ses parchemins. Situé en face de la salle commune, les deux
        bâtiments entourent une place où peut se réunir les
        villageois.</p><p>Lorsque l'on rentre dans la bibliothèque, la première
        chose que l'on ressent c'est la fraicheur sèche de la pièce. Le murs, le
        sol et les vitraux sont conçus afin de favoriser la conservation des
        tomes et volumes présents dans les longues étagères de la
        bibliothèque.</p><p>Au premier étage, on découvre la poursuite du RdC
        avec d'autres étagères remplies de livres, tomes et parchemins plus ou
        moins anciens. Ici on peut atteindre aussi le balcon qui surplombe la
        cour et donne sur les immenses portes de la salle commune. Un pupitre
        permet la lecture de discours ou d'histoires. Contre le mur de chaque
        côté de la porte du balcon se trouve deux bannières en tissus
        magnifiquement décorées de symboles et de dessins stylisés de Centaures
        dans des scènes de la vie courante. <em>(<strong>SAG-PERCEPTION
        DD15</strong> =&gt; tout en bas des bannières en assez petit, on peut
        trouver le symbole représenté au centre du pendentif de
        Laotissa.)</em></p><p>Il est très compliqué pour le groupe d'aventuriers
        de trouver des informations ou des livres intéressants car la
        quasi-totalité des ouvrages sont écrites dans le langage des Centaures.
        Il est tout de même possible de trouver des plans techniques sans
        beaucoup de textes ou des livres très imagés (contes, histoires pour les
        enfants, livres techniques sur les plantes ou l'artisanat…).</p><p>Par
        contre dans la bibliothèque, on trouve presque tous les jours le jeune
        Centaure
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.z1cpfnKDsGoXcHQ7]{Te'Whakama}
        en train de lire et de rechercher des informations sur les traditions
        anciennes ou sur les savoirs perdu du village. De temps en temps, on
        peut l'observer répéter des danses traditionnelles dans les allées de la
        bibliothèque en essayant de décrypter certains
        livres.</p><p>Lorsqu'elles s'ennuient ou qu'elles veulent discuter avec
        Te'Whakama, on peut trouver
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.odrYGDrjFeqgEW6e]{Vaiata
        Viata} et sa meilleure amie
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.wEL33Ik2Ks3635EK]{Teina}
        dans la bibliothèque en train de papoter ou de feuilleter des ouvrages
        de contes et de légendes ou des tomes expliquant certaines techniques
        d'artisanat.</p></div><div class="arran-mod"><p></p><h3>Deuxièmes étages
        : études et Cloche</h3><p>Il y a deux escaliers au premier étage, le
        premier amène dans une salle de réunion assez élégante avec beaucoup de
        meubles qui permettent de ranger des livres et parchemins ainsi que des
        carnets de notes ou des cartes de la région. Au centre de la pièce une
        très grande table ronde surmontée d'une partie plus haute, permet de
        prendre des décisions en conseil restreint lorsqu'il y a des conflits
        par exemple ou pour organiser le déroulement d'une
        cérémonie.</p><p>L'autre escalier mène dans une petite tour ouverte sur
        ses quatre côtés permettant une vue panoramique sur le village
        d'Arkanov. Prenant une grande partie de l'espace, une immense cloche en
        métal est accrochée à l'entrait du toit. Le long du mur, un support
        contient un gros marteau semblable à ceux que l'on utilise à la forge et
        en face de l'escalier se trouve un coffre très joli contenant deux
        marteaux quasiment identiques. Ils sont recouverts de runes magiques qui
        sont une bonne synthèse entre les runes Naines et les runes des
        Centaures.</p><p>Ce duo de marteaux est essentiel pour la sécurité du
        village, ils permettent de créer la bulle de silence autour d'Arkanov en
        les utilisant sur la cloche et en faisant une autre rythmique, ils
        permettent de créer un son d'alerte uniquement entendable des Centaures
        d'Arkanov. La plupart des Centaures savent qu'on entend cette alerte de
        loin mais aucun d'eux ne sait qu'on peut l'entendre aux quatre coins du
        monde des Terres d'Arran. La cloche n'a aucune utilité dans les pouvoirs
        des marteaux mais elle permet d'agrandir l'air d'effet de la zone de
        silence.</p><p>Si les PJs sauvent le village des Ombres Blanches et
        ramènent certains prisonniers, ce duo de marteaux pourra être offert à
        un des PJs qui utilise comme armes les marteaux de guerre ou les
        marteaux à deux mains.</p><p></p></div>
