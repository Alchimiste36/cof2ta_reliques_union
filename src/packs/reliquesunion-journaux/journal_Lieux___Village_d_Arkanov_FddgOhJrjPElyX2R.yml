      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>0</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>0</strong></h2></td><td><h2
        style="text-align:center"><strong>+2 si
        aimable</strong></h2></td></tr></tbody></table><h2><strong>Journée de
        travail :</strong></h2><p>Il n'y a pas de travail à faire sur la place
        public mais dès que les PJs atteignent 0 en jauge de Confiance, ils
        auront le droit de s'y promener. S'ils sont aimables avec les Centaures
        qu'ils croisent, ils pourront gagner 2 points de Confiance.</p><p>Même
        s'ils ont accès à des petite mares souterraines dans les mines, pouvoir
        se laver dans le lac est réellement un plaisir. Sur le ponton, ils ont
        l'occasion aussi de nettoyer leurs vêtements. S'ils aident ou s'occupent
        du nettoyage des tissus ou vêtements pour les Centaures (lavage, pliage,
        déplacement…), ils pourront gagner aussi 2 points de
        Confiance.</p><p></p><h2>Description :</h2><p>La place principale du
        village se situe à côté de la cuisine collective et non loin de la
        majeure partie des bâtiments qui servent à la fabrication à Arkanov. En
        son centre on peu voir un bassin à plusieurs étages qui porte en son
        centre un lampadaire très complexe et ornementée qui illumine toute la
        place lorsque les lampes sont allumées. Le puit, situé contre la cuisine
        commune descend profondément vers une nappe phréatique pure et
        fraiche.</p><p>En se dirigeant vers la mare, on arrive à un ponton
        équipé de poteau et fils pour faire sécher le linge et les étoffe de
        tissus. Les marches descendent dans le lac se qui permet d'aller se
        baigner ou de s'installer pour faire une lessive. La brume d'eau de la
        cascade rend les moments de baignade particulièrement agréables et
        revigorants.</p></div>
