                system:
                  key: torche
                  description: >-
                    <p>Une torche br&ucirc;le pendant 1 heure, diffusant
                    une&nbsp;lumi&egrave;re normale&nbsp;dans un rayon de 6
                    m&egrave;tres et augmentant la luminosit&eacute; d'une
                    cat&eacute;gorie dans un rayon de 6 m&egrave;tres
                    au-del&agrave; de cette zone (les t&eacute;n&egrave;bres
                    sont transform&eacute;es en faible lumi&egrave;re, la faible
                    lumi&egrave;re est transform&eacute;e en lumi&egrave;re
                    normale).</p>

                    <p>Une torche ne permet pas d'augmenter la luminosit&eacute;
                    dans la lumi&egrave;re normale ou vive.</p>

                    <p>Si une torche est utilis&eacute;e en combat, traitez-la
                    comme une arme improvis&eacute;e &agrave; une main
                    infligeant un nombre de d&eacute;g&acirc;ts contondants
                    &eacute;gal &agrave; ceux d'un gantelet de m&ecirc;me
