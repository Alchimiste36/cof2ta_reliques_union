      content: >-
        <div class="arran-mod"><table><tbody><tr><td data-colwidth="337"><h3
        style="text-align:center"><strong>Confiance
        d'Accès</strong></h3></td><td data-colwidth="349"><h3
        style="text-align:center"><strong>Confiance de
        Travail</strong></h3></td><td><h3 style="text-align:center"><strong>Gain
        de Confiance par Jour de Travail</strong></h3></td></tr><tr><td
        data-colwidth="337"><h2
        style="text-align:center"><strong>10</strong></h2></td><td
        data-colwidth="349"><h2
        style="text-align:center"><strong>10</strong></h2></td><td><h2
        style="text-align:center"><strong>+3 à
        +4</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>Les PJs peuvent être appelés pour aider à préparer les
        légumes, graines, plantes, fruits…</p><p>Dans ce bâtiment, il est
        possible de faire sécher, écraser, mettre en sacs ou sachets, découper,
        trier, éplucher, faire des bocaux, saler, mettre à fermenter,
        effeuiller, organiser… toute les différentes denrées venant du
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-journaux.JournalEntry.RwEQa4LVGayCdqrs]{T.
        Verger - Champs - Potager}.</p><p>Le travail n'est pas compliqué mais il
        faut souvent de la minutie, une grande rigueur et une hygiène
        impeccable.</p><ul><li><p><strong>DEX-AGILITE DD5 pour s'occuper des
        différentes tâches</strong> - si raté =&gt; mauvais travail ou rigueur
        insuffisante</p></li></ul><p></p><h2>Description :</h2><p>Dans ce très
        grand bâtiment, on peut trouver des centaines de caisses, paniers, sacs
        remplis de légumes, plantes, feuilles, graines, fruits, baies…</p><p>Des
        plans de travail, étagères et caisses permettent de trier, stocker et
        garder tous ces aliments. En plus de cela, des structures permettent de
        préparer les aliments pour les conserver (séchage, bocaux, saumure,
        fermentation…), de les trier et des les préparer pour la cuisine
        collective ou pour que chaque habitants du village puisse trouver de
        quoi se nourrir au quotidien.</p><p>A l'étage, des stocks de nourritures
        sont entreposés sur des étagères bien organisées. On remarque qu'au
        premier étage comme au second, un ingénieux système de ventilation est
        associé à quelques runes magique qui permettent de garder la pièce
        fraiche et avec un bon taux d'humidité.</p><p>Il y a de quoi tenir
        plusieurs semaines voir mois avec toute cette nourriture
        stockée.</p></div>
