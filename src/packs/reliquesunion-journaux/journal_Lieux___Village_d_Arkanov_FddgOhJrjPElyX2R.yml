        +6</strong></h2></td></tr></tbody></table><h2><strong>Journée de travail
        :</strong></h2><p>A chaque fois que les PJs se blessent lourdement, ils
        seront apporter au RdC de ce bâtiment pour se faire soigner par
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.o7tjD6cFNk5vMYC4]{Kara}.
        Il est très rare qu'une autre personne s'occupe des blessés même si le
        professeur
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.wC6n6PG5zG9b1r1q]{Kaiako}
        a toutes les connaissances sur le sujet.</p><p>Pour atteindre l'étage,
        il faudra avoir une très bonne confiance avec Kara pour qu'elle accepte
        de leur faire découvrir son atelier de préparation des soins et surtout
        la présence de l'Orbe Élémentaire.</p><p>Les PJs pourront être mise à
        contribution pour aider à soigner des blessés ou aider Kara à ranger ou
        nettoyer son cabinet.</p><p>Avec l'augmentation de la Confiance, ils
        pourront aider au premier étage à la préparation des potions, soins,
        baumes…</p><ul><li><p><strong>DEX-AGILITE DD10 pour les tâches du
        RdC</strong> - si raté =&gt; bazar ou mauvais travail (ça fâche
        Kara)</p></li><li><p><strong>DEX-AGILITE DD15 pour les tâches de
        l'étage</strong> - si raté =&gt; empoisonnement, blessure ou mauvais
        travail</p></li></ul><p></p><h2>Description :</h2><h3>Rez-de-Chaussée
        :</h3><p>La porte est en permanence fermée à clef car certains produits
        sont toxiques et il y a aussi des drogues potentiellement dangereuses
        dans ce bâtiment.</p><p>Les trois clefs sont possédés par :
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.acT0Ir2r38h6NiGJ]{Kiliko},
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.o7tjD6cFNk5vMYC4]{Kara}
        et
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.wC6n6PG5zG9b1r1q]{Kaiako}.</p><p>Dans
        cette pièce, les meubles sont rangées au cordeau. Tout y est à sa place
        et chaque chose à une place précise. De nombreuses étagères et des
        dizaines de tiroirs renferment tout le nécessaire pour soigner les
        Centaures du village. Des outils, des produits (baumes, potions,
        pommades, infusions, graines ou alcools), des attelles, des bandages… et
        aussi de nombreux ouvrages sur l'anatomie, la toxicité des végétaux ou
        animaux, les différentes maladies connues…, les PJs pourraient passer
        plusieurs semaines rien que dans cette pièce sans tout
        découvrir.</p><p>Un grand miroir sous l'escalier permet d'ausculter les
        blessés et deux grands tableaux représentent des Centaures en pleine
        forme, tous leurs muscles et articulations bien prononcées. Un tonneau
        est remplie d'une eau limpide permettant de nettoyer les outils, ses
        mains ou d'humidifier les bandages.</p><p>Cette pièce est utilisé par
        @UUID[Compendium.cof2ta_reliques_union.reliquesunion-acteurs.Actor.o7tjD6cFNk5vMYC4]{Kara}
        comme espace de soins psychologiques et d'écoute pour les habitants du
        village. Tout ce qui se dit ici ne sortira jamais sauf si ça doit faire
        intervenir le chef du village (harcèlement, conflit,
        dépendance…</p><p></p><h3>Premier Étage : préparation des
        médicaments</h3><p>Dans cette pièce baignée d'une lumière filtrée par
        des très beaux vitraux de multiples couleurs, on trouve des bacs de
        cultures de plantes en tous genres (fleurs, champignons, herbes,
        aromatiques…) ainsi qu'une table avec le nécessaire pour découper,
        ciseler, piler, trier, nettoyer… tous les végétaux et de la mélanger ou
        laisser macérer dans certaines huiles. Un bassin est directement relié à
        la nappe phréatique et permet de récupérer une eau fraiche et pure pour
        la préparation des breuvage et autres potions.</p><p>L'objet le plus
        important de cette pièce c'est l'Orbe disposée sur un joli piédestal en
        bronze. Cette Orbe est un puissant objet magique élémentaire qui semble
        être réalisé en verre avec des veines de couleurs pastelles. Lorsque
        l'on touche l'Orbe à certains endroits, il est possible de faire varier
        la température de la pièce, le dégrée d'humidité et la ventilation
        (runes de feu, d'air et d'eau). Là où ça peut devenir dangereux si on ne
        l'utilise pas bien, c'est que ces variations peuvent aller très loin (de
        -60°C à +90°C / Hygrométrie de 0 à 100% / ventilation totalement nulle
        ou de fortes bourrasques de vent pouvant aller à 250km/h). Ca pourrait
        faire de gros dégâts aux plantes présentes dans la pièce mais aussi aux
        PJs ou aux Centaures en cas de mauvaises utilisations. Cette Orbe peut
        être déplacée grâce à une sacoche de cuir bloquant ses effets. Le rayon
        d'action de l'Orbe grandit de 10m par minute d'activation jusqu'à un
        maximum de 250m de rayon au bout de 25 minutes. Lors de circonstances
        climatiques majeures et durables, les Centaures peuvent décider de
        "réguler" le climat du village pour ne pas perdre les récoltes ou ne pas
        risquer la mort de certains habitants (canicules, froid intense,
        tempête, sècheresse…).</p><p><em><strong>Voir notes secrètes
        !</strong></em></p><p>Si les PJs atteignent un niveau de Confiance de
        70+, ils pourront demander à utiliser l'Orbe face aux Ombres Blanches,
        ce qui pourrait être très utile dans les
        souterrains.</p><p></p><p></p><p></p></div>
