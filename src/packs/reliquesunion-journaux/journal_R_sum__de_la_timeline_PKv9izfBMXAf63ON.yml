    text:
      format: 1
      content: >-
        <p>Après plusieurs jours à étudier les ouvrages du Temple du Val Rouge,
        il est possible d'établir une temporalité plus claire des événements
        liés aux Bracelets de l'Union.</p><p>Même si rien n'est sur au vu des
        recoupements qu'il a fallu faire pour déterminer cette timeline, ça
        permet au moins de clarifier un peu plus.</p><p>Mise à jour après les
        découvertes effectuées à Arkanov et lors de nombreuses
        recherches.</p><p></p><ul><li><p>Environ <span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">7000 après le Grand
        Schisme</span></strong></span></p><ul><li><p>Essor et développement de
        la cité Forge d'Hyrr'Tarënn par le grand roi Abadar, descendant
        d'Yjdad</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">8225 après le Grand
        Schisme</span></strong></span> (-1 077 Calendrier Athéen (il y a 1785
        ans) Attaque d'Esdavia -6)</p><ul><li><p><strong>Acte d'achat de la
        région d'Esdavia</strong> par un <strong>humain nommé Gabrel</strong> et
        une <strong>Centaure nommée Kaitiaki</strong>, à un seigneur local dont
        le nom s'est oublié dans l'histoire</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">8257 après le Grand
        Schisme</span></strong></span> (-1 045 CA (il y a 1753 ans) Attaque
        d'Esdavia -4)</p><ul><li><p><strong>Découverte de la cité d'Esdavia par
        des voyageurs nains</strong> cherchant des fillons de minerais dans les
        montagnes. Ils font un rapport à leur seigneur parlant : <em>d'une ville
        remplie de toutes les races aux ordres de cinq rois et reines tout
        puissants</em>. Les elfes, humains et centaures sont prévenus (pas les
        Peaux Vertes) et <strong>des groupes d'éclaireurs sont envoyés pour
        obtenir des informations</strong> sur cette région pendant plusieurs
        années.</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">8261 après le Grand
        Schisme</span></strong></span> (-1 041 CA (il y a 1749 ans) Attaque
        d'Esdavia an 0)</p><ul><li><p><strong>Escarmouche commune contre les
        Faux-Dieux d'Esdavia</strong> (@UUID[JournalEntry.E3770fjIQrJtxb4X]{Les
        Faux Dieux des Plateaux Venteux à Esdavia}). Récupération des reliques
        et <strong>création de l'Ordre de
        l'Union</strong>.</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">8262 après le Grand
        Schisme</span></strong></span> (-1 040 CA (il y a 1748 an) Attaque
        d'Esdavia +1)</p><ul><li><p><strong>Début de la construction du Temple
        du Val Rouge</strong>. Certaines notes parlent <strong>des travaux
        commencés par les nains</strong> pour aménager une cité minière pour
        protéger la relique à leur charge et <strong>du choix des Centaures de
        s'isoler du monde dans des montagnes</strong>. Le porteur elfe d'une des
        reliques est très inquiet dans un récit car <strong>il ne connait pas le
        souhait des humains et peaux vertes</strong> pour assurer la protection
        de leurs reliques.</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">8265 après le Grand
        Schisme</span></strong></span> (-1037 CA (il y a 1745 ans) Attaque
        d'Esdavia +4</p><ul><li><p>Note de l'Architecte d'Arkanov Tuatanii
        évoquant le Tel'Quessir et le Démon
        Immortel</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">8267 après le Grand
        Schisme</span></strong></span> (-1 035 CA (il y a 1743 ans) Attaque
        d'Esdavia +6)</p><ul><li><p><strong>Première journée de
        Maniash'Onira</strong>, première et dernière Gardienne du Temple du Val
        Rouge.</p></li><li><p>Elle écrit quelques semaines plus tard qu'elle
        pense que tous <strong>les artisans et travailleurs qui ont aidé à
        construire le Temple sous l'Arbre-Mère ont été tué pour protéger le
        secret.</strong> Ca l'a rend triste mais elle comprend la
        nécessité.</p></li><li><p>Quelques années plus tard, en 8299, elle
        aborde <strong>la cérémonie qui a permis le retrait des reliques des
        porteurs temporaires</strong>. Elle se souvient de l'énergie qui passait
        entre les mains des cinq porteurs, tournoyante de plus en plus vite
        jusqu'au moment où les reliques sont tombées au sol aux pieds des
        anciens porteurs, chacun arborant un immense sourire de soulagement.
        Chaque relique fut prise par les membres de l'Ordre de l'Union et
        apportées dans les lieux spécifique à leur
        "gardiennage".</p></li><li><p>Une partie, quelques jours plus tard,
        transcrit sa grande colère. Elle parle de la trahison des porteurs
        temporaires qui auraient pu détruire les reliques une fois pour toutes
        au lieu de se leurrer sur la soi-disant harmonie qu'ils pourraient
        apporter dans les Terres d'Arran. Elle est en colère car elle pense
        qu'ils ne voulaient juste pas mourir pour permettre la destruction des
        reliques. Tout ce passage est assez cryptique car la gardienne exprime
        ses émotions sans vraie logique ni explications. Une phrase est
        marquante : "<em><strong>je perds ma vie car les puissants veulent
        garder la leur</strong></em>"</p></li></ul></li><li><p>Environ <span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">8300 après le Grand
        Schisme</span></strong></span> (-1002 CA (il y a 1710 ans) Attaque
        d'Esdavia +39)</p><ul><li><p>Nombreux travaux réalisés dans la
        Cité-Forge d'Hyrr'Tarënn. Surtout dans le quartier des Forge et le Plais
        Royal.</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">8367 après le Grand
        Schisme</span></strong></span> (-935 CA (il y a 1643 ans) Attaque
        d'Esdavia +106)</p><ul><li><p>Fermeture définitive de la Cité-Forge
        d'Hyrr'Tarënn par le roi. Il s'enferme avec sa famille et une partie des
        nobles de la cité naine.</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">8934 après le Grand
        Schisme</span></strong></span> (-368 CA (il y a 1076 ans) Attaque
        d'Esdavia +673)</p><ul><li><p>Echange avec le village d'Arkanov =&gt;
        @UUID[JournalEntry.srtuJJYdsgb22oAc]{Échanges avec
        Arkanov}</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">9048 après le Grand
        Schisme</span></strong></span> (-254 CA (il y a 962 ans) Attaque
        d'Esdavia +787)</p><ul><li><p><strong>Abandon du Temple du Val Rouge par
        les acolytes</strong> (certainement par dissolution dans le bassin) puis
        par <strong>la suivante</strong> parti dans le village des sylvains pour
        développer les légendes sacrées autour de l'Arbre-Mère
        <strong>et</strong> enfin de <strong>la Gardienne</strong> (aussi par
        dissolution ?)</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">9656 après le Grand
        Schisme</span></strong></span> (350 CA (il y a 358 ans) Attaque
        d'Esdavia +1399)</p><ul><li><p>Le chef Kaumatua d'Arkanov écrit une note
        sur ses souhaits pour le village et les centaures. Création d'un village
        de centaures libres dans les montagnes. Création des trois objets de la
        salle secrète.</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">9656 après le Grand
        Schisme</span></strong></span> (354 CA (il y a 354 ans) Attaque
        d'Esdavia +1395)</p><ul><li><p>Les responsables du Village d'Arkanov
        décident de ne plus parler des reliques, de la salle secrète et du but
        initiale d'Arkanov</p></li></ul></li><li><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">10 010 après le Grand
        Schisme</span></strong></span> ((708 CA) Attaque d'Esdavia
        +1749)</p><ul><li><p><strong>Attaque du village des elfes
        sylvains</strong> par la cité d'Ispier. <strong>Mort de la Shamane
        sylvaine</strong>. Essais nombreux et infructueux d'ouvrir l'accès au
        Temple du Val Rouge après le massacre. <strong>Un groupe d'aventurier
        rencontre la fille de la Shamane, Laotissa, et arrive à accéder au
        Temple du Val Rouge et récupérer les Bracelets de
        l'Union.</strong></p></li></ul></li></ul>
